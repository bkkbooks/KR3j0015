body:
  text: 跋跋是書見於北夢瑣言云趙蕤者梓州鹽亭縣人也博學韜鈐長於經世夫婦俱有節操不應交辟撰長短經十卷王霸之道見行於世又見唐書藝文志雜家趙蕤長短要術十卷蕤字太賓梓州人開元中召之不赴晁氏郡齋讀書志亦載長短經十卷唐趙蕤撰論王霸機權正變長短之術凡六十三篇第九十載兵權陰謀向嘗購之未得今夏鮑君以文以拜經樓寫本見委是正始快讀之其指歸大率如孫晁二公所云乃其稱引繁富核對非易自揣固陋久未敢下筆既值歲餘悉發齋中所有書以次校勘兩旬始畢譌者改之闕者補之疑者證之兩通者仍之雖不能悉合庶可上口矣舊稱十卷六十三篇今本蕤自序亦然檢之實止九卷而篇有六十四初頗疑之及觀文獻通考引晁氏說則首據瑣言後云第十卷陰謀家本缺今現存者六十四篇始知是書早無足本今所有自序已不盡原文而近刻讀書志大有脫誤也但王阮亭嘗見宋刻云是徐健庵過任城得之其跋亦言十卷總六十三篇唐梓州郪縣長平山安昌巖草莽臣趙蕤撰與今正同則其誤自宋已然矣瑣言蕤貫鹽亭而言郪者四川總志云蕤鹽亭人隱於郪縣長平山安昌巖博考六經諸家同异著長短經又注關朗易傳明皇屢徵不起李白嘗造廬以請是也案太白集有淮南臥病書懷寄蜀中趙徵君蕤詩廣輿記亦云蕤篤學不仕與白為布衣交著長短經梓州志稱其人傑阮亭又引楊天惠彰明逸事曰潼江趙蕤任俠有氣善為縱橫學著長短經此皆讀是書者所宜留意故詳述之至總志謂其文申鑒論衡之流竊觀此書命名取國策刺事倣呂覽而雜採群言又絕似鴻烈也隆辛丑暢月長至後九日海寧周廣業職
