body:
  text: 反經第十三反經第十三臣聞三代之亡非法亡也御法者非其人矣故知法也者先王之陳迹苟非其人道不虛行故尹文子曰仁義禮樂名法刑賞此八者五帝三王治世之術故仁者所以博施於物亦所以生偏私反仁也議曰在禮家施不及國大夫不收公利孔子曰天子愛天下諸侯愛境內不得過所愛者惡私惠也故知偏私之仁王者惡之也義者所以立節行亦所以成華偽反義也議曰亡身徇國臨大節而不可奪此正義也若趙相虞卿棄相捐君以周魏齊之危信陵無忌竊符矯命以赴平原之急背公死黨之義成守職奉上之節廢故毛公數無忌曰於趙則有功矣於魏則未為得凡此之類皆華偽者禮者所以行敬謹亦所以生惰慢反禮也議曰漢時欲定禮文帝曰繁禮飾貌無益於禮躬化謂可耳故罷之郭嘉謂曹公曰紹繁禮多儀公體任自然此道勝者也夫節苦難貞故生惰慢也樂者所以和情志亦所以生淫放反樂也樂書曰鄭衛之音亂代之音桑間濮上之音亡國之音也故嚴安曰夫佳麗珍怪故順於耳目故養失而泰樂失而淫禮失而彩教失而偽偽彩淫泰非所以範人之道名者所以正尊卑亦所以生矜篡反名也議曰古者名位不同禮亦異敷故聖人明禮制以序尊卑異車服以彰有德然漢高見秦皇威儀之盛乃歎曰大丈夫當如此此所以生矜篡老經曰夫禮者忠信之薄而亂之首信矣哉法者所以齊衆異亦所以生乖分反法也議曰道德經云法令滋彰盜賊多有賈誼云法出而姦生令下而詐起此乖分也刑者所以威不服亦所以生凌暴反刑也賞者所以勸忠能亦所以生鄙爭反賞也文子曰聖人其作書也以領理百事愚者以不忘智者以記事及其衰也為姦偽以解有罪而殺不辜反書也文子曰察於刀筆之迹者即不知理亂之本習於行陳之事者即不知廟勝之權莊子曰儒以詩書發冢大儒曰東方作矣事之何若小儒曰未改裙襦口中有珠詩固有之曰青青之麥生於陵陂生不布施死何含珠為接其鬢壓其顪儒以金椎控其頤徐徐列其頰無傷口中珠由此言之詩禮乃盜資也顪音許穢反控音啌其作囿也以奉宗廟之具士卒戒不虞及其衰也馳騁弋獵以奪人時反囿也齊宣王見文王囿大人以為小問於孟子孟子曰周文王之囿方七十里芻蕘者往焉雉兔者往焉與人同之民以為小不亦宜乎臣聞郊關之內有囿方四十里殺其麋者如殺人之罪民以為大不亦宜乎楚靈為章華之台伍舉諫曰夫先王之為臺榭也榭不過講軍實臺不過望氛祥其所不奪穡地其為不匱財用其事不煩官業其日不妨時務夫為臺榭將以教人利也不聞其以匱乏也其上賢也以平教化正獄訟賢者在位能者在職澤施於下萬人懷德至於衰也朋黨比周各推其與廢公趨私外內拑舉姦人在位賢者穩處反賢也太公謂文王曰君好聽世俗之所舉者或以非賢為賢或以非智為智君以世俗之所舉者為賢智以世俗之所毀者為不肖則多黨者進少黨者退是以群邪比周而蔽賢是以世亂愈甚文王曰舉賢奈何太公曰將相分職而君以官舉人案名察實選才考能則得賢之道古語曰重朋黨則蔽主爭名利則害友務欲速則失德也韓詩外傳曰夫士有五反有勢尊貴不以愛人行義理而反以暴傲反貴也古語曰富能富人者欲貧不可得貴能貴人者欲賤不可得達能達人者欲窮不可得梅福曰存人所以自立也壅人所以自塞也家富厚不以振窮救不足而反以侈靡無度反富也資勇悍不以衛上攻戰而反以侵凌私鬭反勇也凡將帥輕去就者不可使鎮邊使仁德守之則安矣心智惠不以端計教而反以事姦飾詐反智惠也説苑曰君子之權謀正小人之權謀邪貌美好不以統朝蒞人而反以蠱女從欲反貌也此五者所謂士失其美質太公曰明罰則人畏懾人畏懾則變故出反明罰也明察則人擾人擾則人徙人徙則不安其處易以成變反明察也太公曰明賞則不足不足則怨長明王理人不知所好而知所惡不知所歸而知所去使人各安其所生而天下靜矣晉劉頌曰凡監司欲舉大而略小何則夫細過微闕謬忘之失此人情所必有固不許在不犯之地而悉糾以法則朝野無立人此所謂以治而亂也晏子曰晏子曰臣專其君謂之不忠子專其父謂之不孝妻專其夫謂之嫉妬反忠孝也呂氏春秋曰夫陰陽之和不長一類甘露時雨不私一物萬人之主不阿一人申子曰一婦擅夫衆婦皆亂一臣專君群臣皆蔽故妬妻不難破家也而亂臣不難破國也是以明君使其臣並進輻湊莫得專君焉韓子曰韓子曰儒者以文亂法俠者以武犯禁反文武也恃武者滅恃文者亡夫差偃王是也吳子曰昔承桑氏之君修德廢武以滅其國有扈之君恃衆好勇以喪社稷明主鑒茲必內修文德外治武訓故敵而不進無逮於恭僵尸而哀之無及於仁矣鈐經曰文中多武可以輔主武中多文可以匡君文武兼備可任軍事文武兼闕不可征伐子路拯溺而受牛謝孔子曰魯國必好救人於患也子貢贖人而不受金於府魯國之法贖人於他國者受金於府也孔子曰魯國不復贖人矣子路受而勸德子貢讓而止善由此觀之廉有所在而不可公行反廉也匡衡云孔子曰能以禮讓為國乎何有朝廷者天下之楨幹也公卿大夫相與修禮恭讓則人不爭好仁樂施則下不暴上義高節則人興行寬柔惠和則衆相愛此四者明王之所以不嚴而化成也何者朝有變色之言則下有爭鬭之患上有自專之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有盜竊之人此其本慎子曰忠未足以救亂代而適足以重非何以識其然耶曰父有良子而舜放瞽叟桀有忠臣而過盈天下然則孝子不生慈父之家六親不和有孝慈而忠臣不生聖君之下國家昏亂有忠臣故明主之使其臣也忠不得過職而職不得過官反忠也京房論議與石顯有隙及京房被出為魏郡太守憂懼上書曰臣弟于姚平謂臣曰房可謂小忠不可謂大忠何者昔秦時趙高用事有正先者非刺高而死高威自此成秦之亂正先趣之今臣得出守郡唯陛下毋使臣當正先之死為姚平所笑由此而觀之夫正先之所謂忠乃促秦禍忠何益哉鬼谷子曰將為胠篋探囊發匱之盜胠音起居反胠發也從旁開為胠為之守備則必攝緘縢攝結也固扃鐍音決細也此代俗之所謂智也然而巨盜至則負匱揭篋揭音其謁反擔囊而趨唯恐緘縢扃鐍不固也然則向之所謂智者有不為盜積者乎反智也孫子曰小敵之堅大敵之擒也其所謂聖者有不為大盜守者乎何以知其然耶昔者齊國鄰邑相望雞狗之音相聞罔罟之所布耒耨之所刺方二千餘里闔四境之內所以立宗廟社稷治邑屋州閭鄉里者曷常不法聖人哉然而田成子一朝殺齊君而盜其國所盜者豈獨其國耶并與聖智之法而盜之故田成子有乎盜賊之名而身處堯舜之安小國不敢非大國不敢誅十二代而有齊國則是不乃竊齊國并與其聖智之法以守其盜賊之身乎反聖法也昔叔向問齊晏子曰齊其如何晏子曰此季世吾弗知齊其為陳氏矣公棄其人而歸於陳氏齊舊四量豆區釜鍾四升為豆各自其四以登於釜釜十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公收之山木如市弗加於山魚鹽蜃蛤弗加於海人參其力二於公而衣食其一公聚朽蠹而三老凍餒國之諸市屨賤踊貴人多疾病而或燠休之其愛之如父母歸之如流水欲無獲人將焉避之跖之徒問於跖曰盜亦有道乎跖曰何適而無有道耶夫妄意室中之藏聖也入先勇也出後義之知可否智也分均仁也五者不備而能成大盜者天下未之有也後漢未董卓入朝將篡位乃引用名士范曄論曰董卓以虓闞為情遭崩剝之勢故得蹈藉彝倫毀裂畿服夫以刳肝斫趾之性則群生不足以厭其快然猶折意搢紳遲疑凌奪尚有盜竊之道焉由是觀之善人不得聖人之道不立盜跖不得聖人之道不行天下之善人少而不善人多則聖人之利天下也少而害天下也多矣反仁義也議曰昔仲由為邵宰季氏以五月起長溝當此之時子路以其私秩粟為漿飯以餉溝者孔子聞之使子貢往覆其飯擊毀其器子路曰夫子嫉由之為仁義乎孔子曰夫禮天下愛天下諸侯愛境內大夫愛官職士愛其家過其所愛是曰侵官漢武時河間獻王來朝被服造次必於仁義武帝色然難之謂曰湯以七十里文王以百里王其勉之王知其意歸即縱酒由是言之夫仁義兼濟必有分乃可故尸子曰君父臣子上下長幼貴賤親疏皆得其分曰理愛得分曰仁施得分曰義慮得分曰智動得分曰適言得分曰信皆得其分而後為成人由是言之跖徒之仁義非其分矣由是言之夫仁義禮樂名法刑賞忠孝賢智之道文武明察之端無隱於人而常存於代非自昭於堯湯之時非故逃於桀紂之朝用得其道則天下理用失其道而天下亂孫卿曰羿之法非亡也而羿不中世禹之法猶存也而夏不代王故法不能獨立得其人則存失其人則亡矣莊子曰宋人有善為不龜手之藥者代以洴澼絖為事客聞之請買其方百金客得之以説吳王越人有難吳王使之將冬與越人水戰大敗越人裂地而封能不龜手一也或以封或不免於洴澼絖則其所用之異故知制度者代非無也在用之而已是非第十四是非第十四夫損益殊塗質文異政或尚權以經緯或敦道以鎮俗是故前志垂教今皆可以理違何以明之是曰大雅云既明且哲以保其身易曰天地之大德曰生非曰語曰士見危致命又曰君子有殺身以成仁無求生以害仁是曰管子曰疑今者察之古不知來者視之往古語曰與死人同病者不可生也與亡國同行者不可存也非曰呂氏春秋曰夫人以食死者欲禁天下之食悖矣有以乘舟死者欲禁天下之船悖矣有以用兵喪其國者欲偃天下之兵悖矣杜恕曰夫姦臣賊子自古及今未嘗不有百歲一人是為繼踵千里一人是為比肩而舉以為戒是猶一噎而禁人食也噎者雖少餓者必多是曰孔子曰惡訐惡以為直非曰管子曰惡隱惡以為仁者魏曹羲至公論曰夫代人所謂掩惡揚善者君子之大義保明同好者朋友之至交斯言之作蓋閭閻之臼談所以救愛憎之相謗非篤正之至理折中之公議也世士不料其數而係其言故善惡不分以覆過為宏也朋友忽義以雷同為美也善惡不分亂實由之朋友雷同敗必從焉談論以當實為情不以過難為貴相知以等分為交不以雷同為固是以達者存其義不察於文識其心不求於言是曰越絶書曰衒女不貞衒士不信非曰漢書曰大行不細謹大禮不讓辭是曰黃石公曰務廣地者荒務廣德者強有其有者安貪人有者殘殘滅之政雖成必敗非曰司馬錯曰欲富國者務廣其地欲強兵者務富其人欲王者務博其德三資者備而後王業隨之是曰傳曰心苟無瑕何恤乎無家語曰禮義之不愆何恤於人言非曰語曰積毀銷金積讒磨骨衆羽溺舟群輕折軸是曰孔子曰君子不器聖人智周萬物非曰列子曰天地無全功聖人無全能萬物無全用全備也故天職生覆地職載形聖職教化是曰孔子曰君子坦蕩蕩小人長戚戚非曰孔子曰晉重耳之有霸心也生於曹衛越勾踐之有霸心也生於會稽故居下而無憂者則思不遠覆身而常逸者則志不廣是曰韓子曰古之人目短於自見故以鏡觀面智疑於自知故以道正己非曰老子曰反聽之謂聰內視之謂明自勝之謂強是曰唐且曰專諸懷錐刀而天下皆謂之勇西施被短褐而天下稱美非曰慎子曰毛嬙西施天下之至姣也衣之以皮倛則見者皆走易之以元緆則行者皆止由是觀之則元緆色之助也姣者辭之則色厭矣是曰項梁曰先起者制服於人後起者受制於人軍志曰先人有奪人之心非曰史佚有言曰無始禍又曰始禍者死語曰不為禍始不為福先是曰慎子曰夫賢而屈於不肖者權輕也不肖而服於賢者位尊也堯為匹夫不能使其鄰家及至南面而王則令行禁止由此觀之賢不足以服物而勢位足以屈賢矣非曰賈子曰自古至今與民為仇者有遲有速耳而民必勝之矣故紂自謂天王也而桀自謂天父也已滅之後民以罵之也以此觀之則位不足以為尊而號不足以為榮矣是曰漢景帝時轅固與黃生爭論於上前黃生曰湯武非受命乃殺也固曰不然夫桀紂荒亂天下之心皆歸湯武湯武與天下之心而誅桀紂桀紂之人弗為使而歸湯武湯武不得已而立非受命而何非曰黃生曰冠雖敝必加於首履雖新必貫於足何者上下之分也今桀紂雖失道然君上也湯武雖聖臣下也夫君有失行臣不正言匡過以尊天子反因過而誅之代立南面非殺而何是曰太公曰明罰則人畏懾人畏懾則變故出明賞則不足不足則怨長故明王之理人不知所好不知所惡非曰文子曰罰無度則戮而無威賞無度則費而無恩故諸葛亮曰威之以法法行則知恩限之以爵爵加則知榮是曰文子曰人之化上不從其言從其行也故人君好勇而國家多難人君好色而國家昏亂非曰秦王曰吾聞楚之鐵劍利而倡優拙夫鐵劍利則士勇倡優拙則思慮遠以遠思慮御勇士吾恐楚之圖秦也是曰墨子曰雖有賢君不愛無功之臣雖有慈父不愛無益之子非曰曹子建曰舍罪責功者明君之舉也矜愚愛能者慈父之恩也三略曰含氣之類皆願得申其志是以明君賢臣屈已申人是曰傳曰人心不同其猶面也曹子建曰人各有好尚蘭蓀蕙之芳衆人所好而海畔有逐臭之夫咸池有六英之發衆人所樂而墨子有非之之論豈可同哉非曰語曰以心度心間不容針孔子曰其恕乎己所不欲勿施於人是曰管子曰倉廩實知禮節衣食足知榮辱非曰古語曰貴不與驕期而驕自至富不與侈期而侈自來是曰語曰忠無不報非曰左傳曰亂代則讒勝直是曰韓子曰凡人之大體取舍同則相是取舍異則相非也易曰同聲相應同氣相求水流濕火就燥雲從龍風從虎非曰易曰二女同居其志不同語曰一棲不兩雄一泉無二蛟又曰凡人情以同相妬故曰同美相妬同貴相害同利相忌是曰韓子曰釋法術而以心理堯舜不能正一國去規矩而以意度奚仲不能成一輪使中主守法術拙匠執規矩則萬不失矣非曰淮南子曰夫矢之所以射遠貫堅者弓弩力也其所以中的剖微者人心也賞善罰暴者政令也其所以行者精誠也故弩雖強不能獨中令雖明不能獨行杜恕曰世有亂人而無亂法若使法可專任則唐虞不須稷契之佐殷周無貴伊呂之輔矣是曰慮不先定不可以應卒兵不先辦不可以應敵左傳曰豫備不虞古之善政非曰左傳曰士蒍謂晉侯曰臣聞之無喪而戚憂必讎之無戎而城讎必保焉春秋外傳曰周景王將鑄大錢單穆公曰不可古者天災降戾於是乎量資幣權輕重以振救人夫備預有未至而設之修國備也預備不虞安不忘危有至而後救之若救火療疾量資幣之屬是不相入也二者先後各有宜不相入可先而不備謂之怠怠緩也可後而先之謂之召災謂人未有患輕而重之離人匱財是以召災也周固瀛國也天未厭禍焉而又離人以佐災無乃不可乎是曰左傳曰古人有言一日縱敵數代之患也非曰晉楚遇於鄢范文子不欲戰曰吾先君之亟戰也有故秦狄齊楚皆強不盡力子孫將弱今三強服矣齊秦狄敵楚而已唯聖人能內外無患自非聖人外寧必有內憂驕而亢則憂患生盍釋楚以為外懼乎是曰三略曰無使仁者主財為其多恩施而附於下非曰陶朱公中男殺人囚於楚朱公欲使其少子裝黃金千鎰往視之其長男固請乃使行楚殺其弟朱公曰吾固知必殺其弟是長與我俱見苦為生之難故重其財如少弟生見我富乘堅驅良逐狡兔豈知其財所從來固輕棄之今長者果殺其弟事理然也無足悲是曰語曰祿薄者不可與入亂賞輕者不可與入難慎子曰先王見不受祿者不臣祿不厚者不與入難非曰田單將攻狄見魯仲子仲子曰將軍攻狄弗能下也何者昔將軍之在即墨坐而織蕢立而杖插為士卒倡此所以破燕今將軍東有液邑之奉西有蕢上之娛黃金橫帶而馳乎淄澠之間有生之樂無死之心所以不勝也後果然是曰語曰貧賤之交不可忘糟粳之妻不下堂非曰語曰交接廣而信衰於友爵祿厚而忠衰於君是曰春秋後語曰楚春申君使孫子為宰客有説申君曰湯以亳武王以鄗皆不過百里以有天下今孫子賢人也而君藉之百里之勢臣竊為君危之春申君曰善於是使人謝孫子孫子去之趙趙以為上卿非曰客又説春申君曰昔伊尹去夏八殷殷王而夏亡管仲去魯八齊魯弱而齊強夫賢者之所在其君未嘗不尊其國未嘗不榮也今孫子賢人也君何為辭之春申君又曰善復使人請孫子是曰韓宣王謂摎留曰吾兩欲用公仲公叔其可乎對曰不可晉用六卿而國分簡公用田成闞止而簡公弒魏兩用犀首張儀而西河之外亡今王兩用之其多力者內樹其黨其力寡者又藉於外權群臣或內樹其黨以擅主命或外為勢交以裂其地則王之國危矣又曰公孫衍為魏將與其相田需不善季文子為衍説魏王曰王獨不見夫服牛驂驥乎不可百步今王以衍為可使將固用之也而聽相之計是服牛驂驥之道牛馬俱死而不成其功則王之國傷矣願王察之非曰傅子曰天地至神不能同道而生萬物聖人至明不能一檢而治百姓故以異致同者天地之道也因物制宜者聖人之治也既得其道雖有相害之物不傷乎治體矣水火之性相滅也善用之者陳鼎釜乎其間爨之煮之而能兩盡其用不相害也天下之物為水火者多矣何憂乎相害何患乎不盡其用也易曰天地暌而其事同也男女暌而其志通也萬物暌而其事類也是曰陳登為呂布説曹公曰養呂布譬如養虎常須飽其肉不飽則噬人非曰曹公曰不似卿言譬如養鷹飢則為人用飽則揚去是曰劉備來奔曹公曹公以之為豫州牧或謂曹公曰備有雄志今不早圖後必為患曹公以問郭嘉嘉曰有是然公提劍起義兵為百姓除暴推誠仗信以召雋桀猶懼其未來也今備有英雄之名以窮歸已而害之以害賢為名則智士將自疑回心擇主公誰與定天下者夫除一人之患以沮四海之望安危之機不可不察曹公曰善非曰傅子稱郭嘉言於太祖曰備有雄志而甚得衆心關羽張飛皆萬人之敵也為之死用以嘉觀之其謀未可測也古人有言曰一日縱敵數世之患宜早為之所曹公方招懷英雄以明大信未得從嘉謀是曰家語曰子路問孔子曰請釋古之道而行由之意可乎子曰不可也昔東夷慕諸夏之禮有女而寡為內私壻終身不嫁不嫁則不嫁矣然非貞節之義矣倉吾嬈音奴鳥反取妻而美讓與其兄讓則讓矣然非禮釀之讓也今子欲捨古之道而行子之意庸知子意以非為是乎語曰變古亂常不死則亡書云事弗師古以克永代匪説攸聞非曰趙武露王欲胡服公子成不悅靈王曰夫服者所以便用禮者所以便事聖人觀鄉而順宜因事而制禮所以利其人而厚其國夫翦髮文身錯臂左衽甌越之人也黑齒雕題鯷冠秫縫犬戎之國也故禮服莫同而其便一也鄉異而用變事異而禮易是以聖人謀可以利其國不一其用謀可以便其禮不法其故儒者一師而俗異中國同禮而離教況於山谷之便乎故去就之變智者不能一遠邇之服賢聖莫能同窮鄉多異俗曲學多殊辨今叔父之言俗也吾之所言以制俗也叔父惡變服之名以忘效事之實非寡人之所望也公子成遂胡服是曰移風易俗莫善於樂非曰孟子曰天道因則大化則細因也者因人之情也是曰李尋曰夫以喜怒賞誅而不顧時禁雖有堯舜之心猶不能致和平善言古者必有效於今善言天者必有徵於人設上農夫欲令不曰雖肉袒深耕汗出種之猶不生者非人心不至天時不得也易曰時止則止時行則行動靜不失于時其道光明書曰敬授人時故古之王者尊天地重陰陽敬四時月令順之以善政則和氣可立致猶枹鼓之相應也非曰太公謂武王曰天無益於兵勝而衆將所居者九曰法令不行而任侵誅無德厚而用日月之數不順敵之強弱而幸於天無智慮而候氛氣少勇力而望天福不知地形而歸過於時敵人怯弱不敢擊而信龜策士卒不勇而法鬼神設伏不巧而任背向之道凡天地鬼神視之不見聽之不聞不可以決勝敗故明將不法司馬遷曰陰陽之家使人拘而多忌范曄曰陰陽之道其弊也巫是曰翼奉曰治道之要在知下之邪正人誠向正雖愚為用若其懷邪智益為害非曰夫人主莫不愛己也莫知愛己者不足愛也故桓子曰捕猛獸者不令美人舉手釣旦魚者不使稚子輕預非不親也力不堪也奈何萬乘之主而不擇人哉故曰夫犬之為猛有非則鳴吠而不遑於夙夜此自效之至也昔宋人有沽酒者酒酸而不售何也以有猛犬之故夫犬知愛其主而不能為其主慮酒酸之患者智不足也是曰語曰巧詐不如拙誠非曰晉惠帝為太子和嶠諫武帝曰季世多偽而太子尚信非四海之主憂不了陛下家事武帝不從後惠帝果敗是曰左傳曰孔子歎子産曰言以足志文以足言不言誰知其志言之無文行而不遠晉為伯鄭入陳非文辭不為功慎辭也哉論語曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為非曰漢文帝登虎圈美嗇夫口辨拜為上林令張釋之前曰陛下以絳侯周勃何如人也上曰長者又問曰東陽侯張相如何如人也上復曰長者釋之曰此兩人言事曾不能出口豈效此嗇夫喋喋利口捷給哉且秦以任刀筆之吏爭以亟疾苛察相高然其弊徒文具耳亡惻隱之實以故不聞其過陵遲至於二世天下土崩今陛下以嗇夫口辭而超遷之臣恐天下隨風而靡爭口辨無其實且下之化上疾於影響舉錯之間不可不審帝乃止是曰太史公曰春秋推見至隱易本隱以之顯大雅言王公大人而德逮黎庶小雅譏已之得失其流及上所言雖殊其合德一也相如雖虛辭濫説然其要歸引之節儉此與詩之諷諫何異非曰揚雄以為賦者將以諷也必推類而言極麗靡之辭閎侈巨衍競於使人不能加也既乃歸之於正然覽已過矣往時武帝好神仙相如上大人賦欲以諷帝帝反縹縹有凌雲之志由是言之賦勸而不止明矣又頗類俳優非法度所存賢人君子詩賦之正也是曰淮南子曰東海之魚名鰈音士盍反與床榻字同比目而行北方有獸名曰婁更食更候南方有鳥名曰鶼音兼比翼而飛夫鳥獸魚鰈猶知假力而況萬乘之主乎獨不知假天下之英雄俊士與之為伍豈不痛哉非曰狐卷子曰父賢不過堯而丹朱放兄賢不過周公而管蔡誅臣賢不過湯武而桀紂伐況君之欲治亦須從身始人何可恃乎是曰孔子曰不患無位患己不立非曰孔子厄於陳蔡子路慍見曰昔聞諸夫子積善者天報以福今夫子積義懷仁久矣奚居之窮也子曰由未之識也吾語汝汝以仁者為必信耶則伯夷叔齊為不餓首陽汝以智者為必用耶則王子比干不見剖心汝以忠者為必報耶則關龍逢不見刑汝以諫者為必聽耶則伍子胥不見殺夫遇不遇者時也賢不肖者才也君子博學深謀而不遇時者衆矣何獨丘哉是曰神農形悴唐堯瘦臞舜黎黑禹胼胝伊尹負鼎而干湯呂望鼓刀而入周墨翟無黔突孔子無暖席非以貪祿位將欲起天下之利除萬人之害非曰李斯以書對秦二世云中子曰有天下而不恣睢命之曰以天下桎若堯舜然故謂之桎也夫以人徇己則己貴而人賤以己殉人則己賤而人貴故殉人者賤而所殉者貴自古及今未有不然夫堯禹以身徇天下謂之桎者不亦宜乎是曰論語曰舉逸民人天下之人歸心焉魏文侯受藝於子夏敬段干木過其廬未嘗不式於是秦欲伐魏或曰魏君賢國人稱仁上下和洽未可圖也秦王乃止由此得譽於諸侯非曰韓子曰夫馬似鹿此馬直千金今有千金之馬而無一金之鹿者何也馬為人用而鹿不為人用今處士不為人用鹿類也所以太公至齊而斬華士孔子為司寇而誅少正卯趙主父使李疵視中山可攻否還報曰可攻也其君好見巖穴之士布衣之人主父曰如子之言是賢君也安可攻李疵曰不然夫上顯巖穴之士則戰士殆上尊學者則農夫惰農夫惰則國貧戰士殆則兵弱兵弱於外國貧於內不亡何待主父曰善遂滅中山是曰漢書曰陳平云吾多陰謀道家所禁吾世即廢亡已矣終不能復起以吾多陰禍也其後元孫坐酎金失侯非曰後漢范曄論耿弇曰三代為將道家所忌而耿氏纍葉以功名自終將其用兵欲以殺止殺乎何其獨能崇也是曰易曰崇高莫大於富貴又曰聖人之大寶曰位非曰孫子為書謝春申君曰鄙諺曰厲人憐王此不恭之言也雖然古無虛諺不可不審察也此為劫殺死亡之主言也夫人主年少而矜材無法術以知姦則大臣主斷圖私以禁誅於已也故殺賢長而立幼弱廢正嫡而立不義春秋戒之曰楚王子圍聘於鄭未出境聞王病反問病遂以冠纓絞王殺之因自立也齊崔杼之妻美莊公通之崔杼率其黨而攻莊公莊公走出踰於外牆射中其股遂殺之而立其弟近代李兌用趙餓主父於沙丘百日而殺之淖齒用齊擢閔王之筋懸于廟梁宿昔而死夫厲雖腫胞之疾上比前代未至絞纓射股也下比近代未至擢筋餓死也夫劫殺死亡之主心之憂勞形之困苦必甚於厲矣由此觀之厲雖憐王可也是曰易曰備物致用立成器以為天下利者莫大於聖人非曰莊子曰聖人不死大盜不止雖重聖人而治天下則是重利盜跖也為之斗斛以量之則并與斗斛而竊之為之權衡以稱之則并與權衡而竊之為之符璽以信之則并與符璽而竊之為之仁義以教之則并與仁義以竊之何以知其然耶彼竊鉤者誅竊國者為諸侯諸侯之門而仁義存焉則是非竊仁義聖智耶故逐於大道揭諸侯竊仁義并斗斛權衡符璽之利雖有軒冕之賞弗能勸斧鉞之威弗能禁此重利盜跖而使不可禁者是乃聖人之過也故曰國之利器不可以示人彼聖人者天下之利器也非所以明天下也是曰論語曰君子固窮小人窮斯濫矣非曰易曰窮則變通則久是以自天祐之吉無不利太史公曰鄙人有言何知仁義已饗其利者為有德故伯夷醜周餓死首陽山而文武不以其故眨王跖蹻暴戾其徒誦義無窮由此觀之竊鉤者誅竊國者為諸侯諸侯之門仁義存焉非虛言也今拘學成抱咫尺之義久孤於代豈若卑論儕俗與代沈浮而取榮名哉是曰東平王蒼曰為善最樂非曰語曰時不與善己獨由之故曰非妖則妄是曰龐統好人倫勤於長養每所稱述多過於才時人怪而問之統曰當今天下大亂正道凌遲善人少而惡人多方欲興風俗長道業不美其談則聲名不足慕也不足慕企而為善者少矣今拔十失五猶得其半而可以崇邁代教使有志者自勵不亦可乎非曰人物志曰君子知損之為益故功一而美二小人不知自益之為損故伐一而並失由此論之則不伐者伐之也不爭者爭之也讓敵者勝之也是故郤至上人而柳下滋甚王叔好爭而終於出奔藺相如以回車取勝於廉頗寇恂以不鬭取賢於賈復物勢之反乃君子所謂道也是曰孝經曰居家理治可移於官非曰酈生落魄無以為衣食業陳蕃云大丈夫當掃天下誰能掃一室是曰公孫宏曰力行近乎仁好問近乎智知恥近乎勇知此三者知所自理知所以自理然後知所以理人天下未有不能自理而能理人者也此百代不移之道非曰淮南子曰夫審於毫釐之計者必遺天下之數不失小物之選者惑於大事之舉今人才有欲平九州存危國而乃責之以閨閣之禮修鄉曲之俗是猶以斧鬋毛以刀伐木皆失其宜矣是曰商鞅謂趙良曰子之觀我理秦孰與五羖大夫賢乎趙良曰夫五羖大夫荊之鄙人也聞繆公之賢而願望見行而無資自鬻於秦客被褐飯牛繆公知之舉之牛口之下而加之百姓之上秦國莫敢望焉今君之見秦王也因嬖人景監以為主非所以為名也非曰史記曰藺相如因宦者繆賢見趙王又曰鄒衍作談天論其語閎大不經然王公大人尊禮之適梁梁惠王郊迎執賓主之禮如燕昭王擁篲先驅豈與仲尼菜色陳蔡孟軻困於齊梁同乎哉衛靈公問陳於孔子孔子不答梁惠王謀攻趙孟軻稱太王去邠持方柄欲納圜鑿其能入乎或曰伊尹負鼎而輔湯以王百里奚飯牛繆公用霸作先合然後引之大道鄒衍其言雖不軌亦將有牛鼎之意乎是曰陳仲舉體氣高烈有王臣之節李元禮忠平正直有社稷之能陳留蔡伯喈以仲舉強於犯上元禮長於接下犯上為難接下為易宜先仲舉而後元禮非曰姚信云夫皋陶戒舜犯上之徵也舜理百揆接下之效也故陳平謂王陵言面折庭諍我不如公至安劉氏公不如我若犯上為優是王陵當高於良平朱雲當勝於吳鄧乎是曰史記曰韓子稱儒者以文亂法而俠士以武犯禁二者皆譏而學士多稱於世至如以術取宰相卿大夫輔翼其世主固無可言者及若季次原憲季次孔子弟子未嘗仕孔子稱之讀書懷獨行議不苟合當世當世亦笑之今遊俠其行雖不軌於正義然其言必信其行必果已諾必誠不愛其軀赴士之厄困羞伐其德蓋亦有足多者且緩急人之所時有也虞舜窘於井廩伊尹負於鼎俎傅説匿於傅險呂尚困於棘津夷吾桎梏百里奚飯牛仲尼厄匡菜色陳蔡此皆學士所謂有道仁人也猶遭此災況以中材而涉近代之末流乎其遇害何可勝道哉而布衣之徒設取豫然諾千里誦義故士窮窘而得委命此豈非人之所謂賢豪者耶誠使鄉曲之俠與季次原憲比權量力效功於當代不同日而論矣曷足小哉非曰漢書曰天子建國諸侯立家自卿大夫以至庶人各有等差是以人服事其上而下無覬覦孔子曰天子有道政不在大夫百官有司奉法承令以修所職越職有誅侵官有罰故上下相順而庶事理焉周室既微禮樂征伐出自諸侯桓文之後大夫世權陪臣執命陵夷至於戰國合縱連橫力政爭強由是列國公子魏有信陵趙有平原齊有孟嘗楚有春申皆藉王公之勢競為遊俠雞鳴狗盜無不賓禮而趙相虞卿棄國捐君以固窮交魏齊之厄信陵無忌竊符矯命殺將專師以赴平原之急皆以取重諸侯彰名天下扼腕而遊談者以四豪為稱首於是背公死黨之議成守職奉上之義廢矣及至漢興禁網踈闊未之匡改也魏其武安之屬競逐於京師郭解劇孟之徒馳鶩於閭閻權行州域力折公侯衆庶榮其名迹覬而慕之雖陷刑辟自與殺身成名若季路仇牧死而不悔也曾子曰上失其道人散久矣非明王在上示之好惡齊之以禮法人曷由知禁而反正乎古之正法五伯三王之罪人也而六國五伯之罪人也夫四豪者六國之罪人也況於郭解之倫以匹夫之細微竊殺生之權其罪也不容於誅矣是曰尸子曰人臣者以進賢為功人主者以用賢為功也史記曰鮑叔舉管仲天下不多管仲之賢而多鮑叔之能知人也非曰蘇建常責大將軍青至尊重而天下之賢士大夫毋稱焉願觀古今名將所招選擇賢者大將軍謝曰自魏其武安之厚賓客天子嘗切齒彼親附士大夫招賢黜不肖者人主之柄也人臣奉法遵職而已何與招士其為將如此議曰此一是一非皆經史自相違者班固云昔王道既微諸侯力政時君世主好惡殊方是以諸家之術蜂起並作各引一端崇其所善以此馳説取合諸侯其言雖殊譬猶火水相滅亦能相生也仁之與義敬之與和事雖相反而皆相成也易曰天下同歸而殊途一致而百慮此之謂也適變第十五適變第十五昔先王當時而立法度臨務而制事法宜其時則理事適其務故有功今時移而法不變務易而事以古是則法與時詭而時與務易是以法立而時益亂務為而事益廢故聖人之理國也不法古不修今當時而立功在難而能免秦孝公用衛鞅鞅欲變法孝公恐天下議己疑之衛鞅曰疑行無名疑事無功夫有高人之行固見非於世有獨智之慮者必見贅於人愚者暗於成事智者見於未萌人不可與慮始而可與樂成論至德者不和於俗成大功者不謀于衆是以聖人苟可以強國不法其故苟可以利人不修其禮孝公曰善甘龍曰不然聖人不易人而教智者不變法而治因人而教不勞而功成緣法而理吏習而人安衛鞅曰龍之所言世俗之言常人安于習俗學者溺於所聞以此兩者居官守法可也非所與論於法之外也三代不同禮而王五伯不同法而霸智者作法愚者制焉賢者更禮不肖者拘焉杜摯曰利不百不變法功不十不易器法古無過修禮無邪衛鞅又曰治代不一道便國不法古故湯武不修古而王夏殷不易禮而亡反古者不可非而修禮者不足多孝公曰善遂變法也由是言之故知若人者各因其時而建功立德焉孟子曰雖有茲基不如逢時雖有智慧不如逢代范蠡曰時不至不可強生事不究不可強成語曰聖人修備以代時也何以知其然耶桓子曰三皇以道治五帝用德化三皇由仁義五霸用權智説曰無制令刑罰謂之皇有制令而無刑罰謂之帝賞善誅惡諸侯朝事謂之王興兵衆立約盟以信義矯代謂之伯文子曰帝者貴其德也王者尚其義也霸者迫於理也道狹然後任智德薄然後任刑明淺然後任察議曰外建國立功其政不同也如此五帝以上久遠經傳無事唯王霸二盛之美以定古今之理焉秦漢居帝王之位所行者霸事也故以為德之次夫王道之治先除人害而足其衣食論曰五畝之宅樹之以桑匹婦蠶之年五十者可以衣帛矣百畝之田數口之家耕稼修理可以無飢矣雞豚狗彘之畜不失其時老者可以食肉矣夫上無貪欲之求下無奢淫之人藉稅省少而徭役不繁其仕者食祿而已不與人爭利焉是以産業均而貧富不能相懸也然後教以禮儀故明王審己正統慎乃在位宮室輿服不踰禮制九女正序於內三公分職於外制井田以齊之設諸侯以牧之使饒不溢侈少不匱乏然後申以辟雍之化示以揖讓之容是以和氣四塞禍亂不生此聖王之教也而威以刑誅使知好惡去就虞帝先命禹平水土后稷播植百穀契班五教皋陶修刑故天下太平也是故大化四湊天下安樂此王者之術王者父天母地調和陰陽順四時而理五行養黎元而育群生故王之為言往也蓋言其惠澤優遊善養潤天下天下歸往之故曰王也霸功之大者尊君卑臣權統由一政不二門賞罰必信法令著明百官修理威令必行夫霸君亦為人除難興利以富國強兵或承衰亂之後或興兵征伐皆未得遵法度申文理度方而制因時施宜以從便善之計而務在於立功也此霸者之術王道純而任德霸道駮而任法此優劣之差也道德經曰我無為而人自化文子曰所謂無為者非謂引之不來推之不往謂其循理而舉事因資而立功推自然之勢也故曰智而好問者聖勇而好問者勝乘衆人之智即無不任也用衆人之力即無不勝也故聖人舉事未嘗不因其資而用也故曰湯武聖主也而不能與越人乘舲舟泛江湖伊尹賢相也而不能與胡人騎原馬服騊駼孔墨博通也而不能與山居者入榛薄出險阻由是觀之人智之於物淺矣而欲以照海內存萬方不因道里之數而專己之能則其窮不遠故智不足以為理勇不足以為強明矣然而君人者在廟堂之上而知四海之外者因物以識物因人以知人也呂氏春秋曰昊天無形而萬物以成大聖無事而千官盡能此謂不教之教無言之詔也夫冬日之陽夏日之陰萬物歸之而莫之使至精之感弗召自來待目而昭見待言而使令其於理難矣文子曰三月嬰兒未知利害而慈母之愛喻焉者情也故曰言之用者小不言之用者大又曰不言而信不施而仁不怒而威是以天心動化者也施而仁言而信怒而威是以精誠為之者也施而不仁言而不信怒而不威是以外貌為之也皋陶喑而為大理天下無虐刑師曠瞽而為大宰晉國無亂政莊子曰天地有大美而不言四時有明法而不議萬物有成理而不説聖人無為大聖不仵觀於天地之謂也不言之令不視之見聖人所以為師此黃老之術也文子曰聖人所由曰道所為曰事道猶金石一調不可更事猶琴瑟每終而改調故法制禮樂者理之具也非所以為理也昔曹參相齊其治要用黃老術齊國安集及代蕭何為漢相參去屬其後相曰以治齊獄市為寄慎勿擾也後相曰治無大於此者乎參曰不然夫獄市者所以并容也今君擾之姦人安所容乎吾是以先之由是觀之秦人極刑而天下叛孝武峻法而獄繁此其弊也經曰我無為而人自化我好靜而人自正參欲以道化其本不欲擾其末也太史公曰參為漢相清淨寡欲言合道意然百姓離秦之酷擾參與俱息無為故天下俱稱其美矣議曰黃老之風蓋帝道也孔子間居謂曾參曰昔者明王內修七教外行三至七教修而可以守三至行而可以征明王之守也則必折衝千里之外其征也還師衽席之上曾子曰敢問七教孔子曰上敬老則下益孝上敬齒則下益悌上樂施則下益亮上親賢則下擇交上好德則下無隱上惡貪則下恥爭上廉讓則下知節此之謂七教也七教者治之本也教定則本正矣凡上者人之表也表正則何物不正也昔明王之治人也必裂而封之分屬而理之使有司月省而時考之進賢退不肖然則賢良者悅不肖者懼矣哀鰥寡養孤獨恤貧窮誘孝悌選才能此七者修則四海之內無刑人矣上之親下也如腹心則下之親上也如幼子之於慈母矣其於信也如四時而人信之也如寒暑之必驗故視遠若邇非道邇也見明德也是以兵革不動而威用利不施而親此之謂明王之守折衝千里之外者也議曰昔管子謂齊桓公曰君欲霸王舉大事則必從其本矣夫齊國百姓公之本也人甚憂飢而稅斂重人甚懼死而刑政險人甚傷勞而上舉事不時公輕其稅緩其刑舉事以時則人安矣此謂修本而霸王也曾子曰何謂三至孔子曰至禮不讓而天下理至賞不費而天下之士悅至樂無聲而天下之人和何則昔者明王必盡知天下良士之名既知其名又知其實既知其實然後因天下之爵以尊之此謂至禮不讓而天下治因天下之祿以富天下之士此之謂至賞不費而天下之士悅如此則天下之明譽興焉此謂之至樂無聲而天下之人和故曰所謂天下之至仁者能合天下之至親所謂天下之至智者能用天下之和所謂天下之至明者能舉天下之至賢也故仁者莫大於愛人智者莫大於知賢政者莫大於能官有德之君修此三者則四海之內供命而已矣此之謂折衝千里之外夫明王之征必以道之所廢誅其君改其政弔其人而不奪其財也故曰明王之征猶時雨之降至則悅矣此之謂還師衽席之上言安而無憂也故揚雄曰六經之理貴於未亂兵家之勝貴於未戰此孔氏之術也議曰孔氏之訓務德行義蓋王道墨子曰古之人未知為宮室就陵阜而居穴而處故聖王作為宮室為宮室之法高足以避潤濕邊足以圉風寒宮牆之高足以別男女之禮謹此則止不以為觀樂也故天下之人財用可得而足也當今之王為宮室則與此異矣必厚斂於百姓以為宮室臺榭曲直之望青黃刻鏤之飾為宮室若此故左右皆法而象之是以其財不足以待凶飢振孤寡故國貧而難理也為宮室不可不節議曰此節宮室者也古之人未知為衣服時衣皮帶茭冬則不輕而暖夏則不輕而清聖王以為不中人之情故聖人作誨婦人以為人衣為衣服之法冬則練帛足以為輕暖夏則絺綌足以為輕清謹此則止非以榮耳目觀愚人也是以其人用儉約而易治其君用財節而易贍也當今之王其為衣服則與此異矣必厚斂於百姓以為文采靡曼之衣鑄金以為鉤珠玉以為佩由此觀之其為衣服非為身體此為觀好也是以其人淫僻而難治其君奢侈而難諫夫以奢侈之君御淫僻之人欲國無亂不可得也為衣服不可不節議曰此節衣服者也此墨翟之術也議曰墨家之議去奢節用蓋強本道商子曰法令者人之命也為治之本慎子曰君人者捨法而以身治則受賞者雖富望多無窮受罰者雖當望輕無已君捨法而以心裁輕重怨之所由生也是以分馬者之用策分田者之用鉤非以鉤策為過人之智也所以去和塞怨也故曰大君任法而不躬為則怨不生而上下和也一兔走百人逐之非以兔可分為百由名分之未定也賣兔滿市盜不敢取者由名分之定也故名分未定雖堯舜禹湯且皆加務而逐之名分已定則貧盜不敢取故聖人之為法令也置官也置吏也所以定分也尸子曰夫使衆者詔作則遲分地則速是何也無所逃其罪也言亦有地不可不分君臣同地則臣有所逃其罪矣故陳繩則木之枉者有罪審名分則群臣之不審者有罪矣名分定則大詐貞信巨盜願愨而各自治也尹文子曰名定則物不競分明則私不行物不競非無心由名定故無所措其心私不行非無欲由分明故無所措其欲然則心欲人人有之而得同於無心無欲者在制之有道故也申子曰君如身臣如手君設其本臣操其末為人君者操契以責其名名者天地之網聖人之符張天地之網用聖人之符則萬物無所逃矣議曰韓子曰人主者非目若師曠乃為明也不任其數而待目以為明所見者少矣非不弊之術也不因其勢而待耳以為聰所聞者寡矣非不欺之道也明主者使天下不得不為己視使天下不得不為己聽身居深宮之中明燭四海之內而天下不能蔽不能欺者何也匿罪之罰重而告姦之賞厚也孫卿曰明職分序事業材伎官能莫不治理如是則厚德者進廉節者起兼聽齊明而百事無留故天子不視而見不聽而聞不慮而知不動而功塊然獨坐而天下從之此操契以責名者也尸子曰明君之立其貌莊其心虛其視不躁其聽不淫審分應辭以立於朝則隱匿疏遠雖有非焉必不多矣明君不長耳目不行間諜不強聞見形至而觀聲至而聽事至而應近者不過則遠者理矣明者不失則微者敬矣此萬物無所逃也動者搖靜者安名自名也事自定也議曰尸子曰治水潦者禹也播五穀者后稷也聽獄折衷者皋陶也舜無為也而為天下父母此則名自名也太公謂文王曰天有常刑人有常生與天人共其生者而天下靜矣此則事自定之矣是以有道者因名而正之隨事而定之尹文子曰因賢者之有用使不得不用因愚者之無用使不得用用與不用各得其用奚患物之亂也尸子曰聽朝之道使人有分有大善者必問其孰進之有大過者必問其孰任之而行罰賞焉且以觀賢不肖也明分則不弊正名則不虛賢則貴之不肖則賤之賢不肖忠不忠以道觀之由白黑也昔者堯之治天下也以名其名正則天下治桀之治天下也亦以名其名倚而天下亂是以聖人貴名之正也議曰夫暗主以非賢為賢不忠為忠非法為法以名之不正也李斯書曰韓子稱慈母有敗子而嚴家無格虜者何也則罰之加焉必也故商君之法刑棄灰於道者夫棄灰薄罪也而被刑重罰也夫輕罪且督而況有重罪乎故人弗敢犯矣今不務所以不犯而事慈母之所以敗子則亦不察於聖人之論矣商君之法皆令為什伍而相司牧犯禁相連於不告姦者明尊卑爵秩等級各以差次田宅妻妾衣服以家次有功者顯榮無功者雖富無芬華務於耕戰此商君之法也此商鞅申韓之術也桓範曰夫商鞅申韓之徒貴尚譎詐務行苛剋廢禮義之教任刑名之數不師古始敗俗傷化此則伊尹周召之罪人也然其尊君卑臣富國強其守法持術有可取焉逮至漢興有寧為戚郅都之輩放商韓之治專以殺伐殘暴為能順人主之意希旨而行安時趨利敢行禍敗此又商韓之罪人也然其抑強族撫孤弱清己禁姦背私立公尚有政焉至於晚代之所謂能者乃犯公家之法赴私門之勢廢百姓之務趨人間之事決煩理務臨時苟辨使官無譴負之纍不省下人之冤復是申韓寧郅之罪人也由是觀之故知治天下者有王霸焉有黃老焉有孔墨焉有申商焉此其所以異也雖經緯殊致救弊不同然康濟群生皆有以矣今議者或引長代之法詰救弊之言議曰救弊為夏人尚忠殷人尚敬周人尚文者或引帝王之風譏霸者之政不論時變而務以飾説故是非之論紛然作矣言偽而辨順非而澤此罪人也故君子禁之正論第十六正論第十六孔子曰六藝於理一也禮以節人樂以發和書以導事詩以達意易以道化春秋以道義司馬談曰易著天地陰陽四時五行故長於變禮經紀人倫故長於行書記先王之事故長於政詩記山川溪谷禽獸草木牝牡雌雄故長於風樂所以立故長於和春秋辨是非故長於理人也故曰入其國其教可知也其為人也溫柔敦厚詩教也疏通知遠書教也廣博易良樂教也潔靜精微易教也恭儉莊敬禮教也屬辭比事春秋教也故詩之失愚書之失誣樂之失奢易之失賊禮之失煩春秋之失亂其為人也溫柔敦厚而不愚則深於詩也子夏曰聲成文謂之音治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其人困故正得失動天地感鬼神莫近於詩太史公曰大雅言王公大人而德逮黎庶小雅譏己之得失其流及上所言雖殊其合德一也晉時王政陵遲南陽魯褒著錢神論吳郡蔡洪作孤憤前史以為亂世之音怨以怒其政乖此之謂也疏通知遠而不誣則深於書也書著帝王之道典謨訓誥誓命之文三千之徒並受其義也廣博易良而不奢則深於樂也樂書曰凡音者生人心者也情動其中故形於聲聲成文謂之音是故治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其人困聲音之道與政相通宮為君商為臣角為人徵為事羽為物五者不亂則無惉懘之音矣宮亂則荒其君驕商亂則捶其臣壞角亂則憂其人怨徵亂則哀其事勤羽亂則危其材匱五者皆亂迭相陵謂之慢如此國滅亡無日矣夫上古明王舉樂者非以娛心快意所以動蕩血脈流通精神而和正心也故宮動脾而和正信商動肺而和正義角動肝而和正仁徵動心而和正禮羽動腎而和正智故聞宮音者使人溫舒而廣大聞商音者使人方正而好義聞角音者使人惻隱而愛人聞徵音者使人樂善而好施聞羽音者使人整齊而好禮夫禮由外入樂自內出故聖王使人耳聞雅頌之音目視威儀之禮足行恭敬之容口言仁義之道故君子終日言而邪僻無由入也班固曰樂者聖人之所樂也而可以善人心其感人也深故先王著其教焉夫人有血氣心知之性而無哀樂喜怒之常應感而動然後心術形焉故纖微憔悴之音作而民思憂闡諧慢易之音作而民康樂粗厲猛奮之音作而民剛毅廉直正誠之音作而民肅敬寬裕和順之音作而民慈愛流僻邪散之音作而民淫亂先王恥其亂也故制雅頌之聲本之情性稽之度數制之禮義合生氣之和導五常之行使之陽而不散陰而不集剛氣不怒柔氣不懾四暢交於中而發作於外足以感入之善心而不使邪氣得接焉是先王立樂之方也呂氏春秋曰亡國戮人非無樂也其樂不樂溺者非不笑也罪人非不歌也狂者非不舞也亂世之樂有似人此范曄曰夫鍾鼓非樂之本而器不可去三牲非孝之主而養不可廢夫存器而亡本樂之失也調氣以和聲樂之盛也崇養以傷行孝之纍也行孝以致養孝之大也議曰東方角主仁商方徵主禮中央宮主信西方商主義北方羽主智此常理也今太史公以為徵動心而和正智羽動腎而和正禮則以徵主智羽主禮與舊例乖殊故非末學所能詳也潔淨精微而不賊則深於易也易之精微愛惡相攻遠近相取則不能容人近於相害恭儉莊敬而不煩則深於禮也太史公曰余至大行禮官觀三代損益乃知緣人情而制禮依人性而作儀人道經緯万端規矩無所不貫誘進以仁義束縛以刑罰故德厚者位尊祿重者寵榮所以總一海內而整齊万人也人體安駕乘為之金輿鏓衡以繁其飾目好五色為之黼黻文章以表其能耳樂鍾磬為之調諧八音以蕩其心口甘五味為之庶羞駿鹹以致其美情好珍善為之琢磨圭璧以通其意故大路越席皮辨布裳朱絃洞越大羹玄酒所以防其淫佚救其弊也是以君臣朝廷尊卑貴賤之序下及黎庶車輿衣服宮室飲食嫁娶喪祭之分事有適宜物宜節文周衰禮廢樂壤大小相踰管仲之家遂備三歸循法守正者見侮於世奢溢僭差者謂之顯榮自子夏門人之高弟也猶云出見粉華盛麗而悅入聞夫子之道而樂二者心戰未能決而況中庸以下漸漬於失教被服於成俗乎孔子必正名於衛所居不合豈不哀哉班固曰人函天地陰陽之氣有喜怒哀樂之情天稟其性而不節也聖人能為之節而不能絶也故象天地而制禮樂所以通神明立人倫正情性節萬事也人性有男女之情妒忌之別為制婚姻之禮有交接長幼之序為制鄉飲之禮有哀死思遠之情為制喪祭之禮有尊尊敬上之心為制朝覲之禮哀有哭踊之節樂有歌舞之容正人足以副其誠邪人足以防其失故婚姻之禮廢則夫婦之道苦而淫僻之罪多鄉飲之禮廢則長幼之序亂而爭鬭之獄煩喪祭之禮廢則骨肉之恩薄而背主忘生者衆朝聘之禮廢則君臣之位失而侵淩之漸起故孔子曰安上治人莫善於禮移風易俗莫善於樂揖讓而治天下者禮樂之謂也屬辭比事而不亂則深於春秋也壺遂曰昔孔子何為作春秋哉太史公曰余聞之董生曰由周道衰微孔子為魯司寇諸侯害之大夫壅之孔子知言之不用道之不行也是非二百四十二年之中以為天下儀表貶天子退諸侯討大夫以達王事而已矣子曰我欲載之空言不如見之於行事之深切著明也夫春秋上明三王之道下辨人事之紀別嫌疑明是非定猶豫善善惡惡賢賢賤不肖存亡國繼絶代補弊起廢王道之大者也撥亂代反之正道莫近於春秋春秋之中弒君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數察其所以皆失其本也壺逐曰孔子之時上無明君下不得任用故作春秋垂空文以斷禮義當一王之法今夫子上遇明天子下得守職夫子所論欲以何明太史公曰伏羲至純厚作易八卦堯舜之盛尚書載之禮樂作焉湯武之隆詩人歌之春秋採善貶惡推三代之德褒周室非獨刺譏而已漢興以來至明天子受命於穆清澤流四極臣下百官力誦聖德猶不能宣盡其意且士賢能而不用有國之恥也主上明聖而德不布聞有司之過也且余掌其官廢明聖罪莫大焉余所謂述非所謂作也而君比之於春秋謬矣自仲尼沒而微言絶七十子喪而大義乖戰國縱橫真偽分爭諸子之言紛然散亂矣儒家者蓋出於司徒之官助人君順陰陽明教化者也遊文於六經之中留意於仁義之際祖述堯舜憲章文武宗師仲尼此其最高也然惑者既失精微而僻者又隨時抑揚違離道本苟以譁衆取寵此僻儒之患也司馬談曰儒者博而寡要勞而少功是以其事難盡從然其敘君臣父子之禮列夫婦長幼之別不可易也夫儒者以六藝為法經傳以十數纍世不能通具學常年不能究其禮故曰博而寡要勞而少功若夫列君臣父子之禮序夫婦長幼之別雖百家弗能易也范曄曰夫遊庠序服儒衣所談者仁義所傳者聖法也故人識君臣父子之綱家知違邪歸正之路自桓靈之間朝綱日陵國隙屢啓中智以下靡不審其崩離而剛強之臣息其窺盜之謀豪俊之夫屈於鄙生之義者民誦先王之言也下畏逆順之勢也至如張溫皇甫嵩之徒功定天下之半聲絶四海之表俯仰顧則大業移矣猶鞠躬惛主之下狼狽折禮之命散成兵就繩約而無悔心者斯豈非學者之效乎故先師褒勵學者之功篤矣道家者蓋出於史官歷紀成敗秉要執本清虛以自守卑弱以自持此君人南面者之術也合於堯之克讓易之謙謙此其所長也及放者為之則欲絶去禮樂兼棄仁義獨任清虛何以為治此道家之弊也司馬談曰道家使人精神專一動合無形贍足萬物其為術也因陰陽之大順采儒墨之善撮名法之要與時遷徙應物變化立信施事無所不宜指約而易操事少而功多夫道家無為又曰無不為其實易行其辭難知其術所虛無為本以因循為用無成勢無常形故能究萬物之情不為物先不為物後故能為萬物主有法無法因時為業有度無度因無與合故曰聖人不巧時變是守虛者道之常因者君之網群臣並至使各自明也陰陽家者蓋出於羲和之官敬順昊天曆象日月星辰敬授人時此其所長也及拘者為之則牽於禁忌泥於小數捨人事而任鬼神此陰陽之弊也司馬談曰陰陽之術大詳而衆忌諱使人拘而多畏然其敘四時之大順不可失也夫陰陽四時八位十二度二十四節各有教令順之者昌逆之者亡未必然也故曰使人拘而多忌夫春生夏長秋收冬臧此天之大經弗順則無以為天下紀綱故曰敘四時之大順不可失也漢書曰天人之際精䘲有以相蕩善惡有以相推事作乎下者象動乎上陰陽之理各應其感陰變則靜者動陽蔽則明者暗水旱之災隨類而至故曰日蝕地震皆陽微陰盛也臣者君之陰也子者父之陰也妻者夫之陰也夷狄者中國之陰也春秋日蝕三十六地震五十二或夷狄侵中國或政權在臣下或婦棄夫或臣子背君父事雖不同其類一也是以明王即位正五事五事者貌言視聽思也建大中以承天心則庶徵序於下日月理於上如人君淫溺後宮般樂遊田五事失於躬大中之道不立則各徵降而六極至凡災異之發各象過失以類告人傳曰田獵不宿飲食不享出入不節奪人農時及有姦謀則木不曲直又曰棄法律遂功臣殺太子以妾為妻則火不炎上又曰好治宮室飾臺榭內淫亂犯親戚侮父兄則稼穡不成又曰好攻戰輕百姓飾城郭侵邊城則金不從革又曰簡宗廟不禱祠廢祭祀逆天時則水不潤下管輅曰貴人有事其應在天在天則日月星辰也兵動人憂其應在物在物則山林鳥獸也又曰夫天雖有大象而不能言故運星精於上流神明于下驅風雲以表異役鳥獸以通靈表異者必有沈浮之候通靈者必有宮商之應是以宋襄失德六鶂退飛伯姬將焚鳥鳴其哭四國未火融風已發赤雲夾日殃在荊楚此乃上天之所使自然之明符也後漢竇武上書曰間者有喜禾芝草黃龍之瑞見夫瑞生必於嘉土福至實由吉人在德為瑞無德為災陛下所行不合天意不宜稱慶又裴楷曰按春秋以來及古帝王未有河清者也臣以為河者諸侯位也清者屬陽濁者屬陰河當濁而反清者陰欲為陽諸侯欲為帝也京房易傳曰河水清天下平今天垂異地吐夭民癘疫三者並時而有河清猶春秋麟不當見而見孔子書以為異也魏青龍中張掖郡玄川溢湧寶石負鼎狀麟鳳龍馬炳煥成形時人以為魏瑞任令于綽齎以問張臶臶密謂綽曰夫神以知來不追已往以禎祥先見然後廢興從之漢已久亡魏已得之何所追興禎祥乎此石當今之變異而將來之禎祥後司馬氏果代魏漢武時並為上致神君神君但聞其聲不見其形荀悅曰易稱有天道焉有地道焉有人道焉各當其理而不相亂亂則有氣變而然若夫大石自立僵柳復生此形之異也男化為女死而復生此含氣之異也鬼神髣佛在于人間言語音聲此精神之異也夫形神之異各以類感善則生吉惡則生凶精氣之際自然之符異也故逆天之理則神失其節而妖神事興逆地之理則形失其節而妖人妄生逆中和之理則含氣失其節而妖物妄出此其大旨也若夫神君之類精神之異也春秋傳曰作事不時怨讟動于人則有非言之物而言當漢武之時賦斂繁衆人民雕弊故有無形而言至也其於洪範言僭則生時妖此蓋怨讟而生妖之類也故通于道者正身則萬物精神形氣各反其本也後漢陳蕃上書曰昔春秋之末周德衰微數十年間無復災眚者天所棄也天之於漢恨恨無已故殷勤示變以悟陛下除妖去孽實在修德故周書曰天子見怪則修德諸侯見怪則修政大夫見怪則修職士庶見怪則修身神不能傷道妖不能害德漢書曰夫動人以行不以言應天以實不以文此天人之大略也法家者蓋出於理官信賞必罰以輔禮制此其所長也及刻者為之則亡教化去仁愛專任刑法而欲以致治至於殘賊至親傷恩薄厚此法家之弊也司馬談曰法家嚴而少恩然其正君臣上下之分不可改也夫法家不別親疏不殊貴賤一斷於法則親尊親尊之恩絶矣可使行一時之計而不可長用也故曰嚴而少恩至於尊主卑臣明職分不相踰越雖百家不能改也名家者蓋出於禮官古者名位不同禮亦異數孔子曰必也正名乎此其所長也及譥者為之譥音工鈞反則苟鉤鈲析亂而已此名家之弊也司馬談曰名家使人檢而善失真然其正名實不可不察也夫名家苛察繳繞使人不得反其意專決於名時失人情故曰使人檢而善失真若夫控名責實參伍不失此不可不察也鈲音普覓反墨家者蓋出於清廟之官茅屋采椽是以貴儉養三老五更是以兼愛選士大射是以上賢宗祀嚴父是以右鬼右信也順四時而行是以非命言無吉凶之命但有賢不肖善惡也以孝示天下是以上同言皆同於治也此其所長也及蔽者為之見儉之利因以非禮推樂愛之意而不知別親疏此墨家之弊也司馬談曰墨者儉而難遵是以其事不可偏循然其強本節用不可廢也夫墨者亦上論堯舜言其德行曰堂高三尺上階三等茅茨不翦采椽不斫飯土簠啜土刑糲粱之食藜藿之羹夏日葛衣冬日鹿裘其送死桐棺三寸舉音不盡其哀教喪禮必以此為萬人之率故天下法若此則尊卑無別也夫世異時移事業不同故曰儉而難遵要曰強本節用則家給人足之道此墨家之所長雖百家莫能廢也漢武帝問董仲舒策曰蓋儉者不造元黃旌旗之飾及至周室設兩觀乘大輅八修陳於庭而頌聲興夫帝王之道豈異旨哉對曰制度文彩元黃之飾所以明尊卑異貴賤而勸有德也故春秋受命所先制者改正朔易服色所以應天也然則宮室旌旗之制有法而然者也孔子曰奢則不遜儉則固儉非聖人之中制故曰奢不僭上儉不逼下此王道也橫縱家者蓋出於行人之官孔子曰使乎使乎言當權事制宜受命而不受辭此其所長也及邪人為之則上詐諼許遠反而棄其信此縱橫之弊也荀悅曰世有三遊德之賊也一曰遊俠二曰遊説三曰遊行夫立氣勢作威福結私交以立強於世者謂之遊俠飾辨辭設詐謀馳逐於天下以要時世者謂之遊説色取人合時好連黨類立虛譽以為權利者謂之遊行此三者亂之所由生傷道害德敗法惑世先王之所慎也凡三遊之作生於季世周秦之末尤甚焉上不明下無正制度不立綱弛廢以毀譽為榮辱不核其真以愛憎為利害不論其實言論者計厚薄而吐辭選舉者度親疏而下筆然則利不可以義求害不可以道避是以君子犯禮小人犯法飾華廢實競取時利薄骨肉之恩篤僚友之厚忘修身之道而求衆人譽苞苴盈於門庭聘問盈於道路於是流俗成而正道壞矣遊俠之本生於武毅不撓久要不忘平生之言見危受命以救時難而濟同類以正行之者謂之武義其失之甚者至於為盜賊矣遊説之本生於是非使於四方不辱君命出疆有可以安社稷利國家則專對解結之辭之繹矣民之瘼矣以正行之者謂之辨智其失之甚者至於詐矣遊行之本生於道德仁義泛愛容衆以文會友和而不同進德及時以立功業於世以正行之者謂之君子其失之甚者至於因事害私為姦宄矣甚相殊遠豈不哀哉故大道之行則三遊廢矣雜家者蓋出於議官兼儒墨合名法知國體之有此見王理之無不貫此其所長也及蕩者為之則漫羡而無所歸心此雜家之弊也農家者蓋出於農稷之官播百穀勸耕桑以足衣食孔子曰所重人食此其所長也及鄙者為之則欲君臣之並耕悖於上下之序此農家之弊也班固曰馬遷史記其是非頗謬於聖人論大道則先黃老而後六經序遊俠則退處士而進姦雄述貸殖則崇利勢而羞賤貧此其所弊也然其善序事理辨而不華質而不俚其文直事核不虛美不隱惡故世謂之實録文子曰聖人之從事也所由異路而同歸秦楚燕魏之歌異轉而皆樂九夷八狄之哭異聲而皆哀夫歌者樂之微也哭者哀之效也愔愔於中而應於外故在所以感之矣論曰范曄稱百家之言政者尚矣大略歸乎寧固根柢革易時弊也而遭運無恆意見偏雜故是非之論紛然相乖嘗試論之夫世非胥庭人乖鷇飲理迹万肇情故萌生雖周物之智不能研其權變山川之奧未足況其紆險則應俗適事難以常條何以言之若夫元聖御代則大同極軌施捨之道宜無殊典而損益異運文朴遞行用明居晦回穴於曩時興戈陳俎參考於上世及至戴黃屋服絺衣豐薄不齊而致治則一亦有宥公族黥國讎寬躁已隔而防非必同此其分波而共源百慮而一致者也若乃偏情矯用則枉直必過故葛屨履霜弊由崇儉楚楚衣服戒在窮奢疏禁厚下以尾大陵弱斂威峻法以苛薄分崩斯曹魏之刺所以明乎國風周秦末軌所以彰於微滅故用捨之端興敗資焉是以繁簡唯時寬猛相濟刑書鐫鼎事有可詳三章在令取貴能約大叔致猛政之衰國子流遺愛之涕宣孟改冬日之和平陽修畫一之法斯實弛張之宏致庶可以徵其統乎數子之言當世失得皆悉究矣然多謬通方之訓好中一隅之説貴清淨者以席上為腐議束名實者以柱下為誕辭或推前王之風可行於當年有引救弊之規宜流於長世稽之篤論將為弊矣由此言之故知有法無法因時為業時止則止時行則行動不失其時其道光明非至精者孰能通於變哉
