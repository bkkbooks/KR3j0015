body:
  text: 卷第九趙子曰詩云允文允武書稱乃武乃文孔子曰君子有文事必有武備傳曰天生五材民並用之廢一不可誰能去兵黃帝與蚩尤戰顓頊與共工爭堯伐歡兜舜伐有苗啓伐有扈湯伐有夏文王伐崇武王伐紂漢高有京索之戰光武興昆陽之師魏動官渡之軍晉舉平吳之役故呂氏春秋曰聖王有仁義之兵而無偃兵淮南子曰以廢不義而授有德者也是知取威定霸何莫由斯自古兵書殆將千計若不知合變雖多亦奚以為故曰少則得多則惑所以舉體要而作兵權云夫兵者凶器也戰者危事也兵戰之場立尸之所帝王不得已而用之矣凡天有白雲如匹布經丑未者天下多兵赤者尤甚或有雲如匹布竟天或有雲如胡人行列陳皆天下多兵或壬子日四望無雲獨見赤雲如旌放天下兵起若遍四方者天下盡兵或四望無雲獨見黑雲極天亦天下兵起三日內有雨災解或有赤雲赫然者所見之地兵大起凡有白雲如仙人衣千萬連結部隊相逐罷而復興當有千里兵或有如人持刀楯此暴兵氣也或有白雲廣六丈東西竟天者亦兵起也青者有大喪也故曰救亂誅暴謂之義兵兵義者王敵加於己不得已而用之謂之應兵應兵者勝爭恨小故不勝憤怒者謂之忿兵兵忿者敗利人土地寶貨者謂之貪兵兵貪者破恃國之大矜人之衆欲見威於敵謂之驕兵兵驕者滅夫禁暴救亂曰義兵可以禮服恃衆以伐曰強兵可以謙服因怒興師曰剛兵可以辭服棄禮貪利曰暴兵可以詐服國危人疲舉事動衆曰逆兵可以權服是知聖人之用兵也非好樂之將以誅暴討亂夫以義而誅不義若決江河而溉螢火臨不測之淵而欲墮之其克之必也所以必優遊恬泊者何重傷人物故曰遠人不服則修文德以來之不以德來然後命將出師矣夫將者國之輔也人司命也故曰將不知兵以其主與敵也君不擇將以其國與敵也將既知兵主既擇將天子居正殿而召之曰社稷安危一在將軍今某國不臣願煩將軍應之乃使太史卜齋擇日授以釜鉞君入太廟西面而立將軍北面而立君親操鉞持其首授其柄曰從是以上至天者將軍制之乃復操柄授與刃曰從是以下至淵者將軍制之將既受命拜而報曰臣聞國不可從外理軍不可從中御二心不可以事君疑志不可以應敵臣既受命專釜鉞之威臣不敢還諸乃辭而行鑿凶門而出故司馬法曰進退唯時無曰寡人孫子曰將在軍君命有所不受古語曰閫以內寡人制之閫以外將軍制之漢書曰唯聞將軍之命不聞天子之詔故知合軍聚衆在於閫外受推轂之寄當秉旄之重無天於上無地於下無敵於前無君於後乃可成大業矣故曰將能而君不御者勝此之謂也夫王者帥師必簡練英雄知士高下因能授職各取所長為其股肱羽翼以成威神然後萬事畢矣腹心一人主贊謀應卒揆天消變總撮計謀保國全命者也謀士五人主國安危豫慮未然諭才能明賞罰授官位決嫌疑定可否者也天文三人主占星歷候風氣理時日考符驗校災異知天心去就者也地形三人主軍行止形勢利害遠近險易水涸山阻不失地理者也兵法九人主講論異同行事成敗簡練兵器凡軍陳所用刺舉非法者也通糧四人主廣飲食密畜積通糧道致五穀令三軍不困乏食者也奮威四人主擇材士諭兵馬風馳電擊不失所由奇仗也鼓旗三人主佐鼓旗符節號令倏忽往來出入若神股肱四人主出旌桿任重持難修溝塹治壁壘四轉守禦者也通材三人主拾遺補過集會術數周流並會應偶賓客議論談語消患解結權士三人主奇譎殊異非人所識行無窮之變也耳目七人主往來聽言語覽視四方之事軍中之情偽日列於前也爪牙五人主揚威武激厲三軍冒難鋭攻令三軍勇猛也羽翼四人主飛名譽震遠近動移四境以弱敵心者遊士八人主相徵祥候開闔視敵人為謀者也術士二人主為譎詐依託鬼神以惑敵心法算二人主計會三軍領埋方物也方士二人主為藥以全傷病也軍中有大勇敢死樂傷者聚為一卒名曰冒刃之士有勃氣壯勇暴強者聚為一卒名曰陷陳之士有學於奇正長劍雕弧接武齊列者聚為一卒名曰鋭騎之士有破格舒鉤強梁多力能潰破金鼓絶滅旌旗者聚為一卒名曰勇力之士有能踰高超遠輕足善走者聚為一卒名曰冠兵之士有故王臣失勢欲復見其功者聚為一卒名曰死鬭之士有死罪之人昆弟為其將報仇者聚為一卒名曰死憤之士有貧窮忿怒將快其志者聚為一卒名曰必死之士有故贅壻入虜欲昭迹揚名者聚為一卒名曰厲頓之士有辨言巧辭善毀譽者聚為一卒名曰簡諜飛言弱敵之士有故胥靡免罪之人欲逃其恥者聚為一卒名曰幸用之士有材伎過人能負重行數百里者聚為一卒名曰待令之士夫卒強將弱曰弛吏強卒弱曰陷兵無先鋒曰北必然之數矣故曰兵衆孰強士卒孰練知之者勝不知之者不勝不可忽也太公曰出軍征戰安營置陳以六為法六者謂六百步亦可六十步量人地之宜置表十二辰也將軍自居九天之上青龍亦為九天若行止顧宿居玉帳下凡月建前三辰為玉帳假令正月巳地是也竟一旬復徙開牙門常背建向破不向太歲太陰不飲死水不居死地不居地柱不居地獄無休天竈無當龍首死水者不流水也死地者丘墓之間地柱者下中之高地獄者高中之下天灶者谷口也龍首者山端也故曰凡結營安陳將軍居青龍軍鼓居逢星士卒居明堂伏兵於太陰軍門居天門小將居地戶斬斷居天獄治罪居天庭軍糧居天牢軍器居天藏此謂法天結營物莫能害者也假令甲子旬中子為青龍丑為逢星寅為明堂卯為太陰辰為天門巳為地戶午為天獄未為天庭申為天牢酉為天藏甲戌旬中戌為青龍亥為逢星子為明堂丑為太陰寅為天門卯為地戶辰為天獄巳為天庭午為天牢未為天藏甲申旬中申為青龍酉為逢星戌為明堂亥為太陰子為天門丑為地戶寅為天獄卯為天庭辰為天牢巳為天藏甲午旬中午為青龍未為逢星申為明堂酉為太陰戌為天門亥為地戶子為天獄丑為天庭寅為天牢卯為天藏甲辰旬中辰為青龍巳為逢星午為明堂未為太陰申為天門酉為地戶戌為天獄亥為天庭子為天牢丑為天藏甲寅旬中寅為青龍卯為逢星辰為明堂巳為太陰午為天門未為地戶申為天獄酉為天庭戌為天牢亥為天藏夫兵不可出者三不和於國不可以出軍不和於軍不可以出陳不和於陳不可以出戰故孫子曰一曰道道者令人與上同意者也故可與之死可與之生而人不畏危危疑也言主上素有仁施於下則士能致前赴敵故與處存亡之難不畏傾危之敗若晉陽之圍沈竈生蛙而民無叛疑也黃石公曰軍井未達將不言渴軍幕未辦將不言倦冬不服裘夏不操扇是謂禮將與之安與之危故其衆可合而不可離可用而不可疲接之以禮勵之以辭厲士以見危授命之辭也則士死之是以含蓼問疾越王霸於諸侯吮疽恤士吳起淩於敵國陽門慟哭勝三晉之兵單醪投河感一軍之士勇者為之鬭智者為之憂視死若歸計不旋踵者以其恩養素畜策謀和同也故曰畜恩不倦以一取萬語曰積恩不已天下可使此道德之略也孫子曰卒未專親而罰之則不服不服則難用卒已專親而罰不行則不可用矣故曰視卒如嬰兒故可與之赴深溪視卒如愛子故可與之居死地厚而不能使愛而不能令亂而不知理譬若驕子不可用也經曰兵以賞為表以罰為裏又曰令之以文文惠也齊之以武武法是謂必取故武侯之軍禁有七孫子曰無法之懸無政之令司馬法曰見敵作誓瞻功作賞此蓋圍急之時不可格以常制其敵國理戎周旋中野機要綱目不得不預領矣一曰輕二曰慢三曰盜四曰欺五曰背六曰亂七曰誤此治軍之禁也若期會不到聞鼓不行乘寬自留回避務止初近而後遠喚名而不應軍甲不具兵器不備此謂輕軍有此者斬之受令不傳傳之不審以惑吏士金鼓不聞旌旗不覩此謂慢軍有此者斬之食不廩糧軍不部兵賦賜不均阿私所親取非其物借貸不還奪人頭首以獲功名此謂盜軍有此者斬之若變易姓名衣服不鮮金鼓不具兵刃不磨器仗不堅矢不著羽弓弩無絃主者吏士法令不從此謂欺軍有此者斬之聞鼓不行叩金不止按旗不伏舉旗不起指麾不隨避前在後縱發亂行折兵弩之勢卻退不鬭或左或右扶傷輿死因託歸還此謂背軍有此者斬之出軍行將士卒爭先紛紛擾擾軍騎相連咽塞道路後不得前呼喚喧譁無所聽聞失行亂次兵刃中傷長將不理上下縱橫此謂亂軍有此者斬之屯營所止問其鄉里親近相隨共食相保呼召不得越入他位干誤次第不可呵止度營出入不由門戶不自啓白姦邪所起知者不告罪同一等合人飲食阿私所受大言驚語疑惑吏士此謂誤軍有此者斬之斬斷之後萬事乃理所以鄉人盜笠呂蒙先涕而後斬馬逸犯麥曹公割髮而自刑故太公曰刑上極賞下通孫子曰法令孰行賞罰孰明吾以此知勝此之謂也孔子曰不教人戰是謂棄之故知卒不服習起居不精前擊後解與金鼓之音相失百不當一此棄之者也故領三軍教之戰者必有金鼓約令所以整齊士卒也教令操兵起居旌旗指麾之變故教使一人學戰教成合之十人十人學戰教成合之百人漸至三軍之衆大戰之法為其校陳各有其道左校青龍右校白虎前校朱雀後校亥武中校軒轅大將之所處右鋒左戟前楯後弩中央鼓旗興動俱起聞鼓則進聞金則止隨其指麾五陳乃理夫五陳之法鼓旗為主一鼓舉青旗則為曲陳二鼓舉赤旗則為鋭陳三鼓舉黃旗則為員陳四鼓舉白旗則為方陳五鼓舉黑旗則為直陳曲陳者木也鋭陳者火也員陳者土也方陳者金也直陳者水也此五行之陳展轉相生以為勝負凡結五陳之法五五相保五人為一長五長為一師五師為一帥五帥為一校五校為一火五火為一橦五橦為一軍則事備矣夫兵之便務知節度短者持旌旗勇者持金鼓弱者給糧收智者為謀主鄉里相比五五相保一鼓正立二鼓起食三鼓嚴辦四鼓就行間聞聽令然後舉旗出兵隨幡所至也故曰治衆如治寡分數是也部曲為分什五為數鬭衆如鬭少形名是也旌旗曰形金鼓曰名言不相聞故為鼓鐸視不相見故為旌旗夫金鼓旌旗所以一人耳目也夜戰多火鼓晝戰多旌旗所以變人耳目是知鼓鞞金鐸所以威耳旌旗麾章所以威目禁令刑罰所以威心耳威於聲不可不清目威於色不可不明心威於罰不可不嚴三者不立雖勝必敗故曰將之所麾莫不從移將之所指莫不前死紛紛紜紜鬭亂而不可亂混混沌沌形圓而不可敗此用衆之法也卒服習矣器用利矣將軍乃秉旄麾衆而誓之有虞氏誡於國夏后氏誓於軍殷誓於軍門之外周將交刃而誓之所誓不同吾從周誓之曰嗚呼溥天之下莫非王土率土之濱莫非王臣今某國威侮五行怠棄三正俾我有衆龔行天討用命者賞不踰時逗撓者誅不遷列死生富貴在此一舉嗟爾庶士各勉乃心也於是氣勵青雲雖赴湯蹈火可也此教戰之法也孫子曰二曰天時天時者陰陽寒暑時節制也司馬法曰冬夏不興師所以兼愛吾人也太公曰天文三人主占風氣知天心去就故經曰能知三生臨刀勿驚從孤擊虛一女當五丈夫故行軍必背太陰向太陽察五緯之光芒觀二曜之薄蝕必當以太白為主辰星為候合宿有必鬭之期格出明不戰之勢避以日耗背以月刑以王擊困以生擊死是知用天之道順天行誅非一日也若細雨沐軍臨機必有捷回風相觸道還而無功雲類群羊必走之道氣如驚鹿必敗之勢黑雲出壘赤氣臨軍六窮起風三刑起霧此皆見師之出而不見其入也若煙非煙此慶雲也若星非星此歸邪也若霧非霧此泣軍也若雷非雷此天鼓也慶雲開有德歸邪有降人泣軍多殺將天鼓多敗軍是知風雲之占歲月之候其來久矣故古者初立將始出門首建牙之時必觀風雲之氣諸謀立武事征伐四方興兵動衆忌大風雷雨陰不見日辰午酉亥自刑之日夫牙旗者將軍之精凡豎牙旗必以制日制日者謂上剋下也初立牙門禡之曰兩儀有正四海有王寶命在天世德彌光蕞爾凶狡敢謀亂常天子命我秉鉞專征爰整其旅討茲不庭夫天道助順神祗害口使凶醜時殲方隅聿清兵不血刃凱歸上京神氣增輝永觀厥成實正直之賴凡乃神之靈急急如律令凡氣初出如甑上氣勃勃上升氣積為霧霧為陰陰氣結為虹霓暈珥之屬凡氣不積不結散漫一十不能為災必和雜殺氣森森然疾起乃可論占常以平旦下晡日出沒時候之期內有風雨災不成也若風不旁勃旌旗暈暈順風而揚舉或向敵終日軍行有功勝候也凡軍上氣如山堤上林木不可與戰在吾軍大勝或如火光亦大勝或敵上白氣紛拂如樓緣以赤氣者兵徑不可擊在吾軍必大勝或敵上氣黃白厚潤而重者勿與戰或有雲廣如三匹帛前後大軍行好遙望軍上雲如鬭雞赤白相隨在氣中得天助不可擊兩軍相當上有氣如蛇舉頭向敵者戰必勝凡軍營上有五色氣上與天連此應天之軍不可擊有赤黃氣干天亦不可攻或有雲如日月而赤氣繞之如日暈狀有光者所見之地大勝不可攻敵上氣如口狀其軍不可攻此皆勝氣也若逆風來應氣旁勃牙扛折陰不見日旌幡激揚敗候也若雲氣從敵所來終日不止軍不可出出則不利若風氣俱來此為敗候在急擊也凡敵上氣色如馬肝如死灰或類偃蓋皆敗徵也或黑氣如壞山墮軍上者軍必敗或軍上氣昏發連夜照人則軍事散亂或軍上氣半而一絶一敗再絶再敗在東發白者災深或軍上氣五色雜亂東西南北不定者其軍欲敗或軍上有赤氣炎炎降天將死衆亂或軍上有黑氣如牛馬形從氣霧中下漸人軍名曰天狗下食血敗軍也或有雲氣蓋道蒙蔽晝冥者釋炊不暇熟急去此皆敗候也若下輕其將妖怪並作衆口相惑當修德審令繕礪鋒甲勤誠誓士以避天怒然後復擇吉日祭牙旗具太牢之饌震鼓鐸之音誠心啓請以備天問觀其祥應以占吉凶若人馬喜躍旌旗皆前指高陵金鐸之聲揚以清鞞鼓之音宛以鳴此得神明之助持以安於衆心乃可用矣雖云任賢使能則不占而事利令明法審則不筮而計成封功賞勞則不禱而福從共苦同甘則犯逆而功就然而臨機制用有五助焉一曰助謀二曰助勢三曰助怯四曰助疑五曰助地此五者助勝之術故曰知地知天勝乃可全不可不審察也孫子曰三曰地利地利者遠近險易廣狹死生也故不知山林險阻沮澤之形者不能行軍不用鄉導不能得地利故用兵有散地有輕地有爭地有交地有衢地有重地有汜地有圍地有死地九地之名諸侯自戰其地為散地戰其境內之地士卒意不專有自潰之心也故經曰散地吾將一其志也入人之地而不深者為輕地入人之地未深士卒意尚未專而輕走也故經曰輕地吾將使之屬也我得則利彼得亦利者為爭地可以少勝衆弱勝強謂山水厄口有險固之利兩敵所爭故經曰爭地吾將趣其後也我可以往彼可以來為交地道上相交錯平地有數道往來交通無可絶也故經曰交地吾將固其結諸侯之地三屬我與敵相對而旁有他國也先至而得天下之衆者為衢地先至其地可交結諸侯之衆為助也故經曰衢地吾將謹其守也入人難返之地深背倍城邑多者為重地遠去已城廓深入敵地專心意故謂之重地故經曰重地吾將繼其食也行山林險阻沮澤凡難行之道者為汜地汜浸洳之地故經曰汜地吾將進其途也所由入者隘所以歸者迂彼寡可以擊吾衆者為圍地所欲從入厄險欲歸道遠也持久則糧乏故敵可以少擊吾衆者為圍地故經曰圍地吾將塞其闕也疾戰則存不疾則亡者為死地前有高山後有大水進則不得退復有礙又糧乏絶故為死地在死地者當及士卒尚飽強志殊死故可以俱死故經曰死地吾將示之以不活也是故散地無戰士卒顧家不可以戰輕地則無止入敵地淺士意尚未堅不可以遇敵自當堅其心也爭地則無攻三道攻當先主地利也先得其地者不可攻也交地則無絶相及屬也交地者俱可進退不以兵絶之衢地則合交佐諸侯也當交結于諸侯重地則掠蓄糧食也入深士卒堅固則可掠取財物汜地則行不可止也圍地則謀擊其謀也則當權謀奇譎可以免難死地則戰殊死戰也未戰先勵之曰無慮愚戇用軍不明乃隨圍厄之地益士大夫之憂也皆將之罪也今日之事在此一舉若不用力身當膏野草為蟲獸食妻子無所求索剋則身榮賞祿在焉可不勉哉又有六地有通有挂有支有隘有險有遠六地名也我可以往彼可以來曰通謂俱在平陵往來通利也居通地先處其高陽利糧道以戰則利寧致於人無致於人已先處高地分為屯守於歸來之路不使敵絶已糧道也可以往難以反曰挂挂相挂牽也挂形曰敵無備出而勝之敵有備出而不勝難以反不利敵無備而出攻之勝可也有備不得勝之則難還反也我出而不利彼出而不利曰支支久也俱不便久相持也支形曰敵雖利我我無出引而去也令敵半出而擊之利利我者佯背我去無出逐待其引而擊之可敗也隘形曰我先居之必盈之而待敵盈滿也以兵陳滿院形名使敵不得進退若敵先居之盈而勿從也不盈而從之隘形者兩山之間通谷也敵怒勢不饒我也居之必前齊厄口陳而守之以奇也敵即先居此地齊口陳勿從也即半隘陳者從而與敵其此利也險形曰我先居之必居高陽以待敵居高陽之地以待敵人敵人從其下陰來擊之勝也若敵先居則引而去之勿從也地險先不可致於人也夫遠形鉤勢難以挑戰而不利挑近敵也遠形去國遠也地鉤等無獨便利先挑之戰不利凡此六者地之道也皆將之至任不可不察故曰深草蓊穢者所以遁逃也深谷阻險者所以止禦車騎也隘塞山林者所以少擊衆也衆少可以夜擊敵也沛澤杳冥者所以匿其形也丈五之溝漸車之水漸浸也音子廉反山林石徑涇川丘阜涇川常流之川草木所在此步兵之地車騎二不當一丘陵漫衍相屬漫衍猶聯延也屬續也音之欲反平原廣野此車騎之地步兵十不當一平原相遠遠離也仰高臨下此弓弩之地短兵十不當一兩陳相近平地淺草可前可後此長戟之地劍楯三不當一雚葦竹簫簫蒿也草木蒙籠林葉茂接此矛鋋之地長戟二不當一曲道相伏險扼相簿此劍楯之地弓弩三不當一故曰地形者兵之助又曰用兵之道地利為寶趙奢趨山秦師所以覆敗韓信背水漢兵由是克勝此用地利之略也經曰以水佐攻者強以火佐攻者明是知水火者兵之助也故火攻有五一曰火人敵旁近草因風燒之二曰火積燒其積蓄三曰火輜燒其輜重四曰火庫當使間人之敵營燒其兵庫五曰火燧燧墮也以火墮敵人營中也火頭之法以鐵盈火著箭頭強弩射敵之營中燒絶糧道也行火必有因因姦人也煙火素具發火有時起火有日時者天之燥也日者宿在箕壁參軫也凡此四宿者風起之日也蕭世誠云春丙丁夏戊己秋壬癸冬甲乙此日有疾風猛雨也居勘太乙中有飛鳥十精如風雨期五子元運式各侯其時可用火故曰以火佐攻者明何以言之昔揚埏與桂陽賊相會埏以皮作大排囊以石灰內囊中置車上作火隧繫馬尾因從上風鼓排囊吹灰群賊眯目因燒馬尾奔突賊陳衆賊奔潰此用火之勢也殷浩北伐長史江逌取數百雞以長繩連之腳皆繫火一時驅放群雞飛散羌營營皆燃因擊之姚襄退走此用火之勢李陵在大澤草中虜從上風縱火陵從下風縱火以此火解火勢也吾聞敵燒門恐火滅門開當更積薪助火使火勢不滅亦解火之法也太公曰強弩長兵所以踰水戰孫子曰水可以絶謂灌城也又曰絶水必遠水引敵使渡也客絶水而來迎之於水內令敵半渡而擊之利欲戰無附於水而迎客也謂處水上之軍故曰以水佐攻者強何以言之昔韓信定臨淄走齊王田廣楚使龍且來救齊齊王廣龍且並并軍與信合戰人或説龍且曰漢兵遠鬭窮戰其鋒不可當齊楚自居其地戰兵易敗散不如深壁令齊王使其信臣招所亡城城聞其王在楚來救必反漢漢兵二千里客居齊城皆反之其勢無所得食可無戰而降也龍且曰吾平生知韓信為人易與耳且夫不戰而降之吾何功遂戰敗吾聞古之所謂善戰者勝易勝者敗善者之勝也無知名無勇功故其戰勝不武不武者其所錯勝勝已敗者也龍且不用客之計欲求赫赫之功昧矣夾濰音唯水陳韓信乃夜令人為萬餘囊盛沙壅水上流引軍半渡擊龍且佯不勝還走龍且果喜曰固知信怯也乘追信渡水信使決壅囊水大至龍且軍太半不得渡即急擊之殺龍且龍且水軍東散走此反半渡之勢吾聞兵法絶水必遠水令敵半渡而擊之利韓信半渡軍佯入害地令龍且擊之然後決壅水此所謂雜于利而務可神雜於害而患可解也皆反兵而用兵法微哉微哉盧綰佐彭越攻下梁地十餘城項羽聞之謂其大司馬曹咎曰謹守城皋即漢挑戰慎勿與戰漢果挑楚軍楚軍不出使人辱之孫子曰廉潔可辱也大司馬怒渡汜水音凡卒半渡漢擊大破之此欲戰無附於水勢也故知水火之變可以制勝其來久矣秦人毒涇上流晉軍多死荊王燒楚積聚項氏以擒曹公決泗於下邳呂布就戮黃蓋火攻於赤壁魏祖奔衄此將之至任蓋軍中尢急者矣不可不察周禮曰巡國傳諜者反間也呂望云間搆飛言聚為一卒是知用間之道非一日也凡有白氣群行徘徊結陳來得為他國人來欲圖人不可應視其所往隨而擊之可得也或有黑氣臨我軍上如車輪行敵人深入謀亂吾國臣或有黑氣遊行中含五色臨我軍上敵必謀合諸侯而伐吾國諸侯反謀軍軍自敗或有黑氣如幢出於營中上黑下黃敵欲來求戰無誠實言信相反九日內必覺備之吉或日月陰沈無光不雨或十日晝夜不見日月名曰蒙臣謀主故曰久陰不與臣謀主也故間有五間有因間有內間有反間有生間有死間五間俱起莫知其道因間者因其鄉人而用之者也言敵鄉邑之人知敵表裏虛實可使伺候聽察通辭致言故曰因之用賞祿為先也內間者因其官人而用之者也因其在官失職者若刑誅之子孫與受罰之家也因其有隙就而用之反間者因敵間而用之者也曹公曰敵使間來視我我知之因厚賂重許反使為我間故曰反間蕭世誠曰言敵使人來候我我佯不知而示以虛事前却期會使歸相語故曰反間也生間者反報者也擇已有賢才智謀能自開通於敵之親貴察其動靜知其事計所為己知其實還報故曰生間也死間者為誑事於外令吾間知之而待於敵間者也作詐誑之事於外佯漏泄之使吾間知之吾間至敵中為敵所得必以誑事輸敵敵從而備之吾所行不然也間則死矣又一云敵間來在營間我誑事而持歸然皆非吾所圖也二間皆不能知幽隱故曰死間蕭世誠云所獲敵人及已軍士有重罪繫者故為免相敕勿泄佯不祕密令拘者竊聞之因綏之使亡亡必歸敵以所聞告之敵必信焉往必不間故曰死間得也昔漢西域都護班超初為將兵長史悉發諸國步騎二萬五千擊莎車莎車求救龜茲龜茲王遣左將軍發溫宿姑墨尉頭合五萬人助之超召曲及于闐疏勒王議曰兵少不敵計莫如各解散去于闐從此東長史亦從此西歸夜半聞鼓聲便發衆皆以為然乃陰緩擒得生口生口歸以超言告龜茲龜茲聞之喜使左將軍將萬騎於西界遮超溫宿王將八千騎於東界遮于闐王人定後超密令諸司馬勒兵勵士至雞鳴馳赴莎車軍營掩覆之胡皆驚走斬首五千級莎車遂降又耿弇討張步步聞之乃使其大將費邑軍歷下又分兵屯祝阿別於太山鐘城列營數十以待弇昔劉備東下與孫權交戰魏文帝聞備樹柵連營七百餘里謂群臣曰備不曉兵權豈有七百里營可以拒敵者乎包原隰險阻而為軍者為敵所禽此兵忌也後七日權破備書到今張步列營數十緩急不能相救又一軍潰則衆心難固此黥布所以走荊王也步非計也敗其宜也弇渡河先擊祝阿拔之故開圍一角令其衆得奔鐘城鐘城人聞祝阿已潰大懼遂空壁亡去孫子曰三軍可奪氣將軍可奪心耿弇開祝阿之圍令其衆奔鐘城以震怖之亦奪氣奪心計也炒矣夫費邑分遣其弟敢守巨里弇進兵先脅巨里多伐樹木揚言填塞坑塹數日有降者言邑聞弇欲攻巨里謀來救之弇乃嚴令軍中趣治攻具後三日當悉攻巨里陰緩生口令得亡歸歸者以弇期告邑邑至日果自將來救之弇喜謂諸將曰吾所修攻具者欲誘致邑耳今來適吾所求也即分三千人守巨里自引精兵止岡阪乘高合戰大破之臨陳斬邑或問孫子曰敵衆而整將來待之若何曰先奪其所愛則聽矣又曰善戰者致人而不致於人弇揚言攻巨里也亦奪其所愛令自致之計也此用因間之勢也晉時益州牧羅尚遣隗伯攻李雄於郫城迭有勝負雄乃募武都人朴泰鞭之見血使譎羅尚欲為內應以火為期尚信之悉出精兵遣隗伯等率領從泰李雄先使李驤於道設伏泰以長梯倚城而舉火伯軍見火起皆爭緣梯泰又以繩汲上尚軍百餘人皆斬之雄因放兵內外擊之大破尚軍此用內間之勢也鄭武公欲伐胡先以其子妻胡因問群臣曰我欲用兵誰可伐者大夫關期思曰胡可伐武公怒而戮之曰胡兄弟之國子言伐之何也胡君聞之以鄭為親已而不備鄭鄭襲胡取之漢使酈生説齊王田橫橫罷兵與酈生縱酒漢將韓信因其無備襲齊破之田橫烹酈生酈生偶成韓信死間唐李靖伐胸奴以唐儉先和親而已以兵乘其不備破之此李靖以唐儉為死間也此用死間之勢也陳平以金縱反間於楚軍間范增楚王疑之此用反間者也事具霸紀故知三軍之親莫親於間賞莫厚於間事莫密於間非聖智莫能用間非密微莫能得間之實此三軍之要唯賢將之所留意也萬機論曰雖有百萬之師臨時吞敵在將也吳子曰凡人之論將恆觀之於勇勇之於將乃萬分之一耳故六韜曰將不仁則三軍不親將不勇則三軍不為動孫子曰將者勇智仁信必也勇則不可犯智則不可亂仁則愛人信則不欺人必則無二心此所謂五才者也三軍之衆百萬之師張設輕重在於一人謂之氣機道峽路險名山大塞十人所守千人不過是謂地機善行間諜分散其衆使君臣相怨是謂事機車堅舟利士馬閉習是謂力機此所謂四機者也夫將可樂而不可憂謀可深而不可疑將憂則內疑將有憂色則內外相疑故曰不相信也謀疑則敵國奮多疑則計亂亂則令敵國奮威以此征伐則可致亂故將能清能靜廉財曰清不擾曰靜老子曰重為輕根靜為躁君也能平能整能受諫能聽訟能納人受賢於群英之中若越納范蠡齊納寧戚之類也能採善言能知國俗能圖山川能栽厄難險難厄皆悉明之能制軍權危者安之懼者歡之叛者還之將有不合去者慰誘還之若蕭何追韓信冤者原之訴者察之卑者貴之士卒苦卑賤者貴之昔吳起下與士卒同衣食是也強者抑之敵者殘之卑中有賤而敵貴者亂上下之禮殘殺之貪者豐之懸賞以豐其心所以使貪欲者使之臨敵將戰有欲立功名有欲利敵人者皆許而使之所謂使勇使貪畏者隱之士卒有所畏懼者隱蔽於後勿使為軍鋒軍敗由鋒怯謀者近之讒者覆之有讒鬭者覆信之毀者復之官職有毀廢者則修而復之反者廢之橫者挫之服者活之首服罪者活之降者説之説舍獲城者割之賞功臣也獲地者裂之賜功榮者獲國者守之得其國必封賢以守之昔吳伐越得而不守所以終敗也獲厄塞之獲難屯之獲財散之敵動伺之敵強下之敵陳強則下之勿與戰若齊師伐魯鼓之曹劌不動三鼓破齊下之敵淩假之敵之威勢淩吾而來宜持重以待之勿與戰楚淩漠求戰一決漢祖知弱不許之是也敵暴安之敵人為暴虐之行則安之勸之所以怒我衆也昔燕伐齊田單不下燕師掘齊人冢墓田單安勸之敵勃義之敵為勃亂之事則隨有義以待之彼勃我義故剋之敵睦攜之順舉挫之舉順以挫逆也因勢破之放言過之放過惡言以誣詐敵人以怒已衆也四網羅之此為將之道也故將拒諫則英雄散策不從則謀士叛善惡同則功臣倦賞罰不明善惡無異則有功之臣皆懈倦也將專已則下歸咎專已自任不與下謀衆皆歸罪於將而責之將自臧則下少功臧善也將自伐勳忘下自用者故曰少功也將受讒則下有離心將貪財則姦不禁上貪則下盜也將內顧則士卒淫內顧思妻妾也將有一則衆不服有二則軍無試試法也有三則軍乖背有四則禍及國軍志曰將謀欲密士衆欲一將衆如一體也攻敵欲疾將謀密則姦心閉士衆一則群心結結如一也攻敵疾則詐不及設軍有此三者則計不奪將謀泄則軍無勢以外窺內則禍不制窺見也謀泄則外見已情之虛實其禍不可制也財入營則衆姦會凡為軍使外人以財貨入營內則姦謀奄集其中心將有此三者軍必敗將無慮則謀士去將無慮不能從謀故去之將無勇則吏士恐將怯則下無所恃故恐也將遷怒則軍士懼慮也謀也將之所重勇也怒也將之所用意故曰必死可殺也必生可慮也忿速可侮也廉潔可辱也愛人可煩也此五者將軍之過用兵之災故凡戰之要先占其將而察其才因刑用權則不勞而功興也其將愚而信人可謀而詐貪而忽名可貨而賂輕變可勞而困上富而驕下貧而桀可離而間將怠士懈可潛而襲智而心緩者可追也勇而輕死者可暴也急而心速者可誘也貪而喜利者可襲也可遺也仁而不忍於人者可勞也信而喜信於人者可誑也廉潔而不愛人者可侮也剛毅而自用者可事也懦心喜用於人者可使人欺也此皆用兵之要為將之略也夫兩國治戎交和而合刀以冥冥決事必先探於敵情故孫子曰勝兵先勝而後戰又曰策之而知得失之計候之而知動靜之理因形而作勝於衆用兵之要也若欲先知敵將當令賤而勇者將輕鋭以當之觀敵之來一起一坐其政以理其追北佯為不及其見利佯為不知如此者將必有智勿與輕戰凡敵上氣黃白潤澤者將有威德或軍上氣發漸漸如雲變作山形將有深謀或敵有氣外黑中赤在前者將精悍皆不可擊凡氣上與天連軍中將賢良凡氣如龍如虎在殺中或如火煙之形或如火光之狀或如山林或如塵埃頭大而卑或氣紫黑如門上樓或如白粉沸皆猛將之氣也若其衆歡旗亂其卒自止自行其兵或縱或橫其追北恐不及見利恐不得如此者將必無謀雖衆可獲凡敵上氣青而疏散者將怯弱前大而後小將性不明也故曰敵近而靜者恃其險也敵遠而挑人者欲人之進也衆樹動者來也衆草多障者疑也稠草中多障蔽者必逃去恐吾追及多作障蔽使吾疑其間有伏兵也鳥起者伏也凡軍上氣渾渾圓長赤氣在其中或有氣如赤杵在黑雲中皆下有伏兵或兩軍相當有赤氣在軍前後左右者有伏兵隨氣所在防之或有雲絞絞綿綿此以軍騎為伏兵或雲如布席之狀此以步卒為伏兵或有雲如山嶽在外為伏兵不可不審察也禽駭者覆也塵卑而廣者徒來也散而條遠者薪來也少而往來者營軍也少少也辭卑而益備者進也敵增備也辭強而進驅者退也無約而請和者謀也半進半退者誘也杖而立者飢也汲而先飲者渴也見利不進者勞也鳥集者虛也夜呼者恐也軍擾者將不重也旗動者亂也吏怒者倦也粟馬食肉軍無懸湩音唾一簟之食也不及其舍者窮寇也淳淳翕翕徐言入人者失其衆也此將失其衆之意也數賞者害也數罰者困也數顧者失其群也來委謝者欲休息也兵怒而相近久而不合又不相去必謹察之敵來新到行陳未定可擊也陳雖定人馬未食可擊也涉長道後行未息可擊也行坂涉險半隱半出可擊也涉水半渡可擊也險道狹路可擊也旌旗亂動可擊也陳數動移可擊也人馬數顧可擊也凡見此者擊之而勿疑然兵者詭道也能而示之不能用而示之不用故胸奴示弱漢祖有平城之圍石勒藏鋒王浚有幽州之陷即其效也可不慎哉孫子曰勇怯勢也強弱形也又曰水之弱至於漂石者勢也何以明之昔曹公征張魯定漢中劉曄説曰明公以步卒五千討誅董卓北破袁紹南征劉表九州百郡十并其八威震天下勢漝海外今舉漢中蜀人望風破膽失守推此而前蜀可傳檄而定也劉備人傑也有智而遲得蜀日淺蜀人未恃今破漢中蜀人震恐其勢自傾以公之神明因其傾而壓之烏甲反無不剋也若小緩之諸葛亮明於理而為相關羽張飛勇冠三軍而為將蜀人既定據險守要則不可犯也今不取必為後憂曹公不從居七日蜀降者説蜀中一日數十驚備斬之而不能禁也曹公延問曄曰今尚可擊否曄曰今已小定未可擊也又太祖征呂布至下邳布敗固守城攻不拔太祖欲還荀攸曰呂布勇而無謀今三軍皆北其鋭氣衰三軍以將為主主衰則軍無奮意夫陳宮有智而遲今及布氣之未復宮謀之未定進急攻之布可收也乃引沂泗灌城城潰生擒布以此觀之當是時雖諸葛之智陳宮之謀呂布之勇關張之徑無所用矣此謂勇怯勢也強弱形也故兵有三勢夫兵有三勢一曰氣勢二曰地勢三曰因勢若將勇輕敵士卒樂戰三軍之衆志勵青雲氣等飄風聲如雷霆此所謂氣勢也若關山狹路大阜深澗龍蛇蟠磴羊腸狗門一夫守險干人不過此所謂地勢也若因敵怠役飢渴風波驚擾將吏縱橫前營未舍後軍夾涉所謂因勢者也善戰者恆求之於勢勢之來也食其緩頰下齊七十餘城謝石渡淝摧秦百萬之衆勢之去也項羽有拔山之力空泣虞姬田橫有負海之強終然刎頸故曰戰勝之威人百其倍敗兵之卒沒世不復永挫折也言人氣傷雖有百萬之衆無益於用也故水之弱至於漂石此勢略之要也孫子曰攻心為上攻城為下何以明之戰國時有説齊王曰凡伐國之道攻心為上攻城為下心勝為上兵勝為下是故聖人之伐國攻敵也務在先服其心何謂攻其心絶其所恃是謂攻其心也今秦之所恃為心者燕趙也當收燕趙之權今説燕趙之君勿虛言空辭必將以實利以迥其心所謂攻其心者也沛公西入武關欲以二萬人擊秦嶢音堯關下軍張良曰秦兵尚強未可輕也臣聞其將屠子賈豎易動以利願沛公且留壁使人先行為五萬人具食益張旗幟諸山之上為疑兵令酈食其持重寶秦將貪而忽名可貨以賂秦等果欲連和俱西襲咸陽沛公欲聽之良曰此獨其將欲叛士卒恐不從不從必危不如因其懈擊之沛公乃引兵擊秦軍大破之諸葛亮擒孟獲七縱七擒之南方終亮之世不敢背叛又四面楚歌而項羽走劉琨吹葭胡人散攻心之計非一途也此攻心者之孫子曰善用兵者使交不得合何以明之昔楚莫敖將盟二軫二軫二國名也鄖人軍於蒲騷將以隨絞州蓼伐楚師莫敖患之鬭廉曰鄖人軍於其郊必不誡且日虞四邑之至虞度也四邑隨絞州蓼也君次於郊郢以禦四邑我以鋭師宵加於鄖鄖有虛心而恃其城莫有鬭志若敗鄖師四邑必離莫敖從之遂敗鄖師於蒲騷漢宜帝時先零與罕幵羌解仇合黨為寇帝命趙充國先誅罕幵充國守便宜不從上書曰先零羌虜欲為背叛故與罕幵解仇然其私心不能亡恐漢兵至而罕幵背之也臣愚以為其計常欲赴罕幵之急以堅其約先擊罕羌先零必助之今虜馬肥糧方饒擊之恐不能傷害適使先零得施德於罕羌也堅其約合其黨虜交堅黨合誅之用力數倍臣恐國家憂纍由此十數年不一二歲而已先誅先零則罕開之屬不煩兵服矣帝從之果如策魏太祖初伐關中賊每一部到太祖輒喜賊破之後諸將問其故太祖曰關中道遠若各依險阻征之不一二年不可定也今皆來集衆雖多莫能相服軍無適主一舉可滅為攻差易吾是以喜語曰連雞不俱棲可離而解曹公得之矣此伐交者也孫子曰安能動之又曰攻其所必趨何以明之昔楚子圍宋宋公使如晉告急晉狐偃曰楚始得曹而新婚於衛若伐曹衛楚必救之則齊宋免矣前年楚戊穀以逼齊果如是計魏伐趙趙急請救於齊齊威王以田忌為將以孫臏為師居輜車中為計謀田忌欲引兵之趙孫子曰夫解雜亂紛糾者不控拳救鬭者不摶撠批亢搗虛形格勢禁則自為解耳今梁趙相攻輕兵鋭卒必竭於外老弱疲於內君不若引兵疾走大梁據其街路衝其方虛彼必釋趙而自救是我一舉解趙之圍而收弊於魏也田忌從之魏果去邯鄲又曹操為東郡太守東郡今魏州是治東武陽軍頓丘黑山賊黑山今衛州界也于毒等攻東武陽太祖欲引兵西入山攻毒本屯諸將皆以為當還自救曹操曰昔孫臏救趙而攻魏耿弇欲走西安攻臨災使賊聞我西而還則武陽自解不還我能破虜家虜不能拔武陽必矣乃行毒聞之果棄武陽還曹操要擊大破之初關羽圍樊襄陽曹操以漢帝在許近賊欲徙都司馬宣王及蔣濟説曹操曰劉備孫權外親內疏關羽得志權必不願也可遣人勸躡其後許割江南以封權則樊圍自解曹操從之羽遂見擒此言攻其所愛則動矣是以善戰者無知名無勇功不爭白刃之前不備已失之後此之謂矣語曰投兵散地則六親不能相保同舟而濟胡越何患乎異心孫子曰善用兵者譬如率然何以明之漢宣帝時先零為寇帝命趙充國征之引兵至先零所在虜久屯聚解弛望見大軍棄車重欲渡湟水道厄狹充國徐行驅之或曰逐利行速充國曰此窮寇不可追也緩之則走不顧急之則還致死諸將校皆曰善虜果赴水溺死者數百於是破之袁尚既敗遂奔遼東衆有數千初遼東太守公孫康恃遠不服曹公既破烏丸或説公遂征之尚兄弟可擒也公曰吾方使康斬送尚熙首不煩兵矣公引兵還康果斬送尚熙傳其首諸將或問曰公還而康斬尚熙何也公曰彼素畏尚熙其急之則并力緩之則自相圖其勢然也曹公征張繡荀攸曰繡與劉表相恃為強然鏽以遊軍仰食於表表不能供也其勢必離不如緩軍以待之可誘而致也若急之則必相救曹操不從進至穰與繡戰表果救之軍不利矣故孫子曰善用兵者譬如率然率然者常山之蛇擊其頭則尾至擊其尾則首至擊其中則首尾俱至或曰敢問可使如率然乎孫子曰可矣夫吳人之與越人相惡當其同舟而濟則相救如左右手是故放馬埋輪不足恃也齊勇若一政之道也此之謂矣孫子曰善用兵者先為不可勝以待敵之可勝何以明之梁州賊王國圍陳倉乃拜皇甫嵩董卓各率二萬人拒之卓欲速進赴陳倉嵩不聽卓曰智者不待時勇者不留決速戰則城全不救則城滅全滅之勢在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝在此可勝在彼范蠡曰時不至不可強生事不究不可強成此之謂也彼守不足我攻有餘有餘者動於九天之上不足者陷於九地之下今陳倉雖小城守固備非九地之陷也王國雖強而攻我之所不救非九天之勢也夫勢非九天攻者受害陷非九地守者不拔國今已陷受害之地而陳倉保不拔之城我可不煩兵動衆而取全勝之功將何救焉遂不聽王國圍陳倉自冬迄春八十餘日城堅守固竟不能拔賊衆疲弊果自解去嵩進兵擊之卓曰不可兵法窮寇勿迫歸衆勿追今吾追國是迫歸衆追窮寇也困獸猶鬭蜂蠆有毒況大衆乎嵩曰不然吾前不擊避其鋭也賓而備之強而避之鋭卒勿攻兵之機也今而擊之待其衰也所擊疲師非歸師也國衆且走莫有鬭志以整擊亂非窮寇也遂獨進兵擊之使卓為後拒連戰大破國走而死卓大慚恨孫子曰怒而撓之言待其衰也又曰卑而驕之言敵怒而進兵則當外示屈弱以高其志待其歸隨而擊之又曰引而勞之言因其進退以觀其變然後攻其不備出其不意此兵家之勝不可傳也青州黃巾衆百餘萬八東平劉岱欲擊之鮑永諫曰今賊衆百萬百姓皆震恐士卒無鬭志不可敵也觀賊衆群輩相隨軍無輜重唯以抄掠為資今若畜士衆之力先為固守彼欲戰不得攻則不能其勢必離散然後選精鋭據其要害擊之可破也岱不從果為賊所敗晉代王開攻燕鄴城慕容德拒戰代師敗績德又欲攻之別駕韓談進曰昔漢高祖云吾寧鬭智不能鬭力是以古人先勝廟堂然後攻戰今代不可擊者四燕不宜動者三代懸軍遠入利在野戰一不可擊也深適近畿頓兵死地二不可擊也前鋒既敗後軍方固三不可擊也彼衆我寡四不可擊也官軍自戰其地一不宜動動而不勝衆心難固二不宜動湟池未修敵來無備三不宜動此皆兵機也深溝高壘以逸待勞彼千里饋糧野無所掠久則三軍縻費攻則衆旅多弊師老釁生詳而圖之可以捷也德曰韓別駕之言良平之策也孫子曰以遠待近以逸待勞以飽待飢此治力者此先勝而後戰者也孫子曰圍師必闕何以明之黃巾賊韓忠據宛朱俊張超圍之結壘起土山以臨城因鳴鼓攻其西南賊悉衆赴之乃掩其東北乘城而入忠退保小城乞降諸將欲聽之俊曰兵有形同而勢異者昔秦項之際民無定主故賞附以勸來耳今海內一統唯黃巾造寇納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱敵長寇非良計也因急攻之不克俊登土山顧謂張超曰吾知之矣賊今外圍周固連營逼急乞降不受欲出不得所以死戰也萬人一心猶不可當況十萬乎其害甚矣不如撤圍并兵入城忠見解圍勢必自出出則意散易破之道也既而解圍忠果出戰遂破忠等魏太祖圍壺關下令曰城拔皆坑之連月不下曹仁言於太祖曰圍城必示之門所以開其生路也今公許之必死將人人自為守且城固而糧多攻之則士卒傷守則引日持久今頓兵堅城之下以攻必死之虜非良計也太祖從之城降凡降人之氣如人十十五五皆叉手低頭又云相向或有氣上黃下白名曰善氣所臨之軍欲求和退凡城中有白氣如旗者不可拔或有黃雲臨城有大喜慶或有青色如牛頭觸人者城不可屠或城中氣出東方其色黃此天鉞也不可伐伐者死或城上氣如火煙主人欲出戰其氣無極者不可攻或有氣如杵形從城中向外者內兵欲突出主人勝不可攻或城上有雲分為兩彗狀者攻不可得或有濛氣繞城不入者外兵不得入凡攻城有諸氣從城中出入吾軍上者敵氣也凡攻城圍邑過旬不雷雨者城有輔疾去之勿攻也此皆勝氣也凡攻城圍邑赤氣在城上黃氣四面繞之城中有大將死城降或城上有赤氣如飛鳥急攻之可破或有氣出入者人欲逃或有氣如灰氣出而覆其軍上者士多病城屠或城上無雲氣士卒散或城營上有赤氣如衆人頭下多死喪流血攻城有白氣繞城而入者急攻可得若有屈虹從城外入城者三日內城屠此皆敗氣也此圍師之道也孫子曰善動敵者形之敵必從之何以明之魏與趙攻韓齊田忌為將而救之直走大梁魏將龐涓去韓而歸齊軍已過而西矣孫臏謂田忌曰被三晉之兵素悍勇而輕齊齊號為怯善用兵者因其勢而利導之兵法曰百里而趨利者蹶上將軍使齊軍入魏地為十萬竈明日為五萬竈明日為二萬竈涓喜曰吾固知齊卒怯也入吾地三日士卒亡已過半乃棄其步兵與輕鋭倍日并行逐之臏度其暮至馬陵道狹而多險可伏兵乃斫大樹白書之曰龐涓死此樹下令善射者萬弩夾道而伏期曰見火舉而發涓夜至斫木下見白書乃鑽火燭之讀書齊軍萬弩俱發魏軍大亂涓乃自剄曰果成豎子之名也虞詡為武都郡羌率衆遮詡於陳倉崤谷詡令吏士各作兩竈日增倍之羌不敢逼或問曰孫子減竈而君增之兵法日行三十里以戒不虞今且行二百里何也詡曰虜衆既多吾徐行則易為所及疾行則彼不測之且虜見吾竈多謂群兵來至孫子見弱吾示強勢不同也昔王濬在蜀作虹欲伐吳預流柿江中以威之及至唐將李清欲伐荊州襲蕭鋭乃投柿於江中使蕭鋭見之靖尋以兵隨柿而下蕭鋭不備遂虜之平荊州夫兵法變通不可執一諸君得之矣故曰料敵在心察機在目因形而作勝於衆善之善者矣此變通之理也孫子曰陷之死地而後生投之亡地而後存又曰雜於利而務可伸雜於害而患可解何以明之漢將韓信攻趙趙盛兵井陘口信乃引兵未至井陘口三十里止舍夜半傳發選輕騎二千人持一赤幟從間道萆山音蔽而望見趙軍誡之曰趙見我走必空壁逐我若疾入趙壁拔趙幟立漢赤幟令其裨將傅餐曰今日破趙會食諸將皆莫信佯應曰諾信謂軍吏曰趙已先據便地為壁且彼未見我大將旗鼓未肯擊前行恐吾至阻險而還信乃使萬人行出倍水陳趙軍望見大笑之太公曰智與衆同非人師也伎與衆同非國士也動莫神於不意勝莫大於不識使趙軍識韓信之勢安得敗哉故笑之而敗也平旦信建大將之旗鼓鼓行出井陘口趙開壁擊之大戰良久於是信與張耳棄旗鼓走水上水上軍開壁入之復疾戰趙空壁爭漢鼓旗逐韓信張耳韓信張耳已入水上軍軍皆殊死戰不可敗信所出奇兵二千騎共候趙空壁逐利則馳入趙壁皆拔趙幟立漢赤幟二千趙軍不得信等欲還歸壁壁皆漢赤幟而大驚太公曰夫兩陳之間出俾陳矣縱卒亂行者所以為變此之謂矣以為漢皆已得趙主將矣遂亂遁走趙將雖擊斬之不能禁也孫子曰以治待亂以靜待譁此治心者夫衆心已亂雖有良將亦不能為之計矣於是漢兵夾擊大破之斬成安君泜水上擒趙王歇諸將效首虜休畢賀因問信曰兵法右背山陵前左水澤今者將軍令臣等反背水陳曰破趙會食臣等不服然竟以勝此何術也信曰此在兵法中顧諸君不察耳兵法不曰陷之死地而後生置之亡地而後存夫處死地者謂力均勢敵以死地取勝可也若以至弱當至強投弱兵千死地自貽陷矣故孫臏曰兵恐不可救又經曰大衆陷于害然後能為勝敗是知死地之機必用大衆矣且信非得素撫循士大夫也所謂驅市人而戰其勢非置之死地使人人自為戰今與之生地皆走寧尚可得而用之乎諸將曰善非所及也孫子曰兵甚陷則不懼不得已則鬭是故其兵不修而戒不求而得不約而親不令而信投之無往者諸將之勇也此之謂矣魏太祖征張繡一朝引軍退繡自追之賈詡曰不可追也繡不從果敗而還詡謂繡曰促更追之戰必勝繡收散卒赴追太祖戰果勝還問詡曰繡以精兵追退軍而公曰必敗退以敗卒擊勝兵而公曰必剋皆如公之言何其反而皆驗也詡曰此易知耳軍勢百途事不一也將軍雖善用兵非曹公敵也魏軍新退曹公必自斷其後追兵雖精將既不敵彼士亦鋭故知必敗曹公攻將軍無失策力未盡而還必國內有故也既破將軍必輕軍速進留諸將斷後諸將雖勇亦非將軍敵也故雖用敗兵而勝也繡乃服其能此利害之變故曰陷之死地而後生雜於害而患可解此之謂也太公曰不能分移不可語奇孫子曰兵以正合事以奇勝何以明之魏王豹反漢漢王以韓信為左丞相擊魏魏王盛兵蒲阪塞臨晉信乃益為疑兵陳船欲渡臨晉而伏兵從夏陽以木罌渡軍襲安邑孫子曰遲而示之遠遠而示之近此之謂也魏王豹驚引兵迎信信遂虜豹定魏為河東郡是知奇正者兵之要也經曰戰勝不過奇正奇正之變不可勝窮如環之無端孰能窮之此之謂也孫子曰善戰者其勢險其節短以利動之以卒待之又曰善動敵者形之敵必從何以明其然耶燕平齊圍即墨城即墨城中推田單為將以拒燕田單欲激怒其卒乃宣言曰吾唯恐燕將劓所得齊卒及掘城外墳墓傷先人可為寒心燕將如其言即墨人皆涕泣共欲出戰怒皆十倍單乃收人金得千鎰令即墨富豪遺燕將書曰即墨即降願不虜吾家族燕將大喜亦懈乃收牛得千頭束葦於尾燒其端鑿城數十穴夜縱牛出以壯士五千人隨其後牛尾熱而奔燕燕軍大驚所隨五千因銜枚擊之燕軍大敗殺其將騎劫復齊七十餘城呂蒙西屯陸口關羽討樊留兵備公安南郡蒙上疏曰關羽討樊而多留備兵必恐蒙圖其後故也蒙常有病乞分衆還建鄴以治病為名羽聞之必撤備兵盡赴襄陽大軍浮江晝夜馳上襲其空虛則南郡可取而羽可擒之遂稱病篤權乃露檄召蒙羽果信之稍撤兵赴樊權聞之遂行先遣蒙在前伏其精兵於䑦𦪇中使白衣搖櫓作商賈服晝夜兼行至羽所置江邊屯候盡收縛之是故羽不聞知太公曰偽稱使者所以絶糧食謬號令與敵同服者所以備走北也由此言之衣服號令之中不可不審也遂到南郡士仁糜芳皆降蒙入據城表得羽將士家屬皆撫慰約令軍中不得干歷人家道不拾遺昔秦伯見襲鄭之利不顧崤函之敗吳王矜伐齊之功而忘姑蘇之禍故曰不能盡知用兵之害者則不能盡知用兵之利此之謂矣經曰役諸侯得以業語曰因其強而強之敵乃可折關羽討樊雖不被人計亦自役自強者也羽還在道路數使人與蒙相聞蒙厚遇其使使周旋城中家家致問或手書示信羽使人還私相參訊咸知家門無恙相待過於平時故羽士卒無鬭心權至獲羽遂定荊州此掩發之變故曰始如處女敵人開戶後如脫兔敵不及距此之謂矣孫子曰興師百萬日費千金玉子曰四人用虛國家無儲故曰運糧百里無一年之食二百里無二年之食三百里無三年之食是謂虛國國虛則人貧人貧則上下不相親上無以樹其恩下無以活其身則離叛之心生此為戰勝而自敗故雖破敵於外立功於內然而戰勝者以喪禮處之將軍縞素請罪於君君曰兵之所加無道國也擒敵致勝將無咎殃乃尊其官以奪其勢故曰高鳥死良弓藏敵國滅謀臣亡亡者非喪其身謂沈之於淵沈之於淵者謂奪其威廢其權封之於朝極人臣之位以顯其功中州善國以富其心仁者之衆可合而不可離威權可樂而難卒移是故還軍罷師存亡之階尉他章邯是也故弱之以位奪之以國故霸者之佐其論駮也駮不純道也人主深曉此道則能御臣將漢祖襲奪齊軍之類人臣深曉此道則能全功保首張良學辟穀棄人間事之類此還師之術也論曰奇正之機五間之要天地之變水火之道如聲不過五聲五聲之變不可勝聽色不過五色五色之變不可勝觀在乎因機而用權矣不可執一也故略舉其體之要此皆諸兵書中語也
