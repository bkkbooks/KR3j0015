body:
  text: 霸圖第十七霸圖第十七臣聞周有天下其理三百餘年成康之隆也刑錯四十餘年而不用及其衰也亦三百餘年太公說文王曰雖屈於一人之下則申於萬人之上唯賢人而後能為之於是文王所就而見者六人求而見者十人所呼而友者千人友之友謂之朋朋之朋之黨黨之黨謂之群以此友天下賢人者二人而歸之故曰三分天下有其二以服事殷此之謂也故五伯音霸更起伯者常佐天子興利除害誅暴禁邪匡正海內以尊天子五伯既沒賢聖莫續天子孤弱號令不行諸侯恣行強淩弱眾暴寡吳王問伍胥曰伐楚如何對曰楚執政眾而乖莫適任患若為三師以肄之一師至彼必皆出彼出即歸彼歸即出楚必道弊亟肄以疲之多方以誤之既疲而後以三軍繼之必大克闔閭從之楚於是乎始病越王勾踐問於大夫種曰伐吳何如對曰伐吳有七術其略云尊天事鬼以舉其邪遺之好美以熒其志遺之巧工使起宮室以甚其財遺之諛臣使之易伐強其諫臣使之自殺堅甲利兵以承其弊越王於是飾美女西施獻之吳王吳王悅之子胥諫不受吳王誅子胥越又為榮楣鏤以黃金獻之吳王吳王受之而起姑蘇之臺五年乃能成百姓道死越又蒸粟種遺吳王吳王付人種之不生吳大饑齊桓公欲弱楚乃鑄錢市生鹿於楚楚聞之喜廢耕而畜鹿桓公藏粟五倍楚足錢而乏粟桓公乃閉關楚降者十四五及柯之盟桓公欲倍曹洙之約管仲因而信之諸侯由是歸齊故其稱曰知與之為取政之寶也鄭桓公欲襲鄶先問鄶之豪傑良臣辨士書其名姓擇鄶之良田貽之為官爵之名而書之因為疆埸郭門之外而理之釁以雞猳之血鄶君以為內難也盡殺之桓公因襲鄶此皆諸侯恣行天子之令不行也田常篡齊六卿分晉並為戰國此人之始苦也齊侯與晏子坐於露寢公歎曰美哉茲室其誰有此乎晏子曰如君之言其陳氏乎陳氏雖無大德而有施於人豆區釜鍾之數其取之公也薄其施之人也厚公厚斂焉陳氏厚施焉人歸之矣詩云雖無德與汝式歌且舞陳氏之施人歌舞之矣復世若少惰陳氏而不亡則國其國也已後果篡齊智伯從韓魏之君伐趙韓魏陰謀叛智果曰二王殆將有變不如殺之不殺則遂親之智伯曰親之奈何智果曰魏宣子之謀臣趙葭韓康子之謀臣段規是皆能移其君之計君與二君約破趙則封二子萬家之縣各一如是則二主之心可以無變智伯不從韓魏果反殺智伯於是強國務功弱國務守合縱連衡馳車轂擊介冑生蟣蝨人無所告訴及至秦蠶食天下并吞戰國一海內之政壞諸侯之城法嚴政峻諂諛者眾使蒙恬將兵北攻胡尉他將卒以戍越宿兵無用之地人不聊生始皇崩天下大叛陳勝吳廣舉於陳陳涉吳廣戍漁陽屯大澤會天雨道不通度已失期失期當斬二人乃謀曰今已失期當斬今舉大計亦死等死為國可乎乃先以鬼神威眾因斬尉召令徒屬曰公等遇雨皆已失期失期當斬藉第令毋斬而戍死者固十六七耳壯士不死則已死則舉大名侯王將相寧有種乎徒屬皆曰敬受命遂分將徇地自立為陳王武臣張耳舉於趙武臣略定趙地號武信君蒯通說范陽令徐公曰范陽百姓蒯通也竊憫公之將死故弔雖然賀公得通而生也徐公再拜曰何以弔之通曰足下為令十年矣殺人之父孤人之子斷人之足黥人之首甚眾然而慈父孝子所以不敢倳刃公之腹中者畏秦法也今天下大亂秦政不施然而慈父孝子將爭接刃公之腹以復其怨而成其名此通之所以弔也曰何以賀得子而生也通曰趙武信君不知通不肖使人候通問其死生通見武信君而說之曰必將戰勝而後略地攻得而後取天下城臣竊以為殆矣用臣之計無戰而略地不攻而下城傳檄而千里可定可乎彼將曰何謂也臣因說曰范陽令宜整頓其士卒以守戰者也怯而畏死貪而好富貴故欲以其城先下君先下君而不利則邊地之城皆將相告曰范陽令先降而身死必將嬰城固守皆為金城湯池不可攻矣為君計者莫如以黃屋朱輪迎范陽令使馳騖於燕趙之郊則邊城皆將相告曰范陽令先下而身富貴矣必相率而降猶如阪上走丸也此臣所謂傳檄而千里定者也徐公再拜具車馬遣通通遂以此說武臣武臣以車百乘騎二百侯印迎徐公燕趙聞之降者三十餘城如蒯通策也項梁舉吳梁令項羽殺假守通便舉兵起吳吳今蘇州也田儋舉齊儋從少年縛奴欲殺之以見狄令因殺令舉兵也景駒舉郢周市舉魏韓廣舉燕窮山通谷豪傑並起而亡秦族矣漢高祖名邦字季姓劉氏沛國豐邑人為泗上之亭長秦二世元年陳勝等起勝自立為楚王張耳陳餘諫曰將軍出萬死之計為天下除害今始至陳而自立為王是示天下之私也不如立六國後自為樹黨進師而西則野無交兵城無守牆誅暴秦據咸陽以令諸侯天下可圖也勝不聽沛人殺其令立高祖為沛公時項梁止薛沛公往從之共立義帝范增說項梁曰秦滅六國楚最無罪自懷王入秦不反楚人憐之故語曰楚雖三戶亡秦必楚今陳勝首事不立楚後其勢不長今君起江東楚鋒起之將皆爭附君者以君代代楚將為能復立楚後也梁自求懷王孫心立也約曰先入咸陽者王之秦將章邯大敗項梁於定陶梁死章邯以為楚不足憂乃北伐趙楚使項羽等救趙遣沛公別將西入關沛公遂攻宛降之沛公攻宛南陽太守呂錡保城不下沛公欲遂西張良曰強秦在前宛兵在後此危道也乃圍宛宛急錡欲自殺其舍人陳恢踰城見沛公曰宛吏人懼死堅守足下盡日攻之死殞者必眾引兵而去宛必隨之足下前失咸陽之約後有強宛之患不如降封其守引其甲卒而西諸城未下者必開門而待足下沛公曰善封呂錡為殷侯攻武關大破秦軍趙高殺二世立子嬰遣兵拒關張良曰秦兵尚強未可輕也願益張旗幟諸山上為疑兵令酈食其持重寶啗秦將秦將果欲連和俱西沛公欲聽之良曰此獨其將欲叛恐士卒不從必危不如因其懈而擊之乃擊秦軍破之入咸陽與秦人約法三章秦人獻牛酒沛公讓不受於是人知德矣遣兵拒關欲王關中是時項羽破秦軍於河北率諸侯兵四十萬至鴻門欲擊沛公沛公因項伯自解于羽羽遂殺子嬰而東都彭城立沛公為漢王王巴漢漢王不肯就國欲攻楚蕭何曰王雖王漢之惡不猶愈於死乎且詩曰天漢其稱甚美夫能屈於一人之下則申於萬人之上湯武是也願大王王漢中撫其士人以致賢人收用巴蜀還定三秦天下可圖於是用韓信策乃東伐還定三秦漢王之國也韓信亡楚從入蜀無所知名數與蕭何語何奇之薦為大將軍信拜禮畢王曰丞相數言將軍將軍何以教寡人計策信謝因問王曰今東向爭權天下者豈非項王耶曰然信曰大王自料勇悍仁強孰與項王比漢王默然良久曰不如也信再拜賀曰雖信亦以為大王不如也然臣嘗事之請言項王之為人也項王喑噁叱咤千人皆廢然不能任屬賢將此特匹夫之勇也項王見人恭敬慈愛言語嘔呴人有疾病涕泣分食飲至使人有功當封爵者銷印列幣忍不能與此所謂婦人之仁也項王雖霸中國而臣諸侯不居關中而都彭城有倍義帝之約而以親愛王諸侯不平諸侯之見項王遷逐義帝置江南亦皆歸逐其主而自王善地項王所過無不殘滅者天下多怨百姓不親附特劫於威強服耳名雖為霸實失天下心故曰其強易弱今大王誠能反其道任天下武勇何所不誅以天下城邑封功臣何所不服以義兵從思東歸之士何所不散且三秦王為秦將將秦子弟數歲矣殺亡不可勝計又欺其眾降諸侯至新安項王詐坑秦降卒二十餘萬唯獨邯欣翳得脫秦人父兄怨此三人痛入骨髓今楚強以威而王此三人秦人莫愛也大王之入武關秋毫無所害除秦苛法與民約法三章耳秦民無不欲得大王王秦者於諸侯之約大王當王關中關中人戶咸知之大王失職入漢中秦人無不恨者今大王舉而東三秦可傳檄而定也於是漢王大喜遂聽信計初漢王之國也張良送至襃中說漢王曰王何不燒絕所過棧道示天下無還心以固項王意漢王乃使張良還因燒之楚以此無憂漢王之心也田榮怨項王之不己立殺田市自立為齊王羽北擊滅齊項羽以吳令鄭昌為韓王拒漢張良遺項羽書曰漢王失職之蜀欲得王關中如約即止不敢反又以齊反書遺羽曰齊欲滅楚羽以故不西行而北擊齊而使九江王殺義帝於郴漢王為之縞素發喪臨三日以告諸侯董公說漢王曰臣聞順德者昌失德者亡兵出無名事故不成故曰明其為賊敵乃可服項王為無道放殺其主天下之賊也夫仁不以勇義不以力三軍之眾為之素服以告諸侯為之東伐四海之內莫不仰德此三王之舉也漢王曰善漢王因項羽之擊齊率諸侯之師五十六萬東襲楚破彭城羽聞之留其將擊齊自以精兵三萬歸擊漢漢王與羽大戰彭城下漢王不利出梁地至虞謂左右曰孰能為使淮南王黥布令發兵背楚留項王於齊數月我之取天下可以萬全隨何乃使淮南說布背楚隨何說淮南王曰漢王使臣敬進書與大王御者竊惟大王與楚何親也淮南王曰寡人北面而臣事之隨何曰大王與項王俱列為諸侯北面而臣事之心以楚為強可以託國也項王伐齊身自負版築以為士卒先大王宜悉淮南之眾身自將之為楚軍前鋒今乃發四千人以助楚北面而臣事人者固若是乎夫漢王戰於彭城項王未出齊也大王宜掃淮南之兵渡淮日夜會戰彭城下大王撫萬人之眾無渡淮者垂拱而觀孰勝夫託國於人者固若是乎大王提空名以向楚而欲厚自託臣竊為大王不取也然大王不背楚者以漢為弱也夫楚兵雖強天下負之以不義之名以其背約而殺義帝也然而楚王恃戰勝自強漢王收諸侯還守滎陽下蜀漢之粟深溝高壘分卒守徼乘塞楚人還兵閒以梁地深入敵國八九百里欲戰則不得攻城則力不能老弱轉糧千里之外楚兵至滎陽成皋漢堅守而不動進則不得攻退則不得解故曰楚不足恃也使楚勝則諸侯自危懼而相救夫楚之強適足以致天下之兵耳故楚不如漢其勢易見也今大王不與萬全之漢而自託於危亡之楚臣竊為大王惑之臣非以淮南之兵足以亡楚也大王發兵而倍楚項王必留齊數月漢之取天下可以萬全臣請與大王提劍而歸漢漢王必裂地而分大王又況淮南必大王有也故使臣進愚計願大王留意也淮南王請奉命陰許叛楚與漢未敢泄楚使者在淮南方急責英布發兵舍傳舍隨何直入坐楚使者上坐曰九江王已歸漢楚何以得令發兵布愕然楚使者起何因說布曰事已構矣獨殺楚使者無使歸而疾走漢并力乃如漢使者教於是殺楚使者因起兵攻楚也漢王如滎陽使韓信擊魏王豹虜之漢王問酈生曰魏王大將誰也曰柏直王曰此其口尚乳臭不能當韓信騎將馮敬王曰不能當灌嬰步將項他王曰不能當曹參在吾無患矣王乃以信為左丞相擊魏信進兵為陳船欲渡臨晉魏聚兵距之信乃伏兵從夏陽以瓦罌度軍襲安邑虜魏王豹便進兵伐趙也漢遂與楚相距於滎陽楚圍漢王用陳平計閒得出漢王急問陳平策安出陳平曰彼項王骨鯁之臣亞父鍾離末之屬不過數人大王能出捐數萬金行反閒閒其君臣以疑其心項王為人意忌信讒必內相誅漢因舉攻之破楚必矣漢王乃以四萬斤金與平恣其所為不問出入平既多以金縱反閒於楚軍宣言諸將鍾離末等為項王將功多矣然終不能裂地而封欲與漢為一以滅項氏分王其地項王果疑使使至漢漢為太牢之具舉進見楚使即佯驚曰吾以為亞父使乃項王使也復持去以惡具進楚使使歸具報項王項王大疑亞父亞父欲急擊漢王項王不信亞父亞父聞項王疑乃曰天下事大定矣君王自為之願賜骸骨項王從之入關收兵欲復東轅生說漢王出軍宛葉引項王南渡使韓信等得集河北羽兵果引兵南渡如其策轅生說曰漢與楚相拒於滎陽成皋數月漢嘗困願王出武關項王必引兵南走王深壁令滎陽成皋閒且得休息使韓信等集于河北趙地君王乃復走滎陽如此則楚備者多力分漢得休息復與之戰破楚必矣漢王從此計出軍宛葉閒項王聞漢王在宛果引兵南渡如轅生之策韓信與張耳以兵數萬東下井陘擊趙破之乃報漢因請立張耳為趙王以鎮撫其國漢王從之初趙王與成安君陳餘聞漢且襲之聚兵井陘口廣武君李佐車說曰聞漢將韓信涉西河虜魏王擒夏說新喋血閼與今乃輔以張耳議欲下趙此乘勝而去國遠鬭其鋒不可當臣聞千里餽糧士有饑色樵蘇後爨師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在後願足下假臣奇兵三萬人從閒道出絕其輜重足下深溝高壘堅營勿與戰使前不得鬭退不得還吾奇兵絕其後野無所掠鹵不至十日而兩將之首可致於戲下願足下留意臣之計否必為二子所擒成安君不聽廣武君廣武君策不用信聞知之大喜乃進軍擊趙破之趙之破也韓信令軍中無殺廣武君有能生得者購千金於是有縛廣武君而致戲下者信乃解其縛師事之問曰僕欲北攻燕南伐齊何若而有功廣武君辭謝曰臣聞敗軍之將不可與言勇亡國之大夫不可與圖存今臣敗亡之虜何足以權大事乎信曰僕聞百里奚居虞而虞亡在秦而秦霸非愚於虞而智於秦用聽與不用聽也誠令成安君聽足下計若信者亦為禽矣僕委心歸計願足下勿辭廣武君曰臣聞智者千慮必有一失愚者千慮必有一得故曰狂夫之言聖人擇焉顧恐臣計未必足用願效愚忠夫成安君有百戰百勝之計一旦而失之軍破鄗下身死泜上今將軍涉西河虜魏王禽夏說閼與一舉而下井陘不終朝而破趙二十萬眾誅成安君名聞海內威震天下農夫莫不輟耕釋耒工女下機褕衣甘食傾耳以待命若此者將軍之所長也然而眾勞卒疲其實難用今將軍欲舉倦獘之兵頓之燕堅城之下欲戰恐不得攻城不能拔情見勢屈曠日糧竭而弱燕不服齊必距境以自強也燕齊相持而不可下劉項之權未有所分也若此者將軍之短也臣愚竊以為過矣故善用兵者不以短擊長而以長擊短韓信曰然則何由廣武君曰方今為將軍計莫如按甲休兵以鎮趙撫其孤弱百里之內牛酒日至以饗士大夫醳兵北首燕路而後遣辯士奉咫尺之書暴所長於燕燕必不敢不聽燕已從使喧告者東告齊齊必從風而服雖有智者亦不知為齊計矣如是則天下事可圖也兵固有先聲而後實者此之謂矣韓信曰善從其策發使燕齊從風而靡也十二月漢王拒楚於成皋享師欲復戰郎中鄭忠說曰王高壘深壁勿與戰使劉賈佐彭超入楚地焚其積聚破楚師必矣項羽乃東擊彭越留曹咎守成皋時漢數困滎陽成皋計欲捐成皋以東屯鞏洛以距楚用酈生計復守成皋酈生說曰臣聞知人之天者王事可成不知人之天者王事不可成王者以人為天而人以食為天夫敖倉天下轉輸久矣臣聞其下有藏粟甚多楚人拔滎陽不堅守敖倉乃引而東令適卒東守成皋此乃天所以資漢也方今楚易取而漢反却自奪其便臣以為過矣且兩雄不俱立楚漢久相持不決百姓騷動海內搖蕩農夫釋耒工女下機天下之心未有所定願足下急復進兵收滎陽據敖倉之粟塞成皋之險杜太行之路拒飛狐之口守白馬之津以示諸侯效實形制之勢則天下知所歸矣今燕趙已定唯齊未下今田廣據千里之齊田閒將二十萬之眾軍於歷城諸田宗強負海阻河濟南近楚人多變詐足下雖遣數十萬師未可以歲月破也臣請得奉明詔說齊王使為漢而稱東藩王曰善乃從其畫復守敖倉而使酈生說齊王曰王知天下之所歸乎王曰不知也曰王知天下之歸則齊可得而有也若王不知天下之所歸即齊國未可得保也齊王曰天下何歸酈生曰天下歸漢王曰先生何以知之酈生曰漢王與項羽戮力西向擊秦約先入咸陽者王之漢王先入咸陽項王負約不與而王之漢中項羽遷殺義帝漢王聞之起蜀漢之兵擊三秦出武關而責義帝之處收天下之兵立諸侯之後降城即以侯其將得賂即以分其士與天下同其利英豪賢士皆樂為之用諸侯之兵四面而至蜀漢之粟方船而下項王有背約之名殺義帝之負於人之功無所記於人之罪心不忘戰勝而不得其賞拔城而不得其封非項氏莫得能用事為人刻印刓而不能授攻城得賂積而不能賞天下叛之賢才怨之而莫為用故天下之士歸於漢王可坐而策也夫漢王發蜀漢定三秦涉三河之水授上黨之兵下井陘之路誅成安之罪北破趙舉三十二城此蚩尤之兵非人力也天之福也今已據敖倉之粟塞成皋之險守白馬之津杜太行之路拒飛狐之口而天下後服者先亡矣王疾先下漢王齊國社稷可得而保也不下漢王危亡立可待也田齊以為然乃聽酈生說罷歷下兵守淮陰侯乃夜渡兵平原襲齊齊王烹酈生引兵東走初酈生見沛公沛公方倨床使兩女子洗足而見酈生酈生入則長揖不拜曰足下欲助秦攻諸侯耶且欲率諸侯破秦耶沛公罵曰豎儒天下同苦秦久矣故諸侯相率而攻秦何謂助秦攻諸侯乎酈生曰必欲聚徒合義兵誅無道之秦不宜倨見長者於是沛公輟洗足起而謝之羽初東囑曹咎曰漢挑戰慎勿與戰勿令漢得東而已咎乃出戰死漢王遂進兵取成皋漢挑曹咎戰楚軍不出使人辱之數日咎怒渡兵汜水上士卒半渡擊破之盡得楚國寶貨羽聞咎破乃還軍廣武閒為高壇置太公於其上漢王遣侯公說羽求太公羽乃與漢約中分天下割鴻溝以西為漢以東為楚歸漢王父母及呂后項王解而東漢王欲西張良曰今漢有天下大半而諸侯皆附楚兵疲食盡此天亡楚之時不如因其東而取之漢王乃追羽與齊王韓信魏相彭越期會擊楚皆不會用張良計信等皆引兵圍羽垓下遂滅項氏漢王問張良曰諸侯不從奈何良曰楚兵且破未有分地其不至固宜君王能與共分天下可立致也齊王信之立非君王意信亦不自堅彭越本定梁地始君王以魏豹故越得拜為相國今豹死越亦望王而君王不早定今能取睢陽以北至穀城以王彭越從陳以東傅海與齊王信信家在楚其意欲復得故邑能出捐此地以許兩人使各自為戰則楚易敗於是漢王發使使韓信彭越劉賈等皆引兵圍羽垓下都洛陽用婁敬策徙都長安婁敬說上曰陛下都洛豈欲與周室並隆哉上曰然敬曰陛下取天下與周室異周之先自后稷堯封之於邰積德累善十有餘世公劉避桀居邠太王以戎狄故去邠扙馬箠居岐國人爭歸之及至文王為西伯斷虞芮之訟始受命呂望伯夷自海濱來歸之武王伐紂不期而會孟津之上者八百諸侯皆曰紂可伐矣遂滅殷成王即位周公之屬傅相焉乃營成周洛邑以此為天下之中也諸侯四方納職貢道理均矣有德則易以王無德則易以亡凡居此者欲令周務以德致人不欲依阻險令後世驕奢以虐人也及周之盛時天下和洽四夷向風慕義懷德附離而並事天下不屯一卒不戰一士四夷大國之民莫不賓服效其貢職及周之衰也分而為兩天下莫朝周不能制非其德薄形勢弱也今陛下起豐擊沛收卒三千人以之徑往而卷蜀漢定三秦與項籍戰於滎陽爭成皋之口大戰七十小戰四十使天下之民肝腦塗地父子暴骨於中野不可勝數哭泣之聲未絕傷夷之卒未起而欲比隆於成周之時臣竊以為不侔矣且夫秦地被山帶河四塞以為固卒然有急百萬之眾可具此所謂天府也陛下入關而都之山東雖亂秦之故地可全而有夫與人鬭不搤其喉而拊其背未能全勝也今陛下入關而都長安案秦之故地此亦搤天下之喉而拊其背高祖以問群臣群臣皆山東人爭曰周王七百年秦二世即滅不如都洛陽洛陽東有成皋西有崤澠背河向伊雒其固亦足恃也留侯曰洛陽雖有此固其中小不過數百里地薄四面受敵此非用武之國也夫漢中左崤函右隴蜀沃野千里南有巴蜀之饒北有胡宛之利阻三面而獨守一面東制諸侯諸侯安定河渭漕輓天下足以西給京師諸侯有變順流而下足以委輸此所謂金城千里天府之國婁敬說是也其是高祖即日駕西都關中有告楚王韓信反用陳平計擒之廢為淮陰侯高帝問諸將諸將曰亟發兵坑豎子耳高帝默然問陳平平曰人上書言信反人有聞知者乎曰未有曰信知之乎曰不知陛下精兵孰與楚曰不能過平曰陛下將用兵有能敵韓信乎上曰莫及也平曰今兵不如楚精將又不及而舉兵擊之是趣戰也竊為陛下危之上曰為之奈何平曰古者天子巡狩會諸侯南方有雲夢陛下第出偽遊雲夢會諸侯於陳陳楚之西界信聞天子以好出遊其勢必郊迎謁而陛下因擒之此特一力士之事高祖以為然發使者告諸侯上因遂行信果迎道中帝預具武士見信即執縛之田胥賀上曰甚善陛下得韓信又治秦中秦形勝之國帶河阻山懸隔千里執戟百萬秦得百二焉地勢便利其以下兵於諸侯譬猶居臺之上建瓴水也夫齊東有瑯琊即墨之饒南有太山之固西有濁河之限北有渤海之利地方二千里持戟百萬懸隔千里之外齊得十二焉此東西秦也非親子弟莫可使王齊者上曰善賜金五百斤陳豨為代相與韓信王黃等反豨自立為代王上自往破之高祖赦趙代吏人為豨所詿誤者趙相奏斬常山守尉曰常山北二十五城豨反亡其二十城上問曰守尉反乎對曰不反上曰是力不足也赦之復以為守尉上既至邯鄲喜曰豨不南據漳水北守邯鄲吾知其無能為也問周昌曰趙亦有壯士可令將者乎對曰見有四人四人見上慢罵曰豎子能為將乎各封之千戶以為將左右諫曰從入蜀漢伐楚賞未徧行今此何功而封上曰非爾所知也陳豨反邯鄲以北皆豨有也吾以羽檄徵天下兵未有至者今惟獨邯鄲中兵耳吾何愛四千戶不封此四人以慰趙子弟心皆曰善於是上曰陳豨將誰也曰王黃曼丘臣皆故賈人上曰吾知之矣乃各以千金購黃臣等其黃臣等麾下受購賞皆生得以故陳豨軍遂敗初韓信知漢畏惡其能與陳豨謀反高帝自將擊豨信稱疾不從行欲從中起信舍人得罪信囚之欲殺舍人弟告信反狀於呂后呂后欲召恐其黨不就乃與蕭相國謀詐令人從上所來言豨已死矣列侯群臣皆賀相國詐信曰雖病強入賀信入呂后使武士縛信斬之長樂宮尉佗王南越反高祖使陸賈賜尉他印綬為南越王令稱臣奉漢約陸生至南越尉他髻箕踞見陸生陸生因進說曰足下中國人親戚昆弟墳墓在真定今足下反天性棄冠帶欲以區區之越與天子抗衡為敵國禍且及身矣且夫秦失其政諸侯豪傑並起唯漢王先入關據咸陽項王背約自立為西楚霸王諸侯皆屬可謂至強然漢王起巴蜀鞭笞天下制諸侯遂誅項羽滅之五年間海內平定此非人力天之所建也天子聞君王南越不助天下誅暴逆將欲移兵而誅王天子憐百姓新勞苦且休之遣臣授君王印綬剖符通使君王宜郊迎北面稱臣乃欲以新造未集之越屈強於此漢誠聞之掘王先人塚夷王宗族使一偏將將十萬眾以臨越越則殺王以降如反覆手耳於是尉他蹶然起謝陸生卒拜尉他而還初南海尉任嚚病且死召龍川令趙他謂曰聞陳勝作亂豪傑叛秦相立番禺負山險阻南海東西數千里頗有中國人相輔此一州之主也可以立國即以他行南海尉事嚚死他移檄告諸郡曰盜兵即至急絕新道聚兵自守因稍以法誅秦所置長吏以其黨為假守自立為南越武王高祖在位十二年崩年六十二惠帝立呂后臨政呂后時陳平燕居深念陸生曰何念之深也平曰生揣吾何念陸生曰足下位為上相食三萬戶侯可謂極富無欲矣然有憂念不過患諸呂少年耳平曰然為之奈何陸生曰天下安注意於相天下危注意於將將相和則士預附士豫附天下雖有變則權不分權不分為社稷計在兩君掌握耳何不交歡太尉深相交結平用其計竟誅諸呂初呂后之崩也大臣誅諸呂呂祿為將北軍太尉勃不得入北軍時酈商子寄與呂祿善於是乃使人劫酈商其子結呂祿信之故與出遊而太尉乃得入北軍誅呂氏也景帝時吳楚反征平之帝使太尉周亞夫東擊吳楚亞夫問父客鄧都尉曰策將安出客曰吳兵銳甚難爭鋒楚兵輕不能持久方今為將軍計莫若引兵東壁昌邑以梁餧吳吳必盡銳攻之將軍深溝高壘使輕兵絕准泗口吳糧道絕使吳梁相弊而糧食竭乃以全制其極破吳必矣條侯曰善因請上曰楚兵剽輕難與爭鋒願以梁餧之絕其糧道乃可制也上許之亞夫至滎陽吳方急攻梁梁急請救亞夫引兵東北走昌邑深壁而守梁王使使請亞夫亞夫守便宜不往堅壁不出而使弓高侯等屯吳楚兵後絕其餉道吳楚兵乏糧饑欲退數挑戰終不出吳楚既餓乃引兵而去亞夫出精兵追擊大破吳也崩太子徹立是為武帝崩子勿陵立是為昭帝霍光輔政上官桀害光寵詐為帝兄燕王旦上書稱光行上林稱蹕又私調校尉帝不信而上官桀詐偽事果發伏誅崩立武帝孫昌邑王賀賀昌邑哀王髆之子即位二十七日事有千一百二十七條霍光廢賀為海昏侯也廢立武帝曾孫詢是為宣帝帝衛太子之孫崩立太子奭是為元帝崩立太子驁是為成帝委政諸舅王鳳等同日拜鳳兄弟五人為侯號曰五侯五侯皆專政也崩立宣帝孫定陶恭王子欣是為哀帝即位六年崩無嗣崩立帝弟中山孝王衎是為平帝帝年幼為王莽所酖崩立宣帝玄孫嬰是為孺子莽廢嬰自立偽新室王莽者成帝舅王曼之子元帝王皇后之姪也元帝崩成帝即位以元舅鳳為大司馬兄弟五人皆為侯元帝皇后魏郡王禁之女生成帝時鳳秉政同日封兄弟五人為五侯曼早卒鳳將薨以莽託太后太后莽之姑也封為新都侯五侯競為僭起治第舍莽幼孤貧獨折節恭謹當世名士多為莽言上由是賢之拜為侍中莽交結將相收贍名士賑施賓客故虛譽隆洽傾熾其諸父矣時成帝廢許后立趙飛鷰飛鷰女弟為昭儀昭儀害後宮皇子帝無嗣乃立定陶王忻為皇太子忻者宣帝孫成帝弟之子初王祖母傅太后陰為王求為漢嗣私事趙皇后昭儀及帝舅王鳳故勸立之莽以發定陵侯淳于長大姦拜為大司馬初長與許皇后姊孊私通因孊孊賂遺長長許欲白上為左皇后時王根輔政久病長嘗代根莽心害長寵白根曰長與許貴人私交通見將軍久病私喜根怒令莽白長長下獄死時年三十八成帝崩哀帝即位立皇后傅后后即帝祖母定陶恭太后從女弟也封后父博晏為孔鄉侯帝母丁后曰恭皇太后舅丁明為安陽侯莽乞骸骨避丁傅也哀帝崩時莽以侯在第太皇太后令莽備佐喪事太皇太后元帝皇后也復為大司馬徵立中山王為帝即平帝帝名衎為中山王即孝王子也太皇太后臨朝莽秉政百官總己以聽於莽附順者拔擢忤恨者誅滅以王尋王邑為腹心甄豐甄邯主擊斷平晏典樞機劉歆典文章孫建為爪牙皆以才能並任顯職莽色厲而言方欲有所為徵見風采黨與承其旨意而顯奏之莽因固讓示不得已上以惑太后下以示信於眾庶越常氏重譯獻白雉一黑雉二莽令益州諷群臣奏言莽功德比周公宜賜號安漢公平帝崩莽徵宣帝玄孫廣成侯子嬰立之年三歲遂謀居攝如周公故事時元帝統絕宣帝曾孫五人莽惡其長者託以卜相宜吉乃立嬰也東都太守翟義反敗死義丞相方進子也立劉信為天子也莽自謂威德日盛獲天人之助用銅匱符命遂即真梓橦人袁世章上銅匱符命其九年赤眉賊起琅琊女子呂母為子報仇黨眾復浸多號赤眉賊十四年世祖起兵與王匡等共立劉聖公為更始皇帝更始即世祖族兄世祖及兄伯升與新市平林兵上王匡等合軍攻棘陽莽遣王尋王邑擊更始二人兵敗于昆陽漢兵遂入城中人皆降莽走漸臺藏於室中北隅閒校尉公孫賓就斬莽遂傳首詣更始于宛世祖光武皇帝諱秀字文叔南陽蔡陽人高皇帝之九代孫也王莽末天下連歲災蝗寇盜蜂起莽末南方饑饉人民群入野澤掘鳧茈食更相侵奪新市人王匡為平理爭訟遂推為渠帥時劉玄避吏平林時世祖避吏新野因賣穀宛宛人李通以圖讖說世祖通父守好讖記通素聞守說云劉氏復興李氏為輔私嘗懷之及下江新市兵起通弟軼乃共計議曰今四方擾亂新室且亡漢當更興南陽宗室獨劉伯升兄弟汎愛容眾可與謀大事笑曰吾意也會世祖避事在宛通聞之即遣軼迎世祖遂相約結未幾世祖與伯升鄧晨俱之宛與欀人蔡恭少公等讌語少公頗學圖讖言劉秀為天子或曰是國師劉秀乎世祖笑曰何用知非僕耶坐者皆大笑晨心獨喜後因謂世祖曰王莽殘暴盛夏斬人此天亡之時往時之會宛語獨當應耶世祖笑及漢兵起鄧晨遂往從之世祖於是與通弟李軼起於宛兄伯升起於舂陵鄧晨起新野會眾兵擊長聚新市人王匡等立劉聖公為天子而害伯升劉玄字聖公世祖族兄也避吏于平林王匡等立之初伯升自王莽篡漢帝憤憤懷匡復社稷之慮不事家人之居業傾財破產交結天下雄俊王莽末盜賊群起伯升召諸豪傑計議於是使親客鄧晨起新野世祖李軼起於宛伯升發舂陵子弟七八千人部署賓客自稱柱天都部使劉嘉誘新市平林兵王匡陳牧等合軍而進屠長聚諸將議立劉氏以從人望豪傑咸欲歸伯升而新市平林將帥樂放縱憚伯升威明貪聖公懦弱先定策立之然後召伯升示其議伯升曰諸將軍欲尊立宗室德其厚焉愚鄙之見竊未有同今赤眉起青徐眾數十萬聞南陽立宗室恐赤眉復有所立如此將內自爭今王莽未滅而宗室相攻是疑天下而自捐權非所以破莽也且首兵唱號鮮有能遂陳勝項羽即其事也舂陵去宛三百里耳未足為功而遽自尊立為天下準的使後人能承吾弊非計之善者也今且稱王以號令若赤眉所立者賢則相率而往從之若無所立破莽除赤眉然後舉尊號亦未晚也願善詳思之諸將不從遂立聖公由是豪傑失望伯升都部將劉稷勇冠三軍聞更始立怒曰本起兵圖大事者劉伯升兄弟也更始何者耶更始君臣聞而心忌之乃陳兵數千收稷將誅之伯升固爭李軼朱鮪因勸更始并執伯升即日害之李軼與世祖既隙後因馮公孫致密書求效誠節或勸祕之世祖乃班露軼書曰李季文多詐不信人也今移其書告守尉書既宣露朱鮪使人殺軼也號更始元年更始使世祖為偏將軍徇昆陽王莽聞漢帝立大懼遣大司徒王尋大司空王邑將兵百萬擊世祖於昆陽世祖破之初伯升拔宛已三日而世祖尚未知乃偽使人持書報城中云宛下兵到而佯墮下其書尋邑得之不憙諸將既經屢捷膽氣益壯無不一當百世祖乃與敢死者三千人從城西出衝中堅尋邑陣亂乘銳崩之遂殺王尋莽兵大潰走者自相騰踐奔殪百餘里間會大雷風雨飛如注滍水盛溢虎豹皆戰慄溺死者以萬數水為之不流三輔豪傑共誅王莽傳首詣宛更始以世祖行大司馬事持節北渡河鎮慰州郡鄧禹杖策北渡河追世祖世祖見禹甚歡謂曰我得專封拜先生遠來寧欲仕乎禹曰不願也明公威德加于四海禹得效其尺寸垂功名於竹帛耳世祖笑因留宿禹進說曰更始雖都關西今山東未安赤眉青犢之屬動以萬數三輔假號往往群聚更始既未有所挫而不自聽斷諸將皆庸人崛起志在財帛爭用威力朝夕自快而已非有忠良明智深慮遠圖欲尊主安民者也四方分崩離析形勢可見明公雖建蕃輔之功猶恐未可成立於今之計莫如延覽英雄務悅人心立高祖之業救萬人之命以公而慮之天下不足定也世祖大悅及從至廣阿披輿地圖指示禹曰天下郡國如是今始得其一子前言以吾慮之天下不足定何也禹曰今海內散亂人思明君猶赤子之慕慈母也古之興者在德厚薄不以小大世祖笑悅又馮異說世祖曰人思漢久矣今更始諸將縱橫暴虐所至虜掠百姓失望無所依戴今公專命方面施行恩德夫有桀紂之亂乃見湯武之功人久饑渴易為充飽宜急分遣官屬巡行郡縣理冤結布惠澤世祖納之也王郎詐為成帝子子輿立為天子都邯鄲遣使降下郡國世祖滅之王昌一名王郎趙國邯鄲人也素為卜相常以河北有天子氣時趙繆王子林好奇數任俠趙魏間而郎與之善初王莽篡位長安中或稱成帝子子輿者莽殺之郎緣是稱真子輿云更始元年平林等率車騎數百晨入邯鄲城立郎為天子世祖進攻邯鄲郎少傅李立為反開關門內漢軍遂拔邯鄲斬王郎收文書得人吏與郎交關謗毀上者數十章世祖不省會諸將燒之曰令反側子自安也世祖威聲日盛更始疑慮乃遣使立世祖為蕭王令罷兵與諸將有功者還長安遣苗曾為幽州牧韋順為上谷守並北之部時世祖居邯鄲宮耿弇請閒說曰今更始失政君臣淫亂諸將擅命於畿外貴戚縱橫於都內天子之命不出城門所拜牧守輒自遷易百姓不知所從士人莫敢自安虜掠財物劫掠婦女懷金玉者至不生歸元元叩心更思王莽又銅馬赤眉之屬數十輩數及百萬聖公不能辦也其敗不久公首舉事南陽破百萬之軍令定河北據天府之地以義征伐發號響應天下可馳檄而定天下至重不可令他姓得之閒使者從西方來欲罷兵不可從也今吏士死亡者多弇願北歸幽州益發精兵以集大計世祖大悅弇歸上谷斬韋順等世祖辭不就徵斬苗曾等自是始貳於更始是時長安政亂四方背叛皆平之梁王劉永擅命睢陽公孫述稱王巴蜀李憲自立為淮南王秦豐自號為楚黎王張步起琅邪董憲起東海延岑起漢中田戎起夷陵並置將帥侵略郡縣又有赤眉銅馬之屬不可勝計初銅馬降世祖猶不自安世祖知其意敕令各歸營勒兵馬乃自乘輕騎按行步陣降者更相語曰蕭王推赤心致人腹中安得不投死乎由是悉服世祖使耿弇討張步步聞之乃使其大將費邑軍歷下又分具屯於祝阿別於太山鍾城列營數十以待弇弇乃渡河先擊祝阿自旦攻城日未中而拔之故開圍一角令其眾得奔歸鍾城鍾城聞祝阿已隤大懼遂空壁亡去費邑分遣其弟敢守巨里弇分兵脅巨里使多伐樹木揚言以填塞坑塹數日有降者言邑聞弇欲攻巨里謀來救之弇乃令軍中曰後三日當悉力攻巨里城陰緩生口令得亡歸歸者以弇期告邑邑至日果自將救之弇喜謂諸將曰吾所以修攻具者欲誘致邑耳今來適所求也即分三千人守巨里自引精兵上岡阪乘高合戰臨陣斬邑既而收首級以示巨里城城中兇懼費敢悉眾亡歸張步步時都劇使其弟藍守西安諸郡太守守臨菑相去四十里弇進軍居二城之閒弇視西安城雖小而堅臨菑雖大而實易攻乃敕諸部後五日攻西安城藍聞之晨夜警守至期夜半弇敕諸將皆蓐食會明至臨菑城出其不意半日拔之入據其城張藍懼遂將其眾亡歸劇弇乃令軍士無得妄掠劇下頃張步至乃取之以激怒步步聞之大笑至菑攻弇弇先出臨菑水上突騎欲縱弇恐挫其鋒令步不敢進故示弱以盛其氣乃引歸小城陳兵於內步氣盛直攻弇營與劉歆合戰弇升王宮壞臺望之視歆鋒交及自引精兵以橫突步陣大破之步走降世祖陳俊逃弇欲招其故眾令陳俊追斬諸賊悉平之赤眉賊入函關攻更始世祖乃遣鄧禹引兵而西以乘更始赤眉之亂赤眉賊樊崇立劉盆子為天子入長安殺更始寇掠關中於是諸將上尊號乃命有司設壇於鄗南千秋亭五城陌即皇帝位諸將上奏曰漢遭王莽宗廟廢絕豪傑憤怒兆人塗炭王與伯升首舉義兵更始因其資以據帝位不能奉承大統而敗亂綱紀盜賊日多群生危蹙大王初征昆陽王莽自潰後拔邯鄲北州弭定三分天下有其二跨州據土帶甲百萬言武力莫之敢抗諱文德則無所與辭臣聞帝王不可以久曠天下不可以謙拒唯大王以社稷為計萬姓為心又彊華自關中奉赤伏符曰劉秀發兵捕不道四夷雲聚龍鬭野四七之際火為主然後即皇帝位十月駕東幸洛陽赤眉降大司徒鄧禹馮異劉弘等征赤眉異曰異前與戰拒華陰經數十日雖屢獲雄將餘眾尚多可稍以恩信傾誘難卒用兵破也上今使諸將屯澠池要其東異擊其西一舉而取之此萬成計也禹宏不從遂大戰赤眉佯敗棄輜重走車皆載土以豆覆其上兵士饑爭取之赤眉引還擊弘等弘等軍亂潰異與禹救之赤眉小卻異歸壁約期會戰異使壯士變服色與赤眉同伏於道側旦日赤眉使萬人攻異前部異裁出兵救之賊見勢弱遂悉眾攻異異乃縱兵大戰日昃賊氣衰伏兵卒起衣服相亂赤眉不復識遂驚潰赤眉君臣面縛奉皇帝璽綬降世祖平隗囂滅公孫述天下大定崩於南宮時年六十三世祖初起兵時年二十八末孫靈帝用奄人曹節等矯制誅太傅陳蕃李膺其黨人皆禁錮中平九年黃巾賊起鉅鹿張角自稱大賢良師奉事黃老道畜養子弟連結郡國期三月五日內外俱起唐周告之角便起皆著黃巾為標幟也靈帝崩太子辯即位董車入朝因廢帝為弘農王而立獻帝李傕逼帝東遷曹操遷帝都許操薨帝遜位于曹丕魏太祖武皇帝沛國譙人也姓曹諱操字孟德靈帝時為典農校尉漢末奄豎擅權何進謀誅奄豎太后不聽進乃召四方猛將使引兵向京師欲以恐劫太后陳琳進諫曰易稱即鹿無虞說有掩口捕雀夫物微尚不可欺以得志況國之大事而可詐立乎今將軍總皇威握兵要龍驤虎視高下在心以此行事無異於鼓洪鑪而燎毛髮但當速發雷霆行權立斷違經合道天人順之而反釋其利器更徵於他大兵合聚強者為雄所謂倒持干戈授人以柄必無成功祗為亂階也進不納其也董卓至廢帝為宏農王而立獻帝京師大亂太祖亡出關至陳留散家財合義兵於已吾與後將軍袁術冀州牧韓馥豫州刺史孔伷兗州刺史劉岱渤海太守袁紹同時俱起眾各數萬推紹為盟主設壇場共盟誓臧洪操盤歃血而盟曰漢室不幸皇綱失統賊臣董卓乘釁縱暴害加至尊毒流百姓大懼淪喪社稷翦覆四海兗州刺史劉岱豫州刺史孔伷等糾合義兵並赴國難凡我同盟齊心戮力以致臣節殞首喪元必無二志有渝此盟俾墜其命無克遺育皇天后上祖宗明靈實皆鑒之洪慷慨涕泗立下聞者激揚曹公行稱奮武將軍卓聞兵起乃徙天子都長安卓留兵屯洛陽司徒王允與呂布殺卓楊奉韓暹以天子還洛陽太祖至洛陽衛京邑暹遁走太祖以洛陽燒焚殘破奉天子都許下詔責袁詔以地廣兵強專自樹黨不聞勤王之師紹時并公孫瓚兼四州之地紹遂攻許太祖破之官渡紹嘔血死袁紹字本初汝南人也為司隸校尉董卓議廢立紹不聽卓怒紹懸節於上東門奔冀州卓購求紹伍瓊為卓所信陰為紹說曰夫廢立大事非常人所及袁紹不達大體恐懼出奔非有他志今急購之勢必為變袁氏樹恩四世門生故吏遍於天下若收豪傑以聚徒眾英雄因之而起即山東非公所有也不如赦之拜一郡守紹喜於免罪必無患矣卓以為然乃遣授紹渤海太守紹與孔伷等同起義襲奪韓馥冀州據河北練精卒十萬騎萬匹欲進攻曹操於許沮授進說曰近討公孫師出歷年百姓疲弊賦役方殷此國之深憂也宜先獻捷天子務農逸民若不得通乃表曹操隔我王命然後進屯黎陽漸營河南益作舟船繕治器械分遣精騎抄其邊鄙令彼不得安我取其逸如此可坐定也郭圖審配曰兵書之法十圍五攻敵則能戰今以明公神武連河朔之強眾以伐曹操其勢譬如覆手今不時取後難圖也授曰蓋聞救亂誅暴謂之義兵恃眾憑強謂之驕兵兵義無敵驕者先敗曹操奉定天子建宮許都今舉兵相向於義則違且廟勝之策不在強弱曹操法令既行士卒精練非公孫瓚坐受圍者也今棄萬安之術而興無名之師竊為公懼之圖曰武王伐紂不為不義況兵加曹操而云無名且公師徒精銳將士思舊而不及時早定大業所謂天與不取反受其咎此越之所以霸吳之所以亡也監軍之計在於持牢而非見時知機之變也紹遂不用沮授之計曹公軍官渡紹將悉眾而南田豐說紹曰曹公善用兵變化無方眾雖少未可輕也不如以久持之將軍據山河之固擁四州之眾外結英雄內修農戰然後𥳑其精銳分為奇兵乘虛迭出以擾河南救右則擊其左救左則擊其右使疲於奔命人不得安業我不勞而彼已困不及三年可坐而克也今釋廟算之策而決成敗于一戰若不如志悔無及也紹不從遂攻操於官渡紹自引兵至黎陽沮授臨行散其資財會宗族以與之曰勢在威無不加勢亡則不保其身哀哉其弟宗曰曹操士馬不敵君何懼焉授曰以曹兗州之明略又挾天子以為資我雖克伯珪眾實疲弊而主驕將汰軍之破敗在此舉也揚雄有言六國嗤嗤為嬴弱姬殆今之謂耶及渡河臨舟嘆曰上盈其志下務其功悠悠黃河吾將濟乎紹果為曹公所敗紹進保武陽與操相持沮授又說曰北兵雖眾而果勁不及南南穀虛少而財貨不及北南利在於急戰北利在於緩搏宜持以久曠以日月紹不從連營漸逼官渡許攸進曰曹操兵少而悉師拒我許下餘守勢必虛弱若分遣輕騎星行掩襲許拔則操為成擒如其未潰可令首尾奔命破之必也紹又不能用會攸家犯法審配收繫之攸不得志遂奔曹公而說操襲取淳于瓊瓊時督軍屯在烏巢去紹軍四十里操自將急擊之時張郃說紹曰曹公兵精往必破瓊瓊破則將軍事去宜引兵救之郭圖曰郃計非也不如攻其本營勢必還此為不救而自解也郃曰曹公營固攻之必不拔若瓊等見擒吾屬盡為虜矣紹但遣輕騎救瓊而以重兵攻操營不能下曹公破瓊焚其積聚紹軍潰散奔北曹公遂破紹乃威震天下也太祖討紹子譚尚於黎陽尚與熙奔遼東太守公孫康斬尚熙送其首遂平河北初太祖討譚尚於黎陽連戰數克諸將欲乘勝攻之郭嘉曰袁紹愛此二子莫適立也有郭圖逢紀為之謀臣定鬭其閒還相離也急之則相持緩之則爭心生不如南向荊州征劉表以待其變變成而後擊之可一舉而定也太祖曰善太祖方征劉表譚果與弟尚爭冀州譚遣辛毗乞降請赦太祖以問群臣群臣多以為表強宜先平之譚不足憂也荀攸曰天下方有事而表坐保江漢閒其無四方之志可知矣袁氏據四州之地帶甲十萬紹以寬得眾欲使二子和睦以守其成業則天下之難未息今兄弟遘惡其勢不兩全若有所并則力全力全則難圖也及其亂而取之則天下不足定也此時不可失也太祖曰善乃許譚和破袁尚太祖征劉表會表卒子琮降劉表字景升山陽高平人初平元年詔以表為荊州刺史南接五嶺北據漢川地方數千里帶甲十餘萬曹操與袁紹相持與官渡紹遣人求助表許之而不至亦不援操且欲觀天下之變劉先主說表曰今豪傑並爭兩雄相持天下之重在于將軍將軍若有所為起乘其弊可也如其不然固將擇所宜從豈可擁甲十萬坐觀成敗求援而不能助見賢士而不能歸此兩怨必集於將軍恐不得復中立矣曹操善用兵且賢俊多歸之其勢必舉袁紹然後移兵向江漢恐將軍不能禦也今之勝計莫若以荊州附操操必重德將軍長享福祚垂之後嗣此萬全之策也表不從十三年曹操自將征表未至表疽發背卒操軍新野傅巽說琮歸降琮曰今與諸君據全楚之地守先君之業以觀天下何為不可巽曰逆順有大體強弱有定勢以人臣拒人主逆道也以新造之楚而禦中國必危也以劉備而敵曹公不當也三者皆短欲以抗王師之鋒必亡之道也將軍自料何如劉備琮曰不若也巽曰誠以備不足禦曹公則雖保全楚不能以存誠以劉備足敵曹公則備不能為將軍下也願將軍勿疑琮遂舉眾降時劉備奔在荊州表不能用聞荊州降遂奔夏口也關中諸將馬超韓遂成宜等反曹公破之曹公與馬超等夾關為界曹公急持之而潛遣徐晃等夜渡蒲阪津據河西為營公自潼關北渡未濟超赴船急戰丁斐放牛馬以餌賊賊亂取牛馬公乃得渡結營河南超遣信求割地任子以和公偽許之韓遂請與公相見至期交馬上語移時不及軍事但說京都故舊拊手歡笑既罷超問遂何言遂曰無所言超疑之他日公又與遂書多所毀滅點逭如遂改定者超愈疑遂曹公乃與戰大破之關中平諸將問公曰初賊守潼關渭北道鈌不從河東擊馮翊而反守潼關引口而復北渡何也公曰賊守潼關若吾入河東賊必引守諸津則河西未可渡也吾故盛兵向潼關賊悉眾南守西河之備虛故二將得擅取西河然後引軍北渡賊不能與吾爭西河者以有二將之軍連車樹柵為甬道而南者既為不可勝且以示弱渡河為堅壘虜至而不出所以驕之也故賊不為營壘而求割地吾順言許之所以從其意使自安而不為備因畜士卒之力一旦擊之所謂疾雷不及掩耳卒電不及暝目兵之乘變固非一道也天子策命公為魏王孫權稱吳王據江東劉備襲益州牧劉璋據蜀天下遂三分矣二十五年薨于洛陽子丕嗣丕字子桓武帝太子也是為文帝受漢禪崩子睿嗣睿字元仲文帝太子也是為明帝崩子齊王芳立十五年廢廢高貴鄉公髦立七年殺廢常道鄉公璜立璜禪晉晉封為陳留王晉高祖宣帝名懿字仲達姓司馬河內溫人也仕於魏武之世歷文明二帝居將相之位平孟達達為新城太守反滅公孫度度世稱燕王據遼東擒王陵陵謀立楚王為帝兵敗自殺魏明帝崩遺詔使帝為太尉與大將軍曹爽輔少主少主齊王芳也帝誅曹爽爽謀為不軌宣帝謝病避之爽黨李勝為荊州別駕帝詭為耄惛云并州近胡可為其備勝退謂爽曰司馬公屍居殘氣神形已離不足虞也爽於是專恣惡太后知政遷於永寧宮嘉平元年天子謁高陵爽兄弟擁兵從出宣帝乃奏永寧宮廢爽然後勒兵至洛水迎天子奏爽與其黨謀反皆誅宣帝崩子師代為相師字子元是為肅宗景皇帝鎮東將軍毌丘儉揚州刺史文欽反征平之儉欽初反也景帝問王肅曰安國寧主其術安在肅答曰昔關羽率荊州之眾降于禁於漢濱遂有北向爭天下心後孫權取其將士家屬羽士眾一旦瓦解今淮南將士父母皆在州但急往禦之使不得前必有關羽土崩之勢景王從之遂破儉等也景帝崩弟昭代為相昭字子上是為太祖文帝輔政為司空諸葛誕據壽春反奉詔征平之伐蜀擒劉禪于時政出於權臣人君主祭而已魏帝不能容自勒兵攻相府太祖用長史賈充計逆戰舍人成濟執殺魏帝高貴鄉公也名髦字士彥乃偽令皇太后下令廢少帝又委罪成濟誅其三族太祖崩子炎受魏禪炎字子安文帝太子是為世祖武皇帝即受魏禪用羊祜杜預計征吳平之立二十五年崩太子衷立字正度是為惠帝武帝太子惠帝不惠妃賈充女為皇后后秉權殺楊駿廢太后賈后淫妬遇姑無禮乃詐誣太后父楊駿反使帝誅之廢太后於金墉城餓殺之誅太宰汝南王亮太保衛瓘亮瓘並以名德執政后意不得行乃使帝弟楚王瑋矯詔誅亮瓘因又誅瑋戮楚王瑋殞太子遹賈后無子乃許有娠養賈謐子為子太子遹宮人謝氏生也少而聰慧賈后惡之譖太子廢之金墉城又遣小黃門殺太子用趙王倫為相國倫惡司空張華僕謝裴顧正直矯詔誅之倫遂篡帝位於是齊王攸之子冏與帝弟成都王穎等起義兵誅倫穎於是鎮鄴并州刺史東瀛公騰安北將軍王浚又起兵討穎穎敗挾天子南奔洛陽後惠帝復位帝弟長沙王又譖冏誅之由是戎狄並興四方阻亂遂分為三十六國劉元海為匈奴質子在洛陽晉武帝與語說之謂王渾曰元海容儀機鑒猶由余日磾無以加也渾對曰元海容儀實如聖旨然其文武才幹賢于二子遠陛下若任之以東南之事吳會不足平也帝稱善孔恂楊珧曰臣觀元海之才當今無比陛下若輕其眾不足以成事若假之威權平吳之後恐其不復北渡也非我族類其心必異任之本部臣竊為陛下寒心若舉天阻之國以資之無乃不可乎帝默然後秦涼覆沒帝疇咨將帥李喜曰陛下誠能發匈奴五部之眾假元海一將軍之號鼓行而西指日可定也孔恂曰李公之言未盡殄患之理元海若能平涼州斬樹機能恐涼州方有難耳蛟龍得雲雨非復池中物也帝乃止惠帝失馭寇賊蜂起成都王穎鎮鄴表元海行寧朔將軍監五部軍事及王浚等討穎元海說穎曰今二鎮跋扈眾餘十萬恐非宿衛及近都士眾所能禦之請為殿下還說五部眾以赴國難穎從之元海至國左賢王劉宣等上大單于之號二旬之間眾已五萬遂寇平陽陷之入蒲于時五胡亂中原矣石勒者上黨羯胡也據於趙幽州牧王浚署置百官勒有并吞之意欲先發使以觀之議者僉曰宜如羊祜陸抗之事亢書相聞時張賓有疾勒就而謀之賓曰王浚假三部之力圖稱南面雖曰晉藩實懷僭逆之志必思協英雄圖濟事業將軍威震海內去就為存亡所在為輕重浚之欲將軍猶楚之招韓信也今權譎遣使無誠款之形脫猜疑之兆露後雖奇略無所設也夫立大事必先為之卑當稱藩推奉尚恐不信羊陸之事臣未見其可也勒曰右侯之計是也乃遣其舍人王于春齎珍寶奉表推崇浚浚謂子春曰石公一時英武據有舊趙成鼎峙之時何謂稱藩於孤其可信乎子春曰石將軍英才俊拔士馬盛強實如聖旨仰惟明公州郡貴望累葉重光出鎮藩岳威聲播於八表因以胡越欽風戎夷歌德豈唯區區小府而敢不斂衽神闕者乎昔陳嬰豈其鄙王而不王韓信薄帝而不帝哉但以帝王不可以勇致力爭故也石將軍之擬明公猶陰精之比太陽江河之比洪海耳項籍子陽覆車不遠是石將軍之明鑒也明公亦何怪乎自古誠胡人而為名臣者實有之矣帝王則未之有也石將軍非以惡帝王而讓明公也顧取之不為天下所許也願公勿疑浚大悅遣使報勒勒復遣使奉表於浚期親詣幽州上尊號亦修牋於棗嵩乞并州牧廣平公以見必信之誠勒纂兵戒期襲浚而懼劉琨及鮮卑為其後患沈吟未發張賓曰夫襲敵國當出其不意軍嚴經日不行豈顧有三方之慮乎勒曰然為之奈何賓曰王彭祖之據幽州唯仗三部今皆離叛還為寇讎此則外無聲援以抗我也幽州饑儉人皆蔬食眾叛親離甲旅寡弱此內無強兵以禦我也若大軍在郊必土崩瓦解今三方未謂將軍便能懸軍千里以征幽州也輕軍往反不出二旬就使三方有動勢足旋趾宜應機電發勿後時也且劉琨王浚雖同名晉藩其實仇敵若修牋於琨送質請和琨必欣於得我喜於浚滅終不救浚而襲我也勒曰善於是輕騎襲幽州勒晨至蒯北門叱門者疑有伏兵先驅牛羊數千頭聲言主禮實欲填諸街巷使兵不得發勒入浚乃懼勒入其廳事令甲士執浚送于襄國市斬之此三十六國之大略也惠帝立十四年崩弟豫章王熾立字豐度是為懷帝都長安為胡賊所殺後魏拓跋氏以晉懷帝永嘉三年自雲中入鴈門北有沙漠南據陰山眾數十萬至孝文乃改拓跋為元氏都洛陽肅宗崩大都督爾朱榮謀立莊帝榮害靈太后及王公二千人立莊帝帝殺爾朱榮左僕射爾朱世隆率榮部曲自晉陽襲京城執莊帝殺之而立閔帝又廢之高歡乃立廣平王子修後為斛律斯樁所脅走入關周太祖宇文黑獺奉帝都長安披草蔻立朝廷是為西魏詔授宇文黑泰為丞相泰又害帝立南陽王寶炬是為文帝文帝崩立王子朗為帝又廢之而立恭帝泰為太師泰薨子覺嗣封周公魏帝禪位于覺覺黑泰第三子受禪國號周至宣帝崩禪於隋初爾朱世隆之殺莊帝也高歡為晉州刺史起兵誅之立魏出帝歡為丞相後魏既西入關乃立清河王之子善見為帝遷都鄴是為東魏高歡薨子齊王洋受東魏禪國號齊至溫公緯為周所滅周又為隋所滅隋文帝既受周禪又南滅陳天下一統矣懷帝崩立吳王晏子業業字子業是為愍帝亦為胡賊所殺此時胡亂中原晉元乃遷都江左也中宗元皇帝睿乃興於江東睿字景文宣帝曾孫也元帝幼而聰敏及中原喪亂乃與王敦等渡江綏撫江左甚得眾心後王敦於武昌反至石頭帝攻之不克乃委政於敦敦還鎮武昌帝在位十六年崩太子紹立紹字道畿是為肅宗明皇帝王敦威震內外將謀為逆肅宗征破之用溫嶠等決計征之初敦之謀反也溫嶠為其從事中郎夙夜綜其府事偽相親善京兆尹缺嶠說敦曰宜自樹腹心以閒搆人主愚謂錢鳳可用敦曰莫若君嶠偽辭讓臨別之際嶠自起行酒嶠偽醉以手板擊錢鳳幘幘為之墮乃作色曰錢世儀何人溫太真自行酒而敢不飲鳳不悅以醉為解明日嶠將發鳳說敦留之敦曰嶠常云錢世儀精神滿腹昨小加聲色豈得以此相讒邪嶠至都陳敦反逆狀三年肅宗崩至簡文帝第三子孝武帝昌明立羝賊苻堅寇淮南晉冠軍將軍謝玄等大破堅於淝水苻堅以百萬之眾至淝水謝玄乃選勇士八千人涉渡淝水玄遣使謂堅曰阻水為陣曠日持久請小却與君周旋秦諸將聞前軍却謂已失利朱序之徒聲云堅敗大軍退自相填籍聞風聲鶴唳皆曰南軍至也遂大敗堅還長安苻堅因此卒亡滅也二十一年帝崩自後遂干戈相繼至安帝為桓玄所篡宋祖劉裕平玄至恭帝遂禪位于宋高祖武皇帝姓劉名裕字德輿彭城人桓玄篡晉偽楚桓玄字敬德譙國龍亢人也形貌懷特為江州刺史襲殺荊州刺史殷仲堪會稽王世子元顯專政以玄跋扈遣軍征之玄聞見討即率眾下至京師殺元顯詔以玄為丞相封楚王遂禪位高祖與劉毅何無忌等潛謀匡復起兵平玄時桓玄使桓宏鎮廣陵劉道規為宏中軍參軍令道規襲桓宏桓脩鎮丹徒高祖為脩中兵參軍自襲脩克期同發劉毅道規等既襲廣陵斬桓宏以其眾南渡高祖何無忌襲京師斬桓脩率二州之眾千二百人進舍竹里移檄京師曰夫成敗相因理不常泰狡焉縱虐或值聖明自我大晉屢搆陽九之厄隆安已來皇家多故貞良斃於豺狼忠臣碎於虎口逆臣桓玄敢肆淩慢阻兵荊郢肆暴都邑天未亡難兇力實繁踰年之間遂傾皇祚主上播越流幸非所神器沈辱七廟墮墜雖夏后之罹浞豷有漢之遭莽卓方之於茲未足為喻自玄篡逆于今歷載彌年亢旱民不聊生士庶病於轉輸文武困于版築室家分析父子乖離豈惟大東有杼軸之悲梅有傾筐之怨而已哉仰觀天文俯察人事此而可存孰而可亡凡在有心誰不扼腕裕等所以叩心泣血不遑啟處夕寐宵興思獎忠烈潛構崎嶇過於履虎乘機奮發義不圖全輔國將軍劉毅廣武將軍何無忌等忠烈斷金精誠貫日投袂荷戈志在畢命義眾既集文武爭先咸謂不有一統事無以輯辭不獲己遂總軍要庶上憑祖宗之靈下罄義夫之力翦馘逋逆盪清華夏公侯諸君或世樹忠貞或身寵爵祿而並俛眉猾豎無由自效顧瞻周道寧不弔乎今日之事良其會也裕以虛薄才非古人受任於既傾之運勢接於已踐之機丹誠未宣感憤填激望霄漢以永懷顧山川而增佇投檄之日神馳賊廷何無忌之辭也桓玄使桓謙屯東陵卞範之屯覆舟山義軍朝食并其餘進造覆舟山東令羸兵登山多張旗幟布滿山谷高祖率眾奔之士者殊死戰謙軍一時潰走玄挾矢單舶走江陵玄將入蜀奔至枚回四州逢益州參軍費恬之黨射殺之奉天子反正因居將相之任封豫章郡公蜀賊譙縱稱王高祖遣將征平之高祖使朱齡石率眾二萬自江陵伐蜀高祖誡曰劉敬先往至黃武無功而退今者師出應道青衣賊料我當出其不意復從內水如此則城活之成戍必有重兵若逼黃武正墮其計今軍自外水出取成都疑兵向黃武此制敵之上策為書於函署曰至白帝發諸將雖行未知所趨及至白帝乃發書書言眾軍悉由外水臧熹自中水出廣漢使羸弱乘高艦千餘向黃武譙縱果使譙道福重兵守涪城朱齡石次彭摸拒成都二百里譙縱大將侯暉等屯彭摸朱齡石謂劉鍾曰天方暑熱賊今固險攻之難拔只困吾師欲畜銳息甲侚隙而誰卿以為何如鍾曰不然前揚聲言大眾由內水故譙道福不敢捨涪今重兵卒出其不意侯暉之徒已破膽矣暉之阻兵非堅壁也因其懼而攻之其勢易克克彭摸鼓行而前成都不能守矣緩兵相持虛實將見涪軍復來難為敵也若進不能戰退無所資二萬餘人同為蜀子虜矣從之明日遂攻皆克斬侯暉於是遂進克諸城諸城守相次瓦解縱自縊而死姚泓僭號於西京高祖征平之擒泓高祖既滅秦入長安留子義真鎮長安而還江南時赫連都統萬聞之大悅謂王買德曰朕將進圖長安卿試言進取之方略買德曰劉裕滅秦所謂以亂平亂未有德政以濟蒼生關中形勝之地而以弱才小智守之非經遠之規狼狽而反者欲速成篡事無暇有意于京師陛下以順伐逆義貫幽顯百姓以君命望陛下旗鼓以日為歲清泥上洛南師之要衝宜致遊軍斷其去來之路然後渡潼關塞崤峽絕其水陸之道聲檄長安申布恩澤三輔之人皆壺漿以迎王師矣義真獨坐空城逃竄無所一旬之間必見縛於麾下所謂兵不血刃不戰而自定也勃勃善之南伐長安高祖懼召義真東鎮洛陽以朱齡石守長安長安人逐齡石而迎勃勃遂失關中也鮮卑慕容超據守青州稱燕王高祖征擒超初超叔父德盜有三齊德死超襲其位遂寇淮北高祖將有事中華因其侵也乃北伐超大將軍公孫五樓說超曰吳兵輕銳難與爭鋒截斷大峴使不得入上策也堅壁清野芟除粟夌中策也據城待戰下策也超曰引使過峴我以鐵騎躪之成擒矣何據清野自取蹙弱乎初謀是役也諫者曰賊若不嚴守大峴則堅壁廣固守而不出軍無所資何能自支高祖曰不然鮮卑性貪略不及遠既幸其勝且愛其穀謂我孤軍將不及久必將引我且示輕戰師一入峴吾何患焉既逾峴虜軍未出高祖喜曰天贊我也眾曰軍未克公何悅焉高祖曰師既過險士有必死之志餘糧棲畝軍無匱乏之憂虜墮吾計勝可必也六月慕容超使五樓據臨胊羸老守廣固聞軍近超亦會焉距臨朐四十里有巨蔑水超使五樓往據之曰晉軍得水則難敗也五樓馳進前鋒孟龍符奔就爭先得據之五樓退大軍有四千人分為兩翼方軌徐進未及臨朐賊騎交至龍符等拒之日向側戰猶酣高祖謂檀韶等曰虜之精兵悉於是矣臨朐留守必將寡弱子以潛軍逾其後往必剋城多易旗熾此韓信所以剋趙也且吾前言兵自海道往必聲之韶等鼓行而進賊望曰海軍至超棄城走遂剋之軍聞城陷懼而不敢動高祖親鼓士兵咸奮大奔崩之超奔廣固進軍圍之城陷獲超歸於京師斬于建康市賊盧循據南海因高祖北伐燕乘虛下襲建業高祖還乃平之劉毅據荊州貳於高祖高祖遣將征誅毅裴子野曰義旗同盟莫有能全其功名者何也相與見疇曰之遄捷不知王業之艱難彼則褰裳濡足唯利是親我則芟夷群醜寧或負人劉希樂諸葛長明皆人傑也豈其可暗于天命亦勢使然歟假其何孟齡長庸詎其有血食善哉武王之作周也八百諸侯皆同會曰紂可伐矣尚還師于孟津豈不知順人行戮惡欲速多禍也高祖東方之師疾則疾矣而僥倖之釁於是乎繁鳴呼仁義之弊至於偷薄而況奇功哉荊州刺史司馬休之反征之裴之野曰書稱慮善以動動惟厥時若司馬休之之動非其時天方厭晉囚敢知去已雖得眾能違天乎五運推移無不亡之國為廢姓處亂朝賢若三仁且猶顛沛而況豪俠者哉昔中原殄滅衣冠道盡于時四海爭奉中宗豈徒繫於晉德實大有禮義故能遂兼南國其興也勃焉至於義熙不欲異於是矣而宗失交流未忘前事波迸越逸禍敗相尋豈龕黎之伐宏多將咎周之徒孔熾不達興廢何其黯歟晉帝加高祖位相國總百揆揚州牧封十郡為宋公晉安帝崩大司馬瑯琊王即位徵帝入輔禪位於宋帝奉表陳讓表不獲通宋臺臣勸進猶不許太史令駱達陳天文符應曰案晉義熙元年至元熙元年太白晝見經天凡七古曰太白晝經天人更主異姓興義熙七年五虹見於東方古曰五虹見天子黜聖人出九年鎮星歲星太白熒感聚于東井十三年鎮星入太微古曰鎮星守太微有立王有徙王元熙元年黑龍四登于天易傳曰冬龍見天子亡社稷大人受命漢建武至建安末一百九十六年而禪魏魏自黃初至咸熙末四十六年而禪晉晉自太始至今百五十六年三代揖讓咸窮于六六亢位也帝乃從之永初元年六月丁卯即帝位於南郊設壇柴燎告天禮畢備法駕幸建康宮臨太極前殿大赦改元在位三年崩初大漸召太子誡之曰檀道濟雖有幹略而無遠志徐羨之與傅亮當無異圖謝晦常從征伐頗識機變若有同異必此人也可以會稽處之後皆如言也立太子義符是為滎陽王即位昏亂司空徐羨之輔政廢為營陽王廢立宜都王義隆是為文帝帝高祖第二子為太子劭所殺初劭及弟濬並多乖禮度懼上知乃為巫蠱咒咀帝聞之大怒將廢劭而殺濬更議所立持疑未定以事語濬母潘淑妃以告劭劭悖兇乃殺帝于合殿劭即位也立武陵王駿是為孝武皇帝文帝第三子也劭殺帝駿起義兵至京誅劭崩立太子子業是為前廢帝帝凶悖左右壽寂殺之崩立湘東王彧是為明帝文帝第十八子也孝武諸子江州刺史晉安王勛尋陽王子房等並舉兵反皆征平之崩立太子昱是為後廢帝在位凶悖常欲殺楊玉夫玉夫懼是夜七夕令玉夫伺織女渡報已王劭則先與玉夫通謀玉夫候帝眠熟遂斬之送首與齊王蕭道成也崩立順帝淮是為順皇帝明帝第三子也遜位於齊蕭道成凡八代六十年齊太祖高皇帝諱道成姓蕭氏東海蘭陵人也為輔國將軍宋明帝初會稽太守尋陽王子房反在東諸郡起兵徐州刺史薛安都據彭城歸魏遣從子索兒攻淮陰晉安王勛遣臨川內史張淹自鄱陽道入三吳帝並討平之使鎮淮陰七年徵還都宋明帝嫌帝非人臣相而人間流言帝為天子愈以為疑帝初見徵部下勸勿就徵帝曰主上自誅諸弟為太子幼弱作萬歲後計何關他族唯應速發緩當見疑骨肉相殘自非靈長之運禍難方興與卿等戮力也至拜常侍明帝崩遺詔使與袁粲共掌機事江州刺史桂陽王休範舉兵反帝討平之初範舉兵朝廷惶駭帝與褚彥回集中書省計議莫有言者帝曰昔上流謀逆皆因淹緩以敗休範必遠懲前失輕兵急下乘我無備請頓新亭以當其鋒因索筆下議餘並注同乃單車白服出新亭築壘未畢賊騎交至乃解衣高臥以安眾心竟破之也遷中領軍蒼梧王深相猜忌帝晝臥裸袒蒼梧王率數十騎直入領軍府立帝於宮內畫腹為射的自引滿射之左右玉夫因諫曰領軍腹大是佳射堋而一箭便死後無復射不如以骲箭射之一箭中臍蒼梧投弓於地也常語左右陽玉夫伺織女渡報我是夜七夕玉夫懼取千牛刀殺之玉夫與王敬則通謀殺蒼梧齎首送領軍府報帝帝行戎服夜入殿中明旦召袁粲等計議粲欲有言帝鬢鬚盡張眼光如電敬則拔刀跳躍麾眾曰天下之事皆應決蕭公敢有開一言者染敬則刀乃自取白紗帽加帝首今即位曰事須及熱帝正色曰卿都不自解也帝乃迎立順帝荊州刺史沈攸之反帝討之初攸之稱太后命已下都袁粲劉秉等見帝威名日盛不自安與攸之通謀舉事殿內帝命王敬則於殿內誅之進位相國封齊公備九錫策曰朕以不造夙羅旻凶嗣君失德書契未紀威侮五行虔劉九族神歇靈澤海水群飛綴旒之殆未足為譬豈直小宛興刺黍離作歌而已哉天贊皇宋實啟明宰爰登寡昧纂承大業高勳至德振古絕倫雖保衡翼殷博陸匡漢方斯蔑如也今將授公典禮其敬德朕命乃者袁劉搆禍實繁有徒子房不臣稱兵協亂顧瞻宮掖將成茂草言念邦國翦為仇讎當此之時人無固志公投袂徇難超然奮發登戎車而戒路報金版而先驅麾鉞一臨兇黨冰泮此則霸業之基勤王之始也安都背叛竊據徐方敢率犬羊淩虛淮浦索兒愚悖同惡相濟天許無勇背順歸逆北鄙黔黎奄墜塗炭公受命宗社精貫朝日擁節軍門氣踰宵漢破釜之捷斬馘蔽野石梁之戰梟其渠帥保境全人江陽即序此又公之功也張淹迷昧不顧本朝爰自南區志圖東夏潛軍閒人竊覬不虞于時江服末夷皇途荐阻公忠義奮發在險彌亮以寡制眾所向風偃朝廷無東顧之憂閩越有來蘇之望此又公之功也匈奴野心侵掠疆埸醜羯侜張勢振彭泗公奉辭伐罪戒旦晨征兵車始交氣祲時蕩弔死扶傷宏宣皇澤俾我淮淝復沾盛化此又公之功也自茲厥後獫狁孔熾封豕長虵重窺上國而勢故相仍師出已老角城高壘指日淪陷公言王事發憤忘飡躬擐甲冑視險若夷分疆劃界開青兗此又公之功也桂陽負眾輕問九鼎裂冠毀冕拔本塞源烈火焚于王城飛矢集於君屋群後憂惶元戎無主公挺劍凝神則奇謀不世把旄指麾則懦夫成勇信宿之閒宣陽底定此又公之功也蒼梧肆虐諸夏糜沸淫刑以逞誰則無辜黔首相悲朝不謀夕高祖之業已淪文明之軌誰嗣公遠稽殷漢之義近遵魏晉之典猥以眇身入奉宗社七廟清謐九區反政此又公之功也袁劉攜貳成此亂階醜圖潛搆危機密發據有石頭志犯應路公神謨內運霜鋒外舉祅沴載澄國途悅穆此又公之功也沈攸包禍歲月滋彰蜂目豺聲阻兵安忍乃眷西顧緬同異域而經綸惟始九伐未申長惡不悛遂逞凶逆公杖鉞出關凝威江甸正情與皎日同亮明略與秋雲競爽至義所感人百其心積年逋誅一朝顯戮湘浦安流章臺順軌此又公之功也公有濟天下之勳加之以明哲道庇生靈志匡宇宙戮力肆心劬勞王室險阻艱難備嘗之矣若乃締搆宗社之勤造物資始之澤雲布霧散光被六幽弼余一人永清四海遐方款關而慕義荒服重譯而來庭汪哉邈乎無得而名之四月宋帝禪位于齊甲午即皇帝位于南郊柴燎告天曰皇帝臣道成敢用玄牡昭告于皇皇后帝夫肇自生靈樹以司牧所以闡極則天開元創物肆茲大道惟命不于常昔在虞夏受終上代粵自漢魏揖讓中葉咸煥諸方冊載在典謨水德在微仍世多故實賴道成匡救之功以弘濟于厥難大造顛墜再搆區宇誕唯天人罔弗和會乃仰協歸運景屬與能用集大命于茲舜德匪嗣至于累仍而群公卿士庶尹御事爰及黎獻暨乎百戎僉曰皇天眷命不可以固違人神無統不可以曠主畏天之威敢不祇順鴻曆敬簡元辰虔奉皇符登壇命禪告類上天以荅人衷式敷萬國唯明靈是饗禮畢備法駕幸建康宮臨太極前殿大赦改元建元四年崩立太子賾是為世祖武皇帝也崩立大孫昭業是為鬱林王即位無道武帝梓宮下渚帝于端門內奉辭轀輬車載入閤即奏胡伎高宗殺之崩立弟昭文廢為海陵王也廢立西昌侯鸞是為高宗明皇帝始安貞王道生子也即位亟行誅戮且寢疾經年預為梓宮之地故高武諸子掃地無餘也崩立太子寶卷是為東昏侯即位凶暴以金花帖地令潘妃行其上曰此步步生蓮花又於苑中為市自為市吏以潘妃為市令義師至為左右所殺也崩立和帝寶融明帝第八子也以位禪梁先是文惠太子與才人共賦七言詩句後輒云愁和帝是驗矣東昏侯宮裡作散叛髻反根向後東昏時天下散叛矣又立帽騫其口而舒兩翅名曰鳳渡三橋裂裙向後總而結之名曰反縛黃鸝梁武宅在三橋而鳳渡之鳳翔之驗也黃鸝者皇離為日而反縛之東昏戮死之應也先是百姓及朝士以帛填胸各曰假雨假者非正名也儲雨而假之明不得真也東昏誅子廢為庶人儲雨之意也梁高祖皇帝名衍姓蕭氏為巴陵王法曹後為竟陵王子良八友初皇考之薨不得志及至鬱林失德齊明帝作輔將為廢立計帝欲助齊明傾齊武之嗣以雪心恥齊明亦知之每與帝謀時齊明將追隨王恐不從又以王敬則在會稽恐為變以問帝帝曰隨王雖有美名其實庸劣既無智謀之士爪牙唯仗司馬垣歷生武陵太守卞白龍耳此並唯利是為若啗以顯職無不載馳隨王正須折簡耳敬則志安江東窮其富貴宜選美女以娛其心齊明曰吾意也果如其策魏將王肅攻司州帝破之以功封建康郡男齊明帝崩東昏即位遺詔以帝為都督雍州刺史東昏時劉暄等六人更直省內分日帖敕世謂六貴又有御刀等八人號曰八要皆口擅王言權行國憲帝謂張弘策曰政出多門亂其階矣當今避禍唯有此地勤行仁義可坐作西伯但諸弟在都恐罹時患也須與益州圖之耳時上長兄懿罷益州還仍行郢州事帝與謀不從尋被害也長兄懿被害帝起義召僚佐集於廳事告以舉兵是曰建牙先是東昏以劉山陽為巴西太守使過荊州就行事蕭穎冑以襲襄陽帝知其謀乃遣王天武詣江陵遍與州府人書論軍事天武既發帝謂弘策曰今日坐收天下矣荊州得天武至必恛惶無計若不見同取之如拾芥耳斷三峽據巴蜀分兵定湘中便全有上流以此威聲臨九派斷彭蠡傳檄江南風之靡草不足比也政小延引日月耳江陵本憚襄陽人加唇亡齒寒必不孤立寧得不見同耶以荊雍之兵掃定東夏韓白重出不能為計況以無算昏主役御刀應敕之徒哉及山陽至巴陵帝復令天武齎書與穎冑兄弟去後帝謂張弘策曰用兵之道攻心為上攻城次之心戰為上兵戰次之今日是也近遣天武往州府人皆有書今叚只有兩封與行事兄弟云一一具天武口及問天武口無所說天武是行事心膂彼聞必謂行事兄弟共隱其事則人人生疑山陽惑於眾口判相嫌貳貳則行事進退無以自明是馳兩空函定一州也山陽至江安果疑不止穎冑乃斬天武送山陽信之至荊州馳入城將逾閾懸門奮發折其軫投車而走陳秀拔戟逐之斬于門外穎冑即遣驛使傳首于帝仍以南陽王尊號之議來告曰時不利當須待來年二月帝荅曰今坐甲十萬糧用日竭若頓兵十旬必生悔𠫤且太白出西方仗義而動天時人謀有何不利昔武王伐紂行逆太歲復須待來年耶帝不從乃赫然大號也戊申帝發自襄陽帝留弟守襄陽城謂曰當置心襄陽人腹中推誠信之勿疑也天下一家乃當相見也郢魯諸城及諸將並降初東昏遣吳子陽等十三軍救郢州進據巴口帝命王茂潛師襲加湖子陽竄走眾盡溺于江郢魯二城相視奪氣先是東昏使陳伯之鎮江州為子陽聲援帝謂諸將曰夫征討未必須實力聽威聲耳今加湖之敗誰不驚服陳武牙即伯之子狼狽奔歸彼人之情當凶懼我謂九江可傳檄而定也因命搜所獲俘囚得伯之憧主蘇隆之厚加賞賜使致命焉魯山郢城並降伯之及子武牙見帝至並束甲請罪壬午帝鎮石頭命眾軍圍六門衛尉張稷斬東昏以黃油裹首送軍帝命呂僧珍勒兵封府庫及圖藉收潘妃誅之以宮女二千人分賚將士也平京邑齊和帝以位禪梁帝即位太清元年齊司徒侯景以十三州內屬侯景反至京師幽帝而崩天監中釋寶誌為詩曰昔年三十八今年八十三四中復有四城北火酣酣帝封記之帝三十八剋建鄴八十三遇火災元月四月十四日同泰寺火災皆如其言此之謂也侯景立武帝太子綱為帝又為景所殺追尊為太宗簡文皇帝也湘東王繹於荊州使王僧辯等平侯景傳首江陵僧辯等勸進曰眾軍以今月戊子總集建康分勒武旅百道同趨轟然大潰群兇四滅伏惟陛下咀痛茹哀嬰忍憤酷自紫庭絳闕胡塵四起掖垣好畤冀馬雲屯豺狼當路非止一人鯨鯢不梟經載矣天威既振冤恥並雪百司岳牧仰祈宸鑒咸以鍚圭之功既歸有道當璧之禮允屬聖明而優詔謙沖窅然凝邈飛龍可躋而乾爻在四帝閽云叫而閶闔未開謳歌再馳是用翹首豈可久稽群議有曠彝則也景平湘東王即位于江陵是為孝元皇帝武帝第七子也魏使萬紐于謹來攻梁王蕭詧率眾會之帝見執魏人戕帝初武陵之平議者欲因其舟艦遷都建鄴宗懍黃羅漢皆楚人不願移曰建鄴王氣已盡渚宮州已滿百於是乃留尋而歲星在井熒感守心帝觀之慨然謂朝臣曰吾觀玄象將恐有戴但吉凶在我運數由天避之何益尋為魏軍所逼城陷見執進土囊而殞之古老相傳云洲滿百荊州出天子桓玄為荊州刺史內懷逆意乃遣鑿一洲以應百數隨而崩破竟無所成宋文帝為宜都王在藩一洲自立俄而文帝篡統太清末枝江揚之閤浦生一洲明年而梁元帝立承聖末其洲與大岸通也江陵既陷王僧辯陳霸先等議立帝子方智是為敬皇帝元帝第九子於江州奉迎至建業即位太平二年禪位于陳陳高祖武皇帝姓陳氏名霸先吳興長城人也梁武帝時為直閤將軍侯景反高祖率所領與侯景大戰侯景敗死湘東王即位授南徐州刺史還鎮京口承聖三年西魏攻陷西臺高祖與王僧辯立晉安王進帝位司空僧辯又與齊氏和親納貞陽侯高祖嘆曰嗣主高皇之孫元皇之子竟有何辜生見廢黜假立非次此情可知也高祖以為不義潛師襲王僧辯于石頭剋之是夜縊僧辯貞陽侯遜位晉安王復立徐嗣徽北引齊師遣蕭軌等四十六將濟江至幕府山高祖並破之進位丞相進爵為陳王永定三年梁帝禪位於陳三年熒惑在天尊也上崩時上長子衡陽王為質於周乃立高祖弟始興烈王長子蒨也立弟子蒨是為世祖文皇帝也崩立太子伯宗是為廢帝廢立頊是為高宗宣皇帝始興烈王第二子也崩立太子叔寶是為長城公也叔寶在東宮好學有文藝及即位耽酒色左右佞嬖珥貂者五十人婦人美貌麗服者千餘人常使孔貴妃等八人夾坐江總孔範等十人預宴號曰狎客先令八婦人襞彩牋製五言詩十客一時繼和遲則罰酒君臣酣飲從昏達旦以此為常也隋文帝初受周禪甚敦鄰好宣帝崩遣使赴弔脩敵國之禮書稱名頓首而後主驕奢書末云想彼統內如宜此宇宙清泰隋文帝不悅以示朝臣賀若弼楊素等以為主辱再拜請罪並求致討文帝曰我為人父母豈可限一衣帶水而不拯之乎命作戰船人請密之文帝曰吾將顯行天誅何密之有使投柹於江若彼能改吾又何求也以晉王廣為元帥督八十總管以致討初隋師送璽師暴後主惡三十萬紙遍諭江東諸軍既下江鎮戍相繼奏聞沈客卿掌機密抑而不言隋軍臨江後主曰王氣在此齊兵三度來周兵再度至無不摧沒虜今來必自敗縱酒作詩不輟隋軍或進拔姑孰或斷曲阿之衝乃下詔曰犬羊淩縱侵竊郊畿蜂蠆有毒宜時掃定以蕭摩訶為皇畿大都督分兵守要害僧尼道士盡皆執役隋軍南北道並進眾軍敗績矣韓擒虎入自南掖門文武各官皆遁擒後主隋師之入也僕射袁憲勸端坐殿上正色待之後主曰鋒刃之下未可交當吾自有計乃逃於井隋軍人以繩引之驚其太重乃與張貴妃孔貴人同乘而上隋文帝聞之大驚鮑宏對曰東井於天文為秦分今王都所在投井其天意也先是江東多唱王獻之桃葉辭云桃葉復桃葉渡江不用楫但渡無所苦我自迎接汝及晉王廣軍於六合鎮其山名桃葉果乘陳船而渡之也晉王廣入據臺城送後主于東宮三月癸巳後主與三公百司發自建鄴之長安及至京師列陣輿服引後主及王公使宣詔讓後主後主屏息不能對封長城公隋文帝東巡登芒山後主侍飲賦詩曰日月光天德山河壯帝居太平無以報願上東封書及出隋文帝目送之曰此敗豈不由詩酒將作詩功夫何如思安時事也至仁壽四年終於洛陽先是蔣山眾鳥鼓翼撫膺曰奈何帝奈何帝後主在東宮時有鳥一足集其殿庭以嘴畫地成文曰獨足上高臺盛草化為灰欲知我家處朱門當水開解者以為獨足言後主獨行無眾盛草言荒穢隋承火運草得火而灰及至京師家於都水臺所謂高臺當水也有會稽人史溥曾夢著朱衣人武冠自天而下以手執金牌溥往看上文曰陳氏五主三十四年陳亡果如夢梁末童謠云可憐巴馬子一日行千里不見馬上郎但見黃塵起黃塵污人衣皂莢相料埋及僧辯滅群臣以謠言奏言僧辯本乘巴馬擊侯景馬上郎王字也塵謂陳也而不解皂莢之謂既而陳滅于隨說者以為江東以羯羊角為皂莢隋氏姓楊楊羊也言終滅於隨北齊末諸省官多稱省主言主將見省也則知興亡之兆盡有徵云隋高祖姓楊氏名堅周武帝初為隋州刺史女為太子妃周宣帝立拜為大司馬宣帝崩立靖帝進爵為隨王遂禪位焉改號開皇元年九年平陳廢太子勇為庶人立晉王廣為皇太子高祖崩太子即位是為煬帝煬帝無道盜賊蜂起十三年幸江都李密設壇於鞏自署為魏公密遼東人蒲山公寬之子也少倜儻有大志常有思亂之心與楊玄感為刎頸交玄感以勢淩之密怒曰決機兩陣之間暗啞叱吒嗟三軍披靡邀功一時密不如公若涉彼長途驅策賢俊使各申其用公不如密豈可以一階一級而輕天下士大夫耶及玄感反密歸之為其謀主後玄感敗密變姓名奔翟讓讓立密為魏公開幕府置僚屬凡十餘萬人梁師都據夏州劉武周殺太原留守王恭舉兵反竇建德自號夏王朱粲自號楚王劉元進據吳都煬帝聞群賊起大懼使馮慈明徵兵東都煬帝聞盜賊蜂起召群臣問之皆曰此鼠竄狗偷何足以憂侍御史韋德裕曰今海內土崩綱紀大壞而內史侍郎虞世基御史大夫裴蘊等阿媚陛下隱秘不言所謂積薪已燃宗廟必不血食矣周書曰綿綿不絕將成江河陛下勿以諛言不以介意乃詔馮慈明詣東都徵兵將以討密為徼邏所獲歸之李密密聞慈明至大悅謂慈明曰皇天無親唯德是輔主上毒流四海天下咸知密糾合蒼生思平宇內熊羆之士百萬有餘據敖食之粟帶成皋之險干戈精練甲冑堅實決東海可西流蹴太山可東倒以此禦敵何敵不摧以此攻城何城不陷東都危急不日將降幸少留意同建功名慈明曰蒲山公策名先帝位極朝端明公不思造我之恩翻懷反噬之志棄皇隨之大德即梟感之頑囂惡積禍盈敗不旋踵網漏吞舟至于今日昔巨君以天下之眾弊於光武處仲以江左之師窮乎明帝明公以烏合之卒不越數千狼顧鴟張強梁村塢唯德是輔公何預焉密乃幽之于司徒府慈明密令人詣東都事泄翟讓殺之詔唐國公諱鎮太原五月甲子唐公舉義兵遙尊煬帝為太上皇立代王侑為天子行伊霍故事傳檄天下聞之響應此裴寂殷開山計也代王侑時在西京秋七月唐公將西圖長安仗白旗誓眾於太原之野被甲三萬留公子元吉守太原義師次霍邑隨武牙郎將宋老生拒義師時連雨不霽糧運不給又譌言突厥將襲太原唐公懼命旋師用秦王諫乃止秦王諫曰獨夫肆虐天下崩離狼顧蜂飛跨州連縣丈夫不得耕耘女子不得紡績故仗劍汾晉舉旆參墟斬封豕以安萬人戮鯨鯢而清四海據崤函之故挾天子之威令諸侯定天下是以聞之響應投赴如歸今遇小敵便將反旆恐義師一朝解體大事去矣勢不可全歸守太原則一城賊耳恐不旋踵禍變仍生乃止也老生背城而陣一戰斬之平霍邑諸城皆降唯屈突通鎮河東堅守不下也冬十月義師次長樂宮衛文昇挾代王乘城拒守十一月平京師尊代王為天子改元義寧遣使四出徇郡縣隋行宮唐公悉罷之後宮還其親屬初隨將多侵百姓百姓患之及義師至秋毫無犯皆曰真吾君矣時煬帝將之丹陽而大臣將卒皆北人不願南遷咸思歸宇文化及因百姓之不堪命殺煬帝於江都隋室王侯無少長皆斬之立嗣王浩為天子化及為丞相上曾夢見青衣兒曰去亦死往亦死不若乘船渡江水裴蘊虞世基皆南人贊成其事將卒不願南遷將因會鴆之南陽公主懼殺其婿以謀告宇文士及士及告其兄化及遂反執帝帝曰吾何負於天地而至此乎馬文舉對曰臣聞萬姓不可無主故立君以撫之是知一人養萬姓非萬姓養一人高祖文皇帝粵有下國丕隆大寶除苛政布恩德南滅強陳北滅狡虜二十餘年河清海晏既而棄世昇遐陛下即位違遠社稷委棄京師巡遊行幸略無寧歲漕通河洛控引江淮丁壯倦勞苦老弱疲轉餉高穎賀若弼先朝重臣勳德俱茂薛道衡英華冠世經綸之才咸被非辜卒遭夷戮賢哲之士退諂佞之士昇又頻年討遼征役不息行者不反國用空虛白骨被于原野肝膽塗於草澤悠悠冤魂有請上帝將假手於人矣及在鴈門取辱戎虜重圍既解理須寧息方更巡遊吳越翱翔上江頭會箕斂以供行樂士卒無短褐後宮厭羅綺士卒無糟糠犬馬賤粟肉甲冑生蟣蝨戎馬不解鞍拒諫飾非無心反駕遂使九縣瓜分八紘幅裂以天下之富四海之貴一旦棄之猶曰無罪臣竊為陛下羞之乃默然縊殺之五月戊午天子侑遜位于別宮禪位于唐都長安大業末謠曰桃李子洪水遠揚山苑在花園裏李唐姓也洪水者唐王諱也楊隨姓也花者華不實也園囿也代王名侑侑與囿音同言楊侑雖為帝終於歷數有歸唐王當踐其位也己巳王世充段達等立越王侗為皇帝於洛陽六月宇文化及自江都至彭城據黎陽稱許李密率大軍壁清淇敦煌張守一聞密之拒化及也說越王以討越王不用其策用孟琮計與密連和張守一說曰臣聞鴻鵠之翮未就沖天之情已萌武豹之文未備食牛之心已成今陛下據全周之地背河面洛帶甲十萬粟支數十年此霸王之資非待翮成文備之勢也固城自守不以濟世為心何異夫群蟻之嬰一穴乎竊為陛下不取越王曰若之何對曰三王之興五伯之舉莫不由兵以成大業故夏啟有甘野之師齊桓起邵陵之眾皆以征討不庭伐叛威慝者也今天下土崩英雄競起為陛下腹心之患者莫過夏魏夏遣師涉河則東都非陛下之地魏遣師踰洛據洛口之粟陛下有累卵之危無以加也臣聞兵以正合而以奇勝韓信所以斬成安子房所以降秦也請選精銳之士二萬人守洛陽三萬人循河而守以備夏寇陛下親率大軍出洛口掩魏之師魏之君臣謂陛下從天而至倉卒之閒智者不為計矣李密既滅則建德懾氣備守邊疆相時而動則文皇之業可修世祖之基不墜越王曰朕新受命人神未附兵革屢興恐士大夫解體於我守一曰陛下以累聖之資繼二祖之業雖夏人之思禹德復戴少康漢室之戀劉宗重尊光武以今況古彼有慚德況密有可伐之勢者三何則始密與翟讓同起烏合之眾大業已就密乃殺讓而奪其位士卒初喪其主鬼神新失其祀人神未附一也地廣兵眾法令不明賞罰不信二也精銳之卒並拒秦王鞏洛所留悉皆老病乘其虛而襲之必得志矣三也志曰奪人之先又曰天時不如地利地利不如人和陛下兼此三事又居之以先無不克矣王將從之孟琮曰化及率思歸之眾其鋒不可當李密英雄勇略不世非密無以滅化及且襲之不得復生一化及臣請說以利害示以大節使為元戎以除凶祲徐議其後未為晚焉王曰善孟琮東說密曰明公以烏合之卒密邇王城罕慕德之人無山澤之固兵法所謂四分五裂特所忌焉今東有化及之師西有東都之眾東拒化及則王師襲其後東都而不行則化及之師日至於是六軍出洛口化及下武牢誠恐不暇轉旋敗亡已及今皇帝世宗成帝之子世祖明帝之孫也以累世之資當樂推之運士馬百萬據有舊都宇文化及懷音蔑聞親行梟鏡主人枕戈待旦將卒蓄力待明將軍誠能率先啟行誅鋤兇暴則有磐石之安無累卵之危也晉文捨斬袪齊桓置射鉤況主上聖哲自天寬和容眾勿以疇昔之失過望於皇帝也狐裘羔袖將軍擇焉密初聞張守一之謀大懼及琮至大悅使記事李儉朝越王大悅拜密為太尉魏國公李密無東都之慮盡銳攻化及破之密自敗化及益以驕傲越王命王充擊密密不用祖君彥計密師敗績遂西奔京師尋謀叛殺之王世充之擊密也密會群寮議之裴仁基曰世充今悉銳而至洛下必空但堅守其要路無令得東而已以銳卒三萬循河曲西上示逼東都東都必急世充必救待其至洛然後還軍如此吾有餘力彼勞奔命兵法所謂彼出則歸彼歸則出數戰以疲之多方以誤之也密曰公知其一不知其二今世充之兵不可當者三兵仗精銳一也決計深入二也食盡求戰三也我但乘城固守蓄力待時彼欲戰不得求走無路不盈十日此充之首可致麾下諸君以為何如單雄信曰以樂戰之兵當思歸之卒饑飽不敵戰必剋矣祖君彥曰不可夫師曲為老師正為直曲則為饑直則為飽世充挾隋室之威不可為曲主公以逆為名不可為直裴光祿之謀一時之上也主公之策久之上也單將軍之言滅亡之下也夫物不兩大勝無常資故慶者在閭弔者在門誠恐乘於化及必殆於世充請按甲息兵俟時觀釁世充志大而體強心勇而多悍忸於自伐必有異圖不盈數年禍將作矣然後仗順而舉應天順人嵩岳為城洛水為池武臣勁兵經略于外文吏儒士守之於內孰與邀一時之功墜萬全之業欲取之先與之將弱之必強之欲取而不與必受天咎將弱而不強必受天殃願主公姑與之而強之我承其弊以全制其後無不捷矣密曰智哉欲不戰王伯當單雄信曰天下安樂百姓無事耨文耒墨從容於廟堂武不如文四海沸騰英雄競起角帝圖王蕩清氛祲文不如武各有其時不可戾也越王淫虐之餘天厭之久矣且天命不常能者代之何曲直之有請以定亂屬武臣制治屬文吏今日不戰大事去矣密遂用單雄信策合戰密師敗績世充乘勝趨洛口密左長史邴元真以倉城降密奔虎牢不敢入北渡河遂奔唐初王伯當與單雄信徐世績俱為密將軍中號為三傑故密信之而戰大唐武德二年王充殺越王侗於洛陽僭稱尊號隨氏滅矣梁時沙門寶誌為書曰牽三來就九索虜下殿走意欲東南遊厄在彭城口今茲三月江東童謠曰江水何冷冷楊柳何青青人今正好樂已復戍彭城牽三就九十二年也戍索言輸也吳人謂北人為虜江都西有彭城村村有彭城水上引其水入西閣之下果於此被執初上在江都聞英雄競起皆曰此乃狂賊終無所成及聞義師起上方臥驚起曰此得之矣楊廣博覽多聞而不知李諱為天子安用聖為撫心而歎久之復臥曰王者不死天自成人也論曰干寶稱帝王之興必俟天命苟有代謝非人事也堯舜內禪體文德也漢魏外禪順大名也湯武革命應天人也高光爭伐定功業也各因其運而得天下隨時之義大矣哉范曄曰自古喪大業絕宗禋其所以致削弱禍敗者蓋漸有由矣三代以嬖色取禍羸氏以奢虐致災西京自外戚失祚東都緣閹尹傾國成敗之來先史商之久矣自秦漢迄于周隨觀其興亡雖亦有數然大抵得之者皆因得賢豪為人興利除害其失之也莫不因任用群小奢汰無度孔子曰以約失之者鮮矣又曰遠佞人去僻惡有旨哉昔秦王見周之失統喪權於諸侯遂自恃任人不封立諸侯及陳勝楚漢咸由布衣非封君有土而並滅秦高祖既定天下念項王從函谷入而已由武關到惟修關梁強守禦內充實三軍外多發長戍及王翁之奪取乃不犯關梁而坐得其處王翁見以專國秉政得之即抑重臣收下權及其失之又不從大臣生焉更始見王翁以失百姓心亡天下既西到京師恃人悅聲則自安樂不納諫臣赤眉圍於外近臣反於城遂以破敗由是觀之夫患害非一何可勝為防備哉賈誼曰夫事有招禍法有起姦唯置賢良然後無患耳
