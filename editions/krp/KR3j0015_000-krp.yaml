body:
  text: 御題趙蕤長短經郪縣創為救弊論愛憎毆業匠和函向時雖類縱横説憂末原歸理道談首章櫽括蕤序語意宋刋弆自教忠堂通變稱經曰短長比及亂時思治亂不如平日慎行王二章評作書者巻原稱十今失一總目飜看餘一篇趙㽔自序稱總目六十三篇合為十卷而卷後沈新民跋語乃稱第十卷缺存者六十四篇今細檢篇目實六十四凡九卷與沈跋合按之蕤序所云卷既缺一不應轉多一篇考新民跋乃文獻通考原文其云晁氏則晁公武讀書志北夢瑣言乃孫光憲所撰今檢公武志亦稱六十三篇而光憲僅言書十卷不及篇數蓋晁孫皆就蕤序録載未加詳考至馬端臨始為覆正耳苐與原序蹖異處理殊難曉意者六十三篇三字乃五字之訛其第十卷隂謀家止冇一篇亦未可知然無可訂正存以闕疑既是梓州善經濟不應辟召又何焉三章總論全書津瀛文苑繼家聲四庫蒐羅俾贊成邂逅世臣獻遺簡向年論學憶西清四章紀事實蔵是書為編修勵守謙所呈乃其家本教忠則勵廷儀堂名也守謙之曾祖勵杜訥祖廷儀父宗萬皆侍直内廷今守謙亦官翰林為四庫全書纂修可謂以文學世其家者欽定四庫全書子部十長短經雜家類一雜學之屬提要臣等謹按長短經九卷唐趙㽔撰孫光憲北夢瑣言載㽔梓州鹽亭人博學韜鈐長於經世夫婦俱有隠操不應辟召唐書藝文志亦載㽔字太賓梓州人開元中召之不赴與光憲所記畧同惟書名作長短要術為少異蓋一書二名也是書皆談王伯經權之要成扵開元四年自序稱凡六十三篇合為十卷唐志與晁公武讀書志卷數並同今乆無刋本王士禎居易録記徐乾學嘗得宋槧於臨清此本前有傳是樓一印又有健菴收蔵圖書一印後有乾學一印每卷之末皆題杭州淨戒院新印七字猶南宋舊刻盖即士禎所言之本然僅存九卷末有洪武丁巳沈新民跋稱其第十巻載隂謀家本缺今存者六十四篇云云案此跋全剿用晁公武之言疑書賈偽託是佚其一巻而反多一篇與㽔序六十三篇之數不合然勘騐所存實為篇六十有四疑㽔序或𫝊冩之訛也第一卷八篇題曰文上第三卷四篇題曰文下第二卷四篇則有子目而無總題以例推之當脱文中二字第四巻一篇題曰霸紀上第五卷一篇論七雄之事題曰霸紀中第六巻一篇論三國之事亦無總題以例推之當脱覇紀下三字篇七篇二卷題曰權議第八卷十九篇題曰雜説第九卷二十四篇題曰兵權第十巻所謂隂謀者則今不可考篇中註文頗詳多引古書盖即㽔所自作註首或標以議曰二字或亦不標體例不一亦未詳其故也劉向序戰國䇿稱或題曰長短此書辨析事勢其源盖出於縱横家故以長短為名雖因時制變不免為事功之學而大㫖主於實用非䇿士詭譎之謀其言故不悖於儒者其文格亦頗近荀悦申鑒劉劭人物志猶有魏晉之遺唐人著述世逺漸稀雖佚十分之一固當全璧視之矣乾隆四十二年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀長短經序梓州郪縣長平山安昌巖草莽臣趙㽔撰趙子曰匠成輿者憂人不貴作箭者恐人不傷彼豈有愛憎哉實伎業驅之然耳是知當代之士馳鶩之曹書讀縱横則思諸侯之變藝長竒正則念風塵之㑹此亦向時之論必然之理矣故先師孔子深探其本憂其末遂作春秋大乎王道制孝經美乎徳行防萌杜漸預有所抑斯聖人制作之本意也然作法於理其弊必亂若至於亂將焉救之是以御世理人罕聞沿襲三代不同禮五霸不同法非其相反葢以救弊也是故國容一致而忠文之道必殊聖哲同風而皇王之名或異豈非隨時設教沿乎此因物成務牽乎彼沿乎此者醇薄繼於所遭牽乎彼者王霸存於所遇故古之理者其政有三王者之政化之霸者之政威之强國之政脅之各有所施不可易也管子曰聖人能輔時不能違時智者善謀不如當時鄒子曰政教文質所以匡救也當時則用之過則捨之由此觀之當霸者之朝而行王者之化則悖矣當强國之世而行霸者之威則乖矣若時逢狙詐正道陵夷欲憲章先王廣陳徳化是猶待越客以拯溺白大人以救火善則善矣豈所謂通於時變歟夫霸者駮道也葢白黑雜合不純用徳焉期於有成不問所以論於大體不守小節雖稱仁引義不及三王而扶顛定傾其歸一揆恐儒者溺於所聞不知王霸殊略故叙以長短術以經論通變者剏立題目總六十有三篇合為十卷名曰長短經大㫖在乎寜固根蒂革易時弊興亡治亂具載諸篇為沿襲之遠圖作經濟之至道非欲矯世誇俗希聲慕名輒露見聞逗機來哲凡厥有位幸望詳焉
