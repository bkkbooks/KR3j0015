  text: 按馬端臨文獻經籍考據晁氏云唐趙蕤撰長短經十卷又據北夢瑣言云㽔梓州鹽亭人博學韜鈐長于經世夫婦俱有隠操不應辟召論王霸機權正變之術其第十卷載隂謀家本缺今存者六十四篇然不害其為全書也洪武丁巳秋八月丁巳沈新民識
