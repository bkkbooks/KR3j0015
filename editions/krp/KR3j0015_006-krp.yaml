body:
  text: 長短經卷六唐趙蕤撰三國權第十九蜀吴魏論曰臣聞昔漢氏不綱網漏兇狡袁本初虎視河朔劉景升鵲起荆州馬超韓遂雄據於闗西呂布陳宮竊命於東夏遼河海岱王公十數皆阻兵百萬鐡騎千羣合從締交為一時之傑也然曹操挾天子令諸侯六七年間夷滅者十八九唯吴蜀蕞爾國也以地圗案之纔四州之土不如中原之大都人怯於公戰勇於私鬭輕走易北不敵諸華之士角長量大比才稱力不若二袁劉呂之盛此二雄以新造未集之國資逆上不侔之勢然能撫劍顧眄與曹氏争權躍馬指麾而利盡南海何哉則地利不同勢使之然耳故易曰王侯設險以守其國古語曰一里之厚而動千里之權者地利也故曹丕臨江見波濤􅍅涌歎曰此天所以限南北劉資稱南鄭為天獄斜谷道為五百里石穴稽諸前志皆畏其深阻矣雖云天道順地利不如人和若使中材守之而延期挺命可也豈區區艾濬得奮其長筞乎由是觀之在此不在彼於戯智者之慮必雜於利害故不盡知用兵之害則不能知用兵之利有自来矣是以採摭其要而為此權耶夫囊括五湖席卷全蜀庶知害中之利以明魏家之略焉蜀天帝布政房心致理參伐參伐則益州分野以東井南股距星為界東井南股距星連鉞者是也觜星度在參右足玉井所銜星是西距星即參中央三星西第一星是按職方則雍州之境據禹貢則梁州之域地方五千里提封四十郡實一都㑹也常璩國志云蜀其卦直坤故多班綵之章其辰直未故尚滋味詩稱文王之化被于江漢之域有文王之化焉秦豳同詩秦蜀同分故有夏聲云故古稱天府之國沃野千里其有以矣王莽末公孫述據蜀述字子陽扶風茂陵人也王莽時為導江卒正治臨卭及更始立豪傑各起其縣以應漢南陽人宗成略漢中啇人王岑亦起兵於雒縣自稱定漢将軍以應成述聞之遣使迎成成等至成都虜掠暴横述意惡之召縣中豪傑謂曰天下同苦新室思劉氏久矣故聞漢将軍到馳迎道路今百姓無辜而婦子係獲室屋燒燔此㓂賊非義兵也吾欲保郡自守以待真主諸卿欲并力者即留不欲者便去豪傑皆叩頭願効死述於是使人詐稱漢使者自東方來假述輔漢将軍益州牧乃選精兵千餘人而擊宗成等破之别遣弟恢於綿竹擊更始所置益州刺史張忠又破之由是威震益部者也益部功曹李熊説述曰方今四海波蕩匹夫横議將軍割據千里地什湯武若奮發威徳以投天隙霸王之業成矣今山東饑饉人民相食兵所屠滅城邑丘墟蜀地沃野千里土壤膏腴果實所生無榖而飽女工之業覆衣天下名材竹幹器械之饒不可勝用又有魚鹽銅鐵之利浮水轉漕之便北據漢中杜褒斜之隘東守巴郡拒捍闗之口地方數千里戰士不下百萬見利則出兵而畧地無利則堅守而力農東下漢水以闚秦地南順江流以震荆揚所謂用天因地成功之資今君王之聲聞於天下而位號未定志士狐疑宜即大位使逺人有所歸依述曰帝王有命吾何徳以當之熊曰天命無常百姓與能能者當之王何疑焉遂然之也建武元年四月遂立自為天子號成家色尚白使将軍候丹開白水闗北守南鄭将軍任滿從閬中下江州東據捍闗於是盡有益州之地也自更始敗後光武方事山東未遑西伐闗中豪傑多擁衆歸述其後平陵人荆邯見東方將平兵且西向説述曰兵者帝王之大器古今所不能廢也隗囂遭遇運㑹割有雍州兵強士附威加山東不及此時推危乗勝以争大命而返欲為西伯之事偃武息戈卑辭事漢喟然自以文王復出也今漢帝釋闗隴之憂專精東伐四分天下而有其三使西州豪傑咸居心於山東發間使招攜貳則五分而有其四若舉兵天水必至沮潰天水既定則九分而有其八陛下以梁州之地内奉萬乗外給三軍百姓愁困不堪上命将有王氏自潰之變臣之愚計以為宜及天人之望未絶豪傑尚可招誘急以此時發國内精兵令田戎據江陵臨江南之㑹倚巫山之固築壘堅守𫝊檄吴楚長沙以南必随風而靡令延岑出漢中定三輔天水隴西拱手自服如此海内震揺冀有大利述以問羣臣博士吴柱曰昔武王伐紂八百諸侯不期同辭然猶還師以待天命未聞無左右之助而欲出師於千里之外以廣封疆者也邯曰今東帝無尺寸之柄驅烏合之衆跨馬陷敵所向輙平不亟乗時與之争功而坐談武王之説是效隗囂欲為西伯也范曄曰摆旗紏族假制明神迹夫創圖首事有以識其風矣終於孤立一隅介於大國隴坻雖隘非有百二之勢區區兩郡以禦堂堂之鋒則知其道有足懐者所以棲有四方之傑夫功全則譽顯業謝則舋生逥成喪而為其議者或未聞焉若囂命㑹符運敵非天力坐論西伯豈多嗤乎述不聽邯計光武乃使岑彭吳漢伐蜀破荆門長驅入江闗岑彭為蜀刺客所殺吴漢幷将其軍入犍為界諸縣皆城守漢乃進軍攻廣都㧞之遣輕騎燒成都市橋陽武以東諸小城皆降光武戒漢曰成都十萬衆不可輕也但堅據廣都待其来攻勿與争鋒若不敢来攻轉營廹之須其力疲乃可擊也漢乗利將歩騎二萬餘人進逼成都去城十餘里阻江北為營作浮橋使副劉尚将萬餘人屯江南相去二十餘里光武聞之大驚譲漢曰賊若出兵綴公而以大衆攻尚尚破公即敗矣幸夲無他者急引兵還廣都詔書未到述果使其將謝豊攻漢使别将刼劉尚令不得相救漢乃閉營三日不出多樹幡旗使煙火不絶夜銜枚引兵與尚軍合豐等不覺明日乃分兵拒水北自将攻江南漢破之斬謝豐於是引還廣都以狀聞光武報曰公還廣都甚得其宜述必不敢畧尚而擊公也若先攻尚公從廣都五十里悉歩騎赴之適當值其疲困破之必矣自是漢與述戰於廣都之間八戰八剋遂軍其郭中述乃悉散金帛募敢死士五千人以配延岑岑於市橋偽建旗幟鳴鼓挑戰而潛遣竒兵出吴漢軍後襲擊破漢漢堕水縁馬尾得出述乃自将攻漢三合三勝自旦及中軍士不得食並疲漢因命壯士突之述兵大敗也軍至成都述出戰兵敗被刺洞胷死夷述妻子焚其宮室光武聞之怒以譴漢曰城降三日吏人服從一旦放兵縱火良失斬將弔人之義也乃下詔慰之其忠節志義之士並蒙旌顯李育以有才幹擢用之於是西土感悦莫不其歸心焉范曄曰昔趙佗自王番禺公孫亦竊帝蜀漢推無他功能而至於後亡者將以邉地處逺非王化之髙所先乎不能因隙立功以㑹時變方乃坐飾邉幅以深自安昔吴起所以慙魏侯也及其謝羣臣審廢興之命與夫泥首銜玉者異日談也至靈帝時政理衰缺王室多故雄豪角逐分裂疆宇以劉焉為益州牧馬魯㳟王後也時四方兵冦焉以為刺史威輕乃建議改置牧伯鎮安方夏清選重臣以居其任以焉為益州牧是時梁州賊馬相聚疲役之人數千先殺綿竹令進攻雒縣州從事賈龍先領兵數百在犍為遂糾合吏人攻相破之乃選吏迎焉遂領益州牧也焉死子璋立州大吏趙韙等貪璋温仁立為刺史初南陽三輔人數萬户流入益州焉悉収以為兵名曰東州兵璋性柔寛無威畧東州人侵暴趙韙因人情不緝乃結州中大姓東州人畏見誅滅乃同心幷力為璋殊死戰斬趙韙時張魯亦以璋懦弱不承順璋遂自雄於巴蜀也為劉備所圍遂降備遷璋於公安歸其財寳後以病卒初劉備為豫州牧也備字𤣥徳涿郡涿縣人也少言語善下人喜怒不形於色徐州牧陶謙表先主為豫州牧後謙病使人迎先主先主曰袁公路近在夀春此君四世五公海内所㱕君以州與之陳登曰袁公路驕豪非治亂之主今欲為使君合歩騎十萬上可以匡主濟人成五覇之業下可以割地守境書功於竹帛若使君不見聼登亦未敢聼使君孔融謂先主曰袁公路豈憂國忘家者耶塜中枯骨何足介意今日之事百姓與能天與不取悔不可追遂領徐州陳登遣使詣袁紹曰天降灾戾禍臻鄙州州将殂殞士人無主恐姦雄一旦承隙以貽盟主日昃之憂輙共奉平原相劉府君以為宗主永使百姓知有依歸方今冦難縱横不遑釋甲謹遣下吏奔告執事紹荅曰劉𤣥徳𢎞雅有信義今徐州樂戴之誠副所望也為曹公所破走屯新野時劉表薨諸葛亮説攻琮荆州可有先主曰荆州臨亡託我以遺孤吾不忍也荆州人多歸先主先主日行十餘里或曰宜速行保江陵先主曰夫濟大事者以人為夲今人歸吾何忍棄去習鑿齒曰劉主雖顛沛險難而信義愈明勢逼事危而言不失道追景升之顧則情感三軍戀赴義之士則甘與同敗視其所以結物情豈徒投醪撫寒含蓼問疾而已其終濟大葉者不亦宜乎聞諸葛亮躬耕南陽乃三詣亮於草廬之中屏人言曰漢室傾頽姦臣竊命主上蒙塵孤不度徳量力欲信大義行於天下而智術淺短遂用猖獗至於今日然意猶未已君謂計將安出亮荅曰自董卓已来豪桀並起跨州連郡者不可勝數曹操比於袁紹名㣲而衆寡然遂能克紹以弱為強者非唯天時抑亦人謀也今操已擁百萬之衆挟天子而令諸侯傳云求諸侯莫如勤王此之謂也此誠不可與爭鋒孫權據有江東已歴三代國險而民附賢能為用此可與為援而不可圗也荆州北據漢沔利盡南海東連吴㑹西通巴蜀此用武之國而其主不能守此殆天所以資將軍也益州險塞沃野千里天府之國高祖因之以成帝業劉璋闇弱張魯在北民殷國富而不知䘏智能之士思得明后將軍既帝室之胄信義著於四海總覽英雄思賢如渇若跨有荆益保其嚴岨西和諸戎南撫夷越結好孫權内修政理天下有變則命上將將荆州之軍以向宛洛将軍身率益州之衆出於秦川百姓孰不簞食壺漿以迎将軍者乎誠如是則霸業可成漢室可興矣時曹公破荆州先主奔吴先主之奔吴也論者以孫權必殺之程昱料曰曹公無敵於天下初舉荆州威震江東權雖有謀不能獨當也劉備英雄也闗羽張飛皆萬人之敵權必資以禦於我難解勢分備資以成不可得殺也權果多與備兵以禦太祖時益州刺吏劉璋聞曹公征荆州遣别駕張松詣曹公曹公時已定荆州走先主曹公不存録松松勸璋自絶習鑿齒曰昔齊桓一矜其功而叛者九國曹操漸自驕伐而天下三分皆勤之於數十年之内弃之於俯仰之頃豈不惜乎是以君子勞謙日昃慮以下人功髙而居之以讓勢尊而守之以卑夫然後能有其富貴保其功業𫝊福百代何驕矜之有哉君子是以知曹操之不能遂兼天下也備用亮計結好孫權共拒曹公於赤壁破之曹公北還權乃以荆州業備周瑜上䟽諫曰劉備以梟雄之姿而関羽張飛熊虎之将必非乆屈為人用者愚謂大計宜徙備置吳盛為築室多其美女玩好之物以娛其耳目分此二人各置一方使如瑜者得挾與攻戰大事可定也今猥割土地以資業之聚此三人俱在疆塲恐蛟龍得雲雨非復池中物也權以曹公在北方當廣攬英雄故不納也龎統説備曰荆州荒殘人物單盡東有吴孫北有曹氏鼎足之計難以得志今益州國富人強戸口百萬郡中兵馬所出畢具寳貨無求於外今可權借以定大事備曰今指與吾為水火者曹操也操以急吾以寛操以暴吾以仁操以譎吾以忠每與操反事乃可成耳今以小故而失信義於天下者吾所不取也統曰權變之時固非一道所能定也兼弱吞昧五伯之事逆取順守報之以義事定之後封以大國何負於信今日不取終為人利耳備乃使關羽守荆州欲自取蜀時孫權遣使報備欲共取蜀曰米賊張魯居王巴漢為曹操耳目規圗益州劉璋不能自守若操得蜀則荆州危矣今欲先攻取璋進討張魯首尾相連一統吴楚雖有十操無所憂也或説備宜報聼許吴終不能越荆冇蜀蜀地可有也主簿殷觀曰若為吳先駈進未能克蜀返為吳所乗則大事去矣備從之拒荅權曰益州民富國強土地阻險劉璋雖弱足以自守張魯虚偽未必盡忠於操今暴師於蜀漢轉運於萬里欲使戰克攻取舉不失利此吳起不能定其規孫武不能善其事今曹操三分天下有其二將飲馬滄海觀兵於吴而同盟無故自相攻伐借樞於操使敵乗其隙非計也權知備意乃止也㑹劉璋聞曹公向漢中討張魯内懐恐懼别駕張松説璋曰曹公兵強無敵於天下若因張魯之資以取蜀土誰能禦之劉豫州使君之宗而曹公之深讐也若使之討魯魯必破魯破則益州強曹公雖来無能為也璋然之遣法正迎先主時黄權諌曰左將軍有梟名今以部曲遇之則不滿其心以客禮待之則一國不容二君若客有㤗山之安則主有累卵之危願且閉境以待河清時劉巴亦諫曰備雄傑人也入必有為不可内也既入巴又曰若使備討張魯是放虎於山林也璋並不聼先主與璋㑹涪璋既還成都先主當為璋北征漢中統後説備曰隂選精兵晝夜兼道徑襲成都璋既不武又素無豫備大軍卒至一舉便定此上計也楊懐髙沛璋之名將各仗強兵據守關頭聞素有牋来諫璋使發遣將軍未至遣與相聞説荆州有急欲還救之並使装束外作歸形此二子既服將軍英名又喜將軍之去必乗輕騎来見將軍因此執之進取其兵乃向成都此中計也返還白帝連引荆州徐還圗之此下計也若沉吟不去將至大困不可久矣先主然其中計初張松法正見備備以私意接納盡其慇懃因問蜀中兵器府庫人馬衆寡及諸要害松等具為言之又畫地圗處置山川由是盡知益州虚實先主北到葭萌未即討魯厚樹恩徳以収衆心明年曹公征孫權權呼先主自救備乃從璋求萬兵及資寳欲以東行救權璋但許兵四千其餘皆半給備因激怒其衆曰吾為益州征強敵師徒勤瘁不遑寜居今積帑藏之財而恡於賞功望士大夫為出死力戰其可得乎乃召璋白水軍督楊懐責以無禮斬之使黄忠等勒軍向璋先主逕至關質諸將士卒妻子引兵從忠等進到涪據其城璋所遣将皆破敗也即斬懐等自葭萌而還取璋時鄭度説璋曰左將軍襲我兵不滿萬士衆未附野榖是資計莫若盡驅巴西梓潼人内涪水以西其倉稟野榖一皆燒除髙壘深溝静以待之彼請戰不許久無所資不過百日必將自走走而擊之則必禽矣璋不用度計先主遂長驅所過必克而有巴蜀劉備襲蜀丞相掾趙戬曰劉備其不濟乎拙於用兵每戰必敗奔亡不暇何以圖人蜀雖小國險固四塞獨守之國難卒并也徴士傅幹曰劉備寛仁有度能得人之死力諸葛亮逹理知變正而有謀而為之相張飛關侯勇而有義皆萬人之敵而為之將此三人者皆人傑也以劉備之略三傑佐之何為不濟先主圍成都數十日璋出降蜀中殷盛豐樂先主置酒大饗士卒取蜀城中金銀分賜將士還其榖帛初攻劉璋備與士衆約曰若事定府庫百物孤無豫焉及拔城都士衆皆捨干戈赴諸藏競取寳物軍用不足備甚憂之劉巴曰易耳但當鑄直百錢平諸物價令吏為官市備從之數月之間府庫充實先主領㿽州牧諸葛亮為股肱法正為謀主關侯張飛馬超為爪牙許靖縻竺簡雍為賔友董和黄權李嚴等本璋之援用也吴壹費觀等又璋之婚親也彭羕者又璋之所排擯也劉巴者宿昔之所忌恨也皆處之顯任盡其器能有志之士無不競勸也羣臣勸先主稱尊號先主未許諸葛亮曰昔吴漢耿純等勸世祖即帝位世祖辭讓前後數四耿純進言曰天下英雄喁喁冀有所望如不從議者士大夫各歸求主無為從公也世祖感純言深至遂然諾之今曹氏篡漢天下無主大王劉氏苗族紹世而起即帝位乃其宜也士大夫久勤苦者亦望尺寸之功名如純言耳先主於是即帝位譙周等勸進云臣父羣未亡時言西南數有黄氣直立數丈見来積年時時有景雲祥風從璇璣下應之此為異瑞又二十二年中數有氣如旗從西竟東中天而行圖書曰必有天子出其方加是年太白熒惑鎮星常從嵗星相追近漢初興五星從嵗星其嵗星主義漢位在西義之上方故漢法常以嵗星候人主當有聖主起於此州以致中興時許帝尚存故羣下不敢漏言頃者熒惑復追嵗星見在胃昴畢昴畢為天綱經曰帝王處之衆邪消亡願大王應天順人速即洪業以寜海内也時曹公㧞漢中初魏太祖破張魯於漢中劉曄進計曰明公北破袁紹南征劉表九州百郡十并其八威震天下勢慴海外今舉漢中蜀人望風破膽失守推此而前蜀可傳檄而定劉備人傑也有度而遲得蜀日淺蜀人未附人心震恐其勢自傾因其傾而壓之無不克也若小緩之諸葛孔明明於治體関侯張飛勇冠三軍武毅以威之文徳以撫之據險守要不可犯矣今時不取必有後憂太祖不從居七日蜀降者言蜀中驚擾雖斬之猶不禁太祖又問曄曰蜀可伐不對曰今已小安不可動也法正説先主曰曹操一舉降張魯定漢中不因此勢以圗巴蜀而㽞夏侯淵張郃屯守身遽北還此非其智不逮力不足也將内有憂逼故耳今算淵郃才略不勝國之將率舉衆徃討則必克之克之日廣農積榖觀舋伺隙上可以傾覆宼敵尊奬王室中可以蠶食雍涼廣境拓土下可以固守要害為持久之計此盖天以與我時不可失也先主善其䇿乃率諸將進兵漢中正亦從行先主自陽平南渡沔水縁山稍前於定軍興勢作營淵將兵來争其地正曰可擊矣先主命黄忠乗髙鼔譟攻之大破淵等授首遂奄有梁漢時魏使夏侯楙鎮長安蜀將魏延就諸葛亮請兵從褒中出循秦嶺而東當子午而北以襲長安亮不許魏畧曰夏侯楙為安西将軍鎮長安諸葛亮於南鄭與羣下計議魏延曰聞夏侯楙先主壻也怯而無謀今假延精兵五千負糧五千直從褒中出循秦嶺而東當子午而北不過十日可到長安聞延奄至必乗舩逃走長安唯有御史京兆太守横門邸閣與散人榖足周食也比東方相合聚尚二十許日而公從斜谷来亦足以逹如此則一舉而咸陽以西可定矣亮以為懸危不如安從坦道可以平取隴右萬全必克而無虞故不用延計也延每從亮出輙欲請兵萬人與亮異道㑹於潼闗如韓信故事亮制而不許延常謂亮為怯歎恨已才用之不盡也其後吳孫權襲闗侯取荆州范曄曰劉備令闗侯鎮守荆州吴將呂蒙拜漢昌太守與闗侯分土接境知侯梟雄有兼并心且居上流其勢難久蒙乃宻陳計䇿曰今征虜守南郡潘璋將遊兵萬人循江上下應敵所在蒙為國家前據襄陽如此何憂於操何頼於侯將圖之㑹侯討樊留兵將備南郡蒙上䟽曰某討樊而多留備兵必恐蒙圗其後故也蒙常有病乞分衆還建業以治病為名某聞之必徹備兵盡赴襄陽大軍浮江晝夜驅上襲其空虚則南郡可下而某可擒也遂稱病篤權乃露檄召蒙伏還隂與圖計侯果信之稍徹兵赴樊權遂行遣蒙在前其精兵於􅖻􅑳中使白衣揺櫓作商賈服晝夜兼行至羽所置江邉屯候盡縛之是故侯不聞知蒙入據城盡得侯及將士家属皆撫慰之約令軍不得干歴人家有所求取侯還在道路數使人與蒙相聞蒙輒厚遇其使侯使人還咸知家門無恙見待過於平時故侯吏士無闘心皆委侯而降即父子俱獲初孫權之討侯也遣使報魏云欲討闗某自效乞不漏露令某冇備羣臣咸言宻之是宜董昭曰軍事尚權期於合宜宜露其事某聞權上即當還護其城圍得速解便獲其利可使兩賊相持以待其弊若宻而不露使權得志非計之上也乃使射書於圍中及侯屯内侯猶豫未去陸遜至破江陵侯走至臨沮為吴將潘璋所殺也先主怒吳伐之敗績還蜀至永安而崩初魏文帝聞備東下與孫權交戰樹柵連營七百餘里謂羣臣曰備不暁兵機豈有七百里營可以距敵乎包原矣隰阻險而為軍者為敵所禽此兵忌也孫權上事今至後七日權破備於夷陵書至後主禪即位下詔曰朕聞善積者昌禍積者喪古今常數也曩者漢祚中㣲網漏凶慝董卓造難震蕩京畿曹操階禍竊執天衡子丕孤竪敢尋亂階盗據神器更姓改物世濟其㐫當此之時天下無主則我帝命殞越於下昭烈皇帝光演文武存復祖業誕膺皇綱不墜於地萬國未靖早世遐殂朕以幼冲繼統鴻業未習保傅之訓而嬰祖宗之重光載前緒未有攸濟朕甚懼焉諸葛丞相𢎞毅忠壯忘身憂國今授之以旄鉞之重付之以専命之權統領歩騎二十萬衆董督元戎龔行天罰除患寜亂克復舊都在此行也伐其元帥弔其殘人他如詔書律令者也先是吳主孫權請和吴使張温使蜀權謂温曰卿不宜逺出恐諸葛孔明不知吾所以與曹氏通意故屈卿行人之義受命不受辭也對曰臣入無腹心之規出無專對之用懼無張老延譽之功又無子産陳事之效然諸葛亮達見計數必知神慮屈伸之宜加受朝廷天覆之恵推亮之心必無疑貳温至蜀詣闕拜章曰昔髙宗以諒闇昌殷祚於中興成王以㓜冲隆周徳於太平今陛下以聪明之姿等契徃古總百揆於良佐恭列精之炳耀遐邇望風莫不忻頼吴國勤任旅力清澄江滸願與有道平一宇内委心協規有如河水使下臣温通致情好陛下敦崇禮義不便耻忽臣自入逺境及即近郊頻蒙勞来以榮自懼蜀使馬良使吴良謂亮曰今銜國命協穆二家幸為良介於孫將軍亮曰君試自為文良即草曰寡君遣掾馬良通聘繼好以紹昆吾豕韋之勲其人吉士荆楚之令鮮於造次之華而有克終之美願降心存納以慰將命權大待之也丞相諸葛亮慮權聞先主殂有異計乃遣鄧芝修好於權權果狐疑不時見芝芝自表請見權語芝曰孤誠願與蜀和親然恐蜀主㓜弱國小勢逼為魏所乗不自保全以此猶豫耳芝對曰吳蜀二國四州之地大王命世之英諸葛亮一時之傑也蜀有重關之固吳有三江之阻合此二長共為脣齒進可兼并天下退可鼎足而立此理勢之自然也大王今若委質於魏魏必上望大王之入朝下求太子之内侍若其不從則奉辭伐叛蜀必順流見可而進如此江南之地非復大王之有也權黙然良久曰君言是也遂自絶魏與蜀連和時司徒華歆司空王朗等與諸葛亮書陳天命欲使舉國稱藩亮不答書作正議曰昔在項羽起不由徳雖䖏華夏秉帝者之勢卒就湯鑊為後来戒魏不審鑒今次之矣免身為幸戒在子孫而二三子多逞蘇張詭靡之説奉進驩兜滔天之辭欲以誣毁唐帝諷解禹稷所謂徒懐文藻煩勞翰墨大雅君子所不為也又軍志曰萬人必死横行天下昔軒轅氏整卒數萬制四方定海内况以數十萬之衆據正道而臨有罪可得干擬者哉亮死後魏令鄧艾伐蜀蜀兵敗後主用譙周筞降魏議曰國君為社禝死則死為社禝亡則亡譙周勸後主降魏可乎孫盛曰春秋之義國君死社禝卿大夫死位况稱天子而辱於人乎周謂萬乗之君偷生茍存亡禮希利要冀㣲榮惑矣且以事勢言之理有未盡何者禪雖庸主實無桀紂之酷戰雖屢北未有土崩之亂縱不能君臣固守背城一戰自可退次東鄙以思後圖是時羅憲以重兵據白帝霍弋以強卒鎮夜郎蜀土險狭山水峻隔絶巘激湍非歩卒所渉若悉収舟檝保據江州徴兵南中乞師東國如此則姜廖五將自然雲從吴之二師承命電赴何投寄之無所而慮於必亡耶魏師之来搴國大舉欲追則舟檝靡資欲㽞則師老多虞且屈伸有㑹情勢代起徐因思舊之人以攻驕惰之卒此昭王所以走闔閭田單所以摧騎刧也何為忩忩遽自囚虜不堅壁於敵人致斫石之至恨哉葛生有云事不濟即亡耳安能復為之下壯哉斯言可以立懦夫之志矣觀古燕齊荆越之敗或國覆主滅或魚懸鳥竄終能建功立事康復社稷豈曰天助抑人謀也向使懐茍存之計納譙周之言何頹基之能搆令名之可獲哉禪既闇主周實駑臣方之申包胥田單范蠡大夫種不亦逺乎晋時李特復據蜀初特在蜀暴横晋乃募取特兄弟許以重賞未暇宣聞遂不蔵李特子驤見書悉改其購云敢斬六郡人頭首李任閻趙等及氐侯王一人詣官許以重賞六郡人見之大駭遂並反歸特益州牧羅尚遣隗伯攻李雄於郫城迭有勝負冬十月雄與朴泰金鞭之流血令泰佯得罪奔尚欲為内應尚信之以兵随泰雄内外擊之大破尚軍雄乗勝追躡夜至城下因稱萬嵗誑尚城中云已得郫城尚信之開少城門雄軍得入尚遂遁走遂克成都稱王也晋桓温滅之至宋義熈中譙縱又殺益州刺史毛璩於成都稱成都王初毛璩使任約赴義軍軍至枝江㑹劉毅敗約奔桓振璩聞約奔桓振也自將兵三千由外水下譙縱為之恭軍使將梁州兵五百人從内水發梁州人不欲東遂推縱為主反攻涪城克之璩聞難作自洛陽歩還至成都為縱黨所殺也宋使朱齡石滅之此蜀國形也議曰吴蜀脣齒之國蜀滅則吴亡信乎陸士衡曰夫蜀蓋蕃援之與國而非吴人之存亡也何則其郊境之接重山積險陸無長轂之徑川隘流迅水有驚波之難雖有鋭師百萬啓行不過千夫舳艫千里前驅不過百艦故劉氏之伐陸公譬之長蛇其勢然也故黄權稱曰可以徃難以返此兵之絶地也古云夫道狭路嶮譬如兩䑕闘於穴將勇者勝也吳丑為星紀吳越之分上應斗牛之宿下當少陽之位今之㑹稽九江丹陽豫章廬江廣陵六安臨淮皆吳之分野今蒼梧鬱林合浦交趾九真日南南海皆越之分野古人有言曰大江之南五湖之間其人輕心揚州保強保也恃三代要服不及以正國有道則後服無道則先叛故𫝊曰吳為封豕長蛇荐食上國為上國之患非一日之積也漢髙帝時淮南王英布反布都六安今夀州是也反書聞上召諸將問布反為之奈何汝隂侯滕公曰臣客故楚令尹薛公有籌䇿可問初滕公問令尹令尹曰是故當反滕公曰上裂地而王之踈爵而賞之南面而立萬乗之主其反何也令尹曰徃年殺彭越前年殺韓信此三人同功一體之人也自疑禍及故反耳上乃召見問薛公薛公對曰布反不足怪也使布出於上計山東非漢之有也出於中計勝敗之數未可知也出於下計陛下安枕而卧矣上曰何謂上中下計令尹曰東取吴蘇州是也西取楚荆州是也并齊取魯齊青州魯兖州𫝊檄燕趙固守其所山東非漢之有也議曰合從山東為持乆之䇿上計也何謂中計東取吴西取楚并韓取魏據敖倉之粟塞成臯之口勝敗之數未可知也議曰長驅入洛以决一朝之戰中計也何謂下計東取吳西取下蔡歸重於越身歸長沙陛下安枕而卧漢無事矣議曰自廣江表無窺中原之心下計也桓譚新論曰世有圍碁之戲或言是兵法之類也及為之工者遂基䟽張置以㑹圍因而伐之成多得道之勝中者則務相絶遮要以争便求利故勝敗狐疑須計數而定下者則守邊隅趨作罫以自生於小地然亦不如察薛公之言上計云取吴楚并齊魯及燕趙者此廣道地之謂中計云取吴楚并韓魏塞成臯據敖倉此趨遮要爭利者也下計云取吴小蔡據長沙以臨越此守邊隅趨作罫者也罫音為卦反上曰是計將安出令尹對曰出下計上曰何為廢上中計而出下計令尹曰布故酈山之徒也自致萬乗之國此皆為身不顧其後為萬世慮者故曰出下計上曰善果如䇿乃封薛公千户是後吴王劉濞以子故而反初發也其大將田禄伯曰兵屯聚而西無他竒道難以就功臣願得竒兵五萬人别循江淮而上收淮南長沙入武闗與大王㑹此亦一竒也吳王太子諫曰王以反為名此兵難以藉人人亦且反王吴王不許其少將桓將軍復說吳王曰吳多歩兵歩兵利險阻漢多車騎車騎利平地願大王所過城邑不下宜棄去疾西據雒陽武庫食敖倉之粟阻山河之險以令諸侯雖無入關天下固已定矣即大王徐行留下城邑漢車騎至馳入梁楚之郊事敗矣王問諸老將老將曰此年少推鋒之計耳安知大慮吴王不從桓將軍之計乃自并將其兵漢以太尉周亞夫擊吴楚亞夫用其父客計遂敗吳客計在覇紀上淮南王劉安怨望其父厲王長死謀為叛逆問伍被曰吾舉兵西嚮諸侯必有應者即無奈何被曰南収衡山衡州以擊廬江廬州有潯陽之舩守下雉之城在江夏縣名也結九江之浦絶豫章之口洪州是也強弩臨江而守以禁南郡之下東収江都揚州也㑹稽越州也南通勁越屈強江淮間猶可一舉得延嵗月之夀王曰善未得發㑹事泄誅至後漢靈獻時閹人擅命天下提契政在家門何進謀誅閹官太后不從進乃召董卓詣京師以脅廹太后宻令卓上書曰中常侍張讓等竊幸乗寵濁亂海内昔趙鞅興晋陽之甲以逐君側之惡輙鳴鐘如洛陽討讓等罪卓未至進敗及卓到遂廢立天下亂矣議曰家門大夫也時長沙太守孫堅殺南陽太守張咨袁術得據其郡堅與術合縱欲襲奪劉表荆州堅為流矢所中死初劉表據荆州也聞江南賊盛謂蒯越等曰吾欲徴兵恐不集其䇿焉出對曰衆不附者仁不足也附而不理者義不足也茍仁義之道行百姓歸之如水之趨下何患不附袁術勇而無謀宗賊貪暴為下所患若示之以利必以衆来君誅其無道撫而用之人有樂存之心必襁負而至兵強士附南據江陵北守襄陽八郡可傳檄而定術等雖至無能為也後果然孫堅死子䇿領其部曲擊揚州刺史劉繇破之因據江東䇿聞袁術將欲僣號與書諫曰昔董卓無道陵虐王室禍加太后暴及𢎞農天子播越宫廟焚毁是以豪傑發憤沛然俱起然而河北異謀於黑山曹操毒被於東徐劉表僭亂於荆南公孫叛逆於朔北正禮阻兵𤣥徳争盟當謂使君與國同規而舍是弗恤莞然有自取之志懼非海内企望之意昔成湯伐桀猶云有夏多罪武王伐紂曰殷有重罸此二王者雖有聖徳假時無失道之過無由逼而取也今主上非有惡於天下徒以㓜小脅於強臣異於湯武之時也使君五世相承為漢宰輔榮寵之盛莫與為比宜効忠節以報王室術不納䇿遂絶之筞聞魏太祖與袁紹相持於官渡將渡江襲許未濟為許貢客所殺初䇿有是謀也衆皆懼魏謀臣郭嘉料之曰䇿英雄豪桀能得人死力然輕而無備雖有百萬之衆無異於獨行中原若刺客伏起一人之敵耳以吾觀之必死於匹夫之手果為許貢客所殺也䇿死弟權領其衆時吴割據江南席卷交廣也屬曹公破袁紹兵威日盛乃下書責孫權求質張昭等㑹議不决權乃獨將周瑜詣其母前定議瑜曰昔楚國初封於荆山之側不滿百里之地繼嗣賢能廣土開境立基於郢遂據荆揚至於南海𫝊業延祚九百餘年今將軍乗父兄餘資兼六郡之衆兵精糧多將士用命鑄山為銅煮海為鹽境内富饒人不思亂汎舟舉帆朝發夕到土風勁勇所向無前有何逼廹而欲送質質子一入不得不與曹氏曹氏命召不得不徃便見制於人也豈與南面稱孤同哉不如勿與徐觀其變若曹氏率義以正天下將軍事之未晚若圗為暴亂兵猶火也不戢必將自焚韜勇抗威以待天命何送質之有權母曰公瑾議是也遂不送質䇿薨權年少初統事太妃憂之引見張昭董襲等問曰江東可保安不襲對曰江東地勢有山川之固而討逆明府恩徳在人討和虜承基大小用命張昭秉衆事襲等為爪牙此地利人之時也萬無所憂衆皆壯其言也後曹公入荆州劉琮舉衆降初劉表死魯肅進説曰夫荆椘與我隣接水流順北外帯江漢内阻山陵冇金城之固沃野萬里士人殷富若據而有之此帝王之資也肅請得奉命弔表二子並慰勞軍中用事者說劉備使撫飬表衆共拒曹操肅未到琮已降也操得其水軍舩歩卒數十萬吴將士聞之皆恐孫權延見羣下問以計筞議者咸曰曹公豺虎也託名漢相挟天子以征四方動以朝庭為辭今日拒之事更不順且將軍大勢可以距操者長江也今操得荆州奄有其地劉表治水軍蒙衝鬬艦乃以千數操悉浮以沿江兼有步兵水陸俱下此為長江之險已與我共之矣而勢力衆寡又不可論愚謂大計不如迎之周瑜曰不然操雖託名漢相其實漢賊將軍以神武之雄才兼仗父兄之烈割據江東地方數千里精兵足用英雄樂業尚當横行天下為漢家除殘去穢况操自送死而可迎之耶請為將軍籌之今使北土已安操無内憂能曠日持乆来争疆塲又能與我校勝負於舟檝可也今北土既未安馬超韓遂尚在闗西為操後患且捨鞍馬仗舟檝與吴越争衡本非中國所長又今盛寒馬無藁草驅中國士衆逺渉江湖之間不習水土必生疾病此數四者用兵之患也而操皆冐行之将軍擒操冝在今日瑜請得精兵三萬人進住夏口保為將軍破之權曰老賊欲廢漢自立久矣徒忌二袁呂布劉表與孤耳今數雄已滅唯孤尚存孤與老賊勢不兩立君言當擊甚與孤合此天以君授孤也時權軍柴桑劉備在樊曹公南征劉表㑹表卒子琮舉衆降先主不知曹公卒至至宛乃聞之遂率其衆南行為曹公所追破劉備至夏口諸葛亮曰事急矣請奉命求救孫將軍遂見説曰将軍起兵江東劉豫州亦収衆漢南與曹操並争天下今操芟夷大難畧已平矣遂破荆州威震四海英雄無所用武故豫州遁逃至此將軍量力而處之若能以吳越之衆與中國争衡不如早與之絶若不能當何不按兵束甲北面而事之今將軍外託服從之名而内懐猶豫之計事急而不斷禍至無日矣權曰茍如君言劉豫州何不遂事之乎亮曰田横齊之壯士耳猶守義不辱况劉豫州王室之胄英才盖世衆士慕仰若水之歸海若事之不濟此乃天也安得復為人之下權勃然曰吾不能舉全吴之地十萬之衆受制於人吾計决矣非劉豫州莫可以當曹操者然豫州新敗之後安能抗此難乎亮曰豫州軍雖敗於長坂今戰士還者及關羽所將精甲萬人劉琦合江夏戰士亦不下萬人曹操之衆逺来疲弊聞追豫州騎一日一夜行三百里此所謂強弩之末不能穿魯縞者也故兵法忌之曰必蹶上將軍且北方人不習水戰又荆州之人附操者逼兵勢耳非心服也今將軍誠命猛將統兵數萬與豫州協規同力破操軍必矣操軍破必北還如此則荆吳之勢強鼎足之形成成敗之機在於今日權大悦即遣周瑜魯肅随亮詣先主并力拒曹公也周瑜等水軍三萬與劉備并力距曹公用黄盖火攻䇿遂敗曹公於赤壁初一日交戰曹公軍破退引次江北瑜等在南岸瑜部將黄盖曰今冦衆我寡難與持久然觀操軍方連舩檻首尾相接可燒而走也乃取蒙衝鬪檻數十艘實以薪草膏灌其中裹以帷幕上建牙旗先書報曹公欺以欲降盖又豫備走舸各繫火舩後因引次俱前曹公軍吏士皆延頸觀望指言盖降去北軍二里餘同時發火火烈風猛舩至如箭飛埃絶熖燒盡北舩延燒岸上營落頃之烟焰漲天人馬燒溺死者甚衆瑜率輕鋭尋繼其後雷鼓大進曹公留曹仁等守江陵徑自北歸瑜又進南郡與曹仁相對仁遂退曹公敗徑北還權遂虎視江表時劉璋為益州牧外有張魯寇侵瑜乃詣京見權曰今曹操新衂方憂腹心未能與將軍連兵相事也乞與奮威俱進取蜀得蜀而并張魯留奮威固守其地好與馬超結援瑜與將軍據襄陽以䠞操北方可圗也權許之㑹瑜卒不果初周瑜薦魯肅才宜佐時權即引肅對飲曰今漢室傾危四方雲擾孤承父兄遺業思有桓文之功君既惠顧何以佐之肅對曰昔髙帝區區欲尊事義帝而不獲者以項羽為害也今之曹操猶昔項羽將軍何由得為桓文乎肅竊料之漢室不可復興猶曹操不可卒除將軍為計唯有鼎足江東以觀天下之舋規模如此亦自無嫌然後建號帝王以圖天下此髙帝之業也及是平一江滸稱尊號臨壇顧謂公卿曰昔魯子敬嘗道此可謂明於事勢矣議曰陸士衡稱孫權執鞭鞠躬以重陸公之威悉委武衛以濟周瑜之師卑宮菲食以豐功臣之賞披懐虚巳以納謀士之算屏氣跼蹐以伺子明之疾分滋損味以育凌統之孤是以忠臣競盡其能志士咸得肆力而帝業固矣黄石公曰賢人之政降人以體聖人之政降人以心體降可以圖始心降可以保終降體以體降心以心由此觀之孫權執鞭鞠躬降體者也披懐虚巳心降者也善始令終不亦宜乎黄武元年魏使大司馬曹仁歩騎數萬向濡須濡須督朱桓破之初曹仁欲以兵襲取中洲偽先揚聲欲東攻羨溪朱桓分赴羡溪既發卒而仁奄至諸將業業各有懼心桓喻之日凡兩軍交戰勝負在將不在衆寡諸君聞曹仁用兵孰與桓耶兵法所以稱客倍而主人半者謂俱在平原無城池之守又謂士衆勇怯齊等故耳今仁既非智勇加其士卒甚怯又千里歩涉人馬疲困桓與諸將共據髙城南臨大江北背山陵以逸待勞為主制客此百戰百勝之勢也桓因偃旗鼔外示虚弱以誘致仁仁果遣子泰攻濡須城分遣諸將襲中洲中洲者部曲妻子所在泰等退桓遂梟其諸將也七年又使大司馬曹休騎十萬至皖城迎周魴魴欺之無功而返吴鄱陽太守周魴譎誘曹休休迎魴至皖城知見欺當引軍還自負衆盛邀於一戰朱桓進計於元帥陸遜曰休本以親戚見任非智勇名將也今戰必敗敗必走走道當由夾石挂車此两道地皆阨險若以萬兵柴路則彼衆必盡而休可生虜臣請將所部以斷之若蒙天威得以休自効便可乗勝長驅進取夀春割有淮南以窺許洛此萬代一時不可失也權先與陸遜以議遜以為不可故計不施行也至權薨皓即位窮極滛侈割剥蒸人崇信姦囬賊虐諫輔晋世祖令杜預等代吴滅之議曰昔魏武侯浮西河顧謂吴起曰山河之固此魏國之寳也吴起對曰昔三苖氏左洞庭而右彭蠡徳義不修禹滅之夏桀之君左河濟右太華伊闕在其南羊腸在其北仁政不修湯放之由此觀之在徳不在險今孫皓席父祖之資有天阻之固西距巫峽東負滄海長江判其區宇峻山帯其封域地方㡬萬里荷㦸將百萬而一朝棄甲面縳於人則在徳之言為不刋之典耶對曰何為其然陸機云易曰湯武革命順乎天𤣥曰亂不極則理不形言帝王之因天時不如地利易曰王侯設險以守其國言國之恃險也又曰地利不如人和在徳不在險言守之由人也吴之興也參而由焉孫卿所謂合其參者及其亡也恃險而已婁敬曰周之衰也分而為兩天下莫朝周不能制非其徳薄也形勢弱也由此觀之國之興亡亦資險云非唯在徳而已矣至晋永嘉中中原喪亂晋元帝復渡江王江南宋齊梁陳皆都焉事在覇紀上此吳國形也魏古者天子守在四夷天子卑弱守在諸侯當漢之季姦臣擅朝九有不澄四郊多壘雖復諸侯釋位以閒王政然皆包藏禍心各圖非冀魏太祖畧不世出靈武冠時值炎精幽昧之期逢風塵無妄之世瞋目張膽首建義旗時韓暹楊奉挟獻帝自河東還洛陽靈帝崩太子辨即位并州牧董卓入朝因廢帝為𢎞農王而立獻帝以董卓為太師遷都長安司徒王允誅卓卓將郭汜李傕圍長安城城䧟殺王允後李傕與郭汜有隙傕質天子於其家傕將楊奉謀殺傕事泄叛傕傕衰弱天子乃得出奔楊奉欲以天子還洛陽郭汜追天子於𢎞農之曹陽奉等敗殺公卿畧盡天子渡河都安邑以韓暹為征東將軍持政還洛陽洛陽宮室燒盡百官被荆棘太祖迎天子都許韓暹楊奉各出奔太祖議迎都許或以為山東未定不可荀彧勸太祖曰昔晋文納周襄王而諸侯景從髙祖東伐為義帝縞素天下歸心自天子播越將軍首唱義兵以山東擾亂未能逺赴關右然猶分遣將帥蒙險通使雖禦外難乃心無不在王室是將軍匡天下之素志也今車駕旋軫義士有存本之思百姓感舊而增哀誠因此時奉主上以從人望大順也秉至公以服雄傑大畧也扶𢎞義以致英俊大徳也天下雖有逆節不能為累明矣韓暹楊奉其敢為害若不時定四方生心後雖慮之無及太祖至洛陽奉天子都許維其㢮紊紉其贅旒俾我漢家不失舊物矣於是運籌演謀鞭撻宇内北破袁紹南虜劉琮東舉公孫康西夷張魯議曰劉表諸傑雖中間自有呑并乃揚雄所謂六國蚩蚩為嬴弱姬者也幷呑雖衆適所以為吾奉也九州百郡十并其八志績未究中世而殞曹操字孟徳少機警有權數而任侠放蕩不治行業故世人未之竒也唯喬𤣥異焉謂曰天下將亂非命世之才不能濟也能安之者其君乎太祖為東郡太守治東武陽軍頓丘黑山賊于毒等攻東武陽太祖引兵西入山攻毒等本屯諸將皆以為當還自救太祖曰昔孫臏救趙而攻魏耿弇欲走西安而攻臨菑使賊聞我西而還是武陽自觧也不還我能敗虜家虜不能敗武陽必矣乃行毒聞之棄武陽還太祖要擊大破之初遼東太守公孫康恃逺不服袁尚袁熈依之及太祖破烏丸或説公遂征之尚兄弟可擒也公曰吾方使康送尚熈首不煩兵矣九月公引軍自栁城還康即斬送尚熈首衆將問曰公還而康斬送尚熈何也公曰彼素畏尚等吾急之則并力緩之則自相圗其勢然也太祖攻呂布於下邳不㧞欲還荀攸曰布勇而無謀今三軍皆比其鋭氣衰三軍以將為主主衰則軍無奮意陳宮有智而遲今及布氣未復宫謀未袁定進急攻之布可㧞也乃決沂泗灌城城潰生禽布紹將文醜與太祖戰荀攸勸太祖以輜重餌賊賊遂奔與競之陣亂斬文醜太祖與袁紹相持於官渡時公粮少荀彧書議欲還許彧曰紹悉衆聚官渡欲與公决勝敗公以至弱當至強若不能制必為所乘是天下之大機也且紹布衣之雄耳能聚人而不能用夫以公之神武滎明哲而輔以大順何向而不濟今軍雖少未若楚漢在陽成臯時也是時劉項莫肯先退先退者勢屈公以十分居一之衆畫地而守之扼其喉而不得進已半年矣情見勢竭必將有變此用竒之時不可失也又紹謀臣許攸貪財紹不能縱来奔説太祖襲紹别屯燔其粮榖遂破紹張繡在南陽與荆州牧劉表合太祖征之謀臣進曰繡與劉表相恃為強然繡以遊軍而食於表表不能供也急之則并力緩之則自離太祖不從表果遣軍兵救繡太祖兵敗三年春太祖還許繡兵来追太祖不能進與荀彧書曰賊来追吾雖日行數里吾䇿之至安衆破之必矣果設竒伏攻破之公還許荀彧問前何以䇿賊必破對曰虜遏歸師與吾死地戰吾是以知勝西平麴光殺其郡守以叛諸將欲擊之張旣曰唯光等造反郡人未必悉同若便以軍臨之吏人羌胡必謂國家不别是非更使皆相特著此為虎傅翼也光等欲以𦍑胡為援今先使羌胡鈔擊重其賞所虜獲者皆以俾之外阻其勢内離其交必不戰而定乃檄告喻諸為光等所誤者原之能斬賊帥送首者加封於是光部黨斬送光首此九州百郡十并其八之大畧也夫能扶天下之危者則據天下之安能除天下之憂者則享天下之樂能救天下之禍者則得天下之福董昭等欲共進曹公九錫備物宻訪於荀彧彧不許操心不平遂殺之范曄論曰世之言荀君通塞或過矣常以中賢以下遂無求備智算有所研踈原始未必要終斯理之不可全詰者也夫以衛賜之賢一説而斃兩國彼非薄於人而欲之盖有全必有衰也斯又功之不可兼者矣方時運之遭非雄才無以濟其弱功髙勢強則皇器自移矣此又時之不可並也盖取其歸正而已亦殺身以成仁之義也曹氏率義撥亂代載其功至文帝時天人與能矣遂受漢禪劉若勸進曰臣聞符命不虚見衆心不可違故孔子曰周公其不聖乎以天下讓是天地日月輕去其萬物也是以舜享天下不拜而受今火徳氣盡炎上數終帝遷明徳祚隆大魏符瑞昭晢受命既固光天之下神人同應雖有虞之儀鳯周之躍魚方之今事未足為喻而陛下違天命以飾小行逆人心以守私志上忤皇穹乃眷之㫖中忘聖人逹節之數下孤人臣翹首之望非所以揚聖道於髙衢垂無窮之懿勲也臣等聞事君有獻可替否之道奉上有逆鱗固争之義臣等敢以死請太史丞許芝又曰易𫝊曰聖人受命而王黄龍以戊已日見七月四日戊寅黄龍見此帝王受命之符瑞最著明也又曰聖人以徳親比天下仁恩洽普麒麟以戊已日見厥應聖人受命臣聞帝王者五行之精昜姓之符代興之㑹以七百二十年為一軌有徳者過於八百無徳者不及四百載是以周家八百六十七年夏家四百數十年漢行夏正迄今四百二十六嵗天之歴數將以盡終斯皆帝王受命易姓之符瑞也夫得嵗者道始興昔武王伐殷嵗在鶉火有周之分野也髙祖入秦五星聚於東井有漢之分野也今兹嵗在大梁有魏之分野也而天之瑞應並集来臻伏惟殿下體堯舜之聖明膺七百之禪代天下學士所共見也謹以上聞給事中蘇林等又曰天有十二次以為分野王公之國名有所属天子受命諸侯以封周文王受命嵗在鶉火至武王伐紂十三年嵗星復在鶉火故春秋傳曰武王伐紂嵗在鶉火則我有周之分野也昔光和七年嵗在大梁武王始受命為將討黄巾建安元年嵗復在大梁始拜大將軍十三年復在大梁始拜丞相今二十五年復在大梁陛下受命此魏得嵗與文王受命相應舜以土徳承堯之火今亦以土徳承漢之火於行運㑹於堯舜之次陛下宜改正朔易服色正大號天下幸甚王室雖靖而二方未賔乃問賈詡曰吾欲伐不從命以一天下吳蜀何先對曰攻取者先兵權建本者尚徳化陛下應期受禪撫臨率土若綏之以文徳而俟其變則平之不難矣吳蜀雖蕞爾小國依阻山水劉備有雄才諸葛亮善治國孫權識虚實陸遜見兵勢據險守要汎舟江湖皆難卒平也用兵之道先勝後戰量敵論將故舉無遺䇿臣竊料羣臣無權備對雖以天威臨之未見萬全之勢昔舜舞干戚而有苗服臣以為當今冝先文後武文帝不納後果無功三苖國今岳州是也蜀相諸葛亮出斜谷屯渭南司馬宣王距之詔宣王但堅壁距守以挫其鋒彼進不得志退無與戰久停則糧盡虜掠無所獲則必走矣走而追之以逸待勞全勝之道亮送婦人衣以怒宣玉宣王將出戰辛毗仗節不許乃止宣王見亮使唯問寢食及事繁簡不及戎事使荅曰笞罰二十已上皆親覽焉啖食至數升宣王曰亮斃矣尋果卒也至甘露元年始以鄧艾為鎮西將軍距蜀將姜維維軍敗退守劒閣鍾㑹攻維不能克乃上言曰今賊摧折宜遂乗之從隂平由邪徑經漢徳陽亭趣涪出劒閣西百里去成都三百餘里竒兵衝其腹心劒閣之守必還赴涪則㑹方軌而進劍閣之軍不還則應涪之兵寡矣軍志有之攻其不備出其不意今掩其空虚破之必矣冬十月艾自隂平行無人之地七百餘里鑿山通道山髙谷深艾以氊自裹推轉而下將士皆攀木縁崖魚貫而進先登至江由蜀將諸葛瞻自涪還綿竹列陣待艾遣子忠等出戰大破之斬瞻進軍到雒縣劉禪遂降後主用譙周䇿奉璽書於艾曰限分江漢遇值深逺階縁蜀土斗絶一隅干運犯冐漸苒歴載每惟黄初中宣温宻之詔申三好之恩開示門戸大義炳然人鬼而不徳闇劣貪竊遺緒俛仰累紀未率大教天威既震歸能之數怖駭王師神武所次敢不革面順以從命艾大喜報書曰王綱失道羣英並起龍戰虎争終歸真主此盖天命去就之道自古聖帝爰逮漢魏受命而王者莫不在乎中土河出圗洛出書聖人則之以興洪業其不由此未有不顛覆者矣隗囂憑隴而亡公孫據蜀而滅斯實前代覆車之鑒聖上明哲宰相忠賢將比隆黄軒侔功徃代銜命来征思聞嘉響果煩来使告以徳音此非人事乃天意也昔㣲子歸周實為上賔君子豹變義存大易来辭謙冲以禮舉櫬此皆前哲歸命之典全國為上破國次之自非通明智逹何以見王者之義乎後主至洛陽䇿命之為安樂公曰蓋統天載物以咸寜為大光宅天下以時雍為盛乃者漢氏失統六合震擾我太祖承運龍興𢎞濟八極是用應天順人撫有區夏於時乃考因羣傑虎争九服不靖乗閒阻逺保㩀庸蜀幾將五紀朕永惟祖考思在綏輯四海爰整六師曜威之休梁益公恢崇徳度應機豹變履信思順以享左右無疆豈不逺歟往欽哉其祗服朕命克廣徳心以終乃顯烈初晉文王欲遣鍾㑹伐蜀邵第曰今鍾㑹率十萬餘衆伐蜀愚謂㑹单身無重任不若餘人文王曰我寜當復不知此耶若滅蜀後如卿所慮當何能辦凡敗軍之將不可以語勇亡國之大夫不可以圗存心膽已破故也若蜀已破遺人震恐不足與圗事中國將士各自思歸不肯與同也若作惡祗自族耳㑹果與姜維反魏將士憤發殺㑹及維也至晋末譙縱復竊蜀宋劉裕使朱齡石伐蜀聲言從内水取成都敗衣羸老進水口譙縱果疑其内水上也議曰内水涪江也悉軍新城以待之乃配朱齡石等精鋭逕從外水議曰外水泜江也若中今雒縣水是也直至成都不戰而禽縱事具覇紀上此滅蜀形也魏嘉平中孫權死征南大將軍王昶征東大將軍胡遵鎮南將軍毋丘儉等表征吳朝廷以三征計異詔訪尚書傅嘏嘏對曰昔夫差勝齊陵晋威行中國不能以免姑蘇之禍齊閔辟土兼國開地千里不足以救顛覆之敗有始不必善終古事之明效也孫權自破蜀兼荆州之後志盈欲滿凶亢已極相國宣文王先識取亂侮亡之義深逹宏圗大舉之䇿今權已死託孤於諸葛恪若矯權苛暴蠲其虐政民免酷烈偷安新恵外内齊慮有同舟之懼雖不能終自保完猶足以延期挺命於深江之外矣今議者或欲泛舟徑濟横行江表或欲倍道並進攻其城壘或欲大佃疆塲觀釁而動此三者皆取賊之常計然施之當機則功成若茍不應節必貽後患自治兵已来出入三載非掩襲之軍也賊喪元帥利存退守若羅舩津要堅城清野横行之計其殆難㨗也賊之為寇㡬六十年君臣偽立吉㐫同患若恪蠲其弊天奪之疾崩潰之應不可卒待也今賊設羅落又持重宻閒諜不行耳目無聞夫軍無耳目校察未詳而舉大衆以臨巨險此為希幸邀功先戰而後求勝非全軍之長䇿也唯有大佃最差完牢兵出民表冦鈔不犯坐食積榖不煩運士乗舋討襲無逺勞弊此軍之急務也夫屯壘相逼巧拙得用筞之而知得失之計角之而知有餘不足之處情偽將焉所逃夫以小敵大則役煩力竭以貧敵富則歛重財匱故敵逸能勞之飽能饑之此之謂也然後盛衆厲兵以振之參恵倍賞以招之多方廣似以疑之由不虞之道以閒其不戒比及三年左提右挈虜必氷散瓦解安受其弊可坐算而得也昔漢氏歴世常患匈奴朝臣謀士早朝晏罷介胄之將則陳征伐搢紳之徒咸言和親勇奮之士思展搏噬故樊噲願以十萬横行匈奴季布面折其短李信求以二十萬獨舉楚人而果辱秦軍今諸將有陳越江陵險獨歩虜庭即亦向時之類也以陛下聖徳輔相忠賢法明士練措計於全勝之地振長䇿以御之虜之崩隤必然之數故兵法曰屈人之兵而非戰也㧞人之城而非攻也若釋廟勝必然之理而行萬一不全之畧誠愚臣之所慮也故謂大佃而逼之計最長時不從嘏言詔昶等征吳吴將諸葛恪距之大敗魏軍於東關魏後陵夷禪晋太祖即位王昶等敗朝議欲貶黜諸將景王曰我不聼公休以至此我過諸將何罪時雍州刺吏陳泰討胡又敗景王又謝朝士曰此我過也非𤣥伯之責於是魏人悦睦思報之也至世祖時即晋武帝羊祜上平吴表曰先帝順天應時西平巴蜀南和吴㑹海内得以休息兆庶有樂安之心而吴復背信使邉事更興夫期運雖天所授而功業必由人而成不一大舉掃滅則衆役無時得安亦所以隆先帝之勲成無為之化也故堯有丹水之伐舜有有苖之征咸以寜静宇宙戢兵和衆者也蜀平之後天下皆謂吳當并亡自此来十三年是謂一周平定之期復在今日議者常言吴楚有道後服無禮先強此乃諸侯之時耳當今一統不得與古同論夫適道之論皆未應權是故謀之雖多而决之欲獨凡以險阻得存者謂所敵者同力足自固茍其輕重不齊強弱異勢則智士不能謀而險阻不可保也蜀之地非不險也髙山尋雲霓深谷肆無景束馬懸車然後能濟皆言一夫荷㦸千人莫當及進兵之日曽無藩籬之限斬將搴旗伏屍數萬乗勝席卷徑至成都漢中諸城皆鳥棲而不敢出非皆無戰心誠力不足相抗至劉禅降服諸營堡者索然俱散今江淮之難不過劒閣山川之險不過岷漢孫皓之暴侈於劉禪吴越之困甚於巴蜀而大晋兵衆多於前世資儲器械盛於徃時今不於此平吴而更阻兵相守征夫苦役日尋干戈經歴盛衰不可長乆宜當時定以一四海今若引梁益之兵水陸俱下荆楚之衆進臨江陵平南豫州直指夏口徐揚青兖並向秣陵鼔斾以疑之多方以誤之以一隅之吴當天下之衆勢分形散所備皆急巴漢竒兵出其空虚一處傾壊則上下震蕩吴縁江為國無有内地東西數千里以藩籬自恃所敵者大無有寜息孫皓恣情任意與下多忌名臣重將不復自信是以孫秀之徒皆畏逼而至臣疑於朝士困於野無有保世之計一定之心平常之日猶懐去就兵臨之際必有應者終不能齊力致死已可知也其俗急速不能持乆弓弩㦸楯不如中國唯有水戰是其所便一入其地則長江非復所固還保城池則去長入短而官軍懸進人有致節之志吴人戰於其地有憑城之心如此軍不逾時克可必矣帝深納焉乃令王濬等滅吴天下書同文車同軌矣時吴王皓有兼上國之心使陸抗為荆州牧晋使羊祜與吴人相持祜増修徳政以懐吴吴每與戰必尅日而後合聞謀掩襲並不為若臨陣俘獲軍正将斬之祜輙曰此等死節之臣也為之垂涕親加殯給其家迎喪者必厚為之禮而歸之吴将有来者輙任其所適若欲返吴便為祖道吴將有二兒皆幼在境上戲為祜軍所畧經月其父謂之已死發喪祜親自勉勞供飬遣歸父後感其恩徳率二千来降於是陸抗每告其衆曰彼専為義此専為暴是不戰而自服也各保分界無求細益而已稱曰羊叔子雖樂毅諸葛亮何以過之陸抗將死言於吳王皓曰西陵建平國之蕃表處在上流受敵二境臣父遜昔垂沒陳言西陵國之西門如其有虞當舉國争之臣愚以為諸侯王㓜冲未嘗事乞簡閲壹切以輔疆塲晋南征大將軍羊祜来朝宻陳伐吴之計使王濬治舩於蜀方舟百餘歩皆為城郭門施樓鹵首畫怪獸以懼江神容二千餘人皆馳馬徃還及柹流於吴建平太守吾彦取其流柹以呈吳王曰晋必有攻吴之計冝増建平兵建平不下終不敢渡江吴王皓不從彦乃輙為鐡鎻加之錐刺以斷於江阻於我也濬聞之乃為大筏縳草為人伏習流者下施竹炬以礙鎻錐乃興師果如濬䇿弗之患也太康元年安東將軍王渾撃横江破之龍驤將軍王濬克建平丹陽二城杜預又分遣輕兵八百乗簟舡潛渡江上樂郷岸屯巴山多張旗熾起火山上出其不意破公安時諸將咸謂百年之冦未可全克且春水方生難於持久宜待来冬更為大舉預喻之曰昔樂毅藉濟西一戰以并強齊今兵威已振譬如破竹數節之後皆迎刃而解耳抗表論之上深然焉吴遣張悌沈瑩濟江瑩謂悌曰晋作戰舩於蜀乆矣今傾國大動萬里齊起並悉益州之衆浮江而下我上流諸軍無有戒備恐邉江諸城盡莫能禦也晋之水軍必至於此宜畜力待来一戰若破之日江西自清上方雖壊可還取也今渡江逆戰勝不可保若或摧喪則大事去矣張悌不從遂濟江盡衆来逼王師不擾其衆退而兵亂晋軍乗之大破吴師吴王皓乃降於濬戍卒八萬方舟鼔譟入於石頭皓面縳輿櫬濬焚櫬禮也賜皓爵為歸命侯至晋恵庸弱胡亂中原天子蒙塵播遷江表當時天下復分裂矣出入五代三百餘年隋文帝受圖始謀伐陳矣嘗問髙熲取陳之䇿熲曰江北地寒田収差晩江南土熱水田早熟量彼收穫之際㣲徴士馬聲言掩襲賊必屯兵堅守足以廢其農時彼既聚兵我便解甲再三如此賊以為常後更集兵彼必不信猶豫之頃我乃濟師登陸而戰兵氣益倍又江南土薄舍多竹茅所有儲積皆非地窖宻遣行人因風縱火待其修立復更燒之不出數年自可財力俱盡上行其䇿陳人益弊後發兵以薛道衡為淮南道行臺尚書兼掌文翰及王師臨江髙熲召道衡夜坐幕下因問曰今師之舉克定江東以不君試言之道衡荅曰凡論大事成敗先須以至理斷之禹貢所載九州本是王者封域後漢之季羣雄競起孫權兄弟遂有吴楚之地晋武受命尋即呑并永嘉南遷重此分割自爾已来戰争不息否終斯泰天道之恒郭璞有云江東偏王三百年還與中國合今數將滿矣以運數而言其必克一也有徳者昌無徳者亡自古興滅皆由此道主上躬履㳟儉憂勞庶政叔寳峻宇雕牆酣酒荒色上下離心人神同憤其必克二也為國之體在於任寄彼之公卿備員而已㧞小人施文慶委以政事尚書令江總唯事詩酒本非經畧之才蕭摩訶任蠻奴是其大將一夫之用耳其必克三也我有道而大彼無徳而小量其甲士不過十萬西自巫峡東至滄海分之則勢懸而力弱聚之則守此而失彼其必克四也席卷之兆其在不疑熲忻然曰君言成敗理甚分明吾今豁然矣本以才學相期不意籌略乃至此也遂進兵虜叔寳此滅吳形也議曰昔三國時蜀遣宗預使吳預謂權曰蜀土雖云隣國東西相賴吳不可無蜀蜀不可無吳孫盛曰夫帝王之保唯道與義道義既建雖小可大殷周是也茍仗詐力雖強必敗秦項是也况乎偏鄙之城恃山水之固而欲連横萬里永相資頼哉昔九國建合縱之計而秦人卒并六合囂述營輔車之謀而光武終兼隴蜀夫以九國之強隴漢之大莫能相救坐觀屠覆何者道徳之基不固而離弱之心難一故也而云吳不可無蜀蜀不可無吴豈不諂哉由此觀之為國之本唯道義而已君若不修徳舟中之人盡敵國也有矣夫自隋開皇十年庚戌嵗滅陳至今開元四年丙辰嵗凡一百二十六年天下一統論曰𫝊稱都城過百雉國之害也又曰大都偶國亂之本古者諸侯不過百里山海不以封毋親夷狄良有以也何者賈生有言臣竊跡前事夫諸侯大抵強者先反淮隂王楚最強則最先反韓信倚胡則又反貫髙因趙資則又反陳豨兵精則又反彭越因梁則又反黔布用淮南則又反盧綰最弱最後反長沙廼在二萬數千户耳功少而最完勢䟽而最忠非獨性異人也亦形勢然也曩令樊酈絳灌據數十城而王今雖以殘亡可也令信越之倫列為徹侯而居雖至今存可也然則天下之大計亦可知巳欲諸侯之皆忠附則莫若令如長沙王欲臣子之勿葅醢則莫若令如樊酈等欲天下之治安則莫若衆建諸侯而少其力以此觀之令専城者皆提封千里有人民焉非特百里之資也官以才屬肺附非特母親之䟽也吳據江湖蜀阻天險非特山海之利也跨州連郡形束壤制非特偶國之害也若遭萬世之變有七子之禍則不可諱有國者不可不察魏明帝問黄權曰今三國鼎峙何方為正對曰當以天文正之徃年熒惑守心而文帝崩吴蜀二國主無事由是觀之魏正統矣長短經巻六
