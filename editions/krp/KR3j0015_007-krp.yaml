body:
  text: 長短經卷七唐趙㽔撰懼誡時宜懼誡第二十易曰湯武革命順乎天而應乎人書曰撫我則后虐我則讐尸子曰昔周公反政孔子非之曰周公其不聖乎以天下讓不為兆人也議曰昔堯稱吾以天下授舜則天下得其利而丹朱病授丹朱則天下病而丹朱得其利吾終不以天下之病而利一人遂禪于舜今周公不以天下為務而自取其讓名非為聖達節者也故孔子非之董子曰雖有繼體守文之君不害聖人之受命古語曰窮䑕嚙狸匹夫奔萬乘故黄石公曰君不可以無徳無徳則臣叛孫卿曰能除患則為福不能則為賊孫卿子曰昔者天子初即位上卿進曰能除患則為福不能則為賊授天子一䇿中卿進曰先事慮事謂之接接則事優成先患慮患謂之豫豫則禍不生事至而後慮者謂之後後則事不舉患至而後慮者謂之因因則禍不禦授天子二策下卿進曰慶者在堂弔者在閭禍與福鄰莫知其門豫哉豫哉授天子三策此誡之至也何以明之昔文王在酆召太公曰商王罪殺不辜汝尚助余憂人今我何如太公曰王其修身下賢惠人以觀天道天道無殃不可以先唱人道無灾不可以先謀必見天殃又見人灾乃可以謀與民同利同利相救同情相成同惡相助同好相趨無甲兵而勝無衡機而攻無渠塹而守利人者天下啓之害人者天下閉之天下非一人之天下也取天下若逐野獸得之而天下皆有分肉若同舟而濟皆同其利舟敗皆同其害然則皆有啓之無有閉之者矣無取于民者取民者也無取於國者取國者也無取於天下者取天下者也議曰沛公之起也虎嘯豐谷飲馬秦川財寶無所取婦女無所收降城則以侯其將得賂則以分其士而已無私焉所私者私於天下也故老子曰夫唯不私故能成其私是知無取人是乃大取也取民者民利之取國者國利之取天下者天下利之故道在不可見事在不可聞勝在不可知微哉微哉鷙鳥將擊卑身翕翼猛獸將搏俛身俯伏聖人將動必有愚色惟文惟徳誰為之式弗觀弗視安知其極今彼殷商衆口相惑吾觀其野草茅勝穀吾觀其羣衆曲勝直吾觀其吏暴虐殘賊敗法亂利而上不覺此亡國之則也文王曰善賈子曰殷湯放桀武王伐紂此天下之所同聞也為人臣而放其君為人下而殺其上天下之至逆也而所以長有天下者以其為天下開利除害以義繼之也故聲名稱于天下而傳于後世也太公曰天下者非一人之天下天下人之天下也與天下同利者得天下擅天下之利者失天下天有時地有利能與人共之者仁也仁之所在者天下歸之免人之死解人之難救人之患濟人之急者也徳之所在天下歸之與人同憂同樂同好同惡者義也義之所在天下歸之凡人惡死而樂生好徳而歸利能生利者道也道之所在天下歸之也楚共王薨子靈王即位羣公子因羣喪職之族殺靈王而立子干立未定弟棄疾又殺子干而自立棄疾平王也五人皆共王子也初子干之入也韓宣子問于叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難對曰無與同好誰與同惡取國有五難有寵而無人一也寵須賢人而固也有人而無主二也雖有賢人當須内主為應也有主而無謀三也謀䇿謀也有謀而無民四也民衆也有民而無徳五也四者既備當以徳成也子干在晉十三年矣晉楚之從不聞達者可謂無人族盡親叛可謂無主無親族在楚無舋而動可謂無謀召子干時楚未有大舋也為羈終世可謂無人終身羈客在晉是謂無民亡無愛徵可謂無徳楚人無愛念之者王虐而不忌靈王暴虐無所畏忌將自亡也楚君子干渉五難以殺舊君誰能濟之有楚國者其棄疾乎君陳蔡城外屬焉城方城也時穿封戍既死棄疾并領陳事也苛慝不作盗賊伏隠私欲不違民無怨心先神命之國人信之芊姓有亂必季實立楚之常也獲神一也當璧拜也有民二也人信之也命徳三也無苛慝也寵貴四也貴妃子也居常五也棄疾季也有五利以去五難誰能害之子干之官則右尹也數其貴寵則庶子也以神所命則又逺之其貴亡矣其寵棄矣父既歿矣民無懐焉非令徳也國無與焉無内主也將何以立宣子曰齊桓晉文不亦是乎皆庶賤也對曰齊桓衛姬之子也有寵于僖有鮑叔牙賓須無隰朋以為輔佐有莒衛以為外主齊桓奔莒衛有舅氏之助有國髙以為内主國氏髙氏齊上卿也從善如流下善齊肅齊嚴肅敬不藏賄清也不從欲儉也施舍不倦求善不厭以是有國不亦宜乎我先君文公狐季姬之子也有寵于獻公好學不貳生十七年有士五人狐偃趙衰顛頡魏武子司空季子五士從出者也有先大夫子餘子犯以為腹心子餘趙衰子犯狐偃有魏犨賈佗以為股肱有齊宋秦楚以為外主齊妻以女宋贈以馬楚王饗之秦伯納之有欒卻狐先以為内主謂欒枝郤縠狐突先軫也亡十九年守志彌篤惠懐棄民從而與之獻無異親民無異望獻公之子九人惟文公在天方相晉將何以代之此二君者異于子干共有寵子國有奥主謂棄疾也子干無施於民無援於外去晉晉不送歸楚楚不迎何以冀國子干果不終卒立棄疾如叔向言初楚共王無冢嫡冇寵子五人無適立焉乃大有事于羣望而祈曰請神擇于五人者使主社稷乃徧以璧見于羣望曰當璧而拜者神所立也乃宻埋璧于太室之庭使五人齊而長幼入拜康王跨之靈王肘加焉子干子晳皆逺之平王弱抱而入再拜皆壓紐平王即棄疾也魯昭公薨于乾侯趙簡子問于史墨曰季氏出其君而民服焉諸侯與之君死于外而莫之或罪何也對曰物生有兩有三有五有陪貳故天有三辰謂有三也地有五行謂有五也體有左右謂有兩也各有妃耦謂陪貳也王有公諸侯有卿皆其貳也天生季氏以貳魯侯為日久矣民之服焉不亦宜乎魯君世從其失季氏世修其勤民忘君矣雖死于外其誰矜之社稷無常奉奉之無常人言唯徳也君臣無常位自古以然故詩曰髙岸為谷深谷為陵三后之姓于今為庶主所知也三后虞夏商也在易卦雷乗乾曰大壯乾下震上大壯震在上故曰雷乗乾也天之道也乾為天子震為諸侯而在乾上君臣易位猶人臣强壯若天上有雷也政在季氏于此君也四公矣民不知君何以得國是以為君慎器與名器車服也名爵號也不可以假人議曰劉向稱人君莫不欲安然而常危莫不欲存然而常亡失御臣之術也夫人臣操權柄持國政未有不為害者也昔晉有六卿齊有田崔衛有孫甯魯有季孟常掌國事世執朝柄終復田氏取齊六卿分晉崔杼弑其君光孫林父甯殖出其君衎弑其君剽季氏八佾舞于庭三家者以雍徹並専國政卒逐昭公皆隂勝而陽㣲下失臣道之所致也范雎説秦昭王曰夫三代所以亡國者常縱溢馳騁弋獵不聴政事其所授者妬賢嫉能取下蔽上以成其私不為主計而主不覺悟故失其國今右秩以上至諸史及王左右無非相國之人者見王獨立于朝臣竊為王恐恐萬世之後有秦國者非王子孫也由是觀之書稱臣之有作威作福害于而家凶于而國孔子曰禄之去公室政逮于大夫亡之兆也信哉是言也孔子在衛聞齊田常將欲為亂専齊國有無君之心而憚鮑晏鮑氏晏氏齊之世卿大夫因移其兵以伐魯初田常相齊選國中女長七尺者三百人以為後宫賓客舍人出入皆不禁田常後有七十餘男因此以盗齊國也孔子㑹諸弟子曰魯父母之國不忍觀其受敵將欲屈節于田常以救魯二三子誰使子貢請使夫子許之遂如齊説田常曰今子欲取功于魯實難若移兵于吳則可也夫魯難伐之國其城薄以卑地狹以泄其君愚而不仁大臣偽而無用其士民又惡甲兵之事此不可與戰夫吳城髙以厚地廣以深甲堅以新士選以飽重器精兵盡在其中又使明大夫守之此易伐也田常忿然作色曰子之所難人之所易子之所易人之所難而以教常何也子貢曰夫憂在内者攻强憂在外者攻弱今君憂在内矣吾聞子三封而三不成是則大臣不聽也今君破魯以廣齊戰勝以驕主破國以尊臣晏等帥師若破國則益尊而子之功不不與焉則交日疎于主是君上驕主心下恣羣臣求以成大事難矣夫上驕則恣臣驕則争是君上與主有卻下與大臣交爭也如此則子之位危矣故曰不如伐吳伐吳而不勝民人外死大臣内空是君上無强臣之敵下無民人之過孤主制齊者唯君也田常曰善然兵業已加魯矣不可更如何子貢曰子緩師吾請救于吳令救魯而伐齊子以兵迎之田常許諾子貢遂南説吴王曰王者不絶世霸者無强敵千鈞之重加銖而移今以萬乗之齊而私千乗之魯與吴爭强其為患滋甚且夫救魯顯名也伐齊大利也以撫泗上諸侯誅暴齊以服晉利莫大焉存亡魯寔困强齊智者不疑也吳王曰善然吾實困越越王今苦身養士有報吳之心子待吾先伐越然後乃可子貢曰越之功不過魯吳之强不過齊而王置齊而伐越則齊已平魯矣王方以存亡繼絶為名而畏强齊伐小越非勇也勇者不避難仁者不窮約智者不失時義者不絶世以立其義今存越示天下以仁救魯伐齊威加晉國諸侯相率而朝吳霸業成矣且王必或惡越臣請東見越君今出兵以從此則實空越而名從諸侯以伐也吳王悦乃使子貢之越越王郊迎自為子貢御曰此蠻夷之國也大夫何足儼然辱臨之子貢曰今者吾説吳王以救魯伐齊其志欲之而畏越曰待吾伐越乃可如此則破越必矣且無報人之志而令人疑之拙也有報人之志而使人知之殆也事未發而先聞危也三者舉事之大患也吳王為人猛暴羣臣弗堪國家疲于數戰士卒不忍百姓怨上大臣内變子胥以諫死太宰嚭用事順君之過以安其私此王報吳之時也誠能發卒佐之以激其志而重寶以悦其心卑辭以尊其禮則伐齊必矣此聖人之所謂屈節以期逺者也彼戰不勝王之福也若勝必以兵臨晉臣還北請見晉君共攻之其弱吳必也其鋭兵盡于齊重甲困于晉而王乗其弊滅吳必矣越王許諾乃使夫夫種以三千人助吳吳遂伐齊于召陵果以兵臨晉遇于黄池越王襲吳之國遂滅吳孔子曰夫其亂齊存魯吾之始願也若乃强晉以疲吳使吳亡而越霸賜之説也美言傷信慎言哉秦始皇帝遊㑹稽至沙丘疾甚始皇令趙髙為書賜公子扶蘇未授使者始皇崩時始皇有二十餘子長子扶蘇使監兵上郡蒙恬為將少子胡亥愛請從上許之餘子莫從丞相李斯以為上在外崩無真太子故秘之羣臣莫知也趙髙因留所賜扶蘇璽書而謂公子胡亥曰上崩無詔封王諸子而獨賜長子書長子至即位為皇帝而子無尺寸之地為之奈何胡亥曰固然也吾聞明君知臣明父知子父既捐命不封諸子何可言也趙髙曰不然方今天下之權存亡在子與髙及丞相耳願子圖之且夫臣人與見臣于人制人與見制于人豈可同日而道哉胡亥曰廢兄而立弟是不義也不奉父詔而畏死是不孝也能薄而材謭强因人之功是不能也三者逆徳天下不服髙曰臣聞湯武殺其主天下稱義焉不為不忠衛君殺其父而衛國載其徳孔子著之不為不孝議曰亂臣賊子自古有之生而楚言可為痛哭者胡亥是也夫大行不細謹大徳不辭讓鄉曲各有宜而百官不同功故顧小而忘大後必有害狐疑猶豫後必有悔斷而敢行鬼神避之後有成功願子遂之也胡亥喟然嘆曰今大行未發豈宜以此事干丞相哉髙曰時乎時乎間不及謀嬴糧躍馬唯恐後時胡亥既然髙之言乃謂丞相斯曰上崩賜長子書與喪俱㑹咸陽而立為嗣書未行今上崩未有知者事將何如斯曰安得亡國之言耶髙曰君自料才能孰與蒙恬功髙孰與蒙恬謀逺不失孰與蒙恬無怨于天下孰與蒙恬長子舊而信之孰與蒙恬斯曰此五者皆不及蒙恬而君責之何深也髙曰髙故内官之厮役也幸得以刀筆之吏進入秦宫管事二十餘年未嘗見秦免罷丞相功臣有封及二世者也卒皆以誅亡皇帝二十餘子皆君之所知長子剛毅而武勇信人而奮事即位必用蒙恬為丞相君侯終不懐通侯之印歸于鄉里明矣髙受詔教習胡亥學法仁慈篤厚輕財重士秦之諸子皆莫及也可以為嗣君計而定之斯曰斯上蔡閭巷布衣也上幸擢為丞相者固將以存亡安危屬臣也豈可負哉夫忠臣不避死而庶幾孝子不勤勞而見危君其勿復言髙曰蓋聞聖人遷徙無常就變而從時見末而知本觀指而覩歸物固有之安得常法哉方今天下之權懸命于胡亥髙能得志焉且夫從外制中謂之惑從下制上謂之賊故秋霜降者草華落水風搖者萬物作此必然之效也君侯何見之晩也斯曰吾聞晉易太子三世不安齊桓兄弟爭位身死為戮紂殘賊親戚不聼諫者國為丘墟三者逆天宗廟不血食斯其猶人哉安足與謀髙曰上下合同可以長久中外若一事無表裏君聼臣之計則長有封侯世世稱孤必有喬松之夀孔墨之智今釋此而不從禍及子孫足為寒心善者因敗為福君何處焉斯乃仰天而歎垂涕太息曰既已不能死安託命哉乃聼髙立胡亥改賜璽書殺扶蘇蒙恬初李斯從荀卿學帝王之術欲西入秦辭于荀秦卿曰斯聞得時無怠今萬乘爭時遊者主事今王欲吞天下稱帝而治此布衣馳騖之時而遊談者之秋也故斯將西説秦王至秦為吕不韋舍人不韋賢之任以為郎説秦王陰遣謀士賫金玉以遊説諸侯諸侯名士皆厚給遺之不肯者利劍刺之離其君臣之計遂吞天下皆斯之謀也秦二世末陳涉起蘄兵至陳張耳陳餘説涉曰大王興梁楚務在入闗未及收河北也臣嘗遊趙知其豪傑願請竒兵略趙地于是陳王許之與卒三千從白馬渡河今滑州白馬縣界也至諸郡縣説其豪傑曰秦為亂政虐刑殘滅天下北為長城之役南有五嶺之戍外内騷動百姓罷敝頭㑹箕斂以供軍費財匱力盡重以苛法使天下父子不相聊生今陳王奮臂為天下唱始莫不響應家自為怒各報其怨縣殺其令丞郡殺其守尉今已張大楚王陳使吳廣周文將卒百萬西擊秦于此時而不成封侯之業者非人傑也夫因天下之力而攻無道之君報父兄之怨而成割地之業此一時也豪傑皆然其言乃行收兵下趙十餘城議曰班固云昔詩書述虞夏之際舜禹受禪積徳累仁數十年然後在位殷周之王乃由契稷厯十餘世然後放殺秦起襄公始蠶食六國至于始皇乃并天下秦既稱帝患周之敗以為諸侯力爭以弱見奪于是削去五等墮城銷刃箝語燒書内鉏雄俊外攘胡越用一威權以為萬世安然十餘年間强敵横發乎不虞謫戍强于五霸閭閻逼于戎狄響應㿊于謗議奮臂威于甲兵向秦之禁適所以資豪傑自速其斃也由是觀之夫豪傑之資在于虐政矣韓信既平齊為齊王項王恐使盱眙人武涉徃説齊王使三分天下信不聽武涉已去蒯通知天下權在韓信欲為竒䇿而感動之以相人説韓信曰僕嘗受相人之術韓信曰先生相人何如對曰貴賤在於骨法憂喜在於容色成敗在於决斷以此參之萬不失一信曰先生相寡人如何對曰願請間信曰左右逺蒯通曰相君之靣不過封侯又危不安相君之背貴乃不可言背畔則大貴也韓信曰何謂也蒯通曰天下初發難俊雄豪傑建號一呼天下之士雲合霧集魚鱗雜遝烟至風起當此之時憂在亡秦而已今楚漢分爭使天下無罪之人肝胆塗地父子暴骸骨肉流離于中野不可勝數楚人起於彭城轉鬬逐北至于滎陽乗利席捲威振天下然兵困于京索之間廹西山而不能進者三年于此矣漢王將數十萬之衆距鞏洛阻山河之險一日數戰無尺寸之功折北不救敗滎陽傷成臯還走宛葉之間此所謂智勇俱困者也夫鋭氣挫于險塞而糧食竭于内藏百姓罷極怨望無所依倚以臣料之其勢非天下聖賢固不能息天下之禍當今兩主之命懸于足下足下為漢則漢勝與楚則楚勝臣願披腹心輸肝膽效愚計恐足下不用也誠能聽臣之計莫若兩利而俱存之三分天下鼎足而居其勢莫敢先動夫以足下之賢聖有甲兵之衆據强齊從燕趙出空虚之地而制其後因民之欲西嚮為百姓請命則天下風起而響應矣孰敢不聽割大弱强以立諸侯諸侯已立天下服聽而歸徳于齊案齊之故有膠泗之地懐諸侯以徳深拱揖譲則天下之君王相率而朝于齊矣盖聞天與不取反受其咎時至不行反受其殃願足下熟慮之韓信曰漢王遇我厚載我以其車衣我以其衣食我以其食吾聞之乗人之車者載人之患衣人之衣者懐人之憂食人之食者死人之事吾豈可嚮利背義乎蒯生曰足下自以為善漢王欲建萬世之業臣竊以為誤矣始常山王成安君為布衣時相與為刎頸之交後爭張黶陳澤之事二人相怨常山王奉項嬰頭䑕竄歸于漢王漢王借兵東下殺成安君泜水之南頭足異處卒為天下笑此二人相與天下至歡然而卒相擒者何也患生于多欲人心難測也今足下欲行忠信以交于漢王必不能固于二君之相與也而事多大于張黶陳澤故臣以為足下必漢王之不危已亦誤矣大夫種范蠡存亡越伯勾踐立功成名而身死亡諺曰野獸盡而獵狗烹敵國破而謀臣亡夫以交友言之則不如張耳之與成安君也忠信言之則不過大夫種之于句踐也此二人者足以觀矣願足下深慮之且臣聞勇略震主者身危而功盖天下者不賞臣請言大王功畧涉西河虜魏王擒夏説引兵下井陘誅成安君狥趙脅燕定齊南摧楚人之兵二十萬東殺龍且西嚮以報此所謂功無二于天下而畧不世出者也今足下載震主之威挾不賞之功以歸楚楚人不信歸漢漢人震恐足下欲持是安歸乎夫勢在人臣之位而有震主之威名髙天下竊為足下危之韓信謝曰先生且休矣我將念之後數日蒯通復説曰夫聽者事之候計者事之機也聽過計失而能久安者鮮矣聽不失一二者不可亂以言計不失本末者不可紛以辭夫隨厮養之役者失萬乗之權守儋石之禄者一儋一斛之餘也闕卿相之位故智者決之斷也疑者事之害也審毫釐之小計遺天下之大數智誠知之決不敢行者百事之禍也故猛虎之猶豫不如蜂蠆之致螫騏驥之跼躅不如駑馬之安步孟賁之狐疑不如庸夫之必至也雖有舜禹之智沉吟而不言不如瘖聾之指麾也夫功者難成而易敗時者難得而易失也時不再來願足下詳察之韓信猶豫不忍背漢又自以為功多漢王終不奪吾齊遂謝蒯生蒯生曰夫廹于苛細者不可與圖大事拘于臣虜者固無君王之意説不聼因去佯狂為巫議曰昔齊崔杼弑莊公晏子不死君難曰君人者豈以陵人社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為己死而為己亡非其親暱誰敢任之孟子謂齊宣王曰君之視臣如手足則臣視君如腹心君之視臣如草芥則臣視君如寇讐雖云君天也天不可逃然臣縁君恩以為等差自古然矣韓信以漢王遇厚而不背其徳誠足憐耳吳王濞以子故不朝孝文帝時吴太子入朝侍皇太子飲博争道不恭皇太子引博局投吴太子殺之及削地書至於是乃使中大夫應髙誂田鳥反膠西王無文書口報曰呉王不肖有宿夕之憂不敢自外使喻其歡心王曰何以教之髙曰今者主上興于姦雄飾于邪臣好小善聽䜛賊擅變更律令侵奪諸侯之地徵求滋多誅罰良善日以益甚語有之曰䑛糠及米吳與膠西知名諸侯也一時見察恐不得安肆矣吳王身有内病不能朝請二十餘年常患見疑無以自白今脅肩累足猶懼不見釋竊聞大王以爵事有適直革反所聞諸侯削地罪不至此此恐不得削地而已王曰然有之子將奈何髙曰同惡相助同好相㽞同情相成同欲相趨同利相死今吴王自以為與大王同憂願因時循理棄驅以除患害於天下抑亦可乎王矍然駭曰寡人何敢如是今主雖急固有死耳安得勿戴髙曰御史大夫晁錯熒惑天子侵奪諸侯蔽忠塞賢朝廷疾怨諸侯皆有背叛之意人事極矣彗星夕出蝗蟲數起此萬世一時而愁勞聖人之所起也故吳王内欲以晁錯為討外隨大王後車彷徉天下所鄉音向者降所指者下天下莫敢不服大王誠幸而許之一言則吳王帥楚王畧函谷闗守滎陽敖倉之粟距漢兵治次舍須大王有幸而臨之則天下可并兩主分割不亦可乎王曰善七國皆反兵敗伏誅太史公曰漢興孝文施大徳天下懐安至孝景不復憂異姓而晁錯刻削諸侯遂使七國俱起合從西向諸侯大盛而晁錯為之不以漸也及主父偃言之而諸侯以弱安危之機豈不以謀哉淮南王安怨望厲王死厲王長淮南王安父也長謀反檻車遷蜀至雍死上憐之封其三子以安為淮南王也欲謀叛逆未有因也及削地之後其為謀益甚與左吳等日夜按輿地圖部署兵所從入召伍被與謀曰上寛赦大王王復安得亡國之言乎臣聞子胥諫吳王吳王不用子胥曰臣今見麋鹿遊于姑蘇之臺臣今亦見宫中生荆棘霧露沾衣也臣聞聰者聽于無聲明者見于未形故聖人萬舉萬全昔文王一動而功顯于世列為三代此所謂因天心以化者也故海内不期而隨此千嵗之可見者夫百年之秦近世之吳楚亦足以喻國家之存亡矣臣不敢避子胥之誅願大王無為吳王之聽昔秦絶聖人之道殺術士燔詩書棄禮義尚詐力任刑罰轉負海之粟致之西河當是之時男子疾耕不足于糟糠女子紡績不足以盖形遣蒙恬築長城東西數千里暴露兵師常數十萬死者不可勝數殭屍千里流血頃畝百姓力竭故欲為亂者十家而五又使徐福入海求異物及延年益夀之藥還為偽辭曰臣見海中大神曰以令名振男女振童男女也與百工之事即得之矣秦皇大悦遣振男女三千人資之種種百工而行徐福得平原廣澤止王不來於是百姓悲痛相思欲為亂者十家而六又使尉佗踰五嶺攻百越尉佗知中國勞極止王不來使人上書求女無夫家者三萬人以為士卒衣補秦皇可其萬五千人于是百姓離心瓦解欲為亂者十家而七客謂髙皇帝曰時可矣髙皇帝曰待之聖人當起東南間不一年陳勝吳廣發矣髙皇始於豐沛一唱天下不期而響應者不可勝數也此所謂蹈瑕侯間因秦之亡而動者也百姓願之若旱之望雨故起于行陣之中而立為天子功髙三皇徳傳無窮今大王見髙皇得天下之易也獨不觀近世之吳楚乎夫吳王賜為劉氏祭酒授几杖不朝王四郡之衆地方數千里内鑄銅為錢東煮海以為鹽上取江陵木為船國富人衆舉兵而西破于大梁敗于狐父奔走而東至于丹徒越人擒之身死絶祀為天下笑夫以吳楚之衆不能成功者何也誠逆天道而不知時也方今大王之兵衆不能十分吳楚之一天下安寧又萬倍于秦願大王從臣之計大王不從臣之計今見大王事必不成而語先泄也臣聞微子過故國而悲於是作麥秀之歌是痛紂之不用王子比干也故孟子曰紂貴為天子死曾不若匹夫是紂先自絶于天下久矣非死之日而天下去之也今臣亦竊悲大王棄千乗之尊必且賜絶命之書為羣臣先死于東宫也王時所居于是王氣怨結而不揚涕滿眶而横流即起厯階而去後復問伍被曰漢庭治亂被曰竊覩朝廷之政君臣之義父子之親夫婦之别長幼之序皆得其理上之舉措遵古之道風俗綱紀未有所闕南越賓服羌𤏡入獻東甌入降廣長榆塞名開朔方匈奴折翅傷翼失援不振雖不及古太平之時然猶為治也王欲舉事臣見其將有禍而無福也王怒被謝死罪王曰陳勝吳廣無立錐之地千人之衆起于大澤奮臂大呼而天下響應西至于戲許直反而兵百萬今吾國雖小然而勝兵者可得十餘萬非直適戍之衆鐖鑿棘矜也大䥥謂之鐖五音反或是鉞矜音其巾反公何以言有禍無福被曰秦無道殘賊天下興萬乗之駕作阿房音旁之宫收太半之賦發閭左之戍父不寧子兄不便弟政苛刑峻天下􅘮然若燋民皆引領而望傾耳而聽悲號仰天扣心而怨上故陳勝一呼天下響應當今陛下臨制天下一齊海内汎愛蒸庶布徳施惠口雖未言聲疾雷霆令雖未出化馳如神心有所懐威動萬里下之應上猶影響也而大將軍材能不特章邯楊熊也大王以陳勝吳廣喻之被以為過王曰茍如公言不可徼倖耶被曰被有愚計王曰奈何被曰今朔方之郡田地廣水草美民徙者不足以實其地可偽為丞相御史請書徙郡國豪傑任俠及有耐罪以上輕罪不致于髠完其耐鬢故曰耐又曰律耐為司寇耐為鬼薪白粲耐猶任也赦令除家産五十萬以上者皆徙其家屬朔方之郡益發甲卒急其㑹日又偽為左右都司空上林中都官詔獄逮諸侯太子幸臣宗正有左右都司空上林有水司空皆主囚徒官也如此則民怨諸侯懼即使辨武人名隨而説之倘可徼倖十得一乎王曰此可也欲如伍被計使人偽得罪而西事大將軍丞相一日發兵發淮南兵使人即刺殺大將軍青而説丞相以下如發蒙耳又欲令衣求盗衣持羽檄從東方來呼曰南越兵入欲因以發兵未得發㑹事泄誅武帝時趙人徐樂上書言世務曰臣聞天下之患在于土崩不在瓦解古今一也何謂土崩秦之末世是也陳渉無千乘之尊壃土之地身非王公大人名族之後鄉曲之譽非有孔曽墨子之賢陶朱猗頓之富也然起窮巷奮棘矜偏袒大呼而天下風從此其故何也由其民困而主不恤下怨而上不知俗亂而政不修此三者陳渉所以為資也是謂之土崩故曰天下之患在于土崩何謂瓦解曰吴楚齊趙之兵是也七國謀為大逆是皆乗萬乗之君帯甲數十萬威足以嚴其境内財足以勸其士民然不能西攘尺寸之地而身為禽于中原者此其故何也非權輕于匹夫而兵弱于陳涉也當是之時先帝之徳澤未衰而安土樂俗之民衆故諸侯無境外之助此之謂瓦解由是觀之天下誠有土崩之勢雖有布衣窮處之士或首惡而危海内陳涉是也况三晉之君或存乎天下雖未有大治也誠能無土崩之勢雖有强國勁兵不待旋踵而身已擒矣吳楚齊趙是也况羣臣百姓能為亂乎哉此二體者安危明要也賢主之所宜留意而察度也問者闗中五榖數不登推數循治而觀之則又且有不安其處者不安故易動易動者土崩之隣也願修之廟堂之上銷未形之患也後漢靈帝以皇甫嵩為將軍討破黄巾威震天下而朝政日亂海内虚困故信都令閻忠干説嵩曰難得而易失者時也時至不旋踵者機也故聖人順時以動智者因機以發今將軍遭難得之運蹈易駭之機而踐運不撫臨機不發將何以保大名乎嵩曰何謂也忠曰天道無親百姓與能今將軍受鉞于暮春收功于末冬兵動如神謀不再計摧强易于折枯消堅易于湯雪旬月之間神兵電埽封户刻石南向以報徳威名震本朝風聲馳海外雖湯武之舉未有髙將軍者也今身建不賞之功體兼髙人之徳而北面庸主何以求安乎嵩曰夙夜在公心不忘忠何故不安忠曰不然議曰記有之親母為其子扢秃出血見者以為愛子之至使在于繼母則過者以為悮也事之情一矣所以從觀者異耳當今政理衰缺王室多故將軍處繼母之位挟震主之威雖懐至忠恐人心自變竊為將軍危之且吾聞之勢得容姦伯夷可疑茍曰無猜盗跖可信今擁兵百萬勢得為非握容姦之權居可疑之地雖竭忠信其能喻乎此田單解裘所以見忌也願將軍慮之閻生合將此類以破其志便引韓信喻之實不解公不忘忠之意談説之意漏于此矣昔韓信不忍一飱之遇而棄三分之業利劍以揣其喉方發悔毒之嘆者機失而謀乘也今主上勢弱于劉項將軍權重于淮陰指揮足以振風雲叱咤可以興雷電赫然奮發因危抵頺崇恩以綏先附振武以臨後服徵冀方之士動七州之衆羽檄先馳于前大軍響振于後蹈流漳河飲馬孟津誅閹宦之罪除羣怨之積雖童兒可使奮拳以致力女子可使褰裳以用命况厲熊羆之卒因迅風之勢哉功業已就天下已順然後請呼上帝示以天命混齊六合南面稱制移寶器于將興推亡漢于已墜實神機之至㑹風發之良時也夫既朽之木不雕衰世之朝難佐若欲輔難佐之朝雕朽敗之木是猶逆坂走丸迎流縱櫂豈云易哉且今宦豎羣居同惡如市上命不行權歸近習昏主之下難以久居不賞之功讒人側目如不早圖後悔無及嵩懼曰非常之謀不施于有常之勢創圖大功豈庸才所致黄巾細孽敵非秦項新結易散維以濟業且民未忘主天不佑逆若虚造不兾之功以速朝夕之禍孰與委忠本朝守其臣節雖云多讒不過放廢猶有令名死且不朽反常之論所不敢聞議曰夫明闇不相為用能否不相為使智士不為勇將謀勇將不為怯將死自古然矣故傳曰忠為令徳非其人猶不可况不令乎軍勢曰使義士不以財故義者不為不仁者死智者不為闇主謀所以伊摯去夏不為傷徳飛亷死紂不可謂賢今時昏道喪九域焚如而委忠危朝宴安昏寵忠不足以救世而死不足以成義且為智者固若此乎閻忠又當持此論以相説也忠知説不用因亡去董卓擅朝權徵皇甫嵩梁衍説令討卓又陶謙等共推朱雋為太師不使受李傕徵二人皆不從范曄評曰皇甫嵩朱雋並以上將之畧受脤倉卒之時值弱主蒙塵獷賊放命斯誠葉公投袂之機翟義鞠旅之日故梁衍獻規山東連謀而捨格天之大業蹈匹夫之小諒卒狼狽虎口為智士笑豈天之長斯亂也何智勇之不終甚乎議曰楚白公勝殺子西刦恵王葉公聞白公為亂率國人攻白公白公敗亡也王莽時寇盗羣發莽遣將軍廉丹伐山東丹辟馮衍為掾與俱至定陶莽追詔丹曰將軍受國重任不能捐身中野無以報恩塞責丹惶恐夜召衍以書示之衍因説丹曰衍聞之順而成者道之所大也逆而攻者權之所貴也是故期于有成不問所由論于大體不守小節昔逢丑父伏軾而使其君取飲稱于諸侯鄭祭仲立突而出忽終得復位美於春秋盖以死易生以存易亡君子之道也詭于衆意寧國存身賢者之慮也故易曰窮則變變則通通則久是以自天佑之吉無不利若夫知其不可而必為之破軍殘衆無補于主身死之日負義之世賢者不為勇者不行且衍聞之得時無怠張良以五代相韓椎秦始皇于博浪之中勇冠乎賁育名髙于太山將軍之先為漢信臣新室之興英儁不附今海内潰亂民懐漢徳甚于詩人之思召公也愛其甘棠而况子孫乎民所歌舞天必從之方今為將軍計莫若屯據大郡鎮撫吏士砥礪其節百里之内牛酒日賜納雄傑之士詢忠智之謀要將來之心待縱横之變興社稷之利除萬人之害則福禄流于無窮功烈著于不滅何為軍覆于中原身膏于草野功敗名喪恥及先祖哉聖人轉禍而為福智士因敗而為功願將軍深計而無與俗同丹不能從進及睢陽復説丹曰蓋聞明者見于未形智者慮于未萌况其昭晰者乎凡患生于所忽禍發于細微敗不可悔時不可失公孫鞅曰有髙人之行必負非于世有獨見之慮必見贅于民故信庸庸之論破金石之䇿襲當世之操失髙明之徳夫决者智之君也疑者事之役也時不再來公勿再計丹不聼進及無鹽與赤眉戰死時汝南郅惲仰觀天象而謂友人曰今鎮嵗熒惑並無漢分翼軫之域去而復來漢必再受命如有順天發䇿者必成大功以此説丹丹並不用其言也衍乃亡命河東議曰昔蒯通説韓信閻忠説皇甫嵩馮衍説亷丹此三人皆不從甘就危亡何也對曰范曄曰夫事苦則矜全之情薄生厚故安存之慮深登髙不懼者胥靡之人也坐不垂堂千金之子也由此觀之夫人情樂則思安苦則圖變必然之勢也今三子或南靣稱孤或位極將相但圖自安之術無慮非常之功不知勢疑則釁生力侔則亂起勢已疑矣弗能辭勢以去嫌力已侔矣弗能損力以招福遲迴猶豫至于危亡其禍在于矜全反貽其敗者也語曰心死則生幸生則死數公可謂幸生也來歙説隗囂遣子入侍囂將王元以為天下成敗未可知不願專心内事遂説囂曰昔更始西都四方響應天下喁喁謂之太平一旦壊敗大王幾無所措今南有子陽北有文伯江湖海岱王公十數而破牽儒生之説棄萬乗之基羇旅危國以求萬全此循覆車之軌計之不可者也今天水完富士馬最强北取西河上郡東收三輔之地案秦舊跡表裡山河元請以一丸泥為大王東封函谷闗此萬代一時也若計不及此宜蓄糗糧養士馬據隘自守曠日持久以待四方之變圖王不成其弊猶足以霸要之魚不可脱于泉龍失勢即還與蚯蚓同囂然元計雖已遣子入質猶負于險阨欲專制方面遂背漢賈復曰圖堯舜之事而不能至者湯武是也圖湯武之事而不能至者桓文是也圖桓文之事而不能至者六國是也定六國之規而欲安守之而不能至者亡六國是也魏太祖與吕布戰于濮陽不利袁紹使人説太祖連和使太祖遣家居鄴太祖許之程昱見曰竊聞將軍欲遣家居鄴與袁紹連和誠有之乎太祖曰然昱曰意者將軍殆臨事而懼不然何慮之不深也夫袁紹據燕趙之地有并天下之心而智不能濟也將軍自度能為之下乎將軍以龍虎之威可為韓彭之事耶昱愚不識大㫖以為將軍之志不如田横田横齊一壯士耳猶羞為髙祖之臣今將軍欲遣家徃鄴將北面而事袁紹夫以將軍之聰明神武而反不羞為袁紹之下竊為將軍恥之今兖州雖殘尚有三城能戰之士不下萬人若與文若昱等收而用之霸王之業可成也願將軍更慮之太祖乃止議曰陳夀稱先主𢎞毅寛厚知人待士蓋有髙祖之風英雄之器也機權幹畧不逮魏武然折而不撓終不為下者抑揆彼之量必不容已非唯競利且以避害語曰一棲不兩雄一泉無二蛟由此觀之若位同權均必不容已有自來矣曹公欲遣家居鄴與袁紹連和惑之甚也袁紹為盟主有驕色陳留太守張邈正義責之紹令曹操殺邈操不聼邈心不自安及操東擊陶謙令其將陳宫屯東郡宫因説邈曰今天下分崩雄傑並起君擁十萬之衆當四戰之地撫劍顧盼亦足以為人傑而反受制于人不亦鄙乎今州軍東征其處空虚吕布壯士善戰無前君迎之共㨿兖州觀天下之形勢俟時事之變通此亦縱横之一時也邈從之而反曹公議曰曹公與邈甚相善然邈包藏禍心者廹于事也故每覽古今所由改趨因縁侵辱或起瑕釁若韓信傷心于失楚彭寵積望于無異盧綰嫌畏于已㕁英布憂廹于情漏此事之縁也由此觀之夫叛臣逆子未必皆不忠也或心忿意危或威名振主因成大業自古然之矣鍾㑹鄧艾既破蜀蜀主降㑹搆艾艾檻車徵㑹隂懐異圖厚待蜀將姜維等維見而知其心謂可搆成擾亂徐圖克復也乃詭說之曰聞君自淮南以來算無遺䇿晉道克昌皆君為之今復定蜀威名震世民髙其功而主畏其謀欲以此安歸乎夫韓信不背漢于擾攘而見疑于既平大夫種不從范蠡于五湖卒伏劍而妄死豈闇主愚臣哉利害使之然也今君大功既立大徳已著何不法陶朱汛舟絶跡全功保身登峨眉之嶺而從赤松遊乎㑹曰君言逺我不能行且為今之道或未盡于此也維曰其他則君智力之所能無煩于老夫矣由是情好歡甚自稱益州牧以叛欲授維兵五萬人使為前驅魏將士憤發殺㑹及維張華外鎭當徵為尚書令馮紞疾之待帝從容論魏晉故事因曰臣嘗謂鍾㑹之反頗由太祖帝勃然曰何言也紞曰臣以為夫善御者必識六轡盈縮之間善治者必審官方控帯之宜是故漢髙八王以寵過夷滅光武諸將以損益克終非上有仁暴之異下有愚智之殊盖抑揚予奪使之然歟鍾㑹才見有限而太祖奬誘太過嘉其謀猷盛其名位授以重勢故㑹自謂算無遺䇿功在不賞輈張利害遂搆凶逆耳向太祖録其小能節以大禮抑之以權勢納之以軌度則逆心無由而生亂事無階而成也世祖曰然紞稽首曰陛下既然愚臣之言思堅氷之道無令如㑹之徒復致覆敗世祖曰當今豈有如㑹者乎紞曰陛下謀謨之臣捴戎馬之任者皆在陛下聖恩耳世祖黙然俄而徵華免官也晉懐帝時遼東太守龎本私憾東夷校尉李臻鮮卑索連木津等為臻興義實因而為亂遂攻䧟諸將大單于慕容廆之長子翰言于廆曰臣聞求諸侯莫若勤王自古有為之君靡不仗此以成事業者也今連津䟦扈王師覆敗蒼生屠膾豈甚此乎竪子外以龎本為名内實幸而為寇遼東傾没乘便二周中原兵亂州師屢敗勤王仗義此其時也單于宜明九伐之威救倒懸之命數連津之罪合義兵以誅之上則興復遼邦下則并呑二部忠義彰于本朝私利歸于我國此則吾鴻漸之始也終可以得志于諸侯廆善之遂誡嚴討連津斬之立遼東郡議曰古人稱始禍者死謂首亂先唱被姦雄不逞之輩外託義兵以除逆節内包荒悖因茲而起皆勤王助順用時取權者廆之謂矣後秦秦王苻生殺害忠良秦人度于一時如過百日權翼乃説東海王堅曰今主上昏虐天下離心有徳者昌無徳受殃天之道也一旦有風塵之變非君王而誰神器業重不可令他人取之願君王行湯武之事以從民心志堅然之引為謀主遂廢生立堅為秦王議曰傳云聖達節次守節下失節仲虺惟天生民有欲無主乃亂惟天生聪明時乂有夏昏徳民墜塗炭惟王弗邇聲色弗殖貨利推亡固存邦乃其昌殖有禮覆昏暴欽崇天道永保天命許芝曰春秋𫝊云周公何以不之魯蓋以為雖有繼體守文之君不言聖人受命而王京房作易傳曰王者主之惡者去之弱者奪之易姓改代天命無常人謀鬼謀百姓與能由此觀之苻堅自立而廢生此聖人達節以天下為度者也宋孔熙先者廣州刺史黙之子也有姦才善占星氣言江州分野出天子上當見弑于骨肉及大將軍彭城王義康幽于安城郡熈先謂為其人也遂說王詹事范曄曰先君昔去廣州朝謗紛紜藉大將軍深相救觧得免艱危曩受遺命以死報徳今主上昏僻殆天所棄大將軍英斷聰敏人神相屬失職南垂天下憤怨今人情騷動星文舛錯時至則不可拒此之謂乎若順天人之心收慕義之士内連寵戚外結英豪潛圖搆于表裏疾雷奮于肘腋然後誅除異義嵩奉明聖因人之望以號令天下誰敢不從小人維以七尺之軀三寸之舌立功立事而歸諸君子丈人謂為何如曄甚愕然熙先重曰昔毛琢竭節不容于魏武張溫畢議見逐于孫權彼二人者國之信臣時之俊乂豈疵瑕暴露言行玷缺然後至于禍哉皆以亷直勁正困于邪枉髙行妙節不得久容丈人之于本朝不深于二主人間雅譽有過于兩臣讒夫側目為日久矣比肩競逐庸可遂乎殷鐵一言而劉班碎首彭城斥逐徐童見疑彼豈父母之讐萬代之怨尋戈㧞棘自幼而然所爭不過榮名勢利先後之間耳及其末也唯恐䧟之不深發之不早戮及百口猶曰不厭是豈書籍逺事可為寒心悼慄者也今建大勲奉賢哲圖難于易以安易危比之太山而去累卵何苦不就且崇樹聖明至徳也身享宰相大業也授命幽居鴻名也比跡伊周美號也若夫至徳大業鴻名美號三王五伯所以覆軍殺將而爭之也一朝包括不亦可乎又有邇于此者愚則未敢道曄曰何謂熙先曰丈人奕葉清華而不得連姻帝室國家作禽獸相處丈人曾未恥之曄門無内行故熙先以此為激曄黙然自是情好遂密陰謀搆矣熙先專為謀主事露皆伏誅裴子野曰夫有逸羣之才必思冲天能之舉據盖俗之量則闇常均之下其導之以道將之以識作而不失于義行而無犯于禮殆難為乎若曄等忸志而貪權矜才以狥逆天方無釁以欲干時及罪暴刑行父子相哭累葉風素一朝而殞所謂智䏻翻為亡身之具心逆而險此之謂乎周大將軍郭榮奉使詣隋髙祖髙祖楊堅時為定州髙祖謂榮曰吾雅尚山水不好纓紱過藉時來遂叨名位願以時歸第以保餘年何如榮對曰今主上無道人懐危懼天命不常能者代有明公徳髙西伯望極國華方據六合以慰黎庶反效童兒女子投坑落穽之言耶髙祖大驚曰無妄言族矣及髙祖作相笑謂榮曰前言果中後竟代周室議曰昔武王至殷將戰紂之卒甚盛武王懼曰夫天下以紂為大以周為細以紂為衆以周為寡以周為弱以紂為强以周為危以紂為安以周為諸侯以紂為天子以此五短擊彼五長其可以濟功成事乎太公曰王無恐且懼所謂大者盡得天下之人所謂衆者盡得天下之衆所謂强者盡用天下之力所謂安者能得天下之欲所謂天子者天下相愛如父如子此之謂天子今日之為天下除殘去賊也周雖細曾殘賊一人不當乎武王大喜曰何謂殘賊太公曰收天下珠玉美女金銀綵帛藏之不休此謂殘也收暴虐之吏殺無罪之人非以法度此謂賊也由此言之茍為殘賊之行雖大亡也故知王者之勢不在衆寡有自來矣隋髙祖崩𦵏于太陵初疾也璽書徵漢王諒諒時鎮并州諒聞髙祖崩流言楊素簒位大懼以為詐也發兵自守陰謀為亂南襲蒲州取之諒初反也王頗説諒曰王之將吏家屬盡在闗西若用此等即宜長驅深入直據京師所謂疾雷不及掩耳若但欲割據舊齊之地宜任東人諒不從其言故敗也司兵參軍裴文安説諒曰兵以拙速不聞巧遲今梓宫尚在仁夀比其徵兵東進動移旬朔若驍勇萬騎卷甲宵征直指長安不盈十日不逞之徒擢授髙位付以心膂共守京城則山東府縣非彼之有然後大王鼓行而西聲勢一接天下可指麾而定也諒不從乃親率大軍屯于并介之間上聞之大懼召賀若弼議之弼曰漢王先帝之子陛下之弟居連率之重摠方岳之任聲名震響為天下所服其舉事畢矣然而進取之䇿有三長驅入闗直㨿京師西拒六軍東收山東上䇿也如是則天下未可量頓大軍于蒲州使五千騎閉潼闗復齊舊境據而都之中䇿也如是以力爭議曰齊舊境謂北齊時境土也非今青州之齊也若親居太原徒遣其將來下䇿也如是成擒耳上曰公試為朕籌之計將何出弼曰蕭摩訶亡國之將不可與圖大事裴文安少年雖賢不被任用餘皆羣小顧戀妻孥茍求自安不能逺涉必遣軍來攻蒲州親居太原為之窟穴臣以為必出下䇿果如弼所籌乃以楊素為將破之議曰初漢王陰謀為亂聲言討素司馬皇甫誕諌曰大隋據有天下二十餘載兆庶乂安難以摇動一矣萬姓厭亂人思安樂雖舜禹更生其望未從二矣太子聡明神武名應圖䜟素曽不得捧轂庸敢生心三矣方今諸侯王列守州郡表裏相制勢不可舉四矣以兹四固鎮臨天下得興禍亂未之前聞也漢王不從故敗由此觀之天下無思亂之心土崩之釁雖有吴楚之衆猶不䏻成而况于么麽乎故先王貊其徳音勤恤民隠者蓋為是也隋煬帝親御六軍伐髙麗禮部尚書楚國公楊𤣥感據黎陽反李密説𤣥感曰天子逺征遼左地去幽州懸隔千里南有巨海之限北有胡戎之患中間一道路極艱危今公擁兵出其不意長驅入薊直扼其喉前有髙麗退無歸路不過旬日資粮必盡舉麾一召其衆自降不戰而剋計之上也一本云今車駕在遼東未聞斯舉分萬餘人電發捍臨渝闗絶其歸路不經一月倉廩必竭東拒大敵西廹我師進無所依退無所據百萬之衆可使為魚此不戰而屈人上䇿也闗中四塞天府之國有衛文昇不足為意今若率衆而入長安天子雖還失其襟帯據險臨之故當必剋萬全之䇿計之中也一本云自上君臨天下胥怨明公上將之子恩被黎元長驅入闗中䇿也若隨近逐便先向東都頓兵堅城之下勝負俱未可知此計之下也一本云樊子盖不達大體姦謀雄㫁據全周之地恃甲兵之强召之則不來攻之則不䧟頓兵牢城之下外無同力之師攻洛陽此下䇿也𤣥感利洛陽寶貨曰公之下䇿我之上䇿也遂圍之𤣥感失利宵潰王師追斬之議曰𤣥感之反也太白入南斗諺曰太白入南斗天子下殿走由是天下持兩端故三畧曰放言過之裴子野曰夫左道怪民幻挾罔誕足以動衆而未足以濟功今以諺觀之左道可以動衆者信矣故王者禁焉李密乃亡歸翟讓議曰太公稱利天下者取天下安天下者有天下愛天下者久天下仁天下者化天下吕氏春秋曰庖人調和而不敢食故可以為庖人矣若使庖人調和而食之則不可為庖矣霸王之君亦然誅暴而不私以封天下之賢者故可以為霸王若使霸王之君誅暴而私之則亦不可以為霸王矣由是觀之夫與之為取政之寶也今𤣥感利洛陽寳貨安得霸王之事哉隋煬帝初猜忌唐髙祖知之常懐危懼唐公為太原㽞守煬帝自遼東還徵唐公詣行在所遇患不瘳未得時謁唐公外甥王氏充選後宫煬帝問曰汝舅來何遲甥以實對帝曰可得死否髙祖知之每懐危懼也為太原留守以討擊不利恐為煬帝所譴甚憂之時太宗從在軍中知隋將亡潛圖義舉以安天下乃進曰大人何憂之甚也當今主上無道百姓愁怨城門之外皆已為賊獨守小節必且旦暮死亡若起義兵實當人欲且晉陽用武之地足食足兵大人居之此乃天授正可因機轉禍以就功業既天與不取憂之何益髙祖大驚深拒之太宗趨而出明日復進說曰此為萬全之䇿以救滅族之事今王綱弛紊盗賊逼天下大人受命討捕其可盡乎賊既不盡自當獲罪且又世傳李氏姓膺圖籙李全才位望隆貴一朝族滅大人既能平賊即又功當不賞以此求活其可得乎髙祖意少解曰我一夜思量汝言大有道理今日破家滅身亦由汝化家為國亦由汝于是定計乃命太宗與晉陽令劉文靜及門下客長孫順徳劉𢎞基等募兵旬日之間衆且一萬斬留守副王威髙君雅以其詭請髙祖祈雨于晉祠將為不利故也用裴寂計准伊尹放太甲霍光廢昌邑故事尊煬帝為太上皇立代王侑以安隋室傳檄諸郡以彰義舉秋七月以精甲三萬西圖闗中髙祖仗白旗誓衆于太原之野引師即路遂亡隋族造我區夏晉陽令劉文靜嘗竊觀太宗謂裴寂曰非常人也大度類于漢髙神武同于魏帝年雖少乃天縱也後文靜為李密親戚被禁太宗陰有異志入禁所看之文靜大喜亦覺太宗有非常之意因嘆曰天下大亂非有湯武髙光之才不能定也太宗知其意報曰卿安知無但恐常人不能别耳文靜起忭曰久知郎君乃潛龍也今時事如此正是騰躍之秋素禀膺籙之資仍懐撥亂之道此乃生人有息肩之望文靜知攀附之所太宗喜曰計將安出文靜對曰今李密長圍洛邑主上流播淮南大賊連州郡小盗阻山澤者以千萬數但須真主馭駕取之誠能應天順人舉旗大呼則四海不足定也今并州百姓避盗賊者皆入此城文靜為令數年知其豪傑一朝嘯集立地可數萬人尊公所領之兵復且數萬一言出口誰敢不從乗虚入闗號令天下不盈半嵗帝業可成太宗笑曰卿言善合人意于是部署賓客陰圖起義髙祖乃命文靜詐為煬帝勅發太原雁門馬邑數郡人二十已上五十以下悉為兵以嵗暮集涿郡由是人情大擾思亂者益衆又令文靜與裴寂詐作符勅出官監庫物以供留守資用因募兵集衆而起改旗幟以彰義舉又令文靜連突厥突厥始畢曰唐公舉義欲何為也文靜曰文皇帝廢冢嫡傳位後主因致斯禍亂唐公國之懿戚不忍坐觀成敗欲廢不當立者願與可汗兵馬同入京師人衆土地入唐公財帛金寶入突厥始畢大悦即遣兵随文靜而至兵威益盛矣由此觀之是知天下者非一人之天下也天下人之天下也所以王者必通三統明天命所受者博非獨一姓也昔孔子論詩至于殷士膚敏祼將于京喟然嘆曰富貴無常不如是王公其何以誡慎民萌其何以勸勉易曰安不忘危存不忘亾是以身安而國家可保也故知懼而思誡乃有國之福者矣時宜第二十一夫事有趨同而勢異者非事詭也時之變耳何以明其然耶昔秦末陳涉起蘄民至陳陳豪傑說涉曰將軍披堅執銳帥士卒以誅暴秦復立楚社稷功徳宜為王陳渉問陳餘張耳兩人兩人對曰將軍瞋目張膽出萬死不顧一生之計為天下除殘賊今始至陳而王之示天下以私願將軍無王急引兵而進遣人立六國後自為樹黨如此野無交兵誅暴秦據咸陽以令諸侯則帝業成矣今獨王陳恐天下解也及楚漢時酈食其為漢謀撓楚權曰昔湯伐桀封其後于杞武王伐紂封其後于宋今秦失徳棄義侵伐諸侯社稷滅亡六國之後使無立錐之地陛下誠能復立六國後此其君臣百姓必皆戴陛下徳莫不向風慕義願為臣妾徳義以行陛下南面稱霸楚必斂衽而朝漢王曰善張良曰誠用客之謀陛下事去矣漢王曰何哉良因發八難其畧曰昔者湯伐桀封其後于杞者度能制桀之死命也今陛下能制項籍之死命乎其不可一也武王入殷表商容之閭釋箕子之囚封比干之墓今陛下能封聖人之墓褒賢者之閭乎其不可二也發巨橋之粟散鹿臺之財以賑貧民今陛下能散府庫以賜貧窮乎其不可三也殷事已畢偃革為軒倒載干戈示天下不復用武今陛下能偃武修文不復用兵乎其不可四也放馬華山之陽示無所為今陛下能放馬不復用乎其不可五也休牛桃林之野示天下不復輸積今陛下能乎其不可六也且天下遊士離親戚棄墳墓去故舊從陛下者日夜望咫尺之地今復六國立韓魏燕趙齊楚之後餘無復立者天下遊士各歸事其主從親戚反故舊陛下與誰取天下乎其不可七也且楚惟無强六國去者復撓而從之惟當使楚無强强則六國從之也陛下安得而臣之哉其不可八也誠用客之謀則大事去矣時王方食吐哺罵酈生曰豎儒幾敗我事趣令銷印此異形者也荀恱曰夫立䇿决勝之術其要有三一曰形二曰勢三曰情形者言其大體得失之數也勢者言其臨時之勢進退之機也情者言其心志可否之實也故䇿同事者三術不同也初張耳說陳涉以復六國後自為樹黨酈生亦用此説漢王所以説者事同而得失異者何哉當陳渉之起也天下皆欲亡秦而楚漢之分未有所定今天下未必欲亡項也且項羽力能率從六國如秦之勢則不能矣故立六國于陳涉所謂多已之黨而益秦弊也且陳渉未能專天下之土也所謂取非其有以徳于人行虚惠而收實福也立六國于漢王所謂割已之有而以資敵設虚名而受實禍也此事同而異形者也七國時秦王謂陳軫曰韓魏相攻朞年不解或曰救之便或曰勿救之便寡人不能决請為寡人决之軫曰昔卞莊子方制虎管䜿子止之曰兩虎方食牛牛甘必爭爭必鬭鬭則大者傷小者死從傷而刺之一舉必有兩虎之名今韓魏相攻朞年不解必是大國傷小國亡從傷而伐之一舉必有兩實此卞莊刺虎之類也恵王曰善果如其言初諸侯之叛秦也秦將軍邯圍趙王于鉅鹿楚懐王使項羽宋義等北救趙至安陽今相州安陽縣也留不進羽謂義曰今秦軍圍鉅鹿疾引兵渡河楚擊其外趙應其内破秦軍必矣宋義曰不然夫搏牛之蝱不可以破蝨蝱喻秦也蝨喻章邯也喻今將兵方欲滅秦不可盡力與章邯即戰也今秦攻趙戰勝則兵罷我承其弊不勝則我引兵鼔行而西必舉義矣故不如鬭秦趙夫擊輕銳我不如公坐運籌䇿公不如我羽曰將軍戮力而攻秦久留不行今嵗饑民貧士卒半菽士卒食蔬菜以菽雜之半軍無見粮乃飲酒髙㑹不引兵渡河因趙食與并力擊秦乃曰承其弊夫以秦之强攻新造之趙其勢必舉趙趙舉而秦强何弊之承且國兵新破王不安席埽境内而屬將軍國家安危在此一舉今不恤士卒而狥私非社稷臣也即夜入義帳中斬義悉兵渡河沉舟破釡示士卒必死無還心大破秦軍此異勢者也茍悦曰宋義待秦趙之弊與卞莊刺虎事同而勢異何也施之戰國之時隣國相攻無臨時之急則可也戰國之立其來乆矣一戰之勝敗未必以亡也其勢非能急于亡敵國也進則乗利退則自保故畜力待時承弊然也今楚趙新起其力與秦勢不並立安危之機呼吸成變進則定功退則受禍此事同而勢異者也韓信伐趙軍井陘選輕騎二千人人持一赤幟從間道昇山而望趙軍誡曰趙見我走必空壁逐我若疾入趙壁㧞趙幟立漢赤幟信乃使萬人先行出背水陣平旦信建大將之旗鼔行出井陘口趙開壁擊之大戰良久于是信棄旗鼓走水上軍水上軍開入之復疾戰趙空壁争漢旗鼓逐韓信韓信等已入水上軍軍皆殊死戰不可敗信出竒兵二千騎共候趙空壁逐利則馳入趙壁皆㧞趙旗立漢赤幟二千趙軍已不能得信等欲還歸壁皆漢赤幟而大驚以為皆已得趙王將矣遂亂遁走趙將雖斬之不能禁也于是漢兵乗擊大破之虜趙軍諸將効首虜皆賀信因問曰兵法背右山陵前左水澤今者反背水陣然竟以勝此何術也信曰兵法不曰䧟之死地而後生置之亡地而後存且信非得素撫循士大夫也此所謂驅市人而戰之其勢非置之死地使人人自為戰今與之生地皆走寧尚可得而用之又髙祖刼五諸侯兵入彭城項羽聞之乃引兵去齊與漢大戰睢水上大破漢軍多殺士卒睢水為之不流此異情者也荀恱曰伐趙之役韓信軍泜水而趙不能敗何也彭城之難漢王戰于睢水之上士卒赴入睢水而楚兵大勝何也趙兵出國能見可而進知難而退深懐内顧之心不為必死之計韓信孤軍立于水丄有必死之計無生慮也此信之所以勝也漢王制敵入國飲酒髙㑹士衆逸豫戰心不同楚以强大之威而喪其國都項羽自外而入士卒皆有憤激之心救敗赴亡以决一旦之命此漢所以敗也且韓信選精兵以守而趙以内顧之士攻之項羽選精兵以攻漢而漢王以懈怠之卒應之此事同情異者也故曰權不可預設變不可先圖與時遷移應物變化計䇿之機也漢王在漢中韓信說曰今士卒皆山東人跂而望歸及其鋒東向可以争天下後漢光武北至薊聞邯鄲兵到世祖欲南歸召官屬計議耿弇曰今兵從南來不可南行漁陽太守彭寵公之邑人上郡太守即弇父也發此兩郡控弦萬騎邯鄲不足慮也世祖官屬不從遂南馳官屬皆分散議曰歸師一也或敗或成何也對曰孫子云歸師勿遏項王使三王之秦遏漢王歸路故鋒不可當又孫子稱諸侯自戰其地為散地光武兵從南來南行入散地所以無鬬志而分散也故歸師一也而一成一敗也後漢李傕等追困天子于曹陽沮授說袁紹曰將軍累葉台輔世濟忠義今朝廷播越宗廟殘毁觀諸州郡雖外託義兵内實相圖未有憂在社稷䘏人之意且今州城粗定兵强士附西迎大駕即定鄴都挾天子而令諸侯畜士馬以討不庭誰能禦之若不早定必有先之者夫權不失機功不厭速願其圖之紹不從魏武果迎漢帝紹遂敗梁武帝蕭衍初起義兵杜思冲勸帝迎南康王都襄陽正尊號帝不從張𢎞䇿曰今以南康置人手中彼挟天子以令諸侯節下前去為人所使此豈嵗寒之計耶帝曰若前途大事不捷故當蘭艾同焚若功業克建誰敢不從豈是碌碌受人處分于江南立新野郡以集新附哉不從遂進兵克建鄴而有江左議曰挾天子以令諸侯其事一也有以之成有以之敗何也對曰天下者非一人之天下也肆行凶暴繼體不足以自存人望所歸匹夫可以成洪業夫天命底止唯樂推有自來矣當火徳不競羣豪虎爭漢祚雖衰人望未改故魏武奉天子以從人欲仗大順以令宇内使天下之士委忠霸圖𫝊曰求諸侯莫如勤王斯之謂矣齊時則不然溥天思亂海水羣飛當百姓與能之秋屬三靈改卜之日若挟舊主不亦違乎故𫝊譏萇𢎞欲興天之欲壊而美蔡墨雷乗乾之說是以其事一也有以之成有以之敗也此情與形勢之異者也隨時變通不可執一矣諸葛亮曰范蠡以去貴為髙虞卿以捨相為功太伯以三譲為仁燕噲以辭國為禍堯舜以禪位為聖孝哀以授賢為愚武王以取殷為義王莽以奪漢為篡桓公以管仲為伯秦王以趙髙喪國此皆以趣同而事異也明者以興治暗者以辱亂也長短經卷七
