body:
  text: 七雄略第十八七雄略第十八臣聞天下大器也群生重蓄也器大不可以獨理蓄重不可以自守故劃野分疆所以利建侯也親疎相鎮所以關盛衰也昔周監二代立爵五等封國八百同姓五十五深根固本為不可拔者也故盛則周邵相其治衰則五霸扶其弱所以夾輔王室左右厥世此三聖制法之意文武周公為三聖然厚下之典弊於尾大自幽平之後日以陵夷爵祿多出於陪臣征伐不由於天子吳并於越越王勾踐敗吳欲遷吳王於甬東與百家君之吳王曰孤老矣不能事君王遂自剄死越王滅吳晉分為三晉昭公六年卒六卿欲弱公室遂以法盡滅羊舌氏之族而分其邑為十縣六卿各以其子為大夫晉益弱六卿皆大哀公四年趙襄子韓康子魏桓子共殺智伯盡分其地至烈公十九年周威王賜趙魏韓皆命為諸侯晉遂滅鄭兼於韓鄭桓公者周厲王少子也幽王以為司徒問太史伯曰王室多故予安逃死乎太史伯曰獨有洛之東土河濟之南可居公曰何如對曰地近虢鄶虢鄶之君貪而好利百姓不附今公為司徒民皆愛公請試居之民皆公之民也桓公曰善竟國之至後世君乙為韓哀侯所滅并其國鄭遂亡魯滅於楚魯頃公二年楚考烈王滅魯魯頃公亡遷於卞邑為家人魯遂絕海內無主四十餘年而為戰國矣秦據勢勝之地騁狙詐之兵蠶食山東山東患之蘇秦洛陽人也合諸侯之縱以賓秦張儀魏人也破諸侯之縱以連橫此縱橫之所起也議曰易稱先王建萬國而親諸侯孔子作春秋為後世法譏世卿不改制世侯由是觀之諸侯之制所從來上矣荀悅曰封建諸侯各世其位欲使視人如子愛國如家置賢卿大夫考績黜陟使有分土而無分人而王者總其一統以御其政故有暴於其國者則人叛人叛於下誅加於上是以計利思害勸賞畏威各竟其力而無亂心天子失道則侯伯正之王室微弱則大國輔之雖無道不虐於天下此所以輔相天地之宜以左右人者也曹元首曰先王知獨理之不能久故與人共理之知獨理之不能固故與人共守之兼親疎而兩用參同異而並進輕重足以相鎮親疎足以相衛兼并路塞逆節不生也陸士衡曰夫為人不如厚己利物不如圖身安上在乎悅下為己存乎利人夫然則南面之君各矜其治九服之人知有定主上之子愛於是乎生下之體信於是乎結世治足以敦風道衰足以禦暴強毅之國不能擅一時之勢雄俊之人無以寄霸王之志蓋三代所以直道四王所以垂業夫興衰隆弊理所固有教之廢興存乎其人愿法期於必涼明道有時而闇故世及之制弊於強禦厚下之典漏於末折浸弱之釁遘自三季陵夷之禍終于七雄所謂木大必折尾大難掉此建侯之弊也蘇秦初合縱至燕周武定殷封召公於燕與六國並稱王說燕文侯曰燕東有朝鮮遼東北有林胡樓煩西有雲中九原南有呼沱易水地方二千餘里帶甲數十萬車六百乘騎六千匹粟支數年南有碣石鴈門之饒北有棗栗之利民雖不田作而足於棗栗矣此所謂天府者也夫安樂無事不見覆軍殺將無過燕者大王知其所以然乎夫燕所以不犯寇被甲者以趙之為蔽其南也秦趙相斃而王以全燕制其後此燕之所以不犯寇也且夫秦之攻燕也踰雲中九原過代上谷今易州也彌地數千里雖得燕城秦計固不能守也秦之不能害燕亦明矣今趙之攻燕也發號出令不至十日而數十萬之軍軍於東垣矣渡呼沱涉易水不至四五日而距國都矣故曰秦之攻燕也戰於千里之外趙之攻燕也戰於百里之內夫不憂百里之患而重於千里之外計無過於此者是故願大王與趙從親天下為一則燕國必無事矣燕文侯許之樂毅獻書燕王曰比目之魚不相得則其能行故古者稱之以其合兩而如一也今山東不能合弱而如一是山東之智不如魚也又譬如軍士之引車也三人不能行索二人五人而車行矣今山東三國弱而不能敵秦索二國因能勝秦矣然而山東不知相索則智固不如軍士矣胡與越人言語不相知志意不相通同舟而渡波至其相救助如一今山東之相與也如同舟而濟秦之兵至不能相救助如一智又不如胡越之人矣夫三物者人之所能為也山東主遂不悟此臣之所為山東苦也願大王熟慮之今韓梁趙三國已合矣秦見三晉之堅也必南伐楚趙見秦之伐楚必北攻燕物固有勢異而患同者秦久伐韓故中山亡今秦之伐楚燕必亡臣竊為大王計不如以兵南合三晉約戍韓梁之西邊山東不能為此此必皆亡矣燕果以兵南合三晉趙將伐燕蘇代為燕說趙王曰今者臣從外來過水見蚌方出曝而鷸啄其肉蚌合而挾其喙鷸曰今日不雨明日不雨必見蚌脯蚌亦謂鷸曰今日不出明日不出必見死鷸兩者不肯相捨漁父得而并擒之今趙且伐燕燕趙久相支以弊其眾臣恐強秦之為漁父也願大王孰計之趙王乃止齊宣王因燕喪伐燕取十城燕易王謂蘇秦曰先生能為燕得侵地乎秦曰請為王取之遂如齊見齊王拜而慶仰而弔齊王曰是何慶弔相隨之速也蘇秦曰臣聞饑人之所以饑而不食鳥喙者為其偷充腹而與死人同患也今燕雖小弱即秦王之女婿也大王利其十城而長與強秦為仇今使弱燕為鴈行而強秦推其後是食烏喙之類也齊王曰然則奈何蘇秦曰臣聞古之善制事者轉禍而為福因敗而為功大王誠能聽臣歸燕十城燕必大喜秦王知以己之故而歸燕之十城亦必喜此所謂棄仇讎而結碩友也齊王曰善於是歸燕十城蘇秦如趙趙之先與秦同祖周繆王使造父御破徐偃王乃賜造父以趙城趙氏世為晉卿也說趙肅侯曰臣竊為君計莫若安民無事且無庸有事民為也安民之本在於擇交擇交而得則民安擇交而不得則民終身不安請言外患齊秦為兩敵而民不得安倚秦攻齊而民不得安倚齊攻秦而民不得安君誠能聽臣燕必致氈裘狗馬之地齊必致魚鹽之海楚必致橘柚之園韓魏中山皆可使致湯沐之奉而貴戚父兄皆可受封侯夫割地包利五伯之所以覆軍擒將而求也封侯貴戚湯武所以放弒而爭也今君高拱而兩有之此臣之所為君願也夫秦下軹道則南陽危劫韓包周則趙自操兵據衛取淇卷則齊必入朝秦秦欲己得乎山東則必舉兵而向趙矣秦甲渡河踰漳據番吾則兵必戰于邯鄲之下矣此臣之所為君危也當今之時山東之建國莫強於趙趙地方二千餘里帶甲數十萬車千乘騎萬匹粟支數年西有常山南有河漳東有清河北有燕燕固弱國不足畏也秦之所害於天下莫如趙然而秦不敢舉兵而伐趙者何也畏韓魏之議其後也然則韓魏趙之南蔽也秦之攻韓魏也無名山大川之險稍稍蠶食之傅國都而止韓魏不能支秦必入臣於秦秦無韓魏之規則禍必中於趙矣此臣之所為君患也臣聞堯無三夫之分舜無咫尺之地以有天下禹無百人之聚以王諸侯湯武之士不過三千車不過三百乘卒不過三萬立為天子誠得其道也是故明主外料其敵之強弱內度其士卒賢不肖不待兩軍相當而勝敗存亡之機固已形於胸中矣豈掩於眾人之言而以冥冥決事哉臣竊以天下之地圖按之諸侯之地五倍於秦料度諸侯之卒十倍於秦六國并力西鄉而攻秦秦必破矣今西面而事之見臣於秦夫破人之與見破於人臣人之與見臣於人也豈可同日而論哉夫衡人者皆欲割諸侯之地以與秦秦成則高臺榭美宮室聽笙竽之音國被秦患而不與其憂是故衡人日夜務以秦權恐愒諸侯以求割地願大王熟計之臣聞明主絕疑去讒屏流言之跡塞朋黨之門故尊主強兵之臣得陳忠於前矣故竊為大王計莫若一韓魏齊楚燕趙從親以叛秦合天下之將相會於洹水之上通質刑白馬而盟約曰秦攻楚齊魏各出銳師以之佐韓絕其糧道趙涉河漳燕守常山之北秦攻韓魏則楚絕其後齊出銳師以佐之趙涉河漳燕守雲中秦攻齊則楚絕其後韓守成皋魏塞其糧道趙涉河博關燕出銳師以佐之秦攻燕則趙守常山楚軍武關齊涉渤海今滄州也韓魏皆出銳師以佐之秦攻趙則韓軍宜陽楚軍武關魏軍河外齊涉清河今貝州也燕出銳師以佐之諸侯有不如約者以五國之兵共伐之六國從親以賓秦則秦甲必不敢出於函谷以害山東矣如此則霸王之業成矣趙王曰善秦既破趙長平軍遂圖邯鄲趙人震恐東徙乃使蘇代厚幣說秦相應侯曰武安君擒馬服子乎曰然又欲圍邯鄲乎曰然代曰趙亡則秦王矣夫武安君所為秦戰勝攻取者七十餘城南取鄢郢漢中北擒馬服之軍雖周召呂望之功不益於此趙亡即秦王矣以武安君為三公君能為之下乎欲無為之下固不得矣秦攻韓圍邢丘困上黨上黨之人皆歸趙不樂為秦人之日久矣今趙北地入燕東地入齊南地入韓魏君之所得無慮幾何故不如因而割之無以為武安君之功也於是應侯言於秦王曰秦兵疲勞請許韓趙之君割地以和秦既罷兵趙王使趙赦約事秦欲割六城而與之虞卿謂王曰秦之攻趙也倦而歸乎其力尚能進愛王而弗攻乎王曰秦之攻我無餘力矣必以倦歸耳虞卿曰秦以其力攻其所不能取倦而歸王又割其力之所不能守以送之是助秦自攻耳來年秦復求割地王將與之乎弗與則棄前功而兆後禍也與之則無地以給之語曰強者善攻弱者善守今聽秦秦兵不弊而多得地是強秦而弱趙也以益秦之強而割逾弱其計固不止矣且王之地有盡而秦之求無已以有盡之地而給無已之求其勢必無趙矣王計未定樓緩從秦來王以問之緩曰不如與之虞卿曰臣言勿與非固弗與而已也秦索六城於王王以六城賂齊齊秦之深讎也得王之六城并力而西擊秦齊之聽王不待辭之畢也則王失之於齊取償於秦而齊趙之深讎可以報矣且示天下有能為也王以此發聲兵未窺於境秦之重賂必至於趙而反請和於王秦既請和韓魏聞之必盡重王重王必出重寶以一於王則是王一舉而得三國之親而秦益危矣趙王曰善即遣虞卿東見齊王與之謀秦虞卿未及發而秦使者已在趙矣樓緩聞之亡去秦圍趙王使平原君入楚從親而請其救平原君之楚見楚王說以利害日出而言日中不決毛遂乃按劍歷階而上謂平原君曰縱之利害兩言而決耳今日出而言日中不決何也楚王叱曰胡不下吾與汝君言汝何為者毛遂按劍而前曰王之所以叱遂者以楚國之眾也今十步之內王不得恃楚國之眾王之命懸於遂之手矣吾君在前叱者何也且遂聞湯以七十里之地立為天子文王以百里之壤而臣諸侯今楚地方五千里持戟百萬此霸王之資也以楚之強天下莫能比而不能當也白起小豎子耳率數萬之眾興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百代之怨趙之所羞而王不知恥焉今合縱者為楚不為趙也楚王曰苟如先生之言謹奉社稷以從楚於是遂出兵救趙趙孝成王時秦圍邯鄲諸侯之救兵莫敢擊秦魏王使晉鄙救趙畏秦止於湯陰不進魏使客將軍新垣衍閒入邯鄲令趙帝秦此時魯連適遊趙會秦圍邯鄲聞魏欲令趙尊秦為帝乃見平原君曰梁客新垣衍安在吾請為君責而歸之平原君曰勝請為紹介魯連見新垣衍而無言新垣衍曰吾視居此圍城之中皆有求於平原君也今觀先生之玉貌非有求於平原君也曷為久居圍城之中而不去乎魯連曰世以鮑焦為無從容而死者皆非也眾人不知為一身彼秦者棄禮義而上首功之國權使其士虜使其人彼即肆然而為帝過而為政於天下則連有蹈東海而死耳吾不忍為之人也所以見將軍者欲以助趙衍曰先生助之將奈何魯連曰吾將使梁及燕助之齊楚則固助之矣衍曰燕則為請以從矣若乃梁者即吾乃梁人也先生惡能使梁助之魯連曰梁未覩秦稱帝之害故耳使梁見秦稱帝之害則必助趙矣衍曰秦稱帝之害何如連曰昔者齊威王嘗為仁義矣率天下諸侯而朝周周貧且微諸侯莫朝而齊獨朝之居歲餘周烈王崩齊後往周怒赴於齊曰天崩地坼天子下席東蕃之臣田嬰後至則斮齊威王勃然怒曰叱嗟而母婢也卒為天下笑故生則朝周死則叱之誠不忍其求也彼天子固然其無足怪衍曰先生獨不見夫僕乎十人而從一人者寧力不足而智不若耶畏之也魯連曰嗚呼梁之比秦若僕耶衍曰然魯連曰吾將使秦王烹醢梁王衍愕然曰亦太甚矣先生之言也先生又惡能使秦王烹醢梁王魯連曰固也吾將言之昔者九侯鄂侯文王紂之三公也九侯有子而好故獻之紂紂以為醜醢九侯鄂侯爭之強辨之疾故脯鄂侯文王聞之喟然而歎故拘之牖里之庫百日欲令之死曷為與人俱稱王卒於脯醢之地齊湣王將之魯夷維子為御執策而從謂魯人曰子將何以待吾君魯人曰吾將以十大牢待子君夷維子曰子安取禮而來彼吾君者天子也天子巡狩諸侯避舍納管籥攝衽抱机視膳於堂下天子已食若乃退而聽朝也魯人投其籥不果內不得入於魯將之薛假途於鄒當是時鄒君死湣王欲入弔夷維子謂鄒之孤曰天子弔主人必將倍殯設几北面於南方然後天子南面弔鄒之群臣曰必若此將伏劍而死故不敢入於鄒鄒魯之大夫生則不能事養死則不得賻襚然且欲行天子之禮於鄒魯鄒魯之臣不果內今秦萬乘之國也梁亦萬乘之國也俱據萬乘之國交有稱王之名覩其一戰而勝遂欲從而帝之則且變易諸侯之大臣彼將奪其所不肖而與其所賢奪其所憎而與其所愛又將使其子女讒妾為諸侯妃姬處梁之宮梁王安得晏然而將軍又何得故寵乎於是新垣衍起再拜謝曰吾請出不敢復言帝秦秦將聞之為退軍五十里也蘇秦如韓韓之先與周同姓事晉得封於韓為韓氏後周烈王賜韓侯得列為諸侯也說韓宣王曰韓北有鞏洛成皋之固西有宜陽商阪之塞東有宛穰洧水南有陘山地方九百餘里帶甲數十萬天下之強弓勁弩皆從韓出韓卒超足而射百發不暇止遠者括洞胸近者鏑掩心韓之劍戟則龍泉太阿皆陸斷牛馬水截鵠雁夫以韓卒之勁與大王之賢乃西面而事秦交臂而服焉羞社稷而為天下笑無大於此者也是故願大王熟計之大王無事秦事秦必求宜陽成皋今茲效之明年又復求割地與之則無地以給之不與則棄前功而受後禍且夫大王之地有盡而秦之求無己以有盡之地而逆無己之求此所謂市怨結禍者不戰而地已削矣臣聞鄙諺曰寧為雞口無為牛後今王西面交臂而臣事秦何異於牛後乎夫以大王之賢挾強韓之兵而有牛後之名竊為大王羞之韓王勃然作色按劍太息曰寡人雖不肖不能事秦從之韓攻宋秦大怒曰吾愛宋韓氏與吾交而攻我所甚愛何也蘇秦為韓說秦王曰韓氏之攻宋所以為王也以韓之強輔之以宋楚魏必恐恐必西面而事秦王不折一兵不殺一人無事而割安邑此韓氏之所以禱於秦也韓惠王聞秦好事欲罷其人無令東伐乃使水工鄭國來閒秦說秦王令鑿涇水以溉田中作而覺欲誅鄭國鄭國曰始臣為閒然渠成亦秦之利臣為韓延數年命為秦開萬代之利也王從之蘇秦如魏魏之先畢公高之後與周同姓武王伐紂封高於畢以為姓畢萬事晉獻公獻公封萬於魏以為大夫後周烈王賜魏俱得為諸侯說魏襄王曰大王之地南有鴻溝陳汝南東有淮潁煮棗西有長城之界北有河水卷衍地方千里地名雖小然而田舍廬廡曾無芻牧之地人民之眾車馬之多日夜行不絕輷鞫殷殷若有三軍之眾魏天下之強國也王天下之賢主也今乃有意西面而事秦稱東藩築帝宮受冠帶祠春秋臣竊為大王恥之臣聞越王句踐戰弊卒三千擒夫差於干遂武王卒三千革車三百乘制紂於牧野豈其卒眾哉誠能奮其威也今竊聞大王之卒武士二十萬倉頭奮擊各二十萬廝徒十萬車六百乘騎六千匹此過越王句踐武王遠矣今乃聽於群臣之說而欲臣事秦夫事秦必割地以效實故兵未用而國已虧矣夫為人臣割其主之地以外交偷取一旦之功而不顧其後破公家而成私門外挾強秦之勢以內劫其主以求割地願大王孰察之周書曰綿綿不絕蔓蔓柰何毫釐不伐將用斧柯前慮未定後有大患將柰之何大王誠能聽臣六國從親專心併力則必無強秦之患故敝邑趙王使臣效愚計奉明約在大王詔之魏王曰謹奉教虞卿說春申君曰伐燕以定身封春申君曰所道攻燕非齊即魏魏齊新惡楚楚雖欲攻燕將何道哉對曰請令魏王可虞卿遂如魏謂王曰夫楚亦強大矣天下無敵乃且攻燕魏王曰向也子云天下無敵今也子云乃且攻燕者何也對曰今謂馬力多則有矣若曰勝千鈞則不然者何也夫千鈞非馬之任也今謂楚強大則有矣若夫越趙魏而鬭兵於燕則豈楚之任哉非楚之任而楚為之是敝楚也敝楚即強魏其於王孰便魏王曰善從之蘇秦如齊齊太公望呂尚者事周為文武師謀伐紂武王已平商封尚父於齊營丘也說齊宣王曰齊南有泰山東有琅邪西有清河北有渤海此四塞之國也臨菑甚富而實其民無不吹竽鼓瑟彈琴擊筑鬭雞走狗六博蹴鞠者也臨菑之途車轂擊人摩肩連衽成帷舉袂成幕揮汗成雨家殷人足志氣高揚夫以大王之賢與齊之強天下莫能當也今乃西面事秦竊為大王羞之且夫韓魏之所以畏秦者為與秦接境壤界也兵出相當不出十日而戰勝存亡之機決矣韓魏戰而勝秦則兵半折四境不守戰而不勝則國已危亡隨其後也是故韓魏之所以重與秦戰而輕為之臣也今秦之攻齊則不然倍韓魏之地過衛晉陽之道經乎亢父之險車不得方軌騎不得比行百人守險千人不敢過也秦雖欲深入則狼顧恐韓魏之議其後是故恫疑虛喝驕矜而不敢進夫不深料秦之無柰齊何也而欲西面事之是群臣之計過也今無事秦之名而有強國之實故願大王少留意計之齊王曰善蘇秦說閔王曰臣聞用兵而喜先下者憂約結而喜主怨者孤夫後起者藉也而遠怨者時也故語曰騏驥之衰也駑馬先之孟賁之倦也女子勝之夫駑馬女子之䈥骨力勁非賢於騏驥孟賁也何則後起之藉也臣聞戰攻之道非師者雖有百萬之軍比之堂上雖有閶闔吳起之將擒之戶內千丈之城拔之樽俎之閒百尺之衝折之於席上故鐘鼓竽瑟之音不絕地可廣而欲可成和樂倡優之笑不乏諸侯可同日而致也故夫善為王業者在勞天下而自佚亂天下而自安諸侯無成謀則國無宿憂也何以知其然耶昔魏王擁土千里帶甲三十六萬從十二諸侯朝天子以西謀秦秦恐寢不安席食不甘味衛鞅謀於秦王曰王何不使臣見魏王則臣必請北魏矣秦王許諾衛鞅見魏王曰大王之功大矣令行於天下矣所以十二諸侯非宋衛則鄒魯陳蔡此固大王之所以鞭箠使也不足以王天下不若北取燕東伐齊則趙必從矣西取秦南伐楚則韓必從矣大王有伐齊楚之心而從天下之志則王業見矣大王不如先行王服然後圖齊楚魏王善之故身廣公宮製丹衣柱建九游從七星之旗此天子位也而魏王處之於是齊楚怒諸侯奔齊齊人伐魏殺太子覆其十萬之軍是時秦王拱手受河西之地故衛鞅始與秦王計也謀約不下席而魏將已擒於齊矣衝櫓未施而西河之外已入於秦矣此臣之所謂北之堂上擒將戶內拔城於樽俎之閒折衝於席上者也楚懷王使柱國昭陽將兵伐魏得八城又移兵攻齊齊湣王患之陳軫曰王勿憂也請令罷之即往見昭陽於軍再拜賀戰勝之功起而請曰敢問楚之法覆軍殺將其官爵何也昭陽曰官為上柱國爵為上執珪陳軫曰貴於此者何等也曰唯有令尹耳軫曰令尹貴耳非置兩令尹也臣竊為君譬之可乎楚有祠者賜其同舍人酒一卮舍人相謂曰數人飲之不足一人飲之有餘請畫地為蛇先成者飲酒一人蛇先成引酒且飲之乃左手持卮右手畫地曰吾能為之足足未成一人蛇復成奪其卮曰蛇固無足子安能為之足乎遂飲其酒為蛇足者終亡其酒今公攻魏破軍殺將得八城而又移兵攻齊齊畏公甚以此名君足矣冠之上非可重也戰無不勝而不知止身且死爵且歸猶為蛇足者也昭陽以為然引軍而去蘇秦如楚楚之先出自帝顓頊帝嚳高辛時為大正命曰祝融其後苗裔事周文王當周成王時舉文武勤勞之後嗣而封熊繹於楚蠻以子男之田姓芊氏甚得江漢閒人和至熊通使使隨人之周請尊其號周不聽熊通怒乃自立為武王說威王曰楚天下之強國也王天下之賢主也西有黔中巫郡東有夏州海陽南有洞庭蒼梧北有陘塞郇陽地方五千餘里帶甲百萬車千乘騎萬匹粟支十年此霸王之資也夫以楚之強大王之賢天下莫能當也今乃西面而事秦則諸侯莫不西面而朝章臺之下矣秦之所害莫如楚楚強則秦弱秦強則楚弱其勢不兩立故為大王計莫如從親以孤秦大王不從親秦必起兩軍一軍出武關一軍下黔中則鄢郢動矣臣聞治之其未亂也為之其未有也患至而後憂之則無及也故願大王早熟計之大王誠能聽臣臣請令山東之國奉四時之獻以承大王之明詔委社稷奉宗廟練士勵兵在大王所用之故從合則楚王衡成則秦帝今釋霸王之業而有事人之名竊為大王不取也夫秦虎狼之國也有吞天下之心秦天下之仇讎也衡人皆欲割諸侯之地以事秦此所謂養仇而奉讎大逆不忠無過此者故從親則諸侯割地以事楚衡合則楚割地以事秦此兩策者相去遠矣二者大王何居焉故敝邑趙王使臣效愚計奉明約在大王詔之楚王曰善謹奉社稷以從楚襄王既與秦和慮無秦患乃與四子專為淫侈莊辛諫不聽辛去之趙後秦果舉鄢郢襄王乃徵辛而謝之莊辛曰臣聞鄙彥曰見兔而顧犬未為晚也亡羊而補牢未為遲也臣聞湯武以百里而王桀紂以天下而亡今楚國雖小絕長補短猶以千里豈特百里哉王獨不見夫蜻蜓乎六足四翼飛翔乎天地之閒俛啄蚊䖟而食之仰承白露而飲之自以為無患與人無爭也不知夫五尺童子方將調飴膠絲加己乎四仞之上而下為螻蟻之食蜻蜓其小者也黃雀因是以俯啄白粒仰棲茂樹鼓翅奮翼自以為無患與人無事不知夫公子王孫左挾彈右攝丸以其頰為鏑畫棲乎茂樹夕調乎酸鹹黃雀其小者也蔡聖侯因是以南遊乎高陂北陵乎巫山飲茹溪之流食湘波之魚左枕幼妾右擁嬖女與之馳騁乎高蔡之中而不以國家為事不知夫子發方受令乎宣王繫己以朱絲而見之也蔡聖侯事其小者也君王因是以左州侯右夏侯飯封祿之粟而載方府之金與之馳騁乎雲夢之中而不以天下國家為事不知夫穰侯方受命乎秦王填澠塞之內而投己於澠塞之外襄王聞之身體戰慄乃執珪而授莊辛與之謀秦後取淮北之地楚人有以弱弓微徼加歸鴈之上楚襄王召問之乃對以秦燕趙魏為鳥以激怒王曰夫先王為秦所欺而客死於外怨莫大焉今以匹夫尚有報萬乘子胥白公是也今以楚之地方五千里帶甲百萬猶足以踴躍於中野而坐受伏焉臣竊為大王勿取襄王遂復為縱約伐秦六國既合縱蘇秦為縱約長北報趙趙肅侯封蘇秦為武安君乃投縱約書於秦秦不敢闚兵函谷十五餘年張儀為秦連衡秦欲攻魏先敗韓由差軍斬首八萬諸侯震恐而儀乃來說魏王說魏王曰秦孝公時公孫鞅請伐魏曰魏居嶺阨之閒西都安邑與秦界河而獨擅山東之利利則西侵秦病則東收地今以君賢聖國賴以盛宜及此時伐魏魏不友秦必東徙東徙則據山河之固東向以制諸侯此帝業也自是之後魏果去安邑徙都大梁魏地方不至千里卒不過三十萬地四平諸侯四通條達輻湊無名山大川之限從鄭至梁二百餘里車馳人走不待倦而至梁南與楚境西與韓境北與趙境東與齊境卒戍四方守亭障者不下十萬梁之地勢固戰場也大梁今汴州是也梁南與楚不與齊齊攻其東東與齊不與趙趙攻其北不合於韓則韓攻其西不親於楚則楚攻其南此所謂四分五裂之道也且諸侯之為縱者將以安社稷尊主強兵顯名也今為縱者一天下約為昆弟刑白馬以盟洹水之上以相堅也而親昆弟同父母尚有爭錢財而欲恃詐偽反覆蘇秦之謀其不可成亦已明矣大王不事秦秦下兵攻河外據卷衍酸棗刦衛取晉陽則趙不南趙不南則梁不北梁不北則縱道絕縱道絕則大王之國欲無危不可得也秦折韓而攻梁韓怯於秦秦韓為一梁之亡立可須也此臣之所為大王患也為大王計莫如事秦事秦則楚韓必不敢動無楚韓之患則大王高枕而臥國必無憂矣大王不聽秦秦下甲士而東伐雖欲事秦不可得也且夫從人多奮辭而少可信說一諸侯而成封侯之業是故天下之遊談士莫不日夜搤腕瞋目切齒以言縱之便以說人主人主賢其辯而牽其說豈得無眩哉臣聞之積羽沈舟群輕折軸眾口鑠金故願大王審計定議魏王於是倍縱約而請成於秦范睢說秦昭王曰夫穰侯越韓魏而攻齊剛壽非計也少出師不足以傷齊多出師則害於秦也其於計疎矣且齊湣王南攻楚破軍殺將再辟地千里而齊尺寸之地無得者豈齊不欲得地哉形所不能有也諸侯見齊之罷落興師伐之士辱兵頓故齊所以大破者以其破楚肥韓魏也此所謂借賊兵而資盜糧也王不若遠交而近攻得寸則王之寸得尺則王之尺今釋近而攻遠不亦謬乎昔者中山之國五百里趙獨吞之功成名立而利附焉天下莫之能爭今夫韓魏中國之處而天下之樞王若欲霸中國而為天下樞以威楚趙楚強則附趙趙強則附楚楚趙皆附齊亦懼矣齊附必卑辭重幣以事秦齊已附則韓魏因可慮也王曰善乃拜睢為客卿謀兵事伐魏拔懷及邢丘齊楚來伐魏魏王使人求救於秦冠蓋相望而秦救不至魏人有唐睢者年九十餘矣謂王曰老臣請西說秦王令兵先臣出王再拜遣之唐睢到秦入見秦王秦王曰丈人芒然而遠至此甚苦矣夫魏之來求救數矣寡人知魏之急也唐睢曰大王知魏之急而救兵不發臣竊以為用策之臣無任矣夫魏萬乘之國也然所以西面而事秦稱東藩築帝宮受冠帶祠春秋者以為秦之強足以與也今齊楚之兵已合於魏郊而秦救不發亦將賴其未急也使之而急彼且割地而約縱王當奚救焉必待其急而救之是失一東藩之魏而強三勁之齊楚則王何利焉於是秦王遽發兵於魏張儀說楚懷王曰秦地半天下兵敵四國被山帶河四塞以為固范睢說秦昭王曰大王之國四塞以為固北有甘泉谷口南有涇渭右隴蜀左關阪奮擊百萬戰車千乘利則出攻不利則入守此王者之地民怯於私鬭勇於公戰此王者之人王并此二者而有之以當諸侯譬如放韓盧而捕蹇兔也虎賁之士百有餘萬車千乘騎萬匹粟如丘山法令既明士卒安樂主明以嚴將智以武雖無出甲席卷常山之險必折天下之脊天下後服者先亡矣且夫為縱者無以異驅群羊而攻猛虎虎之與羊不格明矣今王不與虎而與群羊臣竊以為大王之計過矣凡天下強國非秦而楚非楚而秦兩國交爭其勢不兩立大王不與秦秦下甲據宜陽韓之上地不通下兵河東成皋韓必入臣則梁亦從風而動秦攻楚之西韓攻其北社稷安得無危臣聞兵不如者勿與挑戰粟不如者勿與持久秦西有巴蜀大船積粟起於汶山浮江而下至楚三千餘里舫舟載卒一載五千人日行三百里里數雖多然不費牛馬之力不至十日而拒扞關矣扞關驚則從境以東盡城守矣黔中巫郡非王之有也秦舉甲出武關南面而伐則北地絕秦兵之攻楚也危難在三月之內而楚待諸侯之救在半歲之外此其勢不相及也夫待弱國之救忘強秦之禍此臣為大王患也大王嘗與吳人戰五戰而三勝陳卒盡矣偏守新城存民苦矣臣聞功大者易危而人弊者怨上夫守易危之功而逆強秦之心臣竊為大王危之凡天下而以信約縱親相堅者蘇秦封為武安君也蘇秦相燕即陰與燕王謀伐齊破齊而分其地乃佯為有罪出走入齊齊王因受而相之居二年而覺齊王大怒車裂蘇秦於市夫以一詐偽之蘇秦而欲經營天下混一諸侯其不可成亦明矣今秦與楚接境壤界固形親之國也大王誠能聽臣臣請使秦太子入質於楚楚太子入質於秦請以秦女為大王箕帚之妾效萬室之都以為湯沐之邑長為昆弟之國終身無相攻臣以為計無便於此者楚王乃與秦親白起將兵來伐楚楚襄王使黃歇說秦昭王曰天下莫強於秦楚今則聞大王欲伐楚此猶兩虎相與鬭而駑犬受其弊不如善楚臣請言其說臣聞之物至則反冬夏是也致至則危累棋是也今大國之地半天下有二垂此從生人以來萬乘之地未嘗有也王若能持公守威黜攻伐之心肥仁義之德則三王不足四五伯不足六也王若負人徒之眾挾兵革之強欲以力臣天下之主臣恐其有患也詩云靡不有初鮮克有終易曰狐涉水濡其尾此言始之易而終之難也何以知其然耶智伯見伐趙之利而不知榆次之禍吳王見伐齊之便而不知干遂之敗此二國者非無大功也沒利於前而易患於從也今王妬楚之不毀也而忘毀楚之強韓魏也臣為王慮而不取也王無重世之德於韓魏而有累世之怨焉夫韓魏父兄子弟接踵而死於秦者將十世矣身首分離暴骸草澤者相望於境係頸束手為群虜者相及於路故韓魏之不亡秦社稷之憂也今王信之興兵攻楚不亦過乎臣為王慮莫若善楚楚秦合為一以臨韓韓必斂手王施以山東之險帶以河曲之利韓必為關內侯若是而王以十萬戍鄭梁之人寒心許鄢夷陵嬰城而上蔡召陵不往來也如是魏亦為關內侯矣王善楚而關內侯兩萬乘之主注地於齊齊右壤可拱手而取也然後危動燕趙搖蕩齊楚此四國者不待痛而服也秦王曰善止不伐楚楚頃襄王謀與齊韓連和因欲圖周周赧王使臣武公說楚相昭子昭子曰乃圖周則無之雖然周何故不可圖對曰夫西周之地絕長補短不過百里名為天下共主裂其地不足以肥國得其眾不足以勁兵雖攻之不足以尊名然而好事之君喜攻之臣發號用兵未嘗不以周為終始是何也則祭器在焉欲器之至而忘弒君之亂今韓以器之楚臣恐天下以器讎楚於是楚計輟不行秦武王使樗里疾以車百乘入周周君迎之甚敬楚王讓周以其重秦客也游勝為周謂楚王曰昔者智伯欲伐仉猶遺大鐘載以廣車因隨之以兵仉猶卒亡無備故也齊桓公之伐蔡也號曰誅楚其實襲蔡今秦者虎狼之國有獨吞天下之心使樗里疾以車百乘入周周君懼焉以蔡仉猶為戒故使長兵居前短弩居後名曰衛疾而實囚之周君豈能無憂國哉恐一旦國亡而憂大王也楚王乃悅楚襄王有疾太子質於秦不得歸黃歇說秦相應侯曰今楚王疾恐不起秦不如歸太子太子即位其事秦必謹若不歸則咸陽一布衣耳楚更立太子必不事秦失與國而絕萬乘之和非計也願相國慮之應侯為言於秦王王不肯乃遁也張儀如韓說韓宣王曰韓地險惡山居五穀所生非菽而麥地方不過九百里無二年之食料大王之卒悉舉不過三十萬而厮徒負養在其中矣今秦帶甲百萬車千乘騎萬匹虎賁之士跿訽科頭貫頤奮戟者不可勝數山東被甲冑蒙冑以會戰秦人捐甲徒裼以趨敵左挈人頭右挾生虜秦逐山東之卒猶孟賁之與怯夫以輕重相壓猶烏獲之與嬰兒諸侯不料地之弱食之寡而聽縱人之甘言好辭比周以相飾詿誤其主無過此者大王不事秦秦下甲據宜陽斷韓之地東取成皋滎陽則鴻臺之宮桑林之苑非王有也夫塞成皋絕上地則國之國分矣故為大王計莫如為秦秦之所欲莫如弱楚而能弱楚者莫如韓非以韓能強於楚也其勢然也今西面而事秦以攻楚秦王必喜夫攻楚而不私其地轉禍而悅秦計無便於此者宣王聽之范睢說秦王曰秦韓之地形相錯如繡秦之有韓譬如木之有蠹人之有腹心病也天下無變則已有變其為秦患者孰大於韓乎王何不收韓王曰吾固欲收韓韓不聽為之奈何對曰韓安得不聽王若下兵攻滎陽則成皋之道不通北斷太行之道則上黨之師不下王一興兵而攻滎陽則其國斷而為三韓必見危亡矣安得不聽若聽則霸事可慮矣王曰善乃從之張儀說齊湣王曰天下強國無過齊者大臣父兄殷眾富樂然為大王計者皆為一時之說不顧百代之利縱人說大王者必曰齊西有強趙南有韓梁齊負海之國也地廣民眾兵強士勇雖有百秦將無柰齊何也大王賢其說而不計其實臣聞齊與魯三戰而魯三勝國以危亡隨其後雖有戰勝之名而有破亡之實是何也齊大而魯小也今秦之與齊也猶齊之與魯也今齊楚嫁女娶婦為昆弟之國韓獻宜陽魏效河外趙入朝歌澠池割河閒以事秦大王不事秦秦驅韓梁攻齊之南地悉趙兵渡清河指博關臨菑即墨非王有也國一旦見攻雖欲事秦不可得也是故願大王孰計之齊王許之燕攻齊取七十餘城唯莒即墨不下齊田單以即墨破燕殺騎劫燕將懼誅而保聊城不敢歸田單攻之歲餘不下魯連乃為書約之以矢射城中遺燕將軍曰吾聞之智者不倍時而棄利勇士不怯死而滅名忠臣不先身而後君今君行一韓之忿不顧燕王之無臣非忠也殺身亡聊城而威不信於齊非勇也功廢名滅後世無稱非智也故智者不再計勇者不怯死今死生榮辱尊卑貴賤此其時也願公詳計而無與俗同且楚攻齊之南陽魏攻平陸而齊無南面之心以為亡南陽之害小不如得濟北之利大故定計而堅守之今秦人下兵魏不敢東面橫秦之勢成則楚國之形危且前棄南陽斷右壤存濟北計猶且為之也今楚魏交兵於齊而燕救不至以全齊之兵無天下之規與聊城共據期年之弊即臣見公之不能得也齊之必決於聊公無再計彼燕王大亂上下迷惑栗腹以百萬之眾五折於外萬乘之國被圍於趙壤削主困為天下笑國敝禍多人無所歸今又以敝聊之人距全齊之兵期年不解是墨翟之守也食士炊骨士無反外之心是孫臏吳起之功也能見於天下矣故為公計者不如罷兵休士全軍歸報燕王燕王必喜士民見公如見父母攘臂而議於世公業可明也意者懟燕棄世東遊於齊乎請裂地定封富比乎陶衛世世稱孤此亦一計也二者顯名厚實願公察之熟計而審處一焉且吾聞之效小節者不能行大威惡小恥者不能成榮名昔管仲射桓公中其鉤篡也遺公子糾不能死怯也束縛桎梏辱也此三行者鄉里不通世主不臣使管仲終窮抑而不出不出不免為辱人賤行然而管子棄三行之過據齊國之政一匡天下九合諸侯名高天下光照鄰國曹沫為魯君將三戰而喪地千里使曹子計不顧後死而不生則不免為敗軍擒將曹子以一劍之任劫桓公於壇位之上顏色不變辭氣不悖三戰之所喪一朝而反之天下震動名傳後世若此二公非不能行小節死小恥也以為殺身絕世功名不立非智也故去忿恚之心而成終身之名故業與三王爭流名與天壤相敝也公其圖之燕將得書曰敬聞命矣遂自刎昔雍門周以琴見齊孟嘗君孟嘗君曰先生鼓琴亦能令人悲乎對曰臣之所能令悲者先貴而後賤古富而今貧不若擯壓窮巷不及四鄰不若身材高妙懷質抱真逢讒離謗怨結而不得伸不若交歡而結愛無怨而生離遠赴他國無相見期不若幼無父母壯無妻兒出以野澤為都入用窟穴為家困於朝夕無所假貸若此人者但聞雛鳥之號秋風鳴條則傷心矣臣一為之援琴而長太息未有不悽惻而涕泣者也今足下居則廣廈高堂連闥洞房下羅帷來清風倡優在前諂諛在側揚激楚舞鄭妾流聲以娛耳綵色以淫目水嬉則舫龍舟建羽旗鼓釣乎不測之淵也野遊則登乎平原馳廣囿強弩下高鳥勇士格猛獸置酒設樂沈醉忘歸方此之時視天地曾不若一指雖有善鼓琴不能動足下也孟嘗君曰固然雍門周曰臣竊為足下有所常悲夫角帝而困秦者君也連五國而伐楚者又君也天下未嘗無事不縱即衡縱成則楚王衡成則秦帝夫以秦楚之強而敖弱薛猶磨蕭斧而伐朝菌也有識之士莫不為足下寒心天道不常盛寒暑更進退千秋萬歲之後宗廟必不血食高臺既已傾曲池又已平墳墓生荊棘狐貍穴其中遊兒牧豎蹢躅其足而歌其上曰夫以孟嘗君之尊貴亦猶若是乎於是孟嘗君喟然太息涕垂睫而交下雍門周引琴而彈之孟嘗君遂歔欷而就之曰先生鼓琴令文若亡國之人也張儀說趙王曰敝邑秦王使臣效愚於大王大王收天下以賓秦秦兵不敢出函谷關是大王之威行於山東敝邑恐懼懾伏繕甲勵兵唯大王有意督過之也今以大王之力舉巴蜀并漢中包兩周遷九鼎守白馬之津秦雖僻遠然而心忿含怒之日久矣今有敝甲凋兵軍於澠池願渡河據番吾會戰邯鄲之下願以甲子合戰以征殷紂之事故使臣先以聞於左右凡大王之所信為從者恃蘇秦蘇秦熒惑諸侯以是為非以非為是欲反覆齊國而自令車裂於市夫天下之不可混一亦明矣今楚與秦為昆弟之國而韓梁稱為東藩之臣齊獻魚鹽之地此斷趙之右臂也夫斷右臂而與人鬭失其黨而孤居求欲無危豈可得乎今秦發三軍其一軍塞午道告齊使興師渡河軍於邯鄲之東一軍軍於成皋驅韓梁軍於河外一軍軍於澠池約四國而擊趙趙服必四分其地是故不敢匿意隱情先以聞於左右臣竊為大王計莫如與秦王遇於澠池面相見而口相約請按兵無攻願大王之定計趙肅侯許之武安君破趙長平軍降其卒四十餘萬皆坑之進圍邯鄲而軍糧不屬乃遣衛先生言於秦昭王曰趙國右倍常山之險而左帶河障之阻有代馬車騎之利民人氣勇好習兵戰常會諸侯而一約為之縱長明秦不弱則六國必滅秦所以未得志於天下者趙之為患也今賴大王之靈趙軍破於長平其信臣銳卒莫不畢死邯鄲空虛百郡震怖士民咸怨其主誠以此時遣轉輸給足軍糧滅趙必矣滅趙以威諸侯天下可定而王業成矣秦王欲許之應侯妬其功不欲使成言於秦王曰秦雖破趙軍士卒死傷亦眾百姓疲於遠輸國內空虛楚魏乘虛為變將無以自守宜且罷兵王從之後三年復欲將白起伐趙起不肯王乃使應侯責之曰楚地方五千里持戟百萬君前率數萬之眾入楚拔鄢郢焚其郊廟楚人震恐東徙而不敢西向韓魏相率興兵甚眾君所將不能半而破之伊闕流血漂鹵韓魏已服至今稱東藩此君之功天下莫不聞今趙卒之死於長平者已十七八是以寡人願使君將必欲滅之君常以寡擊眾取勝如神況以強擊弱以眾擊寡乎武安君曰是時楚王恃其國大不恤其政而群臣相妬以功諂諛用事良臣疎斥百姓離心城池不修既無良將又無守備故臣得引兵深入多倍城邑發梁焚舟以專人心掠於郊野以足軍食當此之時秦之士卒以軍中為家以將為父母不約而親不謀而信一心同力死不旋踵楚人自戰其地咸顧其家各有散心莫有鬭意是以能有功也伊闕之戰韓孤顧魏不欲先用其眾魏恃韓之銳欲推以為鋒二軍爭便其力不同是以臣得以設疑兵以待韓陣專軍并銳觸魏之不意魏軍既敗韓軍自潰以是之故故能有功皆計利形勢自然之理何神之有今秦軍破趙軍於長平不遂以時乘其振懼而滅之畏而釋之使得耕稼以益蓄積養孤長幼以益其眾繕理兵甲以益其強增浚城池以益其固主折節以下其臣臣推體以下死士至平原之屬皆令妻妾補縫於行伍之閒臣民一心上下同力猶句踐困於會稽之時也以今伐之趙必固守挑其軍戰必不肯出圍共國都必不可剋攻其列城必不可拔掠於郊野必無所得兵久無功諸侯生心外救必至臣見其害未覩其利又病不能行應侯慚而退秦乃使王齕將伐趙楚魏果救之也張儀說燕昭王曰大王之所親信莫如趙昔趙襄子嘗以其姊為代王妻欲并代約與代王遇於句注之塞乃令工人作為金斗長其尾令可以擊人與代王飲陰告廚人曰即酒酣樂進熱啜反斗以擊之於是酒酣樂取熱啜廚人進斟因反斗擊代王殺之肝脅塗地其姊聞之因磨笄以自殺故至今有磨笄之山天下莫不聞至漢高祖時陳豨以趙相國監趙代邊兵舉兵反上自行至邯鄲喜曰豨不南據漳水北守邯鄲吾知其無能為也及豨敗上曰代居常山北趙乃從山南有之遠乃立二子為代王也夫趙王之狼戾無親大王之所明見且以趙為可親乎趙興兵攻燕再圍燕都而劫大王大王割十城以謝今趙王已入朝澠池效河閒事以秦今大王不事秦秦下甲雲中九原驅趙而攻燕則易水長城非王有也今王事秦秦王必喜趙不敢妄動是西有強秦之援南無齊趙之患是故願大王孰計之燕王聽張儀張儀歸報秦燕王使太子丹入質於秦秦欲使張唐相燕與共伐趙以廣河閒地張唐謂呂不韋曰臣嘗為昭王伐趙趙怨臣今之燕必經趙臣不可行不韋不快未有以強之其舍人甘羅年十二謂不韋曰臣請為君行之遂見張唐曰君之功孰與武安君唐曰武安君南挫強楚北滅燕趙戰勝攻取破城隳邑不可勝數臣之功不如也甘羅曰應侯之用於秦孰與文信侯專唐曰應侯不如文信侯專甘羅曰昔應侯欲伐趙武安君難之去咸陽十里賜死於杜郵今文信侯自請君相燕而不肯行臣不知君所死處也張唐懼曰請因孺子行行有日矣甘羅又謂文信侯曰借臣車五乘請為張唐先報趙文信侯遣之甘羅如趙說王曰王聞燕太子丹入秦乎曰聞之聞張唐之相燕乎曰聞之甘羅曰燕太子丹入秦者燕不欺秦也張唐相燕者秦不欺燕也燕秦不相欺無異故欲攻趙而廣河閒地王不如齎臣五城以廣河閒臣請歸燕太子與強趙攻弱燕趙王曰善立割五城與秦燕太子聞而歸趙乃攻燕得二十城令秦有其十也於是楚人李斯梁人尉繚說於秦王曰秦自孝公已來周室卑微諸侯相兼關東為六國秦之乘勝侵諸侯蓋六代矣今諸侯服秦譬若郡縣其君臣俱恐若或合縱而出不意此乃智伯夫差湣王所以亡也願王無愛財賂其豪臣以亂其謀秦不過亡三十萬金則諸侯可盡秦王從其計陰遣謀士齎金玉以遊諸侯諸侯名士可與財者厚遺給之不肯者利劍刺之離其君臣之計乃使良將隨其後遂并諸侯天下之士合縱相聚於趙而欲攻秦應侯曰王勿憂也請令廢之秦於天下之士非有怨也相聚而攻秦者以欲富貴耳王見王之狗乎數千百狗為群臥者起者行者行止者無相與鬭者投之一骨則輕起相呀何者有爭意也今令載五千金隨唐睢并載奇樂居武安高會相飲散不能三千金天下之士相與鬭也秦既吞天下患周之敗以為弱見奪於是笑三代盪滅古法孔融曰古者王畿之制千里寰內不以封諸侯祭公曰夫先王之制邦內甸服邦外侯服侯衛賓服夷蠻要服戎狄荒服甸服者祭侯服者祀賓服者享要服者貢荒服者王日祭月祀時享歲貢終王先王之訓也有不祭則修德有不祀則修言有不享則修文有不貢則修名有不王則修德序成而又不至則修刑於是有刑不祭伐不祀征不享讓不貢告不王於是有刑罰之辟有攻伐之兵有征伐之備有威讓之命有文告之辭而又不至則增修其德無勤人於遠此古制也削去五等改為郡縣自號為皇帝而子弟為匹夫內無骨肉本根之輔外無尺土蕃翼之衛吳陳奮其白梃木杖也劉項隨而斃之故曰周過其歷秦不及其數國勢然也荀悅曰古之建國或小或大者監前之弊變而通之也夏殷之時蓋不過百里故諸侯微而天子強桀紂得肆其虐害紂脯邢侯而醢鬼侯以文王之盛德不免於牖里周承其弊故建大國方五百里所以崇寵諸侯而自損也至於末流諸侯強大更相侵伐而周室卑微禍難用作秦承其弊不能正其制以求其中而遂廢諸侯改為郡縣以壹威權以專天下其意主以自為非以為人也故秦得擅海內之勢無所拘忌肆行奢淫暴虐於天下然十四年而滅矣故人主失道則天下遍被其害百姓一亂則魚爛土崩莫之匡救漢興承周秦之弊故雜而用之然六王七國之難者誠失之於強大非諸侯治國之咎漢興之初海內新定同姓寡少懲亡秦孤立之敗於是割裂疆土立爵二等大者王小者侯功臣侯者百有餘邑尊王子弟大啟九國國大者跨州兼郡連城數十可謂矯枉過正矣然高祖創業日不暇給孝惠享國之日淺高后女主攝位而海內晏然無狂狡之憂卒折諸呂之難成太宗之基者亦賴之於諸侯也夫原本以末大流濫以致溢小者淫荒越法大者睽孤橫逆以害身喪國故文帝采賈生之議分齊趙賈誼曰欲天下之理安莫若眾建諸侯而少其力力少則易使義國小則無邪心令天下之制若身之使臂臂之使指陛下割地定制令齊趙楚各為若干國使其子孫各受祖之分地地盡而止天子無所利焉又上疏曰陛下即不定制如今之勢不過一傳再傳諸侯猶且人恣而不制豪植而大強漢法不得行矣陛下所以為藩扞及皇太子之所恃者唯淮陽代二國耳代北邊匈奴與強敵為鄰能自完則足矣而淮陽之比大諸侯廑如黑子之著面適足以餌大國不足以有所禁禦方今之制在陛下而令子適足以為餌豈可為萬代利哉臣之愚計願舉淮南地以益淮陽而為梁王立後割淮陽北邊二三列城與東郡以益梁不可者可徙代王而都睢陽梁起於新蔡以北著之河淮陽包陳以南犍之江則大諸侯之有異心者破膽而不敢謀梁足以扞齊趙淮陽足以禁吳楚陛下高枕終無山東之憂此萬世之利也臣聞聖王言問其臣而不自造事故使人臣得畢其愚忠唯陛下財幸文帝於是從誼計乃徙淮陽王武為梁王界北泰山西至高陽德大縣四十餘城徙淮陽王喜為淮南王撫其人後七國反不得過梁地賈生之計也景帝用晁錯之計削吳楚晁錯說上曰昔高帝初定天下昆弟少諸子弱大封同姓故孽子悼惠王王齊七十二城庶弟元王王楚四十城兄子王吳五十餘城封三庶孽分天下半今吳王前有太子之隙雖稱病不朝於古法當誅文帝不忍因賜几杖德至厚也不改過自新乃益驕恣公即山鑄錢煮海為鹽誘天下士人謀作亂逆今削之亦反不削亦反削之反亟禍小不削反遲禍大於是漢臣庭議削吳吳乃反矣武帝施主父之策推恩之令主父偃說上曰古者諸侯不過百里強弱之形易制今諸侯或連城數十地方千里緩則驕奢易為淫亂急則阻其強而合縱以逆京師今以法割削則逆節萌起前日晁錯是也今諸侯子弟或十數而嫡嗣代立餘雖骨肉無尺地封則仁孝之道不宣願陛下令諸侯得推恩分子弟以地侯之彼人人喜得所願上以得施實分其國必消而自弱矣上從其計也景遭七國之亂抑諸侯減黜其官武有淮南衡山之謀作左官之律仕於諸侯王為左官設附益之法封諸侯過限曰附益諸侯唯得衣食租稅不與政事至於哀平之際皆繼體苗裔親屬疏遠生於帷牆之中不為士民所尊割削宗子有名無實天下曠然復襲亡秦之軌矣故王莽知漢中外殫微本末俱弱無所忌憚生其姦心因母后之權假伊周之稱專作威福廟堂之上不降階序而運天下詐謀既成遂據南面之尊分遣五威之吏馳傳天下班行符命漢諸侯王蹶角稽首奉上璽紱唯恐居後豈不哀哉及莽敗天下雲擾隗囂擁眾天水班彪避難從之囂問彪曰往者周失其馭戰國並爭天下分裂數世乃定意者縱橫之事復起於今矣將承運迭興在於一人也願先生試論之對曰周之廢興與漢異矣昔周爵五等諸侯從政根本既微枝葉強大故其末流有縱橫之事勢數然也漢承秦制改立郡縣主有專己之威臣無百年之柄至於成帝假借外家哀平祚短國嗣三絕故王氏擅朝因竊號位危自上起傷不及下是以即真之後天下莫不引領而歎十餘年閒中外騷動遠近俱發假號雲合咸稱劉氏不謀同辭方今雄傑帶州跨城者皆無七國世業之資而百姓謳吟思仰漢德可以知之光武中興纂隆皇統而猶遵覆車之遺轍養喪家之宿疾僅及數世姦宄充斥率有強臣專朝則天下風靡一夫縱橫則城池自夷豈不危哉在周之難興王室也放命者七臣干位者三子嗣王委其九鼎凶族據其天邑鉦鼙震於閫宇鋒鏑流於絳闕然禍止畿甸害不覃及天下晏然以治待亂是以宣王興於共和襄惠振於晉鄭豈若二漢階闥暫擾而四海已沸孽臣朝入而九服夕亂哉遠惟王莽篡逆之事近覽董卓擅權之際億兆悼心愚智同痛豈世乏曩時之臣士無匡合之志歟蓋遠績屈於時異雄心挫於卑勢耳陸機曰或以諸侯世位不必常全昏主暴君有時比迹故五等所以多亂也今之牧守皆方庸而進雖或失之其得固多故郡縣易以為治也夫德之休明黜陟日用長率連屬咸述其職而淫昏之君無所容過何患其不治哉故先代有以之興矣或苟衰陵百度自悖鬻官之吏以貨準才則貪殘之萌皆群后也安在其不亂哉故後王有以之廢矣且要而言之五等之君為己思治郡縣之長為圖利物何以徵之蓋企及進取仕子之常志修己安民良士所希及夫進取之情銳而安民之譽遲是故侵百姓以利己者在位所不憚損實事以養名者官長所夙夜也君無卒歲之圖臣挾一時之志五等則不然知國為己土眾皆吾民民安己受其利國傷家嬰其病故上制人欲以垂後後嗣思其堂構為上無苟且之心群下思膠固之義使其並賢居治則功有厚薄兩愚處亂則過有深淺然則探八代之制幾可以一理貫秦漢之典殆可以一言弊也魏太祖武皇帝躬聖明之姿兼神武之略龍飛譙沛鳳翔兗豫觀五代之存亡而不用其長策覩前車之傾覆而不改其轍迹子弟王空虛之地君不使之人權均匹夫勢齊凡庶內無深根不拔之固外無磐石宗盟之助非所以安社稷為萬世之業也且今之州牧郡守古之方伯諸侯皆跨有千里之土兼軍武之任或比國數人或兄弟並據而宗室子弟曾無一人閒廁其閒與相維持非所以強幹弱枝備萬一之慮也時不用其計後遂凌夷此周秦漢魏立國之勢是以究其始終強弱之勢明鑒戒焉荀悅曰其後遂皆郡縣治人而絕諸侯當時之制亦未必百王之治也論曰周有天下八百餘年後代衰微而諸侯縱橫矣至末孫王赮降為庶人猶能枝葉相持名為天下共主當是時也楚人問鼎晉侯請隧雖欲闞周室而見厄諸姬夫豈無姦雄賴諸侯以維持之也故語曰百足之蟲至死不僵扶之者眾此之謂乎及嬴氏擅場懲周之失廢五等立郡縣君有海內而子弟為匹夫功臣效勤而干城無茅土孤制天下獨擅其利身死之日海內分崩陳勝偏袒唱於前劉季提劍興於後虎嘯龍睇遂亡秦族夫劉陳諸傑布衣也無吳楚之勢立錐之地然而驅白徒之眾得與天子爭衡者百姓思亂無諸侯勤王之可憚也故請曰夫亂政虐刑所以資英雄而自速禍也此之謂矣夫伐深根者難為功摧枯朽者易為力今五等深根者也郡縣枯朽者也故自秦以下迄於周隋失神器者非侵弱得天下者非持久國勢然也嗚呼郡縣而理則生布衣之心五等御代則有縱橫之禍故知法也者皆有弊焉非謂侯伯無可亂之符郡縣非致理之具但經始圖其多福慮終取其少禍故貴於五等耳聖人知其如此是以競競業業日慎一日修德以鎮之擇賢而使之德修賢擇黎元樂業雖有湯武之聖不能興矣況於布衣之細而敢偏袒大呼哉不可不察
