body:
  text: 儒門經濟長短經序儒門經濟長短經序唐梓州郪縣長平山安昌巖草莽臣趙蕤撰趙子曰匠成輿者憂人不貴作箭者恐人不傷彼豈有愛憎哉實伎業驅之然耳是知當代之士馳騖之曹書讀縱橫則思諸侯之變藝長奇正則念風塵之會此亦向時之論必然之理矣故先師孔子深探其本憂其末遂作春秋大乎王道制孝經美乎德行防萌杜漸預有所抑斯聖人制作之本意也然作法於理其弊必亂若至於亂將焉救之是以御世理人罕聞沿襲三代不同禮五霸不同法非其相反蓋以救弊也是故國容一致而忠文之道必殊聖哲同風而皇王之名或異豈非隨時設教沿乎此因物成務牽乎彼沿乎此者醇薄繼於所遭牽乎彼者王霸存於所遇故古之理者其政有三王者之政化之霸者之政威之強國之政脅之各有所施不可易也管子曰聖人能輔時不能違時智者善謀不如當時鄒子曰政教文質所以匡救也當時則用之過則捨之由此觀之當霸者之朝而行王者之化則悖矣當強國之世而行霸者之威則乖矣若時逢狙詐正道陵夷欲憲章先王廣陳德化是猶時越客以拯溺白大人以救火善則善矣豈所謂通於時變歟夫霸者駮道也蓋白黑雜合不純用德焉期於有成不問所以論於大體不守小節雖稱仁引義不及三王而扶顛定傾其歸一揆恐儒者溺於所聞不知王霸殊略故敘以長短術以經綸通變者刱立題目總六十有三篇合為十卷名曰長短經大旨在乎寧固根蒂革易時弊興亡治亂具載諸篇為沿襲之遠圖作經濟之至道非欲矯世誇俗希聲慕名輒露見聞逗機來哲凡厥有位幸望詳焉
