body:
  text: 長短經卷三唐趙蕤撰反經十三是非十四適變十五正論十六反經第十三議曰理國之要以仁義賞罰此其大畧也然用失其宜反以為害故著反經一章以明之也臣聞三代之亡非法亡也御法者非其人矣故知法也者先王之陳迹茍非其人道不虚行故尹文子曰仁義禮樂名法刑賞此八者五帝三王治世之術故仁者所以博施於物亦所以生偏私反仁也議曰在禮家施不及國大夫不收公利孔子曰天子愛天下諸侯愛境内不得過所愛者惡私惠也故知偏私之仁王者惡之也義者所以立節行亦所以成華偽反義也議曰㤀身狥國臨大節而不可奪此正義也若趙之虞卿棄相捐君以用魏齊之危信陵無忌竊符矯命以赴平原之急背公死黨之義成守職奉上之節廢故毛公數無忌曰於趙則有功矣於魏則未為得凡此之類皆華偽者禮者所以行謹敬亦所以生惰慢反禮也議曰漢時欲定禮文帝曰繁禮飾貌無益于禮躬化為可耳故罷之郭嘉謂曹公曰紹繁禮多儀公體任自然此道勝者也夫節苦難貞故生惰慢也樂者所以和情志亦所以生淫放反樂也樂書曰鄭衛之音亂代之音桑間濮上之音亡國之音也故嚴安曰夫佳麗珍怪固順于耳目故養失而泰樂失而淫禮失而彩教失而偽偽彩淫泰非所以範人之道名者所以正尊卑亦所以生矜簒反名也議曰古者名位不同禮亦異數故聖人明禮制以序尊卑異車服以彰有徳然漢髙見秦皇威儀之盛乃嘆曰大丈夫當如此此所以生矜簒老經曰夫禮者忠信之薄而亂之首信矣哉法者所以齊衆異亦所以乖名分反法也議曰道徳經云法令滋彰盜賊多有賈誼云法之也所用易見而禮之所為至難知刑者所以威不服亦所以生凌暴反刑也賞者所以勸忠能亦所以生鄙爭反賞也文子曰聖人其作書也以領理百事愚者以不忘智者以記事及其衰也為奸偽以解有罪而殺不辜反書也文子曰察于刀筆之跡者即不知理亂之本習于行陣之事者即不知廟勝之權莊子曰儒以詩禮發冡大儒曰東方作矣事之何若小儒曰未解裙襦口中有珠詩固有之曰青青之麥生于陵陂生不布施死何含珠為接其鬢壓其顪儒以金椎控其頤徐别其頰無傷口中􅀈珠由此言之詩禮乃盜資也顪音許穢反控音其作囿也以奉宗廟之具簡士卒戒不虞及其衰也馳騁弋獵以奪人時反囿也齊宣王見文王囿大人以為小問于孟子孟子曰周文王之囿方七十里芻蕘者往焉雉者往焉與人同之民以為小不亦宜乎臣聞郊闗之内有囿方四十里殺其麋鹿者如殺人之罪民以為大不亦宜乎楚靈為章華之臺伍舉諌曰夫先王之為臺榭也榭不過講軍實臺不過望氛祥其所不奪穡地其為不匱財用其事不煩官業其日不妨事務夫為臺榭將以教人利也不聞其以匱乏也其上賢也以平教化正獄訟賢者在位能者在職澤施于下萬人懷徳至其衰也朋黨比周各推其與廢公趨私外内相舉奸人在位賢者隠處反賢也太公謂文王曰君好聽世俗之所舉者或以非賢為賢或以非智為智君以世俗之所舉者為賢智以世俗之所毁者為不肖則多黨者進少黨者退是以羣邪比周而蔽賢是以世亂愈甚文王曰舉賢奈何太公曰將相分職而君以官舉人案名察寔選才考能則得賢之道古語曰重朋黨則蔽主争名利則害友務欲速則失徳也韓詩外𫝊曰夫士有五反有勢尊貴不以愛人行義理而反以暴傲反貴也古語曰冨能冨人者欲貧不可得貴能貴人者欲賤不可得達能達人者欲窮不可得梅福曰存人所以自立也壅人所以自塞也家富厚不以振窮救不足而反以侈靡無度反富也資勇悍不以衛上攻戰而反以侵凌私鬭反勇也凡將帥輕去就者不可使鎮邉使仁徳守之則安矣心智慧不以端計教而反以事奸飾非反智慧也説苑曰君子之權謀正小人之權謀邪貌美好不以統朝莅人而反以蠱女從欲反貌也此五者所謂士失其美質太公曰明罰則人畏懾人畏懾則變故出反明罰也明察則人擾人擾則人徙人徙則不安其處易以成變反明察也太公曰明賞則不足不足則怨長明王理人不知所好而知所惡不知所歸而知所去使人各安其所生而天下靜矣晉劉頌曰凡監司欲舉大而畧小何則夫細過微闕謬忘之失此人情所必有所固不許在不犯之地而悉紏以法則朝野無立人此所謂以治而亂也晏子曰臣專其君謂之不忠子專其父謂之不孝妻專其夫謂之嫉妬反忠孝也吕氏春秋曰夫隂陽之和不長一類甘露時雨不私一物萬人之主不阿一人申子曰一婦擅夫衆婦皆亂一臣專君羣臣皆蔽故妬妻不難破家也而亂臣不難破國也是以明君使其臣並進輻輳莫得專君焉韓子曰儒者以文亂法俠者以武犯禁反文武也曹公曰恃武者滅恃文者亡夫差偃王是也吴子曰昔承桑氏之君修徳廢武以滅其國有扈之君恃衆好勇以䘮社稷明主鍳兹必哀内修文徳外治武訓故臨敵而不進無逮于恭僵尸而之無及于仁矣黔經曰文中多武可以輔主武中多文可以匡君文武兼備可任軍事文武兼闕不可征伐子路拯溺而受牛謝孔子孔子曰魯國必好救人于患也子貢贖人而不受金于府魯國之法贖人于他國者受金于府也孔子曰魯國不復贖人矣子路受而勸徳子貢讓而止善由此觀之亷有所在而不可公行反亷也匡衡云孔子曰能以禮讓為國乎何有朝廷者天下之楨幹也公卿大夫相與修禮㳟讓則人不爭好仁樂施則下不暴上義髙節則人興行寛柔恵和則衆相愛此四者明王之所以不嚴而化成也何者朝有變色之言則下有爭鬭之患上有自專之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有盜竊之人此其本也慎子曰忠未足以救亂代而適足以重非何以識其然耶曰父有良子而舜放瞽瞍桀有忠臣而過盈天下然則孝子不生慈父之義六親不和有孝慈而忠臣不生聖君之下國家昏亂有忠臣故明主之使其臣也忠不得過職而職不得過官反忠也京房論議與石顯有隙及京房被黜為魏郡太守憂懼上書曰臣弟子姚平謂臣曰房可謂小忠未可謂大忠何者昔秦時趙髙用事有正先者非刺髙而死髙威自此成秦之亂正先趣之今臣得出守郡唯陛下毋使臣當正先之死為姚平所笑由此而觀之夫正先之所謂忠乃促秦禍忠何益哉莊子曰將為胠篋探囊發匱之盜胠音起居反胠發也從旁開為胠為之守備則必攝緘縢攝結也固扁鐍音决細也此世俗之所謂智也然而巨盜至則負匱揭篋揭音其謁反擔囊而趨唯恐緘縢扃鐍之不固也然則向之所謂智者有不為盜積者乎反智也孫子曰小敵之堅大敵之擒也其所謂聖者有不為大盜守者乎何以知其然耶昔者齊國鄰邑相望鷄狗之音相聞􅘩罟之所布耒耨之所刺方二千餘里闔四境之内所以立宗廟社稷治邑屋州閭鄉里者曷嘗不法聖人哉然而田成子一朝殺齊君而盜其國所盜者豈獨其國耶并與聖智之法而盜之故田成有乎盜賊之名而身處堯舜之安小國不敢非大國不敢誅十二代而有齊國則是不獨竊齊國并與其聖智之法以守其盜賊之身乎反聖法也昔叔向問齊晏子曰齊其如何晏子曰此季世吾勿知齊其為陳氏矣公棄其人而歸于陳氏齊舊四量豆區釜鍾四升為豆各自其四以登于釡釜十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公收之山木如市弗加于山魚鹽蜃蛤弗加於海人參其力二於公而衣食其一公聚朽蠧而三老凍餒國之諸市屨賤踊貴人多疾病而或燠休之其愛之如父母歸之如流水欲無獲人將焉避之跖之徒問於跖曰盜亦有道乎跖曰何適其無有道耶夫妄意室中之藏聖也入先勇也出後義也知可否智也分均仁也五者不備而能成大盜者天下未之有也後漢末董卓入朝將簒位乃引用名士范曄論曰董卓以虓闞為情遭崩剥之勢故得蹈藉彛倫毁裂畿服夫以刳肝斮趾之性則羣生不足以厭其快然猶折意搢紳遲疑凌奪尚有盜竊之道焉由是觀之善人不得聖人之道不立盜跖不得聖人之道不行天下之善人少而不善人多則聖人之利天下也少而害天下也多矣反仁義也議曰昔仲由為郡宰季氏以五月起長溝當此之時子路以其私秩粟為漿飯以餉溝者孔子聞之使子貢徃覆其飯擊毁其噐子路曰夫子嫉由之為仁義乎孔子曰夫禮天子愛天下諸侯愛境内大夫愛官職士愛其家過其所愛是曰侵官漢武時河間獻王來朝造次必於仁義武帝色然難之謂曰湯以七十里文王以百里王其勉之王知其意歸即縱酒由是言之夫仁兼濟必有分乃可故尸子曰君臣父子上下長幼貴賤親踈皆得其分曰理愛得分曰仁施得分曰義慮得分曰智動得分曰適言得分曰信皆得其分而後為成人由是言之跖徒之仁義非其分矣由是言之夫仁義禮樂名法刑賞忠孝賢智之道文武明察之端無隠於人而常存於代非自昭於堯湯之時非故逃桀紂之朝用得其道則天下理用失其道而天下亂孫卿曰羿之法非亡也而羿不世出禹之法猶存也而夏不代王故法不能獨立得其人則存失其人則亡矣莊子曰宋人有善為不龜手之藥者代以洴澼絖為事客聞之請買其方百金客得之以説吴王越人有難吴王使之將冬與越人水戰大敗越人裂地而封能不龜手一也或以封或不免于洴澼絖則其所用之異故知制度者代非無也在用之而已是非第十四夫損益殊塗質文異政或尚權以經緯或敦道以鎮俗是故前志垂教今皆可以理違何以明之是曰大雅云既明且哲以保其身易曰天地之大徳曰生非曰語曰士見危授命又曰君子有殺身以成仁無求生以害仁是曰管子曰疑今者察之古不知來者視之往古語曰與死人同病者不可生也與亡國同行者不可存也非曰吕氏春秋曰夫人以食死者欲禁天下之食悖矣有以乗舟死者欲禁天下之船悖矣有以用兵喪其國者欲偃天下之兵悖矣杜恕曰夫奸臣賊子自古及今未嘗不有百嵗一人是為繼踵千里一人是為比肩而舉以為戒是猶一噎而禁人食也噎者雖少餓者必多是曰孔子曰惡訐惡以為直非曰管子曰惡隱惡以為仁者魏曹羲曰夫世人所謂掩惡揚善者君子之大義保明同好者朋友之至交斯言之作蓋閭閻之白談所以收愛憎之相謗非篤正之至理折中之公議也世士不料其數而係其言故善惡不分亂實由之朋友雷同敗必從焉談論以當實為情不以過難為貴相知以等分為交不以雷同為固是以達者存其義不察于文識其心不求於言是曰越絶書曰􅃷女不貞衒士不信非曰漢書曰大行不細謹大禮不讓辭是曰黄石公曰務廣地者荒務廣徳者强有其有者安貪人有者殘殘滅之政雖成必敗非曰司馬錯曰欲富國者務廣其地欲強兵者務富其人欲王者務博其徳三資者備而後王業随之是曰傳曰心茍無瑕何恤乎無家語曰禮義之不􅄽何恤乎人言非曰語曰積毁銷金積讒磨骨衆羽溺舟羣輕折軸是曰孔子曰君子不噐聖人智周萬物非曰列子曰天地無全功聖人無全能萬物無全用全備也故天職生覆地職載形聖職教化是曰孔子曰君子坦蕩蕩小人長戚戚非曰孔子曰晉重耳之霸心也生于曹衛越勾踐之有霸心也生於㑹稽故居下而無憂者則思不逺覆身而嘗逸者則志不廣是曰韓子曰古之人目短于自見故以鏡觀面智疑於自知故以道正已非曰老子曰反聽之謂聰内視之謂明自勝之謂强是曰唐且曰專諸懐錐刀而天下皆謂之勇西施被短褐而天下稱美非曰慎子曰毛嬙西施天下之至姣也衣之以皮具則見者皆走易之以𤣥緆則行者皆止由是觀之則𤣥緆色之助也姣者辭之則色厭矣是曰項梁曰先起者制服於人後起者受制於人軍志曰先人有奪人之心非曰史佚有言曰無始禍又曰始禍者死語曰不為禍始不為福先是曰慎子曰夫賢而屈于不肖者權輕也不肖而服于賢者位尊也堯為匹夫不能使其鄰家及至南面而王則令行禁止由此觀之賢不足以服物而勢位足以屈賢矣非曰賈子曰自古至今與民為仇者有遲有速耳而民必勝之矣故紂自謂天王也而桀自謂天父也已滅之後民亦罵之也以此觀之則位不足以為尊而號不足以為榮矣是曰漢景帝時轅固與黄生爭論於上前黄生曰湯武非受命乃殺也固曰不然夫桀紂荒亂天下之心皆歸湯武湯武與天下之心而誅桀紂桀紂之人弗為使而歸湯武湯武不得已而立非受命為何非曰黄生曰冠雖敝必加於首履雖新必貫于足何者上下之分也今桀紂雖失道然君上也湯武雖聖臣下也夫君有失行臣不正言匡過以尊天子反因過而誅之代立南面非殺而何是曰太公曰明罰則人畏懾人畏懾則變故出明賞則人不足人不足則怨長故明王之理人不知所好不知所惡非曰文子曰罰無度則戮而無威賞無度則費而無恩故諸葛亮曰威之以法法行則知恩限之以爵爵加則知榮是曰文子曰人之化上不從其言從其行也故人君好勇而國家多難人君好色而國家昏亂非曰秦王曰吾聞楚之鐵劒利而倡優拙夫鐵劒利則士勇倡優拙則思慮逺以逺思慮御勇士吾恐楚之圖秦也是曰墨子曰雖有賢君不愛無功之臣雖有慈父不愛無益之子非曰曹子建曰舍罪責功者明君之主也矜愚愛能者慈父之恩也三略曰含氣之類皆願得申其志是以明君賢臣屈己申人是曰傳曰人心不同其猶面也曹子建曰人各有好尚蘭􅊉蓀蕙之芳衆人所好而海畔有逐臭之夫咸池有六英之發而墨子有非之之論豈可同哉非曰語曰以心度心間不容針孔子曰其恕乎己所不欲勿施於人是曰管子曰倉廪實知禮節衣食足知榮辱非曰古語曰貴不與驕期而驕自至富不與侈期而侈自來是曰語曰忠無不報非曰左傳曰亂代則讒勝直是曰韓子曰凡人之大體取舍同則相是取舍異則相非也易曰同聲相應同氣相求水流濕火就燥雲從龍風從虎非曰易曰二女同居其志不同語曰一棲不兩雄一泉無二蛟又曰凡人情以同相妒故曰同美相妒同貴相害同利相忌是曰韓子曰釋法術而以心理堯舜不能正一國去規矩而忘善度奚仲不能成一輪使中主守法術拙匠執規矩而萬不失矣非曰淮南子曰夫矢之所以射逺貫堅者弓弩力也其所以中的剖微者人心也賞善罰暴者政令也其所以行者精誠也故弩雖强不能獨中令雖明不能獨行杜恕曰世有亂人而無亂法若使法可專任則唐虞不須稷契之佐殷周無貴伊吕之輔矣是曰慮不先定不可以應卒兵不先辦不可以應敵左傳曰豫備不虞古之善政非曰左傳曰士蒍謂晉侯曰臣聞之無䘮而戚憂必讐焉無戎而城讐必保焉春秋外傳曰周景王將鑄錢單穆公曰不可古者天灾降戾于是乎量資幣權輕重以振救人夫備預有未至而設之脩國備也預備不虞安不忘危有至而後救之若救火療疾量資幣之屬是不相入也二者先後各有宜不相入可先而不備謂之怠怠緩也可後而先之謂之召災謂人未有患輕而重之離離人召匱財是以召災也周固羸國也天未厭禍焉而又離人以佐災無乃不可乎是曰左傳曰古人有言一日縱敵數世之患也非曰晉楚遇于鄢范文子不欲戰曰吾先君之亟戰也有故秦狄齊楚皆强不盡力子孫將弱今三强服矣齊秦狄敵楚而已唯聖人能内外無患自非聖人外寧必有内憂驕而亢則憂患生盍釋楚以為外懼乎是曰三略曰無使仁者主財為其多恩施而附于下非曰陶朱公中男殺人囚於楚朱公欲使其少子裝黄金千鎰徃視之其長男固請乃使行楚殺其弟朱公曰吾固知必殺其弟是長與我俱見苦為生之難故重其財如少弟生見我富乗堅驅良逐狡豈知其財所從來固輕棄之今長者果殺其弟事理然也無足悲是曰語曰祿薄者不可與入亂賞輕者不可與入難慎子曰先王見不受禄者不臣禄不厚者不與入難非曰田單將攻狄見魯仲子仲子曰將軍攻狄弗能下也何者昔將軍之在即墨坐而織蕢立而杖挿為士卒倡此所以破燕今將軍東有掖邑之奉西有蕢上之娱黄金横帶而馳乎淄澠之間有生之樂無死之心所以不勝也後果然是曰語曰貧賤之交不可忘糟糠之妻不下堂非曰語曰交接廣而信衰于友爵禄厚而忠衰于君是曰春秋後語曰楚春申君使孫子為宰客有説春申君曰湯以亳武王以鎬皆不過百里以有天下今孫子賢人也而君藉之百里之勢臣竊為君危之春申君曰善於是使人謝孫子孫子去之趙趙以為上卿非曰客又説春申君曰昔伊尹去夏入殷殷王而夏亡管仲去魯入齊魯弱而齊强夫賢者之所在其君未嘗不尊其國未嘗不榮也今孫子賢人也君何為辭之春申君又曰善復使人請孫子是曰韓宣王謂摎留曰吾兩欲用公仲公叔其可乎對曰不可晉用六卿而國分簡公用田成闞止而簡公弑魏兩用犀首張儀而西河之外亡今王兩用之其多力者内樹其黨其力寡者又藉于外權羣臣或内樹其黨以擅主命或外為勢交以裂其地則王之國危矣又曰公孫衍為魏將與其相田儒不善季文子為衍説魏王曰王獨不見夫服牛驂驥乎不可百歩今王以衍為可使將固用之也而聽相之計是服牛驂驥之道牛馬俱死而不成其功則王之國傷矣願王察之非曰傅子曰天地至神不能同道而生萬物聖人至明不能一撿而治百姓故以異致同者天地之道也因物致宜者聖人之治也既得其道雖有相害之物不傷乎治體矣水火之性相滅也善用之者陳鼎釜乎其間㸑之煮之而能兩盡其用不相害也天下之物為水火者靈矣何憂乎相害何患乎不盡其用耶易曰天地睽而其事同也男女睽而其志通也萬物睽而其事類也是曰陳登為吕布説曹公曰養吕布譬如養虎常須飽其肉不飽則噬人非曰曹公曰不似卿言譬如養鷹饑則為人用飽則颺去是曰劉備來奔曹公曹公以之為豫州牧或謂曹公曰備有雄志今不早圖後必為患曹公以問郭嘉嘉曰有是然公提劍起義兵為百姓除暴推誠仗信以召儁傑猶懼其未來也今備有英雄之名以窮歸已而害之以害賢為名則智士將自疑迴心擇主公誰與定天下者夫除一人之患以阻四海之望安危之機不可不察曹公曰善非曰傅子稱郭嘉言於太祖曰備有雄志而甚得衆心闗侯張飛皆萬人之敵也為之死用以嘉觀之其謀未可測也古人有言曰一日縱敵數世之患宜早為之所曹公方招懐英雄以明大信未得從嘉謀是曰家語曰子路問孔子曰請釋古之道而行由之意可乎子曰不可也昔東夷慕諸夏之禮有女而寡為内私壻終身不嫁不嫁則不嫁矣然非貞節之義矣倉吾嬈音奴鳥反取妻而美讓與其兄讓則讓矣然非禮讓之讓也今子欲捨古之道而行子之意庸知子意以非為是乎語曰變古亂常不死則亡書云事弗師古以克永代匪説攸聞非曰趙武靈王欲胡服公子成不悦靈王曰夫服者所以使國禮者所以使事聖人觀鄉而順宜因事而制禮所以利其人而厚其國夫剪髮文身錯臂左袵臨越之人也黒齒雕題鯷冠秫縫大吳之國也故禮服莫同而其便一也鄉異而用變事異而禮易是以聖人謀可以利其國不一其用謀可以便其禮不法其故儒者一師而俗異中國同禮而離教况於山谷之便乎故去就之變智者不能一逺邇之服賢聖莫能同窮鄉多異俗曲學多殊辯今叔父之言俗也吾之所言以制俗也叔父惡變服之名以忘效事之實非寡人之所望也公子成遂胡服是曰移風易俗莫善於樂非曰孟子曰天道因則大化則細因也者因人之情也是曰李尋曰夫以喜怒賞誅而不顧時禁雖有堯舜之心猶不能致和平善言古者必有效於今善言天者必有徵於人設上農夫欲今冬田雖肉袒深耕汗出種之猶不生者非人心不至天時不得也易曰時止則止時行則行動靜不失於時其道光明書曰敬授人時故古之王者尊天地重隂陽敬四時月令順之以善政則和氣可立致猶枹鼓之相應也非曰太公謂武王曰天無益于兵勝而衆將所居者九自法令不行而任侵誅無徳厚而用日月之數不順敵之强弱而幸于天無智慮而候氛氣少勇力而望天福不知地形而歸過於時敵人怯弱不敢擊而信龜䇿士卒不勇而法鬼神設伏不巧而任背向之道凡天地鬼神視之不見聽之不聞不可以决勝敗故明將不法司馬遷曰隂陽之家使人拘而多忌范􅓮曰隂陽之道其弊也巫是曰翼奉曰治道之要在知下之邪正人誠向正雖愚為用若其懐邪智益為害非曰夫人主莫不愛己也莫知己者不足愛也故桓子曰捕猛獸者不令美人舉手釣巨魚者不使稚子輕預非不親也力不堪也奈何萬乗之主而不擇人哉故曰夫犬之為猛有非則鳴吠而不遑于夙夜此自効之至也昔宋人有沽酒者酒酸而不售何也以有猛犬之故夫犬知愛其主而不能為其主慮酒酸之患者智不足也是曰語曰巧詐不如拙誠非曰晉惠帝為太子和嶠諌武帝曰季世多偽而太子尚信非四海之主憂不了陛下家事武帝不從後恵帝果敗是曰左傳曰孔子嘆子産曰言以足志文以足言不言誰知其志言之無文行而不逺晉為伯鄭入陳非文辭而不為功慎辭也哉論語曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為非曰漢文帝登虎圏美嗇夫口辯拜為上林令張釋之前曰陛下以絳侯周勃何如人也上曰長者又問曰東陽侯張相如何如人也上復曰長者釋之曰此兩人言事曽不能出口豈效此嗇夫喋喋利口㨗給哉且秦以任刀筆之吏爭以亟疾苛察相髙然其弊徒文具耳亡惻隠之實以故不聞其過陵遲至于二世天下土崩今陛下以嗇夫口辯而超遷之臣恐天下随風而靡爭口辯無其實且下之化上疾於影響舉錯之間不可不審帝乃止是曰太史公曰春秋推見至隱易本隱以之顯大雅言王公大人而徳逮黎庶小雅譏小已之得失其流及上所言雖殊其合徳一也相如雖虛辭濫説然其要歸引之節儉此與詩之諷諌何異非曰揚雄以為賦者將以諷也必推類而言極靡麗之辭閎侈鉅衍競於使人不能加也既乃歸之于正然覽已過矣往時武帝好神仙相如上大人賦以諷帝帝反漂漂有凌雲之志由是言之賦勸而不止明矣又頗類俳優非法度所存賢人君子詩賦之正也是曰淮南子曰東海之魚名鰈音土盍反與床榻字同比目而行北方有獸名曰婁更食更候南方有鳥名曰鶼音兼比翼而飛夫鳥獸魚鰈猶知假力而况萬乗之主乎獨不知假天下之英雄俊士與之為伍豈不痛哉非曰狐卷子曰父賢不過堯而丹朱放兄賢不過周公而管蔡誅臣賢不過湯武而桀紂伐况君之欲治亦須從身始人何可恃乎是曰孔子曰不患無位患已不立非曰孔子厄於陳蔡子路愠見曰昔聞諸夫子積善者天報以福今夫子積義懐仁乆矣奚居之窮也子曰由未之識也吾語汝以仁者為必信耶則伯夷叔齊為不餓首陽汝以智者為必用耶則王子比干不見剖心汝以忠者為必報耶則闗龍逢不見刑汝以諌者為必聽耶則伍子胥不見殺夫遇不遇者時也賢不肖者才也君子博學深謀而不遇時者衆矣何獨丘哉是曰神農形悴唐堯瘦臞舜黎黒禹胼胝伊尹負鼎而干湯吕望鼓刀而入周墨翟無黔突孔子無煖席非以貪禄位將欲起天下之利除萬人之害非曰李斯以書對秦二世云申子曰有天下者而不恣睢命之曰以天下桎若堯舜然故謂之桎也夫以人狥己則己貴而人賤以己狥人則己賤而人貴故狥人者賤而所狥者貴自古及今未有不然夫堯禹以身狥天下謂之桎者不亦宜乎是曰論語曰舉逸民天下之人歸心焉魏文侯受藝子子夏敬叚干木過其廬未嘗不式於是秦欲伐魏或曰魏君賢國人稱仁上下和洽未可圖也秦王乃止由此得譽於諸侯非曰韓子曰夫馬似鹿此馬值千金今有千金之馬而無一金之鹿者何也馬為人用而鹿不為人用今處士不為人用鹿類也所以太公至齊而斬華士孔子為司冦而誅少正卯趙主父使李疵視中山可攻否還報曰可攻也其君好見巖穴之士布衣之人主父曰如子之言是賢君也安可攻李疵曰不然夫上尊巖穴之士則戰士殆上尊學者則農夫惰農夫惰則國貧戰士怠則兵弱兵弱于外國貧于内不亡何待主父曰善遂滅中山是曰漢書曰陳平云吾多隂謀道家所禁吾世即廢亡已矣終不能復起以吾多隂禍也其後𤣥孫坐酎金失侯非曰後漢范曄論耿弇曰三代為將道家所忌而耿氏累葉以功名自終將其用兵欲以殺止殺乎何其獨能崇也是曰易曰崇髙莫大於富貴又曰聖人之大寳曰位非曰孫子為書謝春申君曰鄙諺曰厲人憐王此不恭之言也雖然古無虛謬不可不審察也此為刼殺死亡之生言也夫人主牟少而矜材無法術以知奸則大臣主斷圖私以禁誅於己也故殺賢長而立幼弱廢正嫡而立不義春秋戒之曰楚王子圉聘於鄭未出境聞王病反問病遂以冠纓絞王殺之因自立也齊崔杼之妻美莊公通之崔抒率其黨而攻莊公莊公走出踰於外墻射中其股遂殺之而立其弟近代李兊用趙餓主父于沙丘百日而殺之淖齒用齊擢閔王之筋懸于廟梁宿昔而死夫厲雖腫胞之疾上比前代未至絞纓射股也下比近代未至擢筋餓死也夫刼殺死亡之主心之憂勞形之困苦必甚於厲矣由此觀之厲雖憐王可也是曰易曰備物致用立成噐以為天下利者莫大于聖人非曰莊子曰聖人不死大盜不止雖重聖人而治天下則是重利盜跖也為之㪷斛以量之則并與㪷斛而竊之為之權衡以稱之則并與權衡而竊之為之符璽以信之則并與符璽而竊之為之仁義以教之則并與仁義而竊之何以知其然耶彼竊鈎者誅竊國者為諸侯諸侯之門而仁義存焉則是非竊仁義聖智耶故逐于大盜揭諸侯竊仁義并㪷斛權衡符璽之利雖有軒冕之賞弗能勸斧鉞之威弗能禁此重利盜跖而使不可禁者是乃聖人之過也故曰國之利噐不可以示人彼聖人者天下之利噐也非所以明天下也是曰論語曰君子固窮小人窮斯濫矣非曰易曰窮則變通則乆是以自天祐之吉無不利太史公曰鄙人有言何知仁義以饗其利者為有徳故伯夷醜周餓死首陽山而文武不以其故貶王跖蹻暴戻其徒誦義無窮由此觀之竊鈎者誅竊國者為諸侯諸侯之門仁義存焉非虚言也今拘學或抱咫尺之義乆孤於代豈若卑論儕俗與代沉浮而取榮名哉是曰東平王蒼曰為善最樂非曰語曰時不與善己獨由之故曰非妖則妄是曰龎統好人倫勤於長養毎所稱述多過於才時人怪而問之統曰當今天下大亂正道凌遲善人少而惡人多方欲興風俗長道業不美其談則聲名不足慕也不足慕企而為善少矣今㧞十失五猶得其半而可以崇邁代教使有志者自勵不亦可乎非曰人物志曰君子知自損之為益故功一而美二小人不知自益之為損故伐一而並失由此觀之則不伐者伐之也不爭者爭之也讓敵者勝之也是故卻至上人而抑下滋甚王叔好爭而終於出奔藺相如以迴車取勝於亷頗冦恂以不鬬取賢于賈復物勢之反乃君子所謂道也是曰孝經曰居家理治可移于官非曰酈生落魄無以為衣食業陳蕃云大丈夫當掃天下誰能掃一室是曰公孫𢎞曰力行近乎仁好問近乎智知恥近乎勇知此三者知所自理知所以自理然後知所以理人天下未有不能自理而能理人者也此百代不易之道非曰淮南子曰夫審於毫釐之計者必遺天下之數不失小物之選者或于大事之舉今人才有欲平九州存危國而乃責之以閨閤之禮修鄉曲之俗是猶以斧翦毛以刀伐木皆失其宜矣是曰商鞅謂趙良曰子之觀我理秦孰與五羖大夫賢乎趙良曰夫五羖大夫荆之鄙人也聞繆公之賢而願望見行而無資自鬻于秦客被褐飯牛繆公知之舉之牛口之下而加之百姓之上秦國莫敢望焉今君之見秦也因嬖人景監以為主非所以為名也非曰史記曰藺相如因宦者繆賢見趙王又曰鄒衍作談天論其語閎大不經然王公大人尊禮之適梁梁恵王郊迎執賓主之禮如燕昭王擁篲先驅豈與仲尼菜色陳蔡孟軻困于齊梁同乎哉衛靈公問陳於孔子孔子不答梁恵王謀攻趙孟軻稱太王去邠持方枘欲納圜鑿其能入乎或曰伊尹負鼎而輔湯以王百里奚飯牛繆公用霸作先合然後引之大道鄒衍其言雖不軌亦將有牛鼎之意乎是曰陳仲舉體氣髙烈有王臣之節李元禮忠平正直有社稷之能陳留蔡伯喈以仲舉强於犯上元禮長於接下犯上為難接下為易宜先仲舉而後元禮非曰姚信云夫臯陶戒舜犯上之徵也舜理百揆接下之效也故陳平為王陵言面折庭諍我不如公至安劉氏公不如我若犯上為優是王陵當髙於良平朱雲當勝於吳鄧乎是曰史記曰韓子稱儒者以文亂法而俠士以武犯禁二者皆譏而學士多稱於世至如以術取宰相卿大夫輔翼其世主固無可言者及若季次原憲季次孔子弟子未嘗仕孔子稱之讀書懐獨行議不茍合當世當世亦笑之今遊俠其行雖不軌於正義然其言必信其行必果已諾必誠不愛其軀赴士之阨困羞伐其徳蓋亦有足多者且緩急人之所時有也虞舜窘於井廩伊尹負于鼎爼傅説匿于傅巖吕尚困於棘津夷吾桎梏百里奚飯牛仲尼厄匡菜色陳蔡此皆學士所謂有道仁人也猶遭此葘况以中材而涉近代之末流乎其遇害何可勝道哉而布衣之徒設取予然諾千里誦義故士窮窘而得委命此豈非人之所謂賢豪者耶誠使鄉曲之俠與季次原憲比權量力效功于當代不同日而論矣曷足小哉非曰漢書曰天子建國諸侯立家自卿大夫以至庻人各有等差是以人服事其上而下無覬覦孔子曰天子有道政不在大夫百官有司奉法承令以修所職越職有誅侵官有罰然故上下相順而庻事理焉周至既微禮樂征伐出自諸侯桓文之後大夫世權陪臣執命陵夷至於戰國合縱連横力政爭强由是列國公子魏有信陵趙有平原齊有孟嘗楚有春申皆藉王公之勢競為遊俠雞鳴狗盜無不賓禮而趙相虞卿棄國捐君以固窮交魏齊之厄信陵無忌竊符矯命殺將專師以赴平原之急皆以取重諸侯彰名天下搤腕而遊談者以四豪為稱首於是背公死黨之議成守職奉上之義廢矣及至漢興禁網踈濶未之匡改也魏其武安之屬競逐於京師郭觧劇孟之徒馳鶩於閭閻權行州域力折公侯衆庻榮其名跡覬而慕之雖陷刑辟自與殺身成名若季路仇牧死而不悔也曽子曰上失其道民散乆矣非明王在上示之好惡齊之以禮法人曷由知禁而反正乎古之正法五伯三王之罪人也而六國五伯之罪人也夫四豪者六國之罪人也况於郭解之倫以匹夫之細微竊殺生之權其罪也不容於誅矣是曰尸子曰人臣者以進賢為功人主者以用賢為功也史記曰鮑叔舉管仲天下不多管仲之賢而多鮑叔之能知人也非曰蘇建常責大將軍青曰至尊重而天下之賢士大夫無稱焉願觀古今名將所招選擇賢者大將軍謝曰自魏其武安之厚賓客天子嘗切齒彼親附士大夫招賢黜不肖者人主之柄也人臣奉法遵職而已何與招士其為將如此議曰此一是一非皆經史自相違者班固云昔王道既微諸侯力政時君世主好惡殊方是以諸家之術蜂起並作各引一端崇其所善以此馳説取令諸侯其言雖殊譬猶火水相滅亦能相生也仁之與義敬之與和事雖相反而皆相成也易曰天下同歸而殊塗一致而百慮此之謂也適變第十五昔先王當時而立法度臨務而制事法宜其時則理事適其務故有功今時移而法不變務易而事以古是則法與時詭而事與務易是以法立而時益亂務無而事益廢此聖人之理國也不法古不修今當時而立功在難而能免秦孝公用衛鞅鞅欲變法孝公恐天下議己疑之衛鞅曰疑行無名疑事無功夫有髙人之行者固見非于世有獨智之慮者必見敖于人愚者闇於成事智者見于未萌人不可與慮始而可與樂成論至徳者不和於俗成大功者不謀於衆是以聖人茍可以强國不法其故茍可以利人不循其禮孝公曰善甘龍曰不然聖人不易人而教智者不變法而治因人而教不勞而功成縁法而理吏習而人安衛鞅曰龍之所言世俗之言常人安於習俗學者溺于所聞以此兩者居官守法可也非所以與論于法之外也三代不同禮而王五覇不同法而覇智者作法愚者制焉賢者更禮不肖者拘焉杜贄曰利不百不變法功不十不易噐法古無過修禮無邪衛鞅又曰治代不一道便國不法故故湯武不循古而王夏殷不易禮而亡反古者不可非而循禮者不足多孝公曰善遂變法也由是言之故知若人者各因其時而建功立徳焉孟子曰雖有鎡基不如遇時雖有智慧不如逢代范蠡曰時不至不可强生事不究不可强成語曰聖人修備以待時也何以知其然耶桓子曰三皇以道治五帝用徳化三王由仁義五伯用權智説曰無制令刑罰謂之皇有制令無刑罰謂之帝賞善誅惡朝諸侯朝事謂之王興兵衆立約盟以信義矯代謂之伯文子曰帝者貴其徳也王者尚其義也覇者廹於理也道狹然後任智徳薄然後任刑明淺然後任察議曰夫建國立功其政不同也如此五帝以上乆逺經𫝊無事唯王霸二盛之美以定古今之理焉秦漢居帝王之位所行者霸事也故以為徳之次夫王道之治先除人害而足其衣食論曰五畆之宅樹之以桑匹婦蠺之年五十者可以衣帛矣百畆之田數口之家耕稼修理可以無饑矣雞豚狗彘之畜不失其時老者可以食肉矣夫上無貪欲之求下無奢淫之人藉稅省少而徭役不繁其仕者食祿而已不與人争利焉是以産業均而貧富不能相懸也然後教以禮儀故明王審已正統慎乃在位宫室輿服不踰禮制九女正序于内三公分職于外制井田以齊之設諸侯以牧之使饒不溢侈少不匱乏然後申以辟雍之化示以揖讓之容是以和氣四塞禍亂不生此聖王之教也而威以刑誅使知好惡去就虞帝先命禹平水土后稷播植百榖契班五教臯陶修刑故天下太平也是故大化四凑天下安樂此王者之術王者父天母地調和隂陽順四時而理五行養黎元而育羣生故王之為言徃也蓋言其惠澤優游善養潤天下天下歸徃之故曰王也霸功之大者尊君卑臣權統由一政不二門賞罰必信法令著明百官修理威令必行夫霸君亦為人除難興利以富國强兵或承衰亂之後或興兵征伐皆未得遵法度申文理度代而制因時施宜以從便善之計而務在於立功也此霸者之術王道純而任徳霸道駮而任法此優劣之差也道徳經曰我無為而人自化文子曰所謂無為者非謂引之不來推之不往謂其循理而舉事因資而立功推自然之勢也故曰智而好問者聖勇而好問者勝乗衆人之智即無不任也用衆人之力即無不勝也故聖人舉事未甞不因其資而用也故曰湯武聖主也而不能與越人乗舲舟泛江湖伊尹賢相也而不能與胡人騎原馬服騊駼孔墨博通也而不能與山居者入榛薄出險阻由是觀之人智於物淺矣而欲以炤海内存萬物不因道理之數而専己之能則其窮不逺故智不足以為理勇不足以為強明矣然而君人者在廟堂之上而知四海之外者因物以識物因人以知人也吕氏春秋曰是天無形而萬物以成大聖無事而千官盡能此謂不教之教無言之詔也夫冬日之陽夏日之隂萬物歸之而莫之使至精之感弗召自來待目而昭見待言而使令其於理難矣文子曰三月嬰兒未知利害而慈母之憂喻焉者情也故曰言之用者小不言之用者大又曰不言而信不施而仁不怒而威是以天心動化者也施而仁言而信怒而威是以精誠為之者也施而不仁言而不信怒而不威是以外貌為之也臯陶喑而為大理天下無虐刑師曠瞽而為太宰晉國無亂政莊子曰天地有大美而不言四時有明法而不議萬物有成理而不説聖人無為大聖不作觀于天地之謂也不言之令不視之見聖人所以為師此黄老之術也文子曰聖人所由曰道所為曰事道猶金石一調不可更事猶琴瑟毎調終而改調故法制禮樂者理之具也非所以為理也昔曹參相齊其治要用黄老術齊國安集及代蕭何為漢相參去屬其後相曰以齊獄市為寄獄慎勿少擾也後相曰治無大於此者乎參曰不然夫市者所以并容也今君擾之奸人安所容乎吾是以先之由是觀之秦人極刑而天下叛孝武峻法而獄繁此其弊也經曰我無為而人自化我好静而人自正參欲以道化其本不欲擾其末也太史公曰參為漢相清靜寡欲言合道義然百姓離秦之酷擾參與休息無為故天下俱稱其美矣議曰黄老之風蓋帝道也孔子閒居謂曽參曰昔者明王内修七教外行三至七教修而可以守三至行而可以征明王之守也則必折衝千里之外其征也還師袵席之上曽子曰敢問七教孔子曰上敬老則下益孝上敬齒則下益悌上樂施則下益亮上親賢則下擇交上好徳則下無隠上惡貪則下恥爭上亷讓則下知節此之謂七教也七教者治之本也教定則本正矣凡上者人之表也表正則何物不正也昔明王之治人也必裂土而封之分屬而理之使有司月省而時考之進賢退不肖然則賢良者悦不肖者懼矣哀鰥寡養孤獨恤貧窮誘孝弟選才能此七者修則四海之内無刑人矣上之親下也如腹心則下之親上也如幼子之於慈母矣其於信也如四時而人信之也如寒暑之必騐故視逺若邇非道邇也見明徳也是以兵革不動而威用利不施而親此之謂明王之守折衝千里之外者也議云昔管子謂齊桓公曰君欲霸舉大事則必從其本矣夫齊國百姓公之本也人甚憂饑而稅斂重人甚懼死而刑政險人甚傷勞而上舉事不時公輕其稅緩其刑舉事以時則人安矣此謂修本而霸王也曽子曰何謂三至孔子曰至禮不讓而天下理至賞不費而天下之士悦至樂無聲而天下之人和何則昔者明王必盡知天下良士之名既知其名又知其實既知其實然後因天下之爵以尊之此謂至禮不讓而天下治因天下之禄以富天下之士此之謂至賞不費而天下之士悦如此則天下之明譽興焉此謂之至樂無聲而天下之人和故曰所謂天下之至仁者能合天下之至親所謂天下之至智者能用天下之至和所謂天下之至明者能舉天下之至賢也故仁者莫大於愛人智者莫大於知賢政者莫大於能官有徳之君脩此三者則四海之内供命而已矣此之謂折衝千里之外夫明王之征必以道之所廢誅其君改其政弔其人而不奪其財矣故曰明王之征猶時雨之降至則悦矣此之謂還師袵席之上言安而無憂也故揚雄曰六經之理貴于未亂兵家之勝貴於未戰此孔氏之術也議曰孔氏之訓務徳行義蓋王道也墨子曰古之人未知為宫室就陵阜而居穴而處故聖王作為宫室為宫室之法髙足以避潤濕邉足以圉風寒宫墻之髙足以别男女之禮謹此則止不以為觀樂也故天下之人財用可得而足也當今之王為宫室則與此異矣必厚斂於百姓以為宫室臺榭曲直之望青黄刻鏤之餙為宫室若此故左右皆法而象之是以其財不足以待凶饑振孤寡故國貧而難理也為宫室不可不節議曰此節宫室者古之人未知為衣服時衣皮帶茭冬則不輕而煖夏則不輕而凊聖王以為不中人之情故聖人作誨婦人以為人衣為衣服之法冬則練帛足以為輕煖夏則絺綌足以為輕凊謹此則止非以榮耳目觀於人也是以其人用儉約而易治其君用財節而易贍也當今之王其為衣服則與此異矣必厚斂於百姓以為文彩靡曼之衣鑄金以為鈎珠玉以為佩由此觀之其為衣服非為身體皆為觀好也是以其人淫僻而難治其君奢侈而難諌夫以奢侈之君御淫僻之人欲國無亂不可得也為衣服不可不節議曰此節衣服也此墨翟之術也議曰墨家之議去奢節用蓋强本道商子曰法令者人之命也為治之本慎子曰君人者捨法而以身治則受賞者雖當望多無窮受罰者雖當望輕無已君捨法而以心裁輕重怨之所由生也是以分馬者之用䇿分田者之用鈎非以鈎䇿為過人之智也所以去私塞怨也故曰夫君任法而不躬為則怨不生而上下和也一兎走百人逐之非以兔可分為百由名分之未定也賣滿市盜不敢取者由名分之定也故名分未定雖堯舜禹湯且皆加務而逐之名分已定則貧盜不敢取故堯舜聖人之為法令也置官也置吏也所以定分也尸子曰夫使衆者詔作則遲分地則速是何也無所逃其罪也言亦有地不可不分君臣同地則臣有所逃其罪矣故陳繩則木之枉者有罪審名分則群臣之不審者有罪矣名分定則大詐貞信巨盜原慤而各自治也尹文子曰名定則物不競分明則私不行物不競非無心由名定故無所措其心私不行非無欲由分明故無所措其欲然則心欲人人有之而得同于無心無欲者在制之有道故也申子曰君如身臣如手君設其本臣操其末為人君者操契以責其名名者天地之綱聖人之符張天地之綱用聖人之符則萬物無所逃矣議曰韓子曰人主者非目若離朱乃為明也耳若師曠乃為聰也不任其數而待目以為明所見者少矣非不蔽之術也不因其勢而待耳以為聰所聞者寡矣非不欺之道也明主者使天下不得不為己視使天下不得不為己聽身居深宫之中明燭四海之内而天下不能蔽不能欺者何也匿罪之罰重而告奸之賞厚也孫卿曰明職分序事業材伎官能莫不治理如是則厚徳者進亷節者起兼聽齊明而百事無留故天子不視而見不聽而聞不慮而知不動而功塊然獨坐而天下從之此操契以責名者也尸子曰明君之立其貌莊其心虛其視不躁其聽不淫審分應辭以立于朝則隠匿疏逺雖有非焉必不多矣明君不長耳目不行間諜不強聞見形至而觀聲至而聽事至而應近者不過則逺者理矣明者不失則微者敬矣此萬物無所逃也動者揺靜者安名自名也事自定也議曰尸子曰治水潦者禹也播五榖者后稷也聽訟折􅇆者臯陶也舜無為也而為天下父母此則名自名也太公謂文王曰天有常形人有常生與天人共其生者而天下靜矣此則事自定也是以有道者因名而正之随事而定之尹文子曰因賢者之有用使不得不用因愚者之無用使不得用用與不用各得其用奚患物之亂也尸子曰聽朝之道使人有分有大善者必問其孰進之有大過者必問其孰任之而行罰賞焉且以觀賢不肖也明分則不弊正名則不虛賢則貴之不肖則賤之賢不肖忠不忠以道觀之猶白黑也昔者堯之治天下也以名其名正則天下治桀之治天下也亦以名其名倚而天下亂是以聖人貴名之正也議曰夫闇主以非賢為賢不忠為忠非法為法以名之不正也李斯書曰韓子稱慈母有敗子而嚴家無格虜者何也則罰之加焉必也故商君之法刑棄灰於道者夫棄灰薄罪也而被刑重罰也夫輕罪且督而况有重罪乎故人弗敢犯矣今不務所以不犯而事慈母之所以敗子則亦不察於聖人之論矣商君之法皆令為什伍而相司牧犯禁相連于不告奸者明尊卑爵秩等級各以差次田宅妻妾衣服以家次有功者顯榮無功者雖富無芬華務於耕戰此商君之法也此商鞅申韓之術也桓範曰夫商鞅申韓之徒貴尚譎詐務行苛尅廢禮義之教任刑名之數不師古始敗俗傷化此則伊尹周召之罪人也然其尊君卑臣富國强兵守法持術有可取焉逮至漢興有寗成郅都之輩放商韓之治専以殺伐殘暴為能順人主之意希㫖之行要時趨利敢行敗禍此又商韓之罪人也然其抑强族撫孤弱清已禁奸背私立公亦有取焉至於晩代之所謂能者乃犯公家之法赴私門之勢廢百姓之務趨人間之事决煩理務臨時茍辯使官無譴負之累不省下人之寃復是申韓寗郅之罪人也由是觀之故知治天下者有王霸焉有黄老焉有孔墨焉有申商焉此其所以異也雖經緯殊制救弊不同然康濟群生皆有以矣今議者或引長代之法詰救弊之言議曰救弊為夏人尚忠殷人尚敬周人尚文者或引帝王之風譏霸者之政不論時變而務以飾説故是非之論紛然作矣言偽而辯順非而澤此罪人也故君子禁之正論第十六議曰反經是非適變三篇雖博辯利害然其弊流遁漫羡無所歸故作正論以質之孔子曰六藝於治一也禮以節人樂以發和書以導事詩以達意易以神化春秋以義司馬談曰易著天地隂陽四時五行故長於變禮經紀人倫故長於行書記先王之事故長於政詩記山川谿谷禽獸草木牝牡雌雄故長於風樂所以立故長於和春秋是非故長於理人也故曰入其國其教可知也其為人也温柔敦厚詩教也疏通知逺書教也廣博易良樂教也潔浄精微易教也恭儉莊敬禮教也屬辭比事春秋教也故詩之失愚書之失誣樂之失奢易之失賊禮之失煩春秋之失亂其為人也温柔敦厚而不愚則深於詩也子夏曰聲成文謂之音治世之音安以樂其政和亂世失之音怨以怒其政乖亡國之音哀以思其民困故正得動天地感鬼神莫近于詩太史公曰大雅言王公大人其合而徳逮黎庶小雅譏小己之得失其流及上所言雖殊徳一也晉時王政陵遲南陽魯褒著錢神論吴郡蔡洪作孤憤前史以為亂世之音怨以怒其政乖此之謂也疏通知逺而不誣則深於書也書著帝王之道典謨訓誥誓命之文三千之徒並受其義也廣博易良而不奢則深於樂也樂書曰凡音者生人心者也情動其中故形于聲聲成文謂之音是故治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困聲音之道與政相通宫為君商為臣角矣宫亂為民徵為事羽為物五者不亂則無惉懘之音則荒其君驕商亂則陂其臣壊角亂則憂其人怨徵亂則哀其事勤羽亂則危其財匱五者皆亂則誣供相陵謂之慢如此國滅亡無日矣夫上古明王舉樂者非以動娱心快意所以動盪血脉流通精神而和正心也故宫脾而和正聖商動肺而和正義角動肝而和正仁徵動心而和正智羽動腎而和正禮故聞宫音者使人温舒而廣大聞商音者使人方正而好義聞角音者使人惻隠而愛人聞徵音者使人樂善而好施聞羽音者使人整齊而好禮夫禮由外入樂自内出故聖王使人耳聞雅頌之音目視威儀之禮足行恭敬之容口言仁義之道故君子終日言而邪僻無由入也班固曰樂者聖人之所樂也而可以善人心其感人也深故先王著其教焉夫人有血氣心知之性而無哀樂喜怒之常應感而動然後心術形焉故纎微憔悴之音作而民思憂闡諧慢易之音作而民康樂麤厲猛奮之音作而民剛毅亷直正誠之音作而民肅敬寛裕順和之音作而民慈愛流僻邪散之音作而民淫亂先王恥其亂也故制雅頌之聲本之情性稽之度數制之禮義合生氣之和導五常之行使之陽而不散隂而不集剛氣不怒柔氣不懾四暢交於中而發作於外足以感人之善心而不使邪氣得接焉是先王立樂之方也吕氏春秋曰亡國戮人非無樂也其樂不樂溺者非不笑也罪人非不歌也狂者非不舞也亂世之樂有似于此范曄曰夫鐘鼓非樂之本而噐不可去三牲非孝之主而養不可廢夫存噐而亡本樂之失也調氣而和聲樂之盛也崇養以傷行孝之累也行孝以致養李之大也議曰東方角主仁南方徵主禮中央宫主信西方商主義北方羽主智此常理也今太史公以為徵動心而和正智羽動腎而和正禮則以徵主智羽主禮與舊例乖殊故非末學所能詳也潔淨精微而不賊則深於易也易之精微愛惡相攻逺近相取則不能容人近相害之恭儉莊敬而不煩則深於禮也太史公曰余至大行禮官觀三代損益乃知縁人情而制禮依人性而作儀人道經緯萬端規矩無不貫誘進以仁義束縛以刑罰故徳厚者位尊禄重者寵榮所以總一海内而整齊萬人也人體安駕乗為之金輿􅀈衡以繁其飾目好五色為之黼黻文章以表其能耳樂鐘磬為之調諧八音以蕩其心口甘五味為之庻羞酸鹹以致其美情好珍善為之琢磨珪璧以通其意故大路越席皮弁布裳朱絃洞越大羮𤣥酒所以防其淫佚救其彫敝是以君臣朝庭尊卑貴賤之序下及黎庻車輿衣服宫室飲食嫁娶䘮祭之分事有適宜物有節文周衰禮廢樂壊大小相踰管仲之家遂偹三歸循法守正者見侮于世奢溢僣差者謂之顯榮自子夏門人之髙弟也猶云出見紛華盛麗而悦入聞夫子之道而樂二者心戰未能决而况中庸以下漸漬於失教被服于成俗乎孔子必正名於衛所居不合豈不哀哉班固曰人函天地隂陽之氣有喜怒哀樂之情天稟其性而不節也聖人能為之節而不能絶也故象天地而制禮樂所以通神明立人倫正情性節萬事也人性有男女之情妬忌之别為制婚姻之禮有交接長幼之序為制鄉飲之禮有哀死思逺之情為制䘮祭之禮有尊尊敬上之心為制朝覲之禮哀有哭踊之節樂有歌舞之容正人足以副其誠邪人足以防其失故婚姻之禮廢則夫婦之道苦而淫僻之罪多鄉飲之禮廢則長幼之序亂而爭鬬之獄煩䘮祭之禮廢則骨肉之恩薄而背死㤀生者衆朝聘之禮廢則君臣之位失而侵凌之漸起故孔子曰安上治人莫善於禮移風易俗莫善于樂揖讓而治天下者禮樂之謂也屬辭比事而不亂則深於春秋也壺遂曰昔孔子何為作春秋哉太史公曰余聞之董生曰由周道哀微孔子為魯司冦諸侯害之大夫壅之孔子知言之不用道之不行也是非二百四十二年之中以為天下儀表貶天子退諸侯討大夫以達王事而已矣子曰我欲載之空言不如見之於行事之深切著明也夫春秋上明三王之道下辨人事之紀别嫌疑明是非定猶豫善善惡惡賢賢賤不肖存亡國繼絶代補弊起廢王道之大者也揆亂代反之正道莫近于春秋春秋之中弑君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數察其所以皆失其本也壺遂曰孔子之時上無明君下不得任用故作春秋垂空文以斷禮義當一王之法今夫子上遇明天子下得保其社稷者不曠守職夫子所論欲以何明太史公曰伏羲至純厚作八卦堯舜之盛尚書載之禮樂作焉湯武之隆詩人歌之春秋採善貶惡推三代之徳褒周室非獨刺譏而官已漢興以來至明天子受命於穆清澤流罔極臣下百力誦聖徳猶不能宣盡其意且士賢能而不用有國之恥也主上明聖而徳不布聞有司之過也且余掌其官廢明聖罪莫大焉余所謂述非所謂作也而君比之于春秋謬矣自仲尼没而微言絶七十子䘮而大義乖戰國縱横真偽分爭諸子之言紛然散亂矣儒家者蓋出於司徒之官助人君順隂陽明教化者也遊文於六經之中留意於仁義之際祖述堯舜憲章文武崇師仲尼此其最髙也然惑者既失精微而僻者又随時抑揚違離道本茍以譁衆取寵此僻儒之患也司馬談曰儒者博而寡要勞而少功是以其事難盡從然其叙君臣父子之禮列夫婦長幼之别不可易也夫儒者以六藝為法經傳以千萬數累世不能通其學當年不能究其禮故曰博而寡要勞而少功若夫列君臣父子之禮叙夫婦長幼之别雖百家勿能易也范􅋫曰夫遊庠序服儒衣所談者仁義所𫝊者聖法也故人識君臣父子之綱家知違邪歸正之路自桓靈之間朝綱日陵國隙屢啓中智以下靡不審其崩離而剛强之臣息其闚盜之謀豪俊之夫屈于鄙生之議者民誦先王之言也下畏逆順之勢也至如張温皇甫嵩之徒功定天下之半聲馳四海之表俯仰顧盼則大業移矣猶鞠躬昏主之下狼狽折札之命散成兵就繩約而無悔心者斯豈非學者之效乎故先師褒勵學者之功篤矣道家者蓋出於史官厯紀成敗秉要執本清虛以自守卑弱以自持此君人南面者之術也合於堯之克讓易之謙謙此其所長也及放者為之則欲絶去禮樂兼棄仁義獨任清虚何以為治此道家之弊也司馬談曰道家使人精神専一動合無形贍足萬物其為術也因隂陽之大順采儒墨之善撮名法之要與時遷徙應物變化立俗施事無所不宜指約而易操事少而功多夫道家無為又曰無不為其實易行其辭難知其術以虛無為本以因循為用無成勢無常形故能究萬物之情不為物先不為物後故能為萬物主有法無法因時為業有度無度因物與合故曰聖人不朽時變是守虛者道之常因者君之綱君臣並至使自明也隂陽家者蓋出於羲和之官敬順昊天歴象日月星辰敬授人時此其所長也及拘者為之則牽於禁忌泥於小數捨人事而任鬼神此隂陽之弊也司馬談曰隂陽之術大詳而衆忌諱使人拘而多畏然其叙四時之大順不可失也夫隂陽四時八位十二度二十四節各有教令曰順之者昌逆之者亡未必然也故曰使人拘而多忌夫春生夏長秋收冬藏此天之大經弗順則無以為天下紀綱故曰叙四時之大順不可失也漢書曰天人之際精祲有以相盪善惡有以相推事作乎下象動乎上隂陽之理各應其感隂變則靜者動陽蔽則明者晻水旱之灾随類而至故曰日蝕地震皆陽微隂盛也臣者君之隂也子者父之隂也妻者夫之隂也夷狄者中國之隂也春秋日蝕三十六地震五十二或夷狄侵中國或政權在臣下或婦乗夫或臣子背君父事雖不同其類一也是以明王即位正五事五事貌言視聽思也建大中以承天心則庶徵序于下日月理于上如人君淫溺後宫般樂遊田五事失於躬大中之道不立則咎徵降而六極至凡灾異之發各象過失以類告人𫝊曰田獵不宿飲食不享出入不節奪人農時及有奸謀則本不曲直又曰棄法律逐功臣殺太子以妾為妻則火不炎上又曰好治宫室飾臺榭内淫亂犯親戚侮父兄則稼穡不成又曰好攻戰輕百姓飭城郭侵邉城則金不從革又曰簡宗廟不禱祠廢祭祀逆天時則水不潤下管輅曰貴人有事其應在天在天則日月星辰也兵動人憂其應在物在物則山林鳥獸也又曰夫天雖有大象而不能言故運星精於上流神明于下驅風雲以表異役鳥獸以通靈表異者必有沉浮之候通靈者必有宫商之應是以宋襄失徳六鶂退飛伯姬將焚鳥唱其灾四國未火融風已發赤雲夾日殃在荆楚此乃上天之所使自然之明符也後漢竇武上書曰間者有嘉禾芝草黄龍之瑞見夫瑞生必於嘉土福至實由吉人在徳為瑞無徳為灾陛下所行不合天意不宜稱慶又裴楷曰按春秋已來及古帝王未有河清者也臣以為河者諸侯位也清者屬陽濁者屬隂河當濁而反清者隂欲為陽諸侯欲為帝也京房易𫝊曰河水清天下平今天垂異地吐妖民癘疫三者並時而有河清猶春秋麟不當見而見孔子書以為異也魏青龍中張掖郡𤣥川溢湧寳石負鼎狀麟鳯龍馬炳煥曰成形時人以為魏瑞任令于綽齎以問張臶臶宻謂綽夫神以知來不追已徃以禎祥先見然後廢興從之漢已乆亡魏已得之何所追廢興禎祥乎此石當今之變異而將來之禎祥後司馬氏果代魏漢武時巫為上致神君神君但聞其聲不見其形荀悦曰易稱有天道焉有地道焉有人道焉各當其理而不相亂亂則有氣變而然若夫大石自立僵栁復生此形之異也男化為女死而復生此含氣之異也鬼神髣髴在于人間言語聲音此精神之異也夫形神之異各以類感善則生吉惡則生凶精氣之際自然之符異也故逆天之理則神失其節而妖神妄興逆地之理則形失其節而妖形妄生逆中和之理則含氣失其節而妖物妄出此其大㫖也若夫神君之類精神之異也春秋𫝊曰作事不時怨讟動于人則有非言之物而言當漢武之時賦斂繁衆人民彫弊故有無形而言至也其于洪範言僣則生時妖此蓋怨讟而生妖之類也故通于道言正身則萬物精神形氣各反其本也後漢陳蕃上書曰昔春秋之末周徳衰微數十年間無復灾𤯝者天所棄也天之于漢悢悢無已故慇懃于變以悟陛下除妖去嬖實在修徳故周書曰天子見怪則修徳諸侯見怪則修政大夫見怪則修職士庻見怪則修身神不能傷道妖不能害徳漢書曰夫動人以行不以言應天以實不以文此天人之大畧也法家者蓋出於理官信賞必罰以輔禮制此其所長也及刻者為之則亡教化去仁愛専任刑法而欲以致治至於殘賊至親傷恩薄厚此法家之弊也司馬談曰法家嚴而少恩然正君臣上下之分不可改也夫法家不别親踈不殊貴賤一斷於法則親親尊尊之恩絶矣可使行一時之計而不可長用也故嚴而少恩至于尊主卑臣明職分不相踰越雖百家不能改也名家者蓋出於禮官古者名位不同禮亦異數孔子曰必也正名乎此其所長也及繳者為之繳音工釣反則茍鈎鈲析亂而已此名家之弊也司馬談曰名家使人儉而善失真然其正名實不可不察夫名故家苛察繳繞使人不得反其意専决于名而失人情曰使人儉而善失真若夫控名責實參伍不失此不可不察也鈲音普覔反墨家者蓋出於清廟之守茅屋采椽是以貴儉養三老五更是以兼愛選士大射是以上賢宗祀嚴父是以右鬼右信也順四時而行是以非命言無吉凶之命但有賢不肖善惡也以孝示天下是以上同言皆同于治也此其所長也及蔽者為之見儉之利因以非禮推兼愛之意而不知别親踈此墨家之弊也司馬談曰墨者儉而難遵是以其事不可偏循然其强本節用不可廢也夫墨者亦上論堯舜言其徳行曰堂髙三尺土堦三等茅茨不翦采椽不斵飯土簋啜土刑糲粱之食藜藿之羮夏日葛衣以冬日鹿裘其送死桐棺三寸舉音不盡其哀教䘮禮必此為萬人率使天下法若此則尊卑無别夫世異時移事業不同故曰儉而難遵也要曰强本節用則家給人足之道此墨家之所長雖百家莫能廢也漢武帝問董仲舒䇿曰蓋儉者不造𤣥黄旌旗之餙及至周室設兩觀乗大輅八佾陳於庭而頌聲興夫帝王之道豈異㫖哉對曰制度文采𤣥黄之餙所以明尊卑異貴賤而勸有徳也故春秋受命所先制者改正朔易服色所以應天也然則宫室旌旗之制有法而然者也孔子曰奢則不孫儉則固儉非聖人之中制故曰奢不儉上儉不逼下此王道也縱横家者蓋出於行人之官孔子曰使乎使乎言當權事制宜受命而不受辭此其所長也及邪人為之則上詐諼許逺反而棄其信此縱横之弊也荀悅曰世有三遊徳之賊也一曰遊俠二曰遊説三曰遊行夫立氣勢作威福結私交以立强于世者謂之遊俠餙辯辭設詐謀馳逐于天下以要時世者謂之遊説色取人合時好連黨類立虚譽以為權利者謂之遊行此之三者亂之所由生傷道害徳敗法惑世先王之所慎也凡三遊之作主於季世周秦之末尤甚焉上不明下無正制度不立綱紀弛廢以毁譽為榮辱不核其真以愛憎為利害不論其實言論者計厚薄而吐辭選舉者度親踈而下筆然則利不可以義求害不可以道避是以君子犯禮小人犯法餙華廢實競取時利薄骨肉之恩篤僚友之厚道㤀修身之道而求衆人之譽苞苴盈於門庭聘問交於路于是流俗成而正道壊矣遊俠之本生於武毅不撓乆要不㤀平生之言見危受命以救時難而濟同類以正行之者謂之武義其失之甚者至於為盜賊矣遊説之本生於是非使于四方不辱君命出疆有可以安社稷利國家則専對解結辭之繹矣民之莫矣以正行之者謂之辯智其失之甚者至于詐矣遊行之本生于道徳仁義汎愛容衆以文㑹友和而不同進徳及時以立功業于世以正行之者謂之君子其失之甚者至于因事害私為奸宄矣甚相殊逺豈不哀哉故大道之行則三遊廢矣雜家者蓋出于議官兼儒墨合名法知國體之有此見王理之無不貫此其所長也及蕩者為之則漫羡而無所歸心此雜家之弊也農家者蓋出於農稷之官播百穀勸耕桑以足衣食孔子曰所重人食此其所長也及鄙者為之則欲君臣之並耕誖上下之序農家之弊也班固曰馬遷史記其是非頗謬于聖人論大道則先黄老而後六經序遊俠則退處士而進奸雄述貨殖則崇利勢而羞貧賤此其所蔽也然其善序事理辨而不華質而不俚其文直事核不虚美不隠惡故世謂之實録文子曰聖人之從事也所由異路而同歸秦楚燕魏之歌異轉而皆樂九夷八狄之哭異聲而皆哀夫歌者樂之微也哭者哀之效也愔愔於中而應于外故在所以感之矣論曰范曄稱百家之言政者尚矣大畧歸乎寜固根柢革易時弊也而遭運無恒意見偏雜故是非之論紛然乖當嘗試論之夫世非骨庭人乖鷇飲理迹萬肇情故萌生雖周物之智不能研其推變山川之奥未足况其紆險則應裕適事難以常條何以言之若夫𤣥聖御代則大同極軌施舍之道宜無殊典而損益迭運文樸遞行用明居晦迴遹於曩時興戈陳爼參差於上世及至戴黄屋服絺衣豐薄不齊而致治則一亦有宥公族黥國讐寛躁已隔而防非必同此其分波而共源百慮而一致者也若乃偏情矯用則枉直必過故葛屨履霜弊由崇儉楚楚衣裳戒在窮奢踈禁厚下以尾大陵弱斂威峻法以苛薄分崩斯曹魏之刺所以明乎國風周秦末軌所以彰于微滅故用捨之端興敗資焉是以繁簡唯時寛猛相濟刑書鐫鼎事有可詳三章在令取貴能約大叔致猛政之襃國子流遺愛之涕宣孟改冬日之和平陽修畫一之法斯實弛張之𢎞致庶可以徴其統乎數子之言當世失得皆悉究矣然多謬通方之訓好申一隅之説貴清淨者以席上為腐議束名實者以柱下為誕辭或推前王之風可行於當年有引救弊之規宜流於長世稽之篤論將為蔽矣由此言之故知有法無法因時為業時止則止時行則行動不失其時其道光明非至精者孰能通於變哉長短經卷三
