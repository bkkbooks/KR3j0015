body:
  text: 長短經卷二唐趙㽔撰君徳九臣行十徳表十一理亂十二君徳第九夫三皇無言化流四海故天下無所歸功伏羲女媧神農稱三皇也帝者體天則地有言有令而天下太平君臣讓功四海化行百姓不知其所以然故使臣不用禮賞功美而無害黄帝者順天地之紀時播百穀懃心力耳目節用水火時物有土徳之瑞故號黄帝顓頊者養材以任地載時以象天依鬼神以制義治氣以教化潔誠以祭祀動静之物大小之神日月所照莫不砥礪髙辛者取地之財而節用之撫教萬人而利誨之歴日月而迎送之明鬼神而敬事之其色郁郁其徳嶷嶷帝堯者其仁如天其智如神就之如日望之如雲富而不驕貴而不舒虞舜者善無㣲而不著惡無隱而不彰任自然以誅賞委羣心而就制故能造御乎無為運道于至和百姓日用而不知合徳若自有者此五帝徳也王者制人以道降心服志議曰韓信云項王所過無不殘滅百姓不親特刼于威强服耳名雖為霸實失天下心故曰其强易弱諸葛亮曰荆州之名附操者逼兵勢耳非心服今將軍誠命猛將與豫州協規同力破操軍必矣由此言之人心不服其勢易破故王者之道降心服志也設矩備裒有察察之政兵甲之備而無争戰血刄之用天下太平君無疑於臣臣無疑於主國定主安臣以義退亦能美而無害昔三代明王啟建洪業文質殊制而令名一致故曰夏人尚忠忠之弊也朴救朴莫若敬殷人革而修焉敬之弊也鬼救鬼莫若文周人矯而變焉文之弊也薄則又反之于忠三代相循如水濟火所謂隨時之宜救弊之術此三王之徳也霸主制士以權結士以信使士以賞信士疏賞毁士不為用左傳曰楚圍宋宋如晉告急先軫曰報施救患取威定伯于是乎在矣狐偃曰楚始得曹而新婚于衛若伐曹衛楚必救之則齊宋免矣于是乎蒐于被廬作三軍謀元帥使卻縠將中軍晉侯始入而教其民二年欲用之子犯曰民未知義未安其居于是乎出定襄王入務利民民懷生矣將用之子犯曰人未知信未宣其用于是乎伐原以示之信民易資者不求豐焉明徵其辭公曰可矣乎子犯曰民未知禮未生其恭于是乎大蒐以示之禮作執秩以正其官人聽不惑而後用之出榖戍釋宋圍一戰而霸文之教也此五霸徳也故曰理國之本刑與徳也二者相須而行相待而成也天以陰陽成歲人以刑徳成治故雖聖人為政不能偏用也故任徳多用刑少者五帝也刑徳相半者三王也仗刑多任徳少者五霸也純用刑强而亡者秦也議曰古之理者其政有三王者之政化之霸者之政威之强國之政脅之故化之不變而後威之威之不變而後脅之脇之不變而後刑之故至于刑則非王者之所貴矣故虞南云彼秦皇者棄仁義而用威力此可以吞併而不可以守成此任刑之弊也或曰王霸之道既聞命矣敢問髙光二帝皆㧞起壠畝芟夷禍難遂開王業髙祖豁達以大度光武謹細于條目各擅其美龍飛鳳翔故能掇亂庇人拯斯塗炭然比大徳方天威孰為優劣乎曹植曰昔漢之初興髙祖因暴秦而起遂誅强楚光有天下功齊湯武業流後嗣帝王之元勲人君之盛事也然而名不純徳行不純道身没之後崩亡之際果令凶婦肆酷虐之心嬖妾被人彘之刑趙王幽囚禍殃骨肉諸吕專權社稷幾移凡此上事豈非髙祖寡計淺慮以致斯哉然其梟將畫臣皆古今之所鮮有歴代之希覯惟能任其才而用之聽其言而察之故兼天下而有帝位也世祖體乾靈之休徳稟貞和之純精蹈黄中之妙理韜亞聖之懿才其為徳也聰達而多識仁智而明恕重慎而周宻樂施而愛人值陽九無妄之世遭炎精厄㑹之運殷爾雷發赫然神舉奮武略以攘暴興義兵以掃殘軍未出於南京莽已斃於東都爾乃廟勝而後動衆計定而後行師故攻無不䧟之壘戰無奔北之卒寛仁以和衆邁徳以來逺故竇融聞聲而影附馬援一見而歎息敦睦九族有唐虞之稱髙尚純朴有羲皇之素謙虛納下有吐握之勞留心庶事有日昃之勤是以計功則業殊比隆則事異旌徳則靡􅄽言行則無穢量事則勢微論輔則臣弱卒能效乾圖之休徵立不刋之遐迹金石銘其休烈詩書載其懿勲故曰光武其優也荀悅曰髙祖起於布衣之中奮劒而取天下不由唐虞之禪不階湯武之士龍興虎變率從風雲征亂伐暴廓清帝宇八載之間海内克定遂荷天衢登建皇極上古以來書籍所載未嘗有也非雄俊之才寛明之略歴數所授神祇所相安能致功如此焚魚斷虵異物同符豈非精靈之感哉書曰天工人其代之易曰湯武革命順乎天而應乎人斯之謂矣夏尚忠忠之弊野朴故殷承之以敬敬之弊鬼故周承之以文文之弊薄救薄莫若忠三王之道周而復始周秦之間可謂文弊秦不改反酷刑漢承其弊得天統矣孔融曰周武從后稷以來至其身相承積十五世但有魚鳥之瑞至如髙祖一身修徳瑞有四五白虵分神母哭西入闗五星聚又武王伐紂斬而梟之髙祖入秦赦子嬰而遣之是其寛裕又不如髙祖虞南曰帝者與師處王者與友處霸者與臣處漢祖之臣三傑是也光武之佐二十八將是也豈得以鄧禹吳漢匹于張良韓信者乎然漢祖功臣皆强盛誅滅光武佐命悉用優秩安全君臣之際良可稱也絶長補短抑其次焉由此言之夫漢髙克平秦項開創漢業衣冠禮樂垂之後代雖未階王道霸徳之盛也或曰班固稱周云成康漢言文景斯言當乎虞南曰成康承文武遺跡以周召為相化篤厚之氓因積仁之徳疾風偃草未足為喻至如漢祖開基日不暇給亡嬴之弊猶有存者太宗體兹仁恕式遵𤣥黙滌秦項之酷烈反軒昊之淳風幾致刑厝斯為難矣若使不溺新垣之說無取鄧通之夢懍懍乎庶幾近於王道景帝之擬周康則尚有慙徳漢文贊曰文帝即位二十三年宫室園囿車騎服御無所增益有不便輙施以利人南越尉佗自立為帝召貴佗兄弟以徳懷之佗遂稱臣與匈奴結親而背約入盜令邊備守不發兵深入惡煩百姓吳王詐病不朝賜以几杖羣臣諫說雖切常假借納用焉張武等受賂金錢覺加賞賜以愧其心專務以徳化人是以海内殷富興於禮義斷獄數百幾致刑措嗚呼仁哉或問傅子曰漢太宗除肉刑可謂仁乎對曰匹夫之仁也夫王天下者大有濟者也非小不忍之謂由此言之班固以太宗為仁不在除肉刑矣景帝贊曰孔子稱斯人也三代之所以直道而行信哉周秦之弊網宻文峻而奸宄不勝漢興掃除煩苛與人休息至于孝文加之以恭儉孝景遵業五六十載之間至于移風易俗黎人醇厚周云成康漢言文景美矣哉此王道也或曰漢武帝雄才大略可方前代何主虞南曰漢武承六世之業海内殷富又有髙人之資故能總攬英雄駕御豪傑内興禮樂外開邊境制度憲章煥然可述方于始皇則為優矣至於驕奢暴虐可以相亞並功有餘而徳不足武帝贊曰漢承百王之弊髙祖撥亂反正文景務在養人至于稽古禮文之事猶多闕焉孝武初立卓然罷黜百家表章六經遂疇咨海内舉其俊茂與之立功興太學修郊祀改正朔定厯數協音律作詩樂建封禪禮百神紹周後號令文章煥焉可述後嗣得遵洪業而有三代之風如武帝之雄材大略不改文景之恭儉以齊斯人雖詩書所稱何有加焉推此而言之彼漢武秦皇皆立功之君非守成之主也昔周成以孺子繼統而有管蔡四國之變漢昭幼年即位亦有燕蓋上官逆亂之謀成王不疑周公漢昭委任霍光二主孰為先後魏文帝曰周成王體聖考之休氣稟賢妣之胎誨周召為保傅吕望為太師口能言則行人稱辭足能履則相者導儀目厭威容之美耳飽徳義之聲所謂沉漬𤣥流而沐浴清風矣猶有咎悔聆二叔之謗使周公東遷皇天赫怒顯明厥咎然後乃寤不亮周公之聖徳而信金縢之教言豈不暗哉夫漢昭父非武王母非邑姜養惟蓋主相則桀光保無仁孝之質佐無隆平之治所謂生於深宫之中長於婦人之手然而徳與性成行與體并在年二七早知夙達發燕書之詐亮霍光之誠豈將啟金縢信國史而後乃寤哉使成昭鈞年而立易世而化貿臣而治換樂而歌則漢不獨少周不獨多也大將軍霍光及上官桀秉政桀害光寵欲誅之乃詐為帝兄燕旦上書稱光行上林稱蹕等事帝不信或曰漢宣帝政事明察其光武之儔歟虞南曰漢宣帝起自閭閻知人疾苦是以留心聽政擢用賢良原其循名責實峻法嚴令蓋流出於申韓也古語云圖王不成弊猶足霸圖霸不成弊將如何光武仁義圖王之君也宣帝刑名圖霸之主也今以相輩恐非其儔議曰元帝之為太子嘗諫宣帝以為持法太嚴帝作色曰我漢家以霸王之道雜之奈何純任徳化用害政乎雖以此言之知其度量不逺然寛猛之制有自來矣昔髙祖入秦約法三章秦人大恱此言緩刑之美也郭嘉說曹公云漢末政失於寛紹以寛濟故不攝公糾之以猛而上下知制此言嚴刑之當也故傳曰政寛則民慢慢則糾之以猛猛則人殘殘則施之以寛寛以濟猛猛以濟寛政是以和書曰刑罰世輕世重周禮曰刑新國用輕典刑亂國用重典刑平國用中典由此觀之但問時代何時耳嚴刑惡足小哉或曰漢元帝才藝温雅其守文之良主乎虞南曰夫人君之才在乎文徳武功而已文則經天緯地詞令典䇿武則禁暴戢兵安人和衆此南面之宏圖也至于鼓瑟吹簫和聲度曲斯乃伶官之職豈天子之所務乎議曰元帝多才藝善鼓琴瑟雖如此非善之善也何則徐幹中論曰夫詳小事而畧大道察近物而暗逺數自古及今未有如此而不亂也未有如此而不亡也所謂詳小事察近物者謂耳聰於絲竹歌謡之和目明於彫琢彩色之章口給于辨惠切對之詞心通于短言小說之文手習於射御書數之巧也所謂逺數大道者謂仁足以覆燾羣生惠足以撫養百姓明足以照見四方智足以統理萬物權足以應變無端義足以阜生財用威足以禁遏奸非武足以平定禍亂詳于聽受而審於官人達於廢興之原通於安危之分如此則君道畢矣昔魯莊多伎藝詩人刺之魯昭善容儀有出奔之禍由是言之使人主視如離婁聽如師曠射如夷羿書如史籀可謂善於有司之職何益於理乎匡衡諫元帝改政書曰受命之王務在創業垂統傳之無窮繼體之君必存於承宣先王之徳而褒大其功今陛下聖徳天覆子愛海内然陰陽未和奸邪未禁者殆議論者未丕揚先帝之盛功争言制度不可用臣竊恨國家釋樂成之業而虚為此紛紛也願陛下詳覽統業之事此守文也或曰觀偽新王莽謙恭禮讓豈非一代之名士乎至作相居尊驕淫暴虐何先後相背甚乎虞南曰王莽天姿慘酷詐偽人也未達之前狥名求譽得志之後矜能傲物飭情既盡而本質存焉愎諫自髙卒不改寤海内寃酷為光武之驅除焉班固曰王莽始起外戚折節力行以要名譽哀成之際勤勞國家直道而行動見稱述豈所謂在國必聞在家必聞色取仁而行違之者也莽既非仁而有邪佞之材又承四父世業之權遭漢中㣲國統三絶而太后夀考為之宗主故得肆其奸慝以成簒奪之禍推此言之亦有天時非人力所致及其竊位南面處非所㨿顛覆之勢險於桀紂而莽晏然自謂黄虞復出也乃矜其威詐滔天虐人是以海内囂然喪其樂生之心内外怨恨逺近俱發城池不守支體分裂遂令天下城邑為墟自書傳所載亂臣賊子無道之人未有如莽之甚者也紫色䵷聲餘分閏位為聖王之駈除云吳王孫權論吕䝉曰子明少時孤謂不辭劇易果敢有膽而已長大學問開益籌略奇至可以次於公瑾圖取闗羽勝於子敬子敬答孤書云帝王之起皆有駈除羽不足忌此子敬内不能辦而外為大言耳孤亦恕之不茍責也此駈除之意也夏少康漢光武皆中興之君孰者為最虞南曰此二帝皆興復先緒光啟王業其名則同其實則異何者光武之世藉思亂之民誅殘賊之莽取亂侮亡為功差易至如少康則夏氏之滅已二代矣羿及寒浞藐然遺體身在胎孕母氏逃亡生於他國不及過庭之訓曾無强近之親遭離亂之難庇身非所而能﨑嶇于喪亂之間遂成配天之業中興之君斯為稱首魏髙貴鄉公問荀顗曰有夏既衰后相殄滅少康收輯夏衆復禹之績髙祖㧞起壟畝芟夷秦項考其功徳誰為先後顗對曰造之與因難易不同少康功徳雖美猶為中興漢世祖同流可也至如髙祖臣等以為優上曰少康先于滅亡之後降為諸侯之𨽻能布其徳而兆有其謀卒滅過戈復禹之績祀夏配天不失舊物非至徳𢎞仁豈能濟斯勲乎漢祖因土崩之勢收一時之權為人子則數危其親為人君則因賢相為人父則不能衛其子身没之後社稷幾傾若與少康易時而處或未能復大禹之績也推此言之宜髙夏康而下漢祖矣後漢衰亂由於桓靈二主凶徳誰則為甚虞南曰桓帝赫然奮怒誅滅梁冀有剛斷之節焉然閹人擅命黨錮事起非乎亂階始於桓帝古語曰天下嗷嗷新主之資也靈帝承疲民之後易為善政黎庶傾耳咸冀中興而帝襲彼覆車毒踰前輩傾覆宗社職帝之由天年厭世為幸多矣議曰桓帝問侍中爰延曰朕何如主也對曰漢中主何者尚書令陳蕃任事則理中常侍黄門豫政則亂是以知江陛下可與為善可與為非此中主之謂也虞南曰夫岷初發其源可以濫觴及其逺也方舟而後能濟元帝之時而任𢎞恭石顯暨于桓靈加以單超張讓既斁彝倫遂傾宗國其所由來者漸矣故曰熒熒不滅炎炎奈何言慎其始也嗚呼百代之後其鑒之哉古語曰寒者易為衣饑者易為食晁錯曰夫國富强而隣國亂者帝王之資由此言之是知昏亂之君將以開聖徳矣自炎精不競㝢縣分崩曹孟徳挾天子而令諸侯劉𤣥徳憑蜀漢之阻孫仲謀負江淮之固三分天下鼎足而立皆肇開王業光啟霸圖三方之君孰有優劣虞南曰曹公兵機智算殆難與敵故能肇迹開基居中作相實有英雄之才矣然譎詭不常雄猜多忌至於殺伏后鴆荀彧誅孔融戮崔琰婁生斃於一言桓邵勞於下拜棄徳任刑其虐已甚坐論西伯實非其人許劭所謂治世之能臣亂世之姦雄斯言為當劉公待劉璋以賔禮委諸葛而不疑人君之徳於斯為美彼孔明者命世之奇才伊吕之儔匹臣主同心魚水為譬但以國小兵弱斗絶一隅支對二方抗衡上國若使與曹公易地而處騁其長算肆闗張之武盡諸葛之文則霸王之業成矣孫主因厥兄之資用前朝之佐介以天險僅得自存比於二人理弗能逮陳夀云劉備機權幹畧不逮魏武所以基宇亦狹張輔曰何為其然夫撥亂之主當先以收相獲將為本一身善戰不足恃也諸葛孔明達禮知變殆王佐之才𤣥徳無强盛之勢而令委質闗侯張飛皆人傑也服而使之夫明暗不相為用能否不相為使武帝雖處安强不為之用也况在危急之間乎若令𤣥徳據有中州將與周室比隆豈徒二傑而已魏帝問吳使趙咨曰吳王何等主也咨對曰聰明仁知雄畧之主也帝問其狀咨曰納魯肅于凡品是其聰也㧞吕䝉于行陣是其明也獲于禁而不害是其仁也取荆州兵不血刃是其智也據三州虎視天下是其雄也屈身于陛下是其畧也孫䇿瘡甚呼弟權曰舉江東之衆决機于兩陣之間與天下争衡卿不如我舉賢任能各盡其才以保江東我不如卿陳夀云孫權屈身忍辱任才尚計有勾踐之奇人之傑也故能自擅江表成鼎峙之業也晉宣帝雄謀妙算諸葛亮冠世奇才誰為優劣虞南曰宣帝起自書生參佐帝業濟世危難克清王道文武之畧實有可稱而多仗陰謀弗由仁義猜忌詭伏盈諸襟抱至如示謬言於李勝委鞫獄於何晏愧心負理君子不為以此偽情行之萬物若使力均勢敵俱㑹中原以仲達之姦謀當孔明之節制恐非儔也呉張微黙記論諸葛亮司馬宣王二相優劣曰漢朝傾覆天下分崩二公並遭值際㑹託身明主孔明起蜀漢之地蹈一州之土方之大國蓋有九分之一也提步卒數萬長駈祁山慨然有飲馬河雒之志仲達據天下十倍之地仗兼并之衆據牢城擁精銳無擒敵之意務自保而已使彼孔明若此而不亡則凉雍不解甲中國不釋鞍勝負之勢亦已决矣方之司馬不亦優乎或曰晉景文兄弟孰賢魏明帝崩立養子齊王芳遺詔使曹爽與司馬宣王輔政宣王誅爽自專政宣王薨子景王名師字子元代立輔政廢齊王芳立髙貴鄉公景王薨弟文王名昭字子上又代立輔政殺髙貴鄉公立陳留王後陳留王以魏禪晉武帝名炎字安世即位平呉天下一統及子惠帝立天下大亂五胡入中原矣虞南曰何晏稱唯深也故能通天下之志夏侯太初是也惟機也故能成天下之務司馬子元是也故知王佐之才著於早日及誅爽之際智略已宣欽儉稱兵全軍獨克此足見其英圖也雖道盛三分而終身北面威名振主而臣節不虧侯服歸全於斯為美太祖嗣興克寧禍亂南定淮海西平庸蜀役不踰時厥功為重及髙貴纂歴聰明夙智不能竭忠協贊擬迹伊周遂乃偽謗士彦委罪成濟自貽逆節終享惡名斯言之玷不可磨也干寳晉總論曰昔宣帝以雄才碩量應運而仕值魏太祖創業之初籌晝軍國嘉謀屢中遂服輿軫駈馳三世性深阻有城府而能寛綽以容納行任數以御物而知人善採㧞故能西擒孟達東舉公孫淵内夷曹爽外襲王陵屢距諸葛亮節制之兵而東支吳人輔車之勢于是百姓與能大象始搆矣世宗承基太祖繼業𤣥豐亂内欽誕冦外潛謀雖宻而在機必兆淮浦再擾而許洛不震咸黜異圖用光前烈然後推轂鍾鄧長駈庸蜀三闗電掃劉禪入臣天符人事於是信矣始當非常之禮終受備物之錫至于世祖遂享皇極仁以厚下儉以節用和而不弛寛而能斷故人詠維新四海恱勸矣汎舟三峽介馬桂陽役不二時江湘來同夷吳蜀之壘垣通二方之險塞太康之中天下書同文車同軌雖太平未洽亦足以明吏奉其法人樂其生百代之一時也武皇既崩山陵未乾而楊駿被誅母后廢黜朝士舊臣夷滅者數十族尋以二公楚王之變宗子無維城之助而閼伯實沉之隙歲搆師尹無具瞻之貴而顛墜戮辱之禍日有方岳無鈞石之鎮闗門無結草之固李辰石冰傾之於荆揚劉淵王彌撓之于青冀二十餘年而河洛為墟戎羯稱制二帝失尊山陵無所何哉樹立失權託附非才四維不張而茍且之政多也故觀阮籍之行而覺禮教崩弛之所由察庾純賈充之事而見師尹之多僻思郭欽之謀而寤夷狄之有釁核傅咸之奏錢神之論而覩寵賂之彰民風國勢如此雖以中庸之才守文之主治之辛有必見之于祭祀季札必得之于樂聲范爕必為之請死賈誼必為之痛哭又况我惠帝以蕩蕩之徳而臨之哉淳耀之烈未渝故大命重集于中宗元皇帝也東晉自元帝以下何主為賢虞南曰晉自遷都江左强臣擅命垂拱南面政非已出王敦以盤石之宗居上流之要負才矜地志懷問鼎非肅祖之明斷王導之忠誠則晉祚其移于王氏矣若使降年永久仗任羣賢因瀍澗之遺黎乘劉石之衰運則克復中原不難圖也元帝值天下崩離創立江左後肅祖即位大將軍王敦威震内外將謀為逆帝與王導温嶠等决計征敦敦敗死也或曰偽楚桓𤣥有奇才逺略而遂至滅亡何也桓𤣥字敬道父温大司馬𤣥博綜術藝以雄豪自處晉安帝以為丞相封楚王遂禪位虞南曰夫人君之量必虛己應物覆載同于天地信誓擬于暄寒然後萬姓樂推而不厭也彼桓𤣥者蓋有浮狡之小智而無含𢎞之大徳值晉末衰亂威不逮下故桓𤣥得肆其爪牙以徼倖之餘而逢神武之運至于夷滅固其宜也鬻子曰發政施令為天下福者謂之道上下相親謂之和民不求而得所欲謂之信除天下之害者謂之仁仁與信和與道帝王之器也由此言之豪雄小智何益于樂推哉宋祖誅滅桓𤣥再興晉室梁代裴子野優之于宣武其事云何虞南曰魏武曹騰之孫累葉榮顯濯纓漢室三十餘年及董卓之亂乃與山東俱起誅滅元凶曾非己力晉宣歴任卿相位極台鼎握天下之圖居既安之勢奉明詔而誅逆節建瓴為譬未足喻也宋祖以匹夫提劍首創大業旬月之間重安晉鼎居半州之地驅一郡之卒斬譙縱于庸蜀禽姚紹于崤函尅慕容超于青部梟盧循於嶺外戎旗所指無往不㨗觀其豁達則漢祖之風制勝胷襟則光武之匹惜其祚短志未可量此為優矣裴子野曰宋武皇帝苛跡多於魏武大徳厚於晉宣㧞足行間却孫恩蟻聚之衆奮臂荆郢掃桓𤣥盤石之宗方軌長駈則三齊無堅壘迴戈内赴則五嶺靡餘妖命孫季髙于巨海之上而番隅席卷擢朱齡石于百夫之下而庸蜀來王羌胡畏威反為表裏董率虎旅以事中原然後請呼上帝步驟前王光有帝圖謂之義取者也又曰桓敬道有文武奇才志雪餘恥校動離亂之中奄有天下而不血刃既而嘯命六合規模進取未及踰年坐盜社稷自以名髙漢祖事㨗魏晉思專其侈以冀恭已若王謐桓謙以人望鎮領袖王綏謝混以後進相光輝羣從兄弟方州連郡民駭其速而服其强無異望矣髙祖于時朱方之一匹夫也無千百之衆糾合同盟電擊二州未及半旬蕩清京邑號令羣后長駈江漢推亡楚于匪隙㧞衰晉於己頽自軒轅已来用兵之疾未始有也自非雄略不世天命底止焉能若此者乎于是人知攸塈而王迹興矣宋孝武明帝二人孰賢虞南曰二帝殘忍之性異體同心誅戮賢良割剪枝葉内無平勃之相外闕晉鄭之親以斯大寳委之昏稚故使齊民乘舋宰制天下未踰歲稔遂移龜玉緘縢雖固適為大盜之資百慮同失可為長歎鼎社傾淪非不幸也孝武名駿文帝第三子為江州刺史弟劭既弑逆帝與顔竣于江州起義征劭平之明帝名彧文帝第十八子即位盡殺孝武諸子務為彫飾天下騷然崩子昱立無道蕭道成殺之齊建元永明之間號為治世誠有之乎虞南曰齊髙創業之主知稼穡之艱難且立身儉素務存簡約武帝則留意後庭彫飾過度然能委任王儉憲章攸出禮樂之盛咸稱永明宰相得人於斯為美議曰子言衛靈公之無道康子曰夫如是奚為不喪孔子曰仲叔圉治賔客祝駝治宗廟王孫賈治軍旅夫如是奚其喪此言委任有徳之美也田單相齊過淄水有老人涉淄而寒田單解裘而衣之襄王惡之曰田單之厚施將欲以取我國乎不早圖恐後之此言委任有徳之惡也故齊侯惡陳氏厚徳晏子謂齊侯曰在禮家施不及國大夫不收公利可以止之齊襄惡田單厚施貫珠者謂襄王曰王不如嘉單之善令曰寡人憂人之饑也單收而食之寡人憂人之寒也單解裘而衣之稱寡人意單有是善而王嘉之善單之善亦王之善也後里閭相與語曰單之愛人乃王教之也夫收臣下之權宜如晏子及貫珠者昔漢祖疾甚吕后問為相曰曹參可問其次曰王陵可然少戅陳平可以助之陳平智有餘然難獨任周勃厚重少文然安劉氏者必勃也可令為太尉宋髙祖大漸誡太子曰檀道濟雖有幹略而無逺志徐羨之傅亮當無異圖謝晦常從征伐頗識機變若有同異必此人也可以㑹稽處之夫任賢用能宜如漢髙及宋祖矣宋齊二代廢主有五並驕淫狂暴前後如一或身被賊殺或傾墜宗社豈厥性頑凶自貽非命將天之所棄用亡大業乎虞南曰夫上智下愚特稟異氣中庸之才皆由訓習自宋齊已來東宫師傅備員而已貴賤禮隔規獻無由多以位升罕由徳進此五君者稟凡庸之性無周召之師逺益友之箴規狎宵人之近習以斯下質生而楚言覆國亡身理數然也議曰賈生云昔成王幼在襁褓之中召公為太保周公為太傅太公為太師保保其身體傅傅之徳義師導之教訓此三公之職也又置三少曰少傅少保少師是與太子晏者也乃孩抱有識三公三少固明孝仁義禮以導習之逐去邪人不使見惡行選天下之端士孝悌博聞有道術者以翼衛之使與太子居處故太子乃生見正事聞正言行正道左右前後皆正人也夫習與正人居不能無正猶生長齊地不能不齊言也習與不正人居猶生長楚地不能不楚言也秦使趙髙傅胡亥而教之獄所習者非斬劓人則夷人之三族也故胡亥今日即位明日射人忠諫者謂之誹謗深計者謂之妖言視殺人若刈草菅然豈胡亥之性惡哉從其所以導之者非其理也晉惠帝太子遹有罪閻纂上書諫曰臣伏念遹長養深宫沉淪富貴受饒先帝父母驕之每見選師傅下至郡吏率取膏梁擊鐘鼎食之家希有寒門儒素如衛綰周文洗馬舍人亦無汲黯鄭莊之比遂使不見事父君之道古禮太子以士禮與國人齒欲令知賤然後乃貴自頃東宫亦㣲太盛所以致敗非但東宫諸王師友文學亦取豪族力能得者豈有切磋能相長益今遹言語悖逆受罪之日不失子道尚可重選師傅置逰談文學皆選寒門孤宦以學行自立者及涉履艱難名行素立者使與遊處絶貴戚子弟輕薄賔客但道古今孝子事親忠臣事君及思愆改過皆聞善道庶幾可全由此觀之故太子者選左右俾諭教之最急也梁元帝聰明才學克平禍亂而卒致傾覆何也元帝梁武帝第七子名繹為荆州刺史破侯景都荆州為西魏萬紐于謹來伐執帝害之虞南曰梁元聰明伎藝才兼文武仗順伐逆克雪家寃成功遂事有足稱者但國難之後傷夷未復信强冦之甘言襲褊心於懷楚蕃屏宗支自為讐敵孤逺懸僻莫與同憂身亡祚滅生人塗炭舉鄢郢而棄之良可惜也議曰淮南子云夫仁智才之美者也所謂仁者愛人也所謂智者知人也愛人則無虐刑知人則無亂政此三代所以昌也智伯有五過人之才而不免于身死人手者不愛人也齊王建有三過人之巧而身虜于秦者不知賢也故仁莫大于愛人智莫大于知人二者不立雖察慧㨗巧不免于亂矣或曰周武之雄才武略身先士卒若天假之年盡其兵算必能平宇内為一代之明主乎虞南曰周武驍勇果毅有出人之畧觀其卑躬厲士法令嚴明雖勾踐穰苴無聞於天下此猛將之任非人君之度量也由此觀之夫撥亂之主當先以收相獲將為本一身善戰不足恃也故劉向曰知人者王道也知事者臣道也伎藝善戰何益哉後齊文宣帝狂悖之跡桀紂之所不為而國富人豐不至於亂亡何也宣帝名洋後齊髙歡第二子受後魏禪也虞南曰昔齊桓奢淫亡禮人倫所棄假六翮于仲父遂伯諸侯宣武帝鄙穢忍虐古今無比委萬幾於遵彦保全宗國以其任用得才所以社稷猶存者也議曰殷有三仁太康有五弟亦皆賢者而國為墟何哉鬻子曰君子與人之謀也能必用道而不能必見受也能必忠而不能必見入也能必信而不能必見信也故虞公不用宫之奇謀賊于晉仇由不聽赤章之言亡于智氏天反貽下之國莫不有忠臣謀士但在用與不用耳苟為不用君誤賢人君子安能救敗亂乎陳武帝起自草菜興創帝業近代以來可方何主虞南曰武帝以奇才逺略懷匡復之志龍躍海隅豹變嶺表掃重氛於絳闕復帝座於紫㣲西抗周師北夷齊冦宏謀長算動無遺䇿實開基之令主撥亂之雄才比宋祖則不及方齊髙則優矣隋文帝起自布衣光有神器西定庸蜀南平江表比於晉武可為儔乎虞南曰隋文因外戚之重周室之㣲負圖作宰遂膺寳命留心政治務從恩澤故能綏撫新舊緝寧遐邇文武制置皆有可觀及克定江淮咸同書軌率土黎獻企佇太平自金陵滅後王心奢汰雖威加四海而情墮萬機荆璧填于内府吳姬滿于下室仁夀彫飾事將傾宫萬姓力殫中民産竭加以猜忌心起巫蠱事興戮愛子之妃離上相之母猫鬼事起秦王妃及僕射楊素母皆坐焉綱維以紊禮教斯亡牝雞晨響皇枝勦絶廢黜不辜樹立所愛廢太子勇為庶人立晉王廣也功臣良佐誅翦無遺季年之失多於晉武十世不永豈天亡乎議曰漢髙祖欲以趙王如意易太子叔孫通諫曰昔晉獻公以驪姬故廢太子立奚齊晉國亂者數十年為天下笑秦以不早定扶蘇令趙髙得以詐立胡亥自使滅祀此陛下所親見今陛下必欲廢嫡而立少臣願先伏誅以頸血汚地帝曰吾直戲耳通曰太子乃天下本本之一揺大下震動奈何以天下戲乃聽之袁紹愛少子尚乃以太子譚繼兄後沮授諫曰世稱萬人逐兎一人獲之貪者悉止分定故也且年均以賢徳均以長上古之制也願上惟先代成敗之誡下思逐兎分定之義若其不改禍始此矣紹不從後果搆隙故曰立嫡子者不使庶孽疑焉疑則動兩則争子兩位者家必亂子兩位而家不亂者親猶在也恃親不亂失親必亂有㫖哉或曰王霸之畧請事斯語矣敢問殁而作謚及改正朔易服色以變人之耳目其事奚象對曰古之立謚者將以戒夫後代隨行受名君親無隱今之臣子不論名實務在尊崇斯風替也久矣昔季康子問五帝之徳於孔子孔子曰天有五行木火金水及土分時賛化育以成物一歲三百六十日五行行七十二日化生長育其神為五帝緯五帝五行之神古之王者易代改號取法五行五行更王終始相生亦象其義故其生為明王者而死配五行是以太皡配木勾芒為木正也炎帝配火祝融為火正也少皥配金蓐收為金正也顓頊配水𤣥㝠為水正也黄帝配土后土為土正也帝王改號於五行之徳各有所尚從其所王之徳次焉木家次位火也木家尚赤以木徳義之府循其母兼其子也夏后氏以金徳王而尚黑殷人以水徳王而尚白水家尚青而尚白者避土家之尚青也土家宜尚白為土者四行之主主于四季五行用事先起于木故土家尚木色青也周人以木徳王而色尚赤此三代之所以不同也及漢之初孫臣賈誼以為漢土徳以五行之傳從所不勝傳移之傳也五行相代常從金木水火土相勝之法也秦在水徳故謂漢據土而剋之劉向父子以為帝出於震故庖犧氏始受木徳其後以母傳子終而復始自神農黄帝下歴唐虞三代而漢得火焉故髙祖始起神母夜號著赤帝之符得天統矣昔共工以水徳間於木火與秦同運非其次故皆不永也以吾觀之帝王之興各本其所出五帝之後以定五徳何以明之漢堯後也堯火徳王故漢為火焉袁紹時耿包曰赤徳衰盡袁為黄􅉙以為袁舜後舜土徳君故勸進焉是知帝王之興各本其所出五帝之後有自來矣今秦顓頊後水徳也故秦為水徳焉以此觀之雖百代可知也臣行第十夫人臣萌芽未動形兆未見昭然獨見存亡之機得失之要豫禁乎未然之前使主超然立乎顯榮之處如此者聖臣也虛心盡意日進善道勉主以禮義諭主以長䇿將順其美匡救其惡如此者大臣也夙興夜寐進賢不懈數稱往古之行事以厲主意如此者忠臣也或問袁子曰故少府楊阜豈非忠臣哉對曰可謂直士忠則我不知何者夫為人臣見主失道指其非而播揚其惡可為直士未為忠也故司空陳羣則不然其談語終日未嘗言人主之非書數十上而外不知君子謂陳羣于是乎長者此為忠矣明察成敗早防而救之塞其間絶其源轉禍以為福君終已無憂如此者智臣也依文奉法任官職事不受贈遺食飲節儉如此者貞臣也國家昏亂所為不䛕敢犯主之嚴顔面言主之過失如此者直臣也是謂六正桓範世要論曰臣有辭拙而意工言逆而事順可不恕之以直乎臣有樸騃而辭訥外疎而内敏可不恕之以質乎臣有犯難以為上離謗以為國可不恕之以忠乎臣有守正以逆衆意執法而違私欲可不恕之以公乎臣有不屈己以求合不禍世以取名可不恕之以直乎臣有從仄陋而進顯言由卑職而陳國事可不恕之以難乎臣有孤特而執節介立而見毁可不恕之以勁乎此七恕者皆所以進善也安官貪祿不務公事與世沉浮左右觀望如此者具臣也主所言皆曰善主所為皆曰可隱而求主之所好而進之以快主之耳目偷合茍容與主為樂不顧後害如此者䛕臣也中實險詖外貌小謹巧言令色又心疾賢所以欲進則明其美隱其惡所以欲退則彰其過匿其美使主賞罰不當號令不行如此者奸臣也智足以飾非辨足以行說内離骨肉之親外妬亂於朝廷如此者䜛臣也專權擅勢以輕為重私門成黨以富其家擅矯主命以自顯貴如此者賊臣也謟主以佞邪墜主于不義朋黨比周以蔽主明使白黑無别是非無聞使主惡布於境内聞于四隣如此者亡國之臣也是謂六邪桓範世要論曰臣有立小忠以售大不忠効小信以成大不信可不慮之以詐乎臣有貌厲而内荏色取仁而行違可不慮之以虚乎臣有害同儕以專朝塞下情以壅上可不慮之以嫉乎臣有進邪說以亂是因似然以傷賢可不慮之以䜛乎臣有因賞以償恩因罰以作威可不慮之以姦乎臣有外顯相薦内陰相除謀事託公而實挾私可不慮之以欺乎臣有事左右以求進託重臣以自結可不慮之以偽乎臣有和同以取說茍合以求進可不慮之以禍乎臣有悅主意以求親悅主言以取容可不慮之以佞乎此九慮者所以防惡也子貢曰陳靈公君臣宣淫于朝泄冶諫而殺之是與比干同也可謂仁乎子曰比干於紂親則叔父官則少師忠欵之心在於存宗廟而已固以必死争之冀身死之後而紂悔寤其本情在乎仁也泄冶位為下大夫無骨肉之親懷寵不去以區區之一身欲正一國之淫昏死而無益可謂懷矣詩云民之多僻無自立辟其泄冶之謂乎或曰叔孫通阿二世意可乎司馬遷曰夫量主而進前哲所韙叔孫生希世度務制禮進退與時變化卒為漢家儒宗古之君子直而不挺曲而不撓大直若詘道同蜲虵蓋謂是也議曰太公云吏不志諫非吾吏也朱雲廷詰張禹曰尸祿保位無能往來可斬也班固曰依世則廢遺違俗則危殆此古人所以難受爵位由此言之存與死其義云何對曰范􅁮稱夫專為義則傷生專為生則騫義若義重于生捨生可也生重于義全生可也或曰然則竇武陳蕃與宦者同朝廷争衡終為所誅為非乎范曄曰桓靈之世若陳蕃之徒咸能樹立風聲抗論昏俗驅馳岨峗之中而與腐夫争衡終取滅亡者彼非不能潔情志違埃霧也憫夫世士以離俗為髙而人倫莫相恤也以遯世為非義故屢退而不去以仁心為己任雖道逺而彌厲及遭值際㑹協䇿竇武可謂萬代一時也功雖不終然其信義足以攜持世心矣議曰此所謂義重于生捨生可也或曰臧洪死張超之難可謂義乎范曄曰雍丘之圍臧洪之感憤壯矣相其徒跣且號束甲請舉誠足憐也夫豪雄之所趣舍其與守義之心異乎若乃締謀連衡懷詐算以相尚者蓋惟勢利所在而已况偏城既危曹袁方睦洪徒指外敵之衡以紓倒懸之㑹忿悁之師兵家所忌可謂懷哭秦之節存荆則未聞昔廣陵太守張超委政臧洪後袁紹亦與結友及曹操圍張超于雍丘洪聞超被圍乃徒跣號泣勒兵救超兼從紹請兵紹不聽超城䧟遂族誅超洪由是怨紹與之絶紹興兵圍之城陷誅死議曰臧洪當縱横之時行平居之義非立功之士也或曰季布壯士而反摧剛為柔髠鉗逃匿為是乎司馬遷曰以項羽之氣而季布以勇顯於楚身屢典軍搴音綺連反旗者數矣可謂壯士然至被刑戮為人奴而不死何其下也彼必自負其材故受辱而不羞欲有所用其未足也故終為漢名將賢者誠重其死夫婢妾賤人感慨而自殺者非勇也其計盡無復之耳議曰太史公曰魏豹彭越雖故賤然已席巻之千里南面稱孤喋血乘勝日有聞矣懐叛逆意及敗不死而虜囚身被刑戮何哉中材以上且羞其行况王者乎彼無異故智略絶人獨患無身耳得攝尺寸之柄其雲蒸龍變欲有所㑹其度以故幽囚而不辭云此則縱横之士務立功者也又藺公贊曰知死必勇非死者難也處死者難方藺相如引璧睨柱及叱秦王左右勢不過誅然士或怯懦不敢發相如一厲其氣威信敵國退而讓廉頗名重太山其處智勇可謂兼之矣此則忠貞之臣誠知死所者也管子曰不恥身在縲紲之中而恥天下之不理不恥不死公子糾而恥威之不申于諸侯此則自負其才以濟世為度者也此皆士之行已死與不死之明效也或曰宗慤之賤也見輕庾業及其貴也請業長史何如裴子野曰夫貧而無戚賤而無悶恬夫天素𢎞此大猷曽原之徳也􅑙志辱身俛眉折脊忍屈庸曹之下貴騁羣雄之上韓黥之志也卑身之事則同居卑之情已異若宗元幹無怍於草具有韓黥之度矣終棄舊惡長者哉宋宗慤之賤也州人庾業豐富待客必方丈其為慤設則粟飯慤亦致飽及為豫州請業為長史也世稱酈寄賣交以其紿吕祿也于理何如班固曰夫賣交者謂見利忘義也若寄父為功臣而執刼雖摧吕祿以安社稷義存君親可也或曰靳允違親守城可謂忠乎徐衆曰靳允於曹公未成君臣母至親也於義應去昔王陵母為項羽所拘母以髙祖必得天下因自殺以固陵志明心無所係然後可得事人盡其死節衛公子開方仕齊十年不歸管仲以其不懷其親安能愛君不可以為相是以求忠臣必於孝子之門允宜先救至親徐庶母為曹公所得劉備乃遣庶歸欲天下者恕人子之情公又宜遣允也魏太祖征冀州使程昱留守甄城張邈叛太祖迎吕布布執范令靳允母太祖遣昱說靳允無以母故使固守范允流涕曰不敢有二也魏文帝問王朗等曰昔子産治鄭人不能欺子賤治單父人不忍欺西門豹治鄴人不敢欺三子之才與君徳孰優對曰君任徳則臣感義而不忍欺君任察則臣畏覺而不能欺君任刑則臣畏罪而不敢欺任徳感義與夫導徳齊禮有恥且格等趨者也任察畏罪與夫導政齊刑免而無恥同歸者也優劣之懸在於權衡非徒鈞銖之覺也或曰季文子公孫𢎞此二人皆折節儉素而毁譽不同何也范􅁮稱夫人利仁者或借仁以從利體義者不期體以合義季文子妾不衣帛魯人以為美談公孫𢎞身服布被汲黯􅏺其多詐事實未殊而毁譽别者何也將體之與利之異乎故前志云仁者安仁智者利仁畏罪者强仁挍其仁者功無以殊核其為仁不得不異安仁者性善者也利仁者力行者也强仁者不得已者也三仁相比則安者優矣議曰夫聖人徳全器無不順中庸已降才則好偏故曰柴也愚參也魯師也辟由也喭由此觀之全徳者鮮矣全徳既鮮則資矯情而力善矣然世惡矯偽而人賢任真使其真貪愚而亦任之可為賢乎對曰吁何為其然夫肖貌天地負陰抱陽雖清濁賢愚其性則異而趨走嗜欲所規則同故靡顔􅕹理人所悅也乘堅駈良人所愛也苦心貞節人所難也狥公滅私人所苦也不以禮教節之則蕩而不制安肯攻苦食淡貞潔公方臨財廉而取與義乎故禮曰欲不可縱志不可滿古語云廉士非不愛財取之以道詩云如切如磋如琢如磨皆矯偽之謂也若肆其愚態隨其鄙情名曰任真而賢之此先王之罪人也故吾以為矯偽者禮義之端任真者貪鄙之主夫强仁者庸可誣乎或曰長平之事白起坑趙卒四十萬可為奇將乎何晏曰白起之降趙卒詐而坑其四十萬豈徒酷之謂乎後亦難以重得志矣向使衆人豫知􅑙之必死則張虛弮猶可畏也况於四十萬被堅執銳哉天下見降秦之將頭顱依山歸秦之衆骸積成丘則後日之戰死當死耳何衆肯服何城肯下乎是為雖能裁四十萬之命而適足以强天下之戰欲以要一朝之功而乃更堅諸侯之守故兵進而自伐其勢軍勝而還喪其計何者設使趙衆復合馬服更生則後日之戰必非前日之對也况今皆使天下為後日乎其所以終不聽復加兵於邯鄲者非但憂平原之補縫患諸侯之救至也徒諱之而不言耳但長平之事秦人十五以上皆荷㦸而向趙矣夫以秦之强而十五已上死傷過半此為破趙之功小傷秦之敗大也又何稱奇哉議曰黄石公稱柔者能制剛弱者能制强柔者徳也剛者賊也柔者人之所助剛者怨之所居是故紂之百克而卒無後項羽兵强終失天下故隨何曰使楚勝則諸侯自危懼而相救夫楚之强適足以致天下之兵耳由是觀之若天下已定藉一戰之勝詐之可也若海内紛紛雄雌未决而失信義于天下敗亡之道也當七國之時諸侯尚强而白起乃坑趙降卒使諸侯畏之而合縱諸侯合縱非秦之利為戰勝而反敗何晏之論當矣或曰樂毅不屠二城遂喪洪業為非乎夏侯𤣥曰觀樂生與燕恵王書其殆乎知機合道以禮終始者歟夫欲極道德之量務以天下為心者豈其局迹當時止於兼并而已哉夫兼并者非樂生之所屑强燕而廢道又非樂生之所求不屑茍利不求小成斯意兼天下者也舉齊之事所以運其機而動四海也圍城而害不加於百姓此仁心著於遐邇矣邁令徳以率列國則幾於湯武之事矣樂生方恢大網以縱二城收人明信以待其弊將使即墨莒人顧仇其上開𢎞廣之路以待田單之徒長容善之風以申齊士之志昭之東海屬之華􅒨我澤如春人應如草思戴燕王仰風聲二城必從則王業隆矣雖淹留於兩邑乃致速於天下也不幸之變世所不圖敗於垂成時變所然若乃逼之以兵刼之以威奓殺傷之殘以示四海之人雖二城幾於可㧞則霸王之事逝其逺矣樂生豈不知㧞二城之速了哉顧城㧞而業􅆾也豈不慮不速之致變哉顧業速與變同也由是觀之樂生之不屠二城未可量也或曰樂毅相弱燕破强齊合五國之兵雪君王之恥圍城而不急攻將令道窮而義服則仁者之師咸以為謨謀勝武侯也可乎張輔曰夫以五國之兵共伐一齊不足為强大戰濟西伏尸流血不足為仁彼孔明包文武之徳長嘯俟時劉𤣥徳以知人之明屢造其廬咨以濟世奇䇿泉涌遂東説孫權北抗大魏以乗勝之師翼佐取蜀及𤣥徳臨終禪以大位在擾攘之際立童䝉之主設官分職班叙衆才文以治内武以折衝然後布其恩澤於國中之人其行軍也路不拾遺毫毛不犯勲業垂濟而隕勸其遺文謨謀𢎞逺矣已有功則讓于下下有闕則躬自咎見善則遷納諫則改故聲烈震遐邇也孟子曰聞伯夷之風貪夫自廉余以為覩孔明之忠奸臣立節殆將與伊吕争烈豈徒以樂毅為伍哉或曰商鞅起徒步干孝公挾三術之略吞六國之縱使秦業帝可為霸者之佐乎劉向曰夫商君内急耕戰之業外重戰伐之賞不阿貴寵不偏疎逺雖書云無偏無黨詩云周道如砥其直如矢司馬法之厲戎士周后稷之勸農業無以易此此所以并諸侯也故孫卿曰四世有勝非幸也數也夫霸君若齊桓晉文者桓不倍柯之盟文不負原之期而諸侯信之此管仲咎犯知謀也今商君倍公子卭之舊恩弃交魏之明信詐取三軍之衆故諸侯畏其强而莫親信也藉使孝公遇齊桓晉文得諸侯之統將合諸侯之君驅天下之兵以伐秦秦則亡矣天下無桓文之君故秦得以兼諸侯也衛鞅始自以為知王霸之徳原其事不倫也昔周召公施美政其死也後世思之蔽芾甘棠之詩是嘗舍於樹下不忍伐其樹况害於身乎管仲奪伯氏駢邑三百户無怨言今衛鞅内刻刀鋸之刑外深鈇鉞之誅身死車裂其去霸者之佐亦逺矣然孝公殺之亦非也可輔而用使衛鞅施寛平之法加之以恩申之以信庶幾霸者之佐乎議曰商鞅初因景監求見秦孝公説以帝道孝公意不入時時睡後又與鞅語不知膝之過席景監曰子何以申吾君君之歡甚也鞅曰始吾說公以帝道而君曰久逺安能邑邑待數十百年以子孫成事乎吾又說以伯道其意欲之而未能也吾又以强國之術說君君大悅之然亦難以比徳于殷周矣昔齊桓公與魯莊公㑹于柯而盟曹沫以匕首刼桓公反魯侵地桓公許之後悔欲无與魯地而殺曹沬管仲曰弃信于諸侯失天下之援不可于是與曹沬三敗所亡地諸侯聞之皆信齊而欲附焉山戎伐燕燕告急于齊齊桓公救燕而還燕莊公送桓公入齊境桓公曰非天子諸侯送不出境吾不可以無禮于燕于是分溝割燕君所至與燕君令復修召公之政納貢于周諸侯聞之皆從齊桓公于是始霸由此觀之商鞅深刻弃信非霸者之佐明矣然孝公欲速不從鞅言孝公過也商鞅牽于世迫于君不得行其志耳劉向以鞅無霸王之術謬矣諸葛亮以馬謖敗於街亭殺之後蔣琬謂亮曰昔楚殺得臣然後文公喜可知也天下未定而戮智計之士豈不惜哉亮流涕曰孫武所以能制勝者用法明也是以楊干亂法魏絳戮之四海分裂兵交方始若復廢法何用討賊耶習鑿齒曰諸葛亮之不能兼上國也豈不宜哉夫晉人視林父之後濟故廢法而收功楚成闇得臣之益已故殺之以重敗今蜀僻陋一方才少上國而殺其駿傑退收駑下之用明法勝才不師三敗之道將以成業不亦難乎晉侯使荀桓子與楚戰于邲桓子敗歸而請死晉侯欲許之士貞子曰不可城濮之役晉師三日館穀文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶鬭况國相乎及楚殺子玉公喜而後可知曰是晉再克而楚再敗也楚是以再世不競今天或者大警晉也而又殺林父以重楚勝其無乃不競乎林父之事君也進思盡忠退思補過社稷之衛也君若之何殺之夫其敗也如日月之蝕何損于明晉侯使之復其位也代以周勃功大霍光何如對曰勃本髙帝大臣衆所歸向居太尉位擁兵百萬既有陳平王陵之力又有朱虛諸王之援酈寄遊說以譎諸吕因衆之心易以濟事若霍光者以倉卒之際受寄託之任輔弼幼主天下晏然遭燕王旦之亂誅除凶逆以靖王室廢昌邑立孝宣任漢家之重隆中興之祚㕘聲伊周為漢賢相推驗事效優劣明矣袁盎問漢文帝曰陛下以絳侯周勃何如人上曰社稷臣也盎曰可謂功臣非社稷臣社稷臣者主在與在主亡與亡方吕后時劉氏不絶如帶絳侯為太尉主兵柄不能正吕氏崩大臣相與誅諸吕太尉主兵適㑹其成功所謂功臣非社稷臣也後漢陳蕃上疏薦徐穉袁閎韋著三人帝問蕃曰三人誰為先後蕃曰閎生公族聞道漸訓著長於三輔禮義之俗所謂不扶自直不鏤自彫至於穉者爰自江南卑薄之域而角立傑出宜當為先或曰謝安石為相可與何人為比虞南曰昔顧雍封侯之日而家人不知前代稱其質重莫以為偶夫以東晉衰微壃塲日駭况永固苻堅字也六夷英主親率百萬苻融儁才名相執銳先駈厲虎狼之爪牙騁長蛇之鋒鍔先築賔館以待晉君强弱而論鴻毛太山不足為喻文靖深拒桓冲之援不喜謝𤣥之書則勝敗之數固已存於胷中矣夫斯人也豈以區區萬户之封動其方寸者歟若論其度量近古以來未見其匹隋煬帝在東宫嘗謂賀若弼曰楊素韓擒虎史萬歲三人俱稱良將其間優劣何如對曰楊素是猛將非謀將議曰膽氣果敢猛將也淵而有謀謀將也韓擒虎是鬭將非領將議曰奮㨗趫悍鬭將也御軍齊肅領將也史萬歲是騎將非大將議曰領一偏師所向無敵騎將也包羅英雄使羣才各當其用大將也太子曰善故自六正至於問將皆人臣得失之效也古語云禹以夏王桀以夏亡湯以殷王紂以殷亡闔廬以吳戰勝無敵於天下而夫差以見擒於越穆公以秦顯名尊號而二世以刼於望夷其所以君王者同而功迹不等者所任異也是以成王處襁褓而朝諸侯周公用事也趙武靈王年五十而餓死于沙丘任李兊也故魏有公子無忌削地復得趙任藺相如秦兵不敢出楚有申包胥而昭王反位齊有田單而襄王得國因斯而談夫有國者不能陶冶世俗甄綜人物論邪正之得失撮霸王之餘議而能立功成名者未之前聞故知量能授官至理之徳徳表第十一孔子曰性相近也習相逺也言嗜慾之本同而遷染之塗異也夫刻意則行不肆牽物則其志流是以聖人導人理性裁抑流宕慎其所與節其所偏故傳曰審好惡理情性而王道畢矣治性之道必審己之所有餘而强其所不足蓋聰明疏通者戒於太察寡聞少見者戒於壅蔽勇猛剛强者戒於太暴仁愛温良者戒於無斷湛静安舒者戒於後時廣心浩大者戒於遺忘人物志曰厲直剛毅材在矯正失在激訐强毅之人佷剛不和不戒其强之搪突而以順為撓厲其亢是故可與立法難與入㣲也柔順安恕美在寛容失在少决柔順之人緩心寛斷不戒其事之不攝而以亢為劌安其舒是故可與循常難與權疑也雄捍桀健任在膽烈失在少忌雄捍之人氣奮英决不戒其勇之毁跌而以順為恇竭其勢是故可與涉難難與居屈也精良畏慎善在恭謹失在多疑精慎之人畏患多忌不戒其懦于為義而以勇為狎増其疑是故可與保全難與立節也强揩堅勁用在楨幹失在專固凌揩之人秉意勁持不戒其情之固䕶而以辨為虚强其專是故可與持正難與附衆也論辨理繹能在釋結失在流宕博辨之人論理贍給不戒其辭之浮濫而以揩為繫遂其流是故可與汎序難與立約也普博周洽崇在覆裕失在溷濁𢎞普之人意愛周洽不戒其交之溷雜而以介為狷廣其濁是故可與撫衆難與厲俗也清介㢘潔節在儉固失在拘局狷介之人眩清激濁不戒其道之隘狹而以普為穢益其拘是故可與守節難與變通也休動磊砢業在攀躋失在疏越休動之人志慕超越不戒其意之太猥而以静為滯果其銳是故可與進趨難與持後也沉静機宻精在𤣥㣲失在遲懦沉静之人道思迴復不戒其静之遲後而以動為疏美其懦是故可與深慮難與㨗速也樸露徑盡質在中誠失在不㣲樸露之人中疑實确不戒其質之野直而以譎為誕露其誠是故可與立信難與消息也多智韜情權在譎略失在依違韜譎之人原度取容不戒其術之離正而以盡為愚貴其虚是故可以贊善難與矯違也此拘亢之材非中庸之徳也文子曰凡人之道心欲小志欲大智欲圓行欲方能欲多事欲少所謂心小者慮患未生戒禍慎㣲不縱其欲也志大者兼包萬國一齊殊俗是非輻凑中為之轂也智圓者終始無端方流四逺深泉而不竭也行方者直立而不撓素白而不汚窮不易操達不肆志也能多者文武備具動静中儀也事少者執約以治廣處静以待躁也夫天道極即反盈則損故聰明廣智守以愚多聞博辯守以儉武力強毅守以畏富貴廣大守以狹徳施天下守以讓此五者先王所以守天下也傳曰無始亂無怙富無恃寵無違同無傲禮無驕能無復怒無謀非徳無犯非義此九言古人所以立身也玉鈐經曰夫以明示者淺有過不自知者弊迷而不反者流以言取怒者禍令與心乖者廢後令繆前者毁怒而無威者犯好衆辱人者殃戮辱所任者危慢其所敬者凶貌合心離者孤親佞逺忠者亡信䜛弃賢者惛私人以官者浮女謁公行者亂羣下外恩者淪凌下取勝者侵名不勝實者耗自厚薄人者弃薄施厚望者不報貴而忘賤者不久用人不得其正者殆為人擇官者失决于不仁者險陰謀外泄者敗厚歛薄施者彫此自理之大體也孫卿曰口能言之身能行之國寳也口不能言身能行之國器也口能言之身不能行之國用也口言善身行惡國妖也故傅子曰立徳之本莫尚乎正心心正而後身正身正而後左右正左右正而後朝廷正朝廷正而後國家正國家正而後天下正故天下不正修之家家不正修之朝廷朝廷不正修之左右左右不正修之身身不正修之心所修彌近所濟彌遠禹湯罪已其興也勃焉正心之謂也尸子曰心者身之君也天子以天下受令于心心不當則天下禍諸侯以國受令于心心不當則國亡匹夫以身受令于心心不當則身為僇矣理亂第十二夫明察六主以觀君徳審惟九風以定國常探其四亂覈其四危則理亂可知矣何謂六主荀恱曰體故性仁心明志同動以為人不以為己是謂王主議曰王主者謂天姿仁徳克己恕躬好問力行動以從義不以從情是謂治主議曰治主者謂抑情割欲勤事守業不敢怠荒動以先公不以先私是謂存主議曰存主者謂拘法守律悖逆交争公私並行一得一失不純道度是謂衰主情過於義私多于公制度踰限政教失常是謂危主親用䜛邪放逐忠賢縱情追欲不顧禮度出入游放不拘儀禁賞賜行私以越公用忿怒施罰以踰法理遂非文過而不知改忠言壅塞直諫誅戮是謂亡主故王主能致興平治主能修其政存主能保其國衰主遭無難則庶幾能全有難則殆危主遭無難則幸而免有難則亡亡主必亡而已矣何謂九風君臣親而有禮百寮和而不同讓而不争勤而不怨唯職是司此理國之風也尹文子曰上不勝其下下不犯其上上下不相勝國犯故禁令行人人無私雖經嶮易而國不可侵治也禮俗不一職位不重小臣讒疾庶人作議此衰國之風也尹文子曰君年長多妾媵少子孫疏强宗衰國也君臣争明朝廷争功大夫争名庶人争利此乖國之風也上多欲下多端法不定政多門此亂國之風也尹文子曰君寵臣臣愛君公法廢私欲行亂國也以侈為博以伉為髙以濫為通遵禮謂之拘守法謂之固此荒國之風也議曰夫晉家尚于浮虛所以敗也此之謂矣以苛為察以利為公以割下為能以附上為忠此叛國之風也叔向曰大臣重祿而不極諌近臣畏罪而不敢言下情不上通此患之大者也上下相疏内外相疑小臣争寵大臣争權此危國之風也上不訪下下不諫上婦言用私政行此亡國之風也尹文子曰國貧小家富大君權輕臣勢重亡國也内無專寵外無近習支庶繁息長幼不亂昌國也農桑以時倉廩充實兵甲勁利封疆修理强國也文子曰夫亂國若盛治國若虛亡國若不足存國若有餘虛者非無節人各守其職也盛者非多人皆邀于末也有餘非多財欲事寡也不足者非無貨人鮮而費多也何謂四亂管子曰内有疑妻之妾此家亂也庶有疑嫡之子此宗亂也朝有疑相之臣此國亂也任官無能此衆亂也故曰立天子者不使諸侯疑焉立諸侯者不使大夫疑焉立正妻者不使嬖妾疑焉立嫡子者不使庶孽疑焉疑則動兩則争雜則相傷故臣有兩位者國必亂臣兩位而國不亂者君猶在也恃君不亂失君必亂矣子兩位者家必亂子兩位而家不亂者親猶存也恃親不亂失親必亂矣臣疑其君無不危之國孽疑其宗無不危之家也何謂四危又曰卿相不得衆國之危也大臣不和同國之危也兵主不足畏國之危也民不懷其産國之危也此治亂之形也凡為人上者法術明而賞罰必者雖無言語而勢自治法術不明而賞罰不必者雖日號令然勢自亂管子曰理國有三器亂國有六攻明君若能勝六攻而立三器故國理不肖君不能勝六攻而立三器故國亂三器者何也曰號令也斧鉞也祿賞也六攻者何也曰親也賔也貨也色也巧佞也玩好也三器之用何也曰非號令無以使下非斧鉞無以威衆非祿賞無以勸人六攻之敗何也曰雖不聽而可以得存雖犯禁而可以得免雖無功而可以得富夫國有不聽而可以得存者則號令不足以使下有犯禁而可以得免者則斧鉞不足以威衆有無功而可以得富者則祿賞不足以勸人號令不足以使下斧鉞不足以威衆祿賞不足以勸人則人君無以自守也是故勢理者雖委之不亂勢亂者雖勤之不治堯舜拱己無為而有餘勢理也胡亥王莽馳騖而不足勢亂也商子曰法令者人之命也為治之本也一兎走而百人逐之非以兎可分以為百由名分之未定也夫賣兎者滿市盜不敢取由名分之定也故夫名分定勢治之道也名分不夫定勢亂之道也故勢治者不可亂也勢亂者不可治也勢亂而欲治之愈亂矣勢治而治之則治矣故聖人治治不治亂也聖人為人作法必使之明白易知愚智徧能之故聖人立天下而天下無刑死者非可刑殺而不刑殺也萬人皆知所以辟禍就福而皆自治也明主因治而治之故天下大治也故曰善者求之於勢不責於人是故明主審法度而布教令則天下治矣左傳曰國將亡必多制杜預云數變法也論曰夫能匡世輔政之臣必先明於盛衰之道通于成敗之數審于治亂之勢達于用捨之宜然後臨機而不惑見疑而能斷為王者之佐未有不由斯者矣長短經卷二
