  - {type: variant, offset: 13205, length: 1634, content: 待韓陣專軍并銳觸魏之不意魏軍既敗韓軍自潰以是之故故能有功皆計利形勢自然之理何神之有今秦軍破趙軍於長平不遂以時乘其振懼而滅之畏而釋之使得耕稼以益蓄積養孤長幼以益其眾繕理兵甲以益其強增浚城池以益其固主折節以下其臣臣推體以下死士至平原之屬皆令妻妾補縫於行伍之閒臣民一心上下同力猶句踐困於會稽之時也以今伐之趙必固守挑其軍戰必不肯出圍共國都必不可剋攻其列城必不可拔掠於郊野必無所得兵久無功諸侯生心外救必至臣見其害未覩其利又病不能行應侯慚而退秦乃使王齕將伐趙楚魏果救之也張儀說燕昭王曰大王之所親信莫如趙昔趙襄子嘗以其姊為代王妻欲并代約與代王遇於句注之塞乃令工人作為金斗長其尾令可以擊人與代王飲陰告廚人曰即酒酣樂進熱啜反斗以擊之於是酒酣樂取熱啜廚人進斟因反斗擊代王殺之肝脅塗地其姊聞之因磨笄以自殺故至今有磨笄之山天下莫不聞至漢高祖時陳豨以趙相國監趙代邊兵舉兵反上自行至邯鄲喜曰豨不南據漳水北守邯鄲吾知其無能為也及豨敗上曰代居常山北趙乃從山南有之遠乃立二子為代王也夫趙王之狼戾無親大王之所明見且以趙為可親乎趙興兵攻燕再圍燕都而劫大王大王割十城以謝今趙王已入朝澠池效河閒事以秦今大王不事秦秦下甲雲中九原驅趙而攻燕則易水長城非王有也今王事秦秦王必喜趙不敢妄動是西有強秦之援南無齊趙之患是故願大王孰計之燕王聽張儀張儀歸報秦燕王使太子丹入質於秦秦欲使張唐相燕與共伐趙以廣河閒地張唐謂呂不韋曰臣嘗為昭王伐趙趙怨臣今之燕必經趙臣不可行不韋不快未有以強之其舍人甘羅年十二謂不韋曰臣請為君行之遂見張唐曰君之功孰與武安君唐曰武安君南挫強楚北滅燕趙戰勝攻取破城隳邑不可勝數臣之功不如也甘羅曰應侯之用於秦孰與文信侯專唐曰應侯不如文信侯專甘羅曰昔應侯欲伐趙武安君難之去咸陽十里賜死於杜郵今文信侯自請君相燕而不肯行臣不知君所死處也張唐懼曰請因孺子行行有日矣甘羅又謂文信侯曰借臣車五乘請為張唐先報趙文信侯遣之甘羅如趙說王曰王聞燕太子丹入秦乎曰聞之聞張唐之相燕乎曰聞之甘羅曰燕太子丹入秦者燕不欺秦也張唐相燕者秦不欺燕也燕秦不相欺無異故欲攻趙而廣河閒地王不如齎臣五城以廣河閒臣請歸燕太子與強趙攻弱燕趙王曰善立割五城與秦燕太子聞而歸趙乃攻燕得二十城令秦有其十也於是楚人李斯梁人尉繚說於秦王曰秦自孝公已來周室卑微諸侯相兼關東為六國秦之乘勝侵諸侯蓋六代矣今諸侯服秦譬若郡縣其君臣俱恐若或合縱而出不意此乃智伯夫差湣王所以亡也願王無愛財賂其豪臣以亂其謀秦不過亡三十萬金則諸侯可盡秦王從其計陰遣謀士齎金玉以遊諸侯諸侯名士可與財者厚遺給之不肯者利劍刺之離其君臣之計乃使良將隨其後遂并諸侯天下之士合縱相聚於趙而欲攻秦應侯曰王勿憂也請令廢之秦於天下之士非有怨也相聚而攻秦者以欲富貴耳王見王之狗乎數千百狗為群臥者起者行者行止者無相與鬭者投之一骨則輕起相呀何者有爭意也今令載五千金隨唐睢并載奇樂居武安高會相飲散不能三千金天下之士相與鬭也秦既吞天下患周之敗以為弱見奪於是笑三代盪滅古法孔融曰古者王畿之制千里寰內不以封諸侯祭公曰夫先王之制邦內甸服邦外侯服侯衛賓服夷蠻要服戎狄荒服甸服者祭侯服者祀賓服者享要服者貢荒服者王日祭月祀時享歲貢終王先王之訓也有不祭則修德有不祀則修言有不享則修文有不貢則修名有不王則修德序成而又不至則修刑於是有刑不祭伐不祀征不享讓不貢告不王於是有刑罰之辟有攻伐之兵有征伐之備有威讓之命有文告之辭而又不至則增修其德無勤人於遠此古制也削去五等改為郡縣自號為皇帝而子弟為匹夫內無骨肉本根之輔外無尺土蕃翼之衛吳陳奮其白梃木杖也劉項隨而斃之故曰周過其歷秦不及其數國勢然也荀悅曰古之建國或小或大者監前之弊變而通之也夏殷之時蓋不過百里故諸侯微而天子強桀紂得肆其虐害紂脯邢侯而醢鬼侯以文王之盛德不免於牖里周承其弊故建大國方五百里所以崇寵諸侯而自損也至於末流諸侯強大更相侵伐而周室卑微禍難用作秦承其弊不能正其制以求其中而遂廢諸侯改為郡縣以壹威權以專天下其意主以自為非以為人也故秦得擅海內之勢無所拘忌肆行奢淫暴虐於天下然十四年而滅矣故人主失, WYG: 薛}
