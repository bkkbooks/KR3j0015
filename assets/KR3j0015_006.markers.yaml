  - {type: variant, offset: 5143, length: 1, content: 獻, WYG: 向漢中討張魯内懐恐懼别駕張松説璋曰曹}
  - {type: variant, offset: 5143, length: 1, content: 獻, krp: 向漢中討張魯内懐恐懼别駕張松説璋曰曹}
  - {type: variant, offset: 5145, length: 1, content: 封, WYG: 兵強無敵於天下若因張魯之資以取蜀土誰能禦之劉豫州使君之宗而曹公之深讐也若使之討魯魯必破魯破則益州強曹公雖来無能為也璋然之遣法正迎先主時黄權諌曰左將軍有梟名今以部曲遇之則不滿其心以客禮待之則一國不容二君若客有㤗山之安則主有累卵之危願且閉境以待河清時劉巴亦諫曰備雄傑人也入必有為不可内也既入巴又曰若使備討張魯是放虎於山林也璋並不聼先主與璋㑹涪璋既還成都先主當為璋北征漢中統後説備曰隂選精兵晝夜兼道徑襲成都璋既不武又素無豫備大軍卒至一舉便定此上計也楊懐髙沛璋之名將各仗強兵據守關頭聞素有牋来諫璋使發遣將軍未至遣與相聞説荆州有急欲還救之並使装束外作歸形此二子既服將軍英名又喜將軍之去必乗輕騎来見將軍因此執之進取其兵乃向成都此中計也返還白帝連引荆州徐還圗之此下計也若沉吟不去將至大困不可久矣先主然其中計初張松法正見備備以私意接納盡其慇懃因問蜀中兵器府庫人馬衆寡及諸要害松等具為言之又畫地圗處置山川由是盡知益州虚實先主北到葭萌未即討魯厚樹恩徳以収衆心明年曹公征孫權權呼先主自救備乃從璋求}
