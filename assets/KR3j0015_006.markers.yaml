  - {type: 'tls:seg', offset: 5338, content: '', id: KR3j0015_CH7x2006_006-1a.998}
  - {type: variant, offset: 5338, length: 0, content: '', WYG: 之衆據正道而臨有罪可得干擬者哉亮死後魏令鄧艾伐蜀蜀兵敗後主用譙周筞降魏議曰國君為社禝死則死為社禝亡則亡譙周勸後主降魏可乎孫盛曰春秋之義國君死社禝卿大夫死位况稱天子而辱於人乎周謂萬乗之君偷生茍存亡禮希利要冀㣲榮惑矣且以事勢言之理有未盡何者禪雖庸主實無桀紂之酷戰雖屢北未有土崩之亂縱不能君臣固守背城一戰自可退次東鄙以思後圖是時羅憲以重兵據白帝霍弋以強卒鎮夜郎蜀土險狭山水峻隔絶巘激湍非歩卒所渉若悉収舟檝保據江州徴兵南中乞師東國如此則姜廖五將自然雲從吴之二師承命電赴何投寄之無所而慮於必亡耶魏師之来搴國大舉欲追則舟檝靡資欲㽞則師老多虞且屈伸有㑹情勢代起徐因思舊之人以攻驕惰之卒此昭王所以走闔閭田單所以摧騎刧也何為忩忩遽自囚虜不堅壁於敵人致斫石之至恨哉葛生有云事不濟即亡耳安能復為之下壯哉斯言可以立懦夫之志矣觀古燕齊荆越之敗或國覆主滅或魚懸鳥竄終能建功立事康復社稷豈曰天助抑人謀也向使懐茍存之計納譙周之言何頹基之能搆令名之可獲哉禪既闇主周實駑臣方之申包胥田單范蠡大夫種不亦逺乎晋時李特復據蜀初特在蜀暴横晋乃募取特兄弟許以重賞未暇宣聞遂不蔵李特子驤見書悉改其購云敢斬六郡人頭首李任閻趙等及氐侯王一人詣官許以重賞六郡人見之大駭遂並反歸特益州牧羅尚遣隗伯攻李雄於郫城迭有勝負冬十月雄與朴泰金鞭之流血令泰佯得罪奔尚欲為内應尚信之以兵随泰雄内外擊之大破尚軍雄乗勝追躡夜至城下因稱萬嵗誑尚城中云已得郫城尚信之開少城門雄軍得入尚遂遁走遂克成都稱王也晋桓温滅之至宋義熈中譙縱又殺益州刺史毛璩於成都稱成都王初毛璩使任約赴義軍軍至枝江㑹劉毅敗約奔桓振璩聞約奔桓振也自將兵三千由外水下譙縱為之恭軍使將梁州兵五百人從内水發梁州人不欲東遂推縱為主反攻涪城克之璩聞難作自洛陽歩還至成都為縱黨所殺也宋使朱齡石滅之此蜀國形也議曰吴蜀脣齒之國蜀滅則吴亡信乎陸士衡曰夫蜀蓋蕃援之與國而非吴人之存亡也何則其郊境之接重山積險陸無長轂之徑川隘流迅水有驚波之難雖有鋭師百萬啓行不過千夫舳艫千里前驅不過百艦故劉氏之伐陸公譬之長蛇其勢然也故黄權稱曰可以徃難以返此兵之絶地也古云夫道狭路嶮譬如兩䑕闘於穴將勇者勝也吳丑為星紀吳越之分上應斗牛之宿下當少陽之位今之㑹稽九江丹陽豫章廬江廣陵六安臨淮皆吳之分野今蒼梧鬱林合浦交趾九真日南南海皆越之分野古人有言曰大江之南五湖之間其人輕心揚州保強保也恃三代要服不及以正國有道則後服無道則先叛故𫝊曰吳為封豕長蛇荐食上國為上國之患非一日之積也漢髙帝時淮南王英布反布都六安今夀州是也反書聞上召諸將問布反為之奈何汝隂侯滕公曰臣客故楚令尹薛公有籌䇿可問初滕公問令尹令尹曰是故當反滕公曰上裂地而王之踈爵而賞之南面而立萬乗之主其反何也令尹曰徃年殺彭越前年殺韓信此三人同功一體之人也自疑禍及故反耳上乃召見問薛公薛公對曰布反不足怪也使布出於上計山東非漢之有也出於中計勝敗之數未可知也出於下計陛下安枕而卧矣上曰何謂上中下計令尹曰東取吴蘇州是也西取楚荆州是也并齊取魯齊青州魯兖州𫝊檄燕趙固守其所山東非漢之有也議曰合從山東為持乆之䇿上計也何謂中計東取吴西取楚并韓取魏據敖}
