  - {type: punctuation, offset: 5134, content: ，, id: KR3j0015_CH7x2006_006-bkkpn1143}
  - {type: 'tls:seg', offset: 5134, content: '', id: KR3j0015_CH7x2006_006-1a.955}
  - {type: variant, offset: 5136, length: 0, content: '', WYG: 刺史威輕乃建議改置牧伯鎮安方夏清選重臣以居其任以焉為益州牧是時梁州賊馬相聚疲役之人數千先殺綿竹令進攻雒縣州從事賈龍先領兵數百在犍為遂糾合吏人攻相破之乃選吏迎焉遂領益州牧也焉死子璋立州大吏趙韙等貪璋温仁立為刺史初南陽三輔人數萬户流入益州焉悉収以為兵名曰東州兵璋性柔寛無威畧東州人侵暴趙韙因人情不緝乃結州中大}
  - {type: variant, offset: 5136, length: 0, content: '', krp: 刺史威輕乃建議改置牧伯鎮安方夏清選重臣以居其任以焉為益州牧是時梁州賊馬相聚疲役之人數千先殺綿竹令進攻雒縣州從事賈龍先領兵數百在犍為遂糾合吏人攻相破之乃選吏迎焉遂領益州牧也焉死子璋立州大吏趙韙等貪璋温仁立為刺史初南陽三輔人數萬户流入益州焉悉収以為兵名曰東州兵璋性柔寛無威畧東州人侵暴趙韙因人情不緝乃結州中大}
