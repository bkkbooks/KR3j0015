  - {type: variant, offset: 5844, length: 234, content: 且夫韓魏之所以畏秦者為與秦接境壤界也兵出相當不出十日而戰勝存亡之機決矣韓魏戰而勝秦則兵半折四境不守戰而不勝則國已危亡隨其後也是故韓魏之所以重與秦戰而輕為之臣也今秦之攻齊則不然倍韓魏之地過衛晉陽之道經乎亢父之險車不得方軌騎不得比行百人守險千人不敢過也秦雖欲深入則狼顧恐韓魏之議其後是故恫疑虛喝驕矜而不敢進夫不深料秦之無柰齊何也而欲西面事之是群臣之計過也今無事秦之名而有強國之實故願大王少留意計之齊王曰善蘇秦說閔王曰臣聞用兵而喜先下者憂約結而喜主怨者孤夫後起者藉也而遠怨者, WYG: ''}
