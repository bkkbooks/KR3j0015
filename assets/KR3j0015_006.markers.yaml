  - {type: variant, offset: 8009, length: 1, content: 馳, krp: 之鑒聖上明哲宰相忠賢將比隆黄軒侔功徃代銜命来征思聞嘉響果煩来使告以徳音此非}
  - {type: variant, offset: 8011, length: 1, content: 走, WYG: 事乃天意也昔㣲子歸周實為上賔君子豹變義存大易来辭謙冲以禮舉櫬此皆前哲歸命之典全國為上破國次之自非通明智逹何以見王者之義乎後主至洛陽䇿命之為安樂公曰蓋統天載物以咸寜為大光宅天下以時雍為盛乃者漢氏失統六合震擾我太祖承運龍興𢎞濟八極是用應天順人撫有區夏於時乃考因羣傑虎争九服}
