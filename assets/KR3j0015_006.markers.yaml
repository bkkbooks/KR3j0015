  - {type: variant, offset: 10160, length: 3043, content: 號用兵未嘗不以周為終始是何也則祭器在焉欲器之至而忘弒君之亂今韓以器之楚臣恐天下以器讎楚於是楚計輟不行秦武王使樗里疾以車百乘入周周君迎之甚敬楚王讓周以其重秦客也游勝為周謂楚王曰昔者智伯欲伐仉猶遺大鐘載以廣車因隨之以兵仉猶卒亡無備故也齊桓公之伐蔡也號曰誅楚其實襲蔡今秦者虎狼之國有獨吞天下之心使樗里疾以車百乘入周周君懼焉以蔡仉猶為戒故使長兵居前短弩居後名曰衛疾而實囚之周君豈能無憂國哉恐一旦國亡而憂大王也楚王乃悅楚襄王有疾太子質於秦不得歸黃歇說秦相應侯曰今楚王疾恐不起秦不如歸太子太子即位其事秦必謹若不歸則咸陽一布衣耳楚更立太子必不事秦失與國而絕萬乘之和非計也願相國慮之應侯為言於秦王王不肯乃遁也張儀如韓說韓宣王曰韓地險惡山居五穀所生非菽而麥地方不過九百里無二年之食料大王之卒悉舉不過三十萬而厮徒負養在其中矣今秦帶甲百萬車千乘騎萬匹虎賁之士跿訽科頭貫頤奮戟者不可勝數山東被甲冑蒙冑以會戰秦人捐甲徒裼以趨敵左挈人頭右挾生虜秦逐山東之卒猶孟賁之與怯夫以輕重相壓猶烏獲之與嬰兒諸侯不料地之弱食之寡而聽縱人之甘言好辭比周以相飾詿誤其主無過此者大王不事秦秦下甲據宜陽斷韓之地東取成皋滎陽則鴻臺之宮桑林之苑非王有也夫塞成皋絕上地則國之國分矣故為大王計莫如為秦秦之所欲莫如弱楚而能弱楚者莫如韓非以韓能強於楚也其勢然也今西面而事秦以攻楚秦王必喜夫攻楚而不私其地轉禍而悅秦計無便於此者宣王聽之范睢說秦王曰秦韓之地形相錯如繡秦之有韓譬如木之有蠹人之有腹心病也天下無變則已有變其為秦患者孰大於韓乎王何不收韓王曰吾固欲收韓韓不聽為之奈何對曰韓安得不聽王若下兵攻滎陽則成皋之道不通北斷太行之道則上黨之師不下王一興兵而攻滎陽則其國斷而為三韓必見危亡矣安得不聽若聽則霸事可慮矣王曰善乃從之張儀說齊湣王曰天下強國無過齊者大臣父兄殷眾富樂然為大王計者皆為一時之說不顧百代之利縱人說大王者必曰齊西有強趙南有韓梁齊負海之國也地廣民眾兵強士勇雖有百秦將無柰齊何也大王賢其說而不計其實臣聞齊與魯三戰而魯三勝國以危亡隨其後雖有戰勝之名而有破亡之實是何也齊大而魯小也今秦之與齊也猶齊之與魯也今齊楚嫁女娶婦為昆弟之國韓獻宜陽魏效河外趙入朝歌澠池割河閒以事秦大王不事秦秦驅韓梁攻齊之南地悉趙兵渡清河指博關臨菑即墨非王有也國一旦見攻雖欲事秦不可得也是故願大王孰計之齊王許之燕攻齊取七十餘城唯莒即墨不下齊田單以即墨破燕殺騎劫燕將懼誅而保聊城不敢歸田單攻之歲餘不下魯連乃為書約之以矢射城中遺燕將軍曰吾聞之智者不倍時而棄利勇士不怯死而滅名忠臣不先身而後君今君行一韓之忿不顧燕王之無臣非忠也殺身亡聊城而威不信於齊非勇也功廢名滅後世無稱非智也故智者不再計勇者不怯死今死生榮辱尊卑貴賤此其時也願公詳計而無與俗同且楚攻齊之南陽魏攻平陸而齊無南面之心以為亡南陽之害小不如得濟北之利大故定計而堅守之今秦人下兵魏不敢東面橫秦之勢成則楚國之形危且前棄南陽斷右壤存濟北計猶且為之也今楚魏交兵於齊而燕救不至以全齊之兵無天下之規與聊城共據期年之弊即臣見公之不能得也齊之必決於聊公無再計彼燕王大亂上下迷惑栗腹以百萬之眾五折於外萬乘之國被圍於趙壤削主困為天下笑國敝禍多人無所歸今又以敝聊之人距全齊之兵期年不解是墨翟之守也食士炊骨士無反外之心是孫臏吳起之功也能見於天下矣故為公計者不如罷兵休士全軍歸報燕王燕王必喜士民見公如見父母攘臂而議於世公業可明也意者懟燕棄世東遊於齊乎請裂地定封富比乎陶衛世世稱孤此亦一計也二者顯名厚實願公察之熟計而審處一焉且吾聞之效小節者不能行大威惡小恥者不能成榮名昔管仲射桓公中其鉤篡也遺公子糾不能死怯也束縛桎梏辱也此三行者鄉里不通世主不臣使管仲終窮抑而不出不出不免為辱人賤行然而管子棄三行之過據齊國之政一匡天下九合諸侯名高天下光照鄰國曹沫為魯君將三戰而喪地千里使曹子計不顧後死而不生則不免為敗軍擒將曹子以一劍之任劫桓公於壇位之上顏色不變辭氣不悖三戰之所喪一朝而反之天下震動名傳後世若此二公非不能行小節死小恥也以為殺身絕世功名不立非智也故去忿恚之心而成終身之名故業與三王爭流名與天壤相敝也公其圖之燕將得書曰敬聞命矣遂自刎昔雍門周以琴見齊孟嘗君孟嘗君曰先生鼓琴亦能令人悲乎對曰臣之所能令悲者先貴而後賤古富而今貧不若擯壓窮巷不及四鄰不若身材高妙懷質抱真逢讒離謗怨結而不得伸不若交歡而結愛無怨而生離遠赴他國無相見期不若幼無父母壯無妻兒出以野澤為都入用窟穴為家困於朝夕無所假貸若此人者但聞雛鳥之號秋風鳴條則傷心矣臣一為之援琴而長太息未有不悽惻而涕泣者也今足下居則廣廈高堂連闥洞房下羅帷來清風倡優在前諂諛在側揚激楚舞鄭妾流聲以娛耳綵色以淫目水嬉則舫龍舟建羽旗鼓釣乎不測之淵也野遊則登乎平原馳廣囿強弩下高鳥勇士格猛獸置酒設樂沈醉忘歸方此之時視天地曾不若一指雖有善鼓琴不能動足下也孟嘗君曰固然雍門周曰臣竊為足下有所常悲夫角帝而困秦者君也連五國而伐楚者又君也天下未嘗無事不縱即衡縱成則楚王衡成則秦帝夫以秦楚之強而敖弱薛猶磨蕭斧而伐朝菌也有識之士莫不為足下寒心天道不常盛寒暑更進退千秋萬歲之後宗廟必不血食高臺既已傾曲池又已平墳墓生荊棘狐貍穴其中遊兒牧豎蹢躅其足而歌其上曰夫以孟嘗君之尊貴亦猶若是乎於是孟嘗君喟然太息涕垂睫而交下雍門周引琴而彈之孟嘗君遂歔欷而就之曰先生鼓琴令文若亡國之人也張儀說趙王曰敝邑秦王使臣效愚於大王大王收天下以賓秦秦兵不敢出函谷關是大王之威行於山東敝邑恐懼懾伏繕甲勵兵唯大王有意督過之也今以大王之力舉巴蜀并漢中包兩周遷九鼎守白馬之津秦雖僻遠然而心忿含怒之日久矣今有敝甲凋兵軍於澠池願渡河據番吾會戰邯鄲之下願以甲子合戰以征殷紂之事故使臣先以聞於左右凡大王之所信為從者恃蘇秦蘇秦熒惑諸侯以是為非以非為是欲反覆齊國而自令車裂於市夫天下之不可混一亦明矣今楚與秦為昆弟之國而韓梁稱為東藩之臣齊獻魚鹽之地此斷趙之右臂也夫斷右臂而與人鬭失其黨而孤居求欲無危豈可得乎今秦發三軍其一軍塞午道告齊使興師渡河軍於邯鄲之東一軍軍於成皋驅韓梁軍於河外一軍軍於澠池約四國而擊趙趙服必四分其地是故不敢匿意隱情先以聞於左右臣竊為大王計莫如與秦王遇於澠池面相見而口相約請按兵無攻願大王之定計趙肅侯許之武安君破趙長平軍降其卒四十餘萬皆坑之進圍邯鄲而軍糧不屬乃遣衛先生言於秦昭王曰趙國右倍常山之險而左帶河障之阻有代馬車騎之利民人氣勇好習兵戰常會諸侯而一約為之縱長明秦不弱則六國必滅秦所以未得志於天下者趙之為患也今賴大王之靈趙軍破於長平其信臣銳卒莫不畢死邯鄲空虛百郡震怖士民咸怨其主誠以此時遣轉輸給足軍糧滅趙必矣滅趙以威諸侯天下可定而王業成矣秦王欲許之應侯妬其功不欲使成言於秦王曰秦雖破趙軍士卒死傷亦眾百姓疲於遠輸國內空虛楚魏乘虛為變將無以自守宜且罷兵王從之後三年復欲將白起伐趙起不肯王乃使應侯責之曰楚地方五千里持戟百萬君前率數萬之眾入楚拔鄢郢焚其郊廟楚人震恐東徙而不敢西向韓魏相率興兵甚眾君所將不能半而破之伊闕流血漂鹵韓魏已服至今稱東藩此君之功天下莫不聞今趙卒之死於長平者已十七八是以寡人願使君將必欲滅之君常以寡擊眾取勝如神況以強擊弱以眾擊寡乎武安君曰是時楚王恃其國大不恤其政而群臣相妬以功諂諛用事良臣疎斥百姓離心城池不修既無良將又無守備故臣得引兵深入多倍城邑發梁焚舟以專人心掠於郊野以足軍食當此之時秦之士卒以軍中為家以將為父母不約而親不謀而信一心同力死不旋踵楚人自戰其地咸顧其家各有散心莫有鬭意是以能有功也伊闕之戰韓孤顧魏不欲先用其眾魏恃韓之銳欲推以為鋒二軍爭便其力不同是以臣得以設疑, WYG: ''}
  - {type: variant, offset: 10160, length: 3043, content: 號用兵未嘗不以周為終始是何也則祭器在焉欲器之至而忘弒君之亂今韓以器之楚臣恐天下以器讎楚於是楚計輟不行秦武王使樗里疾以車百乘入周周君迎之甚敬楚王讓周以其重秦客也游勝為周謂楚王曰昔者智伯欲伐仉猶遺大鐘載以廣車因隨之以兵仉猶卒亡無備故也齊桓公之伐蔡也號曰誅楚其實襲蔡今秦者虎狼之國有獨吞天下之心使樗里疾以車百乘入周周君懼焉以蔡仉猶為戒故使長兵居前短弩居後名曰衛疾而實囚之周君豈能無憂國哉恐一旦國亡而憂大王也楚王乃悅楚襄王有疾太子質於秦不得歸黃歇說秦相應侯曰今楚王疾恐不起秦不如歸太子太子即位其事秦必謹若不歸則咸陽一布衣耳楚更立太子必不事秦失與國而絕萬乘之和非計也願相國慮之應侯為言於秦王王不肯乃遁也張儀如韓說韓宣王曰韓地險惡山居五穀所生非菽而麥地方不過九百里無二年之食料大王之卒悉舉不過三十萬而厮徒負養在其中矣今秦帶甲百萬車千乘騎萬匹虎賁之士跿訽科頭貫頤奮戟者不可勝數山東被甲冑蒙冑以會戰秦人捐甲徒裼以趨敵左挈人頭右挾生虜秦逐山東之卒猶孟賁之與怯夫以輕重相壓猶烏獲之與嬰兒諸侯不料地之弱食之寡而聽縱人之甘言好辭比周以相飾詿誤其主無過此者大王不事秦秦下甲據宜陽斷韓之地東取成皋滎陽則鴻臺之宮桑林之苑非王有也夫塞成皋絕上地則國之國分矣故為大王計莫如為秦秦之所欲莫如弱楚而能弱楚者莫如韓非以韓能強於楚也其勢然也今西面而事秦以攻楚秦王必喜夫攻楚而不私其地轉禍而悅秦計無便於此者宣王聽之范睢說秦王曰秦韓之地形相錯如繡秦之有韓譬如木之有蠹人之有腹心病也天下無變則已有變其為秦患者孰大於韓乎王何不收韓王曰吾固欲收韓韓不聽為之奈何對曰韓安得不聽王若下兵攻滎陽則成皋之道不通北斷太行之道則上黨之師不下王一興兵而攻滎陽則其國斷而為三韓必見危亡矣安得不聽若聽則霸事可慮矣王曰善乃從之張儀說齊湣王曰天下強國無過齊者大臣父兄殷眾富樂然為大王計者皆為一時之說不顧百代之利縱人說大王者必曰齊西有強趙南有韓梁齊負海之國也地廣民眾兵強士勇雖有百秦將無柰齊何也大王賢其說而不計其實臣聞齊與魯三戰而魯三勝國以危亡隨其後雖有戰勝之名而有破亡之實是何也齊大而魯小也今秦之與齊也猶齊之與魯也今齊楚嫁女娶婦為昆弟之國韓獻宜陽魏效河外趙入朝歌澠池割河閒以事秦大王不事秦秦驅韓梁攻齊之南地悉趙兵渡清河指博關臨菑即墨非王有也國一旦見攻雖欲事秦不可得也是故願大王孰計之齊王許之燕攻齊取七十餘城唯莒即墨不下齊田單以即墨破燕殺騎劫燕將懼誅而保聊城不敢歸田單攻之歲餘不下魯連乃為書約之以矢射城中遺燕將軍曰吾聞之智者不倍時而棄利勇士不怯死而滅名忠臣不先身而後君今君行一韓之忿不顧燕王之無臣非忠也殺身亡聊城而威不信於齊非勇也功廢名滅後世無稱非智也故智者不再計勇者不怯死今死生榮辱尊卑貴賤此其時也願公詳計而無與俗同且楚攻齊之南陽魏攻平陸而齊無南面之心以為亡南陽之害小不如得濟北之利大故定計而堅守之今秦人下兵魏不敢東面橫秦之勢成則楚國之形危且前棄南陽斷右壤存濟北計猶且為之也今楚魏交兵於齊而燕救不至以全齊之兵無天下之規與聊城共據期年之弊即臣見公之不能得也齊之必決於聊公無再計彼燕王大亂上下迷惑栗腹以百萬之眾五折於外萬乘之國被圍於趙壤削主困為天下笑國敝禍多人無所歸今又以敝聊之人距全齊之兵期年不解是墨翟之守也食士炊骨士無反外之心是孫臏吳起之功也能見於天下矣故為公計者不如罷兵休士全軍歸報燕王燕王必喜士民見公如見父母攘臂而議於世公業可明也意者懟燕棄世東遊於齊乎請裂地定封富比乎陶衛世世稱孤此亦一計也二者顯名厚實願公察之熟計而審處一焉且吾聞之效小節者不能行大威惡小恥者不能成榮名昔管仲射桓公中其鉤篡也遺公子糾不能死怯也束縛桎梏辱也此三行者鄉里不通世主不臣使管仲終窮抑而不出不出不免為辱人賤行然而管子棄三行之過據齊國之政一匡天下九合諸侯名高天下光照鄰國曹沫為魯君將三戰而喪地千里使曹子計不顧後死而不生則不免為敗軍擒將曹子以一劍之任劫桓公於壇位之上顏色不變辭氣不悖三戰之所喪一朝而反之天下震動名傳後世若此二公非不能行小節死小恥也以為殺身絕世功名不立非智也故去忿恚之心而成終身之名故業與三王爭流名與天壤相敝也公其圖之燕將得書曰敬聞命矣遂自刎昔雍門周以琴見齊孟嘗君孟嘗君曰先生鼓琴亦能令人悲乎對曰臣之所能令悲者先貴而後賤古富而今貧不若擯壓窮巷不及四鄰不若身材高妙懷質抱真逢讒離謗怨結而不得伸不若交歡而結愛無怨而生離遠赴他國無相見期不若幼無父母壯無妻兒出以野澤為都入用窟穴為家困於朝夕無所假貸若此人者但聞雛鳥之號秋風鳴條則傷心矣臣一為之援琴而長太息未有不悽惻而涕泣者也今足下居則廣廈高堂連闥洞房下羅帷來清風倡優在前諂諛在側揚激楚舞鄭妾流聲以娛耳綵色以淫目水嬉則舫龍舟建羽旗鼓釣乎不測之淵也野遊則登乎平原馳廣囿強弩下高鳥勇士格猛獸置酒設樂沈醉忘歸方此之時視天地曾不若一指雖有善