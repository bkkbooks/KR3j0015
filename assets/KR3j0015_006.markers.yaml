  - {type: variant, offset: 7946, length: 0, content: '', krp: 此魏國之寳也吴起對曰昔三苖氏左洞庭而右彭蠡徳義不修禹滅之夏桀之君左河濟右太華伊闕在其南羊腸在其北仁政不修湯放之由此觀之在徳不在險今孫皓席父祖之資有天阻之固西距巫峽}
  - {type: variant, offset: 7947, length: 1, content: 向, WYG: 負滄海長江判其區宇峻山帯其封域地方㡬萬里荷㦸將百萬而一朝棄甲面縳於人則在徳之言為不刋之典耶對曰何為其然陸機云易曰湯武革命順乎天𤣥曰亂不極則理不形言帝王之因天時不如地利易曰王侯設險}
  - {type: variant, offset: 7947, length: 1, content: 向, krp: 負滄海長江判其區宇峻山帯其封域地方㡬萬里荷㦸將百萬而一朝棄甲面縳於人則在徳之言為不刋之典耶對曰何為其然陸機云易曰湯武革命順乎天𤣥曰亂不極則理不形言帝王之因天時不如地利易曰王侯設險}
  - {type: variant, offset: 7949, length: 0, content: '', WYG: 守其國言國之恃險也又曰地利不如人和在徳不在險言守之由人也吴之興也參而由焉孫卿所謂合其參者及其亡也恃險而已婁敬曰周之衰也分而為兩天下莫朝周不能}
  - {type: variant, offset: 7949, length: 0, content: '', krp: 守其國言國之恃險也又曰地利不如人和在徳不在險言守之由人也吴之興也參而由焉孫卿所謂合其參者及其亡也恃險而已婁敬曰周之衰也分而為兩天下莫朝周不能}
  - {type: variant, offset: 7950, length: 0, content: '', WYG: 非其徳薄也形勢弱也由此觀之國之興亡亦資險云非唯在徳而已矣至晋永嘉中中原喪亂晋元帝復渡江王江南宋齊梁陳皆都焉事在覇紀上此吳國形也魏古者天子守在四夷天子卑弱守在}
