  - {type: variant, offset: 5131, length: 1, content: 高, WYG: 疆者也邯曰今東帝無尺寸之柄驅烏合之衆跨馬陷敵所向輙平不亟乗時與之争功而坐談武王之説是效隗囂欲為西伯也范曄曰摆旗紏族假制明神迹夫創圖首事有以識其風矣終}
