  - {type: variant, offset: 739, length: 299, content: 為人不如厚己利物不如圖身安上在乎悅下為己存乎利人夫然則南面之君各矜其治九服之人知有定主上之子愛於是乎生下之體信於是乎結世治足以敦風道衰足以禦暴強毅之國不能擅一時之勢雄俊之人無以寄霸王之志蓋三代所以直道四王所以垂業夫興衰隆弊理所固有教之廢興存乎其人愿法期於必涼明道有時而闇故世及之制弊於強禦厚下之典漏於末折浸弱之釁遘自三季陵夷之禍終于七雄所謂木大必折尾大難掉此建侯之弊也蘇秦初合縱至燕周武定殷封召公於燕與六國並稱王說燕文侯曰燕東有朝鮮遼東北有林胡樓煩西有雲中九原南有呼沱易水地方二千餘里帶甲數十萬車六百乘騎六千匹粟支數年南有碣石鴈門之饒北有棗栗之利民雖不田作而足於棗栗矣此所謂天府者也夫安樂無事不見覆, WYG: 横議將}
