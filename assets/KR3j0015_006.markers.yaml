  - {type: variant, offset: 3238, length: 646, content: 言勿與非固弗與而已也秦索六城於王王以六城賂齊齊秦之深讎也得王之六城并力而西擊秦齊之聽王不待辭之畢也則王失之於齊取償於秦而齊趙之深讎可以報矣且示天下有能為也王以此發聲兵未窺於境秦之重賂必至於趙而反請和於王秦既請和韓魏聞之必盡重王重王必出重寶以一於王則是王一舉而得三國之親而秦益危矣趙王曰善即遣虞卿東見齊王與之謀秦虞卿未及發而秦使者已在趙矣樓緩聞之亡去秦圍趙王使平原君入楚從親而請其救平原君之楚見楚王說以利害日出而言日中不決毛遂乃按劍歷階而上謂平原君曰縱之利害兩言而決耳今日出而言日中不決何也楚王叱曰胡不下吾與汝君言汝何為者毛遂按劍而前曰王之所以叱遂者以楚國之眾也今十步之內王不得恃楚國之眾王之命懸於遂之手矣吾君在前叱者何也且遂聞湯以七十里之地立為天子文王以百里之壤而臣諸侯今楚地方五千里持戟百萬此霸王之資也以楚之強天下莫能比而不能當也白起小豎子耳率數萬之眾興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百代之怨趙之所羞而王不知恥焉今合縱者為楚不為趙也楚王曰苟如先生之言謹奉社稷以從楚於是遂出兵救趙趙孝成王時秦圍邯鄲諸侯之救兵莫敢擊秦魏王使晉鄙救趙畏秦止於湯陰不進魏使客將軍新垣衍閒入邯鄲令趙帝秦此時魯連適遊趙會秦圍邯鄲聞魏欲令趙尊秦為帝乃見平原君曰梁客新垣衍安在吾請為君責而歸之平原君曰勝請為紹介魯連見新垣衍而無言新垣衍曰吾視居此圍城之中皆有求於平原君也今觀先生之玉貌非有求於平原君也曷為久居圍城之中而不去乎魯連曰世以鮑焦為無從容而死者皆非也眾人不知為一身彼秦者棄禮義而上首功之國權使其, WYG: 博}
