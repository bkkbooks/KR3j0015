  - {type: variant, offset: 5, length: 1, content: 八, WYG: 九蜀吴魏論曰臣聞昔漢氏不綱網漏兇狡袁本初虎視河朔劉景升鵲起荆州馬超韓遂雄據於闗西呂布陳宮竊命於東夏遼河海岱王公十數皆阻兵百萬鐡騎千羣合從締交為一時之傑也然曹操挾天子令諸侯六}
