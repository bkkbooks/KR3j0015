  - {type: variant, offset: 6223, length: 125, content: 天下而自安諸侯無成謀則國無宿憂也何以知其然耶昔魏王擁土千里帶甲三十六萬從十二諸侯朝天子以西謀秦秦恐寢不安席食不甘味衛鞅謀於秦王曰王何不使臣見魏王則臣必請北魏矣秦王許諾衛鞅見魏王曰大王之功大矣令行於天下矣所以十二諸侯非宋衛則鄒魯陳蔡此固大王之所以鞭箠使, WYG: 兵猶火}
