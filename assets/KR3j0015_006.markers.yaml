  - {type: variant, offset: 8046, length: 1, content: 梁, WYG: 餘衆伐蜀愚謂㑹单身無重任不若餘人文王曰我寜當復不知此耶若滅蜀後如卿所慮當何能辦凡敗軍之將不可以語勇亡國之大夫不可以圗存心膽已破故也若蜀已破遺人震恐不足與圗事中國將士各自思歸不肯與同也若作惡祗自族耳㑹果與姜維反魏將士憤發殺㑹及維也至晋末譙縱復竊蜀宋劉裕使朱齡石伐蜀聲言從内水取成都敗衣羸老進水口譙縱果疑其内水上也議曰内水涪江也悉軍新城以待之乃配朱齡石等精鋭逕從外水議曰外水泜江也若中今雒縣水是也直至成都不戰而禽縱事具覇紀上此滅蜀形也魏嘉平中孫權死征南大將軍王昶征東大將軍胡遵鎮南將軍毋丘儉等表征吳朝廷以三征計異詔訪尚書傅嘏嘏對曰昔夫差勝齊陵晋威行中國不能以免姑蘇之禍齊閔辟土兼國開地千里不足以救顛覆之敗有始不必善終古事之明效也孫權自破蜀兼荆州之後志盈欲滿凶亢已極相國宣文王先識取亂侮亡之義深逹宏圗大舉之䇿今權已死託孤於諸葛恪若矯權苛暴蠲其虐政民免酷烈偷安新恵外内齊慮有同舟之懼雖不能終自保完猶足以延期挺命於深江之外矣今議者或欲泛舟徑濟横行江表或欲倍道並進攻其城壘或欲大佃疆塲觀釁而動此三者皆取賊之常計然施之當機則功成若茍不應節必貽後患自治兵已来出入三載非掩襲之軍也賊喪元帥利存退守若羅舩津要堅城清野横行之計其殆難㨗也賊之為寇㡬六十年君臣偽立吉㐫同患若恪蠲其弊天奪之疾崩潰之應不可卒待也今賊設羅落又持重宻閒諜不行耳目無聞夫軍無耳目校察未詳而舉大衆以臨巨險此為希幸邀功先戰而後求勝非全軍之長䇿也唯有大佃最差完牢兵出民表冦鈔不犯坐食積榖不煩運士乗舋討襲無逺勞弊此軍之急務也夫屯壘相逼巧拙得用筞之而知得失之計角之而知有餘不足之處情偽將焉所逃夫以小敵大則役煩力竭以貧敵富則歛重財匱故敵逸能勞之飽能饑之此之謂也然後盛衆厲兵以振之參恵倍賞以招之多方廣似以疑之由不虞之道以閒其不戒比及三年左提右挈虜必氷散瓦解安受其弊可坐算而得也昔漢氏歴世常患匈奴朝臣謀士早朝晏罷介胄之將則陳征伐搢紳之徒咸言和親勇奮之士思展搏噬故樊噲願以十萬横行匈奴季布面折其短李信求以二十萬獨舉楚人而果辱秦軍今諸將有陳越江陵險獨歩虜庭即亦向時之類也以陛下聖徳輔相忠賢法明士練措計於全勝}
