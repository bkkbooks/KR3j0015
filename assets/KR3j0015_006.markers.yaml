  - {type: variant, offset: 5133, length: 1, content: 畢, WYG: 孤立一隅介於大國隴坻雖隘非有百二之勢區區兩郡以禦堂堂之鋒則知其道有足懐者所以棲有四方之傑夫功全則譽顯業謝則舋生逥成喪而為其議者或未聞焉若囂命㑹符運敵非天力坐論西伯豈多嗤乎述不聽邯計光武乃使岑彭吳漢伐蜀破荆門長驅入江闗岑彭為蜀刺客所殺吴漢幷将其軍入犍為界諸縣皆城守漢乃進軍攻廣都㧞之遣輕騎燒成都市橋陽武以東諸小城皆降光武戒漢曰成都十萬衆不可輕也但堅據廣都待其来攻勿與争鋒若不敢来攻轉營廹之須其力疲乃可擊也漢乗利將歩騎二萬餘人進逼成都去城十餘里阻江北為營作浮橋使副劉尚将萬餘人屯江南相去二十餘里光武聞之大驚譲漢曰賊若出兵綴公而以大衆攻尚尚破公即敗矣幸夲無他者急引兵還廣都詔書未到述果使其將謝豊攻漢使别将刼劉尚令不得相救漢乃閉營三日不出多樹幡旗使煙火不絶夜銜枚引兵與尚軍合豐等不覺明日乃分兵拒水北自将攻江南漢破之斬謝豐於是引還廣都以狀聞光武報曰公還廣都甚得其宜述必不敢畧尚而擊公也若先攻尚公從廣都五十里悉歩騎赴之適當值其疲困破之必矣自是漢與述戰於廣都之間八戰八剋遂軍其郭中述乃悉散金帛募敢死士五千人以配延岑岑於市橋偽建旗幟鳴鼓挑戰而潛遣竒兵出吴漢軍後襲擊破漢漢堕水縁馬尾得出述乃自将攻漢三合三勝自旦及中軍士不得食並疲漢因命壯士突之述兵大敗也軍至成都述出戰兵敗被刺洞胷死夷述妻子焚其宮室光武聞之怒以譴漢曰城降三日吏人服從一旦放兵縱火良失斬將弔人之義也乃下詔慰之其忠節志義之士並蒙旌顯李育以有才幹擢用之於是西土感悦莫不其歸心焉范曄曰昔趙佗自王番禺公孫亦竊帝蜀漢推無他功能而至於後亡者將以邉地處逺非王化之髙所先乎不能因隙立功以㑹時變方乃坐飾邉幅以深自安昔吴起所以慙魏侯也及其謝羣臣審廢興之命與夫泥首銜玉者異日談也至靈帝時政理衰缺王室多故雄豪角逐分裂疆宇以劉焉為益州牧馬魯㳟王後也時四方兵冦焉}
