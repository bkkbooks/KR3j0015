  - {type: variant, offset: 16315, length: 490, content: 二漢階闥暫擾而四海已沸孽臣朝入而九服夕亂哉遠惟王莽篡逆之事近覽董卓擅權之際億兆悼心愚智同痛豈世乏曩時之臣士無匡合之志歟蓋遠績屈於時異雄心挫於卑勢耳陸機曰或以諸侯世位不必常全昏主暴君有時比迹故五等所以多亂也今之牧守皆方庸而進雖或失之其得固多故郡縣易以為治也夫德之休明黜陟日用長率連屬咸述其職而淫昏之君無所容過何患其不治哉故先代有以之興矣或苟衰陵百度自悖鬻官之吏以貨準才則貪殘之萌皆群后也安在其不亂哉故後王有以之廢矣且要而言之五等之君為己思治郡縣之長為圖利物何以徵之蓋企及進取仕子之常志修己安民良士所希及夫進取之情銳而安民之譽遲是故侵百姓以利己者在位所不憚損實事以養名者官長所夙夜也君無卒歲之圖臣挾一時之志五等則不然知國為己土眾皆吾民民安己受其利國傷家嬰其病故上制人欲以垂後後嗣思其堂構為上無苟且之心群下思膠固之義使其並賢居治則功有厚薄兩愚處亂則過有深淺然則探八代之制幾可以一理貫秦漢之典殆可以一言弊也魏太祖武皇帝躬聖明之姿兼神武之略龍飛譙沛鳳翔兗豫觀五代之存亡而不用其長策覩前車之傾覆而不改其轍迹子弟王空虛之地君不使之人權均匹夫勢齊凡庶內無深根不拔之固外無磐石宗盟之助非所以安社稷為, WYG: 遭}
