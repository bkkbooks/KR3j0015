  - {type: variant, offset: 6354, length: 250, content: 下不若北取燕東伐齊則趙必從矣西取秦南伐楚則韓必從矣大王有伐齊楚之心而從天下之志則王業見矣大王不如先行王服然後圖齊楚魏王善之故身廣公宮製丹衣柱建九游從七星之旗此天子位也而魏王處之於是齊楚怒諸侯奔齊齊人伐魏殺太子覆其十萬之軍是時秦王拱手受河西之地故衛鞅始與秦王計也謀約不下席而魏將已擒於齊矣衝櫓未施而西河之外已入於秦矣此臣之所謂北之堂上擒將戶內拔城於樽俎之閒折衝於席上者也楚懷王使柱國昭陽將兵伐魏得八城又移兵攻齊齊湣王患之陳軫曰王勿憂也請令罷之即往見昭陽於軍再拜賀戰勝之功起而請曰敢問楚之法覆軍殺將其官爵, WYG: 命}
