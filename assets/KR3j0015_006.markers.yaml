  - {type: variant, offset: 534, length: 0, content: '', WYG: 在此不在彼於戯智者之慮必雜於利害故不盡知用兵之害則不能知用兵之利有自来矣是以採摭其要而為此權耶夫囊括五湖席卷全蜀庶知害中之利以明魏家之略焉蜀天帝布政房心致理參伐參伐則益州分野以東井南股距星為界東井南股距星連鉞者是也觜星度在參右足玉井所銜星是西距星即參中央三星西第一星是按職方則雍州之境據禹貢則梁州之域地方五千里提封四十郡實一都㑹也常璩國志云蜀其卦直坤故多班綵之章其辰直未故尚滋味詩稱文王之化被于江漢之域有文王之化焉秦豳同詩秦蜀同分故有夏聲云故古稱天府之國沃野千里其有以矣王莽末公孫述據蜀述字子陽扶風茂陵人也王莽時為導江卒正治臨卭及更始立豪傑各起其縣以應漢南陽人宗成略漢中啇人王岑亦起兵於雒縣自稱定漢将軍以應成述聞之遣使迎成成等至成都虜掠暴横述意惡之召縣中豪傑謂曰天下同苦新室思劉氏久矣故聞漢将軍到馳迎道路今百姓無辜而婦子係獲室屋燒燔此㓂賊非義兵也吾欲保郡自守以待真主}
