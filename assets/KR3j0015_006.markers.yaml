  - {type: variant, offset: 7999, length: 1, content: 限, WYG: 未見萬全之勢昔舜舞干戚而有苗服臣以為當今冝先文後武文帝不納後果無功三苖國今岳州是也蜀相諸葛亮出斜谷屯渭南司馬宣王距之詔宣王但堅壁距守以挫其鋒彼進不得志退無與戰久停則糧盡虜掠無所獲則必走矣走而追之以逸待勞全勝之道亮送婦人衣以怒宣玉宣王將出戰辛毗仗節不許乃止宣王見亮使唯問寢食及事繁簡不及戎事使荅曰笞罰二十已上皆親覽焉啖食至數升宣王曰亮斃矣尋果卒也至甘露元年始以鄧艾為鎮西將軍距蜀將姜維維軍敗退守劒閣鍾㑹攻維不能克乃上言曰今賊摧折宜遂乗之}
