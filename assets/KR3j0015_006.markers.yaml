  - {type: variant, offset: 3885, length: 134, content: 虜使其人彼即肆然而為帝過而為政於天下則連有蹈東海而死耳吾不忍為之人也所以見將軍者欲以助趙衍曰先生助之將奈何魯連曰吾將使梁及燕助之齊楚則固助之矣衍曰燕則為請以從矣若乃梁者即吾乃梁人也先生惡能使梁助之魯連曰梁未覩秦稱帝之害故耳使梁見秦稱帝之害則必助趙矣衍曰秦稱帝之害何如連, WYG: 吴柱}
