  - {type: 'tls:seg', offset: 7952, content: '', id: KR3j0015_CH7x2006_006-1a.1488}
  - {type: variant, offset: 7952, length: 0, content: '', WYG: 當漢之季姦臣擅朝九有不澄四郊多壘雖復諸侯釋位以閒王政然皆包藏禍心各圖非冀魏太祖畧不世出靈武冠時值炎精幽昧之期逢風塵無妄之世瞋目張膽首建義旗時韓暹楊奉挟獻帝自河東還洛陽靈帝崩太子辨即位并州牧董卓入朝因廢帝為𢎞農王而立獻帝以董卓為太師遷都長安司徒王允誅卓卓將郭汜李傕圍長安城城䧟殺王允後李傕與郭汜有隙傕質天子於其家傕將楊奉謀殺傕事泄叛傕傕衰弱天子乃得出奔楊奉欲以天子還洛陽郭汜追天子於𢎞農之曹陽奉等敗殺公卿畧盡天子渡河都安邑以韓暹為征東將軍持政還洛陽洛陽宮室燒盡百官被荆棘太祖迎天子都許韓暹楊奉各出奔太祖議迎都許或以為山東未定不可荀彧勸太祖曰昔晋文納周襄王而諸侯景從髙祖東伐為義帝縞素天下歸心自天子播越將軍首唱義兵以山東擾亂未能逺赴關右然猶分遣將帥蒙險通使雖禦外難乃心無不在王室是將軍匡天下之素志也今車駕旋軫義士有存本之思百姓感舊而增哀誠因此時奉主上以從人望大順也秉至公以服雄傑大畧也扶𢎞義以致英俊大徳也天下雖有逆節不能為累明矣韓暹楊奉其敢為害若不時定四方生心後雖慮之無及太祖至洛陽奉天子都許維其㢮紊紉其贅旒俾我漢家不失舊物矣於是運籌演謀鞭撻宇内北破袁紹南虜劉琮東舉公孫康西夷張魯議曰劉表諸傑雖中間自有呑并乃揚雄所謂六國蚩蚩為嬴弱姬者也幷呑雖衆適所以為吾奉也九州百郡十并其八志績未究中世而殞曹操字孟徳少機警有權數而任侠放蕩不治行業故世人未之竒也唯喬𤣥異焉謂曰天下將亂非命世之才不能濟也能安之者其君乎太祖為東郡太守治東武陽軍頓丘黑山賊于毒等攻東武陽太祖引兵西入山攻毒等本屯諸將皆以為當還自救太祖曰昔孫臏救趙而攻魏耿弇欲走西安而攻臨菑使賊聞我西而還是武陽自觧也不還我能敗虜家虜不能敗武陽必矣乃行毒聞之棄武陽還太祖要擊大破之初遼東太守公孫康恃逺不服袁尚袁熈依之及太祖破烏丸或説公遂征之尚兄弟可擒也公曰吾方使康送尚熈首不煩兵矣九月公引軍自栁城還康即斬送尚熈首衆將問曰公還而康斬送尚熈何也公曰彼素畏尚等吾急之則并力緩之則自相圗其勢然也太祖攻呂布於下邳不㧞欲還荀攸曰布勇而無謀今三軍皆比其鋭氣衰三軍以將為主主衰則軍無奮意陳宮有智而遲今及布氣未復宫謀未袁定進急攻之布可㧞也乃決沂泗灌城城潰生禽布紹將文醜與太祖戰荀攸勸太祖以輜重餌賊賊遂奔與競之陣亂斬文醜太祖與袁紹相持於官渡時公粮少荀彧書議欲還許彧曰紹悉衆聚官渡欲與公决勝敗公以至弱當至強若不能制必為所乘是天下之大機也且紹布衣之雄耳能聚人而不能用夫以公之神武滎明哲而輔以大順何向而不濟今軍雖少未若楚漢在陽成臯時也是時劉項莫肯先退先退者勢屈公以十分居一之衆畫地而守之扼其喉而不得進已半年矣情見勢竭必將有變此用竒之時不可失也又紹謀臣許攸貪財紹不能縱来奔説太祖襲紹别屯燔其粮榖遂破紹張繡在南陽與荆州牧劉表合太祖征之謀臣進曰繡與劉表相恃為強然繡以遊軍而食於表表不能供也急之則并力緩之則自離太祖不從表果遣軍兵救繡太祖兵敗三年春太祖還許繡兵来追太祖不能進與荀彧書曰賊来追吾雖日行數里吾䇿之至安衆破之必矣果設竒伏攻破之公還許荀彧問前何以䇿賊必破對曰虜遏歸師與吾死地戰吾是以知勝西平麴光殺其郡守以叛諸將欲擊之張旣曰唯光等造反郡人未必悉同若便以軍臨之吏人羌胡必謂國家不别是非更使皆相特著此為虎傅翼也光等欲以𦍑胡為援今先使羌胡鈔擊重其賞所虜獲者皆以俾之外阻其勢内離其交必不戰而定乃檄告喻諸為光等所誤者原之能斬賊帥送首者加封於是光部黨斬送光首此九州百郡十并其八之大畧也夫能扶天下之危者則據天下之安能除天下之憂者則享天下之樂能救天下之禍者則得天下之福董昭等欲共進曹公九錫備物宻訪於荀彧彧不許操心不平遂殺之范曄論曰世之言荀君通塞或過矣常以中賢以下遂無求備智算有所研踈原始未必要終斯理之不可全詰者也夫以衛賜之賢一説而斃兩國彼非薄於人而欲之盖有全必有衰也斯又功之不可兼者矣方時運之遭非雄才無以濟其弱功髙勢強則皇器自移矣此又時之不可並也盖取其歸正而已亦殺身以成仁之義也曹氏率義撥亂代載其功至文帝時天人與能矣遂受漢禪劉若勸進曰臣聞符命不虚見衆心不可違故孔子曰周公其不聖乎以天下讓是天地日月輕去其萬物也是以舜享天下不拜而受今火徳氣盡炎上數終帝遷明徳祚隆大魏符瑞昭晢受命既固光天之下神人同應雖有虞之儀鳯周之躍魚方之今事未足為喻而陛下違天命以飾小行逆人心以守私志上忤皇穹乃眷之㫖中忘聖人逹節之數下孤人臣翹首之望非所以揚聖道於髙衢垂無窮之懿勲也臣等聞事君有獻可替否之道奉上有逆鱗固争之義臣等敢以死請太史丞許芝又曰易𫝊曰聖人受命而王黄龍以戊已日見七月四日戊寅黄龍見}
