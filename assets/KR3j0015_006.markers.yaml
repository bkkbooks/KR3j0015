  - {type: variant, offset: 324, length: 206, content: 太史伯曰獨有洛之東土河濟之南可居公曰何如對曰地近虢鄶虢鄶之君貪而好利百姓不附今公為司徒民皆愛公請試居之民皆公之民也桓公曰善竟國之至後世君乙為韓哀侯所滅并其國鄭遂亡魯滅於楚魯頃公二年楚考烈王滅魯魯頃公亡遷於卞邑為家人魯遂絕海內無主四十餘年而為戰國矣秦據勢勝之地騁狙詐之兵蠶食山東山東患之蘇秦洛陽人也合諸侯之縱以賓秦張儀魏人也破諸侯之縱以連橫此縱橫之所起也議曰易稱先王建萬國而親諸侯孔子作春秋為後世法譏世卿不改制世侯, WYG: ''}
