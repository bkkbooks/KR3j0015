  - {type: variant, offset: 8655, length: 357, content: 附則韓魏因可慮也王曰善乃拜睢為客卿謀兵事伐魏拔懷及邢丘齊楚來伐魏魏王使人求救於秦冠蓋相望而秦救不至魏人有唐睢者年九十餘矣謂王曰老臣請西說秦王令兵先臣出王再拜遣之唐睢到秦入見秦王秦王曰丈人芒然而遠至此甚苦矣夫魏之來求救數矣寡人知魏之急也唐睢曰大王知魏之急而救兵不發臣竊以為用策之臣無任矣夫魏萬乘之國也然所以西面而事秦稱東藩築帝宮受冠帶祠春秋者以為秦之強足以與也今齊楚之兵已合於魏郊而秦救不發亦將賴其未急也使之而急彼且割地而約縱王當奚救焉必待其急而救之是失一東藩之魏而強三勁之齊楚則王何利焉於是秦王遽發兵於魏張儀說楚懷王曰秦地半天下兵敵四國被山帶河四塞以為固范睢說秦昭王曰大王之國四塞以為固北有甘泉谷口南有涇渭右隴蜀左關阪奮擊百萬戰車千乘利則出攻不利則入守此王者之地民怯於私鬭勇於公戰此王者之人王并此二者而有之以當諸侯, WYG: 振}
