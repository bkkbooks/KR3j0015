  - {type: variant, offset: 15735, length: 428, content: 彼人人喜得所願上以得施實分其國必消而自弱矣上從其計也景遭七國之亂抑諸侯減黜其官武有淮南衡山之謀作左官之律仕於諸侯王為左官設附益之法封諸侯過限曰附益諸侯唯得衣食租稅不與政事至於哀平之際皆繼體苗裔親屬疏遠生於帷牆之中不為士民所尊割削宗子有名無實天下曠然復襲亡秦之軌矣故王莽知漢中外殫微本末俱弱無所忌憚生其姦心因母后之權假伊周之稱專作威福廟堂之上不降階序而運天下詐謀既成遂據南面之尊分遣五威之吏馳傳天下班行符命漢諸侯王蹶角稽首奉上璽紱唯恐居後豈不哀哉及莽敗天下雲擾隗囂擁眾天水班彪避難從之囂問彪曰往者周失其馭戰國並爭天下分裂數世乃定意者縱橫之事復起於今矣將承運迭興在於一人也願先生試論之對曰周之廢興與漢異矣昔周爵五等諸侯從政根本既微枝葉強大故其末流有縱橫之事勢數然也漢承秦制改立郡縣主有專己之威臣無百年之柄至於成帝假借外家哀平祚短國嗣三絕故王氏擅朝因竊號位危自上起傷不及下是以即真之後天下莫不引領而歎十餘年閒中外騷動遠近俱發假號雲合咸稱劉氏不謀同辭方今雄傑帶州跨, WYG: 令専}
