  - {type: variant, offset: 5336, length: 0, content: '', WYG: 三子多逞蘇張詭靡之説奉進驩兜滔天之辭欲以誣毁唐帝諷解禹稷所謂徒懐文藻煩勞翰墨大雅君子所不為也又軍志曰萬人必死横行天下昔軒轅氏整卒數萬制四方定海内况以數}
