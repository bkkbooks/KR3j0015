  - {type: variant, offset: 8353, length: 0, content: '', WYG: 能齊力致死已可知也其俗急速不能持乆弓弩㦸楯不如中國唯有水戰是其所便一入其地則長江非復所固還保城池則去長入短而官軍懸進人有致節之志吴人戰於其地有憑城之心如此軍不逾時克可必矣帝深納焉乃令王濬等滅吴天下書同文車同軌矣時吴王皓有兼上國之心使陸抗為荆州牧晋使羊祜與吴人相持祜増修徳政以懐吴吴每與戰必尅}
