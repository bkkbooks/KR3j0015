  - {type: variant, offset: 7097, length: 1, content: 願, WYG: 兵法忌之曰必蹶上將軍且北方人不習水戰又荆州之人附操者逼兵勢耳非心服也今將軍誠命猛將統兵數萬與豫州協規同力破操軍必矣操軍破必北還如此則荆吳之勢強鼎足之形成成敗之機在於今日權}
  - {type: variant, offset: 7097, length: 1, content: 願, krp: 兵法忌之曰必蹶上將軍且北方人不習水戰又荆州之人附操者逼兵勢耳非心服也今將軍誠命猛將統兵數萬與豫州協規同力破操軍必矣操軍破必北還如此則荆吳之勢強鼎足之形成成敗之機在於今日權}
  - {type: variant, offset: 7099, length: 3, content: 王早熟, WYG: 悦即遣周瑜魯肅随亮詣先主并力拒曹公也周瑜等水軍三萬與劉備并力距曹公用黄盖火攻䇿遂敗曹公於赤壁初一日交戰曹公軍破退引次江北瑜等在南岸瑜部將黄盖曰今冦衆我寡難與持久然觀操軍方連舩檻首尾相接可燒而走也乃取蒙衝鬪檻數十艘實以薪草膏灌其中裹以帷幕上建牙旗先書報曹公欺以欲降盖又豫備走舸各繫火舩後因引次俱前曹公軍吏士皆延頸觀望指言盖降去北軍二里餘同時發火火烈風猛舩至如箭飛埃絶熖燒盡北舩延燒岸上營落頃之烟焰漲天人馬燒溺死者甚衆瑜率輕鋭尋繼其後雷鼓大進曹公留曹仁等守江陵徑自北歸瑜又進南郡與曹仁相對仁遂退曹公敗徑北還權遂虎視江表時劉璋為益州牧外有張魯寇侵瑜乃詣京見權曰今曹操新衂方憂腹心未能與將軍連兵相事也乞與奮威俱進取蜀得蜀而并張魯留奮威固守其地好與馬超結援瑜與將軍據襄陽以䠞操北方可圗也權許之㑹瑜卒不果初周瑜薦魯肅才宜佐時權即引肅對飲曰今漢室傾危四方雲擾孤承父兄遺業思有桓文之功君既惠顧何以佐之肅對曰昔髙帝區區欲尊事義帝而不獲者以項羽為害也今之曹操猶昔項羽將軍何由得為桓文乎肅竊料之漢室不可復興猶曹操不可卒除將軍為}
