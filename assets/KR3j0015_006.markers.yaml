  - {type: variant, offset: 15435, length: 1, content: 撫, WYG: 師臨江髙熲召道衡夜坐幕下因問曰今師之舉克定江東以不君試言之道衡荅曰凡論大事成敗先須以至理斷之禹貢所載九州本是王者封域後漢之季羣雄競起孫權兄弟遂有吴楚之地晋武受命尋即呑并永嘉南遷重此分割自爾已来戰争不息否終斯泰天道之恒郭璞有云江東偏王三百年還與中國合今數將滿矣以運數而言}
