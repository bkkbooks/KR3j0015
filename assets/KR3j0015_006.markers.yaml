  - {type: variant, offset: 8008, length: 0, content: '', WYG: 竒兵衝其腹心劒閣之守必還赴涪則㑹方軌而進劍閣之軍不還則應涪之兵寡矣軍志有之攻其不備出其不意今掩其空虚破之必矣冬十月艾自隂平行無人之地七百餘里鑿山通道山髙谷深艾以氊自裹推轉而下將士皆攀木縁崖魚貫而進先登至江由蜀將諸葛瞻自涪還綿竹列陣待艾遣子忠等出戰大破之斬瞻進軍到雒縣劉禪遂降後主用譙周䇿奉璽書於艾曰限分江漢遇值深逺階縁蜀土斗絶一隅干運犯冐漸苒歴載每惟黄初中宣温宻之詔申三好之恩開示門戸大義炳然人鬼而不徳闇劣貪竊遺緒俛仰累紀未率大教天威既震歸能之數怖駭王師神武所次敢不革面順以從命艾大喜報書曰王綱失道羣英並起龍戰虎争終歸真主此盖天命去就之道自古聖帝爰逮漢魏受命而王者莫不在乎中土河出圗洛出書聖人則之以興洪業其不由此未有不顛覆者矣隗囂憑隴而亡公孫據蜀而滅斯實前代覆}
