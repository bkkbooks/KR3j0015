  - {type: 'tls:seg', offset: 5137, content: '', id: KR3j0015_CH7x2006_006-1a.956}
  - {type: variant, offset: 5137, length: 0, content: '', WYG: 東州人畏見誅滅乃同心幷力為璋殊死戰斬趙韙時張魯亦以璋懦弱不承順璋遂自雄於巴蜀也為劉備所圍遂降備遷璋於公安歸其財寳後以病卒初劉備為豫州牧也備字𤣥徳涿郡涿縣人也少言語善下人喜怒不形於色徐州牧陶謙表先主為豫州牧後謙病使人迎先主先主曰袁公路近在夀春此君四世五公海内所㱕君以州與之陳登曰袁公路驕豪非治亂之主今欲為使君合歩騎十萬上可以匡主濟人成五覇之業下可以割地守境書功於竹帛若使君不見聼登亦未敢聼使君孔融謂先主曰袁公路豈憂國忘家者耶塜中枯骨何足介意今日之事百姓與能天與不取悔不可追遂領徐州陳登遣使詣袁紹曰天降灾戾禍臻鄙州州将殂殞士人無主恐姦雄一旦承隙以貽盟主日昃之憂輙共奉平原相劉府君以為宗主永使百姓知有依歸方今冦難縱横不遑釋甲謹遣下吏奔告執事紹荅曰劉𤣥徳𢎞雅有信義今徐州樂戴之誠副所望也為曹公所破走屯新野時劉表薨諸葛亮説攻琮荆州可有先主曰荆州臨亡託我以遺孤吾不忍也荆州人多歸先主先主日行十餘里或曰宜速行保江陵先主曰夫濟大事者以人為夲今人歸吾何忍棄去習鑿齒曰劉主雖顛沛險難而信義愈明勢逼事危而言不失道追景升之顧則情感三軍戀赴義之士則甘與同敗視其所以結物情豈徒投醪撫寒含蓼問疾而已其終濟大葉者不亦宜乎聞諸葛亮躬耕南陽乃三詣亮於草廬之中屏人言曰漢室傾頽姦臣竊命主上蒙塵孤不度徳量力欲信大義行於天下而智術淺短遂用猖獗至於今日然意猶未已君謂計將安出亮荅曰自董卓已来豪桀並起跨州連郡者不可勝數曹操比於袁紹名㣲而衆寡然遂能克紹以弱為強者非唯天時抑亦人謀也今操已擁百萬之衆挟天子而令諸侯傳云求諸侯莫如勤王此之謂也此誠不可與爭鋒孫權據有江東已歴三代國險而民附賢能為用此可與為援而不可圗也荆州北據漢沔利盡南海東連吴㑹西通巴蜀此用武之國而其主不能守此殆天所以資將軍也益州險塞沃野千里天府之國高祖因之以成帝業劉璋闇弱張魯在北民殷國富而不知䘏智能之士思得明后將軍既帝室之胄信義著於四海總覽英雄思賢如渇若跨有荆益保其嚴岨西和諸戎南撫夷越結好孫權内修政理天下有變則命上將將荆州之軍以向宛洛将軍身率益州之衆出於秦川百姓孰不簞食壺漿以迎将軍者乎誠如是則霸業可成漢室可興矣時曹公破荆州先主奔吴先主之奔吴也論者以孫權必殺之程昱料曰曹公無敵於天下初舉荆州威震江東權雖有謀不能獨當也劉備英雄也闗羽張飛皆萬人之敵權必資以禦於我難解勢分備資以成不可得殺也權果多與備兵以禦太祖時益州刺吏劉璋聞曹公征荆州遣别駕張松詣曹公曹公時已定荆州走先主曹公不存録松松勸璋自絶習鑿齒曰昔齊桓一矜其功而叛者九國曹操漸自驕伐而天下三分皆勤之於數十年之内弃之於俯仰之頃豈不惜乎是以君子勞謙日昃慮以下人功髙而居之以讓勢尊而守之以卑夫然後能有其富貴保其功業𫝊福百代何驕矜之有哉君子是以知曹操之不能遂兼天下也備用亮計結好孫權共拒曹公於赤壁破之曹公北還權乃以荆州業備周瑜上䟽諫曰劉備以梟雄之姿而関羽張飛熊虎之将必非乆屈為人用者愚謂大計宜徙備置吳盛為築室多其美女玩好之物以娛其耳目分此二人各置一方使如瑜者得挾與攻戰大事可定也今猥割土地以資業之聚此三人俱在疆塲恐蛟龍得雲雨非復池中物也權以曹公在北方當廣攬英雄故不納也龎統説備曰荆州荒殘人物單盡東有吴孫北有曹氏鼎足之計難以得志今益州國富人強戸口百萬郡中兵馬所出}
