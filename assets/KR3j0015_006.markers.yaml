  - {type: variant, offset: 7987, length: 6, content: 四通條達輻湊, WYG: 以封周文王受命嵗在鶉火至武王伐紂十三年嵗星復在鶉火故春秋傳曰武王伐紂嵗在鶉火則我有周之分野也昔光和七年嵗在大梁武王始受命為將討黄巾建安元年嵗復在大梁始拜大將軍十三年復在大梁始拜丞相今二十五年復在大梁陛下受命此魏得嵗與文王受命相應舜以土徳承堯之火今亦以土徳承漢之火於行運㑹於堯舜之次陛下宜改正朔易服色正大號天下幸甚王室雖靖而二方未賔乃問賈詡曰吾欲伐不從命以一天下吳蜀何先對曰攻取者先兵權建本者尚徳化陛下應期受禪撫臨率土若綏之以文徳而俟其變則平之不難矣吳蜀雖蕞爾小國依阻山水劉備有雄才諸葛亮善治國孫權識虚實陸遜見兵勢據險守要汎舟江湖皆難卒平也用兵之道先勝後戰量敵論將故舉}
