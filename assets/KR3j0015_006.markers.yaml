  - {type: variant, offset: 5140, length: 2, content: 晉獻, WYG: 今曹操三分天下有其二將飲馬滄海觀兵於吴而同盟無故自相攻伐借樞於操使敵乗其隙非計也權知備意乃止也㑹劉璋聞曹}
  - {type: variant, offset: 5140, length: 2, content: 晉獻, krp: 今曹操三分天下有其二將飲馬滄海觀兵於吴而同盟無故自相攻伐借樞於操使敵乗其隙非計也權知備意乃止也㑹劉璋聞曹}
