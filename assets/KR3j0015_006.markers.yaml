  - {type: variant, offset: 1678, length: 374, content: 乎秦曰請為王取之遂如齊見齊王拜而慶仰而弔齊王曰是何慶弔相隨之速也蘇秦曰臣聞饑人之所以饑而不食鳥喙者為其偷充腹而與死人同患也今燕雖小弱即秦王之女婿也大王利其十城而長與強秦為仇今使弱燕為鴈行而強秦推其後是食烏喙之類也齊王曰然則奈何蘇秦曰臣聞古之善制事者轉禍而為福因敗而為功大王誠能聽臣歸燕十城燕必大喜秦王知以己之故而歸燕之十城亦必喜此所謂棄仇讎而結碩友也齊王曰善於是歸燕十城蘇秦如趙趙之先與秦同祖周繆王使造父御破徐偃王乃賜造父以趙城趙氏世為晉卿也說趙肅侯曰臣竊為君計莫若安民無事且無庸有事民為也安民之本在於擇交擇交而得則民安擇交而不得則民終身不安請言外患齊秦為兩敵而民不得安倚秦攻齊而民不得安倚齊攻秦而民不得安君誠能聽臣燕必致氈裘狗馬之地齊必致魚鹽之海楚必致橘柚之園韓魏中山皆可使致湯沐之奉而貴戚父兄皆可受封侯夫割地包利五伯之所以覆軍擒將而求也封侯貴戚, WYG: 什}
