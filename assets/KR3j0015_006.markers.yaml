  - {type: variant, offset: 16849, length: 394, content: 弟曾無一人閒廁其閒與相維持非所以強幹弱枝備萬一之慮也時不用其計後遂凌夷此周秦漢魏立國之勢是以究其始終強弱之勢明鑒戒焉荀悅曰其後遂皆郡縣治人而絕諸侯當時之制亦未必百王之治也論曰周有天下八百餘年後代衰微而諸侯縱橫矣至末孫王赮降為庶人猶能枝葉相持名為天下共主當是時也楚人問鼎晉侯請隧雖欲闞周室而見厄諸姬夫豈無姦雄賴諸侯以維持之也故語曰百足之蟲至死不僵扶之者眾此之謂乎及嬴氏擅場懲周之失廢五等立郡縣君有海內而子弟為匹夫功臣效勤而干城無茅土孤制天下獨擅其利身死之日海內分崩陳勝偏袒唱於前劉季提劍興於後虎嘯龍睇遂亡秦族夫劉陳諸傑布衣也無吳楚之勢立錐之地然而驅白徒之眾得與天子爭衡者百姓思亂無諸侯勤王之可憚也故請曰夫亂政虐刑所以資英雄而自速禍也此之謂矣夫伐深根者難為功摧枯朽者易為力今五等深根者也郡縣枯朽者也故自秦以下迄於周隋失神器者非侵弱得天下者非持久國勢然也嗚呼郡縣而理則生布衣之心五等御代則有縱橫, WYG: ''}
