  - {type: variant, offset: 8354, length: 5, content: 夜搤腕瞋目, WYG: 而後合聞謀掩襲並不為若臨陣俘獲軍正将斬之祜輙曰此等死節之臣也為之垂涕親加殯給其家迎喪者必厚為之禮而歸之吴将有来者輙任其所適若欲返吴便為祖道吴將有二兒皆幼在境上戲為祜軍所畧經月其父謂之已死發喪祜親自勉勞供飬遣歸父後感其恩徳率二千来降於是陸抗每告其衆曰彼専為義此専為暴是不戰而自服也各保分界無求細益而已稱曰羊叔子雖樂毅諸葛亮何以過之陸抗將死言於吳王皓曰西陵建平國之蕃表處在上流受敵二境臣父遜昔垂沒陳言西陵國之西門如其有虞當舉國争之臣愚以為諸侯王㓜冲未嘗事乞簡閲壹}
