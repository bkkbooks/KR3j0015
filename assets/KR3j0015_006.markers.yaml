  - {type: variant, offset: 2212, length: 587, content: 下莫如趙然而秦不敢舉兵而伐趙者何也畏韓魏之議其後也然則韓魏趙之南蔽也秦之攻韓魏也無名山大川之險稍稍蠶食之傅國都而止韓魏不能支秦必入臣於秦秦無韓魏之規則禍必中於趙矣此臣之所為君患也臣聞堯無三夫之分舜無咫尺之地以有天下禹無百人之聚以王諸侯湯武之士不過三千車不過三百乘卒不過三萬立為天子誠得其道也是故明主外料其敵之強弱內度其士卒賢不肖不待兩軍相當而勝敗存亡之機固已形於胸中矣豈掩於眾人之言而以冥冥決事哉臣竊以天下之地圖按之諸侯之地五倍於秦料度諸侯之卒十倍於秦六國并力西鄉而攻秦秦必破矣今西面而事之見臣於秦夫破人之與見破於人臣人之與見臣於人也豈可同日而論哉夫衡人者皆欲割諸侯之地以與秦秦成則高臺榭美宮室聽笙竽之音國被秦患而不與其憂是故衡人日夜務以秦權恐愒諸侯以求割地願大王熟計之臣聞明主絕疑去讒屏流言之跡塞朋黨之門故尊主強兵之臣得陳忠於前矣故竊為大王計莫若一韓魏齊楚燕趙從親以叛秦合天下之將相會於洹水之上通質刑白馬而盟約曰秦攻楚齊魏各出銳師以之佐韓絕其糧道趙涉河漳燕守常山之北秦攻韓魏則楚絕其後齊出銳師以佐之趙涉河漳燕守雲中秦攻齊則楚絕其後韓守成皋魏塞其糧道趙涉河博關燕出銳師以佐之秦攻燕則趙守常山楚軍武關齊涉渤海今滄州也韓魏皆出銳師以佐之秦攻趙則韓軍宜陽楚軍武關魏軍河外齊涉清河今貝州也燕出銳師以佐之諸侯有不如約者以五國之兵共伐之六國從親以賓秦則秦甲必不敢出於函谷以害山東矣如此則, WYG: 隙}
