  - {type: variant, offset: 12, length: 2, content: 臣聞, WYG: 九唯吴蜀蕞爾國也以地圗案之纔四州之土不如中原之大都人怯於公戰勇於私鬭輕走易北不敵諸華之士角長量大比才稱力不若二袁劉呂之盛此二雄以新造未集之國資逆上不侔之勢然能撫劍顧眄與曹氏争權躍馬指麾而利盡南海何哉則地利不同勢使之然耳故易曰王侯設險以守其國古語曰一里之厚而動千里之權者地利也故曹丕臨江見波濤􅍅涌歎曰此}
