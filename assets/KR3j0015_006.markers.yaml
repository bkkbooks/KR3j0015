  - {type: 'tls:seg', offset: 5701, content: '', id: KR3j0015_CH7x2006_006-1a.1071}
  - {type: variant, offset: 5703, length: 0, content: '', WYG: 守孫堅殺南陽太守張咨袁術得據其郡堅與術合縱欲襲奪劉表荆州堅為流矢所中死初劉表據荆州也聞江南賊盛謂蒯越等曰吾欲徴兵恐不集其䇿焉出對曰衆不附者仁不足也附而不理者義不足也茍仁義之道行百姓歸之如水之趨下何患不附袁術勇而無謀宗賊貪暴為下所患若示之以利必以衆来君誅其無道撫而用之人有樂存之心必襁負而至兵強士附南據江陵北守襄陽八郡可傳檄而定術等雖至無能為也後果然孫堅死子䇿領其部曲擊揚州刺史劉繇破之因據江東䇿聞袁術將欲僣號與書諫曰昔董卓無道陵虐王室禍加太后暴及𢎞農天子播越宫廟焚毁是以豪傑發憤沛然俱起然而河北異謀於黑山曹操毒被於東徐劉表僭亂於荆南}
