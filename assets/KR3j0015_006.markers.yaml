  - {type: variant, offset: 7724, length: 218, content: 夫先王為秦所欺而客死於外怨莫大焉今以匹夫尚有報萬乘子胥白公是也今以楚之地方五千里帶甲百萬猶足以踴躍於中野而坐受伏焉臣竊為大王勿取襄王遂復為縱約伐秦六國既合縱蘇秦為縱約長北報趙趙肅侯封蘇秦為武安君乃投縱約書於秦秦不敢闚兵函谷十五餘年張儀為秦連衡秦欲攻魏先敗韓由差軍斬首八萬諸侯震恐而儀乃來說魏王說魏王曰秦孝公時公孫鞅請伐魏曰魏居嶺阨之閒西都安邑與秦界河而獨擅山東之利利則西侵秦病則東收地今以君賢聖國賴以盛宜及此時伐魏魏不友秦必東徙東徙則據, WYG: ''}
