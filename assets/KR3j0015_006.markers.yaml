  - {type: variant, offset: 5332, length: 0, content: '', WYG: 有也權黙然良久曰君言是也遂自絶魏與蜀連和時司徒華歆司空王朗等與諸葛亮書陳天命欲使舉國稱藩亮不答書作正議曰昔在項羽起不由徳雖䖏華夏秉帝者之勢}
