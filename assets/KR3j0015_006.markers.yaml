  - {type: variant, offset: 7527, length: 196, content: 因是以南遊乎高陂北陵乎巫山飲茹溪之流食湘波之魚左枕幼妾右擁嬖女與之馳騁乎高蔡之中而不以國家為事不知夫子發方受令乎宣王繫己以朱絲而見之也蔡聖侯事其小者也君王因是以左州侯右夏侯飯封祿之粟而載方府之金與之馳騁乎雲夢之中而不以天下國家為事不知夫穰侯方受命乎秦王填澠塞之內而投己於澠塞之外襄王聞之身體戰慄乃執珪而授莊辛與之謀秦後取淮北之地楚人有以弱弓微徼加歸鴈之上楚襄王召問之乃對以秦燕趙魏為鳥以激怒王, WYG: 浮西河顧謂吴起}
