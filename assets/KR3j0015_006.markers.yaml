  - {type: variant, offset: 9329, length: 227, content: 其勢不相及也夫待弱國之救忘強秦之禍此臣為大王患也大王嘗與吳人戰五戰而三勝陳卒盡矣偏守新城存民苦矣臣聞功大者易危而人弊者怨上夫守易危之功而逆強秦之心臣竊為大王危之凡天下而以信約縱親相堅者蘇秦封為武安君也蘇秦相燕即陰與燕王謀伐齊破齊而分其地乃佯為有罪出走入齊齊王因受而相之居二年而覺齊王大怒車裂蘇秦於市夫以一詐偽之蘇秦而欲經營天下混一諸侯其不可成亦明矣今秦與楚接境壤界固形親之國也大王誠能聽臣臣請使秦太子入質於楚楚太子入質於秦請以秦女為大王箕帚之妾效萬室之都, WYG: 賊}
