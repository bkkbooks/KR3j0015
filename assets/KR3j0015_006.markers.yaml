  - {type: variant, offset: 6140, length: 0, content: '', WYG: 衆無異於獨行中原若刺客伏起一人之敵耳以吾觀之必死於匹夫之手果為許貢客所殺也䇿死弟權領其衆時吴割據江南席卷交廣也屬曹公破袁紹兵威日盛乃下書責孫權求質張昭等㑹議不决權乃獨將周瑜詣其母前定議瑜曰昔楚國初封於荆山之側不滿百里之地繼嗣賢能廣土開境立基於郢遂據荆揚至於南海𫝊業延祚九百餘年今將}
