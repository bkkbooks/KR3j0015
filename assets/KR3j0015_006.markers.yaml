  - {type: variant, offset: 1117, length: 560, content: 雖得燕城秦計固不能守也秦之不能害燕亦明矣今趙之攻燕也發號出令不至十日而數十萬之軍軍於東垣矣渡呼沱涉易水不至四五日而距國都矣故曰秦之攻燕也戰於千里之外趙之攻燕也戰於百里之內夫不憂百里之患而重於千里之外計無過於此者是故願大王與趙從親天下為一則燕國必無事矣燕文侯許之樂毅獻書燕王曰比目之魚不相得則其能行故古者稱之以其合兩而如一也今山東不能合弱而如一是山東之智不如魚也又譬如軍士之引車也三人不能行索二人五人而車行矣今山東三國弱而不能敵秦索二國因能勝秦矣然而山東不知相索則智固不如軍士矣胡與越人言語不相知志意不相通同舟而渡波至其相救助如一今山東之相與也如同舟而濟秦之兵至不能相救助如一智又不如胡越之人矣夫三物者人之所能為也山東主遂不悟此臣之所為山東苦也願大王熟慮之今韓梁趙三國已合矣秦見三晉之堅也必南伐楚趙見秦之伐楚必北攻燕物固有勢異而患同者秦久伐韓故中山亡今秦之伐楚燕必亡臣竊為大王計不如以兵南合三晉約戍韓梁之西邊山東不能為此此必皆亡矣燕果以兵南合三晉趙將伐燕蘇代為燕說趙王曰今者臣從外來過水見蚌方出曝而鷸啄其肉蚌合而挾其喙鷸曰今日不雨明日不雨必見蚌脯蚌亦謂鷸曰今日不出明日不出必見死鷸兩者不肯相捨漁父得而并擒之今趙且伐燕燕趙久相支以弊其眾臣恐強秦之為漁父也願大王孰計之趙王乃止齊宣王因燕喪伐燕取十城燕易王謂蘇秦曰先生能為燕得侵, WYG: ''}
