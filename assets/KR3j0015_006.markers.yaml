  - {type: variant, offset: 5339, length: 6, content: 頭奮擊各二十, WYG: 之粟塞成臯之口勝敗之數未可知也議曰長驅入洛以决一朝之戰中計也何謂下計東取吳西取下蔡歸重於越身歸長沙陛下安枕而卧漢無事矣議曰自廣江表無窺中原之心下計也桓譚新論曰世有圍碁之戲或言是兵法之類也及為之工者遂基䟽張置以㑹圍因而伐之成多得道之勝中者則務相絶遮要以争便求利故勝敗狐疑須計數而定下者則守邊隅趨作罫以自生於小地然亦不如察薛公之言上計云取吴楚并齊魯及燕趙者此廣道地之謂中計云取吴楚并韓魏塞成臯據敖倉此趨遮要爭利者也下計云取吴小蔡據長沙以臨越此守邊隅趨作罫者也罫音為卦反上曰是計將安出令尹對曰出下計上曰何為廢上中計而出下計令尹曰布故酈山之徒也自致}
