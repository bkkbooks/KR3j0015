  - {type: variant, offset: 4021, length: 1105, content: 者齊威王嘗為仁義矣率天下諸侯而朝周周貧且微諸侯莫朝而齊獨朝之居歲餘周烈王崩齊後往周怒赴於齊曰天崩地坼天子下席東蕃之臣田嬰後至則斮齊威王勃然怒曰叱嗟而母婢也卒為天下笑故生則朝周死則叱之誠不忍其求也彼天子固然其無足怪衍曰先生獨不見夫僕乎十人而從一人者寧力不足而智不若耶畏之也魯連曰嗚呼梁之比秦若僕耶衍曰然魯連曰吾將使秦王烹醢梁王衍愕然曰亦太甚矣先生之言也先生又惡能使秦王烹醢梁王魯連曰固也吾將言之昔者九侯鄂侯文王紂之三公也九侯有子而好故獻之紂紂以為醜醢九侯鄂侯爭之強辨之疾故脯鄂侯文王聞之喟然而歎故拘之牖里之庫百日欲令之死曷為與人俱稱王卒於脯醢之地齊湣王將之魯夷維子為御執策而從謂魯人曰子將何以待吾君魯人曰吾將以十大牢待子君夷維子曰子安取禮而來彼吾君者天子也天子巡狩諸侯避舍納管籥攝衽抱机視膳於堂下天子已食若乃退而聽朝也魯人投其籥不果內不得入於魯將之薛假途於鄒當是時鄒君死湣王欲入弔夷維子謂鄒之孤曰天子弔主人必將倍殯設几北面於南方然後天子南面弔鄒之群臣曰必若此將伏劍而死故不敢入於鄒鄒魯之大夫生則不能事養死則不得賻襚然且欲行天子之禮於鄒魯鄒魯之臣不果內今秦萬乘之國也梁亦萬乘之國也俱據萬乘之國交有稱王之名覩其一戰而勝遂欲從而帝之則且變易諸侯之大臣彼將奪其所不肖而與其所賢奪其所憎而與其所愛又將使其子女讒妾為諸侯妃姬處梁之宮梁王安得晏然而將軍又何得故寵乎於是新垣衍起再拜謝曰吾請出不敢復言帝秦秦將聞之為退軍五十里也蘇秦如韓韓之先與周同姓事晉得封於韓為韓氏後周烈王賜韓侯得列為諸侯也說韓宣王曰韓北有鞏洛成皋之固西有宜陽商阪之塞東有宛穰洧水南有陘山地方九百餘里帶甲數十萬天下之強弓勁弩皆從韓出韓卒超足而射百發不暇止遠者括洞胸近者鏑掩心韓之劍戟則龍泉太阿皆陸斷牛馬水截鵠雁夫以韓卒之勁與大王之賢乃西面而事秦交臂而服焉羞社稷而為天下笑無大於此者也是故願大王熟計之大王無事秦事秦必求宜陽成皋今茲效之明年又復求割地與之則無地以給之不與則棄前功而受後禍且夫大王之地有盡而秦之求無己以有盡之地而逆無己之求此所謂市怨結禍者不戰而地已削矣臣聞鄙諺曰寧為雞口無為牛後今王西面交臂而臣事秦何異於牛後乎夫以大王之賢挾強韓之兵而有牛後之名竊為大王羞之韓王勃然作色按劍太息曰寡人雖不肖不能事秦從之韓攻宋秦大怒曰吾愛宋韓氏與吾交而攻我所甚愛何也蘇秦為韓說秦王曰韓氏之攻宋所以為王也以韓之強輔之以宋楚魏必恐恐必西面而事秦王不折一兵不殺一人無事而割安邑此韓氏之所以禱於秦也韓惠王聞秦好事欲罷其人無令東伐乃使水工鄭國來閒秦說秦王令鑿涇水以溉田中作而覺欲誅鄭國鄭國曰始臣為閒然渠成亦秦之利臣為韓延數年命為秦開萬代之利也王從之蘇秦如魏魏之先畢公高之後與周同姓, WYG: ''}
