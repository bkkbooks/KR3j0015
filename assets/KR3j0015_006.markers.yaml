  - {type: variant, offset: 94, length: 229, content: 治衰則五霸扶其弱所以夾輔王室左右厥世此三聖制法之意文武周公為三聖然厚下之典弊於尾大自幽平之後日以陵夷爵祿多出於陪臣征伐不由於天子吳并於越越王勾踐敗吳欲遷吳王於甬東與百家君之吳王曰孤老矣不能事君王遂自剄死越王滅吳晉分為三晉昭公六年卒六卿欲弱公室遂以法盡滅羊舌氏之族而分其邑為十縣六卿各以其子為大夫晉益弱六卿皆大哀公四年趙襄子韓康子魏桓子共殺智伯盡分其地至烈公十九年周威王賜趙魏韓皆命為諸侯晉遂滅鄭兼於韓鄭桓公者周厲王少子也幽王以為司徒問太史伯曰王室多故予安逃死, WYG: 長筞}
