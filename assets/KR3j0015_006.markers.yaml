  - {type: variant, offset: 7946, length: 0, content: '', WYG: 此魏國之寳也吴起對曰昔三苖氏左洞庭而右彭蠡徳義不修禹滅之夏桀之君左河濟右太華伊闕在其南羊腸在其北仁政不修湯放之由此觀之在徳不在險今孫皓席父祖之資有天阻之固西距巫峽}
