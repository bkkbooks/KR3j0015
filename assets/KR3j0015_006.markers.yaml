  - {type: variant, offset: 8054, length: 0, content: '', WYG: 㧞人之城而非攻也若釋廟勝必然之理而行萬一不全之畧誠愚臣之所慮也故謂}
  - {type: variant, offset: 8054, length: 0, content: '', krp: 㧞人之城而非攻也若釋廟勝必然之理而行萬一不全之畧誠愚臣之所慮也故謂}
  - {type: variant, offset: 8055, length: 1, content: 梁, WYG: 佃而逼之計最長時不從嘏言詔昶等征吳吴將諸葛恪距之大敗魏軍於東關魏後陵夷禪晋太祖即位王昶等敗朝議欲貶黜諸將景王曰我不聼公休以至此我過諸將何罪時雍州刺吏陳泰討胡又敗景王又謝朝士曰此我過也非𤣥伯之責於是魏人悦睦思報之也至世祖時即晋武帝羊祜上平吴表曰先帝順天應時西平巴蜀南和吴㑹海内得以休息兆庶有樂安之心而吴復背信使邉事更興夫期運雖天所授而功業必由人而成不一大舉掃滅則衆役無時得安亦所以隆先帝之勲成無為之化也故堯有丹水之伐舜有有苖之征咸以寜静宇宙戢兵和衆者也蜀平之後天下皆謂吳當并亡自此来十三年是謂一周平定之期復在}
