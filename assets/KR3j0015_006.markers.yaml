  - {type: variant, offset: 14840, length: 591, content: 則天下遍被其害百姓一亂則魚爛土崩莫之匡救漢興承周秦之弊故雜而用之然六王七國之難者誠失之於強大非諸侯治國之咎漢興之初海內新定同姓寡少懲亡秦孤立之敗於是割裂疆土立爵二等大者王小者侯功臣侯者百有餘邑尊王子弟大啟九國國大者跨州兼郡連城數十可謂矯枉過正矣然高祖創業日不暇給孝惠享國之日淺高后女主攝位而海內晏然無狂狡之憂卒折諸呂之難成太宗之基者亦賴之於諸侯也夫原本以末大流濫以致溢小者淫荒越法大者睽孤橫逆以害身喪國故文帝采賈生之議分齊趙賈誼曰欲天下之理安莫若眾建諸侯而少其力力少則易使義國小則無邪心令天下之制若身之使臂臂之使指陛下割地定制令齊趙楚各為若干國使其子孫各受祖之分地地盡而止天子無所利焉又上疏曰陛下即不定制如今之勢不過一傳再傳諸侯猶且人恣而不制豪植而大強漢法不得行矣陛下所以為藩扞及皇太子之所恃者唯淮陽代二國耳代北邊匈奴與強敵為鄰能自完則足矣而淮陽之比大諸侯廑如黑子之著面適足以餌大國不足以有所禁禦方今之制在陛下而令子適足以為餌豈可為萬代利哉臣之愚計願舉淮南地以益淮陽而為梁王立後割淮陽北邊二三列城與東郡以益梁不可者可徙代王而都睢陽梁起於新蔡以北著之河淮陽包陳以南犍之江則大諸侯之有異心者破膽而不敢謀梁足以扞齊趙淮陽足以禁吳楚陛下高枕終無山東之憂此萬世之利也臣聞聖王言問其臣而不自造事故使人臣得畢其愚忠唯陛下財幸文帝於是從誼計乃徙淮陽王武為梁王界北泰山西至高陽德大縣四十餘城徙淮陽王喜, WYG: 衡}
