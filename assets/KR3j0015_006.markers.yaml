  - {type: variant, offset: 5145, length: 1, content: 封, krp: 兵強無敵於天下若因張魯之資以取蜀土誰能禦之劉豫州使君之宗而曹公之深讐也若使之討魯魯必破魯破則益州強曹公雖来無能為也璋然之遣法正迎先主時黄權諌曰左將軍有梟名今以部曲遇之則不滿其心以客禮待之則一國不容二君若客有㤗山之安則主有累卵之危願且閉境以待河清時劉巴亦諫曰備雄傑人也入必有為不可内也既入巴又曰若使備討張魯是放虎於山林也璋並不聼先主與璋㑹涪璋既還成都先主當為璋北征漢中統後説備曰隂選精兵晝夜兼道徑襲成都璋既不武又素無豫備大軍卒至一舉便定此上計也楊懐髙沛璋之名將各仗強兵據守關頭聞素有牋来諫璋使發遣將軍未至遣與相聞説荆州有急欲還救之並使装束外作歸形此二子既服將軍英名又喜將軍之去必乗輕騎来見將軍因此執之進取其兵乃向成都此中計也返還白帝連引荆州徐還圗之此下計也若沉吟不去將至大困不可久矣先主然其中計初張松法正見備備以私意接納盡其慇懃因問蜀中兵器府庫人馬衆寡及諸要害松等具為言之又畫地圗處置山川由是盡知益州虚實先主北到葭萌未即討魯厚樹恩徳以収衆心明年曹公征孫權權呼先主自救備乃從璋求}
  - {type: variant, offset: 5147, length: 0, content: '', WYG: 兵及資寳欲以東行救權璋但許兵四千其餘皆半給備因激怒其衆曰吾為益州征強敵師徒勤瘁不遑寜居今積帑藏之財而恡於賞功望士大夫為出死力戰其可得乎乃召璋白水軍督楊懐責以無禮斬之使黄忠等勒軍向璋先主逕至關質諸將士卒妻子引兵從忠等進到涪據其城璋所遣将皆破敗也即斬懐等自葭萌而還取璋時鄭度説璋曰左將軍襲我兵不滿萬士衆未附野榖是資計莫若盡驅巴西梓潼人内涪水以西其倉稟野榖一皆燒除髙壘深溝静以待之彼請戰不許久無所資不過百日必將自走走而擊之則必禽矣璋不用度計先主遂長驅所過必克而有巴蜀劉備襲蜀丞相掾趙戬曰劉備其不濟乎拙於用兵每戰必敗奔亡不暇何以圖人蜀雖小國險固四塞獨守之國難卒并也徴士傅幹曰劉備寛仁有度能得人之死力諸葛亮逹理知變正而有謀而為之相張飛關侯勇而有義皆萬人之敵而為之將此三人者皆人傑也以劉備之略三傑佐之何為不濟先主圍成都數十日璋出降蜀中殷盛豐樂先主置酒大饗士卒取蜀城中金銀分賜將士還其榖帛初攻劉璋備與士衆約曰若事定府庫百物孤無豫焉及拔城都士衆皆捨干戈赴諸藏競取寳物軍用不足備甚憂之劉巴曰易耳但當鑄直百錢平諸物價令吏為官市備從之數月之間府庫充實先主領㿽州牧諸葛亮為股肱法正為謀主關侯張飛馬超為爪牙許靖縻竺簡雍為賔友董和黄權李嚴等本璋之援用也吴壹費觀等又璋之婚親也彭羕者又璋之所排擯也劉巴者宿昔之所忌恨也皆處之顯任盡其器能有志之士無不競勸也羣臣勸先主稱尊號先主未許諸葛亮曰昔吴漢耿純等勸世祖即帝位世祖辭讓前後數四耿純進言曰天下英雄喁喁冀有所望如不從議者士大夫各歸求主無為從公也世祖感純言深至遂然諾之今曹氏篡漢天下無主大王劉氏苗族紹世而起即帝位乃其宜也士大夫久勤苦者亦望尺寸之功名如純言耳先主於是即帝位譙周等勸進云臣父羣未亡時言西南數有黄氣直立數丈見来積年時時有景雲祥風從璇璣下應之此為異瑞又二十二年中數有氣如旗從西竟東中天而行圖書曰必有天子出其方加是年太白熒惑鎮星常從嵗星相追近漢初興五星從嵗星其嵗星主義漢位在西義之上方故漢法常以嵗星候人主當有聖主起於此州以致中興時許帝尚存故羣下不敢漏言頃者熒惑復追嵗星見在胃昴畢昴畢為天綱經曰帝王處之衆邪消亡願大王應天順人速即洪業以寜海内也時曹公㧞漢中初魏太祖破張魯於漢中劉曄進計曰明公北破袁紹南征劉表九州百郡十并其八威震天下勢慴海外今舉漢中蜀人望風破膽失守推此而前蜀可傳檄而定劉備人傑也有度而遲得蜀日淺蜀人未附人心震恐其勢自傾因其傾而壓之無不克也若小緩之諸葛孔明明於治體関侯張飛勇冠三軍武毅以威之文徳以撫之據險守要不可犯矣今時不取必有後憂太祖不從居七日蜀降者言蜀中驚擾雖斬之猶不禁太祖又問曄曰蜀可伐不對曰今已小安不可動也法正説先主曰曹操一舉降張魯定漢中不因此勢以圗巴蜀而㽞夏侯淵張郃屯守身遽北還此非其智不逮力不足也將内有憂逼故耳今算淵郃才略不勝國之將率舉衆徃討則必克之克之日廣農積榖觀舋伺隙上可以傾覆宼敵尊奬王室中可以蠶食雍涼廣境拓土下可以固守要害為持久之計此盖天以與我時不可失也先主善其䇿乃率諸將進兵漢中正亦從行先主自陽平南渡沔水縁山稍前於定軍興勢作營淵將兵來争其地正曰可擊矣先主命黄忠乗髙鼔譟攻之大破淵等授首遂奄有梁漢時魏使夏侯楙鎮長安蜀將魏延就諸葛亮請兵從褒中出循秦嶺而東當子午而北以襲長安亮不許魏畧曰夏侯楙為安西将軍鎮長安諸葛亮於南鄭與羣下計議魏延曰聞夏侯楙先主壻也怯而無謀今假延精兵五千負糧五千直從褒中出循秦嶺而東當子午而北不過十日可到長安聞延奄至必乗舩逃走長安唯有御史京兆太守横門邸閣與散人榖足周食也比東方相合聚尚二十許日而公從斜谷来亦足以逹如此則一舉而咸陽以西可定矣亮以為懸危不如安從坦道可以平取隴右萬全必克而無虞故不用延計也延每從亮出輙欲請兵萬人與亮異道㑹於潼闗如韓信故事亮制而不許延常謂亮為怯歎恨已才用之不盡也其後吳孫權襲闗侯取荆州范曄曰劉備令闗侯鎮守荆州吴將呂蒙拜漢昌太守與闗侯分土接境知侯梟雄有兼并心且居上流其勢難久蒙乃宻陳計䇿曰今征虜守南郡潘璋將遊兵萬人循江上下應敵所在蒙為國家前據襄陽如此何憂於操何頼於侯將圖之㑹侯討樊留兵將備南郡蒙上䟽曰某討樊而多留備兵必恐蒙圗其後故也蒙常有病乞分衆還建業以治病為名某聞之必徹備兵盡赴襄陽大軍浮江晝夜驅上襲其空虚則南郡可下而某可擒也遂稱病篤權乃露檄召蒙伏還隂與圖計侯果信之稍徹兵赴樊權遂行遣蒙在前其精兵於􅖻􅑳中使白衣揺櫓作商賈服晝夜兼行至羽所置江邉屯候盡縛之是故侯不聞知蒙入據城盡得侯及將士家属皆撫慰之約令軍不得干歴人家有所求取侯還在道路數使人與蒙相聞蒙輒厚遇其使侯使人還咸知家門無恙見待過於平時故侯吏士無闘心皆委侯而降即父子俱獲初孫權之討侯也遣使報魏云欲討闗某自效乞不漏露令某冇備羣臣咸言宻之是宜董昭曰軍事尚權期於合宜宜露其事某聞權上即當還護其城圍得速解便獲其利可使兩賊相持以待其弊若宻而不露使權得志非計之上也乃使射書於圍中及侯屯内侯猶豫未去陸遜至破江陵侯走至臨沮為吴將潘璋所殺也先主怒吳伐之敗績還蜀至永安而崩初魏文帝聞備東下與孫權交戰樹柵連營七百餘里謂羣臣曰備不暁兵機豈有七百里營可以距敵乎包原矣隰阻險而為軍者為敵所禽此兵忌也孫權上事今至後七日權破備於夷陵書至後主禪即位下詔曰朕聞善積者昌禍積者喪古今常數也曩者漢祚中㣲網漏凶慝董卓造難震蕩京畿曹操階禍竊執天衡子丕孤竪敢尋亂階盗據神器更姓改物世濟其㐫當此之時天下無主則我帝命殞越於下昭烈皇帝光演文武存復祖業誕膺皇綱不墜於地萬國未靖早世遐殂朕以幼冲繼統鴻業未習保傅之訓而嬰祖宗之重光載前緒未有攸濟朕甚懼焉諸葛丞相𢎞毅忠壯忘身憂國今授之以旄鉞之重付之以専命之權統領歩騎二十萬衆董督元戎龔行天罰除患寜亂克復舊都在此行也伐其元帥弔其殘人他如詔書律令者也先是吳主孫權請和吴使張温使蜀權謂温曰卿不宜逺出恐諸葛孔明不知吾所以與曹氏通意故屈卿行人之義受命不受辭也對曰臣入無腹心之規出無專對之用懼無張老延譽之功又無子産陳事之效然諸葛亮達見計數必知神慮屈伸之宜加受朝廷天覆之恵推亮之心必無疑貳温至蜀詣闕拜章曰昔髙宗以諒闇昌殷祚於中興成王以㓜冲隆周徳於太平今陛下以聪明之姿等契徃古總百揆於良佐恭列精之炳耀遐邇望風莫不忻頼吴國勤任旅力清澄江滸願與有道平一宇内委心協規有如河水使下臣温通致情好陛下敦崇禮義不便耻忽臣自入逺境及即近郊頻蒙勞来以榮自懼蜀使馬良使吴良謂亮曰今銜國命協穆二家幸為良介於孫將軍亮曰君試自為文良即草曰寡君遣掾馬良通聘繼好以紹昆吾豕韋之勲其人吉士荆楚之令鮮於造次之華而有克終之美願降心存納以慰將命權大待之也丞相諸葛亮慮權聞先主殂有異計乃遣鄧芝修好於權權果狐疑不時見芝芝自表請見權語芝曰孤誠願與蜀和親然恐蜀主㓜弱國小勢逼為魏所乗不自保全以此猶豫耳芝對曰吳蜀二國四州之地大王命世之英諸葛亮一時之傑也蜀有重關之固吳有三江之阻合此二長共為脣齒進可兼并天下退可鼎足而立此理勢之自然也大王今若委質}
