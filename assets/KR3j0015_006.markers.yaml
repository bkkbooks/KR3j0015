  - {type: variant, offset: 5218, length: 111, content: 人民之眾車馬之多日夜行不絕輷鞫殷殷若有三軍之眾魏天下之強國也王天下之賢主也今乃有意西面而事秦稱東藩築帝宮受冠帶祠春秋臣竊為大王恥之臣聞越王句踐戰弊卒三千擒夫差於干遂武王卒三千革車三百乘制紂於牧野豈其卒眾哉誠能奮其威也今竊聞, WYG: 非復}
