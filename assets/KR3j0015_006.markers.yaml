  - {type: variant, offset: 15445, length: 4, content: 梁地賈生, WYG: 十萬西自巫峡東至滄海分之則勢懸而力弱聚之則守此而失彼其必克四也席卷之兆其在不疑熲忻然曰君言成敗理甚分明吾今豁然矣本以才學相期不意籌略乃至此也遂進兵虜叔寳此滅吳形也議曰昔三國時蜀遣宗預使吳預謂權曰蜀土雖云隣國東西相賴吳不可無蜀蜀不可無吳孫盛曰夫帝王之保唯道與義道義既建雖小可大殷周是也茍仗詐力雖強必敗秦項是也况乎偏鄙之城恃山水之固而欲連横萬里永相資頼哉昔九國建合縱}
