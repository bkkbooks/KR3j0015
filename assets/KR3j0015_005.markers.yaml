  - {type: variant, offset: 3274, length: 0, content: '', WYG: 五國之兵共伐之六國從親以賔秦則秦甲必不敢出於函谷以害山東矣如此則霸王之業成矣趙王曰善秦既破趙長平軍遂圍邯鄲趙人震恐東徙乃使蘓代厚幣説秦相應侯曰武安君擒馬服子乎曰然又欲圍邯鄲乎曰然代曰趙亡則秦王矣夫武安君所為秦戰勝攻取者七十餘城南取鄢郢}
