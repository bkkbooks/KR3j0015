  - {type: variant, offset: 7218, length: 0, content: '', WYG: 妻欲并代約與趙王遇於句注之塞乃令工人作為金斗長其尾令可以擊人與代王飲隂告厨人曰即酒酣樂進熱啜反斗以擊之於是酒酣樂取熱啜厨人進斟因反斗擊代王殺之肝脇塗地其姊聞之因磨笄以自殺至今有磨笄之山天下莫不聞至漢高祖時陳豨以趙相國監趙代邉兵舉兵反}
