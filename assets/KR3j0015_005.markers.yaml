  - {type: variant, offset: 6979, length: 2, content: 曰古, WYG: 陸而齊無南靣之心以為亡南陽之害小不如得濟北之利大故定計而堅守之今秦人下兵魏不敢東面横秦之勢成則楚國之形危且齊棄南陽斷右壤存濟北計猶且為之也今楚魏交退於齊而燕救不至以全齊之兵無天下之規與聊城共據期年之弊即臣見公之不能得也齊之必决於聊公無再計彼燕王大亂上下迷惑栗腹以百萬之衆五折於外萬乘之國被圍於趙壤削主困為天下笑國弊禍多人無所歸今又以弊聊之人距全齊之兵期年不解是墨翟之守也食人炊骨無反外之心是孫臏吳起之兵也能見於天下矣故為公計}
