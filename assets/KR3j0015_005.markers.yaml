  - {type: variant, offset: 5311, length: 5, content: 使酈生說齊, WYG: 秦救不至魏人有唐睢者年九十餘矣謂}
  - {type: variant, offset: 5311, length: 5, content: 使酈生說齊, krp: 秦救不至魏人有唐睢者年九十餘矣謂}
