  - {type: punctuation, offset: 3266, content: 。, id: KR3j0015_CH7x2006_005-bkkpn737}
  - {type: 'tls:seg', offset: 3266, content: '', id: KR3j0015_CH7x2006_005-2a.327}
  - {type: variant, offset: 3267, length: 0, content: '', WYG: 則韓魏趙之南蔽也秦之攻韓魏也無名山大川之險稍稍蠶食之傅國都而止韓魏不能支秦必入臣於秦秦無韓魏之䂓則禍必中於趙矣此臣之所為君患也臣聞堯無三夫之分舜無咫尺之地以有天下禹無百人之聚以王諸侯湯武之士不過三千車不過三百乘卒不過三萬立為天子誠得其道也是故明主外料其敵之强弱内度其士卒賢不肖不待兩軍相當而勝敗存亡之機固已形於胷中矣豈掩於衆人之言而以冥冥决事哉臣竊以天下之地圖按之諸侯之地五倍於秦料度諸侯之卒十倍於秦六國并力西面而攻秦秦必破矣今西面而事之見臣於秦夫破人之與見破於人臣人之與見臣於人也豈可同日而論哉夫衡人者皆欲割諸侯之地以與秦秦成則髙臺榭美宫室聽笙竽之音國被秦患而不與其憂是故衡人日夜務以秦權恐愒諸侯以求割地願}
