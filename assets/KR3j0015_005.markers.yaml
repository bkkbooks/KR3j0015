  - {type: variant, offset: 24781, length: 312, content: 五十人婦人美貌麗服者千餘人常使孔貴妃等八人夾坐江總孔範等十人預宴號曰狎客先令八婦人襞彩牋製五言詩十客一時繼和遲則罰酒君臣酣飲從昏達旦以此為常也隋文帝初受周禪甚敦鄰好宣帝崩遣使赴弔脩敵國之禮書稱名頓首而後主驕奢書末云想彼統內如宜此宇宙清泰隋文帝不悅以示朝臣賀若弼楊素等以為主辱再拜請罪並求致討文帝曰我為人父母豈可限一衣帶水而不拯之乎命作戰船人請密之文帝曰吾將顯行天誅何密之有使投柹於江若彼能改吾又何求也以晉王廣為元帥督八十總管以致討初隋師送璽師暴後主惡三十萬紙遍諭江東諸軍既下江鎮戍相繼奏聞沈客卿掌機密抑而不言隋軍臨江後主曰王氣在此齊兵三度來周兵再度至無不摧沒虜今來必自敗縱酒作詩不輟隋軍或進拔姑孰或斷曲阿之衝乃下詔曰犬羊淩縱, WYG: 非}
