  - {type: variant, offset: 12094, length: 0, content: '', WYG: 太子之隟輒稱病不朝於古法當誅文帝不忍因賜几杖徳至厚也不改過自新乃益驕恣公即山鑄錢煮海為鹽誘天下亡人謀作亂逆今削之亦反不削亦反削之反亟禍小不削反遲禍大於是漢臣庭議削吳吳乃反矣武帝施主父之筞推恩之令主父偃説上曰古者諸侯不過百里强弱之形易制今諸侯或連城數十地方千里緩則驕奢易為淫亂急則阻}
