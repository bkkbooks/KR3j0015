  - {type: variant, offset: 11741, length: 348, content: 雖小而堅臨菑雖大而實易攻乃敕諸部後五日攻西安城藍聞之晨夜警守至期夜半弇敕諸將皆蓐食會明至臨菑城出其不意半日拔之入據其城張藍懼遂將其眾亡歸劇弇乃令軍士無得妄掠劇下頃張步至乃取之以激怒步步聞之大笑至菑攻弇弇先出臨菑水上突騎欲縱弇恐挫其鋒令步不敢進故示弱以盛其氣乃引歸小城陳兵於內步氣盛直攻弇營與劉歆合戰弇升王宮壞臺望之視歆鋒交及自引精兵以橫突步陣大破之步走降世祖陳俊逃弇欲招其故眾令陳俊追斬諸賊悉平之赤眉賊入函關攻更始世祖乃遣鄧禹引兵而西以乘更始赤眉之亂赤眉賊樊崇立劉盆子為天子入長安殺更始寇掠關中於是諸將上尊號乃命有司設壇於鄗南千秋亭五城陌即皇帝位諸將上奏曰漢遭王莽宗廟廢絕豪傑憤怒兆人塗炭王與伯升首舉義兵更始因其資以據帝位不能奉承大統而敗亂綱紀盜賊日多群生危蹙大王初征昆陽王莽自潰後拔邯鄲北州弭定, WYG: 封}
