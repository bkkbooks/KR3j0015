  - {type: variant, offset: 5202, length: 0, content: '', WYG: 亭障者不下十萬梁之地勢固戰場也大梁今汴州是也梁南與楚不與齊齊攻其東東與齊不與趙趙攻其北不合於韓則韓攻其西不親於楚則楚攻其南此所謂四分五裂之道也且諸侯之為縱者將以安社稷尊主强兵顯名也今為縱者一天下約為昆弟刑}
