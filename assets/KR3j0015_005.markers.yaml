  - {type: variant, offset: 1731, length: 446, content: 楚鋒起之將皆爭附君者以君代代楚將為能復立楚後也梁自求懷王孫心立也約曰先入咸陽者王之秦將章邯大敗項梁於定陶梁死章邯以為楚不足憂乃北伐趙楚使項羽等救趙遣沛公別將西入關沛公遂攻宛降之沛公攻宛南陽太守呂錡保城不下沛公欲遂西張良曰強秦在前宛兵在後此危道也乃圍宛宛急錡欲自殺其舍人陳恢踰城見沛公曰宛吏人懼死堅守足下盡日攻之死殞者必眾引兵而去宛必隨之足下前失咸陽之約後有強宛之患不如降封其守引其甲卒而西諸城未下者必開門而待足下沛公曰善封呂錡為殷侯攻武關大破秦軍趙高殺二世立子嬰遣兵拒關張良曰秦兵尚強未可輕也願益張旗幟諸山上為疑兵令酈食其持重寶啗秦將秦將果欲連和俱西沛公欲聽之良曰此獨其將欲叛恐士卒不從必危不如因其懈而擊之乃擊秦軍破之入咸陽與秦人約法三章秦人獻牛酒沛公讓不受於是人知德矣遣兵拒關欲王關中是時項羽破秦軍於河北率諸侯兵四十萬至鴻門欲擊沛公沛公因項伯自解于羽羽遂殺子嬰而東都彭城立沛公為漢王王巴漢漢王不肯就國欲攻楚蕭何曰王雖王漢之惡不猶愈於死乎且詩曰天漢其稱甚美夫能屈於一人之下則申於萬人之上湯武是, WYG: 苦}
