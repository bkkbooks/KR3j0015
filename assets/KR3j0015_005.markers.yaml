  - {type: variant, offset: 3275, length: 0, content: '', WYG: 中北擒馬服之軍雖周召呂望之功不益於此趙亡即秦王矣以武安}
  - {type: variant, offset: 3275, length: 0, content: '', krp: 中北擒馬服之軍雖周召呂望之功不益於此趙亡即秦王矣以武安}
  - {type: variant, offset: 3276, length: 0, content: '', WYG: 三公君能為之下乎欲無為之下固不得矣秦攻韓圍邢丘困上黨上黨之人皆歸趙不樂為秦人之日久矣今趙北地入燕東地入齊南地入韓魏君之所得無慮幾何故不如因而割之無以為武安君之功也於是應侯言於秦王曰秦兵疲勞請許韓趙之君割地以和秦既罷軍趙王使趙赦約事秦欲割六城而與之虞卿謂王曰秦之攻趙也倦而歸乎其力尚能進愛王而弗攻乎王曰秦之攻我無餘力矣必以倦歸耳虞卿曰秦以其力攻其所不能取倦而歸王又割其力之所不能取以送之是助秦自攻耳來年秦復求割地王將與之乎弗與則棄前功而兆後禍也與之則無地以給之語曰强者善攻}
  - {type: variant, offset: 3276, length: 0, content: '', krp: 三公君能為之下乎欲無為之下固不得矣秦攻韓圍邢丘困上黨上黨之人皆歸趙不樂為秦人之日久矣今趙北地入燕東地入齊南地入韓魏君之所得無慮幾何故不如因而割之無以為武安君之功也於是應侯言於秦王曰秦兵疲勞請許韓趙之君割地以和秦既罷軍趙王使趙赦約事秦欲割六城而與之虞卿謂王曰秦之攻趙也倦而歸乎其力尚能進愛王而弗攻乎王曰秦之攻我無餘力矣必以倦歸耳虞卿曰秦以其力攻其所不能取倦而歸王又割其力之所不能取以送之是助秦自攻耳來年秦復求割地王將與之乎弗與則棄前功而兆後禍也與之則無地以給之語曰强者善攻}
  - {type: variant, offset: 3277, length: 0, content: '', WYG: 者善守今聽秦秦兵不弊而多得地是强秦而弱趙}
