  - {type: variant, offset: 3278, length: 5, content: 夫楚兵雖強, WYG: 以益强之之求秦而割逾弱之趙其計固不止矣且王之地有盡而秦無已以有盡之地而給無已之求其勢必無趙矣王計未定樓緩從秦來王以問之緩曰不如與之虞卿曰臣言勿與非固勿與而已也秦索六城於王王以六城賂齊齊秦之深讐也得王之六城并力而西擊秦齊之德王不待辭之畢也則王失之於齊取償於秦而齊趙之深讐可以報矣且示}
  - {type: variant, offset: 3278, length: 5, content: 夫楚兵雖強, krp: 以益强之之求秦而割逾弱之趙其計固不止矣且王之地有盡而秦無已以有盡之地而給無已之求其勢必無趙矣王計未定樓緩從秦來王以問之緩曰不如與之虞卿曰臣言勿與非固勿與而已也秦索六城於王王以六城賂齊齊秦之深讐也得王之六城并力而西擊秦齊之德王不待辭之畢也則王失之於齊取償於秦而齊趙之深讐可以報矣且示}
