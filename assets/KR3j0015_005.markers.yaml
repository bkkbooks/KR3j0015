  - {type: variant, offset: 8727, length: 427, content: 莽託太后太后莽之姑也封為新都侯五侯競為僭起治第舍莽幼孤貧獨折節恭謹當世名士多為莽言上由是賢之拜為侍中莽交結將相收贍名士賑施賓客故虛譽隆洽傾熾其諸父矣時成帝廢許后立趙飛鷰飛鷰女弟為昭儀昭儀害後宮皇子帝無嗣乃立定陶王忻為皇太子忻者宣帝孫成帝弟之子初王祖母傅太后陰為王求為漢嗣私事趙皇后昭儀及帝舅王鳳故勸立之莽以發定陵侯淳于長大姦拜為大司馬初長與許皇后姊孊私通因孊孊賂遺長長許欲白上為左皇后時王根輔政久病長嘗代根莽心害長寵白根曰長與許貴人私交通見將軍久病私喜根怒令莽白長長下獄死時年三十八成帝崩哀帝即位立皇后傅后后即帝祖母定陶恭太后從女弟也封后父博晏為孔鄉侯帝母丁后曰恭皇太后舅丁明為安陽侯莽乞骸骨避丁傅也哀帝崩時莽以侯在第太皇太后令莽備佐喪事太皇太后元帝皇后也復為大司馬徵立中山王為帝即平帝帝名衎為中山王即孝王子也太皇太后臨朝莽秉政百官總己以聽於莽附順者拔擢忤恨者誅滅以王尋王邑為腹心甄豐甄邯主擊斷平晏典樞機劉歆典文章孫建為爪牙皆以才能並任顯職莽色厲而言方欲, WYG: ''}
