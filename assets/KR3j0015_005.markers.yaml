  - {type: variant, offset: 6998, length: 5, content: 偽遊雲夢會, WYG: 函谷關是大王之威行於山東敝邑恐懼懾伏繕甲厲兵唯大王有意督過之也今以大王之力舉巴蜀并漢中包兩周遷九鼎守白馬之津秦雖僻逺然而心忿含怒之日乆矣今有敝甲彫兵軍於澠池願渡河據番吾㑹戰邯鄲之下以甲子合戰以正殷之事故使臣先以聞於左右凡大王之所信為縱者恃蘓秦蘓秦熒惑}
