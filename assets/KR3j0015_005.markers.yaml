  - {type: variant, offset: 1353, length: 176, content: 金城湯池不可攻矣為君計者莫如以黃屋朱輪迎范陽令使馳騖於燕趙之郊則邊城皆將相告曰范陽令先下而身富貴矣必相率而降猶如阪上走丸也此臣所謂傳檄而千里定者也徐公再拜具車馬遣通通遂以此說武臣武臣以車百乘騎二百侯印迎徐公燕趙聞之降者三十餘城如蒯通策也項梁舉吳梁令項羽殺假守通便舉兵起吳吳今蘇州也田儋舉齊儋從少年縛奴欲殺之以見狄令因殺令舉兵也景駒舉郢周市舉魏韓廣舉燕窮, WYG: ''}
