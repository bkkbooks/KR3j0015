  - {type: variant, offset: 10854, length: 484, content: 充飽宜急分遣官屬巡行郡縣理冤結布惠澤世祖納之也王郎詐為成帝子子輿立為天子都邯鄲遣使降下郡國世祖滅之王昌一名王郎趙國邯鄲人也素為卜相常以河北有天子氣時趙繆王子林好奇數任俠趙魏間而郎與之善初王莽篡位長安中或稱成帝子子輿者莽殺之郎緣是稱真子輿云更始元年平林等率車騎數百晨入邯鄲城立郎為天子世祖進攻邯鄲郎少傅李立為反開關門內漢軍遂拔邯鄲斬王郎收文書得人吏與郎交關謗毀上者數十章世祖不省會諸將燒之曰令反側子自安也世祖威聲日盛更始疑慮乃遣使立世祖為蕭王令罷兵與諸將有功者還長安遣苗曾為幽州牧韋順為上谷守並北之部時世祖居邯鄲宮耿弇請閒說曰今更始失政君臣淫亂諸將擅命於畿外貴戚縱橫於都內天子之命不出城門所拜牧守輒自遷易百姓不知所從士人莫敢自安虜掠財物劫掠婦女懷金玉者至不生歸元元叩心更思王莽又銅馬赤眉之屬數十輩數及百萬聖公不能辦也其敗不久公首舉事南陽破百萬之軍令定河北據天府之地以義征伐發號響應天下可馳檄而定天下至重不可令他姓得之閒使者從西方來欲罷兵不可從也今吏士死亡者多弇願北歸幽州益發精兵以集大計世祖大悅弇歸上谷斬韋順等世祖辭不就徵斬苗曾等自是始貳於更始是時長安政亂四方背叛皆平之, WYG: ''}
