  - {type: variant, offset: 12243, length: 318, content: 上今使諸將屯澠池要其東異擊其西一舉而取之此萬成計也禹宏不從遂大戰赤眉佯敗棄輜重走車皆載土以豆覆其上兵士饑爭取之赤眉引還擊弘等弘等軍亂潰異與禹救之赤眉小卻異歸壁約期會戰異使壯士變服色與赤眉同伏於道側旦日赤眉使萬人攻異前部異裁出兵救之賊見勢弱遂悉眾攻異異乃縱兵大戰日昃賊氣衰伏兵卒起衣服相亂赤眉不復識遂驚潰赤眉君臣面縛奉皇帝璽綬降世祖平隗囂滅公孫述天下大定崩於南宮時年六十三世祖初起兵時年二十八末孫靈帝用奄人曹節等矯制誅太傅陳蕃李膺其黨人皆禁錮中平九年黃巾賊起鉅鹿張角自稱大賢良師奉事黃老道畜養子弟連結郡國期三月五日內外俱起唐周告之角便起皆著黃巾為標幟也靈帝崩太子辯即位董車入朝因廢帝為弘農王而立獻帝李傕逼帝東遷曹操遷帝都許操薨帝遜位于曹丕, WYG: ''}
