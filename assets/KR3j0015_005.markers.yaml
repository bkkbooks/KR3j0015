  - {type: variant, offset: 4056, length: 224, content: 成皋數月漢嘗困願王出武關項王必引兵南走王深壁令滎陽成皋閒且得休息使韓信等集于河北趙地君王乃復走滎陽如此則楚備者多力分漢得休息復與之戰破楚必矣漢王從此計出軍宛葉閒項王聞漢王在宛果引兵南渡如轅生之策韓信與張耳以兵數萬東下井陘擊趙破之乃報漢因請立張耳為趙王以鎮撫其國漢王從之初趙王與成安君陳餘聞漢且襲之聚兵井陘口廣武君李佐車說曰聞漢將韓信涉西河虜魏王擒夏說新喋血閼與今乃輔以張耳議欲下趙此乘勝而去國遠鬭其鋒不可當臣聞千里餽糧士有饑色樵蘇後爨師不宿飽今井陘, WYG: 晉}
