  - {type: variant, offset: 5167, length: 0, content: '', WYG: 秦天下之仇讐也衡人皆欲割諸侯之地以事秦此所謂養仇而奉讐大逆不忠無過此者故從親則諸侯割地以事楚衡合則楚割地以事秦此兩䇿者相去遠矣二者大王何居焉故敝邑趙王使臣効愚計奉明約在大王之詔詔之楚王曰善謹奉社稷以從楚襄王既與秦和慮無秦患乃與四子専為淫侈荘辛諌不聽辛去之趙後秦果舉鄢郢襄王乃徵辛而謝之荘辛曰臣聞鄙諺曰見兎而顧犬}
