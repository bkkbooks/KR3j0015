  - {type: variant, offset: 5200, length: 1, content: 口, WYG: 身體戰慄乃執珪而授荘辛與之謀秦復取淮北之地楚人有以弱弓微繳加歸鴈之上楚襄王召問之乃對以秦燕趙衛為鳥以激怒王曰夫先王為秦所欺而客死於外怨莫大焉今以匹夫尚有報萬乗子胥白公是也今以楚之地方五千里帯甲百萬猶足以踊躍於中野而坐受伏焉臣竊為大王弗取襄王遂復為縱約伐秦六國既合縱蘓秦為縱約長北報趙趙肅侯封秦為武安君乃投縱約書於秦秦不敢闚兵函谷十五年後張儀為秦連横秦欲攻魏先敗韓申差軍斬首八萬諸侯震恐而儀乃來説魏王説魏王曰秦孝公時公孫鞅請伐魏曰魏居嶺阨之間西都安邑與秦界河而獨擅山東之利利則西侵秦病即東收地今以君賢聖國賴以盛宜及此時伐魏魏不支秦必東徙東徙則據山河之固東向以制諸侯此帝業也自是之後魏果去安邑徙都大梁魏地方不至千里卒不過三十萬地四平諸侯四通條達輻凑無名山大川之限從鄭至梁二百餘里車馳人走不待倦而至梁南與楚境西與韓境北與趙境東與齊境卒戍四方}
