  - {type: variant, offset: 359, length: 3, content: 飾美女, WYG: 乎結世治足以敦風道衰足以禦暴强毅之國不能擅一時之勢雄俊之人無以寄霸王之志葢三代所以直道四王所以垂業夫興衰隆替理所固冇教之廢興存乎其人愿法期於必凉明道有時而闇故世及之制弊於强禦厚下之典漏於末折浸弱之釁遘自三季陵夷之禍終於七雄所謂末大必折尾大難掉此建侯之弊也蘇秦初合縱至燕周武定殷封召公於燕與六國並稱王說燕文侯曰燕東有朝鮮遼東北有林胡樓煩}
