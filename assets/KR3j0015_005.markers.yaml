  - {type: variant, offset: 19155, length: 798, content: 成篡事無暇有意于京師陛下以順伐逆義貫幽顯百姓以君命望陛下旗鼓以日為歲清泥上洛南師之要衝宜致遊軍斷其去來之路然後渡潼關塞崤峽絕其水陸之道聲檄長安申布恩澤三輔之人皆壺漿以迎王師矣義真獨坐空城逃竄無所一旬之間必見縛於麾下所謂兵不血刃不戰而自定也勃勃善之南伐長安高祖懼召義真東鎮洛陽以朱齡石守長安長安人逐齡石而迎勃勃遂失關中也鮮卑慕容超據守青州稱燕王高祖征擒超初超叔父德盜有三齊德死超襲其位遂寇淮北高祖將有事中華因其侵也乃北伐超大將軍公孫五樓說超曰吳兵輕銳難與爭鋒截斷大峴使不得入上策也堅壁清野芟除粟夌中策也據城待戰下策也超曰引使過峴我以鐵騎躪之成擒矣何據清野自取蹙弱乎初謀是役也諫者曰賊若不嚴守大峴則堅壁廣固守而不出軍無所資何能自支高祖曰不然鮮卑性貪略不及遠既幸其勝且愛其穀謂我孤軍將不及久必將引我且示輕戰師一入峴吾何患焉既逾峴虜軍未出高祖喜曰天贊我也眾曰軍未克公何悅焉高祖曰師既過險士有必死之志餘糧棲畝軍無匱乏之憂虜墮吾計勝可必也六月慕容超使五樓據臨胊羸老守廣固聞軍近超亦會焉距臨朐四十里有巨蔑水超使五樓往據之曰晉軍得水則難敗也五樓馳進前鋒孟龍符奔就爭先得據之五樓退大軍有四千人分為兩翼方軌徐進未及臨朐賊騎交至龍符等拒之日向側戰猶酣高祖謂檀韶等曰虜之精兵悉於是矣臨朐留守必將寡弱子以潛軍逾其後往必剋城多易旗熾此韓信所以剋趙也且吾前言兵自海道往必聲之韶等鼓行而進賊望曰海軍至超棄城走遂剋之軍聞城陷懼而不敢動高祖親鼓士兵咸奮大奔崩之超奔廣固進軍圍之城陷獲超歸於京師斬于建康市賊盧循據南海因高祖北伐燕乘虛下襲建業高祖還乃平之劉毅據荊州貳於高祖高祖遣將征誅毅裴子野曰義旗同盟莫有能全其功名者何也相與見疇曰之遄捷不知王業之艱難彼則褰裳濡足唯利是親我則芟夷群醜寧或負人劉希樂諸葛長明皆人傑也豈其可暗于天命亦勢使然歟假其何孟齡長庸詎其有血食善哉武王之作周也八百諸侯皆同會曰紂可伐矣尚還師于孟津豈不知順人行戮惡欲速多, WYG: ''}
