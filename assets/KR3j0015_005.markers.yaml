  - {type: variant, offset: 3803, length: 252, content: 數人大王能出捐數萬金行反閒閒其君臣以疑其心項王為人意忌信讒必內相誅漢因舉攻之破楚必矣漢王乃以四萬斤金與平恣其所為不問出入平既多以金縱反閒於楚軍宣言諸將鍾離末等為項王將功多矣然終不能裂地而封欲與漢為一以滅項氏分王其地項王果疑使使至漢漢為太牢之具舉進見楚使即佯驚曰吾以為亞父使乃項王使也復持去以惡具進楚使使歸具報項王項王大疑亞父亞父欲急擊漢王項王不信亞父亞父聞項王疑乃曰天下事大定矣君王自為之願賜骸骨項王從之入關收兵欲復東轅生說漢王出軍宛葉引項王南渡使韓信等得集河北羽兵果引兵南渡如其策轅生說曰漢與楚相拒於滎, WYG: 衛}
