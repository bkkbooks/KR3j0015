  - {type: variant, offset: 1530, length: 200, content: 通谷豪傑並起而亡秦族矣漢高祖名邦字季姓劉氏沛國豐邑人為泗上之亭長秦二世元年陳勝等起勝自立為楚王張耳陳餘諫曰將軍出萬死之計為天下除害今始至陳而自立為王是示天下之私也不如立六國後自為樹黨進師而西則野無交兵城無守牆誅暴秦據咸陽以令諸侯天下可圖也勝不聽沛人殺其令立高祖為沛公時項梁止薛沛公往從之共立義帝范增說項梁曰秦滅六國楚最無罪自懷王入秦不反楚人憐之故語曰楚雖三戶亡秦必楚今陳勝首事不立楚後其勢不長今君起江, WYG: ''}
