  - {type: variant, offset: 12131, length: 0, content: '', WYG: 危哉在周之難興王室也放命者七臣干位者三子嗣王委其九鼎凶族據其天邑鉦鼙震於閫宇鋒鏑流於絳闕然禍止畿甸害不覃及天下晏然以治待亂是以宣王興於共和襄恵振於晉鄭豈若二漢階闥蹔擾而四海已沸孽臣朝入而九服夕亂哉遠惟王莽簒逆之事近覽董卓擅權之際億兆悼心愚智同痛豈世乏曩時之臣士無匡合之志歟葢逺績屈於時異雄心挫於卑勢耳陸機曰或以諸侯世位不必常全昏主暴君有時比迹故五等所以多亂也今之牧守皆方庸而進雖或失之其得固多故郡縣易以為治也夫徳之休眀黜陟日用長率連属咸述其職而淫昏之君無所容過何則其不治哉故先代有以之興矣茍或衰陵百度自悖鬻官之吏以貨凖才則貪殘之萌皆羣后也安在其不亂哉故後王有以之廢矣且要而言之五等之君為己思治郡縣之長為利圗物何以徵之葢企及進取仕子之常志修已安民良士所希及夫進取之情銳而安民之譽遲是故侵百姓以利己者在位所不憚損實事以養名者官長所夙夜也君無卒嵗之圗臣挟一時之志五等則不然知國為己土衆皆我民民安已受其利國傷家嬰其病故上制人欲以垂後後嗣思其堂構為上無茍且之心羣下思膠固之義使其並賢居治則功有厚薄兩愚處亂則過有深淺然則探八代之制幾}
  - {type: page-break, offset: 12131, content: '', id: KR3j0015_WYG_005-34a, image: WYG0849/WYG0849-0118a.png}
