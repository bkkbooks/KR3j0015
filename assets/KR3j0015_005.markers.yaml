  - {type: variant, offset: 3303, length: 0, content: '', WYG: 為帝過而遂政於天下則連有􅌃東海而死耳吾不忍為之人也所以見將軍者欲以助趙衍曰先生助之將奈何魯連曰吾將使梁及燕助之齊}
  - {type: variant, offset: 3303, length: 0, content: '', krp: 為帝過而遂政於天下則連有蹈東海而死耳吾不忍為之人也所以見將軍者欲以助趙衍曰先生助之將奈何魯連曰吾將使梁及燕助之齊}
