  - {type: variant, offset: 6989, length: 1, content: 南, WYG: 名高天下光照隣國曹沬為魯君將三戰而喪地千里使曹子計不顧後死而不生則不免為敗軍擒将曹子以一劒之任刼桓公於壇坫之上顔色不變辭氣不悖三戰之所喪一朝而反之天下震動名傳後世若此二公非不能行小節死小恥也以為殺身絶世功名不立非智也故去忿恚之心而成終身之名故業與三王爭流名與天壤相弊也公其圗之燕將得書曰敬聞命矣遂自刎昔雍門周以琴見齊孟嘗君孟嘗君曰先生鼓琴亦能令人悲乎對曰臣之所能令悲者先貴而後賤昔富而今貧擯壓窮巷不及四隣不若身材高妙懷質抱真逢䜛離謗怨結而不得伸不若交歡而結愛無怨而生離逺赴他國無相見期不若幼無父母壮無妻兒出以野澤為都入用窟穴為家困於朝夕無所假貸若此人者但聞鶵鳥之號秋風鳴條則傷心矣臣一為之援琴而長太息未有不悽惻而涕泣者也今足下居則廣厦高堂連闥洞房羅帷來清風倡優在前諂䛕在側揚激楚舞鄭妾流聲以娛耳綵色以淫目水嬉則舫龍舟建羽旗鼓釣乎不測之淵也野逰則登乎平原馳廣囿强弩下高鳥勇士格猛獸置酒設樂沉醉忘歸}
