  - {type: variant, offset: 3264, length: 0, content: '', WYG: 如以兵南合三晉約戍韓梁之西邉山東不能為此此必皆亡矣燕果以兵南合三晉趙將伐燕蘇代為燕説趙王曰今者臣從外來過水見蚌方出曝而鷸啄其肉蚌合而挾其啄鷸曰今日不雨明日不雨必見蚌脯蚌亦謂鷸曰今日不出明日不出必見死鷸兩者不肯相捨漁父得而并擒之今趙且伐燕燕趙久相支以弊其衆臣恐强秦之為漁父也願大王熟計之趙王乃止齊宣王因燕衰伐燕}
  - {type: variant, offset: 3264, length: 0, content: '', krp: 如以兵南合三晉約戍韓梁之西邉山東不能為此此必皆亡矣燕果以兵南合三晉趙將伐燕蘇代為燕説趙王曰今者臣從外來過水見蚌方出曝而鷸啄其肉蚌合而挾其啄鷸曰今日不雨明日不雨必見蚌脯蚌亦謂鷸曰今日不出明日不出必見死鷸兩者不肯相捨漁父得而并擒之今趙且伐燕燕趙久相支以弊其衆臣恐强秦之為漁父也願大王熟計之趙王乃止齊宣王因燕衰伐燕}
  - {type: variant, offset: 3265, length: 0, content: '', WYG: 十城燕易王謂蘓秦曰先生能為燕得侵地乎秦曰請為王取之遂如齊見齊王拜而慶仰而弔齊王曰是何慶弔相隨之速也蘓秦曰臣聞饑人之所以饑而不食烏喙者為其愈充腹而與死人同患也今燕雖小弱即秦之女壻也大王利其十城而長與强秦為仇今使弱燕為鴈行而强秦推其後是食烏喙之類也齊王曰然則奈何蘓秦曰臣聞古之善制事者轉禍而為福因敗而為功大王誠能聽臣歸燕十城燕必大喜秦王知以己之故而歸燕之十城亦必喜此所謂棄仇讐而結碩友也齊王曰善於是歸燕十城蘓秦如趙趙之先與秦同祖周繆王使造父御破徐偃王乃賜造父以趙城趙氏世為晉卿也說趙肅侯曰臣竊為君計莫若安民無事且無庸有事民為也安民之本在於擇交擇交而得則民安擇交而不得則民終身不安請言外患齊秦為兩敵而民不得安倚秦攻齊而民不得安倚齊攻秦而民不得安君誠能聽臣燕必致氈裘狗馬之地齊必致魚鹽之海楚必致橘柚之園韓魏中山皆可使致湯沐之奉而貴戚父兄皆可受封侯夫割地包利五伯之所以覆軍擒將而求也封侯貴戚湯武所以放弑而爭也今君高拱而兩有之此臣之所為君願也夫秦下軹道則南陽危刼韓包周則趙自操兵據衛取淇卷則齊必入朝秦秦欲已得乎山東則必舉兵而嚮趙矣秦甲渡河踰漳據番吾則兵必戰於邯鄲之下矣此臣之所為君危也當今之時山東之建國莫强於趙趙地方二千餘里帶甲數十萬車千乘騎萬匹粟支數年西有常山南有河漳東有清河北有燕燕固弱國不足畏也秦之所害於天下莫如趙然而秦不敢舉兵而伐趙者何也畏韓魏之議其後}
