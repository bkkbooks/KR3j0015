  - {type: variant, offset: 13170, length: 877, content: 因之而起即山東非公所有也不如赦之拜一郡守紹喜於免罪必無患矣卓以為然乃遣授紹渤海太守紹與孔伷等同起義襲奪韓馥冀州據河北練精卒十萬騎萬匹欲進攻曹操於許沮授進說曰近討公孫師出歷年百姓疲弊賦役方殷此國之深憂也宜先獻捷天子務農逸民若不得通乃表曹操隔我王命然後進屯黎陽漸營河南益作舟船繕治器械分遣精騎抄其邊鄙令彼不得安我取其逸如此可坐定也郭圖審配曰兵書之法十圍五攻敵則能戰今以明公神武連河朔之強眾以伐曹操其勢譬如覆手今不時取後難圖也授曰蓋聞救亂誅暴謂之義兵恃眾憑強謂之驕兵兵義無敵驕者先敗曹操奉定天子建宮許都今舉兵相向於義則違且廟勝之策不在強弱曹操法令既行士卒精練非公孫瓚坐受圍者也今棄萬安之術而興無名之師竊為公懼之圖曰武王伐紂不為不義況兵加曹操而云無名且公師徒精銳將士思舊而不及時早定大業所謂天與不取反受其咎此越之所以霸吳之所以亡也監軍之計在於持牢而非見時知機之變也紹遂不用沮授之計曹公軍官渡紹將悉眾而南田豐說紹曰曹公善用兵變化無方眾雖少未可輕也不如以久持之將軍據山河之固擁四州之眾外結英雄內修農戰然後𥳑其精銳分為奇兵乘虛迭出以擾河南救右則擊其左救左則擊其右使疲於奔命人不得安業我不勞而彼已困不及三年可坐而克也今釋廟算之策而決成敗于一戰若不如志悔無及也紹不從遂攻操於官渡紹自引兵至黎陽沮授臨行散其資財會宗族以與之曰勢在威無不加勢亡則不保其身哀哉其弟宗曰曹操士馬不敵君何懼焉授曰以曹兗州之明略又挾天子以為資我雖克伯珪眾實疲弊而主驕將汰軍之破敗在此舉也揚雄有言六國嗤嗤為嬴弱姬殆今之謂耶及渡河臨舟嘆曰上盈其志下務其功悠悠黃河吾將濟乎紹果為曹公所敗紹進保武陽與操相持沮授又說曰北兵雖眾而果勁不及南南穀虛少而財貨不及北南利在於急戰北利在於緩搏宜持以久曠以日月紹不從連營漸逼官渡許攸進曰曹操兵少而悉師拒我許下餘守勢必虛弱若分遣輕騎星行掩襲許拔則操為成擒如其未潰可令首尾奔命破之必也紹又不能用會攸家犯法審配收繫之攸不得志遂奔曹公而說操襲取淳于瓊瓊時督軍屯在烏巢去紹軍四十里操自將急擊之時張郃說紹曰曹公兵精往必破瓊瓊破則將軍事去宜引兵救之郭圖曰郃計非也不如攻其本營勢必還此為不救, WYG: ''}
