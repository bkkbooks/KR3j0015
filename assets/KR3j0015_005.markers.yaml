  - {type: variant, offset: 9407, length: 360, content: 莽遣王尋王邑擊更始二人兵敗于昆陽漢兵遂入城中人皆降莽走漸臺藏於室中北隅閒校尉公孫賓就斬莽遂傳首詣更始于宛世祖光武皇帝諱秀字文叔南陽蔡陽人高皇帝之九代孫也王莽末天下連歲災蝗寇盜蜂起莽末南方饑饉人民群入野澤掘鳧茈食更相侵奪新市人王匡為平理爭訟遂推為渠帥時劉玄避吏平林時世祖避吏新野因賣穀宛宛人李通以圖讖說世祖通父守好讖記通素聞守說云劉氏復興李氏為輔私嘗懷之及下江新市兵起通弟軼乃共計議曰今四方擾亂新室且亡漢當更興南陽宗室獨劉伯升兄弟汎愛容眾可與謀大事笑曰吾意也會世祖避事在宛通聞之即遣軼迎世祖遂相約結未幾世祖與伯升鄧晨俱之宛與欀人蔡恭少公等讌語少公頗學圖讖言劉秀為天子或曰是國師劉秀乎世祖笑曰何用知非僕耶坐者皆大笑晨心獨喜後因謂世祖曰王莽殘暴盛夏斬人此天亡之時往時之會宛語獨當應耶世祖笑及漢兵起鄧晨遂往從之世祖於是與通弟李軼, WYG: 梁}
