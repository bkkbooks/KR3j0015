  - {type: variant, offset: 26982, length: 2115, content: 疲轉餉高穎賀若弼先朝重臣勳德俱茂薛道衡英華冠世經綸之才咸被非辜卒遭夷戮賢哲之士退諂佞之士昇又頻年討遼征役不息行者不反國用空虛白骨被于原野肝膽塗於草澤悠悠冤魂有請上帝將假手於人矣及在鴈門取辱戎虜重圍既解理須寧息方更巡遊吳越翱翔上江頭會箕斂以供行樂士卒無短褐後宮厭羅綺士卒無糟糠犬馬賤粟肉甲冑生蟣蝨戎馬不解鞍拒諫飾非無心反駕遂使九縣瓜分八紘幅裂以天下之富四海之貴一旦棄之猶曰無罪臣竊為陛下羞之乃默然縊殺之五月戊午天子侑遜位于別宮禪位于唐都長安大業末謠曰桃李子洪水遠揚山苑在花園裏李唐姓也洪水者唐王諱也楊隨姓也花者華不實也園囿也代王名侑侑與囿音同言楊侑雖為帝終於歷數有歸唐王當踐其位也己巳王世充段達等立越王侗為皇帝於洛陽六月宇文化及自江都至彭城據黎陽稱許李密率大軍壁清淇敦煌張守一聞密之拒化及也說越王以討越王不用其策用孟琮計與密連和張守一說曰臣聞鴻鵠之翮未就沖天之情已萌武豹之文未備食牛之心已成今陛下據全周之地背河面洛帶甲十萬粟支數十年此霸王之資非待翮成文備之勢也固城自守不以濟世為心何異夫群蟻之嬰一穴乎竊為陛下不取越王曰若之何對曰三王之興五伯之舉莫不由兵以成大業故夏啟有甘野之師齊桓起邵陵之眾皆以征討不庭伐叛威慝者也今天下土崩英雄競起為陛下腹心之患者莫過夏魏夏遣師涉河則東都非陛下之地魏遣師踰洛據洛口之粟陛下有累卵之危無以加也臣聞兵以正合而以奇勝韓信所以斬成安子房所以降秦也請選精銳之士二萬人守洛陽三萬人循河而守以備夏寇陛下親率大軍出洛口掩魏之師魏之君臣謂陛下從天而至倉卒之閒智者不為計矣李密既滅則建德懾氣備守邊疆相時而動則文皇之業可修世祖之基不墜越王曰朕新受命人神未附兵革屢興恐士大夫解體於我守一曰陛下以累聖之資繼二祖之業雖夏人之思禹德復戴少康漢室之戀劉宗重尊光武以今況古彼有慚德況密有可伐之勢者三何則始密與翟讓同起烏合之眾大業已就密乃殺讓而奪其位士卒初喪其主鬼神新失其祀人神未附一也地廣兵眾法令不明賞罰不信二也精銳之卒並拒秦王鞏洛所留悉皆老病乘其虛而襲之必得志矣三也志曰奪人之先又曰天時不如地利地利不如人和陛下兼此三事又居之以先無不克矣王將從之孟琮曰化及率思歸之眾其鋒不可當李密英雄勇略不世非密無以滅化及且襲之不得復生一化及臣請說以利害示以大節使為元戎以除凶祲徐議其後未為晚焉王曰善孟琮東說密曰明公以烏合之卒密邇王城罕慕德之人無山澤之固兵法所謂四分五裂特所忌焉今東有化及之師西有東都之眾東拒化及則王師襲其後東都而不行則化及之師日至於是六軍出洛口化及下武牢誠恐不暇轉旋敗亡已及今皇帝世宗成帝之子世祖明帝之孫也以累世之資當樂推之運士馬百萬據有舊都宇文化及懷音蔑聞親行梟鏡主人枕戈待旦將卒蓄力待明將軍誠能率先啟行誅鋤兇暴則有磐石之安無累卵之危也晉文捨斬袪齊桓置射鉤況主上聖哲自天寬和容眾勿以疇昔之失過望於皇帝也狐裘羔袖將軍擇焉密初聞張守一之謀大懼及琮至大悅使記事李儉朝越王大悅拜密為太尉魏國公李密無東都之慮盡銳攻化及破之密自敗化及益以驕傲越王命王充擊密密不用祖君彥計密師敗績遂西奔京師尋謀叛殺之王世充之擊密也密會群寮議之裴仁基曰世充今悉銳而至洛下必空但堅守其要路無令得東而已以銳卒三萬循河曲西上示逼東都東都必急世充必救待其至洛然後還軍如此吾有餘力彼勞奔命兵法所謂彼出則歸彼歸則出數戰以疲之多方以誤之也密曰公知其一不知其二今世充之兵不可當者三兵仗精銳一也決計深入二也食盡求戰三也我但乘城固守蓄力待時彼欲戰不得求走無路不盈十日此充之首可致麾下諸君以為何如單雄信曰以樂戰之兵當思歸之卒饑飽不敵戰必剋矣祖君彥曰不可夫師曲為老師正為直曲則為饑直則為飽世充挾隋室之威不可為曲主公以逆為名不可為直裴光祿之謀一時之上也主公之策久之上也單將軍之言滅亡之下也夫物不兩大勝無常資故慶者在閭弔者在門誠恐乘於化及必殆於世充請按甲息兵俟時觀釁世充志大而體強心勇而多悍忸於自伐必有異圖不盈數年禍將作矣然後仗順而舉應天順人嵩岳為城洛水為池武臣勁兵經略于外文吏儒士守之於內孰與邀一時之功墜萬全之業欲取之先與之將弱之必強之欲取而不與必受天咎將弱而不強必受天殃願主公姑與之而強之我承其弊以全制其後無不捷矣密曰智哉欲不戰王伯當單雄信曰天下安樂百姓無事耨文耒墨從容於廟堂武不如文四海沸騰英雄競起角帝圖王蕩清氛祲文不如武各有其時不可戾也越王淫虐之餘天厭之久矣且天命不常能者代之何曲直之有請以定亂屬武臣制治屬文吏今日不戰大事去矣密遂用單雄信策合戰密師敗績世充乘勝趨洛口密左長史邴元真以倉城降密奔虎牢不敢入北渡河遂奔唐初王伯當與單雄信徐世績俱為密將軍中號為三傑故密信之而戰大唐武德二年王充殺越王侗於洛陽僭稱尊號隨氏滅矣梁時沙門寶誌為書曰牽三來就九索虜下殿走意欲東南遊厄在彭城口今茲三月江東童謠曰江水何冷冷楊柳何青青人今正好樂已復戍彭城牽三就九十二年也戍索言輸也吳人謂北人為虜江都西有彭城村村有彭城水上引其水入西閣之下果於此被執初上在江都聞英雄競起皆曰此乃狂賊終無所成及聞義師起上方臥驚起曰此得之矣楊廣博覽多聞而不知李諱為天子安用聖為撫心而歎久之復臥曰王者不死天自成人也論曰干寶稱帝王之興必俟天命苟有代謝非人事也堯舜內禪體文德也漢魏外禪順大名也湯武革命應天人也高光爭伐定功業也各因其運而, WYG: ''}
