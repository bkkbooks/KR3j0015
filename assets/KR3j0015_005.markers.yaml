  - {type: variant, offset: 7308, length: 1, content: 問, WYG: 及豨敗上曰代居常山北趙乃從山南有之逺乃立二子為代王也夫趙王之狼戾無親大王之所明見且以趙為可親乎趙興兵攻燕再圍燕都而刼大王大王割十城以謝今趙王已入朝澠池効河間以事秦今大王不事秦秦下甲雲中九原驅趙而攻燕則易水長城非王有也今王事秦秦王必喜趙不敢妄動是西有强秦之援南無齊趙之患是故願大王熟計之燕王聽張儀張儀歸報秦燕王使太子丹入質於秦秦欲使張唐相燕與共伐趙以廣河間地張唐謂呂不韋曰臣嘗為昭王伐趙趙怨臣今之燕必經趙臣不可行不韋不快未有以强之其舎人甘羅年十二謂不韋曰臣請為君行之遂見張唐曰君之功孰與武安君唐曰武安君南挫强楚北滅燕趙戰勝攻取破城隳邑不可勝數臣之功不如也甘羅曰應侯之用於秦孰與文信侯専唐曰應侯不如文信侯専甘羅曰昔應侯欲伐趙武安君難之去咸陽十里賜死於杜郵今文信侯自請君相燕而不肯行臣不知君所死處也張唐懼曰請因孺子行行有日矣甘羅又謂文信侯曰借臣車五乗請為張唐先報趙文信侯遣之甘羅如趙説王曰王聞燕太子丹入秦乎曰聞之聞張唐之相燕乎曰聞之甘羅曰燕太子丹入秦者燕不欺秦也張唐相燕者秦不欺燕也燕秦不相欺無異故欲攻趙而廣河間地王不如賚臣五城以廣河間臣請歸燕太子與强趙攻弱燕趙王曰善立割五城與秦燕太子聞而歸趙乃攻燕得二十城今秦有其十也於是楚人李斯梁人尉繚説於秦王曰秦自孝公已來}
