  - {type: variant, offset: 24069, length: 622, content: 咀痛茹哀嬰忍憤酷自紫庭絳闕胡塵四起掖垣好畤冀馬雲屯豺狼當路非止一人鯨鯢不梟經載矣天威既振冤恥並雪百司岳牧仰祈宸鑒咸以鍚圭之功既歸有道當璧之禮允屬聖明而優詔謙沖窅然凝邈飛龍可躋而乾爻在四帝閽云叫而閶闔未開謳歌再馳是用翹首豈可久稽群議有曠彝則也景平湘東王即位于江陵是為孝元皇帝武帝第七子也魏使萬紐于謹來攻梁王蕭詧率眾會之帝見執魏人戕帝初武陵之平議者欲因其舟艦遷都建鄴宗懍黃羅漢皆楚人不願移曰建鄴王氣已盡渚宮州已滿百於是乃留尋而歲星在井熒感守心帝觀之慨然謂朝臣曰吾觀玄象將恐有戴但吉凶在我運數由天避之何益尋為魏軍所逼城陷見執進土囊而殞之古老相傳云洲滿百荊州出天子桓玄為荊州刺史內懷逆意乃遣鑿一洲以應百數隨而崩破竟無所成宋文帝為宜都王在藩一洲自立俄而文帝篡統太清末枝江揚之閤浦生一洲明年而梁元帝立承聖末其洲與大岸通也江陵既陷王僧辯陳霸先等議立帝子方智是為敬皇帝元帝第九子於江州奉迎至建業即位太平二年禪位于陳陳高祖武皇帝姓陳氏名霸先吳興長城人也梁武帝時為直閤將軍侯景反高祖率所領與侯景大戰侯景敗死湘東王即位授南徐州刺史還鎮京口承聖三年西魏攻陷西臺高祖與王僧辯立晉安王進帝位司空僧辯又與齊氏和親納貞陽侯高祖嘆曰嗣主高皇之孫元皇之子竟有何辜生見廢黜假立非次此情可知也高祖以為不義潛師襲王僧辯于石頭剋之是夜縊僧辯貞陽侯遜位晉安王復立徐嗣徽北引齊師遣蕭軌等四十六將濟江至幕府山高祖並破之進位丞相進爵為陳王永定三年梁帝禪位於陳三年熒惑在天尊也上崩時上長子衡陽王為質, WYG: 迄}
