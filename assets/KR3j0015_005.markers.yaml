  - {type: variant, offset: 7010, length: 3, content: 西界信, WYG: 國而韓梁稱為東藩之臣齊獻魚鹽之地此斷趙之右臂也夫斷右臂而與人鬬失其黨而孤居求欲無危豈可得乎今秦發三軍其一軍塞午道告齊使興師渡河軍於邯鄲之東一軍軍於成臯驅韓梁軍於河外一軍軍澠池約四國而攻趙趙服必四分其地是故不敢匿意隠情先以}
