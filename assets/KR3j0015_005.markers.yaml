  - {type: variant, offset: 8242, length: 300, content: 將軍計莫若引兵東壁昌邑以梁餧吳吳必盡銳攻之將軍深溝高壘使輕兵絕准泗口吳糧道絕使吳梁相弊而糧食竭乃以全制其極破吳必矣條侯曰善因請上曰楚兵剽輕難與爭鋒願以梁餧之絕其糧道乃可制也上許之亞夫至滎陽吳方急攻梁梁急請救亞夫引兵東北走昌邑深壁而守梁王使使請亞夫亞夫守便宜不往堅壁不出而使弓高侯等屯吳楚兵後絕其餉道吳楚兵乏糧饑欲退數挑戰終不出吳楚既餓乃引兵而去亞夫出精兵追擊大破吳也崩太子徹立是為武帝崩子勿陵立是為昭帝霍光輔政上官桀害光寵詐為帝兄燕王旦上書稱光行上林稱蹕又私調校尉帝不信而上官桀詐偽事果發伏誅崩立武帝孫昌邑王賀賀昌邑哀王髆之子即位二十七日事有千一百二十七條霍光廢賀為海昏侯也廢立武帝曾孫詢是為宣帝帝衛, WYG: 藩扞及皇}
