  - {type: variant, offset: 12109, length: 6, content: 敢抗諱文德則, WYG: 謀作左官之律仕於諸侯王為左官設附益之法封諸侯過限曰附益諸侯唯得衣食租稅不與政事至於哀平之際皆繼體苖裔親属疏遠生於帷􅀈之中不為士民所尊割削宗子有名無實天下曠然復襲亡秦之軌矣故王莽知漢中外殫微本末俱弱}
