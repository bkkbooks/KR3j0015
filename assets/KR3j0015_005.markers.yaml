  - {type: variant, offset: 5173, length: 0, content: '', krp: 四翼飛翔乎天地之間俛蚉䖟而食之承白露而飲之自以為無患與人無爭也不知夫五尺童子方將調飴膠絲加已乎四仭之上而}
  - {type: variant, offset: 5174, length: 10, content: 急復進兵收滎陽據敖倉, WYG: 為螻蟻之食蜻蛉其小者也黄雀因是以俯啄白粒仰棲茂樹鼓翅奮翼自以為無患與人無爭不知夫公子王孫左挾彈右攝丸以其類為招畫棲乎茂樹夕調乎酸醎黄雀其小者也蔡靈侯因是以南逰乎髙陂北陵乎巫山飲茹溪之流食湘波之魚左枕㓜妾右擁嬖女與之馳騁乎髙蔡之中而不以國家為事不知夫子發方受令乎靈王繫已以朱絲而見之也蔡靈侯事其小者也君王因是以左州侯右夏侯飯封禄}
