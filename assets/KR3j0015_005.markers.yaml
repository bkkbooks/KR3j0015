  - {type: variant, offset: 3269, length: 0, content: '', WYG: 熟計之臣聞明主絶疑去讒屏流言之迹塞朋黨之門故尊主强兵之臣得陳忠於前矣故竊為大王計莫若一韓魏齊楚燕從親以叛秦合天下之將相㑹於洹水之上通質刑白馬而盟約曰秦攻楚齊魏各出鋭師以佐之韓絶其糧道趙涉河漳燕守常山之北秦攻韓魏則楚絶其後齊出鋭師以佐之趙涉河漳燕守雲中秦攻齊則楚絶其後韓守成臯魏塞其糧道趙涉河漳博闗燕出鋭師以佐之秦攻燕則趙守常山楚軍武闗齊涉渤海今滄州也韓魏皆出鋭師以佐之秦攻趙則韓軍宜陽楚軍武闗魏軍河外齊涉清河今貝州也燕出鋭師以佐之諸侯有}
  - {type: page-break, offset: 3269, content: '', id: KR3j0015_WYG_005-7a, image: WYG0849/WYG0849-0104c.png}
