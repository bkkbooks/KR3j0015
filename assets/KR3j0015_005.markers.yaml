  - {type: variant, offset: 12117, length: 0, content: '', WYG: 忌憚生其姦心因母后之權假伊周之稱専作威福廟堂之上不降階序而運天下詐謀既成遂據南面之尊分遣五威之吏馳𫝊天下班行符命漢諸侯王蹶角稽首奉上璽紱唯恐居後豈不哀哉及莽敗天下雲擾隗嚻擁衆天水班彪避難從之囂問彪曰往者周失其馭戰國並爭天下分裂數世乃定意者縱横之事復起於今乎将承運迭興在於一人也願先生試論之對曰周之廢興}
