  - {type: variant, offset: 635, length: 511, content: 晏子曰如君之言其陳氏乎陳氏雖無大德而有施於人豆區釜鍾之數其取之公也薄其施之人也厚公厚斂焉陳氏厚施焉人歸之矣詩云雖無德與汝式歌且舞陳氏之施人歌舞之矣復世若少惰陳氏而不亡則國其國也已後果篡齊智伯從韓魏之君伐趙韓魏陰謀叛智果曰二王殆將有變不如殺之不殺則遂親之智伯曰親之奈何智果曰魏宣子之謀臣趙葭韓康子之謀臣段規是皆能移其君之計君與二君約破趙則封二子萬家之縣各一如是則二主之心可以無變智伯不從韓魏果反殺智伯於是強國務功弱國務守合縱連衡馳車轂擊介冑生蟣蝨人無所告訴及至秦蠶食天下并吞戰國一海內之政壞諸侯之城法嚴政峻諂諛者眾使蒙恬將兵北攻胡尉他將卒以戍越宿兵無用之地人不聊生始皇崩天下大叛陳勝吳廣舉於陳陳涉吳廣戍漁陽屯大澤會天雨道不通度已失期失期當斬二人乃謀曰今已失期當斬今舉大計亦死等死為國可乎乃先以鬼神威眾因斬尉召令徒屬曰公等遇雨皆已失期失期當斬藉第令毋斬而戍死者固十六七耳壯士不死則已死則舉大名侯王將相寧有種乎徒屬皆曰敬受命遂分將徇地自立為陳王武臣張耳舉於趙武臣略定趙地號武信君蒯通說范陽令徐公曰范陽百姓蒯通也竊憫公之將死故弔雖然賀公得通而生也徐公再拜曰何以弔之通曰足下為令十年矣殺人之父孤人之子斷人之足黥人之首甚眾然而慈父孝子, WYG: 夫燕}
