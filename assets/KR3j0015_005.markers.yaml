  - {type: variant, offset: 6978, length: 0, content: '', WYG: 對曰韓安得不聽王若下兵攻滎陽則成臯之道不通北斷太行之道則上黨之師不下王一興兵而攻滎陽則其國斷而為三韓必見危亡矣安得不聽若聽則覇事固可慮矣王曰善乃從之張儀説齊湣王曰天下强國無過齊者大臣父兄殷衆富樂然為大王計者皆為一時之説不顧百代之利縱人説大王者必曰齊西有强趙南有韓梁齊負海之國也地廣民衆兵强士勇雖有百秦将無奈齊何也大王賢其説而不計其實臣聞齊與魯三戰而魯三勝國以危亡隨其後雖有戰勝之名而有破亡之實是何也齊大而魯小也今秦之與齊也猶齊之與魯也今秦楚嫁女娶婦為昆弟之國韓獻宜陽魏効河外趙入朝歌澠池割河間以事秦大王不事秦秦驅韓梁攻齊之南地􅊖趙兵渡清河指博關臨菑即墨非王有也國一旦見攻雖欲事秦不可得也是故願大王熟計之齊王許之燕攻齊取七十餘城唯莒即墨不下齊田單以即墨破燕殺騎刼燕將懼誅而保聊城不敢歸田單攻之嵗餘聊城不下魯連乃為書約之矢以射城中遺燕將書曰吾聞之智者不倍時而棄利勇士不怯死而滅名忠臣不先身而後君今君行一朝之忿不顧燕王之無臣非忠也殺身亡聊城而威不信於齊非勇也功廢名滅後世無稱非智也故智者不再計勇者不再却今死生榮辱尊卑貴賤此其時也願公詳計而無與俗同且楚攻齊之南陽魏攻}
