  - {type: variant, offset: 25094, length: 1887, content: 竊郊畿蜂蠆有毒宜時掃定以蕭摩訶為皇畿大都督分兵守要害僧尼道士盡皆執役隋軍南北道並進眾軍敗績矣韓擒虎入自南掖門文武各官皆遁擒後主隋師之入也僕射袁憲勸端坐殿上正色待之後主曰鋒刃之下未可交當吾自有計乃逃於井隋軍人以繩引之驚其太重乃與張貴妃孔貴人同乘而上隋文帝聞之大驚鮑宏對曰東井於天文為秦分今王都所在投井其天意也先是江東多唱王獻之桃葉辭云桃葉復桃葉渡江不用楫但渡無所苦我自迎接汝及晉王廣軍於六合鎮其山名桃葉果乘陳船而渡之也晉王廣入據臺城送後主于東宮三月癸巳後主與三公百司發自建鄴之長安及至京師列陣輿服引後主及王公使宣詔讓後主後主屏息不能對封長城公隋文帝東巡登芒山後主侍飲賦詩曰日月光天德山河壯帝居太平無以報願上東封書及出隋文帝目送之曰此敗豈不由詩酒將作詩功夫何如思安時事也至仁壽四年終於洛陽先是蔣山眾鳥鼓翼撫膺曰奈何帝奈何帝後主在東宮時有鳥一足集其殿庭以嘴畫地成文曰獨足上高臺盛草化為灰欲知我家處朱門當水開解者以為獨足言後主獨行無眾盛草言荒穢隋承火運草得火而灰及至京師家於都水臺所謂高臺當水也有會稽人史溥曾夢著朱衣人武冠自天而下以手執金牌溥往看上文曰陳氏五主三十四年陳亡果如夢梁末童謠云可憐巴馬子一日行千里不見馬上郎但見黃塵起黃塵污人衣皂莢相料埋及僧辯滅群臣以謠言奏言僧辯本乘巴馬擊侯景馬上郎王字也塵謂陳也而不解皂莢之謂既而陳滅于隨說者以為江東以羯羊角為皂莢隋氏姓楊楊羊也言終滅於隨北齊末諸省官多稱省主言主將見省也則知興亡之兆盡有徵云隋高祖姓楊氏名堅周武帝初為隋州刺史女為太子妃周宣帝立拜為大司馬宣帝崩立靖帝進爵為隨王遂禪位焉改號開皇元年九年平陳廢太子勇為庶人立晉王廣為皇太子高祖崩太子即位是為煬帝煬帝無道盜賊蜂起十三年幸江都李密設壇於鞏自署為魏公密遼東人蒲山公寬之子也少倜儻有大志常有思亂之心與楊玄感為刎頸交玄感以勢淩之密怒曰決機兩陣之間暗啞叱吒嗟三軍披靡邀功一時密不如公若涉彼長途驅策賢俊使各申其用公不如密豈可以一階一級而輕天下士大夫耶及玄感反密歸之為其謀主後玄感敗密變姓名奔翟讓讓立密為魏公開幕府置僚屬凡十餘萬人梁師都據夏州劉武周殺太原留守王恭舉兵反竇建德自號夏王朱粲自號楚王劉元進據吳都煬帝聞群賊起大懼使馮慈明徵兵東都煬帝聞盜賊蜂起召群臣問之皆曰此鼠竄狗偷何足以憂侍御史韋德裕曰今海內土崩綱紀大壞而內史侍郎虞世基御史大夫裴蘊等阿媚陛下隱秘不言所謂積薪已燃宗廟必不血食矣周書曰綿綿不絕將成江河陛下勿以諛言不以介意乃詔馮慈明詣東都徵兵將以討密為徼邏所獲歸之李密密聞慈明至大悅謂慈明曰皇天無親唯德是輔主上毒流四海天下咸知密糾合蒼生思平宇內熊羆之士百萬有餘據敖食之粟帶成皋之險干戈精練甲冑堅實決東海可西流蹴太山可東倒以此禦敵何敵不摧以此攻城何城不陷東都危急不日將降幸少留意同建功名慈明曰蒲山公策名先帝位極朝端明公不思造我之恩翻懷反噬之志棄皇隨之大德即梟感之頑囂惡積禍盈敗不旋踵網漏吞舟至于今日昔巨君以天下之眾弊於光武處仲以江左之師窮乎明帝明公以烏合之卒不越數千狼顧鴟張強梁村塢唯德是輔公何預焉密乃幽之于司徒府慈明密令人詣東都事泄翟讓殺之詔唐國公諱鎮太原五月甲子唐公舉義兵遙尊煬帝為太上皇立代王侑為天子行伊霍故事傳檄天下聞之響應此裴寂殷開山計也代王侑時在西京秋七月唐公將西圖長安仗白旗誓眾於太原之野被甲三萬留公子元吉守太原義師次霍邑隨武牙郎將宋老生拒義師時連雨不霽糧運不給又譌言突厥將襲太原唐公懼命旋師用秦王諫乃止秦王諫曰獨夫肆虐天下崩離狼顧蜂飛跨州連縣丈夫不得耕耘女子不得紡績故仗劍汾晉舉旆參墟斬封豕以安萬人戮鯨鯢而清四海據崤函之故挾天子之威令諸侯定天下是以聞之響應投赴如歸今遇小敵便將反旆恐義師一朝解體大事去矣勢不可全歸守太原則一城賊耳恐不旋踵禍變仍生乃止也老生背城而陣一戰斬之平霍邑諸城皆降唯屈突通鎮河東堅守不下也冬十月義師次長樂宮衛文昇挾代王乘城拒守十一月平京師尊代王為天子改元義寧遣使四出徇郡縣隋行宮唐公悉罷之後宮還其親屬初隨將多侵百姓百姓患之及義師至秋毫無犯皆曰真吾君矣時煬帝將之丹陽而大臣將卒皆北人不願南遷咸思歸宇文化及因百姓之不堪命殺煬帝於江都隋室王侯無少長皆斬之立嗣王浩為天子化及為丞相上曾夢見青衣兒曰去亦死往亦死不若乘船渡江水裴蘊虞世基皆南人贊成其事將卒不願南遷將因會鴆之南陽公主懼殺其婿以謀告宇文士及士及告其兄化及遂反執帝帝曰吾何負於天地而至此乎馬文舉對曰臣聞萬姓不可無主故立君以撫之是知一人養萬姓非萬姓養一人高祖文皇帝粵有下國丕隆大寶除苛政布恩德南滅強陳北滅狡虜二十餘年河清海晏既而棄世昇遐陛下即位違遠社稷委棄京師巡遊行幸略無寧歲漕通河洛控引江淮丁壯倦勞苦老, WYG: ''}
