  - {type: variant, offset: 14049, length: 5105, content: 解也郃曰曹公營固攻之必不拔若瓊等見擒吾屬盡為虜矣紹但遣輕騎救瓊而以重兵攻操營不能下曹公破瓊焚其積聚紹軍潰散奔北曹公遂破紹乃威震天下也太祖討紹子譚尚於黎陽尚與熙奔遼東太守公孫康斬尚熙送其首遂平河北初太祖討譚尚於黎陽連戰數克諸將欲乘勝攻之郭嘉曰袁紹愛此二子莫適立也有郭圖逢紀為之謀臣定鬭其閒還相離也急之則相持緩之則爭心生不如南向荊州征劉表以待其變變成而後擊之可一舉而定也太祖曰善太祖方征劉表譚果與弟尚爭冀州譚遣辛毗乞降請赦太祖以問群臣群臣多以為表強宜先平之譚不足憂也荀攸曰天下方有事而表坐保江漢閒其無四方之志可知矣袁氏據四州之地帶甲十萬紹以寬得眾欲使二子和睦以守其成業則天下之難未息今兄弟遘惡其勢不兩全若有所并則力全力全則難圖也及其亂而取之則天下不足定也此時不可失也太祖曰善乃許譚和破袁尚太祖征劉表會表卒子琮降劉表字景升山陽高平人初平元年詔以表為荊州刺史南接五嶺北據漢川地方數千里帶甲十餘萬曹操與袁紹相持與官渡紹遣人求助表許之而不至亦不援操且欲觀天下之變劉先主說表曰今豪傑並爭兩雄相持天下之重在于將軍將軍若有所為起乘其弊可也如其不然固將擇所宜從豈可擁甲十萬坐觀成敗求援而不能助見賢士而不能歸此兩怨必集於將軍恐不得復中立矣曹操善用兵且賢俊多歸之其勢必舉袁紹然後移兵向江漢恐將軍不能禦也今之勝計莫若以荊州附操操必重德將軍長享福祚垂之後嗣此萬全之策也表不從十三年曹操自將征表未至表疽發背卒操軍新野傅巽說琮歸降琮曰今與諸君據全楚之地守先君之業以觀天下何為不可巽曰逆順有大體強弱有定勢以人臣拒人主逆道也以新造之楚而禦中國必危也以劉備而敵曹公不當也三者皆短欲以抗王師之鋒必亡之道也將軍自料何如劉備琮曰不若也巽曰誠以備不足禦曹公則雖保全楚不能以存誠以劉備足敵曹公則備不能為將軍下也願將軍勿疑琮遂舉眾降時劉備奔在荊州表不能用聞荊州降遂奔夏口也關中諸將馬超韓遂成宜等反曹公破之曹公與馬超等夾關為界曹公急持之而潛遣徐晃等夜渡蒲阪津據河西為營公自潼關北渡未濟超赴船急戰丁斐放牛馬以餌賊賊亂取牛馬公乃得渡結營河南超遣信求割地任子以和公偽許之韓遂請與公相見至期交馬上語移時不及軍事但說京都故舊拊手歡笑既罷超問遂何言遂曰無所言超疑之他日公又與遂書多所毀滅點逭如遂改定者超愈疑遂曹公乃與戰大破之關中平諸將問公曰初賊守潼關渭北道鈌不從河東擊馮翊而反守潼關引口而復北渡何也公曰賊守潼關若吾入河東賊必引守諸津則河西未可渡也吾故盛兵向潼關賊悉眾南守西河之備虛故二將得擅取西河然後引軍北渡賊不能與吾爭西河者以有二將之軍連車樹柵為甬道而南者既為不可勝且以示弱渡河為堅壘虜至而不出所以驕之也故賊不為營壘而求割地吾順言許之所以從其意使自安而不為備因畜士卒之力一旦擊之所謂疾雷不及掩耳卒電不及暝目兵之乘變固非一道也天子策命公為魏王孫權稱吳王據江東劉備襲益州牧劉璋據蜀天下遂三分矣二十五年薨于洛陽子丕嗣丕字子桓武帝太子也是為文帝受漢禪崩子睿嗣睿字元仲文帝太子也是為明帝崩子齊王芳立十五年廢廢高貴鄉公髦立七年殺廢常道鄉公璜立璜禪晉晉封為陳留王晉高祖宣帝名懿字仲達姓司馬河內溫人也仕於魏武之世歷文明二帝居將相之位平孟達達為新城太守反滅公孫度度世稱燕王據遼東擒王陵陵謀立楚王為帝兵敗自殺魏明帝崩遺詔使帝為太尉與大將軍曹爽輔少主少主齊王芳也帝誅曹爽爽謀為不軌宣帝謝病避之爽黨李勝為荊州別駕帝詭為耄惛云并州近胡可為其備勝退謂爽曰司馬公屍居殘氣神形已離不足虞也爽於是專恣惡太后知政遷於永寧宮嘉平元年天子謁高陵爽兄弟擁兵從出宣帝乃奏永寧宮廢爽然後勒兵至洛水迎天子奏爽與其黨謀反皆誅宣帝崩子師代為相師字子元是為肅宗景皇帝鎮東將軍毌丘儉揚州刺史文欽反征平之儉欽初反也景帝問王肅曰安國寧主其術安在肅答曰昔關羽率荊州之眾降于禁於漢濱遂有北向爭天下心後孫權取其將士家屬羽士眾一旦瓦解今淮南將士父母皆在州但急往禦之使不得前必有關羽土崩之勢景王從之遂破儉等也景帝崩弟昭代為相昭字子上是為太祖文帝輔政為司空諸葛誕據壽春反奉詔征平之伐蜀擒劉禪于時政出於權臣人君主祭而已魏帝不能容自勒兵攻相府太祖用長史賈充計逆戰舍人成濟執殺魏帝高貴鄉公也名髦字士彥乃偽令皇太后下令廢少帝又委罪成濟誅其三族太祖崩子炎受魏禪炎字子安文帝太子是為世祖武皇帝即受魏禪用羊祜杜預計征吳平之立二十五年崩太子衷立字正度是為惠帝武帝太子惠帝不惠妃賈充女為皇后后秉權殺楊駿廢太后賈后淫妬遇姑無禮乃詐誣太后父楊駿反使帝誅之廢太后於金墉城餓殺之誅太宰汝南王亮太保衛瓘亮瓘並以名德執政后意不得行乃使帝弟楚王瑋矯詔誅亮瓘因又誅瑋戮楚王瑋殞太子遹賈后無子乃許有娠養賈謐子為子太子遹宮人謝氏生也少而聰慧賈后惡之譖太子廢之金墉城又遣小黃門殺太子用趙王倫為相國倫惡司空張華僕謝裴顧正直矯詔誅之倫遂篡帝位於是齊王攸之子冏與帝弟成都王穎等起義兵誅倫穎於是鎮鄴并州刺史東瀛公騰安北將軍王浚又起兵討穎穎敗挾天子南奔洛陽後惠帝復位帝弟長沙王又譖冏誅之由是戎狄並興四方阻亂遂分為三十六國劉元海為匈奴質子在洛陽晉武帝與語說之謂王渾曰元海容儀機鑒猶由余日磾無以加也渾對曰元海容儀實如聖旨然其文武才幹賢于二子遠陛下若任之以東南之事吳會不足平也帝稱善孔恂楊珧曰臣觀元海之才當今無比陛下若輕其眾不足以成事若假之威權平吳之後恐其不復北渡也非我族類其心必異任之本部臣竊為陛下寒心若舉天阻之國以資之無乃不可乎帝默然後秦涼覆沒帝疇咨將帥李喜曰陛下誠能發匈奴五部之眾假元海一將軍之號鼓行而西指日可定也孔恂曰李公之言未盡殄患之理元海若能平涼州斬樹機能恐涼州方有難耳蛟龍得雲雨非復池中物也帝乃止惠帝失馭寇賊蜂起成都王穎鎮鄴表元海行寧朔將軍監五部軍事及王浚等討穎元海說穎曰今二鎮跋扈眾餘十萬恐非宿衛及近都士眾所能禦之請為殿下還說五部眾以赴國難穎從之元海至國左賢王劉宣等上大單于之號二旬之間眾已五萬遂寇平陽陷之入蒲于時五胡亂中原矣石勒者上黨羯胡也據於趙幽州牧王浚署置百官勒有并吞之意欲先發使以觀之議者僉曰宜如羊祜陸抗之事亢書相聞時張賓有疾勒就而謀之賓曰王浚假三部之力圖稱南面雖曰晉藩實懷僭逆之志必思協英雄圖濟事業將軍威震海內去就為存亡所在為輕重浚之欲將軍猶楚之招韓信也今權譎遣使無誠款之形脫猜疑之兆露後雖奇略無所設也夫立大事必先為之卑當稱藩推奉尚恐不信羊陸之事臣未見其可也勒曰右侯之計是也乃遣其舍人王于春齎珍寶奉表推崇浚浚謂子春曰石公一時英武據有舊趙成鼎峙之時何謂稱藩於孤其可信乎子春曰石將軍英才俊拔士馬盛強實如聖旨仰惟明公州郡貴望累葉重光出鎮藩岳威聲播於八表因以胡越欽風戎夷歌德豈唯區區小府而敢不斂衽神闕者乎昔陳嬰豈其鄙王而不王韓信薄帝而不帝哉但以帝王不可以勇致力爭故也石將軍之擬明公猶陰精之比太陽江河之比洪海耳項籍子陽覆車不遠是石將軍之明鑒也明公亦何怪乎自古誠胡人而為名臣者實有之矣帝王則未之有也石將軍非以惡帝王而讓明公也顧取之不為天下所許也願公勿疑浚大悅遣使報勒勒復遣使奉表於浚期親詣幽州上尊號亦修牋於棗嵩乞并州牧廣平公以見必信之誠勒纂兵戒期襲浚而懼劉琨及鮮卑為其後患沈吟未發張賓曰夫襲敵國當出其不意軍嚴經日不行豈顧有三方之慮乎勒曰然為之奈何賓曰王彭祖之據幽州唯仗三部今皆離叛還為寇讎此則外無聲援以抗我也幽州饑儉人皆蔬食眾叛親離甲旅寡弱此內無強兵以禦我也若大軍在郊必土崩瓦解今三方未謂將軍便能懸軍千里以征幽州也輕軍往反不出二旬就使三方有動勢足旋趾宜應機電發勿後時也且劉琨王浚雖同名晉藩其實仇敵若修牋於琨送質請和琨必欣於得我喜於浚滅終不救浚而襲我也勒曰善於是輕騎襲幽州勒晨至蒯北門叱門者疑有伏兵先驅牛羊數千頭聲言主禮實欲填諸街巷使兵不得發勒入浚乃懼勒入其廳事令甲士執浚送于襄國市斬之此三十六國之大略也惠帝立十四年崩弟豫章王熾立字豐度是為懷帝都長安為胡賊所殺後魏拓跋氏以晉懷帝永嘉三年自雲中入鴈門北有沙漠南據陰山眾數十萬至孝文乃改拓跋為元氏都洛陽肅宗崩大都督爾朱榮謀立莊帝榮害靈太后及王公二千人立莊帝帝殺爾朱榮左僕射爾朱世隆率榮部曲自晉陽襲京城執莊帝殺之而立閔帝又廢之高歡乃立廣平王子修後為斛律斯樁所脅走入關周太祖宇文黑獺奉帝都長安披草蔻立朝廷是為西魏詔授宇文黑泰為丞相泰又害帝立南陽王寶炬是為文帝文帝崩立王子朗為帝又廢之而立恭帝泰為太師泰薨子覺嗣封周公魏帝禪位于覺覺黑泰第三子受禪國號周至宣帝崩禪於隋初爾朱世隆之殺莊帝也高歡為晉州刺史起兵誅之立魏出帝歡為丞相後魏既西入關乃立清河王之子善見為帝遷都鄴是為東魏高歡薨子齊王洋受東魏禪國號齊至溫公緯為周所滅周又為隋所滅隋文帝既受周禪又南滅陳天下一統矣懷帝崩立吳王晏子業業字子業是為愍帝亦為胡賊所殺此時胡亂中原晉元乃遷都江左也中宗元皇帝睿乃興於江東睿字景文宣帝曾孫也元帝幼而聰敏及中原喪亂乃與王敦等渡江綏撫江左甚得眾心後王敦於武昌反至石頭帝攻之不克乃委政於敦敦還鎮武昌帝在位十六年崩太子紹立紹字道畿是為肅宗明皇帝王敦威震內外將謀為逆肅宗征破之用溫嶠等決計征之初敦之謀反也溫嶠為其從事中郎夙夜綜其府事偽相親善京兆尹缺嶠說敦曰宜自樹腹心以閒搆人主愚謂錢鳳可用敦曰莫若君嶠偽辭讓臨別之際嶠自起行酒嶠偽醉以手板擊錢鳳幘幘為之墮乃作色曰錢世儀何人溫太真自行酒而敢不飲鳳不悅以醉為解明日嶠將發鳳說敦留之敦曰嶠常云錢世儀精神滿腹昨小加聲色豈得以此相讒邪嶠至都陳敦反逆狀三年肅宗崩至簡文帝第三子孝武帝昌明立羝賊苻堅寇淮南晉冠軍將軍謝玄等大破堅於淝水苻堅以百萬之眾至淝水謝玄乃選勇士八千人涉渡淝水玄遣使謂堅曰阻水為陣曠日持久請小却與君周旋秦諸將聞前軍却謂已失利朱序之徒聲云堅敗大軍退自相填籍聞風聲鶴唳皆曰南軍至也遂大敗堅還長安苻堅因此卒亡滅也二十一年帝崩自後遂干戈相繼至安帝為桓玄所篡宋祖劉裕平玄至恭帝遂禪位于宋高祖武皇帝姓劉名裕字德輿彭城人桓玄篡晉偽楚桓玄字敬德譙國龍亢人也形貌懷特為江州刺史襲殺荊州刺史殷仲堪會稽王世子元顯專政以玄跋扈遣軍征之玄聞見討即率眾下至京師殺元顯詔以玄為丞相封楚王遂禪位高祖與劉毅何無忌等潛謀匡復起兵平玄時桓玄使桓宏鎮廣陵劉道規為宏中軍參軍令道規襲桓宏桓脩鎮丹徒高祖為脩中兵參軍自襲脩克期同發劉毅道規等既襲廣陵斬桓宏以其眾南渡高祖何無忌襲京師斬桓脩率二州之眾千二百人進舍竹里移檄京師曰夫成敗相因理不常泰狡焉縱虐或值聖明自我大晉屢搆陽九之厄隆安已來皇家多故貞良斃於豺狼忠臣碎於虎口逆臣桓玄敢肆淩慢阻兵荊郢肆暴都邑天未亡難兇力實繁踰年之間遂傾皇祚主上播越流幸非所神器沈辱七廟墮墜雖夏后之罹浞豷有漢之遭莽卓方之於茲未足為喻自玄篡逆于今歷載彌年亢旱民不聊生士庶病於轉輸文武困于版築室家分析父子乖離豈惟大東有杼軸之悲梅有傾筐之怨而已哉仰觀天文俯察人事此而可存孰而可亡凡在有心誰不扼腕裕等所以叩心泣血不遑啟處夕寐宵興思獎忠烈潛構崎嶇過於履虎乘機奮發義不圖全輔國將軍劉毅廣武將軍何無忌等忠烈斷金精誠貫日投袂荷戈志在畢命義眾既集文武爭先咸謂不有一統事無以輯辭不獲己遂總軍要庶上憑祖宗之靈下罄義夫之力翦馘逋逆盪清華夏公侯諸君或世樹忠貞或身寵爵祿而並俛眉猾豎無由自效顧瞻周道寧不弔乎今日之事良其會也裕以虛薄才非古人受任於既傾之運勢接於已踐之機丹誠未宣感憤填激望霄漢以永懷顧山川而增佇投檄之日神馳賊廷何無忌之辭也桓玄使桓謙屯東陵卞範之屯覆舟山義軍朝食并其餘進造覆舟山東令羸兵登山多張旗幟布滿山谷高祖率眾奔之士者殊死戰謙軍一時潰走玄挾矢單舶走江陵玄將入蜀奔至枚回四州逢益州參軍費恬之黨射殺之奉天子反正因居將相之任封豫章郡公蜀賊譙縱稱王高祖遣將征平之高祖使朱齡石率眾二萬自江陵伐蜀高祖誡曰劉敬先往至黃武無功而退今者師出應道青衣賊料我當出其不意復從內水如此則城活之成戍必有重兵若逼黃武正墮其計今軍自外水出取成都疑兵向黃武此制敵之上策為書於函署曰至白帝發諸將雖行未知所趨及至白帝乃發書書言眾軍悉由外水臧熹自中水出廣漢使羸弱乘高艦千餘向黃武譙縱果使譙道福重兵守涪城朱齡石次彭摸拒成都二百里譙縱大將侯暉等屯彭摸朱齡石謂劉鍾曰天方暑熱賊今固險攻之難拔只困吾師欲畜銳息甲侚隙而誰卿以為何如鍾曰不然前揚聲言大眾由內水故譙道福不敢捨涪今重兵卒出其不意侯暉之徒已破膽矣暉之阻兵非堅壁也因其懼而攻之其勢易克克彭摸鼓行而前成都不能守矣緩兵相持虛實將見涪軍復來難為敵也若進不能戰退無所資二萬餘人同為蜀子虜矣從之明日遂攻皆克斬侯暉於是遂進克諸城諸城守相次瓦解縱自縊而死姚泓僭號於西京高祖征平之擒泓高祖既滅秦入長安留子義真鎮長安而還江南時赫連都統萬聞之大悅謂王買德曰朕將進圖長安卿試言進取之方略買德曰劉裕滅秦所謂以亂平亂未有德政以濟蒼生關中形勝之地而以弱才小智守之非經遠之規狼狽而反者欲, WYG: ''}
  - {type: variant, offset: 14049, length: 5105, content: 解也郃曰曹公營固攻之必不拔若瓊等見擒吾屬盡為虜矣紹但遣輕騎救瓊而以重兵攻操營不能下曹公破瓊焚其積聚紹軍潰散奔北曹公遂破紹乃威震天下也太祖討紹子譚尚於黎陽尚與熙奔遼東太守公孫康斬尚熙送其首遂平河北初太祖討譚尚於黎陽連戰數克諸將欲乘勝攻之郭嘉曰袁紹愛此二子莫適立也有郭圖逢紀為之謀臣定鬭其閒還相離也急之則相持緩之則爭心生不如南向荊州征劉表以待其變變成而後擊之可一舉而定也太祖曰善太祖方征劉表譚果與弟尚爭冀州譚遣辛毗乞降請赦太祖以問群臣群臣多以為表強宜先平之譚不足憂也荀攸曰天下方有事而表坐保江漢閒其無四方之志可知矣袁氏據四州之地帶甲十萬紹以寬得眾欲使二子和睦以守其成業則天下之難未息今兄弟遘惡其勢不兩全若有所并則力全力全則難圖也及其亂而取之則天下不足定也此時不可失也太祖曰善乃許譚和破袁尚太祖征劉表會表卒子琮降劉表字景升山陽高平人初平元年詔以表為荊州刺史南接五嶺北據漢川地方數千里帶甲十餘萬曹操與袁紹相持與官渡紹遣人求助表許之而不至亦不援操且欲觀天下之變劉先主說表曰今豪傑並爭兩雄相持天下之重在于將軍將軍若有所為起乘其弊可也如其不然固將擇所宜從豈可擁甲十萬坐觀成敗求援而不能助見賢士而不能歸此兩怨必集於將軍恐不得復中立矣曹操善用兵且賢俊多歸之其勢必舉袁紹然後移兵向江漢恐將軍不能禦也今之勝計莫若以荊州附操操必重德將軍長享福祚垂之後嗣此萬全之策也表不從十三年曹操自將征表未至表疽發背卒操軍新野傅巽說琮歸降琮曰今與諸君據全楚之地守先君之業以觀天下何為不可巽曰逆順有大體強弱有定勢以人臣拒人主逆道也以新造之楚而禦中國必危也以劉備而敵曹公不當也三者皆短欲以抗王師之鋒必亡之道也將軍自料何如劉備琮曰不若也巽曰誠以備不足禦曹公則雖保全楚不能以存誠以劉備足敵曹公則備不能為將軍下也願將軍勿疑琮遂舉眾降時劉備奔在荊州表不能用聞荊州降遂奔夏口也關中諸將馬超韓遂成宜等反曹公破之曹公與馬超等夾關為界曹公急持之而潛遣徐晃等夜渡蒲阪津據河西為營公自潼關北渡未濟超赴船急戰丁斐放牛馬以餌賊賊亂取牛馬公乃得渡結營河南超遣信求割地任子以和公偽許之韓遂請與公相見至期交馬上語移時不及軍事但說京都故舊拊手歡笑既罷超問遂何言遂曰無所言超疑之他日公又與遂書多所毀滅點逭如遂改定者超愈疑遂曹公乃與戰大破之關中平諸將問公曰初賊守潼關渭北道鈌不從河東擊馮翊而反守潼關引口而復北渡何也公曰賊守潼關若吾入河東賊必引守諸津則河西未可渡也吾故盛兵向潼關賊悉眾南守西河之備虛故二將得擅取西河然後引軍北渡賊不能與吾爭西河者以有二將之軍連車樹柵為甬道而南者既為不可勝且以示弱渡河為堅壘虜至而不出所以驕之也故賊不為營壘而求割地吾順言許之所以從其意使自安而不為備因畜士卒之力一旦擊之所謂疾雷不及掩耳卒電不及暝目兵之乘變固非一道也天子策命公為魏王孫權稱吳王據江東劉備襲益州牧劉璋據蜀天下遂三分矣二十五年薨于洛陽子丕嗣丕字子桓武帝太子也是為文帝受漢禪崩子睿嗣睿字元仲文帝太子也是為明帝崩子齊王芳立十五年廢廢高貴鄉公髦立七年殺廢常道鄉公璜立璜禪晉晉封為陳留王晉高祖宣帝名懿字仲達姓司馬河內溫人也仕於魏武之世歷文明二帝居將相之位平孟達達為新城太守反滅公孫度度世稱燕王據遼東擒王陵陵謀立楚王為帝兵敗自殺魏明帝崩遺詔使帝為太尉與大將軍曹爽輔少主少主齊王芳也帝誅曹爽爽謀為不軌宣帝謝病避之爽黨李勝為荊州別駕帝詭為耄惛云并州近胡可為其備勝退謂爽曰司馬公屍居殘氣神形已離不足虞也爽於是專恣惡太后知政遷於永寧宮嘉平元年天子謁高陵爽兄弟擁兵從出宣帝乃奏永寧宮廢爽然後勒兵至洛水迎天子奏爽與其黨謀反皆誅宣帝崩子師代為相師字子元是為肅宗景皇帝鎮東將軍毌丘儉揚州刺史文欽反征平之儉欽初反也景帝問王肅曰安國寧主其術安在肅答曰昔關羽率荊州之眾降于禁於漢濱遂有北向爭天下心後孫權取其將士家屬羽士眾一旦瓦解今淮南將士父母皆在州但急往禦之使不得前必有關羽土崩之勢景王從之遂破儉等也景帝崩弟昭代為相昭字子上是為太祖文帝輔政為司空諸葛誕據壽春反奉詔征平之伐蜀擒劉禪于時政出於權臣人君主祭而已魏帝不能容自勒兵攻相府太祖用長史賈充計逆戰舍人成濟執殺魏帝高貴鄉公也名髦字士彥乃偽令皇太后下令廢少帝又委罪成濟誅其三族太祖崩子炎受魏禪炎字子安文帝太子是為世祖武皇帝即受魏禪用羊祜杜預計征吳平之立二十五年崩太子衷立字正度是為惠帝武帝太子惠帝不惠妃賈充女為皇后后秉權殺楊駿廢太后賈后淫妬遇姑無禮乃詐誣太后父楊駿反使帝誅之廢太后於金墉城餓殺之誅太宰汝南王亮太保衛瓘亮瓘並以名德執政后意不得行乃使帝弟楚王瑋矯詔誅亮瓘因又誅瑋戮楚王瑋殞太子遹賈后無子乃許有娠養賈謐子為子太子遹宮人謝氏生也少而聰慧賈后惡之譖太子廢之金墉城又遣小黃門殺太子用趙王倫為相國倫惡司空張華僕謝裴顧正直矯詔誅之倫遂篡帝位於是齊王攸之子冏與帝弟成都王穎等起義兵誅倫穎於是鎮鄴并州刺史東瀛公騰安北將軍王浚又起兵討穎穎敗挾天子南奔洛陽後惠帝復位帝弟長沙王又譖冏誅之由是戎狄並興四方阻亂遂分為三十六國劉元海為匈奴質子在洛陽晉武帝與語說之謂王渾曰元海容儀機鑒猶由余日磾無以加也渾對曰元海容儀實如聖旨然其文武才幹賢于二子遠陛下若任之以東南之事吳會不足平也帝稱善孔恂楊珧曰臣觀元海之才當今無比陛下若輕其眾不足以成事若假之威權平吳之後恐其不復北渡也非我族類其心必異任之本部臣竊為陛下寒心若舉天阻之國以資之無乃不可乎帝默然後秦涼覆沒帝疇咨將帥李喜曰陛下誠能發匈奴五部之眾假元海一將軍之號鼓行而西指日可定也孔恂曰李公之言未盡殄患之理元海若能平涼州斬樹機能恐涼州方有難耳蛟龍得雲雨非復池中物也帝乃止惠帝失馭寇賊蜂起成都王穎鎮鄴表元海行寧朔將軍監五部軍事及王浚等討穎元海說穎曰今二鎮跋扈眾餘十萬恐非宿衛及近都士眾所能禦之請為殿下還說五部眾以赴國難穎從之元海至國左賢王劉宣等上大單于之號二旬之間眾已五萬遂寇平陽陷之入蒲于時五胡亂中原矣石勒者上黨羯胡也據於趙幽州牧王浚署置百官勒有并吞之意欲先發使以觀之議者僉曰宜如羊祜陸抗之事亢書相聞時張賓有疾勒就而謀之賓曰王浚假三部之力圖稱南面雖曰晉藩實懷僭逆之志必思協英雄圖濟事業將軍威震海內去就為存亡所在為輕重浚之欲將軍猶楚之招韓信也今權譎遣使無誠款之形脫猜疑之兆露後雖奇略無所設也夫立大事必先為之卑當稱藩推奉尚恐不信羊陸之事臣未見其可也勒曰右侯之計是也乃遣其舍人王于春齎珍寶奉表推崇浚浚謂子春曰石公一時英武據有舊趙成鼎峙之時何謂稱藩於孤其可信乎子春曰石將軍英才俊拔士馬盛強實如聖旨仰惟明公州郡貴望累葉重光出鎮藩岳威聲播於八表因以胡越欽風戎夷歌德豈唯區區小府而敢不斂衽神闕者乎昔陳嬰豈其鄙王而不王韓信薄帝而不帝哉但以帝王不可以勇致力爭故也石將軍之擬明公猶陰精之比太陽江河之比洪海耳項籍子陽覆車不遠是石將軍之明鑒也明公亦何怪乎自古誠胡人而為名臣者實有之矣帝王則未之有也石將軍非以惡帝王而讓明公也顧取之不為天下所許也願公勿疑浚大悅遣使報勒勒復遣使奉表於浚期親詣幽州上尊號亦修牋於棗嵩乞并州牧廣平公以見必信之誠勒纂兵戒期襲浚而懼劉琨及鮮卑為其後患沈吟未發張賓曰夫襲敵國當出其不意軍嚴經日不行豈顧有三方之慮乎勒曰然為之奈何賓曰王彭祖之據幽州唯仗三部今皆離叛還為寇讎此則外無聲援以抗我也幽州饑儉人皆蔬食眾叛親離甲旅寡弱此內無強兵以禦我也若大軍在郊必土崩瓦解今三方未謂將軍便能懸軍千里以征幽州也輕軍往反不出二旬就使三方有動勢足旋趾宜應機電發勿後時也且劉琨王浚雖同名晉藩其實仇敵若修牋於琨送質請和琨必欣於得我喜於浚滅終不救浚而襲我也勒曰善於是輕騎襲幽州勒晨至蒯北門叱門者疑有伏兵先驅牛羊數千頭聲言主禮實欲填諸街巷使兵不得發勒入浚乃懼勒入其廳事令甲士執浚送于襄國市斬之此三十六國之大略也惠帝立十四年崩弟豫章王熾立字豐度是為懷帝都長安為胡賊所殺後魏拓跋氏以晉懷帝永嘉三年自雲中入鴈門北有沙漠南據陰山眾數十萬至孝文乃改拓跋為元氏都洛陽肅宗崩大都督爾朱榮謀立莊帝榮害靈太后及王公二千人立莊帝帝殺爾朱榮左僕射爾朱世隆率榮部曲自晉陽襲京城執莊帝殺之而立閔帝又廢之高歡乃立廣平王子修後為斛律斯樁所脅走入關周太祖宇文黑獺奉帝都長安披草蔻立朝廷是為西魏詔授宇文黑泰為丞相泰又害帝立南陽王寶炬是為文帝文帝崩立王子朗為帝又廢之而立恭帝泰為太師泰薨子覺嗣封周公魏帝禪位于覺覺黑泰第三子受禪國號周至宣帝崩禪於隋初爾朱世隆之殺莊帝也高歡為晉州刺史起兵誅之立魏出帝歡為丞相後魏既西入關乃立清河王之子善見為帝遷都鄴是為東魏高歡薨子齊王洋受東魏禪國號齊至溫公緯為周所滅周又為隋所滅隋文帝既受周禪又南滅陳天下一統矣懷帝崩立吳王晏子業業字子業是為愍帝亦為胡賊所殺此時胡亂中原晉元乃遷都江左也中宗元皇帝睿乃興於江東睿字景文宣帝曾孫也元帝幼而聰敏及中原喪亂乃與王敦等渡江綏撫江左甚得眾心後王敦於武昌反至石頭帝攻之不克乃委政於敦敦還鎮武昌帝在位十六年崩太子紹立紹字道畿是為肅宗明皇帝王敦威震內外將謀為逆肅宗征破之用溫嶠等決計征之初敦之謀反也溫嶠為其從事中郎夙夜綜其府事偽相親善京兆尹缺嶠說敦曰宜自樹腹心以閒搆人主愚謂錢鳳可用敦曰莫若君嶠偽辭讓臨別之際嶠自起行酒嶠偽醉以手板擊錢鳳幘幘為之墮乃作色曰錢世儀何人溫太真自行酒而敢不飲鳳不悅以醉為解明日嶠將發鳳說敦留之敦曰嶠常云錢世儀精神滿腹昨小加聲色豈得以此相讒邪嶠至都陳敦反逆狀三年肅宗崩至簡文帝第三子孝武帝昌明立羝賊苻堅寇淮南晉冠軍將軍謝玄等大破堅於淝水苻堅以百萬之眾至淝水謝玄乃選勇士八千人涉渡淝水玄遣使謂堅曰阻水為陣曠日持久請小却與君周旋秦諸將聞前軍却謂已失利朱序之徒聲云堅敗大軍退自相填籍聞風聲鶴唳皆曰南軍至也遂大敗堅還長安苻堅因此卒亡滅也二十一年帝崩自後遂干戈相繼至安帝為桓玄所篡宋祖劉裕平玄至恭帝遂禪位于宋高祖武皇帝姓劉名裕字德輿彭城人桓玄篡晉偽楚桓玄字敬德譙國龍亢人也形貌懷特為江州刺史襲殺荊州刺史殷仲堪會稽王世子元顯專政以玄跋扈遣軍征之玄聞見討即率眾下至京師殺元顯詔以玄為丞相封楚王遂禪位高祖與劉毅何無忌等潛謀匡復起兵平玄時桓玄使桓宏鎮廣陵劉道規為宏中軍參軍令道規襲桓宏桓脩鎮丹徒高祖為脩中兵參軍自襲脩克期同發劉毅道規等既襲廣陵斬桓宏以其眾南渡高祖何無忌襲京師斬桓脩率二州之眾千二百人進舍竹里移檄京師曰夫成敗相因理不常泰狡焉縱虐或值聖明自我大晉屢搆陽九之厄隆安已來皇家多故貞良斃於豺狼忠臣碎於虎口逆臣桓玄敢肆淩慢阻兵荊郢肆暴都邑天未亡難兇力實繁踰年之間遂傾皇祚主上播越流幸非所神器沈辱七廟墮墜雖夏后之罹浞豷有漢之遭莽卓方之於茲未足為喻自玄篡逆于今歷載彌年亢旱民不聊生士庶病於轉輸文武困于版築室家分析父子乖離豈惟大東有杼軸之悲梅有傾筐之怨而已哉仰觀天文俯察人事此而可存孰而可亡凡在有心誰不扼腕裕等所以叩心泣血不遑啟處夕寐宵興思獎忠烈潛構崎嶇過於履虎乘機奮發義不圖全輔國將軍劉毅廣武將軍何無忌等忠烈斷金精誠貫日投袂荷戈志在畢命義眾既集文武爭先咸謂不有一統事無以輯辭不獲己遂總軍要庶上憑祖宗之靈下罄義夫之力翦馘逋逆盪清華夏公侯諸君或世樹忠貞或身寵爵祿而並俛眉猾豎無由自效顧瞻周道寧不弔乎今日之事良其會也裕以虛薄才非古人受任於既傾之運勢接於已踐之機丹誠未宣感憤填激望霄漢以永懷顧山川而增佇投檄之日神馳賊廷何無忌之辭也桓玄使桓謙屯東陵卞範之屯覆舟山義軍朝食并其餘進造覆舟山東令羸兵登山多張旗幟布滿山谷高祖率眾奔之士者殊死戰謙軍一時潰走玄挾矢單舶走江陵玄將入蜀奔至枚回四州逢益州參軍費恬之黨射殺之奉天子反正因居將相之任封豫章郡公蜀賊譙縱稱王高祖遣將征平之高祖使朱齡石率眾二萬自江陵伐蜀高祖誡曰劉敬先往至黃武無功而退今者師出應道青衣賊料我當出其不意復從內水如此則城活之成戍必有重兵若逼黃武正墮其計今軍自外水出取成都疑兵向黃武此制敵之上策為書於函署曰至白帝發諸將雖行未知所趨及至白帝乃發書書言眾軍悉由外水臧熹自中水出廣漢使羸弱乘高艦千餘向黃武譙縱果使譙道福重兵守涪城朱齡石次彭摸拒成都二百里譙縱大將侯暉等屯彭摸朱齡石謂劉鍾曰天方暑熱賊今固險攻之難拔只困吾師欲畜銳息甲侚隙而誰卿以為何如鍾曰不然前揚聲言大眾由內水故譙道福不敢捨涪今重兵卒出其不意侯暉之徒已破膽矣暉之阻兵非堅壁也因其懼而攻之其勢易克克彭摸鼓行而前成都不能守矣緩兵相持虛實將見涪軍復來難為敵也若進不能戰退無所資二萬餘人同為蜀子虜矣從之明日遂攻皆克斬侯暉於是遂進克諸城諸城守相次瓦解縱自縊而死姚泓僭號於西京高祖征平之擒泓高祖既滅秦入長安留子義真鎮長安而還江南時赫連都統萬聞之大悅謂王買德曰朕將進圖長安卿試言進取之方略買德曰劉裕滅秦所謂以亂平亂未有德政以濟蒼生關中形勝之地而以弱才小智守之非經遠之規狼狽而反者欲, krp: ''}
