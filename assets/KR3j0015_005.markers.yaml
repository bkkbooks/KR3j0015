  - {type: variant, offset: 6996, length: 1, content: 第, WYG: 也孟嘗君曰固然雍門周曰臣竊為足下有所常悲夫角帝而困秦者君也連五國而伐楚者又君也天下未嘗無事不縱即衡縱成則楚王衡成則秦帝夫以秦楚之强而報弱薛猶磨蕭斧而伐朝菌也有識之士莫不為足下寒心天道不常盛寒暑更進退千秋萬嵗之後宗廟不必血食高臺既已傾曲池又已平墳墓生荆棘狐狸穴其中逰兒牧竪蹢躅其足而歌其上曰夫以孟嘗君之尊貴亦猶若是乎於是孟嘗君喟然太息涕垂睫而交下雍門周引琴而彈之孟嘗君遂歔欷而就之曰先生鼓琴令文若亡國之人也張儀説趙王曰敝邑秦王使臣効愚於大王大王收天下以賔秦秦兵不敢}
