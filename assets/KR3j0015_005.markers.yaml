  - {type: variant, offset: 12095, length: 10, content: 二跨州據土帶甲百萬言, WYG: 强而合縱以逆京師今以法割削則逆節萌起前日晁錯是也今諸侯子弟或十數而嫡嗣代立餘雖骨肉無尺地封則仁孝之道不宣願陛下令諸侯得推恩分子弟以地侯之彼人人喜得所願上以徳施實分其國必稍自弱矣上從其計也景遭七國之難抑諸侯減黜其官}
