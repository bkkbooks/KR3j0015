  - {type: variant, offset: 3423, length: 2, content: 耳故, WYG: 而有牛後之名竊為大王羞之韓王勃然作色按劒太息曰寡人雖不肖不能事秦從之韓攻宋秦大怒曰吾愛宋韓氏與我交而攻我所甚愛何也蘇秦為韓説秦王曰韓氏之攻宋所以為王也以韓之强輔之以宋}
