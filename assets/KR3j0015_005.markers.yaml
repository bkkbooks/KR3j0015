  - {type: variant, offset: 3414, length: 5, content: 強適足以致, WYG: 宫梁王安得晏然而將軍又何得故寵乎於是新垣衍起再拜謝曰吾請出不敢復言帝秦秦將聞之為韓退軍五十里蘓秦如韓韓之先與周同姓事晉得封於韓為韓氏後周烈王賜韓侯得列為諸侯也説韓宣王曰韓北有鞏洛成臯之固西有宜陽商阪之塞東有宛穰洧水南有陘山地方九百餘里帶甲數十萬}
