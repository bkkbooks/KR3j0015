  - {type: variant, offset: 3422, length: 0, content: '', WYG: 强弓勁弩皆從韓出韓卒超足而射百發不暇止遠者栝洞胷近者鏑掩心韓之劒㦸則龍泉太阿皆陸斷牛馬水截鵠鴈夫以韓卒之勁與大王之賢乃西靣而事秦交臂而服焉羞社稷而為天下笑無大於此者也是故願大王熟計之大王無事秦事秦必求宜陽成臯今兹効之明年又復求割地與之則無地以給之不與則棄前功而受後禍且夫大王之地有盡而秦之求無已以有盡之地而逆無已之求此所謂市怨結禍者不戰而地已削矣臣聞鄙諺曰寧為雞口無為牛後今王西靣交臂而臣事秦何異於牛後乎夫以大王之賢挾强韓之}
