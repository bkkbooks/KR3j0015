  - {type: variant, offset: 9815, length: 393, content: 避吏于平林王匡等立之初伯升自王莽篡漢帝憤憤懷匡復社稷之慮不事家人之居業傾財破產交結天下雄俊王莽末盜賊群起伯升召諸豪傑計議於是使親客鄧晨起新野世祖李軼起於宛伯升發舂陵子弟七八千人部署賓客自稱柱天都部使劉嘉誘新市平林兵王匡陳牧等合軍而進屠長聚諸將議立劉氏以從人望豪傑咸欲歸伯升而新市平林將帥樂放縱憚伯升威明貪聖公懦弱先定策立之然後召伯升示其議伯升曰諸將軍欲尊立宗室德其厚焉愚鄙之見竊未有同今赤眉起青徐眾數十萬聞南陽立宗室恐赤眉復有所立如此將內自爭今王莽未滅而宗室相攻是疑天下而自捐權非所以破莽也且首兵唱號鮮有能遂陳勝項羽即其事也舂陵去宛三百里耳未足為功而遽自尊立為天下準的使後人能承吾弊非計之善者也今且稱王以號令若赤眉所立者賢則相率而往從之若無所立破莽除赤眉然後舉尊號亦未晚也願善詳思之諸將不從遂立聖公由是豪傑失望伯升都部將劉稷勇冠三軍聞更始立怒曰本起兵圖大事者劉伯升兄弟也更始何者耶更始君, WYG: ''}
