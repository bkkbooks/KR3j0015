  - {type: variant, offset: 7688, length: 267, content: 王先入關據咸陽項王背約自立為西楚霸王諸侯皆屬可謂至強然漢王起巴蜀鞭笞天下制諸侯遂誅項羽滅之五年間海內平定此非人力天之所建也天子聞君王南越不助天下誅暴逆將欲移兵而誅王天子憐百姓新勞苦且休之遣臣授君王印綬剖符通使君王宜郊迎北面稱臣乃欲以新造未集之越屈強於此漢誠聞之掘王先人塚夷王宗族使一偏將將十萬眾以臨越越則殺王以降如反覆手耳於是尉他蹶然起謝陸生卒拜尉他而還初南海尉任嚚病且死召龍川令趙他謂曰聞陳勝作亂豪傑叛秦相立番禺負山險阻南海東西數千里頗有中國人相輔此一州之主也可以立國即以他行南海尉事嚚死他移檄告諸郡曰盜兵即至急絕新道聚兵自守因稍以, WYG: ''}
