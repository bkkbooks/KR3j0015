  - {type: variant, offset: 7310, length: 6, content: 昌曰趙亦有壯, WYG: 室卑微諸侯相兼關東為六國秦之乘勢侵諸侯葢六代矣今諸侯服秦譬若郡縣其君臣俱恐若或合縱而出不意此乃智伯夫差湣王所以亡也願王無愛財賂其豪臣以亂其謀秦不過亡三十萬金則諸侯可盡秦王從其計隂遣謀士賫金玉以逰諸侯諸侯名}
