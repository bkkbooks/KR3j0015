  - {type: variant, offset: 7171, length: 0, content: '', WYG: 衆入楚拔鄢郢焚其郊廟楚人震恐東徙而不敢西向韓魏相率興兵甚衆君所將不能半而破之伊闕流血漂樐韓魏已服至今稱東藩此君之功天下莫不聞今趙卒之死於長平者已十七八是以寡君願使君将必欲滅之君常以寡擊衆取勝如神况以强擊弱以衆擊寡乎武安君曰是時楚王恃其國大不恤其政而羣臣相妬以功諂諛用事良臣引疎斥百姓心離城池不修既無良将又無守偹故臣得兵深入兵多倍城邑發梁焚舟以専人心掠於郊野以足軍食當此之時秦之士卒以軍中為家以将為父母不約而親不謀而信一心同力死不旋踵楚人自戰其地咸顧其家各有散心莫有鬬意是以能有功也伊闕之戰韓顧魏不欲先用其衆魏恃韓之鋭欲推以為鋒二軍爭便其力不同是以臣得設疑兵以持韓陣専軍并鋭觸魏之不意魏軍既敗韓軍自潰以是之故果能有功皆計利形勢自然之理何神之有今秦軍破趙軍於長平不遂以時乗其振懼而滅之畏而釋之使得耕稼以益蓄積養孤長幼以益其衆繕理兵甲以益其强增浚城池以益其固主折節以下其臣臣推體以下死士至平原之属皆令妻妾補縫於行伍之間臣民一心上下同力猶句踐困於㑹稽之時也以今伐之趙必固守挑其軍戰必不肯出圍其國都必不可尅攻其列城必不可拔掠於郊野必無所得兵乆無功諸侯生心}
