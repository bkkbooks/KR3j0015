  - {type: variant, offset: 12118, length: 0, content: '', WYG: 漢異矣昔周爵五等諸侯從政根本既微枝葉强大故其末流有縱横之事勢數然也漢承秦制改立郡縣主有専已之威臣無百年之柄至於成帝假借外家哀平祚短國嗣三絶故王氏擅朝因竊號位危自上起傷不及下是以即真之後天下莫不引領而歎十餘年間中外騷動逺近俱發假號雲合咸稱劉氏不謀同}
