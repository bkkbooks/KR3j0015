  - {type: variant, offset: 19955, length: 4029, content: 高祖東方之師疾則疾矣而僥倖之釁於是乎繁鳴呼仁義之弊至於偷薄而況奇功哉荊州刺史司馬休之反征之裴之野曰書稱慮善以動動惟厥時若司馬休之之動非其時天方厭晉囚敢知去已雖得眾能違天乎五運推移無不亡之國為廢姓處亂朝賢若三仁且猶顛沛而況豪俠者哉昔中原殄滅衣冠道盡于時四海爭奉中宗豈徒繫於晉德實大有禮義故能遂兼南國其興也勃焉至於義熙不欲異於是矣而宗失交流未忘前事波迸越逸禍敗相尋豈龕黎之伐宏多將咎周之徒孔熾不達興廢何其黯歟晉帝加高祖位相國總百揆揚州牧封十郡為宋公晉安帝崩大司馬瑯琊王即位徵帝入輔禪位於宋帝奉表陳讓表不獲通宋臺臣勸進猶不許太史令駱達陳天文符應曰案晉義熙元年至元熙元年太白晝見經天凡七古曰太白晝經天人更主異姓興義熙七年五虹見於東方古曰五虹見天子黜聖人出九年鎮星歲星太白熒感聚于東井十三年鎮星入太微古曰鎮星守太微有立王有徙王元熙元年黑龍四登于天易傳曰冬龍見天子亡社稷大人受命漢建武至建安末一百九十六年而禪魏魏自黃初至咸熙末四十六年而禪晉晉自太始至今百五十六年三代揖讓咸窮于六六亢位也帝乃從之永初元年六月丁卯即帝位於南郊設壇柴燎告天禮畢備法駕幸建康宮臨太極前殿大赦改元在位三年崩初大漸召太子誡之曰檀道濟雖有幹略而無遠志徐羨之與傅亮當無異圖謝晦常從征伐頗識機變若有同異必此人也可以會稽處之後皆如言也立太子義符是為滎陽王即位昏亂司空徐羨之輔政廢為營陽王廢立宜都王義隆是為文帝帝高祖第二子為太子劭所殺初劭及弟濬並多乖禮度懼上知乃為巫蠱咒咀帝聞之大怒將廢劭而殺濬更議所立持疑未定以事語濬母潘淑妃以告劭劭悖兇乃殺帝于合殿劭即位也立武陵王駿是為孝武皇帝文帝第三子也劭殺帝駿起義兵至京誅劭崩立太子子業是為前廢帝帝凶悖左右壽寂殺之崩立湘東王彧是為明帝文帝第十八子也孝武諸子江州刺史晉安王勛尋陽王子房等並舉兵反皆征平之崩立太子昱是為後廢帝在位凶悖常欲殺楊玉夫玉夫懼是夜七夕令玉夫伺織女渡報已王劭則先與玉夫通謀玉夫候帝眠熟遂斬之送首與齊王蕭道成也崩立順帝淮是為順皇帝明帝第三子也遜位於齊蕭道成凡八代六十年齊太祖高皇帝諱道成姓蕭氏東海蘭陵人也為輔國將軍宋明帝初會稽太守尋陽王子房反在東諸郡起兵徐州刺史薛安都據彭城歸魏遣從子索兒攻淮陰晉安王勛遣臨川內史張淹自鄱陽道入三吳帝並討平之使鎮淮陰七年徵還都宋明帝嫌帝非人臣相而人間流言帝為天子愈以為疑帝初見徵部下勸勿就徵帝曰主上自誅諸弟為太子幼弱作萬歲後計何關他族唯應速發緩當見疑骨肉相殘自非靈長之運禍難方興與卿等戮力也至拜常侍明帝崩遺詔使與袁粲共掌機事江州刺史桂陽王休範舉兵反帝討平之初範舉兵朝廷惶駭帝與褚彥回集中書省計議莫有言者帝曰昔上流謀逆皆因淹緩以敗休範必遠懲前失輕兵急下乘我無備請頓新亭以當其鋒因索筆下議餘並注同乃單車白服出新亭築壘未畢賊騎交至乃解衣高臥以安眾心竟破之也遷中領軍蒼梧王深相猜忌帝晝臥裸袒蒼梧王率數十騎直入領軍府立帝於宮內畫腹為射的自引滿射之左右玉夫因諫曰領軍腹大是佳射堋而一箭便死後無復射不如以骲箭射之一箭中臍蒼梧投弓於地也常語左右陽玉夫伺織女渡報我是夜七夕玉夫懼取千牛刀殺之玉夫與王敬則通謀殺蒼梧齎首送領軍府報帝帝行戎服夜入殿中明旦召袁粲等計議粲欲有言帝鬢鬚盡張眼光如電敬則拔刀跳躍麾眾曰天下之事皆應決蕭公敢有開一言者染敬則刀乃自取白紗帽加帝首今即位曰事須及熱帝正色曰卿都不自解也帝乃迎立順帝荊州刺史沈攸之反帝討之初攸之稱太后命已下都袁粲劉秉等見帝威名日盛不自安與攸之通謀舉事殿內帝命王敬則於殿內誅之進位相國封齊公備九錫策曰朕以不造夙羅旻凶嗣君失德書契未紀威侮五行虔劉九族神歇靈澤海水群飛綴旒之殆未足為譬豈直小宛興刺黍離作歌而已哉天贊皇宋實啟明宰爰登寡昧纂承大業高勳至德振古絕倫雖保衡翼殷博陸匡漢方斯蔑如也今將授公典禮其敬德朕命乃者袁劉搆禍實繁有徒子房不臣稱兵協亂顧瞻宮掖將成茂草言念邦國翦為仇讎當此之時人無固志公投袂徇難超然奮發登戎車而戒路報金版而先驅麾鉞一臨兇黨冰泮此則霸業之基勤王之始也安都背叛竊據徐方敢率犬羊淩虛淮浦索兒愚悖同惡相濟天許無勇背順歸逆北鄙黔黎奄墜塗炭公受命宗社精貫朝日擁節軍門氣踰宵漢破釜之捷斬馘蔽野石梁之戰梟其渠帥保境全人江陽即序此又公之功也張淹迷昧不顧本朝爰自南區志圖東夏潛軍閒人竊覬不虞于時江服末夷皇途荐阻公忠義奮發在險彌亮以寡制眾所向風偃朝廷無東顧之憂閩越有來蘇之望此又公之功也匈奴野心侵掠疆埸醜羯侜張勢振彭泗公奉辭伐罪戒旦晨征兵車始交氣祲時蕩弔死扶傷宏宣皇澤俾我淮淝復沾盛化此又公之功也自茲厥後獫狁孔熾封豕長虵重窺上國而勢故相仍師出已老角城高壘指日淪陷公言王事發憤忘飡躬擐甲冑視險若夷分疆劃界開青兗此又公之功也桂陽負眾輕問九鼎裂冠毀冕拔本塞源烈火焚于王城飛矢集於君屋群後憂惶元戎無主公挺劍凝神則奇謀不世把旄指麾則懦夫成勇信宿之閒宣陽底定此又公之功也蒼梧肆虐諸夏糜沸淫刑以逞誰則無辜黔首相悲朝不謀夕高祖之業已淪文明之軌誰嗣公遠稽殷漢之義近遵魏晉之典猥以眇身入奉宗社七廟清謐九區反政此又公之功也袁劉攜貳成此亂階醜圖潛搆危機密發據有石頭志犯應路公神謨內運霜鋒外舉祅沴載澄國途悅穆此又公之功也沈攸包禍歲月滋彰蜂目豺聲阻兵安忍乃眷西顧緬同異域而經綸惟始九伐未申長惡不悛遂逞凶逆公杖鉞出關凝威江甸正情與皎日同亮明略與秋雲競爽至義所感人百其心積年逋誅一朝顯戮湘浦安流章臺順軌此又公之功也公有濟天下之勳加之以明哲道庇生靈志匡宇宙戮力肆心劬勞王室險阻艱難備嘗之矣若乃締搆宗社之勤造物資始之澤雲布霧散光被六幽弼余一人永清四海遐方款關而慕義荒服重譯而來庭汪哉邈乎無得而名之四月宋帝禪位于齊甲午即皇帝位于南郊柴燎告天曰皇帝臣道成敢用玄牡昭告于皇皇后帝夫肇自生靈樹以司牧所以闡極則天開元創物肆茲大道惟命不于常昔在虞夏受終上代粵自漢魏揖讓中葉咸煥諸方冊載在典謨水德在微仍世多故實賴道成匡救之功以弘濟于厥難大造顛墜再搆區宇誕唯天人罔弗和會乃仰協歸運景屬與能用集大命于茲舜德匪嗣至于累仍而群公卿士庶尹御事爰及黎獻暨乎百戎僉曰皇天眷命不可以固違人神無統不可以曠主畏天之威敢不祇順鴻曆敬簡元辰虔奉皇符登壇命禪告類上天以荅人衷式敷萬國唯明靈是饗禮畢備法駕幸建康宮臨太極前殿大赦改元建元四年崩立太子賾是為世祖武皇帝也崩立大孫昭業是為鬱林王即位無道武帝梓宮下渚帝于端門內奉辭轀輬車載入閤即奏胡伎高宗殺之崩立弟昭文廢為海陵王也廢立西昌侯鸞是為高宗明皇帝始安貞王道生子也即位亟行誅戮且寢疾經年預為梓宮之地故高武諸子掃地無餘也崩立太子寶卷是為東昏侯即位凶暴以金花帖地令潘妃行其上曰此步步生蓮花又於苑中為市自為市吏以潘妃為市令義師至為左右所殺也崩立和帝寶融明帝第八子也以位禪梁先是文惠太子與才人共賦七言詩句後輒云愁和帝是驗矣東昏侯宮裡作散叛髻反根向後東昏時天下散叛矣又立帽騫其口而舒兩翅名曰鳳渡三橋裂裙向後總而結之名曰反縛黃鸝梁武宅在三橋而鳳渡之鳳翔之驗也黃鸝者皇離為日而反縛之東昏戮死之應也先是百姓及朝士以帛填胸各曰假雨假者非正名也儲雨而假之明不得真也東昏誅子廢為庶人儲雨之意也梁高祖皇帝名衍姓蕭氏為巴陵王法曹後為竟陵王子良八友初皇考之薨不得志及至鬱林失德齊明帝作輔將為廢立計帝欲助齊明傾齊武之嗣以雪心恥齊明亦知之每與帝謀時齊明將追隨王恐不從又以王敬則在會稽恐為變以問帝帝曰隨王雖有美名其實庸劣既無智謀之士爪牙唯仗司馬垣歷生武陵太守卞白龍耳此並唯利是為若啗以顯職無不載馳隨王正須折簡耳敬則志安江東窮其富貴宜選美女以娛其心齊明曰吾意也果如其策魏將王肅攻司州帝破之以功封建康郡男齊明帝崩東昏即位遺詔以帝為都督雍州刺史東昏時劉暄等六人更直省內分日帖敕世謂六貴又有御刀等八人號曰八要皆口擅王言權行國憲帝謂張弘策曰政出多門亂其階矣當今避禍唯有此地勤行仁義可坐作西伯但諸弟在都恐罹時患也須與益州圖之耳時上長兄懿罷益州還仍行郢州事帝與謀不從尋被害也長兄懿被害帝起義召僚佐集於廳事告以舉兵是曰建牙先是東昏以劉山陽為巴西太守使過荊州就行事蕭穎冑以襲襄陽帝知其謀乃遣王天武詣江陵遍與州府人書論軍事天武既發帝謂弘策曰今日坐收天下矣荊州得天武至必恛惶無計若不見同取之如拾芥耳斷三峽據巴蜀分兵定湘中便全有上流以此威聲臨九派斷彭蠡傳檄江南風之靡草不足比也政小延引日月耳江陵本憚襄陽人加唇亡齒寒必不孤立寧得不見同耶以荊雍之兵掃定東夏韓白重出不能為計況以無算昏主役御刀應敕之徒哉及山陽至巴陵帝復令天武齎書與穎冑兄弟去後帝謂張弘策曰用兵之道攻心為上攻城次之心戰為上兵戰次之今日是也近遣天武往州府人皆有書今叚只有兩封與行事兄弟云一一具天武口及問天武口無所說天武是行事心膂彼聞必謂行事兄弟共隱其事則人人生疑山陽惑於眾口判相嫌貳貳則行事進退無以自明是馳兩空函定一州也山陽至江安果疑不止穎冑乃斬天武送山陽信之至荊州馳入城將逾閾懸門奮發折其軫投車而走陳秀拔戟逐之斬于門外穎冑即遣驛使傳首于帝仍以南陽王尊號之議來告曰時不利當須待來年二月帝荅曰今坐甲十萬糧用日竭若頓兵十旬必生悔𠫤且太白出西方仗義而動天時人謀有何不利昔武王伐紂行逆太歲復須待來年耶帝不從乃赫然大號也戊申帝發自襄陽帝留弟守襄陽城謂曰當置心襄陽人腹中推誠信之勿疑也天下一家乃當相見也郢魯諸城及諸將並降初東昏遣吳子陽等十三軍救郢州進據巴口帝命王茂潛師襲加湖子陽竄走眾盡溺于江郢魯二城相視奪氣先是東昏使陳伯之鎮江州為子陽聲援帝謂諸將曰夫征討未必須實力聽威聲耳今加湖之敗誰不驚服陳武牙即伯之子狼狽奔歸彼人之情當凶懼我謂九江可傳檄而定也因命搜所獲俘囚得伯之憧主蘇隆之厚加賞賜使致命焉魯山郢城並降伯之及子武牙見帝至並束甲請罪壬午帝鎮石頭命眾軍圍六門衛尉張稷斬東昏以黃油裹首送軍帝命呂僧珍勒兵封府庫及圖藉收潘妃誅之以宮女二千人分賚將士也平京邑齊和帝以位禪梁帝即位太清元年齊司徒侯景以十三州內屬侯景反至京師幽帝而崩天監中釋寶誌為詩曰昔年三十八今年八十三四中復有四城北火酣酣帝封記之帝三十八剋建鄴八十三遇火災元月四月十四日同泰寺火災皆如其言, WYG: ''}
  - {type: variant, offset: 19955, length: 4029, content: 高祖東方之師疾則疾矣而僥倖之釁於是乎繁鳴呼仁義之弊至於偷薄而況奇功哉荊州刺史司馬休之反征之裴之野曰書稱慮善以動動惟厥時若司馬休之之動非其時天方厭晉囚敢知去已雖得眾能違天乎五運推移無不亡之國為廢姓處亂朝賢若三仁且猶顛沛而況豪俠者哉昔中原殄滅衣冠道盡于時四海爭奉中宗豈徒繫於晉德實大有禮義故能遂兼南國其興也勃焉至於義熙不欲異於是矣而宗失交流未忘前事波迸越逸禍敗相尋豈龕黎之伐宏多將咎周之徒孔熾不達興廢何其黯歟晉帝加高祖位相國總百揆揚州牧封十郡為宋公晉安帝崩大司馬瑯琊王即位徵帝入輔禪位於宋帝奉表陳讓表不獲通宋臺臣勸進猶不許太史令駱達陳天文符應曰案晉義熙元年至元熙元年太白晝見經天凡七古曰太白晝經天人更主異姓興義熙七年五虹見於東方古曰五虹見天子黜聖人出九年鎮星歲星太白熒感聚于東井十三年鎮星入太微古曰鎮星守太微有立王有徙王元熙元年黑龍四登于天易傳曰冬龍見天子亡社稷大人受命漢建武至建安末一百九十六年而禪魏魏自黃初至咸熙末四十六年而禪晉晉自太始至今百五十六年三代揖讓咸窮于六六亢位也帝乃從之永初元年六月丁卯即帝位於南郊設壇柴燎告天禮畢備法駕幸建康宮臨太極前殿大赦改元在位三年崩初大漸召太子誡之曰檀道濟雖有幹略而無遠志徐羨之與傅亮當無異圖謝晦常從征伐頗識機變若有同異必此人也可以會稽處之後皆如言也立太子義符是為滎陽王即位昏亂司空徐羨之輔政廢為營陽王廢立宜都王義隆是為文帝帝高祖第二子為太子劭所殺初劭及弟濬並多乖禮度懼上知乃為巫蠱咒咀帝聞之大怒將廢劭而殺濬更議所立持疑未定以事語濬母潘淑妃以告劭劭悖兇乃殺帝于合殿劭即位也立武陵王駿是為孝武皇帝文帝第三子也劭殺帝駿起義兵至京誅劭崩立太子子業是為前廢帝帝凶悖左右壽寂殺之崩立湘東王彧是為明帝文帝第十八子也孝武諸子江州刺史晉安王勛尋陽王子房等並舉兵反皆征平之崩立太子昱是為後廢帝在位凶悖常欲殺楊玉夫玉夫懼是夜七夕令玉夫伺織女渡報已王劭則先與玉夫通謀玉夫候帝眠熟遂斬之送首與齊王蕭道成也崩立順帝淮是為順皇帝明帝第三子也遜位於齊蕭道成凡八代六十年齊太祖高皇帝諱道成姓蕭氏東海蘭陵人也為輔國將軍宋明帝初會稽太守尋陽王子房反在東諸郡起兵徐州刺史薛安都據彭城歸魏遣從子索兒攻淮陰晉安王勛遣臨川內史張淹自鄱陽道入三吳帝並討平之使鎮淮陰七年徵還都宋明帝嫌帝非人臣相而人間流言帝為天子愈以為疑帝初見徵部下勸勿就徵帝曰主上自誅諸弟為太子幼弱作萬歲後計何關他族唯應速發緩當見疑骨肉相殘自非靈長之運禍難方興與卿等戮力也至拜常侍明帝崩遺詔使與袁粲共掌機事江州刺史桂陽王休範舉兵反帝討平之初範舉兵朝廷惶駭帝與褚彥回集中書省計議莫有言者帝曰昔上流謀逆皆因淹緩以敗休範必遠懲前失輕兵急下乘我無備請頓新亭以當其鋒因索筆下議餘並注同乃單車白服出新亭築壘未畢賊騎交至乃解衣高臥以安眾心竟破之也遷中領軍蒼梧王深相猜忌帝晝臥裸袒蒼梧王率數十騎直入領軍府立帝於宮內畫腹為射的自引滿射之左右玉夫因諫曰領軍腹大是佳射堋而一箭便死後無復射不如以骲箭射之一箭中臍蒼梧投弓於地也常語左右陽玉夫伺織女渡報我是夜七夕玉夫懼取千牛刀殺之玉夫與王敬則通謀殺蒼梧齎首送領軍府報帝帝行戎服夜入殿中明旦召袁粲等計議粲欲有言帝鬢鬚盡張眼光如電敬則拔刀跳躍麾眾曰天下之事皆應決蕭公敢有開一言者染敬則刀乃自取白紗帽加帝首今即位曰事須及熱帝正色曰卿都不自解也帝乃迎立順帝荊州刺史沈攸之反帝討之初攸之稱太后命已下都袁粲劉秉等見帝威名日盛不自安與攸之通謀舉事殿內帝命王敬則於殿內誅之進位相國封齊公備九錫策曰朕以不造夙羅旻凶嗣君失德書契未紀威侮五行虔劉九族神歇靈澤海水群飛綴旒之殆未足為譬豈直小宛興刺黍離作歌而已哉天贊皇宋實啟明宰爰登寡昧纂承大業高勳至德振古絕倫雖保衡翼殷博陸匡漢方斯蔑如也今將授公典禮其敬德朕命乃者袁劉搆禍實繁有徒子房不臣稱兵協亂顧瞻宮掖將成茂草言念邦國翦為仇讎當此之時人無固志公投袂徇難超然奮發登戎車而戒路報金版而先驅麾鉞一臨兇黨冰泮此則霸業之基勤王之始也安都背叛竊據徐方敢率犬羊淩虛淮浦索兒愚悖同惡相濟天許無勇背順歸逆北鄙黔黎奄墜塗炭公受命宗社精貫朝日擁節軍門氣踰宵漢破釜之捷斬馘蔽野石梁之戰梟其渠帥保境全人江陽即序此又公之功也張淹迷昧不顧本朝爰自南區志圖東夏潛軍閒人竊覬不虞于時江服末夷皇途荐阻公忠義奮發在險彌亮以寡制眾所向風偃朝廷無東顧之憂閩越有來蘇之望此又公之功也匈奴野心侵掠疆埸醜羯侜張勢振彭泗公奉辭伐罪戒旦晨征兵車始交氣祲時蕩弔死扶傷宏宣皇澤俾我淮淝復沾盛化此又公之功也自茲厥後獫狁孔熾封豕長虵重窺上國而勢故相仍師出已老角城高壘指日淪陷公言王事發憤忘飡躬擐甲冑視險若夷分疆劃界開青兗此又公之功也桂陽負眾輕問九鼎裂冠毀冕拔本塞源烈火焚于王城飛矢集於君屋群後憂惶元戎無主公挺劍凝神則奇謀不世把旄指麾則懦夫成勇信宿之閒宣陽底定此又公之功也蒼梧肆虐諸夏糜沸淫刑以逞誰則無辜黔首相悲朝不謀夕高祖之業已淪文明之軌誰嗣公遠稽殷漢之義近遵魏晉之典猥以眇身入奉宗社七廟清謐九區反政此又公之功也袁劉攜貳成此亂階醜圖潛搆危機密發據有石頭志犯應路公神謨內運霜鋒外舉祅沴載澄國途悅穆此又公之功也沈攸包禍歲月滋彰蜂目豺聲阻兵安忍乃眷西顧緬同異域而經綸惟始九伐未申長惡不悛遂逞凶逆公杖鉞出關凝威江甸正情與皎日同亮明略與秋雲競爽至義所感人百其心積年逋誅一朝顯戮湘浦安流章臺順軌此又公之功也公有濟天下之勳加之以明哲道庇生靈志匡宇宙戮力肆心劬勞王室險阻艱難備嘗之矣若乃締搆宗社之勤造物資始之澤雲布霧散光被六幽弼余一人永清四海遐方款關而慕義荒服重譯而來庭汪哉邈乎無得而名之四月宋帝禪位于齊甲午即皇帝位于南郊柴燎告天曰皇帝臣道成敢用玄牡昭告于皇皇后帝夫肇自生靈樹以司牧所以闡極則天開元創物肆茲大道惟命不于常昔在虞夏受終上代粵自漢魏揖讓中葉咸煥諸方冊載在典謨水德在微仍世多故實賴道成匡救之功以弘濟于厥難大造顛墜再搆區宇誕唯天人罔弗和會乃仰協歸運景屬與能用集大命于茲舜德匪嗣至于累仍而群公卿士庶尹御事爰及黎獻暨乎百戎僉曰皇天眷命不可以固違人神無統不可以曠主畏天之威敢不祇順鴻曆敬簡元辰虔奉皇符登壇命禪告類上天以荅人衷式敷萬國唯明靈是饗禮畢備法駕幸建康宮臨太極前殿大赦改元建元四年崩立太子賾是為世祖武皇帝也崩立大孫昭業是為鬱林王即位無道武帝梓宮下渚帝于端門內奉辭轀輬車載入閤即奏胡伎高宗殺之崩立弟昭文廢為海陵王也廢立西昌侯鸞是為高宗明皇帝始安貞王道生子也即位亟行誅戮且寢疾經年預為梓宮之地故高武諸子掃地無餘也崩立太子寶卷是為東昏侯即位凶暴以金花帖地令潘妃行其上曰此步步生蓮花又於苑中為市自為市吏以潘妃為市令義師至為左右所殺也崩立和帝寶融明帝第八子也以位禪梁先是文惠太子與才人共賦七言詩句後輒云愁和帝是驗矣東昏侯宮裡作散叛髻反根向後東昏時天下散叛矣又立帽騫其口而舒兩翅名曰鳳渡三橋裂裙向後總而結之名曰反縛黃鸝梁武宅在三橋而鳳渡之鳳翔之驗也黃鸝者皇離為日而反縛之東昏戮死之應也先是百姓及朝士以帛填胸各曰假雨假者非正名也儲雨而假之明不得真也東昏誅子廢為庶人儲雨之意也梁高祖皇帝名衍姓蕭氏為巴陵王法曹後為竟陵王子良八友初皇考之薨不得志及至鬱林失德齊明帝作輔將為廢立計帝欲助齊明傾齊武之嗣以雪心恥齊明亦知之每與帝謀時齊明將追隨王恐不從又以王敬則在會稽恐為變以問帝帝曰隨王雖有美名其實庸劣既無智謀之士爪牙唯仗司馬垣歷生武陵太守卞白龍耳此並唯利是為若啗以顯職無不載馳隨王正須折簡耳敬則志安江東窮其富貴宜選美女以娛其心齊明曰吾意也果如其策魏將王肅攻司州帝破之以功封建康郡男齊明帝崩東昏即位遺詔以帝為都督雍州刺史東昏時劉暄等六人更直省內分日帖敕世謂六貴又有御刀等八人號曰八要皆口擅王言權行國憲帝謂張弘策曰政出多門亂其階矣當今避禍唯有此地勤行仁義可坐作西伯但諸弟在都恐罹時患也須與益州圖之耳時上長兄懿罷益州還仍行郢州事帝與謀不從尋被害也長兄懿被害帝起義召僚佐集於廳事告以舉兵是曰建牙先是東昏以劉山陽為巴西太守使過荊州就行事蕭穎冑以襲襄陽帝知其謀乃遣王天武詣江陵遍與州府人書論軍事天武既發帝謂弘策曰今日坐收天下矣荊州得天武至必恛惶無計若不見同取之如拾芥耳斷三峽據巴蜀分兵定湘中便全有上流以此威聲臨九派斷彭蠡傳檄江南風之靡草不足比也政小延引日月耳江陵本憚襄陽人加唇亡齒寒必不孤立寧得不見同耶以荊雍之兵掃定東夏韓白重出不能為計況以無算昏主役御刀應敕之徒哉及山陽至巴陵帝復令天武齎書與穎冑兄弟去後帝謂張弘策曰用兵之道攻心為上攻城次之心戰為上兵戰次之今日是也近遣天武往州府人皆有書今叚只有兩封與行事兄弟云一一具天武口及問天武口無所說天武是行事心膂彼聞必謂行事兄弟共隱其事則人人生疑山陽惑於眾口判相嫌貳貳則行事進退無以自明是馳兩空函定一州也山陽至江安果疑不止穎冑乃斬天武送山陽信之至荊州馳入城將逾閾懸門奮發折其軫投車而走陳秀拔戟逐之斬于門外穎冑即遣驛使傳首于帝仍以南陽王尊號之議來告曰時不利當須待來年二月帝荅曰今坐甲十萬糧用日竭若頓兵十旬必生悔𠫤且太白出西方仗義而動天時人謀有何不利昔武王伐紂行逆太歲復須待來年耶帝不從乃赫然大號也戊申帝發自襄陽帝留弟守襄陽城謂曰當置心襄陽人腹中推誠信之勿疑也天下一家乃當相見也郢魯諸城及諸將並降初東昏遣吳子陽等十三軍救郢州進據巴口帝命王茂潛師襲加湖子陽竄走眾盡溺于江郢魯二城相視奪氣先是東昏使陳伯之鎮江州為子陽聲援帝謂諸將曰夫征討未必須實力聽威聲耳今加湖之敗誰不驚服陳武牙即伯之子狼狽奔歸彼人之情當凶懼我謂九江可傳檄而定也因命搜所獲俘囚得伯之憧主蘇隆之厚加賞賜使致命焉魯山郢城並降伯之及子武牙見帝至並束甲請罪壬午帝鎮石頭命眾軍圍六門衛尉張稷斬東昏以黃油裹首送軍帝命呂僧珍勒兵封府庫及圖藉收潘妃誅之以宮女二千人分賚將士也平京邑齊和帝以位禪梁帝即位太清元年齊司徒侯景以十三州內屬侯景反至京師幽帝而崩天監中釋寶誌為詩曰昔年三十八今年八十三四中復有四城北火酣酣帝封記之帝三十八剋建鄴八十三遇火災元月四月十四日同泰寺火災皆如其言, krp: ''}
