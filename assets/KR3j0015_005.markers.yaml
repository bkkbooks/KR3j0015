  - {type: variant, offset: 10287, length: 327, content: 書告守尉書既宣露朱鮪使人殺軼也號更始元年更始使世祖為偏將軍徇昆陽王莽聞漢帝立大懼遣大司徒王尋大司空王邑將兵百萬擊世祖於昆陽世祖破之初伯升拔宛已三日而世祖尚未知乃偽使人持書報城中云宛下兵到而佯墮下其書尋邑得之不憙諸將既經屢捷膽氣益壯無不一當百世祖乃與敢死者三千人從城西出衝中堅尋邑陣亂乘銳崩之遂殺王尋莽兵大潰走者自相騰踐奔殪百餘里間會大雷風雨飛如注滍水盛溢虎豹皆戰慄溺死者以萬數水為之不流三輔豪傑共誅王莽傳首詣宛更始以世祖行大司馬事持節北渡河鎮慰州郡鄧禹杖策北渡河追世祖世祖見禹甚歡謂曰我得專封拜先生遠來寧欲仕乎禹曰不願也明公威德加于四海禹得效其尺寸垂功名於竹帛耳世祖笑因留宿禹進說曰更始雖都關西今山東未安赤眉青犢之屬動以萬數三輔假號往往群聚更始既未有所挫, WYG: 臣}
