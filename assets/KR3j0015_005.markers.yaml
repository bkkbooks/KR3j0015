  - {type: variant, offset: 1156, length: 0, content: '', WYG: 九原過代上谷今易州也彌地數千里雖得燕城秦計固不能守也秦之不能害燕亦明矣今趙之攻燕也發號出令不至十日而數十萬之軍軍於東垣矣渡呼沲涉易水不至四五日而距國都矣故曰秦之攻燕也戰於千里之外趙之攻燕也戰於百里之内夫不憂百里之患而重於千里之外計無過於此}
