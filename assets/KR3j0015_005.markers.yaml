  - {type: punctuation, offset: 5318, content: 「, id: KR3j0015_CH7x2006_005-bkkpn1194}
  - {type: variant, offset: 5318, length: 0, content: '', WYG: 老臣請西説秦王令兵先臣出王再拜遣之唐睢到秦入見秦王秦王曰丈人茫然而逺至此甚苦矣夫魏之來求救數矣寡人知魏之急也唐睢曰大}
  - {type: variant, offset: 5318, length: 0, content: '', krp: 老臣請西説秦王令兵先臣出王再拜遣之唐睢到秦入見秦王秦王曰丈人茫然而逺至此甚苦矣夫魏之來求救數矣寡人知魏之急也唐睢曰大}
  - {type: variant, offset: 5320, length: 0, content: '', WYG: 魏之急而救兵不發臣竊以為用䇿之臣無任矣夫魏萬乗之國也然所以西面而事秦稱東藩築帝宫受冠帯祠春秋者以為秦之强足以與也今齊楚之兵已合於魏郊而秦救不發亦將賴其未急也使之而急彼且割地而約縱王當奚救焉必待其急而救之是失一東藩之魏而强三勁之齊楚則王何利焉於是秦王遽發兵救魏張儀説楚懷王曰秦地半天下兵敵四國被山帯河四塞以為固范雎説秦昭王曰大王之國四塞以為固北有甘泉谷口南有涇渭右隴蜀左闗阪奮擊百萬戰車千乘利則出攻不利則入守此王者之地民怯於私鬬勇於公戰此王者之人王并此二者而有之以當諸侯譬如放韓盧而捕蹇兎也虎賁之士百有餘萬車千乗騎萬匹粟如丘山法令既明士卒安樂主明以嚴將智以武雖無出甲席卷常山之險必折}
  - {type: page-break, offset: 5320, content: '', id: KR3j0015_WYG_005-19b, image: WYG0849/WYG0849-0110d.png}
  - {type: variant, offset: 5320, length: 0, content: '', krp: 魏之急而救兵不發臣竊以為用䇿之臣無任矣夫魏萬乗之國也然所以西面而事秦稱東藩築帝宫受冠帯祠春秋者以為秦之强足以與也今齊楚之兵已合於魏郊而秦救不發亦將賴其未急也使之而急彼且割地而約縱王當奚救焉必待其急而救之是失一東藩之魏而强三勁之齊楚則王何利焉於是秦王遽發兵救魏張儀説楚懷王曰秦地半天下兵敵四國被山帯河四塞以為固范雎説秦昭王曰大王之國四塞以為固北有甘泉谷口南有涇渭右隴蜀左闗阪奮擊百萬戰車千乘利則出攻不利則入守此王者之地民怯於私鬬勇於公戰此王者之人王并此二者而有之以當諸侯譬如放韓盧而捕蹇兎也虎賁之士百有餘萬車千乗騎萬匹粟如丘山法令既明士卒安樂主明以嚴將智以武雖無出甲席卷常山之險必折}
  - {type: variant, offset: 5323, length: 352, content: 所歸乎王曰不知也曰王知天下之歸則齊可得而有也若王不知天下之所歸即齊國未可得保也齊王曰天下何歸酈生曰天下歸漢王曰先生何以知之酈生曰漢王與項羽戮力西向擊秦約先入咸陽者王之漢王先入咸陽項王負約不與而王之漢中項羽遷殺義帝漢王聞之起蜀漢之兵擊三秦出武關而責義帝之處收天下之兵立諸侯之後降城即以侯其將得賂即以分其士與天下同其利英豪賢士皆樂為之用諸侯之兵四面而至蜀漢之粟方船而下項王有背約之名殺義帝之負於人之功無所記於人之罪心不忘戰勝而不得其賞拔城而不得其封非項氏莫得能用事為人刻印刓而不能授攻城得賂積而不能賞天下叛之賢才怨之而莫為用故天下之士歸於漢王可坐而策也夫漢王發蜀漢定三秦涉三河之水授上黨之兵下井陘之路誅成安之罪北破趙舉三十二城此蚩尤之兵非人力也天之福也今已據敖倉之粟塞成皋之險守白馬之津杜太行之路拒飛狐之口而, WYG: 脊}
