  - {type: variant, offset: 5207, length: 1, content: 示, WYG: 相堅也而親昆弟同父母尚有爭錢財而欲恃詐偽反覆蘓秦之謀其不可成亦以明矣大王不事秦秦下兵攻河外據卷衍酸棗刦衛取陽晉則趙不南趙不南則梁不北梁不北則縱道絶縱道絶則大王之國欲無危不可得也秦折韓而攻梁韓怯於秦秦韓為一梁之亡立可須也此臣之所為大王患也為大王計莫如事秦事秦則楚韓必不敢動無楚韓之患則大王髙枕而卧國必無憂矣大王不聽秦秦下甲士而東伐雖欲事秦不可得也且夫從人多奮辭而少可信説一}
