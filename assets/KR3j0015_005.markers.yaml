  - {type: variant, offset: 3287, length: 0, content: '', WYG: 重賂必至於趙而反請和於王秦既請和韓魏聞之必盡重王重王必出重寶}
  - {type: variant, offset: 3287, length: 0, content: '', krp: 重賂必至於趙而反請和於王秦既請和韓魏聞之必盡重王重王必出重寶}
  - {type: variant, offset: 3288, length: 0, content: '', WYG: 一於王則是王一舉而得三國之親而秦益危矣趙王曰善即遣虞卿東見齊王與之謀秦虞卿未及發而秦使者已在趙矣樓緩聞之亡去秦圍趙王使平原君入楚從親而請其救平原君之楚見楚王説以利害日出而言日中}
  - {type: variant, offset: 3288, length: 0, content: '', krp: 一於王則是王一舉而得三國之親而秦益危矣趙王曰善即遣虞卿東見齊王與之謀秦虞卿未及發而秦使者已在趙矣樓緩聞之亡去秦圍趙王使平原君入楚從親而請其救平原君之楚見楚王説以利害日出而言日中}
  - {type: variant, offset: 3289, length: 0, content: '', WYG: 决毛遂乃按劒厯階而上謂平原君曰縱之利害兩言而决耳今日出而言日中不决何也楚王叱曰胡不下吾與汝君言汝何為者毛遂按劒而前曰王之所以遇遂者以楚國之衆也今十步之内王不得恃楚國之衆王之命懸於遂之手矣吾君在前叱者何也且遂聞湯以七十里之地立為天子文王以百里之壤而臣諸侯今楚地方五千里持㦸百萬此覇王之資也以楚之强天下莫能比而不能當也白起小竪子耳率數萬之衆興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百代之怨趙之所羞而王不知恥焉今合縱者為楚不為趙也楚王曰茍如先生之言謹奉社稷以從楚於是遂出兵救趙趙孝成王時秦圍邯鄲諸侯之救兵莫敢擊秦魏王使晉鄙救趙畏秦止於湯隂不進魏使客將軍新垣衍閒入邯鄲令趙帝秦此時魯連適逰趙㑹秦圍邯鄲聞魏欲令趙尊秦為帝乃見平原君曰梁客新垣衍安在吾請為君責而歸之平原君曰勝請為紹介魯連見新垣衍而無言新垣衍曰吾視貌居此圍城之中皆有求於平原君也今觀先生之玉非有求於平原君也曷為久居圍城之中而不去乎魯連曰世以鮑焦為無從容而死者皆非也衆人不知為一身彼秦者棄禮}
