  - {type: variant, offset: 6982, length: 0, content: '', WYG: 不如罷兵休士全軍歸報燕王燕王必喜士民見公如見父母攘臂而議於世功業可明也意者懟燕棄世東逰於齊乎請裂地定封富比乎陶衛世世稱孤此亦一計也二者顯名厚實願公察之熟計而審處一焉且吾聞之効小節者不能行大威惡小恥者不能成榮名昔管仲射桓公中其鉤簒也遺公子糾不能死怯也束縛桎梏辱也此三行者鄉里不通世主不臣使管仲終窮幽抑而不出不免為辱人賤行然而管子棄三行之過據齊國之政一匡}
