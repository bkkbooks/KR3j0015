  - {type: variant, offset: 4079, length: 1, content: 處, WYG: 守成此任刑之弊也或曰王霸之道既聞命矣敢問髙光二帝皆㧞起壠畝芟夷禍難遂開王業髙祖豁達以大度光武謹細于條目各擅其美龍飛鳳翔故能掇亂庇人拯斯塗炭然比大徳方天威孰為優劣乎曹植曰昔漢之初興髙祖因暴秦而起遂誅强楚光有天下功齊湯武業流後嗣帝王之元勲人君之盛}
