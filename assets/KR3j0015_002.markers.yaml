  - {type: variant, offset: 5177, length: 204, content: 聰聽之主也謬於龐萌曹孟德知人之哲也弊於張邈何則夫物類者世之所惑亂也故曰狙者類智而非智也狙音自舒反慢也愚者類君子而非君子也戇者類勇而非勇也亡國之主似智亡國之臣似忠幽莠之幼似禾驪牛之黃似虎白骨疑象碔砆類玉此皆似是而非也人物志曰輕諾似烈而寡信多易似能而無效進銳似精而去速詗者似察而事煩許施似惠而無終面從似忠而退違此似是而非者也亦有似非而是有大權似姦而有功大智似愚而內明博愛似虛而實厚正言似訐而情忠非天下之至精孰能得, WYG: ''}
