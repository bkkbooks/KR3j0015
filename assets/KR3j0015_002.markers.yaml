  - {type: variant, offset: 5382, length: 2496, content: 實也孔子曰凡人心險於山川難知於天天猶有春秋冬夏旦暮之期人者厚貌深情故有貌愿而益有長若不肖長音竹兩反有順懁而達有堅而縵有緩而釬音汗太公曰士有嚴而不肖者有溫良而為盜者有外貌恭敬中心欺慢者有精精而無情者有威威而無成者有如敢斷而不能斷者有恍恍惚惚而反忠實者有倭倭迤迤而有效者有貌勇狠而內怯者有夢夢而反易人者無使不至無使不遂天下所賤聖人所貴凡人莫知惟有大明乃見其際此士之外貌而不與中情相應者也桓範曰夫賢愚之異使若葵之與莧何得不知其然若其莠之似禾類是而非是類賢而非賢揚子法言曰或問難知曰太山之與蟻蛭江河之與行潦非難也大聖與大佞難也於乎唯能別似者為無難矣知此士者而有術焉微察問之以觀其辭窮之以辭以觀其變與之閒謀以觀其誠明白顯問以觀其德遠使以財以觀其廉又曰委之以財以觀其仁臨之以利以觀其廉試之以色以觀其貞又曰悅之以色以觀其不淫告之以難以觀其勇又曰告之以危而觀其勇又曰懼之以驗其特醉之以酒以觀其態又曰醉之以酒而觀其則又曰醉之以酒觀其不失莊子曰遠使之而觀其忠又曰遠使之以觀其不二近使之而觀其敬又曰近之以昵觀其不狎煩使之而觀其能又曰煩之以事以觀其理卒然問焉而觀其智又曰設之以謀以觀其智太公曰事之而不窮者謀急與之期而觀其信太公曰使之而不隱者謂信也雜之以處而觀其色又曰縱之以視觀其無變呂氏春秋曰通則觀其所禮通達也貴則觀其所進又曰達視其所舉也富則觀其所養又曰富視其所與又曰見富貴人觀其有禮施太公曰富之而不犯驕逸者謂仁也聽則觀其所行行則行仁近則觀其所好又曰居視其所親又曰省其居處觀其貞良省其交遊觀其志比習則觀其所言好則好義言則言道窮則觀其所不愛又曰窮則視其所不為非又曰貧視其所不取賤則觀其所不為又曰貧賤人觀其有德守也喜之以驗其守守慎守也又曰喜之以觀其輕樂之以驗其僻僻邪僻也又曰娛之以樂以觀其儉怒之以驗其節節性也又曰怒之讎以觀其不怨也哀之以驗其仁仁人見可哀者則哀苦之以驗其志又曰檢之以觀其能安經曰任寵之人觀其不驕奢太公曰貴之而不驕奢者義也疏廢之人觀其不背越榮顯之人觀其不矜誇隱約之人觀其不懾懼少者觀其恭敬好學而能悌人物志曰夫幼智之人在於童齓皆有端緒故文本辭繁辨始給口仁出慈恤施發過與慎生畏懼廉起不取者也壯者觀其廉絜務行而勝其私老者觀其思慎強其所不足而不踰父子之閒觀其慈孝兄弟之閒觀其和友鄉黨之閒觀其信義君臣之閒觀其忠惠太公曰付之而不轉者忠也此之謂觀誠傅子曰知人之難莫難於別真偽設所修出於為道者則言自然而貴元虛所脩出於為儒者則言分制而貴公正所脩出於為縱橫者則言權宜而貴變常九家殊務各有所長非所謂難也以默者觀其行以語者觀其辭以出者觀其治以處者觀其學四德或異所觀有微又非所謂難也所謂難者典說詭合轉應無窮辱而言高貪而言廉賊而言仁怯而言勇詐而言信淫而言貞能設似而亂真多端以疑闇此凡人之所常惑明主之所甚疾也君子內洗其心以虛受人立不易方貞觀之道也九流有主貞一之道也內貞觀而外貞一則執偽者無地而逃矣夫空言易設但責其實事之效則是非之驗立可見也故韓子曰人皆寐盲者不知人皆默喑者不識覺而使之視問而使之對則喑盲窮矣發齒吻視毛色雖良樂不能必馬連車蹴駕試之行途則臧獲定其駑良觀青黃察鍛銷雖歐冶不能必劍陸斷狗馬水截皎龍雖愚者識其利鈍矣是知明試責實乃聖功也人物志曰凡有血氣者莫不稟陰陽以立性體五行而著形其在體也木骨金筋火氣土肌水血五物之象也五物之實各有所濟也骨植而柔立者謂之宏毅宏毅也者仁之質也木則垂陰為仁之質質不宏毅不能成仁氣清而朗者謂之文理文理也者禮之本也火則照察為禮之本本無文理不能成禮體端而實者謂之貞固貞固也者信之基也土必吐生為信之基基不貞固不能成信也筋勁而精者謂之勇敢勇敢也者義之決也金能斷割為義之決決不勇敢不能成義也色平而暢者謂之通微通微也者智之原也水流疏達為智之原原不通微不能成智五質恆性故謂之五常故曰直而不剛則木木強徼許失其正色勁而不精則力負鼎絕髕失其正勁固而不端則愚專己自是陷於愚戇氣而不清則越辭不清順發越無成暢而不平則蕩好智無涯蕩然失絕然則平陂之質在於神神者質之主也故神平則質平神陂則質陂也明暗之實在於精精者實之本故精惠則實明精濁則實暗勇怯之勢在於筋筋者勢之用也故筋勁則勢勇筋弱則勢怯強弱之植在於骨骨者植之機故骨粗則植強骨細則植弱躁靜之決在於氣氣者決之地也氣盛決於躁氣沖決於靜慘懌之情在於色色者情之候故色悴由情慘色悅由情懌也衰正之形在於儀儀者形之表故儀衰由形殆儀正由形肅態度之動在於容容者動之符故衺動則容哀態正則容度也緩急之狀在於言言者心之狀故心恕則言緩心偏則言急也若質素平淡中睿外朗筋勁植固聲清色懌儀崇容直則純粹之德也夫人有氣氣也者謂誠在其中必見諸外故心氣粗訟者其聲沉散心氣詳慎者其聲和節心氣鄙戾者其聲麤獷心氣寬柔者其聲溫潤信氣中易義氣時舒和氣𥳑略勇氣壯立此之謂聽氣以其聲處其實氣生物物生有聲聲有剛柔清濁咸發乎聲聽其聲察其氣考其所為皆可知矣又有察色察色謂心氣內蓄皆可以色取之夫誠智必有難盡之色又曰誠智必有明達之色誠仁必有可尊之色又曰誠仁必有溫柔之色誠勇必有難懾之色又曰誠勇必有矜奮之色也誠忠必有可觀之色誠絜必有難汙之色誠貞必有可信之色質色浩然固以安偽色曼然亂以煩此之謂察色人物志曰夫心質亮直其儀勁固心質平理其儀安閑夫仁目之精愨然以端勇膽之精曄然以強夫憂患之色乏而且荒疾疢之色亂而垢理喜色愉然以懌慍色厲然以揚妒惑之色冒昧無常是故其言甚懌而精色不從者中有違也其言有違而精色可信者辭不敏也言未發而怒色先見者意憤溢也言已發而怒氣送之者強所不然也凡此之類雖欲違之精色不從威愕以明雖變可知也又有考志考志者謂方與之言以察其志其氣寬以柔其色檢而不諂其禮先人其言後人每自見其所不足者是益人也若好臨人以色高人以氣勝人以言防其所不足而廢其所不能者是損人也太公曰博文辯辭高行論議而非時俗此姦人也王者慎勿寵之也其貌直而不侮其言正而不私不飾其美不隱其惡不防其過者是質人也又曰與之不為喜奪之不為怒沉靜而寡言多信而寡貌者是質靜人也議曰太公曰樸其身頭惡其衣服語無為以求名言無欲以求得此偽人也王者慎勿近之夫質人之中有如此之偽者也若其貌曲媚其言諛巧飾其見物務其小證以故自說者是無質人也議曰晏子云讒夫佞人之在君側材能皆非常也夫藏大不誠於中者必謹小誠於外以成其大不誠此難得而知, WYG: 優}
