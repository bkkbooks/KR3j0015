  - {type: variant, offset: 16978, length: 902, content: 西北莫敢不服今夫士之高者乃稱匹夫徒步而處於農畝之下則鄙野監門閭里士之賤也亦甚矣觸曰古大禹之時諸侯萬國舜起農畝而為天子及湯之時諸侯三千當今之世南面稱寡人者乃廿四由此觀之非得失之策與稍稍誅滅滅亡無族之時欲為監門閭里安可得哉易傳不云乎居上位未得其實故無其實而喜其名者削無其德而望其福者約無其功而受其祿者辱禍必握故曰矜功不立虛願不至此皆夸其名華而無其實德也是以堯有九佐舜有十友禹有五丞湯有三輔自古及今而能虛成名於天下者無有是以君王無羞亟問不愧下學而成其道老子曰雖貴必以賤為本雖高必以下為基是以侯王稱孤寡不穀夫孤寡者困賤下位者也而侯王以自謂豈非以下人而尊貴士與夫堯傳舜舜傳禹周成王任周公旦而世世稱明是以明乎士之貴也諺曰浴不必江海要之去垢馬不必騏驥要之善走士不必賢也要之知道女不必貴種要之貞好何以明之淳於髡謂齊宣王曰古者好馬王亦好馬古者好味王亦好味古者好色王亦好色古者好士王獨不好王曰國無士耳有則寡人亦悅之髡曰古有驊騮騏驥今之無有王選於眾王好馬矣古有豹象之胎今之無有王選於眾王欮味矣古有毛嬙西施今之無有王選於眾王好色矣王必待堯舜禹湯之士而後好之則堯舜禹湯之士亦不好王矣魯仲連謂孟嘗君曰君好士未也孟嘗君曰文不得士故也對曰君之廄馬百乘無不被繡衣而食菽粟豈有騏驥騄耳哉後宮十妃皆衣縞紵食粱肉豈有毛嬙西施哉色與馬取於今之世士何必待古哉故曰君好士未也張敞與朱邑書曰飢者甘糟糠飽者飫粱肉何則有無之勢異也昔陳平雖賢須魏倩而後進韓信雖奇賴蕭何而後信故士各達其及時之宜若待古之英儁必若伊尹呂望而後薦之則此人不因足下而進矣淮南曰待腰褭飛兔而後駕則世莫乘車矣待西施洛浦而後妃則終身不家矣然不待古之英儁則而自足者因其所有而遂用之也語曰瓊艘瑤楫無涉川之用金弧玉弦無激矢之能是以介絜而無政事者非撥亂之器儒雅而乏治理者非翼亮之士何以明之魏無知見陳平於漢王漢王用之絳灌等讒平曰平盜嫂受金漢王讓魏無知無知曰臣之所言者能也陛下所聞者行也今有尾生孝已之行而無益於勝負之數陛下假用之乎今楚漢相距臣進奇謀之士顧其計誠足以利國家耳盜嫂受金又安足疑哉漢王曰善黃石公曰有清白之士者不可以爵祿得守節之士不可以威刑脅致清白之士修其禮致守節之士修其道何以明之郭隗說燕昭王, WYG: ''}
