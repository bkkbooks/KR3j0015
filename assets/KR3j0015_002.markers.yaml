  - {type: variant, offset: 20193, length: 108, content: 之人入粟塞下得以拜爵得以除罪如此則富人有爵農人有錢粟有所餘而國用饒足不過三載塞下之粟必多矣漢景帝詔曰雕文刻鏤傷農事者也錦繡纂組害女工者也農事傷則饑之本也女工害則寒之原也夫饑寒並至而能毋為非者寡矣朕親耕后親桑以奉宗廟為, WYG: 正故}
