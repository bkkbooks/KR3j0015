  - {type: variant, offset: 20187, length: 4, content: 賞罰今募, WYG: 人擇官者失决于不仁者險陰謀外泄者敗厚歛薄施者彫此自理之大體也孫卿曰口能言之身能行之國寳也口不能言身能行之國器也口能言之身不能行之國用也口言善身行惡國妖也故傅子曰立徳之本莫尚乎正心心正而後身正身正而後左右正左右正而後朝廷正朝廷正而後國家正國家正而後}
