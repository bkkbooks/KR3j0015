  - {type: variant, offset: 18299, length: 261, content: 用之不亦難乎宋燕曰是燕之過也語曰夫人同明者相見同聽者相聞德合則未見而相親聲同則處異而相應韓子曰趣捨同則相是趣捨異則相非何以明之楚威王問宋玉曰先生其有遺行歟何士人眾庶不譽之甚宋玉曰夫鳥有鳳而魚有鯨鳳凰上擊九萬里翱翔乎窈冥之上夫蕃籬之鷃豈能與料天地之高哉鯨魚朝發於崑崙之墟暮宿於孟津夫尺澤之鯢豈能與量江海之大哉故非獨鳥有鳳而魚有鯨士亦有之夫聖人瑰琦意行超然獨處夫世俗之民又安知臣之所為哉議曰世之善惡難得而知苟非其人莫見其際何者夫文章為武人所嗤未必鄙也為楊馬所毀此真鄙矣夫人臣為桀紂所毀未必為愚也必若堯舜所毀此真愚矣世之毀譽不足, WYG: 啟金縢}
