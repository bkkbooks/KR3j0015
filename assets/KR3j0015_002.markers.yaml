  - {type: variant, offset: 19468, length: 0, content: '', WYG: 天有五行木火金水及土分時賛化育以成物一歲三百六十日五行行七十二日化生長育其神為五帝緯五帝五行之神古之王者易代改號取法五行五行更王終始相生亦象其義故其生為明王者而死配五行是以太皡配木勾芒為木正也炎帝配火祝融為火正也少皥配金蓐收為金正也顓頊配水𤣥㝠為水正也黄帝配土后土為土正也帝王改號於五行之徳各有所尚從其所王之徳次焉木家次位火也木家尚赤以木徳義之府循其母兼其子也夏后氏以金徳王而尚黑殷人以水徳王而尚白水家尚青而尚白者避土家之尚青也土家宜尚白為土者四行之主主于四季五行用事先起于木故土家尚木色青也周人以木徳王而色尚赤此三代之所以不同也及漢之初孫臣賈誼以為漢土徳以五行之傳從所不勝傳移之傳也五行相代常從金木水火土相勝之法也秦在水徳故謂漢據土而剋之劉向父子以為帝出於震故庖犧氏始受木徳其後以母傳子終而復始自神農黄帝下歴唐虞三代而漢得火焉故髙祖始起神母夜號著赤帝之符得天統矣昔共工以水徳間於木火與秦同運非其次故皆不永也以吾觀之帝王之興各本其所出五帝之後以定五徳何以明之漢堯後也堯火徳王故漢為火焉袁紹時耿包曰赤徳衰盡袁為黄􅉙以為袁舜後舜土徳君故勸進焉是知帝王之興各本其所出五帝之後有自來矣今秦顓頊後水徳也故秦為水徳焉以此觀之雖百代可知也臣行第十夫人臣萌芽未動形兆未見昭然獨見存亡之機得失之要豫禁乎未然之前使主超然立乎顯榮之處如此者聖臣也虛心盡意日進善道勉主以禮義諭主以長䇿將順其美匡救其惡如此者}
