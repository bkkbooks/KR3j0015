  - {type: variant, offset: 18758, length: 154, content: 記曰夫驥唯伯樂獨知之若時無伯樂之知即不容其為良馬也士亦然矣何以明之孔子厄於陳蔡顏回曰夫子之德至大天下莫能容然夫人推而行之世不我用有國者之醜也夫子何病焉故曰文王明夷則主可知仲尼旅人則國可知穀梁傳曰子既生不免乎水火母之罪也羈冠成童不就師傅父之罪也羈冠謂交互翦髮成童謂八歲以上就師學問無方心志不通身之罪也心志既通而, WYG: 宣帝刑}
