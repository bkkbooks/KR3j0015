  - {type: variant, offset: 19469, length: 0, content: '', WYG: 臣也夙興夜寐進賢不懈數稱往古之行事以厲主意如此者忠臣也或問袁子曰故少府楊阜豈非忠臣哉對曰可謂直士忠則我不知何者夫為人臣見主失}
