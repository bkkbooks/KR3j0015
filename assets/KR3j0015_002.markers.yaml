  - {type: punctuation, offset: 19373, content: 、, id: KR3j0015_CH7x2006_002-bkkpn4668}
  - {type: variant, offset: 19373, length: 0, content: '', WYG: 彦委罪成濟自貽逆節終享惡名斯言之玷不可磨也干寳晉總論曰昔宣帝以雄才碩量應運而仕值魏太祖創業之初籌晝軍國嘉謀屢中遂服輿軫駈馳三世性深阻有城府而能寛綽以容納行任數以御物而知人善採㧞故能西擒孟達東舉公孫淵内夷曹爽外襲王陵屢距諸葛亮節制之兵而東支吳人輔車之勢于是百姓與能大象始搆矣世宗承基太祖繼業𤣥豐亂内欽誕冦外潛謀雖宻而在機必兆淮浦再擾而許洛不震咸黜異圖用光前烈然後推轂鍾鄧長駈庸蜀三闗電掃劉禪入臣天符人事於是信矣始當非常之禮終受備物之錫至于世祖遂享皇極仁以厚下儉以節用和而不弛寛而能斷故人詠維新四海恱勸矣汎舟三峽介馬桂陽役不二時江湘來同夷吳蜀之壘垣通二方之險塞太康之中天下書同文車同軌雖太平未洽亦足以明吏奉其法人樂其生百代之一時也武皇既崩山陵未乾而楊駿被誅母后廢黜朝士舊臣夷滅者數十族尋以二公楚王之變宗子無維城之助而閼伯實沉之隙歲搆師尹無具瞻之貴而顛墜戮辱之禍日有方岳無鈞石之鎮闗門無結草之固李辰石冰傾之於荆揚劉淵王彌撓之于青冀二十餘年而河洛為墟戎羯稱制二帝失尊山陵無所何哉樹立失權託附非才四維不張而茍且之政多也故觀阮籍之行而覺禮教崩弛之所由察庾純賈充之事而見師尹之多僻思郭欽之謀而寤夷狄之有釁核傅咸之奏錢神之論而覩寵賂之彰民風國勢如此雖以中庸之才守文之主治之辛有必見之于祭祀季札必得之于樂聲范爕必為之請死賈誼必為之痛哭又况我惠帝以蕩蕩之徳而臨之哉淳耀之烈未渝故大命重集于中宗元皇帝也東晉自元帝以下何主為賢虞南曰晉自遷都江左强臣擅命垂拱南面政非已出王敦以盤石之宗居上流之要負才矜地志懷問鼎非肅祖之明斷王導之忠誠則晉祚其移于王氏矣若使降年永久仗任羣賢因瀍澗之遺黎乘劉石之衰運則克復中原不難圖也元帝值天下崩離創立江左後肅祖即位大將軍王敦威震内外將謀為逆帝與王導温嶠等决計征敦敦敗死也或曰偽楚桓𤣥有奇才逺略而遂至滅亡何也桓𤣥字敬道父温大司馬𤣥博綜術藝以雄豪自處晉安帝以為丞相封楚王遂禪位虞南曰夫人君之量必虛己應物}
