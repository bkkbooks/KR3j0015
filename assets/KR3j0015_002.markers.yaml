  - {type: variant, offset: 19373, length: 0, content: '', krp: 彦委罪成濟自貽逆節終享惡名斯言之玷不可磨也干寳晉總論曰昔宣帝以雄才碩量應運而仕值魏太祖創業之初籌晝軍國嘉謀屢中遂服輿軫駈馳三世性深阻有城府而能寛綽以容納行任數以御物而知人善採㧞故能西擒孟達東舉公孫淵内夷曹爽外襲王陵屢距諸葛亮節制之兵而東支吳人輔車之勢于是百姓與能大象始搆矣世宗承基太祖繼業𤣥豐亂内欽誕冦外潛謀雖宻而在機必兆淮浦再擾而許洛不震咸黜異圖用光前烈然後推轂鍾鄧長駈庸蜀三闗電掃劉禪入臣天符人事於是信矣始當非常之禮終受備物之錫至于世祖遂享皇極仁以厚下儉以節用和而不弛寛而能斷故人詠維新四海恱勸矣汎舟三峽介馬桂陽役不二時江湘來同夷吳蜀之壘垣通二方之險塞太康之中天下書同文車同軌雖太平未洽亦足以明吏奉其法人樂其生百代之一時也武皇既崩山陵未乾而楊駿被誅母后廢黜朝士舊臣夷滅者數十族尋以二公楚王之變宗子無維城之助而閼伯實沉之隙歲搆師尹無具瞻之貴而顛墜戮辱之禍日有方岳無鈞石之鎮闗門無結草之固李辰石冰傾之於荆揚劉淵王彌撓之于青冀二十餘年而河洛為墟戎羯稱制二帝失尊山陵無所何哉樹立失權託附非才四維不張而茍且之政多也故觀阮籍之行而覺禮教崩弛之所由察庾純賈充之事而見師尹之多僻思郭欽之謀而寤夷狄之有釁核傅咸之奏錢神之論而覩寵賂之彰民風國勢如此雖以中庸之才守文之主治之辛有必見之于祭祀季札必得之于樂聲范爕必為之請死賈誼必為之痛哭又况我惠帝以蕩蕩之徳而臨之哉淳耀之烈未渝故大命重集于中宗元皇帝也東晉自元帝以下何主為賢虞南曰晉自遷都江左强臣擅命垂拱南面政非已出王敦以盤石之宗居上流之要負才矜地志懷問鼎非肅祖之明斷王導之忠誠則晉祚其移于王氏矣若使降年永久仗任羣賢因瀍澗之遺黎乘劉石之衰運則克復中原不難圖也元帝值天下崩離創立江左後肅祖即位大將軍王敦威震内外將謀為逆帝與王導温嶠等决計征敦敦敗死也或曰偽楚桓𤣥有奇才逺略而遂至滅亡何也桓𤣥字敬道父温大司馬𤣥博綜術藝以雄豪自處晉安帝以為丞相封楚王遂禪位虞南曰夫人君之量必虛己應物}
  - {type: variant, offset: 19374, length: 0, content: '', WYG: 載同于天地信誓擬于暄寒然後萬姓樂推而不厭也彼桓𤣥者蓋有浮狡之小智而無含𢎞之大徳值晉末衰亂威不逮下故桓𤣥得肆其爪牙以徼倖之餘而逢神武之運至于夷滅固其宜也鬻子曰發政施令為天下福者謂之道上下相親謂之和民不求而得所欲謂之信除天下之害者謂之仁仁與信和與道帝王之器也由此言之豪雄小智何益于樂推哉宋祖誅滅桓𤣥再興晉室梁代裴子野優之于宣武其事云何虞南曰魏武曹騰之孫累葉榮顯濯纓漢室三十餘年及董卓之亂乃與山東俱起誅滅元凶曾非己力晉宣歴任卿相位極台鼎握天下之圖居既安之勢奉明詔而誅逆節建瓴為譬未足喻也宋祖以匹夫提劍首創大業旬月之間重安晉鼎居半州之地驅一郡之卒斬譙縱于庸蜀禽姚紹于崤函尅慕容超于青部梟盧循於嶺外戎旗所指無往不㨗觀其豁達則漢祖之風制勝胷襟則光武之匹惜其祚短志未可量此為優矣裴子野曰宋武皇帝苛跡多於魏武大徳厚於晉宣㧞足行間却孫恩蟻聚之衆奮臂荆郢掃桓𤣥盤石之宗方軌長駈則三齊無堅壘迴戈内赴則五嶺靡餘妖命孫季髙于巨海之上而番隅席卷擢朱齡石于百夫之下而庸蜀來王羌胡畏威反為表裏董率虎旅以事中原然後請呼上帝步驟前王光有帝圖謂之義取者也又曰桓敬道有文武奇才志雪餘恥校動離亂之中奄有天下而不血刃既而嘯命六合規模進取未及踰年坐盜社稷自以名髙漢祖事㨗魏晉思專其侈以冀恭已若王謐桓謙以人望鎮領袖王綏謝混以後進相光輝羣從兄弟方州連郡民駭其速而服其强無異望矣髙祖于時朱方之一匹夫也無千百之衆糾合同盟電擊二州未及半旬蕩清京邑號令羣后長駈江漢推亡楚于匪隙㧞衰晉於己頽自軒轅已来用兵之疾未始有也自非雄略不世天命底止焉能若此者乎于是人知攸塈而王迹興矣宋孝武明帝二人孰賢虞南曰二帝殘忍之性異體同心誅戮賢良割剪枝葉内無平勃之相外闕晉鄭之親以斯大寳委之昏稚故使齊民乘舋宰制天下未踰歲稔遂移龜玉緘縢雖固適為大盜之資百慮同失可為長歎鼎社傾淪非不幸也孝武名駿文帝第三子為江州刺史弟劭既弑逆帝與顔竣于江州起義征劭平之明帝名彧文帝第十八子即位盡殺孝武諸子務為彫飾天下騷然崩子昱立無道蕭道成殺之齊建元永明之間號為治世誠有之乎虞南曰齊髙創業之主知稼穡之艱難且立身儉素務存簡約武帝則留意後庭彫飾過度然能委任王儉憲章攸出禮樂之盛咸稱永明宰相得人於斯為美議曰子言衛靈公之無道康子曰夫如是奚為不喪孔子曰仲叔圉治賔客祝駝治宗廟王孫賈治軍旅夫如是奚其喪此言委任有徳之美也田單相齊過淄水有老人涉淄而寒田單解裘而衣之襄王惡之曰田單之厚施將欲以取我國乎不早圖恐後之此言委任有徳之惡也故齊侯惡陳氏厚徳晏子謂齊侯曰在禮家施不及國大夫不收公利可以止之齊襄惡田單厚施貫珠者謂襄王曰王不如嘉單之善令曰寡人憂人之饑也單收而食之寡人憂人之寒也單解裘而衣之稱寡人意單有是善而王嘉之善單之善亦王之善也後里閭相與語曰單之愛人乃王教之也夫收臣下之權宜如晏子及貫珠者昔漢祖疾甚吕后問為相曰曹參可問其次曰王陵可然少戅陳平可以助之陳平智有餘然難獨任周勃厚重少文然安劉氏者必勃也可令為太尉宋髙祖大漸誡太子曰檀道濟雖有幹略而無逺志徐羨之傅亮當無異圖謝晦常從征伐頗識機變若有同異必此人也可以㑹稽處之夫任賢用能宜如漢髙及宋祖矣宋齊二代廢主有五並驕淫狂暴前後如一或身被賊殺或傾墜宗社豈厥性頑凶自貽非命將天之所棄用亡大業乎虞南曰夫上智下愚特稟異氣中庸之才皆由訓習自宋齊已來東宫師傅備員而已貴賤禮隔規獻無由多以位升罕由徳進此五君者稟凡庸之性無周召之師逺益友之箴規狎宵人之近習以斯下質生而楚言覆國亡身理數然也議曰賈生云昔成王幼在襁褓之中召公為太保周公為太傅太公為太師保保其身體傅傅之徳義師導之教訓此三公之職也又置三少曰少傅少保少師是與太子晏者也乃孩抱有識三公三少固明孝仁義禮以導習之逐去邪人不使見惡行選天下之端士孝悌博聞有道術者以翼衛之使與太子居處故太子乃生見正事聞正言行正道左右前後皆正人也夫習與正人居不能無正猶生長齊地不能不齊言也習與不正人居猶生長楚地不能不楚言也秦使趙髙傅胡亥而教之獄所習者非斬劓人則夷人之三族也故胡亥今日即位明日射人忠諫者謂之誹謗深計者謂之妖言視殺人若刈草菅然豈胡亥之性惡哉從其所以導之者非其理也晉惠帝太子遹有罪閻纂上書諫曰臣伏念遹長養深宫沉淪富貴受饒先帝父母驕之每見選師傅下至郡吏率取膏梁擊鐘鼎食之家希有寒門儒素如衛綰周文洗馬舍人亦無汲黯鄭莊之比遂使不見事父君之道古禮太子以士禮與國人齒欲令知賤然後乃貴自頃東宫亦㣲太盛所以致}
