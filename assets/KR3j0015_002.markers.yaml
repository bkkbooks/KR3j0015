  - {type: variant, offset: 20071, length: 5, content: 能盡害海內, WYG: 幸也數也夫霸君若齊桓晉文}
  - {type: variant, offset: 20071, length: 5, content: 能盡害海內, krp: 幸也數也夫霸君若齊桓晉文}
