  - {type: variant, offset: 19362, length: 0, content: '', WYG: 但問時代何時耳嚴刑惡足小哉或曰漢元帝才藝温雅其守文之良主乎虞南曰夫人君之才在乎文徳武功而已文則經天緯地詞令典䇿武則禁暴戢兵安人和衆此南面之宏圖也至于鼓瑟吹簫和聲度曲斯乃伶官之職豈天子之所務乎議曰元帝多才藝善鼓琴瑟雖如此非善之善也何則徐幹中論曰夫詳小事而畧大道察近物而暗逺數自古及今未有如此而不亂也未有如此而不亡也所謂詳小事察近物者謂耳聰於絲竹歌謡之和目明於彫琢彩色之章口給于辨惠切對之詞心通于短言小說之文手習於射御書數之巧也所謂逺數大道者謂仁足以覆燾羣生惠足以撫養百姓明足以照見四方智足以統理萬物權足以應變無端義足以阜生財用威足以禁遏奸非武足以平定禍亂詳于聽受而審於官人達於廢興之原通於安危之分如此則君道畢矣昔魯莊多伎藝詩人刺之魯昭善容儀有出奔之禍由是言之使人主視如離婁聽如師曠射如夷羿書如史籀可謂善於有司之職何益於理乎匡衡諫元帝改政書曰受命之王務在創業垂統傳之無窮繼體之君必存於承宣先王之徳而褒大其功今陛下聖徳天覆子愛海内然陰陽未和奸邪未禁者殆議論者未丕揚先帝之盛功争言制度}
  - {type: page-break, offset: 19362, content: '', id: KR3j0015_WYG_002-8a, image: WYG0849/WYG0849-0031a.png}
  - {type: page-break, offset: 19362, content: '', id: KR3j0015_WYG_002-8b, image: WYG0849/WYG0849-0031b.png}
  - {type: variant, offset: 19362, length: 0, content: '', krp: 但問時代何時耳嚴刑惡足小哉或曰漢元帝才藝温雅其守文之良主乎虞南曰夫人君之才在乎文徳武功而已文則經天緯地詞令典䇿武則禁暴戢兵安人和衆此南面之宏圖也至于鼓瑟吹簫和聲度曲斯乃伶官之職豈天子之所務乎議曰元帝多才藝善鼓琴瑟雖如此非善之善也何則徐幹中論曰夫詳小事而畧大道察近物而暗逺數自古及今未有如此而不亂也未有如此而不亡也所謂詳小事察近物者謂耳聰於絲竹歌謡之和目明於彫琢彩色之章口給于辨惠切對之詞心通于短言小說之文手習於射御書數之巧也所謂逺數大道者謂仁足以覆燾羣生惠足以撫養百姓明足以照見四方智足以統理萬物權足以應變無端義足以阜生財用威足以禁遏奸非武足以平定禍亂詳于聽受而審於官人達於廢興之原通於安危之分如此則君道畢矣昔魯莊多伎藝詩人刺之魯昭善容儀有出奔之禍由是言之使人主視如離婁聽如師曠射如夷羿書如史籀可謂善於有司之職何益於理乎匡衡諫元帝改政書曰受命之王務在創業垂統傳之無窮繼體之君必存於承宣先王之徳而褒大其功今陛下聖徳天覆子愛海内然陰陽未和奸邪未禁者殆議論者未丕揚先帝之盛功争言制度}
  - {type: variant, offset: 19364, length: 0, content: '', WYG: 用臣竊恨國家釋樂成之業而虚為此紛紛也願陛下詳覽統業之事此守文也或曰觀偽新王莽謙恭禮讓豈非一代之名士乎至作相居尊驕淫暴虐何先後相背甚乎虞南曰王莽天姿慘酷詐偽人也未達之前狥名求譽得志之後矜能傲物飭情既盡而本質存焉愎諫自髙卒不改寤海内寃酷為光武之驅除焉班固曰王莽始起外戚折節力行以要名譽哀成之際勤勞國家直道而行動見稱述豈所}
  - {type: variant, offset: 19364, length: 0, content: '', krp: 用臣竊恨國家釋樂成之業而虚為此紛紛也願陛下詳覽統業之事此守文也或曰觀偽新王莽謙恭禮讓豈非一代之名士乎至作相居尊驕淫暴虐何先後相背甚乎虞南曰王莽天姿慘酷詐偽人也未達之前狥名求譽得志之後矜能傲物飭情既盡而本質存焉愎諫自髙卒不改寤海内寃酷為光武之驅除焉班固曰王莽始起外戚折節力行以要名譽哀成之際勤勞國家直道而行動見稱述豈所}
  - {type: variant, offset: 19365, length: 0, content: '', WYG: 在國必聞在家必聞色取仁而行違之者也莽既非仁而有邪佞之材又承四父世業之權遭漢中㣲國統三絶而太后夀考為之宗主故得肆其奸慝以成簒奪之禍推此言之亦有天時非人力所致及其竊位南面處非所㨿顛覆之勢險於桀紂而莽晏然自謂黄虞復出也乃矜其威詐滔天虐人是以海内囂然喪其樂生之心内外怨恨逺近俱發城池不守支體分裂遂令天下城邑為墟自書傳所載亂臣賊子無道之人未有如莽之甚者也紫色䵷聲餘分閏位為聖王之駈除云吳王孫權論吕䝉曰子明少時孤謂不辭劇易果敢有膽而已長大學問開益籌略奇至可以次於公瑾圖取闗羽勝於子敬子敬答孤書云帝王之起皆有駈除羽不足忌此子敬内不能辦而外為大言耳孤亦恕之不茍責也此駈除之意也夏少康漢光武皆中興之君孰者為最虞南曰此二帝皆興復先緒光啟王業其名則同其實則異何者光武之世藉思亂之民誅殘賊之莽取亂侮亡為功差易至如少康則夏氏之滅已二代矣羿及寒浞藐然遺體身在胎孕母氏逃亡生於他國不及過庭之訓曾無强近之親遭離亂之難庇身非所而能﨑嶇于喪亂之間遂成配天之業中興之君斯為稱首魏髙貴鄉公問荀顗曰有夏既衰后相殄滅少康收輯夏衆復禹之績髙祖㧞起壟畝芟夷秦項考其功徳誰為先後顗對曰造之與因難易不同少康功徳雖美猶為中興漢世祖同流可也至如髙祖臣等以為優上曰少康先于滅亡之後降為諸侯之𨽻能布其徳而兆有其謀卒滅過戈復禹之績祀夏配天不失舊物非至徳𢎞仁豈能濟斯勲乎漢祖因土崩之勢收一時之權為人子則數危其親為人君則因賢相為人父則不能衛其子身没之後社稷幾傾若與少康易時而處或未能復大禹之績也推此言之宜髙夏康而下漢祖矣後漢衰亂由於桓靈二主凶徳誰則為甚虞南曰桓帝赫然奮怒誅滅梁冀有剛斷之節焉然閹人擅命黨錮}
