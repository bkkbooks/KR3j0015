  - {type: variant, offset: 18913, length: 395, content: 譽不聞友之罪也名譽既聞有司不舉有司之罪也有司舉之王者不用王者之過也孔子曰內行不修己之罪也行修而名不彰友之罪也論曰行遠道者假於車馬濟江海者因於舟楫故賢士之立功成名因於資而假物者何以明之公輸子能因人主之材木以構宮室臺榭而不能自為專屋狹廬材不足也歐冶能因國君之銅鐵以為金爐大鍾而不能自為壺鼎盤盂無其用也君子能因人主之政朝以和百姓潤眾庶而不能自饒其家勢不便也故舜耕於歷山恩不及州里太公屠牛於朝歌利不及于妻子及其用也恩流八荒德溢四海故舜假之堯太公因之周文君子能修身以假道不能枉道而假財慎子曰騰蛇遊霧飛龍乘雲雲罷霧霽與蚯蚓同則失其所乘矣韓子曰千鈞得船則浮錙銖失船則沉非千鈞輕而錙銖重有勢之與無勢耳故勢有不可得事有不可成烏獲輕千鈞而重其身非其身重於千鈞也勢不便也離婁易於百步而難於眉睫非百步近而眉睫遠道不可也語曰夫有國之主不可謂舉國無深謀之臣闔朝無智策之士在聽察所考精與不精審與不審耳何以明之在昔漢祖聽聰, WYG: 圖霸}
