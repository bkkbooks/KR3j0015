  - {type: variant, offset: 21998, length: 293, content: 盜霸者之法與霸者之人為之則亦霸矣盜亡國之法與亡國之人為之則亦亡矣夫與積禮義之君子為之則王矣與端誠信令之士為之則霸矣與權謀傾覆之人為之則亡矣三者明主之所謹擇此能察於用也管仲曰大位不仁不可授以國枘見賢不讓不可與尊位罰避親戚不可使主兵不好本事不可與都邑又曰使賢者食於能則上尊崇鬭士食於功則卒輕死使二者設於國則天下理傅子曰凡都縣之考課有六一曰以教課治則官慎德二曰以清課本則官慎行三曰以才課任則官慎舉四曰以役課平則官慎事五曰以農課等則官慎務六曰以獄課訟則官慎理此能備官也故曰明版籍審什伍限夫田定刑名立君長急農桑去末作敦學斅核才藝𥳑精悍修武備嚴禁令信賞罰糾游戲察苛剋此十五者雖聖人復起必此言也夫欲論, WYG: ''}
