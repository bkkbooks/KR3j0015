  - {type: variant, offset: 15213, length: 335, content: 急不緩而精不露者智惠人也瞼蹇縮精無光者愚鈍人也眼光不出瞼者藏情人也加以瞼澀盜視必作偷也若務睮皎𥍉者蛆嫉人也急𥈂者不嫉妒則虛妄人也盯雎眰血者惡性人也䂅䀽矘晃者憨人也坥䁠珉𥉜者淫亂人也彌詗坥瞺者姦詐人也䁠澄拘䁠者掘強人也羊日𥆀瞳者毒害人也睢盱䀹爍者回邪人也精色雜而光彩浮淺者心意不定無信人也精清光溢者聰明人也精沈光定者大膽人也上目眥下眥中深厚氣色穠厚者有威武亦大膽人也氣色飄眇淺薄人也土地不潔者無威怯懦人也精紫黑而光彩端定者剛烈人也精潔白而端定者好隱遁人也精多光而不溢散清澈而視端審者直性人也精黃而光彩澄澈者慕道術人也點精近上者志意下劣人也點精近下者志意高尚人也點精近裏者自收歛人也點精近外者慠慢憨人也羊目直視能殺妻子慠目㶐澄刑禍相仍鷹視狼顧常懷嫉妬螻姑日心難得夫指者欲纖穠, WYG: ''}
