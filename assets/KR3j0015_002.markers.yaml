  - {type: variant, offset: 1338, length: 229, content: 材也昔伊尹之興土工也強脊者使之負土眇者使之推傴者使之塗各有所宜而人性齊矣管仲曰升降揖讓進退閑習臣不如隰朋請立以為大行闢土聚粟盡地之利臣不如甯戚請立以為司田平原廣牧車不結轍士不旋踵鼓之而三軍之士視死如歸臣不如王子城父請立以為大司馬決獄折中不殺不辜不誣不罪臣不如賓胥無請立以為大理犯君顏色進諫必忠不避死亡不撓富貴臣不如東郭牙請立以為大諫君若欲治國強兵則五子者存焉若欲霸王則夷吾在此黃石公曰使智使勇使貪使愚智者樂立其功勇者好行其志貪者決取其利愚者不愛其死因其至情而, WYG: ''}
