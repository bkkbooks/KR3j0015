  - {type: variant, offset: 17905, length: 1, content: 事, WYG: 背約入盜令邊備守不發兵深入惡煩百姓吳王詐病不朝賜以几杖羣臣諫說雖切常假借納用焉張武等受賂金錢覺加賞賜以愧其心專務以徳化人是以海内殷富興於禮義斷獄數百幾致刑措嗚呼仁哉或問傅子曰漢太宗除肉刑可謂仁乎對曰匹夫}
