  - {type: variant, offset: 19368, length: 0, content: '', WYG: 漸矣故曰熒熒不滅炎炎奈何言慎其始也嗚呼百代之後其鑒之哉古語曰寒者易為衣饑者易為食晁錯曰夫國富强而隣國亂者帝王之資由此言之是知昏亂之君將以開聖徳矣自炎精不競㝢縣分崩曹孟徳挾天子而令諸侯劉𤣥徳憑蜀漢之阻孫仲謀負江淮之固三分天下鼎足而立皆肇開王業光啟霸圖三方之君孰}
  - {type: variant, offset: 19368, length: 0, content: '', krp: 漸矣故曰熒熒不滅炎炎奈何言慎其始也嗚呼百代之後其鑒之哉古語曰寒者易為衣饑者易為食晁錯曰夫國富强而隣國亂者帝王之資由此言之是知昏亂之君將以開聖徳矣自炎精不競㝢縣分崩曹孟徳挾天子而令諸侯劉𤣥徳憑蜀漢之阻孫仲謀負江淮之固三分天下鼎足而立皆肇開王業光啟霸圖三方之君孰}
  - {type: variant, offset: 19369, length: 0, content: '', WYG: 優劣虞南曰曹公兵機智算殆難與敵故能肇迹開基居中作相實有英雄之才矣然譎詭不常雄猜多忌至於殺伏后鴆荀彧誅孔融戮崔琰婁生斃於一言桓邵勞於下拜棄徳任刑其虐已甚坐論西伯實非其人許劭所謂治世之能臣亂世之姦雄斯言為當劉公待劉璋以賔禮委諸葛而不疑人君之徳於斯為美彼孔明者命世之奇才伊吕之儔匹臣主同心魚水為譬但以國小兵弱斗絶一隅支對二方抗衡上國若使與曹公易地而處騁其長算肆闗張之武盡諸葛之文則霸王之業成矣孫主因厥兄之資用前朝之佐介以天險僅得自存比於二人理弗能逮陳夀云劉備機權幹畧不逮魏武所以基宇亦狹張輔曰何為其然夫撥亂之主當先以收相獲將為本一身善戰不足恃也諸葛孔明達禮知變殆王佐之才𤣥徳無强盛之勢而令委質闗侯張飛皆人傑也服而使之夫明暗不相為用能否不相為使武帝雖處安强不為之用也况在危急之間乎若令𤣥徳據有中州將與周室比隆豈徒二傑而已魏帝問吳使趙咨曰吳王何等主也咨對曰聰明仁知雄畧之主也帝問其狀咨曰納魯肅于凡品是其聰也㧞吕䝉于行陣是其明也獲于禁而不害是其仁也取荆州兵不血刃是其智也據三州虎視天下是其雄也屈身于陛下是其畧也孫䇿瘡甚呼弟權曰舉江東之衆决機于兩陣之間與天下争衡卿不如我舉賢任能各盡其才以保江東我不如卿陳夀云孫權屈身忍辱任才尚}
