  - {type: variant, offset: 19366, length: 0, content: '', WYG: 起非乎亂階始於桓帝古語曰天下嗷嗷新主之資也靈帝承疲民之後易為善政黎庶傾耳咸冀中興而帝襲彼覆車毒踰前輩傾覆宗社職帝之由天年厭世為幸多矣議曰桓帝問侍中爰延曰朕何如主也對曰漢中主何者尚書令陳蕃任事則理中常侍黄門豫政則亂是以知江陛下可與為善可與為非此中主之謂也虞南曰夫岷初發其源可以濫觴及其逺也方舟而後能}
