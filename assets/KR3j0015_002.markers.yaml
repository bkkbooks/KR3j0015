  - {type: variant, offset: 19376, length: 0, content: '', WYG: 豈有切磋能相長益今遹言語悖逆受罪之日不失子道尚可重選師傅置逰談文學皆選寒門孤宦以學行自立者及涉履艱難名行素立者使與遊處絶貴戚子弟輕薄賔客但道古今孝子事親忠臣事君及思愆改過皆聞善道庶幾可全由此觀之故太子者選左右俾諭教之最急也梁元帝聰明才學克平禍亂而卒致傾覆何也元帝梁武帝第七子名繹為荆州刺史破侯景都荆州為西魏萬紐于謹來伐執帝害之虞南曰梁元聰明伎藝才兼文武仗順伐逆克雪家寃成功遂事有足稱者但國難之後傷夷未復信强冦之甘言襲褊心於懷楚蕃屏宗支自為讐敵孤逺懸僻莫與同憂身亡祚滅生人塗炭舉鄢郢而棄之良可惜也議曰淮南子云夫仁智才之美者也所謂仁者愛人也所謂智者知人也愛人則}
  - {type: page-break, offset: 19376, content: '', id: KR3j0015_WYG_002-18b, image: WYG0849/WYG0849-0036b.png}
  - {type: variant, offset: 19376, length: 0, content: '', krp: 豈有切磋能相長益今遹言語悖逆受罪之日不失子道尚可重選師傅置逰談文學皆選寒門孤宦以學行自立者及涉履艱難名行素立者使與遊處絶貴戚子弟輕薄賔客但道古今孝子事親忠臣事君及思愆改過皆聞善道庶幾可全由此觀之故太子者選左右俾諭教之最急也梁元帝聰明才學克平禍亂而卒致傾覆何也元帝梁武帝第七子名繹為荆州刺史破侯景都荆州為西魏萬紐于謹來伐執帝害之虞南曰梁元聰明伎藝才兼文武仗順伐逆克雪家寃成功遂事有足稱者但國難之後傷夷未復信强冦之甘言襲褊心於懷楚蕃屏宗支自為讐敵孤逺懸僻莫與同憂身亡祚滅生人塗炭舉鄢郢而棄之良可惜也議曰淮南子云夫仁智才之美者也所謂仁者愛人也所謂智者知人也愛人則}
  - {type: variant, offset: 19377, length: 1, content: 深, WYG: 虐刑知人則無亂政此三代所以昌也智伯有五過人之才而不免于身死人手者不愛人也齊王建有三過人之巧而身虜于秦者不知賢也故仁莫大于愛人智莫大于知人二者不立雖察慧㨗巧不免于亂矣或曰周武之雄才武略身先士卒若天假之年盡其兵算必能平宇内為一代之明主乎虞南曰周武驍勇果毅有出人之畧觀其卑躬厲士法令嚴明雖勾踐穰苴無聞於天下此猛將之任非人君之度量也由此觀之夫撥亂之主當先以收相獲將為本一身善戰不足恃也故劉向曰知人者王道也知事者臣道也伎藝善戰何益哉後齊文宣帝狂悖之跡桀紂之所不為而國富人豐不至於亂亡何也宣帝名洋後齊髙歡第二子受後魏禪也虞南曰昔齊桓奢淫亡禮人倫所棄假六翮于仲父遂伯諸侯宣武帝鄙穢忍虐古今無比委萬幾於遵彦保全宗國以其任用得才所以社稷猶存者也議曰殷有三仁太康有五弟亦皆賢者而國為墟何哉鬻子曰君子與人之}
  - {type: page-break, offset: 19377, content: '', id: KR3j0015_WYG_002-19a, image: WYG0849/WYG0849-0036c.png}
