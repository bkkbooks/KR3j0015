  - {type: variant, offset: 17896, length: 0, content: '', WYG: 漢祖之臣三傑是也光武之佐二十八將是也豈得以鄧禹吳漢匹于張良韓信者乎然漢祖功臣皆强盛誅滅光武佐命悉用優秩安全君臣之際良可稱也絶長補短抑其次焉由此言之夫漢髙克平秦項開創漢業衣冠禮樂垂之後代雖未階王道霸徳之盛也或曰班固稱周云成康漢言文景斯言當乎虞南曰成康承文武遺跡以周召為相化篤厚之氓因積仁之徳疾風偃草未足為喻至如漢祖開基日不暇給}
  - {type: page-break, offset: 17896, content: '', id: KR3j0015_WYG_002-5a, image: WYG0849/WYG0849-0029c.png}
  - {type: variant, offset: 17896, length: 0, content: '', krp: 漢祖之臣三傑是也光武之佐二十八將是也豈得以鄧禹吳漢匹于張良韓信者乎然漢祖功臣皆强盛誅滅光武佐命悉用優秩安全君臣之際良可稱也絶長補短抑其次焉由此言之夫漢髙克平秦項開創漢業衣冠禮樂垂之後代雖未階王道霸徳之盛也或曰班固稱周云成康漢言文景斯言當乎虞南曰成康承文武遺跡以周召為相化篤厚之氓因積仁之徳疾風偃草未足為喻至如漢祖開基日不暇給}
  - {type: variant, offset: 17897, length: 1, content: 國, WYG: 嬴之弊猶有存者太宗體兹仁恕式遵𤣥黙滌秦項之酷烈反軒昊之淳風幾致刑厝斯為難矣若使不溺新垣之說無取鄧通之夢懍懍乎庶幾近於王道景帝之擬周康則尚有慙徳漢文贊曰文帝即位二十三年宫室園囿車騎服御無所增益有不便輙施以利人南越尉佗自立為帝召貴佗兄弟以徳懷之佗遂稱臣}
