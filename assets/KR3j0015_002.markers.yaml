  - {type: variant, offset: 1568, length: 160, content: 之此軍之微權也淮南子曰天下之物莫凶於谿毒附子也然而良醫橐而藏之有所用也麋之上山也大章不能跂及其下也牧豎能追之才有脩短也胡人便於馬越人便於舟異形殊類易事則悖矣魏武詔曰進取之士未必能有行有行之士未必能進取陳平豈篤行蘇秦豈守信耶而陳平定漢業蘇秦濟弱燕者任其長也由此觀之使韓信下幃仲舒當戎于公馳說陸賈聽訟必無曩時之勳而顯今日之名, WYG: ''}
