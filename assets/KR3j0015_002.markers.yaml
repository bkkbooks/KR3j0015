  - {type: variant, offset: 2157, length: 314, content: 士人也所謂君子者言必忠信而心不忌忌怨害也仁義在身而色不伐思慮通明而辭不專篤行信道自強不息油然若將可越而終不可及者此君子也油然不進之貌也越過也孫卿曰夫君子能為可貴不能使人必貴己能為可信不能使人必信己能為可用不能使人必用己故君子恥不修不恥見污恥不信不恥不見信恥不能不恥不見用不誘於譽不怨於誹率道而行端然正己謂之君子也所謂賢者德不踰閑閑法也行中規繩言足法於天下而不傷其身言滿天下無口過也道足化於百姓而不傷於本本亦身也富則天下無菀財菀積施則天下不病貧此則賢者也所謂聖者德合天地變通無方窮萬事之終始協庶品之自然敷其大道而遂成情性明竝日月化行若神下民不知其德覩者不識其鄰此聖者也鄰以喻界畔也莊子曰刻意尚行離世異俗高論怨誹為冗而已矣此山谷之士, WYG: ''}
