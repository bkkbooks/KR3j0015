  - {type: variant, offset: 19470, length: 4, content: 廢有仁義, WYG: 指其非而播揚其惡可為直士未為忠也故司空陳羣則不然其談語終日未嘗言人主之非書數十上而外不知君子謂陳羣于是乎長者此為忠矣明察成敗早防而救之塞其間絶其源轉禍以為福君終已無憂如此者智臣也依文奉法任官職事不受贈遺食飲節儉如此者貞臣也}
