  - {type: variant, offset: 19486, length: 0, content: '', WYG: 聞昔廣陵太守張超委政臧洪後袁紹亦與結友及曹操圍張超于雍丘洪聞超被圍乃徒跣號泣勒兵救超兼從紹請兵紹不聽超城䧟遂族誅超洪由是怨紹與之絶紹興兵圍之城陷誅死議曰臧洪當縱横之時行平居之義非立功之士也或曰季布壯士而反摧剛為柔髠鉗逃匿為是乎司馬遷曰以項羽之氣而季布以勇顯於楚身屢典軍搴音綺連反旗者數矣可謂壯士然至被刑戮為人奴而不死何其下也彼必自負其材故受辱而不羞欲}
