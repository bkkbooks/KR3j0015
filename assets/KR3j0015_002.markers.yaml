  - {type: variant, offset: 20092, length: 0, content: '', WYG: 于是與曹沬三敗所亡地諸侯聞之皆信齊而欲附焉山戎伐燕燕告急于齊齊桓公救燕而還燕莊公送桓公入齊境桓公曰非天子諸侯送}
  - {type: variant, offset: 20092, length: 0, content: '', krp: 于是與曹沬三敗所亡地諸侯聞之皆信齊而欲附焉山戎伐燕燕告急于齊齊桓公救燕而還燕莊公送桓公入齊境桓公曰非天子諸侯送}
  - {type: variant, offset: 20093, length: 1, content: 審, WYG: 出境吾不可以無禮于燕于是分溝割燕君所至與燕君令復修召公之政納貢于周諸侯聞之皆從齊桓公于是始霸由此觀之商鞅深刻弃信非霸者之佐明矣然孝公欲速不從鞅言孝公過}
  - {type: variant, offset: 20093, length: 1, content: 審, krp: 出境吾不可以無禮于燕于是分溝割燕君所至與燕君令復修召公之政納貢于周諸侯聞之皆從齊桓公于是始霸由此觀之商鞅深刻弃信非霸者之佐明矣然孝公欲速不從鞅言孝公過}
