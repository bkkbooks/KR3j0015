  - {type: variant, offset: 20180, length: 3, content: 在於使, WYG: 心欲小志欲大智欲圓行欲方能欲多事欲少所謂心小者慮患未生戒禍慎㣲不縱其欲也志大者兼包萬國一齊殊俗是非輻凑中為之轂也智圓者終始無端方流四逺深泉而不竭也行方者直立而不撓素白而不汚窮不易操達不肆志也能多者文武備具動静中儀也事少者執約以治廣處静以待躁也夫天道極即反盈則損故聰明廣智守以愚多聞博辯守以儉武力強毅守以畏富貴廣大守以狹徳施天下守以讓此五者先王所以守天下也傳曰無始亂無怙富無恃寵無違同無傲禮無驕能無復怒無謀非徳無犯非義此九言古人所以立身也玉鈐經曰夫以明示者淺有過不自知者弊迷而不反者流以言取怒者禍令與心乖者廢後令繆前者毁怒而無威者犯好衆辱人者殃戮辱所任者危慢其所敬者凶貌合心離者孤親佞逺忠者亡信䜛弃賢者惛私}
