  - {type: variant, offset: 19315, length: 1, content: 謀, WYG: 為太子嘗諫宣帝以為持法太嚴帝作色曰我漢家以霸王之道雜之奈何純任徳化用害政乎雖以此言之知其度量不逺然寛猛之制有自來矣昔髙祖入秦約法三章秦人大恱此言緩刑之美也郭嘉說曹公云漢末政失於寛紹以寛濟故不攝公糾之以猛而上下知制此言嚴刑之當也故傳曰政寛}
