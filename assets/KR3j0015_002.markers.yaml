  - {type: variant, offset: 4986, length: 189, content: 袁紹地廣兵強田豐許攸智計之士為其謀審配逢紀盡忠之臣任其事顏良文醜勇冠三軍統其兵殆難剋乎彧曰紹兵雖多而法令不整田豐剛而犯上許攸貪而不治審配專而無謀逢紀果而自用此二人留知後事許攸貪而犯法必不能縱不縱必為變顏良文醜一夫之勇耳可一戰而擒也後許攸貪不奉法審配收其妻子攸怒奔曹公又顏良臨陣授首田豐以諫死皆如彧所料也吾以此知勝之謂矣知人第五知人第五臣聞主將之法務覽英雄之心然人未易知知人未易漢, WYG: ''}
