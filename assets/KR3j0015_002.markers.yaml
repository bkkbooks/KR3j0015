  - {type: variant, offset: 2668, length: 457, content: 天地之道聖人之德也鈐經曰德足以懷遠信足以一異識足以鑒古才足以冠世此則人之英也法足以成教行足以修義仁足以得眾明足以照下此則人之俊也身足以為儀表智足以決嫌疑操足以厲貪鄙信足以懷殊俗此則人之豪也守節而無撓處義而不怒見嫌不苟免見利不苟得此則人之傑也人物志曰德行高妙容止可法是謂清節延陵晏嬰是也思通道化策謀奇妙是謂術家范蠡張良是也其德足以厲風俗其法足以正天下其術足以謀廟勝是謂國體伊尹呂望是也其德足以率一國其法足以正鄉邑其術足以權事宜是謂器能子產西門豹是也清節之流不能宏恕好尚譏訶分別是非是謂臧否子夏之徒是也法家之流不能創思圖遠而能受一官之任錯意施巧是為伎倆張敞趙廣漢是也術家之流不能創制垂則而能遭變用權權智有餘公正不足是謂智意陳平韓安國是也能屬文著述是謂文章司馬遷班固是也能傳聖人之業而不能幹事施政是謂儒學毛公貫公是也辯不入道而應對資給是謂口辯樂毅曹丘生是也膽力絕眾材略過人是謂驍雄白起韓信是也家語曰昔者明王必盡知天下良士之名既知其名又知其實然後用天下之爵以尊之則天下理也此之謂矣量才第四量才第四夫人才能參差大小不同猶升不, WYG: ''}
