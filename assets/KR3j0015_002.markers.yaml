  - {type: variant, offset: 21368, length: 1, content: 易, WYG: 也不足者非無貨人鮮而費多也何謂四亂管子曰内有疑妻之妾此家亂也庶有疑嫡之子此宗亂也朝有疑相之臣此國亂也任官無能此衆亂也故曰立天子者不使諸侯疑焉立諸侯者不使大夫疑焉立正妻者不使嬖妾疑焉立嫡子者不使庶孽疑焉疑則動兩則争雜則相傷故臣有兩位者國必亂臣兩位而國不亂者君猶在也恃君不亂失君必亂矣子兩位者家必亂子兩位而家不亂者親猶存也恃親不亂失親必亂矣臣疑其君無不危之國孽疑其宗無不危之家也何謂四危又曰卿相不得衆國之危也大臣不和同國之危也兵主不足畏國之危也民不懷其産國之危也此治亂之形也凡為人上者法術明而賞罰必者雖無言語而勢自治法術不明而賞罰不必者雖日號令然勢自亂管子曰理國有三器亂國有六攻明君若能勝六攻而立三器故國理不肖君不能勝六攻而立三器故國亂三器者何也曰號令也斧鉞也祿賞也六攻者何也曰親也賔也貨也色也巧佞也玩好也三器之用何也曰非號令無以使下非斧鉞無以威衆非祿賞無以勸人六攻之敗何也曰雖不聽而可以得存雖犯禁而可以得免雖無功而可以得富夫國有不聽而可以得存者則號令不足以使下有犯禁而可以得免者則斧鉞不足以威衆有無功而可以得富者則祿賞不足以勸人號令不足以使下斧鉞不足以威衆祿賞不足以勸人則人君無以自}
