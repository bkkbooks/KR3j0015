所為皆可知矣又有察色察色謂心氣內蓄皆可以色取之夫誠智必有難盡之色又曰誠智必有明達之色誠仁必有可尊之色又曰誠仁必有溫柔之色誠勇必有難懾之色又曰誠勇必有矜奮之色也誠忠必有可觀之色誠絜必有難汙之色誠貞必有可信之色質色浩然固以安偽色曼然亂以煩此之謂察色人物志曰夫心質亮直其儀勁固心質平理其儀安閑夫仁目之精愨然以端勇膽之精曄然以強夫憂患之色乏而且荒疾疢之色亂而垢理喜色愉然以懌慍色厲然以揚妒惑之色冒昧無常是故其言甚懌而精色不從者中有違也其言有違而精色可信者辭不敏也言未發而怒色先見者意憤溢也言已發而怒氣送之者強所不然也凡此之類雖欲違之精色不從威愕以明雖變可知也又有考志考志者謂方與之言以察其志其氣寬以柔其色檢而不諂其禮先人其言後人每自見其所不足者是益人也若好臨人以色高人以氣勝人以言防其所不足而廢其所不能者是損人也太公曰博文辯辭高行論議而非時俗此姦人也王者慎勿寵之也其貌直而不侮其言正而不私不飾其美不隱其惡不防其過者是質人也又曰與之不為喜奪之不為怒沉靜而寡言多信而寡貌者是質靜人也議曰太公曰樸其身頭惡其衣服語無為以求名言無欲以求得此偽人也王者慎勿近之夫質人之中有如此之偽者也若其貌曲媚其言諛巧飾其見物務其小證以故自說者是無質人也議曰晏子云讒夫佞人之在君側材能皆非常也夫藏大不誠於中者必謹小誠於外以成其大不誠此難得而知, krp: 優}
