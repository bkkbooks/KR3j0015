  - {type: variant, offset: 19449, length: 0, content: '', WYG: 但在用與不用耳苟為不用君誤賢人君子安能救敗亂乎陳武帝起自草菜興創帝業近代以來可方何主虞南曰武帝以奇才逺略懷匡復之志龍躍海隅豹變嶺表掃重氛於絳闕復帝座於紫㣲西抗周師北夷齊冦宏謀長算動無遺䇿實開基之令主撥亂之雄才比宋祖則不及方齊髙則優矣隋文帝起自布衣光有神器西定庸蜀南平江表比於晉武可為儔乎虞南曰隋文因外戚之重周室之㣲負圖作宰遂膺寳命留心政治務從恩澤故能綏撫新舊緝寧遐邇文武制置皆有可觀及克定江淮咸同書軌率土黎獻企佇太平自金陵滅後王心奢汰雖威加四海而情墮萬機荆璧填于内府吳姬滿于下室仁夀彫飾事將傾宫萬姓力殫中民産竭加以猜忌心起巫蠱事興戮愛子之妃離上相之母猫鬼事起秦王妃及僕射楊素母皆坐焉綱維以紊禮教斯亡牝雞晨響皇枝勦絶廢黜不辜樹立所愛廢太子勇為庶人立晉王廣}
