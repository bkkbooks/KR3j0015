  - {type: variant, offset: 19452, length: 0, content: '', WYG: 漢髙祖欲以趙王如意易太子叔孫通諫曰昔晉獻公以驪姬故廢太子立奚齊晉國亂者數十年為}
  - {type: variant, offset: 19452, length: 0, content: '', krp: 漢髙祖欲以趙王如意易太子叔孫通諫曰昔晉獻公以驪姬故廢太子立奚齊晉國亂者數十年為}
  - {type: variant, offset: 19454, length: 0, content: '', WYG: 笑秦以不早定扶蘇令趙髙得以詐立胡亥自使滅祀此陛下所親見今陛下必欲廢嫡而立少臣願先伏誅以頸血汚地帝曰吾直戲耳通曰太子乃天下本本之一揺大下震動奈何以天下戲乃聽之袁紹愛少子尚乃以太子譚繼兄後沮授諫曰世稱萬人逐兎一人獲之貪者悉止分定故也且年均以賢徳均以長上古之制也願上惟先代成敗之誡下思逐兎分定之義若其不改禍始此矣紹不從後果搆隙故曰立嫡子者不使庶孽疑焉疑則動兩則争子兩位者家必亂子兩位而家不亂者親猶在也恃親不亂失親必亂有㫖哉或曰王霸之畧請事斯語矣敢問殁而作謚及改正朔易服色以變人之耳目其事奚象對曰古之立謚者將以戒夫後代隨行受名君親}
