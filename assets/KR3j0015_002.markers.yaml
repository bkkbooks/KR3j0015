  - {type: variant, offset: 1955, length: 183, content: 孔子曰人有五儀有庸人有士人有君子有聖有賢審此五者則治道畢矣所謂庸人者心不存慎終之規口不吐訓格之言法格不擇賢以託身不力行以自定見小闇大而不知所務從物如流而不知所執此則庸人也所謂士人者心有所定計有所守雖不能盡道術之本必有率也率猶述也雖不能徧百善之美必有處也是故智不務多務審其所知言不務多務審其所謂所謂言之要也行不務多務審其所由智既知之言既得之得其要也行既由之則若性命形骸, WYG: 化}
