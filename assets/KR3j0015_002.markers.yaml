  - {type: variant, offset: 20112, length: 2, content: 今土, WYG: 陛下以絳侯周勃何如人上曰社稷臣也盎曰可謂功臣非社稷臣社稷臣者主在與在主亡與亡方吕后時劉氏不絶如帶絳侯為太尉主兵柄不能正吕氏崩大臣相與誅諸吕太尉主兵適㑹其成功所謂功臣非社稷臣也後漢陳蕃上疏薦徐穉袁閎韋著三人帝問蕃曰三人誰為先後蕃曰閎生公族聞道漸訓著長於三輔禮義之俗所謂不扶自直不鏤自彫至於穉者爰自江南卑薄之域而角立傑出宜當為先或曰謝安石為相可與何人為比虞南曰昔顧雍封侯之日而家人不知前代稱其質重莫以為偶夫以東晉衰微壃塲日駭况永固苻堅字也六夷英主親率百萬苻融儁才名相執銳先駈厲虎狼之爪牙騁長蛇之鋒鍔先築賔館以待晉君强弱而論鴻毛太山不足為喻文靖深拒桓冲之援不喜謝𤣥之書則勝敗之數固已存於胷中矣夫斯人也豈以區區萬户之封動其方寸者歟若論其度量近古以來未見其匹隋煬帝在東宫嘗謂賀若弼曰楊素韓擒虎史萬歲三人俱稱良將其間優劣何如對曰楊素是猛將非謀將議曰膽氣果敢猛將也淵而有謀謀將也韓擒虎是鬭將非領將議曰奮㨗趫悍鬭將也御軍齊肅領將也史萬歲是騎將非大將議曰領一偏師所向無敵騎將也包羅英雄使羣才各當其用大將也太子曰善故自六正至於問將皆人臣得失之效也古語云禹以夏王桀以夏亡湯以殷王紂以殷亡闔廬以吳戰勝無敵於天下而夫差以見擒於越穆公以秦顯名尊號而二世以刼於望夷其所以君王者同而功迹不等者所任異也是以成王處襁褓而朝諸侯周公用事也趙武靈王年五十而餓死于沙丘任李兊也故魏有公子無忌削}
