  - {type: variant, offset: 20343, length: 191, content: 有山海之貨而人不足于財者不務人用而淫巧眾也藏於不竭之府養桑麻育六畜也漢景帝詔曰農天下之本也黃金珠玉饑不可食寒不可衣其令郡國勸農桑益種樹可充衣食物吏發人取庸采黃金珠玉者坐贓為盜二千石聽者與罪同申鑒論曰人不畏死不可懼之以罪人不樂生不可勸之以善故在上者先豐人財以定其志也下令於流水之原以順人心也尉繚子曰令所以一眾心也不審所出則數變數變則令雖出眾不信也出令之法雖有小過無更則眾不二聽即令行矣, WYG: ''}
