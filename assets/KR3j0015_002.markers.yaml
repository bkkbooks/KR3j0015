  - {type: variant, offset: 20086, length: 4, content: 舉措廢置, WYG: 秦得以兼諸侯也衛鞅始自以為知王霸之徳原其事不倫也昔周召公施美政其死也後世思之蔽芾甘棠之詩是嘗舍於樹下不忍伐其樹况害於身乎管仲奪伯氏駢邑三百户無怨言今衛鞅内刻刀鋸之刑外深鈇鉞之誅身死車裂其去霸者之佐亦逺矣然孝公殺之亦非也可輔而用使衛鞅施寛平之法加之以恩申之以信庶幾霸者之佐乎議曰商鞅初因景監求見秦孝公説以帝道孝公意不入時時睡後又與鞅語不知膝之過席景監曰子何以申吾君君之歡甚也鞅曰始吾說公以帝道而君曰久逺安能邑邑待數十百年以子孫成事乎吾又說以伯道其意欲之而未能也吾又以强國之術說君君大悅之然亦難以比徳于殷周矣昔齊桓公與魯莊公㑹于柯而盟曹沫以匕首刼桓公反魯侵地桓公許之後悔欲无與魯地而殺曹沬管仲曰弃信于諸侯失天下之援}
  - {type: page-break, offset: 20086, content: '', id: KR3j0015_WYG_002-32b, image: WYG0849/WYG0849-0043b.png}
