  - {type: 'tls:seg', offset: 20070, content: '', id: KR3j0015_CH7x2006_002-8a.81}
  - {type: variant, offset: 20070, length: 0, content: '', WYG: 之師咸以為謨謀勝武侯也可乎張輔曰夫以五國之兵共伐一齊不足為强大戰濟西伏尸流血不足為仁彼孔明包文武之徳長嘯俟時劉𤣥徳以知人之明屢造其廬咨以濟世奇䇿泉涌遂東説孫權北抗大魏以乗勝之師翼佐取蜀及𤣥徳臨終禪以大位在擾攘之際立童䝉之主設官分職班叙衆才文以治内武以折衝然後布其恩澤於國中之人其行軍也路不拾遺毫毛不犯勲業垂濟而隕勸其遺文謨謀𢎞逺矣已有功則讓于下下有闕則躬自咎見善則遷納諫則改故聲烈震遐邇也孟子曰聞伯夷之風貪夫自廉余以為覩孔明之忠奸臣立節殆將與伊吕争烈豈徒以樂毅為伍哉或曰商鞅起徒步干孝公挾三術之略吞六國之縱使秦業帝可為霸者之佐乎劉向曰夫商君内急耕戰之業外重戰伐之賞不阿貴寵不偏疎逺雖書云無偏無黨詩云周道如砥其直如矢司馬法之厲戎士周后稷之勸農業無以易此此所以并諸侯也故孫卿曰四世有勝}
  - {type: page-break, offset: 20070, content: '', id: KR3j0015_WYG_002-31b, image: WYG0849/WYG0849-0042d.png}
