  - {type: variant, offset: 15549, length: 1428, content: 鵝有皮相連者性淳和人也指頭方懟者見事遲人也妍美者囑授人信之惡者人不遵承也毛髮光澤脣口如朱者才能學藝人也心出為舌又主血血窮為毛髮榮於耳藏於神經曰野狐鬢難期信羖䍽鬢多狐疑脣急齒露難與為友脣寬端正出言有章脣口不佳出言不信口邊無媚好揚人惡口啄如烏不可與居惡心人也口急緩如鳥言語撮聚者此人多口舌緩急不同少信人也鼻孔小縮准頭低曲者慳恡人也肺出為鼻孔又主皮膚又為氣息藏於魄好鼻者有聲譽鼻柱薄而梁陷者多病厄人也鼻無媚憨蠢人也蜣蜋鼻少意智人也耳孔小齒瓣細者邪諂姦佞人也腎出為骨又主髓髓窮為耳孔骨窮為齒藏于志經曰耳孔深廣者心虛而識元耳孔醜小者無智而不信神理耳邊無媚鄙拙人也耳孔小而節骨曲戾者無意智人也老鼠耳者殺之不死又云鼠耳之人多作偷盜者也耳輪厚大鼻准圓實乳頭端淨頦頤深廣厚大者忠信謹厚人也脾出為肉肉窮為孔又主耳輪准鼻梁頦頤等藏於意經曰夫頭高大者性自在而好淩人頭卑弊者性隨人而細碎故曰鹿頭側長志氣雄強兔頭蔑頡意志下劣獺頭橫闊心意豁達夫頸細而曲者不自樹立人也若色斑駁或不潔淨者性隨宜而不堅固夫手纖長者好施捨短厚者好取捨則庶幾取則貪惜故曰手如雞足意智褊促手如豬蹄志意昏迷手如猴掌勤劬伎倆夫背厚闊者剛決人也薄者怯弱人也夫腹端妍者才華人也故曰牛腹婪貪財物自淹蛤蟆腹者懶人也夫腰端美者則樂而能任人也蜥蜴腰者緩人也夫臂髀厚廣者可倚任安穩人也夫蛇行者含毒人也不可與之共事鳥行蹌蹌性行不良似鳥鵲行也鷹行雄烈豺狼行者性粗覓利人也牛行性直也馬行猛烈人也此性靈存乎容止者也范蠡曰越王為人長頸烏喙可與共患難不可與共安樂尉繚曰秦始皇隆準長目鷙膺豺聲少恩信虎狼心居約易出人下得志亦輕食人不可與之久游叔魚生其母視之曰是虎目而豕心鳶肩而牛腹谿壑可盈是不可厭也晉叔向欲娶于巫臣氏其母不欲曰昔有仍氏生女黰黑而甚美光可以鑑名曰元妻樂正后夔娶之生伯封實有豕心貪婪無厭忿類無期謂之封豕有窮后羿滅之夔是以不祀且三代之亡皆是物也汝何為哉夫有尤物足以移人苟非德義則必有禍叔向懼乃止魏安釐王問子從曰馬回梗梗亮直大夫之節吾欲為相可乎荅曰長目而豕視則體方而心圓每以其法相人千萬不失一臣見回非不偉其體幹然甚疑其目平原君相秦將白起謂趙王曰武安君之為人也小頭而銳下瞳子白黑分明視瞻不轉小頭而銳下者斷敢行也瞳子白黑分明者見事明也視瞻不轉者執志強也可與持久難與爭鋒王莽大口蹶頤露目赤精聲大而身長七尺五寸反膺仰視瞰臨左右或言莽所謂鴟目虎啄豺狼之聲故瞰食人亦當為人所殺莽後篡漢位後兵敗歸果被殺也夫命之與相猶聲之與響也聲動乎幾響窮乎應必然之理矣雖云以言信行失之宰予以貌度性失之子羽然傳稱無憂而戚憂必及之無慶而歡樂必還之此心有先動而神有先知則色有先見故扁鵲見桓公知其將亡申叔見巫臣知其竊妻或躍馬膳珍或飛而食肉或早隸晚侯或初刑末王銅巖無以飽生玉饌終乎餓死則彼度表捫骨指色摘理不可誣也故列云爾論士第七論士第七臣聞黃石公曰昔太平之時諸侯二師方伯三師天子六師世亂則叛逆生王澤竭則盟誓相罰德同無以相加乃攬英雄之心故曰得人則興失士則崩何以明之昔齊桓公見小臣稷一日三往而不得見從者止之桓公曰士之傲爵祿者固輕其主其主傲霸王者亦輕其士縱夫子傲爵祿吾庸敢傲霸王乎五往而後得見書曰能自得師者王何以明之齊宣王見顏觸曰觸前觸亦曰王前議曰夫觸前為慕勢王前為趨士與使觸為慕勢不若使王為趨士宣王作色曰王者貴乎士者貴乎對曰昔秦攻齊令曰有敢去柳下季壟五百步而樵採者罪死不赦令曰有能得齊王頭者封萬戶侯賜金千鎰由是言之生王之頭曾不如死士之壟宣王竟師之宣王左右曰大王據千乘之地而建千石之鍾東, WYG: 髙祖虞}
