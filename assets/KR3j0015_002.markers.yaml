  - {type: variant, offset: 19485, length: 0, content: '', WYG: 比干於紂親則叔父官則少師忠欵之心在於存宗廟而已固以必死争之冀身死之後而紂悔寤其本情在乎仁也泄冶位為下大夫無骨肉之親懷寵不去以區區之一身欲正一國之淫昏死而無益可謂懷矣詩云民之多僻無自立辟其泄冶之謂乎或曰叔孫通阿二世意可乎司馬遷曰夫量主而進前哲所韙叔孫生希世度務制禮進退與時變化卒為漢家儒宗古之君子直而不挺曲而不撓大直若詘道同蜲虵蓋謂是也議曰太公云吏不志諫非吾吏也朱雲廷詰張禹曰尸祿保位無能往來可斬也班固曰依世則廢遺違俗則危殆此古人所以難受爵位由此言之存與死其義云何對曰范􅁮稱夫專為義則傷生專為生則騫義若義重于生捨生可也生重于義全生可也或曰然則竇武陳蕃與宦者同朝廷争衡終為所誅為非乎范曄曰桓靈之世若陳蕃之徒咸能樹立風聲抗論昏俗驅馳岨峗之中而與腐夫争衡終取滅亡者彼非不能潔情志違埃霧也憫夫世士以離俗為髙而人倫莫相恤也以遯世為非義故屢退而不去以仁心為己任雖道逺而彌厲及遭值際㑹協䇿竇武可謂萬代一時也功雖不終然其信義足以攜持世心矣議曰此所謂義重于生捨生可也或曰臧洪死張超之難可謂義乎范曄曰雍丘之圍臧洪之感憤壯矣相其徒跣且號束甲請舉誠足憐也夫豪雄之所趣舍其與守義之心異乎若乃締謀連衡懷詐算以相尚者蓋惟勢利所在而已况偏城既危曹袁方睦洪徒指外敵之衡以紓倒懸之㑹忿悁之師兵家所忌可謂懷哭秦之節存荆則}
