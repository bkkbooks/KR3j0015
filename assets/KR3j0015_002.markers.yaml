可後果反攻王楚王鼓而進遂滅若敖氏又曰晉韓宣子如齊見子雅子雅召其子子旗使見宣子宣子曰非保家之主也不臣杜預曰言子旗志器亢也後十年來奔周靈王之弟儋季卒其子括將見王而歎單公子愆旗聞其歎也入以告王曰不戚而願大視躁而足高心在他矣不殺必為害王曰童子何知及靈王崩儋括欲立王子佞夫周大夫殺佞夫齊崔杼帥師伐我公患之孟公綽曰崔子將有大志不在病我必速歸何患焉其來也不寇使人不嚴異於他日齊師徒歸果弒莊公晉楚會諸侯而盟楚公子圍設服離衛魯大夫叔孫穆子曰楚公子美矣君哉杜預曰設君服也此年子圍篡位衛孫文子來聘君登亦登叔孫穆子趨進曰諸侯之會寡君未嘗後衛君今吾子不後寡君未知所過吾子其少安孫子無辭亦無悛容穆叔曰孫子必亡為臣而君過而不悛亡之本也後十四年林父逐君初鄭伯享趙孟七子賦詩伯有賦鶉之賁賁享卒趙孟告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賓榮其能久乎魏時管輅相何晏鄧颺當誅死輅舅問之曰鄧颺行步節不束骨脈不制肉起立傾倚若無手足謂之鬼躁何之視候魂不守宅面無華色精爽煙浮容若枯木謂之鬼幽鬼躁者為風所收鬼幽者為火所燒自然之符不可蔽也宋孔熙光就姚生曰夫相人也天欲其圓地欲其方眼欲光曜鼻須柱梁四瀆欲明五岳欲強此數者君無一焉又君之眸子服服如望羊行委曲而失步聲嘶散而不揚豈唯失其福祿將乃罹其禍殃後皆謀反被殺之矣由此觀之以相察士其來尚矣故曰富貴在於骨法憂喜在於容色經曰青主憂白主哭泣黑主病赤主驚恐黃主慶喜凡此五色並以四時判之春三月青色王赤色相白色囚黃黑二色皆死夏三月赤色王白色黃色皆相青色死黑色囚秋三月白色王黑色相赤色死青黃二色皆囚冬三月黑色王青色相白色死黃與赤二色囚若得其時色王相者吉不得其時色王相若囚死者凶魏管輅往族兄家見二客客去輅謂兄曰此二人天庭及口耳之閒同有凶氣異變俱起雙魂無宅流魄于海骨歸于家後果溺死此略舉色變之效成敗在於決斷以此參之萬不失一經曰言貴賤者存乎骨骼言修短者存乎虛實經曰夫人喘息者命之所存也喘息條條狀長而緩者長命人也喘息急促出入不等者短命人也又曰骨肉堅硬壽而不樂體肉耎者樂而不壽左傳曰魯使襄仲如齊復曰臣聞齊人將食魯之麥以臣觀之將不能齊君之語偷臧文仲有言曰人主偷必死後果然鄭伯如晉拜成授玉于東楹之東晉大夫貞伯曰鄭伯其死乎自棄也已視流而行速不安其位宜不能久杜預曰言鄭伯不端諦也六月卒天王使劉康公成肅公會晉侯伐秦成子受脤于社不敬劉子曰吾聞之人受天地之中以生所為命也是以有動作禮義威儀之則以定命也能者養之以福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業國之大事在祀與戎祀有執燔戎有受脤神之大節也今成子墮棄其命矣其不及乎五月卒于瑕晉侯嬖程鄭使佐下軍鄭行人公孫翬如晉聘程鄭問焉曰敢問降階何由子羽不能對歸以語然明然明曰是將死矣不然將亡貴而知懼懼而思降乃得其階下人而已又何問焉且夫既登而求降者知人也不在程鄭其有亡釁乎不然其有惑疾將死而憂乎明年程鄭卒天王使單子會韓宣子于戚視下言徐叔向曰單子其將死乎朝有著定會有表衣有襘帶有結會朝之言必聞于表著之位所以昭事序也視不過結襘之中所以道容貌也言以命之容貌以明之失則有闕今單子為王官伯而命事于會視不登帶言不過步貌不道容而言不昭矣不道不恭不昭不從無守氣矣此冬單子卒宋平公享昭子晏飲樂語相泣也樂祁佐退而告人曰今茲君與叔孫其將死乎吾聞之哀樂而樂哀皆喪心也心之精爽是謂魂魄魂七去之何以能久此年叔孫宋公皆卒邾隱公來朝執玉高其容仰魯公受其玉卑其容俯子貢曰以禮觀之二君皆有死氣高仰驕也卑俯替子驕近亂替近疾君為主其先亡乎此年公薨哀七年以邾子益歸衛侯會吳於鄖吳人藩衛侯之舍子貢說太宰嚭而免之衛侯歸效夷言子之尚幼曰君必不免其死于夷乎執焉而又說其言從之固矣後卒死於楚魯公作楚宮穆叔曰太誓云人之所欲天必從之君欲楚也夫故作其宮不復適楚必死是宮六月辛巳公薨於楚宮晉侯使郤犨送孫林父於衛衛侯饗之苦成叔敖衛大夫甯子曰苦成家其亡乎古之饗食也以觀威儀省禍福故詩云兕觥其觩旨酒思柔彼交匪敖萬福來求今夫子敖取禍之道也十七年郤氏亡齊侯與衛侯會於商任不敬叔向曰二君者必不免會朝禮之經也禮政之輿也政身之守也怠禮失政不立是以亂也二十五年齊弒光二十六年衛弒剽也言性靈者存乎容止斯其大體夫相人先視其面面有五岳四瀆五岳者額為衡山頤為恒山鼻為嵩山左顴為泰山右顴為華山四瀆者鼻孔為濟口為河目為淮耳為江五岳欲聳峻員滿四瀆欲深大崖岸成就五岳成者富人也不豐則貧四瀆成者貴人也不成則賤矣五官六府五官者口一鼻二耳三目四人中五六府者兩行上為二府兩輔角為四府兩權衡上為六府一官好貴十年一府好富十年五官六府皆好富貴無巳左為文右為武也九州八極九州者額從左達右無縱理不敗絕狀如覆肝者為善八極者登鼻而望八方成形不相傾者為良也七門二儀七門者兩姦門兩闕門兩命門一庭中二儀者頭圓法天足方象地天欲得高地欲得厚若頭小足薄貧賤人也七門皆好富貴人也總而言之額為天頤為地鼻為人左目為日右目為月天欲張地欲方人欲深廣日月欲光天好者貴地好者富人好者壽日月好者茂上亭為天主父母貴賤中亭為人主昆弟妻子仁義年壽下亭為地主田宅奴婢畜牧飲食也若夫權骨纔起膚色潤澤者九品之侯也又曰腰腹相稱臀髀纔厚及高視廣步此皆九品之侯也夫色須厚重腰須廣長故經曰面如黃瓜富貴榮華白如截脂黑色如漆紫色如椹腰廣而長腹如垂囊行如鵝龜此皆富貴人也凡稱夫公侯將相已下者不論班品也輔骨小見鼻准微端者八品之侯也又曰胸背微豐手足悅澤及身端步平者此皆八品之候也夫鼻須洪直而長胸脾須豐厚如龜形手足色須赤白此皆富貴人也故經曰手足如綿富貴終年手足厚好立使在傍也輔角成稜倉庫皆平者七品之候也又曰胸厚頸粗臂脛傭均及語調顧定者此皆七品之候也夫頸須粗短手臂須纖長語須如篁及鳳此皆貴相也故經曰額角高聳職位優重虎頸圓粗富貴有餘牛顧虎視富貴無比天倉滿得天祿地倉滿豐酒肉也天中豐隆印堂端正者六品之候也又曰腦起身方手厚腰圓及聲清音朗者此皆六品之候也夫人額上連天中下及司空有骨若肉如環者名曰天城周帀無缺者大貴有缺若門者為三公夫聲者須深實大而不濁小而能彰遠而不散近而不亡餘音激澈似若有篁宛轉流韻能圓能長此善者也宮聲重大沈壅商聲堅勁廣博角聲圓長通徹徵聲抑揚流利羽聲奄藹低曳此謂正聲也伏犀明峻輔角豐穠者五品之候也又曰頸短背隆乳闊腹垂及鵝行虎步者皆五品之侯也夫人腦縫骨起前後長大者將軍二千石領兵相也出髮際為伏犀須聳峻稜利公侯相也不用寬平有坎者迍剝有峰者大佳寬平者猶為食祿夫腹須端妍故曰馬腹龐龐玉帛豐穰也邊地高深福堂廣厚者四品之候也又曰頭高而豐長上短下及半顧龍行者此皆四品之候也邊地在額角近髮際也福堂在眉尾近上也夫頭須高大故經曰牛頭四方富貴隆昌虎頭高峙富貴無比象頭高廣福祿長厚犀頭律崒富貴鬱鬱駞頭蒙洪福祿所鍾虎行將軍鴈行大富也犀及司空龍角纖直者三品之侯也又曰胸背極厚頭深且尖及志雄體柔者此皆三品候也司空從髮際直下次天庭是也龍角在眉頭上也頭頂高深龍犀成就者二品之侯也又曰頭角奇起支節合度及貌桀性安者此皆二品之侯也夫容貌慷慨舉止汪翔精爽清澄神儀安定言語審諦不疾不徐動息有恒不輕不躁喜怒不妄發趨捨合物宜聲色不變其情榮枯不易其操此謂神有餘者主有貴位也四倉盡滿骨角俱明者一品之侯也頭頸皆好支節俱成及容質姿美顧視澄澈者此皆一品之候也似龍者為文吏似龍者甚貴龍行者為三公也似虎者為將軍虎行者為將軍驛馬骨高為將軍也似牛者為宰輔似馬者為武吏似馬亦甚貴也似狗者有清官為方伯似豬似猴者大富貴似鼠者惟富而己凡稱似者謂動靜並似之若偏似一處乃貧寒者也天中主貴氣平滿者宜官祿也天中最高近髮際發黃色上入正角至高廣參駕遷刺史牧守黃色如日月在天中左右侍天子也黃色出天中圓大光重者暴見天子經年及井竈有功受封恒有黃氣如懸鐘鼓三公之相也又發黃氣如龍形亦受封也四時官氣發天部如鏡光者暴貴相也天庭主上公大丞相之氣天庭直下次天中有黑子主死司空主天宮亦三公之氣司空直下次天中色惡主上書大凶中正主群寮之氣平品人物之司也中正直下次司空色好者遷官轉職若司空中正發赤色而歷歷者在中正為縣官在天庭為郡官州縣蘭臺尚書各視所部也印堂主天下印綬掌符印之官也印堂在兩眉間微下眉頭少許次中正發赤色如連刀上至天庭下至鼻准為縣令直闕庭發色者長吏也如車輪與輔角相應者大貴印堂一名闕庭也山根平美及有奇骨伏起為婚連帝室公主婿也山根直下次印堂亦主有勢無勢也高廣主方伯之坐從天中橫列至髮際凡七名高廣位在第三高廣忽發黃色如兩人捉鼓者將軍相也陽尺主州佐之官橫次高廣位在第四陽尺亦主少出方伯有氣憂遠行也武庫主兵甲典庫之吏橫次陽尺位在第五輔角主遠州刺史之官橫次武庫位在第六骨起色好主黃門舍人之官也邊地主邊州之任橫次輔角位在第七有黑子落難為奴也日角主公侯之坐從天庭橫列至髮際凡八名日角位在第一平滿充直者宜官職房心主京輦之任橫次日角位在第二房心左為文右為武骨起宜做人師黃色見房心上至天庭為丞令直見房心而光澤者召為國師也驛馬主急疾之吏橫次位在第七驛馬好色應印堂上秋冬得官也額角主卿寺之位從司空橫列至髮際凡八名額角橫次位在第一色紅黃大吉昌也上卿主帝卿之位橫次額角上卿躍躍封卿大樂虎眉主大將軍從中正橫列至髮際凡九名虎眉橫次位在第二發青白色者應行也牛角主王之統師小將橫次虎眉位在第三亦主封侯食祿成角者更勝於肉也元角主將軍之相橫次位在第五無角者不可求官凡欲知者得官在任久不先視年上發巳長短發色長一分主一年二分二年以此消息則可知也有惡色間之者主其年有事白色遭喪赤色彈奪黑色病青色獄厄天中有氣橫千者無官也然官色既久忽有死厄色間之者代人死也若年上有好色如連山出雲雨處處皆通則無處不達髮際有黃氣為已得官若黑氣未也有黃氣如衣帶發額上遷官益祿也夫人有六賤頭小身大為一賤又曰額角陷缺天中霪下亦為一賤經曰額促而迮至老窮厄虵頸薄曲糟糠不足虵頭平薄財物寥落貉頭尖銳窮厄無計也目無光澤為二賤又曰胸背俱薄亦為二賤經曰陷胸薄尻及猴目皆窮相也舉動不便為三賤又曰音聲雌散亦為三賤經曰語聲嘖嘖面部枯燥面毛戎戎無風而塵皆貧賤相也夫聲之惡者塵濁飛散細嗄聊亂聲上則若盡往則不還淺亂澀細沈濁痿弊舌短神強蹇此無響此惡相也夫人不笑似笑不嗔似嗔不喜似喜不畏似畏不醉似醉常如宿酲不愁似愁常如憂戚容貌闕乏如經癇病神色悽愴常如有失舉止慞惶恒如趨急言語澀縮若有隱藏體貌低摧如遭凌辱此並神不足也神不足者多牢獄厄有官隱藏而失有位貶逐而黜者也鼻不成就准向前低為四賤又曰眇目斜視亦為四賤經曰人中平滿耳無輪廓皆貧賤相也腳長腰短為五賤又曰唇傾鼻曲亦為五賤經曰蛇行雀趨財物無儲鼻柱薄主立諾鼻頭低垂至老獨炊搖腰急步必無所使腰短者則被人奪職也文策不成脣細橫長為六賤又曰多言少信亦為六賤經曰口蒲人不提攜僻側為人所毀口如炊火至老獨坐舌色白下賤人也舌短貧賤人也凡欲知人是賤者貴處少而賤處多多者廣也少者狹也六賤備具為僕隸之人此貴賤存乎骨骼者也論曰堯眉八彩舜目重瞳禹耳三漏文王四乳然則世人亦時有四乳者此則駑馬一毛似驥也若日角月偃之奇龍棲虎踞之美地靜鎮於城堙天闢運於掌策金槌玉枕磊落相望伏犀起蓋隱轔交映井宅既兼倉匱已實斯乃卿相之明效也若深目長頸頹顏蹙齃虵行鷙立猳喙鳥咮筋不束體面無華色手無春荑之柔髮有寒蓬之悴是則窮乏徵驗也昔姑布子卿謂子貢曰鄭東門有一人其長九尺六寸河目而隆顙其頭似堯其項似皋陶其肩似子產然自腰以下不及禹三寸儽然若喪家之狗河目謂上下匡而長也顙額也漢高祖隆准而龍顏准鼻也顏額顙也兩角為龍角一角為犀角言高祖似龍兩眉顙骨高而鼻上隆魏陳留王豐下兌上有堯圖之表陳宣帝頸縝貌若不惠初賤時楊忠見而奇之曰此人虎頸必當大貴後皆果然此貴賤之效也夫木主春生長之行也春主肝肝主目目主仁生長敷榮者施恕惠與之意也火主夏豐盛之時也夏主心心主舌舌主禮豐盛殷阜者富博宏通之義也金主秋收藏之節也秋主肺肺主鼻鼻主義收藏聚斂者恡嗇慳鄙之情也水主冬萬物伏匿之日也冬主腎腎主耳耳主智伏匿隱蔽者邪諂姦佞之懷也土主季夏萬物結實之月也季夏主脾脾主脣脣主信結實堅確者貞信謹厚之禮也故曰凡人美眉目好指爪者庶幾好施人也肝出為眼又主筋窮為爪榮於眉藏於魂經曰凡人眉直而頭昂意氣雄強缺損及薄無信人也如弓者善人也眼有光彩而媚好者性識物理而明哲人也眼光溢出瞼外不散不動, krp: 寛裕}
