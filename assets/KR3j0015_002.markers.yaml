  - {type: variant, offset: 19576, length: 1, content: 周, WYG: 而執刼雖摧吕祿以安社稷義存君親可也或曰靳允違親守城可謂忠乎徐衆曰靳允於曹公未成君臣母至親也於義應去昔王陵母為項羽所拘母以髙祖必得天下因自殺以固陵志明心}
  - {type: variant, offset: 19576, length: 1, content: 周, krp: 而執刼雖摧吕祿以安社稷義存君親可也或曰靳允違親守城可謂忠乎徐衆曰靳允於曹公未成君臣母至親也於義應去昔王陵母為項羽所拘母以髙祖必得天下因自殺以固陵志明心}
  - {type: variant, offset: 19578, length: 2, content: 牧野, WYG: 所係然後可得事人盡其死節衛公子開方仕齊十年不歸管仲以其不懷其親安能愛君不可以為相是以求忠臣必於孝子}
  - {type: variant, offset: 19578, length: 2, content: 牧野, krp: 所係然後可得事人盡其死節衛公子開方仕齊十年不歸管仲以其不懷其親安能愛君不可以為相是以求忠臣必於孝子}
  - {type: variant, offset: 19581, length: 1, content: 師, WYG: 門允宜先救至親徐庶母為曹公所得劉備乃遣庶歸欲天下者恕人子之情公又宜遣允也魏太祖征冀州使程昱留守甄城張邈叛太祖迎吕布布執范令靳允母太祖遣昱說靳允無以母故使固守范允流涕曰不敢有二也魏文帝問王朗等曰昔子産治鄭人不能欺子賤治單父人不忍欺西門豹治鄴人不敢欺三子之才與君徳孰優對曰君任徳}
