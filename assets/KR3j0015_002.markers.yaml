  - {type: variant, offset: 20742, length: 393, content: 故三軍大敗不可斬獄犴不治不可刑何也上教之不行罪不在人故也夫慢令謹誅賊也徵斂無時暴也不誡責成虐也政無此三者然後刑即可也陳道德以先服之猶不可則尚賢以勸之又不可則廢不能以憚之而猶有邪人不從化者然後待之以刑矣袁子曰夫仁義禮智者法之本也法令刑罰者治之未也無本者不立無末者不成何則夫禮教之法先之以仁義示之以禮讓使之遷善日用而不知儒者見其如此因謂治國不須刑法不知刑法承于下而後仁義興于土也法令者賞善禁淫居理之要商韓見其如此因曰治國不待仁義為體故法令行于下也故有刑法而無仁義則人怨怨則怒也有仁義而無刑法則人慢慢則姦起也本之以仁成之以法使兩道而無偏重則治之至也故仲長子曰昔秦用商君之法張爾天之網然陳涉大呼於沛澤之中天下響應人不為用者怨毒結於天下也桓範曰桀紂之用刑也或脯醯人肌肉或刳割人心腹至乃叛逆眾多卒用傾危者此不用仁義為本者也故曰仁者法之恕義者法之斷也是知仁義者乃刑之本故孫子曰令之以文齊之以武是謂必取, WYG: ''}
