  - {type: variant, offset: 3127, length: 948, content: 盛斛滿則棄矣非其人而使之安得不殆乎傅子曰凡品才有九一曰德行以立道本二曰理才以研事機三曰政才以經治體四曰學才以綜典文五曰武才以禦軍旅六曰農才以教耕稼七曰工才以作器用八曰商才以興國利九曰辯才以長諷議此量才者也故伊尹曰智通於大道應變而不窮辯於萬物之情其言足以調陰陽正四時節風雨如是者舉以為三公故三公之事常在於道漢文帝問陳平曰君所主何事對曰陛下不知臣駑下使臣待罪宰相宰相者上佐天子燮理陰陽下遂萬物之宜外鎮撫四夷內親附百姓使公卿大夫各得其職上曰善漢魏相書曰臣聞易曰天地以順動故日月不過四時不忒聖人以順動則刑罰清而人服天地變化必由陰陽陰陽之分以日月為紀各有常職不得相干明王謹於尊天慎於養人故立羲和之官以乘四時敬授人事君動靜以道奉順陰陽則日月光明風雨時節寒暑調和三者得敘則災害不生人不夭疾衣食有餘矣此燮理陰陽之大體也事具洪範篇不失四時通於地利能通不通能利不利如是者舉以為九卿故九卿之事常在於德通於人事行猶舉繩通於關梁實於府庫如是者舉以為大夫故大夫之事常在於仁蜀丞相諸葛亮主簿楊顒曰坐而論道謂之三公作而行之謂之卿大夫忠正強諫而無有姦詐去私立公而言有法度如是者舉以為列士故列士之事常在於義也故道德仁義定而天下正人物志曰清節之德師氏之任也法家之材司寇之任也術家之材三孤之任也臧否之材師氏之佐也伎倆之材司空之任也儒學之材保氏之任也文章之材國史之任也驍雄之材將帥之任也太公曰多言多語惡口惡舌終日言惡寢臥不絕為眾所憎為人所疾此可使要遮閭巷察姦伺禍權數好事夜臥早起雖劇不悔此妻子之將也先語察事勸而與食實長希言財物平均此十人之將也忉忉截截垂意肅肅不用諫言數行刑戮刑必見血不避親戚此百人之將也訟辯好勝嫉賊侵淩斥人以刑欲整一眾此千人之將也外皃怍怍言語時出知人饑飽習人劇易此萬人之將也戰戰慄慄日慎一日近賢進謀使人知節言語不慢忠心誠畢此十萬人之將也經曰夫將雖以詳重為貴而不可有不決之疑雖以博訪為能而不欲有多端之惑此論將之妙也溫良實長用心無兩見賢進之行法不枉此百萬人之將也勳勳紛紛鄰國皆聞出入豪居百姓所親誠信緩大明於領世能效成事又能救敗上知天文下知地理四海之內皆如妻子此英雄之率乃天下之主也人物志曰聰明秀出謂之英膽力過人謂之雄此其大體之別名也夫聰明者英之分也不得雄之膽則說不行膽力者雄之分也不得英之智則事不立若聰能謀始而明不見機可以坐論, WYG: 吞併}
