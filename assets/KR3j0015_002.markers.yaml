  - {type: variant, offset: 20339, length: 3, content: 本業荒, WYG: 不知改忠言壅塞直諫誅戮是謂亡主故王主能致興平治主能修其政存主能保其國衰主遭無難則庶幾能全有難則殆危主遭無難則幸而免有難則亡亡主必亡而已矣何謂九風君臣親而有禮百寮和而不同讓而不争勤而不怨唯職是司此理國之風}
