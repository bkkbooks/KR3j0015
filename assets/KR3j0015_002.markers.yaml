  - {type: variant, offset: 21722, length: 245, content: 可以成大也不處不可久不偷取一世宜也董仲舒論安邊之策欲令漢與匈奴和親又取匈奴愛子為質班固以匈奴桀驁每有人降漢輒亦拘留漢使以相報復安肯以愛子為質孝文時妻以漢女而匈奴屢背約束昧利不顧安在其不棄質而失重利也夫規事建議不圖萬世之固而媮恃一時之事者未可以經遠晁錯說漢文帝令人入粟塞上得以拜爵得以贖罪上從之荀悅曰聖人之政務其綱紀明其道義而已若夫一切之計必推其公議度其時宜不得已而用之非有大故弗由之也知時者可立以為長范蠡曰時不至不可強生事不究不可強成管子曰聖人能輔時不能違時語曰聖人修備以待時也審於時察於用, WYG: 惑見疑}
