  - {type: variant, offset: 17907, length: 4, content: 北面受學, WYG: 仁也夫王天下者大有濟者也非小不忍之謂由此言之班固以太宗為仁不在除肉刑矣景帝贊曰孔子稱斯人也三代之所以直道而行信哉周秦之弊網宻文峻而奸宄不勝漢興掃除煩苛與人休息至于孝文加之以恭儉孝景遵業五六十載之間至于移風易俗黎人醇厚周云成康漢言文景美矣哉此王道也或曰漢武帝雄才大略可方前代何主虞南曰漢武承六世之業海内殷富又有髙人之資故能總攬英雄駕御豪傑内興禮樂外開邊境制度憲章煥然可述方于始皇}
