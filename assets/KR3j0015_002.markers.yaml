  - {type: variant, offset: 19481, length: 2, content: 淮南, WYG: 有守正以逆衆意執法而違私欲可不恕之以公乎臣有不屈己以求合不禍世以取名可不恕之以直乎臣有從仄陋而進顯言由卑職而陳國事可不恕之以難乎臣有孤特而執節介立而見毁可不恕之以勁乎此七恕者皆所以進善也安官貪祿不務公事與世沉浮左右觀望如此者具臣也主所言皆曰善主所為皆曰可隱而求主之所好而進之以快主之耳目偷合茍容與主為樂不顧後害如此者䛕臣也中實險詖外貌小謹巧言令色又心疾賢所以欲進則明其美隱其惡所以欲退則彰其過匿其美使主賞罰不當號令不行如此者奸臣也智足以飾非辨足以行說内離骨肉之親外妬亂於朝廷如此者䜛臣也專權擅勢以輕為重私門成黨以富其家擅矯主命以自顯貴如此者賊臣也謟主以佞邪墜主于不義朋黨比周以蔽主明使白黑無别是非無聞使主惡布於境内聞于四隣如此者亡國之臣也是謂六邪桓範世要論曰臣有立小忠以售大不忠効小信以成大不信可不慮之以詐乎臣有貌厲而内荏色取仁而行違可不慮之以虚乎臣有害同儕以專朝塞下情以壅上可不慮之以嫉乎臣有進邪說以亂是因似然以傷賢可不慮之以䜛乎臣有因賞以償恩因罰以作威可不慮之以姦乎臣有外顯相薦内陰相除謀事託公而實挾私可不慮之以欺乎臣有事左右以求進託重臣以自結可不慮之以偽乎臣有和同以取說茍合以求進可不慮之以禍乎臣有悅主意以求親悅主言以取容可不慮之以佞乎此九慮者所以防惡也子貢曰陳靈公君臣宣淫于朝泄冶諫而殺之是與比干同也可謂仁乎}
  - {type: page-break, offset: 19481, content: '', id: KR3j0015_WYG_002-23b, image: WYG0849/WYG0849-0038d.png}
