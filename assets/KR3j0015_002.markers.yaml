  - {type: variant, offset: 20098, length: 1, content: 涸, WYG: 惜哉亮流涕曰孫武所以能制勝者用法明也是以楊干亂法魏絳戮}
  - {type: variant, offset: 20098, length: 1, content: 涸, krp: 惜哉亮流涕曰孫武所以能制勝者用法明也是以楊干亂法魏絳戮}
  - {type: variant, offset: 20100, length: 0, content: '', WYG: 四海分裂兵交方始若復廢法何用討賊耶習鑿齒曰諸葛亮之不能兼上國也豈不宜哉夫晉人視林父之後濟故廢法而收功楚成闇得臣之益已故殺之以重敗今蜀僻陋一方才少上國而殺其駿傑退收駑下之用明法勝才不師三敗之道將以成業不亦難乎晉侯使荀桓子與楚戰于邲桓子敗歸而請死晉侯欲許之士貞子曰不可城濮之役晉師三日館穀文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶鬭况國相乎及楚殺子玉公喜而後可知曰是晉再克而楚再敗也楚是以再世不競今天或者大警晉也而又殺林父以重楚勝其無乃不競乎林父之事君也進思盡忠退思補過社稷之衛也君若之何殺之夫其敗也如日月之蝕何損于明晉侯使之復其位也代以周勃功大霍光何如對曰勃本髙帝大臣衆所歸向居太尉位擁兵百萬既有陳平王陵之力又有朱虛諸王之援酈寄遊說以譎諸吕因衆之心易以濟事若霍光者以}
  - {type: page-break, offset: 20100, content: '', id: KR3j0015_WYG_002-33b, image: WYG0849/WYG0849-0043d.png}
