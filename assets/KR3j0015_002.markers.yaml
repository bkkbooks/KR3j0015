  - {type: variant, offset: 525, length: 448, content: 其用智甚簡其為事不勞而功名甚大此能用非其有如己有者也人主不通主道者則不然自為之則不能任賢不能任賢則賢者惡之此功名之所以傷國家之所以危議曰申子云君知其道也臣知其事也十言十當百言百當者人臣之事也非人君之道也尸子云人臣者以進賢為功也君者以用賢為功也賈誼云臣聞聖主言問其臣而不自造事故使人臣得必盡其愚忠惟陛下財幸由是言之夫君不能司契委任而妒賢惡能取敗之道也湯武一日而盡有夏商之財以其地封而天下莫敢不悅服以其財賞而天下皆競勸通乎用非其有也議曰孫卿云修禮者王為政者強取人者安聚斂者亡故王者富人霸者富士僅存之國富大夫在國富筐篋實府庫是謂上溢下漏又曰天子不言多少諸侯不言利害大夫不言得失昔者周厲王好利近榮公芮良夫諫曰王室其將卑乎榮公好專利而不知大難夫利百物之所生也天地之所載也而有專之其害多矣天地百物皆將取焉何可專也所利甚多而不備大難以是教王其能久乎後厲王果敗魏文侯御廩災素服避正殿群臣皆巳公子成父趨入賀曰臣聞天子藏于四海諸侯藏于境內非其所藏不有火災必有人患幸無人患不亦善乎孔子曰百姓足君孰不足周諺有言曰囊漏儲中, WYG: ''}
