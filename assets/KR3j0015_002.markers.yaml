  - {type: variant, offset: 20061, length: 2, content: 利一, WYG: 舉齊之事所以運其機而動四海也圍城而害不加於百姓此仁心著於遐邇矣邁令徳以率列國則幾於湯武之事矣樂生方恢大網以縱二城收}
  - {type: variant, offset: 20061, length: 2, content: 利一, krp: 舉齊之事所以運其機而動四海也圍城而害不加於百姓此仁心著於遐邇矣邁令徳以率列國則幾於湯武之事矣樂生方恢大網以縱二城收}
  - {type: variant, offset: 20064, length: 1, content: 而, WYG: 明信以待其弊將使即墨莒人顧仇其上開𢎞廣之路以待田單之徒長容善之風以申齊士之志昭之東海屬之華􅒨我澤如春人應如草思戴燕王仰風聲二城必從則王業隆矣雖淹留於兩邑乃致速於}
  - {type: page-break, offset: 20064, content: '', id: KR3j0015_WYG_002-30b, image: WYG0849/WYG0849-0042b.png}
  - {type: variant, offset: 20064, length: 1, content: 而, krp: 明信以待其弊將使即墨莒人顧仇其上開𢎞廣之路以待田單之徒長容善之風以申齊士之志昭之東海屬之華裔我澤如春人應如草思戴燕王仰風聲二城必從則王業隆矣雖淹留於兩邑乃致速於}
  - {type: variant, offset: 20067, length: 2, content: 從暴, WYG: 也不幸之變世所不圖敗於垂成時變所然若乃逼之以兵刼之以威奓殺傷之殘以示四海之人雖二城幾於可㧞則霸王之事逝其逺矣樂生豈不知㧞二城之速了哉顧城㧞而業􅆾也豈不慮不速之致變哉顧業速與變同也由是觀之樂生之不屠二城未可量也或曰樂毅相弱燕破强齊合五國之兵雪君王之恥圍城而不急攻將令道窮而義服則仁}
  - {type: page-break, offset: 20067, content: '', id: KR3j0015_WYG_002-31a, image: WYG0849/WYG0849-0042c.png}
  - {type: variant, offset: 20067, length: 2, content: 從暴, krp: 也不幸之變世所不圖敗於垂成時變所然若乃逼之以兵刼之以威奓殺傷之殘以示四海之人雖二城幾於可㧞則霸王之事逝其逺矣樂生豈不知㧞二城之速了哉顧城㧞而業乖也豈不慮不速之致變哉顧業速與變同也由是觀之樂生之不屠二城未可量也或曰樂毅相弱燕破强齊合五國之兵雪君王之恥圍城而不急攻將令道窮而義服則仁}
  - {type: punctuation, offset: 20068, content: ；, id: KR3j0015_CH7x2006_002-bkkpn4831}
