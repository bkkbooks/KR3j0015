  - {type: variant, offset: 20163, length: 1, content: 未, WYG: 佷剛不和不戒其强之搪突而以順為撓厲其亢是故可與立法難與入㣲也柔順安恕美在寛容失在少决柔順之人緩心寛斷不戒其事之不攝而以亢為劌安其舒是故可與循常難與權疑也雄捍桀健任在膽烈失在少忌雄捍之人氣奮英决不戒其勇之毁跌而以順為恇竭其勢是故可與涉難難與居屈也精良畏慎善在恭謹失在多疑精慎之人畏患多忌不戒其懦于為義而以勇為狎増其疑是故可與保全難與立節也强揩堅勁用在楨幹失在專固凌揩之人秉意勁持不戒其情之固䕶而以辨為虚强其專是故可與持正難與附衆也論辨理繹能在釋結失在流宕博辨之人論理贍給不戒其辭之浮濫而以揩為繫遂其流是故可與汎序難與立約也普博周洽崇在覆裕失在溷濁𢎞普之人意愛周洽不戒其交之溷雜而以介為狷廣其濁是故可與撫衆難與厲俗也清介㢘潔節在儉固失在拘局狷介之人眩清激濁不戒其道之隘狹而以普為穢益其拘是故可與守節難與變通也休動磊砢業在攀躋失在疏越休動之人志慕超越不戒其意之太猥而以静為滯果其銳是故可與進趨難與持後也沉静機宻精在𤣥㣲失在遲懦沉静之人道思迴復不戒其静之遲後而以動為疏美其懦是故可與深慮難與㨗速也樸露徑}
