  - {type: variant, offset: 19370, length: 1, content: 策, krp: 有勾踐}
  - {type: variant, offset: 19372, length: 0, content: '', WYG: 奇人之傑也故能自擅江表成鼎峙之業也晉宣帝雄謀妙算諸葛亮冠世奇才誰為優劣虞南曰宣帝起自書生參佐帝業濟世危難克清王道文武之畧實有可稱而多仗陰謀弗由仁義猜忌詭伏盈諸襟抱至如示謬言於李勝委鞫獄於何晏愧心負理君子不為以此偽情行之萬物若使力均勢敵俱㑹中原以仲達之姦謀當孔明之節制恐非儔也呉張微黙記論諸葛亮司馬宣王二相優劣曰漢朝傾覆天下分崩二公並遭值際㑹託身明主孔明起蜀漢之地蹈一州之土方之大國蓋有九分之一也提步卒數萬長駈祁山慨然有飲馬河雒之志仲達據天下十倍之地仗兼并之衆據牢城擁精銳無擒敵之意務自保而已使彼孔明若此而不亡則凉雍不解甲中國不釋鞍勝負之勢亦已决矣方之司馬不亦優乎或曰晉景文兄弟孰賢魏明帝崩立養子齊王芳遺詔使曹爽與司馬宣王輔政宣王誅爽自專政宣王薨子景王名師字子元代立輔政廢齊王芳立髙貴鄉公景王薨弟文王名昭字子上又代立輔政殺髙貴鄉公立陳留王後陳留王以魏禪晉武帝名炎字安世即位平呉天下一統及子惠帝立天下大亂五胡入中原矣虞南曰何晏稱唯深也故能通天下之志夏侯太初是也惟機也故能成天下之務司馬子元是也故知王佐之才著於早日及誅爽之際智略已宣欽儉稱兵全軍獨克此足見其英圖也雖道盛三分而終身北面威名振主而臣節不虧侯服歸全於斯為美太祖嗣興克寧禍亂南定淮海西平庸蜀役不踰時厥功為重及髙貴纂歴聰明夙智不能竭忠協贊擬迹伊周遂乃偽謗}
