  - {type: variant, offset: 12859, length: 0, content: '', WYG: 也禮者履也進退有度尊卑有分謂之禮又曰禮者人之所履夙興夜寐以成人君之序也又曰立善防惡謂之禮也智者人之所知也以定乎得失是非之情謂之智信者人之所承也發號施令以一人心謂之信見本}
  - {type: variant, offset: 12859, length: 0, content: '', krp: 也禮者履也進退有度尊卑有分謂之禮又曰禮者人之所履夙興夜寐以成人君之序也又曰立善防惡謂之禮也智者人之所知也以定乎得失是非之情謂之智信者人之所承也發號施令以一人心謂之信見本}
  - {type: variant, offset: 12860, length: 2, content: 歸諸, WYG: 知末執一而應萬謂之術又曰擅殺生之柄通壅塞之塗權輕重之數論得失之道使逺近情偽必見乎上謂之術說苑曰從命利}
  - {type: variant, offset: 12860, length: 2, content: 歸諸, krp: 知末執一而應萬謂之術又曰擅殺生之柄通壅塞之塗權輕重之數論得失之道使逺近情偽必見乎上謂之術說苑曰從命利}
  - {type: variant, offset: 12863, length: 0, content: '', WYG: 謂之順又曰君正臣從謂之順也從命病君謂之諛又曰應言而不言謂之隱應諌而不諌謂之諛又曰君僻臣從謂之逆也逆命利君謂之忠又曰分人以財謂之惠教人以善謂之忠孫卿曰以徳覆君而化之大忠也以徳調君而補之次忠也以是諫非而怒之下忠也逆命病君謂之亂又曰賞無功謂之亂君有過失将危國家有能盡言于君用則留不用則去謂之諌用則可不用則死謂之諍能率羣下以諌于君解國之大患除國之大害謂之輔抗君之命反君之事安國之危除主之辱謂之弼故諌諍輔弼者可謂社稷之臣明君之所貴也莊}
