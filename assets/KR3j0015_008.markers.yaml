  - {type: variant, offset: 10230, length: 1, content: 方, WYG: 此因過以為恭者也魏将王昶陳㤗兵敗大将軍以為己過魏人感将軍引過皆悅思報之習鑿齒論曰司馬大将軍引二敗以為己過過銷而業昌可謂智矣夫忘其敗而下思其報雖欲勿康其可得乎若乃諱敗推過歸咎萬物上下離心賢愚釋體是楚再敗而晉再克謬之甚矣夫人君茍統斯理行雖失而名揚兵雖挫而戰勝百敗猶可况再敗乎此因敗以成功也故知智者之舉事也因禍為福轉敗為功自古然矣議曰白起為秦坑趙降卒四十餘萬使諸侯曲秦而合縱夫坑趙降卒非勝也乃敗秦之機商君詐魏虜公子卬使秦信不行于天下乃自敗之兆非伯業也樂􅐧仗義以下齊城敗于即墨非敗也乃是吞天下之勢劉備憐歸義之人日行十數里敗於長坂雖奔亡不暇乃覇王之始故知非伯者不能用敗齊人以紫敗素而其價十倍此言雖小可以喻大也昏智第三十二夫神者智之淵也神清則智明智者心之符也智公則心平此出文子今士有神清智明而闇於成敗者非愚也以聲色貨利怒愛昏其智矣何以言之昔孔子攝魯相齊景公聞而懼曰孔子為政魯必霸霸則吾地近焉我之為先并矣犁且曰去仲尼猶吹毛耳君何不延之以重禄遺哀公以女樂哀公親樂之必怠於政仲尼必諌諌不聽必輕絶魯於是選齊國中女子好者八十人皆衣文繡之衣而舞康樂遺魯君魯君受齊女樂怠於事三日不聽政孔子曰彼婦之口可以出走遂適衞此昏於聲色者也戎王使由余觀秦秦穆公以由余賢聖問内史廖曰孤聞鄰國有聖人敵國之憂也今由余寡人之害将奈何内史廖曰戎王處僻匿未嘗聞中國之聲君試遺其女樂以奪其志為由余請以踈其間留而英遣以失其期戎王怪之必疑由余且戎王好樂必怠于政繆公曰善以女樂二八遺戎王戎王受而悅之終年不遷由余諫不聼繆公使人間要由余由余遂降秦梁王觴諸侯于范臺魯君曰昔帝女令儀狄作酒而美進之禹禹飲而甘遂踈儀狄絶㫖酒曰後世必有以酒亡其國者也齊桓公夜半不嗛易牙乃煎熬燔炙和調五味而進之桓公食而飽曰後世必有以味亡其國者也晉文公得南之威三日不聼朝遂推南之威而逺之曰後世必有以色亡其國者也楚王登强臺而望崩山左江而右湖其樂忘死遂弗登曰後世必有以髙臺陂池亡其國者也今主君之樽儀狄之酒也主君之味易牙之調也左白台而右閭須南威之美也前夹林而後蘭臺强臺之樂也人有一于此足以亡國今主君兼此四者可無誡歟梁王稱善相屬由此言之昏智者非一塗矣太史公曰平原君翩翩濁代之佳公子也然不覩大體語曰利令智昏平原君貪馮亭邪說使趙䧟長平四十餘萬邯鄲幾亡此昏于利者也人物志曰夫仁出于慈有慈而不仁者仁者有恤有仁而不恤者厲者有剛有厲而不剛者若夫見可憐則流涕将分與則恡嗇是有慈而不仁者覩危急則惻隠將赴救則畏患是有仁而不恤者處虚義則色厲顧利欲則内荏是有厲而不剛者然則慈而不仁則恡奪之也仁而不恤則懼奪之也厲而不剛則欲奪之也後漢班固傳評曰昔班固傷司馬遷云遷博物洽聞不能以智免極刑然固身亦自䧟大戮班固附竇氏勢竇氏敗固坐之死洛陽獄中也可謂智及之而不能守古人所以致論於目睫耶此皆昏於勢者也議曰夫班固傷遷公論也自䧟大戮挾私也夫心有私而智不能守矣尸子曰夫呉越之國以臣妾為殉中國聞而非之及怒則以親戚殉一言夫智在公則愛呉越之臣妾在私則忘其親戚非智損也怒奪之也此昏于怒者也好亦然矣語曰莫知其子之惡非智損也愛奪之也此昏于愛者也是故論貴賤辨是非者必且自公心言之自公心聽之而後可知也故范曄曰夫利不在身以之謀事則智慮不私己以之斷義則厲誠能迴觀物之智而為反身之察則能恕而自鑒議曰孔子曰吾未見剛者或對曰申棖子曰棖也慾焉得剛由此言之心茍有私則失其本性矣尸子曰鴻鵠在上彀弩以待之若發若否問二五曰不知也非二五難計欲鴻之心亂也是知情注于利則本性亂矣卑政第三十三劉安曰日月至光至大而有所不徧者以其髙于萬物之上也燈燭至微至小而世不可之者以其明之下能炤日月之四蔽由是觀之政之貴卑也久矣是以先王設官分職而共治也淮南子曰濟溺人以金玉不如尋常之纆韓子曰百日不食以待梁肉餓者不肯故曰療飢不期于鼎食拯溺無待于規行也此言政貴卑以濟事者也何以言之韓非曰所謂知者微妙之言上知之所難也}
