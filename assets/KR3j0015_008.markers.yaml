  - {type: variant, offset: 2213, length: 400, content: 甯殖出其君衍弒其君剽季氏八佾舞於庭三家者以雍徹竝專國政卒逐昭公皆陰勝而陽行下失臣道之所致也范睢說秦昭王曰夫三代所以亡國者常縱溢馳騁弋獵不聽政事其所授者妬賢嫉能取下蔽上以成其私不為主計而主不覺悟故失其國今右秩已上至諸史及王左右無非相國之人者見王獨立於朝臣竊為王恐恐萬世之後有秦國者非王子孫也由是觀之書稱臣之有作威作福害于而家凶于而國孔子曰祿之去公室政逮於大夫亡之兆也信哉是言也孔子在衛聞齊田常將欲為亂專齊國有無君之心而憚鮑晏鮑氏晏氏齊之世卿大夫因移其兵以伐魯初田常相齊選國中女長七尺者三百人以為後宮賓客舍人出入不禁田常後有七十餘男因此以盜齊國也孔子會諸弟子曰魯父母之國不忍觀其受敵將欲屈節於田常以救魯二三子誰使子貢請使夫子許之遂如齊說田常曰今子欲取功於魯實難若移兵於吳則可也夫魯難伐之國其城薄以卑地狹以泄其君愚而不仁大臣偽而無用其士民又惡甲兵之事此不可與戰夫吳城高以厚地廣以深甲堅以新士選以飽重器精兵盡, WYG: 隱直}
