  - {type: variant, offset: 5, length: 0, content: '', krp: 二孔子曰未見顔色而言謂之瞽又曰未信則以為謗已孫卿曰語而當智也黙而當知也尸子曰聽言耳目不}
  - {type: variant, offset: 6, length: 1, content: 誡, WYG: 視聽不深則善言不徃焉是知将語者必先釣於人情自古然矣故韓子曰夫說之難也在知所說之心可以吾說當之說之以厚利則見下節而遇卑賤必棄逺矣所說實為厚利則隂用其言而顯棄其身此不可不知也說之以名髙則見無心而逺事情必不収矣所說實為名髙則陽収其身而實䟽之此不可不知也事以宻成語以泄敗未必其身泄之也而說及其所匿之事如是者身危周澤未渥也而語極知說行而有功則徳亡說不行而有敗則見疑如是者身危貴人有過端而說者明言善議以推其惡者身危貴人得計而欲自以為功說者與知焉則身危强之以其所不為止之以其所不能已者身危又曰與之論大人則以為間已與之論細人則以為粥權論其所愛則以為借資論其所憎則以為甞已順事陳意則曰怯懦而不盡慮事廣肆則曰草野而倨侮此不可不知也彼自知其計則無以其失窮之自勇其斷則無以其敵怒之凡說須曠日彌久而周澤既渥深計而不疑交争而不罪乃明計利害以致其功直指是非以飾其身以此相持此說之成也荀悅曰夫臣下之所以難言者何也言出乎身則咎悔及之矣故曰舉過掲非則有干忤之咎勸勵教誨則有俠上之議言而當則耻其勝已也言而不當則賤其愚也先已而同則惡其奪已明也後已而同則以為從順也違下從上則以為謟諛也違上從下則以為雷同也與衆共言則以為順負也違衆獨言則以為專美也言而淺露則簡而薄之深妙𢎞逺則不知而非之特見獨智則衆惡其蓋之也雖是而不見稱與衆同智則以為附隨也雖得之不以為功謙讓不争則以為易窮言而不盡則以為懷隱進說竭情則以為不知量言而不效則受其怨責言而事效則以為固當利於上不利於下或便於左則不便於右或合於前而忤於後此下情所以常不通仲尼發憤稱予欲無言者蓋為語之難也何以明其難也昔宋有富人天雨墻壞其子曰不築且有盗其鄰人亦云暮而果大亡其家智其子而疑鄰人之父鄭武公欲伐胡乃以其子妻之因問羣臣吾欲用兵誰可伐者關其思曰胡可伐乃戮關其思曰胡兄弟之國也子言伐之何也胡君聞之以鄭為親已而不備鄭鄭人襲胡取之此二說者其智皆當矣然而甚者為戮薄者見疑非智之難也處智則難衞人迎新婦婦上車問驂馬誰馬也御曰藉之新婦謂僕曰拊驂無苦服車至門㧞教逆母滅櫓将失火入室見臼曰徙牖下妨徃來者主人大笑之此三言皆要言也然而不免為笑者早晩之時失矣此說之難也說者知其難也故語必有釣以取人情何以明之昔齊王后死欲置后而未定使羣臣議薛公田嬰欲中王之意因獻十珥而美其一旦日因問美珥所在因勸立以為后齊王大悦遂重薛公此情可以物釣也申不害始合於韓王然未知王之所欲也恐言而未必中於王也王問申子曰吾誰與而可對曰此安危之要國家之大事也臣請深維而苦思之乃微謂趙卓韓晁曰子皆國之辯士也夫為人臣者言何必同盡忠而已矣二人各進議於王以事申子微視王之所說以言於王王大悅之此情可以言釣也呉伐越越棲於㑹稽勾踐喟然嘆曰吾終此乎大夫種曰湯繫夏臺文王囚羑里重耳奔翟齊小白奔莒其卒霸王由是觀之何遽不為福乎勾踐既得免務報呉大夫種曰臣觀呉王政驕矣請嘗之乃貸粟以卜其事子胥諌勿與王遂與之子胥曰王不聽諌後三年呉其墟矣太宰嚭聞之讒曰伍員貌忠而實忍人呉遂殺子胥此情可以事釣也客以淳于髠見梁惠王惠王屏左右再見之終無言惠王怪之讓客客謂淳于髠髠曰吾前見王王志在馳逐後復見王王志在音聲是以黙然客具以報王王大駭曰淳于先生誠聖人也前有獻善馬者寡人未及試㑹生來後有獻謳者未及試又㑹生至寡人雖屏人然私心在彼此情可以志釣也智伯從韓魏之君伐趙韓魏用趙臣張孟談之計隂謀叛智伯張孟談因朝智伯遇智果于轅門之外智果入見智伯曰二主殆将有變臣遇張孟談察其志矜而行髙見二君色動而變必背君矣智伯不從智果出遂更其姓為輔氏張孟談入見趙襄子曰臣遇智果於轅門之外其視有疑臣之心入見智伯而更其族今暮不擊必後之矣襄子曰諾因與韓魏殺守隄之吏决水灌智伯軍此情可以視釣也殷浩仕晉有盛名時人觀其出處以卜江左興亡此情可以賢釣也呂氏春秋曰夫國之将亡有道者先去鈐經曰喜色洒然以出怒色麃然以侮欲色熰然以愉懼色憚然以下憂色瞿然以静此情可以色釣也易曰将叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭逰失其守者其辭屈周禮五聽一曰辭聽辭不直則煩二曰色聽色不直則赧三曰氣聽氣不直則喘四曰耳聽耳不直則惑五曰目聽目不直則眊然由是觀之夫人情必見於物昔者晉公好色驪姬乗色以壅之呉王好廣地太宰陳伐以壅之桓公好味易牙蒸子以壅之沉冥無端甚可畏也故知人主之好惡不可見於外所好惡見於外則臣妾乗其所好惡以行壅制焉故曰人君無意見将為下餌此之謂也能知此者可以納說於人主矣詭信}
