  - {type: variant, offset: 13697, length: 3, content: 雖大亡, WYG: 也行者人所履也天地之經民實則之則天之明日月星辰天之明也因地之性髙下剛柔地之性也生其六氣謂隂陽風雨晦明也用其五行金木水火土也氣為五味酸醎辛甘苦也發為五色青黄赤白黒發見于是非分别也章為五聲宮商角徴羽也淫則昏亂民失其性滋味聲色過則傷性是故為禮以奉之制禮以奉其性也人有好惡喜怒哀樂生于六氣此六者皆禀隂陽風雨晦明之氣也是故審則宜類以制六志為禮以制好惡喜怒哀樂六志使不過節也哀有哭泣樂有歌舞喜有施舎怒有戰鬬哀樂不失乃能協于天地之性是以長久協和}
  - {type: page-break, offset: 13697, content: '', id: KR3j0015_WYG_008-46a, image: WYG0849/WYG0849-0188a.png}
