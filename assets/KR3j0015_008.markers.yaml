  - {type: variant, offset: 10572, length: 2, content: 范曄, WYG: 今謂馬多力則有之矣若曰勝千鈞則不然者何也夫千鈞非馬之任也今謂楚强大則有矣若夫越趙魏而開兵于燕則豈楚之任哉由是觀之夫管仲九合諸侯一匡天下而孔子小之楚人不能伐燕虞卿反以為强大天下無敵非詭議也各從其黨言之耳不可不察勢運第三十八百六之運推遷改移不為堯存不為桀亡君子小人無賢不肖至人無可奈何知其不由智力也夫天下有君子焉有小人焉有禮讓焉此數事者未必其性也未必其行也皆勢運之耳何以言之文子}
