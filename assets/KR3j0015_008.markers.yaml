  - {type: variant, offset: 10349, length: 0, content: '', WYG: 富國强兵調和隂陽安萬乗之主簡練羣臣定其名實明其令罰非吾宰相此行本者也何為事迹昔齊威王召即墨大夫而語之曰自子之居即墨也毁日至然吾使人視即墨田野闢人民給官無留事東方以寧是子不事我左右以求譽也封之萬家召阿大夫而語之曰自夫子之守阿也譽日聞然吾使人視阿田野不闢人貧苦趙攻甄子不能救衛取薛陵子不能知是子常以幣事吾左右以求譽也是日烹阿大夫及左右常譽之者齊國大理漢元帝時石顯專權京房晏見問上曰幽厲之君何以危所任者何人也上曰君不明而所任巧佞房曰知其巧佞而用之也将以為賢上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰齊桓公秦二世亦嘗聞此君而非笑之然則任豎刁趙髙政治日亂盗賊滿山何不以幽厲卜之而覺悟乎上曰惟有道者能以徃知來耳房曰陛下視今為治也亂也上曰亦極亂耳房曰今所任用者誰歟上曰然幸其愈于彼又以為不在此人也房曰夫前世二君亦皆然耳臣恐後之視今如今之視前也此事迹者也由此言之夫立身}
