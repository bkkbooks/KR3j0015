  - {type: variant, offset: 11530, length: 171, content: 每覽古今所由改趨因緣侵辱或起瑕釁若韓信傷心於失楚彭寵積望於無異盧綰嫌畏於巳郄英布憂迫於情漏此事之緣也由此觀之夫叛臣逆子未必皆不忠也或心忿意危或威名振主因成大業自古然之矣鍾會鄧艾既破蜀蜀主降會構艾艾檻車徵會陰懷異圖厚待蜀將姜維等維見而知其心謂可構成擾亂徐圖克復也乃詭說之曰聞君自淮南以來算無遺策晉道克昌皆君為之今復定蜀威德震世民高其功而主畏其謀, WYG: 聊廷使跪結襪}
