  - {type: variant, offset: 9744, length: 2, content: 義且, WYG: 名古語曰土性勝水掬壤不可以塞河金性勝木寸刄不可以殘林傳曰小惠未孚神弗福也此言善少不足以感物也今雩祭是同而感應異者或}
