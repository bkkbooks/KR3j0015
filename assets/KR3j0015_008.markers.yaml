  - {type: variant, offset: 7471, length: 583, content: 百姓願之若旱之望雨故起於行陣之中而立為天子功高三王德傳無窮今大王見高皇得天下之易也獨不觀近世之吳楚乎夫吳王賜為劉氏祭酒授几杖而不朝王四郡之眾地方數千里內鑄銅以為錢東煮海以為鹽上取江陵木為船國富人眾舉兵而西破於大梁敗於狐父奔走而東至於丹徒越人擒之身死絕祀為天下笑夫以吳越之眾不能成功者何也誠逆天道而不知時也方今大王之兵眾不能十分吳楚之一天下安寧又萬倍於秦時願大王從臣之計大王不從臣之計今見大王事必不成而語先泄也臣聞微子過故國而悲於是作麥秀之歌是痛紂之不用王子比干也故孟子曰紂貴為天子死曾不若匹夫是紂先自絕於天下久矣非死之日而天下去之也今臣亦竊悲大王棄千乘之君必且賜絕命之書為群臣先死於東宮也王時所居於是王氣怨結而不揚涕滿眶而橫流即起歷階而去後復問伍被曰漢庭治亂被曰竊覩朝廷之政君臣之義父子之親夫婦之別長幼之序皆得其理上之舉措遵古之道風俗綱紀未有所缺南越賓服羌僰入獻東甌入降廣長楊塞名開朔方匈奴拆翅傷翼失援不振雖不及古太平之時然猶為治也王欲舉事臣見其將有禍而無福也王怒被謝死罪王曰陳勝吳廣無立錐之地千人之眾起於大澤奮臂大呼而天下響應西至於戲許直反而兵百萬今吾國雖小然而勝兵者可得十餘萬非直適戍之眾鐖鑿棘矜也大鐮謂之剴五哀反或是鐖矜音其巾反公何以言有禍無福被曰秦無道殘賊天下與萬乘之駕作阿房音旁之宮收太半之賦發閭左之戍父不寧子兄不便弟政苛刑峻天下敖然若焦民皆引領而望傾耳而, WYG: 凡}
