  - {type: variant, offset: 6895, length: 196, content: 之而諸侯以弱卒以安安危之機豈不以謀哉淮南王安怨望厲王死厲王長淮南王安父也長謀反檻車遷蜀至雍死上憐之封其三子以安為淮南王也欲謀叛逆未有因也及削地之後其為謀益甚與左吳等日夜按輿地圖部署兵所從入召伍被與謀被曰上寬赦大王王復安得亡國之言乎臣聞子胥諫吳王吳王不用子胥曰臣今見麋鹿遊於姑蘇之臺臣今亦見宮中生荊棘霧露沾衣也臣聞聰者聽於無聲明者見於未形故聖人萬舉萬全昔文王一動而功顯於世列為三代此所謂因天心以, WYG: 語}
