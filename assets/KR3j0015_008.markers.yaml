  - {type: variant, offset: 11711, length: 602, content: 背漢於擾攘而見疑於既平大夫種不從范蠡於五湖卒伏劍而妄死豈闇主愚臣哉利害使之然也今君大功既立大德已著何不法陶朱汎舟絕跡全功保身登峨眉之嶺而從赤松遊乎會曰君言遠我不能行且為今之道或未盡於此也維曰其他則君智力之所能無煩於老夫矣由是情好歡甚會自稱益州牧以叛欲授維兵五萬人使為前驅魏將士憤發殺會及姜維張華外鎮當徵為尚書馮紞疾之侍帝從容論魏晉故事因曰臣嘗謂鍾會之反頗由太祖帝勃然曰何言耶紞曰臣以為夫善御者必識六轡盈縮之勢善治者必審官方控帶之宜是故漢高八王以寵過夷滅光武諸將以抑損克終非上有仁暴之異下有愚智之殊蓋抑揚與奪使之然與鍾會才見有限而太祖獎誘太過嘉其謀猷盛其名位授以重勢故會自謂算無遺策功在不賞輈張利害遂構凶逆耳向太祖錄其小能節以大禮抑之以權勢納之以軌度則逆心無由而生亂事無階而成也世祖曰然紞稽首曰陛下既然愚臣之言思堅冰之道無令如會之徒復致覆敗世祖曰當今豈有如會者乎紞曰陛下謀謨之臣總戎馬之任者皆在陛下聖思耳世祖默然俄而徵華免官也晉懷帝時遼東太守龐本私憾東夷校尉李臻鮮卑索連木津等為臻興義實因而為亂遂攻陷諸將大單于慕容瘣之長子翰言於廆曰臣聞求諸侯莫如勤王自古有為之君靡不杖此以成事業者也今連津跋扈王師覆敗蒼生屠鱠豈甚此乎豎子外以龐本為名內實幸而為寇遼東傾沒乘已二周中原兵亂州師屢敗勤王杖義今其時也單于宜明九伐之威救倒懸之命數連津之罪合義兵以誅之上則興復遼邦下則并吞二部忠義彰於本朝私利歸於我國此則吾鴻漸之始也終, WYG: ''}
