  - {type: variant, offset: 9736, length: 0, content: '', WYG: 自守勁不足以捍寇又非有竒佐之士以待難也雖墜墜失也言於呉非其正計也昔鄭祭仲許宋人立公子突以活其君非義也春秋記之為其以生易死以存易亡也嚮使濟北見情實示不從之端則呉必先厯齊軍濟北招燕趙而縂之如此則山東之從結而無隟矣今吴楚之王練諸侯之兵驅白徒之衆西與天子争衡濟北獨底節堅守不下使呉失與而無助跬歩獨進瓦解土崩破敗而不}
