  - {type: variant, offset: 10251, length: 0, content: '', WYG: 姓使皆行此道用為規俗今但任其風土化以農稼軍陣曲成于物而俯同于俗耳非貴于獨能獨勇者也故聖人任道以通其險淮南子曰體道者逸而不窮任數者勞而無功離朱之明察鍼於百歩之外而不能見泉中之魚師曠之聰合八風之調而不能聼十}
  - {type: variant, offset: 10251, length: 0, content: '', krp: 姓使皆行此道用為規俗今但任其風土化以農稼軍陣曲成于物而俯同于俗耳非貴于獨能獨勇者也故聖人任道以通其險淮南子曰體道者逸而不窮任數者勞而無功離朱之明察鍼於百歩之外而不能見泉中之魚師曠之聰合八風之調而不能聼十}
  - {type: variant, offset: 10253, length: 2, content: 內牛, WYG: 外故任一人之能不足以理三畆之宅循道理之數因天地之自然則六合不足均也此任道以通其險也立法以理其差文子曰農士工商鄉别州異農與農言藏士與士言行工與工言巧商與商言數是以士無遺行工無苦事農無廢功商無折貨各安其性此立法以理其差也使賢愚不相異能鄙不相遺此至理之術故叔孫通欲起禮漢髙帝曰得無難乎對曰夫禮者因時世人情而為之節文者也張釋之言便宜事文帝曰卑之無甚髙論令今可施行由是言之夫理者不因時俗之務而貴竒異是餓者百日以待梁肉假人金玉以救溺子之說矣議曰昔楚之公輸宋之墨翟能使木䳒自飛無益于用漢之張衡能使參輪自轉魏之馬鈞能能使木人吹簫茍無益于用而為之則費功損力其害多矣荘子曰朱汗漫學屠龍于支離益殫千金伎成無所用其巧文子曰夫治國在仁義禮樂名法刑賞過此而徃雖彌綸天地纒絡萬品治道之外非羣生所挹聖人措而不言也由是觀之事在于適時無貴于逺功有自來矣善亡第三十四議曰世有好善而反亡者易曰積善之家必有餘慶又曰善不積不足以成名何以徵其然耶孟子曰仁之勝不仁也猶水之勝火也今之為仁者猶以一杯水救一車薪之火也火不息則謂水不勝火此又與於不仁之甚者也又五穀種之美者茍為不熟不如稊稗夫仁亦在熟之而已矣熟成也尸子曰食所以為肥也一飯而問人曰奚若則皆笑之夫治天下大事也譬今人皆以一飯而問人奚若者也議曰此善少不足以成名也惡亦如之何以明其然耶書曰商罪貫盈天命誅之余弗順天厥罪惟鈞由是觀之夫罪未盈假令中有罪惡未滅也今人見惡即未滅以為惡不足懼是以亡㓕者繼踵于世故曰惡不積不足以滅身此聖人之誡由是觀之故知善也者在積而已今人見徐偃亡國謂仁義不足仗也見承桑失統謂文德不足恃也承桑氏之君循德廢武以滅其國也是猶杯水救火一飯問肥之說惑亦甚矣詭俗第三十五夫事有順之而為失義有愛之而為害有惡于已而為美有利于身而損于國者何以言之劉梁曰昔楚靈王驕􅁋暴虐無度芈尹申亥從王之欲以殯于乾溪殉之以二女此順之而失義者也議曰夫君正臣從謂之順今君失義而臣下從之非所謂順也鄢陵之役晉楚對戰穀陽獻}
