  - {type: variant, offset: 13871, length: 2451, content: 甲宵行直指長安不盈十日不逞之徒擢授高位付以心膂共守京城則山東府縣非彼之有然後大王鼓行而西聲勢一接天下可指麾而定也諒不從乃親率大軍屯於并介之閒上聞之大懼召賀若弼議之弼曰漢王先帝之子陛下之弟居連率之重總方岳之任聲名震響為天下所服其舉事畢矣然而進取之策有三長驅入關直據京師西拒六軍東收山東上策也如是則天下未可量頓大軍於蒲州使五千騎閉潼關復齊舊境據而都之中策也如是以力爭議曰齊舊境謂北齊時境土也非今青州之齊也若親居太原徒遣其將來下策也如是成擒耳上曰公試為朕籌之計將何出弼曰蕭摩訶亡國之將不可與圖大事裴文安少年雖賢不被任用餘皆群小顧戀妻孥苟求自安不能遠涉必遣軍來攻蒲州親居太原為之窟穴臣以為必出下策果如弼所籌乃以楊素為將破之議曰初漢王陰謀為亂聲言討素司馬皇甫誕諫曰大隨據有天下二十餘載兆庶乂安難以搖動一矣萬姓厭亂人思安樂雖舜禹更生其望未從二矣太子聰明神武名應圖讖素曾不得捧轂庸敢生心三矣方今諸侯王列守州郡表裏相制勢不可舉四矣以茲四固鎮臨天下得興禍亂未之前聞也漢王不從故敗由此觀之天下無思亂之心土崩之釁雖有吳楚之眾猶不能成而况於么麼乎故先王貊其德音勤恤民隱者蓋為是也隋煬帝親御六軍伐高麗禮部尚書楚國公楊玄感據黎陽反李密說玄感曰天子遠征遼左地去幽州懸隔千里南有巨海之限北有胡戎之患中間一道理極艱危今公權兵出其不意長驅入蒯直扼其喉前有高麗退無歸路不過旬日齎糧必盡舉麾一召其眾自降不戰而剋計之上也一本云令車駕在遼未聞斯舉分萬餘人電發捍臨渝關絕其歸路不經一月倉廩必竭東拒大敵西迫我師進無所依退無所據百萬之眾可使為魚此不戰而屈人者上策也關中四塞天府之國有衛文昇不足為意今若率眾而入長安天子雖還失其襟帶據險臨之故當必剋萬全之策計之中也一本云自上君臨天下胥怨明公上將之子恩被黎元長驅入關中策也若隨近逐便先向東都頓兵堅城之下勝負都未可知此計之下也一本云樊子蓋不達大體姦謀雄斷據全周之地恃甲兵之強召之則不來攻之則不陷頓兵牢城之下外無同力之師攻洛陽下策也玄感利洛陽寶貨曰公之下策我之上策也遂圍之玄感失利宵潰王師追斬之議曰玄感之反也太白入南斗諺曰太白入南斗天子下殿走由是天下持兩端故三略曰放言過之裴子野曰夫左道怪民幻挾罔誕足以動眾而未足以濟功今以諺觀之左道可以動眾者信矣故王者禁焉李密乃亡歸翟讓議曰太公稱利天下者取天下安天下者有天下愛天下者久天下仁天下者化天下呂氏春秋曰庖人調和而不敢食故可以為庖人矣若使庖人調和而食之則不可為庖矣霸王之君亦然誅暴而不私以封天下之賢者故可以為霸王若使霸王之君誅暴而私之則亦不可為霸王矣由是觀之夫與之為取政之寶也今玄感利洛陽寶貨安得霸王之事哉隋煬帝初猜忌唐高祖知之常懷危懼唐公為太原留守煬帝自遼東還都唐公詣行在所遇患不瘳未得時謁唐公外甥王氏充選後宮煬帝問曰汝舅來何遲甥以實對帝曰可得死否高祖知之每懷危懼也為太原留守以討擊不利恐為煬帝所譴甚憂之時太宗從在軍中知隋將亡潛圖義舉以安天下乃進曰大人何憂之甚也當今主人無道百姓愁怨城門之外皆已為賊獨守小節必旦暮死亡若起義兵實當人欲且晉陽用武之地足食足兵大人居之此乃天授正可因機轉禍以就功業既天與不取憂之何益高祖大驚深拒之太宗趨而出明日復進說曰此為萬全之策以救滅族之事今王綱弛紊盜賊遍天下大人受命討捕其可盡乎賊既不盡自當獲罪且又世傳李氏姓膺圖籙李金才位望隆貴一朝族滅大人既能平賊即又功當不賞以此求活其可得乎高祖意少解曰我一夜思量汝言大有道理今日破家滅身亦由汝化家為國亦由汝於是定計乃命太宗與晉陽令劉文靜及門下客長孫順德劉弘基等募兵旬日之閒眾且一萬斬留守副王威高君雅以其詭請高祖祈雨於晉祠將為不利故也用裴寂計準伊尹放太甲霍光廢昌邑故事尊煬帝為太上皇立代王侑以安隋室傳檄諸郡以彰義舉秋七月以精甲三萬西圖關中高祖杖白旗誓眾於太原之野引師即路遂亡隋族造我區夏晉陽令劉文靜嘗竊觀太宗謂裴寂曰非常人也大度類於漢高神武同於魏帝年雖少乃天縱也後文靜為李密親戚被禁太宗陰有异志入禁所看之文靜大喜亦覺太宗有非常之意因歎曰天下大亂非有湯武高光之才不能定也太宗知其意報曰卿安知無但恐常人不能別耳文靜起抃曰久知郎君乃潛龍也今時事如此正是騰躍之秋素稟膺籙之資仍懷撥亂之道此乃生人有息肩之望文靜知攀附之所太宗喜曰計將安出文靜對曰今李密長圍洛邑主上流播淮南大賊連州郡小盜阻山澤者以千萬數但須真主驅駕取之誠能應天順人舉旗大呼則四海不足定也今并州百姓避盜賊者皆入此城文靜為令數年知其豪傑一朝嘯集立地可數萬人尊公所領之兵復且數萬一言出口誰敢不從乘虛入關號令天下不盈半歲帝業可成太宗笑曰卿言善合人意於是部署賓客陰圖起義高祖乃命文靜詐為煬帝敕發太原鴈門馬邑數郡人二十已上三十已下悉為兵以歲暮集涿郡由是人情大擾思亂者益眾又令文靜與裴寂詐作符敕出宮監庫物以供留守資用因募兵集眾而起改旗幟以彰義舉又令文靜連突厥突厥始畢曰唐公舉義欲何為也文靜曰文皇帝廢冢嫡傳位後主因致斯禍亂唐公國之懿戚不忍坐觀成敗欲廢不當立者願與可汗兵馬同入京師人眾土地入唐公財帛金寶入突厥始畢大悅即遣兵隨文靜而至兵威益盛矣由此觀之是知天下者非一人之天下也天下之天下也所以王者必通三統明天命所受者博非獨一姓也昔孔子論詩至於殷士膚敏灌將于京喟然歎曰富貴無常不如是王公其何以誡慎民萌其何以勸勉易曰安不忘危存不忘亡是以身安而國家可保也故知懼而思誡乃有國之福者矣時宜第二十一時宜第二十一夫事有趨同而勢異者非事詭也時之變耳何以明其然耶昔秦末陳涉起蘄兵至陳陳豪傑說涉曰將軍被堅執銳帥士卒以誅暴秦復立楚社稷功德宜為王陳涉問陳餘張耳兩人兩人對曰將軍瞋目張膽出萬死不顧一生之計為天下除殘賊今始至陳而王之示天下以私願將軍無王急引兵而西遣人立六國後自為樹黨如此野無交兵誅暴秦據咸陽以令諸侯則帝業成矣今獨王陳恐天下解也及楚漢時酈食其為漢謀撓楚權曰昔湯伐桀封其後於杞武王伐紂封其後於宋今秦失德棄義侵伐諸侯社稷滅亡六國之後使無立錐之地陛下誠能復立六國後此其君臣百姓必皆戴陛下德莫不向風慕義願為臣妾德義以行陛下南面稱霸楚必斂衽而朝漢王曰善張良曰誠用客之謀陛下事去矣漢王曰何哉良因發, WYG: ''}
