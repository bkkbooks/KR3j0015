  - {type: variant, offset: 6083, length: 743, content: 禍也故猛虎之猶與不如蜂蠆之致螫騏驥蹢躅不如駑馬之安步孟賁之狐疑不如庸夫之必至也雖有舜禹之智沈吟而不言不如瘖聾之指麾也夫功者難成而易敗時者難得而易失也時不再來願足下詳察之韓信猶豫不忍背漢又自以為功多漢王終不奪我齊遂謝蒯生蒯生曰夫迫於苛細者不可與圖大事拘於臣虜者固無君王之意說不聽因去佯狂為巫議曰昔齊崔杼弒莊公晏子不死君難曰君人者豈以陵人社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為己死而為己亡非其親暱誰敢任之孟子謂齊宣王曰君之視臣如手足則臣之視君如國人君之視臣如草芥則臣視君如冠讎雖云君天也天不可逃然臣緣君恩以為等差自古然矣韓信以漢王遇厚而不背其德誠足憐耳吳王濞以子故不朝孝文帝時吳太子入朝侍皇太子飲博爭道不恭皇太子引博局投吳太子殺之及削地書至於是乃使中大夫應高誂田鳥反膠西王無文書口報曰吳王不肖有宿夕之憂不敢自外使喻其歡心王曰何以教之高曰今者主上興於姦雄飾於邪臣好小善聽讒賊擅變更律令侵奪諸侯之地徵求滋多誅罰良善日以益甚語有之曰舐糠及米吳與膠西知名諸侯也一時見察恐不得安肆矣吳王身有內病不能朝請二十餘年常患見疑無以自白今脅肩累足猶懼不見釋竊聞大王以爵事有適直革反所聞諸侯削地罪不至此此恐不得削地而已王曰然有之子將柰何高曰同惡相助同好相留同情相成同欲相趨同利相死今吳王自以為與大王同憂願因時脩理棄驅以除患害於天下抑亦可乎王矍然駭曰寡人何敢如是今主雖急固有死耳安得勿戴高曰御史大夫晁錯熒惑天子侵奪諸侯蔽忠塞賢朝廷疾怨諸侯皆有背叛之意人事極矣彗星夕出蝗蟲數起此萬世一時而愁勞聖人之所起也故吳王內欲以晁錯為討外隨大王後車傍佯天下所鄉音向者降所指者下天下莫敢不服大王誠幸而許之一言則吳王帥楚王略函谷關守滎陽敖倉之粟距漢兵治次舍須大王大王有幸而臨之則天下可并兩主分割不亦可乎, WYG: 燕}
