  - {type: variant, offset: 9737, length: 0, content: '', WYG: 者未必非濟北之力也夫以區區之濟北而與諸侯爭强是以羔犢之弱而捍虎狼之敵也守職不撓可謂誠一矣功義如此尚見疑於上脅肩低首累足撫襟使有自悔不前之心悔不與呉西也非社稷之利也臣恐藩臣守職者疑之臣竊料之能厯西山徑長樂扺未央攘袂而正議者獨大王耳上有全亡之功下有安百姓之名德淪於骨髓恩加於無窮願大王留意詳維之孝王大說使人馳以聞濟北王得不坐徙封於菑川陳琳典袁紹文章袁氏敗琳歸太祖太祖謂曰卿昔為本初移書但可罪状孤而已惡止其身何乃上及祖父耶琳謝曰楚漢未分蒯通進䇿於韓信乾時之戰管仲肆力於子糾唯欲効計其主助福一時故跖之客可以刺由桀之狗可以吠堯也今明公必能進賢於忿後棄愚於愛前四方革面英豪宅心矣唯明公裁之太祖曰善厚待之由此觀之是知晉侯殺里克漢祖戮丁公石勒誅棗嵩劉備薄許靖良有以也故范曄曰夫人守義於故主斯可以事新主恥以其衆受寵斯可以受大寵若乃言之者雖誠而聞之者未譬豈茍進之悅易以情納持正之忤難以理求誠能釋利以循道居方以從義君子之槩也難必第二十八夫忠為事君之首龍逄斬比干誅孝稱徳行之先孝己憂而曽參泣遇好文之主賈誼被謫于長沙當用武之時李廣無封侯之爵又云意合異類生愛意不合至親交兵夫人主莫不欲其臣之忠而忠未必信故伍員沉於江萇𢎞死於蜀其血三年而化為碧凡人親莫不欲其子之孝而孝未必愛故孝己憂而曽參悲此難必者也何以言之語曰羿弧則越人之行自若弱子關弧則慈母入室閉户故可必則越人不疑羿不可必則慈母逃弱子也魏文侯問狐巻子曰父子君臣之賢足恃乎對曰不足恃也何者父賢不過堯而丹朱放子賢不過舜而瞽瞍拘兄賢不過舜而象傲弟賢不過周公而管蔡誅臣賢不過湯武而桀紂伐望人者不至恃人者不久君欲理亦從身始人何可恃乎漢時梁孝王藏匿羊勝公孫詭韓安國泣說梁孝王曰大王自度於皇帝皇帝景帝也是梁孝王兄孰與太上皇之與髙皇帝及皇帝之與臨江王親臨江王景帝太子也孝王曰弗如也安國曰夫太上臨江親父子間然而髙帝提三尺劍取天下者朕也故太上終不得制事居櫟陽臨江王適長太子也以言過廢王臨江景甞屬諸姬大子母栗姬言不遜由是廢太子栗姬憂死也用宮垣事卒自殺中尉府何者治天下終不以私害公語曰雖有親父安知其不為虎雖有親兄安知其不為狼今大王列在諸侯說一邪臣浮說犯上禁撓明法天子以太后故不忍致法於王太后日夜泣涕幸大王自改而大王終不覺悟又如太后車即晏駕大王尚誰攀乎語未卒孝王出羊勝等景帝弟梁孝王用羊勝公孫詭之計求為漢太子恐大臣不聼乃隂使人刺漢用事謀臣袁盎帝聞詭勝計遣使十輩舉國大索捕詭勝不得内史韓安國聞詭勝匿孝王所入見王說之王出詭勝詭勝自殺由是觀之安在其可必哉語曰以權利合者權利盡而交踈又曰以色事人者色衰而愛絶此言財色不可必也墨子曰雖有慈父不愛無益之子黄石公曰王不可以無徳無德則臣民叛此言臣子不可必也詩云自求伊祐有㫖哉有㫖哉運命第二十九易曰精氣為物逰魂為變夫人之受生貌異音殊苦樂愚智尊卑夀夭無非三}
