  - {type: variant, offset: 9919, length: 288, content: 攻白公白公敗亡也王莽時寇盜群發莽遣將軍廉丹伐山東丹辟馮衍為掾與俱至定陶莽追詔丹曰將軍受國重任不能捐身中野無以報恩塞責丹惶恐夜召衍以書示之衍因說丹曰衍聞之順而成者道之所大也逆而功者權之所貴也是故期於有成不問所由論於大體不守小節昔逢丑父伏軾而使其君取飲稱於諸侯鄭祭仲立突而出忽終得復位美於春秋蓋以死易生以存易亡君之道也詭於眾意寧國存身賢者之慮也故易曰窮則變變則通通則久是以自天祐之吉無不利若夫知其不可而必為之破軍殘眾無補於主身死之日負義於世智者不為勇者不行且衍聞之得時無怠張良以五代相韓椎秦始皇於博浪之中勇冠乎賁育名高於太山將軍之先為漢信臣新室之興英儁不附今海內潰亂民懷漢德甚於詩, WYG: 如周}
