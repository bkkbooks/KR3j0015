  - {type: variant, offset: 16323, length: 2467, content: 難其略曰昔者湯伐桀封其後於𣏌者度能制桀之死命也今陛下能制項籍之死命乎其不可一也武王入殷表商容之閭釋箕子之囚封比干之墓今陛下能封聖人之墓褒賢者之閭乎其不可二也發巨橋之粟散鹿臺之財以賑貧民今陛下能散府庫以賜貧窮乎其不可三也殷事已畢偃革為軒倒載干戈示天下不復用武今陛下能偃武修文不復用兵乎其不可四也放馬華山之陽示無所為今陛下能放馬不復用乎其不可五也休牛桃林之野示天下不復輸積今陛下能乎其不可六也且夫天下遊士離親戚棄墳墓去故舊從陛下者日夜望咫尺之地今復六國立韓魏燕趙齊楚之後餘無復立者天下遊士各歸事其主從親戚反故舊陛下與誰取天下乎其不可七也且楚唯無強六國者復撓而從之唯當使楚無強強則六國弱而從之也陛下安得而臣之哉其不可八也誠用客之謀則大事去矣時王方食吐哺罵酈生曰豎儒幾敗我事趣令銷印此異形者也荀悅曰夫立策決勝之術其要有三一曰形二曰勢三曰情形者言其大體得失之數也勢者言其臨時之勢進退之機也情者言其心志可否之實也故策同事等者三術不同也初張耳說陳涉以復六國後自為樹黨酈生亦用此說漢王所以說者事同而得失異者何哉當陳涉之起也天下皆欲亡秦而楚漢之分未有所定今天下未必欲亡項也且項羽力能率從六國如秦之勢則不能矣故立六國於陳涉所謂多己之黨而益秦弊也且陳涉未能專天下之土也所謂取非其有以德於人行虛惠而獲實福也立六國於漢王所謂割己之有而以資敵設虛名而受實禍也此事同而形異形者也七國時秦王謂陳軫曰韓魏相攻期年不解或曰救之便或曰勿救便寡人不能決請為寡人決之軫曰昔卞莊子方刺虎管豎子止之曰兩虎方食牛牛甘必爭爭必鬭鬭則大者傷小者死從傷而刺之一舉必有兩虎之名今韓魏相攻期年不解必是大國傷小國亡從傷而伐之一舉必有兩實此卞莊刺虎之類也惠王曰善果如其言初諸侯之叛秦也秦將軍章邯圍趙王於鉅鹿楚懷王使項羽宋義等北救趙至安陽今相州安陽縣也留不進羽謂義曰今秦軍圍鉅鹿疾引兵渡河楚擊其外趙應其內破秦軍必矣宋義曰不然夫搏牛之蝱不可以破蝨蝱喻秦也蝨喻章邯也喻今將兵方欲滅秦不可盡力與章邯即戰也今秦攻趙戰勝則兵罷我承其弊不勝則我引兵鼓行而西必舉秦矣故不如鬭秦趙夫擊輕銳我不如公坐運籌策公不如我羽曰將軍戮力而攻秦久留不行今歲饑民貧士卒食半菽士卒食蔬菜以菽雜之半軍無見糧乃飲酒高會不引兵渡河因趙食與并力擊秦乃曰承其弊夫以秦之強攻新造之趙其勢必舉趙趙舉而秦強何弊之承且國兵新破王不安席掃境內而屬將軍國家安危在此一舉今不恤士卒而徇私非社稷臣也即夜入義帳中斬義悉兵渡河沈舟破釜示士卒必死無還心大破秦軍此異勢者也荀悅曰宋義待秦趙之弊與卞莊刺虎事同而勢異何也施之戰國之時鄰國相攻無臨時之急則可也戰國之立其來久矣一戰之勝敗未必以亡也其勢非能急於亡敵國也進則乘利退則自保故畜力待時承弊然也今楚趙新起其力與秦勢不並立安危之機呼吸成變進則定功退則受禍此事同而勢異者也韓信伐趙軍井陘選輕騎二千人人持一赤幟從閒道昇山而望趙軍誡曰趙見我走必空壁逐我若疾入趙壁拔趙幟立漢赤幟信乃使萬人先行出背水陣平旦信建大將之旗鼓行出井陘口趙開壁擊之大戰良久於是信棄旗鼓走水上軍水上軍開入之復疾戰趙空壁爭漢旗鼓逐韓信韓信等已入水上軍軍皆殊死戰不可敗信所出奇兵二千騎共候趙空壁逐利則馳入趙壁皆拔趙旗立漢赤幟二千趙軍已不能得信等欲還歸壁皆漢赤幟而大驚以為皆已得趙王將矣遂亂遁走趙將雖斬之不能禁也於是漢兵乘擊大破之虜趙軍諸將效首虜皆賀信因問曰兵法右背山陵前左水澤今者反背水陣然竟以勝此何術也信曰兵法不曰陷之死地而後生置之亡地而後存且信非得素撫循士大夫也此所謂驅市人而戰之其勢非置之死地使人人自為戰今與之生地皆走寧尚可得而用之又高祖劫五諸侯兵入彭城項羽聞之乃引兵去齊與漢大戰睢水上大破漢軍多殺士卒睢水為之不流此異情者也荀悅曰伐趙之役韓信軍泜水而趙不能敗何也彭城之難漢王戰于睢水之上士卒赴入睢水而楚兵大勝何也趙兵出國近攻見可而進知難而退深懷內顧之心不為必死之計韓信孤軍立於水上有必死之計無生慮也此信之所以勝也漢王制敵入國飲酒高會士眾逸豫戰心不同楚以強大之威而喪其國都項羽自外而入士卒皆有憤激之氣救敗赴亡以決一旦之命此漢所以敗也且韓信選精兵以守而趙以內顧之士攻之項羽選精兵以攻漢而漢王以懈怠之卒應之此事同而情异者也故曰權不可預設變不可先圖與時遷移應物變化計策之機也漢王在漢中韓信說曰今士卒皆山東人跂而望歸及其鋒東向可以爭天下後漢光武北至蒯聞邯鄲兵到世祖欲南歸召官屬計議耿弇曰今兵從南來不可南行漁陽太守彭寵公之邑人上郡太守即弇父也發此兩郡控弦萬騎邯鄲不足慮也世祖官屬不從遂南馳官屬各分散議曰歸師一也或敗或成何也對曰孫子云歸師勿遏項王使三王之秦遏漢王歸路故鋒不可當又孫子稱諸侯自戰其地為散地光武兵從南來南行入散地所以無鬭志而分散也故歸師一也而一成一敗也後漢李傕等追困天子於曹陽沮授說袁紹曰將軍累葉台輔世濟忠義今朝廷播越宗廟殘毀觀諸州郡雖外託義兵內實相圖未有憂在社稷卹人之意且今州城粗定兵強士附西迎大駕即宮鄴都挾天子而令諸侯畜士馬以討不庭誰能禦之若不早定必有先之者夫權不失機功不厭速願其圖之紹不從魏武果迎漢帝紹遂敗梁武帝蕭衍起義杜思沖勸帝迎南康王都襄陽正尊號帝不從張弘策曰今以南康置人手中彼挾天子以令諸侯節下前去為人所使此豈歲寒之計耶帝曰若前途大事不捷故自蘭艾同焚若功業剋建誰敢不從豈是碌碌受人處分於江南立新野郡以集新附哉不從遂進兵剋建鄴而有江左議曰挾天子而令諸侯其事一也有以之成有以之敗何也對曰天下者非一人之天下也肆行凶暴繼體不足以自存人望所歸匹夫可以成洪業夫天命底止唯樂推有自來矣當火德不競群豪虎爭漢祚雖衰人望未改故魏武奉天子以從人欲仗大順以令宇內使天下之士委忠霸圖傳曰求諸侯莫如勤王斯之謂矣齊時則不然溥天思亂海水群飛當百姓與能之秋屬三靈改卜之日若挾舊主不亦違乎故傳譏萇弘欲與天之欲壞而美蔡墨雷乘乾之說是以其事一也有以之成有以之敗也此情與形勢之異者也隨時變通不可執一矣諸葛亮曰范蠡以去貴為高虞卿以捨相為功太伯以三讓為仁燕噲以辭國為禍堯舜以禪位為聖考哀以授董為愚武王以取殷為義王莽以奪漢為篡桓公以管仲為霸秦王以趙高喪國此皆趣同而事異也明者以興治暗者以辱亂也, WYG: ''}
