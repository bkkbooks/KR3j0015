  - {type: variant, offset: 9738, length: 0, content: '', krp: 業理使之然夫天道性命聖人所希言也雖有其㫖難得而詳然校之古今錯綜其紀乗乎三勢亦可以彷彿其畧何以言之荀悅云凡三光議曰三光日月星也精氣變異此皆隂陽之精也其本在地而上發於天政失於此則變見於彼不其然乎文王問太公曰夫人主動作舉事有禍殃之應鬼神之福無太公曰有之人主好重賦歛大宮室則人多病瘟霜露殺五榖人主好畋獵不避時禁則歲多大風禾榖不實人主好破壊名山壅塞大川决通名水則歲多大水傷人五㝅不滋人主好武事兵革不息則日月薄蝕不息太白失行文王曰誠哉今稱洪範咎徵則有堯湯水旱之灾消灾復異則有周宣雲漢寧莫我聽易稱積善餘慶則有顔冉短折之凶善惡之報類變萬端不可齊一故視聽者惑焉太史公曰書稱天道無親甞與善人七十子之徒仲尼獨荐顔回為好學然回也屢空糟糠不厭而早夭夭之報施善人何如哉盗跖日殺不辜肝人之肉暴戾恣睢聚黨數千人横行天下竟以夀終是遵何徳哉余甚惑焉甞試言之孔子曰死生有命又曰不得其死又曰幸而免者夫死生有命其正理也不得其死者未可以死}
  - {type: variant, offset: 9740, length: 0, content: '', WYG: 也幸而免者可以死而不死也此皆性命三勢之理也昔虢太子死扁鵲治而生之扁鵲曰我非能生死人者我能治可生者耳然不遇扁鵲亦不生耳若夫膏肓之病雖醫和不能治矣故曰死生有命其正理也不得其死者未可死而死也幸而免者可以死而不死也此荀悅論性命三勢之理也揚子法言云或問夀可益乎曰徳或問回牛之行徳矣曷夀之不益也曰徳故爾如回之殘牛之賊焉得爾曰殘賊或夀曰彼妄也君子不妄也推此以及教化則亦如之人有不教化而自成者有待教化而後成者有雖加教化而終不成者故上智與下愚不移至於中人則可上可下議曰傳云能者養之以福不能者敗以取禍此可上可下者推此以及天道則亦如之灾祥之應無所疑焉故堯湯水旱天數也議曰夫隂静陽動天迴地游太一算周成百六之厄太歲數極為一元之灾必然之符不可移也故𫝊曰美惡周必復又曰天灾流行國家代有言必定也故曰天數漢時公孫𢎞則不然以為堯遭洪水使禹治之未聞禹之有水也若湯之旱則桀餘烈桀紂行惡受天之罰禹湯積徳以王天下因此觀之天無私親順之和起逆之害生此天文地理人事之紀觀公孫𢎞所言以為徳感水旱非天數也一家之談非為正論洪範咎徵人事也議曰傳云禍福無門唯人自召謂五事以應休咎故曰人事魯僖霪雨可救之應也周宣旱甚難變之勢也議曰孔子云祭如在言祭法在精誠也語曰應天以實不以文言上天不以偽動也易曰善不積}
