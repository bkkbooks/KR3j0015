  - {type: variant, offset: 1686, length: 255, content: 國有奧主謂棄疾也子干無施於民無援於外去晉晉不送歸楚楚不迎何以冀國子干果不終卒立棄疾如叔向言初楚恭王無冢嫡有寵子五人無適立焉乃大有事於群望而祈曰請神擇於五人者使主社稷乃遍以璧見於群望曰當璧而拜者神所立也乃密埋璧於太室之庭使五人齊而長幼入拜康王跨之靈王肘加焉子干子皙皆遠之平王弱抱而入再拜皆壓紐平王即棄疾也魯昭公薨於乾侯趙簡子問於史墨曰季氏出其君而民服焉諸侯與之君死於外而莫之或罪何也對曰物生有兩有三有五有陪貳故天有三辰謂有三也地有五行謂有五也體有左右謂有兩也各有妃耦謂陪貳也王有公諸侯有卿皆其貳也天生季氏以貳魯侯, WYG: ''}
