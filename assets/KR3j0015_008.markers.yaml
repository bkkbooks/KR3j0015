  - {type: variant, offset: 10228, length: 0, content: '', WYG: 興興非鄭之利也公曰周衰何國興對曰齊秦晉楚乎夫齊姜姓伯夷之後也伯夷佐堯典禮秦嬴氏伯翳之後也伯翳佐舜懐柔百物及楚之先皆甞有功於天下而武王封虞叔於唐其地險阻以此有徳若周衰並必興矣按周公馬遷太史伯之談言興亡長短必依徳矣此畧言其本而不語其詳嘗試論之曰命也者天之授也徳也者命之本也皇靈雖隂隲下人定於冥兆然興亡長短以徳為凖若德循於曩則命定於今然則今之定命皆曩之徳也明矣夫命之在徳則吉凶禍福不由天也命定於今則賢聖鬼神不能移也故君子盡心焉盡力焉以邀命也此運命之至也易曰窮理盡性以至於命此之謂矣議曰夫吉凶由人興亡在徳稽於前載其在徳必矣今論者以堯舜無嗣以為在命此繆矣何者夫佐命功臣必有興者若使傳子則功臣之徳廢何以言之昔鄭桓公問太史伯曰周衰何國興對曰昔祝融為髙辛火正其功大矣而其于周未有興者楚其後也周衰楚必興齊姜姓伯夷之後也伯夷佐堯典禮秦嬴姓伯翳之後伯翳佐舜懐柔百物若周衰並必興矣是以班固典引云陶唐捨𦙍而禪有虞有虞亦命夏后稷契熙載越成湯武股肱既周天乃歸功元首将授漢劉由此言之安在其無嗣哉又曰楚師屠漢卒睢水梗其流秦人坑趙士沸聲若雷震雖游夏之英才伊顔之殆庶焉能抗之哉此其弊也對曰宋景公之時熒惑在心公懼問子韋子韋曰心者宋野也禍當在君雖然可移於人㨿此言則君有祸人當受之若當君厄㑹之時則生人塗炭雖伊顔游夏何所抗哉故荘子曰當堯舜天下無窮人非智得也當桀紂天下無道人非智失也時勢適然此之謂也又曰彼戎狄者人面獸心晏安鴆毒以誅殺為道徳烝報為仁義自金行不競天地板蕩遂覆瀍洛傾五都嗚呼福善禍滛徒虗言耳㨿此論以戎狄内侵便謂由命此所謂不量於德者也何則昔秦穆公問戎人由余曰中國以詩書禮樂法度為政然尚時亂今戎夷無此何以為理乎由余笑曰乃中國所以亂也夫自上聖黄帝作為禮樂法度身以先之僅可小理及其後世日以驕滛阻法度之盛以責督於下下罷極則以仁義怨望於上上下交争怨而相簒殺至於滅宗皆此類也夫戎狄則不然上含淳徳以遇於下下懷忠信以事其上一國之政猶一身之治不知所以治此真聖人之治夫戎狄之徳有如此者今晉之興也宗子無維城之助而閼伯實沈之隟日搆師尹無具瞻之貴而顛墜戮辱之祸日有宣景遭多難之時務伐英雄誅庶桀以便事其傾覆屠鱠非主於誅殺也風俗淫僻亷恥並失先時而昏任情而動皆不恥滛逸之過不拘妬忌之惡有逆于舅姑有反易剛柔有殺戮妾媵有黷亂上下其滛亂凶逆非止于烝報也由是觀之晉家之徳安勝于匈奴哉今見戎狄亂華便以為在命不在徳是何言之過歟太私第三十管子曰知與之為取政之寳也周書曰将欲取之必故與之何以徵其然耶黄石公曰得而勿有立而勿取為者則已有者則士焉知利之所在人多務功鮮有讓者唯天子不與下争功名耳故曰有者則士焉知利之所在乎彼為諸侯已為天子天子不収功於萬物故能成其髙王者不競名於衆庶故能成其大也使城自保令士自取盡與敵城之財令自取之所謂使貪使愚者也王者之道也尸子曰堯養無告禹愛辜人此先王之所以安危而懷逺也聖人於大私之中也為無私湯曰朕身有罪無及萬方萬方有罪朕身受之湯不私其身而私萬方文王曰茍有仁人何必周親文王不私其親而私萬國先王非無私也所私者與人不同此知大私者也由是言之夫唯不私故能成其私不利而利之乃利之大者矣敗功第三十一文子曰有功離仁義者即見疑有罪不失仁心者必見信故仁義者天下之尊爵也何以言之昔者楚共王有疾召其大夫曰不穀不徳少主社稷失先君之緒覆楚國之師不穀之罪也若以宗廟之靈得保首領以没請為靈若厲大夫許諸及其卒也子囊曰不然夫事君者從其善不從其過赫赫楚國而君臨之撫征南海訓及諸夏其寵大矣有是寵也而知其過可不謂之共乎大夫}
