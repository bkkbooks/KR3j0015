  - {type: variant, offset: 10222, length: 1, content: 民, WYG: 後昆子孫之盛不亦宜乎由是觀之夫陳平邴吉及袁安之後衰與盛乃在先人之徳又不在吾之得失矣虞南曰夫釋教有布施持戒忍辱精進禪定智慧與夫仁義禮智信亦何殊哉蓋以}
  - {type: variant, offset: 10222, length: 1, content: 民, krp: 後昆子孫之盛不亦宜乎由是觀之夫陳平邴吉及袁安之後衰與盛乃在先人之徳又不在吾之得失矣虞南曰夫釋教有布施持戒忍辱精進禪定智慧與夫仁義禮智信亦何殊哉蓋以}
  - {type: variant, offset: 10224, length: 2, content: 歌舞, WYG: 修為因其果為報人修此六行皆多不全有一􅊴焉果亦隨滅是以鬷明醜於貌而慧於心趙壹髙於才而下於位羅裒富而無義原憲貧而有道其不同也如斯懸絶興喪得失咸必由之由是言之夫行已不周則諸福不備故吉凶禍福不得齊也故世人有操行不軌而富貴者矣有積仁潔行而凶夭者矣今下士庸夫見比干之剖心以為忠貞不足為也聞偃王之亡國以為仁義不足法也不亦過乎易曰有}
  - {type: variant, offset: 10224, length: 2, content: 歌舞, krp: 修為因其果為報人修此六行皆多不全有一闕焉果亦隨滅是以鬷明醜於貌而慧於心趙壹髙於才而下於位羅裒富而無義原憲貧而有道其不同也如斯懸絶興喪得失咸必由之由是言之夫行已不周則諸福不備故吉凶禍福不得齊也故世人有操行不軌而富貴者矣有積仁潔行而凶夭者矣今下士庸夫見比干之剖心以為忠貞不足為也聞偃王之亡國以為仁義不足法也不亦過乎易曰有}
  - {type: punctuation, offset: 10226, content: ，, id: KR3j0015_CH7x2006_008-bkkpn2390}
  - {type: 'tls:seg', offset: 10226, content: '', id: KR3j0015_CH7x2006_008-1a.2071}
  - {type: variant, offset: 10227, length: 0, content: '', WYG: 道焉有地道焉有人道焉言其異也兼三才而兩之言其同也故天地之道有同有異據其所以異而責其所以同斯則惑矣守其所以同而求其所以異則取弊矣遲速深淺變化錯乎其中是故参差難得而均也天地人物之理莫不同之故君子盡心焉盡力焉以邀命也議曰孫卿云天行冇常不為堯存不為桀亡應之以理則吉應之以亂則凶强本而節用則天不能貧養備而動時則天不能病循道而不惑則天不能禍背道而妄行則天不能吉故明於天人之分則可謂至人矣若星墜木鳴天地之變怪之可也畏之非也唯人妖乃可畏也何者政險失人田荒稼惡糴貴人饑道有死人夫是之謂人妖也政令不明舉錯不時本事不理夫是之謂人妖也禮義不修外内無别男女淫亂父子相疑上下乖離冦難日至夫是之謂人妖也三者鍇亂無安國矣其說甚邇其灾甚惨𫝊曰萬物之怪書不說無用之辨不急之察棄而不治也墨翟曰古之聖王舉孝子而勸之事親尊賢良而勸之為善發憲令以教誨明賞罰以助勸若此則亂者可使理而危者可使安矣若以為不然昔者桀之所亂湯理之紂之所亂武王理之此世不渝而人不改上變正而人易教則安危治亂存上之發政也豈可為有命哉昔梁惠王問尉繚曰吾聞黄帝有刑徳可以百戰百勝其有之乎尉繚曰不然黄帝所為刑徳者以刑伐之以徳守之非世之所謂刑徳也世之所為刑徳者天官時日隂陽向背者也黄帝者人事而已矣何以言之今有城於此從其東西攻之不能取從其南北攻之不能取此四者豈不得順時乘利者哉然不能取者何也城髙池深兵戰偹具謀而守之由是觀之天官時日不若人事也天官之陣曰背水陣者為絶軍向阪陣者為廢軍武王之伐紂也背漳水向山之阪以萬二千擊紂之億有八萬㫁紂頭懸之白旗紂豈不得天官之陣哉然而不勝者何也人事不得也黄帝曰先稽已智者謂之天子以是觀之人事而已矣按孫卿墨翟尉繚之說言吉凶祸福在於人矣周公誡成王曰昔殷王中宗治人祇懼弗敢荒寧享國七十年其在髙宗嘉靖殷邦至於小大無時或怨享國五十九年其在祖甲爰知小人之衣食能保惠於庶人弗侮鰥寡享國三十有三年自時厥後立王生則逸惟耽樂之從亦罔或克夀或十年或七八年或三四年嗚呼嗣王其鑒於茲史記陳世家曰陳舜後也周武王封之陳太史公云舜之徳至矣禪於夏而後世血食者厯三代及楚滅陳而田氏得政於齊卒為建國百世不絶又南越𫝊云越雖蠻夷其先豈嘗有大功徳於人哉何其久也厯數代甞為君王勾踐一稱伯蓋禹之烈也又曰鄭桓公友者周厲王之少子也幽王以為司徒問太史伯曰王室多故予安逃死乎吾欲南之江上何如對曰昔祝融為髙辛火正其功大矣而其於周未有興者楚其後也周衰楚}
