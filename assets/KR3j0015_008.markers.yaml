  - {type: 'tls:seg', offset: 9738, content: '', id: KR3j0015_CH7x2006_008-1a.1973}
  - {type: variant, offset: 9738, length: 0, content: '', WYG: 業理使之然夫天道性命聖人所希言也雖有其㫖難得而詳然校之古今錯綜其紀乗乎三勢亦可以彷彿其畧何以言之荀悅云凡三光議曰三光日月星也精氣變異此皆隂陽之精也其本在地而上發於天政失於此則變見於彼不其然乎文王問太公曰夫人主動作舉事有禍殃之應鬼神之福無太公曰有之人主好重賦歛大宮室則人多病瘟霜露殺五榖人主好畋獵不避時禁則歲多大風禾榖不實人主好破壊名山壅塞大川决通名水則歲多大水傷人五㝅不滋人主好武事兵革不息則日月薄蝕不息太白失行文王曰誠哉今稱洪範咎徵則有堯湯水旱之灾消灾復異則有周宣雲漢寧莫我聽易稱積善餘慶則有顔冉短折之凶善惡之報類變萬端不可齊一故視聽者惑焉太史公曰書稱天道無親甞與善人七十子之徒仲尼獨荐顔回為好學然回也屢空糟糠不厭而早夭夭之報施善人何如哉盗跖日殺不辜肝人之肉暴戾恣睢聚黨數千人横行天下竟以夀終是遵何徳哉余甚惑焉甞試言之孔子曰死生有命又曰不得其死又曰幸而免者夫死生有命其正理也不得其死者未可以死}
