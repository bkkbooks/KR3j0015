  - {type: variant, offset: 4118, length: 814, content: 存亡安危屬臣也豈可道哉夫忠臣不避死而庶幾孝子不勤勞而見危君其勿復言高曰蓋聞聖人遷徙無常龍變而從時見末而知本觀指而覩歸物固有之安得常法哉方今天下之權懸命於胡亥高能得志焉且夫從外制中謂之惑從下制上謂之賊故秋霜降者草華落水風搖者萬物作此必然之效也君侯何見之晚也斯曰吾聞晉易太子三世不安齊桓兄弟爭位身死為戮紂殘賊親戚不聽諫者國危丘墟三者逆天宗廟不血食斯其由人哉安足與謀高曰上下合同可以長久中外若一事無表裏君聽臣之計則長有封侯世世稱孤必有松喬之壽孔墨之智今釋此而不從禍及子孫足為寒心善者因敗為福君何處焉斯乃仰天而歎垂涕太息曰既已不能死安託命哉乃聽高立胡亥改賜璽書殺扶蘇蒙恬初李斯從荀卿學帝王之術欲西入秦辭於荀卿曰斯聞得時無怠今萬乘爭時遊者主事今秦王欲吞天下稱帝而治此布衣馳騖之時而談遊者之秋也故斯將西說秦王至秦為呂不韋舍人不韋賢之任以為郎說秦王陰遣謀士齎金玉以遊說諸侯諸侯名士厚給遺之不肯者利劍刺之離其君臣之計遂吞天下皆斯之謀也秦二世末陳涉起蘄兵至陳張耳陳餘說涉曰大王興梁楚務在入關未及收河北也臣嘗遊趙知其豪傑願請奇兵略趙地於是陳王許之與卒三千從白馬渡河今滑州白馬縣界也至諸郡縣說其豪傑曰秦為亂政虐刑殘滅天下北為長城之役南有五嶺之戍外內騷動百姓罷敝頭會箕斂以供軍費財匱力盡重以苛法使天下父子不相聊生今陳王奮臂為天下唱始莫不響應家自為怒各報其怨縣殺其令丞郡殺其守尉今已張大楚王陳使吳廣周文將卒百萬西擊秦於此時而不成封侯之業者非人傑也夫因天下之力而攻無道之君報父兄之怨而成割地之業此一時也豪傑皆然其言乃行收兵下趙十餘城議曰班固云昔詩書述虞夏之際舜禹受禪積德累仁數十年然後在位殷周之王乃由稷卨歷十餘世然後放殺秦起襄公稍蠶食六國至于始皇乃并天下秦既稱帝患周之敗以為諸侯力爭以弱見權於是削去五等墮城銷刃拑語燒書內鉏雄俊外攘胡越用一威權以為萬世安然十餘年閒強敵橫發乎不虞謫戍強於五伯閭閻逼於戎狄響應瘖於謗議奮臂威於甲兵向秦之禁適所以資豪傑自速其斃也由, WYG: ''}
