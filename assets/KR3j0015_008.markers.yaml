  - {type: variant, offset: 13553, length: 98, content: 王無恐且懼所謂大者盡得天下之人所謂眾者盡得天下之眾所謂強者盡用天下之力所謂安者能得天下之欲所謂天子者天下相愛如父如子此之謂天子今日之為天下除殘去賊也周雖細曾殘賊一人不當乎武王大喜曰何謂殘賊太公曰收, WYG: 収}
