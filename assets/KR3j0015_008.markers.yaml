  - {type: variant, offset: 747, length: 930, content: 所同聞也為人臣而放其君為人下而殺其上天下之至逆也而所以長有天下者以其為天下開利除害以義繼之也故聲名稱於天下而傳於後世也太公曰天下者非一人之天下天下人之天下也與天下同利者得天下擅天下之利者失天下天有時地有利能與人共之者仁也仁之所在者天下歸之免人之死解人之難救人之患濟人之急者德也德之所在天下歸之與人同憂同樂同好同惡者義也義之所在天下歸之凡人惡死而樂生好德而歸利能生利者道也道之所在天下歸之也楚恭王薨子靈王即位群公子因群喪職之族殺靈王而立子干立未定弟棄疾又殺子干而自立棄疾平王也五人皆恭王子也初子干之入也韓宣子問於叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難對曰無與同好誰與同惡取國有五難有寵而無人一也寵須賢人而固也有人而無主二也雖有賢人當須內主為應也有主而無謀三也謀策謀也有謀而無民四也民眾也有民而無德五也四者既備當以德成子干在晉十三年矣晉楚之從不聞達者可謂無人族盡親叛可謂無主無親族在楚無釁而動可謂無謀召子干時楚未有大釁也為羇終世可謂無人終身羈客在晉是謂無民亡無愛徵可謂無德楚人無愛念之者王虐而不忌靈王暴虐無所畏忌將自亡也楚君子干涉五難以殺舊君誰能濟之有楚國者其棄疾乎君陳蔡城外屬焉城方城也時穿封戌既死棄疾并領陳事也苛慝不作盜賊伏隱私欲不違民無怨心先神命之國人信之芊姓有亂必季實立楚之常也獲神一也當璧拜也有民二也人信之也命德三也無苛慝也寵貴四也貴妃子也居常五也棄疾季也有五利以去五難誰能害之子干之官則右尹也數其貴寵則庶子也以神所命則又遠之其貴亡矣其寵棄矣父既沒矣民無懷焉非令德也國無與焉無內主也將何以立宣子曰齊桓晉文不亦是乎皆庶賤也對曰齊桓衛姬之子也有寵於僖有鮑叔牙賓須無隰朋以為輔佐有莒衛以為外主齊桓奔莒衛有舅氏之助有國高以為內主國氏高氏齊上卿也從善如流下善齊肅齊嚴肅敬不藏賄清也不從欲儉也施舍不倦求善不厭以是有國不亦宜乎我先君文公狐季姬之子也有寵於獻公好學不貳生十七年有士五人狐偃趙衰顛頡魏武子司空季子五士從出者也有先大夫子餘子犯以為腹心子餘趙衰子犯狐偃有魏犨賈佗以為股肱有齊宋秦楚以為外主齊妻以女宋贈以馬楚王饗之秦伯納之有欒郤狐先以為內主謂欒枝郤縠狐突先軫也亡十九年守志彌篤惠懷棄民從而與之獻無異親民無異望獻公之子九人惟文公在天方相晉將何以代之此二君, WYG: 直}
