  - {type: variant, offset: 13687, length: 1, content: 由, WYG: 賢人不至謂之蔽忠臣不至謂之塞色取仁而實違之謂之虚不以誠待其臣而望其臣以誠事已謂之愚分於道謂之性分謂始得為人形于一謂之命受隂陽剛柔之性故曰形於一也凡人函五常之性而剛柔緩急音聲不同繫水土之氣謂之風好惡取舎動静無常隨君上之情欲謂之俗或曰樂與音同乎對曰昔魏文侯問子夏曰吾端冕而聽古樂唯恐卧聽鄭衞之音則不知倦敢問古樂之如彼新樂之如}
