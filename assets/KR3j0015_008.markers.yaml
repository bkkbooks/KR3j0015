  - {type: variant, offset: 10256, length: 1, content: 日, WYG: 子反以斃此愛之而害者也漢文帝幸慎夫人其在禁中甞與后同席及幸上林郎署長布席慎夫人席與后同席袁盎引慎夫人坐上大怒袁盎前說曰臣聞尊卑有序上下乃和今陛下既已立后慎夫人乃妾耳主妾豈可同坐哉且陛下幸之即厚}
