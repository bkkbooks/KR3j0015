  - {type: variant, offset: 10235, length: 10, content: 計莫若屯據大郡鎮撫吏, WYG: 陣周務而已故曰小人所言者極于儒墨是非之辨所為者極于堅偽偏執之行求名而已故明主誅之也今世之人行欲獨賢事欲獨能辨欲出羣勇欲絶衆夫獨行之賢不足以成化獨能之事不足以周務出羣之辨不可為户說絶衆之勇不可與征陣凡此四者亂之所由生也故曰為善者使人不能得縱為巧者使人不能得為此獨善獨巧者也未盡巧善之理故所貴聖人之理不貴其獨治貴其能與衆共治也所貴工倕之巧者不貴其獨巧貴其能與衆共巧也文子曰夫先知逹見人材之盛也而治世不以貴于人博聞强志口辯辭給人智之溢也而明主不以求于下傲世賤物不汚于俗}
