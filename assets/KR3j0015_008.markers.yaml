  - {type: variant, offset: 8406, length: 662, content: 南越兵入欲因以發兵未得發會事泄誅武帝時趙人徐樂上書言世務曰臣聞天下之患在于土崩不在瓦解古今一也何謂土崩秦之末世是也陳涉無千乘之尊無壃土之地身非王公大人名族之後鄉曲之譽非有孔魯墨子之賢陶朱猗頓之富也然起窮巷奮棘矜偏袒大呼而天下風從此其故何也由其民困而主不恤下怨而上不知俗亂而政不脩此三者陳涉所以為資也是謂之土崩故曰天下之患在于土崩何謂瓦解曰吳楚齊趙之兵是也七國謀為大逆號皆稱萬乘之君帶甲數十萬威足以嚴其境內財足以勸其士民然不能西攘尺寸之地而身為禽於中原者此其故何也非權輕於匹夫而兵弱於陳涉也當是之時先帝之德澤未衰而安土樂俗之民眾故諸侯無境外之助此之謂瓦解由是觀之天下誠有土崩之勢雖有布衣窮處之士或首惡而危海內陳涉是也況三晉之君或存乎天下雖大未有治也誠能無土崩之勢雖有強國勁兵不得旋踵而身巳擒矣吳楚齊趙是也況群臣百姓能為亂乎哉此二體者安危明要也賢主之所宜留意而深察也閒者關東五穀數不登推數循治而觀之則人且有不安其處者矣不安故易動易動者土崩之鄰也願脩之廟堂之上銷未形之患也後漢靈帝以皇甫嵩為將軍討破黃巾威震天下而朝政日亂海內虛困故信都令閻忠來說嵩曰難得而易失者時也時至不旋踵者機也故聖人順時以動智者因機以發今將軍遭難得之運蹈易駭之機而踐運不撫臨機不發將何以保大名乎嵩曰何謂也忠曰天道無親百姓與能今將軍受鉞於暮春收功於末冬兵動如神謀不再計摧強易於折枯消堅甚於湯雪旬月之間神兵電掃封戶刻石南向以報德威名震本朝風聲馳海外雖湯武之舉未有高將軍者也今身建不賞之功體兼高人之德而北面庸主何以求安乎嵩曰夙夜在公心不忘忠何故不安忠曰不然議曰計有之, WYG: ''}
