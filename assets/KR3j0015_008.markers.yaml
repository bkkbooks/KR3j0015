  - {type: variant, offset: 1942, length: 270, content: 日久矣民之服焉不亦宜乎魯君世縱其失季氏世修其勤民忘君矣雖死於外其誰矜之社稷無常奉奉之無常人言唯德也君臣無常位自古以然故詩曰高岸為谷深谷為陵三后之姓於今為庶主所知也三后虞夏商也在易卦雷乘乾曰大壯乾下震上大壯震在上故曰雷乘乾也天之道也乾為天子震為諸侯而在乾上君臣易位猶人臣強壯若天下有雷也政在季氏於此君也四公矣民不知君何以得國是以為君慎器與名器車服也名爵號也不可以假人議曰劉向稱人君莫不欲安然而常危莫不欲存然而常亡失御臣之策也夫人臣操權柄持國政未有不為害者也昔晉有六卿齊有田崔衛有孫寧魯有季孟常掌國事世執朝柄終復田氏取齊六卿分晉崔杼弒其君光孫林, WYG: ''}
