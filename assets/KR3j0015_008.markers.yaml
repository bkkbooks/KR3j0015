  - {type: variant, offset: 10283, length: 2, content: 除萬, WYG: 害而用匹夫之私譽家國無危亂不可得也由是觀之夫俗之好惡與事相詭唯明者能察之韓子曰君臣之利異故人臣莫忠故臣利立而主利滅此之謂異利者也息辯第三十六議曰夫人行皆著于迹以本行而徴其迹則善惡無所隱矣夫辯者焉能逃其詐乎中論曰水之寒也火之熱也金石之堅剛也彼數物未嘗有言而人莫不知其然者信著乎其體故曰使吾所行之信如彼數物誰其疑之今不信吾之所行而怨}
