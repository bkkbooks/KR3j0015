  - {type: variant, offset: 10277, length: 2, content: 變興, WYG: 愛我美疢也疢毒滋厚藥石猶生我此惡之而為美者也孫卿曰非我而當者吾師也是我而當者吾友也謟諛我者吾賊也商君曰貌言華也至言實也苦言藥也甘言疾也韓子曰為故人行私謂之不棄以公財分施謂之仁人輕禄重身謂之君子枉法曲親謂之有行棄官寵交謂之有俠離俗遁世謂之髙慤交争逆令謂之剛材行惠取衆謂之得人不棄者吏有姦也仁人者公財損也君子者人難使也有行者法制毁也有俠者官職曠也髙慤者人不事也剛材者令不行也得人者君上孤也此八者匹夫之私譽而人主之大敗也人主不察}
