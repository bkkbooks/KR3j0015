  - {type: variant, offset: 7284, length: 186, content: 與百工之事即得之矣秦皇大悅遣振男女三千人資之五穀種種百工而行徐福得平原廣澤止王不來於是百姓悲痛相思欲為亂者十家而六又使尉他踰五嶺攻百越尉他知中國勞極止王不來使人上書求女無夫家者三萬人以為士卒衣補秦皇可其萬五千人於是百姓離心瓦解欲為亂者十家而七客謂高皇帝曰時可矣高皇帝曰待之聖人當起東南閒不一年陳勝吳廣發矣高皇始於豐沛一唱天下不期而響應者不可勝數此所謂蹈瑕候閒因秦之亡而動者, WYG: 累辱}
