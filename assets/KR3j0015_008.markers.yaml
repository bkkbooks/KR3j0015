  - {type: variant, offset: 3724, length: 260, content: 衛國載其德孔子著之不為不孝議曰亂臣賊子自古有之生而楚言可為痛哭者胡亥是也夫大行不細謹大德不辭讓鄉曲各有宜而百官不同功故顧小而忘大後必有害狐疑猶豫後必有悔斷而敢行鬼神避之後有成功願子遂之也胡亥喟然歎曰今大行未發豈宜以此事干丞相哉高曰時乎時乎閒不及謀嬴糧躍馬唯恐後時胡亥既然高之言高乃謂丞相斯曰上崩賜長子書與喪俱會咸陽而立為嗣書未行今上崩未有知者事將何以斯曰安得亡國之言耶高曰君自料才能孰與蒙恬功高孰與蒙恬謀遠不失孰與蒙恬無怨於天下孰與蒙恬長子舊而信之孰與蒙恬斯曰此五者皆不及蒙恬而君責之何深也高曰高故內宮之厮役也幸得以刀筆, WYG: 訐}
