  - {type: variant, offset: 10233, length: 1, content: 將, WYG: 衆人法而以為上知之所難也則人無從識之矣故糟糠不厭者不待梁肉而飽短褐不完者不須文繡而好以是言之夫治世之事急者不得則緩者非務也今所治之政人間之事夫婦之所明知者不用而慕上知之所難論則其於人過逺矣是知微妙之言非人務也又曰世之所謂烈士者離衆獨行取異于人為恬淡之學而理恍惚之言臣以為恬淡無用之教也恍惚無法之言也夫人生必事君養親事君養親不可以恬淡之人必以言論忠信言論忠信不可以恍惚之言然則恍惚之言恬淡之學天下之惑術也又曰察士而後能知之不可以為智全也夫人未盡察也唯賢者而後能行之不可以為法也故尹文子曰凡有理而無益于治者君子不言有能而無益于事者君子不為故君子所言者不出于名法權術所為者不出于農稼}
