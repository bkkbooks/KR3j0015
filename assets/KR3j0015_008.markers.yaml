  - {type: variant, offset: 9658, length: 0, content: '', WYG: 而見疑者不可不察用無用第二十五古人有言曰得鳥者羅之一目然張一目之羅終不能得鳥矣鳥之所以能逺飛者六翮之力也然無衆毛之助則飛不能逺矣以是推之無用之}
  - {type: variant, offset: 9658, length: 0, content: '', krp: 而見疑者不可不察用無用第二十五古人有言曰得鳥者羅之一目然張一目之羅終不能得鳥矣鳥之所以能逺飛者六翮之力也然無衆毛之助則飛不能逺矣以是推之無用之}
  - {type: variant, offset: 9659, length: 0, content: '', WYG: 用也大矣故惠子謂莊子曰子言無用矣荘子曰知無用而始可與言用矣夫天地非不廣且大也人之所用容足耳然則削足而墊之至黄泉人尚有用乎惠子曰無用荘子曰然則無用之為用也亦明矣昔陳平智有餘而見疑周勃質樸忠而見信夫仁義不足相懷則智者以有餘見疑而樸者以不足取信矣漢徵處士樊英楊厚朝廷若待神明至竟無他異李固朱穆以為處士純盗虛名無益於用然而後進希之以成器世主禮之以得衆孔子稱舉逸民天下之人歸心焉燕昭尊郭隗以致劇樂齊桓禮九九之術所以招英儁之類也原其無用亦所以為用也而惑者忽不踐之地賒無用之功至乃誚謲逺術賤斥國華不亦過乎恩生怨第二十六𫝊稱諺曰非所怨勿怨寡人怨矣是知凡怨者不怨於所疏必怨於親宻何以明之髙子曰小弁小人之詩也孟子曰何以言之髙子曰怨孟子曰固哉髙叟之為詩也有越人於此關弓而射我我則談笑而道之無他䟽之也兄弟關弓而射我我則泣涕而道之無他戚之也然則小弁之怨親親也親親仁也小弁刺幽王也太子之傅作晉使韓簡子視秦師云師少於我鬭士倍我公曰何故對曰出因其資入用其寵饑食其粟三施而不報所以來也觀秦怒而來則知至恩必有至怨矣杜鄴說王音曰鄴聞人情恩深者其養謹愛至者其求謹夫戚而不見異親而不見殊戚近也殊謂異於䟽也孰謂無怨此棠棣角弓之所作也由此觀之故知怨也者親之也恩也者怨之所生也不可不察詭順第二十七趙子曰夫雲雷世屯瞻烏未定當此時也在君為君委質事人各為其主用職耳故髙祖賞季布之罪晉文嘉寺人之過雖前窘莫之怨也可謂通於大體矣昔晉文公初出亡獻公使寺人披攻之蒲城披斬其袪及反國郤呂畏偪将焚公宮而殺之寺人披請見公使讓之曰蒲城之役君命一宿汝即至其後余從狄君以田渭濵汝為惠公來求殺余命汝三宿汝中宿至雖有君命何其速也對曰臣謂君之入也其知之矣若猶未也又将及難君命無二古之制也除君之惡惟力是視蒲人狄人余何有焉今君即位其無蒲狄乎齊桓公置射鉤而使管仲相君若易之何辱命焉行者甚衆豈惟刑臣國君而讎匹夫懼者甚衆也公見之以難告得免呂郤之難韓子曰齊晉絶嗣不亦宜乎桓公能用管仲之功而忘射鉤之怨文公能聼寺人之言而棄斬袪之罪桓公文公能容二子也後世之君明不能及二公後世之臣賢不如二子以不忠之臣以事不明之君君不知則有子罕田常之刼知之則以管仲寺人自觧君必不誅而自以為有桓文之徳是臣其讎也有桓文而後世之君自以為賢而不惑則雖無後嗣不亦可乎陳軫與張儀俱事秦惠王惠王皆重之二人争寵儀惡軫於王曰軫重幣輕使秦楚之間将為交也今楚不善於秦而善於軫軫為楚厚為秦薄也軫欲去秦而之楚王何不聽之王乃召軫而問之軫曰臣願之楚臣出必故之楚且明臣為楚與不也昔楚有兩妻者王聞之乎王曰弗聞軫曰楚有兩妻者人挑其長者長者罵之挑其少者少者復挑之居無幾何有兩妻者死客為挑者曰為汝娶少者乎長者乎挑者曰娶長者客曰長者罵汝少者復挑汝汝何故娶長者挑者曰居人之所則欲其挑我為我之妻則欲其罵人今楚王明主昭陽賢相使軫為臣常以國情輸楚楚王将不留臣昭陽将不與臣從事矣臣何故之楚臣出必故之楚足以明臣為楚與不也軫出儀入問王曰軫果欲之楚不王曰然儀曰軫不為楚楚王何為欲之王復以儀言謂軫軫曰然王曰儀之言果信矣軫曰非獨儀知之行道之人盡知之矣子胥忠於君而天下皆爭以為臣曽參孝己愛於親而天下皆願以為子故賣僕妾不出閭巷售者良僕妾也出婦嫁於鄉曲者必善婦也今軫若不忠於君楚亦何以為臣乎忠且見棄軫不之楚将何歸乎王以其言為然遂厚待之惠王終相張儀軫遂奔楚張儀初惡陳軫於惠王曰軫猶善楚為求地甚力左爽謂陳軫曰儀善於魏王魏王甚信之公雖不說猶不聼也公不如以儀之言為質而得復楚軫曰善因使人以儀之言聞於楚王楚王喜欲復之軫乃奔楚韓信初為齊王時蒯通說信使三分天下信不聽後知漢畏其能乃與陳豨謀反事泄呂太后以計禽之方斬曰吾悔不聼蒯通之計乃為兒女子所詐豈非天哉髙祖自将伐陳豨於鉅鹿信稱疾不從欲於中起信舎人得罪於信信因欲殺之舎人弟上變告信欲反状於呂后呂后欲召恐其黨不就乃與蕭相國謀詐}
