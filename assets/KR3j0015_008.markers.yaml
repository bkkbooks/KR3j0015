  - {type: variant, offset: 335, length: 246, content: 曰商王罪殺不辜汝尚助余憂人今我何如太公曰王其脩身下賢惠人以觀天道天道無殃不可以先唱人道無災不可以先謀必見天殃又見人災乃可以謀與民同利同利相救同情相成同惡相助同好相趨無甲兵而勝無衡機而攻無渠壍而守利人者天下啟之害人者天下閉之天下非一人之天下也取天下若逐野獸得之而天下皆有分肉若同舟而濟皆同其利舟敗皆同其害然則皆有啟之無有閉之者矣無取於民者取民者也無取於國者取國者也無取於天下者取天下者也議曰沛公之起也虎嘯豐谷飲馬秦川財寶無所收婦女無所取降城則以侯其將得賂則以分其士而已無私焉所私者私於天下也故老, WYG: 問孔}
