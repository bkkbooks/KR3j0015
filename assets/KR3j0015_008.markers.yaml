  - {type: variant, offset: 10217, length: 0, content: '', WYG: 况其子乎欒黶死盈之善未能及人武子所施没矣}
  - {type: variant, offset: 10217, length: 0, content: '', krp: 况其子乎欒黶死盈之善未能及人武子所施没矣}
  - {type: variant, offset: 10218, length: 1, content: 況, WYG: 黶之怨實彰将於是乎在後九年晉滅欒氏由是黶雖汰虐以其父武子禍之徳身受其福盈雖賢智以其黶父之汰虐遂遇於然則祸之與福不在我之賢虐矣范曄曰陳平多隂謀而知其後必廢邴吉有隂徳夏侯勝識其當封及其}
  - {type: variant, offset: 10218, length: 1, content: 況, krp: 黶之怨實彰将於是乎在後九年晉滅欒氏由是黶雖汰虐以其父武子禍之徳身受其福盈雖賢智以其黶父之汰虐遂遇於然則祸之與福不在我之賢虐矣范曄曰陳平多隂謀而知其後必廢邴吉有隂徳夏侯勝識其當封及其}
  - {type: page-break, offset: 10220, content: '', id: KR3j0015_WYG_008-24a, image: WYG0849/WYG0849-0177a.png}
  - {type: variant, offset: 10221, length: 0, content: '', WYG: 終陳掌失侯而邴昌紹國雖有不類未可致詰其大致歸於有德矣袁安竇氏之間乃精帝室引義推正可謂王臣之烈及其理楚獄未嘗鞠人於賦罪其仁心足覃}
  - {type: variant, offset: 10221, length: 0, content: '', krp: 終陳掌失侯而邴昌紹國雖有不類未可致詰其大致歸於有德矣袁安竇氏之間乃精帝室引義推正可謂王臣之烈及其理楚獄未嘗鞠人於賦罪其仁心足覃}
