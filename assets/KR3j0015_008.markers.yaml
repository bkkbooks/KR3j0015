  - {type: variant, offset: 13691, length: 1, content: 苟, WYG: 所問者樂也所好者音也夫樂者與音相近而不同文侯曰敢問何如子夏曰夫古樂者天地順而四時當民有德而五穀昌疾疢不作而無妖祥此之謂大當然後聖人}
  - {type: variant, offset: 13691, length: 1, content: 苟, krp: 所問者樂也所好者音也夫樂者與音相近而不同文侯曰敢問何如子夏曰夫古樂者天地順而四時當民有德而五穀昌疾疢不作而無妖祥此之謂大當然後聖人}
  - {type: variant, offset: 13693, length: 2, content: 殘賊, WYG: 父子君臣以為之紀綱紀綱既正天下大定天下大定然後正六律和五聲絃歌詩頌此之謂德音德音之謂樂詩云莫其德音其德克明克明克類克長克君王此大邦克順克比比于文王其徳靡悔既受帝祉施于孫子此之謂也今君之所好者溺音乎鄭音好濫淫志也宋音燕安溺志也衞音趨數煩志也齊音傲僻驕志也四者皆淫于色而害于德是以祭祀弗用此音樂之異也董生曰古者未作樂之時乃用先王之樂宜于時者而以深入教化于人然後功成作樂樂其徳也故國風􅁋俗在于管絃樂書曰知聲而不知音者禽獸是也知音而不知樂者衆庶是也唯君子為能知樂是故審聲以知音審音以知樂審樂以知政而理道備矣此又聲音之異也或曰音與樂既聞命矣敢問儀與禮同乎對曰昔趙簡子問揖讓周旋之禮於子太叔太叔曰是儀也非禮也吉也聞諸先大夫子産曰夫禮天之經也經者道之常也地之義也義者利之宜也民}
  - {type: page-break, offset: 13693, content: '', id: KR3j0015_WYG_008-45a, image: WYG0849/WYG0849-0187c.png}
