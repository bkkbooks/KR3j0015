  - {type: variant, offset: 2908, length: 527, content: 為患之甚且夫救魯顯名也伐齊大利也以撫泗上諸侯誅暴齊以服晉利莫大焉名存亡魯實困強齊智者不疑也吳王曰善然吾實困越越王今苦身養士有報吳之心子待吾先伐越然後乃可子貢曰越之勁不過魯侯之強不過齊而王置齊而伐越則齊已平魯矣王方以存亡繼絕為名而畏強齊伐小越非勇也勇者不避難仁者不窮約智者不失時義者不絕世以立其義今存越示天下以仁救魯伐齊威加晉國諸侯相率而朝吳霸業成矣且王必惡越臣請東見越王令出兵以從此則實空越而名從諸侯以伐也吳王悅乃使子貢之越越王郊迎自為子貢御曰此蠻夷之國也大夫何足儼然辱臨之子貢曰今者吾說吳王以救魯伐齊其志欲之而畏越曰待吾伐越乃可如此則破越必矣且無報人之志而令人疑之拙也有報人之意使人知之殆也事未發而先聞危也三者舉事之大患也吳王為人猛暴群臣弗堪國家疲於數戰士卒不忍百姓怨上大臣內變子胥以諫死太宰嚭用事順君之過以安其私此王報吳之時也誠能發卒佐之以激其志重寶以悅其心卑辭以尊其禮則伐齊必矣此聖人之所謂屈節以期遠者也彼戰不勝王之福也若膝必以兵臨晉臣還北請見晉君共攻之其弱吳必也其銳兵盡於齊重甲困於晉而王乘其弊滅吳必矣越王許諾乃使大夫種以三千人助吳吳遂伐齊於邵陵果以兵臨晉遇以黃池越王襲吳之國遂滅吳孔子曰夫其亂齊存魯吾之始願也若乃強晉以疲吳使吳亡而越霸賜之說也美, WYG: ''}
