  body:
  - {type: variant, offset: 1, length: 0, content: '', WYG: 又據北夢瑣言云㽔梓州鹽亭人博學韜鈐長于經世夫婦俱有隠操不應辟召論王霸機權正變之術其}
  - {type: variant, offset: 1, length: 0, content: '', krp: 又據北夢瑣言云㽔梓州鹽亭人博學韜鈐長于經世夫婦俱有隠操不應辟召論王霸機權正變之術其}
  - {type: variant, offset: 2, length: 137, content: 九趙子曰詩云允文允武書稱乃武乃文孔子曰君子有文事必有武備傳曰天生五材民並用之廢一不可誰能去兵黃帝與蚩尤戰顓頊與共工爭堯伐驩兜舜伐有苗啟伐有扈湯伐有夏文王伐崇武王伐紂漢高有京索之戰光武興昆陽之師魏動官渡之軍晉舉平吳之役故呂氏春秋曰聖王有仁義之兵而無偃兵淮南子曰以廢不義而授有德, WYG: 十卷載隂謀家本缺今存}
