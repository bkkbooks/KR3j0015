凡氣初出如甑上氣勃勃上昇氣積為霧霧為陰陰氣結為虹蜺暈珥之屬凡氣不積不結散漫一十不能為災必和雜殺氣森森然疾起乃可論占常以平旦下晡日出沒時候之期內有風雨災不成也若風不旁勃旌旗暈暈順風而揚舉或向敵終日軍行有功勝候也凡軍上氣如山堤上林木不可與戰在吾軍大勝或如火光亦大勝或敵上白氣紛拂如樓緣以赤氣者兵勁不可擊在吾軍必大勝或敵上氣黃白厚潤而重者勿與戰或有雲廣如三匹帛前後大軍行好遙望軍上雲如鬭雞赤白相隨在氣中得天助不可擊兩軍相當上有氣如虵舉頭向敵者戰必勝凡軍營上有五色氣上與天連此應天之軍不可擊有赤黃氣干天亦不可攻或有雲如日月而赤氣繞之如日暈狀有光者所見之地大勝不可攻敵上氣如口狀其軍不可攻此皆勝氣也若逆風來應氣旁勃牙扛折陰不見日旌幡激揚敗候也若雲氣從敵所來終日不止軍不可出出則不利若風氣俱來此為敗候在急擊也凡敵上氣色如馬肝如死灰或類偃蓋皆敗徵也或黑氣如壞山墮軍上者軍必敗或軍上氣昏發連夜照人則軍事散亂或軍上氣半而一絕一敗再絕再敗在東發白者災深或軍上氣五色雜亂東西南北不定者其軍欲敗或軍上有赤氣炎炎降天將死眾亂或軍上有黑氣如牛馬形從氣霧中下漸人軍名曰天狗下食血敗軍也或有雲氣蓋道蒙蔽晝冥者釋炊不暇熟急去此皆敗候也若下輕其將妖怪並作眾口相惑當修德審令繕礪鋒甲勤誠誓士以避天怒然後復擇吉日祭牙旗具太牢之饌震鼓鐸之音誠心啟請以備天問觀其祥應以占吉兇若人馬喜躍旌旗皆前指高陵金鐸之聲揚以清鞞鼓之音宛以鳴此得神明之助持以安於眾心乃可用矣雖云任賢使能則不占而事利令明法審則不筮而計成封功賞勞則不禱而福從共苦同甘則犯逆而功就然而臨機制用有五助焉一曰助謀二曰助勢三曰助怯四曰助疑五曰助地此五者助勝之術故曰知地知天勝乃可全不可不審察也孫子曰三曰地利地利者遠近險易廣狹死生也故不知山林險阻沮澤之形者不能行軍不用鄉導不能得地利故用兵有散地有輕地有爭地有交地有衢地有重地有汜地有圍地有死地九地之名諸侯自戰其地為散地戰其境內之地士卒意不專有自潰之心也故經曰散地吾將一其志也入人之地而不深者為輕地入人之地未深士卒意尚未專而輕走也故經曰輕地吾將使之屬也我得則利彼得亦利者為爭地可以少勝眾弱勝強謂山水阨口有險固之利兩敵所爭故經曰爭地吾將趣其後也我可以往彼可以來為交地道上相交錯平地有數道往來交通無可絕也故經曰交地吾將固其結諸侯之地三屬我與敵相對而旁有他國也先至而得天下之眾者為衢地先至其地可交結諸侯之眾為助也故經曰衢地吾將謹其守也入人難返之地深背倍城邑多者為重地遠去已城廓深入敵地專心意故謂之重地故經曰重地吾將繼其食也行山林險阻沮澤凡難行之道者為汜地汜浸洳之地故經曰汜地吾將進其途也所由入者隘所以歸者迂彼寡可以擊吾眾者為圍地所欲從入阨險欲歸道遠也持久則糧乏故敵可以少擊吾眾者為圍地故經曰圍地吾將塞其闕也疾戰則存不疾則亡者為死地前有高山後有大水進則不得退復有礙又糧乏絕故為死地在死地者當及士卒尚飽強志殊死故可以俱死故經曰死地吾將示之以不活也是故散地無戰士卒顧家不可以戰輕地則無止入敵地淺士意尚未堅不可以遇敵自當堅其心也爭地則無攻三道攻當先主地利也先得其地者不可攻也交地則無絕相及屬也交地者俱可進退不以兵絕之衢地則合交佐諸侯也當交結于諸侯重地則掠蓄糧食也入深士卒堅固則可掠取財物汜地則行不可止也圍地則謀擊其謀也則當權謀奇譎可以免難死地則戰殊死戰也未戰先勵之曰無慮愚戇用軍不明乃隨圍阨之地益士大夫之憂也皆將之罪也今日之事在此一舉若不用力身當膏野草為蟲獸食妻子無所求索剋則身榮賞祿在焉可不勉哉又有六地有通有挂有支有隘有險有遠六地名也我可以往彼可以來曰通謂俱在平陵往來通利也居通地先處其高陽利糧道以戰則利寧致於人無致於人已先處高地分為屯守於歸來之路不使敵絕已糧道也可以往難以反曰挂挂相挂牽也挂形曰敵無備出而勝之敵有備出而不勝難以反不利敵無備而出攻之勝可也有備不得勝之則難還反也我出而不利彼出而不利曰支支久也俱不便久相持也支形曰敵雖利我我無出引而去也令敵半出而擊之利利我者佯背我去無出逐待其引而擊之可敗也隘形曰我先居之必盈之而待敵盈滿也以兵陣滿院形名使敵不得進退若敵先居之盈而勿從也不盈而從之隘形者兩山之間通谷也敵怒勢不饒我也居之必前齊阨口陣而守之以奇也敵即先居此地齊口陣勿從也即半隘陣者從而與敵其此利也險形曰我先居之必居高陽以待敵居高陽之地以待敵人敵人從其下陰來擊之勝也若敵先居則引而去之勿從也地險先不可致於人也夫遠形鉤勢難以挑戰而不利挑近敵也遠形去國遠也地鉤等無獨便利先挑之戰不利凡此六者地之道也皆將之至任不可不察故曰深草蓊穢者所以遁逃也深谷阻險者所以止禦車騎也隘塞山林者所以少擊眾也眾少可以夜擊敵也沛澤杳冥者所以匿其形也丈五之溝漸車之水漸浸也音子廉反山林石徑涇川丘阜涇川常流之川草木所在此步兵之地車騎二不當一丘陵漫衍相屬漫衍猶聯延也屬續也音之欲反平原廣野此車騎之地步兵十不當一平原相遠遠離也仰高臨下此弓弩之地短兵十不當一兩陣相近平地淺草可前可後此長戟之地劍楯三不當一雚葦竹簫簫蒿也草木蒙籠林葉茂接此矛鋋之地長戟二不當一曲道相伏險扼相簿此劍楯之地弓弩三不當一故曰地形者兵之助又曰用兵之道地利為寶趙奢趨山秦師所以覆敗韓信背水漢兵由是克勝此用地利之略也經曰以水佐攻者強以火佐攻者明是知水火者兵之助也故火攻有五一曰火人敵旁近草因風燒之二曰火積燒其積蓄三曰火輜燒其輜重四曰火庫當使閒人之敵營燒其兵庫五曰火燧燧墮也以火墮敵人營中也火頭之法以鐵盈火著箭頭強弩射敵之營中燒絕糧道也行火必有因因奸人也煙火素具發火有時起火有日時者天之燥也日者宿在箕壁參軫也凡此四宿者風起之日也蕭世誠云春丙丁夏戊己秋壬癸冬甲乙此日有疾風猛雨也居勘太乙中有飛鳥十精如風雨期五子元運式各侯其時可用火故曰以火佐攻者明何以言之昔揚埏與桂陽賊相會埏以皮作大排囊以石灰內囊中置車上作火隧繫馬尾因從上風鼓排囊吹灰群賊眯目因燒馬尾奔突賊陣眾賊奔潰此用火之勢也殷浩北伐長史江逌取數百雞以長繩連之腳皆繫火一時驅放群雞飛散羌營營皆燃因擊之姚襄退走此用火之勢李陵在大澤草中虜從上風縱火陵從下風縱火以此火解火勢也吾聞敵燒門恐火滅門開當更積薪助火使火勢不滅亦解火之法也太公曰強弩長兵所以踰水戰孫子曰水可以絕謂灌城也又曰絕水必遠水引敵使渡也客絕水而來迎之於水內令敵半渡而擊之利欲戰無附於水而迎客也謂處水上之軍故曰以水佐攻者強何以言之昔韓信定臨淄走齊王田廣楚使龍且來救齊齊王廣龍且並并軍與信合戰人或說龍且曰漢兵遠鬭窮戰其鋒不可當齊楚自居其地戰兵易敗散不如深壁令齊王使其信臣招所亡城城聞其王在楚來救必反漢漢兵二千里客居齊城皆反之其勢無所得食可無戰而降也龍且曰吾平生知韓信為人易與耳且夫不戰而降之吾何功遂戰敗吾聞古之所謂善戰者勝易勝者敗善者之勝也無知名無勇功故其戰勝不武不武者其所錯勝勝已敗者也龍且不用客之計欲求赫赫之功昧矣夾濰音唯水陣韓信乃夜令人為萬餘囊盛沙壅水上流引軍半渡擊龍且佯不勝還走龍且果喜曰固知信怯也乘追信渡水信使決壅囊水大至龍且軍太半不得渡即急擊之殺龍且龍且水軍東散走此反半渡之勢吾聞兵法絕水必遠水令敵半渡而擊之利韓信半渡軍佯入害地令龍且擊之然後決壅水此所謂雜于利而務可神雜於害而患可解也皆反兵而用兵法微哉微哉盧綰佐彭越攻下梁地十餘城項羽聞之謂其大司馬曹咎曰謹守城皋即漢挑戰慎勿與戰漢果挑楚軍楚軍不出使人辱之孫子曰廉潔可辱也大司馬怒渡汜水音凡卒半渡漢擊大破之此欲戰無附於水勢也故知水火之變可以制勝其來久矣秦人毒涇上流晉軍多死荊王燒楚積聚項氏以擒曹公決泗於下邳呂布就戮黃蓋火攻於赤壁魏祖奔衄此將之至任蓋軍中尢急者矣不可不察周禮曰巡國傳諜者反閒也呂望云閒搆飛言聚為一卒是知用閒之道非一日也凡有白氣群行徘徊結陣來得為他國人來欲圖人不可應視其所往隨而擊之可得也或有黑氣臨我軍上如車輪行敵人深入謀亂吾國臣或有黑氣遊行中含五色臨我軍上敵必謀合諸侯而伐吾國諸侯反謀軍軍自敗或有黑氣如幢出於營中上黑下黃敵欲來求戰無誠實言信相反九日內必覺備之吉或日月陰沈無光不雨或十日晝夜不見日月名曰蒙臣謀主故曰久陰不與臣謀主也故閒有五閒有因閒有內閒有反閒有生閒有死閒五閒俱起莫知其道因閒者因其鄉人而用之者也言敵鄉邑之人知敵表裏虛實可使伺候聽察通辭致言故曰因之用賞祿為先也內閒者因其官人而用之者也因其在官失職者若刑誅之子孫與受罰之家也因其有隙就而用之反閒者因敵閒而用之者也曹公曰敵使閒來視我我知之因厚賂重許反使為我閒故曰反閒蕭世誠曰言敵使人來候我我佯不知而示以虛事前却期會使歸相語故曰反閒也生間者反報者也擇已有賢才智謀能自開通於敵之親貴察其動靜知其事計所為己知其實還報故曰生閒也死閒者為誑事於外令吾閒知之而待於敵閒者也作詐誑之事於外佯漏泄之使吾閒知之吾閒至敵中為敵所得必以誑事輸敵敵從而備之吾所行不然也閒則死矣又一云敵閒來在營閒我誑事而持歸然皆非吾所圖也二閒皆不能知幽隱故曰死閒蕭世誠云所獲敵人及已軍士有重罪繫者故為免相敕勿泄佯不祕密令拘者竊聞之因綏之使亡亡必歸敵以所聞告之敵必信焉往必不閒故曰死閒得也昔漢西域都護班超初為將兵長史悉發諸國步騎二萬五千擊莎車莎車求救龜茲龜茲王遣左將軍發溫宿姑墨尉頭合五萬人助之超召曲及于闐疎勒王議曰兵少不敵計莫如各解散去于闐從此東長史亦從此西歸夜半聞鼓聲便發眾皆以為然乃陰緩擒得生口生口歸以超言告龜茲龜茲聞之喜使左將軍將萬騎於西界遮超溫宿王將八千騎於東界遮于闐王人定後超密令諸司馬勒兵勵士至雞鳴馳赴莎車軍營掩覆之胡皆驚走斬首五千級莎車遂降又耿弇討張步步聞之乃使其大將費邑軍歷下又分兵屯祝阿別於太山鐘城列營數十以待弇昔劉備東下與孫權交戰魏文帝聞備樹柵連營七百餘里謂群臣曰備不曉兵權豈有七百里營可以拒敵者乎包原隰險阻而為軍者為敵所禽此兵忌也後七日權破備書到今張步列營數十緩急不能相救又一軍潰則眾心難固此黥布所以走荊王也步非計也敗其宜也弇渡河先擊祝阿拔之故開圍一角令其眾得奔鐘城鐘城人聞祝阿已潰大懼遂空壁亡去孫子曰三軍可奪氣將軍可奪心耿弇開祝阿之圍令其眾奔鐘城以震怖之亦奪氣奪心計也炒矣夫費邑分遣其弟敢守巨里弇進兵先脅巨里多伐樹木揚言填塞坑壍數日有降者言邑聞弇欲攻巨里謀來救之弇乃嚴令軍中趣治攻具後三日當悉攻巨里陰緩生口令得亡歸歸者以弇期告邑邑至日果自將來救之弇喜謂諸將曰吾所修攻具者欲誘致邑耳今來適吾所求也即分三千人守巨里自引精兵止崗阪乘高合戰大破之臨陣斬邑或問孫子曰敵眾而整將來待之若何曰先奪其所愛則聽矣又曰善戰者致人而不致於人弇揚言攻巨里也亦奪其所愛令自致之計也此用因閒之勢也晉時益州牧羅尚遣隗伯攻李雄於郫城迭有勝負雄乃募武都人朴泰鞭之見血使譎羅尚欲為內應以火為期尚信之悉出精兵遣隗伯等率領從泰李雄先使李驤於道設伏泰以長梯倚城而舉火伯軍見火起皆爭緣梯泰又以繩汲上尚軍百餘人皆斬之雄因放兵內外擊之大破尚軍此用內間之勢也鄭武公欲伐胡先以其子妻胡因問群臣曰我欲用兵誰可伐者大夫關期思曰胡可伐武公怒而戮之曰胡兄弟之國子言伐之何也胡君聞之以鄭為親已而不備鄭鄭襲胡取之漢使酈生說齊王田橫橫罷兵與酈生縱酒漢將韓信因其無備襲齊破之田橫烹酈生酈生偶成韓信死閒唐李靖伐匈奴以唐儉先和親而已以兵乘其不備破之此李靖以唐儉為死閒也此用死閒之勢也陳平以金縱反閒於楚軍閒范增楚王疑之此用反閒者也事具霸紀故知三軍之親莫親於閒賞莫厚於閒事莫密於閒非聖智莫能用閒非密微莫能得閒之實此三軍之要唯賢將之所留意也萬機論曰雖有百萬之師臨時吞敵在將也吳子曰凡人之論將恆觀之於勇勇之於將乃萬分之一耳故六韜曰將不仁則三軍不親將不勇則三軍不為動孫子曰將者勇智仁信必也勇則不可犯智則不可亂仁則愛人信則不欺人必則無二心此所謂五才者也三軍之眾百萬之師張設輕重在於一人謂之氣機道峽路險名山大塞十人所守千人不過是謂地機善行閒諜分散其眾使君臣相怨是謂事機車堅舟利士馬閉習是謂力機此所謂四機者也夫將可樂而不可憂謀可深而不可疑將憂則內疑將有憂色則內外相疑故曰不相信也謀疑則敵國奮多疑則計亂亂則令敵國奮威以此征伐則可致亂故將能清能靜廉財曰清不擾曰靜老子曰重為輕根靜為躁君也能平能整能受諫能聽訟能納人受賢於群英之中若越納范蠡齊納甯戚之類也能採善言能知國俗能圖山川能栽阨難險難阨皆悉明之能制軍權危者安之懼者懽之叛者還之將有不合去者慰誘還之若蕭何追韓信冤者原之訴者察之卑者貴之士卒苦卑賤者貴之昔吳起下與士卒同衣食是也強者抑之敵者殘之卑中有賤而敵貴者亂上下之禮殘殺之貪者豐之懸賞以豐其心所以使貪欲者使之臨敵將戰有欲立功名有欲利敵人者皆許而使之所謂使勇使貪畏者隱之士卒有所畏懼者隱蔽於後勿使為軍鋒軍敗由鋒怯謀者近之讒者覆之有讒鬭者覆信之毀者復之官職有毀廢者則修而復之反者廢之橫者挫之服者活之首服罪者活之降者說之說舍獲城者割之賞功臣也獲地者裂之賜功榮者獲國者守之得其國必封賢以守之昔吳伐越得而不守所以終敗也獲阨塞之獲難屯之獲財散之敵動伺之敵強下之敵陣強則下之勿與戰若齊師伐魯鼓之曹劌不動三鼓破齊下之敵淩假之敵之威勢淩吾而來宜持重以待之勿與戰楚淩漠求戰一決漢祖知弱不許之是也敵暴安之敵人為暴虐之行則安之勸之所以怒我眾也昔燕伐齊田單不下燕師掘齊人冢墓田單安勸之敵勃義之敵為勃亂之事則隨有義以待之彼勃我義故剋之敵睦攜之順舉挫之舉順以挫逆也因勢破之放言過之放過惡言以誣詐敵人以怒已眾也四網羅之此為將之道也故將拒諫則英雄散策不從則謀士叛善惡同則功臣倦賞罰不明善惡無異則有功之臣皆懈倦也將專已則下歸咎專已自任不與下謀眾皆歸罪於將而責之將自臧則下少功臧善也將自伐勳忘下自用者故曰少功也將受讒則下有離心將貪財則奸不禁上貪則下盜也將內顧則士卒淫內顧思妻妾也將有一則眾不服有二則軍無試試法也有三則軍乖背有四則禍及國軍誌曰將謀欲密士眾欲一將眾如一體也攻敵欲疾將謀密則奸心閉士眾一則群心結結如一也攻敵疾則詐不及設軍有此三者則計不奪將謀泄則軍無勢以外闚內則禍不制窺見也謀泄則外見已情之虛實其禍不可制也財入營則眾奸會凡為軍使外人以財貨入營內則奸謀奄集其中心將有此三者軍必敗將無慮則謀士去將無慮不能從謀故去之將無勇則吏士恐將怯則下無所恃故恐也將遷怒則軍士懼慮也謀也將之所重勇也怒也將之所用意故曰必死可殺也必生可慮也忿速可侮也廉潔可辱也愛人可煩也此五者將軍之過用兵之災故凡戰之要先占其將而察其才因刑用權則不勞而功興也其將愚而信人可謀而詐貪而忽名可貨而賂輕變可勞而困上富而驕下貧而桀可離而閒將怠士懈可潛而襲智而心緩者可追也勇而輕死者可暴也急而心速者可誘也貪而喜利者可襲也可遺也仁而不忍於人者可勞也信而喜信於人者可誑也廉潔而不愛人者可侮也剛毅而自用者可事也懦心喜用於人者可使人欺也此皆用兵之要為將之略也夫兩國治戎交和而合刀以冥冥決事必先探於敵情故孫子曰勝兵先勝而後戰又曰策之而知得失之計候之而知動靜之理因形而作勝於眾用兵之要也若欲先知敵將當令賤而勇者將輕銳以當之觀敵之來一起一坐其政以理其追北佯為不及其見利佯為不知如此者將必有智勿與輕戰凡敵上氣黃白潤澤者將有威德或軍上氣發漸漸如雲變作山形將有深謀或敵有氣外黑中赤在前者將精悍皆不可擊凡氣上與天連軍中將賢良凡氣如龍如虎在殺中或如火煙之形或如火光之狀或如山林或如塵埃頭大而卑或氣紫黑如門上樓或如白粉沸皆猛將之氣也若其眾讙旗亂其卒自止自行其兵或縱或橫其追北恐不及見利恐不得如此者將必無謀雖眾可獲凡敵上氣青而疎散者將怯弱前大而後小將性不明也故曰敵近而靜者恃其險也敵遠而挑人者欲人之進也眾樹動者來也眾草多障者疑也稠草中多障蔽者必逃去恐吾追及多作障蔽使吾疑其閒有伏兵也鳥起者伏也凡軍上氣渾渾圓長赤氣在其中或有氣如赤杵在黑雲中皆下有伏兵或兩軍相當有赤氣在軍前後左右者有伏兵隨氣所在防之或有雲絞絞綿綿此以軍騎為伏兵或雲如布席之狀此以步卒為伏兵或有雲如山岳在外為伏兵不可不審察也禽駭者覆也塵卑而廣者徒來也散而條遠者薪來也少而往來者營軍也少少也辭卑而益備者進也敵增備也辭強而進驅者退也無約而請和者謀也半進半退者誘也杖而立者饑也汲而先飲者渴也見利不進者勞也鳥集者虛也夜呼者恐也軍擾者將不重也旗動者亂也吏怒者倦也粟馬食肉軍無懸湩音唾一簟之食也不及其舍者窮寇也淳淳翕翕徐言入人者失其眾也此將失其眾之意也數賞者害也數罰者困也數顧者失其群也來委謝者欲休息也兵怒而相近久而不合又不相去必謹察之敵來新到行陣未定可擊也陣雖定人馬未食可擊也涉長道後行未息可擊也行坂涉險半隱半出可擊也涉水半渡可擊也險道狹路可擊也旌旗亂動可擊也陣數動移可擊也人馬數顧可擊也凡見此者擊之而勿疑然兵者詭道也能而示之不能用而示之不用故匈奴示弱漢祖有平城之圍石勒藏鋒王浚有幽州之陷即其效也可不慎哉孫子曰勇怯勢也強弱形也又曰水之弱至於漂石者勢也何以明之昔曹公征張魯定漢中劉曄說曰明公以步卒五千討誅董卓北破袁紹南征劉表九州百郡十并其八威震天下勢漝海外今舉漢中蜀人望風破膽失守推此而前蜀可傳檄而定也劉備人傑也有智而遲得蜀日淺蜀人未恃今破漢中蜀人震恐其勢自傾以公之神明因其傾而壓之烏甲反無不剋也若小緩之諸葛亮明於理而為相關羽張飛勇冠三軍而為將蜀人既定據險守要則不可犯也今不取必為後憂曹公不從居七日蜀降者說蜀中一日數十驚備斬之而不能禁也曹公延問曄曰今尚可擊否曄曰今已小定未可擊也又太祖征呂布至下邳布敗固守城攻不拔太祖欲還荀攸曰呂布勇而無謀今三軍皆北其銳氣衰三軍以將為主主衰則軍無奮意夫陳宮有智而遲今及布氣之未復宮謀之未定進急攻之布可收也乃引沂泗灌城城潰生擒布以此觀之當是時雖諸葛之智陳宮之謀呂布之勇關張之勁無所用矣此謂勇怯勢也強弱形也故兵有三勢夫兵有三勢一曰氣勢二曰地勢三曰因勢若將勇輕敵士卒樂戰三軍之眾志勵青雲氣等飄風聲如雷霆此所謂氣勢也若關山狹路大阜深澗龍蛇蟠磴羊腸狗門一夫守險干人不過此所謂地勢也若因敵怠役饑渴風波驚擾將吏縱橫前營未舍後軍夾涉所謂因勢者也善戰者恆求之於勢勢之來也食其緩頰下齊七十餘城謝石渡淝摧秦百萬之眾勢之去也項羽有拔山之力空泣虞姬田橫有負海之強終然刎頸故曰戰勝之威人百其倍敗兵之卒沒世不復永挫折也言人氣傷雖有百萬之眾無益於用也故水之弱至於漂石此勢略之要也孫子曰攻心為上攻城為下何以明之戰國時有說齊王曰凡伐國之道攻心為上攻城為下心勝為上兵勝為下是故聖人之伐國攻敵也務在先服其心何謂攻其心絕其所恃是謂攻其心也今秦之所恃為心者燕趙也當收燕趙之權今說燕趙之君勿虛言空辭必將以實利以迥其心所謂攻其心者也沛公西入武關欲以二萬人擊秦嶢音堯關下軍張良曰秦兵尚強未可輕也臣聞其將屠子賈豎易動以利願沛公且留壁使人先行為五萬人具食益張旗幟諸山之上為疑兵令酈食其持重寶秦將貪而忽名可貨以賂秦等果欲連和俱西襲咸陽沛公欲聽之良曰此獨其將欲叛士卒恐不從不從必危不如因其懈擊之沛公乃引兵擊秦軍大破之諸葛亮擒孟獲七縱七擒之南方終亮之世不敢背叛又四面楚歌而項羽走劉琨吹葭胡人散攻心之計非一途也此攻心者之孫子曰善用兵者使交不得合何以明之昔楚莫敖將盟貳軫貳軫二國名也鄖人軍於蒲騷將以隨絞州蓼伐楚師莫敖患之鬭廉曰鄖人軍於其郊必不誡且日虞四邑之至虞度也四邑隨絞州蓼也君次於郊郢以禦四邑我以銳師宵加於鄖鄖有虛心而恃其城莫有鬭志若敗鄖師四邑必離莫敖從之遂敗鄖師於蒲騷漢宜帝時先零與罕幵羌解仇合黨為寇帝命趙充國先誅罕幵充國守便宜不從上書曰先零羌虜欲為背叛故與罕幵解仇然其私心不能亡恐漢兵至而罕幵背之也臣愚以為其計常欲赴罕幵之急以堅其約先擊罕羌先零必助之今虜馬肥糧方饒擊之恐不能傷害適使先零得施德於罕羌也堅其約合其黨虜交堅黨合誅之用力數倍臣恐國家憂累由此十數年不一二歲而已先誅先零則罕開之屬不煩兵服矣帝從之果如策魏太祖初伐關中賊每一部到太祖輒喜賊破之後諸將問其故太祖曰關中道遠若各依險阻征之不一二年不可定也今皆來集眾雖多莫能相服軍無適主一舉可滅為攻差易吾是以喜語曰連雞不俱棲可離而解曹公得之矣此伐交者也孫子曰安能動之又曰攻其所必趨何以明之昔楚子圍宋宋公使如晉告急晉狐偃曰楚始得曹而新婚於衛若伐曹衛楚必救之則齊宋免矣前年楚戊穀以逼齊果如是計魏伐趙趙急請救於齊齊威王以田忌為將以孫臏為師居輜車中為計謀田忌欲引兵之趙孫子曰夫解雜亂紛糾者不控拳救鬭者不摶撠批亢擣虛形格勢禁則自為解耳今梁趙相攻輕兵銳卒必竭於外老弱疲於內君不若引兵疾走大梁據其街路衝其方虛彼必釋趙而自救是我一舉解趙之圍而收弊於魏也田忌從之魏果去邯鄲又曹操為東郡太守東郡今魏州是治東武陽軍頓丘黑山賊黑山今衛州界也于毒等攻東武陽太祖欲引兵西入山攻毒本屯諸將皆以為當還自救曹操曰昔孫臏救趙而攻魏耿弇欲走西安攻臨菑使賊聞我西而還則武陽自解不還我能破虜家虜不能拔武陽必矣乃行毒聞之果棄武陽還曹操要擊大破之初關羽圍樊襄陽曹操以漢帝在許近賊欲徙都司馬宣王及蔣濟說曹操曰劉備孫權外親內疎關羽得志權必不願也可遣人勸躡其後許割江南以封權則樊圍自解曹操從之羽遂見擒此言攻其所愛則動矣是以善戰者無知名無勇功不爭白刃之前不備已失之後此之謂矣語曰投兵散地則六親不能相保同舟而濟胡越何患乎異心孫子曰善用兵者譬如率然何以明之漢宣帝時先零為寇帝命趙充國征之引兵至先零所在虜久屯聚解弛望見大軍棄車重欲渡湟水道阨狹充國徐行驅之或曰逐利行速充國曰此窮寇不可追也緩之則走不顧急之則還致死諸將校皆曰善虜果赴水溺死者數百於是破之袁尚既敗遂奔遼東眾有數千初遼東太守公孫康恃遠不服曹公既破烏丸或說公遂征之尚兄弟可擒也公曰吾方使康斬送尚熙首不煩兵矣公引兵還康果斬送尚熙傳其首諸將或問曰公還而康斬尚熙何也公曰彼素畏尚熙其急之則并力緩之則自相圖其勢然也曹公征張繡荀攸曰繡與劉表相恃為強然鏽以遊軍仰食於表表不能供也其勢必離不如緩軍以待之可誘而致也若急之則必相救曹操不從進至穰與繡戰表果救之軍不利矣故孫子曰善用兵者譬如率然率然者常山之虵擊其頭則尾至擊其尾則首至擊其中則首尾俱至或曰敢問可使如率然乎孫子曰可矣夫吳人之與越人相惡當其同舟而濟則相救如左右手是故放馬埋輪不足恃也齊勇若一政之道也此之謂矣孫子曰善用兵者先為不可勝以待敵之可勝何以明之梁州賊王國圍陳倉乃拜皇甫嵩董卓各率二萬人拒之卓欲速進赴陳倉嵩不聽卓曰智者不待時勇者不留決速戰則城全不救則城滅全滅之勢在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝在此可勝在彼范蠡曰時不至不可強生事不究不可強成此之謂也彼守不足我攻有餘有餘者動於九天之上不足者陷於九地之下今陳倉雖小城守固備非九地之陷也王國雖強而攻我之所不救非九天之勢也夫勢非九天攻者受害陷非九地守者不拔國今已陷受害之地而陳倉保不拔之城我可不煩兵動眾而取全勝之功將何救焉遂不聽王國圍陳倉自冬迄春八十餘日城堅守固竟不能拔賊眾疲弊果自解去嵩進兵擊之卓曰不可兵法窮寇勿迫歸眾勿追今吾追國是迫歸眾追窮寇也困獸猶鬭蜂蠆有毒況大眾乎嵩曰不然吾前不擊避其銳也賓而備之強而避之銳卒勿攻兵之機也今而擊之待其衰也所擊疲師非歸師也國眾且走莫有鬭志以整擊亂非窮寇也遂獨進兵擊之使卓為後拒連戰大破國走而死卓大慚恨孫子曰怒而撓之言待其衰也又曰卑而驕之言敵怒而進兵則當外示屈弱以高其志待其歸隨而擊之又曰引而勞之言因其進退以觀其變然後攻其不備出其不意此兵家之勝不可傳也青州黃巾眾百餘萬八東平劉岱欲擊之鮑永諫曰今賊眾百萬百姓皆震恐士卒無鬭志不可敵也觀賊眾群輩相隨軍無輜重唯以抄掠為資今若畜士眾之力先為固守彼欲戰不得攻則不能其勢必離散然後選精銳據其要害擊之可破也岱不從果為賊所敗晉代王開攻燕鄴城慕容德拒戰代師敗績德又欲攻之別駕韓譚進曰昔漢高祖云吾寧鬭智不能鬭力是以古人先勝廟堂然後攻戰今代不可擊者四燕不宜動者三代懸軍遠入利在野戰一不可擊也深適近畿頓兵死地二不可擊也前鋒既敗後軍方固三不可擊也彼眾我寡四不可擊也官軍自戰其地一不宜動動而不勝眾心難固二不宜動湟池未修敵來無備三不宜動此皆兵機也深溝高壘以逸待勞彼千里饋糧野無所掠久則三軍縻費攻則眾旅多弊師老釁生詳而圖之可以捷也德曰韓別駕之言良平之策也孫子曰以遠待近以逸待勞以飽待饑此治力者此先勝而後戰者也孫子曰圍師必闕何以明之黃巾賊韓忠據宛朱儁張超圍之結壘起土山以臨城因鳴鼓攻其西南賊悉眾赴之乃掩其東北乘城而入忠退保小城乞降諸將欲聽之儁曰兵有形同而勢異者昔秦項之際民無定主故賞附以勸來耳今海內一統唯黃巾造寇納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱敵長寇非良計也因急攻之不克儁登土山顧謂張超曰吾知之矣賊今外圍周固連營逼急乞降不受欲出不得所以死戰也萬人一心猶不可當況十萬乎其害甚矣不如撤圍并兵入城忠見解圍勢必自出出則意散易破之道也既而解圍忠果出戰遂破忠等魏太祖圍壺關下令曰城拔皆坑之連月不下曹仁言於太祖曰圍城必示之門所以開其生路也今公許之必死將人人自為守且城固而糧多攻之則士卒傷守則引日持久今頓兵堅城之下以攻必死之虜非良計也太祖從之城降凡降人之氣如人十十五五皆叉手低頭又云相向或有氣上黃下白名曰善氣所臨之軍欲求和退凡城中有白氣如旗者不可拔或有黃雲臨城有大喜慶或有青色如牛頭觸人者城不可屠或城中氣出東方其色黃此天鉞也不可伐伐者死或城上氣如火煙主人欲出戰其氣無極者不可攻或有氣如杵形從城中向外者內兵欲突出主人勝不可攻或城上有雲分為兩彗狀者攻不可得或有濛氣繞城不入者外兵不得入凡攻城有諸氣從城中出入吾軍上者敵氣也凡攻城圍邑過旬不雷雨者城有輔疾去之勿攻也此皆勝氣也凡攻城圍邑赤氣在城上黃氣四面繞之城中有大將死城降或城上有赤氣如飛鳥急攻之可破或有氣出入者人欲逃或有氣如灰氣出而覆其軍上者士多病城屠或城上無雲氣士卒散或城營上有赤氣如眾人頭下多死喪流血攻城有白氣繞城而入者急攻可得若有屈虹從城外入城者三日內城屠此皆敗氣也此圍師之道也孫子曰善動敵者形之敵必從之何以明之魏與趙攻韓齊田忌為將而救之直走大梁魏將龐涓去韓而歸齊軍已過而西矣孫臏謂田忌曰被三晉之兵素悍勇而輕齊齊號為怯善用兵者因其勢而利導之兵法曰百里而趨利者蹶上將軍使齊軍入魏地為十萬竈明日為五萬竈明日為二萬竈涓喜曰吾固知齊卒怯也入吾地三日士卒亡已過半乃棄其步兵與輕銳倍日并行逐之臏度其暮至馬陵道狹而多險可伏兵乃斫大樹白書之曰龐涓死此樹下令善射者萬弩夾道而伏期曰見火舉而發涓夜至斫木下見白書乃鑽火燭之讀書齊軍萬弩俱發魏軍大亂涓乃自剄曰果成豎子之名也虞詡為武都郡羌率眾遮詡於陳倉崤谷詡令吏士各作兩竈日增倍之羌不敢逼或問曰孫子減竈而君增之兵法日行三十里以戒不虞今且行二百里何也詡曰虜眾既多吾徐行則易為所及疾行則彼不測之且虜見吾竈多謂群兵來至孫子見弱吾示強勢不同也昔王濬在蜀作虹欲伐吳預流柹江中以威之及至唐將李清欲伐荊州襲蕭銳乃投柹於江中使蕭銳見之靖尋以兵隨柹而下蕭銳不備遂虜之平荊州夫兵法變通不可執一諸君得之矣故曰料敵在心察機在目因形而作勝於眾善之善者矣此變通之理也孫子曰陷之死地而後生投之亡地而後存又曰雜於利而務可伸雜於害而患可解何以明之漢將韓信攻趙趙盛兵井陘口信乃引兵未至井陘口三十里止舍夜半傳發選輕騎二千人持一赤幟從閒道萆山音蔽而望見趙軍誡之曰趙見我走必空壁逐我若疾入趙壁拔趙幟立漢赤幟令其裨將傅餐曰今日破趙會食諸將皆莫信佯應曰諾信謂軍吏曰趙已先據便地為壁且彼未見我大將旗鼓未肯擊前行恐吾至阻險而還信乃使萬人行出倍水陣趙軍望見大笑之太公曰智與眾同非人師也伎與眾同非國士也動莫神於不意勝莫大於不, krp: ''}
