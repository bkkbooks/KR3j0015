  - {type: variant, offset: 15168, length: 1868, content: 使趙軍識韓信之勢安得敗哉故笑之而敗也平旦信建大將之旗鼓鼓行出井陘口趙開壁擊之大戰良久於是信與張耳棄旗鼓走水上水上軍開壁入之復疾戰趙空壁爭漢鼓旗逐韓信張耳韓信張耳已入水上軍軍皆殊死戰不可敗信所出奇兵二千騎共候趙空壁逐利則馳入趙壁皆拔趙幟立漢赤幟二千趙軍不得信等欲還歸壁壁皆漢赤幟而大驚太公曰夫兩陣之閒出俾陣矣縱卒亂行者所以為變此之謂矣以為漢皆已得趙主將矣遂亂遁走趙將雖擊斬之不能禁也孫子曰以治待亂以靜待譁此治心者夫眾心已亂雖有良將亦不能為之計矣於是漢兵夾擊大破之斬成安君泜水上擒趙王歇諸將效首虜休畢賀因問信曰兵法右背山陵前左水澤今者將軍令臣等反背水陣曰破趙會食臣等不服然竟以勝此何術也信曰此在兵法中顧諸君不察耳兵法不曰陷之死地而後生置之亡地而後存夫處死地者謂力均勢敵以死地取勝可也若以至弱當至強投弱兵千死地自貽陷矣故孫臏曰兵恐不可救又經曰大眾陷于害然後能為勝敗是知死地之機必用大眾矣且信非得素撫循士大夫也所謂驅市人而戰其勢非置之死地使人人自為戰今與之生地皆走寧尚可得而用之乎諸將曰善非所及也孫子曰兵甚陷則不懼不得已則鬭是故其兵不修而戒不求而得不約而親不令而信投之無往者諸將之勇也此之謂矣魏太祖征張繡一朝引軍退繡自追之賈詡曰不可追也繡不從果敗而還詡謂繡曰促更追之戰必勝繡收散卒赴追太祖戰果勝還問詡曰繡以精兵追退軍而公曰必敗退以敗卒擊勝兵而公曰必剋皆如公之言何其反而皆驗也詡曰此易知耳軍勢百途事不一也將軍雖善用兵非曹公敵也魏軍新退曹公必自斷其後追兵雖精將既不敵彼士亦銳故知必敗曹公攻將軍無失策力未盡而還必國內有故也既破將軍必輕軍速進留諸將斷後諸將雖勇亦非將軍敵也故雖用敗兵而勝也繡乃服其能此利害之變故曰陷之死地而後生雜於害而患可解此之謂也太公曰不能分移不可語奇孫子曰兵以正合事以奇勝何以明之魏王豹反漢漢王以韓信為左丞相擊魏魏王盛兵蒲阪塞臨晉信乃益為疑兵陳船欲渡臨晉而伏兵從夏陽以木罌渡軍襲安邑孫子曰遲而示之遠遠而示之近此之謂也魏王豹驚引兵迎信信遂虜豹定魏為河東郡是知奇正者兵之要也經曰戰勝不過奇正奇正之變不可勝窮如環之無端孰能窮之此之謂也孫子曰善戰者其勢險其節短以利動之以卒待之又曰善動敵者形之敵必從何以明其然耶燕平齊圍即墨城即墨城中推田單為將以拒燕田單欲激怒其卒乃宣言曰吾唯恐燕將劓所得齊卒及掘城外墳墓傷先人可為寒心燕將如其言即墨人皆涕泣共欲出戰怒皆十倍單乃收人金得千鎰令即墨富豪遺燕將書曰即墨即降願不虜吾家族燕將大喜亦懈乃收牛得千頭束葦於尾燒其端鑿城數十穴夜縱牛出以壯士五千人隨其後牛尾熱而奔燕燕軍大驚所隨五千因銜枚擊之燕軍大敗殺其將騎劫復齊七十餘城呂蒙西屯陸口關羽討樊留兵備公安南郡蒙上疏曰關羽討樊而多留備兵必恐蒙圖其後故也蒙常有病乞分眾還建鄴以治病為名羽聞之必撤備兵盡赴襄陽大軍浮江晝夜馳上襲其空虛則南郡可取而羽可擒之遂稱病篤權乃露檄召蒙羽果信之稍撤兵赴樊權聞之遂行先遣蒙在前伏其精兵於䑦𦪇中使白衣搖櫓作商賈服晝夜兼行至羽所置江邊屯候盡收縛之是故羽不聞知太公曰偽稱使者所以絕糧食謬號令與敵同服者所以備走北也由此言之衣服號令之中不可不審也遂到南郡士仁糜芳皆降蒙入據城表得羽將士家屬皆撫慰約令軍中不得干歷人家道不拾遺昔秦伯見襲鄭之利不顧崤函之敗吳王矜伐齊之功而忘姑蘇之禍故曰不能盡知用兵之害者則不能盡知用兵之利此之謂矣經曰役諸侯得以業語曰因其強而強之敵乃可折關羽討樊雖不被人計亦自役自強者也羽還在道路數使人與蒙相聞蒙厚遇其使使周旋城中家家致問或手書示信羽使人還私相參訊咸知家門無恙相待過於平時故羽士卒無鬭心權至獲羽遂定荊州此掩發之變故曰始如處女敵人開戶後如脫兔敵不及距此之謂矣孫子曰興師百萬日費千金玉子曰四人用虛國家無儲故曰運糧百里無一年之食二百里無二年之食三百里無三年之食是謂虛國國虛則人貧人貧則上下不相親上無以樹其恩下無以活其身則離叛之心生此為戰勝而自敗故雖破敵於外立功於內然而戰勝者以喪禮處之將軍縞素請罪於君君曰兵之所加無道國也擒敵致勝將無咎殃乃尊其官以奪其勢故曰高鳥死良弓藏敵國滅謀臣亡亡者非喪其身謂沈之於淵沈之於淵者謂奪其威廢其權封之於朝極人臣之位以顯其功中州善國以富其心仁者之眾可合而不可離威權可樂而難卒移是故還軍罷師存亡之階尉他章邯是也故弱之以位奪之以國故霸者之佐其論駮也駮不純道也人主深曉此道則能御臣將漢祖襲奪齊軍之類人臣深曉此道則能全功保首張良學辟穀棄人閒事之類此還師之術也論曰奇正之機五閒之要天地之變水火之道如聲不過五聲五聲之變不可勝聽色不過五色五色之變不可勝觀在乎因機而用權矣不可執一也故略舉其體之要此皆諸兵書中語也, WYG: ''}
