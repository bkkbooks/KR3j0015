  - {type: variant, offset: 140, length: 1557, content: 也是知取威定霸何莫由斯自古兵書殆將千計若不知合變雖多亦奚以為故曰少則得多則惑所以舉體要而作兵權云夫兵者凶器也戰者危事也兵戰之場立尸之所帝王不得已而用之矣凡天有白雲如匹布經丑未者天下多兵赤者尤甚或有雲如匹布竟天或有雲如胡人行列陣皆天下多兵或壬子日四望無雲獨見赤雲如旌放天下兵起若遍四方者天下盡兵或四望無雲獨見黑雲極天亦天下兵起三日內有雨災解或有赤雲赫然者所見之地兵大起凡有白雲如仙人衣千萬連結部隊相逐罷而復興當有千里兵或有如人持刀楯此暴兵氣也或有白雲廣六丈東西竟天者亦兵起也青者有大喪也故曰救亂誅暴謂之義兵兵義者王敵加於己不得已而用之謂之應兵應兵者勝爭恨小故不勝憤怒者謂之忿兵兵忿者敗利人土地寶貨者謂之貪兵兵貪者破恃國之大矜人之眾欲見威於敵謂之驕兵兵驕者滅夫禁暴救亂曰義兵可以禮服恃眾以伐曰強兵可以謙服因怒興師曰剛兵可以辭服棄禮貪利曰暴兵可以詐服國危人疲舉事動眾曰逆兵可以權服是知聖人之用兵也非好樂之將以誅暴討亂夫以義而誅不義若決江河而溉螢火臨不測之淵而欲墮之其克之必也所以必優游恬泊者何重傷人物故曰遠人不服則修文德以來之不以德來然後命將出師矣夫將者國之輔也人司命也故曰將不知兵以其主與敵也君不擇將以其國與敵也將既知兵主既擇將天子居正殿而召之曰社稷安危一在將軍今某國不臣願煩將軍應之乃使太史卜齋擇日授以釜鉞君入太廟西面而立將軍北面而立君親操鉞持其首授其柄曰從是以上至天者將軍制之乃復操柄授與刃曰從是以下至淵者將軍制之將既受命拜而報曰臣聞國不可從外理軍不可從中御二心不可以事君疑志不可以應敵臣既受命專釜鉞之威臣不敢還諸乃辭而行鑿凶門而出故司馬法曰進退唯時無曰寡人孫子曰將在軍君命有所不受古語曰閫以內寡人制之閫以外將軍制之漢書曰唯聞將軍之命不聞天子之詔故知合軍聚眾在於閫外受推轂之寄當秉旄之重無天於上無地於下無敵於前無君於後乃可成大業矣故曰將能而君不御者勝此之謂也夫王者帥師必簡練英雄知士高下因能授職各取所長為其股肱羽翼以成威神然後萬事畢矣腹心一人主贊謀應卒揆天消變總撮計謀保國全命者也謀士五人主國安危豫慮未然諭才能明賞罰授官位決嫌疑定可否者也天文三人主占星歷候風氣理時日考符驗校災異知天心去就者也地形三人主軍行止形勢利害遠近險易水涸山阻不失地理者也兵法九人主講論異同行事成敗簡練兵器凡軍陣所用㓨舉非法者也通糧四人主廣飲食密畜積通糧道致五穀令三軍不困乏食者也奮威四人主擇材士諭兵馬風馳電擊不失所由奇仗也鼓旗三人主佐鼓旗符節號令倏忽往來出入若神股肱四人主出旌桿任重持難修溝壍治壁壘四轉守禦者也通材三人主拾遺補過集會術數周流並會應偶賓客議論談語消患解結權士三人主奇譎殊異非人所識行無窮之變也耳目七人主往來聽言語覽視四方之事軍中之情偽日列於前也爪牙五人主揚威武激厲三軍冒難銳攻令三軍勇猛也羽翼四人主飛名譽震遠近動移四境以弱敵心者遊士八人主相徵祥候開闔視敵人為謀者也術士二人主為譎詐依託鬼神以惑敵心法算二人主計會三軍領埋方物也方士二人主為藥以全傷病也軍中有大勇敢死樂傷者聚為一卒名曰冒刃之士有勃氣壯勇暴強者聚為一卒名曰陷陣之士有學於奇正長劍琱弧接武齊列者聚為一卒名曰銳騎之士有破格舒鉤強梁多力能潰破金鼓絕滅旌旗者聚為一卒名曰勇力之士有能踰高超遠輕足善走者聚為一卒名曰冠兵之士有故王臣失勢欲復見其功者聚為一卒名曰死鬭之士有死罪之人昆弟為其將報仇者聚為一卒名曰死憤之士有貧窮忿怒將快其志者聚為一卒名曰必死之士有故贅婿入虜欲昭迹揚名者聚為一卒名曰厲頓之士有辯言巧辭善毀譽者聚為一卒名曰簡諜飛言弱敵之士有故胥靡免罪之人欲逃其恥者聚為一卒名曰幸用之士有材伎過人能負重行數百里者聚為一卒名曰待令之士夫卒強將弱曰弛吏強卒弱曰陷兵無先鋒曰北必然之數矣故曰兵眾孰強士卒孰練知之者勝不知之者不勝不可忽也太公曰出軍征戰安營置陣以六為法六者謂六百步亦可, WYG: ''}
