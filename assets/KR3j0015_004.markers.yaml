  - {type: 'tls:seg', offset: 624, content: '', id: KR3j0015_CH7x2006_004-1a.132}
  - {type: variant, offset: 624, length: 0, content: '', WYG: 上曰善賜金五百陳豨為代相與韓信王黄等反豨自立為代王上自往破之高祖赦趙代吏人為豨所詿誤者趙相奏斬常山守尉曰常山北二十五城豨反亡其二十五城上問曰守尉反乎對曰不反上曰是力不足也赦之復以為守尉上既至邯鄲喜曰豨不南據漳水北守邯鄲吾知其無能為也問周昌曰趙亦有壮士可今為将者乎對曰見有四人焉謁上謾罵曰豎子能為将乎各封之千户以為将左右諫曰從入蜀漢伐楚功未徧行今此何功而封上曰非爾所知也陣豨反邯鄲以北皆豨有也吾以羽檄徴天下兵未有至者今惟獨邯鄲中兵耳吾何愛四千户不封此四人以慰趙子弟心皆曰善於是上曰陳豨将誰也曰王黄曼丘臣皆故賈人上曰吾知之矣乃各以千金購黄臣等其黄臣等麾下受購賞皆生得以故陳豨軍遂敗初韓信知漢畏惡其能與陳豨謀反高帝自将擊豨信稱疾不從行欲從中起信舎人得罪信囚之欲殺舎人弟告信反状於吕后呂后欲召恐其黨不就乃與蕭相國謀詐令人從上所來言豨已死矣列侯羣臣皆賀相國詐信曰雖病強入賀信入吕后使武士縳信斬之長樂宫尉佗王南越反髙祖使陸賈賜尉佗印綬為南越王令稱臣奉漢約陸生至南越尉佗魋髻箕踞見陸生陸生因進説曰足下中國人親戚昆弟墳墓在真定今足下反天性棄冠帯欲以區區之越與天子抗衡為敵國禍且及身矣且夫秦失其政諸候豪􅇐並起唯漢王先入關據咸陽項王背約自立為西楚霸王諸候皆屬可謂至強然漢王起巴蜀鞭笞天下制諸侯遂誅項羽滅之五年間海内平定此非人力天之所建也天子聞君王南越不助天下誅暴逆将欲移兵而誅王天子憐百姓新勞苦且休之遣臣授君王印綬剖符通使君王宜郊迎北面稱臣乃欲以新造未集之越屈強於此漢誠聞之掘王先人塜夷滅王宗族使一偏将将十萬衆以臨越則越殺王以降如反覆手耳於是尉佗蹶然起謝陸生卒拜尉佗而還初南海尉任囂病且死召龍川今趙佗謂曰聞陳勝作亂豪􅇐叛秦相立畨禺負山險阻南海東西數千里頗有中國人相輔此一州之主也可以立國}
