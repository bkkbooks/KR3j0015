  - {type: variant, offset: 6171, length: 3, content: 者夫除, WYG: 是以聞之響應投赴如歸今遇小敵便將返斾恐義師一朝觧體大事去矣勢不可全歸守太原則一城賊耳恐不旋踵禍變仍生乃止也老生背城一戰斬之平霍邑諸城皆降唯屈突通鎮河東堅守不下也冬十月義師次長樂宫衛文昇挾代王乗城拒守十一月平京師尊代王為天子改元義寧遣使四出狥郡縣隋行宫唐公悉罷之後宫還其親屬初隋將多侵百姓百姓患之及義師至秋毫無犯皆曰真吾君也時煬帝將之丹陽而大臣將卒皆北人不願南遷咸思歸宇文化及因百姓之不堪命殺煬帝於江都隋室王侯無少長皆斬之立嗣王浩為天子化及為丞相上曾夢見青衣兒謂曰去亦死住亦死不若乗船渡江水裴藴虞世基皆南人賛成其事將率不願南遷将因㑹鴆之南陽公主懼殺其婿以謀告宇文士及士及告其兄化及遂反執帝帝曰吾何負于天地而至此乎馬文舉對曰臣聞萬姓不可無主故立君以撫之是知}
