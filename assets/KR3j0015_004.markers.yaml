  - {type: variant, offset: 605, length: 4, content: 刀筆之跡, WYG: 燕燕必不敢不聴燕已従使諠言}
  - {type: variant, offset: 605, length: 4, content: 刀筆之跡, krp: 燕燕必不敢不聴燕已従使諠言}
