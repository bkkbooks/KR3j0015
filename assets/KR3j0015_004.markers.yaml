  - {type: variant, offset: 619, length: 2, content: 行陣, WYG: 是高帝即日駕西都闗中有吿椘王韓信反用陳平計擒之廢為淮隂侯高帝問諸将将曰亟發兵抗豎子耳高帝黙然問陳平平曰人上書言信反人有聞知者乎曰未有曰信知之乎曰不知平曰陛下精兵執與楚上曰不能過平曰陛下将用兵有能敵韓信乎上曰莫及也平曰今兵不如楚精將又不及而舉兵擊之是趣戰也竊為陛下危之上曰為之奈何平曰古者天子廵狩會諸侯南方信有雲夣陛下苐出偽遊雲夢㑹諸侯於陳陳楚之西界聞天子以好出遊其勢必郊迎謁而陛下因擒之此特一力士}
  - {type: page-break, offset: 619, content: '', id: KR3j0015_WYG_004-13a, image: WYG0849/WYG0849-0080c.png}
  - {type: variant, offset: 619, length: 2, content: 行陣, krp: 是高帝即日駕西都闗中有吿椘王韓信反用陳平計擒之廢為淮隂侯高帝問諸将将曰亟發兵抗豎子耳高帝黙然問陳平平曰人上書言信反人有聞知者乎曰未有曰信知之乎曰不知平曰陛下精兵執與楚上曰不能過平曰陛下将用兵有能敵韓信乎上曰莫及也平曰今兵不如楚精將又不及而舉兵擊之是趣戰也竊為陛下危之上曰為之奈何平曰古者天子廵狩會諸侯南方信有雲夣陛下苐出偽遊雲夢㑹諸侯於陳陳楚之西界聞天子以好出遊其勢必郊迎謁而陛下因擒之此特一力士}
  - {type: substitution, offset: 620, original: 陣, replacement: 陳, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4111}}
  - {type: variant, offset: 623, length: 0, content: '', WYG: 高帝以為然發使告諸侯上因隨行信果迎道中帝預具武士見信即執縳之田肯賀上曰甚善陛下得韓信又治秦中秦形勝之國帯河阻山懸隔千里執㦸百萬秦得百二焉地勢便利其以下兵於諸侯譬猶居臺之上建瓴水也夫齊東有瑯邪即墨之饒南有太山之固西有濁河之限北有渤海之利地方二千非里持㦸百萬懸隔千里之外齊得十二焉此東西秦也親子弟莫可使王齊斤}
