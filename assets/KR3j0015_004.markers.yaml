  - {type: variant, offset: 11678, length: 217, content: 富國強兵或承衰亂之後或興兵征伐皆未得遵法度申文理度方而制因時施宜以從便善之計而務在於立功也此霸者之術王道純而任德霸道駮而任法此優劣之差也道德經曰我無為而人自化文子曰所謂無為者非謂引之不來推之不往謂其循理而舉事因資而立功推自然之勢也故曰智而好問者聖勇而好問者勝乘眾人之智即無不任也用眾人之力即無不勝也故聖人舉事未嘗不因其資而用也故曰湯武聖主也而不能與越人乘舲舟泛江湖伊尹賢相也而不能與胡人騎原馬服騊駼孔墨博通也而不能與山居者入榛薄出險阻, WYG: 破敗}
