  - {type: variant, offset: 615, length: 0, content: '', WYG: 秦}
  - {type: variant, offset: 615, length: 0, content: '', krp: 秦}
  - {type: variant, offset: 616, length: 2, content: 本習, WYG: 故地可全而有夫與人鬬不搤其喉而拊其背未能全勝也今陛下入闗而都長安業秦之故地此亦搤天下之喉而拊其背髙祖以問羣臣羣臣皆山東人争言周王七百年秦二世即滅不如都洛陽洛陽東有成臯西有崤澠背中河向伊雒其固亦足恃也留侯曰洛陽雖有此固其小不過數百里地薄四面受敵此非用武之國也夫漢中左崤函右隴蜀沃野千里南有巴蜀之饒北有胡苑之利阻三面而獨守一面東制諸侯諸侯安定河渭漕輓天下足以西給京師諸侯有變順流而下足以委輸此所謂金城千里天府之國婁敬説是也}
