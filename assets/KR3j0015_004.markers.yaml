  - {type: variant, offset: 591, length: 0, content: '', WYG: 於羽羽遂殺子嬰而東都彭城立沛公為漢王王巴漢漢王不肯就國欲攻楚蕭何曰王雖王漢之惡不猶愈於死乎且詩曰天漢其稱甚美夫能屈於一人之下而申於萬人之上湯武是也願大王王漢中撫其士人以致賢人収巴蜀還定三秦天下可圖於是用韓信䇿乃東伐還定三秦漢王之國也韓信亡楚從入蜀無所知名數與蕭何語何竒之薦為大將軍信拜禮畢王曰丞相數言將軍將軍何以教寡人計䇿信謝因問王曰今東向爭權天下者豈非項王耶曰然信曰大王自料勇悍仁强孰與項王比漢王黙然良久曰不如也信再拜賀曰雖信亦以為大王不如也然臣嘗事之請言項王之為人也項王喑啞叱咤千人皆廢然不能任屬人賢將此特匹夫之勇也項王見人恭敬慈愛言語呴嘔}
