  - {type: variant, offset: 590, length: 0, content: '', WYG: 此友天下賢人者二人而歸之故曰三分天下有其二以服事殷此之謂者也故五伯音霸更起伯者常佐天子興利除害誅暴禁邪匡正海内以尊天子五伯既没賢聖莫續天子孤弱號令不行諸侯恣行強凌弱衆暴寡呉王問伍胥曰伐楚如何對曰楚執政衆而乖莫適任患若為三師以肄之一師至彼必皆出彼出即歸彼歸即出楚必道敝亟肄以疲之多方以誤之既疲而後以三軍繼之必大克闔閭從之楚於是乎始病越王勾踐問於大夫種曰伐呉何如對曰伐吴有七術其畧云尊天事鬼以空其邪遺之好美以榮其志遺之巧工使起宫室以盡其財遺之諛臣使之易伐強其諌臣使之自殺堅甲利兵以承其弊越王於是餙美女西施獻之吴王吴王悦之子胥諫不受吴王誅子胥越又為榮楯鏤以黄金獻之吴王吴王受之而起姑蘓之臺五年乃能成百姓道死越又蒸粟種遺吴王吴王付人種之不生吴大飢齊桓公欲弱楚乃鑄錢市生鹿於楚楚聞之喜廢耕而獵鹿桓公藏粟五倍楚足錢而乏粟桓公乃閉關楚降者十四五及柯之盟桓公欲倍曹沫之約管仲因而信之諸侯由是歸齊故其稱曰知與之為取政之寳也鄭桓公欲襲鄶先問鄶之豪傑良臣辯士書其名姓擇鄶之良田貽之為官爵之名而書之因為疆場郭門之外而埋之釁以鷄猳之血鄶君以為内難也盡殺之桓公因襲鄶此皆諸侯恣行天子之令不行也田常簒齊六卿分晉並為戰國此人之始苦也齊侯與晏子坐於露寝公嘆曰美哉兹室其誰有此乎晏子曰如君之言其陳氏乎陳氏雖無大徳而有施於人豆區釡鍾之數其取之公也薄其施之人也厚公厚斂馬陳氏厚施焉人歸之矣詩云雖無徳與汝式歌且舞陳氏之施人歌舞之矣後世若少墮陳氏而不亡則國其國也已後果簒齊智伯從韓魏之君伐趙韓魏陰謀叛智果曰二王殆将有變不如殺之不殺則遂親之智伯曰親之柰何智果曰魏宣子之謀臣趙葮韓康子之謀臣段規是皆能移其君之計君與二君約破趙則封二子萬家之縣各一如是則二主之心可以無變智伯不從韓魏果反殺智伯於是強國務攻弱國務守合縱連衡馳車轂擊介胄生蟣虱人無所告訴及至秦􅅙食天下并吞戰國一海内之政壞諸侯之城法嚴政峻諂䛕者衆使䝉恬將兵北攻胡尉佗將卒以戍粤宿兵無用之地人不聊生始皇崩天下大叛陳勝吴廣舉於陳陳涉呉廣戍漁陽屯大澤會天雨道不通度已失期失期當斬二人乃謀曰今已失期當斬今舉大計亦死死為國可乎乃先説鬼神威衆因斬尉召令徒屬曰公等遇雨皆已失期失期當斬藉今第無軒而戍死者固十六七且壮士不死則亡己死則舉大名侯王將相寧有種乎徒屬皆曰敬受命遂分將徇地自立為陳王武臣張耳舉於趙武臣畧定趙地號武信君蒯通説范陽令徐公曰范陽百姓蒯通也竊憫公之将死故弔雖然賀公得通而生也徐公再拜曰何以弔之通曰足下為令十年矣殺人之父孤人之子斷人之足黥人之手甚衆然而慈父孝子所以不敢倳刃公之腹中者畏秦法也今天下大亂秦政不施然而慈父孝子將爭接刅公之腹以復其怨而成其名此通之所以弔也曰何以賀得子而生也通曰趙武信君不知通不肖使人候通問其死生通見武信君而説之曰必將戰勝而後畧地攻得而後取天下城臣竊以為殆矣用臣之計無戰而畧地不攻而下城傳檄而千里可定矣彼將曰何謂也臣因説曰范陽令宜整頓其士卒以守戰者也怯而畏死貪而好富者故欲以其城先下君先下君而不利則邉地之城皆将相告曰范陽令先降而身死必將嬰城固守皆若金城湯池不可攻矣為君計者莫如以黄屋珠輪迎范陽令使馳騖於燕趙之郊則邉城皆將相告曰范陽令先下而身冨貴矣必相率而降猶如阪上走丸也此臣之所謂𫝊檄而千里定者也徐公再拜具車馬遣通通遂以此説武臣武臣以車百乘騎二百侯印迎徐公燕趙聞之降者三十餘城如蒯通䇿也項梁舉吴梁令項羽殺假守通便舉兵起吴呉今蘓州也田儋舉齊儋從少年縛奴欲殺舉之以見狄令因殺令兵也景駒舉郢周市舉魏韓廣舉燕窮山通谷豪傑並起而亡秦族矣漢髙祖名邦字季姓劉氏沛國豐邑人為泗上之亭長秦二世元年陳勝等起勝自立為楚王張耳陳餘諌曰將軍出萬死之計為天下除害今始至陳而自立為王是示天下之私也不如立六國後自為樹黨進師而西則野無交兵城無守墻誅暴秦據咸陽以令諸侯天下可圖也勝不聴沛人殺其令立髙祖為沛公時項梁止薛沛公往從之共立義帝范増説項梁曰秦滅六國楚最無罪自懐王入秦不反楚人憐之故語曰楚雖三户亡秦必楚今陳勝首事不立楚後其勢不長今君起江東楚鋒起之將皆争附君者以君代代楚將為將復立楚後也梁因求懐王孫心立之約曰先入咸陽者王之秦將章邯大敗項梁於定陶梁死章邯以為楚不足憂乃北伐趙楚使項羽等救趙遣沛公别將西入闗沛公遂攻宛降之沛公攻宛南陽太守吕齮保城不下沛公欲遂西張良曰強秦在前宛兵在後此危道也乃圍宛宛急錡欲自殺有舎人陳恢踰城見沛公曰宛吏人懼死堅守足下盡日攻之死殞者必衆引兵而去宛必隨之足下前失咸西陽之約後有強宛之患不如約降封其守引其甲卒而諸城未下者必開門而待足下沛公曰善封吕齮為殷侯攻武闗大破秦軍趙髙殺二世立子嬰遣兵拒闗張良曰秦兵尚強未可輕也願益張旗連幟諸山上為疑兵令酈食其持重寳啗秦將秦將果欲和俱西沛公欲聴之良曰此獨其將欲叛恐士卒不從士卒不從必危不如因其懈而擊之乃擊秦軍破之入咸陽與秦人約法三章秦人獻牛酒沛公譲不受於是人知徳矣遣兵拒闗欲王闗中是時項羽破秦軍於河北率諸侯兵四十萬至鴻門欲擊沛公沛公因項伯自}
