  - {type: variant, offset: 1439, length: 1, content: 晏, WYG: 靈帝崩太}
  - {type: variant, offset: 1439, length: 1, content: 晏, krp: 靈帝崩太}
  - {type: variant, offset: 1441, length: 1169, content: 曰晏子曰臣專其君謂之不忠子專其父謂之不孝妻專其夫謂之嫉妬反忠孝也呂氏春秋曰夫陰陽之和不長一類甘露時雨不私一物萬人之主不阿一人申子曰一婦擅夫眾婦皆亂一臣專君群臣皆蔽故妬妻不難破家也而亂臣不難破國也是以明君使其臣並進輻湊莫得專君焉韓子曰韓子曰儒者以文亂法俠者以武犯禁反文武也恃武者滅恃文者亡夫差偃王是也吳子曰昔承桑氏之君修德廢武以滅其國有扈之君恃眾好勇以喪社稷明主鑒茲必內修文德外治武訓故敵而不進無逮於恭僵尸而哀之無及於仁矣鈐經曰文中多武可以輔主武中多文可以匡君文武兼備可任軍事文武兼闕不可征伐子路拯溺而受牛謝孔子曰魯國必好救人於患也子貢贖人而不受金於府魯國之法贖人於他國者受金於府也孔子曰魯國不復贖人矣子路受而勸德子貢讓而止善由此觀之廉有所在而不可公行反廉也匡衡云孔子曰能以禮讓為國乎何有朝廷者天下之楨幹也公卿大夫相與修禮恭讓則人不爭好仁樂施則下不暴上義高節則人興行寬柔惠和則眾相愛此四者明王之所以不嚴而化成也何者朝有變色之言則下有爭鬭之患上有自專之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有盜竊之人此其本慎子曰忠未足以救亂代而適足以重非何以識其然耶曰父有良子而舜放瞽叟桀有忠臣而過盈天下然則孝子不生慈父之家六親不和有孝慈而忠臣不生聖君之下國家昏亂有忠臣故明主之使其臣也忠不得過職而職不得過官反忠也京房論議與石顯有隙及京房被出為魏郡太守憂懼上書曰臣弟于姚平謂臣曰房可謂小忠不可謂大忠何者昔秦時趙高用事有正先者非刺高而死高威自此成秦之亂正先趣之今臣得出守郡唯陛下毋使臣當正先之死為姚平所笑由此而觀之夫正先之所謂忠乃促秦禍忠何益哉鬼谷子曰將為胠篋探囊發匱之盜胠音起居反胠發也從旁開為胠為之守備則必攝緘縢攝結也固扃鐍音決細也此代俗之所謂智也然而巨盜至則負匱揭篋揭音其謁反擔囊而趨唯恐緘縢扃鐍不固也然則向之所謂智者有不為盜積者乎反智也孫子曰小敵之堅大敵之擒也其所謂聖者有不為大盜守者乎何以知其然耶昔者齊國鄰邑相望雞狗之音相聞罔罟之所布耒耨之所刺方二千餘里闔四境之內所以立宗廟社稷治邑屋州閭鄉里者曷常不法聖人哉然而田成子一朝殺齊君而盜其國所盜者豈獨其國耶并與聖智之法而盜之故田成子有乎盜賊之名而身處堯舜之安小國不敢非大國不敢誅十二代而有齊國則是不乃竊齊國并與其聖智之法以守其盜賊之身乎反聖法也昔叔向問齊晏子曰齊其如何晏子曰此季世吾弗知齊其為陳氏矣公棄其人而歸於陳氏齊舊四量豆區釜鍾四升為豆各自其四以登於釜釜十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公收之山木如市弗加於山魚鹽蜃蛤弗加於海人參其力二於公而衣食其一公聚朽蠹而三老凍餒國之諸市屨賤踊貴人多疾病而或燠休之其愛之如父母歸之如流水欲無獲人將焉避之跖之徒問於跖曰盜亦有道乎跖曰何適而無有道耶夫妄意室中之藏聖也入先勇也出後義之知可否智也分均仁也五者不備而能成大盜者天下未之有也後漢未, WYG: 辯即位}
