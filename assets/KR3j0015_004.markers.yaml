  - {type: variant, offset: 817, length: 0, content: '', WYG: 弇進軍居二城之間弇視西安城雖小而堅臨菑雖大而實易攻乃勑諸部後五日攻西安城藍聞之晨夜警守至期夜半弇勅諸將皆蓐食㑹明至臨菑城出其不意半日㧞之入據其城張藍懼遂将其衆亡歸劇弇乃令軍士無得妄掠劇下須張歩至乃取之以激怒歩歩聞之大笑至臨菑攻弇弇先出臨菑水上突騎欲縱弇恐挫其鋒令步不敢進故示弱以盛其氣乃引歸小城陳兵於内歩氣盛直攻弇營與劉歆合戰弇升王宫壊臺望之視歆鋒交乃自引精兵以横突歩陣大破之步走降世祖弇欲招其故衆令陳俊追斬諸賊悉平之赤眉賊入函闗攻更始世祖遣鄧禹引兵而西以乗更始赤眉之亂赤眉賊樊崇立劉盆子為天子入長安}
  - {type: page-break, offset: 817, content: '', id: KR3j0015_WYG_004-21b, image: WYG0849/WYG0849-0084d.png}
  - {type: variant, offset: 817, length: 0, content: '', krp: 弇進軍居二城之間弇視西安城雖小而堅臨菑雖大而實易攻乃勑諸部後五日攻西安城藍聞之晨夜警守至期夜半弇勅諸將皆蓐食㑹明至臨菑城出其不意半日㧞之入據其城張藍懼遂将其衆亡歸劇弇乃令軍士無得妄掠劇下須張歩至乃取之以激怒歩歩聞之大笑至臨菑攻弇弇先出臨菑水上突騎欲縱弇恐挫其鋒令步不敢進故示弱以盛其氣乃引歸小城陳兵於内歩氣盛直攻弇營與劉歆合戰弇升王宫壊臺望之視歆鋒交乃自引精兵以横突歩陣大破之步走降世祖弇欲招其故衆令陳俊追斬諸賊悉平之赤眉賊入函闗攻更始世祖遣鄧禹引兵而西以乗更始赤眉之亂赤眉賊樊崇立劉盆子為天子入長安}
