  - {type: variant, offset: 11625, length: 0, content: '', WYG: 隨時之義大矣范煜曰自古喪大業絶宗禋其所以致削弱禍敗者盖漸有由矣三代以嬖色取禍嬴氏以奢虐致灾西京自外戚失祚東都縁閹尹傾國成敗之來先史商之乆矣自秦漢迄於周隋觀其興亡雖亦有數然大扺得之者皆因得賢豪為人興利除害其失之也莫不因任用羣小奢汰無度孔子曰以約失之者鮮矣又曰逺佞人去僻惡有㫖哉昔秦王見周之失統䘮權於諸侯遂自恃任人不封立諸侯及陳勝楚漢咸由布衣非封君有土而並滅秦髙祖既定}
