  - {type: variant, offset: 5666, length: 0, content: '', krp: 昭業是為鬱林王即位無道武帝梓宫下渚帝於端門内奉辭輼輬車裁入閣即奏湖伎髙宗殺之崩立弟昭文廢為海陵王也廢立西昌侯鸞是為髙宗明皇帝始安貞王道生}
  - {type: variant, offset: 5667, length: 1, content: 賢, WYG: 也即位亟行誅戮且寢疾經年預為梓宫之故地髙武諸子掃地無餘也崩立太子寶卷是為東昏侯即位凶暴以金花帖地令潘妃行其上曰此步步生蓮花也又於宫中為市自為市吏以潘妃為市令義師至為左右所殺崩立和帝寶融明帝第八子也以位禪梁先是文惠太子與才}
  - {type: variant, offset: 5667, length: 1, content: 賢, krp: 也即位亟行誅戮且寢疾經年預為梓宫之故地髙武諸子掃地無餘也崩立太子寶卷是為東昏侯即位凶暴以金花帖地令潘妃行其上曰此步步生蓮花也又於宫中為市自為市吏以潘妃為市令義師至為左右所殺崩立和帝寶融明帝第八子也以位禪梁先是文惠太子與才}
  - {type: variant, offset: 5669, length: 0, content: '', WYG: 共賦七言詩句後輒云愁和帝是騐矣東昏侯宫裏作散叛髻反根向後東昏時天下散叛矣又立帽騫其口而舒兩翅名曰鳳渡三橋裂裙向後總而結之名曰反縛黄鸝梁武宅在三橋而鳳渡之鳳翔之騐}
