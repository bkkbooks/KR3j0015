  - {type: variant, offset: 2655, length: 1, content: 性, WYG: 強衆以伐曹操其勢譬如覆手今不時取後難圖之授曰葢聞救亂誅暴謂之義兵恃衆憑強謂之驕兵兵義無敵驕者先敗曹操奉定天子建宫許都今舉兵相向於義}
