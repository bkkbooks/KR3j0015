  - {type: variant, offset: 13045, length: 7830, content: 海之內供命而已矣此之謂折衝千里之外夫明王之征必以道之所廢誅其君改其政弔其人而不奪其財也故曰明王之征猶時雨之降至則悅矣此之謂還師衽席之上言安而無憂也故揚雄曰六經之理貴於未亂兵家之勝貴於未戰此孔氏之術也議曰孔氏之訓務德行義蓋王道墨子曰古之人未知為宮室就陵阜而居穴而處故聖王作為宮室為宮室之法高足以避潤濕邊足以圉風寒宮牆之高足以別男女之禮謹此則止不以為觀樂也故天下之人財用可得而足也當今之王為宮室則與此異矣必厚斂於百姓以為宮室臺榭曲直之望青黃刻鏤之飾為宮室若此故左右皆法而象之是以其財不足以待凶饑振孤寡故國貧而難理也為宮室不可不節議曰此節宮室者也古之人未知為衣服時衣皮帶茭冬則不輕而煖夏則不輕而清聖王以為不中人之情故聖人作誨婦人以為人衣為衣服之法冬則練帛足以為輕煖夏則絺𥿭足以為輕清謹此則止非以榮耳目觀愚人也是以其人用儉約而易治其君用財節而易贍也當今之王其為衣服則與此異矣必厚斂於百姓以為文采靡曼之衣鑄金以為鉤珠玉以為佩由此觀之其為衣服非為身體此為觀好也是以其人淫僻而難治其君奢侈而難諫夫以奢侈之君御淫僻之人欲國無亂不可得也為衣服不可不節議曰此節衣服者也此墨翟之術也議曰墨家之議去奢節用蓋強本道商子曰法令者人之命也為治之本慎子曰君人者捨法而以身治則受賞者雖富望多無窮受罰者雖當望輕無已君捨法而以心裁輕重怨之所由生也是以分馬者之用策分田者之用鉤非以鉤策為過人之智也所以去和塞怨也故曰大君任法而不躬為則怨不生而上下和也一兔走百人逐之非以兔可分為百由名分之未定也賣兔滿市盜不敢取者由名分之定也故名分未定雖堯舜禹湯且皆加務而逐之名分已定則貧盜不敢取故聖人之為法令也置官也置吏也所以定分也尸子曰夫使眾者詔作則遲分地則速是何也無所逃其罪也言亦有地不可不分君臣同地則臣有所逃其罪矣故陳繩則木之枉者有罪審名分則群臣之不審者有罪矣名分定則大詐貞信巨盜愿愨而各自治也尹文子曰名定則物不競分明則私不行物不競非無心由名定故無所措其心私不行非無欲由分明故無所措其欲然則心欲人人有之而得同於無心無欲者在制之有道故也申子曰君如身臣如手君設其本臣操其末為人君者操契以責其名名者天地之網聖人之符張天地之網用聖人之符則萬物無所逃矣議曰韓子曰人主者非目若師曠乃為明也不任其數而待目以為明所見者少矣非不弊之術也不因其勢而待耳以為聰所聞者寡矣非不欺之道也明主者使天下不得不為己視使天下不得不為己聽身居深宮之中明燭四海之內而天下不能蔽不能欺者何也匿罪之罰重而告奸之賞厚也孫卿曰明職分序事業材伎官能莫不治理如是則厚德者進廉節者起兼聽齊明而百事無留故天子不視而見不聽而聞不慮而知不動而功塊然獨坐而天下從之此操契以責名者也尸子曰明君之立其貌莊其心虛其視不躁其聽不淫審分應辭以立於朝則隱匿疏遠雖有非焉必不多矣明君不長耳目不行閒諜不強聞見形至而觀聲至而聽事至而應近者不過則遠者理矣明者不失則微者敬矣此萬物無所逃也動者搖靜者安名自名也事自定也議曰尸子曰治水潦者禹也播五穀者后稷也聽獄折衷者皋陶也舜無為也而為天下父母此則名自名也太公謂文王曰天有常刑人有常生與天人共其生者而天下靜矣此則事自定之矣是以有道者因名而正之隨事而定之尹文子曰因賢者之有用使不得不用因愚者之無用使不得用用與不用各得其用奚患物之亂也尸子曰聽朝之道使人有分有大善者必問其孰進之有大過者必問其孰任之而行罰賞焉且以觀賢不肖也明分則不弊正名則不虛賢則貴之不肖則賤之賢不肖忠不忠以道觀之由白黑也昔者堯之治天下也以名其名正則天下治桀之治天下也亦以名其名倚而天下亂是以聖人貴名之正也議曰夫闇主以非賢為賢不忠為忠非法為法以名之不正也李斯書曰韓子稱慈母有敗子而嚴家無格虜者何也則罰之加焉必也故商君之法刑棄灰於道者夫棄灰薄罪也而被刑重罰也夫輕罪且督而況有重罪乎故人弗敢犯矣今不務所以不犯而事慈母之所以敗子則亦不察於聖人之論矣商君之法皆令為什伍而相司牧犯禁相連於不告奸者明尊卑爵秩等級各以差次田宅妻妾衣服以家次有功者顯榮無功者雖富無芬華務於耕戰此商君之法也此商鞅申韓之術也桓範曰夫商鞅申韓之徒貴尚譎詐務行苛剋廢禮義之教任刑名之數不師古始敗俗傷化此則伊尹周召之罪人也然其尊君卑臣富國強其守法持術有可取焉逮至漢興有甯為戚郅都之輩放商韓之治專以殺伐殘暴為能順人主之意希旨而行安時趨利敢行禍敗此又商韓之罪人也然其抑強族撫孤弱清己禁奸背私立公尚有政焉至於晚代之所謂能者乃犯公家之法赴私門之勢廢百姓之務趨人閒之事決煩理務臨時苟辯使官無譴負之累不省下人之冤復是申韓甯郅之罪人也由是觀之故知治天下者有王霸焉有黃老焉有孔墨焉有申商焉此其所以異也雖經緯殊致救弊不同然康濟群生皆有以矣今議者或引長代之法詰救弊之言議曰救弊為夏人尚忠殷人尚敬周人尚文者或引帝王之風譏霸者之政不論時變而務以飾說故是非之論紛然作矣言偽而辯順非而澤此罪人也故君子禁之正論第十六正論第十六孔子曰六藝於理一也禮以節人樂以發和書以導事詩以達意易以道化春秋以道義司馬談曰易著天地陰陽四時五行故長於變禮經紀人倫故長於行書記先王之事故長於政詩記山川谿谷禽獸草木牝牡雌雄故長於風樂所以立故長於和春秋辨是非故長於理人也故曰入其國其教可知也其為人也溫柔敦厚詩教也疏通知遠書教也廣博易良樂教也潔靜精微易教也恭儉莊敬禮教也屬辭比事春秋教也故詩之失愚書之失誣樂之失奢易之失賊禮之失煩春秋之失亂其為人也溫柔敦厚而不愚則深於詩也子夏曰聲成文謂之音治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其人困故正得失動天地感鬼神莫近於詩太史公曰大雅言王公大人而德逮黎庶小雅譏己之得失其流及上所言雖殊其合德一也晉時王政陵遲南陽魯襃著錢神論吳郡蔡洪作孤憤前史以為亂世之音怨以怒其政乖此之謂也疏通知遠而不誣則深於書也書著帝王之道典謨訓誥誓命之文三千之徒並受其義也廣博易良而不奢則深於樂也樂書曰凡音者生人心者也情動其中故形於聲聲成文謂之音是故治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其人困聲音之道與政相通宮為君商為臣角為人徵為事羽為物五者不亂則無惉懘之音矣宮亂則荒其君驕商亂則搥其臣壞角亂則憂其人怨徵亂則哀其事勤羽亂則危其材匱五者皆亂迭相陵謂之慢如此國滅亡無日矣夫上古明王舉樂者非以娛心快意所以動盪血脈流通精神而和正心也故宮動脾而和正信商動肺而和正義角動肝而和正仁徵動心而和正禮羽動腎而和正智故聞宮音者使人溫舒而廣大聞商音者使人方正而好義聞角音者使人惻隱而愛人聞徵音者使人樂善而好施聞羽音者使人整齊而好禮夫禮由外入樂自內出故聖王使人耳聞雅頌之音目視威儀之禮足行恭敬之容口言仁義之道故君子終日言而邪僻無由入也班固曰樂者聖人之所樂也而可以善人心其感人也深故先王著其教焉夫人有血氣心知之性而無哀樂喜怒之常應感而動然後心術形焉故纖微憔悴之音作而民思憂闡諧慢易之音作而民康樂麤厲猛奮之音作而民剛毅廉直正誠之音作而民肅敬寬裕和順之音作而民慈愛流僻邪散之音作而民淫亂先王恥其亂也故制雅頌之聲本之情性稽之度數制之禮義合生氣之和導五常之行使之陽而不散陰而不集剛氣不怒柔氣不懾四暢交於中而發作於外足以感入之善心而不使邪氣得接焉是先王立樂之方也呂氏春秋曰亡國戮人非無樂也其樂不樂溺者非不笑也罪人非不歌也狂者非不舞也亂世之樂有似人此范曄曰夫鍾鼓非樂之本而器不可去三牲非孝之主而養不可廢夫存器而亡本樂之失也調氣以和聲樂之盛也崇養以傷行孝之累也行孝以致養孝之大也議曰東方角主仁商方徵主禮中央宮主信西方商主義北方羽主智此常理也今太史公以為徵動心而和正智羽動腎而和正禮則以徵主智羽主禮與舊例乖殊故非末學所能詳也潔淨精微而不賊則深於易也易之精微愛惡相攻遠近相取則不能容人近於相害恭儉莊敬而不煩則深於禮也太史公曰余至大行禮官觀三代損益乃知緣人情而制禮依人性而作儀人道經緯万端規矩無所不貫誘進以仁義束縛以刑罰故德厚者位尊祿重者寵榮所以總一海內而整齊万人也人體安駕乘為之金輿鏓衡以繁其飾目好五色為之黼黻文章以表其能耳樂鍾磬為之調諧八音以蕩其心口甘五味為之庶羞駿鹹以致其美情好珍善為之琢磨珪璧以通其意故大路越席皮弁布裳朱絃洞越大羹玄酒所以防其淫佚救其弊也是以君臣朝廷尊卑貴賤之序下及黎庶車輿衣服宮室飲食嫁娶喪祭之分事有適宜物宜節文周衰禮廢樂壤大小相踰管仲之家遂備三歸循法守正者見侮於世奢溢僭差者謂之顯榮自子夏門人之高弟也猶云出見粉華盛麗而悅入聞夫子之道而樂二者心戰未能決而況中庸以下漸漬於失教被服於成俗乎孔子必正名於衛所居不合豈不哀哉班固曰人函天地陰陽之氣有喜怒哀樂之情天稟其性而不節也聖人能為之節而不能絕也故象天地而制禮樂所以通神明立人倫正情性節萬事也人性有男女之情妒忌之別為制婚姻之禮有交接長幼之序為制鄉飲之禮有哀死思遠之情為制喪祭之禮有尊尊敬上之心為制朝覲之禮哀有哭踊之節樂有歌舞之容正人足以副其誠邪人足以防其失故婚姻之禮廢則夫婦之道苦而淫僻之罪多鄉飲之禮廢則長幼之序亂而爭鬭之獄煩喪祭之禮廢則骨肉之恩薄而背主忘生者眾朝聘之禮廢則君臣之位失而侵淩之漸起故孔子曰安上治人莫善於禮移風易俗莫善於樂揖讓而治天下者禮樂之謂也屬辭比事而不亂則深於春秋也壺遂曰昔孔子何為作春秋哉太史公曰余聞之董生曰由周道衰微孔子為魯司寇諸侯害之大夫壅之孔子知言之不用道之不行也是非二百四十二年之中以為天下儀表貶天子退諸侯討大夫以達王事而已矣子曰我欲載之空言不如見之於行事之深切著明也夫春秋上明三王之道下辯人事之紀別嫌疑明是非定猶豫善善惡惡賢賢賤不肖存亡國繼絕代補弊起廢王道之大者也撥亂代反之正道莫近於春秋春秋之中弒君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數察其所以皆失其本也壺逐曰孔子之時上無明君下不得任用故作春秋垂空文以斷禮義當一王之法今夫子上遇明天子下得守職夫子所論欲以何明太史公曰伏羲至純厚作易八卦堯舜之盛尚書載之禮樂作焉湯武之隆詩人歌之春秋採善貶惡推三代之德襃周室非獨刺譏而已漢興以來至明天子受命於穆清澤流四極臣下百官力誦聖德猶不能宣盡其意且士賢能而不用有國之恥也主上明聖而德不布聞有司之過也且余掌其官廢明聖罪莫大焉余所謂述非所謂作也而君比之於春秋謬矣自仲尼沒而微言絕七十子喪而大義乖戰國縱橫真偽分爭諸子之言紛然散亂矣儒家者蓋出於司徒之官助人君順陰陽明教化者也游文於六經之中留意於仁義之際祖述堯舜憲章文武宗師仲尼此其最高也然惑者既失精微而僻者又隨時抑揚違離道本苟以譁眾取寵此僻儒之患也司馬談曰儒者博而寡要勞而少功是以其事難盡從然其敘君臣父子之禮列夫婦長幼之別不可易也夫儒者以六藝為法經傳以十數累世不能通具學常年不能究其禮故曰博而寡要勞而少功若夫列君臣父子之禮序夫婦長幼之別雖百家弗能易也范曄曰夫游庠序服儒衣所談者仁義所傳者聖法也故人識君臣父子之綱家知違邪歸正之路自桓靈之閒朝綱日陵國隙屢啟中智以下靡不審其崩離而剛強之臣息其窺盜之謀豪俊之夫屈於鄙生之義者民誦先王之言也下畏逆順之勢也至如張溫皇甫嵩之徒功定天下之半聲絕四海之表俯仰顧則大業移矣猶鞠躬惛主之下狼狽折禮之命散成兵就繩約而無悔心者斯豈非學者之效乎故先師襃勵學者之功篤矣道家者蓋出於史官歷紀成敗秉要執本清虛以自守卑弱以自持此君人南面者之術也合於堯之克讓易之謙謙此其所長也及放者為之則欲絕去禮樂兼棄仁義獨任清虛何以為治此道家之弊也司馬談曰道家使人精神專一動合無形贍足萬物其為術也因陰陽之大順采儒墨之善撮名法之要與時遷徙應物變化立信施事無所不宜指約而易操事少而功多夫道家無為又曰無不為其實易行其辭難知其術所虛無為本以因循為用無成勢無常形故能究萬物之情不為物先不為物後故能為萬物主有法無法因時為業有度無度因無與合故曰聖人不巧時變是守虛者道之常因者君之網群臣並至使各自明也陰陽家者蓋出於羲和之官敬順昊天曆象日月星辰敬授人時此其所長也及拘者為之則牽於禁忌泥於小數捨人事而任鬼神此陰陽之弊也司馬談曰陰陽之術大詳而眾忌諱使人拘而多畏然其敘四時之大順不可失也夫陰陽四時八位十二度二十四節各有教令順之者昌逆之者亡未必然也故曰使人拘而多忌夫春生夏長秋收冬臧此天之大經弗順則無以為天下紀綱故曰敘四時之大順不可失也漢書曰天人之際精䘲有以相盪善惡有以相推事作乎下者象動乎上陰陽之理各應其感陰變則靜者動陽蔽則明者晻水旱之災隨類而至故曰日蝕地震皆陽微陰盛也臣者君之陰也子者父之陰也妻者夫之陰也夷狄者中國之陰也春秋日蝕三十六地震五十二或夷狄侵中國或政權在臣下或婦棄夫或臣子背君父事雖不同其類一也是以明王即位正五事五事者貌言視聽思也建大中以承天心則庶徵序於下日月理於上如人君淫溺後宮般樂遊田五事失於躬大中之道不立則各徵降而六極至凡災異之發各象過失以類告人傳曰田獵不宿飲食不享出入不節奪人農時及有奸謀則木不曲直又曰棄法律遂功臣殺太子以妾為妻則火不炎上又曰好治宮室飾臺榭內淫亂犯親戚侮父兄則稼穡不成又曰好攻戰輕百姓飾城郭侵邊城則金不從革又曰𥳑宗廟不禱祠廢祭祀逆天時則水不潤下管輅曰貴人有事其應在天在天則日月星辰也兵動人憂其應在物在物則山林鳥獸也又曰夫天雖有大象而不能言故運星精於上流神明于下驅風雲以表異役鳥獸以通靈表異者必有沈浮之候通靈者必有宮商之應是以宋襄失德六鶂退飛伯姬將焚鳥鳴其哭四國未火融風已發赤雲夾日殃在荊楚此乃上天之所使自然之明符也後漢竇武上書曰閒者有喜禾芝草黃龍之瑞見夫瑞生必於嘉土福至實由吉人在德為瑞無德為災陛下所行不合天意不宜稱慶又裴楷曰按春秋以來及古帝王未有河清者也臣以為河者諸侯位也清者屬陽濁者屬陰河當濁而反清者陰欲為陽諸侯欲為帝也京房易傳曰河水清天下平今天垂異地吐夭民癘疫三者並時而有河清猶春秋麟不當見而見孔子書以為異也魏青龍中張掖郡玄川溢湧寶石負鼎狀麟鳳龍馬炳煥成形時人以為魏瑞任令于綽齎以問張臶臶密謂綽曰夫神以知來不追已往以禎祥先見然後廢興從之漢已久亡魏已得之何所追興禎祥乎此石當今之變異而將來之禎祥後司馬氏果代魏漢武時並為上致神君神君但聞其聲不見其形荀悅曰易稱有天道焉有地道焉有人道焉各當其理而不相亂亂則有氣變而然若夫大石自立僵柳復生此形之異也男化為女死而復生此含氣之異也鬼神髣髴在于人閒言語音聲此精神之異也夫形神之異各以類感善則生吉惡則生凶精氣之際自然之符異也故逆天之理則神失其節而妖神事興逆地之理則形失其節而妖人妄生逆中和之理則含氣失其節而妖物妄出此其大旨也若夫神君之類精神之異也春秋傳曰作事不時怨讟動于人則有非言之物而言當漢武之時賦斂繁眾人民彫弊故有無形而言至也其於洪範言僭則生時妖此蓋怨讟而生妖之類也故通于道者正身則萬物精神形氣各反其本也後漢陳蕃上書曰昔春秋之末周德衰微數十年閒無復災眚者天所棄也天之於漢恨恨無已故慇懃示變以悟陛下除妖去孽實在脩德故周書曰天子見怪則修德諸侯見怪則修政大夫見怪則修職士庶見怪則修身神不能傷道妖不能害德漢書曰夫動人以行不以言應天以實不以文此天人之大略也法家者蓋出於理官信賞必罰以輔禮制此其所長也及刻者為之則亡教化去仁愛專任刑法而欲以致治至於殘賊至親傷恩薄厚此法家之弊也司馬談曰法家嚴而少恩然其正君臣上下之分不可改也夫法家不別親疎不殊貴賤一斷於法則親尊親尊之恩絕矣可使行一時之計而不可長用也故曰嚴而少恩至於尊主卑臣明職分不相踰越雖百家不能改也名家者蓋出於禮官古者名位不同禮亦異數孔子曰必也正名乎此其所長也及譥者為之譥音工鈞反則苟鉤鈲析亂而已此名家之弊也司馬談曰名家使人檢而善失真然其正名實不可不察也夫名家苛察繳繞使人不得反其意專決於名時失人情故曰使人檢而善失真若夫控名責實參伍不失此不可不察也鈲音普覓反墨家者蓋出於清廟之官茅屋采椽是以貴儉養三老五更是以兼愛選士大射是以上賢宗祀嚴父是以右鬼右信也順四時而行是以非命言無吉凶之命但有賢不肖善惡也以孝示天下是以上同言皆同於治也此其所長也及蔽者為之見儉之利因以非禮推樂愛之意而不知別親疎此墨家之弊也司馬談曰墨者儉而難遵是以其事不可偏循然其強本節用不可廢也夫墨者亦上論堯舜言其德行曰堂高三尺上階三等茅茨不翦采椽不斲飯土簠啜土刑糲粱之食藜藿之羹夏日葛衣冬日鹿裘其送死桐棺三寸舉音不盡其哀教喪禮必以此為萬人之率故天下法若此則尊卑無別也夫世異時移事業不同故曰儉而難遵要曰強本節用則家給人足之道此墨家之所長雖百家莫能廢也漢武帝問董仲舒策曰蓋儉者不造元黃旌旗之飾及至周室設兩觀乘大輅八脩陳於庭而頌聲興夫帝王之道豈異旨哉對曰制度文彩元黃之飾所以明尊卑異貴賤而勸有德也故春秋受命所先制者改正朔易服色所以應天也然則宮室旌旗之制有法而然者也孔子曰奢則不遜儉則固儉非聖人之中制故曰奢不僭上儉不逼下此王道也橫縱家者蓋出於行人之官孔子曰使乎使乎言當權事制宜受命而不受辭此其所長也及邪人為之則上詐諼許遠反而棄其信此縱橫之弊也荀悅曰世有三遊德之賊也一曰遊俠二曰遊說三曰遊行夫立氣勢作威福結私交以立強於世者謂之遊俠飾辯辭設詐謀馳逐於天下以要時世者謂之遊說色取人合時好連黨類立虛譽以為權利者謂之遊行此三者亂之所由生傷道害德敗法惑世先王之所慎也凡三遊之作生於季世周秦之末尤甚焉上不明下無正制度不立綱弛廢以毀譽為榮辱不核其真以愛憎為利害不論其實言論者計厚薄而吐辭選舉者度親疎而下筆然則利不可以義求害不可以道避是以君子犯禮小人犯法飾華廢實競取時利薄骨肉之恩篤僚友之厚忘修身之道而求眾人譽苞苴盈於門庭聘問盈於道路於是流俗成而正道壞矣遊俠之本生於武毅不撓久要不忘平生之言見危受命以救時難而濟同類以正行之者謂之武義其失之甚者至於為盜賊矣遊說之本生於是非使於四方不辱君命出疆有可以安社稷利國家則專對解結之辭之繹矣民之瘼矣以正行之者謂之辯智其失之甚者至於詐矣遊行之本生於道德仁義汎愛容眾以文會友和而不同進德及時以立功業於世以正行之者謂之君子其失之甚者至於因事害私為奸宄矣甚相殊遠豈不哀哉故大道之行則三遊廢矣雜家者蓋出於議官兼儒墨合名法知國體之有此見王理之無不貫此其所長也及蕩者為之則漫羨而無所歸心此雜家之弊也農家者蓋出於農稷之官播百穀勸耕桑以足衣食孔子曰所重人食此其所長也及鄙者為之則欲君臣之並耕誖於上下之序此農家之弊也班固曰馬遷史記其是非頗謬於聖人論大道則先黃老而後六經序遊俠則退處士而進奸雄述貸殖則崇利勢而羞賤貧此其所弊也然其善序事理辯而不華質而不俚其文直事核不虛美不隱惡故世謂之實錄文子曰聖人之從事也所由異路而同歸秦楚燕魏之歌異轉而皆樂九夷八狄之哭異聲而皆哀夫歌者樂之微也哭者哀之效也愔愔於中而應於外故在所以感之矣論曰范曄稱百家之言政者尚矣大略歸乎寧固根柢革易時弊也而遭運無恆意見偏雜故是非之論紛然相乖嘗試論之夫世非胥庭人乖鷇飲理迹万肇情故萌生雖周物之智不能研其權變山川之奧未足況其紆險則應俗適事難以常條何以言之若夫元聖御代則大同極軌施捨之道宜無殊典而損益異運文朴遞行用明居晦迴穴於曩時興戈陳俎參考於上世及至戴黃屋服絺衣豐薄不齊而致治則一亦有宥公族黥國讎寬躁已隔而防非必同此其分波而共源百慮而一致者也若乃偏情矯用則枉直必過故葛屨履霜弊由崇儉楚楚衣服戒在窮奢疎禁厚下以尾大陵弱斂威峻法以苛薄分崩斯曹魏之刺所以明乎國風周秦末軌所以彰於微滅故用捨之端興敗資焉是以繁𥳑唯時寬猛相濟刑書鐫鼎事有可詳三章在令取貴能約大叔致猛政之衰國子流遺愛之涕宣孟改冬日之和平陽修畫一之法斯實弛張之宏致庶可以徵其統乎數子之言當世失得皆悉究矣然多謬通方之訓好中一隅之說貴清淨者以席上為腐議束名實者以柱下為誕辭或推前王之風可行於當年有引救弊之規宜流於長世稽之篤論將為弊矣由此言之故知有法無法因時為業時止則止時行則行動不失其時其道光明非至精者孰能通於變哉, WYG: ''}
