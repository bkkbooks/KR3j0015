  - {type: variant, offset: 591, length: 0, content: '', krp: 於羽羽遂殺子嬰而東都彭城立沛公為漢王王巴漢漢王不肯就國欲攻楚蕭何曰王雖王漢之惡不猶愈於死乎且詩曰天漢其稱甚美夫能屈於一人之下而申於萬人之上湯武是也願大王王漢中撫其士人以致賢人収巴蜀還定三秦天下可圖於是用韓信䇿乃東伐還定三秦漢王之國也韓信亡楚從入蜀無所知名數與蕭何語何竒之薦為大將軍信拜禮畢王曰丞相數言將軍將軍何以教寡人計䇿信謝因問王曰今東向爭權天下者豈非項王耶曰然信曰大王自料勇悍仁强孰與項王比漢王黙然良久曰不如也信再拜賀曰雖信亦以為大王不如也然臣嘗事之請言項王之為人也項王喑啞叱咤千人皆廢然不能任屬人賢將此特匹夫之勇也項王見人恭敬慈愛言語呴嘔}
  - {type: variant, offset: 592, length: 1, content: 罪, WYG: 疾病涕泣分食飲至使人有功當封爵者印刓弊諸忍不能與此所謂婦人之仁也項王雖霸天下而臣侯不居關中而都彭城有倍義帝之約而以親愛王諸侯不平諸侯之見項王遷逐義帝置江南亦皆歸逐其主而自王善地項王所過無不殘滅者天下多怨百故姓不親附特刼於威强服耳名雖為霸實失天下心曰其强易弱今大王誠能反其道任天下武勇何所不誅以天下城邑封功臣何所不服以義兵從思東歸之士何所不散且三秦王為秦將將秦子弟數歲矣殺已不可勝計又欺其衆降諸侯至新安項王計坑秦降卒二十餘萬唯獨邯欣翳得脱秦人父兄怨此三人痛入骨髓今楚强以威而王此三人秦人莫愛也大王之入武關秋毫無所害除秦苛法與民約法三章耳秦民無不欲得大王王秦者於諸侯之約大王當王關中關中人戸咸知之大王失職入漢中秦人無不恨者今大王舉而東三秦可傳檄而定也於是漢王大喜遂聽信計初漢王之國也張良送至褒中説漢王曰王何不燒絶所過棧道示天下無還心以固項王意漢王乃使張良還因燒之楚以此無憂漢王之心也田榮怨項王之不已立殺田市自立為齊王羽北擊滅齊項羽以呉令鄭昌為韓王拒漢張良遺項羽書曰漢王失職之蜀欲得王關中如約即止不敢反又以齊反書遺羽曰齊欲滅楚羽以故不西行而北擊齊而使九江王殺義帝於郴漢王為之縞素發喪臨三日以告諸侯董公説漢王曰臣聞順德者昌失德者亡兵出無名事故不成故曰明其為賊敵乃可服項王為無道枚殺其主天下之賊也夫仁不以勇義不以力三軍之衆為之素服以告諸侯為之東伐四海之内莫不仰德此三王之舉也漢王曰善漢王因項羽之撃齊率諸侯之師五十六萬東襲楚破彭城羽聞之留其將撃齊自以精兵三萬歸撃漢漢王與羽大戰彭城下漢王不利出梁地至虞謂左右曰孰能為使淮南王黥布令發兵背楚留項王於齊數月我之取天下可以萬全隨何乃使淮南説布背楚隨何説淮南王曰漢王使使臣敬進書與大王御者竊惟大王與椘何親也淮南王曰寡人北面而臣事之隨何曰大王與項王俱列為諸侯北面而臣事之必以楚為强可以託國也項王伐齊身自負版築以為士卒先大王宜悉發淮南之衆身自將之以為楚軍前鋒今乃發四千人以助楚北面而臣事人者固若是乎夫漢王戰於彭城項王未出齊也大王宜掃淮南之兵渡淮日夜㑹戰彭城下大王撫萬人之衆無渡淮者垂拱而觀孰勝夫託國於人為者固若是乎大王提空名以向椘而欲厚自託臣竊大王不取也然大王不背楚者以漢為弱也夫楚兵雖强天下負之以不義之名以其背約}
