  - {type: variant, offset: 598, length: 0, content: '', WYG: 間間其君臣以疑其心項王為人意忌信讒必内相誅漢因舉攻之破楚必矣漢王乃以四萬斤金與平恣其所為不問出入平既多以金縱反間於楚軍宣言諸将鍾離末等為項王将功多矣然終不能裂地而封欲與漢為一以滅項氏分王其地項王果疑使使至漢漢為大牢之具舉進見楚使即佯驚曰吾以為亞父使乃項王使也復持去以惡具進楚使使歸具報項王項王大疑亞父亞父欲爭擊漢王項王不信亞父亞父聞項王疑乃曰天下事大定矣君王自為之願賜骸骨項王從之入關収兵欲復東轅生説漢王出軍宛葉引項王南渡使韓信等得集河北羽果引兵南渡如其䇿轅生説曰漢與楚相拒於榮陽城臯數月漢嘗困願王出武闗項王必引兵南走王深壁令滎陽城臯間且得休息使韓信等得集於河北趙地君王乃復走滎陽如此則楚備者多力分漢得休息復與之戰破楚必矣漢王從此計出軍宛葉間項王聞漢王在宛果引兵南渡如轅生之䇿韓信與張耳以兵數萬東下井陘撃趙破之乃報漢因請立張耳為趙王以撫其國漢王從之初趙王與成安君陳餘聞漢且襲之聚兵井陘口廣武君李左車説曰聞漢將張韓信涉西河虜魏王擒夏悦新喋血閼與今乃輔以耳議欲下趙此乘勝而去國逺鬭其鋒不可當臣聞千里餽糧士有飢色樵蘓後㸑師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在後願足下假臣竒兵三萬人從間道出絶其輜重足下深溝高疊堅營勿與戰使前不得鬬退不得還吾竒兵絶其後野無所掠鹵不至十日而兩將之首可致於戲下願足下留意臣之計否必為二子所禽成安君不聴廣武君廣武君䇿不用信聞知之大喜乃進軍擊趙破之趙之破也韓信令軍中無殺廣武君有能生得者購千金於是有縳廣武君而致戱下者信乃觧其縳師事之問曰僕欲北攻燕南伐齊何若而有功廣武君辭謝曰臣聞敗軍之将不可與言勇亡國之大夫不可與圖存令臣敗亡之虜何足以權大事乎信曰僕聞百里奚居虞而虞亡在秦而秦伯非愚於虞而智於秦用聴與不用聴也試令成安君聴足下計若信者亦為擒矣僕委心歸計願足下勿辭廣武君曰臣聞智者千慮必有一失愚者千慮必有一得故曰狂夫之言聖人擇焉顧恐臣計未必足用願効愚忠夫成安君有百戰百勝之計一旦而失之軍破鄗下身死泜上今将軍涉西河虜魏王禽夏悦閼與一舉而下井陘不終朝而破趙二十萬衆誅成安君名聞海内威震天下農夫莫不輟耕釋耒工女下機褕衣甘食傾耳以待命若此者将軍之所長也然而衆勞卒疲其實難用今将軍欲舉倦弊之兵頓燕堅城之下欲戰恐不得攻城不能拔情見勢屈曠日糧竭而弱燕不服齊必距境以自強也燕齊相持而不可下劉項之權未有所分也若此者将軍之短也臣愚竊以為過矣故善用兵者不以短擊長而以長擊短韓信曰然則何由廣武君曰方今為将軍計莫如按甲休兵以鎭趙撫其孤弱百里之内牛酒日至以饗士大夫醳兵北首燕路而後遣辯士奉咫尺之}
