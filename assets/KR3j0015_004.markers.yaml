  - {type: variant, offset: 2626, length: 0, content: '', WYG: 易稱即鹿無虞諺有曰掩目捕雀夫物㣲尚不可欺以得志況國之大事而可詐立乎今將軍總皇威握兵要龍驤虎視高下在心以此行事無異於鼓洪鑪而燎毛髪但當速發雷霆行權立斷違經合道天人順之而反釋其利器更徴外助大兵一聚強者為雄所謂倒持干戈授人以柄必無成功祗為亂階進不納其言}
  - {type: variant, offset: 2626, length: 0, content: '', krp: 易稱即鹿無虞諺有曰掩目捕雀夫物㣲尚不可欺以得志況國之大事而可詐立乎今將軍總皇威握兵要龍驤虎視高下在心以此行事無異於鼓洪鑪而燎毛髪但當速發雷霆行權立斷違經合道天人順之而反釋其利器更徴外助大兵一聚強者為雄所謂倒持干戈授人以柄必無成功祗為亂階進不納其言}
  - {type: variant, offset: 2628, length: 0, content: '', WYG: 至廢帝為𢎞農王而立獻帝京師大亂太祖亡出關至陳留散家財合義於己吾與後將軍袁術冀州刺史韓馥豫州刺史孔伷兖州刺史劉岱渤海太守袁紹同時俱起衆合數萬推紹為盟主設壇塲共盟誓臧洪操盤血而盟曰漢室不幸皇綱失統賊臣董卓乗釁縦暴害加至尊毒流百姓大懼淪䘮剪覆四海兖州刺史劉岱豫州刺史孔伷等糾合義兵並赴國難凡我同盟齊心戮力}
