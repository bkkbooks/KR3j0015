  - {type: variant, offset: 2666, length: 10, content: 猶折意搢紳遲疑凌奪尚, WYG: 後勒兵至洛水迎天子奏爽與其黨謀反皆誅宣帝崩子師代為相師字子元是為肅宗景皇帝鎮東將軍毋丘儉揚州刺史文欽反征平之儉欽初反也景帝問王肅曰安國寧主其術安在肅荅曰昔闗羽率荆州之衆降于禁於漢濵遂}
