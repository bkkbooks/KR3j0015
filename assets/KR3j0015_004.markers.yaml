  - {type: variant, offset: 2639, length: 0, content: '', WYG: 吏遍於天下若収豪傑以聚徒衆英雄因之而起即山東非公所有也不如赦之拜一郡守紹喜於免罪必無患矣卓以為然乃遣授紹勃海太守紹與孔伷等同起義襲奪韓馥兾州據河北練精卒十萬騎萬匹欲進攻曹操于許沮授進説曰近討公孫師徒歴年百姓疲弊賦役方殷此國之深憂也冝先獻㨗天子務農逸民若不}
