  - {type: variant, offset: 2657, length: 1, content: 群, krp: 違且廟勝之䇿不在強弱曹操法令既行士卒精練非公孫瓚坐受圍者也今棄萬安之術而興無名之師竊為公懼之圖曰武王伐紂不為不義况兵加曹操而云無名且公師徒精鋭将士思奮而不及時早定大業所謂天與不取反受持其咎此越之所以霸吴之所以亡也監軍之計在於牢而非見時知機之變也紹遂不用沮授之計曹公軍官渡紹時悉衆而南田豐説紹曰曹公善用兵變化無方衆雖少未可輕也不如以久持之将軍據山河之固擁四州之衆外結英雄内修農戰然後簡其精鋭分為竒兵乗虚迭出以擾河南救右則撃其左救左則擊其右使敵疲於奔命人不得安業我不勞而彼已困不及三年可坐而克也今釋廟算之䇿而決成敗於一戰若不如志悔無及也紹不從遂攻操於官渡紹自引兵至黎陽沮授臨行散其資財會宗族以與之曰勢在威無不加勢亡則不保其身哀哉其弟宗曰曹操士馬不敵君何懼焉授曰以曹兖州之明畧又挾天子以為資我雖克伯珪衆實疲弊而主驕將汰軍之破敗在此舉也揚雄有言六國嗤嗤為嬴弱姬殆今之謂耶及渡河臨舟嘆曰上盈其志下務其功悠悠黄河吾将濟乎紹果為曹公所敗紹進保武陽與操相持沮授又説曰北兵雖衆而果勁不及南南穀虛少而財貨不及北南利在於急戰北利在於緩搏宜修持乆曠以日月紹不從連營漸逼官渡許攸進曰曹操兵少而悉師拒我許下餘守勢必虚弱若分遣輕騎星行襲許㧞則操為成擒如其未潰可令首尾奔命破之必也紹又不能用會攸家犯法審配収繫之攸不得志遂奔曹公而説操襲取淳于瓊瓊時督軍屯在烏巢去紹軍四十里操自将急擊之時張郃説紹曰曹公兵精徃必破瓊瓊破則将軍事去宜引兵救之郭圖曰郃計非也不如攻其本營勢必還此為不救而自觧也郃曰曺公營固攻之必不㧞若瓊等見禽吾屬盡為虜矣紹但遣輕騎救瓊而以重兵攻操營不能下曹公破瓊焚其積聚紹軍潰散奔北曺公遂破紹乃威震天下也太祖討紹子譚尚於黎陽尚與熈奔遼東太守公孫康斬尚熈送其首遂平河北初太祖討譚尚於黎陽連戰數克諸将欲乘勝攻之郭嘉曰袁紹愛此二子莫適立也郭圖馮紀為之謀臣定交鬭其間還相離也急之則相持緩之而後爭心}
  - {type: substitution, offset: 2657, original: 群, replacement: 群, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4365}}
  - {type: variant, offset: 2659, length: 0, content: '', WYG: 不如南向荆州征劉表以待其變變成而後撃之可一舉而定也太祖曰善太祖方征劉表譚果與弟尚爭冀州譚遣辛毘乞降請赦太祖以問羣臣羣臣多以表為強宜先平之譚不足憂也荀攸曰天下方有事而表坐保江漢間其無四方之志可知矣袁氏據四州之地帯甲十萬紹以寛得衆欲使二子和睦以守其成業則天下之難未息今兄弟遘惡其勢不兩全若有所并則力全力全則難圖也及其亂而取之則天下不足定也此時不可失也太祖曰善乃許譚和破袁尚太祖征劉表㑹表卒子琮降劉表字景升山陽髙平人初平元年詔以表為荆州刺史南接五岑嶺北據漢川地方數千里帯甲十餘萬曹操與袁紹相持於官渡紹遣人求助表許之而不至亦不援操且欲觀天下之變劉先説表曰今豪為􅇐並爭兩雄相持天下之重在於将軍將軍若有所起乗其弊可也如其不然固将擇所宜從豈可擁甲十萬坐觀成敗求援而不能助見賢而不能歸此兩怨必集於将軍恐不得復中立矣曹操善用兵其賢俊多歸之其勢必舉袁紹然後移兵向江漢恐将軍不能禦也今之勝計莫若以荆州降操操必重徳將軍長享福祚垂之後嗣此萬全之䇿也表不從十三年曹操自将征表未至表疽發背卒操軍新野𫝊㢲説琮歸降琮曰今與諸君據全楚之地守先君之業以觀天下何為不可㢲曰逆順有大體強弱有定勢以人臣拒人主逆道也以新造之楚而禦中國必危也以劉備而敵曹公不當也三者皆短欲以抗王師之鋒必亡之道也将軍自難保料何如劉備琮曰不若也巽曰誠以備不足禦曹公即全楚}
