  - {type: variant, offset: 7337, length: 947, content: 故不聞其過陵遲至於二世天下土崩今陛下以嗇夫口辭而超遷之臣恐天下隨風而靡爭口辯無其實且下之化上疾於影響舉錯之閒不可不審帝乃止是曰太史公曰春秋推見至隱易本隱以之顯大雅言王公大人而德逮黎庶小雅譏已之得失其流及上所言雖殊其合德一也相如雖虛辭濫說然其要歸引之節儉此與詩之諷諫何異非曰揚雄以為賦者將以諷也必推類而言極麗靡之辭閎侈鉅衍競於使人不能加也既乃歸之於正然覽已過矣往時武帝好神仙相如上大人賦欲以諷帝帝反縹縹有凌雲之志由是言之賦勸而不止明矣又頗類俳優非法度所存賢人君子詩賦之正也是曰淮南子曰東海之魚名鰈音士盍反與床榻字同比目而行北方有獸名曰婁更食更候南方有鳥名曰鶼音兼比翼而飛夫鳥獸魚鰈猶知假力而況萬乘之主乎獨不知假天下之英雄俊士與之為伍豈不痛哉非曰狐卷子曰父賢不過堯而丹朱放兄賢不過周公而管蔡誅臣賢不過湯武而桀紂伐況君之欲治亦須從身始人何可恃乎是曰孔子曰不患無位患己不立非曰孔子厄於陳蔡子路慍見曰昔聞諸夫子積善者天報以福今夫子積義懷仁久矣奚居之窮也子曰由未之識也吾語汝汝以仁者為必信耶則伯夷叔齊為不餓首陽汝以智者為必用耶則王子比干不見剖心汝以忠者為必報耶則關龍逢不見刑汝以諫者為必聽耶則伍子胥不見殺夫遇不遇者時也賢不肖者才也君子博學深謀而不遇時者眾矣何獨丘哉是曰神農形悴唐堯瘦臞舜黎黑禹胼胝伊尹負鼎而干湯呂望鼓刀而入周墨翟無黔突孔子無煖席非以貪祿位將欲起天下之利除萬人之害非曰李斯以書對秦二世云中子曰有天下而不恣睢命之曰以天下桎若堯舜然故謂之桎也夫以人徇己則己貴而人賤以己侚人則己賤而人貴故侚人者賤而所侚者貴自古及今未有不然夫堯禹以身徇天下謂之桎者不亦宜乎是曰論語曰舉逸民人天下之人歸心焉魏文侯受藝於子夏敬段干木過其廬未嘗不式於是秦欲伐魏或曰魏君賢國人稱仁上下和洽未可圖也秦王乃止由此得譽於諸侯非曰韓子曰夫馬似鹿此馬直千金今有千金之馬而無一金之鹿者何也馬為人用而鹿不為人用今處士不為人用鹿類也所以太公至齊而斬華士孔子為司寇而誅少正卯趙主父使李疵視中山可攻否還報曰可攻也其君好見巖穴之士布衣之人主父曰如子之言是賢君也安可攻李疵曰不然夫上顯巖穴之士則戰士殆上尊學者則農夫惰農夫惰則國貧戰士殆則兵弱兵弱於外國貧於內不亡何待主父曰善遂滅中山是曰漢書曰陳平云吾多陰謀道家所禁吾世即廢亡已矣終不能復起以吾多陰禍也, WYG: 全制}
