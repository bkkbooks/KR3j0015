  - {type: variant, offset: 5603, length: 1, content: 孫, WYG: 元顯專政以𤣥跋扈遣軍征之𤣥聞見討即率衆下至京師殺元顯詔以𤣥為丞相封楚王遂禪位髙祖與劉毅何無忌等潜謀匡復起兵平𤣥時桓𤣥使桓𢎞鎮廣陵劉道規為𢎞中兵叅軍令道規襲𢎞桓修鎮丹徒髙祖為修中兵叅軍自襲修克期同發劉毅道規等既襲廣陵斬桓𢎞以其衆南渡髙祖何無忌襲京師斬桓修率二州之衆千二百人進舍竹里移檄京師曰夫成敗相因理不常泰狡焉縱虐或值聖明自我大晉屢搆陽九之厄隆安以來皇家多故貞良斃於豺狼忠臣碎於虎口桓𤣥敢肆凌慢阻兵荆郢肆暴都邑天未忘難凶力實繁踰年之間遂傾皇祚主上播越流幸非所神器沈辱七廟墮墜雖夏后之罹浞豷有漢之遭莽卓方之于𤣥未足為喻自𤣥簒逆於今歴載彌年亢旱民不聊生士庶病於轉輸文武困於版䇿室家分析父}
