  - {type: variant, offset: 2659, length: 0, content: '', krp: 不如南向荆州征劉表以待其變變成而後撃之可一舉而定也太祖曰善太祖方征劉表譚果與弟尚爭冀州譚遣辛毘乞降請赦太祖以問羣臣羣臣多以表為強宜先平之譚不足憂也荀攸曰天下方有事而表坐保江漢間其無四方之志可知矣袁氏據四州之地帯甲十萬紹以寛得衆欲使二子和睦以守其成業則天下之難未息今兄弟遘惡其勢不兩全若有所并則力全力全則難圖也及其亂而取之則天下不足定也此時不可失也太祖曰善乃許譚和破袁尚太祖征劉表㑹表卒子琮降劉表字景升山陽髙平人初平元年詔以表為荆州刺史南接五岑嶺北據漢川地方數千里帯甲十餘萬曹操與袁紹相持於官渡紹遣人求助表許之而不至亦不援操且欲觀天下之變劉先説表曰今豪為杰並爭兩雄相持天下之重在於将軍將軍若有所起乗其弊可也如其不然固将擇所宜從豈可擁甲十萬坐觀成敗求援而不能助見賢而不能歸此兩怨必集於将軍恐不得復中立矣曹操善用兵其賢俊多歸之其勢必舉袁紹然後移兵向江漢恐将軍不能禦也今之勝計莫若以荆州降操操必重徳將軍長享福祚垂之後嗣此萬全之䇿也表不從十三年曹操自将征表未至表疽發背卒操軍新野𫝊㢲説琮歸降琮曰今與諸君據全楚之地守先君之業以觀天下何為不可㢲曰逆順有大體強弱有定勢以人臣拒人主逆道也以新造之楚而禦中國必危也以劉備而敵曹公不當也三者皆短欲以抗王師之鋒必亡之道也将軍自難保料何如劉備琮曰不若也巽曰誠以備不足禦曹公即全楚}
  - {type: variant, offset: 2662, length: 1, content: 厭, WYG: 自存誠以劉備足敵曹公則備不能為將軍也願将軍勿疑琮遂舉衆降時劉備奔在荆州表不能用聞荆州降遂奔夏口也闗中諸將馬超韓遂成宜等反曹公破之曹公與馬超等夾關為界曹公急持而潜遣徐晃等夜戰丁渡蒲坂津據河西為營公自潼關北渡未濟超赴船急斐放牛馬以餌賊賊亂取牛馬公乃得渡結營渭南超遣信求割地任子以和公偽許之韓遂請與公相見至期交馬上語移時不及軍事但説京都故舊拊手歡笑既罷超問遂何言遂曰無所言超疑之他日公又與遂書多所改滅㸃竄如遂改定者超愈疑遂曹公乃與戰大破之關中平諸将問公曰初賊守潼闗渭北道缺不從河東擊馮翊而反守潼關引日而後北渡何也公曰賊守潼關若吾入河東賊必引守諸津則西河未可渡也吾故盛兵向潼關賊必悉衆南守西河之備虚故二將得擅取西河然後引軍北渡賊不能與吾爭西河者以有二將之軍連車樹柵為甬道而南者既為不可勝且以示弱渡渭為堅壘虜至而不出所以驕之也故賊不為營壘而求割地吾順言許之所以從}
