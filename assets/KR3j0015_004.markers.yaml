  - {type: variant, offset: 12636, length: 263, content: 者悅不肖者懼矣哀鰥寡養孤獨恤貧窮誘孝悌選才能此七者修則四海之內無刑人矣上之親下也如腹心則下之親上也如幼子之於慈母矣其於信也如四時而人信之也如寒暑之必驗故視遠若邇非道邇也見明德也是以兵革不動而威用利不施而親此之謂明王之守折衝千里之外者也議曰昔管子謂齊桓公曰君欲霸王舉大事則必從其本矣夫齊國百姓公之本也人甚憂饑而稅斂重人甚懼死而刑政險人甚傷勞而上舉事不時公輕其稅緩其刑舉事以時則人安矣此謂脩本而霸王也曾子曰何謂三至孔子曰至禮不讓而天下理至賞不費而天下之士悅至樂無聲而天下之人和何則昔者明王必盡知天下良士之名既知其名又知其實既知其實, WYG: ''}
