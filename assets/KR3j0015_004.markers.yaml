  - {type: variant, offset: 7253, length: 4, content: 絳侯周勃, krp: 累聖之資繼二祖之業雖夏人之思禹徳復戴少康漢室之戀劉宗重尊光武以今况古彼有慙徳况宻有可伐之勢者三何則始宻與翟譲同起烏合之衆大業已就宻乃殺譲而奪其位士卒初喪其主鬼神新失其祀人神未附一也地廣兵衆法令不明賞罰不信二也精銳之卒並拒秦王鞏洛所留悉皆老病乗其虚而襲之必得志矣三也志曰奪人之先又曰天時不如地利地利不如人和陛下兼此三事又居之以先無不克矣王將從之孟琮曰化及率思歸之衆其鋒不可當李宻英雄勇畧不世非宻無以滅化及且襲之不得復生一化及臣請說以利害示以大節使為元戎以除凶祲徐議其後未為晩焉王曰善孟琮東說宻曰明公以烏合之卒宻邇王城罕慕徳之人無山澤之固兵法所謂四分五裂特所忌焉今東有化及之師西有東都之衆来拒化是及則王師襲其後備東都而不行則化及之師日至於六軍屯洛口化及下武牢誠恐不暇轉旋敗亡已及今皇帝世宗成帝之子世祖明帝之孫也以累世之資當樂推之運士馬百萬據有舊都宇文化及懐音蔑聞親行梟獍主人枕戈待旦將卒蓄力待明將軍誠能率先啓行誅鋤兇暴則有盤石之安無累卵之危也晉文捨斬祛齊桓置射鈎况主上聖哲自天寛和容衆勿以疇昔之失過望於皇帝也狐裘羔䄂将軍擇焉宻初聞張守一之謀大懼及琮至大悦使記室李儉朝越王大悦拜宻為太尉魏國公李宻無東都之慮盡鋭攻化及破之宻自敗化及益以驕傲越王命王世充撃宻宻不用祖君彦計師敗績遂西奔京師尋謀叛殺之王世充之擊宻也宻會郡寮議之裴仁基曰世充今悉鋭而至洛下必空但堅守其要路無令得東而已以銳卒三萬循河曲而上示逼東都東都必急世充必救待其至洛然後還軍如此吾有餘力彼勞奔命兵法所謂彼出則歸彼歸則出數戰以疲之多方以誤之也宻曰公知其一不知其二今世充之兵不可當者三兵仗精鋭一也决計深入二也食盡求戰三也我伹乗城固守蓄力待時彼欲戰不得求走無路不盈十日世充之首可致麾下諸君以為}
