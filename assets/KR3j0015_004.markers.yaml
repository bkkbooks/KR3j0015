  - {type: variant, offset: 6253, length: 302, content: 患宜早為之所曹公方招懷英雄以明大信未得從嘉謀是曰家語曰子路問孔子曰請釋古之道而行由之意可乎子曰不可也昔東夷慕諸夏之禮有女而寡為內私壻終身不嫁不嫁則不嫁矣然非貞節之義矣倉吾嬈音奴鳥反取妻而美讓與其兄讓則讓矣然非禮釀之讓也今子欲捨古之道而行子之意庸知子意以非為是乎語曰變古亂常不死則亡書云事弗師古以克永代匪說攸聞非曰趙武露王欲胡服公子成不悅靈王曰夫服者所以便用禮者所以便事聖人觀鄉而順宜因事而制禮所以利其人而厚其國夫翦髮文身錯臂左衽甌越之人也黑齒雕題鯷冠秫縫犬戎之國也故禮服莫同而其便一也鄉異而用變事異而禮易是以聖人謀可以利其國不一其用謀可以便其禮不法其故儒者一師而俗異中國同禮而離教況於山谷之便乎故去就之變, WYG: 間}
