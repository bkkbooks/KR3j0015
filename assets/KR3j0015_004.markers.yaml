  - {type: variant, offset: 2664, length: 1, content: 快, WYG: 意使自安而不為備因畜士卒之力一旦擊之所謂疾雷不及掩耳卒電不及瞑目兵之乘變固非一道也天子䇿命公為魏王孫權稱吴王據江東劉備襲益州牧劉璋據蜀天下遂三分矣二十五年薨於洛陽子丕嗣丕字子桓武帝太子也是為文帝受漢禪崩子睿嗣睿字元仲文帝太子也是為明帝崩子齊王芳立十五年廢廢髙貴鄉公髦立七年弑廢常道鄉公璜立璜禪晉晉封為陳留王晉髙祖宣皇帝名懿字仲達姓司馬河内温人也仕於魏武之世厯文明二帝居將相之位平孟達逹為新城太守反滅公孫度度世稱燕王據遼東擒王凌凌謀立楚王為帝兵敗自殺魏明帝崩遺詔使帝為太尉與大将軍曹爽輔少主少主齊王芳也帝誅曹爽爽謀為不軌宣帝謝病避之爽黨李勝為荆州別駕帝詭為耄惛云并州近胡可為其備勝退謂爽曰司馬公屍居殘氣神形已離不足虞也爽於是専恣惡太后知政遷於永寧宫嘉平元年天子謁髙陵爽兄弟權兵從出宣帝乃啟奏永寧宫廢爽}
