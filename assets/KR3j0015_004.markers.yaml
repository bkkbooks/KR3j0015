  - {type: variant, offset: 6185, length: 0, content: '', WYG: 大業末謡曰桃李子洪水逺楊山宛在花園裏李唐姓也洪水者唐王諱也楊隋姓也花者葉不實也園囿也代王名侑與囿音同言揚侑雖為帝終於歴數有歸唐王當踐其位也己巳王世充段達等立越王侗為皇帝於洛陽六月宇文化及自江都至彭城據黎陽稱許李宻率大軍壁清淇敦煌張守一聞宻之拒化及也説越王以討越王不用其䇿用孟琮計與宻連和張守一説曰臣聞鴻鵠之翮未就冲天之情已萌武豹之文未偹食牛之心已成今陛下據全周之地背河面洛帶甲十萬粟支數十年此覇王之資非待翮成文偹之勢也固城自守不以濟世為心何異夫羣蟻之嬰一穴乎竊為陛下不取越王曰若之何對曰三王之興五伯之舉莫不由兵以成大業故夏啟有甘野之師齊桓起召陵之衆皆以征討不庭伐叛威慝也今天下土崩英雄競起為陛下腹心之患者莫過夏魏夏遣師涉河則累東都非陛下之地魏遣師逾洛洛口之粟非陛下所有卵之}
  - {type: page-break, offset: 6185, content: '', id: KR3j0015_WYG_004-49a, image: WYG0849/WYG0849-0098c.png}
