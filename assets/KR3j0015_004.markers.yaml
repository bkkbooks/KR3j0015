  - {type: variant, offset: 8295, length: 3278, content: 後漢范曄論耿弇曰三代為將道家所忌而耿氏累葉以功名自終將其用兵欲以殺止殺乎何其獨能崇也是曰易曰崇高莫大於富貴又曰聖人之大寶曰位非曰孫子為書謝春申君曰鄙諺曰厲人憐王此不恭之言也雖然古無虛諺不可不審察也此為劫殺死亡之主言也夫人主年少而矜材無法術以知奸則大臣主斷圖私以禁誅於已也故殺賢長而立幼弱廢正嫡而立不義春秋戒之曰楚王子圍聘於鄭未出境聞王病反問病遂以冠纓絞王殺之因自立也齊崔杼之妻美莊公通之崔杼率其黨而攻莊公莊公走出踰於外牆射中其股遂殺之而立其弟近代李兌用趙餓主父於沙丘百日而殺之淖齒用齊擢閔王之筋懸于廟梁宿昔而死夫厲雖腫胞之疾上比前代未至絞纓射股也下比近代未至擢筋餓死也夫劫殺死亡之主心之憂勞形之困苦必甚於厲矣由此觀之厲雖憐王可也是曰易曰備物致用立成器以為天下利者莫大於聖人非曰莊子曰聖人不死大盜不止雖重聖人而治天下則是重利盜跖也為之㪷斛以量之則并與㪷斛而竊之為之權衡以稱之則并與權衡而竊之為之符璽以信之則并與符璽而竊之為之仁義以教之則并與仁義以竊之何以知其然耶彼竊鉤者誅竊國者為諸侯諸侯之門而仁義存焉則是非竊仁義聖智耶故逐於大道揭諸侯竊仁義并㪷斛權衡符璽之利雖有軒冕之賞弗能勸斧鉞之威弗能禁此重利盜跖而使不可禁者是乃聖人之過也故曰國之利器不可以示人彼聖人者天下之利器也非所以明天下也是曰論語曰君子固窮小人窮斯濫矣非曰易曰窮則變通則久是以自天祐之吉無不利太史公曰鄙人有言何知仁義已饗其利者為有德故伯夷醜周餓死首陽山而文武不以其故眨王跖蹻暴戾其徒誦義無窮由此觀之竊鉤者誅竊國者為諸侯諸侯之門仁義存焉非虛言也今拘學成抱咫尺之義久孤於代豈若卑論儕俗與代沈浮而取榮名哉是曰東平王蒼曰為善最樂非曰語曰時不與善己獨由之故曰非妖則妄是曰龐統好人倫勤於長養每所稱述多過於才時人怪而問之統曰當今天下大亂正道凌遲善人少而惡人多方欲興風俗長道業不美其談則聲名不足慕也不足慕企而為善者少矣今拔十失五猶得其半而可以崇邁代教使有志者自勵不亦可乎非曰人物志曰君子知損之為益故功一而美二小人不知自益之為損故伐一而竝失由此論之則不伐者伐之也不爭者爭之也讓敵者勝之也是故郤至上人而柳下滋甚王叔好爭而終於出奔藺相如以迴車取勝於廉頗寇恂以不鬭取賢於賈復物勢之反乃君子所謂道也是曰孝經曰居家理治可移於官非曰酈生落魄無以為衣食業陳蕃云大丈夫當掃天下誰能掃一室是曰公孫宏曰力行近乎仁好問近乎智知恥近乎勇知此三者知所自理知所以自理然後知所以理人天下未有不能自理而能理人者也此百代不移之道非曰淮南子曰夫審於毫釐之計者必遺天下之數不失小物之選者惑於大事之舉今人才有欲平九州存危國而乃責之以閨閤之禮脩鄉曲之俗是猶以斧鬋毛以刀伐木皆失其宜矣是曰商鞅謂趙良曰子之觀我理秦孰與五羖大夫賢乎趙良曰夫五羖大夫荊之鄙人也聞繆公之賢而願望見行而無資自鬻於秦客被褐飯牛繆公知之舉之牛口之下而加之百姓之上秦國莫敢望焉今君之見秦王也因嬖人景監以為主非所以為名也非曰史記曰藺相如因宦者繆賢見趙王又曰鄒衍作談天論其語閎大不經然王公大人尊禮之適梁梁惠王郊迎執賓主之禮如燕昭王擁篲先驅豈與仲尼菜色陳蔡孟軻困於齊梁同乎哉衛靈公問陣於孔子孔子不答梁惠王謀攻趙孟軻稱太王去邠持方柄欲納圜鑿其能入乎或曰伊尹負鼎而輔湯以王百里奚飯牛繆公用霸作先合然後引之大道鄒衍其言雖不軌亦將有牛鼎之意乎是曰陳仲舉體氣高烈有王臣之節李元禮忠平正直有社稷之能陳留蔡伯喈以仲舉強於犯上元禮長於接下犯上為難接下為易宜先仲舉而後元禮非曰姚信云夫皋陶戒舜犯上之徵也舜理百揆接下之效也故陳平謂王陵言面折庭諍我不如公至安劉氏公不如我若犯上為優是王陵當高於良平朱雲當勝於吳鄧乎是曰史記曰韓子稱儒者以文亂法而俠士以武犯禁二者皆譏而學士多稱於世至如以術取宰相卿大夫輔翼其世主固無可言者及若季次原憲季次孔子弟子未嘗仕孔子稱之讀書懷獨行議不苟合當世當世亦笑之今遊俠其行雖不軌於正義然其言必信其行必果已諾必誠不愛其軀赴士之阨困羞伐其德蓋亦有足多者且緩急人之所時有也虞舜窘於井廩伊尹負於鼎俎傅說匿於傅險呂尚困於棘津夷吾桎梏百里奚飯牛仲尼厄匡菜色陳蔡此皆學士所謂有道仁人也猶遭此菑況以中材而涉近代之末流乎其遇害何可勝道哉而布衣之徒設取予然諾千里誦義故士窮窘而得委命此豈非人之所謂賢豪者耶誠使鄉曲之俠與季次原憲比權量力效功於當代不同日而論矣曷足小哉非曰漢書曰天子建國諸侯立家自卿大夫以至庶人各有等差是以人服事其上而下無覬覦孔子曰天子有道政不在大夫百官有司奉法承令以脩所職越職有誅侵官有罰故上下相順而庶事理焉周室既微禮樂征伐出自諸侯桓文之後大夫世權陪臣執命陵夷至於戰國合縱連橫力政爭強由是列國公子魏有信陵趙有平原齊有孟嘗楚有春申皆藉王公之勢競為遊俠雞鳴狗盜無不賓禮而趙相虞卿棄國捐君以固窮交魏齊之厄信陵無忌竊符矯命殺將專師以赴平原之急皆以取重諸侯彰名天下搤腕而遊談者以四豪為稱首於是背公死黨之議成守職奉上之義廢矣及至漢興禁網踈闊未之匡改也魏其武安之屬競逐於京師郭解劇孟之徒馳鶩於閭閻權行州域力折公侯眾庶榮其名跡覬而慕之雖陷刑辟自與殺身成名若季路仇牧死而不悔也曾子曰上失其道人散久矣非明王在上示之好惡齊之以禮法人曷由知禁而反正乎古之正法五伯三王之罪人也而六國五伯之罪人也夫四豪者六國之罪人也況於郭解之倫以匹夫之細微竊殺生之權其罪也不容於誅矣是曰尸子曰人臣者以進賢為功人主者以用賢為功也史記曰鮑叔舉管仲天下不多管仲之賢而多鮑叔之能知人也非曰蘇建常責大將軍青至尊重而天下之賢士大夫毋稱焉願觀古今名將所招選擇賢者大將軍謝曰自魏其武安之厚賓客天子嘗切齒彼親附士大夫招賢黜不肖者人主之柄也人臣奉法遵職而已何與招士其為將如此議曰此一是一非皆經史自相違者班固云昔王道既微諸侯力政時君世主好惡殊方是以諸家之術蜂起竝作各引一端崇其所善以此馳說取合諸侯其言雖殊譬猶火水相滅亦能相生也仁之與義敬之與和事雖相反而皆相成也易曰天下同歸而殊途一致而百慮此之謂也適變第十五適變第十五昔先王當時而立法度臨務而制事法宜其時則理事適其務故有功今時移而法不變務易而事以古是則法與時詭而時與務易是以法立而時益亂務為而事益廢故聖人之理國也不法古不脩今當時而立功在難而能免秦孝公用衛鞅鞅欲變法孝公恐天下議己疑之衛鞅曰疑行無名疑事無功夫有高人之行固見非於世有獨智之慮者必見贅於人愚者闇於成事智者見於未萌人不可與慮始而可與樂成論至德者不和於俗成大功者不謀于眾是以聖人苟可以強國不法其故苟可以利人不脩其禮孝公曰善甘龍曰不然聖人不易人而教智者不變法而治因人而教不勞而功成緣法而理吏習而人安衛鞅曰龍之所言世俗之言常人安于習俗學者溺於所聞以此兩者居官守法可也非所與論於法之外也三代不同禮而王五伯不同法而霸智者作法愚者制焉賢者更禮不肖者拘焉杜摯曰利不百不變法功不十不易器法古無過脩禮無邪衛鞅又曰治代不一道便國不法古故湯武不脩古而王夏殷不易禮而亡反古者不可非而脩禮者不足多孝公曰善遂變法也由是言之故知若人者各因其時而建功立德焉孟子曰雖有茲基不如逢時雖有智慧不如逢代范蠡曰時不至不可強生事不究不可強成語曰聖人脩備以代時也何以知其然耶桓子曰三皇以道治五帝用德化三皇由仁義五霸用權智說曰無制令刑罰謂之皇有制令而無刑罰謂之帝賞善誅惡諸侯朝事謂之王興兵眾立約盟以信義矯代謂之伯文子曰帝者貴其德也王者尚其義也霸者迫於理也道狹然後任智德薄然後任刑明淺然後任察議曰外建國立功其政不同也如此五帝以上久遠經傳無事唯王霸二盛之美以定古今之理焉秦漢居帝王之位所行者霸事也故以為德之次夫王道之治先除人害而足其衣食論曰五畝之宅樹之以桑匹婦蠶之年五十者可以衣帛矣百畝之田數口之家耕稼脩理可以無飢矣雞豚狗彘之畜不失其時老者可以食肉矣夫上無貪慾之求下無奢淫之人藉稅省少而徭役不繁其仕者食祿而已不與人爭利焉是以產業均而貧富不能相懸也然後教以禮儀故明王審己正統慎乃在位宮室輿服不踰禮制九女正序於內三公分職於外制井田以齊之設諸侯以牧之使饒不溢侈少不匱乏然後申以辟雍之化示以揖讓之容是以和氣四塞禍亂不生此聖王之教也而威以刑誅使知好惡去就虞帝先命禹平水土后稷播植百穀契班五教皋陶脩刑故天下太平也是故大化四湊, WYG: ''}
  - {type: variant, offset: 8295, length: 3278, content: 後漢范曄論耿弇曰三代為將道家所忌而耿氏累葉以功名自終將其用兵欲以殺止殺乎何其獨能崇也是曰易曰崇高莫大於富貴又曰聖人之大寶曰位非曰孫子為書謝春申君曰鄙諺曰厲人憐王此不恭之言也雖然古無虛諺不可不審察也此為劫殺死亡之主言也夫人主年少而矜材無法術以知奸則大臣主斷圖私以禁誅於已也故殺賢長而立幼弱廢正嫡而立不義春秋戒之曰楚王子圍聘於鄭未出境聞王病反問病遂以冠纓絞王殺之因自立也齊崔杼之妻美莊公通之崔杼率其黨而攻莊公莊公走出踰於外牆射中其股遂殺之而立其弟近代李兌用趙餓主父於沙丘百日而殺之淖齒用齊擢閔王之筋懸于廟梁宿昔而死夫厲雖腫胞之疾上比前代未至絞纓射股也下比近代未至擢筋餓死也夫劫殺死亡之主心之憂勞形之困苦必甚於厲矣由此觀之厲雖憐王可也是曰易曰備物致用立成器以為天下利者莫大於聖人非曰莊子曰聖人不死大盜不止雖重聖人而治天下則是重利盜跖也為之㪷斛以量之則并與㪷斛而竊之為之權衡以稱之則并與權衡而竊之為之符璽以信之則并與符璽而竊之為之仁義以教之則并與仁義以竊之何以知其然耶彼竊鉤者誅竊國者為諸侯諸侯之門而仁義存焉則是非竊仁義聖智耶故逐於大道揭諸侯竊仁義并㪷斛權衡符璽之利雖有軒冕之賞弗能勸斧鉞之威弗能禁此重利盜跖而使不可禁者是乃聖人之過也故曰國之利器不可以示人彼聖人者天下之利器也非所以明天下也是曰論語曰君子固窮小人窮斯濫矣非曰易曰窮則變通則久是以自天祐之吉無不利太史公曰鄙人有言何知仁義已饗其利者為有德故伯夷醜周餓死首陽山而文武不以其故眨王跖蹻暴戾其徒誦義無窮由此觀之竊鉤者誅竊國者為諸侯諸侯之門仁義存焉非虛言也今拘學成抱咫尺之義久孤於代豈若卑論儕俗與代沈浮而取榮名哉是曰東平王蒼曰為善最樂非曰語曰時不與善己獨由之故曰非妖則妄是曰龐統好人倫勤於長養每所稱述多過於才時人怪而問之統曰當今天下大亂正道凌遲善人少而惡人多方欲興風俗長道業不美其談則聲名不足慕也不足慕企而為善者少矣今拔十失五猶得其半而可以崇邁代教使有志者自勵不亦可乎非曰人物志曰君子知損之為益故功一而美二小人不知自益之為損故伐一而竝失由此論之則不伐者伐之也不爭者爭之也讓敵者勝之也是故郤至上人而柳下滋甚王叔好爭而終於出奔藺相如以迴車取勝於廉頗寇恂以不鬭取賢於賈復物勢之反乃君子所謂道也是曰孝經曰居家理治可移於官非曰酈生落魄無以為衣食業陳蕃云大丈夫當掃天下誰能掃一室是曰公孫宏曰力行近乎仁好問近乎智知恥近乎勇知此三者知所自理知所以自理然後知所以理人天下未有不能自理而能理人者也此百代不移之道非曰淮南子曰夫審於毫釐之計者必遺天下之數不失小物之選者惑於大事之舉今人才有欲平九州存危國而乃責之以閨閤之禮脩鄉曲之俗是猶以斧鬋毛以刀伐木皆失其宜矣是曰商鞅謂趙良曰子之觀我理秦孰與五羖大夫賢乎趙良曰夫五羖大夫荊之鄙人也聞繆公之賢而願望見行而無資自鬻於秦客被褐飯牛繆公知之舉之牛口之下而加之百姓之上秦國莫敢望焉今君之見秦王也因嬖人景監以為主非所以為名也非曰史記曰藺相如因宦者繆賢見趙王又曰鄒衍作談天論其語閎大不經然王公大人尊禮之適梁梁惠王郊迎執賓主之禮如燕昭王擁篲先驅豈與仲尼菜色陳蔡孟軻困於齊梁同乎哉衛靈公問陣於孔子孔子不答梁惠王謀攻趙孟軻稱太王去邠持方柄欲納圜鑿其能入乎或曰伊尹負鼎而輔湯以王百里奚飯牛繆公用霸作先合然後引之大道鄒衍其言雖不軌亦將有牛鼎之意乎是曰陳仲舉體氣高烈有王臣之節李元禮忠平正直有社稷之能陳留蔡伯喈以仲舉強於犯上元禮長於接下犯上為難接下為易宜先仲舉而後元禮非曰姚信云夫皋陶戒舜犯上之徵也舜理百揆接下之效也故陳平謂王陵言面折庭諍我不如公至安劉氏公不如我若犯上為優是王陵當高於良平朱雲當勝於吳鄧乎是曰史記曰韓子稱儒者以文亂法而俠士以武犯禁二者皆譏而學士多稱於世至如以術取宰相卿大夫輔翼其世主固無可言者及若季次原憲季次孔子弟子未嘗仕孔子稱之讀書懷獨行議不苟合當世當世亦笑之今遊俠其行雖不軌於正義然其言必信其行必果已諾必誠不愛其軀赴士之阨困羞伐其德蓋亦有足多者且緩急人之所時有也虞舜窘於井廩伊尹負於鼎俎傅說匿於傅險呂尚困於棘津夷吾桎梏百里奚飯牛仲尼厄匡菜色陳蔡此皆學士所謂有道仁人也猶遭此菑況以中材而涉近代之末流乎其遇害何可勝道哉而布衣之徒設取予然諾千里誦義故士窮窘而得委命此豈非人之所謂賢豪者耶誠使鄉曲之俠與季次原憲比權量力效功於當代不同日而論矣曷足小哉非曰漢書曰天子建國諸侯立家自卿大夫以至庶人各有等差是以人服事其上而下無覬覦孔子曰天子有道政不在大夫百官有司奉法承令以脩所職越職有誅侵官有罰故上下相順而庶事理焉周室既微禮樂征伐出自諸侯桓文之後大夫世權陪臣執命陵夷至於戰國合縱連橫力政爭強由是列國公子魏有信陵趙有平原齊有孟嘗楚有春申皆藉王公之勢競為遊俠雞鳴狗盜無不賓禮而趙相虞卿棄國捐君以固窮交魏齊之厄信陵無忌竊符矯命殺將專師以赴平原