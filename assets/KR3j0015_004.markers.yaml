  - {type: variant, offset: 5165, length: 1, content: 遇, WYG: 之招韓信也今權譎遣使無誠大款之形脱生猜疑圖之兆露後雖竒略無所設也夫立事必先為之卑當稱藩推奉尚恐不信羊祐之事臣未見其可也勒曰君侯之計是也乃遣其舍人王子春賫珍寳奉表推崇浚浚謂子春曰石公一時英武據有舊趙成鼎峙之勢何為稱藩}
