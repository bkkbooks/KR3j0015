  - {type: variant, offset: 5598, length: 0, content: '', krp: 輕騎襲幽州頭聲勒晨至薊北門叱門者開門疑有伏兵先驅牛羊數千言上禮實填諸街巷}
  - {type: variant, offset: 5599, length: 0, content: '', WYG: 兵不得動發勒入浚乃懼勒入其聽事令甲士執浚送於襄國市斬之此三十六國之大略也惠帝立十四年崩弟豫章王熾立字豐度是為懐帝都長安為劉聰所殺後魏拓跋氏以晉懐帝永嘉三年自雲中入雁門北有沙漠南據隂山衆數十萬至孝文乃改跖跋為元氏都洛陽肅宗崩大都督爾朱榮謀立莊帝榮害靈太后及王公二千}
  - {type: page-break, offset: 5599, content: '', id: KR3j0015_WYG_004-31a, image: WYG0849/WYG0849-0089c.png}
  - {type: variant, offset: 5599, length: 0, content: '', krp: 兵不得動發勒入浚乃懼勒入其聽事令甲士執浚送於襄國市斬之此三十六國之大略也惠帝立十四年崩弟豫章王熾立字豐度是為懐帝都長安為劉聰所殺後魏拓跋氏以晉懐帝永嘉三年自雲中入雁門北有沙漠南據隂山衆數十萬至孝文乃改跖跋為元氏都洛陽肅宗崩大都督爾朱榮謀立莊帝榮害靈太后及王公二千}
  - {type: variant, offset: 5600, length: 0, content: '', WYG: 立莊帝帝殺爾朱榮左僕射爾朱世隆率榮部曲自晉陽襲京城執莊帝殺之而立恭帝又廢之髙歡乃知廣平王子修後為斛律斯椿所脅走入闗周太祖宇文黒獺奉帝都長安披草萊立朝廷是為西魏詔授宇文泰為丞相泰又害出帝立南陽王寳炬是為文帝文帝崩立王子為帝又廢之而立恭帝泰為太師泰薨子覺嗣封周公魏帝禪位於覺泰之第三子受禪國號周至宣帝帝起崩禪於隋初爾朱榮之殺莊帝也髙歡為晉州刺史兵誅之立魏出帝歡為丞相後魏既西入闗乃立清河王之子善見為帝遷都鄴是為東魏髙歡薨子齊王洋受東魏禪國號齊至温公緯為周所滅周又為矣隋所滅隋文帝既受周禪又南滅陳天下一統懐帝崩立吴王晏子業是為愍帝亦為劉聰所殺此時胡亂中原晉元乃遷都江左也中宗元皇帝睿乃興於江東睿字景文宣帝曾孫也元帝幼而聰敏及中原喪亂乃與王敦等渡江撫綏江左甚得衆心後王敦於武昌反至石頭帝攻之不克乃委政於敦敦還鎮武昌郡帝在位十六年崩太子紹立紹字道畿是為肅宗明皇帝王敦威振内外將謀為逆肅宗征破之用温嶠等決計征之初敦之謀反也温嶠為其從事中郎夙夜綜其府事偽相親善京兆尹缺嶠説敦曰宜自樹腹心以間搆人主愚謂錢鳯可用敦曰莫若君嶠偽辭讓臨别之際嶠自起行酒嶠偽醉以手板擊錢鳯幘幘為之墮乃作色曰錢世儀何人温太真自行酒而敢不飲鳯不悦以醉為解明日嶠將發鳯説敦留之敦曰嶠常云錢世儀精神滿腹昨小加聲色豈得以此相讒耶嶠至都陳敦反逆状三年肅宗崩至孝武帝昌明立簡文皇帝三子羝賊苻堅㓂淮南晉冠軍將軍}
