  - {type: variant, offset: 2629, length: 2, content: 虓闞, WYG: 致臣節殞首䘮元必無二志有渝此盟俾墜其命無克遺育皇天后土祖宗明靈實皆鑒之洪慷慨涕泗立下聞者激揚曹公行稱奮武將軍卓聞兵起乃徙天子都長安卓留兵屯洛陽司徒王允與吕布殺卓楊奉韓暹以天子還洛陽太祖至洛陽衞京邑暹遁去太祖以洛陽燒焚殘破奉天子都許下詔責袁紹以地廣兵強專自樹黨不聞勤王之師紿時并公孫瓚兼四州之地紹遂攻許太祖破之官渡紹嘔血死袁紹字本初汝南人也}
