  - {type: 'tls:seg', offset: 5664, content: '', id: KR3j0015_CH7x2006_004-2a.564}
  - {type: variant, offset: 5665, length: 0, content: '', WYG: 將授公典禮其敬聽朕命乃者袁劉搆禍實繁有徒子房不臣稱兵協亂顧瞻宫掖將成茂草言念邦國翦為仇讐當此之時人無固志投袂徇難超然奮發登戎車而戒路執金版而先驅麾鉞一臨凶黨氷泮此則覇業之基勤王之始也安都背叛竊據徐方敢率犬羊凌虚淮浦索兒愚悖同惡相濟天柞無象背順歸逆北鄙黔黎奄墜塗炭公受命宗祊精貫朝日擁節軍門氣踰霄漢破釡之捷斬馘蔽野石梁之戰梟其渠帥保境全人江陽即序此又公之功也張淹迷昧不顧本朝爰自南區志圖東夏潜軍間入竊覬不虞於時江服未夷皇途薦阻公忠義奮發在險彌亮以寡制衆所向風偃朝廷無東顧之憂閩越有來蘇之望此又公之功也匈奴野心侵掠疆場醜羯侜張勢振彭泗公奉辭伐罪戒旦晨征兵車始交氛䘲時蕩弔死扶傷𢎞宣皇澤俾我淮淝復沾盛化此又公之功也自兹厥後獫狁孔熾封豕長蛇重窺上國而世故相仍師出已老角城髙壘指日淪䧟公眷言王事發憤忘食躬擐甲胄祖險若夷分疆畫界開創青兖此又公之功也桂陽負衆輕問九鼎裂冠毁冕拔本塞源烈火焚於王城飛矢集於君屋羣后憂惶元戎無主公挺劒凝神則竒謀不世把旄指麾則懦夫成勇信宿之間宣陽底定此又公之功也蒼梧肆虐諸夏糜沸淫刑以逞誰則無辜黔首相悲朝不謀夕髙祖之業已淪文明之軌誰嗣公逺稽殷漢之義近遵魏晉之典猥以眇身入奉宗社七廟清謐九區反政此又公之功也袁劉攜貳成此亂階醜圖潜搆危機宻發據有石頭志犯應路神謨内運霜鋒外舉祅沴載澄國途恱穆此又公之功也沈攸包藏嵗月滋彰蜂目犲聲阻兵安忍乃眷西顧緬同異域而經綸維始九伐未申長惡不悛遂逞凶逆公仗鉞出關凝威江甸正情與皎日同亮明畧與秋雲競爽至義所感人百其心積年逋誅一朝顯戮湘浦安流章臺順軌此又公之功也公有濟天下之勲加之以明哲道庇生靈志匡宇宙戮力肆心劬勞王室險阻艱難備嘗之矣若乃締搆宗室之勲造物資始之澤雲布霧散光被六合弼余一人永清四海遐方欵關而慕義荒服重譯而來庭汪哉邈乎無得而名之也四月宋帝禪位於齊甲午即皇帝位於南郊柴燎告天曰皇帝臣道成敢用𤣥牡昭告於皇皇后帝夫肇自生靈樹以司牧所以闡極則天開元創物肆兹大道惟命不於常昔在虞夏受終上代粤自漢魏揖讓中葉咸煥諸方冊載在典謨水徳既微仍世多故實頼道成匡救之功以𢎞濟於厥難大造顛墜再搆區宇誕唯天人罔弗和㑹迺仰協歸運景屬與能用集大命於兹辭徳匪嗣至於累仍而羣公卿士庶尹御事爰及黎獻暨於百戎僉曰皇天眷命不可以固違人神無統不可以曠主畏天之威敢不祗順鴻歴敬簡元辰䖍奉皇符登壇受禪告類上天以答人衷式敷萬國唯明靈是饗禮畢備法駕幸建康宫臨太極前殿大赦改元建元四年崩立太子賾是為世祖武皇帝也崩立太}
