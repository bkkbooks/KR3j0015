  - {type: variant, offset: 595, length: 0, content: '', WYG: 義帝也然而楚王將以戰勝自強漢王収諸侯還守滎陽下蜀漢之粟深溝髙壘分卒守徼乗塞楚人還兵間以梁地深入敵國八九百里欲戰則}
  - {type: variant, offset: 595, length: 0, content: '', krp: 義帝也然而楚王將以戰勝自強漢王収諸侯還守滎陽下蜀漢之粟深溝髙壘分卒守徼乗塞楚人還兵間以梁地深入敵國八九百里欲戰則}
  - {type: variant, offset: 596, length: 1, content: 辜, WYG: 得攻城則力不能老弱轉糧千里之外楚兵至滎陽城臯漢堅守而不動進則不得攻退則不得解故曰楚不足恃也使楚勝則諸侯自危懼而相救夫楚之強適足以致天下之兵耳故楚不如漢其勢易見也今大王不與萬全之漢而自託於危亡之楚臣竊為大王惑之臣非以淮南之兵足以亡楚也大王發兵而倍楚項王必留齊數月漢之取天下可以萬全臣請以大王提劍而歸漢漢必裂土地而分大王又況淮南必大王有也故使臣進愚計願大王留意也淮南王曰請奉命隂許叛楚與漢未敢泄楚使者在淮南方急貴英布發兵舍傳舍隨何直入坐楚使者上坐曰九江王已歸漢楚何以得令發兵布愕然楚使者起何因說布曰事已搆矣獨殺楚使者無使歸而疾走漢并力乃如漢使者教於是殺楚使者因起兵攻楚也漢王如滎陽使韓信擊魏王豹虜之漢王問酈生曰魏王大将誰也曰柏直王曰此其口尚乳臭不能當韓信騎将馮敬王曰不能當灌嬰歩将項他王曰不能當曹叅在吾無患矣王乃以信為左丞相撃魏信進兵為陳舩欲渡臨晉魏聚兵拒之信乃伏兵從夏陽以木罌度軍襲安邑虜魏王豹便進兵伐趙也漢遂與楚相距於滎陽楚圍漢王用陳平計間得出漢王急問陳平䇿安出陳平曰彼項王骨鯾之臣亞夫鍾離末之屬不過數人大王能出捐數萬金行}
