  - {type: variant, offset: 5601, length: 1, content: 孫, WYG: 𤣥等大破堅於淝水苻堅以百萬之衆至淝水謝𤣥乃選勇士八千人涉渡淝水𤣥遣使謂堅曰阻水為陣曠日持久請小却與君周旋秦諸將聞前軍却謂已失利朱序之徒聲云堅敗大軍退自相填籍聞風聲鶴唳皆曰南軍至也遂大敗堅還長安苻堅因此卒亡滅也二十一年帝崩自後遂干戈相繼至安帝為桓𤣥所簒宋祖劉裕平𤣥至恭帝遂禪於宋髙祖武皇帝姓劉名裕字徳輿彭城人桓𤣥簒晉偽楚桓𤣥字敬徳譙國龍亢人也形貌瓌特為江州刺史襲殺荆州刺史殷仲堪㑹稽王世}
  - {type: page-break, offset: 5601, content: '', id: KR3j0015_WYG_004-32b, image: WYG0849/WYG0849-0090b.png}
