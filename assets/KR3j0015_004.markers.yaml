  - {type: variant, offset: 5607, length: 2, content: 趙趙, WYG: 悲摽梅有傾筐之怨而已哉仰觀天文俯察人事此而可存孰有可亡几在有心誰不扼腕裕等所以叩心泣血不遑啟處夕寤宵興思奬忠烈潜搆﨑嶇過於履虎乘機奮發義不圖全輔國將軍劉毅廣武將軍何無忌等忠烈斷金精誠貫日投袂荷戈志在畢命義衆既集文武爭先咸謂不有一統事無以輯辭不獲已遂總軍要庶上憑祖宗之靈下罄義夫之力翦馘逋逆盪清華夏公侯諸君或世樹忠貞或身寵爵祿而並俛眉猾竪無由自効顧瞻周道寧不弔乎今日之事良其㑹也裕以虚薄才非古人受任於既傾之運接勢於己替之機丹誠未宣感奮填激望霄漢以永懐顧山川而增佇投檄之日神馳賊廷何無忌之辭也桓𤣥使桓謙屯東陵卞範之屯覆舟山義軍朝食并其餘進造覆舟山東令羸兵登山多張旗幟布滿山谷髙祖率衆奔之士皆殊死戰謙軍一時潰走𤣥單騎走江陵𤣥將入蜀奔至枚回州逢益州叅軍費恬之黨射殺之奉天子反正因居將相之任封豫州郡公蜀賊譙縱稱王髙祖遣將征平之髙祖使朱齡石率衆二萬自江陵伐蜀髙祖誡曰劉敬宣往出黄武無功而退今者師出應道青衣賊料我當出其不意復從内水如此則涪城之戍必有重兵若逼黄武正墮其計今軍自外水出取城都疑兵向黄武此制敵之上䇿為書於函署曰至白帝發諸將雖行未知所趨及至白帝乃發書言衆軍悉由外水臧熹自中水出廣漢使羸弱乘髙檻千餘向黄武譙縱果至譙道福重兵守涪城朱齡石次彭模拒成都二百里譙縱大將侯暉等屯彭模朱齡石謂劉鍾曰天方暑熱賊今固險攻之難抜秪困吾師欲畜鋭息甲伺隙而進卿}
  - {type: page-break, offset: 5607, content: '', id: KR3j0015_WYG_004-33b, image: WYG0849/WYG0849-0090d.png}
