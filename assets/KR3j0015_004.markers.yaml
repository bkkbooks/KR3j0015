  - {type: variant, offset: 163, length: 419, content: 可奪此正義也若趙相虞卿棄相捐君以周魏齊之危信陵無忌竊符矯命以赴平原之急背公死黨之義成守職奉上之節廢故毛公數無忌曰於趙則有功矣於魏則未為得凡此之類皆華偽者禮者所以行敬謹亦所以生惰慢反禮也議曰漢時欲定禮文帝曰繁禮飾貌無益於禮躬化謂可耳故罷之郭嘉謂曹公曰紹繁禮多儀公體任自然此道勝者也夫節苦難貞故生惰慢也樂者所以和情志亦所以生淫放反樂也樂書曰鄭衛之音亂代之音桑閒濮上之音亡國之音也故嚴安曰夫佳麗珍怪故順於耳目故養失而泰樂失而淫禮失而彩教失而偽偽彩淫泰非所以範人之道名者所以正尊卑亦所以生矜篡反名也議曰古者名位不同禮亦異敷故聖人明禮制以序尊卑異車服以彰有德然漢高見秦皇威儀之盛乃歎曰大丈夫當如此此所以生矜篡老經曰夫禮者忠信之薄而亂之首信矣哉法者所以齊眾異亦所以生乖分反法也議曰道德經云法令滋彰盜賊多有賈誼云法出而奸生令下而詐起此乖分也刑者所以威不服亦所以生凌暴反刑也賞者所以勸忠能亦所以生鄙爭反賞也文子曰聖人其作書也以領理百事愚者以不忘智者以記事, WYG: 用}
