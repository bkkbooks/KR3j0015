  - {type: variant, offset: 831, length: 63, content: 亦宜乎楚靈為章華之台伍舉諫曰夫先王之為臺榭也榭不過講軍實臺不過望氛祥其所不奪穡地其為不匱財用其事不煩官業其日不妨時務夫為臺榭將, WYG: 從遂大戰赤眉佯敗棄輜重走車皆載土}
