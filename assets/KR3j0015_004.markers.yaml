  - {type: variant, offset: 630, length: 3, content: 權莊子, WYG: 乃使其大将費邑軍歴下又分兵屯於祝阿別於太山鍾城列營數十以待弇弇乃度河先擊祝阿自旦攻城日未中而㧞之故開圍一角令其衆得奔歸鍾城鍾城人聞祝阿潰大懼遂空壁亡去費邑分遣其弟敢守巨里弇留兵脅巨里使多伐樹木揚言以填塞坑塹數日有降者言邑聞弇欲攻巨里謀來救之弇乃令軍中}
