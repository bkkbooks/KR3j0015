  - {type: variant, offset: 947, length: 431, content: 趨私外內拑舉奸人在位賢者穩處反賢也太公謂文王曰君好聽世俗之所舉者或以非賢為賢或以非智為智君以世俗之所舉者為賢智以世俗之所毀者為不肖則多黨者進少黨者退是以群邪比周而蔽賢是以世亂愈甚文王曰舉賢奈何太公曰將相分職而君以官舉人案名察實選才考能則得賢之道古語曰重朋黨則蔽主爭名利則害友務欲速則失德也韓詩外傳曰夫士有五反有勢尊貴不以愛人行義理而反以暴傲反貴也古語曰富能富人者欲貧不可得貴能貴人者欲賤不可得達能達人者欲窮不可得梅福曰存人所以自立也壅人所以自塞也家富厚不以振窮救不足而反以侈靡無度反富也資勇悍不以衛上攻戰而反以侵凌私鬭反勇也凡將帥輕去就者不可使鎮邊使仁德守之則安矣心智惠不以端計教而反以事奸飾詐反智惠也說苑曰君子之權謀正小人之權謀邪貌美好不以統朝莅人而反以蠱女從慾反貌也此五者所謂士失其美質太公曰明罰則人畏懾人畏懾則變故出反明罰也明察則人擾人擾則人徙人徙則不安其處易以成變反明察也太公曰明賞則不足不足則怨長明王理人不知所好而知所惡不知所歸而知所去使人各安其所生而, WYG: 孫述}
