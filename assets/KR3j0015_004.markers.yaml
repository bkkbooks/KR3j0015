  - {type: variant, offset: 624, length: 0, content: '', krp: 上曰善賜金五百陳豨為代相與韓信王黄等反豨自立為代王上自往破之高祖赦趙代吏人為豨所詿誤者趙相奏斬常山守尉曰常山北二十五城豨反亡其二十五城上問曰守尉反乎對曰不反上曰是力不足也赦之復以為守尉上既至邯鄲喜曰豨不南據漳水北守邯鄲吾知其無能為也問周昌曰趙亦有壮士可今為将者乎對曰見有四人焉謁上謾罵曰豎子能為将乎各封之千户以為将左右諫曰從入蜀漢伐楚功未徧行今此何功而封上曰非爾所知也陣豨反邯鄲以北皆豨有也吾以羽檄徴天下兵未有至者今惟獨邯鄲中兵耳吾何愛四千户不封此四人以慰趙子弟心皆曰善於是上曰陳豨将誰也曰王黄曼丘臣皆故賈人上曰吾知之矣乃各以千金購黄臣等其黄臣等麾下受購賞皆生得以故陳豨軍遂敗初韓信知漢畏惡其能與陳豨謀反高帝自将擊豨信稱疾不從行欲從中起信舎人得罪信囚之欲殺舎人弟告信反状於吕后呂后欲召恐其黨不就乃與蕭相國謀詐令人從上所來言豨已死矣列侯羣臣皆賀相國詐信曰雖病強入賀信入吕后使武士縳信斬之長樂宫尉佗王南越反髙祖使陸賈賜尉佗印綬為南越王令稱臣奉漢約陸生至南越尉佗魋髻箕踞見陸生陸生因進説曰足下中國人親戚昆弟墳墓在真定今足下反天性棄冠帯欲以區區之越與天子抗衡為敵國禍且及身矣且夫秦失其政諸候豪杰並起唯漢王先入關據咸陽項王背約自立為西楚霸王諸候皆屬可謂至強然漢王起巴蜀鞭笞天下制諸侯遂誅項羽滅之五年間海内平定此非人力天之所建也天子聞君王南越不助天下誅暴逆将欲移兵而誅王天子憐百姓新勞苦且休之遣臣授君王印綬剖符通使君王宜郊迎北面稱臣乃欲以新造未集之越屈強於此漢誠聞之掘王先人塜夷滅王宗族使一偏将将十萬衆以臨越則越殺王以降如反覆手耳於是尉佗蹶然起謝陸生卒拜尉佗而還初南海尉任囂病且死召龍川今趙佗謂曰聞陳勝作亂豪杰叛秦相立畨禺負山險阻南海東西數千里頗有中國人相輔此一州之主也可以立國}
  - {type: variant, offset: 625, length: 0, content: '', WYG: 以佗行東海尉事囂死佗移檄告諸郡曰盗兵即至急絶新道聚兵自守因稍以法誅秦所置長吏以其黨為假守自立為南越武王髙祖在位十二年崩年六十二恵帝立吕后臨政吕后時陳平燕居深念陸生曰何念之深也平曰生揣吾何念陸生曰足下位為上相食三萬户侯可謂極富貴無欲矣然有憂念不過患諸吕少主耳平曰然為之奈何陸生曰天下安注意於相天下危注意於將將相和則士豫附士豫附天下雖有變則權不分權不分則社稷計在兩君掌握耳何不交歡太尉深相交結平用其計竟誅諸吕初吕后之崩也大臣誅諸吕吕禄為將北軍太尉勃不得入北軍時酈商子寄與吕禄善於是乃使人刼酈商其子紿吕禄信之故與出遊而太尉乃得入北軍誅吕氏也景帝時吳楚反征平之帝使太尉周亞夫東擊吴楚亞夫問父客鄧都尉曰策將安出客曰吴兵銳甚難爭鋒楚兵輕不能持久方今為將軍計莫若引兵東壁昌邑以梁委吴吴必盡銳攻之將軍深溝高壘使輕兵絶淮泗口吴糧道絶使吴梁相弊而糧食竭乃以全制其極破吴必矣條侯曰善因請上曰楚兵剽輕難與爭鋒願以梁委之絶其糧道乃可制也上許之亞夫至滎陽吴方急攻梁梁急請救亞夫引兵東北走昌邑深壁而守梁王使使請亞夫夫守便宜不徃堅不出而使弓高侯等屯吴楚兵後絶其餉道吴楚兵乏糧飢欲退數挑戰終不出吴楚既餓乃引兵而去亞夫出精兵追擊大破吴也崩太子徹立是為武帝崩子勿陵立是為昭帝霍光輔政上官桀害光寵詐為帝兄燕王旦上書稱光行上林稱蹕又私調校尉帝不信而上官桀詐偽事果發伏誅崩立武帝孫昌邑王賀賀昌邑哀王髆之子即位二十七日事有千一百二十七條霍光廢賀為海昏侯也廢立武帝曽孫詢是為宣帝衛太子之孫崩立太子奭是為元帝崩立太子鷔是為成帝委政諸舅王鳯等同日拜鳯兄弟五人為侯號曰五侯五侯皆專政也崩立宣帝孫定陶恭王子欣是為哀帝即位六年崩無嗣崩立帝弟中山孝王衎是為平帝帝年㓜為王莽所酖崩立宣帝𤣥孫嬰是為孺子莽廢嬰自立偽新室王莽者成帝舅王曼之子元帝王皇后之姪也元帝崩成帝即位以元舅鳯為大司馬兄弟五人皆為侯元帝皇后魏郡王禁之女生成帝時鳯秉政同日封兄弟五人為五侯曼早卒鳯將薨以莽託太后太后莽之姑也封為新都侯五侯競為僣起治第舎莽幼孤貧獨折節恭謹當世名士多為莽言上由是賢之拜為侍中莽結交將相収贍名士賑施賔客故虛譽隆洽傾熾其諸父矣時成帝廢許后立趙飛燕飛燕女弟為昭儀昭儀害後宫皇太子帝無嗣乃立定陶王欣為皇太子欣者宣帝孫成帝弟之子初王祖母傅太后陰為王求為漢嗣私事趙皇后昭儀及帝舅王鳯故勸立之莽以發定陵侯淳于長大姦拜為大司馬初長與許皇后姊孊私通因孊賂遺長長許欲白上為左皇后時王根輔政久病長嘗代根莽心害長寵白根曰長與許貴人私交通見將軍久病私喜根怒令莽白長長下獄死時年三十八成帝崩哀帝即位立皇后傅后后即帝祖母定陶恭太后從女弟也封后父傅晏為孔郷侯帝母丁后曰恭皇太后舅丁明為安陽侯莽乞骸骨避丁傅也哀帝崩時莽以侯在第太皇太后令莽備佐喪事太皇太后元帝皇后也復為大司馬徴立中山王為帝即平帝帝名衍為中山王即孝王子也太皇太后臨朝莽秉政百官總已以聽於莽附順者㧞擢忤恨者誅滅以王尋王邑為腹心甄豊甄邯主擊斷平晏典樞機劉歆典文章孫建為爪牙皆以才能並任顯職莽色厲而言方欲有所為㣲見風采黨與承意而顯奏之莽因固讓示不得已上以感太后下以取信於衆庶越裳氏重譯獻白雉一黒雉二莽令益州諷羣臣奏言莽功徳比周公宜賜號安漢公平帝崩莽徴宣帝𤣥孫廣成侯子嬰立之年三嵗遂謀居攝如周公故事時元帝統絶宣帝曽孫五人莽惡其長者託以卜相宜吉乃立嬰也東都太守翟義反敗死義丞相方進子地立劉信為天子也莽自謂威徳遂盛獲天人之助用銅匱符命遂即真梓橦人哀章上銅匱符命其九年赤眉賊起瑯邪女子吕母為子報仇黨衆復浸多號赤眉賊十四年世祖起兵與王匡等共立劉聖公為更始皇帝更始即世祖族兄世祖及兄伯升與新市平林兵士王匡等合軍攻棘陽莽遣王尋王邑擊更始二人兵敗於昆陽漢兵遂入城中人皆降莽走漸臺蔵於室中北隅間校尉孫賓就斬莽遂𫝊首詣更始於宛世祖光武皇帝諱秀字文叔南陽蔡陽人髙皇帝之九代孫也王莽末天下連嵗灾蝗寇盜蜂起莽末南方飢饉人民羣入野澤掘鳬茈而食更相侵奪新市人王匡為平理爭訟遂推為渠帥時世祖避吏新野因賣穀宛宛人李通以圖䜟説世祖通父守好䜟記通素聞守説云劉氏復興李氏為輔私嘗懐之及下江新市兵起通弟軼乃共計議曰今四方擾亂新室且亡漢當更興南陽宗室獨劉伯升兄弟汎愛容衆可與謀大事通曰吾意也會世祖避事在宛通聞之即遣軼迎世祖遂相約結初世祖與伯升鄧晨俱之宛與穣人蔡少公等讌語少公頗學圖䜟言劉秀為天子或曰是國師劉秀乎世祖笑曰何用知非僕耶坐者皆大笑晨心獨喜後因謂世祖曰王莽殘暴盛夏斬人此天亡之時往時㑹宛語獨當應耶世祖笑及漢兵起鄧晨遂徃従之世祖於是與通弟李軼起於宛兄伯升起於舂陵鄧晨起於新野㑹衆兵擊長聚新市人王匡等立劉聖公為天子而害伯升劉𤣥字聖公世祖族兄也避吏平林王匡等立之初伯升自王莽簒漢常憤憤懐匡復社稷之慮不事家人之居業傾身破産交結天下雄俊王莽末盜賊羣起伯升召諸豪杰計議於是使親客鄧晨起新野世祖李軼起於宛伯升發舂陵子弟七八千人部署賔客自稱柱天都部使劉嘉誘新市平林兵王匡陳牧等合軍而進屠長聚諸将議立劉氏以從人望豪傑咸欲歸伯升而新市平林将帥樂放縱憚伯升威明貪聖公懦弱先定䇿立之然後召伯升示其議伯升曰諸將軍欲尊立宗室徳甚厚焉愚鄙之見竊有未同今赤眉起青徐衆數十萬聞南陽立宗室恐赤眉復有所立如此将内自争今王莽未滅而宗室相攻是疑天下而自損權非所以破莽也且首兵唱號鮮有能遂陳勝項羽即其事也舂陵去宛三百里耳未足為功而遽自尊立為天下準的使後人承吾弊非計之善者也今且稱王以號令若赤眉所立者賢則相率而徃從之若無所立破莽除赤眉然後舉尊號亦未晩也願善詳思之諸将不從遂立聖公由是豪傑失望伯升都部将劉稷勇冠三軍聞更始立怒曰本起兵圖大事者劉伯兄弟也更始何為者耶更始君臣聞而心忌之乃陳兵數千収稷将誅之伯升固争李軼朱鮪因勸更始并執伯升即日害之李軼與世祖既隙後因馮公孫致宻書求効誠節咸勸秘之世祖乃班露軼書曰李季文多詐不信人也今移其書告守尉書既宣露朱鮪使人殺軼也號更始元年更始便世祖為偏將軍徇昆陽王莽聞漢帝立大懼遣大司徒王尋大司空王邑將兵百萬撃世祖於昆陽世祖破之初伯升㧞宛已三日而世祖尚未知乃偽使人持書報城中宛下兵到而佯墮下其書尋邑得之不喜諸将既經屢捷膽氣益壮無不一當百世祖乃與敢死者三千人從城西出衝中堅尋邑陳亂乘鋭奔之遂殺王尋莽兵大潰走者自相騰踐奔殪百餘里間會大雷風雨下如注滍水盛溢虎豹皆戰慓溺死者以萬數水為之不流三輔豪􅇐共誅王莽𫝊首詣宛更始以世祖行大司馬事持節北渡河鎮慰州郡鄧禹杖䇿北渡河追世祖世祖見禹甚歡謂曰我得専封拜先生逺來寧欲仕乎禹曰不願也明公威徳加於四海禹得効其尺寸垂功名於竹帛耳世祖笑因留宿禹進説曰更始雖都闗西今山東未安赤眉青犢之不屬動以萬數三輔假號往往羣聚更始既未有所挫而自聽斷諸将皆庸人崛起志在財帛爭用威力朝夕自快而已非有忠良明智深慮逺圖欲尊主安民者也四方分崩離析形勢可見明公雖建蕃輔之功猶恐未可成立於今之計莫知延覧英雄務悦人心立高祖之業救萬人之命以公而慮之天下不足定也世祖大悦及從至廣阿披輿地圖指示禹曰天下郡國如是今始得其一子前言以吾慮之天下不足定何也禹曰今海内散亂人思明君猶赤子之慕慈母也古之興者在徳厚薄不以小大世祖笑悦又馮異説世祖曰人思漢久矣今更始諸将縱横暴虐所至虜掠百姓失望無所依戴今公専命方面施行恩徳夫有桀紂之亂乃見湯武之功人久飢渴易為充飽宜急分遣官屬廵行郡縣理寃結布惠澤世祖納之也王郎詐為成帝子子輿立為天子都邯鄲遣使降下郡國世祖滅之王昌一名王郎趙國邯鄲人也素為卜相常以河北有天子氣時趙繆王子林好竒數任俠於趙魏間而郎與之善初王莽簒位長安中或稱成帝子子輿者莽殺之郎縁是稱真子輿云更始元年冬林等率車騎數百晨入邯鄲城立郎為天子世祖進攻邯鄲郎少傅李立為反間開門内漢軍遂㧞邯鄲斬王郎収文書得人吏與郎交闗謗毁上者数千章世祖不省㑹諸将燒之曰令反側子自安也世祖威聲日盛更始疑慮乃遣使立世祖為蕭王令罷兵與諸將有功者還長安遣苗魯為幽州牧韋順為上谷守並北之郡時世祖居邯鄲宫耿弇請間説曰今更始失政君臣淫亂諸將擅命於畿外貴戚縱横於都内天子之命不出城門所拜牧守輒自遷易百姓}
