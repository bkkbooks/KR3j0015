  - {type: variant, offset: 7259, length: 0, content: '', WYG: 單雄信曰以樂戰之兵當思歸之卒食飽不敵戰必剋矣祖君彦曰不可夫師曲為老師正為直曲則為饑直則為飽世充挾隋室之威不可為曲主公以逆為名不可為直裴光祿滅之謀一時之上也主公之䇿持乆之上也單將軍之言亡之下也夫物不兩大勝無常資故慶者在閭弔者在門誠恐乗於化及必殆於世充請案甲息兵侯時觀釁世充志大而體强心勇而多悍忸于自伐必有異圖不盈數年禍将作矣然後仗順而舉應天順}
