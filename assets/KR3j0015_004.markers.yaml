  - {type: variant, offset: 830, length: 0, content: '', WYG: 司徒鄧禹馮異劉𢎞等征赤眉異曰異前與拒華隂經數十日雖屢獲雄將餘衆尚多可稍以恩信傾其誘難卒用兵破也上今使諸將屯澠池要其東異以兵撃西一舉而取之此萬成計也禹𢎞}
