  - {type: variant, offset: 5973, length: 0, content: '', WYG: 子陽聲援帝謂諸將曰夫征討未必須實子力聽威聲耳今加湖之敗誰不讋服陳武牙即伯之之狼狽奔歸彼人之情當兇懼我謂九江可傳檄而定也因命搜所獲俘囚得伯之憧主蘇隆之厚加賞賜使致命焉魯山城郢並降伯之及子武牙見帝至並束甲請罪壬午帝鎮石頭命衆軍圍六門衛尉張稷斬東昏以黄油裏首送軍帝命吕僧珍勒兵封府庫及圖籍収潘妃誅之以宫女二千人分賚將士也平京邑齊和帝以位禪梁帝即位太清元年齊司徒侯景以十三州内屬侯景反至京師幽帝而崩天監中釋寳誌為詩曰昔年三十八今年八十三四中復有四城北火酣酣帝封記之帝三十八剋建業八十三遇火災元年四月十四日同泰寺火災皆如其言此之謂也侯景立武帝太子綱為帝又為景所殺追尊為太宗簡文皇帝也湘東王繹於荆州使王僧辯等平侯景𫝊首江陵僧辯等勸進曰軍衆以今月戊子總集建康分勒武旅百道同趨轟然大潰羣兇四滅伏惟陛下咀痛茹哀嬰憤忍酷自紫庭綘闕胡塵四起掖垣好畤冀馬雲豺狼當路非止一人鯨鯢不梟經五載矣天威既振寃耻並雪百司岳牧仰祈宸鑒咸以錫珪之功既歸有道當璧之禮允屬聖明而優詔謙冲杳然凝邈飛龍可躋而乾爻在四帝閽云呌而閶閤未開謳歌再馳是用翹首豈可乆稽羣議有曠彞則也景子湘東王即位於江陵是為孝元皇帝武帝第七子也魏使萬紐于謹來攻梁王蕭詧率衆㑹之帝見執魏人戕帝初武陵之平議者欲因其舟艦遷都建鄴宗懍黄羅漢皆楚人不願移曰建鄴王氣已盡渚宫洲已滿百於是乃留尋而嵗星在井熒惑守心帝觀之慨然謂朝臣曰吾觀𤣥象將恐有賦但吉凶在吾運數由天避之何益尋為魏軍所逼城䧟見執進土嚢而殞之古老相𫝊云洲滿百荆州出天子桓𤣥為荆州刺史内懷逆意乃遣鑿破一洲以應百數隨而崩破竟無所成宋文帝為宜都王在藩一洲自立俄而文帝纂統太清末枝江揚誾浦生一洲明年而梁元帝立氶聖末其洲與大岸通也江陵既䧟王僧辯陳霸先等議立帝子方智是為敬皇帝元帝第九子於江州奉迎至建業即位太平二年禪位于陳陳髙祖武皇帝姓陳氏名霸先吳興長城人也梁武帝時為直閣將軍侯景反髙祖率所領與侯景大戰侯景敗死湘東王即位授南徐州刺史還鎮京口承聖三年西魏攻陷西臺髙祖與王僧辯立晉安王進帝位司空僧辯又與齊氏和新納貞陽侯高祖嘆曰嗣主高皇之孫元皇之子竟有何辜坐見廢黜假立非次此情可知也髙祖以為不義潜師襲王僧辯于石頭克之是夜縊僧辯貞陽侯遜位晉安王復立徐嗣徽北引齊師遣蕭軌等四十六將濟江至莫府山髙祖並破之進帝位丞相進爵為陳王永定三年梁帝禪位於陳三年熒惑守心天尊也上崩時上長子衡陽王為質于周乃立高祖弟始興烈王長子蒨也立弟子蒨是為世祖文皇帝也崩立太子伯宗是為廢帝廢立頊是為高宗宣皇帝始興烈王苐二子也崩立太子叔寶是為長城公也叔寶在東宫好學有文藝及即位躭酒色左右侫嬖珥貂者五十人婦人美貌麗服者千餘人賞使孔貴妃等八人夾坐江總孔範等十人預宴號曰狎客先令八婦人襞綵牋置五言詩十客一時繼和遲則罰酒君臣酣飲從昏達旦以此為常也隋文帝初受周禪甚敦隣好宣帝崩遣使赴弔修敵國之禮書稱名頓首而後主驕奢書末云想彼統内如宜此宇宙清泰隋文帝不悦以示朝臣賀若弼楊素等以為主辱再拜請罪並求致討文帝曰我為人父母豈可限一衣帶}
