  - {type: variant, offset: 2657, length: 1, content: 群, WYG: 違且廟勝之䇿不在強弱曹操法令既行士卒精練非公孫瓚坐受圍者也今棄萬安之術而興無名之師竊為公懼之圖曰武王伐紂不為不義况兵加曹操而云無名且公師徒精鋭将士思奮而不及時早定大業所謂天與不取反受持其咎此越之所以霸吴之所以亡也監軍之計在於牢而非見時知機之變也紹遂不用沮授之計曹公軍官渡紹時悉衆而南田豐説紹曰曹公善用兵變化無方衆雖少未可輕也不如以久持之将軍據山河之固擁四州之衆外結英雄内修農戰然後簡其精鋭分為竒兵乗虚迭出以擾河南救右則撃其左救左則擊其右使敵疲於奔命人不得安業我不勞而彼已困不及三年可坐而克也今釋廟算之䇿而決成敗於一戰若不如志悔無及也紹不從遂攻操於官渡紹自引兵至黎陽沮授臨行散其資財會宗族以與之曰勢在威無不加勢亡則不保其身哀哉其弟宗曰曹操士馬不敵君何懼焉授曰以曹兖州之明畧又挾天子以為資我雖克伯珪衆實疲弊而主驕將汰軍之破敗在此舉也揚雄有言六國嗤嗤為嬴弱姬殆今之謂耶及渡河臨舟嘆曰上盈其志下務其功悠悠黄河吾将濟乎紹果為曹公所敗紹進保武陽與操相持沮授又説曰北兵雖衆而果勁不及南南穀虛少而財貨不及北南利在於急戰北利在於緩搏宜修持乆曠以日月紹不從連營漸逼官渡許攸進曰曹操兵少而悉師拒我許下餘守勢必虚弱若分遣輕騎星行襲許㧞則操為成擒如其未潰可令首尾奔命破之必也紹又不能用會攸家犯法審配収繫之攸不得志遂奔曹公而説操襲取淳于瓊瓊時督軍屯在烏巢去紹軍四十里操自将急擊之時張郃説紹曰曹公兵精徃必破瓊瓊破則将軍事去宜引兵救之郭圖曰郃計非也不如攻其本營勢必還此為不救而自觧也郃曰曺公營固攻之必不㧞若瓊等見禽吾屬盡為虜矣紹但遣輕騎救瓊而以重兵攻操營不能下曹公破瓊焚其積聚紹軍潰散奔北曺公遂破紹乃威震天下也太祖討紹子譚尚於黎陽尚與熈奔遼東太守公孫康斬尚熈送其首遂平河北初太祖討譚尚於黎陽連戰數克諸将欲乘勝攻之郭嘉曰袁紹愛此二子莫適立也郭圖馮紀為之謀臣定交鬭其間還相離也急之則相持緩之而後爭心}
