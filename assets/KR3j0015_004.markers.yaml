  - {type: variant, offset: 12178, length: 456, content: 明法而不議萬物有成理而不說聖人無為大聖不仵觀於天地之謂也不言之令不視之見聖人所以為師此黃老之術也文子曰聖人所由曰道所為曰事道猶金石一調不可更事猶琴瑟每終而改調故法制禮樂者理之具也非所以為理也昔曹參相齊其治要用黃老術齊國安集及代蕭何為漢相參去屬其後相曰以治齊獄市為寄慎勿擾也後相曰治無大於此者乎參曰不然夫獄市者所以并容也今君擾之奸人安所容乎吾是以先之由是觀之秦人極刑而天下叛孝武峻法而獄繁此其弊也經曰我無為而人自化我好靜而人自正參欲以道化其本不欲擾其末也太史公曰參為漢相清淨寡欲言合道意然百姓離秦之酷擾參與俱息無為故天下俱稱其美矣議曰黃老之風蓋帝道也孔子閒居謂曾參曰昔者明王內脩七教外行三至七教修而可以守三至行而可以征明王之守也則必折衝千里之外其征也還師衽席之上曾子曰敢問七教孔子曰上敬老則下益孝上敬齒則下益悌上樂施則下益亮上親賢則下擇交上好德則下無隱上惡貪則下恥爭上廉讓則下知節此之謂七教也七教者治之本也教定則本正矣凡上者人之表也表正則何物不正也昔明王之治人也必裂而封之分屬而理之使有司月省而時考之進賢退不肖然則, WYG: 起姦唯置}
