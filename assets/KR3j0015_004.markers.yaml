  - {type: variant, offset: 3146, length: 933, content: 所用之異故知制度者代非無也在用之而已是非第十四是非第十四夫損益殊塗質文異政或尚權以經緯或敦道以鎮俗是故前志垂教今皆可以理違何以明之是曰大雅云既明且哲以保其身易曰天地之大德曰生非曰語曰士見危致命又曰君子有殺身以成仁無求生以害仁是曰管子曰疑今者察之古不知來者視之往古語曰與死人同病者不可生也與亡國同行者不可存也非曰呂氏春秋曰夫人以食死者欲禁天下之食悖矣有以乘舟死者欲禁天下之船悖矣有以用兵喪其國者欲偃天下之兵悖矣杜恕曰夫奸臣賊子自古及今未嘗不有百歲一人是為繼踵千里一人是為比肩而舉以為戒是猶一噎而禁人食也噎者雖少餓者必多是曰孔子曰惡訐惡以為直非曰管子曰惡隱惡以為仁者魏曹羲至公論曰夫代人所謂掩惡揚善者君子之大義保明同好者朋友之至交斯言之作蓋閭閻之臼談所以救愛憎之相謗非篤正之至理折中之公議也世士不料其數而係其言故善惡不分以覆過為宏也朋友忽義以雷同為美也善惡不分亂實由之朋友雷同敗必從焉談論以當實為情不以過難為貴相知以等分為交不以雷同為固是以達者存其義不察於文識其心不求於言是曰越絕書曰衒女不貞衒士不信非曰漢書曰大行不細謹大禮不讓辭是曰黃石公曰務廣地者荒務廣德者強有其有者安貪人有者殘殘滅之政雖成必敗非曰司馬錯曰欲富國者務廣其地欲強兵者務富其人欲王者務博其德三資者備而後王業隨之是曰傳曰心苟無瑕何恤乎無家語曰禮義之不愆何恤於人言非曰語曰積毀銷金積讒磨骨眾羽溺舟群輕折軸是曰孔子曰君子不器聖人智周萬物非曰列子曰天地無全功聖人無全能萬物無全用全備也故天職生覆地職載形聖職教化是曰孔子曰君子坦蕩蕩小人長戚戚非曰孔子曰晉重耳之有霸心也生於曹衛越勾踐之有霸心也生於會稽故居下而無憂者則思不遠覆身而常逸者則志不廣是曰韓子曰古之人目短於自見故以鏡觀面智疑於自知故以道正己非曰老子曰反聽之謂聰內視之謂明自勝之謂強是曰唐且曰專諸懷錐刀而天下皆謂之勇西施被短褐而天下稱美非曰慎子曰毛嬙西施天下之至姣也衣之以皮倛則見者皆走易之以元緆則行者皆止由是觀之則元緆色之助也姣者辭之則色厭矣是曰項梁曰先起者制服於人後起者受制於人軍志曰先人有奪人之心非曰史佚有言曰無始禍又曰始禍者死語曰不為禍始不為福先是曰慎子曰夫賢而屈於不肖者權輕也不肖而服於賢者位尊也堯為匹夫不能使其鄰家及至南面而王則令行禁止由此觀之賢, WYG: 衆}
