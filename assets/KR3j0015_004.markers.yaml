  - {type: variant, offset: 4139, length: 999, content: 也以此觀之則位不足以為尊而號不足以為榮矣是曰漢景帝時轅固與黃生爭論於上前黃生曰湯武非受命乃殺也固曰不然夫桀紂荒亂天下之心皆歸湯武湯武與天下之心而誅桀紂桀紂之人弗為使而歸湯武湯武不得已而立非受命而何非曰黃生曰冠雖敝必加於首履雖新必貫於足何者上下之分也今桀紂雖失道然君上也湯武雖聖臣下也夫君有失行臣不正言匡過以尊天子反因過而誅之代立南面非殺而何是曰太公曰明罰則人畏懾人畏懾則變故出明賞則不足不足則怨長故明王之理人不知所好不知所惡非曰文子曰罰無度則戮而無威賞無度則費而無恩故諸葛亮曰威之以法法行則知恩限之以爵爵加則知榮是曰文子曰人之化上不從其言從其行也故人君好勇而國家多難人君好色而國家昏亂非曰秦王曰吾聞楚之鐵劍利而倡優拙夫鐵劍利則士勇倡優拙則思慮遠以遠思慮御勇士吾恐楚之圖秦也是曰墨子曰雖有賢君不愛無功之臣雖有慈父不愛無益之子非曰曹子建曰舍罪責功者明君之舉也矜愚愛能者慈父之恩也三略曰含氣之類皆願得申其志是以明君賢臣屈已申人是曰傳曰人心不同其猶面也曹子建曰人各有好尚蘭蓀蕙之芳眾人所好而海畔有逐臭之夫咸池有六英之發眾人所樂而墨子有非之之論豈可同哉非曰語曰以心度心閒不容鍼孔子曰其恕乎己所不欲勿施於人是曰管子曰倉廩實知禮節衣食足知榮辱非曰古語曰貴不與驕期而驕自至富不與侈期而侈自來是曰語曰忠無不報非曰左傳曰亂代則讒勝直是曰韓子曰凡人之大體取舍同則相是取舍異則相非也易曰同聲相應同氣相求水流濕火就燥雲從龍風從虎非曰易曰二女同居其志不同語曰一棲不兩雄一泉無二蛟又曰凡人情以同相妬故曰同美相妬同貴相害同利相忌是曰韓子曰釋法術而以心理堯舜不能正一國去規矩而以意度奚仲不能成一輪使中主守法術拙匠執規矩則萬不失矣非曰淮南子曰夫矢之所以射遠貫堅者弓弩力也其所以中的剖微者人心也賞善罰暴者政令也其所以行者精誠也故弩雖強不能獨中令雖明不能獨行杜恕曰世有亂人而無亂法若使法可專任則唐虞不須稷契之佐殷周無貴伊呂之輔矣是曰慮不先定不可以應卒兵不先辦不可以應敵左傳曰豫備不虞古之善政非曰左傳曰士蒍謂晉侯曰臣聞之無喪而戚憂必讎之無戎而城讎必保焉春秋外傳曰周景王將鑄大錢單穆公曰不可古者天災降戾於是乎量資幣權輕重以振救人夫備預有未至而設之脩國備也預備不虞安不忘危有至而後救之若救火療疾量資幣之屬是不相入也二者先後各有宜不相入可先而不備謂之怠怠緩也可後而先之謂之召災謂人未有患輕而重之離人匱財是以召災也周固瀛國也天未厭禍焉而又離人以佐災, WYG: ''}
