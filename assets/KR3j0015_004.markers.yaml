  - {type: variant, offset: 5623, length: 5, content: 伊尹去夏八, WYG: 上流謀逆皆因淹緩以敗休範必逺懲前失輕兵急下乗吾無備請頓新亭以當其鋒因索筆下議餘並注同乃單車白服出新亭築壘未畢賊騎交至乃解衣髙卧以安衆心竟破之也遷中領軍蒼梧王深相猜忌帝晝卧裸袒蒼梧王率數十騎直入領軍府立帝於宫内畫腹為射的自引滿射之左右玉夫固諫曰領軍腹大是佳射堋而一箭便死後無復射不如以骲箭射之一箭中臍蒼梧投弓於地也常語左右楊玉夫伺織女度報我是夜七夕玉夫懼取千牛刀殺之玉夫與王敬則通謀殺蒼梧賫首送領軍府報帝帝乃戎服夜入殿中明旦召袁粲等計議粲欲有言帝鬢鬚盡張眼光如電敬則㧞刀跳躍麾衆曰天下之事皆應決蕭公敢有開一言者染敬則刀乃自取白紗㡌加帝首令即位曰事須及熱帝正色曰卿都不自解也帝乃迎立順帝荆州刺史沈攸之反帝討之初攸之稱太后命已下都袁粲劉秉等見帝威名日盛不自安與攸之通謀舉事殿内帝命王敬則於殿内誅之進位相國封齊公備九錫䇿曰朕以不造夙罹旻凶嗣君失徳書契未紀威侮五行虔劉九族神厭靈斁海水羣飛綴旒之殆未足為譬豈直小宛興刺黍離作歌而已哉天賛皇宋實啟明宰爰登寡昧纂承大業髙勲至徳振古絶倫雖保衡翼}
