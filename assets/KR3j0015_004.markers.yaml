  - {type: variant, offset: 5145, length: 0, content: '', WYG: 陛下誠能發匈奴五部之衆假元海一將之號鼓行而西指期可定也孔恂曰李公之言未盡殄患之理元海若能平涼州斬樹機能恐涼州方有難耳蛟龍得雲雨非復池中物也帝乃止恵帝失馭寇賊蜂起成都王穎鎮鄴表元海行寧朔將軍監五部軍事及王浚等討穎元海説穎曰今二鎮跋扈衆十餘萬恐非宿衛及近都士衆所能禦之請為殿下還説五部衆以赴國難穎從之元海至國}
