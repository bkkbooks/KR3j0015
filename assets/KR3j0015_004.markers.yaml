  - {type: variant, offset: 11577, length: 0, content: '', WYG: 百姓無事耨文采墨從容於廟堂武不如文四海沸騰英雄競起角帝圖王蕩清氛祲文不如武各有其時不可戾也越王滛虐之餘天厭之乆矣且天命不常能者代之何曲直之有請以定亂属武臣制治属文吏今日不戰大事去矣宻遂用單雄信䇿合戰宻師敗績世充乘勝趨洛口宻左長史邴元真以倉城降宻奔武牢不敢入北渡河遂奔唐初王伯當與單雄信徐世勣俱為宻将軍中號為三傑故宻信之而大戰大唐武徳二年王世充殺越王侗於洛陽僣稱尊號隋氏滅矣梁時沙門寳誌為書曰牽三來就九索虜下殿走意欲東南逰厄在彭城口今兹三月江東童謡曰江水何冷冷楊栁何青青人今正好樂已復戍彭城牽三就九十二年也戍言輸也呉人謂北人為虜江都西有彭城村村有彭城水上引其水入西閣之下果於}
