  - {type: variant, offset: 5974, length: 0, content: '', WYG: 而不拯之乎命作戰舩人請宻之文帝曰吾將顯行天誅何宻之有使投柹于江若彼能改我又何求以晉王廣為元帥督八十總管以致討初隋師送璽書暴後主惡三十萬紙遍諭江東諸軍既下江鎮或相繼奏聞沈客卿掌機宻抑而不言隋軍臨江後主曰王氣在此齊兵三度來周兵再度至無不摧沒虜今來必自敗縱酒作詩不輟隋軍或進㧞姑孰或斷曲阿之衝乃下詔曰犬羊凌縱侵竊郊畿蜂蠆有毒宜時掃定以蕭摩訶為皇畿大都督分兵守要害僧尼道士執役隋軍南北道並進衆軍敗績韓擒虎入自南掖門文武各官皆遁出擒後主隋帥之入也僕射袁憲勸端坐殿上正色待之後主曰鋒刃之下未可交當吾自有計乃逃于井隋軍人以䋲引之驚其太重乃與張貴妃孔貴人同乘而上隋文帝聞之大驚鮑宏對曰東井于天文為秦分今王都所在投井其天意也先是江東多唱王獻之桃葉辭云桃葉復桃葉渡江不用檝但渡無所苦我自迎接汝及晉王廣軍於六合鎮其山名桃葉果乗陳舩而渡之也晉王廣入據臺城送後主於東宫已後主與王公百司發自建鄴之長安及至京師列陳輿服引後主及王公使宣詔讓後主後主屏息不能對封長城公隋文帝東巡登芒山後主侍飲賦詩曰日月光天徳山河壯帝居太平無以報願上東封書及出隋文帝目送之曰此敗豈不由詩酒將作詩功夫何如思安時事也至仁夀四年終於洛陽先是蔣山衆鳥鼔翼撫膺曰奈何帝奈何帝後主在東宫時有鳥一足集其殿庭以觜畫地成文曰獨足上高臺盛草化為灰欲知吾家處朱闗當水開觧者以為獨足言後主獨行無衆盛草言荒穢隋承}
