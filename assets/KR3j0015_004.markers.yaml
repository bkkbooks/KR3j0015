  - {type: variant, offset: 613, length: 0, content: '', krp: 為齊計矣如是則天下事可圗也兵固有先聲而後實者此之謂矣韓信曰善従其䇿發使燕齊従風而靡也十二月漢王拒楚於成臯饗師欲復戰郎中鄭忠説曰王髙壘深壁勿與戰使劉賈佐彭越入楚地焚其積聚破楚師必矣項羽乃東擊彭越留曹無咎守成臯時漢數困滎陽成臯計欲捐成臯以東屯鞏洛以距楚用酈生計復守成臯酈生説曰臣聞知人之天者王事可成不知人之天者王事不可成王者以人為天而人以食為天夫敖倉天下轉輸久矣臣聞其下有藏粟甚多楚人㧞榮陽不堅守敖倉乃引而東令適卒分守成臯此乃天所以資漢也方今楚易取而漢反却自奪其便臣以為過矣且兩雄不俱立楚漢久相持不決百姓騷動海内蕩揺農夫釋耒工女下機天下之心未有所定願足下急復進兵収榮陽據敖倉之粟塞成臯之險杜太行之路拒飛狐之口守白馬之津以示諸侯効實形制之勢則天下知所歸矣今燕趙已定唯齊未下今田廣據千里之齊田間将二十萬之衆軍於歴城諸田宗強負海阻河濟南近楚人多變詐足下雖遣數十萬師未可以嵗月破也臣請得奉明詔説齊王使為漢而稱東藩王曰善乃從其畫復守敖倉而使酈生説齊王曰王知天下之所歸乎王曰不知也曰王知天下之所歸則齊可得而有也若王不知天下之所歸即齊未可得保也齊王曰天下何歸酈生曰天下歸漢王曰先生何以知之酈生曰漢王與項羽戮力西向擊秦約先入咸陽者王之漢王先入咸陽項王負約不與而王之漢中項羽遷殺義帝漢王聞之起蜀漢之兵擊三秦出武闗而責義帝之處収天下之兵立諸侯之後降城即以侯其将得賂即以分其士與天下同其利英豪賢士皆樂為之用諸侯之兵四面而至蜀漢之粟萬舩而下項王有背約之名殺義帝之罪於人之功無所記於人之罪心不忘戰勝而不得其賞㧞城而不得其封非項氏莫能用事為人刻印而不能授攻城得賂積財而不能賞天下叛之賢才怨之而莫為用故天下之士歸於漢王可坐而䇿也夫漢王發蜀漢定三秦涉西河之外拔上黨之兵下井陘之路誅成安之罪北破魏舉三十二城此蚩尤之兵非人力也天之福也今已據敖倉之粟塞成臯之險守白馬之津杜太行之路拒飛狐之口而天下後服者先亡矣王疾先下漢王齊國社稷可得而保也不下漢王危亡立可待也田齊以為然乃聽酈生説罷歴下兵守淮陰侯乃夜渡兵平原襲齊齊王烹酈生引兵東走初酈生見沛公沛公方倨床使兩女子洗足而見酈生酈生入長揖不拜曰足下欲助秦攻諸侯耶且欲率諸侯破秦耶沛公罵曰豎儒天下同苦秦乆矣故諸侯相率而攻秦何謂助秦攻諸侯乎酈生曰必欲聚徒合義兵誅無道之秦不宜倨見長者於是沛公輟洗足起而謝之也羽初東囑曹咎曰漢挑戰慎勿與戰勿令漢得東而已咎乃出戰死漢王遂進兵取成臯漢挑曹咎戰楚軍不出使人辱之數日咎怒渡兵氾水上士卒半渡撃破之盡得楚國寳貨羽聞咎破乃還軍廣武間為髙壇置太公於其上漢王遣侯公説羽求大公羽乃與漢約中分天下割鴻溝以西為漢以東為椘歸漢王父母及吕氏項王解而東漢王欲西張良曰今漢有天下大半而諸侯皆附椘兵疲食盡此天亡椘之時不如因其東而取之漢王乃追羽與齊王韓信魏相彭越期㑹撃楚皆不㑹用張良計信等皆進兵圍羽垓下遂滅項氏漢王問張良曰諸侯不從奈何良曰楚兵且破未有分地其不至固宜君王能與共天下可立致也齊王信之立非君王意信亦不自堅彭越本定梁地始君以魏豹故越得拜為相國今豹死越亦望王而君王不早定今能取睢陽以北至榖城以王彭越從陳以東傅海與齊王信信家在楚其意欲復得故邑能出捐此地以許兩人使各自為戰則楚易破於是漢王發使使韓信彭越劉賈等皆引兵圍羽垓下都洛陽用婁敬䇿徙都長安婁敬説王曰陛下都洛豈欲與周室並隆哉上曰然敬曰陛下取天下與周室異周之先自后稷堯封之於邰積徳累善十有餘世公劉避桀居邠太王以戎狄故去邠杖馬箠居岐國人争歸之及至文王為西伯斷虞芮之訟始受命吕望伯夷自海濵來歸之武王伐紂不期而會孟津之上者八百諸侯皆曰紂可伐矣遂滅殷成王即位周公之屬傅相焉乃營成周洛邑以此為天下之中也諸侯四方咸納職貢道}
  - {type: variant, offset: 614, length: 0, content: '', WYG: 均矣有徳則易以王無徳則易以亡凡居此者欲令周務以徳致人不欲依險阻令後世驕奢以虐人也及周之盛時天下和洽四夷向風慕義懐徳附離而並事天下不屯一卒不戰一士四夷大國之民莫不賔服効其貢職及周之衰也分而為兩天下莫朝周不能制非其徳薄形勢弱也今陛下起豐沛收卒三千人以之口徑徃而卷蜀漢定三秦與項籍戰於滎陽争成臯之大戰七十小戰四十使天下之民肝腦塗地父子暴骨於中野不可勝數哭泣之聲未絶傷夷之卒未起而欲比隆於成康之時臣竊以為不侔矣且夫秦地被山帯河四塞以為固卒然有急百萬之衆可具此所謂天府也陛下入闗而都之山東雖}
