  - {type: variant, offset: 6800, length: 449, content: 兵勝而眾將所居者九曰法令不行而任侵誅無德厚而用日月之數不順敵之強弱而幸於天無智慮而候氛氣少勇力而望天福不知地形而歸過於時敵人怯弱不敢擊而信龜策士卒不勇而法鬼神設伏不巧而任背向之道凡天地鬼神視之不見聽之不聞不可以決勝敗故明將不法司馬遷曰陰陽之家使人拘而多忌范曄曰陰陽之道其弊也巫是曰翼奉曰治道之要在知下之邪正人誠向正雖愚為用若其懷邪智益為害非曰夫人主莫不愛己也莫知愛己者不足愛也故桓子曰捕猛獸者不令美人舉手釣旦魚者不使稚子輕預非不親也力不堪也奈何萬乘之主而不擇人哉故曰夫犬之為猛有非則鳴吠而不遑於夙夜此自效之至也昔宋人有沽酒者酒酸而不售何也以有猛犬之故夫犬知愛其主而不能為其主慮酒酸之患者智不足也是曰語曰巧詐不如拙誠非曰晉惠帝為太子和嶠諫武帝曰季世多偽而太子尚信非四海之主憂不了陛下家事武帝不從後惠帝果敗是曰左傳曰孔子歎子產曰言以足志文以足言不言誰知其志言之無文行而不遠晉為伯鄭入陳非文辭不為功慎辭也哉論語曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為非曰漢文帝登虎圈美嗇夫口辯拜為上林令張釋之前, WYG: 我守一}
