  - {type: variant, offset: 5666, length: 0, content: '', WYG: 昭業是為鬱林王即位無道武帝梓宫下渚帝於端門内奉辭輼輬車裁入閣即奏湖伎髙宗殺之崩立弟昭文廢為海陵王也廢立西昌侯鸞是為髙宗明皇帝始安貞王道生}
