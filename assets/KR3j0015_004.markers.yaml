  - {type: variant, offset: 5611, length: 0, content: '', WYG: 何如鍾曰不然前揚聲言大衆由内水故譙道福不敢捨涪今重兵卒至出其不意侯暉之徒已破膽矣暉之阻兵非堅壁也因其懼而攻之其勢易克克彭模鼔行而前成都不能守矣緩兵相持虛實將見涪軍復來難為敵也若進不能戰退無所資二萬餘人同為蜀子虜矣從之明日遂攻皆克斬侯暉於是遂進克諸城諸城守相次瓦解縱自縊而死姚泓僣號於西京髙祖征平之擒泓高祖既滅秦入長安留子義真鎮長安而還江南時赫連都統萬聞之大悦謂王買徳曰朕將進圖長安卿試言進取之方略買徳曰劉裕滅秦所謂以亂易亂未有徳政以濟蒼生關中形勝之地而以弱才小兒守之非經逺之規狼狽而反者欲速成篡事無暇有意於中原陛下以順伐逆義貫幽顯百姓懸命望陛下旗鼔以日為歲清泥}
  - {type: page-break, offset: 5611, content: '', id: KR3j0015_WYG_004-34a, image: WYG0849/WYG0849-0091a.png}
  - {type: variant, offset: 5611, length: 0, content: '', krp: 何如鍾曰不然前揚聲言大衆由内水故譙道福不敢捨涪今重兵卒至出其不意侯暉之徒已破膽矣暉之阻兵非堅壁也因其懼而攻之其勢易克克彭模鼔行而前成都不能守矣緩兵相持虛實將見涪軍復來難為敵也若進不能戰退無所資二萬餘人同為蜀子虜矣從之明日遂攻皆克斬侯暉於是遂進克諸城諸城守相次瓦解縱自縊而死姚泓僣號於西京髙祖征平之擒泓高祖既滅秦入長安留子義真鎮長安而還江南時赫連都統萬聞之大悦謂王買徳曰朕將進圖長安卿試言進取之方略買徳曰劉裕滅秦所謂以亂易亂未有徳政以濟蒼生關中形勝之地而以弱才小兒守之非經逺之規狼狽而反者欲速成篡事無暇有意於中原陛下以順伐逆義貫幽顯百姓懸命望陛下旗鼔以日為歲清泥}
  - {type: variant, offset: 5612, length: 0, content: '', WYG: 洛南師之要衝宜置逰軍斷其去來之路然後杜潼闗塞崤峽絶其水陸之道聲檄長安申布恩澤三輔之人皆壺漿以迎王師矣義真獨坐空城逃竄無所一旬之間必見縛於麾下所謂兵不血刃不戰而自定也勃勃善之南伐長安高祖懼召義真東鎮洛陽以朱齡石守長安長安人逐齡石而迎勃勃遂失闗中也鮮卑慕容超據守青州稱燕王髙祖征擒超初超叔父德盗有三齊德死超襲其位遂冦淮北高祖將有事中華因其侵也乃北伐超大將軍公孫五樓說超曰吳兵輕銳難與爭鋒截斷大峴使不得入上䇿也堅壁青野芟除粟麥中䇿也㨿城待戰下䇿也超曰引使過峴我以銕騎躝之成擒矣何㨿青野自取蹙弱乎初謀是役也諫者申賊若嚴守大峴則堅壁廣固守而不出軍無所資勝何能自攴高祖曰不然鮮卑性貪畧不及遠既幸其且愛其榖謂我孤軍將不及乆必將引我且示輕戰師一入峴吾何患焉既踰峴虜軍未出高祖喜曰天賛我也衆曰軍未克公何悅焉高祖曰師既過險士有必死之志餘糧棲畝軍無匱乏之憂虜墮吾計勝可必也六月慕容超使五樓㨿臨朐羸老守廣固聞軍近超亦會焉拒臨朐四十里有巨蔑水超使五樓往㨿之曰晉軍得水則難敗也五樓馳進前鋒孟龍符奔就爭先得據之五樓退大軍冇四千人分為兩翼方軌徐進未及臨朐賊騎交至龍符等拒之曰向昃戰猶酣髙祖謂檀韶等曰虜之精兵悉於是矣臨朐留守必將寡弱子以潜軍踰其後往必尅城多易旗幟此韓信所以克趙也且吾前言兵自海道往必聲之韶等鼔行而進賊望曰每軍至超棄城走遂尅之軍聞城陷懼而不敢動髙祖親鼓士卒咸奮大奔崩之超奔廣固進軍圍之城陷獲超歸於京師斬於建康市賊盧循據南海因髙祖北伐乗虚下襲建業髙祖還乃平之劉毅據荆州貳於髙祖髙祖遣將征誅毅裴子野曰義旗同盟莫有能全其功名者何也相與見疇日之趫捷不知王業之艱難彼則褰裳濡足唯利是視我則芟夷羣醜寧或負人劉希樂諸葛長民皆人傑也豈其暗於天命亦勢使然歟假如何孟齡石長道庶其有血食善哉武王之作周也八百諸侯皆同㑹曰紂可伐矣尚還師於孟津豈不知順人行戮惡欲速多禍也髙祖東方之師疾則疾矣而僥倖之釁於是乎繁嗚呼仁義之弊至於偷薄而況竒功哉荆州刺史司馬休之反征之裴子野曰書稱慮善以動動惟厥時若司馬休之之動非其時天方厭晉罔敢知吉已雖得衆能違天乎五運推移無有不亡之國為廢姓處亂朝賢若三仁且猶顛沛而況豪俠者哉昔中原殄滅衣冠道盡於時四海爭奉中宗豈徒繫於晉徳實大有禮義故能遂兼南國其興也勃焉至於義熈不欲異於是矣而宗室交流未忘前孔事波迸越逸禍敗相尋豈龕黎之伐𢎞多將咎周之徒熾不達興廢何其黯歟晉帝加髙祖位相國總百揆揚州牧封十郡為宋公晉安帝崩大司馬瑯琊王即位徴帝入輔禪位於宋帝奉表陳譲表不獲通宋臺臣勸進猶不許太史令駱達陳天文符應曰按晉義熙元年至元熈元年太白晝見經天凡七占曰太白晝經天人更主異姓興義熙七年五虹見於東方占曰五虹見天子黜聖人出九年鎮星嵗星太白熒惑聚於東井十三年鎮星入太微占曰鎮星守太微有立王有徙王元熙元年黒龍四登於天易傳曰冬龍見天子亡社稷大人受命漢建武至建安末一百九十六年而禪魏魏自黄初至咸熙末四十六年而禪晉晉自太始至今百五十六年三代揖讓咸窮於六六亢位也帝乃從之永初元年六月丁夘即帝位於南郊設壇柴燎告天禮畢備法駕幸建康宫臨太極前殿大赦改元在位三年崩初大漸召太子誡之曰檀道濟雖有幹畧而無逺志徐羨之與傅亮當無異圖謝晦常從征伐頗識機變若有同異必此人也可以㑹稽處之後皆如言也立太子義符是為滎陽王即位昏亂司空徐羨之輔政廢為滎陽王廢立冝都王義隆是為文帝帝髙祖第二子為太子劭所殺初劭及弟濬並多乖禮度懼上知乃為巫蠱咒咀帝聞之大怒將廢劭而殺濬更議所立持疑未定以事語濬母潘淑妃以告劭劭悖凶乃弑帝於合殿劭即位也弑立武陵王駿是為孝武皇帝文帝第三子也劭弑帝駿起義兵至京誅劭崩立太子子業是為前廢帝帝凶之悖左右夀寂之殺崩立湘東王彧是為明帝文帝第十八子也孝武諸子江州刺史晉安王勛尋陽王子房等並舉兵反皆征平之崩立太子昱是為後廢帝在位凶悖常欲殺楊玉夫玉夫懼是夜七夕令玉夫伺織女渡報已王敬則先與玉夫通謀玉夫候帝眠熟遂斬之送首與齊王蕭道成也崩立順帝準是為順皇帝明帝第三子也遜位於齊蕭道成凡八代六十年齊太祖髙皇帝諱道成姓蕭氏東海蘭陵人也為輔國將軍宋明帝初㑹稽太守尋陽王子房及在東諸郡起兵徐州刺史薛安都據彭城歸魏遣從子索兒攻淮隂晉安王勛遣臨川内史張淹自鄱陽道入三吴帝並討平之使鎮淮隂七年徴還都宋明帝嫌帝非人臣相而人間流言帝為天子愈以為疑帝初見徵部下勸勿就徵帝曰主上自誅諸弟為太子㓜弱作萬嵗後計何關他族唯應速發緩當見疑骨肉相殘自非靈長之運禍難方興與}
