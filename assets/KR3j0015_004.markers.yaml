  - {type: variant, offset: 5975, length: 0, content: '', WYG: 運得火而灰及至京師家於都水臺所謂高臺當水也有㑹稽人史溥曾夣着朱衣人武冠自天而下以手執金牌溥徃看上文曰陳氏五主三十四年陳亡果如夢梁末童謡曰可憐巴馬子一日行千里不見馬上郎但見黄塵起黄塵汚人衣皂莢相料理僧辯滅羣臣以謡言奏言僧辯本乗巴馬擊侯景馬上郎王字也塵謂陳也而不觧皂莢之謂既而陳滅於隋説}
