  - {type: 'tls:seg', offset: 9682, content: '', id: KR3j0015_CH7x2006_003-1a.1918}
  - {type: variant, offset: 9682, length: 2, content: 木火, WYG: 天下之善人少而不善人多則聖人之利天下也少而害天下也多矣反仁義也議曰昔仲由為郡宰季氏以五月起長溝當此之時子路以其私秩粟為漿飯以餉溝者孔子聞之使子貢徃覆其飯擊毁其噐子路曰夫子嫉由之為仁義乎孔子曰夫禮天子愛天下諸侯愛境内大夫愛官職士愛其家過其所愛是曰侵官漢武時河間獻王來朝造次必於仁義武帝色然難之謂曰湯以七十里文王以百里王其勉之王知其意歸即縱酒由是言之夫仁兼濟必有分乃可故尸子曰君臣父子上下長幼貴賤親踈皆得其分曰理愛得分曰仁施得分曰義慮得分曰智動得分曰適言得分曰信皆得其分而後為成人由是言之跖徒之仁義非其分矣由是言之夫仁義禮樂名法刑賞忠孝賢智之道文武明察之端無隠於人而常存於代非自昭於堯湯之時非故逃桀紂之朝用得其道則天下理用失其道而天下亂孫卿曰羿之法非亡也而羿不世出禹之法猶存也而夏不代王故法不能獨立得其人則存失其人則亡矣莊子曰宋人有善為不龜手之藥者代以洴澼絖為事客聞之請買其方百}
  - {type: page-break, offset: 9682, content: '', id: KR3j0015_WYG_003-7a, image: WYG0849/WYG0849-0052c.png}
