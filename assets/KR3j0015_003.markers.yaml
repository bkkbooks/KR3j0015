  - {type: variant, offset: 9699, length: 0, content: '', WYG: 里以有天下今孫子賢人也而君藉之百里之勢臣竊為君危之春申君曰善於是使人謝孫子孫子去之趙趙以為上卿非曰客又説春申君曰昔伊尹去夏入殷殷王而夏亡管仲去魯入齊魯弱而齊强夫賢者之所在其君未嘗不尊其國未嘗不榮也今孫子賢人也君何為辭之春申君又曰善復使人請孫子是曰韓宣王謂摎留曰吾兩欲用公仲公叔其可乎對曰不可晉用}
