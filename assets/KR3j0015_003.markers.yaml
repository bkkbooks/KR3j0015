  - {type: variant, offset: 16001, length: 0, content: '', krp: 不循其禮孝公曰善甘龍曰不然聖人不易人而教智者不變法而治因人而教不勞而功成縁法而}
  - {type: variant, offset: 16002, length: 5, content: 性裁抑流宕, WYG: 吏習而人安衛鞅曰龍之所言世俗之言常人安於習俗學者溺于所聞以此兩者居官守法可也非所以與論于法之外也三代不同禮而王五覇不同法而覇智者作法愚者制焉賢者更禮不肖者拘焉杜贄曰利不百不變法功不十不易噐法古無過修禮無邪衛鞅又曰治代不一道便國不法故故湯武不循古而王夏殷不易禮而亡反古者不可非而循禮者不足多孝公曰善遂變法也由是言之故知若人者各因其時而建功立徳焉孟子曰雖有鎡基不如遇時雖有智慧不如逢代范蠡曰時不至不可强生事不究不可强成語曰聖人修備以待時也何以知其然耶桓子曰三皇以道治五帝用徳化三王由仁義五伯用權智説曰無制令刑罰謂之皇有制令無刑罰謂之帝賞善誅惡朝諸侯朝事謂之王興兵衆立約盟以信義矯代謂之伯文子曰帝者貴其徳也王者尚其義也覇者廹於理也道狹然後任智徳薄然後任刑明淺然後任察議曰夫建國立功其政不同也如此五帝以上乆逺經𫝊無事唯王霸二盛之美以定古今之理焉秦漢居帝王之位所行者霸事也故以為徳之次夫王道之治先除人害而足其衣食論曰五畆之宅樹之以桑匹婦蠺之年五十者可以衣帛矣百畆之田數口之家耕稼修理可以無饑矣雞豚狗彘之畜不失其時老者可以食肉矣夫上無貪欲之求下無奢淫之人藉稅省少而徭役不繁其仕者食祿而已不與人争利焉是以産業均而貧富不能相懸也然後教以禮儀故明王審已正統}
