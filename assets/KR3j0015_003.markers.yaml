  - {type: variant, offset: 17240, length: 1, content: 當, krp: 費而天下之士悦至樂無聲而天下之人和何則昔者明王必盡知天下良士之名既知其名又知其實既知其實然後因天下之爵以尊之此謂至禮不讓而天下治因天下之禄以富天下之士此之謂至賞不費而天下之士悦如此}
  - {type: variant, offset: 17244, length: 12, content: 禍諸侯以國受令于心心不當, WYG: 之明譽興焉此謂之至樂無聲而天下之人和故曰所謂天下之至仁者能合天下之至親所謂天下之至智者能用天下之至和所謂天下之至明者能舉天下之至賢也故仁者莫大於愛人智者莫大於知賢政者莫大於能官有徳之君脩此三者}
