  - {type: variant, offset: 15350, length: 1, content: 崩, WYG: 累葉以功名自終將其用兵欲以殺止殺乎何其獨能崇也是曰易曰崇髙莫大於富貴又曰聖人之大寳曰位非曰孫子為書謝春申君曰鄙諺曰厲人憐王此不恭之言也雖然古無虛謬不可不審察也此為刼殺死亡之生言也夫人主牟少而矜材無法術以知奸則}
