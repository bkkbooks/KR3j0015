  - {type: variant, offset: 15963, length: 1, content: 近, WYG: 順而庻事理焉周至既微禮樂征伐出自諸侯桓文之後大夫世權陪臣執命陵夷至於戰國合縱連横力政爭强由是列國公子魏有信陵趙有平原齊有孟嘗楚有春申皆藉王公之勢競為遊俠雞鳴狗盜無不賓禮而趙相虞卿棄國捐君以固窮交魏齊之厄信陵無忌竊符矯命殺將專師以赴平原之急皆以取重諸侯彰名天下搤腕而遊談者以四豪為稱首於是背公死黨之議成守職奉上之義廢矣及至漢興禁網踈濶未之匡改}
