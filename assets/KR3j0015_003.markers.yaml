  - {type: variant, offset: 9685, length: 0, content: '', WYG: 客得之以説吴王越人有難吴王使之將冬與越人}
  - {type: variant, offset: 9685, length: 0, content: '', krp: 客得之以説吴王越人有難吴王使之將冬與越人}
  - {type: variant, offset: 9686, length: 6, content: 及土分時化育, WYG: 戰大敗越人裂地而封能不龜手一也或以封或不免于洴澼絖則其所用之異故知制度者代非無也在用之而已是非第十四夫損益殊塗質文異政或尚權以經緯或敦道以鎮俗是故前志垂教今皆可以理違何以明之是曰大雅云既明且哲以保其身易曰天地之大徳曰生非曰語曰士見危授命又曰君子有殺身}
