  - {type: variant, offset: 9694, length: 0, content: '', WYG: 仁無求生以害仁是曰管子曰疑今者察之古不知來者視之往古語曰與死人同病者不可生也與亡國同行者不可存也非曰吕氏春秋曰夫人以食死者欲禁天下之食悖矣有以乗舟死者欲禁天下之船悖矣有以用兵喪其國者欲偃天下之兵悖矣杜恕曰夫奸臣賊子自古及今未嘗不有百嵗一人是為繼踵千里一人是為比肩而舉以為戒是猶一噎而禁人食也噎者雖少餓者必多是曰孔子曰惡訐惡以為直非曰管子曰惡隱惡以為仁者魏曹羲曰夫世人所謂掩惡揚善者君子之大義保明同好者朋友之至交斯言之作蓋閭閻之白談所以收愛憎之相謗非篤正之至理折中之公議也世士不料其數而係其言故善惡不分亂實由之朋友雷同敗必從焉談論以當實為情不以過難為貴相知以等分為交不以雷同為固是以達者存其義不察于文識其心不求於言是曰越絶書曰􅃷女不貞衒士不信非曰漢書曰大行不細謹大禮不讓辭是曰黄石公曰務廣地者荒務廣徳者强有其有者安貪人有者殘殘滅之政雖成必敗非曰司馬錯曰欲富國者務廣其地欲強兵者務富其人欲王者務博其徳三資者備而後王業随之是曰傳曰心茍無瑕何恤乎無家語曰禮義之不􅄽何恤乎人言非曰語曰積毁銷金積讒磨骨衆羽溺舟羣輕折軸是曰孔子曰君子不噐聖人智周萬}
