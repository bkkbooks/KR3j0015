  - {type: variant, offset: 15479, length: 7, content: 前代稱其質重莫, WYG: 自益之為損故伐一而並失由此觀之則不伐者伐之也不爭者爭之也讓敵者勝之也是故卻至上人而抑下滋甚王叔好爭而終於出奔藺相如以迴車取勝於亷頗冦恂以不鬬取賢于賈復物勢之反乃君子所謂道也是曰孝經曰居家理治可移于官非曰酈生落魄無}
