  - {type: variant, offset: 9900, length: 222, content: 行之主主于四季五行用事先起于木故土家尚木色青也周人以木德王而色尚赤此三代之所以不同也及漢之初公孫臣賈誼以為漢土德以五行之傳從所不勝傳移之傳也五帝相代常從金木水火土相勝之法也秦在水德故謂漢據土而剋之劉向父子以為帝出於震故庖犧氏始受木德其後以母傳子終而復始自神農黃帝下歷唐虞三代而漢得火焉故高祖始起神母夜號著赤帝之符得天統矣昔共工以水德間於木火與秦同運非其次故皆不永也以吾觀之帝王之興各本其所出五帝之後以定五德何以明之漢堯後也堯火德王故漢為火焉袁紹, WYG: ''}
