  - {type: variant, offset: 15506, length: 3, content: 六夷英, WYG: 此百代不易之道非曰淮南子曰夫審於毫釐之計者必遺天下之數不失小物之選者或于大事之舉今人才有欲平九州存危國而乃責之以閨閤之禮修鄉曲之俗是猶以斧翦毛以刀伐木皆失其宜矣是曰商鞅謂趙良曰子之觀我理秦孰與五羖大夫賢乎趙良曰夫五羖大夫荆之鄙人也聞繆公之賢而願望見行而無資自鬻于秦客被褐飯牛繆公知之舉之牛口之下而加之百姓之上秦國莫敢望焉今君之見秦也因嬖人景監以為}
