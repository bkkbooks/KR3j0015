  - {type: variant, offset: 15986, length: 0, content: '', WYG: 理事適其務故有功今時移而法不變務易而事以古是則法與時詭而事與務易是以法立而時益亂務無而事益廢此聖人之理國也不法古不修今當時而立功在難而能免秦孝公用衛鞅鞅欲變法孝公恐天下議己疑之衛鞅曰疑}
  - {type: variant, offset: 15986, length: 0, content: '', krp: 理事適其務故有功今時移而法不變務易而事以古是則法與時詭而事與務易是以法立而時益亂務無而事益廢此聖人之理國也不法古不修今當時而立功在難而能免秦孝公用衛鞅鞅欲變法孝公恐天下議己疑之衛鞅曰疑}
