  - {type: variant, offset: 8920, length: 1, content: 能, WYG: 此五者所謂士失其美質太公曰明罰則人畏懾人畏懾則變故出反明罰也明察則人擾人擾則人徙人徙則不安其處易以成變反明察也太公曰明賞則不足不足則怨長明王理人不知所好而知所惡不知所歸而知所去使人各安其所生而天下靜矣晉劉頌曰凡監司欲舉大而畧小何則夫細過微闕謬忘之失此人情所}
