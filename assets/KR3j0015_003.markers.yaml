  - {type: variant, offset: 17165, length: 0, content: '', WYG: 俱稱其美矣議曰黄老之風蓋帝道也孔子閒居謂曽參曰昔者明王内修七教外行三至七教修而可以守三至行而可以征明王之守也則必折衝千里之外其征也還師袵席之上曽子曰敢問七教孔子曰上敬老則下益孝上敬齒則下益悌上樂施則下益亮上親賢則下擇交上好徳則下無隠上惡貪則下恥爭上亷讓則下知節此之謂七教也七教者治之本也教定則本正矣凡上者人之表也表正則何物}
