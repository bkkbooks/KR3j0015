  - {type: variant, offset: 8612, length: 300, content: 齊王建有三過人之巧而身虜於看者不知賢也故仁莫大于愛人智莫大於知人二者不立雖察慧捷巧不免於亂矣或曰周武之雄才武略身先士卒若天假之年盡其兵算必能平宇內為一代之明主乎虞南曰周武驍勇果毅有出人之略觀其卑躬厲士法令嚴明雖勾踐穰苴無聞於天下此猛將之任非人君之度量也由此觀之夫撥亂之主當先以收相獲將為本一身善戰不足恃也故劉向曰知人者王道也知事者臣之也伎藝善戰何益哉後齊文宣帝狂悖之蹟桀紂之所不為而國富人豐不至於亂亡何也宣帝名洋後齊高歡第二子受後魏禪也虞南曰昔齊桓奢淫亡禮人倫所棄假六翮於仲父遂伯諸侯宣武帝鄙稔忍虐古今無比委萬機於遵彥保全宗國以其任用得才所以社稷猶存者也議曰殷有三仁太康有五弟亦皆賢者而國為墟何哉鬻子, WYG: 説苑}
