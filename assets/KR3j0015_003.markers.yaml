  - {type: variant, offset: 9698, length: 0, content: '', WYG: 强服矣齊秦狄敵楚而已唯聖人能内外無患自非聖人外寧必有内憂驕而亢則憂患生盍釋楚以為外懼乎是曰三略曰無使仁者主財為其多恩施而附于下非曰陶朱公中男殺人囚於楚朱公欲使其少子裝黄金千鎰徃視之其長男固請乃使行楚殺其弟朱公曰吾固知必殺其弟是長與我俱見苦為生之難故重其財如少弟生見我富乗堅驅良逐狡豈知其財所從來固輕棄之今長者果殺其弟事理然也無足悲是曰語曰祿薄者不可與入亂賞輕者不可與入難慎子曰先王見不受禄者不臣禄不厚者不與入難非曰田單將攻狄見魯仲子仲子曰將軍攻狄弗能下也何者昔將軍之在即墨坐而織蕢立而杖挿為士卒倡此所以破燕今將軍東有掖邑之奉西有蕢上之娱黄金横帶而馳乎淄澠之間有生之樂無死之心所以不勝也後果然是曰語曰貧賤之交不可忘糟糠之妻不下堂非曰語曰交接廣而信衰于友爵禄厚而忠衰于君是曰春秋後語曰楚春申君使孫子為宰客有説春申君曰湯以亳武王以鎬皆不過}
  - {type: page-break, offset: 9698, content: '', id: KR3j0015_WYG_003-13b, image: WYG0849/WYG0849-0055d.png}
