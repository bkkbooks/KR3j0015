  - {type: variant, offset: 15353, length: 1, content: 相, WYG: 主斷圖私以禁誅於己也故殺賢長而立幼弱廢正嫡而立不義春秋戒之曰楚王子圉聘於鄭未出境聞王病反問病遂以冠纓絞王殺之因自立也齊崔杼之妻美莊公通之崔抒率其黨而攻莊公莊公走出踰於外墻射中其股遂殺之而立其弟近代李兊用趙餓主父于沙丘百日而殺之淖齒用齊擢閔王之筋懸于廟梁宿昔而死夫厲雖腫胞之疾上比前代未至絞纓射股也下比近代未至擢筋餓死也夫刼殺死亡之主心之憂勞形之困苦必甚於厲矣由此觀之厲雖憐王可也是曰易曰備物致用立成噐以為天下利者莫大于聖人非曰莊子曰聖人不死大盜不止雖重聖人而治天下則是重利盜跖也為之㪷斛以量之則并}
