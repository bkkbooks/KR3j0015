  - {type: variant, offset: 7906, length: 0, content: '', WYG: 㤀身狥國臨大節而不可奪此正義也若趙之虞卿棄相捐君以用魏齊之危信陵無忌竊符矯命以赴平原之急背公死黨之義成守職奉上之節廢故毛公數無忌曰於趙則有功矣於魏則未為得凡此之類皆華偽者禮者所以行謹敬亦所以生惰慢反禮也議曰漢時欲定禮文帝曰繁禮飾貌無益于禮躬化為可耳故罷之郭嘉謂曹公曰紹繁禮多儀公體任自然此道勝者也夫節苦難貞故生惰慢也樂者所以和情志亦所以生淫放反樂也樂書曰鄭衛之音亂代之音桑間濮上之音亡國之音也故嚴安曰夫佳麗珍怪固順于耳目故養失而泰樂失而淫禮失而彩教失而偽偽彩淫泰非所以範人之道名者所以正尊卑亦所以生矜簒反名也議曰古者名位不同禮亦異數故聖人明禮制以序尊卑異車服以彰有徳然漢髙見秦皇威儀之盛乃嘆曰大丈夫當如此此所以生矜簒老經曰夫禮者忠信之薄而亂之首信矣哉法者所以齊衆異亦所以乖名分反法也議曰道徳經云法令滋彰盜賊多有}
  - {type: page-break, offset: 7906, content: '', id: KR3j0015_WYG_003-2a, image: WYG0849/WYG0849-0050a.png}
