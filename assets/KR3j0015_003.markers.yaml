  - {type: variant, offset: 17240, length: 1, content: 當, WYG: 費而天下之士悦至樂無聲而天下之人和何則昔者明王必盡知天下良士之名既知其名又知其實既知其實然後因天下之爵以尊之此謂至禮不讓而天下治因天下之禄以富天下之士此之謂至賞不費而天下之士悦如此}
