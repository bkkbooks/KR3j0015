  - {type: variant, offset: 5065, length: 2340, content: 取荊州兵不血刃是其智也戰三州虎視天下是其雄也屈身于陛下是其略也孫策瘡甚呼弟權曰舉江東之眾決機于兩陣之閒與天下爭衡卿不如我舉賢任能各盡其才以保江東我不如卿陳壽云孫權屈身忍辱任才尚計有勾踐之奇人之傑也故能自擅江表成鼎峙之業也晉宣帝雄謀妙算諸葛亮冠世奇才誰為優劣虞南曰宣帝起自書生參佐帝業濟世危難克清王道文武之略實有可稱而多仗陰謀弗由仁義猜忍詭伏盈諸襟抱至如示謬言於李勝委鞫獄於何晏愧心負理君子不為以此偽情行之萬物若使力均勢敵俱會中原以仲達之姦謀當孔明之節制恐非儔也吳張儼默記論諸葛亮司馬宣王二相優劣曰漢朝傾霸天下分崩二公並遭值際會託身明主孔明起蜀漢之地蹈一州之上方之大國蓋有九分之一也提步卒數萬長驅祁山慨然有飲馬河雒之志仲達據天下十倍之地仗兼并之眾據牢城擁精銳無擒敵之意務自保而已使彼孔明若此而不亡則涼雍不解甲中國不釋鞍勝負之勢亦已決矣方之司馬不亦優乎或曰晉景文兄弟孰賢魏明帝崩立養子齊王芳遺詔使曹爽與司馬宣王輔政宣王誅爽自專政宣王薨子景王名師字子元代立輔政廢齊王芳立高貴鄉公景王薨弟文王名昭字子上又代立輔政殺高貴鄉公立陳留王後陳留王以魏禪晉武帝名炎字安世即位平吳天下一統及子惠帝立天下大亂五胡入中原矣虞南曰何晏稱唯深也故能通天下之志夏侯太初是也惟幾也故能成天下之務司馬子元是也故知王佐之才著於早日及誅爽之際智略已宣欽儉稱兵全軍獨克此足見其英圖也雖道盛三分而終身北面威名振主而臣節不虧侯服歸全於斯為美太祖嗣興克寧禍亂南定淮海西平庸蜀役不踰時厥功為重及高貴纂曆聰明夙智不能竭忠協贊擬迹伊周遂乃偽謗士彥委罪成濟自貽逆節終享惡名斯言之玷不可磨也干寶晉總論曰昔宣帝以雄才碩量應運而仕值魏太祖創業之初籌畫軍國嘉謀屢中遂服輿軫驅馳三世性深阻有城府而能寬綽以容納行任數以御物而知人項採拔故能西擒孟達東舉公孫淵內夷曹爽外襲王陵屢拒諸葛亮節制之兵而東支吳人輔車之勢於是百姓與能大象始搆矣世宗承基太祖繼業玄豐亂內欽誕寇外潛謀雖密而在幾必兆淮浦再擾而許洛不震咸黜異圖用光前烈然後推轂鍾鄧長驅庸蜀三關電掃劉禪入臣天符人事於是信矣始當非常之禮終受備物之錫至於世祖遂享皇極仁以厚下儉以節用和而不弛寬而能斷故人詠維新四海悅勸矣泛舟三峽介馬桂陽役不二時江湘來同夷吳蜀之壘垣通二方之險塞太康之中天下書同文車同軌雖太平未洽亦足以明吏奉其職人樂其生百代之一時也武皇既崩山陵未乾而楊駿被誅母后廢黜朝士舊臣夷滅者數十族尋以二公楚王之變宗子無維城之助而閼伯實沈之隙歲構師尹無具瞻之貴而顛墜戮辱之禍日有方岳無鈞石之鎮關門無結草之固李辰石冰傾之於荊揚劉淵王彌撓之於青冀二十餘年而河洛為墟戎羯稱制二帝失尊山林無所何哉樹立失權託附非才四維不張而苟且之政多也故觀阮籍之行而覺禮教崩弛之所由察庾純賈充之事而見師尹之多僻思郭欽之謀而寤戎狄之有釁核傅咸之奏錢神之論而覩寵賂之彰民風國勢如此雖以中庸之才守文之主治之辛有必見之於祭祀季札必得之於樂聲范燮必為之請死賈誼必為之痛哭又況我惠帝以放蕩之德臨之哉淳耀之烈未渝故大命重集于中宗元皇帝也東晉自元帝以下何主為賢虞南曰晉自遷都江左強臣擅命垂拱南面政非己出王敦以盤石之宗居上流之要負才矜地志懷問鼎非肅祖之明斷王導之忠誠則晉祚其移於王氏矣若使降年永久仗任群賢因瀍㵎之遺黎乘劉石之衰運則克復中原不難圖也元帝值天下崩離創立江左後肅祖即位大將軍王敦威震內外將謀為逆帝與王導溫嶠等決計征敦敦敗死也或曰偽楚桓玄有奇才遠略而遂至滅亡何也桓玄字敬道父溫大司馬玄博綜術藝以雄豪自處晉安帝以為丞相封楚王遂禪位虞南曰夫人君之量必虛己應物覆載同於天地信誓擬於暄寒然後萬姓樂推而不厭也彼桓玄者蓋有浮狡之小智而無含宏之大德值晉末衰亂威不逮下故玄得肆其爪牙以徼倖之餘而逢神武之運至於夷滅固其宜也鬻子曰發政施令為天下福者謂之道上下相親謂之和民不求而得所欲謂之信除天下之害者謂之仁仁與信和與道帝之王器也由此言之豪雄小智何益於樂推哉宋祖誅滅桓玄再興晉室梁代裴子野優之於宣武其事云何虞南曰魏武曹騰之孫累葉榮顯濯纓漢室三十餘年及董卓之亂乃與山東俱起誅滅元兇曾非己力晉宣歷任卿相位極台鼎握天下之圖居既安之勢奉明詔而誅逆節建瓴為譬未足喻也宋祖以匹夫提劍首創大業旬月之閒重安晉鼎居半州之地驅一郡之卒斬譙縱於庸蜀禽姚紹於崤函剋慕容超於青部梟盧循於嶺外戎旗所指無往不捷觀其豁達則漢祖之風制勝胸襟則光武之匹惜其祚短志未可量此為優矣斐子野曰宋武皇帝奇跡多於魏武大德厚於晉宣拔足行閒却孫恩蟻聚之眾奮臂荊郢掃桓玄盤石之宗方軌長驅則三齊無堅壘迴戈內赴則五嶺靡餘妖命孫季高於巨海之上而番禺席卷擢朱齡石於百夫之下而庸蜀來王羌胡畏威反為表裏董率虎旅以事中原然後請呼上帝步驟前王光有帝圖謂之義取者也又曰桓敬道有文武奇才志雪餘恥狡動離亂之中奄有天下而不血刃既而嘯命六合規模進取未及踰年坐盜社稷自以名高漢祖事捷魏晉思專其侈以冀恭己若王謐桓謙以人望鎮領衷王綏謝混以後進相光輝群從兄弟方州連郡民駭其速而服其強無異望矣高祖于時朱方之一匹夫也無千百之眾糾合同盟電擊二州未及半旬蕩清京邑號令群后長驅江漢推亡楚於匪隙拔衰晉於已頹自軒轅己來用兵之疾未始有也自非雄略不世天命底止焉能若此者乎於是人知攸暨而王迹興矣宋孝武明帝二人孰賢虞南曰二帝殘忍之性異體同心誅戮賢良割剪枝葉內無平勃之相外闕晉鄭之親以斯大寶委之昏稚故使齊氏乘釁宰制天下未踰歲稔遂移龜玉緘滕雖固適為大盜之資百慮同失可為長歎鼎社傾淪非不幸也孝武名駿文帝第三子為江州刺史弟劭既弒逆帝與顏竣於江州起義征邵平之明帝名彧文帝第十八子即位盡殺孝武諸子務為雕飾天下騷然崩子昱立無道蕭道成殺之齊建元永明之閒號為治世誠有之乎虞南曰齊高創業之主知稼穡之艱難且立身儉素務存𥳑約武帝則留意後庭雕飾過度然能委任王儉憲章攸出禮樂之盛咸稱永明宰相得人於斯為美, WYG: ''}
