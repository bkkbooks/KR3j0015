  - {type: variant, offset: 16133, length: 268, content: 以順為撓厲其亢是故可與立法難與入微也柔順安恕美在寬容失在少決柔順之人緩心寬斷不戒其事之不攝而以亢為劌安其舒是故可與循常難與權疑也雄悍桀健任在膽烈失在多忌於悍之人氣奮英決不戒其勇之毀跌而以順為恇竭其勢是故可與涉難難與居約也精良畏慎善在恭謹失在多疑精慎之人畏患多忌不戒其懦於為義而以勇為悍增其疑是故可與休全難與立節也強楷堅勁用在槓幹失在專固淩楷之人秉意勁持不戒其情之固護而以辯為虛強其專是故可與持正難與附眾也論辯理繹能在釋結失在流宕博辯之人論理贍給不戒其辭之汎濫而以楷為繫遂其已是故可與汎序難與立約也普搏周洽崇在覆裕失在溷濁宏普之人意愛周洽, WYG: ''}
