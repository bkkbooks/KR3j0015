  - {type: variant, offset: 16025, length: 0, content: '', WYG: 育羣生故王之為言徃也蓋言其惠澤優游善養潤天下天下歸徃之故曰王也霸功之大者尊君卑臣權統由一政不二門賞罰必信法令著明百官修理威令必行夫霸君亦為人除難興利以富國强兵或承衰亂之後或興兵征伐皆未得遵法度申文理度代而制因時施宜以從便善之計而務在於立功也此霸者之術}
  - {type: variant, offset: 16025, length: 0, content: '', krp: 育羣生故王之為言徃也蓋言其惠澤優游善養潤天下天下歸徃之故曰王也霸功之大者尊君卑臣權統由一政不二門賞罰必信法令著明百官修理威令必行夫霸君亦為人除難興利以富國强兵或承衰亂之後或興兵征伐皆未得遵法度申文理度代而制因時施宜以從便善之計而務在於立功也此霸者之術}
  - {type: variant, offset: 16027, length: 1, content: 畢, WYG: 純而任徳霸道駮而任法此優劣之差也道徳經曰我無為而人自化文子曰所謂無為者非謂引之不來推之不往謂其循理而舉事因資而立功推自然之勢也故曰智而好問者聖勇而好問者勝乗衆人之智即無不任也用衆人之力即無不勝也故聖人舉事未甞不因其資而用也故曰湯武聖主也而不能與越人乗舲舟泛江湖伊尹賢相也而不能與胡人騎原馬服騊駼孔墨博通也而不能與山居者入榛薄出險阻由是觀之人智於物淺}
