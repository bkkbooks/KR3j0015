  - {type: variant, offset: 15475, length: 1, content: 家, WYG: 仁義存焉則是非竊仁義聖智耶故逐于大盜揭諸侯竊仁義并㪷斛權衡符璽之利雖有軒冕之賞弗能勸斧鉞之威弗能禁此重利盜跖而使不可禁者是乃聖人之過也故曰國之利噐不可以示人彼聖人者天下之利噐也非所以明天下也是曰論語曰君子固窮小人窮斯濫矣非曰易曰窮則變通則乆是以自天祐之吉無不利太史公曰鄙人有言何知仁義以饗其利者為有徳故伯夷醜周餓死首陽山而文武不以其故貶王跖蹻暴戻其徒誦義無窮由此觀之竊鈎者誅竊國者為諸侯諸侯之門仁義存焉非虚言也今拘學或抱咫尺之義乆孤於代豈若卑論儕俗與代沉浮而取榮名哉是曰東平王蒼曰為善最樂非曰語曰時不與善己獨由之故曰非妖則妄是曰龎統好人倫勤於長養毎所稱述多過於才時人怪而問之統曰當今天下大亂正道凌遲善人少而惡人多方欲興風俗長道業不美其談則聲名不足慕也不足慕企而為善少矣今㧞十失五猶得其半而可以崇邁代教使有志者自勵不亦可乎非曰人物志曰君子知自損之為益故功一而美二小}
