  - {type: variant, offset: 15357, length: 114, content: 呂太尉主兵適會其成功所謂功臣非社稷臣也後漢陳蕃上疏薦徐稚袁閎韋著三人帝問蕃曰三人誰為先後蕃曰閎生公族聞道漸訓著長於三輔禮義之俗所謂不扶自直不鏤自雕至於稚者爰自江南卑薄之域而角立傑出宜當為先或曰謝安石為相可與何人為比虞南曰昔顧雍封, WYG: 侯諸}
