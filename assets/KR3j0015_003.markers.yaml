  - {type: variant, offset: 16008, length: 11, content: 其所與節其所偏故傳曰審, WYG: 乃在位宫室輿服不踰禮制九女正序于内三公分職于外制井田以齊之設諸侯以牧之使饒不溢侈少不匱乏然後申以辟雍之化示以揖讓之容是以和氣四塞禍亂不生此聖王之教也而威以刑誅使知}
