  - {type: variant, offset: 9681, length: 0, content: '', WYG: 者不備而能成大盜者天下未之有也後漢末董卓入朝將簒位乃引用名士范曄論曰董卓以虓闞為情遭崩剥之勢故得蹈藉彛倫毁裂畿服夫以刳肝斮趾之性則羣生不足以厭其快然猶折意搢紳遲疑凌奪尚有盜竊之道焉由是觀之善人不得聖人之道不立盜跖不得聖人之道不}
