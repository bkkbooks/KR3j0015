  - {type: variant, offset: 9695, length: 0, content: '', WYG: 非曰列子曰天地無全功聖人無全能萬物無全用全備也故天職生覆地職載形聖職教化是曰孔子曰君子坦蕩蕩小人長戚戚非曰孔子曰晉重耳之霸心也生于曹衛越勾踐之有霸心也生於㑹稽故居下而無憂者則思不逺覆身而嘗逸者則志不廣是曰韓子曰古之人目短于自見故以鏡觀面智疑於自知故以道正已非曰老子曰反聽之謂聰内視之謂明自勝之謂强是曰唐且曰專諸懐錐刀而天下皆謂之勇西施被短褐而天下稱美非曰慎子曰毛嬙西施天下之至姣也衣之以皮具則見者皆走易之以𤣥緆則行者皆止由是觀之則𤣥緆色之助也姣者辭之則色厭矣是曰項梁曰先起者制服於人後起者受制於人軍志曰先人有奪人之心非曰史佚有言曰無始禍又曰始禍者死語曰不為禍始不為福先是曰慎子曰夫賢而屈于不肖者權輕也不肖而服于賢者位尊也堯為匹夫不能使其鄰家及至南面而王則令行禁止由此觀之賢不足以服物而勢位足以屈賢矣非曰賈子曰自古至今與民為仇者有遲有速耳而民必勝之矣故紂自謂天王也而桀自謂天父也已滅之後民亦罵之也以此觀之則位不足以為尊而號不足以為榮矣是曰漢景帝時轅固與黄生爭論於上前黄生曰湯武非受命乃殺也固曰不然夫桀紂荒亂天下之心皆歸湯武湯武與天下之心而誅桀紂桀紂之人弗為使而歸湯武湯武不得已而立非受命為何非曰黄生曰冠雖敝必加於首履雖新必貫于足何者上下之分也今桀紂雖失道然君上也湯武雖聖臣下也夫君有失行臣不正言匡過以尊天子反因過而誅之代立南面非殺而何是曰太公曰明罰則人畏懾人畏懾則變故出明賞則人不足人不足則怨長故明王之理人不知所好不知所惡非曰文子曰罰無度則戮而無威賞無度則費而無恩故諸葛亮曰威之以法法行則知恩限之以爵爵加則知榮是曰文子曰人之化上不從其言從其行也故人君好勇而國家多難人君好色而國家昏亂非曰秦王曰吾聞楚之鐵劒利而倡優拙夫鐵劒利則士勇倡優拙則思慮逺以逺思慮御勇士吾恐楚之圖秦也是曰墨子曰雖有賢君不愛無功之臣雖有慈父不愛無益之子非曰曹子建曰舍罪責功者明君之主也矜愚愛能者慈父之恩也三略曰含氣之類皆願得申其志是以明君賢臣屈己申人是曰傳曰人心不同其猶面也曹子建曰人各有好尚蘭􅊉蓀蕙之芳衆人所好而海畔有逐臭之夫咸池有六英之發而墨子有非之之論豈可同哉非曰語曰以心度心間不容針孔子曰其恕乎己所不欲勿施於人是曰管子曰倉廪實知禮節衣食足知榮辱非曰古語曰貴不與驕期而驕自至富不與侈期而侈自來是曰語曰忠無不報非曰左傳曰亂代則讒勝直是曰韓子曰凡人之大體取舍同則相是取舍異則相非也易曰同聲相應同氣相求水流濕火就燥雲從龍風從虎非曰易曰二女同居其志不同語曰}
