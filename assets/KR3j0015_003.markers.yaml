  - {type: variant, offset: 291, length: 464, content: 曰韓信云項王所過無不殘滅百姓不親特劫於威強服耳名雖為霸實失天下心故曰其強易弱諸葛亮曰荊州之人附操者逼兵勢耳非心服今將軍誠命猛將與荊州協規同力破操軍必矣由此言之人心不服其勢易破故王者之道降心服志也設矩備衰有察察之政兵甲之備而無爭戰血刃之用天下太平君無疑於臣臣無疑于主國定主安臣以義退亦能美而無害昔三代明王啟建洪期文質殊制而令名一致故曰夏人尚忠忠之弊也朴救朴莫若敬殷人革而修焉敬之弊也鬼救鬼莫若文周人矯而變焉文之弊也薄則又反之于忠三代相循如水濟火所謂隨時之宜救弊之術此三王之德也霸主制士以權結士以信使士以賞信衰士疏賞毀士不為用左傳曰楚圍宋宋如晉告急先軫曰報施救患取威定霸於是乎在矣狐偃曰楚始得曹而新婚於衛若伐曹衛楚必救之則齊宋免矣于是乎蒐于被廬作三軍謀元帥使郄縠將中軍晉侯始入而教其民二年欲用之子犯曰人未知義未安其居於是乎出定襄王入務利人人懷生矣將用之子犯曰人未知信未宣其用於是乎伐原以示信人易資者不求豐焉明徵其辭公曰可矣子犯曰民未知禮未生其恭於是乎大蒐以示之禮作執秩以正其官人聽不惑而後用之出穀戍釋宋圍一戰而霸文之教也此五霸德也故, WYG: ''}
