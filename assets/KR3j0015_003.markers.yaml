  - {type: variant, offset: 15586, length: 163, content: 豈以區區萬戶之封動其方寸者歟若論其度量近古已來未見其匹隋煬帝在東宮嘗謂賀若弼曰楊素韓擒虎史萬歲三人俱稱良將其閒優劣何如對曰楊素是猛將非謀將議曰瞻氣果敢猛將也淵而有謀謀將也韓擒虎是鬥將非領將議曰拳捷𪍷悍鬭將也御軍齊肅領將也史萬歲是騎將非大將議曰領一偏師所向無敵騎將也包羅英雄使群才各當其用大將也太子曰善故自六正至於問將皆人臣得失, WYG: 舜理百揆接下}
