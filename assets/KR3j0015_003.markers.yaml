  - {type: variant, offset: 15765, length: 3, content: 殷王紂, WYG: 術取宰相卿大夫輔翼其世主固無可言者及若季次原憲季次孔子弟子未嘗仕孔子稱之讀書懐獨行議不茍合當世當世亦笑之今遊俠其行雖不軌於正義然其言必信其行必果已諾必誠不愛其軀赴士之阨困羞伐其徳蓋亦有足多者且緩急人之所時有也虞舜窘於井廩伊尹負于鼎爼傅説匿于傅巖吕尚困於棘津夷吾桎梏百里奚飯牛仲尼厄匡菜色陳蔡此皆學士所謂有道仁人也猶遭此葘况}
