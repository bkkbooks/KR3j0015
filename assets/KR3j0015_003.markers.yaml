  - {type: variant, offset: 10, length: 280, content: 皇無言化流四海故天下無所歸功伏羲女媧神農稱三皇也帝者體天則地有言有令而天下太平君臣讓功四海化行百姓不知其所以然故使臣不用禮賞功美而無害黃帝者順天地之紀時播百穀勤心力耳目節用水火時物有土德之瑞故號黃帝顓頊者養材以任地載時以象天依鬼神以制義治氣以教化潔誠以祭祀動靜之物大小之神日月所照莫不砥礪高辛者取地之財而節用之撫教萬人而利誨之歷日月而迎送之明鬼神而敬事之其色郁郁其德嶷嶷帝堯者其仁如天其智如神就之如日望之如雲富而不驕貴而不舒虞舜者善無微而不著惡無隱而不彰任自然以誅賞委群心而就制故能造御乎無為運道于至和百姓日用而不知合德若自有者此五帝之德也王者制人以道降心服志, WYG: ''}
