  - {type: variant, offset: 9678, length: 0, content: '', WYG: 魯國必好救人于患也子貢贖人而不受金于府魯國之法贖人于他國者受金于府也孔子曰魯國不復贖人矣子路受而勸徳子貢讓而止善由此觀之亷有所在而不可公行反亷也匡衡云孔子曰能以禮讓為國乎何有朝廷者}
  - {type: variant, offset: 9678, length: 0, content: '', krp: 魯國必好救人于患也子貢贖人而不受金于府魯國之法贖人于他國者受金于府也孔子曰魯國不復贖人矣子路受而勸徳子貢讓而止善由此觀之亷有所在而不可公行反亷也匡衡云孔子曰能以禮讓為國乎何有朝廷者}
  - {type: variant, offset: 9679, length: 0, content: '', WYG: 下之楨幹也公卿大夫相與修禮㳟讓則人不爭好仁樂施則下不暴上義髙節則人興行寛柔恵和則衆相愛此四者明王之所以不嚴而化成也何者朝}
  - {type: variant, offset: 9679, length: 0, content: '', krp: 下之楨幹也公卿大夫相與修禮㳟讓則人不爭好仁樂施則下不暴上義髙節則人興行寛柔恵和則衆相愛此四者明王之所以不嚴而化成也何者朝}
  - {type: variant, offset: 9680, length: 0, content: '', WYG: 變色之言則下有爭鬭之患上有自專之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有盜竊之人此其本也慎子曰忠未足以救亂代而適足以重非何以識其然耶曰父有良子而舜放瞽瞍桀有忠臣而過盈天下然則孝子不生慈父之義六親不和有孝慈而忠臣不生聖君之下國家昏亂有忠臣故明主之使其臣也忠不得過職而職不得過官反忠也京房論議與石顯有隙及京房被黜為魏郡太守憂懼上書曰臣弟子姚平謂臣曰房可謂小忠未可謂大忠何者昔秦時趙髙用事有正先者非刺髙而死髙威自此成秦之亂正先趣之今臣得出守郡唯陛下毋使臣當正先之死為姚平所笑由此而觀之夫正先之所謂忠乃促秦禍忠何益哉莊子曰將為胠篋探囊發匱之盜胠音起居反胠發也從旁開為胠為之守備則必攝緘縢攝結也固扁鐍音决細也此世俗之所謂智也然而巨盜至則負匱揭篋揭音其謁反擔囊而趨唯恐緘縢扃鐍之不固也然則向之所謂智者有不為盜積者乎反智也孫子曰小敵之堅大敵之擒也其所謂聖者有不為大盜守者乎何以知其然耶昔者齊國鄰邑相望鷄狗之音相聞􅘩罟之所布耒耨之所刺方二千餘里闔四境之内所以立宗廟社稷治邑屋州閭鄉里者曷嘗不法聖人哉然而田成子一朝殺齊君而盜其國所盜者豈獨其國耶并與聖智之法而盜之故田成有乎盜賊之名而身處堯舜之安小國不敢非大國不敢誅十二代而有齊國則是不獨竊齊國并與其聖智之法以守其盜賊之身乎反聖法也昔叔向問齊晏子曰齊其如何晏子曰此季世吾勿知齊其為陳氏矣公棄其人而歸于陳氏齊舊四量豆區釜鍾四升為豆各自其四以登于釡釜十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公收之山木如市弗加于山魚鹽蜃蛤弗加於海人參其力二於公而衣食其一公聚朽蠧而三老凍餒國之諸市屨賤踊貴人多疾病而或燠休之其愛之如父母歸之如流水欲無獲人將焉避之跖之徒問於跖曰盜亦有道乎跖曰何適其無有道耶夫妄意室中之藏聖也入先勇也出後義也知可否智也分均仁也}
