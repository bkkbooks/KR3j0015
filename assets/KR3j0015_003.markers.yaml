  - {type: variant, offset: 11500, length: 1069, content: 信義足以攜持世心矣議曰此所謂義重於生捨生可也或曰臧洪死張超之難可謂義平范曄曰雍丘之圍臧洪之感憤壯矣相其徒跣且號束甲請舉誠足憐也夫豪雄之所趣舍其與守義之心異乎若乃締謀連衡懷詐算以相尚者蓋惟勢利所在而已況偏城既危曹袁方穆洪徒指外敵之衡以紓倒懸之會忿悁之師兵家所忌可謂懷哭秦之節存荊則未聞昔廣陵太守張超委政臧洪後袁紹亦與結友及曹操圍張超于雍丘洪聞超被圍乃徒跣號泣勒兵救超兼從紹請兵紹不聽超城陷遂族誅超洪由是怨紹與之絕紹興兵圍之城陷誅死議曰臧洪當縱橫之時行平居之義非立功之士也或曰季布壯士而反摧剛為柔髡鉗匪匿為是乎司馬遷曰以項羽之氣而季布以勇顯於楚身屢典軍搴音綺連反旗者數矣可謂壯士然至被刑戮為人奴而不死何其下彼必自負其材故受辱而不羞欲有所用其未足也故終為漢名將賢者誠重其死夫婢妾賤人感慨而自殺者非勇也其計盡無復之耳議曰大史公曰魏豹彭城雖故賤然已席卷千里南面稱孤喋血乘勝日有聞矣懷叛逆之意及敗不死而虜囚身被刑戮何哉中材以上且羞其行況王者乎彼無異故智略絕人獨患無身耳得攝尺寸之柄其雲蒸龍變欲有所會其度以故幽因而不辭云此則縱橫之士務立其功者也又藺公贊曰知死必勇非死者難也處死者難方藺相如引璧睨柱及叱秦王左右勢不過誅然士或怯懦不敢發相如一厲其氣威信敵國退而讓廉頗名重太山其處智勇可謂兼之矣此則忠貞之臣誠知死所者也管子曰不恥身在縲紲之中而恥天下之不理不恥不死公子糾而恥威之不申于諸候此則自負其才以濟世為度者也此皆士之行己死與不死之明效也或曰宗殼之賤也見輕庾業及其貴也請業為長史何如裴子野曰夫貧而無戚賤而無悶恬夫天素宏此大猷曾原之德也降志辱身俛眉折脊忍屈庸曹之下貴騁群雄之上韓黥之志也卑身之事則同居卑之情已異若宗元幹無怍於草具有韓黥之度矣終棄舊惡長者哉宋宗殼之賤也州人庾業豐富待客必方丈其為殼設則粟飯殼亦致飽及為豫州請業為長史也世稱酈寄賣交以其紿呂祿也於理何如班固曰夫賣交者謂見利忘義也若寄父為功臣而執劫雖摧呂祿以安社稷義存君親可也或曰靳允違親守城可謂忠乎徐眾曰靳允於曹公未成君臣母至親也於義應去昔王陵母為項羽所拘母以高祖必得天下因自殺以固陵志明心無所係然後可得事人盡其死節衛公子開方仕齊十年不歸管仲以其不懷其親安能愛君不可以為相是以求忠臣必於孝子之門允宜先救至親徐庶母為曹公所得劉備乃遣庶歸欲為天下者恕人子之情公又宜遣允也魏太祖征徐州使程昱留守甄城張邈叛太祖迎呂布布執范令靳允母太祖遣昱說靳允無以母故使固守范允流涕曰不敢有二也魏文帝問王朗等曰昔子產治鄭人不能欺子賤治單父人不忍欺西門豹治鄴人不敢欺三子之才於君德孰優對曰君任德則臣感義而不忍欺君任察則臣畏覺, WYG: 主}
