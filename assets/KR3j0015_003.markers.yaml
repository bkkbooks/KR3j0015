  - {type: variant, offset: 7908, length: 3, content: 云昔成, WYG: 凌暴反刑也賞者所以勸忠能亦所以生鄙爭反賞也文子曰聖人其作書也以領理百事愚者以不忘智者以記事及其衰也為奸偽以解有罪而殺不辜反書也文子曰察于刀筆之跡者即不知理亂之本習于行陣之事者即不知廟勝之權莊子曰儒以詩禮發冡大儒曰東方作矣事之何若小儒曰未解裙襦口中有珠詩固有之曰青青之麥生于陵陂生不布施死何含珠為接其鬢壓其顪儒以金椎控其頤徐别其頰無傷口中􅀈珠由此言之詩禮乃盜資也顪音許穢反控音其作囿也以奉宗廟之具簡士卒戒不虞及其衰也馳騁弋獵以奪人時反囿也齊宣}
  - {type: page-break, offset: 7908, content: '', id: KR3j0015_WYG_003-2b, image: WYG0849/WYG0849-0050b.png}
