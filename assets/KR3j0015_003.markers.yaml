  - {type: variant, offset: 7912, length: 1, content: 幼, WYG: 見文王囿大人以為小問于孟子孟子曰周文王之囿方七十里芻蕘者往焉雉者往焉與人同之民以為小不亦宜乎臣聞郊闗之内有囿方四十里殺其麋鹿者如殺人之罪民以為大不亦宜乎楚靈為章華之臺伍舉諌曰夫先王之為臺榭也榭不過講軍實臺不過望氛祥其所不奪穡地其為不匱財用其事不煩官業其日不妨事務夫為臺榭將以教人利也不聞其以匱乏也其上賢也以平教化正獄訟賢者}
