  - {type: variant, offset: 816, length: 3918, content: 也仗刑多任德少者五霸也純用刑強而亡者秦也政曰古之理者其政有三王者之政化之霸者之政威之強國之政脅之故化之不變而後威之威之不變而後脅之脅之不變而後刑之故至於刑則非王者之所貴矣故虞南云彼秦皇者棄仁義而用威力此可以吞并而不可以守成此任刑之弊也或曰王霸之道既聞命矣敢問高光二帝皆拔起壠畝芟夷禍難遂開王業高祖豁達以大度光武謹細於條目名擅其羔龍飛鳳翔故能撥亂庇人拯斯塗炭然比大德方天威孰為優劣乎曹植曰昔漢之初興高祖因暴秦而起遂誅強楚光有天下功齊湯武業流後嗣帝王之元勳人君之盛事也然而名不純德行不純道身沒之後崩亡之際果令兇婦肆酷虐之心嬖妾被人彘之刑趙王幽囚禍殃骨肉諸呂專權社稷幾移凡此諸事豈非高祖寡計淺慮以致斯哉然其梟將畫臣皆古今之所鮮有歷代之希覩彼能任其才而用之聽其言而察之故兼天下而有帝位也世祖體乾靈之休德稟貞和之純精蹈黃中之妙理韜亞聖之懿才其為德也聰達而多識仁智而明恕重慎而周密樂施而愛人值陽九無妄之世遭炎精厄會之運殷爾雷發赫然神舉奮武略以攘暴興義兵以掃殘軍未出於南京莽已斃於西都爾乃廟勝而後動眾計定而後行師故攻無不陷之壘戰無奔北之卒宣仁以和眾邁德以來遠故竇融聞聲而影附馬援一見而嘆息敦睦九族有唐虞之稱高尚純朴有羲皇之素謙虛納下有吐握之勞留心庶事有日昃之勤是以計功則業殊比隆則事異旌德則靡愆言行則無穢量事則勢微論輔則臣弱卒能握乾圖之休徵立不刊之遐迹金石銘其休烈詩書載其懿勳故曰光武其優也荀悅曰高祖起於布衣之中奮劍而取天下不由唐虞之禪不階湯武之士龍興虎變率從風雲征亂伐暴廓清帝宇八載之閒海內克定遂荷天衢登建皇極上古已來書籍所載未嘗有也非雄俊之才寬明之略歷數所授神祇所相安能致功如此焚魚斷虵異物同符豈非精靈之感哉書曰天工人其代之易曰湯武革命順乎天而應乎人斯之謂矣夏政忠忠之弊野朴故殷承之以敬敬之弊鬼故周承之以文文之弊薄救薄莫若忠三王之道周而復始周秦之問可謂文弊秦不改反酷刑漢承其弊得天統矣孔融曰周武從后稷以來至其身相承積十五世但有魚鳥之瑞至如高祖一身修德瑞有四五白虵分神母哭西入關五星聚又武王伐紂斬而梟之高祖入秦赦子嬰而遣之是其寬裕又不如高祖虞南曰帝者與師處王者與友處霸者與臣處漢祖之臣三傑是也光武之佐二十八將是也豈得以鄧禹吳漢匹於張良韓信者乎然漢祖功臣皆以強盛誅滅光武佐命悉用優秩安全君臣之際良可稱也絕長補短抑其次焉由此言之夫漢高克平秦項開創漢業衣冠禮樂垂之後代雖未階王道霸德之盛也或曰班固稱周云成康漢言文景斯言當乎虞南曰成康承文武遺跡以周召為相化篤厚之氓因積仁之德疾風偃草未足為喻至江漢祖開基日不暇給亡嬴之弊猶有存者太宗體茲仁恕式遵玄默滌秦項之酷烈反軒昊之淳風幾致刑厝斯為難矣若使不溺新垣之說無取鄧通之夢懍懍乎庶幾近於王道景帝之擬周康則尚有慚德漢文贊曰文帝即位二十三年宮室園囿車騎服御無所增益有不便輒弛以利人南越尉他自立為帝召貴他兄弟以德懷之他遂稱臣與匈奴結親而背約入盜令邊備守不發兵深入惡煩百姓吳王詐病不朝賜以机杖群臣諫說雖切常假借納用焉張武等受賂金錢覺加賞賜以愧其心專務以德化人是以海內殷富興於禮義斷獄數百幾致刑措嗚呼仁哉或問傅子曰漢太宗除肉刑可謂仁乎對曰匹夫之仁也夫王天下者大有濟者也非小不忍之謂由此言之班固以太宗為仁不在除肉刑矣景帝贊曰孔子稱斯人也三代之所以直道而行信哉周秦之弊罔密文峻而奸宄不勝漢興掃除煩苛與人休息至于孝文加之以恭儉孝景導業五六十載之閒至於移風易俗黎人醇厚周云成康漢言文景美矣哉此王道也或曰漢武帝雄才大略可方前代何主虞南曰漢武承六世之業海內殷富又有高人之資故能總攬英雄駕御豪傑內興禮樂外開邊境制度憲章煥然可述方於始皇則為優矣至於驕奢暴虐可以相亞並功有餘而德不足武帝贊曰漢承百王之弊高祖撥亂反政文景務在養人至于稽古禮文之事猶多闕焉孝武初立卓然罷黜百家表章六經遂疇咨海內舉其俊茂與之立功興太學修郊祀改正朔定歷數協音律作詩樂建封禪禮百神紹周後號令文章煥焉可述後嗣得遵洪業而有三代之風如武帝之雄材大略不改文景之恭儉以齊斯人雖詩書所稱何有加焉推此而言之彼漢武秦皇皆立功之君非守成之主也昔周成以孺子繼統而有管蔡四國之變漢昭幼年即位亦有燕蓋上官逆亂之謀成王不疑周公漢昭委任霍光二主孰為先後魏文帝曰周成王體聖考之休氣稟賢妣之胎誨周邵為保傅呂望為太師口能言則行人稱辭足能履則相者導儀目厭威容之美耳飽德義之聲所謂沈漬玄流而沐浴清風矣猶有咎悔聆二叔之謗使周公東遷皇天赫怒顯明厥咎然後乃寤不亮周公之聖德而信金縢之教言豈不暗哉夫漢昭父非武王母非邑姜養惟蓋主相則桀光保無仁孝之質佐無隆平之治所謂生於深宮之中長於婦人之手然而德與性成行與禮并在年二七早知夙達發燕書之詐亮霍光之誠豈將啟金縢信國史而後乃寤哉使成昭鈞年而立易世而化貿臣而治換樂而歌則漢不獨少周不獨多也大將軍霍光及上官桀秉政害光寵欲誅之乃詐為帝兄燕旦上書稱光行上林稱蹕等事帝不信或曰漢宣帝政事明察其光武之儔歟虞南曰漢宣帝起自閭閻知人疾苦是以留心聽政擢用賢良原其循名責實峻法嚴令蓋流出於申韓也古語云圖王不成弊猶足霸圖霸不成弊將如何光武仁義圖王之君也宣帝刑名圖霸之主也今以相輩恐非其儔議曰元帝之為太子嘗諫宣帝以為持法太嚴帝作色曰我漢家以霸王之道雜之奈何純任德化用害政乎雖以此言之知其度量不遠然寬猛之制有自來矣昔高祖入秦約法三章秦人大悅此言緩刑之美也郭嘉說曹公云漢末政失於寬紹以寬濟故不懾公糾之以猛而上下知制此言嚴刑之當也故傳曰政寬則人慢慢則糾之以猛猛則人殘殘則施之以寬寬以濟猛猛以濟寬政是以和書曰刑罰世輕世重周禮曰刑新國用輕典刑亂國用重典刑平國用中典由此觀之但問時代何如耳嚴刑惡足小哉或曰漢元帝才藝溫雅其守文之良主乎虞南曰夫人君之才在乎文德武功而已文則經天緯地詞令典策武則禁暴戢兵安人和眾此南面之宏圖也至於鼓瑟吹簫和江度曲斯乃伶官之職豈天子之所務乎議曰元帝多才藝善鼓瑟琴雖如此非善之善也何則徐幹中論曰夫詳小事而略大道察近物而暗遠數自古及今未有如此而不亂也未有如此而不亡也所謂詳小事察近物者謂耳聰於絲竹歌謠之和目明於雕琢彩色之章口給於辯惠切對之詞心通於短言小說之文手習於射御書數之巧也所謂遠數大道者謂仁足以覆燾群生惠足以撫養百姓明足以照見四方智足以統理萬物權足以應變無端義足以阜生財用威足以禁遏奸非武足以平定禍亂詳於聽受而審於官人達于廢興之原通於安危之分如此則君道畢矣昔魯莊多伎藝詩人刺之魯昭美容儀有出奔之禍由是言之使人主視如離婁聽如師曠射如夷羿書如史籀可謂善於有司之職何益於理乎匡衡諫元帝改政書曰受命之王務在創業垂統傳之無窮繼體之君必存於承宣先王之德而褒大其功令陛下聖德天覆子愛海內然陰陽未和奸邪未禁者殆議論者未丕揚先帝之盛功爭言制度不可用臣竊恨國家釋樂成之業而虛為此紛紛也願陛下詳覽統業之事此守文也或曰觀偽新王莽謙恭禮讓豈非一代之名士乎至作相居尊驕淫暴虐何先後相背甚乎虞南曰王莽天姿慘酷詐偽人也未達之前徇名求譽得志之後矜能傲物飭情既盡而本質存焉愎諫自高卒不改寤海內冤酷為光武之驅除焉班固曰王莽始起外戚折節力行以要名譽成哀之際勤勞國家直道而行動見稱述豈所謂在國必聞在家必聞色取仁而行違者耶莽既非仁而有邪佞之材又承四父世業之權遭漢中微國統三絕而太后壽考為之宗主故得肆其奸慝以成篡奪之禍推此言之亦有天時非人力所致及其竊位南面處非所據顛覆之勢險於桀紂而莽晏然自謂黃虞復出也乃矜其威詐滔天虐人是以海內囂然喪其樂生之心內外怨恨遠近俱廢城池不守肢體分裂遂令天下城邑為墟自書傳所載亂臣賊子無道之人未有如莽之甚者也紫色蛙聲餘分閏位為聖王之驅除云吳王孫權論呂蒙曰子明少時孤謂不辭劇易果敢有膽而已長大學問開益籌略奇至可以次於公瑾圖取關羽勝於子敬子敬答孤書云帝王之起皆在有驅除羽不足忌此子敬內不能辯而外為大言耳孤亦恕之不苟責也此驅除之意也夏少康漢光武皆中興之君孰者為最虞南曰此二帝皆興復先緒光啟王業其名則同其實則異何者光武之世藉思亂之民誅殘賊之莽取亂侮亡為功差易至如少康則夏氏之滅已二代矣羿及寒浞藐然遺體身在胎孕母氏逃亡生於他國不及過庭之訓曾無強近之親遭離亂之難庇身非所而能崎嶇於喪亂之閒遂成配天之業中興之君斯為稱首魏高貴鄉公問荀顗曰有夏既衰后相殄滅少康收輯夏眾復禹之績高祖拔起壟畝芟夷秦項考其功德誰為先後顗等曰造之與因難易不同少康功德雖美猶為中興漢世祖同流可也至如高祖臣等以為優上曰少康生於滅亡之後降為諸侯之隸能布其德而兆有其謀卒滅過戈復禹之績祀夏配天不失舊物非至德宏仁豈能濟斯勳乎漢祖因土崩之勢收一時之權為人子則數危其親為人君則囚繫賢相為人父則不能衛其子身沒之後社稷幾傾若與少康易時而處或未能復大禹之績也推此言之宜高夏康而下漢祖矣後漢衰亂由於桓靈二主凶德誰則為甚虞南曰桓帝赫然奮怒誅滅梁冀有剛斷之節焉然閹人擅命黨錮事起中平亂階始於桓帝古語曰天下嗷嗷新主之資也靈帝承疲民之後易為善政黎庶傾耳咸冀中興而帝襲彼覆車毒逾前輩傾覆宗社職帝之由天年厭世為幸多矣議曰桓帝問侍中爰延曰朕如何主也對曰漢中主何者尚書令陳蕃任事則理中常侍黃門豫政則亂是以知陛下可與為善可與為非此中主之謂也虞南曰夫岷江初發其源可以濫觴及其遠也方舟而後能濟元帝之時而任宏恭石顯暨於桓靈加以單超張讓既斁彝倫遂傾宗國其所由來者漸矣故曰熒熒不滅炎炎奈何言慎其始也嗚呼百代之後其鑒之哉古語曰寒者易為衣饑者易為食晁錯曰夫國富強而鄰國亂者帝王之資由此言之是知昏亂之君將以開聖德矣自炎精不競㝢縣分崩曹孟德挾天子而令諸侯劉玄德憑蜀漢之阻孫仲謀負江淮之固三分天下鼎足而立皆肇開王業光啟霸圖三方之君孰有優劣虞南曰曹公兵機智算殆難與敵故能肇跡開基居中作相實有英雄之才矣然譎詭不常雄猜多忌至於殺伏后鴆荀彧誅孔融戮崔琰婁生斃於一言桓劭勞於下拜棄德任刑其虐已甚坐論西伯實非其人許邵所謂, WYG: ''}
  - {type: variant, offset: 816, length: 3918, content: 也仗刑多任德少者五霸也純用刑強而亡者秦也政曰古之理者其政有三王者之政化之霸者之政威之強國之政脅之故化之不變而後威之威之不變而後脅之脅之不變而後刑之故至於刑則非王者之所貴矣故虞南云彼秦皇者棄仁義而用威力此可以吞并而不可以守成此任刑之弊也或曰王霸之道既聞命矣敢問高光二帝皆拔起壠畝芟夷禍難遂開王業高祖豁達以大度光武謹細於條目名擅其羔龍飛鳳翔故能撥亂庇人拯斯塗炭然比大德方天威孰為優劣乎曹植曰昔漢之初興高祖因暴秦而起遂誅強楚光有天下功齊湯武業流後嗣帝王之元勳人君之盛事也然而名不純德行不純道身沒之後崩亡之際果令兇婦肆酷虐之心嬖妾被人彘之刑趙王幽囚禍殃骨肉諸呂專權社稷幾移凡此諸事豈非高祖寡計淺慮以致斯哉然其梟將畫臣皆古今之所鮮有歷代之希覩彼能任其才而用之聽其言而察之故兼天下而有帝位也世祖體乾靈之休德稟貞和之純精蹈黃中之妙理韜亞聖之懿才其為德也聰達而多識仁智而明恕重慎而周密樂施而愛人值陽九無妄之世遭炎精厄會之運殷爾雷發赫然神舉奮武略以攘暴興義兵以掃殘軍未出於南京莽已斃於西都爾乃廟勝而後動眾計定而後行師故攻無不陷之壘戰無奔北之卒宣仁以和眾邁德以來遠故竇融聞聲而影附馬援一見而嘆息敦睦九族有唐虞之稱高尚純朴有羲皇之素謙虛納下有吐握之勞留心庶事有日昃之勤是以計功則業殊比隆則事異旌德則靡愆言行則無穢量事則勢微論輔則臣弱卒能握乾圖之休徵立不刊之遐迹金石銘其休烈詩書載其懿勳故曰光武其優也荀悅曰高祖起於布衣之中奮劍而取天下不由唐虞之禪不階湯武之士龍興虎變率從風雲征亂伐暴廓清帝宇八載之閒海內克定遂荷天衢登建皇極上古已來書籍所載未嘗有也非雄俊之才寬明之略歷數所授神祇所相安能致功如此焚魚斷虵異物同符豈非精靈之感哉書曰天工人其代之易曰湯武革命順乎天而應乎人斯之謂矣夏政忠忠之弊野朴故殷承之以敬敬之弊鬼故周承之以文文之弊薄救薄莫若忠三王之道周而復始周秦之問可謂文弊秦不改反酷刑漢承其弊得天統矣孔融曰周武從后稷以來至其身相承積十五世但有魚鳥之瑞至如高祖一身修德瑞有四五白虵分神母哭西入關五星聚又武王伐紂斬而梟之高祖入秦赦子嬰而遣之是其寬裕又不如高祖虞南曰帝者與師處王者與友處霸者與臣處漢祖之臣三傑是也光武之佐二十八將是也豈得以鄧禹吳漢匹於張良韓信者乎然漢祖功臣皆以強盛誅滅光武佐命悉用優秩安全君臣之際良可稱也絕長補短抑其次焉由此言之夫漢高克平秦項開創漢業衣冠禮樂垂之後代雖未階王道霸德之盛也或曰班固稱周云成康漢言文景斯言當乎虞南曰成康承文武遺跡以周召為相化篤厚之氓因積仁之德疾風偃草未足為喻至江漢祖開基日不暇給亡嬴之弊猶有存者太宗體茲仁恕式遵玄默滌秦項之酷烈反軒昊之淳風幾致刑厝斯為難矣若使不溺新垣之說無取鄧通之夢懍懍乎庶幾近於王道景帝之擬周康則尚有慚德漢文贊曰文帝即位二十三年宮室園囿車騎服御無所增益有不便輒弛以利人南越尉他自立為帝召貴他兄弟以德懷之他遂稱臣與匈奴結親而背約入盜令邊備守不發兵深入惡煩百姓吳王詐病不朝賜以机杖群臣諫說雖切常假借納用焉張武等受賂金錢覺加賞賜以愧其心專務以德化人是以海內殷富興於禮義斷獄數百幾致刑措嗚呼仁哉或問傅子曰漢太宗除肉刑可謂仁乎對曰匹夫之仁也夫王天下者大有濟者也非小不忍之謂由此言之班固以太宗為仁不在除肉刑矣景帝贊曰孔子稱斯人也三代之所以直道而行信哉周秦之弊罔密文峻而奸宄不勝漢興掃除煩苛與人休息至于孝文加之以恭儉孝景導業五六十載之閒至於移風易俗黎人醇厚周云成康漢言文景美矣哉此王道也或曰漢武帝雄才大略可方前代何主虞南曰漢武承六世之業海內殷富又有高人之資故能總攬英雄駕御豪傑內興禮樂外開邊境制度憲章煥然可述方於始皇則為優矣至於驕奢暴虐可以相亞並功有餘而德不足武帝贊曰漢承百王之弊高祖撥亂反政文景務在養人至于稽古禮文之事猶多闕焉孝武初立卓然罷黜百家表章六經遂疇咨海內舉其俊茂與之立功興太學修郊祀改正朔定歷數協音律作詩樂建封禪禮百神紹周後號令文章煥焉可述後嗣得遵洪業而有三代之風如武帝之雄材大略不改文景之恭儉以齊斯人雖詩書所稱何有加焉推此而言之彼漢武秦皇皆立功之君非守成之主也昔周成以孺子繼統而有管蔡四國之變漢昭幼年即位亦有燕蓋上官逆亂之謀成王不疑周公漢昭委任霍光二主孰為先後魏文帝曰周成王體聖考之休氣稟賢妣之胎誨周邵為保傅呂望為太師口能言則行人稱辭足能履則相者導儀目厭威容之美耳飽德義之聲所謂沈漬玄流而沐浴清風矣猶有咎悔聆二叔之謗使周公東遷皇天赫怒顯明厥咎然後乃寤不亮周公之聖德而信金縢之教言豈不暗哉夫漢昭父非武王母非邑姜養惟蓋主相則桀光保無仁孝之質佐無隆平之治所謂生於深宮之中長於婦人之手然而德與性成行與禮并在年二七早知夙達發燕書之詐亮霍光之誠豈將啟金縢信國史而後乃寤哉使成昭鈞年而立易世而化貿臣而治換樂而歌則漢不獨少周不獨多也大將軍霍光及上官桀秉政害光寵欲誅之乃詐為帝兄燕旦上書稱光行上林稱蹕等事帝不信或曰漢宣帝政事明察其光武之儔歟虞南曰漢宣帝起自閭閻知人疾苦是以留心聽政擢用賢良原其循名責實峻法嚴令蓋流出於申韓也古語云圖王不成弊猶足霸圖霸不成弊將如何光武仁義圖王之君也宣帝刑名圖霸之主也今以相輩恐非其儔議曰元帝之為太子嘗諫宣帝以為持法太嚴帝作色曰我漢家以霸王之道雜之奈何純任德化用害政乎雖以此言之知其度量不遠然寬猛之制有自來矣昔高祖入秦約法三章秦人大悅此言緩刑之美也郭嘉說曹公云漢末政失於寬紹以寬濟故不懾公糾之以猛而上下知制此言嚴刑之當也故傳曰政寬則人慢慢則糾之以猛猛則人殘殘則施之以寬寬以濟猛猛以濟寬政是以和書曰刑罰世輕世重周禮曰刑新國用輕典刑亂國用重典刑平國用中典由此觀之但問時代何如耳嚴刑惡足小哉或曰漢元帝才藝溫雅其守文之良主乎虞南曰夫人君之才在乎文德武功而已文則經天緯地詞令典策武則禁暴戢兵安人和眾此南面之宏圖也至於鼓瑟吹簫和江度曲斯乃伶官之職豈天子之所務乎議曰元帝多才藝善鼓瑟琴雖如此非善之善也何則徐幹中論曰夫詳小事而略大道察近物而暗遠數自古及今未有如此而不亂也未有如此而不亡也所謂詳小事察近物者謂耳聰於絲竹歌謠之和目明於雕琢彩色之章口給於辯惠切對之詞心通於短言小說之文手習於射御書數之巧也所謂遠數大道者謂仁足以覆燾群生惠足以撫養百姓明足以照見四方智足以統理萬物權足以應變無端義足以阜生財用威足以禁遏奸非武足以平定禍亂詳於聽受而審於官人達于廢興之原通於安危之分如此則君道畢矣昔魯莊多伎藝詩人刺之魯昭美容儀有出奔之禍由是言之使人主視如離婁聽如師曠射如夷羿書如史籀可謂善於有司之職何益於理乎匡衡諫元帝改政書曰受命之王務在創業垂統傳之無窮繼體之君必存於承宣先王之德而褒大其功令陛下聖德天覆子愛海內然陰陽未和奸邪未禁者殆議論者未丕揚先帝之盛功爭言制度不可用臣竊恨國家釋樂成之業而虛為此紛紛也願陛下詳覽統業之事此守文也或曰觀偽新王莽謙恭禮讓豈非一代之名士乎至作相居尊驕淫暴虐何先後相背甚乎虞南曰王莽天姿慘酷詐偽人也未達之前徇名求譽得志之後矜能傲物飭情既盡而本質存焉愎諫自高卒不改寤海內冤酷為光武之驅除焉班固曰王莽始起外戚折節力行以要名譽成哀之際勤勞國家直道而行動見稱述豈所謂在國必聞在家必聞色取仁而行違者耶莽既非仁而有邪佞之材又承四父世業之權遭漢中微國統三絕而太后壽考為之宗主故得肆其奸慝以成篡奪之禍推此言之亦有天時非人力所致及其竊位南面處非所據顛覆之勢險於桀紂而莽晏然自謂黃虞復出也乃矜其威詐滔天虐人是以海內囂然喪其樂生之心內外怨恨遠近俱廢城池不守肢體分裂遂令天下城邑為墟自書傳所載亂臣賊子無道之人未有如莽之甚者也紫色蛙聲餘分閏位為聖王之驅除云吳王孫權論呂蒙曰子明少時孤謂不辭劇易果敢有膽而已長大學問開益籌略奇至可以次於公瑾圖取關羽勝於子敬子敬答孤書云帝王之起皆在有驅除羽不足忌此子敬內不能辯而外為大言耳孤亦恕之不苟責也此驅除之意也夏少康漢光武皆中興之君孰者為最虞南曰此二帝皆興復先緒光啟王業其名則同其實則異何者光武之世藉思亂之民誅殘賊之莽取亂侮亡為功差易至如少康則夏氏之滅已二代矣羿及寒浞藐然遺體身在胎孕母氏逃亡生於他國不及過庭之訓曾無強近之親遭離亂之難庇身非所而能崎嶇於喪亂之閒遂成配天之業中興之君斯為稱首魏高貴鄉公問荀顗曰有夏既衰后相殄滅少康收輯夏眾復禹之績高祖拔起壟畝芟夷秦項考其功德誰為先後顗等曰造之與因難易不同少康功德雖美猶為中興漢世祖同流可也至如高祖臣等以為優上曰少康生於滅亡之後降為諸侯之隸能布其德而兆有其謀卒滅過戈復禹之績祀夏配天不失舊物非至德宏仁豈能濟斯勳乎漢祖因土崩之勢收一時之權為人子則數危其親為人君則囚繫賢相為人父則不能衛其子身沒之後社稷幾傾若與少康易時而處或未能復大禹之績也推此言之宜高夏康而下漢祖矣後漢衰亂由於桓靈二主凶德誰則為甚虞南曰桓帝赫然奮怒誅滅梁冀有剛斷之節焉然閹人擅命黨錮事起中平亂階始於桓帝古語曰天下嗷嗷新主之資也靈帝承疲民之後易為善政黎庶傾耳咸冀中興而帝襲彼覆車毒逾前輩傾覆宗社職帝之由天年厭世為幸多矣議曰桓帝問侍中爰延曰朕如何主也對曰漢中主何者尚書令陳蕃任事則理中常侍黃門豫政則亂是以知陛下可與為善可與為非此中主之謂也虞南曰夫岷江初發其源可以濫觴及其遠也方舟而後能濟元帝之時而任宏恭石顯暨於桓靈加以單超張讓既斁彝倫遂傾宗國其所由來者漸矣故曰熒熒不滅炎炎奈何言慎其始也嗚呼百代之後其鑒之哉古語曰寒者易為衣饑者易為食晁錯曰夫國富強而鄰國亂者帝王之資由此言之是知昏亂之君將以開聖德矣自炎精不競㝢縣分崩曹孟德挾天子而令諸侯劉玄德憑蜀漢之阻孫仲謀負江淮之固三分天下鼎足而立皆肇開王業光啟霸圖三方之君孰有優劣虞南曰曹公兵機智算殆難與敵故能肇跡開基居中作相實有英雄之才矣然譎詭不常雄猜多忌至於殺伏后鴆荀彧誅孔融戮崔琰婁生斃於一言桓劭勞於下拜棄德任刑其虐已甚坐論西伯實非其人許邵所謂, krp: ''}
