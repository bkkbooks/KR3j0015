  - {type: variant, offset: 9696, length: 1, content: 歲, WYG: 棲不兩雄一泉無二蛟又曰凡人情以同相妒故曰同美相妒同貴相害同利相忌是曰韓子曰釋法術而以心理堯舜不能正一國去規矩而忘善度奚仲不能成一輪使中主守法術拙匠執規矩而萬不失矣非曰淮南子曰夫矢之所以射逺貫堅者弓弩力也其所以中的剖微者人心也賞善罰暴者政令也其所以行者精誠也故弩雖强不能獨中令雖明不能獨行杜恕曰世有亂人而無亂法若使法可專任則唐虞不須稷契之佐殷周無貴伊吕之輔矣是曰慮不先定不可以應卒兵不先辦不可以應敵左傳曰豫備不虞古之善政非曰左傳曰士蒍謂晉侯曰臣聞之無䘮而戚憂必讐焉無戎而城讐必保焉春秋外傳曰周景王將鑄錢單穆公曰不可古者天灾降戾于是乎量資幣權輕重以振救人夫備預有未至而設之脩國備也預備不虞安不忘危有至而後救之若救火療疾量資幣之屬是不相入也二者先後各有宜不相入可先而不備謂之怠怠緩也可後而先之謂之召災謂人未有患輕而重之離離人召匱財是以召災也周固羸國也天未厭禍焉而又離人以佐災無乃不可乎是曰左傳曰古人有言一日縱敵數世之患也非曰晉楚遇于鄢范文子不欲戰曰吾先君之亟戰也有故秦狄齊楚皆强不盡力子孫將弱今}
