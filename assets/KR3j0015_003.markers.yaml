  - {type: punctuation, offset: 13904, content: 「, id: KR3j0015_CH7x2006_003-bkkpn3220}
  - {type: variant, offset: 13904, length: 1380, content: 夫以五國之兵共伐一齊不足為強大戰濟西伏尸流血不足為仁彼孔明包文武之德長嘯俟時劉玄德以知人之明屢造其廬咨以濟世奇策泉涌遂東說孫權北抗大魏以乘勝之師翼佐取蜀及玄德臨終禪以大位在擾攘之際立童蒙之主設官分職班敘眾才文以能內武以折衡然後布其恩澤於國中之人其行軍也路不拾遺毫毛不犯勳業垂濟而隕觀其遺文謨謀宏遠矣己有利則讓于下下有闕則躬自咎見善則遷納諫則改故聲烈震遐邇也孟子曰聞伯夷之風貪夫自廉余以為覩孔明之忠姦臣立節殆將與伊呂爭勝豈徒以樂毅為伍哉或曰商鞅起徒步干孝公挾三術之略吞六國之縱使秦業帝可為霸者之佐乎劉向曰夫商君內急耕戰之業外重戰伐之賞不阿貴寵不偏疎遠雖書云無偏無黨詩云周道如砥其直知矢司馬法之厲戎士周后稷之勸農業無以易此此所以并諸侯也故孫卿曰四世有勝非幸也數也夫霸君若齊桓晉文者桓不倍柯之盟文不負原之期而諸侯信之此管仲咎犯之謀也今商君倍公子卬之舊恩棄交魏之明信詐取三軍之眾故諸侯畏其強而莫親信也藉使孝公遇齊桓晉文得諸侯之統將合諸侯之君驅天下之兵以伐秦秦則亡矣天下無桓文之君故秦得以兼諸侯也衛鞅始自以為知王霸之德原其事不倫也昔周邵公施美政其死也後世思之蔽芾甘棠之詩是嘗舍於樹下不忍伐其樹況害於身乎管仲奪伯氏駢邑三百戶無怨言今衛鞅內刻刀鋸之刑外深鈇鉞之誅身死車裂其去霸者之佐亦遠矣然孝公殺之亦非也可輔而用使衛鞅施寬平之法加之以恩申之以信庶幾霸者之佐乎議曰商鞅初因景監求見秦孝公說以帝道孝公意不入時時睡後又與鞅語不知膝之過席景監曰子何以中吾君君之歡甚也鞅曰始吾說公以帝道而君曰久遠安能邑邑待數十百年以子孫成事乎吾又說以霸道其意欲之而未能也吾又以強國之術說吾君大悅之然亦難以比德於殷周矣昔齊桓公與魯莊公會于柯而盟曹沫以匕首劫桓公反魯侵地桓公許之後悔欲無與魯地而殺曹沫管仲曰棄信於諸侯失天下之援不可於是與曹沫三敗所亡地諸侯聞之皆信齊而欲附焉山戎伐燕燕告急於齊齊桓公救燕而還燕莊公送桓公入齊境桓公曰非天子諸侯相送不出境吾不可以無禮於燕於是分溝割燕君所至與燕君令復修召公之政納貢於周諸侯聞之皆從齊桓公於是始霸由此觀之商鞅深刻棄信非霸者之佐明矣然孝公欲速不從鞅言孝公過也商鞅牽於世迫于君不得行其志耳劉向以鞅無霸王之術謬矣諸葛亮以馬謖敗于街亭殺之後蔣琬謂亮曰昔楚殺得臣然後文公喜可知也天下未定而戮智計之士豈不惜哉亮流涕曰孫武所以能制勝者用法明也是以楊于亂法魏絳戮之四海分裂兵交方始若復廢法何用討賊耶習鑿齒曰諸葛亮之不能兼上國也豈不宜哉夫晉人視林父之後濟故廢法而收功楚成闇得臣之益已故殺之以重敗今蜀僻陋一方才少上國而殺其駿傑退收駑下之用明法勝才不師三敗之道將以成業不亦難乎晉侯使荀桓子與楚戰於邲桓子歸敗而請死晉侯欲許之士貞子曰不可城濮之役晉師三日館穀文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶鬭況國相乎及楚殺子玉公喜而後可知曰是晉再克而楚再敗也楚是以再世不競今天或者大警晉也而又殺林父以重楚勝其無乃不競乎林父之事君也進思盡忠退思補過社稷之衛也君若之何殺之夫其敗也如日月之蝕何損於明晉侯使復其位也代以周勃功大霍光何如對曰勃本高帝大臣眾所歸向居太尉位擁兵百萬既有陳平王陵之力又有朱虛諸王之援酈寄遊說以譎諸呂因眾之心易以濟事若霍光者以倉卒之際受寄託之任輔弼幼主天下晏然遇燕王綰之亂誅除凶逆以靖王室廢昌邑立孝宣任漢家之重隆中興之祚參聲伊周為漢賢相推驗事效優劣明矣袁盎問, WYG: ''}
