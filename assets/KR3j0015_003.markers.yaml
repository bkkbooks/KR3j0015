  - {type: variant, offset: 17428, length: 1056, content: 度是謂衰主情過於義私多於公制度踰限政教失常是謂危主親用讒邪放逐忠賢縱情逞欲不顧禮度出入遊放不拘儀禁賞賜行私以越公用忿怒施罰以踰法理遂非文過而不知改忠言擁塞直諫誅戮是謂亡主故王主能致興平治主能修其政存主能保其國衰主遭無難則庶幾能全有難則殆危主遭無難則幸而免有難則亡亡主必亡而已矣何謂九風君臣親而有禮百寮和而不同讓而不爭勤而不怨唯職是司此禮國之風也尹文子曰上不勝其下下不能犯其上上下不相勝犯故禁令行人人無私雖經嶮易而國不可侵治國者也禮俗不一職位不重小臣讒疾庶人作議此衰國之風也尹文子曰君年長多妾媵少子孫疏強宗衰國也君臣爭明朝廷爭功大夫爭名庶人爭利此乖國之風也上多欲下多端法不定政多門此亂國之風也尹文子曰君寵臣臣受君公法廢私政行亂國也以侈為博以伉為高以濫為通遵禮謂之拘守法謂之固此荒國之風也叔向曰大臣重祿而不極諫近臣畏罪而不敢言下情不上通此患之大者也上下相疏內外相疑小臣爭寵大臣爭權此危國之風也上不訪下下不諫上婦言用私政行此亡國之風也尹文子曰國貧小家富大君權輕臣勢重亡國也內無專寵外無近習支庶繁息長幼不亂昌國也農桑以時倉廩充實兵甲勁利封疆修理強國也文子曰夫亂國若盛治國若虛亡國若不足存國若有餘虛者非無人各守其職也盛者非多人皆邀於末也有餘非多財節欲事寡也不足者非無貨人躁而費多也何謂四亂管子曰內有疑妻之妾此家亂也庶有疑嫡之子此宗亂也朝有疑相之臣此國亂也任官無能此眾亂也故曰立天子者不使諸侯疑焉立諸侯者不使大夫疑焉立正妻者不使嬖妾疑焉立嫡子者不使庶孽疑焉疑則動兩則爭雜則相傷故臣有兩位者國必亂臣兩位而國不亂者君猶在也恃君不亂失君必亂矣子兩者位家必亂子兩位而家不亂者親猶存也恃親不亂失親必亂矣臣疑其君無不危之國嬖疑其宗無不危之家也何謂四危又曰卿相不得眾國之危也大臣不和同國之危也兵主不足畏國之危也民不懷其產國之危也此治亂之形也凡為人上者法術明而賞罰必者雖無言語而勢自治法術不明而賞罰不必者雖曰號令然勢是亂管子曰理國有三器亂國有六攻明君若能勝六攻而立三器故國理不肖君不能勝六攻而立三器故國亂三器者何也曰號令也斧鉞也祿賞也六攻者何也曰親也貴也貨也色也巧佞也玩好也三器之用何也曰非號令無以使下非斧鉞無以威眾非祿賞無以勸人六攻之敗何也曰雖不聽而可以得存雖犯禁而可以得免雖無功而可以得富夫國有不聽而可以得存者則號令不足以使下有犯禁而可以得免者則斧鉞不足以威眾有無功而可以得富者則祿賞不足以勸人號令不足以使下斧鉞不足以威眾祿賞不足以勸人則人君無以自守也是故勢理者雖委之不亂勢亂者雖勤之不治堯舜拱己無為而有餘勢理也胡亥王莽馳騖而不足勢亂也, WYG: ''}
