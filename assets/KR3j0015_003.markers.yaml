  - {type: variant, offset: 15983, length: 2, content: 刻意, WYG: 四豪者六國之罪人也况於郭解之倫以匹夫之細微竊殺生之權其罪也不容於誅矣是曰尸子曰人臣者以進賢為功人主者以用賢為功也史記曰鮑叔舉管仲天下不多管仲之賢而多鮑叔之能知人也非曰蘇建常責大將軍青曰至尊重而天下之賢士大夫無稱焉願觀古今名將所招選擇賢者大將軍謝曰自魏其武安之厚賓客天子嘗切齒彼親附士大夫招賢黜不肖者人主之柄也人臣奉法遵職而已何與招士其為將如此議曰此一是一非皆經史自相違者班固云昔王道既微諸侯力政時君世主好惡殊方是以諸家之術蜂起並作各引一端崇其所善以此馳説取令諸侯其言雖殊譬猶火水相滅亦能相生也仁之與義敬之與和事雖相反而皆相成也易曰天下同歸而殊塗一致而百慮此之謂也適變第十五昔先王當時而立法度臨務而制事法宜其時}
  - {type: page-break, offset: 15983, content: '', id: KR3j0015_WYG_003-29a, image: WYG0849/WYG0849-0063c.png}
  - {type: page-break, offset: 15983, content: '', id: KR3j0015_WYG_003-29b, image: WYG0849/WYG0849-0063d.png}
