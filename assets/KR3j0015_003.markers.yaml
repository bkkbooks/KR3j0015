  - {type: variant, offset: 15305, length: 1, content: 盎, WYG: 相如雖虛辭濫説然其要歸引之節儉此與詩之諷諌何異非曰揚雄以為賦者將以諷也必推類而言極靡麗之辭閎侈鉅衍競於使人不能加也既乃歸之于正然覽已過矣往時武帝好神仙相如上大人賦以諷帝帝反漂漂有凌雲之志由是言之賦勸而不止明矣又頗類俳優非法度所存賢人君子詩賦之正也是曰淮南子曰東海之魚名鰈音土盍反與床榻字同比目而行北方有獸名曰婁更食更候南方有鳥名曰鶼音兼比翼而飛夫鳥獸魚鰈猶知假力而况萬乗之主乎獨不知假天下之英雄俊士與之為伍豈不痛哉非曰狐卷子曰父賢不過堯而丹朱放兄賢不過周公而管蔡誅臣賢不過湯武而桀紂伐况君之欲治亦須從身始人何可恃乎是曰孔子曰不患無位患已不立非曰孔子厄於陳蔡子路愠見曰昔聞諸夫子積善者天報以福今夫子積義懐仁乆矣奚居之窮也子曰由未之識也吾語汝以仁者為必信耶則伯夷叔齊為不餓首陽汝以智者為必用耶則王子比干不見剖心汝以忠者為必報耶則闗龍逢不見刑汝以諌者為必聽耶則伍子胥不見殺夫遇不遇者時也賢不肖者才也君子博學深謀而不遇時者衆矣何獨丘哉是曰神農形悴唐堯瘦臞舜黎黒禹胼胝伊尹負鼎而干湯吕望鼓刀而入周墨翟無黔突孔子無煖席非以貪禄位將欲起天下之利除萬人之害非曰李斯以書對秦二世云申子曰有天下者而不恣睢命之曰以天下桎若堯舜然故謂之桎也夫以人狥己則己貴而人賤以己狥人則己賤而人貴故狥人者賤而所狥者貴自古及今未有不然夫堯禹以身狥天下謂之桎者不亦宜乎是曰論語曰舉逸民天下之人歸心焉魏文侯受藝子子夏敬叚干木過其廬未嘗不式於是秦欲伐魏或曰魏君賢國人稱仁上下和洽未可圖也秦王乃止由此得譽於諸侯非曰韓子曰夫馬似鹿此馬值千金今有千金之馬而無一金之鹿者何也馬為人用而鹿不為人用今處士不為人用鹿類也所以太公至齊而斬華士孔子為司冦而誅少正卯趙主父使李疵視中山可攻否還報}
