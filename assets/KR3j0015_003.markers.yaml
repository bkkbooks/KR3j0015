  - {type: variant, offset: 9702, length: 1, content: 五, krp: 縱敵數世之患宜早為之所曹公方招懐英雄以明大信未得從嘉謀是曰家語曰子路問孔子曰請釋古之道而}
  - {type: variant, offset: 9704, length: 0, content: '', WYG: 由之意可乎子曰不可也昔東夷慕諸夏之禮有女而寡為内私壻終身不嫁不嫁則不嫁矣然非貞節之義矣倉吾嬈音奴鳥反取妻而美讓與其兄讓則讓矣然非禮讓之讓也今子欲捨古之道而}
  - {type: variant, offset: 9704, length: 0, content: '', krp: 由之意可乎子曰不可也昔東夷慕諸夏之禮有女而寡為内私壻終身不嫁不嫁則不嫁矣然非貞節之義矣倉吾嬈音奴鳥反取妻而美讓與其兄讓則讓矣然非禮讓之讓也今子欲捨古之道而}
  - {type: variant, offset: 9705, length: 4, content: 七十二日, WYG: 子之意庸知子意以非為是乎語曰變古亂常不死則亡書云事弗師古以克永代匪説攸聞非曰趙武靈王欲胡服公子成不悦靈王曰夫服者所以使國禮者所以使事聖人觀鄉而順宜因事而制禮所以利其人而厚其國夫剪髮文身錯臂左袵臨越之人也黒齒雕題鯷冠秫縫大吳之國也故禮服莫同而其便一也鄉異而用變事異而禮易是以聖人謀可以利其國不一其用謀可以便其禮不法其故儒者一師而俗異中國同禮而離教况於山谷之便乎故去就之變智者不能一逺邇之服賢聖莫能同窮鄉多異俗曲學多殊辯今叔父之言俗也吾之所言以制俗也叔父惡變服之名以忘效事之實非寡人之所望也公子成遂胡服是曰移風易俗莫善於樂非曰孟子曰天道因則大}
