  - {type: variant, offset: 12980, length: 801, content: 不愛財取之以道詩云如切如磋如琢如磨皆矯偽之謂也若肆其愚態隨其鄙情名曰任真而賢之此先王之罪人也故吾以為矯偽者禮義之端任真者貪鄙之主夫強仁者庸可誣乎或曰長平之事白起坑趙卒四十萬可為奇將乎何晏曰白起之降趙卒詐而坑其四十萬豈徒酷暴之謂乎後亦難以重得志矣向使眾人豫知降之必死則張虛拳猶可畏也況於四十萬被堅執銳哉天下見降秦之將頭臚依山歸秦之眾骸積成丘則後日之戰死當死耳何眾肯服何城肯下乎是為雖能裁四十萬之命而適足以強天下之戰欲以要一朝之功而乃更堅諸侯之守故兵進而自伐其勢軍勝而還喪其計何者設使趙眾復合馬服更生則後日之戰起必非前日之對也況今皆使天下為後日乎其所以終不敢復加兵於邯鄲者非但憂平原之補縫患諸侯之救至也徒諱之而不言耳且長平之事秦人十五以上皆荷戟而向趙矣夫以秦之強而十五已上死傷過半此為破趙之功小傷秦之敗大也又何稱奇哉議曰黃石公稱柔者能制剛弱者能制強柔者德也剛者賊也柔者人之所助剛者怨之所居是故紂之百克而卒無後項羽兵強終失天下故隨何曰使楚勝則諸侯自危懼而相救夫楚之強適足以致天下之兵耳由是觀之若天下已定藉一戰之勝詐之可也若海內紛紛雄雌未決而失信義于天下敗亡之道也當七國之時諸侯尚強而白起乃坑趙降卒使諸侯畏之而合縱諸侯合縱非秦之利為戰勝而反敗何晏之論當矣或曰樂毅不屠二城遂喪洪業為非乎夏侯元曰觀樂生與燕惠王書其殆乎知機合道以禮終始者歟夫欲極道德之量務以天下為心者豈其局迹當時止於兼并而已哉夫兼并者非樂生之所屑強燕而廢道又非樂生之所求不屑苟利不求小成斯意兼天下者也舉齊之事所以運其機而動四海也圍城而害不加於百姓此仁心著於遐邇矣邁令德以率列國則幾於湯武之事矣樂生方恢大綱以縱二城收人明信以待其弊將使即墨莒人顧仇其上開宏廣之路以待田單之徒長容善之風以申齊士之志招之東海屬之華裔我澤如春人應如草思戴燕主仰風聲二城必從則王業隆矣雖淹留於兩邑乃致速於天下也不幸之變勢所不圖敗於垂成時變所然若乃逼之以兵劫之以威奓殺傷之殘以示, WYG: ''}
