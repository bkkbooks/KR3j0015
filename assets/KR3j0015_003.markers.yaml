  - {type: variant, offset: 18710, length: 0, content: '', krp: 此商鞅申韓之術也桓範曰夫商鞅申韓之徒貴尚譎詐務行苛尅廢禮義之教任刑名之數不師古始敗俗傷化此則伊尹周召之罪人也然其尊君卑臣富國强兵守法持術有可取焉逮至漢興有寗成郅都之輩放商韓之治専以殺伐殘暴為能順人主之意希㫖之行要時趨利敢行敗禍此又商韓之罪人也然其抑强族撫孤弱清已禁奸背私立公亦有取焉至於晩代之所謂能者乃犯公家之法赴私門之勢廢百姓之務趨人間之事决煩理務臨時茍辯使官無譴負之累不省下人之寃復是申韓寗郅之罪人也由是觀之故知治天下者有王霸焉有黄老焉有孔墨焉有申商焉此其所以異也雖經緯殊制救弊不同然康濟群生皆有以矣今議者或引長代之法詰救弊之言議曰救弊為夏人尚忠殷人尚敬周人尚文者或引帝王之風譏霸者之政不論時變而務以飾説故是非之論紛然作矣言偽而辯順非而澤此罪人也故君子禁之正論第十六議曰反經是非適變三篇雖博辯利害然其弊流遁漫羡無所歸故作正論以質之孔子曰六藝於治一也禮以節人樂以發和書以導事詩以達意易以神化春秋以義司馬談曰易著天地隂陽四時五行故長於變禮經紀人倫故長於行書記先王之事故長於政詩記山川谿谷禽獸草木牝牡雌雄故長於風樂所以立故長於和春秋是非故長於理人也故曰入其國其教可知也其為人也温柔敦厚詩教也疏通知逺書教也廣博易良樂教也潔浄精微易教也恭儉莊敬禮教也屬辭比事春秋教也故詩之失愚書之失誣樂之失奢易之失賊禮之失煩春秋之失亂其為人也温柔敦厚而不愚則深於詩也子夏曰聲成文謂之音治世之音安以樂其政和亂世失之音怨以怒其政乖亡國之音哀以思其民困故正得動天地感鬼神莫近于詩太史公曰大雅言王公大人其合而徳逮黎庶小雅譏小己之得失其流及上所言雖殊徳一也晉時王政陵遲南陽魯褒著錢神論吴郡蔡洪作孤憤前史以為亂世之音怨以怒其政乖此之謂也疏通知逺而不誣則深於書也書著帝王之道典謨訓誥誓命之文三千之徒並受其義也廣博易良而不奢則深於樂也樂書曰凡音者生人心者也情動其中故形于聲聲成文謂之音是故治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困聲音之道與政相通宫為君商為臣角矣宫亂為民徵為事羽為物五者不亂則無惉懘之音則荒其君驕商亂則陂其臣壊角亂則憂其人怨徵亂則哀其事勤羽亂則危其財匱五者皆亂則誣供相陵謂之慢如此國滅亡無日矣夫上古明王舉樂者非以動娱心快意所以動盪血脉流通精神而和正心也故宫脾而和正聖商動肺而和正義角動肝而和正仁徵動心而和正智羽動腎而和正禮故聞宫音者使人温舒而廣大聞商音者使人方正而好義聞角音者使人惻隠而愛人聞徵音者使人樂善而好施聞羽音者使人整齊而好禮夫禮由外入樂自内出故聖王使人耳聞雅頌之音目視威儀之禮足行恭敬之容口言仁義之道故君子終日言而邪僻無由入也班固曰樂者聖人之所樂也而可以善人心其感人也深故先王著其教焉夫人有血氣心知之性而無哀樂喜怒之常應感而動然後心術形焉故纎微憔悴之音作而民思憂闡諧慢易之音作而民康樂麤厲猛奮之音作而民剛毅亷直正誠之音作而民肅敬寛裕順和之音作而民慈愛流僻邪散之音作而民淫亂先王恥其亂也故制雅頌之聲本之情性稽之度數制之禮義合生氣之和導五常之行使之陽而不散隂而不集剛氣不怒柔氣不懾四暢交於中而發作於外足以感人之善心而不使邪氣得接焉是先王立樂之方也吕氏春秋曰亡國戮人非無樂也其樂不樂溺者非不笑也罪人非不歌也狂者非不舞也亂世之樂有似于此范曄曰夫鐘鼓非樂之本而噐不可去三牲非孝之主而養不可廢夫存噐而亡本樂之失也調氣而和聲樂之盛也崇養以傷行孝之累也行孝以致養李之大也議曰東方角主仁南方徵主禮中央宫主信西方商主義北方羽主智此常理也今太史公以為徵動心而和正智羽動腎而和正禮則以徵主智羽主禮與舊例乖殊故非末學所能詳也潔淨精微而不賊則深於易也易之精微愛惡相攻逺近相取則不能容人近相害之恭儉莊敬而不煩則深於禮也太史公曰余至大行禮官觀三代損益乃知縁人情而制禮依人性而作儀人道經緯萬端規矩無不貫誘進以仁義束縛以刑罰故徳厚者位尊禄重者寵榮所以總一海内而整齊萬人也人體安駕乗為之金輿􅀈衡以繁其飾目好五色為之黼黻文章以表其能耳樂鐘磬為之調諧八音以蕩其心口甘五味為之庻羞酸鹹以致其美情好珍善為之琢磨珪璧以通其意故大路越席皮弁布裳朱絃洞越大羮𤣥酒所以防其淫佚救其彫敝是以君臣朝庭尊卑貴賤之序下及黎庻車輿衣服宫室飲食嫁娶䘮祭之分事有適宜物有節文周衰禮廢樂壊大小相踰管仲之家遂偹三歸循法守正者見侮于世奢溢僣差者謂之顯榮自子夏門人之髙弟也猶云出見紛華盛麗而悦入聞夫子之道而樂二者心戰未能决而况中庸以下漸漬於失教被服于成俗乎孔子必正名於衛所居不合豈不哀哉班固曰人函天地隂陽之氣有喜怒哀樂之情天稟其性而不節也聖人能為之節而不能絶也故象天地而制禮樂所以通神明立人倫正情性節萬事也人性有男女之情妬忌之别為制婚姻之禮有交接長幼之序為制鄉飲之禮有哀死思逺之情為制䘮祭之禮有尊尊敬上之心為制朝覲之禮哀有哭踊之節樂有歌舞之容正人足以副其誠邪人足以防其失故婚姻之禮廢則夫婦之道苦而淫僻之罪多鄉飲之禮廢則長幼之序亂而爭鬬之獄煩䘮祭之禮廢則骨肉之恩薄而背死㤀生者衆朝聘之禮廢則君臣之位失而侵凌之漸起故孔子曰安上治人莫善於禮移風易俗莫善于樂揖讓而治天下者禮樂之謂也屬辭比事而不亂則深於春秋也壺遂曰昔孔子何為作春秋哉太史公曰余聞之董生曰由周道哀微孔子為魯司冦諸侯害之大夫壅之孔子知言之不用道之不行也是非二百四十二年之中以為天下儀表貶天子退諸侯討大夫以達王事而已矣子曰我欲載之空言不如見之於行事之深切著明也夫春秋上明三王之道下辨人事之紀别嫌疑明是非定猶豫善善惡惡賢賢賤不肖存亡國繼絶代補弊起廢王道之大者也揆亂代反之正道莫近于春秋春秋之中弑君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數察其所以皆失其本也壺遂曰孔子之時上無明君下不得任用故作春秋垂空文以斷禮義當一王之法今夫子上遇明天子下得保其社稷者不曠守職夫子所論欲以何明太史公曰伏羲至純厚作八卦堯舜之盛尚書載之禮樂作焉湯武之隆詩人歌之春秋採善貶惡推三代之徳褒周室非獨刺譏而官已漢興以來至明天子受命於穆清澤流罔極臣下百力誦聖徳猶不能宣盡其意且士賢能而不用有國之恥也主上明聖而徳不布聞有司之過也且余掌其官廢明聖罪莫大焉余所謂述非所謂作也而君比之于春秋謬矣自仲尼没而微言絶七十子䘮而大義乖戰國縱横真偽分爭諸子之言紛然散亂矣儒家者蓋出於司徒之官助人君順隂陽明教化者也遊文於六經之中留意於仁義之際祖述堯舜憲章文武崇師仲尼此其最髙也然惑者既失精微而僻者又随時抑揚違離道本茍以譁衆取寵此僻儒之患也司馬談曰儒者博而寡要勞而少功是以其事難盡從然其叙君臣父子之禮列夫婦長幼之别不可易也夫儒者以六藝為法經傳以千萬數累世不能通其學當年不能究其禮故曰博而寡要勞而少功若夫列君臣父子之禮叙夫婦長幼之别雖百家勿能易也范曄曰夫遊庠序服儒衣所談者仁義所𫝊者聖法也故人識君臣父子之綱家知違邪歸正之路自桓靈之間朝綱日陵國隙屢啓中智以下靡不審其崩離而剛强之臣息其闚盜之謀豪俊之夫屈于鄙生之議者民誦先王之言也下畏逆順之勢也至如張温皇甫嵩之徒功定天下之半聲馳四海之表俯仰顧盼則大業移矣猶鞠躬昏主之下狼狽折札之命散成兵就繩約而無悔心者斯豈非學者之效乎故先師褒勵學者之功篤矣道家者蓋出於史官厯紀成敗秉要執本清虛以自守卑弱以自持此君人南面者之術也合於堯之克讓易之謙謙此其所長也及放者為之則欲絶去禮樂兼棄仁義獨任清虚何以為治此道家之弊也司馬談曰道家使人精神専一動合無形贍足萬物其為術也因隂陽之大順采儒墨之善撮名法之要與時遷徙應物變化立俗施事無所不宜指約而易操事少而功多夫道家無為又曰無不為其實易行其辭難知其術以虛無為本以因循為用無成勢無常形故能究萬物之情不為物先不為物後故能為萬物主有法無法因時為業有度無度因物與合故曰聖人不朽時變是守虛者道之常因者君之綱君臣並至使自明也隂陽家者蓋出於羲和之官敬順昊天歴象日月星辰敬授人時此其所長也及拘者為之則牽於禁忌泥於小數捨人事而任鬼神此隂陽之弊也司馬談曰隂陽之術大詳而衆忌諱使人拘而多畏然其叙四時之大順不可失也夫隂陽四時八位十二度二十四節各有教令曰順之者昌逆之者亡未必然也故曰使人拘而多忌夫春生夏長秋收冬藏此天之大經弗順則無以為天下紀綱故曰叙四時之大順不可失也漢書曰天人之際精祲有以相盪善惡有以相推事作乎下象動乎上隂陽之理各應其感隂變則靜者動陽蔽則明者晻水旱之灾随類而至故曰日蝕地震皆陽微隂盛也臣者君之隂也子者父之隂也妻者夫之隂也夷狄者中國之隂也春秋日蝕三十六地震五十二或夷狄侵中國或政權在臣下或婦乗夫或臣子背君父事雖不同其類一也是以明王即位正五事五事貌言視聽思也建大中以承天心則庶徵序于下日月理于上如人君淫溺後宫般樂遊田五事失於躬大中之道不立則咎徵降而六極至凡灾異之發各象過失以類告人𫝊曰田獵不宿飲食不享出入不節奪人農時及有奸謀則本不曲直又曰棄法律逐功臣殺太子以妾為妻則火不炎上又曰好治宫室飾臺榭内淫亂犯親戚侮父兄則稼穡不成又曰好攻戰輕百姓飭城郭侵邉城則金不從革又曰簡宗廟不禱祠廢祭祀逆天時則水不潤下管輅曰貴人有事其應在天在天則日月星辰也兵動人憂其應在物在物則山林鳥獸也又曰夫天雖有大象而不能言故運星精於上流神明于下驅風雲以表異役鳥獸以通靈表異者必有沉浮之候通靈者必有宫商之應是以宋襄失徳六鶂退飛伯姬將焚鳥唱其灾四國未火融風已發赤雲夾日殃在荆楚此乃上天之所使自然之明符也後漢竇武上書曰間者有嘉禾芝草黄龍之瑞見夫瑞生必於嘉土福至實由吉人在徳為瑞無徳為灾陛下所行不合天意不宜稱慶又裴楷曰按春秋已來及古帝王未有河清者也臣以為河者諸侯位也清者屬陽濁者屬隂河當濁而反清者隂欲為陽諸侯欲為帝也京房易𫝊曰河水清天下平今天垂異地吐妖民癘疫三者並時而有河清猶春秋麟不當見而見孔子書以為異也魏青龍中張掖郡𤣥川溢湧寳石負鼎狀麟鳯龍馬炳煥曰成形時人以為魏瑞任令于綽齎以問張臶臶宻謂綽夫神以知來不追已徃以禎祥先見然後廢興從之漢已乆亡魏已得之何所追廢興禎祥乎此石當今之變異而將來之禎祥後司馬氏果代魏漢武時巫為上致神君神君但聞其聲不見其形荀悦曰易稱有天道焉有地道焉有人道焉各當其理而不相亂亂則有氣變而然若夫大石自立僵栁復生此形之異也男化為女死而復生此含氣之異也鬼神髣髴在于人間言語聲音此精神之異也夫形神之異各以類感善則生吉惡則生凶精氣之際自然之符異也故逆天之理則神失其節而妖神妄興逆地之理則形失其節而妖形妄生逆中和之理則含氣失其節而妖物妄出此其大㫖也若夫神君之類精神之異也春秋𫝊曰作事不時怨讟動于人則有非言之物而言當漢武之時賦斂繁衆人民彫弊故有無形而言至也其于洪範言僣則生時妖此蓋怨讟而生妖之類也故通于道言正身則萬物精神形氣各反其本也後漢陳蕃上書曰昔春秋之末周徳衰微數十年間無復灾𤯝者天所棄也天之于漢悢悢無已故慇懃于變以悟陛下除妖去嬖實在修徳故周書曰天子見怪則修徳諸侯見怪則修政大夫見怪則修職士庻見怪則修身神不能傷道妖不能害徳漢書曰夫動人以行不以言應天以實不以文此天人之大畧也法家者蓋出於理官信賞必罰以輔禮制此其所長也及刻者為之則亡教化去仁愛専任刑法而欲以致治至於殘賊至親傷恩薄厚此法家之弊也司馬談曰法家嚴而少恩然正君臣上下之分不可改也夫法家不别親踈不殊貴賤一斷於法則親親尊尊之恩絶矣可使行一時之計而不可長用也故嚴而少恩至于尊主卑臣明職分不相踰越雖百家不能改也名家者蓋出於禮官古者名位不同禮亦異數孔子曰必也正名乎此其所長也及繳者為之繳音工釣反則茍鈎鈲析亂而已此名家之弊也司馬談曰名家使人儉而善失真然其正名實不可不察夫名故家苛察繳繞使人不得反其意専决于名而失人情曰使人儉而善失真若夫控名責實參伍不失此不可不察也鈲音普覔反墨家者蓋出於清廟之守茅屋采椽是以貴儉養三老五更是以兼愛選士大射是以上賢宗祀嚴父是以右鬼右信也順四時而行是以非命言無吉凶之命但有賢不肖善惡也以孝示天下是以上同言皆同于治也此其所長也及蔽者為之見儉之利因以非禮推兼愛之意而不知别親踈此墨家之弊也司馬談曰墨者儉而難遵是以其事不可偏循然其强本節用不可廢也夫墨者亦上論堯舜言其徳行曰堂髙三尺土堦三等茅茨不翦采椽不斵飯土簋啜土刑糲粱之食藜藿之羮夏日葛衣以冬日鹿裘其送死桐棺三寸舉音不盡其哀教䘮禮必此為萬人率使天下法若此則尊卑無别夫世異時移事業不同故曰儉而難遵也要曰强本節用則家給人足之道此墨家之所長雖百家莫能廢也漢武帝問董仲舒䇿曰蓋儉者不造𤣥黄旌旗之餙及至周室設兩觀乗大輅八佾陳於庭而頌聲興夫帝王之道豈異㫖哉對曰制度文采𤣥黄之餙所以明尊卑異貴賤而勸有徳也故春秋受命所先制者改正朔易服色所以應天也然則宫室旌旗之制有法而然者也孔子曰奢則不孫儉則固儉非聖人之中制故曰奢不儉上儉不逼下此王道也縱横家者蓋出於行人之官孔子曰使乎使乎言當權事制宜受命而不受辭此其所長也及邪人為之則上詐諼許逺反而棄其信此縱横之弊也荀悅曰世有三遊徳之賊也一曰遊俠二曰遊説三曰遊行夫立氣勢作威福結私交以立强于世者謂之遊俠餙辯辭設詐謀馳逐于天下以要時世者謂之遊説色取人合時好連黨類立虚譽以為權利者謂之遊行此之三者亂之所由生傷道害徳敗法惑世先王之所慎也凡三遊之作主於季世周秦之末尤甚焉上不明下無正制度不立綱紀弛廢以毁譽為榮辱不核其真以愛憎為利害不論其實言論者計厚薄而吐辭選舉者度親踈而下筆然則利不可以義求害不可以道避是以君子犯禮小人犯法餙華廢實競取時利薄骨肉之恩篤僚友之厚道㤀修身之道而求衆人之譽苞苴盈於門庭聘問交於路于是流俗成而正道壊矣遊俠之本生於武毅不撓乆要不㤀平生之言見危受命以救時難而濟同類以正行之者謂之武義其失之甚者至於為盜賊矣遊説之本生於是非使于四方不辱君命出疆有可以安社稷利國家則専對解結辭之繹矣民之莫矣以正行之者謂之辯智其失之甚者至于詐矣遊行之本生于道徳仁義汎愛容衆以文㑹友和而不同進徳及時以立功業于世以正行之者謂之君子其失之甚者至于因事害私為奸宄矣甚相殊逺豈不哀哉故大道之行則三遊廢矣雜家者蓋出于議官兼儒墨合名法知國體之有此見王理之無不貫此其所長也及蕩者為之則漫羡而無所歸心此雜家之弊也農家者蓋出於農稷之官播百穀勸耕桑以足衣食孔子曰所重人食此其所長也及鄙者為之則欲君臣之並耕誖上下之序農家之弊也班固曰馬遷史記其是非頗謬于聖人論大道則先黄老而後六經序遊俠則退處士而進奸雄述貨殖則崇利勢而羞貧賤此其所蔽也然其善序事理辨而不華質而不俚其文直事核不虚美不隠惡故世謂之實録文子曰聖人之從事也所由異路而同歸秦楚燕魏之歌異轉而皆樂九夷八狄之哭異聲而皆哀夫歌者樂之微也哭者哀之效也愔愔於中而應于外故在所以感之矣}
