  - {type: variant, offset: 9699, length: 0, content: '', krp: 里以有天下今孫子賢人也而君藉之百里之勢臣竊為君危之春申君曰善於是使人謝孫子孫子去之趙趙以為上卿非曰客又説春申君曰昔伊尹去夏入殷殷王而夏亡管仲去魯入齊魯弱而齊强夫賢者之所在其君未嘗不尊其國未嘗不榮也今孫子賢人也君何為辭之春申君又曰善復使人請孫子是曰韓宣王謂摎留曰吾兩欲用公仲公叔其可乎對曰不可晉用}
  - {type: variant, offset: 9700, length: 1, content: 十, WYG: 卿而國分簡公用田成闞止而簡公弑魏兩用犀首張儀而西河之外亡今王兩用之其多力者内樹其黨其力寡者又藉于外權羣臣或内樹其黨以擅主命或外為勢交以裂其地則王之國危矣又曰公孫衍為魏將與其相田儒不善季文子為衍説魏王曰王獨不見夫服牛驂驥乎不可百歩今王以衍為可使將固用之也而聽相之計是服牛驂驥之道牛馬俱死而不成其功則王之國傷矣願王察之非曰傅子曰天地至神不能同道而生萬物聖人至明不能一撿而治百姓故以異致同者天地之道也因物致宜者聖人之治也既得其道雖有相害之物不傷乎治體矣水火之性相滅也善用之者陳鼎釜乎其間㸑之煮之而能兩盡其用不相害也天下之物為水火者靈矣何憂乎相害何患乎不盡其用耶易曰天地睽而其事同也男女睽而其志通也萬物睽而其事類也是曰陳登為吕布説曹公曰養吕布譬如養虎常須飽其肉不飽則噬人非曰曹公曰不似卿言譬如養鷹饑則為人用飽則颺去是曰劉備來奔曹公曹公以之為豫州牧或謂曹公曰備有雄志今不早圖後必為患曹公以問郭嘉嘉曰有是然公提劍起義兵為百姓除暴推誠仗信以召儁傑猶懼其未來也今備有英雄之名以窮歸已而害之以害賢為名則智士將自疑迴心擇主公誰與定天下者夫除一人之患以阻四海之望安危之機不可不察曹公曰善非曰傅子稱郭嘉言於太祖曰備有雄志而甚得衆心闗侯張飛皆萬人之敵也為之死用以嘉觀之其謀未可測也古人有言曰一}
