  - {type: variant, offset: 9211, length: 428, content: 情墮萬機荊璧填於內府吳姬滿於下室仁壽雕飾事將傾宮萬姓力殫中民產竭加以猜忌心起巫蠱事興戮愛子之妃離上相之母貓鬼事起秦王妃及僕射楊素母皆坐焉綱維已紊禮教斯亡牝雞晨響皇枝剿絕廢黜不辜樹立所愛廢太子勇為庶人立晉王廣也功臣良佐誅翦無遺季年之失多於晉武卜世不永豈天亡乎議曰漢高祖欲以趙王如意易太子叔孫通諫曰昔晉獻公以驪姬故廢太子立奚齊晉國亂者數十年為天下笑秦以不早定扶蘇令趙高得以詐立胡亥自使滅祀此陛下所親見今陛下必欲廢嫡而立少臣願先伏誅以頸血污地帝曰吾直戲耳通曰太子乃天下本本之一搖天下震動奈何以天下戲乃聽之袁紹愛少子尚乃以太子譚繼兄後沮授諫曰世稱萬人逐兔一人獲之貪者悉止分定故也且年均以賢德均以長上古之制也願上惟先代成敗之誡下思逐兔分定之義若其不改禍始此矣紹不從後果搆隙故曰立嫡子者不使庶嬖疑焉疑則動兩則爭子兩位者家必亂子兩位而家不亂者親猶在也恃親不亂失親必亂有旨哉或曰王霸之略請事斯語矣敢問歿而作謚及改正朔易服色以變人之耳目其事奚象對曰古之立謚者將以戒夫後代隨行, WYG: ''}
