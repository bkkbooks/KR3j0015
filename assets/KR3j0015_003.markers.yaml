  - {type: variant, offset: 8920, length: 1, content: 能, krp: 此五者所謂士失其美質太公曰明罰則人畏懾人畏懾則變故出反明罰也明察則人擾人擾則人徙人徙則不安其處易以成變反明察也太公曰明賞則不足不足則怨長明王理人不知所好而知所惡不知所歸而知所去使人各安其所生而天下靜矣晉劉頌曰凡監司欲舉大而畧小何則夫細過微闕謬忘之失此人情所}
  - {type: variant, offset: 8922, length: 2, content: 用道, WYG: 有所固不許在不犯之地而悉紏以法則朝野無立人此所謂以治而亂也晏子曰臣專其君謂之不忠子專其父謂之不孝妻專其夫謂之嫉妬反忠孝也吕氏春秋曰夫隂陽之和不長一類甘露時雨不私一物萬人之主不阿一人申子曰一婦擅夫衆婦皆亂一臣專君羣臣皆蔽故妬妻不難破家也而亂臣不難破國也是以明君使其臣並進輻輳莫得專君焉韓子曰儒者以文亂法俠者以武犯禁反文武也曹公曰恃武者滅恃文者亡夫差偃王是也吴子曰昔承桑氏之君修徳廢武以滅其國有扈之君恃衆好勇以䘮社稷明主鍳兹必哀内修文徳外治武訓故臨敵}
