  - {type: variant, offset: 9729, length: 170, content: 易代改號取法五行五行更王終始相生亦象其義故其生為明王者而死配五行是以太皞配木勾芒為木正也炎帝配火祝融為火正也少皞配金蓐收為金正也顓頊配水玄冥為水正也黃帝配土后土為土正也帝王改號於五行之德各有所尚從其所王之德次焉木家次位火也木家尚赤以木德義之普循其母兼其子也夏后氏以金德王而尚黑殷人以水德王而尚白水家尚青而尚白者避土家之尚青也土家宜尚白為土者, WYG: 尊天地重隂陽敬}
