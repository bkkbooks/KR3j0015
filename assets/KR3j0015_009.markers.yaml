  - {type: variant, offset: 29, length: 0, content: '', WYG: 進聞金則止隨其指麾五陣乃理夫五陣之法鼔旗為主一鼓舉青旗則為曲陣二鼔舉赤旗則為鋭陣三鼓舉黄旗則為員陣四鼔舉白旗則為方陣五鼓舉黒旗則為直陣曲陣者木也鋭陣者火也員陣者土也方陣者金也直陣者水也此五行之陣展轉相生}
