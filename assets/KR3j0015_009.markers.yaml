  - {type: variant, offset: 16636, length: 274, content: 侯生下見其客朱亥與之語微察公子公子色愈和市人皆觀從騎竊罵侯生侯生視公子色終不變乃謝客就車也張釋之居廷中三公九卿盡會立王生老人曰吾襪解顧謂張廷尉為我結襪人或謂王生曰獨柰何廷辱張廷尉王生曰吾老且賤自度終無益於張廷尉張廷尉方今天下名臣吾故聊辱廷尉使跪結襪欲以重之諸公聞之賢王生而重張廷尉汲黯常與大將軍抗禮或讒黯曰自天子常欲令群臣下大將軍君不可以不拜黯曰夫以大將軍有揖客反不重耶大將軍聞之愈賢黯也由是觀之以傲為禮可以重人矣議曰老子云國家昏亂有忠臣六親不和有孝慈此言忠臣孝子因不和昏亂乃見其節向使侯生不傲則士人不知公子能下士也使王生不倨則三公不知廷尉能折節也, WYG: 禍}
