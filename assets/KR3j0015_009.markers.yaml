唯明公裁之太祖曰善厚待之由此觀之是知晉侯殺里克漢祖戮丁公石勒誅棗嵩劉備薄許靖良有以也故范曄曰夫人守義於故主斯可以事新主恥以其眾受寵斯可以受大寵若乃言之者雖誠而聞之者未譬豈苟進之悅易以情納持正之忤難以理求誠能釋利以循道居方以從義君子之概也難必第二十八難必第二十八夫人主莫不欲其臣之忠而忠未必信故伍員流於江萇弘死於蜀其血三年而化為碧凡人親莫不欲其子之孝而孝未必愛故孝己憂而曾參悲此難必者也何以言之語曰羿關弧則越人之行自若弱子關弧則慈母入室閑戶故可必則越人不疑羿不可必則慈母逃弱子也魏文侯問狐卷子曰父子兄弟君臣之賢足恃乎對曰不足恃也何者父賢不過堯而丹朱放子賢不過舜而瞽叟拘兄賢不過舜而象傲弟賢不過周公而管蔡誅臣賢不過湯武而桀紂伐望人者不至恃人者不久君欲理亦從身始人何可恃乎漢時梁孝王藏匿羊勝公孫詭韓安國泣說梁孝王曰大王自度於皇帝皇帝景帝也是梁孝王兄孰與太上皇之與高皇帝及皇帝之與臨江王親臨江王景帝太子也孝王曰弗如也安國曰夫太上臨江親父子間然而高帝曰提三尺劍取天下者朕也故太上終不得制事居櫟陽臨江王適長太子也以言過廢王臨江景嘗屬諸姬太子母栗姬言不遜由是廢太子栗姬憂死也用宮垣事卒自殺中尉府何者治天下終不以私害公語曰雖有親父安知其不為考雖有親兄安知其不為狼今大王列在諸侯悅一邪臣浮說犯上禁撓明法天子以太后故不忍致法於王太后日夜泣涕幸大王自改大王終不覺悟又如太后車即晏駕大王尚誰攀乎語未卒孝王出羊勝等景帝弟梁孝王用羊勝公孫詭之計求為漢太子恐大臣不聽乃陰使人刺漢用事謀臣袁盎帝聞詭勝計遣使十輩舉國大索捕詭勝不得內史韓安國聞詭勝匿孝王所入見王說之王出詭勝詭勝自殺也由是觀之安在其可必哉語曰以權利合者權利盡而交疎又曰以色事人者色衰而愛絕此言財色不可必也墨子曰雖有慈父不愛無益之子黃石公曰主不可以無德無德則臣叛此言臣子不可必也詩云自求伊祐有旨哉有旨哉運命第二十九運命第二十九夫天道性命聖人所稀言也雖有其旨難得而詳然校之古今錯綜其紀乘乎三勢亦可以彷彿其略何以言之荀悅云凡三光議曰三光日月星也精氣變異此皆陰陽之精也其本在地而上發于天政失於此則變見於彼不其然乎文王問太公曰人主動作舉事有禍殃之應鬼神之福乎太公曰有之人主好重賦斂大宮室則人多病溫霜露殺五穀人主好畋獵不避時禁則歲多大風禾穀不實人主好破壞名山壅塞大川決通名水則歲多大水傷人五穀不滋人主好武事兵革不息則日月薄蝕太白失行文王曰誠哉今稱洪範咎徵則有堯湯水旱之災消災復異則有周宣雲漢寧莫我聽易稱積善餘慶則有顏冉短折之兇善惡之報類變萬端不可齊一故視聽者惑焉太史公曰書稱天道無親嘗與善人七十子之徒仲尼獨薦顏回為好學然回也屢空糟糠不饜而早夭天之報施善人何如哉盜跖日殺不辜肝人之肉暴戾恣睢聚黨數千人橫行天下竟以壽終是遵何德哉余甚惑也嘗試言之孔子曰死生有命又曰不得其死又曰幸而免者夫死生有命其正理也不得其死未可以死而死也幸而免者可以死而不死也此皆性命三勢之理也昔虢太子死扁鵲治而生之扁鵲曰我非能生死人者我能治可生者耳然不遇扁鵲亦不生矣若夫膏肓之病雖醫和不能治矣故曰死生有命其正理也不得其死者未可以死而死也幸而免者可以死而不死也此荀悅論性命三勢之理揚子法言云或問壽可益乎曰德或問回牛之行德矣何不益也曰德故爾如回之殘牛之賊焉得壽曰殘賊或壽曰彼妄也君子不妄也推此以及教化則亦如之人有不教化而自成者有待教化而後成者有雖加教化而終不成者故上智與下愚不移至於中人則可上可下議曰傳云能者養之以福不能者敗之以禍此可上可下者推此以及天道則亦如之災祥之應無所疑焉故堯湯水旱天數也議曰夫陰靜陽動天迴地游太一算周成百六之厄太歲數極為一元之災必然之符不可移也故傳曰美惡周必復又曰天災流行國家代有言必定也故曰天數漢時公孫弘則不然以為堯遭洪水使禹治之未聞禹之有水也若湯之旱則桀餘烈桀紂行惡受天之罰禹湯積德以王天下因此觀之天無私親順之和起逆之害生此天文地理人事之紀觀公孫弘所言以為德感水旱非天數也一家之談非為正論洪範咎徵人事也議曰傳云禍福無門唯人自召謂五事以應休咎故曰人事魯僖霪雨可救之應也周室旱甚難變之勢也議曰孔子云祭如在言祭法在精誠也語曰應天以實不以文言上天不以偽動也易曰善不積不足以成名古語曰土性勝水掬壤不可以塞河金性勝木寸刃不可以殘林傳曰小惠未孚神勿福也此言善少不可以感物也今雩祭是同而感應異者或謂仁甚少而求福甚多或徒設空文精誠不至故不同也顏冉之凶性命之本也議曰秦伯問於士鞅曰晉大夫其誰先亡對曰其欒氏乎秦伯曰以其汰乎對曰然欒黶汰虐已甚猶可以免其在盈乎秦伯曰何故對曰武子之德在人如周人之思邵公焉愛其甘棠況其子乎欒黶死盈之善未能及人武子所施沒矣而黶之怨實彰將於是乎在後世一年晉滅欒氏由是觀之黶雖汰虐以其父武子之德身受其福盈雖賢智以其父黶之汰虐遂遇於禍然則禍之與福不在我之賢虐矣范曄曰陳平多陰謀而知其後必廢邴吉有陰德夏侯勝識其當封及子孫終陳掌失侯而邴昌紹國雖有不類未可致詰其大致歸於有德矣袁安竇氏之間乃情帝室引義雅正可謂王臣之烈及其理楚獄未嘗鞠人於臧罪其仁心足覃平後昆子孫之盛不亦宜乎由是觀之夫陳平邴吉及袁安之後衰與盛乃在先人之德又不在我之得失矣虞南曰夫釋教有布施持戒忍辱精進禪定智惠與夫仁義禮智信亦何殊故蓋以所脩為因其果為報人脩此六行皆多不全有一闕焉果亦隨滅是以鬷明醜於貌而惠於心趙壹高於才而下於位羅裒富而無義原憲貧而有道其不同也如斯懸絕興喪得失咸必由之由是言之夫行己不周則諸福不備故吉兇禍福不得齊也故世人有操行不軌而富壽者矣有積仁潔行而兇夭者矣今下士庸夫見比干之剖心以為忠貞不足為也聞偃王之亡國以為仁義不足法也不亦過乎易曰有天道焉有地道焉有人道焉言其異也兼三才而兩之言其同也故天地之道有同有異據其所以異而責其所以同斯則惑矣守其所以同而求其所以異則取弊矣遲速深淺變化錯乎其中是故參差難得而均也天地人物之理莫不同之故君子盡心焉盡力焉以邀命也議曰孫卿云天行有常不為堯存不為桀亡應之以理則吉應之以亂則凶強本而節用則天不能貧養備而動時則天不能病循道而不惑則天不能禍背道而妄行則天不能吉故明於天人之分則可謂至人矣若星墜木鳴天地之變怪之可也畏之非也唯人妖乃可畏矣何者政險失人田荒稼惡糴貴人饑道有死人夫是之謂人妖也政令不明舉措不時本事不理夫是之謂人妖也禮義不修外內無別男女淫亂父子相疑上下乖離寇難日至夫是之謂人妖也三者錯亂無安國矣其說甚邇其災甚慘傳曰萬物之妖書不說無用之辯不急之察棄而不治也墨翟曰古之聖王舉孝子而勸之事親尊賢良而勸之為善發憲令以教誨明賞罰以沮勸若此則亂者可使理而危者可使安矣若以為不然昔桀之所亂湯理之紂之所亂武王理之此世不渝而人不改上變政而人易教則安危治亂在上之發政也豈可謂有命哉昔梁惠王問尉繚曰吾聞黃帝有刑德可以百戰百勝其有之乎尉繚曰不然黃帝所謂刑德者以刑伐之以德守之非世之所謂刑德也世之所謂刑德者天官時日陰陽向背者也黃帝者人事而已矣何以言之今有城於此從其東西攻之不能取從其南北攻之不能取此四者豈不得順時乘利者哉然不能取者何也城高池深兵戰備具謀而守之由是觀之天官時日不若人事也天官之陣曰背水陣者為絕軍向阪陣者為廢軍武王之伐紂也背漳水向山之阪以萬二千擊紂之億有八萬斷紂頭懸之白旗紂豈不得天官之陣哉然而不勝者何也人事不得也黃帝曰先稽已智者謂之天子以是觀之人事而已矣按孫卿墨翟尉繚之說言吉兇禍福在於人矣周公誡成王曰昔殷王中宗治人祗懼弗敢荒寧享國七十年其在高宗嘉靖殷邦至于小大無時或怨享國五十九年其在祖甲爰知小人之衣食能保惠於庶人弗侮鰥寡享國卅有三年自時厥後立王生則逸惟耽樂之從亦罔或克壽或十年或七八年或三四年嗚呼嗣王其鑒于茲史記陳世家曰陳舜後也周武王封之陳太史公云舜之德至矣禪於夏而後世血食者歷三代及楚滅陳而田氏得政於齊卒為建國百世不絕又南越傳云越雖蠻夷其先豈嘗有大功德於人哉何其久也歷數代嘗為君主句踐一稱伯蓋禹之烈也又曰鄭桓公友者周厲王之少子也幽王以為司徒問於太史伯曰王室多故予安逃死乎吾欲南之江上何如對曰昔祝融為高辛火正其功大矣而其於周未有興者楚其後也周衰楚必興興非鄭之利也公曰周衰何國興對曰齊秦晉楚乎夫齊姜姓伯夷之後也伯夷佐堯典禮秦嬴氏伯翳之後也伯翳佐舜懷柔百物及楚之先皆嘗有功於天下而武王封叔虞於唐其地阻險以此有德若周衰並必興矣按周公馬遷太史伯之談言興亡長短必依德矣此略言其本而不語其詳嘗試論之曰命也者天之授也德也者命之本也皇靈雖陰騭下人定於冥兆然興亡長短以德為準若德修於曩則命定於今然則今之定命皆曩之德也明矣夫命之在德則吉凶禍福不由天也命定於今則賢聖鬼神不能移也故君子盡心焉盡力焉以邀命也此運命之至也易曰窮理盡性以至於命, krp: ''}
