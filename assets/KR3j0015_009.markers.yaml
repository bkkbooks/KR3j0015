  - {type: variant, offset: 1979, length: 0, content: '', WYG: 善用兵者使交不得合何以明之昔楚莫敖將盟貳軫貳軫二國名也鄖人軍于蒲騷將以隨絞州蓼伐楚師莫敖患之鬬亷曰鄖人軍于其郊必不誡且日虞四邑之至虞度也四邑隨絞州蓼也君次于郊郢以禦四邑我以鋭師宵加于鄖鄖有虞心而恃其城莫有鬬志若敗鄖師四邑必離莫敖從之遂敗鄖師于蒲騷漢宣帝時先零與罕开羌解仇合黨為冦帝命趙充國先誅罕开充國守便宜不從上書曰先零羌虜欲有背叛故與罕开解仇然其私心不能忘恐漢兵至而罕开背之也臣愚以為其計常欲赴罕开之急以堅其約先擊罕羌先零必助之今虜馬肥粮方饒擊之恐不能傷害適使先零得施徳于罕羌也堅其約合其黨虜交堅黨合誅之用力數倍臣恐國家憂累由十數年不二三嵗而已先誅先零則罕开之屬不煩兵服矣帝從之果如䇿魏太祖初伐關中賊毎一部到太祖輒喜賊破之後諸將問其故太祖曰關中道逺若各依險阻征之不一二年不可定也今皆來集衆雖多莫能相服軍無適主一舉可滅為攻羌易}
  - {type: page-break, offset: 1979, content: '', id: KR3j0015_WYG_009-31a, image: WYG0849/WYG0849-0204c.png}
  - {type: page-break, offset: 1979, content: '', id: KR3j0015_WYG_009-31b, image: WYG0849/WYG0849-0204d.png}
