  - {type: variant, offset: 2944, length: 0, content: '', WYG: 及至唐將李靖欲伐荆州襲蕭鋭乃投柹于江中使蕭鋭見之靖尋以兵隨柹而下蕭鋭不備遂虜之平荆州夫兵法變通不可執一諸君得之矣故曰料敵在心察機在目因形而作勝于衆善之善者矣}
