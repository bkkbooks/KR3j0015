  - {type: variant, offset: 26, length: 2, content: 未信, WYG: 令之以文文惠也齊之以武武法是謂必取故武侯之軍禁有七孫子曰無法之懸無政之令司馬法曰見敵作誓贍功作賞此盖圍急之時不可格以常制其敵國理戎周旋中野機要綱目不得不預令矣一曰輕二曰慢三曰盜四曰欺五曰背六曰亂七曰誤此治軍之禁也若期㑹不到聞鼓不行乘寛自留迴避務止初近而後逺喚名而不應軍甲不具兵器不備此謂輕軍有此者斬之受令不傳傳之不審以惑吏士金鼓不聞旌旗不覩此謂慢軍有此者斬之食不廩粮軍不部兵賦賜不均阿私所親取非其物借貸不還奪人頭首以獲功名此謂盜軍有此者斬之若變易姓名衣服不鮮金鼓不具兵刃不磨器仗不堅矢不著羽弓弩無弦主者吏士法令不從此謂欺軍有此者斬之聞鼓不行叩金不止按旗不伏舉旗不起指麾不隨避前在後縱發亂行折兵弩之勢却退不鬬或左或右扶傷舉死因託歸還此謂背軍有此者斬之出軍行將士卒争先紛紛擾擾軍騎相連咽塞道路後不得前呼喚諠譁無所聴聞失行亂次兵刃中傷長將不理上下縱横此謂亂軍有此者斬之屯營所止問其鄉里親近相隨共食相保呼召他位越入他位干悮次第不可呵止度營出入不由門戸不自啟白奸邪所起知者不告罪同一等合人飲食呵私所受大言驚語疑惑吏士此謂誤軍有此者斬之斬斷之後萬事乃理所以鄉人盜笠吕蒙先涕而後斬馬逸犯麥曹公割髮而自刑故太公曰刑上極賞下通孫子曰法令孰行賞罰孰明以此知勝此之謂也教戰第六孔子曰不教人戰是謂棄之故知卒不服習起居不精前擊後解與金鼓之音相失百不當一此棄之者也故領三軍教之戰者必有金鼓約令所以整齊士卒也教令操兵起居旌旗指麾之變故教使一人學戰教成合之十人十人學戰教成合之百人漸至三軍之衆大戰之法為其校陣各有其道左校青龍右校白虎前校朱雀後校𤣥武中校軒轅大將之所處左鋒右㦸前楯後弩中央鼓旗興動俱起聞鼓}
