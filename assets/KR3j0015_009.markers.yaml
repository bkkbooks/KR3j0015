  - {type: variant, offset: 2029, length: 189, content: 侯使解楊如宋使無降楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子厚賂之使反其言許之登諸樓車使呼宋人而告之遂致其君命楚子將殺之使與之言曰爾既許不穀而反之何故非我無信汝則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衛社稷民之主也義無二信信無二命君之賂臣不知命也受命以出有死無霣又何賂乎臣之許君以成命也死而成命臣之祿也寡君有信臣下臣獲考考成也死又何求楚子舍之以歸韓子, WYG: 狐偃}
