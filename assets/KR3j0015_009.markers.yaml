  - {type: variant, offset: 176, length: 0, content: '', WYG: 天心去就故經曰能知三生臨刃勿驚從孤擊虚一女當五丈夫故行軍必背太隂向太陽察五緯之光芒觀二矅之薄蝕必當以太白為主辰星為候合宿有必鬬之期格出明不戰之勢避以日耗背以月刑以王擊困以生擊死是知用天之道順天行誅非一日也若細雨沐軍臨機必有捷迴風相觸道還而無功雲類羣羊必走之道氣如驚鹿必敗之勢黒雲出壘赤氣臨軍六窮起風三刑起霧此皆見師之出而不見其入也若烟非烟此慶雲也若星非星此歸邪也若霧非霧此泣軍也若雷非雷此天鼓也慶雲開有徳歸邪有降人泣軍多殺將天鼓多敗軍是知風雲之占嵗月之候其來乆矣故古者初立將始出門首建牙之時必觀風雲之氣諸謀立武}
