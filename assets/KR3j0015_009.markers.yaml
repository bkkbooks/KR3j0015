  - {type: variant, offset: 31, length: 4, content: 謗己孫卿, WYG: 勝負凡結五陣之法五五相保五人為一長五長為一師五師為一帥五帥為一校五校為一火五火為一橦五橦為一軍則事備矣夫兵之便務知節度短者持旌旗勇者持金鼔弱者給粮牧智者為謀主鄉里相比五五相保一鼓正立二鼓起食三鼓嚴辦四鼔就行間聞聴令然後舉旗出兵隨幡所至也故}
