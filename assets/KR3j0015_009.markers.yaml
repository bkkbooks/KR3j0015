  - {type: variant, offset: 4573, length: 149, content: 他疏之也兄弟關弓而射我我則泣涕而道之無他戚之也然則小弁之怨親親也親親仁也小弁刺幽王也太子之傳作焉晉使韓𥳑子視秦師云師少於我鬭士倍我公曰何故對曰出因其資入用其寵饑食其粟三施而不報所以來也觀秦怒而來則知至恩必有至怨矣杜鄴說王音曰鄴聞人情恩深者其養謹愛至者其求謹夫戚而不見異親而不見殊戚近也殊謂異於疏者也, WYG: 端}
