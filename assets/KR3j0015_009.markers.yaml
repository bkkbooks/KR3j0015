  - {type: variant, offset: 3505, length: 398, content: 動作態度無為而不竊斧者也竊掘其谷而得其斧谷坑也他日復見其鄰之子動作態度無似竊鈇者也其鄰之子非變也己則變之變之者無他有所尤矣邾之故為甲裳以帛以帛綴甲公息忌謂邾之君曰不若以組邾君曰善下令令官為甲必以組公息忌因令其家皆為組人有傷之者曰公息忌所以欲用組者其家為因裳多以組也傷敗也邾君不悅於是乎止無以組邾君有所尤也邪之故為甲以組而便也公息忌雖多為組何傷以組不便公息忌雖無以為組亦何益為組與不為組不足以累公息忌之說也累辱也凡聽有不可不察樓緩曰公父文伯仕於魯病而死女子為自殺於房中者二人其母聞之弗哭其相室曰焉有子死而弗哭乎其母曰孔子賢人也逐於魯而是人弗隨之今死而婦人為自殺若是者必其於長者薄而於婦人厚故從母言之是為賢母從妻言之是不免於妬妻也故其言一也言者异則人心變矣樂羊為魏將而攻中山其子在中山中山之君烹其子而遺之羹樂羊盡啜之文侯曰樂羊以我故食其子之肉堵師贊曰其子且食之其誰不食樂羊罷中山文侯賞其功而疑其心淮南, WYG: 竒孫}
