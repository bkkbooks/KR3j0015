  - {type: variant, offset: 175, length: 0, content: '', WYG: 明心威于罰不可不嚴三者不立雖勝必敗故曰將之所麾莫不從移將之所指莫不前死紛紛紜紜聞亂而不可亂混混沌沌形圓而不可敗此用衆之法也卒服習矣器用利矣將軍乃秉旄麾衆而誓之有虞氏誡于國夏后氏誓于軍殷誓于軍門之外周將交刃而誓之所誓不同吾從周誓之曰嗚呼􅄎天之下莫非王土率土之濵莫非王臣今某國威侮五行怠棄三正俾我有衆恭行天討用命者賞不踰時逗撓者誅不遷列死生富貴在此一舉嗟爾庶士各勉乃心也于是氣厲青雲雖赴湯蹈火可也此教戰之法也天時第七孫子曰二曰天時天時者隂陽寒暑時節制也司馬法曰冬夏不興師所以兼愛吾人太公曰天文三人主占風氣}
  - {type: page-break, offset: 175, content: '', id: KR3j0015_WYG_009-11a, image: WYG0849/WYG0849-0194c.png}
  - {type: variant, offset: 175, length: 0, content: '', krp: 明心威于罰不可不嚴三者不立雖勝必敗故曰將之所麾莫不從移將之所指莫不前死紛紛紜紜聞亂而不可亂混混沌沌形圓而不可敗此用衆之法也卒服習矣器用利矣將軍乃秉旄麾衆而誓之有虞氏誡于國夏后氏誓于軍殷誓于軍門之外周將交刃而誓之所誓不同吾從周誓之曰嗚呼溥天之下莫非王土率土之濵莫非王臣今某國威侮五行怠棄三正俾我有衆恭行天討用命者賞不踰時逗撓者誅不遷列死生富貴在此一舉嗟爾庶士各勉乃心也于是氣厲青雲雖赴湯蹈火可也此教戰之法也天時第七孫子曰二曰天時天時者隂陽寒暑時節制也司馬法曰冬夏不興師所以兼愛吾人太公曰天文三人主占風氣}
