  - {type: variant, offset: 14083, length: 606, content: 余弗順天厥罪惟均由是觀之夫罪未盈假令中有罪惡未滅也今人見惡即未滅以為惡不足懼是以亡滅者繼踵於世故曰惡不積不足以滅身此聖人之誡由是觀之故知善也者在積而已今人見徐偃亡國謂仁義不足杖也見承桑失統謂文德不足恃也承桑氏之君脩德廢武以滅其國也是猶杯水救火一飯問肥之說惑亦甚矣詭俗第三十五詭俗第三十五夫事有順之而失義有愛之而為害有惡於已而為美有利於身而損於國者何以言之劉梁曰昔楚靈王驕淫暴虐無度芊尹申亥從王之欲以殯於乾溪殉之以二女此順之而失義者也議曰夫君正臣從謂之順今君失義而臣下從之非所謂順也鄢陵之役晉楚對戰穀陽獻酒子反以斃此愛之而害者也漢文帝幸慎夫人其在禁中嘗與后同席及幸上林郎署長布席慎夫人席與后同席袁盎引慎夫人座上大怒袁盎前說曰臣聞尊卑有序上下乃和今陛下既已立后慎夫人乃妾耳主妾豈可同坐哉且陛下幸之即厚賜之陛下所以為慎夫人適所以禍之陛下獨不見人豕乎上乃悅由是言之夫愛之為害有自來矣臧武仲曰孟孫之惡我藥石也季孫之愛我美疢也疢毒滋厚藥石猶生我此惡之而為美者也孫卿曰非我而當者吾師也是我而當者吾友也諂諛我者吾賊也商君曰貌言華也至言實也苦言藥也甘言疾也韓子曰為故人行私謂之不棄以公財分施謂之仁人輕祿重身謂之君子枉法曲親謂之有行棄官寵交謂之有俠離俗遁世謂之高愨交爭逆令謂之剛材行惠取眾謂之得人不棄者吏有姦也仁人者公財損也君子者人難使也有行者法制毀也有俠者官職曠也高愨者人不事也剛材者令不行也得人者君上孤也此八者匹夫之私譽而人主之, WYG: 燕軍}
