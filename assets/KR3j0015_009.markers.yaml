  - {type: variant, offset: 12689, length: 1229, content: 若發若否問二五曰不知也非二五難計欲鴻之心亂也是知情注於利則本心亂矣卑政第三十三卑政第三十三淮南子曰齊溺人以金玉不如尋常之纏韓子曰百日不食以待梁肉餓者不肯故曰療饑不期於鼎食拯溺無待於規行也此言政貴卑以濟事者也何以言之韓非曰所謂智者微妙之言上知之所難也今為眾人法而以為上知之所難也則人無從識之矣故糟糠不厭者不待梁肉而飽裋褐不完者不須文繡而好以是言之夫治世之事急者不得則緩者非務也今所治之政人閒之事夫婦之所明知者不用而慕上知之所難論則其於人過遠矣是知微妙之言非人務也又曰世之所謂烈士者離眾獨行取異於人為恬淡之學而理恍惚之言臣以為恬淡無用之教也恍惚無法之言也夫人生必事君養親事君養親不可以恬淡之人必以言論忠信言論忠信不可以恍惚之言然則恍惚之言恬淡之學天下之惑術也又曰察士而後能知之不可以為智全也夫人未盡察之也唯賢者而後能行之不可以為法也故尹文子曰凡有理而無益於治者君子不言有能而無益於事者君子不為故君子所言者不出於名法權術所為者不出於農稼軍陣周務而已又曰小人所言者極於儒墨是非之辯所為者極於堅偽偏抗之行求名而已故明主誅之也今世之人行欲獨賢事欲獨能辯欲出群勇欲絕眾夫獨行之賢不足以成化獨能之事不足以周務出群之辯不可為戶說絕眾之勇不可與正陣凡此四者亂之所由生也故曰為善者使人不能得從為巧者使人不能得與此獨善獨巧者未盡巧善之理也故所貴聖人之理不貴其獨治貴其能與眾共治也所貴工倕之巧者不貴其獨巧貴其能與眾共巧也文子曰夫先知遠見人材之盛也而治世不以貴於人博聞強志口辯辭給人智之溢也而明主不以求於下傲世賤物不汙於俗士之抗行也而治世不以為人化故高不可及者不以為人量行不可逮者不以為國俗故國治可與愚守而軍旅可與怯同不待古之英俊而人自足者因其所有而並用之也議曰據文子此言以為聖人不可用先知遠見博聞強志傲世賤物三事化天下百姓使皆行此道用為風俗今但任其風土化以農稼軍陣曲成於物而俯同於俗耳非貴於獨能獨勇者也故聖人任道以通其險淮南子曰體道者逸而不窮任數者勞而無功離朱之明察鍼夫百步之外而不能見泉中之魚師曠之聰合八風之調而不能聽十里之外故任一人之能不足以理三畝之宅循道理之數因天地之自然則六合不足均也此任道以通其險也立法以理其差文子曰農士商工鄉別州異農與農言藏士與士言行工與工言巧商與商言數是以士無遺行工無苦事農無廢功商無折貨各安其生此立法以理其差也使賢愚不相棄能鄙不相遺此至理之術故叔孫通欲起禮漢高帝曰得無難乎對曰夫禮者因時世人情而為之節文者也張釋之言便宜事文帝曰卑之無甚高論令今可施行由是言之夫理者不因時俗之務而貴奇異是餓者百日以待粱肉假人金玉以救溺子之說矣議曰昔楚之公輸宋之墨翟能使木鳶自飛無益於用漢之張衡能使參輪自轉魏之馬鈞能使木人吹簫苟無益於用而為之則費功損力其害多矣莊子曰朱泙漫學屠龍於支離益殫千金伎成無所用巧文子曰夫治國在仁義禮樂名法刑賞過此而往雖彌綸天地纏絡萬品治道之外非群生所飱挹聖人措而不言也由是觀之事貴於適時無貴於遠功有自來矣善亡第三十四善亡第三十四易曰積善之家必有餘慶, WYG: ''}
