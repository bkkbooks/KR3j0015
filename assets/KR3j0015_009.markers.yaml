  - {type: 'tls:seg', offset: 2912, content: '', id: KR3j0015_CH7x2006_009-2a.227}
  - {type: variant, offset: 2912, length: 0, content: '', WYG: 四燕不宜動者三代懸軍逺入利在野戰一不可擊也深適兵畿頓兵死地二不可擊也前鋒既敗後軍方固三不可擊也彼衆吾寡四不可擊也官軍自戰其地一不宜動動而不勝衆心難固二不宜動隍池未修敵來無備三不宜動此}
  - {type: page-break, offset: 2912, content: '', id: KR3j0015_WYG_009-36b, image: WYG0849/WYG0849-0207b.png}
  - {type: variant, offset: 2912, length: 0, content: '', krp: 四燕不宜動者三代懸軍逺入利在野戰一不可擊也深適兵畿頓兵死地二不可擊也前鋒既敗後軍方固三不可擊也彼衆吾寡四不可擊也官軍自戰其地一不宜動動而不勝衆心難固二不宜動隍池未修敵來無備三不宜動此}
  - {type: variant, offset: 2913, length: 4, content: 見利不喜, WYG: 兵機也深溝髙壘以逸待勞彼千里饋粮野無所掠乆則三軍靡費攻則衆旅多弊師老釁生詳而圖之可以捷也徳曰韓别駕之言良平之䇿也孫子曰以逺待近以逸待勞以飽待飢此治力者此先勝而後戰者也圍師第十九孫子曰圍師必闕何以明之黄巾賊韓忠據宛朱儁張超圍之結壘起土山以}
