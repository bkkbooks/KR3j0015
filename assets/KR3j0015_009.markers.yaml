  - {type: variant, offset: 1973, length: 1, content: 葉, WYG: 戰國時有説齊王曰凡伐國之道攻心為上攻城為下心勝為上兵勝為下是故聖人之伐國攻敵也務在先服其心何謂攻其心絶其所恃是謂攻其心也今秦之所恃為心者燕趙也當收燕趙之權今説燕趙之君勿虚言空辭必將以實利以迴其心所謂攻其心者也沛}
  - {type: variant, offset: 1973, length: 1, content: 葉, krp: 戰國時有説齊王曰凡伐國之道攻心為上攻城為下心勝為上兵勝為下是故聖人之伐國攻敵也務在先服其心何謂攻其心絶其所恃是謂攻其心也今秦之所恃為心者燕趙也當收燕趙之權今説燕趙之君勿虚言空辭必將以實利以迴其心所謂攻其心者也沛}
  - {type: variant, offset: 1975, length: 2, content: 問孔, WYG: 西入武關欲以二萬人擊秦嶢音堯關下軍張良曰秦兵尚强未可輕也臣聞其將屠子賈竪易動以利願沛公且留壁使人先行為五萬人具食益張旗幟諸山之上為疑兵令酈食其持重寳啗秦將貪而忽名可貨以賂秦將果欲連和俱西襲咸陽沛公欲聴之良曰此獨其將欲叛士卒恐不從不從必危不如因其懈擊之沛公乃引兵擊秦軍大破之諸葛亮擒孟獲七縱七擒之南方終亮之世不敢背叛又四面楚歌而項羽走劉琨吹葭胡人散攻心之計非一途也此攻心者也伐交第十五孫}
