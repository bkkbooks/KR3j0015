  - {type: variant, offset: 3934, length: 584, content: 為悷也事之情一也所以觀者異耳從城上視牛如羊視羊如豚所居高也窺面於盤水則圓於柸則音隨訓虧也面形不變其故有所圓有所者所自窺之異也今吾雖欲正身而待物庸詎知世之所自窺於我者乎是知天下是非無所定也世各是其所是非其所非今吾欲擇是而居之擇非而去之不知世之所是非者孰是孰非哉議曰夫忘家殉國則以為不懷其親安能愛君衛公子開方吳起樂羊三人是也若私其親則曰將受命之日則忘其家臨軍約束則忘其親援桴鼓則忘其身穰且殺莊賈是也故傳曰欲加之罪能無辭乎審是非者則事情得也故有忠而見疑者不可不察用無用第二十五用無用第二十五古人有言曰得鳥者羅之一目然張一目之羅終不能得鳥矣鳥所以能遠飛者六翮之力也然無眾毛之助則飛不能遠矣以是推之無用之為用也大矣故惠子謂莊子曰子言無用矣莊子曰知無用而始可與言用矣夫天地非不廣且大也人之所用容足耳然則削足而墊之至黃泉人尚有用乎惠子曰無用莊子曰然則無用之為用也亦明矣昔陳平智有餘而見疑周勃質朴忠而見信夫仁義不足相懷則智者以有餘見疑而朴者以不足取信矣漢徵處士樊英楊厚朝廷若待神明至竟無他異李固朱穆以為處士純盜虛名無益於用然而後進希之以成器世主禮之以得眾孔子稱舉逸人天下之人歸心焉燕昭尊郭隗以致劇樂齊桓禮九九之術以招英雋之類也原其無用亦所以為用也而惑者忽不踐之地賒無用之功至乃誚謲遠術賤斥國華不亦過乎恩生怨第二十六恩生怨第二十六傳稱諺曰非所怨勿怨寡人怨矣是知几怨者不怨於所疏必怨於親密, WYG: 竒勝}
