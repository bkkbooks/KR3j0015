  - {type: variant, offset: 2973, length: 0, content: '', WYG: 為變此之謂矣以為漢皆已得趙主將矣遂亂遁走趙將雖擊斬之不能禁也孫子曰以治待亂以静待譁此治心者夫衆心已亂雖有良將亦不能為之計矣于是漢兵夾擊大破之斬成安君泜水上擒趙王歇諸將殺首虜留賀因問信曰兵法右背山陵前左水澤今者將軍令臣等反背水陣曰破趙㑹食時臣等不服然竟以勝此何術也信曰此在兵法之中顧諸君不察耳兵法不曰陷之死地而後生置之亡地而後存夫處死地者謂力均勢敵以死地取勝可也若以至弱當至强投弱兵于死地自貽陷矣故孫子曰兵恐不可救又經曰大衆陷于害然後能為勝敗是知死地之機必用大衆矣且信非能素撫循士大夫也所謂驅市人而戰其勢非置之死地使人人}
