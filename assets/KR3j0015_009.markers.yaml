  - {type: variant, offset: 14988, length: 1201, content: 也何謂事跡昔齊威王召即墨大夫而語之曰自子之居即墨也毀日至然吾使人視即墨田野闢人民給官無留事東方以寧是子不事吾左右以求譽也封之萬家召阿大夫而語之曰自夫子之守阿也譽日聞然吾使人視阿田野不闢人民貧苦趙攻甄子不能救衛取薛陵子不能知是子常以幣事吾左右以求譽也是日烹阿大夫及左右常譽之者齊國大理漢元帝時石顯專權京房宴見問上曰幽厲之君何以危所任者何人也上曰君不明而所任巧佞房曰知其巧佞而用之也將以為賢上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰齊桓公秦二世亦嘗聞此君而非笑之然則任豎刁趙高政治日亂盜賊滿山何不以幽厲卜之而覺悟乎上曰唯有道者能以往知來耳房曰陛下視今為治也亂也上曰亦極亂耳房曰今所任丹者誰歟上曰然幸其愈於彼又以為不在此人也房曰夫前世二君亦皆然耳臣恐後之視今如今之視前也此事迹者也由是言之夫立身從政皆有本矣理亂能否皆有迹矣若操其本行以事跡繩之譬如水之寒火之熱則善惡無所逃矣量過第三十七量過第三十七孔子曰人之過也各於其黨觀過斯知仁矣黨黨類也小人不能為君子之行非小人之過當恕而勿責之也何以言之太史公云昔管仲相齊九合諸侯一匡天下然孔子小之曰管仲之器小哉豈不以周道衰桓公既賢而不勉之至王乃稱霸哉議曰夔龍稷契王者佐也狐偃咎犯霸者佐也孔子稱微管仲吾其被髮左衽矣是奇管仲有王佐之材矣夫有王佐之才而為霸者之政非小器而何由是觀之孔子以管仲為夔龍稷契之黨而觀過也虞卿說魏王曰虞卿說春申君伐燕以定身封然楚之伐燕路由於魏恐魏不聽虞卿為春申君說魏君假道也夫楚亦強大矣天下無敵乃且攻燕魏王曰向也子云天下無敵今也子云乃且攻燕者何也對曰今謂馬多力則有之矣若曰勝千均則不然者何也夫千鈞非馬之任也今謂楚強大則有矣若夫越趙魏而開兵於燕則豈楚之任哉由是觀之夫管仲九合諸侯一匡天下而孔子小之楚人不能伐燕虞卿反以為強大天下無敵非詭議也各從其黨言之耳不可不察勢運第三十八勢運第三十八夫天下有君子焉有小人焉有禮讓焉此數事者未必其性也未必其行也皆勢運之耳何以言之文子曰夫人有餘則讓不足則爭讓則禮義生爭則暴亂起物多則欲省求贍則爭止議曰管子云衣食足知榮辱此有餘則讓者也漢書曰韓信為布衣時貧無行不得推擇為吏及在漢中蕭何言於高祖曰韓信者國士無雙此不足則爭者也故傅子曰夫授夷叔以事而薄其祿父母餓於前妻子餧于後能守志不移者鮮矣淮南子曰游者不能拯溺手足有所爭急也灼者不能救火身體有所痛也林中不賣薪湖上不鬻魚者有所餘也故世治則小人守正而利不能誘也世亂則君子為奸而刑不能禁也慎子曰桀紂之有天下也四海之內皆亂關龍逢王子比干不與焉而謂之皆亂其亂者眾也堯舜之有天下也四海之內皆治而丹朱商均不與焉而謂之皆治其治者眾也故莊子曰當堯舜而天下無窮人非智得也當桀紂而天下無通人非智失也時勢適然新語曰以近河之地溼近山之木長者以類相及也四瀆東流則百川無西行者小象大而少從多也是知世之君子未必君子議曰匡衡云循禮恭讓則人不爭好仁樂施則下不暴尚義高節則人興行寬柔惠和則眾相愛此四者明王之, WYG: ''}
