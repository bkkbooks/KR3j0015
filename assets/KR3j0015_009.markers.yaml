  - {type: variant, offset: 840, length: 1, content: 衛, WYG: 險難阨皆悉明之能制軍權危者安之懼者懽之叛者還之將有不合去者慰誘還之若蕭何追韓信寃者原之訴者察之卑者貴之士卒若卑賤者貴之昔吴起下與士卒同衣食是也强者抑之敵者殘之卑中有賤而敵貴者亂上下之禮殘殺之貪者豐之懸賞以豐其心所以使貪欲者使之臨敵將戰有欲立功名有欲利敵}
  - {type: variant, offset: 840, length: 1, content: 衛, krp: 險難阨皆悉明之能制軍權危者安之懼者懽之叛者還之將有不合去者慰誘還之若蕭何追韓信寃者原之訴者察之卑者貴之士卒若卑賤者貴之昔吴起下與士卒同衣食是也强者抑之敵者殘之卑中有賤而敵貴者亂上下之禮殘殺之貪者豐之懸賞以豐其心所以使貪欲者使之臨敵將戰有欲立功名有欲利敵}
  - {type: variant, offset: 842, length: 4, content: 迎新婦婦, WYG: 者皆許而使之所謂使勇使貪畏者隠之士卒有所畏懼者隠蔽于後勿使為軍鋒軍敗由鋒怯謀者近之讒者覆之有讒鬬者覆亡之毁者復之官職有毁廢者則修而復之反者廢之横者挫之服者活之首服罪者活之降者說之説含獲城者割之賞功臣也獲地者裂之賜功榮者獲國者守之得其國必封賢以守之昔吳伐越得而不守所以終敗也獲阨塞之獲難屯之獲財散之敵動伺之敵强下之敵陣强則下之勿與戰若齊師伐魯鼓之曹劌不動三鼓破齊下之敵凌假之敵之威勢凌吾而來宜持重以待之勿與戰楚凌漢求戰一決漢祖知弱不許之是也敵暴安之敵人為暴虐之行則安之勸之所以怒我衆也昔燕伐齊田單不下燕師掘齊人冡墓田單安勸之敵悖義之敵為悖亂之事則隨有義以待之彼悖我義故剋之敵睦攜之順舉挫之舉順以挫逆也因勢破之放言過之放過惡言以誣詐敵人以怒已衆也四網羅之此為將之道也故將拒諫則英雄散䇿不從則謀士叛善惡同則功臣倦賞罰不明善惡無異則有功之臣皆懈倦也將專已則下歸咎專己自任不與下謀衆皆歸罪于將而責之將自臧則下少功臧善也將自伐勲忘下自用者故曰少功也將受讒則下有離心將貪財則奸不禁}
