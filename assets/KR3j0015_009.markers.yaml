  - {type: variant, offset: 14692, length: 2, content: 人主, WYG: 蒙常有病乞分衆還建鄴以治病為名某聞之必徹備兵盡赴襄陽大軍浮江晝夜馳上襲其空虚則南郡可取而某可擒之遂稱病篤權乃露檄召蒙侯果信之稍徹兵赴樊權聞之遂行先遣蒙在前伏其精兵于􅖻􅑳中使白衣揺櫓作商賈服晝夜兼行至侯所置江邊屯候盡收縳之是故候}
  - {type: variant, offset: 14692, length: 2, content: 人主, krp: 蒙常有病乞分衆還建鄴以治病為名某聞之必徹備兵盡赴襄陽大軍浮江晝夜馳上襲其空虚則南郡可取而某可擒之遂稱病篤權乃露檄召蒙侯果信之稍徹兵赴樊權聞之遂行先遣蒙在前伏其精兵于􅖻􅑳中使白衣揺櫓作商賈服晝夜兼行至侯所置江邊屯候盡收縳之是故候}
  - {type: variant, offset: 14695, length: 141, content: 察社稷之利害而用匹夫之私譽家國無危亂不可得也由是觀之夫俗之好惡與事相詭唯明者能察之韓子曰君臣之利異故人臣莫忠故臣利立而主利滅此之謂異利者也息辯第三十六息辯第三十六議曰夫人行皆著於迹以本行而徵其迹則善惡無所隱矣夫辯者焉能逃其詐乎中論曰水之寒也火之熱也金石之堅剛也彼數物未嘗有言而人莫不, WYG: 聞}
