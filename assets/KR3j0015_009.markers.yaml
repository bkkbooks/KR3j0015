  - {type: variant, offset: 2978, length: 0, content: '', WYG: 及也孫子曰兵甚陷則不懼不得已則鬭是故其兵不修而戒不求而得不約而親不令而信投之無往者諸將之勇也此之謂矣魏太祖征張繡一朝引軍退繡自追之賈詡曰不可追也繡不從果敗而還詡謂繡曰促更追之戰必勝繡收散卒赴追太祖戰果勝還問詡曰繡}
