  - {type: 'tls:seg', offset: 845, content: '', id: KR3j0015_CH7x2006_009-1a.174}
  - {type: variant, offset: 847, length: 0, content: '', WYG: 貪則下益也將内顧則士卒淫内顧思妻妾也將有一則衆不服有二則軍無試試法也有三則軍乖背有四則禍及國軍誌曰將謀欲密士衆欲一將衆如一體也攻敵欲疾將謀密則奸心閉士衆一則羣心結結如一也攻敵疾則詐不及設軍有此三者則計不奪將謀泄則軍無勢以外闚内則禍不制窺見也謀泄則外見已情之虚寔其禍不可制也財入營則衆奸㑹凡為軍使外人以財貨入營内則奸謀奄集其中心將有此三者軍必敗將無慮則謀士去將無防慮不能從謀故去之將無勇則吏士恐將怯則下無所恃故恐也將遷怒則軍士懼慮也謀也將之所重勇也怒也將之所用故曰必死可殺也必生可慮也忿速可悔也亷潔可辱也愛人可煩也此五者將軍之過用兵之灾故凡戰之要先占其將而察其才因刑用權則不勞而功興也其將愚而信人可謀而詐貪而忽名可貨而賂輕變可勞而困上富而驕下貧而磔可離而間將怠士懈可潜而襲智而心緩者可迫也勇而輕死者可暴也急而心速者可誘也貪而喜利者可襲也可遺也仁而不忍于人者可勞也智而心緩者可驚也信而喜信于人者可誑也亷潔而不愛人者可侮也剛毅而自用者可事也懦心喜用于人者可使人欺也此皆用兵之要為將之畧也料敵第十二夫兩國治戎交和而合不以冥冥決事必先探于敵情故孫子曰勝兵先勝而後戰又曰䇿之而知得失之計候之而知動静之理因形而作勝于衆用兵之要也若欲先知敵將當令賤而勇者將輕鋭以嘗之觀敵之來一起一坐其政以理其追北佯為不及其見利佯為不知如此者將必有智勿與輕敵凡敵上氣黄白潤澤者將有威徳或軍上氣發漸漸如雲變作山形將有深謀或敵上氣外黒中赤在前者將精悍皆不可擊凡氣上與天連軍中將賢良凡氣如龍如虎在殺中或如火烟之形或如火光之狀或如山林或如塵埃頭大而卑或氣紫黒如門上樓或如白粉沸皆猛將之氣也若其衆讙旗亂其卒自止自行其兵或縱或横其追北恐不及見利恐不得如此者將必無謀雖衆可獲凡敵上氣青而疎散者將怯弱前大而後小將性不明也故曰敵近而静者恃其險也敵逺而挑人者欲人之進也衆樹動者來也衆草多障者疑也稠草中多障蔽者必逃去恐吾追及多作障蔽使吾疑其間有伏兵也鳥起者伏也凡軍上氣渾渾圓長赤氣在其中或有氣如赤杵在黒雲中皆主有伏兵或兩軍相當有赤氣在軍前後左右者有伏兵隨氣所在防之或有雲絞絞綿綿此以}
