  - {type: variant, offset: 358, length: 386, content: 彼自知其計則無以其失窮之自勇其斷則無以其敵怒之凡說須曠日彌久周澤既渥深計而不疑交爭而不罪乃明計利害以致其功直指是非以飭其身以此相持此說之成也荀悅曰夫臣下之所以難言者何也言出乎身則咎悔及之矣故曰舉過揭非則有干忤之咎勸勵教誨則有俠上之譏言而當則恥其勝己也言而不當則賤其愚也先己而同則惡其奪己明也後己而同則以為從順也違下從上則以為諂諛也違上從下則以為雷同也與眾共言則以為順負也違眾獨言則以為專美也言而淺露則𥳑而薄之深妙弘遠則不知而非之特見獨智則眾惡其蓋之也雖是而不見稱與眾同智則以為附隨也雖得之不以為功謙讓不爭則以為易窮言而不盡則以為懷隱進說竭情則以為不知量言而不效則受其怨責言而事效則以為固當利於上不利於下或便於左則不便於右或合於前而忤於後此下情所以常不通仲尼發憤稱予欲無言者蓋為語之難也何以明其難耶昔宋有富人天雨牆壞其子曰不築且有盜其鄰人亦云暮而果大亡其家智其子而疑鄰人之父, WYG: ''}
