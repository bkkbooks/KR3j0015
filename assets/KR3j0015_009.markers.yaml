  - {type: variant, offset: 2896, length: 0, content: '', WYG: 解雜亂糾紛者不控拳救鬬者不博㦸批亢𢷬虚形格勢禁則自為解耳今梁趙相攻輕兵鋭卒必竭于外老弱疲于内君不若引兵疾走大梁據其街路衝其方虚彼必釋趙而自救是我一舉解趙之圍而弊于魏也田忌從之魏果去邯鄲又曹操為東郡太守東郡今魏州是治東武陽軍頓丘黒山賊黒山今衛州界也于毒等攻東武陽太祖欲引兵西入山攻毒本屯諸將皆以為當還自救曹操曰昔孫臏救趙而攻魏耿弇欲走西安攻臨菑使賊聞我西而還則武陽自解不還我能破虜家虜不能拔武陽必矣乃行毒聞之果棄武陽還曹操要擊大破之初關侯圍楚襄陽曹操以漢帝在}
  - {type: page-break, offset: 2896, content: '', id: KR3j0015_WYG_009-32b, image: WYG0849/WYG0849-0205b.png}
  - {type: variant, offset: 2896, length: 0, content: '', krp: 解雜亂糾紛者不控拳救鬬者不博㦸批亢𢷬虚形格勢禁則自為解耳今梁趙相攻輕兵鋭卒必竭于外老弱疲于内君不若引兵疾走大梁據其街路衝其方虚彼必釋趙而自救是我一舉解趙之圍而弊于魏也田忌從之魏果去邯鄲又曹操為東郡太守東郡今魏州是治東武陽軍頓丘黒山賊黒山今衛州界也于毒等攻東武陽太祖欲引兵西入山攻毒本屯諸將皆以為當還自救曹操曰昔孫臏救趙而攻魏耿弇欲走西安攻臨菑使賊聞我西而還則武陽自解不還我能破虜家虜不能拔武陽必矣乃行毒聞之果棄武陽還曹操要擊大破之初關侯圍楚襄陽曹操以漢帝在}
  - {type: variant, offset: 2897, length: 4, content: 由積牙卞, WYG: 近賊欲徙都司馬宣王及蔣濟説曹操曰劉備孫權外親内疎關侯得志權必不願也可遣人勸躡其後許割江南以封權則楚圍自解曹操從之侯遂見擒此言攻其所愛則動矣是以善戰者無知名無勇功不争白刃之前不備已失之後此之謂矣蛇勢第十七語曰投兵散地則六親不能相保同舟而濟胡越何患乎異心孫子曰善用兵者譬如率然何以明之漢宣帝時先零為冦帝命趙充國征之引兵至先零所在虜乆屯聚解弛望見大軍棄車重欲渡湟水道阨狹充國徐行驅之或曰逐利行遲充國曰此窮寇不可迫也緩之則走不顧急之則還致死諸將校皆曰善虜果赴水溺死者數百于是破之袁尚既敗遂奔遼東衆有數千初遼東太守公孫康恃逺不服曹公既破烏丸或説公遂征之尚兄弟可擒也公曰吾方使康斬送尚熙首不煩兵矣公引兵還康果斬送尚熙傳其首諸將或問曰公還而康斬尚熙何也公曰彼素畏尚熙其急之則并力緩之則自相圖其勢然也曹公征張繡荀攸曰繡與劉表相恃為强然繡以遊軍仰食于表表不能供也其勢必離不如緩軍以待之可誘而致也若急之則必相救曹操不從進至穰與綉戰表果救之軍不利矣故孫子曰善用兵者譬如率然率然者常山之蛇擊其頭則尾至擊其尾則首至擊其中則首尾俱至或曰敢問可使如率然乎孫子曰可矣夫吳人之與越人相惡當其同舟而濟則救如左右手是故放馬埋輪不足恃也齊勇若一政之道也此之謂矣先勝第十八孫子曰善用兵者先為不可勝以待敵之可勝何以明之梁州賊王國圍陳倉乃拜皇甫嵩董卓各率二萬人拒之卓欲速進赴陳倉嵩不聴卓曰智者不緩時勇者不留決速戰則城全不救則城滅全滅之勢在于此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝在此可勝在彼范蠡曰時不至不可强生事不究不可强成此之謂也彼守不足我攻有餘有餘者動于九天之上不足者陷于九地之下今陳倉雖小城守固備非九地之陷也王國雖强而攻我之所不救非九天之勢也夫勢非九天攻者受害陷非九地守者不拔國今已蹈受害之地而陳倉保不拔之城我可不煩兵動衆而取全勝之功將何救焉遂不聴王國圍陳倉自冬迄春八十餘日城堅守固竟不能拔賊衆疲弊果自解去嵩進兵擊之卓曰不可兵法窮冦勿迫歸衆勿追今我追國是迫歸衆追窮冦也困獸猶鬬蜂蠆有毒况大衆乎嵩曰不然吾前不擊避其鋭也實而備之强而避之鋭卒勿攻兵之機也今而擊之待其衰也所擊疲師非歸師也國衆且走莫有鬬志以整擊亂非窮冦也遂獨進兵擊之使卓為後拒連戰大破國走而死卓大慚恨孫子曰怒而撓之言待其衰也又曰卑而驕之言敵怒而進兵則當外示屈弱以髙其志待其歸}
