  - {type: variant, offset: 2945, length: 0, content: '', krp: 變通之理也利害第二十一孫子曰陷之死地而後生投之亡地而後存又曰雜于利而務可伸雜于害而患可解何以明之漢將韓信攻趙趙盛兵井陘口信乃引兵未至井陘口三十里止舍夜半傳發選輕騎二千人持一赤幟從間道萆山音蔽而望見趙軍誡之曰趙見吾走必空壁逐吾若疾入趙壁拔趙幟立漢赤幟令其禆將傳飱曰今日破趙㑹食諸將皆莫信佯應曰諾信}
  - {type: variant, offset: 2946, length: 0, content: '', WYG: 軍吏曰趙已先據便地為壁且彼未見我大將旗鼓未肯擊前行恐吾至阻險而還信乃使萬人出行倍水陣趙軍望見大笑之太公曰智與衆同非人師也伎與衆同非國士也動莫神于}
