  - {type: variant, offset: 11739, length: 948, content: 重祿遺哀公以女樂哀公親樂之必怠於政仲尼必諫諫不聽必輕絕魯於是選齊國中女子好者八十人皆衣文繡之衣而舞康樂遺魯君魯君受齊女樂怠於事三日不聽政孔子曰彼婦之口可以出走遂適衛此昏於聲色者也戎王使由余觀秦秦繆公以由余賢聖問內史廖曰孤聞鄰國有聖人敵國之憂也今由余寡人之害將奈何內史廖曰戎王處僻匿未嘗聞中國之聲君試遺其女樂以奪其志為由余請以諫其閒留而莫遣以失其期戎王怪之必疑由余且戎王好樂必怠於政繆公曰善以女樂二八遺戎王戎王受而悅之終年不遷由余諫不聽繆公使人問要由余由余遂降秦梁王觴諸俟於苑臺魯君曰昔者帝女令儀狄作酒而美進之禹禹飲而甘遂疏儀狄絕旨酒曰後世必有以酒亡其國者也齊桓公夜半不嗛易牙乃煎熬燔炙和調五味而進之桓公食而飽曰後世必有以味亡其國者也晉文公得南之威三日不聽朝遂推南之威而遠之曰後世必有以色亡其國者也楚王登強臺而望崩山左江而右湖其樂忘死遂弗登曰後世必有以高臺陂池亡其國者也今主君之樽儀狄之酒也主君之味易牙之調也左白台而右閭須南威之美也前夾林而後蘭臺強臺之樂也人有一於此足以亡國今主君兼此四者可無誡歟梁王稱善相屬由此言之昏智者非一途也太史公曰平原君翩翩濁代之佳公子也然不覩大體語曰利令智昏平原君貪馮亭邪說使趙陷長平四十餘萬邯鄲幾亡此昏於利者也人物志曰夫仁出於慈有慈而不仁者仁者有恤有仁而不恤者厲者有剛有厲而不剛者若夫見可憐則流涕將分與則恡嗇是有慈而不仁者覩危急則隱將赴救則畏患是有仁而不恤者處虛義則色厲顧利慾則內恁是有厲而不剛者然則慈而不仁則恡奪之也仁而不恤則懼奪之也厲而不剛則欲奪之也後漢書班固傳評曰昔班固傷司馬遷云遷博物洽聞不能以智免極刑然固亦自陷大戮班固附竇氏勢竇氏敗固坐之死洛陽獄中也可謂智及之而不能守古人所以致論於目睫邪此昏於勢者也議曰夫班固傷遷公論也自陷大戮挾私也夫心有私則智不能守也尸子曰夫吳越之國以臣妾為殉中國聞而非之及怒則以親戚殉一言夫智在公則愛吳越之臣妾在私則忘其親戚非智損也怒弇之也此昏於怒者也好亦然矣語曰莫知其子之惡非智損也愛弇之也此昏於愛者也是故論貴賤辯是非者必且自公心言之自公心聽之而後可知也故范曄曰夫利不在身以之謀事則智慮不私已以之斷義則厲誠能迴觀物之智而為反身之察則能恕而自鑒議曰孔子曰吾未見剛者或對曰申棖子曰振也欲焉得剛由此言之心苟有私則失其本性矣尸子曰鴻鵠在上彀弩以, WYG: 卒}
