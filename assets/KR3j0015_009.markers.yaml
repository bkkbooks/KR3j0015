  - {type: variant, offset: 839, length: 0, content: '', WYG: 不可亂仁則愛人信則不欺人必則無二心此所謂五才者也三軍之衆百萬之師張設輕重在于一人謂之氣機道狹路險名山大塞十人所守千人不過是謂地機善行間諜分散其衆使君臣相怨是謂事機車堅舟利士馬閑習是謂力機此所謂四機者也夫將可樂而不可憂謀可深而不可疑將憂則内疑將有憂色則内外相疑故曰不相信也謀疑則敵國奮多疑則計亂亂則令敵國奮威以此征伐則可致亂故將能清能静亷財曰清不擾曰静老子曰重為輕根静為躁君也能平能整能受諫能聴訟能納人受賢于羣英之中若越納范蠡齊納寗戚之類也能採善言能知國俗能圖山川能裁阨}
