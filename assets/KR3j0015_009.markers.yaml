  - {type: variant, offset: 1076, length: 713, content: 人臣者言何必用盡忠而已矣二人各進議於王以事申子微視王之所悅以言於王王大悅之此情可以言釣也吳伐越越棲於會稽句踐喟然歎曰吾終此乎大夫種曰湯繫夏臺文王囚羑里重耳奔翟齊小白奔莒其卒霸王由是觀之何遽不為福乎句踐及得免務報吳大夫種曰臣觀吳王政驕矣請嘗之乃貸粟以卜其事子胥諫勿與王遂與之子胥曰王不聽諫後三年吳其墟矣太宰嚭聞之讒曰伍員貌忠而實忍人吳遂殺子胥此情可以事釣也客以淳于髡見梁惠王惠王屏左右再見之終無言惠王怪之讓客客謂淳于髡髡曰吾前見王王志在馳逐後復見王王志在音聲是以默然客具以報王王大駭曰淳于先生誠聖人也前有獻善馬者寡人未及試會生來後有獻謳者未及試又會生來寡人雖屏人然私心在彼此情可以志釣也智伯從韓魏之君伐趙韓魏用趙臣張孟談之計陰謀叛智伯張孟談因朝智伯遇智果於轅門之外智果入見智伯曰二主殆將有變臣遇張孟談察其志矜而行高見二君色動而變必背君矣智伯不從智果出遂更其姓為輔氏張孟談入見趙襄子曰臣遇智果於轅門之外其視有疑臣之心入見智伯而更其族今暮不擊必後之矣襄子曰諾因與韓魏殺守隄之吏決水灌智伯軍此情可以視釣也殷浩仕晉有盛名時人觀其出處以卜江左興亡此情可以賢釣也呂氏春秋曰夫國之將亡有道者先去鈐經曰喜色湭然以出怒色麃然以侮欲色熰然以愉懼色憚然以下憂色懼然以靜此情可以色釣也易曰將叛者其辭慚中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈周禮五聽一曰辭聽辭不直則煩二曰色聽色不直則赧三曰氣聽氣不直則喘四曰耳聽耳不直則惑五曰目聽目不直則眊然由是觀之夫人情必見於物昔者晉王好色驪姬乘色以壅之吳王好廣地太宰陳伐以壅之桓公好味易牙蒸子以壅之沉冥無端甚可畏也故知人主之好惡不可見於外所好惡見於外則臣妾乘其所好惡以行壅制焉故曰人君無見其意將, WYG: 上攻城}
