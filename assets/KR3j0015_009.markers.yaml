  - {type: variant, offset: 10491, length: 301, content: 誅殺為道德蒸報為何義自金行不競天地板湯遂覆瀍洛傾五都嗚呼福善禍淫徒虛言耳此論以戎狄內侵便謂由命此所謂不量於德者也何則昔秦穆公問戎人由余曰中國以詩書禮樂法度為政然尚時亂今戎夷無此何以為理乎由余笑曰乃中國所以亂也夫自上聖黃帝作為禮樂法度身以先之僅可小理及其後世日以驕淫阻法度之威以責督於下平罷極則以仁義怨望於上上下交爭怨而相篡殺至於滅宗皆此類也夫戎狄則不然上含淳德以遇於下下懷忠信以事其土一國之政猶一身之治不知所以治此真聖人之治夫戎狄之德有如是者今晉之興也宗子無維城之助而閼伯實沈之隙歲搆師尹無具瞻之貴而顛墜戮辱之禍日有宣景遭多難之時務伐英雄誅庶桀以便事其傾覆屠膾非止於誅殺也風俗淫僻廉恥並失先時而昏任情而, WYG: 利}
