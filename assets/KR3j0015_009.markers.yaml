  - {type: 'tls:seg', offset: 2933, content: '', id: KR3j0015_CH7x2006_009-2a.231}
  - {type: variant, offset: 2933, length: 0, content: '', WYG: 足以懲􅁖今若受之更開逆意賊利則進戰鈍則乞降縱敵長寇非良計也因急攻之不克儁登土山顧謂張超曰吾知之矣賊今外圍周固連營逼急乞降不受欲出不得所以死戰也萬人一心猶不可當况十萬乎其害甚矣不如徹圍并兵入城忠見解圍勢必自出出則意散易破之道也既而解圍忠果出戰遂破忠等魏太祖圍壺關下令曰城拔皆坑之連月不下曹仁言于太祖曰圍城必示之門所以開其生路也今公許之必死將人人自為守且城固而粮多攻之則士卒傷守則引日持乆今頓兵堅城之下以攻必死之虜非良計也太祖從之城降凡降人之氣如人十十五五皆义手低頭又云相向或有氣上黄下白名曰善氣所}
  - {type: page-break, offset: 2933, content: '', id: KR3j0015_WYG_009-37b, image: WYG0849/WYG0849-0207d.png}
  - {type: variant, offset: 2933, length: 0, content: '', krp: 足以懲悪今若受之更開逆意賊利則進戰鈍則乞降縱敵長寇非良計也因急攻之不克儁登土山顧謂張超曰吾知之矣賊今外圍周固連營逼急乞降不受欲出不得所以死戰也萬人一心猶不可當况十萬乎其害甚矣不如徹圍并兵入城忠見解圍勢必自出出則意散易破之道也既而解圍忠果出戰遂破忠等魏太祖圍壺關下令曰城拔皆坑之連月不下曹仁言于太祖曰圍城必示之門所以開其生路也今公許之必死將人人自為守且城固而粮多攻之則士卒傷守則引日持乆今頓兵堅城之下以攻必死之虜非良計也太祖從之城降凡降人之氣如人十十五五皆义手低頭又云相向或有氣上黄下白名曰善氣所}
  - {type: variant, offset: 2934, length: 1, content: 難, WYG: 之軍欲求和退凡城中有白氣如旗者}
  - {type: variant, offset: 2934, length: 1, content: 難, krp: 之軍欲求和退凡城中有白氣如旗者}
  - {type: variant, offset: 2936, length: 4, content: 恐雖嚴刑, WYG: 可拔或有黄雲臨城有大喜慶或有青色如牛頭觸人者城不可屠或城中氣出東方其色黄此天鉞也不可伐伐者死或城上氣如火烟主人欲出戰其氣}
  - {type: page-break, offset: 2936, content: '', id: KR3j0015_WYG_009-38a, image: WYG0849/WYG0849-0208a.png}
  - {type: variant, offset: 2936, length: 4, content: 恐雖嚴刑, krp: 可拔或有黄雲臨城有大喜慶或有青色如牛頭觸人者城不可屠或城中氣出東方其色黄此天鉞也不可伐伐者死或城上氣如火烟主人欲出戰其氣}
  - {type: punctuation, offset: 2937, content: ，, id: KR3j0015_CH7x2006_009-bkkpn723}
  - {type: 'tls:seg', offset: 2937, content: '', id: KR3j0015_CH7x2006_009-2a.232}
  - {type: variant, offset: 2941, length: 0, content: '', WYG: 極者不可攻或有氣如杵形從城中向外者内兵欲突出主人勝不可攻或城上有雲分為兩彗狀者攻不可得或有濛氣繞城不入者外兵不得入凡攻城有諸氣從城中出入吾軍上者敵氣也凡攻城圍邑過旬不雷雨者城有輔疾去之勿攻也此皆勝氣也凡攻城圍邑赤氣在城上黄氣四面繞之城中有大將死城降或城上有赤氣如飛鳥急攻之可破或有氣出入者人欲逃或有氣如灰氣出而覆其軍上者士多病城屠或城上無雲氣士卒散或城營上有赤氣如衆人頭下多死喪流血攻城有白氣繞城而入者急攻可得若有屈虹從城外入城者三日内城屠此皆敗氣也此圍師之道也變通第二十孫子曰善動敵者形之敵必從之何以明之魏與趙攻韓齊田忌為將而救之直走大梁魏將龎涓去韓而歸齊軍已過而西矣孫臏謂田忌曰彼三晉之兵素悍勇而輕齊齊號為怯善用兵者因其勢而利導之兵法曰百里而趨利者蹷其將軍使齊軍入魏地為十萬竈明日為五萬竈明日為二萬竈涓喜曰吾固知齊卒怯也入吾地三日士卒亡已過半乃棄其步兵與輕鋭倍日并行逐之臏度其暮至馬陵道狹而多險可伏兵乃斫大樹白書之曰龎涓死此樹下令善射者萬弩夾道而伏期曰見火舉而發涓夜至斫木下見白書乃鑚火燭之讀書齊軍萬弩俱發魏軍大亂涓乃自剄曰果成豎子之名也虞詡薦武都郡羌率衆遮詡于陳倉崤谷詡令吏士各作兩竈日増倍之羌不敢逼或問曰孫子減竈而君増之兵法日行三十里以戒不虞今且行二百里何也詡曰虜衆既多吾徐行則易為所及疾行則彼不測之且虜見吾竈多謂郡兵來至孫子見弱吾示强勢不同也昔王濬在蜀作船欲伐吳預流柹江中}
  - {type: page-break, offset: 2941, content: '', id: KR3j0015_WYG_009-38b, image: WYG0849/WYG0849-0208b.png}
  - {type: page-break, offset: 2941, content: '', id: KR3j0015_WYG_009-39a, image: WYG0849/WYG0849-0208c.png}
