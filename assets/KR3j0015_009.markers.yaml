  - {type: variant, offset: 2514, length: 379, content: 曰蘇秦左右賣國反覆之臣也將作亂燕王意疎之捨而不用蘇秦恐被罪入見王曰臣東周之鄙人也無尺寸之功而王親拜之於廟禮之於庭今臣為王却齊之兵而功得十城宜以益親今來而王不官臣者人必有以不信傷臣於王者且臣之不信王之福也燕王亦嘗謂蘇代曰寡人甚不喜訑者言也代對曰周地賤媒為其兩譽也之男家曰女美之女家曰男富然周之俗不自為娶妻且夫處女無媒老且不嫁舍媒而自衒獘而不售順而無毀則售而不獘者唯媒耳且事非權不立非勢不成夫使人坐受成事者唯訑耳訑因土和反使臣信如尾生廉如伯夷孝如曾參三者天下之高行而以事王可乎燕王曰可也蘇秦曰有此臣亦不事王矣孝如曾參義不離其親宿昔於外王又安得使之步行千里而事弱燕之危王哉廉如伯夷義不為孤竹君之嗣不肯為武王之臣不受封侯而餓死于首陽之下有廉如此者王又安能使之步行千里而進取於齊哉信如尾生與女子期於梁柱之下女子不來水至不去抱梁柱而死有信如此何肯揚燕秦之威却齊之強兵哉韓, WYG: 趙孫}
