  - {type: variant, offset: 13939, length: 128, content: 勝不仁也猶水之勝火也今為仁者猶以一杯水救一車薪之火也火不息則謂水不勝火此又與不仁之甚者也又五穀種之美者苟為不熟不如稊稗夫仁亦在熟之而已矣熟成也尸子曰食所以為肥也一飯而問人曰奚若則皆笑之夫治天下大事也譬今人皆以一飯而問人奚若者也議曰此善少不足以成名也惡亦如之, WYG: 敵必從}
