  - {type: variant, offset: 10793, length: 944, content: 皆不恥淫逸之過不拘妬忌之惡有逆于舅姑有反易剛柔有殺戮妾媵有黷亂上下其淫亂凶逆非止於蒸報也由是觀之晉家之德安勝於匈奴哉今見戎狄亂華便以為在命不在德是何言之過歟大私第三十大私第三十管子曰知與之為取政之寶也周書曰將欲取之必故與之何以徵其然耶黃石公曰得前勿有立而勿取為者則已有者則士焉知利之所在人多務功鮮有讓者唯天子不與下爭功名耳故曰有者則士焉知利之所在乎彼為諸侯已為天子天子不收功於萬物故能成其高不競名於眾庶故能成其大也使城自仔令士自取盡與敵城之財令自取之所謂使貪使愚者也王者之道也尸子曰堯養無告禹愛辜人此先王之所以安危而懷遠也聖人於大私之中也為無私湯曰朕身有罪無及萬方萬方有罪朕身受之湯不私其身而私萬方文王曰苟有仁人何必周親文王不私其親而私萬國先王非無私也所私者與人不同此知大私者也由是言之夫唯不私故能成其私不利而利之乃利之大者矣敗功第三十一敗功第三十一文子曰有功離仁義者即見疑有罪不失人心者必見信故仁義者天下之尊爵也何以言之昔者楚恭王有疾召其大夫曰不穀不德少主社稷失先君之緒覆楚國之師不穀之罪也若以宗廟之靈得保首領以沒請為靈若厲大夫許緒及其卒也子囊曰不然夫事君者從其善不從其過赫赫楚國而君臨之撫征南海訓及諸夏其寵大矣有是寵也而知其過可不謂之恭乎大夫從之此因過以為功者也魏將王昶陳泰兵敗大將軍以為已過魏人感將軍引過皆悅思報之習鑿齒論曰司馬大將軍引二敗以為已過過銷而業昌可謂智矣夫忘其敗而下思其報雖欲勿康其可得乎若乃諱敗推過歸咎萬物上下離心賢愚釋體是楚再敗而晉再剋謬之甚矣夫人君苟統斯理而以御國行雖失而名揚兵雖挫而戰勝百敗猶可況再敗乎此因敗以成功也故知智者六舉事也因禍為福轉敗為功自古然矣議曰白起為秦坑趙降卒四十餘萬使諸侯曲秦而合縱夫坑趙降卒非勝也乃敗秦之機商君詐魏虜公子卬使秦信不行於天下乃自敗之兆非霸業也樂毅仗義以下齊城敗于即墨非敗也乃是吞天下之勢劉備憐歸義之人日行十數里敗於長阪雖奔亡不暇乃霸王之始故知非霸者不能用敗齊人以紫敗素而其價十倍此言雖小可以喻大也昏智第三十二昏智第三十二夫神者智之淵也神清則智明智者心之符也智公則心平此出文子今士有神清智明而暗於成敗者非愚也以聲色勢利怒愛昏其智矣何以言之昔孔子攝魯相齊景公聞而懼曰孔子為政魯必霸匕則吾地近焉我之為先并矣犁且曰去仲尼猶吹毛耳君何不延, WYG: ''}
