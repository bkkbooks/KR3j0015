  - {type: variant, offset: 2909, length: 1, content: 數, WYG: 兵家之勝不可傳也青州黄巾衆百餘萬}
  - {type: variant, offset: 2909, length: 1, content: 數, krp: 兵家之勝不可傳也青州黄巾衆百餘萬}
  - {type: variant, offset: 2911, length: 0, content: '', WYG: 東平劉岱欲擊之鮑永諫曰今賊衆百萬百姓皆震恐士卒無鬬志不可敵也觀賊衆羣輩相隨軍無輜重唯以抄掠為資今若畜士衆之力先為固守彼欲戰不得攻則不能其勢必離散然後選精鋭既據其要害擊之可破也岱不從果為賊所敗晉代王開攻燕鄴城慕容徳拒戰代師敗績徳又欲攻之别駕韓潭進曰昔漢髙祖云吾寧鬬智不能鬬力是以古人先勝廟堂然後攻戰今代不可擊}
  - {type: page-break, offset: 2911, content: '', id: KR3j0015_WYG_009-36a, image: WYG0849/WYG0849-0207a.png}
  - {type: variant, offset: 2911, length: 0, content: '', krp: 東平劉岱欲擊之鮑永諫曰今賊衆百萬百姓皆震恐士卒無鬬志不可敵也觀賊衆羣輩相隨軍無輜重唯以抄掠為資今若畜士衆之力先為固守彼欲戰不得攻則不能其勢必離散然後選精鋭既據其要害擊之可破也岱不從果為賊所敗晉代王開攻燕鄴城慕容徳拒戰代師敗績徳又欲攻之别駕韓潭進曰昔漢髙祖云吾寧鬬智不能鬬力是以古人先勝廟堂然後攻戰今代不可擊}
