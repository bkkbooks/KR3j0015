  - {type: variant, offset: 180, length: 0, content: '', WYG: 寔正直之賴凡乃神之靈急急如律令凡氣初出如甑上氣勃勃上昇氣積為霧霧為隂隂氣結為虹蜺暈珥之屬凡氣不積不結散漫一方不能為灾必和雜殺氣森森然疾起乃可論占常以平旦下晡日出没時候之期内有風雨灾不成也若風不旁勃旌旗暈暈順風而揚舉或向敵終日軍行有功勝候也凡軍上氣如山堤上林木不可與戰在我軍大勝或如火光亦大勝或敵上白氣粉拂如樓縁以赤氣者兵勁不可擊在吾軍必大勝或敵上氣黄白厚潤而重者勿與戰或有雲廣如三匹帛前後大軍行好遥望軍上雲如鬬鷄赤白相隨在氣中得天助不可擊兩軍相當上有氣如蛇舉頭向敵者戰必勝凡軍營上有五色氣上與天連此應天之軍不可擊有赤黄氣干天亦不可攻或有雲如日月而赤氣繞之如日暈狀有光者所見之地大勝不可攻敵上氣如暈狀其軍不可攻此皆勝氣也若逆風来應氣旁勃牙扛折隂不見日旌幡激揚敗候也若雲氣從敵所來終日不止軍不可出出則不利若風氣俱來此為敗候在急擊也凡敵上氣色如馬肝如死灰或類偃盖皆敗徴也或黒氣如環山隨軍上者軍必敗或軍上氣昏發連夜照人則軍事散亂或軍上氣半而一絶一敗再絶再敗在東發白氣者灾深或軍上氣五色雜亂東西南北不定者其軍欲敗或軍上有赤氣炎炎降天將死衆亂或軍上有黒氣牛馬形從氣霧中下漸入軍名曰天狗下食血敗軍也或有雲氣盖道濛蔽晝冥者釋炊不暇熟急去此皆敗候也若下輕其將妖怪並作衆口相惑當修徳審令繕礪鋒甲勤誠誓士以避天怒然後復擇吉日祭牙旗具太牢之饌震鼓鐸之音誠心啟請以備天問觀其祥應以占吉凶若人馬喜躍旌旗皆前指髙陵金鐸之聲揚以清鞞鼓之音宛以鳴此得神明之助持以安于衆心乃可用矣雖云任賢使能則不占而事利令明法審則不筮而計成封功賞勞則不禱而福從共苦同甘則犯逆而功就然而臨機制用有五助焉一曰助謀二曰助勢三曰助怯四曰助疑五曰助地此五者助勝之術故曰知地知天勝乃可全不可不審察也地形第八孫子曰三曰地利地利者逺近險易廣狹死生也故不知山林險阻沮澤之形者不能行軍不用鄉導不能得地利故用兵有散地有輕地有争地有交地有衢地有重地有汜地有圍地有死地九地之名諸侯自戰其地為散地戰其境内之地士卒意不專有自潰之心也故經曰散地吾將一其志也入人之地而不深者為輕地入人之地未深士卒意尚未專而輕走也故經曰輕地吾將使之屬也我得則利彼得亦利者為争地可以少勝衆弱勝强謂山水阨口有險固之利兩敵所争故經曰争地吾將趣其後也我可以往彼可以來為交地道上相交錯平地有數道往來交通無可絶也故經曰交地吾將固其結也諸侯之地三屬我與敵相對而旁有他國也先至而得天下之衆者為衢地先至其地可交結諸侯之衆為助也故經曰衢地吾將謹其守也入人難反之地深倍城邑多者為重地逺去已城郭深入敵地專心意故謂之重地故經曰重地吾將繼其食也行山林險阻沮澤凡難行之道者為汜地汜浸洳之地故經曰汜地我將進其途也所由入者隘所從歸者迂彼寡可以擊吾衆者為圍地所欲從入阨險欲歸道逺也持乆則粮乏故敵可以少擊吾衆者為圍地故經曰圍地吾將塞其闕也疾戰則存不疾則亡者為死地前有髙山後有大水進則不得退復有碍又粮乏絶故為死地在死地者當及士卒尚飽强志殊死故可以俱死故經曰死地吾將示之以不活也是故散地無戰士卒顧家不可以戰輕地則無止入敵地淺士意尚未堅不可以遇敵自當堅其心也争地則無攻三道攻當先主地利也先得其地者不可攻也交地則無絶相及屬也交地者俱可進退不以兵絶也衢地則合交佐諸侯也當結交于諸侯重地則掠蓄粮食也入深士卒堅固則可掠取財物汜地則行可不止也圍地則謀擊其謀也則當權謀竒譎可以免難死地則戰殊死戰也未戰先勵之曰無慮愚戅用軍不明乃隨圍阨之地益士大夫之憂也皆將之罪也今日之事在此一舉若不用力身當膏野草為蟲獸食妻子無所求索尅則身榮賞禄在焉可不勉哉又有六地有通有挂有支有隘有險有逺六地名也我可以往彼可以來曰通謂俱在平陵往來通利也居通地先處其髙陽利粮道以戰則利寧致人無致于人已先處髙地分為也屯守于歸來之路不使敵絶已糧道可以往難以反曰挂挂相挂牽也挂形曰敵無備出而勝之敵有備出而不勝難以反不利敵無備而攻之勝可也有備不得勝之則難還反也我出而不利彼出而不利曰支支乆也俱不便乆相持也支形曰敵雖利我我無出引而去也令敵半出而擊之利利我也佯背我去無出遂待其引而擊之可敗也隘形曰我先居之必盈之而待敵盈滿也以兵陣滿阨形名使敵不得進退若敵先居之盈而勿從也不盈而從之隘形者兩中之間通谷也敵怒勢不饒我也居之必前齊阨口陣而守之以竒也敵即先居此地齊口陣勿從也即半隘陣者從而與敵共此利也險形曰我先居之必居髙陽以待敵居髙陽之地以待敵人敵人從其下隂來擊之勝也若敵先居則引而去之勿從也地險先不可至于人也夫逺形鈎勢難以挑戰而不利挑近敵也逺形去國逺也地鈎等無獨便利先挑之戰不利凡此六者地之道也皆將之至任不可不察故曰深草蓊穢者所以遁逃也深谷阻險者所以止禦車騎也隘塞山林者所以少擊衆也衆少可以夜擊敵也沛澤杳冥者所以匿其形也丈五之溝漸車之水漸浸也音子亷反山林石徑涇川丘阜涇川常流之川草木所在此步兵之地車騎二不當一丘陵漫衍相屬漫衍猶聫延也屬續也音之欲反平原廣野此車騎之地步兵十不當一平原相逺逺離也仰髙臨下此弓弩之地短兵十不當一兩陣相近平地淺草可前可後此長㦸之地劍楯三不當一萑葦竹簫簫蒿也草木蒙蘢林葉茂接此矛鋋之地長㦸二不當一曲道相伏險阨相薄此劍楯之地弓弩三不當一故曰地形者兵之助又曰用兵之道地利為寳趙奢趨山秦師所以覆敗韓信背水漢兵由其克勝此用地利之畧也水火第九經曰以水佐攻者强以火佐攻者明是知水火者兵之助也故火攻有五一曰火人敵傍近草因風燒之二曰火積燒其積蓄三曰火輜燒其輜重四曰火庫當使間人之敵營燒其兵庫五曰火燧燧墮也以火墮敵人營中也大頭之法以鐵盈火著箭頭强弩射敵之營中燒絶粮道也行火必有因因奸人也烟火素具發火有時起火有日時者天之燥也日者宿在箕壁參軫也凡此四宿者風起之日蕭世誠云春丙丁夏戊己秋壬癸冬甲乙此日有疾風猛雨也居勘太乙中有飛鳥十精如風雨期五子元運式各候其時可用火故曰以火佐攻者明何以言之昔楊􅓨與桂陽賊相㑹􅓨以皮作大排囊以石灰内囊中置車上作火燧繫馬尾因從上風鼓排囊吹灰羣賊眯目因燒馬尾奔突賊陣衆賊奔潰此用火之勢也殷浩北伐長史江逌取數百鷄以長繩連之脚皆繫火一時驅放羣鷄飛散羌營營皆燃因擊之姚襄退走此用火之勢李陵在大澤草中虜從上風縱火陵從下風緩火以此火解火勢也吾聞敵燒門恐火滅門開當更積薪助火使火勢不滅亦解火之法也太公曰强弩長兵所以踰水戰孫子曰水可以絶謂灌城也又曰絶水必逺水引敵使渡也客絶水而來迎之于水内令敵半渡而擊之利欲戰無附于水而迎客也謂處水上之軍故曰以水佐攻者强何以言之昔韓信定臨淄走齊王田廣楚使龍且來救齊齊王廣龍且并軍與信合戰人或説龍且曰漢兵逺鬬冦戰其鋒不可當齊楚自居其地戰兵易敗散不如深壁令齊王使其信臣招所亡城城聞其王在楚來救必反漢漢兵二千里客居齊城皆反之其勢無所得食可無戰而降也龍且曰吾平生知韓信為人易與耳且夫不戰而降之吾何功遂戰敗吾聞古之所謂善戰者勝易勝者敗故善者之勝也無知名無勇功故其戰勝不武不武者其所錯勝勝已敗者也龍且不用客之計欲求赫赫之功昧矣夾濰音唯水陣韓信乃夜令人為萬餘囊盛沙壅水上流引軍半渡擊龍且佯不勝還走龍且果喜曰固知信怯也遂追信渡水信使決壅囊水大至龍且軍大半不得渡即急擊之殺龍且龍且水軍東散走此反半渡之勢吾聞兵法絶水必逺水令敵半渡而擊之利韓信半渡軍佯入害地令龍且擊之然後決壅水此所謂雜于利而務可伸雜于害而患可解也皆反兵而用兵法微哉微哉盧綰佐彭越攻下梁地十餘城項羽聞之謂其大司馬曹咎曰謹守城臯即漢挑戰慎勿與戰漢果挑楚軍楚軍不出使人辱之孫子曰亷潔可辱也大司馬怒渡氾音凡水卒半渡漢擊大破之此欲戰無附于水勢也故知水火之變可以制勝其來乆矣秦人毒涇上流晉軍多死荆王燒楚積聚項氏以擒曹公決泗于下邳吕布就戮黄盖火攻于赤壁魏祖奔衂此將之至任盖軍中尤急者矣不可不察五間第十周禮曰巡國傳諜者反間也吕望云間搆飛言聚為一卒是知用間之道非一日也凡有白氣羣行徘徊結陣來者為他國人來欲圖人不可應視其所往隨而擊之可得也或有黒氣臨我軍上如車輪行敵人深入謀亂吾國臣或有黒氣遊行中含五色臨我軍上敵必謀合諸侯而伐我國諸侯反謀軍軍自敗或有黒氣如幢出于營中上黒下黄敵欲來求戰無誠實言信相反九日内必覺備之吉或日月隂沈無光不雨或十日晝夜不見日月名曰蒙臣謀主故曰乆隂不雨臣謀主也故間有五間有因間有内間有反間有生間有死間五間俱起莫知其道因間者因其鄉人而用之者也言敵鄉邑之人知敵表裏虚實可使伺候聴察通辭致言故曰因之用賞禄為先也内間者因其官人而用之者也因其在官失職者若刑誅之子孫與受罰之家也因其有隙就而用之反間者因敵間而用之者也曹公曰敵使間來視我我知之因厚賂重許反使為我間故曰反間蕭世誠曰言敵使人來候我我佯不知而示以虚事前却期㑹使歸相}
