  - {type: variant, offset: 942, length: 4, content: 齊王后死, WYG: 曹公征張魯定漢中劉曄説曰明公以步卒五千討誅董卓北破袁紹南征劉表九州百郡十并其八威震天下勢慴海外今舉漢中蜀人望風破膽失守推此而前蜀可𫝊檄而定也劉備人傑也有智而遲得蜀日淺蜀人未附今破漢中蜀人震恐其勢自傾以公之神明因其傾而壓之鳥甲反無不剋也若小緩之諸葛亮明于理而為相關羽張飛勇冠三軍而為將蜀人既定據險守要則不可犯也今不取必為後憂曹公不從居七日蜀降者説蜀中一日數十驚備斬之而不能禁也曹公延問曄曰今尚可擊否曄曰今已小定未可擊也又太祖征吕布至下邳布敗固守城攻不拔太祖}
  - {type: page-break, offset: 942, content: '', id: KR3j0015_WYG_009-28b, image: WYG0849/WYG0849-0203b.png}
