  - {type: 'tls:seg', offset: 21, content: '', id: KR3j0015_CH7x2006_009-1a.6}
  - {type: variant, offset: 23, length: 1, content: 瞽, WYG: 義兵兵義者王敵加於己不得已而用之謂之應兵兵應者勝争恨小故不勝憤怒者謂之忿兵兵忿者敗利人土地寶貨者謂之貪兵兵貪者破恃國之大矜人之衆欲見威于敵謂之驕兵兵驕者滅夫禁暴救亂曰義兵可以禮服恃衆以伐曰强兵可以謙服因怒興師曰剛兵可以辭服棄禮貪利曰暴兵可以詐服國危人疲舉事動兵曰逆兵可以權服是知聖人之用兵也非好樂之將以誅暴討亂夫以義而誅不義若決江河而溉熒火臨不測之淵而欲墮之其克之必也所以必優游恬泊者何重傷人物故曰逺人不服則修文徳以來之不以徳來然後命將出師矣夫將者國之輔也人之司命也故曰將不知兵以其主與敵也君不擇將以其國與敵也將既知兵主既擇將天子居正殿而召之曰社稷安危一在將軍今某國不臣願煩將軍應之乃使太史卜齋擇日授以斧鉞君入太廟西面而立將軍北面而立君親操鉞持其首授其柄曰從是以上至天者將軍制之乃復操柄授與刃曰從是以下至淵者將軍制之將既受命拜而報曰臣聞國不可從外理軍不可從中御二心不可以事君疑志不可以應敵臣既受命專斧鉞之威臣不敢還諸乃辭而行鑿凶門而出故司馬法曰進退唯時無曰寡人孫子曰將在軍君命有所不受古語曰閫以内寡人制之閫以外將軍制之漢書曰唯聞將軍之命不聞天子之詔故知合軍聚衆任于閫外受推轂之寄當秉旄之重無天于上無地于下無敵于前無君于後乃可成大業矣故曰將能而君不御者勝此之謂也練士第二夫王者帥師必簡鍊英雄知士髙下因能授職各取所長為其股肱羽翼以成威神然後萬事畢矣腹心一人主淵泉應卒揆天消變搃撮計謀保國全命者也謀士五人主國安危豫慮未然諭才能明賞罰授官位決嫌疑定可否者也天文三人主占星厯候風氣理時日考符騐效灾異知天心去就者也地形三人主軍行止形勢利害逺近險易水涸山阻不失地理者也兵法九人主講論異同行事成敗簡鍊兵器凡軍陣所用刺舉非法者也通糧四人主廣飲食密畜積通粮道致五穀令三軍不困乏食者也奮威四人主擇材士諭兵馬風流電擊不失所由竒狀也鼓旗三人主佐鼓旗符節號令倐忽往來出入若神股肱四人主出旌杆任重持難修溝壍治壁壘四轉守禦者也通材三人主拾遺補過集㑹術數周流並㑹應偶賔客議論談語消息結解權士三人主竒譎殊異非人所識行無窮之變也耳目七人主往來聴言語覽視四方之事軍中之情偽日列于前也爪牙五人主揚威武激厲三軍倡難鋭攻令三軍勇猛也羽翼四人主飛名譽震逺近動移四境以弱敵心者游士八人主相徴祥候開闔觀敵人為謀者也偉士二人主為譎詐依託鬼神以惑敵心法算二人主計㑹三軍領理萬物也方士二人主為藥以全傷病也軍中有大勇敢死樂傷者聚為一卒名曰冒將之士有勃氣壯勇暴强者聚為一卒名曰陷陣之士有學于竒正長劍琱弧接武齊列者聚為一卒名曰鋭騎之士有破格舒鈎强梁多力能潰破金鼓絶滅旌旗者聚為一卒名曰勇力之士有能踰髙超逺輕足善走者聚為一卒名曰冠兵之士有故王臣失勢欲復見其功者聚為一卒名曰死鬭之士有死罪之人昆弟為其將報讐者聚為一卒名曰死責之士有貧窮忿怒將快其志者聚為一卒名曰必死之士有故贅婿人虜欲昭迹揚名者聚為一卒名曰厲頓之士有辯言巧辭善毁譽者聚為一卒名曰間諜飛言弱敵之士有故胥靡免罪之人欲逃其恥者聚為一卒名曰幸用之士有材伎過人能負重行數百里者聚為一卒名曰待令之士夫卒强將弱曰弛吏强卒弱曰陷兵無選鋒曰北必然之數矣故曰兵衆孰强士卒孰練知之者勝不知之者不勝不可忽也結營第三太公曰出軍征戰安營置陣以六為法六者謂六百步亦可六十步量人地之宜置表十二辰也將軍身居九天之上青龍亦為九天若行止頓宿居玉帳下凡月建前三辰為玉帳假令正月已地是也竟一旬復徙開牙門常背建向破不向太嵗太隂不飲死水不居死地不居地柱不居地獄無休天竈無當龍首死水者不流水也死地者丘墓之間地柱者下中之髙地獄者髙中之下天竈者谷口也龍首者山端也故曰凡結營安陣將軍居青龍軍鼓居逢星士卒居明堂伏兵于太隂軍門居天門小將居地戸斬斷居天獄治罪居天庭軍粮居天牢軍器居天藏此謂法天結營物莫能害者也假令甲子旬中子為青龍丑為逢星寅為明堂卯為太隂辰為天門已為地戸午為天獄未為天庭申為天牢酉為天藏甲戌旬中戌為青龍亥為逢星子為明堂丑為太隂寅為天門卯為地戸辰為天獄已為天庭午為天牢未為天藏甲申旬中申為青龍酉為逢星戌為明堂亥為太隂子為天門丑為地戸寅為天獄卯為天庭辰為天牢已為天藏甲午旬中午為青龍未為逢星申為明堂酉為太隂戌為天門亥為地戸子為天獄丑為天庭寅為天牢卯為天藏甲辰旬中辰為青龍己為逢星午為明堂未為太隂申為天門酉為地戸戌為天獄亥為天庭子為天牢丑為天藏甲寅旬中寅為青龍卯為逢星辰為明堂己為太隂午為天門未為地戸申為天獄酉為天庭戌為天牢亥為天藏道徳第四夫兵不可出者三不和于國不可以出軍不和于軍不可以出陣不和于陣不可以出戰故孫子曰一曰道道者令人與上同意者也故可與之死可與之生而人不畏危危疑也言主上素有仁施于下則士能致前赴敵故與處存亡之難不畏傾危之敗若晉陽之圍沈竈生蛙而民無叛疑也黄石公曰軍井未達將不言渇軍幕未辦將不言倦冬不服裘夏不操扇是謂禮將與之安與之危故其衆可合而不可離可用而不可疲接之以禮厲之以辭厲士以見危授命之辭也則士死之是以含蓼問疾越王伯于諸侯吮疽恤士吳起淩于敵國陽門慟哭勝三晉之兵單醪投河感一軍之士勇者為之鬬智者為之憂視死若歸計不旋踵者以其恩養素畜䇿謀和同也故曰畜恩不倦以一取萬語曰積恩不已天下可使此道徳之畧也禁令第五孫子曰卒未專親而罰之則不服不服則難用卒已專親而罰不行則不可用矣故曰視卒如嬰兒故可與之赴深溪視卒如愛子故可與之俱死厚而不能使愛而不能令亂而不知理譬若驕子不可用也經曰兵以賞為表以罰為裏}
