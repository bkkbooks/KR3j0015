  - {type: variant, offset: 16913, length: 494, content: 善人者善人之資信矣夫定名第四十定名第四十夫理得於心非言不暢物定於彼非名不辯言不暢志則無以相接名不辯物則識鑒不顯原其所以本其所由非物有自然之名理有必定之稱也欲辯其實則殊其名欲宣其志則立其稱故稱之曰道德仁義禮智信夫道者人之所蹈也居知所為行知所之事知所乘動知所止謂之道又曰道者謂人之所蹈使萬物不失其所由也德者人之所得也使人各得其所欲謂之德仁者愛也致利除害兼愛無私謂之仁又曰仁者人之所親有慈悲惻隱之心遂其生成義者宜也明是非立可否謂之義又曰義者人之所宜賞善罰惡以建功立事也禮者履也進退有度尊卑有分謂之禮又曰禮者人之所履夙興夜寐以成人君之序也又曰立善防惡謂之禮也智者人之所知也以定乎得失是非之情謂之智信者人之所承也發號施令以一人心謂之信見本而知末執一而應萬謂之術又曰擅殺生之柄通壅塞之塗權輕重之數論得失之道使遠近情偽必見于上謂之術說苑曰從命利君謂之順又曰君正臣從謂之順也從命病君謂之諛又曰應言而不言謂之隱應諫而不諫謂之諛又曰君僻臣從謂之逆也逆命利君謂之忠又曰分人以財謂之惠教人以善謂之忠孫卿曰以德覆君而化之大忠也以德調君而補之次忠也以是諫非而怒之下忠也逆命病君謂之亂又曰賞無功謂之亂君有過失將危國家有, WYG: ''}
