  - {type: variant, offset: 10137, length: 305, content: 議曰夫吉凶由人興亡在德稽於前載其在德必矣今論者以堯舜無嗣以為在命此謬矣何者夫佐命功臣必有興者若使傳子則功臣之德廢何以言之昔鄭桓公問太史伯曰周衰何國興對曰昔祝融為高辛火正其功大矣而其於周未有興者楚其後也周衰楚必興齊姜姓伯夷之後也伯夷佐堯典禮秦嬴氏伯翳之後伯翳佐舜懷柔百物若周衰並必興矣是以班固典引云陶唐捨胤而禪有虞有虞亦命夏后稷契熙載越成湯武股肱既周天乃歸功元首將授漢劉由此言之安在其無嗣哉又曰楚師屠漢卒睢水鯁其流秦人坑趙士沸聲若雷震雖游夏之英才伊顏之殆庶焉能抗之哉此其弊也對曰宋景公之時熒惑在心公懼問子韋子韋曰心者宋分野也禍當在君雖然可移於人據此言則君有禍人當受之若當君厄會之時則生人塗炭雖伊顏游夏何所抗哉故莊, WYG: 掩發第二十三孫}
