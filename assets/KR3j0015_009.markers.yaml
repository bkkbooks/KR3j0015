  - {type: punctuation, offset: 15, content: 「, id: KR3j0015_CH7x2006_009-bkkpn2}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 君子有文事必有武備傳曰天生五才民並用之廢一不可誰能去兵黄帝與蚩尤戰顓頊與共工争堯伐驩兜舜伐有苗啟伐有扈湯伐有夏文王伐崇武王伐紂漢髙有京索之戰光武興昆陽之師魏動官渡之軍晉舉平吳之役故吕氏春秋曰聖王有仁義之兵而無偃兵淮南子曰以廢不義而授有徳者也是知取威定霸何莫由斯自古兵書殆將千計若不知合變雖多亦奚以為故曰少則得多則惑所以舉體要而作兵權云出軍第一夫兵者凶器也戰者危事也兵戰之塲立尸之所帝王不得已而用之矣凡天有白雲如匹布經丑}
  - {type: page-break, offset: 15, content: '', id: KR3j0015_WYG_009-2a, image: WYG0849/WYG0849-0190a.png}
  - {type: variant, offset: 15, length: 0, content: '', krp: 君子有文事必有武備傳曰天生五才民並用之廢一不可誰能去兵黄帝與蚩尤戰顓頊與共工争堯伐驩兜舜伐有苗啟伐有扈湯伐有夏文王伐崇武王伐紂漢髙有京索之戰光武興昆陽之師魏動官渡之軍晉舉平吳之役故吕氏春秋曰聖王有仁義之兵而無偃兵淮南子曰以廢不義而授有徳者也是知取威定霸何莫由斯自古兵書殆將千計若不知合變雖多亦奚以為故曰少則得多則惑所以舉體要而作兵權云出軍第一夫兵者凶器也戰者危事也兵戰之塲立尸之所帝王不得已而用之矣凡天有白雲如匹布經丑}
  - {type: variant, offset: 16, length: 0, content: '', WYG: 者天下多兵赤者尤甚或有雲如匹布竟天或有雲如胡人行列陣皆天下多兵或于子日四望無雲獨}
  - {type: variant, offset: 16, length: 0, content: '', krp: 者天下多兵赤者尤甚或有雲如匹布竟天或有雲如胡人行列陣皆天下多兵或于子日四望無雲獨}
  - {type: variant, offset: 17, length: 2, content: 顏色, WYG: 赤雲如旌旗天下兵起若遍四方者天下盡兵或四望無雲獨見黒雲極天亦天下兵起三日内有雨灾解或有赤雲赫然者所見之地兵大起凡有白雲如仙人衣千萬連結部隊相逐罷}
  - {type: variant, offset: 17, length: 2, content: 顏色, krp: 赤雲如旌旗天下兵起若遍四方者天下盡兵或四望無雲獨見黒雲極天亦天下兵起三日内有雨灾解或有赤雲赫然者所見之地兵大起凡有白雲如仙人衣千萬連結部隊相逐罷}
  - {type: variant, offset: 20, length: 1, content: 言, WYG: 復興當有千里兵或有如人持刀楯此暴兵氣也或有白氣廣六丈東西竟天者亦兵起也青者有大喪也故曰救亂誅暴}
  - {type: variant, offset: 20, length: 1, content: 言, krp: 復興當有千里兵或有如人持刀楯此暴兵氣也或有白氣廣六丈東西竟天者亦兵起也青者有大喪也故曰救亂誅暴}
