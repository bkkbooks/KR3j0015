  - {type: variant, offset: 952, length: 6, content: 使群臣議薛公, WYG: 進急攻之布可拔也乃引沂泗灌城城潰生擒布以此觀之當是時雖諸葛之智陳宫之謀吕布之勇關張之勁無所用矣此謂勇怯勢也强弱形也故兵有三勢夫兵有三勢一曰氣勢二曰地勢三曰因勢若將勇輕敵士卒樂戰三軍之衆志勵青雲氣等飄風聲如雷霆此所謂氣勢也若關山狹路大阜深澗龍蛇蟠磴羊腸狗門一夫守險千人不過此所謂地勢也若因敵怠慢勞役飢渇風波驚擾將吏縱横前營未舍後營夾涉所謂因勢者也善戰者恒求之于勢勢之來也食其緩頰下齊七十餘城謝石渡淝摧秦百萬之衆勢之去也項羽有拔山之力空泣虞姬}
