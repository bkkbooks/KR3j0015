  - {type: variant, offset: 2983, length: 223, content: 自覆之術非進取之道也且三王代興五霸迭盛皆不自覆君以自覆為可乎則齊不益於營丘足下不窺於邊城之外昔鄭子產獻入陳之捷于晉晉人問曰何故侵小對曰先王之命惟罪所在各致其辟且昔天子之地一圻列國一同由是以殺今大國多數圻矣若無侵小何以至大焉晉人不能詰也且臣之有老母於東周離老母而事足下去自覆之術而行進取之道臣之趨固不與足下合者足下者自覆之君也僕者進取之臣也臣所謂以忠信得罪於君也燕王曰夫僕信又何罪之有也對曰足下不知也臣鄰家有遠為吏者其妻私人其夫且歸其私者憂之其妻曰, WYG: 如}
