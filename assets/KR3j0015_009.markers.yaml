  - {type: variant, offset: 2220, length: 4, content: 有直躬者, WYG: 始得曹而新婚于衛若伐曹衛楚必救之則齊宋免矣前年楚戍穀以逼齊果如}
  - {type: variant, offset: 2220, length: 4, content: 有直躬者, krp: 始得曹而新婚于衛若伐曹衛楚必救之則齊宋免矣前年楚戍穀以逼齊果如}
  - {type: punctuation, offset: 2224, content: ，, id: KR3j0015_CH7x2006_009-bkkpn550}
  - {type: 'tls:seg', offset: 2224, content: '', id: KR3j0015_CH7x2006_009-2a.93}
  - {type: variant, offset: 2225, length: 264, content: 父竊羊而訐之官令尹曰必殺之以為直於君而曲於父執其子而罪之以是觀之夫君之直臣父之暴子也魯人從君戰三戰三北仲尼問其故對曰吾有老父死莫之養也仲尼以為孝舉而用之以是觀之夫父之孝子君之北人也故令尹誅而楚姦不止聞仲尼之賞魯人易降此上下之利若是其異也而人主兼舉匹夫之行而求致社稷之福必不幾矣顏率欲見公仲公仲不見顏率謂公仲之謁者曰公仲必以率為偽也故不見率公仲好內率曰好士公仲嗇於財率曰散施公仲無行率曰好義自今以來率且正言之而已矣公仲之謁者以告公仲公仲遽起而見之議曰語稱惡訐以為直者易曰君子以遏惡揚善若使顏率忠正則公仲之惡露故顏率詐偽則公仲之福齊, WYG: 計魏}
