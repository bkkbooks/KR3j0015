  - {type: variant, offset: 14530, length: 0, content: '', krp: 起此萬世一時而愁勞聖人之所起也故吳王内欲以晁錯為討外隨大王後車彷徉天下所鄉音向者降所指者下天下莫敢不服大王誠幸而許之一言則吳王帥楚王畧函谷闗守滎陽敖倉之粟距漢兵治次舍須大王有幸而臨之則天下可并兩主分割不亦可乎王曰善七國皆反兵敗伏誅太史公曰漢興孝文施大徳天下懐安至孝景不復憂異姓而晁錯刻削諸侯遂使七國俱起合從西向諸侯大盛而晁錯為之不以漸也及主父偃言之而諸侯以弱安危之機豈不以謀哉淮南王安怨望厲王死厲王長淮南王安父也長謀反檻車遷蜀至雍死上憐之封其三子以安為淮南王也欲謀叛逆未有因也及削地之後其為謀益甚與左吳等日夜按輿地圖部署兵所從入召伍被與謀曰上寛赦大王王復安得亡國之言乎臣聞子胥諫吳王吳王不用子胥曰臣今見麋鹿遊于姑蘇之臺臣今亦見宫中生荆棘霧露沾衣也臣聞聰者聽于無聲明者見于未形故聖人萬舉萬全昔文王一動而功顯于世列為三代此所謂因天心以化者也故海内不期而隨此千嵗之可見者夫百年之秦近世之吳楚亦足以喻國家之存亡矣臣不敢避子胥之誅願大王無為吳王之聽昔秦絶聖人之道殺術士燔詩書棄禮義尚詐力任刑罰轉負海之粟致之西河當是之時男子疾耕不足于糟糠女子紡績不足以盖形遣蒙恬築長城東西數千里暴露兵師常數十萬死者不可勝數殭屍千里流血頃畝百姓力竭故欲為亂者十家而五又使徐福入海求異物及延年益夀之藥還為偽辭曰臣見海中大神曰以令名振男女振童男女也與百工之事即得之矣秦皇大悦遣振男女三千人資之種種百工而行徐福得平原廣澤止王不來於是百姓悲痛相思欲為亂者十家而六又使尉佗踰五嶺攻百越尉佗知中國勞極止王不來使人上書求女無夫家者三萬人以為士卒衣補秦皇可其萬五千人于是百姓離心瓦解欲為亂者十家而七客謂髙皇帝曰時可矣髙皇帝曰待之聖人當起東南間不一年陳勝吳廣發矣髙皇始於豐沛一唱天下不期而響應者不可勝數也此所謂蹈瑕侯間因秦之亡而動者也百姓願之若旱之望雨故起于行陣之中而立為天子功髙三皇徳傳無窮今大王見髙皇得天下之易也獨不觀近世之吳楚乎夫吳王賜為劉氏祭酒授几杖不朝王四郡之衆地方數千里内鑄銅為錢東煮海以為鹽上取江陵木為船國富人衆舉兵而西破于大梁敗于狐父奔走而東至于丹徒越人擒之身死絶祀為天下笑夫以吳楚之衆不能成功者何也誠逆天道而不知時也方今大王之兵衆不能十分吳楚之一天下安寧又萬倍于秦願大王從臣之計大王不從臣之計今見大王事必不成而語先泄也臣聞微子過故國而悲於是作麥秀之歌是痛紂之不用王子比干也故孟子曰紂貴為天子死曾不若匹夫是紂先自絶于天下久矣非死之日而天下去之也今臣亦竊悲大王棄千乗之尊必且賜絶命之書為羣臣先死于東宫也王時所居于是王氣怨結而不揚涕滿眶而横流即起厯階而去後復問伍被曰漢庭治亂被曰竊覩朝廷之政君臣之義父子之親夫婦之别長幼之序皆得其理上之舉措遵古之道風俗綱紀未有所闕南越賓服羌𤏡入獻東甌入降廣長榆塞名開朔方匈奴折翅傷翼失援不振雖不及古太平之時然猶為治也王欲舉事臣見其將有禍而無福也王怒被謝死罪王曰陳勝吳廣無立錐之地千人之衆起于大澤奮臂大呼而天下響應西至于戲許直反而兵百萬今吾國雖小然而勝兵者可得十餘萬非直適戍之衆鐖鑿棘矜也大䥥謂之鐖五音反或是鉞矜音其巾反公何以言有禍無福被曰秦無道殘賊天下興萬乗之駕作阿房音旁之宫收太半之賦發閭左之戍父不寧子兄不便弟政苛刑峻天下􅘮然若燋民皆引領而望傾耳而聽悲號仰天扣心而怨上故陳勝一呼天下響應當今陛下臨制天下一齊海内汎愛蒸庶布徳施惠口雖未言聲疾雷霆令雖未出化馳如神心有所懐威動萬里下之應上猶影響也而大將軍材能不特章邯楊熊也大王以陳勝吳廣喻之被以為過王曰茍如公言不可徼倖耶被曰被有愚計王曰奈何被曰今朔方之郡田地廣水草美民徙者不足以實其地可偽為丞相御史請書徙郡國豪傑任俠及有耐罪以上輕罪不致于髠完其耐鬢故曰耐又曰律耐為司寇耐為鬼薪白粲耐猶任也赦令除家産五十萬以上者皆徙其家屬朔方之郡益發甲卒急其㑹日又偽為左右都司空上林中都官詔獄逮諸侯太子幸臣宗正有左右都司空上林有水司空皆主囚徒官也如此則民怨諸侯懼即使辨武人名隨而説之倘可徼倖十得一乎王曰此可也欲如伍被計使人偽得罪而西事大將軍丞相一日發兵發淮南兵使人即刺殺大將軍青而説丞相以下如發蒙耳又欲令衣求盗衣持羽檄從東方來呼曰南越兵入欲因以發兵未得發㑹事泄誅武帝時趙人徐樂上書言世務曰臣聞天下之患在于土崩不在瓦解古今一也何謂土崩秦之末世是也陳渉無千乘之尊壃土之地身非王公大人名族之後鄉曲之譽非有孔曽墨子之賢陶朱猗頓之富也然起窮巷奮棘矜偏袒大呼而天下風從此其故何也由其民困而主不恤下怨而上不知俗亂而政不修此三者陳渉所以為資也是謂之土崩故曰天下之患在于土崩何謂瓦解曰吴楚齊趙之兵是也七國謀為大逆是皆乗萬乗之君帯甲數十萬威足以嚴其境内財足以勸其士民然不能西攘尺寸之地而身為禽于中原者此其故何也非權輕于匹夫而兵弱于陳涉也當是之時先帝之徳澤未衰而安土樂俗之民衆故諸侯無境外之助此之謂瓦解由是觀之天下誠有土崩之勢雖有布衣窮處之士或首惡而危海内陳涉是也况三晉之君或存乎天下雖未有大治也誠能無土崩之勢雖有强國勁兵不待旋踵而身已擒矣吳楚齊趙是也况羣臣百姓能為亂乎哉此二體者安危明要也賢主之所宜留意而察度也問者闗中五榖數不登推數循治而觀之則又且有不安其處者不安故易動易動者土崩之隣也願修之廟堂之上銷未形之患也後漢靈帝以皇甫嵩為將軍討破黄巾威震天下而朝政日亂海内虚困故信都令閻忠干説嵩曰難得而易失者時也時至不旋踵者機也故聖人順時以動智者因機以發今將軍遭難得之運蹈易駭之機而踐運不撫臨機不發將何以保大名乎嵩曰何謂也忠曰天道無親百姓與能今將軍受鉞于暮春收功于末冬兵動如神謀不再計摧强易于折枯消堅易于湯雪旬月之間神兵電埽封户刻石南向以報徳威名震本朝風聲馳海外雖湯武之舉未有髙將軍者也今身建不賞之功體兼髙人之徳而北面庸主何以求安乎嵩曰夙夜在公心不忘忠何故不安忠曰不然議曰記有之親母為其子扢秃出血見者以為愛子之至使在于繼母則過者以為悮也事之情一矣所以從觀者異耳當今政理衰缺王室多故將軍處繼母之位挟震主之威雖懐至忠恐人心自變竊為將軍危之且吾聞之勢得容姦伯夷可疑茍曰無猜盗跖可信今擁兵百萬勢得為非握容姦之權居可疑之地雖竭忠信其能喻乎此田單解裘所以見忌也願將軍慮之閻生合將此類以破其志便引韓信喻之實不解公不忘忠之意談説之意漏于此矣昔韓信不忍一飱之遇而棄三分之業利劍以揣其喉方發悔毒之嘆者機失而謀乘也今主上勢弱于劉項將軍權重于淮陰指揮足以振風雲叱咤可以興雷電赫然奮發因危抵頺崇恩以綏先附振武以臨後服徵冀方之士動七州之衆羽檄先馳于前大軍響振于後蹈流漳河飲馬孟津誅閹宦之罪除羣怨之積雖童兒可使奮拳以致力女子可使褰裳以用命况厲熊羆之卒因迅風之勢哉功業已就天下已順然後請呼上帝示以天命混齊六合南面稱制移寶器于將興推亡漢于已墜實神機之至㑹風發之良時也夫既朽之木不雕衰世之朝難佐若欲輔難佐之朝雕朽敗之木是猶逆坂走丸迎流縱櫂豈云易哉且今宦豎羣居同惡如市上命不行權歸近習昏主之下難以久居不賞之功讒人側目如不早圖後悔無及嵩懼曰非常之謀不施于有常之勢創圖大功豈庸才所致黄巾細孽敵非秦項新結易散維以濟業且民未忘主天不佑逆若虚造不兾之功以速朝夕之禍孰與委忠本朝守其臣節雖云多讒不過放廢猶有令名死且不朽反常之論所不敢聞議曰夫明闇不相為用能否不相為使智士不為勇將謀勇將不為怯將死自古然矣故傳曰忠為令徳非其人猶不可况不令乎軍勢曰使義士不以財故義者不為不仁者死智者不為闇主謀所以伊摯去夏不為傷徳飛亷死紂不可謂賢今時昏道喪九域焚如而委忠危朝宴安昏寵忠不足以救世而死不足以成義且為智者固若此乎閻忠又當持此論以相説也忠知説不用因亡去董卓擅朝權徵皇甫嵩梁衍説令討卓又陶謙等共推朱雋為太師不使受李傕徵二人皆不從范曄評曰皇甫嵩朱雋並以上將之畧受脤倉卒之時值弱主蒙塵獷賊放命斯誠葉公投袂之機翟義鞠旅之日故梁衍獻規山東連謀而捨格天之大業蹈匹夫之小諒卒狼狽虎口為智士笑豈天之長斯亂也何智勇之不}
