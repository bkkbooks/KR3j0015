  - {type: variant, offset: 14523, length: 2, content: 火德, WYG: 天下之權懸命于胡亥髙能得志焉且夫從外制中謂之惑從下制上謂之賊故秋霜降者草華落水風搖者萬物作此必然之效也君侯何見之晩也斯曰吾聞晉易太子三世不安齊桓兄弟爭位身死為戮紂殘賊親戚不聼諫者國為丘墟三者逆天宗廟不血食斯其猶人哉安足與謀髙曰上下合同可以長久中外若一事無表裏君聼臣之計則長有封侯世世稱孤必有喬松之夀孔墨之智今釋此而不從禍及子孫足為寒心善者因敗為福君何處焉斯乃仰天而歎垂涕太息曰既已不能死安託命哉乃聼髙立胡亥改賜璽書殺扶蘇蒙恬初李斯從荀卿學帝王之術欲西入秦辭于荀秦卿曰斯聞得時無怠今萬乘爭時遊者主事今王欲吞天下稱帝而治此布衣馳騖之時而遊談者之秋也故斯將西説秦王至秦為吕不韋舍人不韋賢之任以為郎説秦王陰遣謀士賫金玉以遊説諸侯諸侯名士皆厚給遺之不肯者利劍刺之離其君臣之計遂吞天下皆斯之謀也秦二世末陳涉起蘄兵至陳張耳陳餘説涉曰大王興梁楚務在入闗未及收河北也臣嘗遊趙知其豪傑願請竒兵略趙地于是陳王許之與卒三千從白馬渡河今滑州白馬縣界也至諸郡縣説其豪傑曰秦為亂政虐刑殘滅天下北為長城之役南有五嶺之戍外内騷動百姓罷敝頭㑹箕斂以供軍費財匱力盡重以苛法使天下父子不相聊生今陳王奮臂為天下唱始莫不響應家自為怒各報其怨縣殺其令丞郡殺其守尉今已張大楚王陳使吳廣周文將卒百萬西擊秦于此時而不成封侯之業者非人傑也夫因天下之力而攻無道之君報父兄之怨而成割地之業此一時也豪傑皆然其言乃行收兵下趙十餘城議曰班固云昔詩書述虞夏之際舜禹受禪積徳累仁數十年然後在位殷周之王乃由契稷厯十餘世然後放殺秦起襄公始蠶食六國至于始皇乃并天下秦既稱帝患周之敗以為諸侯力爭以弱見奪于是削去五等墮城銷刃箝語燒書内鉏雄俊外攘胡越用一威權以為萬世安然十餘年間强敵横發乎不虞謫戍强于五霸閭閻逼于戎狄響應㿊于謗議奮臂威于甲兵向秦之禁適所以資豪傑自速其斃也由是觀之夫豪傑之資在于虐政矣韓信既平齊為齊王項王恐使盱眙人武涉徃説齊王使三分天下信不聽武涉已去蒯通知天下權在韓信欲為竒䇿而感動之以相人説韓信曰僕嘗受相人之術韓信曰先生相人何如對曰貴賤在於骨法憂喜在於容色成敗在於决斷以此參之萬不失一信曰先生相寡人如何對曰願請間信曰左右逺蒯通曰相君之靣不過封侯又危不安相君之背貴乃不可言背畔則大貴也韓信曰何謂也蒯通曰天下初發難俊雄豪傑建號一呼天下之士雲合霧集魚鱗雜遝烟至風起當此之時憂在亡秦而已今楚漢分爭使天下無罪之人肝胆塗地父子暴骸骨肉流離于中野不可勝數楚人起於彭城轉鬬逐北至于滎陽乗利席捲威振天下然兵困于京索之間廹西山而不能進者三年于此矣漢王將數十萬之衆距鞏洛阻山河之險一日數戰無尺寸之功折北不救敗滎陽傷成臯還走宛葉之間此所謂智勇俱困者也夫鋭}
