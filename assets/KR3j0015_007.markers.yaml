  - {type: variant, offset: 14522, length: 0, content: '', WYG: 詔教習胡亥學法仁慈篤厚輕財重士秦之諸子皆莫及也可以為嗣君計而定之斯曰斯上蔡閭巷布衣也上幸擢為丞相者固將以存亡安危屬臣也豈可負哉夫忠臣不避死而庶幾孝子不勤勞而見危君其勿復言髙曰蓋聞聖人遷徙無常就變而從時見末而知本觀指而覩歸物固有之安得常法哉方}
