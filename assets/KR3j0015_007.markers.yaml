  - {type: variant, offset: 14546, length: 1, content: 固, WYG: 破蜀蜀主降㑹搆艾艾檻車徵㑹隂懐異圖厚待蜀將姜維等維見而知其心謂可搆成擾亂徐圖克復也乃詭說之曰聞君自淮南以來算無遺䇿晉道克昌皆君為之今復定蜀威名震世民髙其功而主畏其謀欲以此安歸乎夫韓信不背漢于擾攘而見疑于既平大夫種不從范蠡于五湖卒伏劍而妄死豈闇主愚臣哉利害使之然也今君大功既立大徳已著何不法陶朱汛舟絶跡全功保身登峨眉之嶺而從赤松遊乎㑹曰君言逺我不能行且為今之道或未盡于此也維曰其他則君智力之所能無煩于老夫矣由是情好歡甚自稱益州牧以叛欲授維兵五萬人使為前驅魏將士憤發殺㑹及維張華外鎭當徵為尚書令馮紞疾之待帝從容論魏晉故事因曰臣嘗謂鍾㑹之反頗由太祖帝勃然曰何言也紞曰臣以為夫善御者必識六轡盈縮之間善治者必審官方控帯之宜是故漢髙八王以寵過夷滅}
