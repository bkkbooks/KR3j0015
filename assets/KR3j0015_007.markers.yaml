  - {type: variant, offset: 14706, length: 1, content: 德, krp: 天下為度者也宋孔熙先者廣州刺史黙之子也有姦才善占星氣言江州分野出天子上當見弑于骨肉及大將軍彭城王義康幽于安城郡熈先謂為其人也遂說王詹事范曄曰先君昔去廣州朝謗紛紜藉大將軍深相救觧得免艱危曩受遺命以死報徳今主上昏僻殆天所棄大將軍英斷聰敏人神相屬失職南垂天下憤怨今人情騷動星文舛錯時至則不可拒此之謂乎若順天人之心收慕義之士内連寵戚外結英豪潛圖搆于表裏疾雷奮于肘腋然後誅除異義嵩奉明聖因人之望以號令天下誰敢不從小人維以七尺之軀三寸之舌立功立事而歸諸君子丈人謂為何如曄甚愕然熙先重曰昔毛琢竭節不容于魏武張溫畢議見逐于孫權彼二人者國之信臣時之俊乂豈疵瑕暴露言行玷缺然後至于禍哉皆以亷直勁正困于邪枉髙行妙節不得久容丈人之于本朝不深于二主人間雅譽有過于兩臣讒夫側目為日久矣比肩競逐庸可遂乎殷鐵一言而劉班碎首彭城斥逐徐童見疑彼豈父母之讐萬代之怨尋戈㧞棘自幼而然所爭不過榮名勢利先後之間耳及其末也唯恐䧟之不深發之不早戮及百口猶曰不厭是豈書籍逺事可為寒心悼慄者也今建大勲奉賢哲圖難于易以安易危比之太山而去累卵何苦不就且崇樹聖明至徳也身享宰相大業也授命幽居鴻名也比跡伊周美號也若夫至徳大業鴻名美號三王五伯所以覆軍殺將而爭之也一朝包括不亦可乎又有邇于此者愚則未敢道曄曰何謂熙先曰丈人奕葉清華而不得連姻帝室國家作禽獸相處丈人曾未恥之曄門無内行故熙先以此為激曄黙然自是情好遂密陰謀搆矣熙先專為謀主事露皆伏誅裴子野曰夫有逸羣之才必思冲天能之舉據盖俗之量則闇常均之下其導之以道將之以識作而不失于義行而無犯于禮殆難為乎若曄等忸志而貪權矜才以狥逆天方無釁以欲干時及罪暴刑行父子相哭累葉風素一朝而殞所謂智䏻翻為亡身之具心逆而險此之謂乎周大將軍郭榮奉使詣隋髙祖髙祖楊堅時為定州髙祖謂榮曰吾雅尚山水不好纓紱過藉時來遂叨名位願以時歸第以保餘年何如榮對曰今主上無道人懐危懼天命不常能者代有明公徳髙西伯望極國華方據六合以慰黎庶反效童兒女子投坑落穽之言耶髙祖大驚曰無妄言族矣及髙祖作相笑謂榮曰前言果中後竟代周室議曰昔武王至殷將戰紂之卒甚盛武王懼曰夫天下以紂為大以周為細以紂為衆以周為寡以周為弱以紂為强以周為危以紂為安以周為諸侯以紂為天子以此五短擊彼五長其可以濟功成事乎太公曰王無恐且懼所謂大者盡得天下之人所謂衆者盡得天下之衆所謂强者盡用天下之力所謂安者能得天下之欲所謂天子者天下相愛如父如子此之謂天子今日之為天下除殘去賊也周雖細曾殘賊一人不當乎武王大喜曰何謂殘賊太公曰收天下珠玉美女金銀綵帛藏之不休此謂殘也收暴虐之吏殺無罪之人非以法度此謂賊也由此言之茍為殘賊之行雖大亡也故知王者之勢不在衆寡有自來矣隋髙祖崩𦵏于太陵初疾也璽書徵漢王諒諒時鎮并州諒聞髙祖崩流言楊素簒位大懼以為詐也發兵自守陰謀為亂南襲蒲州取之諒初反也王頗説諒曰王之將吏家屬盡在闗西若用此等即宜長驅深入直據京師所謂疾雷不及掩耳若但欲割據舊齊之地宜任東人諒不從其言故敗也司兵參軍裴文安説諒曰兵以拙速不聞巧遲今梓宫尚在仁夀比其徵兵東進動移旬朔若驍勇萬騎卷甲宵征直指長安不盈十日不逞之徒擢授髙位付以心膂共守京城則山東府縣非彼之有然後大王鼓行而西聲勢一接天下可指麾而定也諒不從乃}
  - {type: variant, offset: 14708, length: 1, content: 比, WYG: 率大軍屯于并介之間上聞之大懼召賀若弼議之弼曰漢王先帝之子陛下之弟居連率之重摠方岳之任聲名震響為天下所服其舉事畢矣然而進取之䇿有三長驅入闗直㨿京師西拒六軍東收山東上䇿也如是則天下未可量頓大軍于蒲州使五千騎閉潼闗復齊舊境據而都之中䇿也如是以力爭議曰齊舊境謂北齊時境土也非今青州之齊也若親居太原徒遣其將來下䇿也如是成擒耳上曰公試為朕籌之計將何出弼曰蕭摩訶亡國之將不可與圖大事裴文安少年雖賢不被任用餘皆羣小顧戀妻孥茍求自安不能逺涉必遣軍來攻蒲州親居太原為之窟穴臣以為必出下䇿果如弼所籌乃以楊素為將破之議曰初漢王陰謀為亂聲言討素司馬皇甫誕諌曰大隋據有天下二十餘載兆庶乂安難以摇動一矣萬姓厭亂人思安樂雖舜禹更生其望未從二矣太子聡明神武名應圖䜟素曽不得捧轂庸敢生心三矣方今諸侯王列守州郡表裏相制勢不可舉四矣以兹四固鎮臨天下得興禍亂未之前聞也漢王不從故敗由此觀之天下無思亂之心土崩之釁雖有吴楚之衆猶不䏻成而况于么麽乎故先王貊其徳音勤恤民隠者蓋為是也隋煬帝親御六軍伐髙麗禮部尚書楚國公楊𤣥感據黎陽反李密説𤣥感曰天子逺征遼左地去幽州懸隔千里南有巨海之限北有胡戎之患中間一道路極艱危今公擁兵出其不意長驅入薊直扼其喉前有髙麗退無歸路不過旬日資粮必盡舉麾一召其衆自降不戰而剋計之上也一本云今車駕在遼東未聞斯舉分萬餘人電發捍臨渝闗絶其歸路不經一月倉廩必竭東拒大敵西廹我師進無所依退無所據百萬之衆可使為魚此不戰而屈人上䇿也闗中四塞天府之國有衛文昇不足為意今若率衆而入長安天子雖還失其襟帯據險臨之故當必剋萬全之䇿計之中也一本云自上君臨天下胥怨明公上將之子恩被黎元長驅入闗中䇿也若隨近逐便先向東都頓兵堅城之下勝負俱未可知此計之下也一本云樊子盖不達大體姦謀雄㫁據全周之地恃甲兵之强召之則不來攻之則不䧟頓兵牢城之下外無同力之師攻洛陽此下䇿也𤣥感利洛陽寶貨曰公之下䇿我之上䇿也遂圍之𤣥感失利宵潰王師追斬之議曰𤣥感之反也太白入南斗諺曰太白入南斗天子下殿走由是天下持兩端故三畧曰放言過之裴子野曰夫左道怪民幻挾罔誕足以動衆而未足以濟功今以諺觀之左道可以動衆者信矣故王者禁焉李密乃亡歸翟讓議曰太公稱利天下者取天下安天下者有天下愛天下者久}
