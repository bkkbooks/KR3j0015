  - {type: variant, offset: 14512, length: 0, content: '', WYG: 君臣無常位自古以然故詩曰髙岸為谷深谷為陵三后之姓于今為庶主所知也三后虞夏商也在易卦雷乗乾曰大壯乾下震上大壯震在上故曰雷乗乾也天之道也乾為天子震為諸侯而在乾上君臣易位猶人臣强壯若天上有雷也政在季氏于此君也四公矣民不知君何以得國}
