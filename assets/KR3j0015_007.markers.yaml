  - {type: variant, offset: 14718, length: 2, content: 戊巳, WYG: 為庖人矣若使庖人調和而食之則不可為庖矣霸王之君亦然誅暴而不私以封天下之賢者故可以為霸王若使霸王之君誅暴而私之則亦不可以為霸王矣由是觀之夫與之為取政之寶也今𤣥感利洛陽寳貨安得霸王之事哉隋煬帝初猜忌唐髙祖知之常懐危懼唐公為太原㽞守煬帝自遼東還徵唐公詣行在所遇患不瘳未得時謁唐公外甥王氏充選後宫煬帝問曰汝舅來何遲甥以實對帝曰可得死否髙祖知之每懐危懼也為太原留守以討擊不利恐為煬帝所譴甚憂之時太宗從在軍中知隋將亡潛圖義舉以安天下乃進曰大人何憂之甚也當今主上無道百姓愁怨城門之外皆已為賊獨守小節必且旦暮死亡若起義兵實當人欲且晉陽用武之地足食足兵大人居之此乃天授正可因機轉禍以就功業既天與不取憂之何益髙祖大驚深拒之太宗趨而出明}
