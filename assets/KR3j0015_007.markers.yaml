  - {type: variant, offset: 14706, length: 1, content: 德, WYG: 天下為度者也宋孔熙先者廣州刺史黙之子也有姦才善占星氣言江州分野出天子上當見弑于骨肉及大將軍彭城王義康幽于安城郡熈先謂為其人也遂說王詹事范曄曰先君昔去廣州朝謗紛紜藉大將軍深相救觧得免艱危曩受遺命以死報徳今主上昏僻殆天所棄大將軍英斷聰敏人神相屬失職南垂天下憤怨今人情騷動星文舛錯時至則不可拒此之謂乎若順天人之心收慕義之士内連寵戚外結英豪潛圖搆于表裏疾雷奮于肘腋然後誅除異義嵩奉明聖因人之望以號令天下誰敢不從小人維以七尺之軀三寸之舌立功立事而歸諸君子丈人謂為何如曄甚愕然熙先重曰昔毛琢竭節不容于魏武張溫畢議見逐于孫權彼二人者國之信臣時之俊乂豈疵瑕暴露言行玷缺然後至于禍哉皆以亷直勁正困于邪枉髙行妙節不得久容丈人之于本朝不深于二主人間雅譽有過于兩臣讒夫側目為日久矣比肩競逐庸可遂乎殷鐵一言而劉班碎首彭城斥逐徐童見疑彼豈父母之讐萬代之怨尋戈㧞棘自幼而然所爭不過榮名勢利先後之間耳及其末也唯恐䧟之不深發之不早戮及百口猶曰不厭是豈書籍逺事可為寒心悼慄者也今建大勲奉賢哲圖難于易以安易危比之太山而去累卵何苦不就且崇樹聖明至徳也身享宰相大業也授命幽居鴻名也比跡伊周美號也若夫至徳大業鴻名美號三王五伯所以覆軍殺將而爭之也一朝包括不亦可乎又有邇于此者愚則未敢道曄曰何謂熙先曰丈人奕葉清華而不得連姻帝室國家作禽獸相處丈人曾未恥之曄門無内行故熙先以此為激曄黙然自是情好遂密陰謀搆矣熙先專為謀主事露皆伏誅裴子野曰夫有逸羣之才必思冲天能之舉據盖俗之量則闇常均之下其導之以道將之以識作而不失于義行而無犯于禮殆難為乎若曄等忸志而貪權矜才以狥逆天方無釁以欲干時及罪暴刑行父子相哭累葉風素一朝而殞所謂智䏻翻為亡身之具心逆而險此之謂乎周大將軍郭榮奉使詣隋髙祖髙祖楊堅時為定州髙祖謂榮曰吾雅尚山水不好纓紱過藉時來遂叨名位願以時歸第以保餘年何如榮對曰今主上無道人懐危懼天命不常能者代有明公徳髙西伯望極國華方據六合以慰黎庶反效童兒女子投坑落穽之言耶髙祖大驚曰無妄言族矣及髙祖作相笑謂榮曰前言果中後竟代周室議曰昔武王至殷將戰紂之卒甚盛武王懼曰夫天下以紂為大以周為細以紂為衆以周為寡以周為弱以紂為强以周為危以紂為安以周為諸侯以紂為天子以此五短擊彼五長其可以濟功成事乎太公曰王無恐且懼所謂大者盡得天下之人所謂衆者盡得天下之衆所謂强者盡用天下之力所謂安者能得天下之欲所謂天子者天下相愛如父如子此之謂天子今日之為天下除殘去賊也周雖細曾殘賊一人不當乎武王大喜曰何謂殘賊太公曰收天下珠玉美女金銀綵帛藏之不休此謂殘也收暴虐之吏殺無罪之人非以法度此謂賊也由此言之茍為殘賊之行雖大亡也故知王者之勢不在衆寡有自來矣隋髙祖崩𦵏于太陵初疾也璽書徵漢王諒諒時鎮并州諒聞髙祖崩流言楊素簒位大懼以為詐也發兵自守陰謀為亂南襲蒲州取之諒初反也王頗説諒曰王之將吏家屬盡在闗西若用此等即宜長驅深入直據京師所謂疾雷不及掩耳若但欲割據舊齊之地宜任東人諒不從其言故敗也司兵參軍裴文安説諒曰兵以拙速不聞巧遲今梓宫尚在仁夀比其徵兵東進動移旬朔若驍勇萬騎卷甲宵征直指長安不盈十日不逞之徒擢授髙位付以心膂共守京城則山東府縣非彼之有然後大王鼓行而西聲勢一接天下可指麾而定也諒不從乃}
