  - {type: variant, offset: 14548, length: 0, content: '', WYG: 武諸將以損益克終非上有仁暴之異下有愚智之殊盖抑揚予奪使之然歟鍾㑹才見有限而太祖奬誘太過嘉其謀猷盛其名位授以重勢故㑹自謂算無遺䇿功在不賞輈張利害遂搆凶逆耳向太祖録其小能節以大禮抑之以權勢納之以􅁤度則逆心無由而生亂事無階而成也世祖曰然紞稽首曰陛下既然愚臣之言思堅氷之道無令如㑹之徒復致覆敗世祖曰當今豈有如㑹者乎紞曰陛下謀謨之臣捴戎馬之任者皆在陛下聖恩耳世祖黙然俄而徵華免官也晉懐帝時遼東太守龎本私憾東夷校尉李臻鮮卑索連木津等為臻興義實因而為亂遂攻䧟諸將大單于慕容廆之長子翰言于廆曰臣聞求諸侯莫若勤王自古有為之君靡不仗此以成事業者也今連津䟦扈王師覆敗蒼生屠膾豈甚此乎竪子外以龎本為名内實幸而為寇遼東傾没乘便二周中原兵亂州師屢敗勤王仗義此其時也單于宜明九伐之威救倒懸之命數連津之罪合義兵以誅之上則興復遼邦下則并呑二部忠義彰于本朝私利歸于我國此則吾鴻漸之始也終可以得志于諸侯廆善之遂誡嚴討連津斬之立遼東郡議曰古人稱始禍者死謂首亂先唱被姦雄不逞之輩外託義兵以除逆節内包荒悖因茲而起皆勤王助順用時取權者廆之謂矣後秦秦王苻生殺害忠良秦人度于一時如過百日權翼乃説東海王堅曰今主上昏虐天下離心有徳者昌無徳受殃}
