  - {type: variant, offset: 15609, length: 177, content: 斬瞻進軍到雒縣劉禪遂降後主用譙周策奉璽書於艾曰限分江漢遇值深過階緣蜀土計絕一隅干運犯冒漸苒歷載每惟黃初中宣溫密之詔申三好之恩開示門戶大義炳然而否德暗劣貪竊遺緒俯仰累紀未率大教天威既震人鬼歸能之數感駭王師神武所次敢不革面順以從命艾大喜報書曰王綱失道群英並起龍戰虎爭終歸真主此蓋天命去就之道也自古聖帝爰逮漢魏受命而王者莫不在乎中土河出圖洛出書聖人則之以興洪業, WYG: 哉}
