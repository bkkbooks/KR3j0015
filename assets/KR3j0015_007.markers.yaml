  - {type: variant, offset: 14728, length: 2, content: 臣聞, krp: 討捕其可盡乎賊既不盡自當獲罪且又世傳李氏姓膺圖籙李全才位望隆貴一朝族滅大人既能平賊即又功當不賞以此求活其可得乎髙祖意少解曰我一夜思量汝言大有道理今日破家滅身亦由汝化家為國亦由汝于是定計乃命太宗與晉陽令劉文靜及門下客長孫順徳劉𢎞基等募兵旬日之間衆且一萬斬留守副王威髙君雅以其詭請髙祖祈雨于晉祠將為不利故也用裴寂計准伊尹放太甲霍光廢昌邑故事尊煬}
  - {type: variant, offset: 14731, length: 0, content: '', WYG: 為太上皇立代王侑以安隋室傳檄諸郡以彰義舉秋七月以精甲三萬西圖闗中髙祖仗白旗誓衆于太原之野引師即路遂亡隋族造我區夏晉陽令劉文靜嘗竊觀太宗謂裴寂曰非常人也大度類于漢髙神武同于魏帝年雖少乃天縱也後文靜為李密親戚被禁太宗陰有異志入禁所看之文靜大喜亦覺太宗有非常之意因嘆曰天下大亂非有湯武髙光之才不能定也太宗知其意報曰卿安知無但恐常人不能别耳文靜起忭曰久知郎君乃潛龍也今時事如此正是騰躍之秋素禀膺籙之資仍懐撥亂之道此乃生人有息肩之望文靜知攀附之所太宗喜曰計將安出文靜對曰今李密長圍洛邑主上流播淮南大賊連州郡小盗阻山澤者以千萬數但須真主馭駕取之誠能應天順人舉旗大呼則四海不足定也今并州百姓避盗賊者皆入此城文靜為令數年知其豪傑一朝嘯集立地可數萬人尊公所領之兵復且數萬一言出口誰敢不從乗虚入闗號令天下不盈半嵗帝業可成太宗笑曰卿言善合人意于是部署賓客陰圖起義髙祖乃命文靜詐為煬帝勅發太原雁門馬邑數郡人二十已上五十以下悉為兵以嵗暮集涿郡由是人情大擾思亂者益衆又令文靜與裴寂詐作符勅出官監庫物以供留守資用因募兵集衆而起改旗幟以彰義舉又令文靜連突厥突厥始畢曰唐公舉義欲何為也文靜曰文皇帝廢冢嫡傳位後主因致斯禍亂唐公國之懿戚不忍坐觀成敗欲廢不當立者願與可汗兵馬同入京師人衆土地入唐公財帛金寶入突厥始畢大悦即遣兵随文靜而至兵威益盛矣由此觀之是知天下者非一人之天下也天下人之天下也所以}
  - {type: page-break, offset: 14731, content: '', id: KR3j0015_WYG_007-39a, image: WYG0849/WYG0849-0160c.png}
  - {type: page-break, offset: 14731, content: '', id: KR3j0015_WYG_007-39b, image: WYG0849/WYG0849-0160d.png}
