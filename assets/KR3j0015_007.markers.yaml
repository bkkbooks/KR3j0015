  - {type: variant, offset: 14733, length: 2, content: 五行, WYG: 必通三統明天命所受者博非獨一姓也昔孔子論詩至于殷士膚敏祼將于京喟然嘆曰富貴無常不如是王公其何以誡慎民萌其何以勸勉易曰安不忘危存不忘亾是以身安而國家可保也故知懼而思誡乃有國}
