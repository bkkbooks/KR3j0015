  - {type: variant, offset: 15136, length: 305, content: 應期受禪撫臨率士若綏之以文德而俟其變則平之不難矣吳蜀雖蕞爾小國依山阻水劉備有雄才諸葛亮善治國孫權識虛實陸遜見兵勢據險守要泛舟江湖皆難卒平也用兵之道先勝後戰量敵論將故舉無遺策臣竊料群臣無權備對雖以天威臨之未見萬全之勢昔舜舞干戚而有苗服臣以為當今宜先文後武文帝不納後果無功三苗國今岳州是也蜀相諸葛亮出斜谷屯渭南司馬宣王距之詔宣王但堅壁拒守以挫其鋒彼進不得志退無與戰久停則糧盡虜掠無所獲則必走矣走而追之以逸待勞全勝之道亮送婦人衣以怒宣王宣王將出戰辛毗杖節不許乃止宣王見亮使唯問寢食及事繁簡不及戎事使答曰笞罰二十以上皆親覽焉啖食不至數升宣王曰亮斃矣尋果卒也至甘露元年始以鄧艾為鎮西將軍距蜀將姜維維軍敗退守劍閣鍾會攻維不, WYG: ''}
