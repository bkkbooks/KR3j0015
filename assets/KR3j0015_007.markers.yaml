  - {type: variant, offset: 14521, length: 0, content: '', WYG: 衛國載其徳孔子著之不為不孝議曰亂臣賊子自古有之生而楚言可為痛哭者胡亥是也夫大行不細謹大徳不辭讓鄉曲各有宜而百官不同功故顧小而忘大後必有害狐疑猶豫後必有悔斷而敢行鬼神避之後有成功願子遂之也胡亥喟然嘆曰今大行未發豈宜以此事干丞相哉髙曰時乎時乎間不及謀嬴糧躍馬唯恐後時胡亥既然髙之言乃謂丞相斯曰上崩賜長子書與喪俱㑹咸陽而立為嗣書未行今上崩未有知者事將何如斯曰安得亡國之言耶髙曰君自料才能孰與蒙恬功髙孰與蒙恬謀逺不失孰與蒙恬無怨于天下孰與蒙恬長子舊而信之孰與蒙恬斯曰此五者皆不及蒙恬而君責之何深也髙曰髙故内官之厮役也幸得以刀筆之吏進入秦宫管事二十餘年未嘗見秦免罷丞相功臣有封及二世者也卒皆以誅亡皇帝二十餘子皆君之所知長子剛毅而武勇信人而奮事即位必用蒙恬為丞相君侯終不懐通侯之印歸于鄉里明矣髙}
