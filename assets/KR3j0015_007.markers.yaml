  - {type: variant, offset: 1765, length: 10906, content: 餘里光武聞之大驚讓漢曰賊若出兵綴公而以大眾攻尚尚破公即敗矣幸無他者急引兵還廣都詔書未到述果使其將謝豐攻漢使別將劫劉尚令不得相救漢乃閉營三日不出多樹旛旗使煙火不絕夜銜枚引兵與尚軍合豐等不覺明日乃分兵拒江北自將攻江南漢破之斬謝豐於是引還廣都以狀聞光武報曰公還廣都甚得其宜述必不敢略尚而擊公也若先攻尚公從廣都五十里悉步騎赴之適當值其疲困破之必矣自是漢與述戰於廣都之閒八戰八剋遂軍其郭中述乃悉散金帛募敢死士五千人以配延岑岑於市橋偽建旗幟鳴鼓挑戰而潛遣奇兵出吳漢軍後襲擊破漢漢墮水緣馬尾得出述乃自將攻漢三合三勝自旦及中軍士不得食並疲漢因命壯士突之述兵大敗也軍至成都述出戰初敗被刺洞胸死夷述妻子焚其宮室光武聞之怒以譴漢曰城降三日吏人服從一旦放兵縱火良失斬將弔人之義也乃下詔慰之其忠節志義之士並蒙旌顯李育以有才幹擢用之於是西土感悅莫不歸心焉范曄曰昔趙他王番禺公孫亦竊帝蜀漢推其無他功能而至於後亡者將以邊地處遠非王化之所先乎不能因隙立功以會時變方乃坐飾邊幅以高深自安昔吳起所以慚魏侯也及其謝群臣審廢興之命與夫泥首銜玉者異日談也至靈帝時政理衰缺王室多故雄豪角逐分裂疆宇以劉焉為益州牧焉魯恭王後也時四方兵寇焉以為刺史威輕乃建議改置牧伯鎮安方夏清選重臣以居其任以焉為益州牧是時梁州賊馬相聚疲役之人數千先殺綿竹令進攻雒縣州從事賈龍先領兵數千在犍為遂糾合吏人攻相破之乃選吏迎焉遂領益州牧也焉死子璋立州大吏趙韙等貪璋溫仁立為刺吏初南陽三輔人數萬戶流入益州焉悉收以為眾名曰東州兵璋性柔寬無威略東州人侵暴趙韙因人情不緝乃結州中大姓東州人畏見誅滅乃同心并力為璋殊死戰斬趙韙時張魯亦以璋懦弱不承順璋遂自雄於巴蜀也為劉備所圍遂降備遷璋於公安歸其財寶後以病卒初劉備為豫州牧也備字玄德涿郡涿縣人也少言語善下人喜怒不形於色徐州牧陶謙表先主為豫州牧後謙病使人迎先主先主曰袁公路近在壽春此君四世五公海內所歸君以州與之陳登曰袁公路驕豪非治亂之主今欲為使君合步騎十萬上可以匡主濟人成五霸之業下可以割地守境書功於竹帛若使君不見聽登亦未敢聽使君孔融謂先主曰袁公路豈憂國忘家者耶塚中枯骨何足介意今日之事百姓與能天與不取悔不可追遂領徐州陳登遣使詣袁紹曰天降災戾禍臻鄙州州將殂殞士人無主恐奸雄一旦乘隙以貽盟主日側之憂輒共奉平原相劉府君以為宗主永使百姓知有依歸方今寇難縱橫不遑釋甲謹遣下吏告執事紹答曰劉玄德宏雅有信義今徐州樂戴之誠副所望也為曹公所破走屯新野時劉表薨諸葛亮說攻琮荊州可有先主曰荊州臨亡託我以遺孤吾不忍也荊州人多歸先主先主日行十餘里或曰宜速行保江陵先主曰夫濟大事者以人為本今人歸吾何忍棄去習鑿齒曰劉主雖顛沛險難而信義愈明勢逼事危而言不失道追景升之顧則情感三軍戀赴義之士則甘與同敗視其所以結物情豈徒投醪撫塞含蓼問疾而已其終濟大業者不亦宜乎聞諸葛亮躬耕南陽乃三詣亮於草廬之中屏人言曰漢室傾頹姦臣竊命主上蒙塵孤不度德量力欲信大義行於天下而智術淺短遂用猖蹶至于今日然意猶未已君謂計將安出亮答曰自董卓已來豪傑並起跨州連郡者不可勝數曹操比於袁紹名微而眾寡然遂能剋紹以弱為強者非唯天時抑亦人謀也今操已擁百萬之眾挾天子而令諸侯傳云求諸侯莫如勤王此之謂也此誠不可與爭鋒孫權據有江東已歷三代國險而民附賢能為用此可與為援而不可圖也荊州北據江漢利盡南海東連吳會西通巴蜀此用武之國而其主不能守此殆天所以資將軍也益州嶮塞沃野天府之士高祖因之以成帝業劉璋闇弱張魯在北民殷國富而不知䘏智能之士思得明后將軍既帝室之冑信義著於四海總覽英雄思賢如渴若跨有荊益保其巖岨西和諸戎南撫夷越結好孫權內修政理天下有變則命上將將荊州之軍以向宛洛將軍身率益州之眾出於秦川百姓孰不簟食壺漿以迎將軍者乎誠如是則霸業可成漢室可興矣時曹公破荊州先主奔吳先主之奔吳也論者以孫權必殺之程昱料曰曹公無敵于天下初舉荊州威震江表權雖有謀不能獨當也劉備英雄也關羽張飛皆萬人之敵權必資以禦于我難解勢紛備資以成不可得殺也權果多與備兵以禦太祖時益州刺史劉璋聞曹公征荊州遣別駕張松詣曹公曹公時已定荊州走先主曹公不存錄松松勸璋自絕習鑿齒曰昔齊桓公一矜其功而叛者九國曹操漸自驕伐而天下三分皆勤之於數十年之內棄之于俯仰之頃豈不惜乎是以君子勞謙日昃慮以下人功高而居之以讓勢尊而守之以卑夫然後能有其富貴保其功業傳福百代何驕矜之有哉君子是以知曹操之不能遂兼天下也備用亮計結好孫權共拒曹公於赤壁破之曹公北還權乃以荊州業備周瑜上疏諫曰劉備以梟雄之姿而關羽張飛熊虎之將必非久屈為人用者愚謂大計宜徙置吳盛為築室多其美女玩好之物以娛其耳目分此三人各置一方使如瑜者得挾與攻戰大事可定也今猥割土地以資業之聚此三人俱在疆埸恐蛟龍得雲雨非復池中物也權以曹公在北方當廣攬英雄故不納也龐統說備曰荊州荒殘人物單盡東有吳孫北有曹氏鼎足之計難以得志今益州國富人強戶口百萬郡中兵馬所出畢具寶貨無求於外今可權借以定大事備曰今指與吾為水火者曹操也操以急吾以寬操以暴吾以仁操以譎吾以忠每與操反事乃可成耳今以小故而失信義於天下者吾所不取也統曰權變之時固非一道所能定也兼弱吞昧五伯之事逆取順守報之以義各事定後封以大國何負於信今日不取終為人利耳備乃使關羽守荊州欲自取蜀時孫權遺使報備欲共取蜀曰米賊張魯居王巴漢為曹操耳目規圖益州劉璋不能自守若操得蜀則荊州危矣今欲先攻取璋進討張魯首尾相運一統吳楚雖有十操無所憂也或說備宜報聽許吳終不能越荊有蜀蜀地可有也主薄殷觀曰若為吳先驅進未能克蜀返為吳所乘則大事去矣備從之拒答權曰益州民富國強土地阻險劉璋雖弱足以自守張魯虛偽未必盡忠于操若暴師於蜀漢轉運於萬里欲使戰克攻取舉不失利此吳起不能定其規孫武不能善其事今曹操三分天下有其二將飲馬滄海觀兵吳會而同盟無故自相攻伐借樞於操使敵乘其隙非計也權知備意乃止也會劉璋聞曹公向漢中討張魯內懷恐懼別駕張松說璋曰曹公兵強無敵於天下若因張魯之資以取蜀土誰能禦之劉豫州使君之宗室而曹公之深讎也若使之討魯魯必破魯破則益州強曹公雖來無能為也璋然之遣法正迎先主時黃權諫曰左將軍有梟名今以部曲遇之則不滿其心以客禮待之則一國不容二君若客有太山之安則主有壘卵之危願且閉境以待河清時劉巴亦諫曰備雄傑人也入必有為不可內也既入巴又曰若使備討張魯是放虎於山林也璋並不聽先主與璋會涪璋既還成都先主當為璋北征漢中統復說備曰陰選精兵晝夜兼道徑襲成都璋既不武又素無豫備大軍卒至一舉便定此上計也楊懷高沛璋之名將各仗強兵據守關頭聞數有牋來諫璋使發遣將軍還荊州將軍未至遣與相聞說荊州有急欲還救之並使裝束外作歸形此二子俱服將軍英名又喜將軍之去必乘輕騎來見將軍因此執之進取其兵乃向成都此中計也返還白帝連引荊州徐還圖之此下計也若沈吟不去將致大困不可久矣先主然其中計初張松法正見備備以私意接納盡其慇懃因問蜀中兵器府庫人馬眾寡及諸要害松等具為言之又畫地圖處置山川由是盡知益州虛實先主北到葭萌未即討魯厚樹恩德以收眾心明年曹公征孫權權呼先主自救備乃從璋求萬兵及資寶欲以東行救權璋但許兵四千其餘皆半給備因激怒其眾曰吾為益州征強敵師徒勤瘁不遑寧居今積帑藏之財而恡於賞功望士大夫為出死力戰其可得乎乃召璋白水軍督楊懷責以無禮斬之使黃忠等勒軍向璋先主徑至關質諸將士卒妻子引兵從忠等進到涪據其城璋所遣將皆破敗也即斬懷等自葭萌南還取璋時鄭度說璋曰左將軍襲我兵不滿萬士眾未附野穀是資計莫若盡驅巴西梓潼人內涪水以西其倉廩野穀一皆燒除高壘深溝靜以待之彼請戰不許久無所資不過百日必將自走走而擊之則必禽矣璋不用度計先主遂長驅所過必克而有巴蜀劉備襲蜀丞相掾趙戩曰劉備其不濟乎拙於用兵每戰必敗奔亡不暇何以圖人蜀雖小國險固四塞獨守之國難卒并也徵士傅幹曰劉備寬仁有度能得人之死力諸葛亮達理知變正而有謀而為之相張飛關羽勇而有義皆萬人敵而為之將此三人者皆人傑也以劉備之略三傑佐之何為不濟先主圍成都數十日璋出降蜀中殷盛豐樂先主置酒大饗士卒取蜀城中金銀分賜將士還其穀帛初攻劉璋備與士眾約曰若事定府庫百物孤無豫焉及拔成都士眾皆捨干戈赴諸藏競取寶物軍用不足備甚憂之劉巴曰易耳但當鑄直百錢平諸物價令吏為官市備從之數月之閒府庫充實先主領益州牧諸葛亮為股肱法正為謀主關羽張飛馬超為爪牙許靖糜竺簡雍為賓友董和黃權李嚴等本璋之授用也吳壹費觀等又璋之婚親也彭羕者又璋之所排擯也劉巴者宿昔之所忌恨也皆處之顯任盡其器能有志之士無不競勸也群臣勸先主稱尊號先主未許諸葛亮曰昔吳漢耿純等勸世祖即帝位世祖辭讓前後數四耿純進言曰天下英雄喁喁冀有所望如不從議者士大夫各歸求主無為從公也世祖感純言深至遂然諾之今曹氏篡漢天下無主大王劉氏苗族紹世而起即帝位乃其宜也士大夫久勤苦者亦望尺寸之功名如純言耳先主於是即帝位譙周等勸進云臣父群未亡時言西南數有黃氣直立數丈見來積年時時有景雲祥風從璇璣下應之此為異瑞又二十二年中數有氣如旗從西竟東中天而行圖書曰必有天子出其方是年太白熒惑鎮星常從歲星相追近漢初興五星從歲星謀歲星主義漢位在西義之上方故漢法常以歲星候人主當有聖主起於此州以致季興時許帝尚存故群下不敢漏言頃者熒惑復追歲星見在胃昴胃昴為天綱經曰帝王處之眾邪消亡願大王應天順人速即洪業以寧海內也時曹公拔漢中初魏太祖破張魯於漢中劉曄進計曰明公北破袁紹南征劉表九州百郡十并其八威震天下勢懾海外今舉漢中蜀人望風破膽失守推此而前蜀可傳檄而定劉備人傑也有度而遲得蜀日淺蜀人未附人心震恐其勢自傾因其傾而壓之無不克也若小緩之諸葛孔明明於治體關羽張飛勇冠三軍武毅以威之文德以撫之據嶮守要不可犯矣今時不取必有後憂太祖不從居七日蜀降者言蜀中驚擾雖斬之猶不禁太祖又問曄曰蜀可伐否對曰今以小安不可動也法正說先主曰曹操一舉降張魯定漢中不因此勢以圖巴蜀而留夏侯淵張郃屯守身遽北還此非其智不逮力不足也將內有憂逼故耳今算淵郃才略不勝國之將率舉眾往討則必剋之剋之日廣農積穀觀釁伺隙上可以傾覆寇敵尊獎王室中可以蠶食雍涼廣境拓土下可以固守要害為持久之計此蓋天以與我時不可失也先主善其策乃率諸將進兵漢中正亦從行先主由陽平南渡沔水緣山稍前於定軍山作營淵將兵來爭其地正曰可擊矣先主命黃忠乘高鼓譟攻之大破淵軍淵等授首遂奄有梁漢時魏使夏侯楙鎮長安蜀將魏延就諸葛亮請兵從襃中出循秦嶺而東當子午而北以襲長安亮不許魏略曰夏侯楙為安西將軍鎮長安諸葛亮於南鄭與群下計議魏延曰聞夏侯楙少主婿也怯而無謀今假延精兵五千負糧五千直從襃中出循秦嶺而東當子午而北不過十日可到長安聞延奄至必乘船逃走長安唯有御史京兆太史耳橫門邸閣與散人之穀足周食也比東方相合聚尚二十許日而公從斜谷來亦足以達如此則一舉而咸陽以西可定矣亮以為懸絕不如安從坦道可以平取隴右萬全必剋而無虞故不用延計也延每隨亮出輒欲請兵萬人與亮異道會于潼關如韓信故事亮制而不許延常謂亮為怯歎恨己才用之不盡也其後吳孫權襲關羽取荊州劉備令關羽鎮守荊州吳將呂蒙拜漢昌太守與關羽分土接境知羽梟雄有兼并心且居上流其勢難久蒙乃密陳計策曰今征虜守南郡潘璋將游兵人循江上下應敵所在蒙為國家前據襄陽如此何憂於操何賴於羽將軍圖之會羽討樊留兵將備南郡蒙上疏曰羽討樊而多留備兵必恐蒙圖其後故也蒙常有病乞分眾還建業以治病為名羽聞之必撤備兵盡赴襄陽大軍浮江晝夜驅上襲其空虛則南郡可下而羽可擒也遂稱病篤權乃露檄召蒙還陰與圖計羽果信之稍撒兵赴樊權遂遣蒙在前伏其精兵于䑦𦪇中使白衣搖櫓作商賈服晝夜兼行至羽所置江邊屯候盡縛之是故羽不聞知蒙入據城盡得羽將士家屬皆撫慰約令軍不得干歷人家有所求取羽還在道路權使人與蒙相聞蒙輒厚遇其使羽使人還咸知家門無恙見待過于平時故羽吏士無鬭心皆委羽而降即父子俱獲初孫權之討羽也遣使報魏云欲討關羽自效乞不漏露今羽有備群臣咸言密之是宜董昭曰軍事尚權期於合宜宜露其事羽聞權上即當還護其城圍得速解便獲其利可使兩賊相持我乘其弊若密而不露使權得志非計之上也乃使射書于圍中及羽屯內侯猶豫未去陸遜至破江陵羽走至臨沮為吳將潘璋所殺也先主怒吳伐之敗績還蜀至永安而崩初魏文帝聞備東下與孫權交戰樹柵連營七百餘里謂群臣曰備不曉兵機豈有七百里營可以距敵乎包原隰阻險而為軍者為敵所擒此兵法所忌孫權上事今至矣後七日權破備於夷陵書至後主禪即位下詔曰朕聞善積者昌禍積者喪古今常數也曩者漢祚中微網漏凶慝董卓造難震蕩京畿曹操階禍竊執天衡子丕孤豎敢尋亂階盜據神器更姓改物世濟其凶當此之時天下無主則我帝命殞越于下昭烈皇帝光演文武存復祖業誕膺皇綱不墜于地萬國未靖早世遐殂朕以幼沖繼統鴻業未習保傅之訓而嬰祖宗之重光載前緒未有攸濟朕甚懼焉諸葛丞相宏毅忠壯忘身憂國今授之以旄鉞之重付之以專命之權統領步騎二十萬眾董督元戎龔行天伐除患寧亂克復舊都在此行也伐其元帥弔其殘人他如詔書律令者也先是吳主孫權請和吳使張溫使蜀權謂溫曰卿不宜遠出恐諸葛孔明不知吾所以與曹氏通意故屈卿行人之義受命不受辭也對曰臣入無腹心之規出無專對之用懼無張老延譽之功又無子產陳事之效然諸葛亮達見計數必知神慮屈伸之宜加受朝廷天覆之惠推亮之心必無疑貳溫至蜀詣闕拜章曰昔高宗以諒陰昌殷祚於中興成王以幼沖隆周德於太平今陛下以聰明之姿等契往古總百揆於良佐參列精之炳耀遐邇望風莫不忻賴吳國勤任膂力清澄江滸願與有道平一宇內委心協規有如河水使下臣溫通致情好陛下敦崇禮義未便恥忽臣自入達境及即近郊頻蒙勞來以榮自懼蜀使馬良使吳良謂亮曰今銜國命協穆二家幸為良介於孫將軍亮曰君試自為文良即草曰寡君遣椽馬良通聘繼好以紹昆吾豕韋之勳其人吉士荊楚之令鮮於造次之華而有克終之美願降心存納以慰將命權大敬待之也丞相諸葛亮慮權聞先主殂有異計乃遣鄧芝修好於權權果狐疑不時見芝芝自表請見權語芝曰孤誠願與蜀和親然恐蜀主幼弱國小勢逼為魏所乘不自保全以此猶豫耳芝對曰吳蜀二國四州之土大王命世之英諸葛亮一時之傑也蜀有重險之固吳有三江之阻合此二長共為脣齒進可兼并天下返可鼎足而立此理勢之自然也大王今若委質於魏魏必上望大王之入朝下求太子之內侍若其不從則奉辭伐叛蜀必順流見可而進如此江南之地非復大王之有也權默然良久曰君言是也遂自絕魏與蜀連和時司徒華歆司空王朗等與諸葛亮書陳天命欲使舉國稱蕃亮不答書作正議曰昔在項羽起不由德雖處華夏秉帝者之勢卒就湯鑊為後來戒魏不審鑒今次之矣免身為幸滅在子孫而二三子多逞蘇張詭靡之說奉進驩兜滔天之辭欲以誣毀唐帝諷解禹稷所以徒懷文藻煩勞翰墨大雅君子所不為也又軍志曰萬人必死橫行天下昔軒轅氏挈卒數萬制四帝定海內況以數十萬之眾據正道而臨有罪可得干擬者哉亮死後魏令鄧艾伐蜀蜀兵敗後主用譙周策降魏議曰國君為社稷死則死為社稷亡則亡譙周勸後主降魏可乎孫盛曰春秋之義國君死社稷卿大夫死位況稱天子而辱於人乎周調萬乘之君偷生苟存亡禮喜利要冀微榮惑矣且以事勢言之理有未盡何者禪雖庸主實無桀紂之酷戰雖屢北未有土崩之亂縱不能君臣固守背城一戰自可退次東鄙以思後圖是時羅憲以重兵據白帝霍弋以強卒鎮夜郎蜀土險狹山水峻隔絕巇激湍非步卒所涉若悉收舟楫保據江州徵兵南中乞師東國如此則姜廖五將自然雲從吳之二師承命電赴何投寄之無所而慮於必亡耶魏師之來搴國大舉欲追則舟楫靡資欲留則師老多虞且屈伸有會情勢代起徐因思舊之人以攻驕惰之卒此昭王所以走闔閭田單所以摧騎劫也何為忿忿遽自囚虜下堅壁于敵人致斫石之至恨哉葛生有云事不濟即已耳安能復為之下壯哉斯言可以立懦夫之志矣觀古燕齊荊越之敗或國覆主滅或魚懸鳥竄終能建功立業匡復社稷豈曰天助抑人謀也向使懷苟存之計納譙周之言何頹基之能搆令名之可獲哉禪既闇主周實駑臣方之申包胥田單范蠡大夫種不亦遠乎晉時李特復據蜀初特在蜀暴橫晉乃募取特兄弟許以重賞未暇宣聞遂不藏本特子驤見書悉改其購云敢斬六郡人頭首李任閻趙等及氐叟王一人詣官許以重賞六郡人見之大駭遂並反歸特益州牧羅尚遣隗伯攻李雄於郫城迭有勝負冬十月雄與朴泰金鞭之流血令泰佯得罪奔尚欲為內應尚信之以兵隨泰雄內外擊之大破尚軍雄乘勝追躡夜至城下因稱萬歲誑尚城中云已得郫城尚信之開少城門雄軍得入尚遂遁走遂剋成都稱王也晉桓溫滅之至宋義熙中譙縱又殺益州刺史毛璩于成都稱成都王初毛璩使任約赴義軍軍至枝江會劉毅敗約奔桓振璩聞約奔桓振也自將兵三千由外水下譙縱為之參軍使將梁州兵五百人從內水發梁州人不欲東遂推縱為主反攻涪城剋之璩聞難作自略陽城步還至成都為縱黨所殺也宋使朱齡石滅之此蜀國形也議曰吳蜀脣齒之國蜀滅則吳亡信乎陸士衡曰夫蜀蓋蕃援之與國而非吳人之存亡也何則其郊境之接重山積險陸無長轂之徑川隘流汛水有驚波之難雖有銳師百萬啟行不過千夫舳艫千里前馳不過百艦故劉氏之伐陸公譬之長蛇其勢然也故黃權稱曰可以往難以反此兵之挂地也古云夫道狹路險譬如兩鼠鬭於穴將勇者勝也吳丑為星紀吳越之分上應斗牛之宿下當少陽之位今之會稽九江丹陽豫章廬江廣陵六安臨淮皆吳之分野今蒼梧鬱林合浦交趾九真日南南海皆越之分野古人有言曰大江之南五湖之閒其人輕心揚州保強保恃也三代要服不及以正國有道則後服無道則先叛故傳曰吳為封豕長蛇荐食上國為上國之患非一日之積也漢高帝時淮南王英布反布都六安今壽州是也反書聞上召諸將問布反為之奈何汝陰侯滕公曰臣客故楚令尹薛公有籌策可問初滕公問令尹令尹曰是故當反滕公曰上裂地而王之疏爵而賞之南面而立萬乘之主其反何也令尹曰往年殺彭越前年殺韓信此三人同功一體之人也自疑禍及故反耳上乃召見問薛公薛公對曰布反不足怪也使布出於上計山東非漢之有也出於中計勝敗之數未可知也出於下計陛下安枕而臥矣上曰何謂上中下計令尹曰東取吳蘇州是也西取楚荊州是也并齊取魯齊青州魯兗州傳檄燕趙固守其所山東非漢之有也議曰合從山東為持久之策上計也何謂中計東取吳西取楚并韓取魏據廒倉之粟塞成皋之口勝敗之數未可知也議曰長驅入洛以決一朝之戰中計也何謂下計東取吳西取下蔡歸重於越身歸長沙陛下安枕而臥漢無事矣議曰自廣江表無窺中原之心下計也桓譚新論曰世有圍棋之戲或言是兵法之類也及為之上者遠棋疏張置以會圍因而伐之成多得道之勝中者則務相絕遮要以爭便求利故勝敗狐疑須計數而定下者則守邊隅趨作罫以自生於小地然亦不如察薛公之言上計云取吳楚并齊魯及燕趙者此廣道地之謂中計云取吳楚并韓魏塞成皋據敖倉此趨遮要爭利者也下計云取吳下蔡據長沙以臨越此守邊隅趨作罫者也罫音為卦反上曰是計將安出令尹對曰出下計上曰何為廢上中計而出下計令尹曰布故酈山之徒也自致萬乘之國此皆為身不顧其後為萬世慮者故曰出下計上曰善果如策乃封薛公千戶也是後吳王劉濞以子故而反初發也其大將田祿伯曰兵屯聚而西無他奇道難以就功臣願得奇兵五萬人別循江淮而上收淮南長沙入武關與大王會此亦一奇也吳王太子諫曰王以反為名此兵難以藉人藉人亦且反王吳王不許其少將桓將軍復說吳王曰吳多步兵步兵利險阻漢多車騎車騎利平地願大王所過城邑不下宜棄去疾西據雒陽武庫食敖倉之粟阻山河之險以令諸侯雖無入關天下固已定矣即大王徐行留下城邑漢車騎至馳入梁楚之郊事敗矣王問諸老諸老曰此年少摧鋒之計耳安知大慮吳王不從桓將軍之計乃自并將其兵漢以太尉周亞夫擊吳楚亞夫用其父客計遂敗吳客計在霸紀上淮南王劉安怨望其父厲王長死謀為叛逆問伍被曰吾舉兵西向諸侯必有應者即無奈何被曰南收衡山衡州以擊廬江廬州有潯陽之船守下雉之城在江夏縣名也結九江之浦絕豫章之口洪州是也強弩臨江而守以禁東郡之下東收江都揚州也會稽越州也南通勁越屈強江淮閒猶可一舉得延歲月之壽王曰善未得發會事泄誅至後漢靈獻時閹人擅命天下提契政在家門何進謀誅閹宦太后不從進乃召董卓詣京師以脅迫太后密令卓上書曰中常侍張讓等竊幸乘寵濁亂海內昔趙鞅興晉陽之甲以逐君側之惡臣輒鳴鍾鼓如洛陽討讓等罪卓未至進敗及卓到遂廢立天下亂矣議曰家門大夫也時長沙太守孫堅殺南陽太守張咨袁術得據其郡堅與術合縱欲襲奪劉表荊州堅為流矢所中死初劉表據荊州也聞江南賊盛謂蒯越等曰吾欲徵兵恐不集其策焉出對曰眾不附者仁不足也附而不理者義不足也苟仁義之道行百姓歸之如水之趨下何患不附袁術勇而無謀宗賊貪暴為下所患若示之以利必以眾來君誅其無道撫而用之人有樂存之心必襁負而至兵強士附南據江陵北守襄陽八郡可傳檄而定術等雖至無能為也後果然孫堅死子策領其部曲擊揚州刺史劉繇破之因據江都策聞袁術將欲僭號與書諫曰昔董卓無道陵虐王室禍加太后暴及宏農天子播越宮廟焚毀是以豪傑發憤沛然俱起然而河北異謀於黑山曹操毒被於東徐劉表僭亂於荊南公孫叛逆於朔北正禮阻兵玄德爭盟當謂使君與國同規而舍是弗恤莞然有自取之志懼非海內企望之意昔成湯討桀猶云有夏多罪武王伐紂曰殷有重罰此二王者雖有聖德假時無失道之過無由逼而取也今主上非有惡于天下徒以幼小脅于強臣異於湯武之時也使君五世相承為漢宰輔榮寵之盛莫與為比宜效忠節以報王室術不納策遂絕之也策聞魏太祖與袁紹相持於官渡將渡江襲許未濟為許貢客所殺初策有是謀也眾皆懼魏謀臣郭嘉料之曰策英雄豪傑能得人死力然輕而無備雖有百萬之眾無異于獨行中原若刺客伏起一人之敵耳以吾觀之必死于匹夫之手果為許貢客所殺也策死弟權領其眾時吳割據江南席卷交廣也屬曹公破袁紹兵威日盛乃下書責孫權求質張昭等會議不決權乃獨將周瑜詣其母前定議瑜曰昔楚國初封于荊山之側不滿百里之地繼嗣賢能廣土開境立基於郢遂據荊揚至於南海傳業延祚九百餘年今將軍乘父兄餘資兼六郡之眾兵精糧多將士用命鑄山為銅煮海為鹽境內富饒人不思亂沈舟舉帆朝發夕到士風勁勇所向無前有何逼迫而欲送質質子一入不得不與曹氏曹氏命召不得不往便見制於人也豈與南面稱孤同哉不如勿與徐觀其變若曹氏率義以正天下將軍事之未晚若圖為暴亂兵猶火也不戢必將自焚韜勇枕威以待天命何送質之有權母曰公瑜議是也遂不送質策薨權年少初統事太妃憂之引見張昭董襲等問曰江東可保安不襲對曰江東地勢有山川之固而討逆明府恩德在人討虜承基大小用命張昭秉眾襲等為爪牙此地利人和之時也萬無所憂眾皆壯其言也後曹公入荊州劉琮舉眾降初劉表死魯肅進說曰夫荊楚與我鄰接水流順北外帶江漢內阻山陵有金城之國沃野萬里士人殷富若據而有之此帝王之資也肅請得奉命弔表二子并慰勞軍中用事者說劉備使撫養表眾共拒曹操肅未到琮已降也曹操得其水軍船步卒數十萬吳將士聞之皆恐孫權延見群下問以計策議者咸曰曹公豺虎也托名漢相挾天子以征四方動以朝廷為辭今日拒之事更不順且將軍大勢可以拒操者長江也今操得荊州奄有其地劉表治水軍蒙衝鬭艦乃以千數操悉以沿江兼有步兵水陸俱下此為長江之險已與我共之矣而勢力眾寡又不可論愚謂大計不如迎之周瑜曰不然操雖託名漢相其實漢賊將軍以神武之雄才兼仗父兄之烈割據江東地方數千里精兵足用英豪樂業尚當橫行天下為漢家除殘去穢況操自送死而可迎之耶請為將軍籌之今使北土已安操無內憂能曠日持久來爭疆埸又能與我決勝負於舟楫可也今北上既未安馬超韓遂尚在關西為操後患且捨鞍馬仗舟楫與吳越爭衡本非中國所長又今盛寒馬無藁草驅中國士眾遠涉江湖之閒不習水土必生疾病此數四者用兵之患也而操皆冒行之將軍擒操宜在今日瑜請得精兵三萬人進住夏口保為將軍破之權曰老賊欲廢漢自立久矣徒忌二袁呂布劉表與孤耳今數雄已滅唯孤尚存孤與老賊勢不兩立君言當擊甚與孤合此天以君授孤也時權軍柴桑劉備在樊曹公南征劉表會表卒子琮舉眾降先主不知曹公卒至至宛乃聞之遂率其眾南行為曹公所追破劉備至夏口諸葛亮曰事急矣請奉命求救孫將軍遂見說曰將軍起兵江東劉豫州亦收眾漢南與曹操並爭天下今操芟夷大難略已平矣遂破荊州威震四海英雄無所用武故豫州遁逃至此將軍量力而處之若能與吳越之眾與中國爭衡不如早與之絕若不能當何不按兵束甲北面而事之今將軍外托服從之名而內懷猶豫之計事急而不斷禍至無日矣權曰苟如君言劉豫州何不遂事之乎亮曰田橫齊之壯士耳猶守義不辱況劉豫州王室之冑英才蓋世眾士慕仰若水之歸海若事之不濟此乃天也安得復而為人之下權勃然曰吾不能舉全吳之地十萬之眾受制於人吾計決矣非劉豫州莫可以當曹操者然豫州新敗之後能抗此難乎亮曰豫州軍雖敗於長阪今戰士還者及關羽所將精甲萬人劉琦合江夏戰士亦不下萬人曹操之眾遠來疲弊聞追豫州騎一日一夜行三百里此所謂強弩之末不能穿魯縞者也故兵法忌之曰必蹶上將軍且北方人不習水戰又荊州之人附操者逼兵勢耳非心服也今將軍誠命猛將統兵數萬與豫州協規同力破操軍必矣操軍破必北還如此則荊吳之勢強鼎足之形成成敗之機在於今日權大悅即遣周瑜魯肅隨亮詣先主并力拒曹公也周瑜等水軍三萬與劉備并力距曹公用黃蓋火攻策遂破曹公於赤壁初一日交戰曹公軍破返引次江北瑜等在南岸瑜步將黃蓋曰今寇眾我寡難與持久然觀操軍方連船艦首尾相接可燒而走也乃取蒙衝鬭艦數十艘實以薪草膏灌其中裹以帷幕上建牙旗先書報曹公欺以欲降蓋又豫便走舸各繫火船後因引次俱前曹公軍吏士皆延頸觀望指言蓋降去北軍二里餘同時發火火烈風猛船至如箭飛埃絕燄燒盡北船延燒岸上營落頃之煙燄漲天人馬燒溺死者甚眾瑜率輕銳尋係其後雷鼓大進曹公留曹仁等守江陵徑自北歸周瑜又進南郡與仁相對仁遂退也曹公敗徑北還權遂虎視江表時劉璋為益州牧外有張魯寇侵瑜乃詣京見權曰今曹操新衄方憂腹心未能與將軍連兵相事也乞與奮威俱進取蜀得蜀而并張魯留奮威固守其地好與馬超結援瑜與將軍據襄陽以蹙曹北方可圖也權許之會瑜卒不果也初周瑜薦魯肅才宜佐時權即引肅對飲曰今漢室傾危四方雲擾孤承父兄遺業思有桓文之功君既惠顧何以佐之肅對曰昔高帝區區欲尊事義帝而不獲者以項羽為害也今之曹操猶昔項羽將軍何由得為桓文乎肅竊料之漢室不可復興猶曹操不可卒除將軍為計惟有鼎足江東以觀天下之釁規模如此亦自無嫌然後建號帝王以圖天下此高帝之業也及是平一江滸稱尊號臨壇顧謂公卿曰昔魯子敬嘗道此可謂明於事勢矣議曰陸士衡稱孫權執鞭鞠躬以重陸公之威悉委武衛以濟周瑜之師卑官菲食以豐功臣之賞披懷虛己以納謀士之算屏氣跼蹐以伺子明之疾分滋損味以育淩統之孤是以忠臣競盡其能志士咸得肆力而帝業固矣黃石公曰賢人之政降人以體聖人之政降人以心體降可以圖始心降可以保終降體以體降心以心由此觀之孫權執鞭鞠躬降體者也披懷虛己心降者也善終令始不亦宜乎黃武元年魏使大司馬曹仁步騎數萬向濡須濡須督朱桓破之初曹仁欲以兵襲取中洲偽先揚聲欲東攻羨溪桓分兵赴羨溪既發卒而仁奄至諸將業業各有懼心桓喻之曰凡兩軍交戰勝負在將不在眾寡諸君聞曹仁用兵孰與桓耶兵法所以稱客倍而主人半者謂俱在平原無城池之守又謂士眾勇怯齊等故耳今仁既非智勇加其士卒甚怯又千里步涉人馬疲困桓與諸將共據高城南臨大江北背山林以逸待勞為主制客此百戰百勝之勢也桓因偃旗鼓外示虛弱以誘致仁仁果遣子泰攻濡須城分遣諸將襲中洲中洲者部曲妻子所在泰等退桓遂梟其諸將也七年又使大司馬曹休騎十萬至皖城迎周魴魴欺之無功而返吳鄱陽太守周魴譎誘遭休休迎魴至皖城知見欺當引軍還自負眾盛邀於一戰朱桓進計於元帥陸遜曰休本以親威見任非智勇名將也今戰必敗敗必走走道當由夾石挂車此兩道地皆阨險若以萬兵柴路則彼眾必盡而休可生虜臣請將所部以斷之若蒙天威得以休自效便可乘勝長驅進取壽春割有淮南以窺許洛此萬代一時不可失也權先與陸遜以議遜以為不可故計不施行也至權薨皓即位窮極淫侈割剝蒸人崇信姦回賊虐諫輔晉世祖令杜預等伐吳滅之議曰昔魏武侯浮西河顧謂吳起曰山河之固此魏國之寶也吳起對曰昔三苗氏左洞庭而右彭蠡德義不修禹滅之夏桀之君左河濟右太華伊闕在其南羊腸在其北仁政不修湯放之由此觀之在德不在險今孫皓席父祖之資有天阻之固西距巫峽東負滄海長江判其區宇峻山帶其封域地方幾萬里荷戟將百萬而一朝棄甲面縛於人則在德之言為不刊之典耶對曰何為其然陸機曰, WYG: ''}
  - {type: variant, offset: 1765, length: 10906, content: 餘里光武聞之大驚讓漢曰賊若出兵綴公而以大眾攻尚尚破公即敗矣幸無他者急引兵還廣都詔書未到述果使其將謝豐攻漢使別將劫劉尚令不得相救漢乃閉營三日不出多樹旛旗使煙火不絕夜銜枚引兵與尚軍合豐等不覺明日乃分兵拒江北自將攻江南漢破之斬謝豐於是引還廣都以狀聞光武報曰公還廣都甚得其宜述必不敢略尚而擊公也若先攻尚公從廣都五十里悉步騎赴之適當值其疲困破之必矣自是漢與述戰於廣都之閒八戰八剋遂軍其郭中述乃悉散金帛募敢死士五千人以配延岑岑於市橋偽建旗幟鳴鼓挑戰而潛遣奇兵出吳漢軍後襲擊破漢漢墮水緣馬尾得出述乃自將攻漢三合三勝自旦及中軍士不得食並疲漢因命壯士突之述兵大敗也軍至成都述出戰初敗被刺洞胸死夷述妻子焚其宮室光武聞之怒以譴漢曰城降三日吏人服從一旦放兵縱火良失斬將弔人之義也乃下詔慰之其忠節志義之士並蒙旌顯李育以有才幹擢用之於是西土感悅莫不歸心焉范曄曰昔趙他王番禺公孫亦竊帝蜀漢推其無他功能而至於後亡者將以邊地處遠非王化之所先乎不能因隙立功以會時變方乃坐飾邊幅以高深自安昔吳起所以慚魏侯也及其謝群臣審廢興之命與夫泥首銜玉者異日談也至靈帝時政理衰缺王室多故雄豪角逐分裂疆宇以劉焉為益州牧焉魯恭王後也時四方兵寇焉以為刺史威輕乃建議改置牧伯鎮安方夏清選重臣以居其任以焉為益州牧是時梁州賊馬相聚疲役之人數千先殺綿竹令進攻雒縣州從事賈龍先領兵數千在犍為遂糾合吏人攻相破之乃選吏迎焉遂領益州牧也焉死子璋立州大吏趙韙等貪璋溫仁立為刺吏初南陽三輔人數萬戶流入益州焉悉收以為眾名曰東州兵璋性柔寬無威略東州人侵暴趙韙因人情不緝乃結州中大姓東州人畏見誅滅乃同心并力為璋殊死戰斬趙韙時張魯亦以璋懦弱不承順璋遂自雄於巴蜀也為劉備所圍遂降備遷璋於公安歸其財寶後以病卒初劉備為豫州牧也備字玄德涿郡涿縣人也少言語善下人喜怒不形於色徐州牧陶謙表先主為豫州牧後謙病使人迎先主先主曰袁公路近在壽春此君四世五公海內所歸君以州與之陳登曰袁公路驕豪非治亂之主今欲為使君合步騎十萬上可以匡主濟人成五霸之業下可以割地守境書功於竹帛若使君不見聽登亦未敢聽使君孔融謂先主曰袁公路豈憂國忘家者耶塚中枯骨何足介意今日之事百姓與能天與不取悔不可追遂領徐州陳登遣使詣袁紹曰天降災戾禍臻鄙州州將殂殞士人無主恐奸雄一旦乘隙以貽盟主日側之憂輒共奉平原相劉府君以為宗主永使百姓知有依歸方今寇難縱橫不遑釋甲謹遣下吏告執事紹答曰劉玄德宏雅有信義今徐州樂戴之誠副所望也為曹公所破走屯新野時劉表薨諸葛亮說攻琮荊州可有先主曰荊州臨亡託我以遺孤吾不忍也荊州人多歸先主先主日行十餘里或曰宜速行保江陵先主曰夫濟大事者以人為本今人歸吾何忍棄去習鑿齒曰劉主雖顛沛險難而信義愈明勢逼事危而言不失道追景升之顧則情感三軍戀赴義之士則甘與同敗視其所以結物情豈徒投醪撫塞含蓼問疾而已其終濟大業者不亦宜乎聞諸葛亮躬耕南陽乃三詣亮於草廬之中屏人言曰漢室傾頹姦臣竊命主上蒙塵孤不度德量力欲信大義行於天下而智術淺短遂用猖蹶至于今日然意猶未已君謂計將安出亮答曰自董卓已來豪傑並起跨州連郡者不可勝數曹操比於袁紹名微而眾寡然遂能剋紹以弱為強者非唯天時抑亦人謀也今操已擁百萬之眾挾天子而令諸侯傳云求諸侯莫如勤王此之謂也此誠不可與爭鋒孫權據有江東已歷三代國險而民附賢能為用此可與為援而不可圖也荊州北據江漢利盡南海東連吳會西通巴蜀此用武之國而其主不能守此殆天所以資將軍也益州嶮塞沃野天府之士高祖因之以成帝業劉璋闇弱張魯在北民殷國富而不知䘏智能之士思得明后將軍既帝室之冑信義著於四海總覽英雄思賢如渴若跨有荊益保其巖岨西和諸戎南撫夷越結好孫權內修政理天下有變則命上將將荊州之軍以向宛洛將軍身率益州之眾出於秦川百姓孰不簟食壺漿以迎將軍者乎誠如是則霸業可成漢室可興矣時曹公破荊州先主奔吳先主之奔吳也論者以孫權必殺之程昱料曰曹公無敵于天下初舉荊州威震江表權雖有謀不能獨當也劉備英雄也關羽張飛皆萬人之敵權必資以禦于我難解勢紛備資以成不可得殺也權果多與備兵以禦太祖時益州刺史劉璋聞曹公征荊州遣別駕張松詣曹公曹公時已定荊州走先主曹公不存錄松松勸璋自絕習鑿齒曰昔齊桓公一矜其功而叛者九國曹操漸自驕伐而天下三分皆勤之於數十年之內棄之于俯仰之頃豈不惜乎是以君子勞謙日昃慮以下人功高而居之以讓勢尊而守之以卑夫然後能有其富貴保其功業傳福百代何驕矜之有哉君子是以知曹操之不能遂兼天下也備用亮計結好孫權共拒曹公於赤壁破之曹公北還權乃以荊州業備周瑜上疏諫曰劉備以梟雄之姿而關羽張飛熊虎之將必非久屈為人用者愚謂大計宜徙置吳盛為築室多其美女玩好之物以娛其耳目分此三人各置一方使如瑜者得挾與攻戰大事可定也今猥割土地以資業之聚此三人俱在疆埸恐蛟龍得雲雨非復池中物也權以曹公在北方當廣攬英雄故不納也龐統說備曰荊州荒殘人物單盡東有吳孫北有曹氏鼎足之計難以得志今益州國富人強戶口百萬郡中兵馬所出畢具寶貨無求於外今可權借以定大事備曰今指與吾為水火者曹操也操以急吾以寬操以暴吾以仁操以譎吾以忠每與操反事乃可成耳今以小故而失信義於天下者吾所不取也統曰權變之時固非一道所能定也兼弱吞昧五伯之事逆取順守報之以義各事定後封以大國何負於信今日不取終為人利耳備乃使關羽守荊州欲自取蜀時孫權遺使報備欲共取蜀曰米賊張魯居王巴漢為曹操耳目規圖益州劉璋不能自守若操得蜀則荊州危矣今欲先攻取璋進討張魯首尾相運一統吳楚雖有十操無所憂也或說備宜報聽許吳終不能越荊有蜀蜀地可有也主薄殷觀曰若為吳先驅進未能克蜀返為吳所乘則大事去矣備從之拒答權曰益州民富國強土地阻險劉璋雖弱足以自守張魯虛偽未必盡忠于操若暴師於蜀漢轉運於萬里欲使戰克攻取舉不失利此吳起不能定其規孫武不能善其事今曹操三分天下有其二將飲馬滄海觀兵吳會而同盟無故自相攻伐借樞於操使敵乘其隙非計也權知備意乃止也會劉璋聞曹公向漢中討張魯內懷恐懼別駕張松說璋曰曹公兵強無敵於天下若因張魯之資以取蜀土誰能禦之劉豫州使君之宗室而曹公之深讎也若使之討魯魯必破魯破則益州強曹公雖來無能為也璋然之遣法正迎先主時黃權諫曰左將軍有梟名今以部曲遇之則不滿其心以客禮待之則一國不容二君若客有太山之安則主有壘卵之危願且閉境以待河清時劉巴亦諫曰備雄傑人也入必有為不可內也既入巴又曰若使備討張魯是放虎於山林也璋並不聽先主與璋會涪璋既還成都先主當為璋北征漢中統復說備曰陰選精兵晝夜兼道徑襲成都璋既不武又素無豫備大軍卒至一舉便定此上計也楊懷高沛璋之名將各仗強兵據守關頭聞數有牋來諫璋使發遣將軍還荊州將軍未至遣與相聞說荊州有急欲還救之並使裝束外作歸形此二子俱服將軍英名又喜將軍之去必乘輕騎來見將軍因此執之進取其兵乃向成都此中計也返還白帝連引荊州徐還圖之此下計也若沈吟不去將致大困不可久矣先主然其中計初張松法正見備備以私意接納盡其慇懃因問蜀中兵器府庫人馬眾寡及諸要害松等具為言之又畫地圖處置山川由是盡知益州虛實先主北到葭萌未即討魯厚樹恩德以收眾心明年曹公征孫權權呼先主自救備乃從璋求萬兵及資寶欲以東行救權璋但許兵四千其餘皆半給備因激怒其眾曰吾為益州征強敵師徒勤瘁不遑寧居今積帑藏之財而恡於賞功望士大夫為出死力戰其可得乎乃召璋白水軍督楊懷責以無禮斬之使黃忠等勒軍向璋先主徑至關質諸將士卒妻子引兵從忠等進到涪據其城璋所遣將皆破敗也即斬懷等自葭萌南還取璋時鄭度說璋曰左將軍襲我兵不滿萬士眾未附野穀是資計莫若盡驅巴西梓潼人內涪水以西其倉廩野穀一皆燒除高壘深溝靜以待之彼請戰不許久無所資不過百日必將自走走而擊之則必禽矣璋不用度計先主遂長驅所過必克而有巴蜀劉備襲蜀丞相掾趙戩曰劉備其不濟乎拙於用兵每戰必敗奔亡不暇何以圖人蜀雖小國險固四塞獨守之國難卒并也徵士傅幹曰劉備寬仁有度能得人之死力諸葛亮達理知變正而有謀而為之相張飛關羽勇而有義皆萬人敵而為之將此三人者皆人傑也以劉備之略三傑佐之何為不濟先主圍成都數十日璋出降蜀中殷盛豐樂先主置酒大饗士卒取蜀城中金銀分賜將士還其穀帛初攻劉璋備與士眾約曰若事定府庫百物孤無豫焉及拔成都士眾皆捨干戈赴諸藏競取寶物軍用不足備甚憂之劉巴曰易耳但當鑄直百錢平諸物價令吏為官市備從之數月之閒府庫充實先主領益州牧諸葛亮為股肱法正為謀主關羽張飛馬超為爪牙許靖糜竺簡雍為賓友董和黃權李嚴等本璋之授用也吳壹費觀等又璋之婚親也彭羕者又璋之所排擯也劉巴者宿昔之所忌恨也皆處之顯任盡其器能有志之士無不競勸也群臣勸先主稱尊號先主未許諸葛亮曰昔吳漢耿純等勸世祖即帝位世祖辭讓前後數四耿純進言曰天下英雄喁喁冀有所望如不從議者士大夫各歸求主無為從公也世祖感純言深至遂然諾之今曹氏篡漢天下無主大王劉氏苗族紹世而起即帝位乃其宜也士大夫久勤苦者亦望尺寸之功名如純言耳先主於是即帝位譙周等勸進云臣父群未亡時言西南數有黃氣直立數丈見來積年時時有景雲祥風從璇璣下應之此為異瑞又二十二年中數有氣如旗從西竟東中天而行圖書曰必有天子出其方是年太白熒惑鎮星常從歲星相追近漢初興五星從歲星謀歲星主義漢位在西義之上方故漢法常以歲星候人主當有聖主起於此州以致季興時許帝尚存故群下不敢漏言頃者熒惑復追歲星見在胃昴胃昴為天綱經曰帝王處之眾邪消亡願大王應天順人速即洪業以寧海內也時曹公拔漢中初魏太祖破張魯於漢中劉曄進計曰明公北破袁紹南征劉表九州百郡十并其八威震天下勢懾海外今舉漢中蜀人望風破膽失守推此而前蜀可傳檄而定劉備人傑也有度而遲得蜀日淺蜀人未附人心震恐其勢自傾因其傾而壓之無不克也若小緩之諸葛孔明明於治體關羽張飛勇冠三軍武毅以威之文德以撫之據嶮守要不可犯矣今時不取必有後憂太祖不從居七日蜀降者言蜀中驚擾雖斬之猶不禁太祖又問曄曰蜀可伐否對曰今以小安不可動也法正說先主曰曹操一舉降張魯定漢中不因此勢以圖巴蜀而留夏侯淵張郃屯守身遽北還此非其智不逮力不足也將內有憂逼故耳今算淵郃才略不勝國之將率舉眾往討則必剋之剋之日廣農積穀觀釁伺隙上可以傾覆寇敵尊獎王室中可以蠶食雍涼廣境拓土下可以固守要害為持久之計此蓋天以與我時不可失也先主善其策乃率諸將進兵漢中正亦從行先主由陽平南渡沔水緣山稍前於定軍山作營淵將兵來爭其地正曰可擊矣先主命黃忠乘高鼓譟攻之大破淵軍淵等授首遂奄有梁漢時魏使夏侯楙鎮長安蜀將魏延就諸葛亮請兵從襃中出循秦嶺而東當子午而北以襲長安亮不許魏略曰夏侯楙為安西將軍鎮長安諸葛亮於南鄭與群下計議魏延曰聞夏侯楙少主婿也怯而無謀今假延精兵五千負糧五千直從襃中出循秦嶺而東當子午而北不過十日可到長安聞延奄至必乘船逃走長安唯有御史京兆太史耳橫門邸閣與散人之穀足周食也比東方相合聚尚二十許日而公從斜谷來亦足以達如此則一舉而咸陽以西可定矣亮以為懸絕不如安從坦道可以平取隴右萬全必剋而無虞故不用延計也延每隨亮出輒欲請兵萬人與亮異道會于潼關如韓信故事亮制而不許延常謂亮為怯歎恨己才用之不盡也其後吳孫權襲關羽取荊州劉備令關羽鎮守荊州吳將呂蒙拜漢昌太守與關羽分土接境知羽梟雄有兼并心且居上流其勢難久蒙乃密陳計策曰今征虜守南郡潘璋將游兵人循江上下應敵所在蒙為國家前據襄陽如此何憂於操何賴於羽將軍圖之會羽討樊留兵將備南郡蒙上疏曰羽討樊而多留備兵必恐蒙圖其後故也蒙常有病乞分眾還建業以治病為名羽聞之必撤備兵盡赴襄陽大軍浮江晝夜驅上襲其空虛則南郡可下而羽可擒也遂稱病篤權乃露檄召蒙還陰與圖計羽果信之稍撒兵赴樊權遂遣蒙在前伏其精兵于䑦𦪇中使白衣搖櫓作商賈服晝夜兼行至羽所置江邊屯候盡縛之是故羽不聞知蒙入據城盡得羽將士家屬皆撫慰約令軍不得干歷人家有所求取羽還在道路權使人與蒙相聞蒙輒厚遇其使羽使人還咸知家門無恙見待過于平時故羽吏士無鬭心皆委羽而降即父子俱獲初孫權之討羽也遣使報魏云欲討關羽自效乞不漏露今羽有備群臣咸言密之是宜董昭曰軍事尚權期於合宜宜露其事羽聞權上即當還護其城圍得速解便獲其利可使兩賊相持我乘其弊若密而不露使權得志非計之上也乃使射書于圍中及羽屯內侯猶豫未去陸遜至破江陵羽走至臨沮為吳將潘璋所殺也先主怒吳伐之敗績還蜀至永安而崩初魏文帝聞備東下與孫權交戰樹柵連營七百餘里謂群臣曰備不曉兵機豈有七百里營可以距敵乎包原隰阻險而為軍者為敵所擒此兵法所忌孫權上事今至矣後七日權破備於夷陵書至後主禪即位下詔曰朕聞善積者昌禍積者喪古今常數也曩者漢祚中微網漏凶慝董卓造難震蕩京畿曹操階禍竊執天衡子丕孤豎敢尋亂階盜據神器更姓改物世濟其凶當此之時天下無主則我帝命殞越于下昭烈皇帝光演文武存復祖業誕膺皇綱不墜于地萬國未靖早世遐殂朕以幼沖繼統鴻業未習保傅之訓而嬰祖宗之重光載前緒未有攸濟朕甚懼焉諸葛丞相宏毅忠壯忘身憂國今授之以旄鉞之重付之以專命之權統領步騎二十萬眾董督元戎龔行天伐除患寧亂克復舊都在此行也伐其元帥弔其殘人他如詔書律令者也先是吳主孫權請和吳使張溫使蜀權謂溫曰卿不宜遠出恐諸葛孔明不知吾所以與曹氏通意故屈卿行人之義受命不受辭也對曰臣入無腹心之規出無專對之用懼無張老延譽之功又無子產陳事之效然諸葛亮達見計數必知神慮屈伸之宜加受朝廷天覆之惠推亮之心必無疑貳溫至蜀詣闕拜章曰昔高宗以諒陰昌殷祚於中興成王以幼沖隆周德於太平今陛下以聰明之姿等契往古總百揆於良佐參列精之炳耀遐邇望風莫不忻賴吳國勤任膂力清澄江滸願與有道平一宇內委心協規有如河水使下臣溫通致情好陛下敦崇禮義未便恥忽臣自入達境及即近郊頻蒙勞來以榮自懼蜀使馬良使吳良謂亮曰今銜國命協穆二家幸為良介於孫將軍亮曰君試自為文良即草曰寡君遣椽馬良通聘繼好以紹昆吾豕韋之勳其人吉士荊楚之令鮮於造次之華而有克終之美願降心存納以慰將命權大敬待之也丞相諸葛亮慮權聞先主殂有異計乃遣鄧芝修好於權權果狐疑不時見芝芝自表請見權語芝曰孤誠願與蜀和親然恐蜀主幼弱國小勢逼為魏所乘不自保全以此猶豫耳芝對曰吳蜀二國四州之土大王命世之英諸葛亮一時之傑也蜀有重險之固吳有三江之阻合此二長共為脣齒進可兼并天下返可鼎足而立此理勢之自然也大王今若委質於魏魏必上望大王之入朝下求太子之內侍若其不從則奉辭伐叛蜀必順流見可而進如此江南之地非復大王之有也權默然良久曰君言是也遂自絕魏與蜀連和時司徒華歆司空王朗等與諸葛亮書陳天命欲使舉國稱蕃亮不答書作正議曰昔在項羽起不由德雖處華夏秉帝者之勢卒就湯鑊為後來戒魏不審鑒今次之矣免身為幸滅在子孫而二三子多逞蘇張詭靡之說奉進驩兜滔天之辭欲以誣毀唐帝諷解禹稷所以徒懷文藻煩勞翰墨大雅君子所不為也又軍志曰萬人必死橫行天下昔軒轅氏挈卒數萬制四帝定海內況以數十萬之眾據正道而臨有罪可得干擬者哉亮死後魏令鄧艾伐蜀蜀兵敗後主用譙周策降魏議曰國君為社稷死則死為社稷亡則亡譙周勸後主降魏可乎孫盛曰春秋之義國君死社稷卿大夫死位況稱天子而辱於人乎周調萬乘之君偷生苟存亡禮喜利要冀微榮惑矣且以事勢言之理有未盡何者禪雖庸主實無桀紂之酷戰雖屢北未有土崩之亂縱不能君臣固守背城一戰自可退次東鄙以思後圖是時羅憲以重兵據白帝霍弋以強卒鎮夜郎蜀土險狹山水峻隔絕巇激湍非步卒所涉若悉收舟楫保據江州徵兵南中乞師東國如此則姜廖五將自然雲從吳之二師承命電赴何投寄之無所而慮於必亡耶魏師之來搴國大舉欲追則舟楫靡資欲留則師老多虞且屈伸有會情勢代起徐因思舊之人以攻驕惰之卒此昭王所以走闔閭田單所以摧騎劫也何為忿忿遽自囚虜下堅壁于敵人致斫石之至恨哉葛生有云事不濟即已耳安能復為之下壯哉斯言可以立懦夫之志矣觀古燕齊荊越之敗或國覆主滅或魚懸鳥竄終能建功立業匡復社稷豈曰天助抑人謀也向使懷苟存之計納譙周之言何頹基之能搆令名之可獲哉禪既闇主周實駑臣方之申包胥田單范蠡大夫種不亦遠乎晉時李特復據蜀初特在蜀暴橫晉乃募取特兄弟許以重賞未暇宣聞遂不藏本特子驤見書悉改其購云敢斬六郡人頭首李任閻趙等及氐叟王一人詣官許以重賞六郡人見之大駭遂並反歸特益州牧羅尚遣隗伯攻李雄於郫城迭有勝負冬十月雄與朴泰金鞭之流血令泰佯得罪奔尚欲為內應尚信之以兵隨泰雄內外擊之大破尚軍雄乘勝追躡夜至城下因稱萬歲誑尚城中云已得郫城尚信之開少城門雄軍得入尚遂遁走遂剋成都稱王也晉桓溫滅之至宋義熙中譙縱又殺益州刺史毛璩于成都稱成都王初毛璩使任約赴義軍軍至枝江會劉毅敗約奔桓振璩聞約奔桓振也自將兵三千由外水下譙縱為之參軍使將梁州兵五百人從內水發梁州人不欲東遂推縱為主反攻涪城剋之璩聞難作自略陽城步還至成都為縱黨所殺也宋使朱齡石滅之此蜀國形也議曰吳蜀脣齒之國蜀滅則吳亡信乎陸士衡曰夫蜀蓋蕃援之與國而非吳人之存亡也何則其郊境之接重山積險陸無長轂之徑川隘流汛水有驚波之難雖有銳師百萬啟行不過千夫舳艫千里前馳不過百艦故劉氏之伐陸公譬之長蛇其勢然也故黃權稱曰可以往難以反此兵之挂地也古云夫道狹路險譬如兩鼠鬭於穴將勇者勝也吳丑為星紀吳越之分上應斗牛之宿下當少陽之位今之會稽九江丹陽豫章廬江廣陵六安臨淮皆吳之分野今蒼梧鬱林合浦交趾九真日南南海皆越之分野古人有言曰大江之南五湖之閒其人輕心揚州保強保恃也三代要服不及以正國有道則後服無道則先叛故傳曰吳為封豕長蛇荐食上國為上國之患非一日之積也漢高帝時淮南王英布反布都六安今壽州是也反書聞上召諸將問布反為之奈何汝陰侯滕公曰臣客故楚令尹薛公有籌策可問初滕公問令尹令尹曰是故當反滕公曰上裂地而王之疏爵而賞之南面而立萬乘之主其反何也令尹曰往年殺彭越前年殺韓信此三人同功一體之人也自疑禍及故反耳上乃召見問薛公薛公對曰布反不足怪也使布出於上計山東非漢之有也出於中計勝敗之數未可知也出於下計陛下安枕而臥矣上曰何謂上中下計令尹曰東取吳蘇州是也西取楚荊州是也并齊取魯齊青州魯兗州傳檄燕趙固守其所山東非漢之有也議曰合從山東為持久之策上計也何謂中計東取吳西取楚并韓取魏據廒倉之粟塞成皋之口勝敗之數未可知也議曰長驅入洛以決一朝之戰中計也何謂下計東取吳西取下蔡歸重於越身歸長沙陛下安枕而臥漢無事矣議曰自廣江表無窺中原之心下計也桓譚新論曰世有圍棋之戲或言是兵法之類也及為之上者遠棋疏張置以會圍因而伐之成多得道之勝中者則務相絕遮要以爭便求利故勝敗狐疑須計數而定下者則守邊隅趨作罫以自生於小地然亦不如察薛公之言上計云取吳楚并齊魯及燕趙者此廣道地之謂中計云取吳楚并韓魏塞成皋據敖倉此趨遮要爭利者也下計云取吳下蔡據長沙以臨越此守邊隅趨作罫者也罫音為卦反上曰是計將安出令尹對曰出下計上曰何為廢上中計而出下計令尹曰布故酈山之徒也自致萬乘之國此皆為身不顧其後為萬世慮者故曰出下計上曰善果如策乃封薛公千戶也是後吳王劉濞以子故而反初發也其大將田祿伯曰兵屯聚而西無他奇道難以就功臣願得奇兵五萬人別循江淮而上收淮南長沙入武關與大王會此亦一奇也吳王太子諫曰王以反為名此兵難以藉人藉人亦且反王吳王不許其少將桓將軍復說吳王曰吳多步兵步兵利險阻漢多車騎車騎利平地願大王所過城邑不下宜棄去疾西據雒陽武庫食敖倉之粟阻山河之險以令諸侯雖無入關天下固已定矣即大王徐行留下城邑漢車騎至馳入梁楚之郊事敗矣王問諸老諸老曰此年少摧鋒之計耳安知大慮吳王不從桓將軍之計乃自并將其兵漢以太尉周亞夫擊吳楚亞夫用其父客計遂敗吳客計在霸紀上淮南王劉安怨望其父厲王長死謀為叛逆問伍被曰吾舉兵西向諸侯必有應者即無奈何被曰南收衡山衡州以擊廬江廬州有潯陽之船守下雉之城在江夏縣名也結九江之浦絕豫章之口洪州是也強弩臨江而守以禁東郡之下東收江都揚州也會稽越州也南通勁越屈強江淮閒猶可一舉得延歲月之壽王曰善未得發會事泄誅至後漢靈獻時閹人擅命天下提契政在家門何進謀誅閹宦太后不從進乃召董卓詣京師以脅迫太后密令卓上書曰中常侍張讓等竊幸乘寵濁亂海內昔趙鞅興晉陽之甲以逐君側之惡臣輒鳴鍾鼓如洛陽討讓等罪卓未至進敗及卓到遂廢立天下亂矣議曰家門大夫也時長沙太守孫堅殺南陽太守張咨袁術得據其郡堅與術合縱欲襲奪劉表荊州堅為流矢所中死初劉表據荊州也聞江南賊盛謂蒯越等曰吾欲徵兵恐不集其策焉出對曰眾不附者仁不足也附而不理者義不足也苟仁義之道行百姓歸之如水之趨下何患不附袁術勇而無謀宗賊貪暴為下所患若示之以利必以眾來君誅其無道撫而用之人有樂存之心必襁負而至兵強士附南據江陵北守襄陽八郡可傳檄而定術等雖至無能為也後果然孫堅死子策領其部曲擊揚州刺史劉繇破之因據江都策聞袁術將欲僭號與書諫曰昔董卓無道陵虐王室禍加太后暴及宏農天子播越宮廟焚毀是以豪傑發憤沛然俱起然而河北異謀於黑山曹操毒被於東徐劉表僭亂於荊南公孫叛逆於朔北正禮阻兵玄德爭盟當謂使君與國同規而舍是弗恤莞然有自取之志懼非海內企望之意昔成湯討桀猶云有夏多罪武王伐紂曰殷有重罰此二王者雖有聖德假時無失道之過無由逼而取也今主上非有惡于天下徒以幼小脅于強臣異於湯武之時也使君五世相承為漢宰輔榮寵之盛莫與為比宜效忠節以報王室術不納策遂絕之也策聞魏太祖與袁紹相持於官渡將渡江襲許未濟為許貢客所殺初策有是謀也眾皆懼魏謀臣郭嘉料之曰策英雄豪傑能得人死力然輕而無備雖有百萬之眾無異于獨行中原若刺客伏起一人之敵耳以吾觀之必死于匹夫之手果為許貢客所殺也策死弟權領其眾時吳割據江南席卷交廣也屬曹公破袁紹兵威日盛乃下書責孫權求質張昭等會議不決權乃獨將周瑜詣其母前定議瑜曰昔楚國初封于荊山之側不滿百里之地繼嗣賢能廣土開境立基於郢遂據荊揚至於南海傳業延祚九百餘年今將軍乘父兄餘資兼六郡之眾兵精糧多將士用命鑄山為銅煮海為鹽境內富饒人不思亂沈舟舉帆朝發夕到士風勁勇所向無前有何逼迫而欲送質質子一入不得不與曹氏曹氏命召不得不往便見制於人也豈與南面稱孤同哉不如勿與徐觀其變若曹氏率義以正天下將軍事之未晚若圖為暴亂兵猶火也不戢必將自焚韜勇枕威以待天命何送質之有權母曰公瑜議是也遂不送質策薨權年少初統事太妃憂之引見張昭董襲等問曰江東可保安不襲對曰江東地勢有山川之固而討逆明府恩德在人討虜承基大小用命張昭秉眾襲等為爪牙此地利人和之時也萬無所憂眾皆壯其言也後曹公入荊州劉琮舉眾降初劉表死魯肅進說曰夫荊楚與我鄰接水流順北外帶江漢內阻山陵有金城之國沃野萬里士人殷富若據而有之此帝王之資也肅請得奉命弔表二子并慰勞軍中用事者說劉備使撫養表眾共拒曹操肅未到琮已降也曹操得其水軍船步卒數十萬吳將士聞之皆恐孫權延見群下問以計策議者咸曰曹公豺虎也托名漢相挾天子以征四方動以朝廷為辭今日拒之事更不順且將軍大勢可以拒操者長江也今操得荊州奄有其地劉表治水軍蒙衝鬭艦乃以千數操悉以沿江兼有步兵水陸俱下此為長江之險已與我共之矣而勢力眾寡又不可論愚謂大計不如迎之周瑜曰不然操雖託名漢相其實漢賊將軍以神武之雄才兼仗父兄之烈割據江東地方數千里精兵足用英豪樂業尚當橫行天下為漢家除殘去穢況操自送死而可迎之耶請為將軍籌之今使北土已安操無內憂能曠日持久來爭疆埸又能與我決勝負於舟楫可也今北上既未安馬超韓遂尚在關西為操後患且捨鞍馬仗舟楫與吳越爭衡本非中國所長又今盛寒馬無藁草驅中國士眾遠涉江湖之閒不習水土必生疾病此數四者用兵之患也而操皆冒行之將軍擒操宜在今日瑜請得精兵三萬人進住夏口保為將軍破之權曰老賊欲廢漢自立久矣徒忌二袁呂布劉表與孤耳今數雄已滅唯孤尚存孤與老賊勢不兩立君言當擊甚與孤合此天以君授孤也時權軍柴桑劉備在樊曹公南征劉表會表卒子琮舉眾降先主不知曹公卒至至宛乃聞之遂率其眾南行為曹公所追破劉備至夏口諸葛亮曰事急矣請奉命求救孫將軍遂見說曰將軍起兵江東劉豫州亦收眾漢南與曹操並爭天下今操芟夷大難略已平矣遂破荊州威震四海英雄無所用武故豫州遁逃至此將軍量力而處之若能與吳越之眾與中國爭衡不如早與之絕若不能當何不按兵束甲北面而事之今將軍外托服從之名而內懷猶豫之計事急而不斷禍至無日矣權曰苟如君言劉豫州何不遂事之乎亮曰田橫齊之壯士耳猶守義不辱況劉豫州王室之冑英才蓋世眾士慕仰若水之歸海若事之不濟此乃天也安得復而為人之下權勃然曰吾不能舉全吳之地十萬之眾受制於人吾計決矣非劉豫州莫可以當曹操者然豫州新敗之後能抗此難乎亮曰豫州軍雖敗於長阪今戰士還者及關羽所將精甲萬人劉琦合江夏戰士亦不下萬人曹操之眾遠來疲弊聞追豫州騎一日一夜行三百里此所謂強弩之末不能穿魯縞者也故兵法忌之曰必蹶上將軍且北方人不習水戰又荊州之人附操者逼兵勢耳非心服也今將軍誠命猛將統兵數萬與豫州協規同力破操軍必矣操軍破必北還如此則荊吳之勢強鼎足之形成成敗之機在於今日權大悅即遣周瑜魯肅隨亮詣先主并力拒曹公也周瑜等水軍三萬與劉備并力距曹公用黃蓋火攻策遂破曹公於赤壁初一日交戰曹公軍破返引次江北瑜等在南岸瑜步將黃蓋曰今寇眾我寡難與持久然觀操軍方連船艦首尾相接可燒而走也乃取蒙衝鬭艦數十艘實以薪草膏灌其中裹以帷幕上建牙旗先書報曹公欺以欲降蓋又豫便走舸各繫火船後因引次俱前曹公軍吏士皆延頸觀望指言蓋降去北軍二里餘同時發火火烈風猛船至如箭飛埃絕燄燒盡北船延燒岸上營落頃之煙燄漲天人馬燒溺死者甚眾瑜率輕銳尋係其後雷鼓大進曹公留曹仁等守江陵徑自北歸周瑜又進南郡與仁相對仁遂退也曹公敗徑北還權遂虎視江表時劉璋為益州牧外有張魯寇侵瑜乃詣京見權曰今曹操新衄方憂腹心未能與將軍連兵相事也乞與奮威俱進取蜀得蜀而并張魯留奮威固守其地好與馬超結援瑜與將軍據襄陽以蹙曹北方可圖也權許之會瑜卒不果也初周瑜薦魯肅才宜佐時權即引肅對飲曰今漢室傾危四方雲擾孤承父兄遺業思有桓文之功君既惠顧何以佐之肅對曰昔高帝區區欲尊事義帝而不獲者以項羽為害也今之曹操猶昔項羽將軍何由得為桓文乎肅竊料之漢室不可復興猶曹操不可卒除將軍為計惟有鼎足江東以觀天下之釁規模如此亦自無嫌然後建號帝王以圖天下此高帝之業也及是平一江滸稱尊號臨壇顧謂公卿曰昔魯子敬嘗道此可謂明於事勢矣議曰陸士衡稱孫權執鞭鞠躬以重陸公之威悉委武衛以濟周瑜之師卑官菲食以豐功臣之賞披懷虛己以納謀士之算屏氣跼蹐以伺子明之疾分滋損味以育淩統之孤是以忠臣競盡其能志士咸得肆力而帝業固矣黃石公曰賢人之政降人以體聖人之政降人以心體降可以圖始心降可以保終降體以體降心以心由此觀之孫權執鞭鞠躬降體者也披懷虛己心降者也善終令始不亦宜乎黃武元年魏使大司馬曹仁步騎數萬向濡須濡須督朱桓破之初曹仁欲以兵襲取中洲偽先揚聲欲東攻羨溪桓分兵赴羨溪既發卒而仁奄至諸將業業各有懼心桓喻之曰凡兩軍交戰勝負在將不在眾寡諸君聞曹仁用兵孰與桓耶兵法所以稱客倍而主人半者謂俱在平原無城池之守又謂士眾勇怯齊等故耳今仁既非智勇加其士卒甚怯又千里步涉人馬疲困桓與諸將共據高城南臨大江北背山林以逸待勞為主制客此百戰百勝之勢也桓因偃旗鼓外示虛弱以誘致仁仁果遣子泰攻濡須城分遣諸將襲中洲中洲者部曲妻子所在泰等退桓遂梟其諸將也七年又使大司馬曹休騎十萬至皖城迎周魴魴欺之無功而返吳鄱陽太守周魴譎誘遭休休迎魴至皖城知見欺當引軍還自負眾盛邀於一戰朱桓進計於元帥陸遜曰休本以親威見任非智勇名將也今戰必敗敗必走走道當由夾石挂車此兩道地皆阨險若以萬兵柴路則彼眾必盡而休可生虜臣請將所部以斷之若蒙天威得以休自效便可乘勝長驅進取壽春割有淮南以窺許洛此萬代一時不可失也權先與陸遜以議遜以為不可故計不施行也至權薨皓即位窮極淫侈割剝蒸人崇信姦回賊虐諫輔晉世祖令杜預等伐吳滅之議曰昔魏武侯浮西河顧謂吳起曰山河之固此魏國之寶也吳起對曰昔三苗氏左洞庭而右彭蠡德義不修禹滅之夏桀之君左河濟右太華伊闕在其南羊腸在其北仁政不修湯放之由此觀之在德不在險今孫皓席父祖之資有天阻之固西距巫峽東負滄海長江判其區宇峻山帶其封域地方幾萬里荷戟將百萬而一朝棄甲面縛於人則在德之言為不刊之典耶對曰何為其然陸機曰, krp: ''}
