  - {type: variant, offset: 19071, length: 268, content: 君言成敗理甚分明吾今豁然也本以才學相期不意籌略乃至此也遂進兵虜叔寶此滅吳形也議曰昔三國時蜀遣宗預使吳預謂權曰蜀土雖云鄰國東西相賴吳不可無蜀蜀不可無吳孫盛曰夫帝王之保唯道與義道義既建雖小可大殷周是也苟杖詐力雖強必敗秦項是也況乎偏鄙之城恃山水之固而欲連接萬里永相資賴哉昔九國建合縱之計而秦人卒并六合囂述營輔車之謀而光正終兼隴蜀夫以九國之強隴漢之大莫能相救坐觀屠覆何者道德之基不周而離弱之心難一故也而云吳不可無蜀蜀不可無吳豈不諂哉由此觀之為國之本唯道義而已君若不修德舟中之人盡敵國也有已夫自隋開皇十年庚戌歲滅陳至今開元四年丙辰歲凡一百二十六年, WYG: ''}
