  - {type: variant, offset: 12854, length: 276, content: 守在四夷天子卑弱守在諸侯當漢之季奸臣擅朝九有不澄四郊多壘雖復諸侯釋位以閒王政然包藏禍心各圖非冀魏太祖不世出靈武冠時值炎精幽昧之期逢風塵無妄之世嗔目張膽首建義旗時韓暹楊奉挾獻帝自河東還洛陽靈帝崩太子辨即位并州牧董卓入朝因廢帝為弘農王而立獻帝以董卓為太師遷都長安司徒王允誅卓卓將郭汜李傕圍長安城城陷殺王允後李傕與郭汜有隙傕質天子於其家傕將楊奉謀殺傕事泄叛傕傕衰弱天子乃得出奔楊奉欲以天子還洛陽郭汜追天子於弘農之曹陽奉等敗殺公卿略盡天子渡河都安邑以韓暹為征東將軍持政還洛陽洛陽宮室燒盡百官被荊棘太祖迎天子都許暹奉出奔也太祖議迎都許或以為山東未定不可荀彧勸太祖, WYG: ''}
