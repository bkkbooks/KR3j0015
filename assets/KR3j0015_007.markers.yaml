  - {type: variant, offset: 14503, length: 0, content: '', krp: 下者天下利之故道在不可見事在不可聞勝在不可知微哉微哉鷙鳥將擊卑身翕翼猛獸將搏俛身俯伏聖人將動必有愚色惟文惟徳誰為之式弗觀弗視安知其極今彼殷商衆口相惑吾觀其野草茅勝穀吾觀其羣衆曲勝直吾觀其吏暴虐殘賊敗法亂利而上不覺此亡國之則也文王曰善賈子曰殷湯放桀武王伐紂此天下之所同聞也為人臣而放其君為人下而殺其上天下之至逆也而所以長有天下者以其為天下開利除害以義繼之也故聲名稱于天下而傳于後世也太公曰天下者非一人之天下天下人之天下也與天下同利者得天下擅天下之利者失天下天有時}
  - {type: variant, offset: 14504, length: 0, content: '', WYG: 有利能與人共之者仁也仁之所在者天下歸之免人之死解人之難救人之患濟人之急者也徳之所在天下歸之與人同憂同樂同好同惡者義也義之所在天下歸之凡人惡死而樂生好徳而歸利能生利者道也道之所在天下歸之也楚共王薨子靈王即位羣公子因羣喪職之族殺靈王而立子干立未定弟棄疾又殺子干而自立棄疾平王也五人皆共王子也初子干之入也韓宣子問于叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難對曰無與同好誰與同惡取國有五難有寵而無人一也寵須賢人而固也有人而無主二也雖有賢人當須内主為應也有主而無謀三也謀䇿謀也有謀而無民四也民衆也有民而無徳五也四者既備當以徳成也子干在晉十三年矣晉楚之從不聞達者可謂無人族盡親叛可謂無主無親族在楚無舋而動可謂無謀召子干時楚未有大舋也為羈終世可謂無人終身羈客在晉是謂無民亡無愛徵可謂無徳楚人無愛念之者王虐而不忌靈王暴虐無所畏忌將自亡也楚君子干渉五難以殺舊君誰能濟之有楚國者其棄疾乎君陳蔡城外屬焉城方城也時穿封戍既死棄疾并領陳事也苛慝不作盗賊伏隠私欲不違民無怨心先神命之國人信之芊姓有亂必季實立楚之常也獲神一也當璧拜也有民二也人信之也命徳三也無苛慝也寵貴四也貴妃子也居常五也棄疾季也有五利以去五難誰能害之子干之官則右尹也數其貴寵則庶子也以神所命則又逺之其貴亡矣其寵棄矣父既歿矣民無懐焉非令徳也國無與焉無内主也將何以立宣子曰齊桓晉文不亦是乎皆庶賤也對曰齊桓衛姬之子也有寵于僖有鮑叔牙賓須無隰朋以為輔佐有莒衛以為外主齊桓奔莒衛有舅氏之助有國髙以為内主國氏髙氏齊上卿也從善如流下善齊肅齊嚴肅敬不藏賄清也不從欲儉也施舍不倦求善不厭以是有國不亦宜乎我先君文公狐季姬之子也有寵于獻公好學不貳生十七年有士五人狐偃趙衰顛頡魏武子司空季子五士從出者也有先大夫子餘子犯以為腹心子餘趙衰子犯狐偃有魏犨賈佗以為股肱有齊宋秦楚以為外主齊妻以女宋贈以馬楚王饗之秦伯納之有欒卻狐先以為内主謂欒枝郤縠狐突先軫也亡十九年守志彌篤惠懐棄民從而與之獻無異親民無異望獻公之子九人惟文公在天方相晉將何以代之此二君者異于子干共有寵子國有奥主謂棄疾也子干無施於民無援於外去晉晉不送歸楚楚不迎何以冀國子干果不終卒立棄疾如叔向言初楚共王無冢嫡冇寵子五人無適立焉乃大有事于羣望而祈曰請神擇于五人者使主社稷乃徧以璧見于羣望曰當璧而拜者神所立也乃宻埋璧于太室之庭使五人齊而長幼入拜康王跨之靈王肘加焉子干子晳皆逺之平王弱抱而入再拜皆壓紐平王即棄疾也魯昭公薨于乾侯趙簡子問于史墨曰季氏出其君而民服焉諸侯與之君死于外而莫之或罪何也對曰物生有兩有三有五有陪貳故天有三辰謂有三也地有五行謂有五也體有左右謂有兩也各有妃耦謂陪貳也王有公諸侯有卿皆其貳也天生季氏以貳魯侯為}
