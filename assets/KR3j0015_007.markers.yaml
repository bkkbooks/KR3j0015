  - {type: variant, offset: 14728, length: 2, content: 臣聞, WYG: 討捕其可盡乎賊既不盡自當獲罪且又世傳李氏姓膺圖籙李全才位望隆貴一朝族滅大人既能平賊即又功當不賞以此求活其可得乎髙祖意少解曰我一夜思量汝言大有道理今日破家滅身亦由汝化家為國亦由汝于是定計乃命太宗與晉陽令劉文靜及門下客長孫順徳劉𢎞基等募兵旬日之間衆且一萬斬留守副王威髙君雅以其詭請髙祖祈雨于晉祠將為不利故也用裴寂計准伊尹放太甲霍光廢昌邑故事尊煬}
