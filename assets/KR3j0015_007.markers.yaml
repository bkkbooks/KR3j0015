  - {type: variant, offset: 14501, length: 0, content: '', WYG: 不為兆人也議曰昔堯稱吾以天下授舜則天下得其利而丹朱病授丹朱則天下病而丹朱得其利吾終不以天下之病而利一人遂禪于舜今周公不以天下為務而自取其讓名非為聖達節者也故孔子非之董子曰雖有繼體守文之君不害聖人之受命古語曰窮䑕嚙狸匹夫奔萬乘故黄石公曰君不可以無徳無徳則臣叛孫卿曰能除患則為福不能則為賊孫卿子曰昔者天子初即位上卿進曰能除患則為福不能則為賊授天子一䇿中卿進曰先事慮事謂之接接則事優成先患慮患謂之豫豫則禍不生事至而後慮者謂之後後則事不舉患至而後慮者謂之因因則禍不禦授天子二策下卿進曰慶者在堂弔者在閭禍與福鄰莫知其門豫哉豫哉授天子三策此誡之至也何以明之昔文王在酆召太公曰商王罪殺不辜汝尚助余憂人今我何如太公曰王其修身下賢惠人以觀天道天道無殃不可以先唱人道無灾不可以先謀必見天殃又見人灾乃可以謀與民同利同利相救同情相成同惡相助同好相趨無甲兵而勝無衡機而攻無渠塹而守利人者天下啓之害人者天下閉之天下非一人之天下也取天下若逐野獸得之而天下皆有分肉若同舟而濟皆同其利舟敗皆同其害然則皆有啓之無有閉之者矣無取于民者取民者也無取於國者取國者也無取於天下者取天下者也議曰沛公之起也虎嘯豐谷飲馬秦川財寶無所取婦女無所收降城則以侯其將得賂則以分其士而已無私焉所私者私於天下也故老子曰夫唯不私故能成其私}
