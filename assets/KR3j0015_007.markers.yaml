  - {type: variant, offset: 14502, length: 0, content: '', WYG: 知無取人是乃大取也取民者民利之取國者國利之取}
  - {type: variant, offset: 14502, length: 0, content: '', krp: 知無取人是乃大取也取民者民利之取國者國利之取}
  - {type: variant, offset: 14503, length: 0, content: '', WYG: 下者天下利之故道在不可見事在不可聞勝在不可知微哉微哉鷙鳥將擊卑身翕翼猛獸將搏俛身俯伏聖人將動必有愚色惟文惟徳誰為之式弗觀弗視安知其極今彼殷商衆口相惑吾觀其野草茅勝穀吾觀其羣衆曲勝直吾觀其吏暴虐殘賊敗法亂利而上不覺此亡國之則也文王曰善賈子曰殷湯放桀武王伐紂此天下之所同聞也為人臣而放其君為人下而殺其上天下之至逆也而所以長有天下者以其為天下開利除害以義繼之也故聲名稱于天下而傳于後世也太公曰天下者非一人之天下天下人之天下也與天下同利者得天下擅天下之利者失天下天有時}
