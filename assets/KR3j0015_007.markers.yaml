  - {type: variant, offset: 14133, length: 355, content: 郡人未必悉同若便以軍臨之吏人羌胡必謂國家不別是非更使皆相持著此為虎傅翼也光等欲以羌胡為援今先使羌胡鈔擊重其賞所虜獲者皆以俾之外阻其勢內離其交必不戰而定乃檄告諭諸為光等所誤者原之能斬賊帥送首者加封於是光部黨斬送光首此九州百郡十并其八之大略也夫能扶天下之危者則據天下之安能除天下之憂者則享天下之樂能救天下之禍者則得天下之福董昭等欲共進曹公九錫備物密訪於荀彧彧不許操心不平遂殺之范曄論曰世之言荀君通塞或過矣常以中賢以下道無求備智算有所研疏原始未必要終斯理之不可全詰者也夫以衛賜之賢一說而斃兩國彼非薄於仁而欲之蓋有全必有喪也斯又功之不可兼者矣方時運之邅非雄才無以濟其弱功高勢強則皇器自移矣此又時之不可並也蓋取其歸正而已亦殺身以成仁之義也曹氏率義撥亂代載其功至文帝時天人與能矣遂受漢禪劉若勸進曰臣聞符命不虛見眾心不可遠故, WYG: 政}
