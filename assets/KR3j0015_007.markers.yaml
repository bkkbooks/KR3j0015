  - {type: variant, offset: 14545, length: 0, content: '', WYG: 如有順天發䇿者必成大功以此説丹丹並不用其言也衍乃亡命河東議曰昔蒯通説韓信閻忠説皇甫嵩馮衍説亷丹此三人皆不從甘就危亡何也對曰范曄曰夫事苦則矜全之情薄生厚故安存之慮深登髙不懼者胥靡之人也坐不垂堂千金之子也由此觀之夫人情樂則思安苦則圖變必然之勢也今三子或南靣稱孤或位極將相但圖自安之術無慮非常之功不知勢疑則釁生力侔則亂起勢已疑矣弗能辭勢以去嫌力已侔矣弗能損力以招福遲迴猶豫至于危亡其禍在于矜全反貽其敗者也語曰心死則生幸生則死數公可謂幸生也來歙説隗囂遣子入侍囂將王元以為天下成敗未可知不願專心内事遂説囂曰昔更始西都四方響應天下喁喁謂之太平一旦壊敗大王幾無所措今南有子陽北有文伯江湖海岱王公十數而破牽儒生之説棄萬乗之基羇旅危國以求萬全此循覆車之軌計之不可者也今天水完富士馬最强北取西河上郡東收三輔之地案秦舊跡表裡山河元請以一丸泥為大王東封函谷闗此萬代一時也若計不及此宜蓄糗糧養士馬據隘自守曠日持久以待四方之變圖王不成其弊猶足以霸要之魚不可脱于泉龍失勢即還與蚯蚓同囂然元計雖已遣子入質猶負于險阨欲專制方面遂背漢賈復曰圖堯舜之事而不能至者湯武是也圖湯武之事而不能至者桓文是也圖桓文之事而不能至者六國是也定六國之規而欲安守之而不能至者亡六國是也魏太祖與吕布戰于濮陽不利袁紹使人説太祖連和使太祖遣家居鄴太祖許之程昱見曰竊聞將軍欲遣家居鄴與袁紹連和誠有之乎太祖曰然昱曰意者將軍殆臨事而懼不然何慮之不深也夫袁紹據燕趙之地有并天下之心而智不能濟也將軍自度能為之下乎將軍以龍虎之威可為韓彭之事耶昱愚不識大㫖以為將軍之志不如田横田横齊一壯士耳猶羞為髙祖之臣今將軍欲遣家徃鄴將北面而事袁紹夫以將軍之聰明神武而反不羞為袁紹之下竊為將軍恥之今兖州雖殘尚有三城能戰之士不下萬人若與文若昱等收而用之霸王之業可成也願將軍更慮之太祖乃止議曰陳夀稱先主𢎞毅寛厚知人待士蓋有髙祖之風英雄之器也機權幹畧不逮魏武然折而不撓終不為下者抑揆彼之量必不容已非唯競利且以避害語曰一棲不兩雄一泉無二蛟由此觀之若位同權均必不容已有自來矣曹公欲遣家居鄴與袁紹連和惑之甚也袁紹為盟主有驕色陳留太守張邈正義責之紹令曹操殺􅊬操不聼􅊬心不自安及操東擊陶謙令其將陳宫屯東郡宫因説􅊬曰今天下分崩雄傑並起君擁十萬之衆當四戰之地撫劍顧盼亦足以為人傑而反受制于人不亦鄙乎今州軍東征其處空虚吕布壯士善戰無前君迎之共㨿兖州觀天下之形勢俟時事之變通此亦縱横之一時也邈從之而反曹公議曰曹公與􅊬甚相善然􅊬包藏禍心者廹于事也故每覽古今所由改趨因縁侵辱或起瑕釁若韓信傷心于失楚彭寵積望于無異盧綰嫌畏于已㕁英布憂廹于情漏此事之縁也由此觀之夫叛臣逆子未必皆不忠也或心忿意危或威名振主因成大業自古然之矣鍾㑹鄧艾}
