  - {type: variant, offset: 14512, length: 0, content: '', krp: 君臣無常位自古以然故詩曰髙岸為谷深谷為陵三后之姓于今為庶主所知也三后虞夏商也在易卦雷乗乾曰大壯乾下震上大壯震在上故曰雷乗乾也天之道也乾為天子震為諸侯而在乾上君臣易位猶人臣强壯若天上有雷也政在季氏于此君也四公矣民不知君何以得國}
  - {type: variant, offset: 14514, length: 2, content: 舜享, WYG: 為君慎器與名器車服也名爵號也不可以假人議曰劉向稱人君莫不欲安然而常危莫不欲存然而常亡失御臣之術也夫人臣操權柄持國政未有不為害者也昔晉有六卿齊有田崔衛有孫甯魯有季孟常掌國事世執朝柄終復田氏取齊六卿分晉崔杼弑其君光孫林父甯殖出其君衎弑其君剽季氏八佾舞于庭三家者以雍徹並専國政卒逐昭公皆隂勝而陽㣲下失臣道之所致也范雎説秦昭王曰夫三代所以亡國者常縱溢馳騁弋獵不聴政事其所授者妬賢嫉能取下蔽上以成其私不為主計而主不覺悟故失其國今右秩以上至諸史及王左右無非相國之人者見王獨立于朝臣竊為王恐恐萬世之後有秦國者非王子孫也由是觀之書稱臣之有作威作福害于而家凶于而國孔子曰禄之去公室政逮于大夫亡之兆也信哉是言也孔子在衛聞齊田常將欲為亂専齊國有無君之心而憚鮑晏鮑氏晏氏齊之世卿大夫因移其兵以伐魯初田常相齊選國中女長七尺者三百人以為後宫賓客舍人出入皆不禁田常後有七十餘男因此以盗齊國也孔子㑹諸弟子曰魯父母之國不忍觀其受敵將欲屈節于田常以救魯二三子誰使子貢請使夫子許之遂如齊説田常曰今子欲取功于魯實難若移兵于吳則可也夫魯難伐之國其城薄以卑地狹以泄其君愚而不仁大臣偽而無用其士民又惡甲兵之事此不可與戰夫吳城髙以厚地廣以深甲堅以新士選以飽重器精兵盡在其中又使明大夫守之此易伐也田常忿然作色曰子之所難人之所易子之所易人之所難而以教常何也子貢曰夫憂在内者攻强憂在外者攻弱今君憂在内矣吾聞子三封而三不成是則大臣不聽也今君破魯以廣齊戰勝以驕主破國以尊臣晏等帥師若破國則益尊而子之功不不與焉則交日疎于主是君上驕主心下恣羣臣求以成大事難矣夫上驕則恣臣驕則争是君上與主有卻下與大臣交爭也如此則子之位危矣故曰不如伐吳伐吳而不勝民人外死大臣内空是君上無强臣之敵下無民人之過孤主制齊者唯君也田常曰善然兵業已加魯矣不可更如何子貢曰子緩師吾請救于吳令救魯而伐齊子以兵迎之田常許諾子貢遂南説吴王曰王者不絶世霸者無强敵千鈞之重加銖而移今以萬乗之齊而私千乗之魯與吴爭强其為患滋甚且夫救魯顯名也伐齊大利也以撫泗上諸侯誅暴齊以服晉利莫大焉存亡魯寔困强齊智者不疑也吳王曰善然吾實困越越王今苦身養士有報吳之心子待吾先伐越然後乃可子貢曰越之功不過魯吳之强不過齊而王置齊而伐越則齊已平魯矣王方以存亡繼絶為名而畏强齊伐小越非勇也勇者不避難仁者不窮約智者不失時義者不絶世以立其義今存越示天下以仁救魯伐齊威加晉國諸侯相率而朝吳霸業成矣且王必或惡越臣請東見越君今出兵以從此則實空越而名從諸侯以伐也吳王悦乃使子貢之越越王郊迎自為子貢御曰此蠻夷之國也大夫何足儼然辱臨之子貢曰今者吾説吳王以救魯伐齊其志欲之而畏越曰待吾伐越乃可如此則破越必矣且無報人之志而令人疑之拙也有報人之志而使人知之殆也事未發而先聞危也三者舉事之大患也吳王為人猛暴羣臣弗堪國家疲于數戰士卒不忍百姓怨上大臣内變子胥以諫死太宰嚭用事順君之過以安其私此王報吳之時也誠能發卒佐之以激其志而重寶以悦其心卑辭以尊其禮則伐齊必矣此聖人之所謂屈節以期逺者也彼戰不勝王之福也若勝必以兵臨晉臣還北請見晉君共攻之其弱吳必也其鋭兵盡于齊重甲困于晉而王乗其弊滅吳必矣越王許諾乃使夫夫種以三千人助吳吳遂伐齊于召陵果以兵臨晉遇于黄池越王襲吳之國遂滅吳孔子曰夫其亂齊存魯吾之始願也若乃强晉以疲吳使吳亡而越霸賜之説也美言傷信慎言哉秦始皇帝遊㑹稽至沙丘疾甚始皇令趙髙為書賜公子扶蘇未授使者始皇崩時始皇有二十餘子長子扶蘇使監兵上郡蒙恬為將少子胡亥愛請從上許之餘子莫從丞相李斯以為上在外崩無真太子故秘之羣臣莫知也趙髙因留所賜扶蘇璽書而謂公子胡亥曰上崩無詔封王諸子而獨賜長子書長子至即位為皇帝而子無尺寸之地為之奈何胡亥曰固然也吾聞明君知臣明父知子父既捐命不封諸子何可言也趙髙曰不然方今天下之權存亡在子與髙及丞相耳願子圖之且夫臣人與見臣于人制人與見制于人豈可同日而道哉胡亥曰廢兄而立弟是不義也不奉父詔而畏死是不孝也能薄而材謭强因人之功是不能也三者逆徳}
