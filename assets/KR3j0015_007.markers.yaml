  - {type: variant, offset: 14527, length: 1, content: 炎, krp: 而獵狗烹敵國破而謀臣亡夫以交友言之則不如張耳之與成安君也忠信言之則不過大夫種之于句踐也此二人者足以觀矣願足下深慮之且臣聞勇略震主者身危而功盖天下者不賞臣請言大王功畧涉西河虜魏王擒夏説引兵下井陘誅成安君狥趙脅燕定齊南摧楚人之兵二十萬東殺龍且西嚮以報此所謂功無二于天下而畧不世出者也今足下載震主之威挾不賞之功以歸楚楚人不信歸漢漢人震恐足下欲持是安歸乎夫勢在人臣之位而有震主之威名髙天下竊為足下危之韓信謝曰先生且休矣我將念之後數日蒯通復説曰夫聽者事之候計者事之機也聽過計失而能久安者鮮矣聽不失一二者不可亂以言計不失本末者不可紛以辭夫隨厮養之役者失萬乗之權守儋石之禄者一儋一斛之餘也闕卿相之位故智者決之斷也疑者事之害也審毫釐之小計遺天下之大數智誠知之決不敢行者百事之禍也故猛虎之猶豫不如蜂蠆之致螫騏驥之跼躅不如駑馬之安步孟賁之狐疑不如庸夫之必至也雖有舜禹之智沉吟而不言不如瘖聾之指麾也夫功者難成而易敗時者難得而易失也時不再來願足下詳察之韓信猶豫不忍背漢又自以為功多漢王終不奪吾齊遂謝蒯生蒯生曰夫廹于苛細者不可與圖大事拘于臣虜者固無君王之意説不聼因去佯狂為巫議曰昔齊崔杼弑莊公晏子不死君難曰君人者豈以陵人社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為己死而為己亡非其親暱誰敢任之孟子謂齊宣王曰君之視臣如手足則臣視君如腹心君之視臣如草芥則臣視君如寇讐雖云君天也天不可逃然臣縁君恩以為等差自古然矣韓信以漢王遇厚而不背其徳誠足憐耳吳王濞以子故不朝孝文帝時吴太子入朝侍皇太子飲博争道不恭皇太子引博局投吴太子殺之及削地書至於是乃使中大夫應髙誂田鳥反膠西王無文書口報曰呉王不肖有宿夕之憂不敢自外使喻其歡心王曰何以教之髙曰今者主}
  - {type: variant, offset: 14529, length: 0, content: '', WYG: 興于姦雄飾于邪臣好小善聽䜛賊擅變更律令侵奪諸侯之地徵求滋多誅罰良善日以益甚語有之曰䑛糠及米吳與膠西知名諸侯也一時見察恐不得安肆矣吳王身有内病不能朝請二十餘年常患見疑無以自白今脅肩累足猶懼不見釋竊聞大王以爵事有適直革反所聞諸侯削地罪不至此此恐不得削地而已王曰然有之子將奈何髙曰同惡相助同好相㽞同情相成同欲相趨同利相死今吴王自以為與大王同憂願因時循理棄驅以除患害於天下抑亦可乎王矍然駭曰寡人何敢如是今主雖急固有死耳安得勿戴髙曰御史大夫晁錯熒惑天子侵奪諸侯蔽忠塞賢朝廷疾怨諸侯皆有背叛之意人事極矣彗星夕出蝗蟲}
  - {type: page-break, offset: 14529, content: '', id: KR3j0015_WYG_007-17a, image: WYG0849/WYG0849-0149c.png}
