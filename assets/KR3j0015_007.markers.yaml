  - {type: variant, offset: 14542, length: 1, content: 皙, WYG: 晰者乎凡患生于所忽禍發于細微敗不可悔時不可失公孫鞅曰有髙人之行必負非于世有獨見之慮必見贅于民故信庸庸之論破金石之䇿襲當世之操失髙明之徳夫决者智之君也疑者事之役也時不再來公勿再計丹不聼進及無鹽與赤眉戰死時汝南郅惲仰觀天象而謂友人曰今鎮嵗熒惑並無漢分翼軫之域去而復來漢必再}
