  - {type: variant, offset: 16848, length: 1638, content: 士早朝晏罷介冑之將則陳征伐縉紳之徒咸言和親勇奮之士思展搏噬故樊噲願以十萬橫行匈奴季布面折其短李信求以二十萬獨舉楚人而果辱秦軍今諸將有陳越江陵之險獨步虜庭即亦向時之類也以陛下聖德輔相賢智法明士練措計於全勝之地振長策以禦之虜之崩潰必然之數故兵法曰屈人之兵而非戰也拔人之城而非攻也若釋廟勝必然之理而行百一不全之略誠愚臣之所慮也故謂大佃而逼之計最長時不從嘏言詔昶等征吳吳將諸葛恪拒之大敗魏軍於東關魏後陵夷禪晉太祖即位王昶等敗朝議欲貶黜諸將景王曰我不聽公休以至此此我過諸將何罪時雍州刺史陳泰討胡又敗景王又謝朝士曰此我過也非元伯之責於是魏人悅睦思報之也至世祖時即晉武帝也羊祜上平吳表曰先帝順天應時西平巴蜀南和吳會海內得以休息兆庶有樂安之心而吳復背信使邊事更興夫期運雖天所授而功業必由人而成不一大舉掃滅則眾役無時得安亦所以隆先帝之勳成無為之化也故堯有丹水之伐舜有有苗之征咸以寧靜宇宙戢兵和眾者也蜀平之後天下皆謂吳當并亡自此來十三年是謂一周平定之期復在今日議者常言吳楚有道後服無禮先強此乃諸侯之時耳當今一統不得與古同論夫適道之論皆未應權是故謀之雖多而決之欲獨凡以險阻得存者謂敵者同力足以自固苟其輕重不齊強弱異勢則智士不能謀而險阻不可保也蜀之地非不險也高山尋雲霓深谷肆無景束馬懸車然後能濟皆言一夫荷戟千人莫當及進兵之日曾無藩離之限斬將搴旗伏屍數萬乘勝席卷徑至成都漢中諸城皆鳥棲而不敢出非皆無戰心誠心不足相抗至劉禪降服諸營堡者索然俱散今江淮之難不過劍閣山川之險不過岷漢孫皓之暴侈於劉禪吳越之困甚於巴蜀而大晉兵眾多於前世資儲器械盛於往時今不於此平吳而更阻兵相守征夫苦役日尋干戈經歷盛衰不可長久宜當時定以一四海今若引梁益之兵水陸俱下荊楚之眾進臨江陵平南豫州直指夏口徐揚青兗並向秣陵鼓旆以疑之多方以誤之以一隅之吳當天下之眾勢分形散所備皆急巴漢奇兵出其空虛一處傾壞則上下震蕩吳緣江為國無有內地東西數千里以藩籬自持所敵者大無有寧息孫皓恣情任意與下多忌多臣重將不復自信是以孫秀之徒皆畏逼而至臣疑於朝士困於野無有保勢之計一定之心平常之日猶懷去就兵臨之際必有應者終不能齊力致死已可知也其俗急速不能持久弓弩戟楯不如中國唯有水戰是其所便一入其地則長江非復所固還保城池則去長入短而官軍懸進人有致節之志吳人戰於其地有憑城之心如此軍不逾時克可必矣帝深納焉乃令王濬等滅吳天下書同文車同軌矣時吳王皓有兼上國之心使陸抗為荊州牧晉使羊祜與吳人相持祜增修德政以懷吳吳每與戰必克日而後合間謀掩襲並不為若臨陣俘獲軍正將斬之祜輒曰此等死節之臣也為之垂涕親加殯給其家迎喪者必厚為之祀而歸之吳將有來者輒任其所適若欲返吳便為祖道吳將有二兒皆幼在境上戲為祜軍所略經月其父謂之已死發喪祜親自勉勞供養遣歸父後感其恩德率二子來降於是陸抗每告其眾曰此專為義彼專為暴是不戰而自服也各保分界無分細益而已稱曰羊叔子雖樂毅諸葛亮何以過之陸抗將死言於吳王皓曰西陵建平國之蕃表處在上流受敵二境臣父遜昔在西垂陳言西陵國之西門如其有虞當舉國爭之臣愚以為諸侯王幼沖未掌國事乞簡閱一切以輔疆埸晉南征大將軍羊祜來朝密陳伐吳之計使王濬治船於蜀方舟百餘步皆為城郭門施樓鹵首畫怪獸以懼江神容二千餘人皆馳馬往還及柿流於吳建平太守吾彥取其流柿以呈吳王曰晉必有攻吳之計宜增建平兵建平不下終不敢渡江吳王皓不從彥乃輒為鐵鎖加之錐刺以斷於江阻於我也濬聞之乃為大筏縛草為人伏習流者下施竹炬以礙鎖錐乃興師果如濬策弗之患也太康元年安東將軍王渾擊橫江破之龍驤將軍王濬克建平丹陽二城杜預又分遣輕兵六百乘簟船渡江上樂鄉岸屯巴山多張旗幟起火山上出其不意破公安時諸將咸謂百年之寇未可全克且春水方生難於持久宜待來冬更為大舉預喻之曰昔樂毅藉濟西一戰以并強齊今兵威已振譬如破竹數節之後皆迎刃而解耳抗表論之上深然焉吳遣張悌沈瑩濟江瑩謂悌曰晉作戰船於蜀久矣今傾國大動萬里齊起並悉益州之眾浮江而下我上流諸軍無有戒備恐邊江諸城盡莫能禦也晉之水軍必至於此宜畜力待來一戰若破之日江西自清上方雖壞可還取也今渡江逆戰勝不可保若或摧喪, WYG: ''}
