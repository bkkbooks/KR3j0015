  body:
  - {type: variant, offset: 4, length: 1759, content: 十九三國權第十九蜀吳魏論曰臣聞昔漢氏不綱網漏兇狡袁本初虎視河朔劉景升鵲起荊州馬超韓遂雄據於關西呂布陳宮竊命於東夏遼河海岱王公十數皆阻兵百萬鐵騎千群合縱締交為一時之傑也然曹操挾天子令諸侯六七年閒夷滅者十八九唯吳蜀蕞爾國也以地圖按之纔四州之土不如中原之大都人怯於公戰勇於私鬭輕走易北不敵諸華之士角長量大比才稱力不若二袁劉呂之盛此二雄以新造未集之國資逆上不侔之勢然能撫劍顧眄與曹氏爭衡躍馬指麾而利盡南海何哉則地利不同勢使之然耳故易曰王侯設險以守其國古語曰一里之厚而動千里之權者地利也故曹丕臨江見波濤洶湧歎曰此天所以限南北也劉資稱南鄭為天獄斜谷道為五百里石穴稽諸前志皆畏其深阻矣雖云天道順地利不如人和若使中材守之而延期挺命可也豈區區艾濬得奮其長策乎由是觀之在此不在彼於戲智者之慮必雜於利害故不盡知用兵之害則不能知用兵之利有自來矣是以採摭其要而為此權耶夫囊括五湖席卷全蜀庶知害中之利以明魏家之略焉蜀天帝布政房心致理參伐參伐則益州分野以東井南股距星為界東井南股距星連鉞者是也觜星度在參右足玉井所銜星是西距星即參中央三星西第一星是按職方則雍州之境據禹貢則梁州之域地方五千里提封四十郡實一都會也常璩國志云蜀其卦直坤故多斑綵之章其辰直未故尚滋味詩稱文王之化被于江漢之域有文王之化焉秦豳同詩秦蜀同分故有夏聲云故古稱天府之國沃野千里其有以矣王莽末公孫述據蜀述字子陽扶風茂陵人也王莽時為導江卒正治臨邛及更始立豪強各起其縣以應漢南陽人宗成略漢中商人王岑亦起兵於雒縣自稱定漢將軍以應成述聞之遣使迎成成等至成都虜掠暴橫述意惡之召縣中豪傑謂曰天下同苦新室思劉氏久矣今聞漢將軍到馳迎道路今百姓無辜而婦子係獲室屋燒燔此寇賊非義兵也吾欲保郡自守以待真主諸卿欲并力者即留不欲者便去豪傑皆叩頭願效死述於是使人詐稱漢使者自東方來假述輔漢將軍益州牧乃選精兵千餘人而擊宗成等破之別遣弟恢於綿竹擊更始所置益州刺史張忠又破之由是威震益部者也益部功曹李熊說述曰方今四海波蕩匹夫橫議將軍割據千里地什湯武若奮發威德以投天隙霸王之業成矣今山東饑饉人民相食兵所屠滅城邑丘墟蜀地沃野千里土壤膏腴果實所生無穀而飽女工之業覆衣天下名材竹幹器械之饒不可勝用又有魚鹽銅鐵之利浮水轉漕之便北據漢中杜襃斜之隘東守巴郡拒捍關之口地方數千里戰士不下百萬見利則出兵而略地無利則堅守而力農東下漢水以闚秦地南順江流以震荊揚所謂用天因地成功之資今君王之聲聞於天下而位號未定志士狐疑宜即大位使遠人有所歸依述曰帝王有命吾何德以當之熊曰天命無常百姓與能能者當之王何疑焉遂然之也建武元年四月遂自立為天子號成家色尚白使將軍侯丹開白水關北守南鄭將軍任滿從閬中下江州東據捍關於是盡有益州之地也自更始敗後光武方事山東未遑西伐關中豪傑多擁眾歸述其後平陵人荊邯見東方將平兵且西向說述曰兵者帝王之大器古今所不能廢也隗囂遭遇運會割有雍州兵強士附威加山東不及此時摧危乘勝以爭大命而退欲為西伯之事偃武息戈卑辭事漢喟然自以武王復出也今漢帝釋關隴之憂專精東伐四分天下而有其三使西州豪傑咸居心於山東發閒使招攜貳則五分而有其四若舉兵天水必至沮潰天水既定則九分而有其八陛下以梁州之地內奉萬乘外給三軍百姓愁困不堪上命將有王氏自潰之變臣之愚計以為宜及天人之望未絕豪傑尚可招誘急以此時發國內精兵令田戎據江陵臨江南之會倚巫山之固築壘堅守傳檄吳楚長沙以南必隨風而靡令延岑出漢中定三輔天水隴西拱手自服如此海內震搖冀有大利述以問群臣博士吳柱曰昔武王伐紂八百諸侯不期同辭然猶還師以待天命未聞無左右之助而欲出師于千里之外以廣封疆者也邯曰今東帝無尺寸之柄驅烏合之眾跨馬陷敵所向輒平不亟乘時與之爭功而坐談武王之說是效隗囂欲為西伯也范曄曰援旗糾族假制明神迹夫創圖首事有以識其風矣終於孤立一隅介於大國隴坻雖隘非有百二之勢區區兩郡以禦堂堂之鋒則知其道有足懷者所以棲有四方之傑夫功全則譽顯業謝則釁生迴成喪而為其議者或未聞焉若囂命會符運敵非天力坐論西伯豈多嗤也耶述不聽邯計光武乃使岑彭吳漢伐蜀破荊門長驅入江關岑彭為蜀刺客所殺吳漢并將其軍入犍為界諸縣皆城守漢乃進軍攻廣都拔之遣輕騎燒成都市橋陽武以東諸小城皆降光武戒漢曰成都十萬眾不可輕也但堅據廣都待其來攻勿與爭鋒若不敢來攻轉營追之須其力疲乃可擊也漢乘利將步騎二萬餘人進逼成都去城十餘里阻江北為營作浮橋使副將劉尚將萬餘人屯江南相去, WYG: ''}
