  - {type: variant, offset: 13245, length: 887, content: 以服雄傑大略也扶弘義以致英俊大德也天下雖有逆節不能為累明矣韓暹楊奉其敢為害若不時定四方生心後雖慮之無及太祖至洛陽奉天子都許維其弛紊紉其贅旒俾我漢家不失舊物矣於是運籌演謀鞭撻宇內北破袁紹南擄劉琮東舉公孫康西夷張魯議曰劉表諸傑雖中間自有吞并乃揚雄所謂六國蚩蚩為嬴弱姬者也并吞雖眾適所以為吾奉也九州百郡十并其八志績未究中世而殞曹操字孟德少機警有權數而任俠放蕩不治行業故世人未之奇也唯喬玄異焉謂曰天下將亂非命世之才不能濟也能安之者其在君乎太祖為東郡太守治東武陽軍頓丘黑山賊于毒等攻東武陽太祖引兵西入山攻毒等本屯諸將皆以為當還自救太祖曰昔孫臏救趙而攻魏耿弇欲走西安而攻臨淄使賊聞我西而還是武陽自解也不還我能敗虜家虜不能敗武陽必矣乃行毒聞之棄武陽還太祖要擊大破之初遼東太守公孫康恃遠不服袁尚袁熙依之及太祖破烏丸或說公遂征之尚兄弟可擒也公曰吾方使康斬送尚熙首不煩兵矣九月公引軍自柳城還康即斬送尚熙首眾將問曰公還而康斬送尚熙何也公曰彼素畏尚等吾急之則并力緩之則自相圖其勢然也太祖攻呂布於下邳不拔欲還荀攸曰布勇而無謀今三軍皆北其銳氣衰三軍以將為主主衰則軍無奮意陳宮有智而遲今及布氣未復宮謀之未定進急攻之布可拔也乃決沂泗灌城城潰生擒布袁紹將文醜與太祖戰荀攸勸太祖以輜重餌賊賊遂奔之陣亂斬文醜太祖與袁紹相持於官渡時公糧少與荀彧書議欲還許彧曰紹悉眾聚官渡欲與公決勝敗公以至弱當至強若不能制必為所乘是天下之大機也且紹布衣之雄耳能聚人而不能用夫以公之神武明哲而輔以大順何向而不濟今軍雖少未若楚漢在滎陽成皋時也是時劉項莫肯先返先返者勢屈公以十分居一之眾畫地而守之扼其喉而不得進已半年矣情見勢竭必將有變此用奇之時不可失也又紹謀臣許攸貪財紹不能縱來奔說太祖襲紹別屯燔其糧穀遂破紹張繡在南陽與荊州牧劉表合太祖征之謀臣進曰繡與劉表相恃為強然繡以游軍而食於表表不能供也急之則并力緩之則自離太祖不從表果遣兵救繡太祖兵敗三年春太祖還許繡兵來追太祖軍不得進與荀彧書曰賊來追我雖日行數里吾策之至安眾破之必矣果設奇伏攻破之公還許荀彧問前何以策賊必破對曰虜遏歸師與我死地戰吾是以知勝西平麴光殺其郡守以叛諸將欲擊之張既曰唯光等造, WYG: ''}
