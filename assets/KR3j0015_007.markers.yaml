  - {type: variant, offset: 14526, length: 0, content: '', WYG: 挫于險塞而糧食竭于内藏百姓罷極怨望無所依倚以臣料之其勢非天下聖賢固不能息天下之禍當今兩主之命懸于足下足下為漢則漢勝與楚則楚勝臣願披腹心輸肝膽效愚計恐足下不用也誠能聽臣之計莫若兩利而俱存之三分天下鼎足而居其勢莫敢先動夫以足下之賢聖有甲兵之衆據强齊從燕趙出空虚之地而制其後因民之欲西嚮為百姓請命則天下風起而響應矣孰敢不聽割大弱强以立諸侯諸侯已立天下服聽而歸徳于齊案齊之故有膠泗之地懐諸侯以徳深拱揖譲則天下之君王相率而朝于齊矣盖聞天與不取反受其咎時至不行反受其殃願足下熟慮之韓信曰漢王遇我厚載我以其車衣我以其衣食我以其食吾聞之乗人之車者載人之患衣人之衣者懐人之憂食人之食者死人之事吾豈可嚮利背義乎蒯生曰足下自以為善漢王欲建萬世之業臣竊以為誤矣始常山王成安君為布衣時相與為刎頸之交後爭張黶陳澤之事二人相怨常山王奉項嬰頭䑕竄歸于漢王漢王借兵東下殺成安君泜水之南頭足異處卒為天下笑此二人相與天下至歡然而卒相擒者何也患生于多欲人心難測也今足下欲行忠信以交于漢王必不能固于二君之相與也而事多大于張黶陳澤故臣以為足下必漢王之不危已亦誤矣大夫種范蠡存亡越伯勾踐立功成名而身死亡諺曰野獸}
