  - {type: variant, offset: 14531, length: 2, content: 帝遷, WYG: 甚乎議曰楚白公勝殺子西刦恵王葉公聞白公為亂率國人攻白公白公敗亡也王莽時寇盗羣發莽遣將軍廉丹伐山東丹辟馮衍為掾與俱至定陶莽追詔丹曰將軍受國重任不能捐身中野無以報恩塞責丹惶恐夜召衍以書示之衍因説丹曰衍聞之順而成者道之所大也逆而攻者權之所貴也是故期于有成不問所由論于大體不守小節昔逢丑父伏軾而使其君取飲稱于諸侯鄭祭仲立突而出忽終得復位美於春秋盖以死易生以存易亡君子之道也詭于衆意寧國存身賢者之慮也故易曰窮則變變則通通則久是以自天佑之吉無不利若夫知其不可而必為之破軍殘衆無補于主身死之日負義之世賢者不為勇者不行且衍聞之得時無怠張良以五代相韓椎秦始皇于博浪之中勇冠乎賁育名髙于太山將軍之先為漢信臣新室之興英儁不附今海内潰亂民懐漢徳甚于詩人之思召公也愛其甘棠而况子孫乎民所歌舞天必從之方今為將軍計莫若屯據大郡鎮撫吏士砥礪其節百里之内牛酒日賜納雄傑之士詢忠智之謀要將來之心待縱横之變興社稷之利除萬人之害則福禄流于無窮功烈著于不滅何為軍覆于中原身膏于草野功敗名喪恥及先祖哉聖人轉禍而為福智士因敗而為功願將軍深計而無與俗同丹不能從進及睢陽復説丹曰蓋聞}
