  - {type: variant, offset: 15816, length: 1031, content: 鑒聖上明哲宰相忠賢將比隆黃軒侔功往代銜命來征思聞嘉響果煩來使告以德音此非人事乃天意也昔微子歸周實為上賓君子豹變義存大易來辭謙沖以禮舉櫬此皆前哲歸命之典全國為上破國次之自非通明智達何以見王者之義乎後主至洛陽策命之為安樂公曰蓋統天載物以咸寧為大光宅天下以時雍為盛乃者漢氏失統六合震擾我太祖承運龍興弘濟八極是用應天順人撫有區夏於時乃考因群傑虎爭九服不靖乘間阻遠保據庸蜀幾將五紀朕永惟祖考思在綏輯四海爰整六師曜威梁益公恢崇德度應機豹變履信思順以享左右無疆之休豈不遠歟往欽哉其祇服朕命克廣德心以終乃顯烈初晉文王欲遣鍾會伐蜀邵悌曰今鍾會率十萬餘眾伐蜀愚謂會單身無重任不若餘人文王曰我寧當復不知此耶若滅蜀後如卿所慮當何能辨凡敗軍之將不可以語勇亡國之大夫不可以圖存心膽已破故也若蜀已破遺人震恐不足與圖事中國將士各自思歸不肯與同也若作惡祇自族耳會果與姜維反魏將士發憤殺會及維也至晉末譙縱復竊蜀宋劉裕使朱齡石伐蜀聲言從內水取成都敗衣羸老進水口譙縱果疑其內水上也議曰內水涪江也悉軍新城以待之乃配朱齡石等精銳徑從外水議曰外水泜江也若中今雒縣水是也直至成都不戰而擒縱事具霸紀上此滅蜀形也魏嘉平中孫權死征南大將軍王昶征東大將軍胡遵鎮南將軍毋丘儉等表征吳朝廷以三征計異詔訪尚書傅嘏嘏對曰昔夫差勝齊陵晉威行中國不能以免姑蘇之禍齊閔闢土兼國開地千里不足以救顛覆之敗有始者不必善終古事之明效也孫權自破蜀兼荊州之後志盈欲滿兇亢已極相國宣文王先識取亂侮亡之義深達宏圖大舉之策今權已死托孤於諸葛恪若矯權苛暴蠲其虐政民免酷烈偷安新惠外內齊慮有同舟之懼雖不能終自保完猶足以延期挺命於深江之外矣今議者或欲泛舟徑濟橫行江表或欲倍道並進攻其城壘或欲大佃疆埸觀釁而動此三者皆取賊之常計然施之當機則功成若苟不應節必貽後患自治兵以來出入三載非掩襲之軍也賊喪元帥利存退守若羅船津要堅城清野橫行之計其殆難捷也賊之為寇六十年君臣偽立吉兇同患若恪蠲其弊天奪之疾崩潰之應不可卒待也今賊設羅落又持重密間諜不行耳目無聞夫軍無耳目投察未詳而舉大眾以臨巨險此為希幸徼功先戰而後求勝非全軍之長策也唯有大佃最差完牢兵出民表寇鈔不犯坐食積穀不煩運士乘釁討襲無遠勞費此軍之急務也夫屯壘相逼巧拙得用策之而知得失之計角之而知有餘不足之處情偽將焉所逃夫以小敵大則役煩力竭以貧敵富則斂重財匱故敵逸能勞之飽能飢之此之謂也然後盛眾厲兵以振之參惠倍賞以招之多方廣似以疑之由不虞之道以間其不戒比及三年左提右挈虜必冰散瓦解安受其弊可坐算而得也昔漢氏歷世常患匈奴朝臣, WYG: ''}
