  - {type: variant, offset: 18491, length: 0, content: '', WYG: 時王方食吐哺罵酈生曰豎儒幾敗我事趣令銷印此異形者也荀恱曰夫立䇿决勝之術其要有三一曰形二曰勢三曰情形者言其大體得失之數也勢者言其臨時之勢進退之機也情者言其心志可否之實也故䇿同事者三術不同也初}
  - {type: variant, offset: 18491, length: 0, content: '', krp: 時王方食吐哺罵酈生曰豎儒幾敗我事趣令銷印此異形者也荀恱曰夫立䇿决勝之術其要有三一曰形二曰勢三曰情形者言其大體得失之數也勢者言其臨時之勢進退之機也情者言其心志可否之實也故䇿同事者三術不同也初}
  - {type: variant, offset: 18492, length: 1, content: 悌, WYG: 耳說陳涉以復六國後自為樹黨酈生亦用此説漢王所以説者事同而得失異者何哉當陳渉之起也天下皆欲亡秦而楚漢之分未有所定今天下未必欲亡項也且項羽力能率從六國如秦之勢則不能矣故立六國于陳涉所謂多已之黨而益秦弊也且陳渉未能專天下之土也所謂取非其有以徳于人行虚惠而收實福也立六國于漢王所謂割已之有而以資敵設虚名而受實禍也此事同而異形者也七國時秦王謂陳軫曰韓魏相攻朞年不解或曰救之便或曰勿救之便寡人不能决請為寡人决之軫曰昔卞莊子方制虎管䜿子止之曰兩虎方食牛牛甘必爭爭必鬭鬭則大者傷小者死從傷而刺之一舉必有兩虎之名今韓魏相攻朞年不解必是大國傷小國亡從傷而伐之一舉必有兩實此卞莊刺虎之類也恵王曰善果如其言初諸侯之叛秦也秦將軍邯圍趙王于鉅鹿楚懐王使項羽宋義等北救趙至安陽今相州安陽縣也留不進羽謂義曰今秦軍圍鉅鹿疾引兵渡河楚擊其外趙應其内破秦軍必矣宋義曰不然夫搏牛之蝱不可以破蝨蝱喻秦也蝨喻章邯也喻今將兵方欲滅秦不可盡力與章邯即戰也今秦攻趙戰勝則兵罷我承其弊不勝則我引兵鼔行而西必舉義矣故不如鬭秦趙夫擊輕銳我不如公坐運籌䇿公不如我羽曰將軍戮力而攻秦久留不行今嵗饑民貧士卒半菽士卒食蔬菜以菽雜之半軍無見粮乃飲酒髙㑹不引兵渡河因趙食與并力擊秦乃曰承其弊夫以秦之强攻新造之趙其勢必舉趙趙舉而秦强何弊之承且國兵新破王不安席埽境内而屬將軍國家安危在此一舉今不恤士卒而狥私非社稷臣也即夜入義帳中斬義悉兵渡河沉舟破釡示士卒必死無還心大破秦軍此異勢者也茍悦曰宋義待秦趙之弊與卞莊刺虎事同而勢異何也施之戰國之時隣國相攻無臨時之急則可也戰國之立其來乆矣一戰之勝敗未必以亡也其勢非能急于亡敵國也進則乗利退則自保故畜力待時承弊然也今楚趙新起其力與秦勢不並立安危之機呼吸成變進則定功退則受禍此事同而勢異者也韓信伐趙軍井陘選輕騎二千人人持一赤幟從間道昇山而望趙軍誡曰趙見我走必空壁逐我若疾入趙壁㧞趙幟立漢赤幟信乃使萬人先行出背水陣平旦信建大將之旗鼔行出井陘口趙開壁擊之大戰良久于是信棄旗鼓走水上軍水上軍開入之復疾戰趙空壁争漢旗鼓逐韓信韓信等已入水上軍軍皆殊死戰不可敗信出竒兵二千騎共候趙空壁逐利則馳入趙壁皆㧞趙旗立漢赤幟二千趙軍已不能得信等欲還歸壁皆漢赤幟而大驚以為皆已得趙王將矣遂亂遁走趙將雖斬之不能禁也于是漢兵乗擊大破之虜趙軍諸將効首虜皆賀信因問曰兵法背右山陵前左水澤今者反背水陣然竟以勝此何術也信曰兵法不曰䧟之死地而後生置之亡地而後存且信非得素撫循士大夫也此所謂驅市人而戰之其勢非置之死地使人人自為戰今與之生地皆走寧尚可得而用之又髙祖刼五諸侯兵入彭城項羽聞之乃引兵去齊與漢大戰睢水上大破漢軍多殺士卒睢水為之不流此異情者也荀恱曰伐趙之役韓信軍泜水而趙不能敗何也彭城之難漢王戰于睢水之上士卒赴入睢水而楚兵大勝何也趙兵出國能見可而進知難而退深懐内顧之心不為必死之計韓信孤軍立于水丄有必死之計無生慮也此信之所以勝也漢王制敵入國飲酒髙㑹士衆逸豫戰心不同楚以强大之威而喪其國都項羽自外而入士卒皆有憤激之心救敗赴亡以决一旦之命此漢所以敗也且韓信選精兵以守而趙以内顧之士攻之項羽選精兵以攻漢而漢王以懈怠之卒應之此事同情異者也故曰權不可預設變不可先圖與時遷移應物變化計䇿之機也漢王在漢中韓信說曰今士卒皆山東人跂而望歸及其鋒東向可以争天下後漢光武北至薊聞邯鄲兵到世祖欲南歸召官屬計議耿弇曰今兵從南來不可南行漁陽太守彭寵公之邑人上郡太守即弇父也發此兩郡控弦萬騎邯鄲不足慮也世祖官屬}
