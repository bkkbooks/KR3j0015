  - {type: variant, offset: 12686, length: 167, content: 理不形言帝王之因天時也古人有言曰天時不如地利易曰王侯設險以守其國言國之恃險也又曰地利不如人和在德不在險言守之由人也吳之興也參而由焉孫卿所謂合其參者及其亡也恃險而已婁敬曰周之衰也分而為兩天下莫朝周不能制非其德薄也形勢弱也由此觀之國之興亡亦資險云非唯在德而已矣至晉永嘉中中原喪亂晉元帝復渡江王江南宋齊梁陳皆都焉事在霸紀上此吳國形也魏古者天, WYG: 后虐我則讐尸}
