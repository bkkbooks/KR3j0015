body:
  text: 釣情第二十二釣情第二十二孔子曰未見顏色而言謂之瞽又曰未信則以為謗己孫卿曰語而當智也默而當知也尸子曰聽言耳目不懼視聽不深則善言不往焉是知將語者必先釣於人情自古然矣韓子曰夫説之難也在知所説之心可以吾説當之説之以厚利則見下節而遇卑賤必棄遠矣所説實為厚利則陰用其言而顯棄其身此不可不知也説之以名高則見無心而遠事情必不收矣所説實為名高而陽收其身而實疏之此不可不知事以密成語以泄敗未必其身泄之也而説及其所匿之事如是者身危周澤未渥也而語極知説行而有功則德亡説不行而有敗則見疑如是者身危貴人有過端而説者明言善議以推其惡者身危貴人或得計而欲自以為功説者與知焉則身危強之以其所不為止之以其不能已者身危又曰與之論大人則以為間己與之論細人則以為粥權論其所愛則以為借資論其所惜則以為嘗己順事陳意則曰怯懦而不盡慮事廣肆則曰草野而倨侮此不可不知也彼自知其計則無以其失窮之自勇其斷則無以其敵怒之凡説須曠日彌久周澤既渥深計而不疑交爭而不罪乃明計利害以致其功直指是非以飭其身以此相持此説之成也荀悅曰夫臣下之所以難言者何也言出乎身則咎悔及之矣故曰舉過揭非則有干忤之咎勸勵教誨則有俠上之譏言而當則恥其勝己也言而不當則賤其愚也先己而同則惡其奪己明也後己而同則以為從順也違下從上則以為諂諛也違上從下則以為雷同也與衆共言則以為順負也違衆獨言則以為專美也言而淺露則簡而薄之深妙弘遠則不知而非之特見獨智則衆惡其蓋之也雖是而不見稱與衆同智則以為附隨也雖得之不以為功謙讓不爭則以為易窮言而不盡則以為懷隱進説竭情則以為不知量言而不效則受其怨責言而事效則以為固當利於上不利於下或便於左則不便於右或合於前而忤於後此下情所以常不通仲尼發憤稱豫欲無言者蓋為語之難也何以明其難耶昔宋有富人天雨牆壞其子曰不築且有盜其鄰人亦云暮而果大亡其家智其子而疑鄰人之父鄭武公欲伐胡乃以其子妻之因問群臣吾欲用兵誰可伐者關其思曰胡可伐乃戮關其思曰胡兄弟之國也子言伐之何也胡君聞之以鄭為親己而不備鄭鄭人襲胡取之此二説者其智皆當矣然而甚者為戮薄者見疑非智之難也處智則難衛人迎新婦婦上車問驂馬誰馬也御曰籍之新婦謂僕曰拊驂無苦服車至門拔教逆毋滅櫓將失火入室見臼曰徙牖下妨往來者主人大笑之此三言皆要言也然而不免為笑者早晚之時失矣此説之難也説者知其難也故語必有釣以取人情何以明之昔齊王后死欲置后而未定使群臣議薛公田嬰欲中王之意因獻十珥而美其一旦日因問美珥所在因勸立以為王后齊王大悅遂重薛公此情可以物釣也申不害始合於韓王然未知王之所欲也恐言而未必中於王也王問申子曰吾誰與而可對曰此安危之要國家之大事也臣請深惟而苦思之乃微謂趙卓韓朝曰子皆國之辨士也夫為人臣者言何必用盡忠而已矣二人各進議於王以事申子微視王之所悅以言於王王大悅之此情可以言釣也吳伐越越棲於會稽句踐喟然歎曰吾終此乎大夫種曰湯繫夏臺文王囚羑里重耳奔翟齊小白奔莒其卒霸王由是觀之何遽不為福乎句踐及得免務報吳大夫種曰臣觀吳王政驕矣請嘗之乃貸粟以卜其事子胥諫勿與王遂與之子胥曰王不聽諫後三年吳其墟矣太宰嚭聞之讒曰伍員貌忠而實忍人吳遂殺子胥此情可以事釣也客以淳于髡見梁惠王惠王屏左右再見之終無言惠王怪之讓客客謂淳于髡髡曰吾前見王王志在馳逐後復見王王志在音聲是以默然客具以報王王大駭曰淳于先生誠聖人也前有獻善馬者寡人未及試會生來後有獻謳者未及試又會生來寡人雖屏人然私心在彼此情可以志釣也智伯從韓魏之君伐趙韓魏用趙臣張孟談之計陰謀叛智伯張孟談因朝智伯遇智果於轅門之外智果入見智伯曰二主殆將有變臣遇張孟談察其志矜而行高見二君色動而變必背君矣智伯不從智果出遂更其姓為輔氏張孟談入見趙襄子曰臣遇智果於轅門之外其視有疑臣之心入見智伯而更其族今暮不擊必後之矣襄子曰諾因與韓魏殺守隄之吏決水灌智伯軍此情可以視釣也殷浩仕晉有盛名時人觀其出處以卜江左興亡此情可以賢釣也呂氏春秋曰夫國之將亡有道者先去鈐經曰喜色湭然以出怒色麃然以侮欲色熰然以愈懼色憚然以下憂色懼然以靜此情可以色釣也易曰將叛者其辭慚中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈周禮五聽一曰辭聽辭不直則煩二曰色聽色不直則赧三曰氣聽氣不直則喘四曰耳聽耳不直則惑五曰目聽目不直則眊然由是觀之夫人情必見於物昔者晉王好色驪姬乘色以壅之吳王好廣地太宰陳伐以壅之桓公好味易牙蒸子以壅之沉冥無端甚可畏也故知人主之好惡不可見於外所好惡見於外則臣妾乘其所好惡以行壅制焉故曰人君無見其意將為下餌此之謂也能知此者可以納説於人主矣詭信第二十三詭信第二十三孔子曰君子貞而不諒又曰信近於義言可覆也由是言之唯義所在不必信也議曰微哉微哉天下之事也不有所廢則無以興若忠於斯必不誠于彼自然之理矣由是觀之則吾之所謂忠則彼之所謂詐也然則忠之與詐將何而取定哉抑吾聞之夫臣主有大義上下有定分此百代不易之道也故欲行忠觀臣主之義定欲行信顧上下之分明苟分義不愆於躬雖譎而不正可也何以明之葉公問孔子曰吾黨有直躬者其父攘羊而其子證之孔子曰吾黨有直躬者異於是父為子隱子為父隱直在其中矣楚子圍宋宋求救於晉晉侯使解楊如宋使無降楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子厚賂之使反其言許之登諸樓車使呼宋人而告之遂致其君命楚子將殺之使與之言曰爾既許不穀而反之何故非我無信汝則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衛社稷民之主也義無二信信無二命君之賂臣不知命也受命以出有死無霣又何賂乎臣之許君以成命也死而成命臣之祿也寡君有信臣下臣獲考考成也死又何求楚子舍之以歸韓子曰楚有直躬者其父竊羊而訐之官令尹曰必殺之以為直於君而曲於父執其子而罪之以是觀之夫君之直臣父之暴子也魯人從君戰三戰三北仲尼問其故對曰吾有老父死莫之養也仲尼以為孝舉而用之以是觀之夫父之孝子君之北人也故令尹誅而楚姦不止聞仲尼之賞魯人易降此上下之利若是其異也而人主兼舉匹夫之行而求致社稷之福必不幾矣顏率欲見公仲公仲不見顏率謂公仲之謁者曰公仲必以率為偽也故不見率公仲好內率曰好士公仲嗇於財率曰散施公仲無行率曰好義自今以來率且正言之而已矣公仲之謁者以告公仲公仲遽起而見之議曰語稱惡訐以為直者易曰君子以遏惡揚善若使顏率忠正則公仲之惡露故顏率詐偽則公仲之福齊伐燕得十城燕王使蘇秦説齊齊歸燕十城蘇秦還燕人或毀之曰蘇秦左右賣國反覆之臣也將作亂燕王意疏之捨而不用蘇秦恐被罪入見王曰臣東周之鄙人也無尺寸之功而王親拜之於廟禮之於庭今臣為王却齊之兵而功得十城宜以益親今來而王不官臣者人必有以不信傷臣於王者且臣之不信王之福也燕王亦嘗謂蘇代曰寡人甚不喜訑者言也代對曰周地賤媒為其兩譽也之男家曰女美之女家曰男富然周之俗不自為娶妻且夫處女無媒老且不嫁舍媒而自衒斃而不售順而無毀則售而不斃者唯媒耳且事非權不立非勢不成夫使人坐受成事者唯訑耳訑因土和反使臣信如尾生廉如伯夷孝如曾參三者天下之高行而以事王可乎燕王曰可也蘇秦曰有此臣亦不事王矣孝如曾參義不離其親宿昔於外王又安得使之步行千里而事弱燕之危王哉廉如伯夷義不為孤竹君之嗣不肯為武王之臣不受封侯而餓死于首陽之下有廉如此者王又安能使之步行千里而進取於齊哉信如尾生與女子期於梁柱之下女子不來水至不去抱梁柱而死有信如此何肯揚燕秦之威却齊之強兵哉韓子曰夫許由積牙卞隨務光伯夷叔齊此數人者皆見利不喜臨難不恐夫見利不喜雖厚賞無以勸之臨難不恐雖嚴刑無以威之此謂不令之人先古聖王皆不能臣當今之代將安用之且夫信行者所以自為也非所以為人也皆自覆之術非進取之道也且三王代興五霸迭盛皆不自覆君以自覆為可乎則齊不益於營丘足下不窺於邊城之外昔鄭子産獻入陳之捷于晉晉人問曰何故侵小對曰先王之命惟罪所在各致其辟且昔天子之地一圻列國一同由是以殺今大國多數圻矣若無侵小何以至大焉晉人不能詰也且臣之有老母於東周離老母而事足下去自覆之術而行進取之道臣之趨固不與足下合者足下者自覆之君也僕者進取之臣也臣所謂以忠信得罪於君也燕王曰夫僕信又何罪之有也對曰足下不知也臣鄰家有遠為吏者其妻私人其夫且歸其私者憂之其妻曰公勿憂也吾已為藥酒待之矣後二日夫至妻使妾奉巵酒進之妾知其藥酒也進之則殺主父言之則逐主母乃佯僵棄酒主父大怒而笞之妾之棄酒上以活主父下以存主母忠至如此然不免於笞此以忠信得罪也臣之事適不幸而類妾之棄酒也且臣之事足下亢義益國今乃得罪臣恐天下後事足下者莫敢自必也且臣之説齊曾不欺之也後之説齊者莫如臣之言雖堯舜之智不敢取之燕王曰善復厚遇之由是觀之故知譎即信也詭即忠也夫詭譎之行乃忠信之本焉忠疑第二十四忠疑第二十四夫毀譽是非不可定矣以漢高之略而陳平之謀毀之則疏譽之則親以文帝之明而魏尚之忠繩之以法則為罪施之以德則為功知世之聽者多有所尤多有尤即聽必悖矣尤過何以知其然耶呂氏春秋云人有亡斧者意其鄰之子視其行步顏色言語動作態度無為而不竊斧者也竊掘其谷而得其斧谷坑也他日復見其鄰之子動作態度無似竊鈇者也其鄰之子非變也己則變之變之者無他有所尤矣邾之故為甲裳以帛以帛綴甲公息忌謂邾之君曰不若以組邾君曰善下令令官為甲必以組公息忌因令其家皆為組人有傷之者曰公息忌所以欲用組者其家為因裳多以組也傷敗也邾君不悅於是乎止無以組邾君有所尤也邪之故為甲以組而便也公息忌雖多為組何傷以組不便公息忌雖無以為組亦何益為組與不為組不足以纍公息忌之説也纍辱也凡聽有不可不察樓緩曰公父文伯仕於魯病而死女子為自殺於房中者二人其母聞之弗哭其相室曰焉有子死而弗哭乎其母曰孔子賢人也逐於魯而是人弗隨之今死而婦人為自殺若是者必其於長者薄而於婦人厚故從母言之是為賢母從妻言之是不免於妬妻也故其言一也言者異則人心變矣樂羊為魏將而攻中山其子在中山中山之君烹其子而遺之羹樂羊盡啜之文侯曰樂羊以我故食其子之肉堵師贊曰其子且食之其誰不食樂羊罷中山文侯賞其功而疑其心淮南子曰親母為其子扢禿出血至耳見者以為愛子之至也使在於繼母則過者以為悷也事之情一也所以觀者異耳從城上視牛如羊視羊如豚所居高也窺面於盤水則圓於柸則音隨訓虧也面形不變其故有所圓有所者所自窺之異也今吾雖欲正身而待物庸詎知世之所自窺於我者乎是知天下是非無所定也世各是其所是非其所非今吾欲擇是而居之擇非而去之不知世之所是非者孰是孰非哉議曰夫忘家殉國則以為不懷其親安能愛君衛公子開方吳起樂羊三人是也若私其親則曰將受命之日則忘其家臨軍約束則忘其親援桴鼓則忘其身穰且殺莊賈是也故傳曰欲加之罪能無辭乎審是非者則事情得也故有忠而見疑者不可不察用無用第二十五用無用第二十五古人有言曰得鳥者羅之一目然張一目之羅終不能得鳥矣鳥所以能遠飛者六翮之力也然無衆毛之助則飛不能遠矣以是推之無用之為用也大矣故惠子謂莊子曰子言無用矣莊子曰知無用而始可與言用矣夫天地非不廣且大也人之所用容足耳然則削足而墊之至黃泉人尚有用乎惠子曰無用莊子曰然則無用之為用也亦明矣昔陳平智有餘而見疑周勃質朴忠而見信夫仁義不足相懷則智者以有餘見疑而朴者以不足取信矣漢徵處士樊英楊厚朝廷若待神明至竟無他異李固朱穆以為處士純盜虛名無益於用然而後進希之以成器世主禮之以得衆孔子稱舉逸人天下之人歸心焉燕昭尊郭隗以致劇樂齊桓禮九九之術以招英雋之類也原其無用亦所以為用也而惑者忽不踐之地賒無用之功至乃誚謲遠術賤斥國華不亦過乎恩生怨第二十六恩生怨第二十六傳稱諺曰非所怨勿怨寡人怨矣是知几怨者不怨於所疏必怨於親密何以明之高子曰小辨小人之詩也孟子曰何以言之高子曰怨孟子曰固哉夫高叟之為詩也有越人於此關弓而射我我則談笑而道之無他疏之也兄弟關弓而射我我則泣涕而道之無他戚之也然則小辨之怨親親也親親仁也小辨刺幽王也太子之傳作焉晉使韓簡子視秦師云師少於我鬭士倍我公曰何故對曰出因其資入用其寵飢食其粟三施而不報所以來也觀秦怒而來則知至恩必有至怨矣杜鄴説王音曰鄴聞人情恩深者其養謹愛至者其求謹夫戚而不見異親而不見殊戚近也殊謂異於疏者也孰能無怨此棠棣角弓之所作也由此觀之故知怨也者親之也恩也者怨之所生也不可不察詭順第二十七詭順第二十七趙子曰夫雲雷世屯瞻烏未定當此時也在君為君委質治人各為其主用職耳故高祖賞季布之罪晉文嘉寺人之過雖前窘莫之怨也可謂通於大體矣昔晉文公初出亡獻公使寺人披攻之蒲城披斬其袪及反國呂郤畏逼將焚公宮而殺之寺人披請見公使讓之曰蒲城之役君命一宿汝即至其後余從狄君以田渭濱汝為惠公來求殺余命汝三宿汝中宿至雖有君命何其速也對曰臣謂君之入也其知之矣若猶未也又將及難君命無二古之制也除君之惡惟力是視蒲人狄人余何有焉今君即位其無蒲狄乎齊桓公置射鉤而使管仲相君若易之何辱命焉行者甚罪豈唯刑臣國君而讎匹夫懼者甚衆也軫見之以難告得免呂郤之難韓子曰齊晉絶嗣不亦宜乎桓公能用管仲之功而忘射鉤之怨文公能聽寺人之言而棄斬袪之罪桓公文君能容二子也後世之君明不能及二公後世之臣賢不如二子以不忠之臣以事不明之君君不知則有子罕田常之劫知之則因以管仲寺人自解君必不誅而自以為有桓文之德是臣其讎而時不能燭多暇之資自以為賢而不惑則雖無後嗣不亦可乎陳軫與張儀俱事秦惠王惠王皆重之二人爭寵儀惡軫於王曰軫重幣輕使秦楚之間將為國交也今楚不善於秦而善於軫軫為楚厚而為秦薄也軫欲去秦而之楚王何不聽之王乃召軫而問之軫曰臣願之楚臣出必故之楚且明臣為楚與不也昔楚有兩妻者王聞之乎王曰弗聞軫曰楚有兩妻者人挑其長者長者罵之挑其少者少復者挑之居無幾何有兩妻者死客為挑者曰為汝娶少者乎娶長者乎挑者曰娶長者客曰長者罵汝少者復挑汝汝何故娶長者挑者曰居人之所則欲其挑我為我之妻則欲其罵人今楚王明主昭陽賢相使軫為臣常以國情輸楚楚王將不留臣昭陽將不與臣從事矣臣何故之楚臣出必故之楚足以明臣為楚與否也軫出儀入問王曰軫果欲之楚不王曰然儀曰軫不為楚楚王何為欲之王復以儀言謂軫軫曰然王曰儀之言果信矣軫曰非獨儀知之行道之人盡知之矣子胥忠於君而天下皆爭以為臣曾參孝己愛於親而天下皆願以為子故賣僕妾不出閭巷售者良軫妾也出婦嫁於鄉曲者必善婦也今軫若不忠於君楚亦何以為臣乎忠且見棄軫不之楚將何歸乎王以其言為然遂厚待之惠王終相張儀軫遂奔楚張儀初惡陳軫於惠王曰軫猶善楚為求地甚力左爽謂陳軫曰儀善於魏王魏王甚信之公雖百説猶不聽也公不如以儀之言為質而得復楚軫曰善因使人以張儀之言聞於楚王楚王喜欲復之軫乃奔楚也韓信初為齊王時蒯通説信使三分天下信不聽後知漢畏惡其能乃與狶謀反事泄呂太后以計擒之方斬曰吾悔不聽蒯通之計乃為兒女子所詐豈非天哉高祖自將伐陳狶於巨鹿信稱疾不從欲於中起信舍人得罪於信信囚欲殺之舍人弟上變告信欲反狀於呂后呂后欲召恐其黨不就乃與蕭相國謀詐令人從上所來言狶已得死列侯群臣皆賀相國詐信曰雖病強入賀信入呂后使武士縛信斬之也高祖歸乃詔齊捕通通至上曰若教淮陰侯反耶曰然臣固教之豎子不用臣之策故今自夷於此如彼豎子用臣之計陛下安得夷之乎上怒曰烹之通曰嗟乎冤哉烹也上曰若教韓信反何冤對曰秦之綱弛而維絶山東大擾異姓並起英雋烏聚秦失其鹿天下共逐之於是高材疾足者先得焉跖之狗吠堯堯非不仁狗固吠非其主當是時臣獨知韓信非知陛下也且天下鋭精持鋒欲為陛下所求者甚衆故力不能耳又可盡烹耶高帝曰置之乃釋通之罪也貂勃常惡田單曰安平君小人也安平君聞之故為酒而召貂勃曰單何以得罪於先生故常見譽於朝貂勃曰跖之狗吠堯非貴跖而賤堯也狗固吠非其人也且今使公孫子賢而徐子不肖然而使公孫子與徐子鬭徐子之狗固攫公孫子之腓而噬之若乃得去不肖者而為賢者狗豈特攫其腓而噬之哉安平君曰敬聞命矣任之於王後田單得免九子之讒貂勃之力也初吳王濞與七國謀反及發濟北王欲自殺公孫玃俱碧反謂濟北王曰臣請試為大王明説梁王通意天子説而不用死未晚也公孫玃遂見梁王曰夫濟北之北東接強齊南牽吳越北脅燕趙此四分五裂之國權不足以自守徑不足以扞寇又非有奇佐之士以待雖也雖墜墜失也言於吳非其正計也昔鄭祭仲許宋人立公子突以活其君非義也春秋記之為其以生易死以存易亡也嚮使濟北見情實示不從之端則吳必先歷齊畢濟北招燕趙而總之如此則山東之縱結而無隙矣今吳楚之王練諸侯之兵驅白徒之衆西與天子爭衡濟北獨底節堅守不下使吳失與而無助跬行獨進瓦解土崩破敗而不救者未必非濟北之力也夫以區區之濟北而與諸侯爭強是以羊犢之弱而捍虎狼之敵也守職不撓可謂誠一矣功義如此尚見疑於上脅肩低首纍足撫襟使有自悔不前之心悔不與吳西也非社稷之利也臣恐藩臣守職者疑之臣竊料之能歷西山徑長樂抵未央攘袂而正議者獨大王耳上有全亡之功下有安百姓之名德淪於骨髓恩加於無窮願大王留意詳惟之孝王大説使人馳以聞濟北王得不坐徙封於災川陳琳典袁紹文章袁氏敗琳歸太祖太祖謂曰卿昔為本初移書但可罪狀孤而已惡止其身何乃上及祖父耶琳謝曰楚漢未分蒯通進策於韓信乾時之戰管仲肆力於子糾唯欲效計其主助福一時故跖之客可以刺由桀之狗可使吠堯也今明公必能進賢於忿後棄愚於愛前四方革面英豪宅心矣唯明公裁之太祖曰善厚待之由此觀之是知晉侯殺里克漢祖戮丁公石勒誅棗嵩劉備薄許靖良有以也故范曄曰夫人守義於故主斯可以事新主恥以其衆受寵斯可以受大寵若乃言之者雖誠而聞之者未譬豈苟進之悅易以情納持正之忤難以理求誠能釋利以循道居方以從義君子之概也難必第二十八難必第二十八夫人主莫不欲其臣之忠而忠未必信故伍員流於江萇弘死於蜀其血三年而化為碧凡人親莫不欲其子之孝而孝未必愛故孝己憂而曾參悲此難必者也何以言之語曰羿關弧則越人之行自若弱子關弧則慈母入室間戶故可必則越人不疑羿不可必則慈母逃弱子也魏文侯問狐卷子曰父子兄弟君臣之賢足恃乎對曰不足恃也何者父賢不過堯而丹朱放子賢不過舜而瞽叟拘兄賢不過舜而象傲弟賢不過周公而管蔡誅臣賢不過湯武而桀紂伐望人者不至恃人者不久君欲理亦從身始人何可恃乎漢時梁孝王藏匿羊勝公孫詭韓安國泣説梁孝王曰大王自度於皇帝皇帝景帝也是梁孝王兄孰與太上皇之與高皇帝及皇帝之與臨江王親臨江王景帝太子也孝王曰弗如也安國曰夫太上臨江親父子間然而高帝曰提三尺劍取天下者朕也故太上終不得制事居櫟陽臨江王適長太子也以言過廢王臨江景嘗屬諸姬太子母栗姬言不遜由是廢太子栗姬憂死也用宮垣事卒自殺中尉府何者治天下終不以私害公語曰雖有親父安知其不為考雖有親兄安知其不為狼今大王列在諸侯悅一邪臣浮説犯上禁撓明法天子以太后故不忍致法於王太后日夜泣涕幸大王自改大王終不覺悟又如太后車即晏駕大王尚誰攀乎語未卒孝王出羊勝等景帝弟梁孝王用羊勝公孫詭之計求為漢太子恐大臣不聽乃陰使人刺漢用事謀臣袁盎帝聞詭勝計遣使十輩舉國大索捕詭勝不得內史韓安國聞詭勝匿孝王所入見王説之王出詭勝詭勝自殺也由是觀之安在其可必哉語曰以權利合者權利盡而交疏又曰以色事人者色衰而愛絶此言財色不可必也墨子曰雖有慈父不愛無益之子黃石公曰主不可以無德無德則臣叛此言臣子不可必也詩云自求伊祐有旨哉有旨哉運命第二十九運命第二十九夫天道性命聖人所稀言也雖有其旨難得而詳然校之古今錯綜其紀乘乎三勢亦可以倣佛其略何以言之荀悅云凡三光議曰三光日月星也精氣變異此皆陰陽之精也其本在地而上發于天政失於此則變見於彼不其然乎文王問太公曰人主動作舉事有禍殃之應鬼神之福乎太公曰有之人主好重賦斂大宮室則人多病溫霜露殺五穀人主好畋獵不避時禁則歲多大風禾穀不實人主好破壞名山壅塞大川決通名水則歲多大水傷人五穀不滋人主好武事兵革不息則日月薄蝕太白失行文王曰誠哉今稱洪範咎徵則有堯湯水旱之災消災復異則有周宣雲漢寧莫我聽易稱積善餘慶則有顏冉短折之凶善惡之報類變萬端不可齊一故視聽者惑焉太史公曰書稱天道無親嘗與善人七十子之徒仲尼獨薦顏回為好學然回也屢空糟粳不饜而早夭天之報施善人何如哉盜跖日殺不辜肝人之肉暴戾恣睢聚黨數千人橫行天下竟以壽終是遵何德哉余甚惑也嘗試言之孔子曰死生有命又曰不得其死又曰幸而免者夫死生有命其正理也不得其死未可以死而死也幸而免者可以死而不死也此皆性命三勢之理也昔虢太子死扁鵲治而生之扁鵲曰我非能生死人者我能治可生者耳然不遇扁鵲亦不生矣若夫膏肓之病雖醫和不能治矣故曰死生有命其正理也不得其死者未可以死而死也幸而免者可以死而不死也此荀悅論性命三勢之理揚子法言云或問壽可益乎曰德或問回牛之行德矣何不益也曰德故爾如回之殘牛之賊焉得壽曰殘賊或壽曰彼妄也君子不妄也推此以及教化則亦如之人有不教化而自成者有待教化而後成者有雖加教化而終不成者故上智與下愚不移至於中人則可上可下議曰傳云能者養之以福不能者敗之以禍此可上可下者推此以及天道則亦如之災祥之應無所疑焉故堯湯水旱天數也議曰夫陰靜陽動天回地遊太一算周成百六之厄太歲數極為一元之災必然之符不可移也故傳曰美惡周必復又曰天災流行國家代有言必定也故曰天數漢時公孫弘則不然以為堯遭洪水使禹治之未聞禹之有水也若湯之旱則桀餘烈桀紂行惡受天之罰禹湯積德以王天下因此觀之天無私親順之和起逆之害生此天文地理人事之紀觀公孫弘所言以為德感水旱非天數也一家之談非為正論洪範咎徵人事也議曰傳云禍福無門唯人自召謂五事以應休咎故曰人事魯僖霪雨可救之應也周室旱甚難變之勢也議曰孔子云祭如在言祭法在精誠也語曰應天以實不以文言上天不以偽動也易曰善不積不足以成名古語曰土性勝水掬壤不可以塞河金性勝木寸刃不可以殘林傳曰小惠未孚神勿福也此言善少不可以感物也今雩祭是同而感應異者或謂仁甚少而求福甚多或徒設空文精誠不至故不同也顏冉之凶性命之本也議曰秦伯問於士鞅曰晉大夫其誰先亡對曰其欒氏乎秦伯曰以其汰乎對曰然欒黶汰虐已甚猶可以免其在盈乎秦伯曰何故對曰武子之德在人如周人之思邵公焉愛其甘棠況其子乎欒黶死盈之善未能及人武子所施沒矣而黶之怨實彰將於是乎在後世一年晉滅欒氏由是觀之黶雖汰虐以其父武子之德身受其福盈雖賢智以其父黶之汰虐遂遇於禍然則禍之與福不在我之賢虐矣范曄曰陳平多陰謀而知其後必廢邴吉有陰德夏侯勝識其當封及子孫終陳掌失侯而邴昌紹國雖有不類未可致詰其大致歸於有德矣袁安竇氏之間乃情帝室引義雅正可謂王臣之烈及其理楚獄未嘗鞠人於臧罪其仁心足覃平後昆子孫之盛不亦宜乎由是觀之夫陳平邴吉及袁安之後衰與盛乃在先人之德又不在我之得失矣虞南曰夫釋教有布施持戒忍辱精進禪定智惠與夫仁義禮智信亦何殊故蓋以所修為因其果為報人修此六行皆多不全有一闕焉果亦隨滅是以鬷明醜於貌而惠於心趙一高於才而下於位羅裒富而無義原憲貧而有道其不同也如斯懸絶興喪得失咸必由之由是言之夫行己不周則諸福不備故吉凶禍福不得齊也故世人有操行不軌而富壽者矣有積仁潔行而凶夭者矣今下士庸夫見比干之剖心以為忠貞不足為也聞偃王之亡國以為仁義不足法也不亦過乎易曰有天道焉有地道焉有人道焉言其異也兼三才而兩之言其同也故天地之道有同有異據其所以異而責其所以同斯則惑矣守其所以同而求其所以異則取弊矣遲速深淺變化錯乎其中是故參差難得而均也天地人物之理莫不同之故君子盡心焉盡力焉以邀命也議曰孫卿云天行有常不為堯存不為桀亡應之以理則吉應之以亂則凶強本而節用則天不能貧養備而動時則天不能病循道而不惑則天不能禍背道而妄行則天不能吉故明於天人之分則可謂至人矣若星墜木鳴天地之變怪之可也畏之非也唯人妖乃可畏矣何者政險失人田荒稼惡糴貴人飢道有死人夫是之謂人妖也政令不明舉措不時本事不理夫是之謂人妖也禮義不修外內無別男女淫亂父子相疑上下乖離寇難日至夫是之謂人妖也三者錯亂無安國矣其説甚邇其災甚慘傳曰萬物之妖書不説無用之辨不急之察棄而不治也墨翟曰古之聖王舉孝子而勸之事親尊賢良而勸之為善發憲令以教誨明賞罰以沮勸若此則亂者可使理而危者可使安矣若以為不然昔桀之所亂湯理之紂之所亂武王理之此世不渝而人不改上變政而人易教則安危治亂在上之發政也豈可謂有命哉昔梁惠王問尉繚曰吾聞黃帝有刑德可以百戰百勝其有之乎尉繚曰不然黃帝所謂刑德者以刑伐之以德守之非世之所謂刑德也世之所謂刑德者天官時日陰陽向背者也黃帝者人事而已矣何以言之今有城於此從其東西攻之不能取從其南北攻之不能取此四者豈不得順時乘利者哉然不能取者何也城高池深兵戰備具謀而守之由是觀之天官時日不若人事也天官之陳曰背水陳者為絶軍向阪陳者為廢軍武王之伐紂也背漳水向山之阪以萬二千擊紂之億有八萬斷紂頭懸之白旗紂豈不得天官之陳哉然而不勝者何也人事不得也黃帝曰先稽已智者謂之天子以是觀之人事而已矣按孫卿墨翟尉繚之説言吉凶禍福在於人矣周公誡成王曰昔殷王中宗治人祗懼弗敢荒寧享國七十年其在高宗嘉靖殷邦至于小大無時或怨享國五十九年其在祖甲爰知小人之衣食能保惠於庶人弗侮鰥寡享國卅有三年自時厥後立王生則逸惟耽樂之從亦罔或克壽或十年或七八年或三四年嗚呼嗣王其鑒于茲史記陳世家曰陳舜後也周武王封之陳太史公云舜之德至矣禪於夏而後世血食者歷三代及楚滅陳而田氏得政於齊卒為建國百世不絶又南越傳云越雖蠻夷其先豈嘗有大功德於人哉何其久也歷數代嘗為君主句踐一稱伯蓋禹之烈也又曰鄭桓公友者周厲王之少子也幽王以為司徒問於太史伯曰王室多故豫安逃死乎吾欲南之江上何如對曰昔祝融為高辛火正其功大矣而其於周未有興者楚其後也周衰楚必興興非鄭之利也公曰周衰何國興對曰齊秦晉楚乎夫齊薑姓伯夷之後也伯夷佐堯典禮秦嬴氏伯翳之後也伯翳佐舜懷柔百物及楚之先皆嘗有功於天下而武王封叔虞於唐其地阻險以此有德若周衰並必興矣按周公馬遷太史伯之談言興亡長短必依德矣此略言其本而不語其詳嘗試論之曰命也者天之授也德也者命之本也皇靈雖陰騭下人定於冥兆然興亡長短以德為準若德修於曩則命定於今然則今之定命皆曩之德也明矣夫命之在德則吉凶禍福不由天也命定於今則賢聖鬼神不能移也故君子盡心焉盡力焉以邀命也此運命之至也易曰窮理盡性以至於命此之謂矣議曰夫吉凶由人興亡在德稽於前載其在德必矣今論者以堯舜無嗣以為在命此謬矣何者夫佐命功臣必有興者若使傳子則功臣之德廢何以言之昔鄭桓公問太史伯曰周衰何國興對曰昔祝融為高辛火正其功大矣而其於周未有興者楚其後也周衰楚必興齊薑姓伯夷之後也伯夷佐堯典禮秦嬴氏伯翳之後伯翳佐舜懷柔百物若周衰並必興矣是以班固典引云陶唐捨胤而禪有虞有虞亦命夏后稷契熙載越成湯武股肱既周天乃歸功元首將授漢劉由此言之安在其無嗣哉又曰楚師屠漢卒睢水鯁其流秦人坑趙士沸聲若雷震雖遊夏之英才伊顏之殆庶焉能抗之哉此其弊也對曰宋景公之時熒惑在心公懼問子韋子韋曰心者宋分野也禍當在君雖然可移於人據此言則君有禍人當受之若當君厄會之時則生人塗炭雖伊顏遊夏何所抗哉故莊子曰當堯舜天下無窮人非智得也當桀紂天下無通人非智失也時勢適然此之謂矣又曰彼戎狄者人面獸心晏安鴆毒以誅殺為道德蒸報為何義自金行不競天地板湯遂覆瀍洛傾五都嗚呼福善禍淫徒虛言耳此論以戎狄內侵便謂由命此所謂不量於德者也何則昔秦穆公問戎人由余曰中國以詩書禮樂法度為政然尚時亂今戎夷無此何以為理乎由余笑曰乃中國所以亂也夫自上聖黃帝作為禮樂法度身以先之僅可小理及其後世日以驕淫阻法度之威以責督於下平罷極則以仁義怨望於上上下交爭怨而相篡殺至於滅宗皆此類也夫戎狄則不然上含淳德以遇於下下懷忠信以事其土一國之政猶一身之治不知所以治此真聖人之治夫戎狄之德有如是者今晉之興也宗子無維城之助而閼伯實沈之隙歲搆師尹無具瞻之貴而顛墜戮辱之禍日有宣景遭多難之時務伐英雄誅庶桀以便事其傾覆屠膾非止於誅殺也風俗淫僻廉恥並失先時而昏任情而動皆不恥淫逸之過不拘妬忌之惡有逆于舅姑有反易剛柔有殺戮妾媵有黷亂上下其淫亂凶逆非止於蒸報也由是觀之晉家之德安勝於胸奴哉今見戎狄亂華便以為在命不在德是何言之過歟大私第三十大私第三十管子曰知與之為取政之寶也周書曰將欲取之必故與之何以徵其然耶黃石公曰得前勿有立而勿取為者則已有者則士焉知利之所在人多務功鮮有讓者唯天子不與下爭功名耳故曰有者則士焉知利之所在乎彼為諸侯已為天子天子不收功於萬物故能成其高不競名於衆庶故能成其大也使城自仔令士自取盡與敵城之財令自取之所謂使貪使愚者也王者之道也尸子曰堯養無告禹愛辜人此先王之所以安危而懷遠也聖人於大私之中也為無私湯曰朕身有罪無及萬方萬方有罪朕身受之湯不私其身而私萬方文王曰苟有仁人何必周親文王不私其親而私萬國先王非無私也所私者與人不同此知大私者也由是言之夫唯不私故能成其私不利而利之乃利之大者矣敗功第三十一敗功第三十一文子曰有功離仁義者即見疑有罪不失人心者必見信故仁義者天下之尊爵也何以言之昔者楚恭王有疾召其大夫曰不穀不德少主社稷失先君之緒覆楚國之師不穀之罪也若以宗廟之靈得保首領以沒請為靈若厲大夫許緒及其卒也子囊曰不然夫事君者從其善不從其過赫赫楚國而君臨之撫征南海訓及諸夏其寵大矣有是寵也而知其過可不謂之恭乎大夫從之此因過以為功者也魏將王昶陳泰兵敗大將軍以為已過魏人感將軍引過皆悅思報之習鑿齒論曰司馬大將軍引二敗以為已過過銷而業昌可謂智矣夫忘其敗而下思其報雖欲勿康其可得乎若乃諱敗推過歸咎萬物上下離心賢愚釋體是楚再敗而晉再剋謬之甚矣夫人君苟統斯理而以御國行雖失而名揚兵雖挫而戰勝百敗猶可況再敗乎此因敗以成功也故知智者六舉事也因禍為福轉敗為功自古然矣議曰白起為秦坑趙降卒四十餘萬使諸侯曲秦而合縱夫坑趙降卒非勝也乃敗秦之機商君詐魏虜公子卬使秦信不行於天下乃自敗之兆非霸業也樂毅仗義以下齊城敗于即墨非敗也乃是吞天下之勢劉備憐歸義之人日行十數里敗於長阪雖奔亡不暇乃霸王之始故知非霸者不能用敗齊人以紫敗素而其價十倍此言雖小可以喻大也昏智第三十二昏智第三十二夫神者智之淵也神清則智明智者心之符也智公則心平此出文子今士有神清智明而暗於成敗者非愚也以聲色勢利怒愛昏其智矣何以言之昔孔子攝魯相齊景公聞而懼曰孔子為政魯必霸匕則吾地近焉我之為先并矣犁且曰去仲尼猶吹毛耳君何不延之以重祿遺哀公以女樂哀公親樂之必怠於政仲尼必諫諫不聽必輕絶魯於是選齊國中女子好者八十人皆衣文繡之衣而舞康樂遺魯君魯君受齊女樂怠於事三日不聽政孔子曰彼婦之口可以出走遂適衛此昏於聲色者也戎王使由余觀秦秦繆公以由余賢聖問內史廖曰孤聞鄰國有聖人敵國之憂也今由余寡人之害將奈何內史廖曰戎王處僻匿未嘗聞中國之聲君試遺其女樂以奪其志為由余請以諫其間留而莫遣以失其期戎王怪之必疑由余且戎王好樂必怠於政繆公曰善以女樂二八遺戎王戎王受而悅之終年不遷由余諫不聽繆公使人問要由余由余遂降秦梁王觴諸俟於苑臺魯君曰昔者帝女令儀狄作酒而美進之禹禹飲而甘遂疏儀狄絶旨酒曰後世必有以酒亡其國者也齊桓公夜半不嗛易牙乃煎熬燔炙和調五味而進之桓公食而飽曰後世必有以味亡其國者也晉文公得南之威三日不聽朝遂推南之威而遠之曰後世必有以色亡其國者也楚王登強臺而望崩山左江而右湖其樂忘死遂弗登曰後世必有以高臺陂池亡其國者也今主君之樽儀狄之酒也主君之味易牙之調也左白台而右閭須南威之美也前夾林而後蘭臺強臺之樂也人有一於此足以亡國今主君兼此四者可無誡歟梁王稱善相屬由此言之昏智者非一途也太史公曰平原君翩翩濁代之佳公子也然不覩大體語曰利令智昏平原君貪馮亭邪説使趙陷長平四十餘萬邯鄲幾亡此昏於利者也人物志曰夫仁出於慈有慈而不仁者仁者有恤有仁而不恤者厲者有剛有厲而不剛者若夫見可憐則流涕將分與則吝嗇是有慈而不仁者覩危急則隱將赴救則畏患是有仁而不恤者處虛義則色厲顧利欲則內恁是有厲而不剛者然則慈而不仁則吝奪之也仁而不恤則懼奪之也厲而不剛則欲奪之也後漢書班固傳評曰昔班固傷司馬遷云遷博物洽聞不能以智免極刑然固亦自陷大戮班固附竇氏勢竇氏敗固坐之死洛陽獄中也可謂智及之而不能守古人所以致論於目睫邪此昏於勢者也議曰夫班固傷遷公論也自陷大戮挾私也夫心有私則智不能守也尸子曰夫吳越之國以臣妾為殉中國聞而非之及怒則以親戚殉一言夫智在公則愛吳越之臣妾在私則忘其親戚非智損也怒弇之也此昏於怒者也好亦然矣語曰莫知其子之惡非智損也愛弇之也此昏於愛者也是故論貴賤辨是非者必且自公心言之自公心聽之而後可知也故范曄曰夫利不在身以之謀事則智慮不私已以之斷義則厲誠能回觀物之智而為反身之察則能恕而自鑒議曰孔子曰吾未見剛者或對曰申棖子曰振也欲焉得剛由此言之心苟有私則失其本性矣尸子曰鴻鵠在上彀弩以待之若發若否問二五曰不知也非二五難計欲鴻之心亂也是知情注於利則本心亂矣卑政第三十三卑政第三十三淮南子曰齊溺人以金玉不如尋常之纏韓子曰百日不食以待梁肉餓者不肯故曰療飢不期於鼎食拯溺無待於規行也此言政貴卑以濟事者也何以言之韓非曰所謂智者微妙之言上知之所難也今為衆人法而以為上知之所難也則人無從識之矣故糟粳不厭者不待梁肉而飽裋褐不完者不須文繡而好以是言之夫治世之事急者不得則緩者非務也今所治之政人間之事夫婦之所明知者不用而慕上知之所難論則其於人過遠矣是知微妙之言非人務也又曰世之所謂烈士者離衆獨行取異於人為恬淡之學而理恍惚之言臣以為恬淡無用之教也恍惚無法之言也夫人生必事君養親事君養親不可以恬淡之人必以言論忠信言論忠信不可以恍惚之言然則恍惚之言恬淡之學天下之惑術也又曰察士而後能知之不可以為智全也夫人未盡察之也唯賢者而後能行之不可以為法也故尹文子曰凡有理而無益於治者君子不言有能而無益於事者君子不為故君子所言者不出於名法權術所為者不出於農稼軍陳周務而已又曰小人所言者極於儒墨是非之辨所為者極於堅偽偏抗之行求名而已故明主誅之也今世之人行欲獨賢事欲獨能辨欲出群勇欲絶衆夫獨行之賢不足以成化獨能之事不足以周務出群之辨不可為戶説絶衆之勇不可與正陳凡此四者亂之所由生也故曰為善者使人不能得從為巧者使人不能得與此獨善獨巧者未盡巧善之理也故所貴聖人之理不貴其獨治貴其能與衆共治也所貴工倕之巧者不貴其獨巧貴其能與衆共巧也文子曰夫先知遠見人材之盛也而治世不以貴於人博聞強志口辨辭給人智之溢也而明主不以求於下傲世賤物不汙於俗士之抗行也而治世不以為人化故高不可及者不以為人量行不可逮者不以為國俗故國治可與愚守而軍旅可與怯同不待古之英俊而人自足者因其所有而並用之也議曰據文子此言以為聖人不可用先知遠見博聞強志傲世賤物三事化天下百姓使皆行此道用為風俗今但任其風土化以農稼軍陳曲成於物而俯同於俗耳非貴於獨能獨勇者也故聖人任道以通其險淮南子曰體道者逸而不窮任數者勞而無功離朱之明察針夫百步之外而不能見泉中之魚師曠之聰合八風之調而不能聽十里之外故任一人之能不足以理三畝之宅循道理之數因天地之自然則六合不足均也此任道以通其險也立法以理其差文子曰農士商工鄉別州異農與農言藏士與士言行工與工言巧商與商言數是以士無遺行工無苦事農無廢功商無折貨各安其生此立法以理其差也使賢愚不相棄能鄙不相遺此至理之術故叔孫通欲起禮漢高帝曰得無難乎對曰夫禮者因時世人情而為之節文者也張釋之言便宜事文帝曰卑之無甚高論令今可施行由是言之夫理者不因時俗之務而貴奇異是餓者百日以待粱肉假人金玉以救溺子之説矣議曰昔楚之公輸宋之墨翟能使木鳶自飛無益於用漢之張衡能使參輪自轉魏之馬鈞能使木人吹簫苟無益於用而為之則費功損力其害多矣莊子曰朱泙漫學屠龍於支離益殫千金伎成無所用巧文子曰夫治國在仁義禮樂名法刑賞過此而往雖彌綸天地纏絡萬品治道之外非群生所飱挹聖人措而不言也由是觀之事貴於適時無貴於遠功有自來矣善亡第三十四善亡第三十四易曰積善之家必有餘慶又曰善不積不足以成名何以徵其然耶孟子曰仁之勝不仁也猶水之勝火也今為仁者猶以一杯水救一車薪之火也火不息則謂水不勝火此又與不仁之甚者也又五穀種之美者苟為不熟不如稊稗夫仁亦在熟之而已矣熟成也尸子曰食所以為肥也一飯而問人曰奚若則皆笑之夫治天下大事也譬今人皆以一飯而問人奚若者也議曰此善少不足以成名也惡亦如之何以明其然耶書曰商罪貫盈天命誅之余弗順天厥罪惟均由是觀之夫罪未盈假令中有罪惡未滅也今人見惡即未滅以為惡不足懼是以亡滅者繼踵於世故曰惡不積不足以滅身此聖人之誡由是觀之故知善也者在積而已今人見徐偃亡國謂仁義不足杖也見承桑失統謂文德不足恃也承桑氏之君修德廢武以滅其國也是猶杯水救火一飯問肥之説惑亦甚矣詭俗第三十五詭俗第三十五夫事有順之而失義有愛之而為害有惡於已而為美有利於身而損於國者何以言之劉梁曰昔楚靈王驕淫暴虐無度芊尹申亥從王之欲以殯於乾溪殉之以二女此順之而失義者也議曰夫君正臣從謂之順今君失義而臣下從之非所謂順也鄢陵之役晉楚對戰穀陽獻酒子反以斃此愛之而害者也漢文帝幸慎夫人其在禁中嘗與后同席及幸上林郎署長布席慎夫人席與后同席袁盎引慎夫人座上大怒袁盎前説曰臣聞尊卑有序上下乃和今陛下既已立后慎夫人乃妾耳主妾豈可同坐哉且陛下幸之即厚賜之陛下所以為慎夫人適所以禍之陛下獨不見人豕乎上乃悅由是言之夫愛之為害有自來矣臧武仲曰孟孫之惡我藥石也季孫之愛我美疢也疢毒滋厚藥石猶生我此惡之而為美者也孫卿曰非我而當者吾師也是我而當者吾友也諂諛我者吾賊也商君曰貌言華也至言實也苦言藥也甘言疾也韓子曰為故人行私謂之不棄以公財分施謂之仁人輕祿重身謂之君子枉法曲親謂之有行棄官寵交謂之有俠離俗遁世謂之高愨交爭逆令謂之剛材行惠取衆謂之得人不棄者吏有姦也仁人者公財損也君子者人難使也有行者法制毀也有俠者官職曠也高愨者人不事也剛材者令不行也得人者君上孤也此八者匹夫之私譽而人主之大敗也人主不察社稷之利害而用匹夫之私譽家國無危亂不可得也由是觀之夫俗之好惡與事相詭唯明者能察之韓子曰君臣之利異故人臣莫忠故臣利立而主利滅此之謂異利者也息辨第三十六息辨第三十六議曰夫人行皆著於迹以本行而徵其迹則善惡無所隱矣夫辨者焉能逃其詐乎中論曰水之寒也火之熱也金石之堅剛也彼數物未嘗有言而人莫不知其然者信著乎其體故曰使吾所行之信如彼數物誰其疑之今不信吾之所行而怨人之不信也惑亦甚矣故知行有本事有迹審觀其體則無所竄情何謂行本孔子曰立身有義矣而孝為本喪紀有禮矣而哀為本戰陳有列矣而勇為本太公曰人不盡力非吾人也吏不平潔愛人非吾吏也宰相不能富國強兵調和陰陽安萬乘之主簡練群臣定其名實明其令罰非吾宰相此行本者也何謂事迹昔齊威王召即墨大夫而語之曰自子之居即墨也毀日至然吾使人視即墨田野闢人民給官無留事東方以寧是子不事吾左右以求譽也封之萬家召阿大夫而語之曰自夫子之守阿也譽日聞然吾使人視阿田野不闢人民貧苦趙攻甄子不能救衛取薛陵子不能知是子常以幣事吾左右以求譽也是日烹阿大夫及左右常譽之者齊國大理漢元帝時石顯專權京房宴見問上曰幽厲之君何以危所任者何人也上曰君不明而所任巧佞房曰知其巧佞而用之也將以為賢上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰齊桓公秦二世亦嘗聞此君而非笑之然則任豎刁趙高政治日亂盜賊滿山何不以幽厲卜之而覺悟乎上曰唯有道者能以往知來耳房曰陛下視今為治也亂也上曰亦極亂耳房曰今所任丹者誰歟上曰然幸其愈於彼又以為不在此人也房曰夫前世二君亦皆然耳臣恐後之視今如今之視前也此事迹者也由是言之夫立身從政皆有本矣理亂能否皆有迹矣若操其本行以事迹繩之譬如水之寒火之熱則善惡無所逃矣量過第三十七量過第三十七孔子曰人之過也各於其黨觀過斯知仁矣黨黨類也小人不能為君子之行非小人之過當恕而勿責之也何以言之太史公云昔管仲相齊九合諸侯一匡天下然孔子小之曰管仲之器小哉豈不以周道衰桓公既賢而不勉之至王乃稱霸哉議曰夔龍稷契王者佐也狐偃咎犯霸者佐也孔子稱微管仲吾其被髮左衽矣是奇管仲有王佐之材矣夫有王佐之才而為霸者之政非小器而何由是觀之孔子以管仲為夔龍稷契之黨而觀過也虞卿説魏王曰虞卿説春申君伐燕以定身封然楚之伐燕路由於魏恐魏不聽虞卿為春申君説魏君假道也夫楚亦強大矣天下無敵乃且攻燕魏王曰向也子云天下無敵今也子云乃且攻燕者何也對曰今謂馬多力則有之矣若曰勝千均則不然者何也夫千鈞非馬之任也今謂楚強大則有矣若夫越趙魏而開兵於燕則豈楚之任哉由是觀之夫管仲九合諸侯一匡天下而孔子小之楚人不能伐燕虞卿反以為強大天下無敵非詭議也各從其黨言之耳不可不察勢運第三十八勢運第三十八夫天下有君子焉有小人焉有禮讓焉此數事者未必其性也未必其行也皆勢運之耳何以言之文子曰夫人有餘則讓不足則爭讓則禮義生爭則暴亂起物多則欲省求贍則爭止議曰管子云衣食足知榮辱此有餘則讓者也漢書曰韓信為布衣時貧無行不得推擇為吏及在漢中蕭何言於高祖曰韓信者國士無雙此不足則爭者也故傅子曰夫授夷叔以事而薄其祿父母餓於前妻子餧于後能守志不移者鮮矣淮南子曰遊者不能拯溺手足有所爭急也灼者不能救火身體有所痛也林中不賣薪湖上不鬻魚者有所餘也故世治則小人守正而利不能誘也世亂則君子為姦而刑不能禁也慎子曰桀紂之有天下也四海之內皆亂關龍逢王子比干不與焉而謂之皆亂其亂者衆也堯舜之有天下也四海之內皆治而丹朱商均不與焉而謂之皆治其治者衆也故莊子曰當堯舜而天下無窮人非智得也當桀紂而天下無通人非智失也時勢適然新語曰以近河之地溼近山之木長者以類相及也四瀆東流則百川無西行者小象大而少從多也是知世之君子未必君子議曰匡衡云循禮恭讓則人不爭好仁樂施則下不暴尚義高節則人興行寬柔惠和則衆相愛此四者明王之所以不嚴而成化也由是言之夫世之君子乃上之所化也世之小人未必小人議曰尚書云殷罔弗小大好草竊姦究卿士師師非度罔獲此言殷之季世卿士君子並為非法無得其中皆從上化耳故知世之小人未必小人世之禮讓未必禮讓議曰左傳云范宣子好讓其下皆讓欒黶為汰弗敢違也晉國以平數世賴之形善也夫周之興也其詩曰儀刑文王萬邦作孚形善也及其衰也其詩曰大夫不均我從事獨賢言不讓也由此言之夫欒黶之讓勢運之耳故知世之禮讓未必禮讓也夫勢運者不可不察議曰政論云雖有素富骨清者不能百一可為天下通變故知君子小人本無定質蓋隨勢運者多矣傲禮第三十九傲禮第三十九左傳曰無傲禮曲禮曰無不敬然古人以傲為禮其故何也欲彰於人德耳何以言之昔侯嬴為大梁夷門監魏公子聞之乃置酒大會賓客坐定公子從車騎虛左自迎夷門侯生侯生引公子過市及至家以為上客侯生謂公子曰今日嬴之為公子亦足矣嬴乃夷門抱關者也而公子親枉車騎稠人廣衆之中不宜有所過今公子故過之然嬴欲就公子之名故久立公子車騎市中以觀公子公子愈恭市人皆以嬴為小人而以公子為長者能下士也初公子迎侯生侯生曰臣有客在市屠中願枉車駕過之侯生下見其客朱亥與之語微察公子公子色愈和市人皆觀從騎竊罵侯生侯生視公子色終不變乃謝客就車也張釋之居廷中三公九卿盡會立王生老人曰吾襪解顧謂張廷尉為我結襪人或謂王生曰獨奈何廷辱張廷尉王生曰吾老且賤自度終無益於張廷尉張廷尉方今天下名臣吾故聊辱廷尉使跪結襪欲以重之諸公聞之賢王生而重張廷尉汲黯常與大將軍抗禮或讒黯曰自天子常欲令群臣下大將軍君不可以不拜黯曰夫以大將軍有揖客反不重耶大將軍聞之愈賢黯也由是觀之以傲為禮可以重人矣議曰老子云國家昏亂有忠臣六親不和有孝慈此言忠臣孝子因不和昏亂乃見其節向使侯生不傲則士人不知公子能下士也使王生不倨則三公不知廷尉能折節也故曰不善人者善人之資信矣夫定名第四十定名第四十夫理得於心非言不暢物定於彼非名不辨言不暢志則無以相接名不辨物則識鑒不顯原其所以本其所由非物有自然之名理有必定之稱也欲辨其實則殊其名欲宣其志則立其稱故稱之曰道德仁義禮智信夫道者人之所蹈也居知所為行知所之事知所乘動知所止謂之道又曰道者謂人之所蹈使萬物不失其所由也德者人之所得也使人各得其所欲謂之德仁者愛也致利除害兼愛無私謂之仁又曰仁者人之所親有慈悲惻隱之心遂其生成義者宜也明是非立可否謂之義又曰義者人之所宜賞善罰惡以建功立事也禮者履也進退有度尊卑有分謂之禮又曰禮者人之所履夙興夜寐以成人君之序也又曰立善防惡謂之禮也智者人之所知也以定乎得失是非之情謂之智信者人之所承也發號施令以一人心謂之信見本而知末執一而應萬謂之術又曰擅殺生之柄通壅塞之塗權輕重之數論得失之道使遠近情偽必見于上謂之術説苑曰從命利君謂之順又曰君正臣從謂之順也從命病君謂之諛又曰應言而不言謂之隱應諫而不諫謂之諛又曰君僻臣從謂之逆也逆命利君謂之忠又曰分人以財謂之惠教人以善謂之忠孫卿曰以德覆君而化之大忠也以德調君而補之次忠也以是諫非而怒之下忠也逆命病君謂之亂又曰賞無功謂之亂君有過失將危國家有能盡言於君用則留不用則去謂之諫用則可不用則死謂之諍能率群下以諫於君解國之大患除國之大害謂之輔抗君之命反君之事安國之危除主之辱謂之弼故諫諍輔弼者可謂社稷之臣明君之所貴也莊子曰莫之顧而進謂之佞俙意導言謂之諂不擇是非而言謂之諛好言人惡謂之讒稱譽詐偽以敗惡人謂之匿不擇善否兩容頰適偷拔其所欲謂之險古語曰以可濟否謂之和好惡不殊謂之同以賢代賢謂之奪以不肖代賢謂之伐緩令急誅謂之暴取善自與謂之盜罪不知愆謂之虐敬不中禮謂之野禁而不止謂之逆又曰恭不中行謂之逆又曰令而不行謂之障禁非立是謂之法知善不行謂之狂知惡不改謂之惑太公曰收天下珠玉美女金銀彩帛謂之殘收暴虐之吏殺無罪之人非以法度謂之賊莊子曰析交離新之賊孫卿曰不恤君之榮辱不恤國之臧否偷合苟容以持祿養交國之賊也賢人不至謂之蔽忠臣不至謂之塞色取人而實違之謂之虛不以誠待其臣而望其臣以誠事已謂之愚分於道謂之性分謂始得為人形於一謂之命受陰陽剛柔之性故曰形於一也凡人函五常之性而剛柔緩急音聲不同繫水土之氣謂之風好惡取舍動靜無常隨君上之情欲謂之俗或曰樂與音同乎對曰昔魏文侯問子夏曰吾端冕而聽古樂唯恐臥聽鄭衛之音則不知倦敢問古樂之如彼新樂之如此何也子夏曰今君之所問者樂也所好者音也夫樂者與音相近而不同文侯曰敢問何如子夏曰夫古樂者天地順而四時當民有德而五穀昌疾疫不作而無妖祥此之謂大當然後聖人為父子君臣以為之紀綱紀綱既正天下大定天下大定然後正六律和五聲絃歌詩頌此之謂德音德音之謂樂詩云莫其德音其德克明克明克類克長克君王此大邦克順克比比于文王其德靡悔既受帝祉施于孫子此之謂也今君之所好者溺音乎鄭音好濫淫志也宋音燕女溺志也衛音趨數煩志也齊音傲僻驕志也四者皆淫於色而害於德是以祭祀弗用此音樂之異也董生曰古者未作樂之時乃用先王之樂宜於時者而以深入教化於人然後功成作樂樂其德也故國風淫俗在於管絃樂書曰知聲而不知音者禽獸是也知音而不知樂者衆庶是也唯君子為能知樂是故審聲以知音審音以知樂審樂以知正而理道備矣此又聲音之異也或曰音與樂既聞命矣敢問儀與禮同乎對曰昔趙簡子問揖讓周旋之禮於太叔太叔曰是儀也非禮也吉也聞諸先大夫子産曰夫禮天之經也經者道之常也地之義也義者利之宜也民之行也行者人之所履也天地之經民實則之則天之明日月星辰天之明也因地之性高下剛柔地之性也生其六氣謂陰陽風雨晦明也用其五行金木水火土也氣為五味酸鹹辛甘苦也發為五色青黃赤白黑發見於是非分別也章為五聲宮商角徵羽也淫則昏亂民失其性滋味聲色過則傷性是故為禮以奉之制禮以奉其性也人有好惡喜怒哀樂生于六氣此六者皆稟陰陽風雨晦明之氣也是故審則宜類以制六志為禮以制好惡喜怒哀樂六志便不過節也哀有哭泣樂有歌舞喜有施舍怒有戰鬭哀樂不失乃能協于天地之性是以長久協和也故人能曲直以從禮者謂之成人或曰然則何謂為儀對曰養國子教之六儀祭祀之容穆穆皇皇賓客之客儼恪矜莊朝廷之容濟濟蹌蹌喪紀之容纍纍顛顛纍音力追反顛音田憂思之貌軍旅之容暨暨詻詻詻音額教令之貌車馬之容騑騑翼翼此禮儀之異也夫定名之弊在於鉤鈲析辭鈲音普覓反苟無其弊則定名之妙也論曰班固九流其九曰雜家兼儒墨合名法傅子九品其九曰雜才以長諷議由是觀之雜説之益有自來矣故著此篇蓋立理敘事以示將來君子兵
