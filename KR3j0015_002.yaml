body:
  text: 大體第一大體第一臣聞老子曰以正理國以奇用兵以無事取天下荀卿曰人主者以官人為能者也匹夫者以自能為能者也傅子曰士大夫分職而聽諸侯之君分土而守三公總方而議則天子拱己而正矣何以明其然耶當堯之時舜為司徒契為司馬禹為司空后稷為田疇夔為樂正倕為工師伯夷為秩宗皋陶為理官益掌驅禽堯不能為一焉奚以為君而九子者為臣其故何也堯知九賦之事使九子各授其事皆勝其任以成九功堯遂乘成功以王天下漢高帝曰夫運籌策於幃幄之中決勝於千里之外吾不如子房鎮國家撫百姓給餉餽不絶糧道吾不如蕭何連百萬之軍戰必勝攻必取吾不如韓信三人者皆人傑也吾能用之此吾所以有天下也人物志曰夫一官之任以一味協五味一國之政以無味和五味故臣以自任為能君以能用人為能臣以能言為能君以能聽為能臣以能行為能君以能賞罰為能所以不同故能君衆能也故曰知人者王道也知事者臣道也無形者物之君也無端者事之本也鼓不預五音而為五音主有道者不為五官之事而為理事之主君守其道官知其事有自來矣先王知其如此也故用非其有如已有之通乎君道者也議曰淮南子云巧匠為宮室為圓必以規為方必以矩為平直必以準繩功己就矣而不知規矩準繩而賞巧匠宮室己成不知巧匠而皆曰某君某王之宮室也孫卿曰夫人主欲得善射中微則莫若使羿欲得善御致遠則莫若使王良欲得調一天下則莫若聰明君子矣其用智甚簡其為事不勞而功名甚大此能用非其有如己有者也人主不通主道者則不然自為之則不能任賢不能任賢則賢者惡之此功名之所以傷國家之所以危議曰申子云君知其道也臣知其事也十言十當百言百當者人臣之事也非人君之道也尸子云人臣者以進賢為功也君者以用賢為功也賈誼云臣聞聖主言問其臣而不自造事故使人臣得必盡其愚忠惟陛下財幸由是言之夫君不能司契委任而妒賢惡能取敗之道也湯武一日而盡有夏商之財以其地封而天下莫敢不悅服以其財賞而天下皆競勸通乎用非其有也議曰孫卿云修禮者王為政者強取人者安聚斂者亡故王者富人霸者富士僅存之國富大夫在國富筐篋實府庫是謂上溢下漏又曰天子不言多少諸侯不言利害大夫不言得失昔者周厲王好利近榮公芮良夫諫曰王室其將卑乎榮公好專利而不知大難夫利百物之所生也天地之所載也而有專之其害多矣天地百物皆將取焉何可專也所利甚多而不備大難以是教王其能久乎後厲王果敗魏文侯御廩災素服避正殿群臣皆巳公子成父趨入賀曰臣聞天子藏于四海諸侯藏于境內非其所藏不有火災必有人患幸無人患不亦善乎孔子曰百姓足君孰不足周諺有言曰囊漏儲中由此言之夫聖王以其地封以其財賞不與人爭利乃能通於王道是用非其有者也故稱設官分職君之體也委任責成君之體也好謀無倦君之體也寬以得衆君之體也含垢藏疾君之體也君有君人之體其臣畏而愛之此帝王所以成業也任長第二任長第二臣聞料才核能治世之要自非聖人誰能兼茲百行備貫衆理乎故舜合群司隨才授位漢述功臣三傑異稱況非此儔而可備責耶人物志曰夫剛略之人不能理微故論其大體則宏略而高遠歷纖理微則宕往而疏越亢厲之人不能回撓其論法直則括據而公正説變通則否戾而不入寬恕之人不能速捷論仁義則宏詳而長雅趨時務則遲後而不及好奇之人橫逆而求異造權譎則倜儻而瑰壯案清道則詭常而恢迂又曰王化之政宜於統大以之理小則迂策術之政宜於理難以之理平則無奇矯亢之政宜於治侈以之治弊則殘公刻之政宜於糾姦以之治邊則失其衆威猛之政宜於討亂以之治善則暴伎倆之政宜于治富以之治貧則勞而下困此己上皆偏材也昔伊尹之興土工也強脊者使之負土眇者使之推傴者使之塗各有所宜而人性齊矣管仲曰升降揖讓進退間習臣不如隰朋請立以為大行闢土聚粟盡地之利臣不如寧戚請立以為司田平原廣牧車不結轍士不旋踵鼓之而三軍之士視死如歸臣不如王子城父請立以為大司馬決獄折中不殺不辜不誣不罪臣不如賓胥無請立以為大理犯君顏色進諫必忠不避死亡不撓富貴臣不如東郭牙請立以為大諫君若欲治國強兵則五子者存焉若欲霸王則夷吾在此黃石公曰使智使勇使貪使愚智者樂立其功勇者好行其志貪者決取其利愚者不愛其死因其至情而用之此軍之微權也淮南子曰天下之物莫凶於溪毒附子也然而良醫橐而藏之有所用也麋之上山也大章不能跂及其下也牧豎能追之才有修短也胡人便於馬越人便於舟異形殊類易事則悖矣魏武詔曰進取之士未必能有行有行之士未必能進取陳平豈篤行蘇秦豈守信耶而陳平定漢業蘇秦濟弱燕者任其長也由此觀之使韓信下幃仲舒當戎于公馳説陸賈聽訟必無曩時之勳而顯今日之名也故任長之道不可不察議曰魏桓範云帝王用人度世授才爭奪之時書策為先分定之後忠義為首故晉文行咎犯之計而賞雍季之言高祖用陳平之智而託後於周勃古語云守文之代德高者位尊倉卒之時功多者賞厚諸葛亮曰老子長於養性不可以臨危難商鞅長於理法不可以從教化蘇張長於馳辭不可以結盟誓白起長於攻取不可以廣衆子胥長於圖敵不可以謀身尾生長於守信不可以應變王嘉長於遇明君不可以事暗主許子將長於明臧否不可以養人物此任長之術者也品目第三品目第三夫天下重器王者大統莫不勞聰明於品材獲安逸於任使故孔子曰人有五儀有庸人有士人有君子有聖有賢審此五者則治道畢矣所謂庸人者心不存慎終之規口不吐訓格之言法格不擇賢以託身不力行以自定見小暗大而不知所務從物如流而不知所執此則庸人也所謂士人者心有所定計有所守雖不能盡道術之本必有率也率猶述也雖不能遍百善之美必有處也是故智不務多務審其所知言不務多務審其所謂所謂言之要也行不務多務審其所由智既知之言既得之得其要也行既由之則若性命形骸之不可易也富貴不足以益貧賤不足以損此則士人也所謂君子者言必忠信而心不忌忌怨害也仁義在身而色不伐思慮通明而辭不專篤行信道自強不息油然若將可越而終不可及者此君子也油然不進之貌也越過也孫卿曰夫君子能為可貴不能使人必貴己能為可信不能使人必信己能為可用不能使人必用己故君子恥不修不恥見污恥不信不恥不見信恥不能不恥不見用不誘於譽不怨於誹率道而行端然正己謂之君子也所謂賢者德不踰間間法也行中規繩言足法於天下而不傷其身言滿天下無口過也道足化於百姓而不傷於本本亦身也富則天下無菀財菀積施則天下不病貧此則賢者也所謂聖者德合天地變通無方窮萬事之終始協庶品之自然敷其大道而遂成情性明並日月化行若神下民不知其德覩者不識其鄰此聖者也鄰以喻界畔也莊子曰刻意尚行離世異俗高論怨誹為冗而已矣此山谷之士非世之人枯稿赴淵者之所好也語仁義忠信恭儉推讓為修而已矣此平世之士教誨之人也遊居博學者之所好也語大功立大名禮君臣正上下為治而已矣此朝廷之士尊主強國之人也致功兼并者之所好也就藪澤處間曠釣魚間處無為而已矣此江海之士避世之人也間暇者之所好也吹詬呼吸吐故納新熊經鳥伸為壽而已矣此導引之士養形之人也彭祖壽考者之所好也若夫不刻意而高無仁義而修無功名而治無江海而間不導引而壽無不忘也無不有也淡然無極而衆美從之此天地之道聖人之德也鈐經曰德足以懷遠信足以一異識足以鑒古才足以冠世此則人之英也法足以成教行足以修義仁足以得衆明足以照下此則人之俊也身足以為儀表智足以決嫌疑操足以厲貪鄙信足以懷殊俗此則人之豪也守節而無撓處義而不怒見嫌不苟免見利不苟得此則人之傑也人物志曰德行高妙容止可法是謂清節延陵晏嬰是也思通道化策謀奇妙是謂術家范蠡張良是也其德足以厲風俗其法足以正天下其術足以謀廟勝是謂國體伊尹呂望是也其德足以率一國其法足以正鄉邑其術足以權事宜是謂器能子産西門豹是也清節之流不能宏恕好尚譏訶分別是非是謂臧否子夏之徒是也法家之流不能創思圖遠而能受一官之任錯意施巧是為伎倆張敞趙廣漢是也術家之流不能創制垂則而能遭變用權權智有餘公正不足是謂智意陳平韓安國是也能屬文著述是謂文章司馬遷班固是也能傳聖人之業而不能幹事施政是謂儒學毛公貫公是也辨不入道而應對資給是謂口辨樂毅曹丘生是也膽力絶衆材略過人是謂驍雄白起韓信是也家語曰昔者明王必盡知天下良士之名既知其名又知其實然後用天下之爵以尊之則天下理也此之謂矣量才第四量才第四夫人才能參差大小不同猶升不可以盛斛滿則棄矣非其人而使之安得不殆乎傅子曰凡品才有九一曰德行以立道本二曰理才以研事機三曰政才以經治體四曰學才以綜典文五曰武才以禦軍旅六曰農才以教耕稼七曰工才以作器用八曰商才以興國利九曰辨才以長諷議此量才者也故伊尹曰智通於大道應變而不窮辨於萬物之情其言足以調陰陽正四時節風雨如是者舉以為三公故三公之事常在於道漢文帝問陳平曰君所主何事對曰陛下不知臣駑下使臣待罪宰相宰相者上佐天子燮理陰陽下遂萬物之宜外鎮撫四夷內親附百姓使公卿大夫各得其職上曰善漢魏相書曰臣聞易曰天地以順動故日月不過四時不忒聖人以順動則刑罰清而人服天地變化必由陰陽陰陽之分以日月為紀各有常職不得相干明王謹於尊天慎於養人故立羲和之官以乘四時敬授人事君動靜以道奉順陰陽則日月光明風雨時節寒暑調和三者得敘則災害不生人不夭疾衣食有餘矣此燮理陰陽之大體也事具洪範篇不失四時通於地利能通不通能利不利如是者舉以為九卿故九卿之事常在於德通於人事行猶舉繩通於關梁實於府庫如是者舉以為大夫故大夫之事常在於仁蜀丞相諸葛亮主簿楊顒曰坐而論道謂之三公作而行之謂之卿大夫忠正強諫而無有姦詐去私立公而言有法度如是者舉以為列士故列士之事常在於義也故道德仁義定而天下正人物志曰清節之德師氏之任也法家之材司寇之任也術家之材三孤之任也臧否之材師氏之佐也伎倆之材司空之任也儒學之材保氏之任也文章之材國史之任也驍雄之材將帥之任也太公曰多言多語惡口惡舌終日言惡寢臥不絶為衆所憎為人所疾此可使要遮閭巷察姦伺禍權數好事夜臥早起雖劇不悔此妻子之將也先語察事勸而與食實長希言財物平均此十人之將也忉忉截截垂意肅肅不用諫言數行刑戮刑必見血不避親戚此百人之將也訟辨好勝嫉賊侵淩斥人以刑欲整一衆此千人之將也外貌怍怍言語時出知人飢飽習人劇易此萬人之將也戰戰栗栗日慎一日近賢進謀使人知節言語不慢忠心誠畢此十萬人之將也經曰夫將雖以詳重為貴而不可有不決之疑雖以博訪為能而不欲有多端之惑此論將之妙也溫良實長用心無兩見賢進之行法不枉此百萬人之將也勳勳紛紛鄰國皆聞出入豪居百姓所親誠信緩大明於領世能效成事又能救敗上知天文下知地理四海之內皆如妻子此英雄之率乃天下之主也人物志曰聰明秀出謂之英膽力過人謂之雄此其大體之別名也夫聰明者英之分也不得雄之膽則説不行膽力者雄之分也不得英之智則事不立若聰能謀始而明不見機可以坐論而不可以處事若聰能謀始明能見機而勇不能行可以循常而不可以慮變若力能過人而勇不能行可以為力人未可以為先登力能過人勇能行之而智不能料事可以為先登未足以為將帥必聰能謀始明能見機膽能決之然後乃可以為英張良是也氣力過人勇能行之智足料事然後乃可以為雄韓信是也若一人之身兼有英雄則能長世高祖項羽是也經曰智如源泉行可以為表儀者人師也智可以砥礪行可以為輔警者人友也據法守職而不敢為非者人吏也當前快意一呼再諾者人隸也故上主以師為佐中主以友為佐下主以吏為佐危亡之主以隸為佐欲觀其亡必由其下故同明者相見同聽者相聞同志者相從非賢者莫能用賢故輔佐左右所欲任使者存亡之機得失之要孫武曰主孰有道昔漢王見圍榮陽謂陳平曰天下紛紛何時定乎平曰項王為人恭敬愛人士之廉節好禮者多歸之至於行功賞爵邑重之士亦以此不附今大王嫚人少禮士之頑鈍嗜利無恥者亦多歸漢誠宜各去兩短集其兩長天下指麾不足定也魏太祖謂郭嘉曰袁本初地廣兵強吾欲討之力不能敵何如嘉對曰劉項之不敵公所知也漢祖惟智勝項羽雖強終為所擒嘉竊料之紹有十敗公有十勝雖兵強無能為也紹繁禮多儀公體任自然此道勝一也紹以逆動公以奉順以率天下此義勝二也漢末政失於寬紹以寬濟故不懾公糾之以猛而上下知制此治勝三也紹外寬內忌用人而旋疑之所任唯親戚子弟耳公外簡易而內機明用人無疑唯才能所宜不問遠近此度勝四也紹多計少決失在後事公策得輒行應變無窮此謀勝五也紹因纍世之資高議揖讓以收名譽士之好言飾外者多歸之公至心待人推誠而行之不為虛美以儉率下與有功者無所吝士之忠正遠見而有實者皆願為用此德勝六也紹見人飢寒恤念之情形於顏色其所不見慮或不及所謂婦人之仁耳公於目前小事時有所忽至於大事與四海相接恩之所加皆過其望雖所不見慮之所周無不濟也此仁勝七也紹以大臣爭權讒言惑亂公御下以道浸潤不行此明勝八也紹是非不可知公所是進之以禮所不是正之以法此文勝九也紹好為虛勢不知兵要公以少剋衆用兵如神軍人恃之敵人畏之此武勝十也曹公曰吾知之紹為人志大而智小色厲而膽薄忌剋而少威兵多而分畫不明將驕而政令不一土地雖廣糧食雖豐適所以為吾奉也楊阜曰袁公寬而不斷好謀而少決不斷則無威少決則後事今雖強終為所擒曹公有雄才遠略決無疑法一而真精必能濟大事也將孰有能袁紹率大衆攻許孔融謂荀彧曰袁紹地廣兵強田豐許攸智計之士為其謀審配逢紀盡忠之臣任其事顏良文醜勇冠三軍統其兵殆難剋乎彧曰紹兵雖多而法令不整田豐剛而犯上許攸貪而不治審配專而無謀逢紀果而自用此二人留知後事許攸貪而犯法必不能縱不縱必為變顏良文醜一夫之勇耳可一戰而擒也後許攸貪不奉法審配收其妻子攸怒奔曹公又顏良臨陳授首田豐以諫死皆如彧所料也吾以此知勝之謂矣知人第五知人第五臣聞主將之法務覽英雄之心然人未易知知人未易漢光武聰聽之主也謬於龐萌曹孟德知人之哲也弊於張邈何則夫物類者世之所惑亂也故曰狙者類智而非智也狙音自舒反慢也愚者類君子而非君子也戇者類勇而非勇也亡國之主似智亡國之臣似忠幽莠之幼似禾驪牛之黃似虎白骨疑象碔砆類玉此皆似是而非也人物志曰輕諾似烈而寡信多易似能而無效進鋭似精而去速詗者似察而事煩許施似惠而無終面從似忠而退違此似是而非者也亦有似非而是有大權似姦而有功大智似愚而內明博愛似虛而實厚正言似訐而情忠非天下之至精孰能得其實也孔子曰凡人心險於山川難知於天天猶有春秋冬夏旦暮之期人者厚貌深情故有貌願而益有長若不肖長音竹兩反有順悁而達有堅而縵有緩而釬音汗太公曰士有嚴而不肖者有溫良而為盜者有外貌恭敬中心欺慢者有精精而無情者有威威而無成者有如敢斷而不能斷者有恍恍惚惚而反忠實者有倭倭迤迤而有效者有貌勇狠而內怯者有夢夢而反易人者無使不至無使不遂天下所賤聖人所貴凡人莫知惟有大明乃見其際此士之外貌而不與中情相應者也桓範曰夫賢愚之異使若葵之與莧何得不知其然若其莠之似禾類是而非是類賢而非賢揚子法言曰或問難知曰太山之與蟻蛭江河之與行潦非難也大聖與大佞難也於乎唯能別似者為無難矣知此士者而有術焉微察問之以觀其辭窮之以辭以觀其變與之間謀以觀其誠明白顯問以觀其德遠使以財以觀其廉又曰委之以財以觀其仁臨之以利以觀其廉試之以色以觀其貞又曰悅之以色以觀其不淫告之以難以觀其勇又曰告之以危而觀其勇又曰懼之以驗其特醉之以酒以觀其態又曰醉之以酒而觀其則又曰醉之以酒觀其不失莊子曰遠使之而觀其忠又曰遠使之以觀其不二近使之而觀其敬又曰近之以昵觀其不狎煩使之而觀其能又曰煩之以事以觀其理卒然問焉而觀其智又曰設之以謀以觀其智太公曰事之而不窮者謀急與之期而觀其信太公曰使之而不隱者謂信也雜之以處而觀其色又曰縱之以視觀其無變呂氏春秋曰通則觀其所禮通達也貴則觀其所進又曰達視其所舉也富則觀其所養又曰富視其所與又曰見富貴人觀其有禮施太公曰富之而不犯驕逸者謂仁也聽則觀其所行行則行仁近則觀其所好又曰居視其所親又曰省其居處觀其貞良省其交遊觀其志比習則觀其所言好則好義言則言道窮則觀其所不愛又曰窮則視其所不為非又曰貧視其所不取賤則觀其所不為又曰貧賤人觀其有德守也喜之以驗其守守慎守也又曰喜之以觀其輕樂之以驗其僻僻邪僻也又曰娛之以樂以觀其儉怒之以驗其節節性也又曰怒之讎以觀其不怨也哀之以驗其仁仁人見可哀者則哀苦之以驗其志又曰檢之以觀其能安經曰任寵之人觀其不驕奢太公曰貴之而不驕奢者義也疏廢之人觀其不背越榮顯之人觀其不矜誇隱約之人觀其不懾懼少者觀其恭敬好學而能悌人物志曰夫幼智之人在於童齓皆有端緒故文本辭繁辨始給口仁出慈恤施發過與慎生畏懼廉起不取者也壯者觀其廉潔務行而勝其私老者觀其思慎強其所不足而不踰父子之間觀其慈孝兄弟之間觀其和友鄉黨之間觀其信義君臣之間觀其忠惠太公曰付之而不轉者忠也此之謂觀誠傅子曰知人之難莫難於別真偽設所修出於為道者則言自然而貴元虛所修出於為儒者則言分制而貴公正所修出於為縱橫者則言權宜而貴變常九家殊務各有所長非所謂難也以默者觀其行以語者觀其辭以出者觀其治以處者觀其學四德或異所觀有微又非所謂難也所謂難者典説詭合轉應無窮辱而言高貪而言廉賊而言仁怯而言勇詐而言信淫而言貞能設似而亂真多端以疑暗此凡人之所常惑明主之所甚疾也君子內洗其心以虛受人立不易方貞觀之道也九流有主貞一之道也內貞觀而外貞一則執偽者無地而逃矣夫空言易設但責其實事之效則是非之驗立可見也故韓子曰人皆寐盲者不知人皆默喑者不識覺而使之視問而使之對則喑盲窮矣發齒吻視毛色雖良樂不能必馬連車蹴駕試之行途則臧獲定其駑良觀青黃察鍛銷雖歐冶不能必劍陸斷狗馬水截皎龍雖愚者識其利鈍矣是知明試責實乃聖功也人物志曰凡有血氣者莫不稟陰陽以立性體五行而著形其在體也木骨金筋火氣土肌水血五物之象也五物之實各有所濟也骨植而柔立者謂之宏毅宏毅也者仁之質也木則垂陰為仁之質質不宏毅不能成仁氣清而朗者謂之文理文理也者禮之本也火則照察為禮之本本無文理不能成禮體端而實者謂之貞固貞固也者信之基也土必吐生為信之基基不貞固不能成信也筋徑而精者謂之勇敢勇敢也者義之決也金能斷割為義之決決不勇敢不能成義也色平而暢者謂之通微通微也者智之原也水流疏達為智之原原不通微不能成智五質恆性故謂之五常故曰直而不剛則木木強徼許失其正色徑而不精則力負鼎絶臏失其正徑固而不端則愚專己自是陷於愚戇氣而不清則越辭不清順發越無成暢而不平則蕩好智無涯蕩然失絶然則平陂之質在於神神者質之主也故神平則質平神陂則質陂也明暗之實在於精精者實之本故精惠則實明精濁則實暗勇怯之勢在於筋筋者勢之用也故筋徑則勢勇筋弱則勢怯強弱之植在於骨骨者植之機故骨粗則植強骨細則植弱躁靜之決在於氣氣者決之地也氣盛決於躁氣沖決於靜慘懌之情在於色色者情之候故色悴由情慘色悅由情懌也衰正之形在於儀儀者形之表故儀衰由形殆儀正由形肅態度之動在於容容者動之符故邪動則容哀態正則容度也緩急之狀在於言言者心之狀故心恕則言緩心偏則言急也若質素平淡中睿外朗筋徑植固聲清色懌儀崇容直則純粹之德也夫人有氣氣也者謂誠在其中必見諸外故心氣粗訟者其聲沉散心氣詳慎者其聲和節心氣鄙戾者其聲粗獷心氣寬柔者其聲溫潤信氣中易義氣時舒和氣簡略勇氣壯立此之謂聽氣以其聲處其實氣生物物生有聲聲有剛柔清濁咸發乎聲聽其聲察其氣考其所為皆可知矣又有察色察色謂心氣內蓄皆可以色取之夫誠智必有難盡之色又曰誠智必有明達之色誠仁必有可尊之色又曰誠仁必有溫柔之色誠勇必有難懾之色又曰誠勇必有矜奮之色也誠忠必有可觀之色誠潔必有難汙之色誠貞必有可信之色質色浩然固以安偽色曼然亂以煩此之謂察色人物志曰夫心質亮直其儀徑固心質平理其儀安間夫仁目之精愨然以端勇膽之精曄然以強夫憂患之色乏而且荒疾疢之色亂而垢理喜色愈然以懌慍色厲然以揚妒惑之色冒昧無常是故其言甚懌而精色不從者中有違也其言有違而精色可信者辭不敏也言未發而怒色先見者意憤溢也言已發而怒氣送之者強所不然也凡此之類雖欲違之精色不從威愕以明雖變可知也又有考志考志者謂方與之言以察其志其氣寬以柔其色檢而不諂其禮先人其言後人每自見其所不足者是益人也若好臨人以色高人以氣勝人以言防其所不足而廢其所不能者是損人也太公曰博文辨辭高行論議而非時俗此姦人也王者慎勿寵之也其貌直而不侮其言正而不私不飾其美不隱其惡不防其過者是質人也又曰與之不為喜奪之不為怒沉靜而寡言多信而寡貌者是質靜人也議曰太公曰朴其身頭惡其衣服語無為以求名言無欲以求得此偽人也王者慎勿近之夫質人之中有如此之偽者也若其貌曲媚其言諛巧飾其見物務其小證以故自説者是無質人也議曰晏子云讒夫佞人之在君側材能皆非常也夫藏大不誠於中者必謹小誠於外以成其大不誠此難得而知也荀悅曰察人情術觀其言行未必合道而悅於己者必佞人也觀其言行未必悅己而合於道者必正人也此察人之情之一端也喜怒以物而色不作煩亂以事而志不惑深導以利而心不移臨懾以威而氣不卑者是平心固守人也又曰榮之以物而不娛犯之以卒而不懼置義而不遷臨貨而不回者是果正人也議曰孔子稱取人之法無取健健貪也夫健之弊有如此者矣若喜怒以物而心變易亂之以事而志不治示之以利而心遷動懾之以威而氣恇懼者是鄙心而假氣人也又曰若格易以言志不能固已諾而不決者是情弱之人也設之以物而數決驚之以卒而屢應不文而慧者是有智思之人議曰太公云有名而無實出入異言揚美掩惡進退為功王者慎勿與謀夫智思之人弊於是矣若難設以物難説以言守一而不知變固執而不知改是愚佷人也議曰志士守操愚佷難變夫不變是同而愚智異者以道為管也何以言之新語云夫長於變者不可窮以詐通於道者不可驚以怪審於辭者不可惑以言達於義者不可動以利故君子聞見欲衆而採擇欲謹學問欲博而行己欲敦目不淫炫耀之色耳不亂阿諛之辭雖利以齊魯之富而志不移設以松喬之壽而行不改然後能一具道而定其操致其事而立其功觀其道業此其所以與愚佷異也若屏言而勿顧自私而不護非是而強之是誣嫉人也議曰劉備以客見諸葛亮而賢之亮曰觀客色動而神懼視低而仵數姦形外灟邪心內藏必曹氏刺客後果然夫姦人容止大抵如是何晏夏侯元鄧揚等求交於傅嘏而不納也或怪而問之嘏曰泰初志大其量能合虛聲而無實才何平叔言遠而情近好辨而無誠所謂利口覆國之人也鄧元茂有為而無終外要名利內無關鑰貴同而惡異多言而妬前多言多敗釁妬前而無功以吾觀此三人皆敗德也遠之猶恐禍及況昵之乎後皆如嘏言夫妬者之行有如此者此之謂考志人物志曰夫精欲深微質欲懿重志欲宏大心欲嗛小精微所以入神妙也懿重所以崇德宇也志大所以戡物侄也心小所以慎咎悔也故詩詠文王小心翼翼不大聲以色心小也王赫斯怒以對於天下志大也由此論之心小志大者聖賢之倫也心大志大者豪傑之雋也心大志小者敖蕩之類也心小志小者拘懦之人也又有測隱測隱者若小施而好得小讓而大爭言願以為質偽愛以為忠尊其行以收其名此隱於仁賢孫卿曰仲尼之門五尺童子羞言霸道者何也彼非本政教也非服人心也以讓飾爭依乎仁而蹈利者也小人之桀耳曷足稱大君子之門乎若問則不對詳而不窮貌示有餘假道自從困之以物窮則託深此隱於藝文也又曰慮誠不及而佯為不言內誠不足而色亦有餘此隱於智術者也人物志曰有處後持長從衆所安似能聽斷者有避難不應似若有餘而實不解者有因勝情錯失窮而稱妙似理不可屈者此數似者衆人之所惑也若高言以為廉矯厲以為勇內恐外誇亟而稱説以詐氣臨人此隱於廉勇也議曰太公云無智略大謀而以重賞尊爵之故強勇輕戰僥幸於外王者慎勿使將此許勇之弊也若自事君親而好以告人飾其見物而不誠於內發名以君親因名以私身此隱於忠孝也此謂測隱矣人物志曰尤妙之人含精內真外無飾姿尤虛之人碩言瑰姿內實乖違而人之求奇不以精微測其元機或以貌少為不足或以瑰姿為巨偉或以真露為虛華或以巧飾為真實何自得哉故須測隱焉夫人言行不類終始相悖外內不合而立假節以感視聽者曰毀志者也人物志曰夫純訐性違不能公正依訐似直以計訐善純宕似流不能通道依宕似通行傲過節故曰直者亦訐訐者亦訐其訐則同其所以為訐則異通者亦宕宕者亦宕其宕則同其所以為宕則異觀其依似則毀志可知也若飲食以親貨賂以交損利以合得其權譽而隱於物者曰貪鄙者也太公曰果敢輕死苟以貪得尊爵重祿不圖大事待利而動王者慎勿使也若小知而不大解小能而不大成規小物而不知大倫曰華誕者也文子曰夫人情莫不有所短誠其大略是也雖有小過不足以為纍誠其大略非也閭里之行未足多也又有揆德揆德者其有言忠行夷秉志無私施不求反情忠而察貌拙而安者曰仁心者也有事變而能治效窮而能達措身立功而能遂曰有知者也有富貴恭儉而能威嚴有禮而不驕曰有德者也議曰魚豢云貧不學儉卑不學恭非人性分處所然耳是知別恭儉者必在於富貴人也有隱約而不懾安樂而不奢勳勞而不變喜怒而有度曰有守者也有恭敬以事君恩愛以事親情乖而不叛力竭而無違曰忠孝者也此之謂揆德桓範曰夫帝王之君歷代相踵莫不慕霸王之任賢惡亡國之失士然猶授在凶愚破亡相屬其故何哉由取人不求合道而求合己也故人物志曰清節之人以真正為度故其歷衆材也能識性行之常而或疑法術之詭術謀之人以思謨為度故能識策略之奇而或失遵法之良伎倆之人以邀功為度故能識進趣之功而不通道德之化言語之人以辨析為度故能識捷給之慧而不知含章之美是以互相非駮莫肯相是凡此之類皆謂一流故一流之人能識一流之善二流之人能識二流之美盡有諸流則亦能兼達衆材矣又曰夫務名者不能出陵己之後是故性同而材傾則相援而相賴也性同而勢均則相競而相害也此又同體之變不可不察也夫聖賢之所美莫美乎聰明聰明之所貴莫貴乎知人知人識智則衆材得其序而庶績之業興矣又曰夫天下之人不可盡與遊處何以知之欲觀其一隅則終朝足以識之將究其詳必三日而後足何謂三日而後足夫國體之人兼有三材故不談三日不足以盡之一以論道德二以論法制三以論策術然後乃能竭其所長而舉之不疑然則何以知其兼偏而與之言乎其為人務以流數抒人之所長而為之名目如是者兼也好陳己善欲人稱之不欲知人之所有如是者謂偏也是故仲尼訓六蔽以戒偏材之失仁者愛物蔽在無斷信者露誠蔽在無隱此偏材之常失也思狂狷以通拘抗之材疾悾悾而無信以明為似之難保察其所安觀其所由以知居止之行率此道也人焉廋哉人焉廋哉察相第六察相第六左傳曰周內史叔服如魯公孫敖聞其能相人也見其二子焉叔服曰穀也食子難也收子穀也豐下必有後於魯國杜預曰豐下謂面方也鄭伯享趙孟于垂隴七子從趙孟曰七子從君以寵武也請皆賦以卒君貺子展賦草蟲趙孟曰善哉人之主也抑武也不足以當之印段賦蟋蟀趙孟曰善哉保家之主吾有望矣子展其後亡者也在上不忘降印氏其次也樂而不荒樂以安人不淫以使之後亡不亦可乎漢書曰高祖立濞為吳王已拜上相之曰汝面狀有反相漢後五十年東南有亂豈非汝耶天下一家慎無反經曰眉上骨斗高者名為九反骨其人恆有包藏之志又曰黃色繞天中從髮際通兩慕其兩眉下各發黃色其中正上復有黃色直下鼻者三公相也若下賤有此色者能殺君父春秋左氏傳曰楚子將以商臣為太子訪諸令尹子上子上曰是人也蜂目豺聲忍人也不可立也弗聽後謀反以宮甲圍成王縊之又曰楚司馬子良生子越椒子文曰必殺之是人也熊虎之狀而豺狼之聲弗殺必滅若敖氏矣諺曰狼子野心是乃狼也其可畜乎子良不可後果反攻王楚王鼓而進遂滅若敖氏又曰晉韓宣子如齊見子雅子雅召其子子旗使見宣子宣子曰非保家之主也不臣杜預曰言子旗志器亢也後十年來奔周靈王之弟儋季卒其子括將見王而歎單公子愆旗聞其歎也入以告王曰不戚而願大視躁而足高心在他矣不殺必為害王曰童子何知及靈王崩儋括欲立王子佞夫周大夫殺佞夫齊崔杼帥師伐我公患之孟公綽曰崔子將有大志不在病我必速歸何患焉其來也不寇使人不嚴異於他日齊師徒歸果弒莊公晉楚會諸侯而盟楚公子圍設服離衛魯大夫叔孫穆子曰楚公子美矣君哉杜預曰設君服也此年子圍篡位衛孫文子來聘君登亦登叔孫穆子趨進曰諸侯之會寡君未嘗後衛君今吾子不後寡君未知所過吾子其少安孫子無辭亦無悛容穆叔曰孫子必亡為臣而君過而不悛亡之本也後十四年林父逐君初鄭伯享趙孟七子賦詩伯有賦鶉之賁賁享卒趙孟告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賓榮其能久乎魏時管輅相何晏鄧揚當誅死輅舅問之曰鄧揚行步節不束骨脈不制肉起立傾倚若無手足謂之鬼躁何之視候魂不守宅面無華色精爽煙浮容若枯木謂之鬼幽鬼躁者為風所收鬼幽者為火所燒自然之符不可蔽也宋孔熙光就姚生曰夫相人也天欲其圓地欲其方眼欲光曜鼻須柱梁四瀆欲明五嶽欲強此數者君無一焉又君之眸子服服如望羊行委曲而失步聲嘶散而不揚豈唯失其福祿將乃罹其禍殃後皆謀反被殺之矣由此觀之以相察士其來尚矣故曰富貴在於骨法憂喜在於容色經曰青主憂白主哭泣黑主病赤主驚恐黃主慶喜凡此五色並以四時判之春三月青色王赤色相白色囚黃黑二色皆死夏三月赤色王白色黃色皆相青色死黑色囚秋三月白色王黑色相赤色死青黃二色皆囚冬三月黑色王青色相白色死黃與赤二色囚若得其時色王相者吉不得其時色王相若囚死者凶魏管輅往族兄家見二客客去輅謂兄曰此二人天庭及口耳之間同有凶氣異變俱起雙魂無宅流魄于海骨歸于家後果溺死此略舉色變之效成敗在於決斷以此參之萬不失一經曰言貴賤者存乎骨骼言修短者存乎虛實經曰夫人喘息者命之所存也喘息條條狀長而緩者長命人也喘息急促出入不等者短命人也又曰骨肉堅硬壽而不樂體肉耎者樂而不壽左傳曰魯使襄仲如齊復曰臣聞齊人將食魯之麥以臣觀之將不能齊君之語偷臧文仲有言曰人主偷必死後果然鄭伯如晉拜成授玉于東楹之東晉大夫貞伯曰鄭伯其死乎自棄也已視流而行速不安其位宜不能久杜預曰言鄭伯不端諦也六月卒天王使劉康公成肅公會晉侯伐秦成子受脤于社不敬劉子曰吾聞之人受天地之中以生所為命也是以有動作禮義威儀之則以定命也能者養之以福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業國之大事在祀與戎祀有執燔戎有受脤神之大節也今成子墮棄其命矣其不及乎五月卒于瑕晉侯嬖程鄭使佐下軍鄭行人公孫翬如晉聘程鄭問焉曰敢問降階何由子羽不能對歸以語然明然明曰是將死矣不然將亡貴而知懼懼而思降乃得其階下人而已又何問焉且夫既登而求降者知人也不在程鄭其有亡釁乎不然其有惑疾將死而憂乎明年程鄭卒天王使單子會韓宣子于戚視下言徐叔向曰單子其將死乎朝有著定會有表衣有襘帶有結會朝之言必聞于表著之位所以昭事序也視不過結襘之中所以道容貌也言以命之容貌以明之失則有闕今單子為王官伯而命事于會視不登帶言不過步貌不道容而言不昭矣不道不恭不昭不從無守氣矣此冬單子卒宋平公享昭子晏飲樂語相泣也樂祁佐退而告人曰今茲君與叔孫其將死乎吾聞之哀樂而樂哀皆喪心也心之精爽是謂魂魄魂七去之何以能久此年叔孫宋公皆卒邾隱公來朝執玉高其容仰魯公受其玉卑其容俯子貢曰以禮觀之二君皆有死氣高仰驕也卑俯替子驕近亂替近疾君為主其先亡乎此年公薨哀七年以邾子益歸衛侯會吳於鄖吳人藩衛侯之舍子貢説太宰嚭而免之衛侯歸效夷言子之尚幼曰君必不免其死于夷乎執焉而又説其言從之固矣後卒死於楚魯公作楚宮穆叔曰太誓云人之所欲天必從之君欲楚也夫故作其宮不復適楚必死是宮六月辛巳公薨於楚宮晉侯使郤犨送孫林父於衛衛侯饗之苦成叔敖衛大夫寧子曰苦成家其亡乎古之饗食也以觀威儀省禍福故詩云兕觥其觩旨酒思柔彼交匪敖萬福來求今夫子敖取禍之道也十七年郤氏亡齊侯與衛侯會於商任不敬叔向曰二君者必不免會朝禮之經也禮政之輿也政身之守也怠禮失政不立是以亂也二十五年齊弒光二十六年衛弒剽也言性靈者存乎容止斯其大體夫相人先視其面面有五嶽四瀆五嶽者額為衡山頤為恆山鼻為嵩山左顴為泰山右顴為華山四瀆者鼻孔為濟口為河目為淮耳為江五嶽欲聳峻員滿四瀆欲深大崖岸成就五嶽成者富人也不豐則貧四瀆成者貴人也不成則賤矣五官六府五官者口一鼻二耳三目四人中五六府者兩行上為二府兩輔角為四府兩權衡上為六府一官好貴十年一府好富十年五官六府皆好富貴無巳左為文右為武也九州八極九州者額從左達右無縱理不敗絶狀如覆肝者為善八極者登鼻而望八方成形不相傾者為良也七門二儀七門者兩姦門兩闕門兩命門一庭中二儀者頭圓法天足方象地天欲得高地欲得厚若頭小足薄貧賤人也七門皆好富貴人也總而言之額為天頤為地鼻為人左目為日右目為月天欲張地欲方人欲深廣日月欲光天好者貴地好者富人好者壽日月好者茂上亭為天主父母貴賤中亭為人主昆弟妻子仁義年壽下亭為地主田宅奴婢畜牧飲食也若夫權骨才起膚色潤澤者九品之侯也又曰腰腹相稱臀髀才厚及高視廣步此皆九品之侯也夫色須厚重腰須廣長故經曰面如黃瓜富貴榮華白如截脂黑色如漆紫色如椹腰廣而長腹如垂囊行如鵝龜此皆富貴人也凡稱夫公侯將相已下者不論班品也輔骨小見鼻準微端者八品之侯也又曰胸背微豐手足悅澤及身端步平者此皆八品之候也夫鼻須洪直而長胸脾須豐厚如龜形手足色須赤白此皆富貴人也故經曰手足如綿富貴終年手足厚好立使在傍也輔角成稜倉庫皆平者七品之候也又曰胸厚頸粗臂脛傭均及語調顧定者此皆七品之候也夫頸須粗短手臂須纖長語須如篁及鳳此皆貴相也故經曰額角高聳職位優重虎頸圓粗富貴有餘牛顧虎視富貴無比天倉滿得天祿地倉滿豐酒肉也天中豐隆印堂端正者六品之候也又曰腦起身方手厚腰圓及聲清音朗者此皆六品之候也夫人額上連天中下及司空有骨若肉如環者名曰天城周匝無缺者大貴有缺若門者為三公夫聲者須深實大而不濁小而能彰遠而不散近而不亡餘音激徹似若有篁宛轉流韻能圓能長此善者也宮聲重大沈壅商聲堅徑廣博角聲圓長通徹徵聲抑揚流利羽聲奄藹低曳此謂正聲也伏犀明峻輔角豐穠者五品之候也又曰頸短背隆乳闊腹垂及鵝行虎步者皆五品之侯也夫人腦縫骨起前後長大者將軍二千石領兵相也出髮際為伏犀須聳峻稜利公侯相也不用寬平有坎者迍剝有峰者大佳寬平者猶為食祿夫腹須端妍故曰馬腹龐龐玉帛豐穰也邊地高深福堂廣厚者四品之候也又曰頭高而豐長上短下及半顧龍行者此皆四品之候也邊地在額角近髮際也福堂在眉尾近上也夫頭須高大故經曰牛頭四方富貴隆昌虎頭高峙富貴無比象頭高廣福祿長厚犀頭律崒富貴鬱鬱駝頭蒙洪福祿所鍾虎行將軍鴈行大富也犀及司空龍角纖直者三品之侯也又曰胸背極厚頭深且尖及志雄體柔者此皆三品候也司空從髮際直下次天庭是也龍角在眉頭上也頭頂高深龍犀成就者二品之侯也又曰頭角奇起支節合度及貌桀性安者此皆二品之侯也夫容貌慷慨舉止汪翔精爽清澄神儀安定言語審諦不疾不徐動息有恆不輕不躁喜怒不妄發趨捨合物宜聲色不變其情榮枯不易其操此謂神有餘者主有貴位也四倉盡滿骨角俱明者一品之侯也頭頸皆好支節俱成及容質姿美顧視澄徹者此皆一品之候也似龍者為文吏似龍者甚貴龍行者為三公也似虎者為將軍虎行者為將軍驛馬骨高為將軍也似牛者為宰輔似馬者為武吏似馬亦甚貴也似狗者有清官為方伯似豬似猴者大富貴似鼠者惟富而己凡稱似者謂動靜並似之若偏似一處乃貧寒者也天中主貴氣平滿者宜官祿也天中最高近髮際發黃色上入正角至高廣參駕遷刺史牧守黃色如日月在天中左右侍天子也黃色出天中圓大光重者暴見天子經年及井竈有功受封恆有黃氣如懸鐘鼓三公之相也又發黃氣如龍形亦受封也四時官氣發天部如鏡光者暴貴相也天庭主上公大丞相之氣天庭直下次天中有黑子主死司空主天宮亦三公之氣司空直下次天中色惡主上書大凶中正主群寮之氣平品人物之司也中正直下次司空色好者遷官轉職若司空中正發赤色而歷歷者在中正為縣官在天庭為郡官州縣蘭臺尚書各視所部也印堂主天下印綬掌符印之官也印堂在兩眉間微下眉頭少許次中正發赤色如連刀上至天庭下至鼻準為縣令直闕庭發色者長吏也如車輪與輔角相應者大貴印堂一名闕庭也山根平美及有奇骨伏起為婚連帝室公主壻也山根直下次印堂亦主有勢無勢也高廣主方伯之坐從天中橫列至髮際凡七名高廣位在第三高廣忽發黃色如兩人捉鼓者將軍相也陽尺主州佐之官橫次高廣位在第四陽尺亦主少出方伯有氣憂遠行也武庫主兵甲典庫之吏橫次陽尺位在第五輔角主遠州刺史之官橫次武庫位在第六骨起色好主黃門舍人之官也邊地主邊州之任橫次輔角位在第七有黑子落難為奴也日角主公侯之坐從天庭橫列至髮際凡八名日角位在第一平滿充直者宜官職房心主京輦之任橫次日角位在第二房心左為文右為武骨起宜做人師黃色見房心上至天庭為丞令直見房心而光澤者召為國師也驛馬主急疾之吏橫次位在第七驛馬好色應印堂上秋冬得官也額角主卿寺之位從司空橫列至髮際凡八名額角橫次位在第一色紅黃大吉昌也上卿主帝卿之位橫次額角上卿躍躍封卿大樂虎眉主大將軍從中正橫列至髮際凡九名虎眉橫次位在第二發青白色者應行也牛角主王之統師小將橫次虎眉位在第三亦主封侯食祿成角者更勝於肉也元角主將軍之相橫次位在第五無角者不可求官凡欲知者得官在任久不先視年上發巳長短發色長一分主一年二分二年以此消息則可知也有惡色間之者主其年有事白色遭喪赤色彈奪黑色病青色獄厄天中有氣橫千者無官也然官色既久忽有死厄色間之者代人死也若年上有好色如連山出雲雨處處皆通則無處不達髮際有黃氣為已得官若黑氣未也有黃氣如衣帶發額上遷官益祿也夫人有六賤頭小身大為一賤又曰額角陷缺天中霪下亦為一賤經曰額促而迮至老窮厄蛇頸薄曲糟粳不足蛇頭平薄財物寥落貉頭尖鋭窮厄無計也目無光澤為二賤又曰胸背俱薄亦為二賤經曰陷胸薄尻及猴目皆窮相也舉動不便為三賤又曰音聲雌散亦為三賤經曰語聲嘖嘖面部枯燥面毛戎戎無風而塵皆貧賤相也夫聲之惡者塵濁飛散細嗄聊亂聲上則若盡往則不還淺亂澀細沈濁痿弊舌短神強蹇此無響此惡相也夫人不笑似笑不嗔似嗔不喜似喜不畏似畏不醉似醉常如宿酲不愁似愁常如憂戚容貌闕乏如經癇病神色悽愴常如有失舉止慞惶恆如趨急言語澀縮若有隱藏體貌低摧如遭凌辱此並神不足也神不足者多牢獄厄有官隱藏而失有位貶逐而黜者也鼻不成就準向前低為四賤又曰眇目斜視亦為四賤經曰人中平滿耳無輪廓皆貧賤相也腳長腰短為五賤又曰唇傾鼻曲亦為五賤經曰蛇行雀趨財物無儲鼻柱薄主立諾鼻頭低垂至老獨炊搖腰急步必無所使腰短者則被人奪職也文策不成脣細橫長為六賤又曰多言少信亦為六賤經曰口蒲人不提攜僻側為人所毀口如炊火至老獨坐舌色白下賤人也舌短貧賤人也凡欲知人是賤者貴處少而賤處多多者廣也少者狹也六賤備具為僕隸之人此貴賤存乎骨骼者也論曰堯眉八彩舜目重瞳禹耳三漏文王四乳然則世人亦時有四乳者此則駑馬一毛似驥也若日角月偃之奇龍棲虎踞之美地靜鎮於城堙天闢運於掌策金槌玉枕磊落相望伏犀起蓋隱轔交映井宅既兼倉匱已實斯乃卿相之明效也若深目長頸頽顏蹙齃蛇行鷙立猳喙鳥咮筋不束體面無華色手無春荑之柔髮有寒蓬之悴是則窮乏徵驗也昔姑布子卿謂子貢曰鄭東門有一人其長九尺六寸河目而隆顙其頭似堯其項似皋陶其肩似子産然自腰以下不及禹三寸儽然若喪家之狗河目謂上下匡而長也顙額也漢高祖隆準而龍顏準鼻也顏額顙也兩角為龍角一角為犀角言高祖似龍兩眉顙骨高而鼻上隆魏陳留王豐下兌上有堯圖之表陳宣帝頸縝貌若不惠初賤時楊忠見而奇之曰此人虎頸必當大貴後皆果然此貴賤之效也夫木主春生長之行也春主肝肝主目目主仁生長敷榮者施恕惠與之意也火主夏豐盛之時也夏主心心主舌舌主禮豐盛殷阜者富博宏通之義也金主秋收藏之節也秋主肺肺主鼻鼻主義收藏聚斂者吝嗇慳鄙之情也水主冬萬物伏匿之日也冬主腎腎主耳耳主智伏匿隱蔽者邪諂姦佞之懷也土主季夏萬物結實之月也季夏主脾脾主脣脣主信結實堅確者貞信謹厚之禮也故曰凡人美眉目好指爪者庶幾好施人也肝出為眼又主筋窮為爪榮於眉藏於魂經曰凡人眉直而頭昂意氣雄強缺損及薄無信人也如弓者善人也眼有光彩而媚好者性識物理而明哲人也眼光溢出瞼外不散不動又不急不緩而精不露者智惠人也瞼蹇縮精無光者愚鈍人也眼光不出瞼者藏情人也加以瞼澀盜視必作偷也若務睮皎𥍉者蛆嫉人也急𥈂者不嫉妒則虛妄人也盯雎眰血者惡性人也䂅䀽矘晃者憨人也坥䁠珉𥉜者淫亂人也彌詗坥瞺者姦詐人也䁠澄拘䁠者掘強人也羊日𥆀瞳者毒害人也睢盱睫爍者回邪人也精色雜而光彩浮淺者心意不定無信人也精清光溢者聰明人也精沈光定者大膽人也上目眥下眥中深厚氣色穠厚者有威武亦大膽人也氣色飄眇淺薄人也土地不潔者無威怯懦人也精紫黑而光彩端定者剛烈人也精潔白而端定者好隱遁人也精多光而不溢散清徹而視端審者直性人也精黃而光彩澄徹者慕道術人也點精近上者志意下劣人也點精近下者志意高尚人也點精近裏者自收斂人也點精近外者慠慢憨人也羊目直視能殺妻子慠目㶐澄刑禍相仍鷹視狼顧常懷嫉妬螻姑日心難得夫指者欲纖穠如鵝有皮相連者性淳和人也指頭方懟者見事遲人也妍美者囑授人信之惡者人不遵承也毛髮光澤脣口如朱者才能學藝人也心出為舌又主血血窮為毛髮榮於耳藏於神經曰野狐鬢難期信羖䍽鬢多狐疑脣急齒露難與為友脣寬端正出言有章脣口不佳出言不信口邊無媚好揚人惡口啄如烏不可與居惡心人也口急緩如鳥言語撮聚者此人多口舌緩急不同少信人也鼻孔小縮準頭低曲者慳吝人也肺出為鼻孔又主皮膚又為氣息藏於魄好鼻者有聲譽鼻柱薄而梁陷者多病厄人也鼻無媚憨蠢人也蜣蜋鼻少意智人也耳孔小齒瓣細者邪諂姦佞人也腎出為骨又主髓髓窮為耳孔骨窮為齒藏于志經曰耳孔深廣者心虛而識元耳孔醜小者無智而不信神理耳邊無媚鄙拙人也耳孔小而節骨曲戾者無意智人也老鼠耳者殺之不死又云鼠耳之人多作偷盜者也耳輪厚大鼻準圓實乳頭端淨頦頤深廣厚大者忠信謹厚人也脾出為肉肉窮為孔又主耳輪準鼻梁頦頤等藏於意經曰夫頭高大者性自在而好淩人頭卑弊者性隨人而細碎故曰鹿頭側長志氣雄強兔頭蔑頡意志下劣獺頭橫闊心意豁達夫頸細而曲者不自樹立人也若色斑駁或不潔淨者性隨宜而不堅固夫手纖長者好施捨短厚者好取捨則庶幾取則貪惜故曰手如雞足意智褊促手如豬蹄志意昏迷手如猴掌勤劬伎倆夫背厚闊者剛決人也薄者怯弱人也夫腹端妍者才華人也故曰牛腹婪貪財物自淹蛤蟆腹者懶人也夫腰端美者則樂而能任人也蜥蜴腰者緩人也夫臂髀厚廣者可倚任安穩人也夫蛇行者含毒人也不可與之共事鳥行蹌蹌性行不良似鳥鵲行也鷹行雄烈豺狼行者性粗覓利人也牛行性直也馬行猛烈人也此性靈存乎容止者也范蠡曰越王為人長頸烏喙可與共患難不可與共安樂尉繚曰秦始皇隆準長目鷙膺豺聲少恩信虎狼心居約易出人下得志亦輕食人不可與之久遊叔魚生其母視之曰是虎目而豕心鳶肩而牛腹溪壑可盈是不可厭也晉叔向欲娶于巫臣氏其母不欲曰昔有仍氏生女黰黑而甚美光可以鑑名曰元妻樂正后夔娶之生伯封實有豕心貪婪無厭忿類無期謂之封豕有窮后羿滅之夔是以不祀且三代之亡皆是物也汝何為哉夫有尤物足以移人苟非德義則必有禍叔向懼乃止魏安釐王問子從曰馬回梗梗亮直大夫之節吾欲為相可乎答曰長目而豕視則體方而心圓每以其法相人千萬不失一臣見回非不偉其體幹然甚疑其目平原君相秦將白起謂趙王曰武安君之為人也小頭而鋭下瞳子白黑分明視瞻不轉小頭而鋭下者斷敢行也瞳子白黑分明者見事明也視瞻不轉者執志強也可與持久難與爭鋒王莽大口蹶頤露目赤精聲大而身長七尺五寸反膺仰視瞰臨左右或言莽所謂鴟目虎啄豺狼之聲故瞰食人亦當為人所殺莽後篡漢位後兵敗歸果被殺也夫命之與相猶聲之與響也聲動乎幾響窮乎應必然之理矣雖云以言信行失之宰豫以貌度性失之子羽然傳稱無憂而戚憂必及之無慶而歡樂必還之此心有先動而神有先知則色有先見故扁鵲見桓公知其將亡申叔見巫臣知其竊妻或躍馬膳珍或飛而食肉或早隸晚侯或初刑末王銅巖無以飽生玉饌終乎餓死則彼度表捫骨指色摘理不可誣也故列云爾論士第七論士第七臣聞黃石公曰昔太平之時諸侯二師方伯三師天子六師世亂則叛逆生王澤竭則盟誓相罰德同無以相加乃攬英雄之心故曰得人則興失士則崩何以明之昔齊桓公見小臣稷一日三往而不得見從者止之桓公曰士之傲爵祿者固輕其主其主傲霸王者亦輕其士縱夫子傲爵祿吾庸敢傲霸王乎五往而後得見書曰能自得師者王何以明之齊宣王見顏觸曰觸前觸亦曰王前議曰夫觸前為慕勢王前為趨士與使觸為慕勢不若使王為趨士宣王作色曰王者貴乎士者貴乎對曰昔秦攻齊令曰有敢去柳下季壟五百步而樵採者罪死不赦令曰有能得齊王頭者封萬戶侯賜金千鎰由是言之生王之頭曾不如死士之壟宣王竟師之宣王左右曰大王據千乘之地而建千石之鍾東南西北莫敢不服今夫士之高者乃稱匹夫徒步而處於農畝之下則鄙野監門閭里士之賤也亦甚矣觸曰古大禹之時諸侯萬國舜起農畝而為天子及湯之時諸侯三千當今之世南面稱寡人者乃草四由此觀之非得失之策與稍稍誅滅滅亡無族之時欲為監門閭里安可得哉易傳不云乎居上位未得其實故無其實而喜其名者削無其德而望其福者約無其功而受其祿者辱禍必握故曰矜功不立虛願不至此皆夸其名華而無其實德也是以堯有九佐舜有十友禹有五丞湯有三輔自古及今而能虛成名於天下者無有是以君王無羞亟問不愧下學而成其道老子曰雖貴必以賤為本雖高必以下為基是以侯王稱孤寡不穀夫孤寡者困賤下位者也而侯王以自謂豈非以下人而尊貴士與夫堯傳舜舜傳禹周成王任周公旦而世世稱明是以明乎士之貴也諺曰浴不必江海要之去垢馬不必騏驥要之善走士不必賢也要之知道女不必貴種要之貞好何以明之淳於髡謂齊宣王曰古者好馬王亦好馬古者好味王亦好味古者好色王亦好色古者好士王獨不好王曰國無士耳有則寡人亦悅之髡曰古有驊騮騏驥今之無有王選於衆王好馬矣古有豹象之胎今之無有王選於衆王欮味矣古有毛嬙西施今之無有王選於衆王好色矣王必待堯舜禹湯之士而後好之則堯舜禹湯之士亦不好王矣魯仲連謂孟嘗君曰君好士未也孟嘗君曰文不得士故也對曰君之廄馬百乘無不被繡衣而食菽粟豈有騏驥騄耳哉後宮十妃皆衣縞紵食粱肉豈有毛嬙西施哉色與馬取於今之世士何必待古哉故曰君好士未也張敞與朱邑書曰飢者甘糟粳飽者飫粱肉何則有無之勢異也昔陳平雖賢須魏倩而後進韓信雖奇賴蕭何而後信故士各達其及時之宜若待古之英俊必若伊尹呂望而後薦之則此人不因足下而進矣淮南曰待腰裊飛兔而後駕則世莫乘車矣待西施洛浦而後妃則終身不家矣然不待古之英俊則而自足者因其所有而遂用之也語曰瓊艘瑤楫無涉川之用金弧玉弦無激矢之能是以介潔而無政事者非撥亂之器儒雅而乏治理者非翼亮之士何以明之魏無知見陳平於漢王漢王用之絳灌等讒平曰平盜嫂受金漢王讓魏無知無知曰臣之所言者能也陛下所聞者行也今有尾生孝已之行而無益於勝負之數陛下假用之乎今楚漢相距臣進奇謀之士顧其計誠足以利國家耳盜嫂受金又安足疑哉漢王曰善黃石公曰有清白之士者不可以爵祿得守節之士不可以威刑脅致清白之士修其禮致守節之士修其道何以明之郭隗説燕昭王曰帝者與師處王者與友處霸者與臣處亡國與廝役處詘指而事之北面受學則百己者至先趨而後息先問而後默則什己者至人趨己趨則若己者至憑几據杖眄視指使則廝役之人至恣睢奮擊詬藉叱咄則徒隸之人至矣此乃古之服道致士者也黃石公曰禮者士之所歸賞者士之所死招其所歸示其所死則所求者至矣何以明之魏文侯太子擊禮田子方而子方不為禮太子不悅謂子方曰不識貧賤者驕人乎富貴者驕人乎子方曰貧賤者驕人耳富貴者安敢驕人人主驕人而亡其國大夫驕人而亡其家貧賤者若不得意納履而去安往而不得貧賤乎宋燕相齊見逐罷歸謂諸大夫曰有能與我赴諸侯乎皆執杖排班默而不對燕曰悲乎何士大夫易得而難用也陳饒曰舉士大夫易得而難用君不能用也君不能用則有不平之心是失之於己而責諸人也燕曰其説云何對曰三升之稷不足於士而君鴈鶩有餘粟是君之過一也果園梨栗後宮婦女以相提挃而士曾不得一嘗是君之過二也綾紈綺縠美麗於堂從風而弊士曾不得以為緣是君之過三也夫財者君之所輕死者士之所重君不能行君之所輕而欲使士致其所重譬猶鉛刀畜之干將用之不亦難乎宋燕曰是燕之過也語曰夫人同明者相見同聽者相聞德合則未見而相親聲同則處異而相應韓子曰趣捨同則相是趣捨異則相非何以明之楚威王問宋玉曰先生其有遺行歟何士人衆庶不譽之甚宋玉曰夫鳥有鳳而魚有鯨鳳凰上擊九萬里翱翔乎窈冥之上夫蕃籬之鷃豈能與料天地之高哉鯨魚朝發於崑崙之墟暮宿於孟津夫尺澤之鯢豈能與量江海之大哉故非獨鳥有鳳而魚有鯨士亦有之夫聖人瑰琦意行超然獨處夫世俗之民又安知臣之所為哉議曰世之善惡難得而知苟非其人莫見其際何者夫文章為武人所嗤未必鄙也為楊馬所毀此真鄙矣夫人臣為桀紂所毀未必為愚也必若堯舜所毀此真愚矣世之毀譽不足信也故自不夜出安知有夜行人太公曰智與衆同非人師伎與衆同非國工老子曰下士聞道大笑之不笑不足以為道故曰凡人所賤聖人所貴信矣哉語曰知人未易人未易知何以明之汗明説春申君春申君悅之汗明欲談春申君曰僕已知先生意矣汗明曰未審君之聖孰與堯春申君曰臣何足以當堯汗明曰然則君料臣孰與舜春申君曰先生即舜也汗明曰不然臣請為君終言之君之賢不如堯臣之能不及舜夫以賢舜事聖堯三年而後乃相知也今君一時而知臣是君聖於堯而臣賢於舜也記曰夫驥唯伯樂獨知之若時無伯樂之知即不容其為良馬也士亦然矣何以明之孔子厄於陳蔡顏回曰夫子之德至大天下莫能容然夫人推而行之世不我用有國者之醜也夫子何病焉故曰文王明夷則主可知仲尼旅人則國可知穀梁傳曰子既生不免乎水火母之罪也羈冠成童不就師傅父之罪也羈冠謂交互翦髮成童謂八歲以上就師學問無方心志不通身之罪也心志既通而名譽不聞友之罪也名譽既聞有司不舉有司之罪也有司舉之王者不用王者之過也孔子曰內行不修己之罪也行修而名不彰友之罪也論曰行遠道者假於車馬濟江海者因於舟楫故賢士之立功成名因於資而假物者何以明之公輸子能因人主之材木以構宮室臺榭而不能自為專屋狹廬材不足也歐冶能因國君之銅鐵以為金爐大鍾而不能自為壺鼎盤盂無其用也君子能因人主之政朝以和百姓潤衆庶而不能自饒其家勢不便也故舜耕於歷山恩不及州里太公屠牛於朝歌利不及于妻子及其用也恩流八荒德溢四海故舜假之堯太公因之周文君子能修身以假道不能枉道而假財慎子曰騰蛇遊霧飛龍乘雲雲罷霧霽與蚯蚓同則失其所乘矣韓子曰千鈞得船則浮錙銖失船則沉非千鈞輕而錙銖重有勢之與無勢耳故勢有不可得事有不可成烏獲輕千鈞而重其身非其身重於千鈞也勢不便也離婁易於百步而難於眉睫非百步近而眉睫遠道不可也語曰夫有國之主不可謂舉國無深謀之臣闔朝無智策之士在聽察所考精與不精審與不審耳何以明之在昔漢祖聽聰之主也納陳恢之謀則下南陽不用婁敬之計則困平城廣武君者策謀之士也韓信納其計則燕齊舉陳餘不用其謀則泜水敗由此觀之不可謂事濟者有計策之士覆敗者無深謀之臣虞公不用宮之奇之謀滅於晉仇由不聽赤章之言亡於智氏蹇叔之哭不能濟崤黽之覆趙括之母不能救長平之敗此皆人主之聽不精不審耳天下之國莫不有忠臣謀士也議曰天下無災害雖有賢德無所施才老子曰大道廢有仁義國家昏亂有忠臣淮南子曰未有其功而知其賢者唯堯之知舜也功成事立而知其賢者市人之知舜也陸機曰飛轡西頓則離朱與矇瞍收察懸景東秀則夜光與碔砆匿耀是以才換世則俱困功偶時而並劭以此推之向使殷無鳴條之事則伊尹有莘之媵臣周無牧野之師則太公渭濱之漁者耳豈能勒名帝籍策勳天府乎故曰賢不肖者才也遇與不遇者時也誠哉是言也黃石公曰羅其英雄則敵國窮夫英雄者國家之幹士民者國家之半後其幹收其半則政行而無怨知人則哲唯帝難之慎哉政體第八政體第八古之立帝王者非以奉養其欲也為天下之人強掩弱詐欺愚故立天子以齊一之謂一人之明不能遍照海內故立三公九卿以輔翼之為絶國殊俗不得被澤故立諸侯以教誨之夫教誨之政有自來矣何以言之管子曰措國於不傾之地有德也周武王問於粥子曰寡人願守而必存攻而必得為此奈何對曰攻守同道而和與嚴其備也故曰和可以守而嚴不可以守嚴不若和之固也和可以攻而嚴不可以攻嚴不若和之得也故諸侯發政施令政平於人者謂之文政矣接士而使吏禮恭於人者謂之文禮也聽獄斷刑治仁於人者謂之文誅矣故三文立於政行理守而不存攻而不得者自古至今未之嘗聞月子曰德者天地萬物之得也義者天地萬物之宜也禮者天地萬物之體也使天地萬物皆得其宜當其禮謂之大仁文子曰夫人無廉恥不可以治也不知禮義不可以行法也法能殺人不能使人孝悌能刑盜者不能使人有廉恥故聖王在上明好惡以示之經非譽以導之親賢而進之賤不肖而退之刑措不用禮義修而任得賢也又曰夫義者非能盡利天下者也利一人而天下從暴者非能盡害海內者也害一人而天下叛故舉措廢置不可不審也積於不涸之倉務五穀也朝錯説漢文帝曰今土地人民不減于古無堯湯之水旱而蓄積不及古者何也地有遺利人有餘力生穀之土未盡墾闢山澤之利未盡出遊食之人未盡歸農也當今之務在於貴粟貴粟之道在於使人以粟為賞罰今募天下之人入粟塞下得以拜爵得以除罪如此則富人有爵農人有錢粟有所餘而國用饒足不過三載塞下之粟必多矣漢景帝詔曰雕文刻鏤傷農事者也錦繡纂組害女工者也農事傷則飢之本也女工害則寒之原也夫飢寒並至而能毋為非者寡矣朕親耕后親桑以奉宗廟為天下先欲天下務農蠶素有畜積以備災害鹽鐵論曰國有沃野之饒而人不足於食者工商盛而本業荒也有山海之貨而人不足于財者不務人用而淫巧衆也藏於不竭之府養桑麻育六畜也漢景帝詔曰農天下之本也黃金珠玉飢不可食寒不可衣其令郡國勸農桑益種樹可充衣食物吏發人取庸采黃金珠玉者坐贓為盜二千石聽者與罪同申鑒論曰人不畏死不可懼之以罪人不樂生不可勸之以善故在上者先豐人財以定其志也下令於流水之原以順人心也尉繚子曰令所以一衆心也不審所出則數變數變則令雖出衆不信也出令之法雖有小過無更則衆不二聽即令行矣尹文子曰文之于武也令有必行有不必行者去貴妻賣愛妾此令必行者也因曰汝無敢恨汝無敢思此令不行者也故為人上者必慎所出令焉文子曰治國有常而利人為本政教有道而令行為古也使士於不諍之官使人各為其所長也孫卿曰相高下序五穀君子不如農人通財貨辨貴賤君子不如賈人設規矩便備用君子不如工人若夫論德而定次量能而授官言必當理事必當務然後君子之所長文子曰力勝其任即舉之不重也能務其事則為之不難也明必死之路嚴刑罰也議曰孔子曰上失其道而殺其下非禮也故三軍大敗不可斬獄犴不治不可刑何也上教之不行罪不在人故也夫慢令謹誅賊也徵斂無時暴也不誡責成虐也政無此三者然後刑即可也陳道德以先服之猶不可則尚賢以勸之又不可則廢不能以憚之而猶有邪人不從化者然後待之以刑矣袁子曰夫仁義禮智者法之本也法令刑罰者治之未也無本者不立無末者不成何則夫禮教之法先之以仁義示之以禮讓使之遷善日用而不知儒者見其如此因謂治國不須刑法不知刑法承于下而後仁義興于土也法令者賞善禁淫居理之要商韓見其如此因曰治國不待仁義為體故法令行于下也故有刑法而無仁義則人怨怨則怒也有仁義而無刑法則人慢慢則姦起也本之以仁成之以法使兩道而無偏重則治之至也故仲長子曰昔秦用商君之法張爾天之網然陳涉大呼於沛澤之中天下響應人不為用者怨毒結於天下也桓範曰桀紂之用刑也或脯醯人肌肉或刳割人心腹至乃叛逆衆多卒用傾危者此不用仁義為本者也故曰仁者法之恕義者法之斷也是知仁義者乃刑之本故孫子曰令之以文齊之以武是謂必取此之謂矣開必得之門信慶賞也呂氏春秋曰夫信立則虛立可以賞矣六合之內皆可以為府矣人主見此論者其王久矣人臣知此論者可以為王者佐矣徐幹中論曰天生蒸人其情一也刻肌虧體所同惡也被玉垂藻所同好也此二者常在而人或不理其身有由然也當賞者不賞而當罰者不罰則為善者失其本望而疑其所行則為惡者輕於國法而恬其所守苟如是雖日用斧鉞於市而人不去惡矣日賞賜爵祿於朝而人不興善矣蜀張裔謂諸葛亮曰公賞不遺遠罰不阿近爵不以無功取刑不可以勢貴免此賢愚之所以僉忘其身也不為不可成量人力也文子曰夫債少易償也職寡易守也任輕易勸也上操約少下效易為之功是以為君為臣久而不相厭也末世之法高為量而罪不及重為任而罰不勝危為難而誅不敢人困於三責即飾智以詐上雖峻法嚴刑不能禁其姦也新語曰秦始皇設刑法為車裂之誅築城域以備胡越事愈煩下愈亂法愈衆姦愈縱秦非不欲治也然失之者舉措太衆刑罰太極故也不求不可得不強人以其所惡也故其稱曰政者政之所行在順人心政之所廢在逆人心夫人惡憂勞愛逸樂逸樂之人惡貧賤富貴之人惡危墜存安之人惡絶滅生生者育之能逸樂之則人恐之憂勞能富貴之則人恐之貧賤能存安之則人恐之危墜能生育之則人恐之絶滅故從其四欲則遠者自親行其四惡則近者亦叛晏子曰謀度於義者必得事因于仁者必成反義而行背仁而動未聞能成也呂氏春秋曰樹木茂則禽獸歸之水源深則魚鱉歸之人主賢則豪傑歸之故聖王不務歸之者而務其所歸故曰強令之笑不樂強令之哭不悲強之為道可以成小而不可以成大也不處不可久不偷取一世宜也董仲舒論安邊之策欲令漢與胸奴和親又取胸奴愛子為質班固以胸奴桀驁每有人降漢輒亦拘留漢使以相報復安肯以愛子為質孝文時妻以漢女而胸奴屢背約束昧利不顧安在其不棄質而失重利也夫規事建議不圖萬世之固而偷恃一時之事者未可以經遠朝錯説漢文帝令人入粟塞上得以拜爵得以贖罪上從之荀悅曰聖人之政務其綱紀明其道義而已若夫一切之計必推其公議度其時宜不得已而用之非有大故弗由之也知時者可立以為長范蠡曰時不至不可強生事不究不可強成管子曰聖人能輔時不能違時語曰聖人修備以待時也審於時察於用而能備官者可奉以為君議曰孫卿曰盜王者之法與王者之人為之則亦王矣盜霸者之法與霸者之人為之則亦霸矣盜亡國之法與亡國之人為之則亦亡矣夫與積禮義之君子為之則王矣與端誠信令之士為之則霸矣與權謀傾覆之人為之則亡矣三者明主之所謹擇此能察於用也管仲曰大位不仁不可授以國枘見賢不讓不可與尊位罰避親戚不可使主兵不好本事不可與都邑又曰使賢者食於能則上尊崇鬭士食於功則卒輕死使二者設於國則天下理傅子曰凡都縣之考課有六一曰以教課治則官慎德二曰以清課本則官慎行三曰以才課任則官慎舉四曰以役課平則官慎事五曰以農課等則官慎務六曰以獄課訟則官慎理此能備官也故曰明版籍審什伍限夫田定刑名立君長急農桑去末作敦學斆核才藝簡精悍修武備嚴禁令信賞罰糾遊戲察苛剋此十五者雖聖人復起必此言也夫欲論長短之變故立政道以為經焉
